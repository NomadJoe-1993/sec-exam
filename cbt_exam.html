<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>证券从业 · 全真机考模拟</title>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  font-size:14px;color:#333;background:#eef0f4;
  overflow:hidden;
}

/* ── Top Bar ── */
.topbar{
  background:linear-gradient(135deg,#1a3a6b,#2a5298);
  color:#fff;height:52px;display:flex;align-items:center;
  padding:0 16px;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;white-space:nowrap;}
.topbar-left .exam-icon{font-size:18px;}
.topbar-left .exam-name{font-size:13px;opacity:.85;display:none;}
.topbar-center{font-size:15px;font-weight:700;letter-spacing:1px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.timer{
  font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;
  min-width:80px;text-align:center;letter-spacing:1px;
}
.timer.warning{color:#ff6b6b;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn-submit{
  background:#e74c3c;color:#fff;border:none;border-radius:4px;
  padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;
  transition:background .2s;white-space:nowrap;
}
.btn-submit:hover{background:#c0392b;}
.btn-submit:disabled{background:#888;cursor:not-allowed;}

/* ── Main Layout ── */
.main-wrap{display:flex;height:calc(100vh - 52px);overflow:hidden;}

/* ── Left Sidebar ── */
.sidebar{
  width:210px;min-width:210px;background:#f7f8fa;
  border-right:1px solid #dde0e4;display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:12px 14px 8px;border-bottom:1px solid #e8eaec;
  font-size:13px;font-weight:600;color:#1a3a6b;
  display:flex;justify-content:space-between;
}
.sidebar-header .legend{font-weight:400;font-size:12px;color:#999;display:flex;gap:10px;}
.legend-dot{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:3px;vertical-align:middle;}
.legend-dot.answered{background:#3498db;}
.legend-dot.marked{background:#f39c12;}
.legend-dot.unanswered{background:#fff;border:1px solid #ccc;}
.legend-label{font-size:11px;color:#666;}

.qgrid-wrap{flex:1;overflow-y:auto;padding:8px 10px;}
.qgrid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:6px;counter-reset:qnum;
}
.qgrid-btn{
  aspect-ratio:1;border:1.5px solid #d0d4da;border-radius:4px;
  background:#fff;cursor:pointer;font-size:13px;font-weight:600;
  color:#555;display:flex;align-items:center;justify-content:center;
  transition:all .15s;position:relative;min-height:32px;
}
.qgrid-btn:hover{border-color:#2a5298;background:#eef2f7;}
.qgrid-btn.answered{background:#3498db;color:#fff;border-color:#3498db;}
.qgrid-btn.marked{border-color:#f39c12;}
.qgrid-btn.marked::after{
  content:'?';position:absolute;top:-4px;right:-4px;
  background:#f39c12;color:#fff;font-size:9px;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.qgrid-btn.current{border-color:#1a3a6b;border-width:2.5px;box-shadow:0 0 0 2px rgba(26,58,107,.15);}
.qgrid-btn.correct-exam{background:#27ae60;color:#fff;border-color:#27ae60;}
.qgrid-btn.wrong-exam{background:#e74c3c;color:#fff;border-color:#e74c3c;}

.sidebar-footer{
  padding:8px 12px;border-top:1px solid #e8eaec;
  font-size:12px;color:#888;display:flex;justify-content:space-between;
}
.sidebar-footer span{font-weight:600;color:#333;}

/* ── Question Area ── */
.qarea{
  flex:1;display:flex;flex-direction:column;background:#fff;
  overflow:hidden;position:relative;
}
.qarea-inner{
  flex:1;overflow-y:auto;padding:24px 32px 16px;
}
.q-type-badge{
  display:inline-block;padding:3px 12px;border-radius:4px;
  font-size:12px;font-weight:600;margin-bottom:14px;
}
.q-type-badge.single{background:#e8f4fd;color:#2980b9;}
.q-type-badge.multi{background:#fef3e2;color:#e67e22;}
.q-type-badge.judge{background:#e8f8f0;color:#27ae60;}
.q-type-badge.comprehensive{background:#fdecea;color:#e74c3c;}

.q-num{font-size:15px;font-weight:700;color:#1a3a6b;margin-bottom:4px;}
.q-text{
  font-size:15px;line-height:1.9;margin-bottom:20px;
  color:#222;padding:0 4px;
}

/* ── Options ── */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 16px;border:1.5px solid #e0e4e8;border-radius:8px;
  cursor:pointer;transition:all .15s;font-size:14px;line-height:1.6;
  background:#fafbfc;
}
.opt:hover{border-color:#3498db;background:#f0f6ff;}
.opt.selected{border-color:#3498db;background:#eef5fc;}
.opt.correct-answer{border-color:#27ae60;background:#eafaf1;}
.opt.wrong-answer{border-color:#e74c3c;background:#fdecea;}
.opt.disabled{cursor:default;pointer-events:none;}

.opt-marker{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:2px solid #bcc3cd;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;color:#888;
  margin-top:2px;transition:all .15s;
}
.opt.selected .opt-marker{border-color:#3498db;background:#3498db;color:#fff;}
.opt.multi-type .opt-marker{border-radius:3px;}
.opt.selected.multi-type .opt-marker{border-radius:3px;}

.opt-label{font-weight:600;margin-right:4px;color:#555;min-width:18px;}

/* ── Bottom Bar ── */
.bbar{
  border-top:1px solid #e8eaec;padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fafbfc;flex-shrink:0;
}
.bbar-left{display:flex;align-items:center;gap:20px;}
.mark-label{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  font-size:13px;color:#666;user-select:none;
}
.mark-label input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#f39c12;}
.bbar-right{display:flex;gap:10px;}
.nav-btn{
  padding:8px 24px;border:1.5px solid #d0d4da;border-radius:6px;
  background:#fff;cursor:pointer;font-size:14px;font-weight:500;
  color:#555;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover:not(:disabled){border-color:#2a5298;color:#1a3a6b;background:#f0f4fa;}
.nav-btn:disabled{background:#f5f5f5;color:#bbb;cursor:not-allowed;border-color:#e0e0e0;}
.nav-btn.primary{background:#1a3a6b;color:#fff;border-color:#1a3a6b;}
.nav-btn.primary:hover:not(:disabled){background:#2a5298;}

/* ── Submit Dialog ── */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.dialog{
  background:#fff;border-radius:12px;padding:28px 32px;
  max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.dialog h3{font-size:18px;margin-bottom:6px;color:#1a3a6b;}
.dialog .summary{font-size:14px;color:#666;line-height:1.8;margin:12px 0;}
.dialog .summary .num{font-weight:700;color:#333;}
.dialog-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.dialog-btns button{padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.dlg-cancel{background:#f5f5f5;border:1.5px solid #ddd;color:#666;}
.dlg-cancel:hover{background:#eee;}
.dlg-confirm{background:#e74c3c;border:none;color:#fff;}
.dlg-confirm:hover{background:#c0392b;}
.dlg-secondary{background:#1a3a6b;border:none;color:#fff;}
.dlg-secondary:hover{background:#2a5298;}

/* ── Result Page ── */
.result-page{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f0f2f5;z-index:2000;overflow-y:auto;
}
.result-page.show{display:block;}
.result-inner{max-width:800px;margin:0 auto;padding:24px 16px 60px;}
.result-header{text-align:center;padding:32px 0 24px;}
.result-header h1{font-size:24px;color:#1a3a6b;}
.result-score-circle{
  width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:16px auto;font-weight:700;
  border:6px solid #3498db;color:#333;
}
.result-score-circle .score{font-size:44px;color:#1a3a6b;}
.result-score-circle .score-label{font-size:13px;color:#888;}
.result-badge{
  display:inline-block;padding:4px 20px;border-radius:20px;
  font-size:15px;font-weight:700;margin:8px 0;
}
.result-badge.pass{background:#d4edda;color:#155724;}
.result-badge.fail{background:#f8d7da;color:#721c24;}

.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.stat-card{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-card .val{font-size:24px;font-weight:700;color:#1a3a6b;}
.stat-card .lbl{font-size:12px;color:#999;margin-top:4px;}

.result-section{margin:20px 0;}
.result-section h2{font-size:16px;color:#1a3a6b;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a3a6b;}
.result-q{
  background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:8px;
  border-left:4px solid #27ae60;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.result-q.wrong{border-left-color:#e74c3c;}
.result-q .rq-num{font-weight:700;color:#1a3a6b;font-size:13px;margin-bottom:4px;}
.result-q .rq-text{font-size:13px;line-height:1.7;margin-bottom:6px;}
.result-q .rq-answer{font-size:12px;color:#666;}
.result-q .rq-answer .correct{color:#27ae60;font-weight:600;}
.result-q .rq-answer .wrong{color:#e74c3c;font-weight:600;}

/* ── Mobile Sidebar ── */
.mobile-toggle{display:none;padding:6px 10px;cursor:pointer;font-size:18px;}

/* ── Responsive ── */
@media(max-width:820px){
  .sidebar{position:fixed;top:52px;left:-240px;height:calc(100vh - 52px);z-index:500;transition:left .25s ease;width:200px;min-width:200px;box-shadow:4px 0 12px rgba(0,0,0,.1);}
  .sidebar.open{left:0}
  .mobile-toggle{display:block;}
  .topbar-left .exam-name{display:inline;}
  .qarea-inner{padding:16px 14px;}
  .bbar{padding:10px 12px;flex-wrap:wrap;gap:8px;}
  .bbar-left{order:2;width:100%;justify-content:center;}
  .bbar-right{order:1;width:100%;justify-content:center;}
  .result-stats{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){
  .topbar{height:48px;padding:0 10px;}
  .topbar-center{font-size:13px;}
  .timer{font-size:17px;min-width:70px;}
  .btn-submit{padding:6px 14px;font-size:12px;}
  .qarea-inner{padding:12px 10px;}
  .q-text{font-size:14px;}
  .opt{padding:10px 12px;font-size:13px;}
  .nav-btn{padding:6px 16px;font-size:13px;}
  .qgrid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<!-- ====== Top Bar ====== -->
<div class="topbar">
  <div class="topbar-left">
    <div class="mobile-toggle" id="menuToggle" onclick="toggleSidebar()">☰</div>
    <span class="exam-icon">📋</span>
    <span class="exam-name" id="subjectNameTop">金融市场基础知识</span>
  </div>
  <div class="topbar-center">证券业从业人员资格考试</div>
  <div class="topbar-right">
    <div class="timer" id="timerDisplay">02:00:00</div>
    <button class="btn-submit" id="btnSubmit" onclick="showSubmitDialog()">交卷</button>
  </div>
</div>

<!-- ====== Main ====== -->
<div class="main-wrap">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>题号列表</span>
      <span class="legend">
        <span><span class="legend-dot answered"></span><span class="legend-label">已答</span></span>
        <span><span class="legend-dot marked"></span><span class="legend-label">标记</span></span>
      </span>
    </div>
    <div class="qgrid-wrap">
      <div class="qgrid" id="qgrid"></div>
    </div>
    <div class="sidebar-footer">
      <span>已答 <b id="answeredCount">0</b></span>
      <span>未答 <b id="unansweredCount">120</b></span>
    </div>
  </div>

  <!-- Question Area -->
  <div class="qarea">
    <div class="qarea-inner" id="qareaInner">
      <div class="q-type-badge" id="qTypeBadge">单选题</div>
      <div class="q-num" id="qNumDisplay">第 1 题</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="qOptions"></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bbar">
      <div class="bbar-left">
        <label class="mark-label">
          <input type="checkbox" id="markCheck" onchange="toggleMark()">
          <span>标记本题</span>
        </label>
      </div>
      <div class="bbar-right">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹ 上一题</button>
        <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">下一题 ›</button>
      </div>
    </div>
  </div>
</div>

<!-- ====== Submit Dialog ====== -->
<div class="overlay" id="submitOverlay">
  <div class="dialog">
    <h3>📝 确认交卷</h3>
    <div class="summary" id="submitSummary"></div>
    <div style="font-size:13px;color:#e74c3c;margin-top:4px;">
      交卷后不可修改答案，请确认所有题目已作答。
    </div>
    <div class="dialog-btns">
      <button class="dlg-cancel" onclick="hideSubmitDialog()">继续答题</button>
      <button class="dlg-confirm" onclick="finalSubmit()">确认交卷</button>
    </div>
  </div>
</div>

<!-- ====== Review Unanswered Dialog ====== -->
<div class="overlay" id="reviewOverlay">
  <div class="dialog">
    <h3>⚠️ 还有题目未作答</h3>
    <div class="summary" id="reviewSummary"></div>
    <div class="dialog-btns">
      <button class="dlg-cancel" onclick="hideReviewDialog()">返回检查</button>
      <button class="dlg-secondary" onclick="forceSubmit()">仍要交卷</button>
    </div>
  </div>
</div>

<!-- ====== Result Page ====== -->
<div class="result-page" id="resultPage">
  <div class="result-inner" id="resultInner"></div>
</div>

<script>
/* ==========================================================
   CBT Exam Engine
   ========================================================== */

const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get('subject') || '金融基础_3';
const jsonFile = `sim_${subject}.json`;

let questions = [];
let userAnswers = [];   // string: "A" for single, "AB" for multi, "1" for judge
let marked = [];        // boolean
let currentIdx = 0;
let timerInterval = null;
let timeRemaining = 7200; // 120 minutes in seconds
let examSubmitted = false;
let resultData = null;

// ── Load Data ──
async function loadData() {
  try {
    const resp = await fetch(jsonFile);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const data = await resp.json();
    questions = data.questions;
    userAnswers = new Array(questions.length).fill(null);
    marked = new Array(questions.length).fill(false);

    // Set subject name
    document.getElementById('subjectNameTop').textContent = data.subject || subject;

    buildGrid();
    showQuestion(0);
    startTimer();
  } catch(e) {
    document.getElementById('qareaInner').innerHTML =
      `<div style="text-align:center;padding:60px 20px;color:#e74c3c;">
        <h2>⚠️ 加载失败</h2>
        <p style="margin-top:12px;color:#666;">无法加载题库文件 ${jsonFile}</p>
        <p style="color:#999;font-size:13px;margin-top:8px;">${e.message}</p>
        <button onclick="loadData()" style="margin-top:16px;padding:10px 28px;background:#1a3a6b;color:#fff;border:none;border-radius:6px;cursor:pointer;">🔄 重新加载</button>
      </div>`;
  }
}

// ── Build Question Grid ──
function buildGrid() {
  const grid = document.getElementById('qgrid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('div');
    btn.className = 'qgrid-btn';
    btn.textContent = i + 1;
    btn.dataset.idx = i;
    btn.onclick = () => { closeSidebar(); showQuestion(i); };
    btn.id = `qbtn_${i}`;
    grid.appendChild(btn);
  });
}

function updateGrid() {
  for(let i = 0; i < questions.length; i++) {
    const btn = document.getElementById(`qbtn_${i}`);
    if(!btn) continue;
    let cls = 'qgrid-btn';
    if(i === currentIdx) cls += ' current';
    if(examSubmitted) {
      if(resultData) {
        const qr = resultData.details.find(d => d.idx === i);
        if(qr) {
          cls += qr.correct ? ' correct-exam' : ' wrong-exam';
        }
      }
    } else {
      if(userAnswers[i] !== null) cls += ' answered';
      if(marked[i]) cls += ' marked';
    }
    btn.className = cls;
  }
  // Update counts
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('unansweredCount').textContent = questions.length - answered;
}

// ── Show Question ──
function showQuestion(idx) {
  if(idx < 0 || idx >= questions.length) return;
  currentIdx = idx;
  const q = questions[idx];

  // Type badge
  const badge = document.getElementById('qTypeBadge');
  const typeMap = { single: '单选题', multi: '多选题', judge: '判断题', comprehensive: '不定项选择题' };
  badge.textContent = typeMap[q.type] || q.type;
  badge.className = 'q-type-badge ' + (q.type || 'single');

  // Question number
  document.getElementById('qNumDisplay').textContent = `第 ${idx + 1} 题`;

  // Question text
  document.getElementById('qText').innerHTML = q.q || q.stem || '';
  if(q.qImg) document.getElementById('qText').innerHTML += `<br><img src="${q.qImg}" style="max-width:100%;margin-top:8px;border-radius:4px;">`;

  // Options
  const optContainer = document.getElementById('qOptions');
  optContainer.innerHTML = '';

  const choices = q.c || q.choices || {};
  const isJudge = q.type === 'judge';
  const isMulti = q.type === 'multi' || q.type === 'comprehensive';
  const entries = Object.entries(choices);

  entries.forEach(([key, val]) => {
    const div = document.createElement('div');
    let cls = 'opt';
    if(isMulti) cls += ' multi-type';
    if(examSubmitted) {
      cls += ' disabled';
      const correctAns = (q.a || q.answer || '').toUpperCase();
      const userAns = userAnswers[idx] || '';
      const isSelected = userAns.includes(key);
      const isCorrect = correctAns.includes(key);

      if(isCorrect) cls += ' correct-answer';
      if(isSelected && !isCorrect) cls += ' wrong-answer';
    } else {
      const userAns = userAnswers[idx] || '';
      if(isMulti) {
        if(userAns.includes(key)) cls += ' selected';
      } else {
        if(userAns === key) cls += ' selected';
      }
    }

    const marker = document.createElement('div');
    marker.className = 'opt-marker' + (isMulti ? ' multi-type' : '');
    if(isJudge) {
      marker.textContent = key === '1' ? '√' : '×';
    } else {
      marker.textContent = key;
    }

    const textSpan = document.createElement('span');
    if(isJudge) {
      textSpan.textContent = key === '1' ? '正确' : '错误';
    } else {
      const label = document.createElement('span');
      label.className = 'opt-label';
      label.textContent = key + '.';
      textSpan.appendChild(label);
      textSpan.appendChild(document.createTextNode(val));
    }

    div.appendChild(marker);
    div.appendChild(textSpan);
    if(!examSubmitted) {
      div.onclick = () => selectOption(idx, key);
    }
    optContainer.appendChild(div);
  });

  // Scroll to top
  document.getElementById('qareaInner').scrollTop = 0;

  // Mark checkbox
  document.getElementById('markCheck').checked = marked[idx];

  // Navigation buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? '交卷 ›' : '下一题 ›';

  updateGrid();
}

// ── Select Option ──
function selectOption(idx, key) {
  if(examSubmitted) return;
  const q = questions[idx];
  const isMulti = q.type === 'multi' || q.type === 'comprehensive';
  const isJudge = q.type === 'judge';

  let current = userAnswers[idx] || '';

  if(isMulti) {
    // Toggle selection
    if(current.includes(key)) {
      current = current.replace(key, '');
    } else {
      current = (current + key).split('').sort().join('');
    }
    if(current === '') current = null;
    userAnswers[idx] = current;
  } else {
    // Single choice - directly set
    userAnswers[idx] = key;
  }

  showQuestion(idx);
}

// ── Mark / Unmark ──
function toggleMark() {
  if(examSubmitted) return;
  marked[currentIdx] = document.getElementById('markCheck').checked;
  updateGrid();
}

// ── Navigate ──
function navigate(dir) {
  const next = currentIdx + dir;
  if(next < 0 || next >= questions.length) {
    if(next >= questions.length) showSubmitDialog();
    return;
  }
  showQuestion(next);
}

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    timeRemaining--;
    if(timeRemaining <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 考试时间已到，系统将自动交卷。');
      finalSubmit();
      return;
    }
    updateTimerDisplay();
  }, 1000);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const h = Math.floor(timeRemaining / 3600);
  const m = Math.floor((timeRemaining % 3600) / 60);
  const s = timeRemaining % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  display.className = 'timer' + (timeRemaining < 600 ? ' warning' : '');
}

// ── Submit Flow ──
function showSubmitDialog() {
  const answered = userAnswers.filter(a => a !== null).length;
  const unanswered = questions.length - answered;
  const markedCount = marked.filter(m => m).length;

  document.getElementById('submitSummary').innerHTML =
    `共 <span class="num">${questions.length}</span> 题 · ` +
    `已答 <span class="num">${answered}</span> 题 · ` +
    `未答 <span class="num">${unanswered}</span> 题 · ` +
    `标记 <span class="num">${markedCount}</span> 题`;

  if(unanswered > 0) {
    document.getElementById('reviewOverlay').classList.add('show');
    document.getElementById('reviewSummary').innerHTML =
      `还有 <span class="num" style="color:#e74c3c;">${unanswered}</span> 道题未作答，` +
      `建议检查后再交卷。`;
  } else {
    document.getElementById('submitOverlay').classList.add('show');
  }
}

function hideSubmitDialog() {
  document.getElementById('submitOverlay').classList.remove('show');
}
function hideReviewDialog() {
  document.getElementById('reviewOverlay').classList.remove('show');
}

function finalSubmit() {
  clearInterval(timerInterval);
  hideSubmitDialog();
  hideReviewDialog();
  gradeExam();
}

function forceSubmit() {
  hideReviewDialog();
  finalSubmit();
}

// ── Grade Exam ──
function gradeExam() {
  examSubmitted = true;
  let correct = 0;
  let wrong = 0;
  const details = [];

  questions.forEach((q, i) => {
    const correctAns = (q.a || q.answer || '').toUpperCase().split('').sort().join('');
    const userAns = (userAnswers[i] || '').toUpperCase().split('').sort().join('');
    const isCorrect = userAns === correctAns;
    if(isCorrect) correct++; else wrong++;

    details.push({
      idx: i,
      q: q.q || q.stem || '',
      type: q.type,
      choices: q.c || q.choices || {},
      correctAnswer: q.a || q.answer || '',
      userAnswer: userAnswers[i] || '',
      correct: isCorrect,
      explanation: q.an || q.explanation || ''
    });
  });

  resultData = { correct, wrong, total: questions.length, details };
  showResult();
}

// ── Show Result ──
function showResult() {
  const pct = Math.round(resultData.correct / resultData.total * 100);
  const passed = pct >= 60;
  const container = document.getElementById('resultInner');

  // Group by type
  const groups = { single: [], multi: [], judge: [], comprehensive: [] };
  resultData.details.forEach(d => {
    const g = groups[d.type] || groups.single;
    g.push(d);
  });

  let detailsHTML = '';
  Object.entries(groups).forEach(([type, items]) => {
    if(items.length === 0) return;
    const typeLabel = { single:'单选题', multi:'多选题', judge:'判断题', comprehensive:'不定项选择题' }[type] || type;
    detailsHTML += `<div class="result-section"><h2>${typeLabel}（${items.length}题）</h2>`;
    items.forEach(d => {
      const cls = d.correct ? 'result-q' : 'result-q wrong';
      const choiceText = Object.entries(d.choices).map(([k,v]) => `${k}.${v}`).join('；');
      detailsHTML += `
        <div class="${cls}">
          <div class="rq-num">第 ${d.idx+1} 题${d.correct ? ' ✅' : ' ❌'}</div>
          <div class="rq-text">${d.q}</div>
          <div class="rq-answer">
            你的答案：<span class="${d.correct ? 'correct' : 'wrong'}">${d.userAnswer || '（未作答）'}</span>
            ${d.correct ? '' : ` · 正确答案：<span class="correct">${d.correctAnswer}</span>`}
          </div>
          ${d.explanation ? `<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.7;border-top:1px solid #eee;padding-top:6px;">${d.explanation}</div>` : ''}
        </div>`;
    });
    detailsHTML += `</div>`;
  });

  const wrongList = resultData.details.filter(d => !d.correct);
  const markList = wrongList.map(d => d.idx + 1).join('、');

  container.innerHTML = `
    <div class="result-header">
      <h1>📊 考试结果</h1>
      <div class="result-score-circle">
        <div class="score">${resultData.correct}</div>
        <div class="score-label">/ ${resultData.total} 题正确</div>
      </div>
      <div class="result-badge ${passed ? 'pass' : 'fail'}">
        ${passed ? '🎉 合格！' : '💪 未达标，继续加油！'}
      </div>
      <div style="font-size:13px;color:#888;margin-top:4px;">
        正确率 ${pct}% ${passed ? '' : '（60%及格）'}
        ${!passed && wrongList.length > 0 ? `<br>错题：${markList}` : ''}
      </div>
    </div>

    <div class="result-stats">
      <div class="stat-card"><div class="val" style="color:#27ae60;">${resultData.correct}</div><div class="lbl">正确</div></div>
      <div class="stat-card"><div class="val" style="color:#e74c3c;">${resultData.wrong}</div><div class="lbl">错误</div></div>
      <div class="stat-card"><div class="val">${pct}%</div><div class="lbl">正确率</div></div>
      <div class="stat-card"><div class="val" style="color:#1a3a6b;">${resultData.total}</div><div class="lbl">总题数</div></div>
    </div>

    <div style="text-align:center;margin:16px 0;">
      <button onclick="resetExam()" style="padding:10px 28px;background:#1a3a6b;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px;">🔄 重新模考</button>
      <button onclick="reviewWrongAnswers()" style="padding:10px 28px;background:#e74c3c;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;" ${wrongList.length === 0 ? 'disabled style="background:#ccc;"' : ''}>📕 查看错题</button>
      <button onclick="window.close()" style="padding:10px 28px;background:#f5f5f5;color:#666;border:1.5px solid #ddd;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;">返回</button>
    </div>

    ${detailsHTML}
  `;

  updateGrid();
  document.getElementById('resultPage').classList.add('show');
  window.scrollTo(0, 0);
}

function resetExam() {
  if(!confirm('确定要重新开始模考吗？当前答题记录将被清除。')) return;
  userAnswers = new Array(questions.length).fill(null);
  marked = new Array(questions.length).fill(false);
  examSubmitted = false;
  resultData = null;
  timeRemaining = 7200;
  document.getElementById('resultPage').classList.remove('show');
  document.getElementById('submitOverlay').classList.remove('show');
  document.getElementById('reviewOverlay').classList.remove('show');
  startTimer();
  showQuestion(0);
}

function reviewWrongAnswers() {
  if(!resultData) return;
  const wrongList = resultData.details.filter(d => !d.correct);
  if(wrongList.length === 0) return;
  // Jump to first wrong answer
  showQuestion(wrongList[0].idx);
  document.getElementById('resultPage').classList.remove('show');
}

// ── Sidebar Toggle (Mobile) ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', (e) => {
  if(examSubmitted) return;
  if(document.getElementById('submitOverlay').classList.contains('show') ||
     document.getElementById('reviewOverlay').classList.contains('show')) {
    if(e.key === 'Escape') { hideSubmitDialog(); hideReviewDialog(); }
    if(e.key === 'Enter') { finalSubmit(); }
    return;
  }
  if(e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
  if(e.key === 'ArrowRight' || e.key === 'd') navigate(1);
  if(e.key === 'm') { document.getElementById('markCheck').checked = !document.getElementById('markCheck').checked; toggleMark(); }
});

// ── Init ──
loadData();
</script>
