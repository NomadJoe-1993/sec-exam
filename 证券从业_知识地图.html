<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>证券从业 · 知识地图</title>
<style>
:root {
  --bg: #f5efe6;
  --card: #faf6f0;
  --blue: #1e5b8a;
  --blue-bg: rgba(30,91,138,0.06);
  --blue-light: #4a8bc2;
  --red: #c23b22;
  --red-bg: rgba(194,59,34,0.06);
  --green: #3d7246;
  --green-bg: rgba(61,114,70,0.08);
  --gold: #c9a96e;
  --border: #d4c9b8;
  --border-light: #e8dfd0;
  --text: #3d3229;
  --dim: #8b7e6e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 0.6rem;
  min-height: 100vh;
  padding-bottom: 4rem;
}
.container { max-width: 680px; margin: 0 auto; }

.hd {
  text-align: center;
  padding: 1rem 0 0.8rem;
  border-bottom: 3px solid var(--gold);
  margin-bottom: 0.8rem;
}
.hd h1 { font-size: 1.3rem; font-weight: 800; color: var(--text); }
.hd .sub { color: var(--dim); font-size: 0.72rem; margin-top: 0.2rem; }

.tabs { display: flex; gap: 3px; margin-bottom: 0.8rem; }
.tab {
  flex: 1; padding: 0.5rem;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  font-size: 0.82rem; font-weight: 600;
  color: var(--dim); background: #f0e8d8;
  cursor: pointer; transition: all 0.2s;
}
.tab.on { background: var(--card); color: var(--blue); border-bottom-color: var(--card); }
.tab-content { display: none; }
.tab-content.on { display: block; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.4rem;
  margin-bottom: 0.8rem;
}
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.2rem; text-align: center; }
.stat-box .num { font-size: 1.1rem; font-weight: 800; }
.stat-box .label { font-size: 0.6rem; color: var(--dim); margin-top: 0.05rem; }

.strategy {
  background: linear-gradient(135deg, #fef8e8, #fdf0d8);
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 0.6rem 0.7rem;
  margin-bottom: 0.7rem;
  font-size: 0.72rem;
  line-height: 1.5;
}
.strategy b { color: var(--blue); }

/* Floor */
.floor {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 0.6rem;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.floor.priority { border-left: 3px solid var(--red); }
.floor-hd {
  padding: 0.55rem 0.7rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  background: linear-gradient(135deg, #faf6ee, #f5ede0);
  user-select: none;
}
.floor-hd:active { background: linear-gradient(135deg, #f5ede0, #efe5d5); }
.priority .floor-hd { background: linear-gradient(135deg, #fef6f4, #fceae8); }
.floor-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 800; color: #fff; flex-shrink: 0;
}
.floor-name { flex: 1; font-weight: 600; font-size: 0.82rem; }
.floor-weight { font-size: 0.65rem; color: var(--dim); white-space: nowrap; margin-right: 0.3rem; }
.floor-pct { font-size: 0.68rem; font-weight: 700; white-space: nowrap; }
.floor-arrow { font-size: 0.55rem; color: var(--dim); margin-left: 0.2rem; transition: transform 0.2s; }
.floor-arrow.open { transform: rotate(180deg); }
.floor-bar { height: 3px; background: #f0e8d8; border-radius: 1px; margin: 0 0.7rem; }
.floor-bar-fill { height: 100%; border-radius: 1px; }

/* Core understanding + exam tips */
.floor-core {
  padding: 0.5rem 0.7rem;
  font-size: 0.72rem;
  line-height: 1.7;
  color: var(--text);
  background: var(--blue-bg);
  border-left: 3px solid var(--blue);
  margin: 0.3rem 0.7rem;
  border-radius: 0 6px 6px 0;
}
.floor-core-title {
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 0.2rem;
  font-size: 0.74rem;
}
.floor-exam {
  padding: 0.4rem 0.7rem;
  font-size: 0.68rem;
  line-height: 1.6;
  background: #fef8e8;
  border-left: 3px solid var(--gold);
  margin: 0.2rem 0.7rem;
  border-radius: 0 6px 6px 0;
}
.floor-exam-title {
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 0.1rem;
  font-size: 0.7rem;
}

/* Body with sections */
.floor-body { padding: 0.2rem 0.6rem 0.5rem; display: none; }
.floor-body.open { display: block; }

.room {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
  padding: 0.5rem 0.5rem;
  border-radius: 6px;
  margin: 3px 0;
  background: #faf8f4;
  border-left: 2px solid var(--border-light);
}
.room-top {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  width: 100%;
}
.room-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.room-name { flex: 1; font-weight: 600; font-size: 0.74rem; }
.room-count { font-size: 0.62rem; color: var(--dim); white-space: nowrap; }
.room-hot {
  font-size: 0.5rem; background: var(--red); color: #fff;
  padding: 0.04rem 0.25rem; border-radius: 2px; font-weight: 700;
}
.room-idea {
  font-size: 0.68rem;
  color: var(--dim);
  line-height: 1.6;
  padding-left: 0.9rem;
  margin-top: 0.1rem;
}
.room-exam {
  font-size: 0.65rem;
  color: var(--red);
  line-height: 1.5;
  padding-left: 0.9rem;
  margin-top: 0.05rem;
}
.room-exam::before {
  content: "📌 常考：";
  color: var(--gold);
  font-weight: 600;
}

.stars { font-size: 0.6rem; letter-spacing: -1px; }

.footer {
  text-align: center; padding: 1rem;
  color: var(--dim); font-size: 0.65rem;
  border-top: 1px solid var(--border); margin-top: 1rem;
}

@supports (-webkit-touch-callout: none) { body { padding-bottom: 2rem; } }
</style>
</head>

      ["股票估值",100,"两类估值法：相对估值法（用对比来估）——PE市盈率（股价÷每股收益）、PB市净率（股价÷每股净资产）、PS市销率。绝对估值法（算内在价值）——DDM股利贴现模型、FCFF自由现金流模型。不需要会算，但要理解「PE越低越便宜」「PB适用于重资产行业」。","理解型考题。常考「以下哪个市盈率计算公式正确」「PB适合什么类型的企业估值」。不需要做计算题，但要知道每种估值方法的适用场景（PE适合盈利稳定的企业，PB适合银行/钢铁等重资产企业）。"]
    ]
  },
  {
    num:5, name:"债券", weight:15, star:4, color:"#d4833a", priority:true,
    core:"债券的本质就是「借钱 - 打借条 - 还本付息」。比股票简单，但品种多（国债/地方债/金融债/公司债/可转债），各有各的发行方式和交易规则。核心线索是「谁发的、怎么发、怎么交易、怎么估值」。可转债（能转成股票的债券）是近年必考。",
    exam:"🎯 考法：题量约12-15题，以单选+判断为主。国债发行方式、公司债发行条件、可转债条款是高频考点。债券和股票的对比题也经常出现（风险和收益的差异）。",
    sections:[
      ["债券概述",142,"债券要素：面值（到期还多少钱）、票面利率（每年给多少利息）、期限（借多久）、发行人（谁借的）。分类维度：按发行主体（国债/地方债/金融债/公司债）、按期限（短期<1年/中期1-10年/长期>10年）、按付息方式（零息/附息/贴现）。信用评级：AAA最高→D违约。","常考「以下属于利率债的是」「信用债和利率债的区别」。利率债（国债/国开债）由政府信用背书，信用债（公司债/企业债）靠企业自身信用。这个区别是基础。"],
      ["债券的发行",66,"国债发行方式：公开招标（竞争性招标/荷兰式招标）。地方债：财政部代发+地方自发自还。金融债：政策性银行（国开行/进出口行/农发行）发行。公司债：实行注册制，条件比股票宽松。可转债：能按约定价格转成股票的债券，下有保底上不封顶。","高频考点！国债招标方式（荷兰式=统一价/美国式=多重价格）、可转债的特征（转股权/赎回条款/回售条款）。「可转债的持有人享有什么权利」常考。公司债注册制改革也是近年热点。"],
      ["债券交易",58,"净价交易全价结算：报价时不包含应计利息（净价），成交结算时加收截止交割日的应计利息（全价）。债券回购：质押式回购（用债券质押借钱，约定未来购回）vs买断式回购（把债券卖出去换钱，约定未来买回来）。","常考「净价和全价的区别」「质押式回购和买断式回购的区别」。重点是理解净价交易逻辑——因为利息每天都在累积，所以报价要剥离利息。这是理解难点。"],
      ["债券估值",32,"到期收益率（YTM）：持有至到期可获得的年化收益率，是债券估值最重要的指标。久期：债券价格对利率变化的敏感度（久期越长，利率风险越大）。凸性：对久期的修正（利率变化大时更准）。理解概念即可，不用算。","少考但常出现在综合题。常考「到期收益率上升意味着债券价格上升还是下降」「久期越长的债券利率风险越大」。理解方向即可。"],
    ]
  },
  {
    num:6, name:"证券投资基金", weight:15, star:4, color:"#d4833a", priority:true,
    core:"基金=「散户把钱凑一起，找专业的人来投资」。核心是几组关键区分：按投资标的（股/债/货/混）、按运作方式（开放式随时申赎vs封闭式不能申赎）、按募集方式（公募面向大众vs私募面向合格投资者）。理解基金涉及的三方当事人：管理人（管投资）→托管人（管钱）→持有人（出钱的人）。",
    exam:"🎯 考法：约10-12题，多选占比高。基金的类型区分（特别是公募vs私募、开放式vs封闭式）是必考。基金管理人和托管人的职责区分经常出现在多选题中。REITs是近年新增考点。",
    sections:[
      ["基金概述",54,"基金的定义：集合投资、专业管理、组合投资、利益共享。三方当事人：基金管理人（负责投资运作）、基金托管人（负责保管资产/监督运作）、基金持有人（出钱的人，享有收益）。分类：按投资标的（股票型80%以上投股票/债券型80%以上投债券/货币市场型/混合型）、按运作方式（开放式可申赎/封闭式不可申赎）、按募集方式（公募/私募）。","必考题！三类分类方式必须清楚。常考「开放式基金和封闭式基金的区别」「公募基金和私募基金的区别」「股票型基金的持仓比例要求」。特别是80%这条线（股票型基金持仓股票≥80%）。"],
      ["运作与业务流程",34,"基金募集：申请核准→发售→成立（募资够才成立）。认购（新基金发行时买）vs申购（基金成立后在开放期买）的区别。赎回：开放式基金通常T+2到账。信息披露：招募说明书（发行前）、定期报告（季报/半年报/年报）、临时公告（重大事项）。","常考「基金募集失败怎么办」「认购和申购的区别」「基金信息披露的要求」。特别是基金募集期满募资不足时的处理方式（退还+利息）。"],
      ["估值、费用与利润分配",29,"基金资产净值（NAV）=（基金总资产-总负债）÷基金总份额。费用结构：管理费（给管理人，每天计提）、托管费（给托管人）、申购费（买入时收）、赎回费（卖出时收）。基金利润来自：利息收入+股息红利+资本利得（买卖差价）。","常考「基金费用的计提方式」「管理费和托管费的区别」。注意管理费是「每天计提、定期支付」而不是一次性收。利润分配（基金分红可以不交税）也是考点。"],
      ["基金的管理",14,"投资范围与限制：「双十规定」（一只基金持同一股票≤基金资产10%/同一基金管理人旗下所有基金持同一股票≤该股票市值10%）。ETF（交易型开放式指数基金）是被动跟踪指数的基金，既可以申购赎回也能像股票一样在交易所买卖。","常考「双十规定的内容」「ETF的特征」。ETF可以在交易所实时买卖，这是它与普通开放式基金最大的区别。"],
      ["监管与信息披露",16,"基金信息披露的原则：真实性/准确性/完整性/及时性/公平披露。重大事项临时公告（基金经理变更/净值计价错误超0.5%/巨额赎回等）。基金监管机构：证监会基金部监管。","常考「哪些事项需要发布临时公告」「信息披露的原则」。理解定期报告和临时报告的区别。"],
      ["私募证券投资基金",14,"私募基金：面向合格投资者非公开募集。合格投资者门槛（金融资产≥300万或近三年年均收入≥50万，且投资单只私募基金≥100万）。备案制（不是核准制，在基金业协会备案即可）。私募基金不能做公开宣传/不能承诺保本/不能承诺最低收益。","新增考点！常考「合格投资者的认定标准」「私募基金不能做什么」。特别注意私募基金是备案制不是审批制，门槛100万起。"],
      ["基础设施公募REITs",14,"REITs（不动产投资信托基金）：将基础设施项目（收费公路/产业园区/仓储物流/保障性租赁住房）打包成基金在交易所上市。强制分红（每年至少分红1次，分红比例≥可供分配金额的90%）。底层资产必须是产权清晰的基础设施。","近年新增必考！常考「REITs的强制分红比例是多少」「REITs的投资标的是什么」。注意REITs既不是股票也不是债券，而是权益型投资工具。"],
    ]
  },
  {
    num:7, name:"金融衍生工具", weight:12, star:3, color:"#4a8bc2", priority:false,
    core:"衍生品=「价值派生自其他东西的金融工具」。核心是四类基础衍生品：远期（场外/非标/锁定未来价格）、期货（场内/标准化/保证金交易/每日结算）、期权（买方向卖方支付权利金，有权利没义务）、互换（交换现金流）。理解它们的基本区别和各自的风险特征。",
    exam:"🎯 考法：约6-8题，以概念判断为主。期货和期权的区别是必考中的必考（权利和义务的不对称性）。不需要精通定价，重点是「每个工具是干什么用的」。",
    sections:[
      ["衍生工具概述",25,"衍生工具的定义：从基础资产（股票/债券/商品/利率/汇率）派生出来的金融合约。特征：跨期性（现在约定未来交易）、杠杆性（小资金撬动大合约）、联动性（价格跟随基础资产）、高风险性。分类：远期/期货/期权/互换是四大基础型。","常考「衍生工具的特征不包括」「以下属于衍生工具的是」。理解杠杆性的含义（保证金交易放大收益也放大亏损）。"],
      ["期货与期权交易",47,"期货：标准化合约，在交易所交易，双方都有履约义务。保证金制度（交一定比例保证金就能买卖）、每日无负债结算（每天按收盘价结算盈亏，亏了要补保证金）。期权：买方交权利金获得选择权（到期可以选择行权或放弃），卖方收取权利金但有履约义务。核心区别：期权的权利义务是不对等的，期货是对等的。","必考题！期货和期权的区别——这是全章最重要的考点。常考「期权买方和卖方的权利/义务关系」「期货的每日无负债结算是什么」。特别注意：买方只有权利没义务，卖方只有义务没权利。"],
      ["远期与互换交易",13,"远期：非标准化合约，场外交易，双方私下约定未来买卖。没有保证金，到期一次性交割。互换：双方约定在未来交换现金流（利率互换：固定利率换浮动利率/货币互换：一种货币换另一种货币）。了解概念即可，考试很少涉及细节。","低频考点。了解远期和期货的区别（标准化vs非标准化/场内vs场外）、利率互换的基本概念即可。"],
      ["其他衍生工具",8,"信用衍生品（CDS信用违约互换：相当于给债券买保险）。结构化产品：将多种基础资产打包分层的产品（CDO/CLO）。了解定义即可。","很少考。知道CDS是用来规避信用风险的即可。"]
    ]
  },
  {
    num:8, name:"金融风险管理", weight:8, star:2, color:"#8b7e6e", priority:false,
    core:"风险是金融的孪生兄弟，管好风险才能活下来。核心是认识五类风险：市场风险（价格波动）、信用风险（对方违约）、操作风险（内部出错）、流动性风险（没钱了）、声誉风险（名声坏了）。记住风险和管理的「基本流程」和「谁管什么」。本章分值低，扫一遍概念即可。",
    exam:"🎯 考法：约4-5题，以概念判断为主。重点是五类风险的定义识别（给你一个场景，判断是什么风险）。VaR（在险价值）是本章唯一需要理解的定量概念。",
    sections:[
      ["风险管理概述",17,"风险=未来结果的不确定性。金融风险的分类：市场风险（利率/汇率/股价/商品价格变动）、信用风险（交易对手不还钱）、操作风险（内部流程/人员/系统/外部事件）、流动性风险（没钱或者不能以合理成本融资）、声誉风险（负面评价）。","必考题！给场景判断属于哪种风险——「交易员违规操作导致亏损」（操作风险）、「债券发行人违约」（信用风险）。这是最经典的出题方式。"],
      ["风险管理流程与架构",30,"风险管理基本流程：风险识别（发现风险）→风险度量（评估大小）→风险监测（持续跟踪）→风险控制（采取措施）。治理架构：董事会（最终责任）→风险管理委员会（决策）→首席风险官（执行）→业务部门（第一道防线）。三道防线：业务部门（一线）→风控部门（二线）→内部审计（三线）。","常考「风险管理的基本流程」「三道防线的构成」。三道防线是经典考点，必须记住谁在前谁在后。"],
      ["市场风险管理",14,"市场风险=因市场价格（利率/汇率/股价/商品价格）不利变动导致损失。VaR（在险价值）：在一定的置信水平下，某一金融资产在未来特定时期内的最大可能损失（例如95%置信水平下，1天VaR=100万，意思是95%的概率一天损失不超过100万）。理解概念。","VaR是本章唯一需要理解的定量概念。常考「VaR的含义是什么」「以下哪个属于市场风险」。注意VaR不是一个确定值，而是一个概率下的最大可能损失。"],
      ["信用风险管理",8,"信用风险=借款人/交易对手不履行合同义务的风险。管理手段：信用评级（用来评估违约概率）、授信管理（设定信用额度上限）、抵押担保（要求提供抵押品）、信用衍生品（用CDS对冲）。","常考「信用风险的管理手段包括」。理解抵押品的作用——降低信用风险暴露。"],
      ["流动性风险管理",13,"流动性风险=无法以合理成本及时获取充足资金来应对业务发展或偿债需求。两种类型：市场流动性风险（市场不活跃，卖不掉）和融资流动性风险（借不到钱）。管理手段：流动性覆盖率（LCR=优质流动性资产÷未来30天净现金流出≥100%）、净稳定资金率（NSFR=可用稳定资金÷所需稳定资金≥100%）。","常考「流动性风险的定义」「LCR的含义」。理解流动性风险和其他风险的区别——它不是某个单次事件导致的，而是叠加放大效应。"],
      ["操作风险和声誉风险",8,"操作风险=由不完善或有问题的内部程序/人员/系统/外部事件造成损失。典型例子：交易员越权交易、系统故障、欺诈。管理方法：流程控制/职责分离/授权管理。声誉风险=负面评价导致客户流失/融资成本上升/被调查。管理方法：及时回应/信息披露/危机公关。","常考「以下哪个是操作风险事件」「操作风险和声誉风险的区别」。操作风险可以用保险来转移（如员工欺诈险），声誉风险不行。"],
      ["证券公司风险管理实践",5,"净资本管理：证券公司必须保持净资本（净资产减去高风险资产调整）与其各类风险准备之间有一个最低比例。风控指标包括流动性覆盖率（LCR）、净稳定资金率（NSFR）。净资本是证监会监管证券公司的核心指标。","了解净资本的概念即可——这是证监会管证券公司的「紧箍咒」，净资本不够会被限制业务。很少出题。"]
    ]
  }

    core:"法规部分的大半壁江山（35%）。核心是三部法：公司法（公司怎么管/股东有什么权利）、证券法（发行/交易/信息披露的规则）、合伙企业法（普通合伙vs有限合伙的区别）。复习思路不是死背法条，而是理解「立法者为什么这样规定」——每一条禁止性规定的背后都有惨痛的教训。",
    exam:"🎯 考法：单选+多选+判断全面覆盖，约20-25题。公司法（公司治理/股东权利）和证券法（内幕交易/操纵市场/虚假陈述）是重中之重。数字类考点（持股比例/表决权比例/罚款金额）是必考，建议做成表格对比记忆。",
    sections:[
      ["法律法规体系",32,"法律层级：宪法（最高）→法律（全国人大制定，如《证券法》）→行政法规（国务院制定）→部门规章（证监会制定）→自律规则（交易所/协会制定）。效力层级：上位法优于下位法。","常考「以下法律层级最高的是」「行政法规由谁制定」。法律的层级关系是第一章的基础，理解法规从高到低的效力顺序即可。"],
      ["公司法(核心)",114,"公司是法人（独立承担民事责任）。两种形式：有限责任公司（≤50人，不能公开募股）vs股份有限公司（可以公开募股，可以上市）。治理结构：股东会（最高权力机构）→董事会（经营决策）→监事会（监督）→高管（执行）。股东权利：知情权/表决权/分红权/优先认购权/剩余财产分配权。","必考题！有限责任公司和股份有限公司的区别（特别是股东人数上限50人的数字）。常考「股东会的职权」「董事会的组成」。1/3以上董事可以提议召开董事会会议——这个数字经常考。"],
      ["合伙企业法",16,"普通合伙（GP）：所有合伙人承担无限连带责任（亏了要拿个人财产还）。有限合伙（LP）：部分合伙人只以出资额为限承担责任。有限合伙不能由LP执行事务（必须由GP执行）。核心区别是责任承担方式不同。","常考「普通合伙人和有限合伙人的责任区别」「有限合伙人能否执行合伙事务」。注意普通合伙人和有限合伙人最大的区别是责任承担方式——GP无限，LP有限。"],
      ["证券法(核心)",99,"注册制：以信息披露为中心，交易所审核+证监会注册，审核效率提高。禁止的交易行为：内幕交易（利用内幕信息买卖证券）、操纵市场（通过交易/信息影响价格）、虚假陈述（信息披露造假）。投资者保护制度：代表人诉讼（默示加入明示退出）。","绝对核心！内幕交易（内幕信息敏感期内买卖/泄露/建议他人买卖）、操纵市场（连续交易/约定交易/洗售）、虚假陈述的认定标准必须掌握。常考「以下哪个属于内幕交易」「操纵市场的行为包括」。代表人诉讼制度是近年新增重点。"],
      ["证券投资基金法",20,"基金管理人（证券公司/基金公司）负责投资运作，基金托管人（商业银行）负责保管资产。基金份额持有人（投资者）享有收益分配权/剩余财产分配权。基金运作的监管：投资范围限制、信息披露要求。","常考「基金管理人和托管人的职责区分」「基金份额持有人的权利」。托管人的监督职责（发现管理人有违规行为要报告证监会）是经典考点。"],
      ["期货和衍生品法",20,"期货交易：标准化合约，保证金交易，每日无负债结算。期货经营机构：期货公司（需要牌照）。衍生品市场：场外衍生品交易（双边协议）。禁止操纵期货市场。","常考「期货交易的基本规则」「期货公司的业务范围」。注意期货和衍生品法是2022年新颁布的，近年来的新增考点。"],
      ["证券公司监督管理条例",72,"证券公司设立条件（主要股东最近3年无重大违法违规/持续盈利/净资产不低于5000万）。业务许可（经纪/投行/资管/自营等需分别申请牌照）。风控指标：净资本/流动性/风险覆盖率等。合规管理：设合规总监。","常考「证券公司的设立条件」「净资本管理的目标」。特别注意主要股东条件（3年无违法/持续盈利/净资本≥5000万）这个数字。"],
      ["证券公司风险处置条例",7,"风险处置方式：停业整顿（自己整改）→托管（别人代管）→接管（监管机构接管）→行政重组（找新股东）→撤销（关门清算）。处置顺序由轻到重。","低频考点。知道五种处置方式的名称和含义即可，不会考细节。"],
      ["私募投资基金监督管理条例",10,"私募基金募集：非公开募集（不能通过媒体/推介会宣传），只能面向合格投资者。合格投资者标准：金融资产≥300万或近三年年均收入≥50万，单只基金投资≥100万。禁止保本保收益。","新增法规考点。常考「私募基金的募集方式」「合格投资者的标准」。核心是「非公开募集」和「不能承诺保本保收益」。"],
    ]
  },
  {
    num:2, name:"证券经营机构管理规范", weight:20, star:4, color:"#d4833a", priority:true,
    core:"证券公司怎么管好自己？这套管理体系是：公司治理（董事会/监事会/高管怎么分工）→内部控制（不能让一个人说了算）→合规管理（要有合规总监盯着）→全面风险管理（识别/度量/控制各类风险）→投资者适当性（把合适的产品卖给合适的人）。整套逻辑是「稳健经营、保护投资者」。",
    exam:"🎯 考法：约10-12题，多选比例高。公司治理（三会一层的职责）、反洗钱（三个核心义务）、适当性管理是三大高频区。数字类考点（反洗钱大额交易的金额门槛/持股比例等）需要特别记忆。",
    sections:[
      ["公司治理、内控与合规",136,"三会一层：股东会（最高决策）→董事会（经营决策，设独立董事1/3以上）→监事会（监督，职工监事≥1/3）→管理层（执行）。内部控制：防范欺诈/错误/舞弊，保护资产安全。合规管理：设合规总监，直接向董事会负责。","常考「独立董事的比例」「职工监事的最低比例」「合规总监的职责」。独立董事制度的初衷是保护中小股东利益——这个立法逻辑要理解。"],
      ["证券公司风险管理",82,"全面风险管理：覆盖所有业务/所有风险类型/所有环节。净资本管理是核心监管指标。风险控制指标：净资本/净资产/流动性覆盖率/净稳定资金率。风险覆盖率（净资本÷风险资本准备）≥100%。","常考「风险覆盖率的计算公式」「净资本管理的意义」。理解净资本的逻辑：净资本越高，证券公司抗风险能力越强。净资本不足时会被限制业务。"],
      ["证券公司并表管理",20,"并表管理：将证券公司及其子公司/孙公司作为一个整体进行风险管理和监管。风险隔离：母子公司之间要有防火墙（不能混用资金/不能互相担保）。","常考「并表管理的范围」「风险隔离的要求」。核心是防止风险在集团内部传染。"],
      ["投资者适当性管理",47,"了解你的客户（KYC）：收集客户基本信息/财务状况/投资经验/风险偏好。风险测评：将客户分为C1（保守）~C5（进取）五级。产品风险分级：R1（低风险）~R5（高风险）。匹配原则：C1只能买R1，C5可以买R1~R5。","必考题！客户风险等级和产品风险等级的对应关系。常考「C3客户可以买什么风险等级的产品」「适当性管理的基本流程」。特别注意经营机构的告知义务和禁止主动推介高风险产品的规定。"],
      ["反洗钱和反恐怖融资",19,"反洗钱三大义务：客户身份识别（了解客户真实身份）、大额交易报告（单笔或累计≥5万元现金交易/≥20万元转账要报告）、可疑交易报告（无论金额，有嫌疑就报告）。客户身份资料保存至少5年。","常考「大额交易的报告标准」「客户身份资料的保存期限」。注意5万现金/20万转账这两个数字。可疑交易没有金额门槛，有嫌疑就报。"],
      ["信息技术及网络数据管理",16,"信息系统安全：系统要稳定运行，数据要备份。数据分类分级：客户信息属于敏感数据，要重点保护。个人信息保护：收集个人信息要告知用途、取得同意，不能超范围使用。","常考「信息系统的安全要求」「个人信息的保护要求」。理解数据分类分级的逻辑——不同级别的数据要有不同的保护措施。"],
      ["网络和信息安全管理",12,"网络安全等级保护：信息系统按重要程度分等级（一级最低，五级最高），不同等级要求不同的安全保护措施。网络安全事件应急响应：发现安全事件要立即处置并向监管报告。数据跨境传输：重要数据和个人信息出境要安全评估。","了解即可。知道网络安全等级保护制度的分级逻辑和安全事件要报告的要求。"]
    ]
  },
  {
    num:3, name:"证券公司业务规范", weight:30, star:5, color:"#c23b22", priority:true,
    core:"证券公司到底做什么赚钱？经纪（帮客户买卖股票，收佣金）→投行（帮企业上市/发债，收承销费）→资管（代客理财，收管理费）→自营（用自己的钱投资）→融资融券（借钱/借股票给客户，收利息）。每条业务都有「能做什么」和「不能做什么」的红线。记住业务边界比记住业务内容更重要。",
    exam:"🎯 考法：题量大（15-18题），多选+综合分析题都有。融资融券（保证金比例/标的证券/强制平仓）是毫无疑问的五星考点。投行业务（保荐责任/承销方式）和资管业务（打破刚兑）紧随其后。每条业务的「禁止行为」是出题老师的宠儿。",
    sections:[
      ["证券经纪",27,"经纪=帮客户买卖证券。核心规则：接受委托（客户指令下单）→执行交易（按指令买卖）→交付（T+1交收）。不能垫资、不能全权委托、不能承诺收益。客户交易结算资金必须第三方存管（券商不能碰客户的钱）。","常考「经纪业务的禁止行为」「客户交易结算资金第三方存管是什么意思」。特别注意：券商不能代客户作投资决策，只能是「通道」的角色。"],
      ["证券投资咨询",66,"投资咨询=给客户出投资建议。规范：分析师要具备从业资格、研究报告要合规。禁止行为：不得代客户理财、不得与客户约定分享投资收益、不得承诺收益、不得为自己买卖的证券提供咨询服务（利益冲突）。","常考「投资咨询业务的禁止行为」「证券分析师的行为规范」。特别注意与客户约定分成是违法的——这是保护投资者防止利益冲突的重要规定。"],
      ["财务顾问",33,"财务顾问=为企业并购/重组提供专业建议。职责：尽职调查（摸清被收购方底细）、交易方案设计（怎么买最划算）、估值分析（多少钱买合适）。独立性要求：不能同时给收购方和目标方做顾问（利益冲突）。","常考「财务顾问的独立性要求」。理解财务顾问和保荐机构的区别——财务顾问是做并购的，保荐是做IPO的。"],
      ["证券承销与保荐",44,"保荐=推荐企业上市并承担责任。保荐机构要尽职调查（保证披露信息真实/准确/完整）、持续督导（上市后2年内持续监督）。承销方式：包销（卖不掉的券商买下来）vs代销（卖不掉的退回去）。禁止行为：不得提前泄露发行信息、不得向投资者返还费用。","必考题！保荐机构的持续督导期（主板上市后2年/创业板上市后3年？）。常考「保荐机构的尽职调查义务」「包销和代销的区别」。注意持续督导期内保荐机构要对公司的规范运作负责。"],
      ["融资融券及其他信用业务",97,"融资融券=借钱+借股票。融资（借钱买股票，客户交保证金/券商借资金/到期还本付息）、融券（借股票卖，交保证金/到期还股票）。保证金比例（客户交的保证金÷融资买入金额，50%是底线）。标的证券范围（不是所有股票都能做两融）。强制平仓（维持担保比例<130%时，券商有权强行卖出）。","五星考点！维持担保比例=总资产÷总负债（<130%要追保/<100%券商强制平仓）。常考「保证金比例的计算」「维持担保比例低于多少会被强制平仓」。强制平仓的触发条件是两融业务最重要考点。"],
      ["证券自营",30,"自营=证券公司用自己的钱投资股票/债券/衍生品。要求：要先获得证监会批准、持仓规模不能影响公司稳健运营、不能做内幕交易/操纵市场。自营和经纪要严格隔离（防止券商用客户的钱给自己的自营抬轿子）。","常考「自营和经纪业务的隔离要求」「自营的禁止行为」。理解信息隔离墙（Chinese Wall）——自营部门不能提前知道投行部的客户信息，防止内幕交易。"],
      ["资产管理业务",68,"资管=帮客户管钱投资。分类：集合资管（多个客户的钱放一起投）vs单一资管（一个客户的钱单独投）。禁止刚性兑付（不能承诺保本保收益）。去通道（不能做单纯的通道业务让别人借壳投资）。穿透监管（看最终出资人和投资标的）。","近年重点！打破刚兑（资管新规的核心）——任何形式的保本承诺都是违法的。常考「通道业务的禁止」「穿透监管的含义」「集合资管和单一资管的区别」。资管新规是监管大方向，每年必考。"],
      ["全国股份转让系统及柜台业务",31,"新三板（全国股转系统）：服务中小企业，分基础层/创新层/精选层（2021年后改为基础层+创新层，北交所承接精选层）。合格投资者门槛（基础层200万/创新层100万）。交易方式：集合竞价/做市商。柜台市场（OTC）：私募产品发行/转让。","常考「新三板各层的投资者门槛」「做市商制度的含义」。注意新三板和主板、创业板的区别——服务对象不同、交易方式不同。"],
      ["其他业务",66,"代销金融产品：可以代销基金/信托/保险等，核心是适当性管理（把合适的产品卖给合适的人）。私募基金托管：托管人对私募基金的资金安全负责。投资顾问：提供投资建议但不管钱（与资管的区别）。","常考「代销金融产品的适当性要求」「投顾和资管的区别」。投顾只建议不操作，资管是直接管钱，这个界限要清楚。"]
    ]
  },
  {
    num:4, name:"典型违法违规行为及法律责任", weight:10, star:3, color:"#4a8bc2", priority:false,
    core:"三条红线不能碰：内幕交易（利用内幕信息赚钱）、操纵市场（人为影响价格）、虚假陈述（信息披露造假）。这一章是「刑法+行政法」的结合——知道什么事违法、会罚多少钱、罚多严重。背数字是本章的主要复习方法（罚款金额/市场禁入年限）。",
    exam:"🎯 考法：约5-6题，以判断+单选为主。内幕交易和操纵市场的界定是高频考点。罚款金额（1-5倍/3-5倍等）容易出选择题。市场禁入年限（3-5年/5-10年/终身）需要专门记忆。",
    sections:[
      ["证券一级市场",82,"一级市场违法主要涉及虚假陈述（招股书造假）。欺诈发行：尚未发行证券=罚款20-200万、已发行=罚款非法募集资金的1%-5%。《证券法》第181条。虚假陈述的责任主体：发行人（无过错责任）、保荐人（过错推定，要自证无过错）。","常考「虚假陈述的民事责任主体」「保荐人的责任性质」。注意保荐人是「过错推定原则」——先推定你有错，除非你自己证明没有。"],
      ["证券二级市场",37,"内幕交易：利用内幕信息买卖证券/泄露内幕信息/建议他人买卖。处罚：没收违法所得+罚款1-5倍。操纵市场：连续交易/约定交易/洗售/利用信息操纵。处罚：没收违法所得+罚款1-5倍。老鼠仓：基金从业人员先用个人账户买入→再用基金的钱拉升→个人账户卖出获利。","绝对高频考点！内幕信息的界定（重大+未公开+与公司有关）、内幕人员（董监高/持股5%以上的股东/中介人员）。常考「以下哪个是内幕信息」「以下哪个属于操纵市场」。注意老鼠仓和内幕交易的区别。市场禁入（3-5年/5-10年/终身）的选择条件。"]
    ]
  },
  {

function starStr(n) { return '★'.repeat(n) + '☆'.repeat(5-n); }

function renderFloors(data, containerId) {
  var el = document.getElementById(containerId);
  var html = '';
  data.forEach(function(f) {
    html += '<div class="floor ' + (f.priority ? 'priority' : '') + '">';
    html += '<div class="floor-hd" onclick="toggleFloor(this)">';
    html += '<div class="floor-num" style="background:' + f.color + '">' + f.num + '</div>';
    html += '<div class="floor-name">' + f.name + '</div>';
    html += '<span class="stars">' + starStr(f.star) + '</span>';
    html += '<span class="floor-weight">' + f.weight + '%</span>';
    html += '<span class="floor-arrow">▼</span>';
    html += '</div>';
    html += '<div class="floor-bar"><div class="floor-bar-fill" style="width:' + f.weight + '%;background:' + f.color + '"></div></div>';
    html += '<div class="floor-core"><div class="floor-core-title">🎯 核心理解</div>' + f.core + '</div>';
    html += '<div class="floor-exam"><div class="floor-exam-title">📌 考法指引</div>' + f.exam + '</div>';
    html += '<div class="floor-body">';
    f.sections.forEach(function(s) {
      var hot = (f.star >= 4) ? '<span class="room-hot">🔥</span>' : '';
      html += '<div class="room">';
      html += '<div class="room-top">';
      html += '<div class="room-dot" style="background:' + f.color + '"></div>';
      html += '<span class="room-name">' + s[0] + '</span>';
      html += hot;
      html += '<span class="room-count">' + s[1] + '题</span>';
      html += '</div>';
      html += '<div class="room-idea">💡 ' + s[2] + '</div>';
      if (s[3]) html += '<div class="room-exam">' + s[3] + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function toggleFloor(el) {
  var body = el.parentElement.querySelector('.floor-body');
  var arrow = el.querySelector('.floor-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function switchTab(n) {
  document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('on', i === n); });
  document.querySelectorAll('.tab-content').forEach(function(t, i) { t.classList.toggle('on', i === n); });
}

renderFloors(FIN_DATA, 'finFloors');
renderFloors(LAW_DATA, 'lawFloors');
