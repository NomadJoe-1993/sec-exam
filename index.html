<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>证券从业 · 掌上刷题</title>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --border: #334155;
  --text: #e2e8f0; --dim: #94a3b8;
  --accent: #38bdf8; --green: #34d399; --red: #f87171; --yellow: #fbbf24;
  --purple: #a78bfa; --orange: #fb923c;
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 16px; line-height: 1.6;
  padding-top: var(--safe-t); padding-bottom: var(--safe-b);
}
/* ====== Pages ====== */
.page { display: none; height: 100%; flex-direction: column; }
.page.active { display: flex; }
/* ====== Header ====== */
.header {
  padding: 12px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header .back {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--card); border: 1px solid var(--border);
  font-size: 18px; cursor: pointer; color: var(--text); flex-shrink: 0;
}
/* ====== Content ====== */
.content { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
/* ====== Home ====== */
.cat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.1s, border-color 0.2s;
}
.cat-card:active { transform: scale(0.98); border-color: var(--accent); }
.cat-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.cat-info { flex: 1; }
.cat-info h2 { font-size: 16px; font-weight: 600; }
.cat-info p { font-size: 13px; color: var(--dim); margin-top: 2px; }
.cat-arrow { font-size: 14px; color: var(--dim); }
.stats-line {
  font-size: 12px; color: var(--dim); margin: 8px 0 4px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
/* ====== Exam List ====== */
.exam-item {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color 0.2s;
}
.exam-item:active { border-color: var(--accent); }
.exam-item h3 { font-size: 15px; font-weight: 500; }
.exam-item .meta { font-size: 12px; color: var(--dim); margin-top: 2px; }
.exam-item .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
/* ====== Exam Page ====== */
.progress-bar {
  height: 3px; background: var(--border); flex-shrink: 0;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
  transition: width 0.3s;
}
.exam-header {
  padding: 8px 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--dim);
}
.question-area {
  flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch;
}
.q-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(52,211,153,0.15); color: var(--green);
  font-size: 13px; font-weight: 700; margin-bottom: 8px;
}
.q-tag {
  display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 4px;
  font-weight: 600; margin-left: 6px;
}
.q-tag.single { background: rgba(52,211,153,0.2); color: var(--green); }
.q-tag.multi { background: rgba(248,113,113,0.2); color: var(--red); }
.q-tag.judge { background: rgba(251,191,36,0.2); color: var(--yellow); }
.q-text {
  font-size: 16px; line-height: 1.7; margin: 12px 0 16px;
}
.opt {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; margin-bottom: 8px;
  background: rgba(148,163,184,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: all 0.15s; min-height: 48px;
}
.opt:active { transform: scale(0.98); }
.opt .k {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  background: rgba(148,163,184,0.2); color: var(--dim);
}
.opt .v { flex: 1; font-size: 15px; padding-top: 2px; }
.opt.sel { border-color: var(--accent); background: rgba(56,189,248,0.08); }
.opt.sel .k { background: var(--accent); color: #fff; }
.opt.cor { border-color: var(--green); background: rgba(52,211,153,0.08); }
.opt.cor .k { background: var(--green); color: #fff; }
.opt.cor .v::after { content: " ✓"; color: var(--green); font-weight: 700; }
.opt.wro { border-color: var(--red); background: rgba(248,113,113,0.08); }
.opt.wro .k { background: var(--red); color: #fff; }
.opt.wro .v::after { content: " ✗"; color: var(--red); font-weight: 700; }
.opt.disabled { pointer-events: none; opacity: 0.9; }
/* Analysis */
.analysis-box {
  margin-top: 16px; padding: 12px 14px;
  background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 10px; display: none;
}
.analysis-box.show { display: block; }
.analysis-box .ans { color: var(--green); font-weight: 600; font-size: 14px; }
.analysis-box .exp { color: var(--dim); font-size: 14px; margin-top: 6px; line-height: 1.7; }
/* ====== Bottom Bar ====== */
.bottom-bar {
  flex-shrink: 0; padding: 8px 16px calc(8px + var(--safe-b));
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.bottom-bar .btn {
  flex: 1; height: 44px; border-radius: 10px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--green)); color: #0f172a; }
.btn-primary:disabled { opacity: 0.4; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--dim); }
.btn-danger { background: var(--red); color: #fff; }
.btn-small { height: 36px !important; font-size: 13px !important; flex: none !important; padding: 0 16px; }
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:disabled { opacity: 0.3; }
/* ====== Result Page ====== */
.result-page { text-align: center; padding: 40px 20px; }
.result-page .score-circle {
  width: 140px; height: 140px; border-radius: 50%; margin: 10px auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; font-weight: 800;
  border: 4px solid var(--green);
}
.result-page .score-detail { font-size: 15px; color: var(--dim); margin-bottom: 8px; }
.result-page .score-detail span { color: var(--text); font-weight: 600; }
/* ====== Review List ====== */
.review-q {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
}
.review-q:active { border-color: var(--accent); }
.review-q .icon { font-size: 20px; }
.review-q .info { flex: 1; }
.review-q .info .t { font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.review-q .info .m { font-size: 12px; color: var(--dim); margin-top: 2px; }
/* ====== Utility ====== */
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-dim { color: var(--dim); }
.text-sm { font-size: 13px; }
</style>
</head>
<body>

<!-- ====== Page: Home ====== -->
<div class="page active" id="page-home">
  <div class="header">
    <h1>📚 证券从业 · 刷题</h1>
    <div style="font-size:12px;color:var(--dim);text-align:right;">
      <div id="home-stats">练到70，考到60</div>
    </div>
  </div>
  <div class="content" id="home-content"></div>
</div>

<!-- ====== Page: Exam List ====== -->
<div class="page" id="page-list">
  <div class="header">
    <div class="back" onclick="goHome()">‹</div>
    <h1 id="list-title">章节高频考点</h1>
  </div>
  <div class="content" id="list-content"></div>
</div>

<!-- ====== Page: Exam ====== -->
<div class="page" id="page-exam">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="exam-header">
    <span id="exam-counter">1 / 60</span>
    <span id="exam-score" style="display:none;"></span>
    <button class="btn-small btn-outline" onclick="submitExam()" id="submit-btn">📝 交卷</button>
  </div>
  <div class="question-area" id="question-area">
    <div class="q-number" id="q-num">1</div>
    <span class="q-tag" id="q-tag">单选</span>
    <div class="q-text" id="q-text"></div>
    <div id="q-options"></div>
    <div class="analysis-box" id="analysis-box">
      <div class="ans" id="analysis-ans"></div>
      <div class="exp" id="analysis-exp"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn" onclick="navQ(-1)">‹</button>
      <button class="nav-btn" id="next-btn" onclick="navQ(1)">›</button>
    </div>
    <button class="btn btn-outline btn-small" onclick="showQuestionList()" id="qlist-btn" style="flex:0;padding:0 12px;">📋</button>
    <button class="btn btn-primary" onclick="submitExam()" id="submit-btn2">📝 交卷批改</button>
  </div>
</div>

<!-- ====== Page: Question List (grid) ====== -->
<div class="page" id="page-qlist">
  <div class="header">
    <div class="back" onclick="closeQuestionList()">‹</div>
    <h1>题目列表</h1>
    <div></div>
  </div>
  <div class="content" id="qlist-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px;"></div>
</div>

<!-- ====== Page: Result ====== -->
<div class="page" id="page-result">
  <div class="header">
    <h1>📊 考试结果</h1>
    <button class="btn-small btn-outline" onclick="goHome()">🏠 首页</button>
  </div>
  <div class="content result-page" id="result-content"></div>
</div>

<script>
// ====== State ======
let MANIFEST = null;
let currentExam = null;   // loaded exam data
let currentIdx = 0;       // current question index
let userAnswers = {};     // qId -> selected keys
let submitted = false;
let isMulti = false;      // current question is multi-select
let history = JSON.parse(localStorage.getItem('secExamHistory') || '{}');

// ====== Init ======
async function init() {
  try {
    const res = await fetch('manifest.json');
    MANIFEST = await res.json();
    renderHome();
  } catch(e) {
    document.getElementById('home-content').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--red);">加载失败：' + e.message + '<br>请确认文件已部署到服务器</div>';
  }
}
init();

// ====== Home ======
function renderHome() {
  const el = document.getElementById('home-content');
  let html = '<div class="stats-line">📊 共 ' + countAll() + ' 题 · 29套试卷</div>';
  MANIFEST.categories.forEach(cat => {
    html += '<div class="cat-card" onclick="openCategory(\'' + cat.id + '\')">' +
      '<div class="cat-icon" style="background:' + cat.color + '20;color:' + cat.color + '">' +
        ({'chapter':'📖','paper':'📝','mock':'🎯'})[cat.id] + '</div>' +
      '<div class="cat-info"><h2>' + cat.title + '</h2><p>' + cat.desc + '</p></div>' +
      '<span class="cat-arrow">›</span></div>';
  });
  el.innerHTML = html;
}

function countAll() {
  let total = 0;
  MANIFEST.categories.forEach(c => c.items.forEach(i => total += i.count));
  return total;
}

// ====== Category → Exam List ======
function openCategory(catId) {
  const cat = MANIFEST.categories.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('list-title').textContent = cat.title;
  const el = document.getElementById('list-content');
  let html = '<div class="stats-line">共 ' + cat.items.length + ' 套 · ' +
    cat.items.reduce((s,i) => s+i.count, 0) + ' 题</div>';
  cat.items.forEach(item => {
    const h = history[item.id];
    const best = h ? h.best : null;
    const done = h ? (h.lastScore !== undefined) : false;
    html += '<div class="exam-item" onclick="startExam(\'' + item.id + '\')">' +
      '<div><h3>' + item.title + '</h3>' +
      '<div class="meta">' + item.count + '题' +
        (done ? ' · 上次得分 ' + h.lastScore + '%' : '') + '</div></div>' +
      '<div class="status">' +
        (best !== null ? (best >= 70 ? '✅' : '⚠️') : '➡️') +
      '</div></div>';
  });
  el.innerHTML = html;
  showPage('page-list');
}

// ====== Start Exam ======
async function startExam(examId) {
  try {
    const res = await fetch(examId + '.json');
    currentExam = await res.json();
    currentIdx = 0;
    userAnswers = {};
    submitted = false;
    // 读取历史答案
    const h = history[examId];
    if (h && h.answers) {
      userAnswers = {...h.answers};
      if (h.submitted) submitted = true;
    }
    document.getElementById('submit-btn').style.display = submitted ? 'none' : '';
    document.getElementById('submit-btn2').style.display = submitted ? 'none' : '';
    showPage('page-exam');
    renderQuestion();
  } catch(e) {
    alert('加载题目失败: ' + e.message);
  }
}

// ====== Render Question ======
function renderQuestion() {
  const q = currentExam.questions[currentIdx];
  if (!q) return;
  
  isMulti = q.type === 'multi';
  
  document.getElementById('q-num').textContent = q.id;
  
  const tag = document.getElementById('q-tag');
  const tagMap = { single: '单选', multi: '多选', judge: '判断' };
  tag.textContent = tagMap[q.type] || q.type;
  tag.className = 'q-tag ' + q.type;
  
  document.getElementById('q-text').textContent = q.q;
  
  // 更新计数器
  const total = currentExam.questions.length;
  document.getElementById('exam-counter').textContent = q.id + ' / ' + total;
  document.getElementById('progress-fill').style.width = ((q.id - 1) / total * 100) + '%';
  
  // 渲染选项
  const optEl = document.getElementById('q-options');
  optEl.innerHTML = '';
  const keys = Object.keys(q.c);
  const userSel = userAnswers[q.id] || '';
  
  keys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.key = k;
    if (submitted) div.classList.add('disabled');
    
    // 检查用户是否选了此项
    if (userSel.includes(k)) div.classList.add('sel');
    
    // 如果已提交，标记正确/错误
    if (submitted) {
      const ans = q.a;
      if (ans.includes(k)) div.classList.add('cor');
      else if (userSel.includes(k)) div.classList.add('wro');
    }
    
    div.innerHTML = '<span class="k">' + k + '</span><span class="v">' + q.c[k] + '</span>';
    div.addEventListener('click', () => selectOpt(k));
    optEl.appendChild(div);
  });
  
  // 显示解析（如果已提交）
  const ab = document.getElementById('analysis-box');
  if (submitted) {
    document.getElementById('analysis-ans').textContent = '✅ 正确答案：' + q.a.split('').join('、');
    document.getElementById('analysis-exp').textContent = q.an || '暂无解析';
    ab.classList.add('show');
  } else {
    ab.classList.remove('show');
  }
  
  // 导航按钮
  document.getElementById('prev-btn').disabled = currentIdx === 0;
  document.getElementById('next-btn').disabled = currentIdx === total - 1;
  
  // 提交按钮
  const sBtn = document.getElementById('submit-btn');
  const sBtn2 = document.getElementById('submit-btn2');
  if (submitted) {
    sBtn.style.display = 'none';
    sBtn2.style.display = 'none';
  } else {
    sBtn.style.display = '';
    sBtn2.style.display = '';
  }
  
  // 更新得分显示
  updateScoreDisplay();
}

// ====== Select Option ======
function selectOpt(key) {
  if (submitted) return;
  const q = currentExam.questions[currentIdx];
  
  if (isMulti) {
    // 多选：toggle
    const sel = userAnswers[q.id] || '';
    const newSel = sel.includes(key) ? sel.replace(key, '') : (sel + key);
    userAnswers[q.id] = newSel.split('').sort().join('');
  } else {
    // 单选/判断：互斥
    userAnswers[q.id] = key;
  }
  
  // 实时保存
  saveProgress();
  renderQuestion();
}

// ====== Save Progress ======
function saveProgress() {
  if (!currentExam) return;
  history[currentExam.id] = {
    answers: userAnswers,
    submitted: submitted,
    lastScore: history[currentExam.id]?.lastScore,
    best: history[currentExam.id]?.best
  };
  localStorage.setItem('secExamHistory', JSON.stringify(history));
}

// ====== Navigation ======
function navQ(delta) {
  const total = currentExam.questions.length;
  const newIdx = currentIdx + delta;
  if (newIdx < 0 || newIdx >= total) return;
  currentIdx = newIdx;
  renderQuestion();
}

// ====== Submit ======
function submitExam() {
  if (submitted) return;
  const answered = Object.keys(userAnswers).length;
  if (answered < currentExam.questions.length) {
    if (!confirm('还有 ' + (currentExam.questions.length - answered) + ' 题未答，确定交卷吗？')) return;
  }
  
  submitted = true;
  let correct = 0;
  const total = currentExam.questions.length;
  
  currentExam.questions.forEach(q => {
    const ua = userAnswers[q.id] || '';
    const ca = q.a;
    if (ua.split('').sort().join('') === ca.split('').sort().join('')) correct++;
  });
  
  const pct = Math.round(correct / total * 100);
  
  // 保存历史
  const h = history[currentExam.id] || { answers: {}, submitted: false };
  h.answers = userAnswers;
  h.submitted = true;
  h.lastScore = pct;
  h.best = Math.max(pct, h.best || 0);
  history[currentExam.id] = h;
  localStorage.setItem('secExamHistory', JSON.stringify(history));
  
  renderQuestion();
  showResult(correct, total, pct);
}

// ====== Show Result ======
function showResult(correct, total, pct) {
  const el = document.getElementById('result-content');
  const color = pct >= 70 ? 'var(--green)' : (pct >= 60 ? 'var(--yellow)' : 'var(--red)');
  const msg = pct >= 70 ? '✅ 稳了！考场正常发挥就能过' :
              pct >= 60 ? '⚠️ 差一点，趁热打铁再来一遍' :
              '❌ 知识点还有漏洞，重做一轮';
  
  el.innerHTML = 
    '<h2 style="font-size:20px;">' + currentExam.title + '</h2>' +
    '<div class="score-circle" style="border-color:' + color + ';color:' + color + '">' +
      pct + '%</div>' +
    '<div class="score-detail">正确 <span class="text-green">' + correct + '</span> 题 · 错误 <span class="text-red">' + (total-correct) + '</span> 题</div>' +
    '<div class="score-detail">共 ' + total + ' 题</div>' +
    '<div style="font-size:14px;color:var(--dim);margin:8px 0;">' + msg + '</div>' +
    '<div style="margin-top:20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
      '<button class="btn btn-primary" onclick="reviewExam()" style="padding:0 24px;height:44px;">📖 查看错题</button>' +
      '<button class="btn btn-outline" onclick="resetExam()" style="padding:0 24px;height:44px;">🔄 重做</button>' +
      '<button class="btn btn-outline" onclick="goHome()" style="padding:0 24px;height:44px;">🏠 返回</button>' +
    '</div>';
  
  showPage('page-result');
}

// ====== Review ======
function reviewExam() {
  showPage('page-exam');
  // 找到第一个错题
  for (let i = 0; i < currentExam.questions.length; i++) {
    const q = currentExam.questions[i];
    const ua = userAnswers[q.id] || '';
    const ca = q.a;
    if (ua.split('').sort().join('') !== ca.split('').sort().join('')) {
      currentIdx = i;
      break;
    }
  }
  renderQuestion();
}

// ====== Reset ======
function resetExam() {
  submitted = false;
  userAnswers = {};
  currentIdx = 0;
  
  const h = history[currentExam.id];
  if (h) {
    h.answers = {};
    h.submitted = false;
    localStorage.setItem('secExamHistory', JSON.stringify(history));
  }
  
  document.getElementById('submit-btn').style.display = '';
  document.getElementById('submit-btn2').style.display = '';
  showPage('page-exam');
  renderQuestion();
}

// ====== Score Display ======
function updateScoreDisplay() {
  const el = document.getElementById('exam-score');
  if (!submitted || !currentExam) { el.style.display = 'none'; return; }
  
  let correct = 0;
  currentExam.questions.forEach(q => {
    const ua = userAnswers[q.id] || '';
    if (ua.split('').sort().join('') === q.a.split('').sort().join('')) correct++;
  });
  el.style.display = '';
  el.textContent = '✅ ' + correct + '/' + currentExam.questions.length;
}

// ====== Question List Grid ======
function showQuestionList() {
  if (!currentExam) return;
  const grid = document.getElementById('qlist-grid');
  grid.innerHTML = '';
  currentExam.questions.forEach((q, i) => {
    const div = document.createElement('div');
    const ua = userAnswers[q.id] || '';
    const isAnswered = ua.length > 0;
    let bg = 'var(--card)';
    let color = 'var(--dim)';
    if (submitted) {
      const correct = ua.split('').sort().join('') === q.a.split('').sort().join('');
      bg = correct ? 'rgba(52,211,153,0.15)' : 'rgba(248,113,113,0.15)';
      color = correct ? 'var(--green)' : 'var(--red)';
    } else if (isAnswered) {
      bg = 'rgba(56,189,248,0.1)';
      color = 'var(--accent)';
    }
    div.style.cssText = 'background:' + bg + ';border:1px solid var(--border);border-radius:8px;' +
      'text-align:center;padding:8px 4px;cursor:pointer;font-size:13px;color:' + color + ';font-weight:600;';
    div.textContent = q.id;
    div.onclick = () => { currentIdx = i; closeQuestionList(); renderQuestion(); };
    grid.appendChild(div);
  });
  showPage('page-qlist');
}

function closeQuestionList() {
  showPage('page-exam');
}

// ====== Page Routing ======
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showPage('page-home');
  renderHome();
}
</script>
</body>
</html>
