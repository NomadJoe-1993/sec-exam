, "an": "在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款；属于国家工作人员的，还应当依法给予行政处分。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_24", "q": "王某在2020年3月因证券违法行为受到过行政处罚，2022年9月其参与内幕交易获利30万元，其行为应予立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "内幕交易获利或者避免损失数额在25万元以上，或者证券交易成交额在100万元以上，或者期货交易占用保证金数额在50万元以上，【同时】涉嫌下列情形之一的，应予立案追诉：（1）证券法规定的证券交易内幕信息的知情人实施或者与他人共同实施内幕交易行为的；（2）以出售或者变相出售内幕信息等方式，明示、暗示他人从事与该内幕信息相关的交易活动的；（3）因证券、期货犯罪行为受过刑事追究的；（4）2年内因证券、期货违法行为受过行政处罚的；（5）造成其他严重后果的。该题目，获利金额够，但受到行政处罚的时间超过两年，故按照规定，不予立案追诉。", "type": "judge"}, {"id": "cflue_paper_法律法规_4.json_30", "q": "操纵证券、期货市场，持有证券的流通股份数达到该证券实际流通股份总量30%以上，且在该证券连续20个交易日内连续买卖股份数累计达到该证券同期总成交量30%以上的，应予立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "持有或者实际控制证券的流通股份数量达到该证券的实际流通股份总量10%以上，实施刑法第一百八十二条第一款第一项操纵证券市场行为，连续10个交易日的累计成交量达到同期该证券总成交量20%以上的应予立案追诉。", "type": "judge"}, {"id": "cflue_paper_法律法规_4.json_47", "q": "根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。", "c": {"A": "根据客户的真实意思表示，维护客户利益", "B": "为牟取佣金收入，诱使客户进行不必要的证券买卖", "C": "根据客户的委托为其买卖证券", "D": "在规定的时间内向客户提供交易的确认文件"}, "a": "B", "an": "A选项违反了相关从业规定", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_6", "q": "证券发行上市保荐业务中，保荐人出具有重大遗漏的保荐书，处罚措施中包括责令改正，给予警告，没收业务收入，并处入1倍以上10倍以下罚款。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款；没有业务收入或者业务收入不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销保荐业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。", "type": "judge"}, {"id": "cflue_paper_法律法规_5.json_7", "q": "期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。", "type": "judge"}, {"id": "cflue_paper_法律法规_5.json_15", "q": "构成背信运用受托财产罪的立案标准的是（）。", "c": {"A": "擅自运用客户资金或者其他委托、信托的财产数额在10万元以上的", "B": "擅自运用多个客户资金或者其他委托、信托的财产的", "C": "接受客户委托运用信托财产的", "D": "擅自运用客户资金或者其他委托、信托的财产数额在20万元以上的"}, "a": "B", "an": "背信运用受托财产罪的刑事立案追诉标准：（1）擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；（2）虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用【多个】客户资金或者其他委托、信托的财产的；（3）其他情节严重的情形。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_37", "q": "根据《证券法》，下列关于上市公司收购相关法律责任的说法，错误的有（）。", "c": {"A": "收购人利用上市公司收购，损害被收购公司股东的合法权益，无需承担赔偿责任", "B": "收购人控股股东未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款", "C": "收购人的控股股东利用上市公司收购，损害被收购公司及其股东的合法权益，应当由被收购公司承担赔偿责任", "D": "收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款"}, "a": "ABC", "an": "收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。D错误；收购人及其控股股东、实际控制人利用上市公司收购，给被收购公司及其股东造成损失的，应当依法承担赔偿责任。A、B错误。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_44", "q": "2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，将负责管理该公司“A基金”账户的投资决策信息告诉其夫蒋某，并与蒋某共同出资10万元，利用其大学同学陈某账户先于“A基金”买入股票并获利1万余元。关于李某的行为，以下说法正确有（）。", "c": {"A": "不构成犯罪，但是应当承担行政责任", "B": "构成利用未公开信息交易罪", "C": "构成泄露内幕信息罪", "D": "构成内幕交易罪"}, "a": "B", "an": "利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。", "type": "single"}, {"id": "cflue_mock_1.json_4", "q": "关于在证券交易活动中可能作出虚假陈述或者信息误导的主体，下列说法正确的有（）。", "c": {"A": "证券公司及其从业人员", "B": "证券登记结算机构及其从业人员", "C": "证券业协会、证券监督管理机构及其从业人员", "D": "证券交易所及其从业人员"}, "a": "ABCD", "an": "在证券交易活动中作出虚假陈述或者信息误导，是指证券交易所、证券公司、证券登记结算机构、证券服务机构及其从业人员，证券业协会、证券监督管理机构及其工作人员，在证券交易活动中作出虚假陈述或者信息误导。", "type": "multi"}, {"id": "cflue_mock_1.json_58", "q": "根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。", "c": {"A": "根据客户的真实意思表示，维护客户利益", "B": "为牟取佣金收入，诱使客户进行不必要的证券买卖", "C": "根据客户的委托为其买卖证券", "D": "在规定的时间内向客户提供交易的确认文件"}, "a": "B", "an": "A选项违反了相关从业规定", "type": "single"}, {"id": "cflue_mock_1.json_66", "q": "期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。", "type": "judge"}, {"id": "cflue_mock_1.json_110", "q": "构成背信运用受托财产罪的立案标准的是（）。", "c": {"A": "擅自运用客户资金或者其他委托、信托的财产数额在10万元以上的", "B": "擅自运用多个客户资金或者其他委托、信托的财产的", "C": "接受客户委托运用信托财产的", "D": "擅自运用客户资金或者其他委托、信托的财产数额在20万元以上的"}, "a": "B", "an": "背信运用受托财产罪的刑事立案追诉标准：（1）擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；（2）虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用【多个】客户资金或者其他委托、信托的财产的；（3）其他情节严重的情形。", "type": "single"}, {"id": "cflue_mock_1.json_114", "q": "根据《刑法》，（）是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益的行为。", "c": {"A": "欺诈发行股票、债券罪", "B": "诱骗他人买卖证券罪", "C": "非法发行股票和公司、企业债券罪", "D": "违规披露、不披露重要信息罪"}, "a": "D", "an": "【违规披露、不披露重要信息罪】是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益，或有其他严重情节的行为。", "type": "single"}, {"id": "cflue_mock_2.json_18", "q": "下列属于诱骗投资者买卖证券、期货合约罪主体范围的是（）。", "c": {"A": "证券交易所从业人员", "B": "银行从业人员", "C": "证券公司从业人员", "D": "期货经纪公司"}, "a": "ACD", "an": "诱骗投资者买卖证券、期货合约罪，是指证券交易所、期货交易所、证券公司、期货经纪公司的从业人员，证券业协会、期货业协会或者证券期货监管管理部门的工作人员，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为。", "type": "multi"}, {"id": "cflue_mock_2.json_34", "q": "某公司在招股说明书中隐瞒重要事实，发行股票非法募集资金金额500万元的，应予刑事立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，非法募集资金金额在【1000万元】以上的，应予立案追诉。", "type": "judge"}, {"id": "cflue_mock_2.json_90", "q": "下列关于利用未公开信息交易罪立案追诉标准的说法，正确的是（）。", "c": {"A": "获利或者避免损失数额在100万元以上的", "B": "2年内3次以上利用未公开信息交易的", "C": "证券交易成交额累计在30万元以上的", "D": "期货交易占用保证金数额累计在20万元以上的"}, "a": "AB", "an": "利用未公开信息交易行为，涉嫌下列情形之一的，应予立案追诉：（1）获利或者避免损失数额在100万元以上的；（2）2年内3次以上利用未公开信息交易的；（3）明示、暗示3人以上从事相关交易活动的；（4）具有其他严重情节的。利用未公开信息交易，获利或者避免损失数额在50万元以上，或者证券交易成交额在500万元以上，或者期货交易占用保证金数额在100万元以上，同时涉嫌下列情形之一的，应予立案追诉：（1）以出售或者变相出售未公开信息等方式，明示、暗示他人从事相关交易活动的；（2）因证券、期货犯罪行为受过刑事追究的；（3）两年内因证券、期货违法行为受过行政处罚的；（4）造成其他严重后果的。", "type": "multi"}, {"id": "cflue_mock_2.json_112", "q": "根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。", "c": {"A": "根据客户的真实意思表示，维护客户利益", "B": "为牟取佣金收入，诱使客户进行不必要的证券买卖", "C": "根据客户的委托为其买卖证券", "D": "在规定的时间内向客户提供交易的确认文件"}, "a": "B", "an": "A选项违反了相关从业规定", "type": "single"}, {"id": "cflue_mock_2.json_116", "q": "下列关于违反证券发行规定的法律责任的说法，正确的有（）。", "c": {"A": "发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，可以不追究责任", "B": "未经依法注册，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，并处罚款", "C": "证券公司承销或者销售擅自公开发行的证券的，责令停止承销或者销售，没收违法所得，并处罚款", "D": "发行人的控股股东、实际控制人组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，依规只对发行人进行处罚"}, "a": "BC", "an": "发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，【处以200万元以上2000万元以下的罚款】，B选项错误。控股股东、实际控制人组织、指使实施前款行为的，处5年以下有期徒刑或者拘役，并处或者单处非法募集资金金额20%以上1倍以下罚金；数额特别巨大、后果特别严重或者有其他特别严重情节的，处5年以上有期徒刑，并处非法募集资金金额20%以上1倍以下罚金，C选项错误。", "type": "multi"}, {"id": "xs_4782737", "q": "根据《证券法》的规定，下列关于发行人、上市公司擅自改变公开发行证券所募集资金的用途的，可采取的措施有（）。Ⅰ.责令改正Ⅱ.对直接负责的主管人员和其他直接负责人员给予警告并处以三万以上五万元以下的罚款Ⅲ.发行人、上市公司的控股股东、实际控制人指使从事该违法行为，给予警告，并处以五十万元以上五百万元以下的罚款Ⅳ.中国证监会将视情节轻重，对相关机构和责任人员采取监管谈话、责令改正等监管措施", "c": {"A": "Ⅰ、Ⅲ", "B": "Ⅲ、Ⅳ", "C": "Ⅰ、Ⅳ", "D": "Ⅰ、Ⅱ"}, "a": "A", "an": "收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。", "type": "single"}, {"id": "xs_4782738", "q": "欺诈发行股票、债券罪应予立案追诉的标准包括（）。Ⅰ.发行数额在500万元以上Ⅱ.伪造、变造国家机关公文、有效证明文件或者相关凭证、单据Ⅲ.利用募集的资金进行违法活动Ⅳ.转移或者隐瞒所募集资金", "c": {"A": "Ⅱ、Ⅲ、Ⅳ", "B": "Ⅰ、Ⅱ、Ⅳ", "C": "Ⅰ、Ⅲ", "D": "Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, "a": "D", "an": "", "type": "single"}, {"id": "xs_4782739", "q": "在证券发行行为中，符合三公原则的做法有（）。Ⅰ.非公开发行证券，不得采用广告、公开劝诱和变相公开方式Ⅱ.发行人将公司发行信息提前告知给现有股东Ⅲ.向不超过200人的不特定对象发行证券，必须经过证监会注册Ⅳ.公开发行证券，报经国务院证券监督管理机构或者国务院授权的部门核准，可以视情况突破法律、行政法规规定的条件", "c": {"A": "Ⅰ、Ⅳ", "B": "Ⅱ、Ⅳ", "C": "Ⅰ、Ⅲ", "D": "Ⅱ、Ⅲ"}, "a": "A", "an": "", "type": "single"}, {"id": "xs_4782740", "q": "根据《证券法》，下列关于擅自改变公开发行证券募集资金用途的后果说法正确的是（）。Ⅰ.未作纠正或未经股东大会认可的，不得公开发行新股Ⅱ.对直接责任人员处以警告并处以十万元以上一百万元以下的罚款Ⅲ.对指使该行为的控股股东处以警告并处以五十万元以上五百万元以下的罚款Ⅳ.对负责证券承销的证券公司处以警告，责令整改", "c": {"A": "Ⅰ、Ⅲ、Ⅳ", "B": "Ⅰ、Ⅱ、Ⅳ", "C": "Ⅰ、Ⅱ、Ⅲ", "D": "Ⅱ、Ⅲ、Ⅳ"}, "a": "C", "an": "", "type": "single"}, {"id": "comp_57159", "q": "根据《证券法》，对该上市公司信息披露违法行为的处罚措施包括（）。", "c": {"A": "对发行人处以100万元以上1000万元以下的罚款", "B": "对直接负责的主管人员处以50万元以上500万元以下的罚款", "C": "责令改正，给予警告", "D": "情节严重的，可以对有关责任人员采取证券市场禁入措施"}, "a": "ABCD", "an": "四个选项均正确。新证券法大幅提高了信息披露违法行为的罚款上限。同时，信息披露义务人未按照规定披露信息，或者披露的信息存在虚假记载、误导性陈述或者重大遗漏的，还应依法承担民事赔偿责任。", "type": "comprehensive", "material": "2023年，中国证监会对某上市公司及其高管涉嫌信息披露违法违规行为立案调查。经查，该公司未按规定披露关联交易，虚增营业收入和利润。该行为严重损害了投资者的合法权益。", "sub_type": "multi"}, {"id": "comp_10118", "q": "关于内幕交易，下列说法正确的有（）。", "c": {"A": "内幕信息是指证券交易活动中涉及公司的经营、财务或对其证券价格有重大影响的尚未公开信息", "B": "内幕信息知情人员包括公司董事、监事和高级管理人员", "C": "内幕交易行为给投资者造成损失的应当承担赔偿责任", "D": "内幕交易只要没有获利就不构成违法"}, "a": "ABC", "an": "选项D错误。内幕交易行为不以是否获利为构成要件，只要行为人利用内幕信息进行证券交易就构成违法。内幕交易可能面临行政处罚（罚没违法所得并罚款）和刑事追诉。", "type": "comprehensive", "material": "2023年，中国证监会对某上市公司及其高管涉嫌信息披露违法违规行为立案调查。经查，该公司未按规定披露关联交易，虚增营业收入和利润。该行为严重损害了投资者的合法权益。", "sub_type": "multi"}, {"id": "cflue_zc_fl5.json_1", "q": "下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，不正确的是（）。", "c": {"A": "在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行", "B": "已成为证券业协会会员的证券公司境内子公司应当执行", "C": "证券投资咨询公司可自行决定是否执行", "D": "证券资信评级公司在从事证券相关业务时应参照执行"}, "a": "C", "an": "证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。", "type": "single"}, {"id": "cflue_zc_fl5.json_2", "q": "证券评级机构从事证券评级业务，应当制定科学的评级方法和完善的质量控制制度。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_fl5.json_3", "q": "被采取市场禁入措施的人员，应当遵循的规定包括（）。", "c": {"A": "由所在机构按规定程序解除其被禁止担任的职务", "B": "不得在任何公司担任董事、监事、高级管理人员职务", "C": "立即停止从事证券业务", "D": "立即停止履行上市公司董事、监事、高级管理人员职务"}, "a": "ACD", "an": "被采取证券市场禁入措施的人员：1、在禁入期间内，除不得继续在原机构从事证券业务或者担任原上市公司董事、监事、高级管理人员职务外，也不得在其他任何机构中从事证券业务或者担任其他上市公司董事、监事、高级管理人员职务。2、应当在收到中国证监会作出的证券市场禁入决定后，立即停止从事证券业务或者停止履行上市公司董事、监事、高级管理人员职务，并由其所在机构按规定的程序解除其被禁止担任的职务。", "type": "multi"}, {"id": "cflue_zc_fl5.json_4", "q": "机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员可按照所在机构内部程序向高级管理人员、中国证监会报告。", "c": {"A": "错", "B": "对"}, "a": "A", "an": "机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员应及时按照所在机构内部程序向高级管理人员或者董事会报告。机构未妥善处理的，从业人员应及时向中国证监会或者中国证券业协会报告。", "type": "judge"}, {"id": "cflue_zc_fl5.json_5", "q": "（3）保荐代表人违反《证券发行上市保荐业务管理办法》，中国证监会可以采取的监管措施包括（）。", "c": {"A": "重点关注", "B": "公开谴责", "C": "监管谈话", "D": "责令进行业务学习"}, "a": "ACD", "an": "保荐机构、保荐代表人、保荐业务负责人和内核负责人违反本办法，未诚实守信、勤勉尽责地履行相关义务的，中国证监会【责令改正，并对其采取监管谈话、重点关注、责令进行业务学习、出具警示函、责令公开说明、认定为不适当人选】等监管措施；依法应给予行政处罚的，依照有关规定进行处罚；情节严重涉嫌犯罪的，依法移送司法机关，追究其刑事责任。", "type": "multi"}, {"id": "cflue_zc_fl5.json_6", "q": "有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。", "c": {"A": "情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构，保荐代表人具体负责的推荐", "B": "中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施", "C": "情节严重的，中国证监会可以在6个月到24个月内不受理保荐机构，保荐代表人具体负责的推荐", "D": "中国证监会会视情节轻重，采取监管或者市场禁入措施"}, "a": "AB", "an": "保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施；情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构、保荐代表人具体负责的推荐：1、制作或者出具的文件不齐备或者不符合要求；2、擅自改动申请文件、信息披露资料或者其他已提交文件；3、申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异；4、文件披露的内容表述不清，逻辑混乱，严重影响投资者理解；5、未及时报告或者未及时披露重大事项；6、指定不符合《办法》第四条规定要求的人员具体负责保荐工作；7、未通过内核程序，以公司名义对外提交或披露保荐业务项目文件；8、采取业务包干等承包方式或其他形式进行过度激励；9、以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。", "type": "multi"}, {"id": "cflue_zc_fl5.json_7", "q": "根据《证券业从业人员资格管理办法》，从事证券业务的专业人员不包括（）。", "c": {"A": "证券资信评估机构中从事证券资信评估业务的专业人员", "B": "信托机构业务部门的管理人员", "C": "证券公司从事证券经纪业务部门的管理人员", "D": "证券投资咨询机构从事证券投资咨询业务的专业人员"}, "a": "B", "an": "根据《证券业从业人员资格管理办法》，从事证券业务的专业人员是指：1.证券公司中从事自营、经纪、承销、投资咨询、受托投资管理等业务的专业人员，包括相关业务部门的管理人员；2.基金管理公司、基金托管机构中从事基金销售、研究分析、投资管理、交易、监察稽核等业务的专业人员，包括相关业务部门的管理人员；基金销售机构中从事基金宣传、推销、咨询等业务的专业人员，包括相关业务部门的管理人员；3.证券投资咨询机构中从事证券投资咨询业务的专业人员及其管理人员；4.证券资信评估机构中从事证券资信评估业务的专业人员及其管理人员；5.中国证监会规定需要取得从业资格和执业证书的其他人员。", "type": "single"}, {"id": "cflue_zc_fl5.json_8", "q": "下列关于证券公司对从事证券经纪业务相关人员的管理要求的说法，错误的是（）。", "c": {"A": "客户证券账户转托管和撤销指定交易等业务可由同一人完成操作与复核", "B": "涉及客户资金账户及证券账户的开立、信息修改、注销等业务应当一人操作、一人复核，复核应当留痕", "C": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制", "D": "涉及客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事前审批，事后复核，审批及复核均应留痕"}, "a": "A", "an": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批，事后复核，审批及复核均应留痕。", "type": "single"}, {"id": "cflue_zc_fl5.json_9", "q": "证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在（）个工作日内，向中国证券业协会有关派出机构报告。", "c": {"A": "7", "B": "10", "C": "12", "D": "5"}, "a": "D", "an": "证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在【5】个工作日内，向中国证券业协会有关派出机构报告。", "type": "single"}, {"id": "cflue_zc_fl5.json_10", "q": "除财务顾问的法定代表人或者其授权代表人之外，应当在财务顾问专业意见上签名的还有（），并加盖财务顾问单位公章。", "c": {"A": "项目协办人", "B": "财务顾问主办人", "C": "部门负责人", "D": "内部核查机构负责人"}, "a": "ABCD", "an": "财务顾问的法定代表人或者其授权代表人、部门负责人、内部核查机构负责人、财务顾问主办人和项目协办人应当在财务顾问专业意见上签名，并加盖财务顾问单位公章。", "type": "multi"}, {"id": "cflue_zc_fl5.json_11", "q": "下列属于证券行业文化建设的基本要求的有（）。", "c": {"A": "坚持稳健经营，促进健康发展", "B": "坚持廉洁自律，弘扬清风正气", "C": "牢记社会责任，展现良好形象", "D": "坚持创新精神，提升服务能力"}, "a": "ABC", "an": "行业文化建设的基本要求：1、坚持依法合规，筑牢发展基础；2、坚持诚实守信，恪守职业操守；3、坚持专业精神，提升服务能力；4、坚持稳健经营，促进健康发展；5、坚持廉洁自律，弘扬清风正气；6、牢记社会责任，展现良好形象。", "type": "multi"}, {"id": "cflue_zc_fl5.json_12", "q": "财务顾问应当建立健全内部报告制度，并对证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由（）签名，并加盖财务顾问单位签章。", "c": {"A": "财务顾问主办人", "B": "部门负责人", "C": "项目协办人", "D": "财务顾问的法定代表人或者其授权代表人"}, "a": "ACD", "an": "财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核査机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人签名，并加盖财务顾问单位公章。", "type": "multi"}, {"id": "cflue_zc_fl5.json_13", "q": "根据《关于证券业从业人员登记管理有关事项的通知》，下列关于证券业从业人员的登记程序的说法，错误的是（）。", "c": {"A": "从业人员所从事的业务类别或其他重要登记信息发生变化的，所在机构应当自发生变化之日起7个工作日内办理变更登记", "B": "从业人员所在机构应当自从业人员入职（不含试用期）之日起7个工作日内，通过中国证券业协会从业人员管理平台办理登记", "C": "从业人员离职的，所在机构应当自劳动关系（或委托代理关系）解除之日起7个工作日内办理注销登记", "D": "从业人员登记信息不完备或不符合规定要求的，中国证券业协会通知从业人员所在机构及时补正"}, "a": "B", "an": "从业人员应当通过所在机构进行登记，机构应当自从业人员入职（含试用期）之日起7个工作日内，通过协会从业人员管理平台，将经本机构审核过的从业人员登记信息提交至协会进行登记。", "type": "single"}, {"id": "cflue_zc_fl5.json_14", "q": "下列关于证券投资咨询业务的说法，错误的是（）。", "c": {"A": "证券投资顾问业务按照约定，可以辅助客户作出投资决策，并直接获取经济利益", "B": "证券投资咨询业务中可以与投资人约定分享投资收益、分担投资损失", "C": "证券投资咨询可以接受投资人委托，提供有偿证券投资咨询服务", "D": "证券投资咨询业务包括证券投资顾问业务及发布证券研究报告"}, "a": "B", "an": "不得向投资人承诺证券投资收益；与投资人约定分享投资收益或者分担投资损失。", "type": "single"}, {"id": "cflue_zc_fl5.json_15", "q": "根据《证券期货经营机构及其工作人员廉洁从业规定》，下列关于廉洁从业的说法，错误的是（）。", "c": {"A": "廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，严格遵守法律法规、中国证监会的规定和行业自律规则", "B": "廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，遵守社会公德、商业道德、职业道德和行为规范", "C": "证券期货经营机构承担廉洁从业风险防控主体责任，证券期货经营机构股东（大）会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任", "D": "证券期货经营机构主要负责人是落实廉洁从业管理职责的第一责任人，各级负责人在职责范围内承担相应管理责任"}, "a": "C", "an": "董事会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任。", "type": "single"}, {"id": "cflue_zc_fl5.json_16", "q": "证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有下列（）情形的，中国证监会应当从重处理。", "c": {"A": "连续或者多次违反该规定", "B": "直接、间接或唆使、协助他人向监管人员输送利益", "C": "涉及金额较大或涉及人员较多、产生恶劣社会影响", "D": "曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反该规定"}, "a": "ABCD", "an": "从重处理的情形：1、直接、间接或者唆使、协助他人向监管人员输送利益；2、连续或者多次违反本规定；3、涉及金额较大或者涉及人员较多；4、产生恶劣社会影响；5、曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定；6、中国证监会认定应当从重处理的其他情形。", "type": "multi"}, {"id": "cflue_zc_fl5.json_17", "q": "（2）根据《证券发行上市保荐业务管理办法》，下列关于保荐代表人应具备的条件，错误的是（）。", "c": {"A": "最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施", "B": "保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识", "C": "最近12个月持续从事保荐相关业务", "D": "最近5年内具备24个月以上保荐相关业务经历"}, "a": "D", "an": "保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备【36个月】以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施。", "type": "multi"}, {"id": "cflue_zc_fl5.json_18", "q": "向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券公司中间介绍业务，应当经中国证监会许可，取得相关业务资格。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，取得证券投资咨询业务资格。", "type": "judge"}, {"id": "cflue_zc_fl5.json_19", "q": "根据《关于加强证券经纪业务管理的规定》，证券公司技术人员可以从事客户账户及客户资金存管业务活动。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据《关于加强证券经纪业务管理的规定》，从事【技术】、风险监控、合规管理的人员不得从事营销、客户账户及客户资金存管等业务活动。", "type": "judge"}, {"id": "cflue_zc_fl5.json_20", "q": "委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部控制审批程序，协议中应明确约定（）。", "c": {"A": "服务期限", "B": "费用标准", "C": "服务内容", "D": "法律法规"}, "a": "ABC", "an": "证券经营机构应当加强对第三方机构或者个人有偿支付的管理。委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部审批程序，协议中应明确约定【服务内容、服务期限以及费用标准】等。", "type": "multi"}, {"id": "cflue_zc_fl5.json_21", "q": "根据《上市公司并购重组财务顾问业务管理办法》，证券公司从事上市公司并购重组财务顾问业务，以下属于应当具备的条件的是（）。", "c": {"A": "实缴注册资本和净资产不低于人民币500万元", "B": "最近2年每年财务顾问业务收入不低于100万元", "C": "公司净资本符合中国证监会的规定", "D": "具有2年以上从事公司并购重组财务顾问业务活动的执业经历"}, "a": "C", "an": "根据《上市公司并购重组财务顾问业务管理办法》，财务顾问主办人应当具备下列条件：（1）具备中国证监会规定的投资银行业务经历；（2）具备从事相关业务的专业能力；（3）所任职机构同意推荐其担任本机构的财务顾问主办人；（4）未负有数额较大到期未清偿的债务；（5）最近24个月无违反诚信的不良记录；（6）最近24个月未因执业行为违反行业规范而受到行业自律组织的纪律处分；（7）最近36个月未因执业行为违法违规受到处罚。", "type": "single"}, {"id": "cflue_zc_fl5.json_22", "q": "根据《证券期货经营机构私募资产管理业务管理办法》，下列关于证券公司从事私募资产管理业务的投资经理应具备的条件，错误的是（）。", "c": {"A": "最近二年未被监管机构采取行政监管措施", "B": "具有三年以上投资管理、投资研究、投资咨询等相关业务经验", "C": "具备良好的诚信记录和职业操守", "D": "具备从事私募资产管理业务所需的专业能力"}, "a": "A", "an": "根据《证券期货经营机构私募资产管理业务管理办法》《关于证券期货经营机构从事私募资产管理业务投资经理登记的通知》，证券公司投资经理应当具备从事证券业务所需的专业能力，具有三年以上投资管理、投资研究、投资咨询等相关业务经验，具备良好的诚信记录和职业操守，且最近三年未被监管机构采取重大行政监管措施、行政处罚，符合法律法规规定的其他条件。", "type": "single"}, {"id": "cflue_zc_fl5.json_23", "q": "证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有（）情形时，应当回避。", "c": {"A": "直系亲属在受评级机构担任普通职员", "B": "本人、直系亲属合计持有受评级机构发行的证券金额10万元", "C": "本人、直系亲属合计持有受评级证券发行人1%的股份", "D": "直系亲属是受评级机构、受评级证券发行人的实际控制人"}, "a": "D", "an": "证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避：1、本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上，或者是受评级机构、受评级证券发行人的实际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。", "type": "single"}, {"id": "cflue_zc_fl5.json_24", "q": "根据《证券业从业人员执业行为准则》，对证券业从业人员的执业行为进行自律管理的主体是中国证券业协会。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "根据《证券业从业人员执业行为准则》，对证券业从业人员的执业行为进行自律管理的主体是中国证券业协会。", "type": "judge"}, {"id": "cflue_zc_fl5.json_25", "q": "下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，错误的是（）。", "c": {"A": "证券资信评级公司在从事证券相关业务时应参照执行", "B": "已成为证券业协会会员的证券公司境内子公司应当执行", "C": "证券投资咨询公司可自行决定是否执行", "D": "在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行"}, "a": "C", "an": "证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。", "type": "single"}, {"id": "cflue_zc_fl5.json_26", "q": "根据《证券市场禁入规定》，中国证监会采取证券市场禁入措施前应当告知当事人享有的各项权利中，不包括（）。", "c": {"A": "陈述的权利", "B": "要求举行听证的权利", "C": "申辩的权利", "D": "依法聘请律师的权利"}, "a": "D", "an": "中国证监会采取证券市场禁入措施前，应当告知当事人采取证券市场禁入措施的事实、理由及依据，并告知当事人有陈述、申辩和要求举行听证的权利。", "type": "single"}, {"id": "cflue_zc_fl5.json_27", "q": "根据《证券市场禁入规定》，下列说法正确的有（）。", "c": {"A": "组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员采取终身的证券市场禁入措施", "B": "严重违反法律、行政法规或者中国证监会有关规定，构成犯罪的，可以对有关责任人员采取终身的证券市场禁入措施", "C": "违反法律、行政法规或者中国证监会有关规定，情节严重的，可以对有关责任人员采取3至5年的证券市场禁入措施", "D": "行为恶劣、严重扰乱证券市场秩序、严重损害投资者利益或者在重大违法活动中起主要作用等情节较为严重的，可以对有关责任人员采取3至5年的证券市场禁入措施"}, "a": "ABC", "an": "行为恶劣、严重扰乱证券市场秩序、严重损害投资者利益或者在重大违法活动中起主要作用等情节较为严重的，可以对有关责任人员采取6年至10年的证券市场禁入措施。B错误。", "type": "multi"}, {"id": "cflue_zc_fl5.json_28", "q": "证券评级机构的董事、监事和高级管理人员以及评级从业人员可以在受评级机构或者受评级证券发行人兼职。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券评级机构的董事、监事和高级管理人员以及评级从业人员【不得】在受评级机构或者受评级证券发行人兼职。", "type": "judge"}, {"id": "cflue_zc_fl5.json_29", "q": "证券期货经营机构应当制定工作人员廉洁从业规范，明确廉洁从业要求，加强从业人员廉洁培训和教育，培育廉洁从业文化，（）开展覆盖全体工作人员的连接培训与教育，确保工作人员熟悉廉洁从业的相关规定。", "c": {"A": "每月", "B": "每个季度", "C": "每年", "D": "每周"}, "a": "C", "an": "证券期货经营机构应当制定工作人员廉洁从业规范，明确廉洁从业要求，加强从业人员廉洁培训和教育，培育廉洁从业文化，【每年】开展覆盖全体工作人员的廉洁培训和教育，确保工作人员熟悉廉洁从业的相关规定。", "type": "single"}, {"id": "cflue_zc_fl5.json_30", "q": "某证券公司的下列实践中，能够反映证券行业文化建设基本要求中“牢记社会责任，展现良好形象”的有（）。", "c": {"A": "多措并举增加注册资本并积极推动上市", "B": "将对口帮扶地区的农副产品引入工会慰问品采购名单并鼓励会员优先选择", "C": "积极参与证券行业支持民营企业发展系列资管计划（纾困基金）的设立", "D": "建立各业务条线负责人必须出席的定期合规展业交流机制"}, "a": "BC", "an": "坚持义利兼顾，正道直行，发挥专业特长，加强经济形势分析研究，合力维护市场健康舆论生态，助力国家精准扶贫和乡村振兴，积极参与社会公益事业，与经济社会共生共荣、融合发展。是牢记社会责任，展现良好形象的要求，因此选择D选项。", "type": "multi"}, {"id": "cflue_zc_fl5.json_31", "q": "下列情形中，违反证券经纪业务有关管理规定的有（）。", "c": {"A": "将掌握的客户交易信息，提供给他人暗示其从事相关交易活动", "B": "向无风险承受能力的投资者推销公司资产管理产品", "C": "向客户说明公司的服务职责、范围", "D": "采取诋毁其他营业部竞争手段开展业务"}, "a": "ABD", "an": "根据《关于加强证券经纪业务管理的规定》，证券公司从事证券经纪业务的人员应当客观说明公司业务资格、服务职责、范围等情况，不得提供虚假、误导性信息，不得采取不正当竞争手段开展业务，不得诱导无投资意愿或者无风险承受能力的投资者参与证券交易活动。", "type": "multi"}, {"id": "cflue_zc_fl5.json_32", "q": "保荐代表人出现下列哪种情形，中国证监会可根据情节轻重，自确认之日起3个月到12个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，撤销其保荐代表人资格（）。", "c": {"A": "本人及其配偶待有发行人的股份", "B": "受发行人与证券服务机构的误导，参与其提供存在虚假记载、误导性陈述或者重大遗漏的文件", "C": "因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责", "D": "因突发自然灾害未能及时参与辅导工作"}, "a": "C", "an": "保荐代表人出现下列情形之一的，中国证监会可根据情节轻重，自确认之日起3个月到12个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，撤销其保荐代表人资格：1.尽职调查工作日志缺失或者遗漏、隐瞒重要问题；2.未完成或者未参与辅导工作；3.未参加持续督导工作，或者持续督导工作未勤勉尽职；4.因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责；5.唆使、协助或者参与发行人干扰中国证监会及其发行审核委员会的审核工作；6.严重违反诚实守信、勤勉尽责义务的其他情形。", "type": "single"}, {"id": "cflue_zc_fl5.json_33", "q": "证券从业人员不得从事的活动包括（）。", "c": {"A": "从事与其履行职责有利益冲突的业务", "B": "接受利益相关方的贿赂或对其进行贿赂", "C": "隐匿、伪造、篡改或者毁损交易记录", "D": "编造、传播虚假信息"}, "a": "ABCD", "an": "证券从业人员不得从事以下活动：1、从事内幕交易或利用未公开信息交易活动，泄露利用工作便利获取的内幕信息或其他未公开信息，或明示、暗示他人从事内幕交易活动；2、利用资金优势、持股优势和信息优势，单独或者合谋串通，影响证券交易价格或交易量，误导和干扰市场；3、编造、传播虚假信息，作出虚假陈述或信息误导，扰乱证券市场；4、损害社会公共利益、所在机构或者他人的合法权益；5、从事与其履行职责有利益冲突的业务；6、接受利益相关方的贿赂或对其进行贿赂，如接受或赠送礼物、回扣、补偿或报酬等，或从事可能导致与投资者或所在机构之间产生利益冲突的活动；7、买卖法律明文禁止买卖的证券；8、利用工作之便向任何机构和个人输送利益，损害客户和所在机构利益；9、违规向客户作出投资不受损失或保证最低收益的承诺；10、隐匿、伪造、篡改或者毁损交易记录；11、中国证监会、中国证券业协会禁止的其他行为。", "type": "multi"}, {"id": "cflue_zc_fl5.json_34", "q": "保荐代表人出现（）情形之一的，中国证监会可以根据情节轻重，在3个月到36个月内不受理相关保荐代表人具体负责的推荐，情节严重的，采取认定为不适当人选的监管措施。", "c": {"A": "重大事项未报告、未披露", "B": "伪造或者变造签字、盖章", "C": "尽职调查工作日志缺失或者遗漏、隐瞒重要问题", "D": "未完成或者未参加辅导工作"}, "a": "ABCD", "an": "保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，在3个月到36个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，釆取认定为不适当人选的监管措施：1、尽职调査工作日志缺失或者遗漏、隐瞒重要问题；2、未完成或者未参加辅导工作；3、重大事项未报告、未披露；4、未参加持续督导工作，或者持续督导工作未勤勉尽责；5、因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责；6、唆使、协助或者参与发行人干扰中国证监会及其发行审核委员会、证券交易所及其上市委员会的审核工作；7、伪造或者变造签字、盖章；8、严重违反诚实守信、勤勉尽责义务的其他情形。", "type": "multi"}, {"id": "cflue_zc_fl5.json_35", "q": "基金销售机构应该遵照《证券业从业人员资格管理办法》《证券业从业人员资格管理实施细则》等要求，统一办理（）。", "c": {"A": "绩效考核", "B": "执业年检", "C": "后续培训", "D": "执业注册"}, "a": "BCD", "an": "基金销售机构应该遵照《证券业从业人员资格管理办法》《证券业从业人员资格管理实施细则》等要求，统一办理执业注册、后 际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_26", "q": "下列关于证券公司对从事证券经纪业务相关人员的管理要求的说法，错误的是（）。", "c": {"A": "客户证券账户转托管和撤销指定交易等业务可由同一人完成操作与复核", "B": "涉及客户资金账户及证券账户的开立、信息修改、注销等业务应当一人操作、一人复核，复核应当留痕", "C": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制", "D": "涉及客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事前审批，事后复核，审批及复核均应留痕"}, "a": "A", "an": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批，事后复核，审批及复核均应留痕。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_53", "q": "按照《上市公司并购重组财务顾问业务管理办法》规定，财务顾问主办人应该最近（）个月未因执业行为违法违规受到处罚。", "c": {"A": "36", "B": "24", "C": "12", "D": "6"}, "a": "A", "an": "财务顾问主办人应当具备下列条件：1、具备中国证监会规定的投资银行业务经历；2、参加中国证监会认可的财务顾问主办人胜任能力考试且成绩合格；3、所任职机构同意推荐其担任本机构的财务顾问主办人；4、未负有数额较大到期未清偿的债务；5、最近24个月无违反诚信的不良记录；6、最近24个月未因执业行为违反行业规范而受到行业自律组织的纪律处分；7、最近36个月未因执业行为违法违规受到处罚；8、中国证监会规定的其他条件。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_1", "q": "有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。", "c": {"A": "情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构，保荐代表人具体负责的推荐", "B": "中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施", "C": "情节严重的，中国证监会可以在6个月到24个月内不受理保荐机构，保荐代表人具体负责的推荐", "D": "中国证监会会视情节轻重，采取监管或者市场禁入措施"}, "a": "AB", "an": "保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施；情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构、保荐代表人具体负责的推荐：1、制作或者出具的文件不齐备或者不符合要求；2、擅自改动申请文件、信息披露资料或者其他已提交文件；3、申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异；4、文件披露的内容表述不清，逻辑混乱，严重影响投资者理解；5、未及时报告或者未及时披露重大事项；6、指定不符合《办法》第四条规定要求的人员具体负责保荐工作；7、未通过内核程序，以公司名义对外提交或披露保荐业务项目文件；8、采取业务包干等承包方式或其他形式进行过度激励；9、以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_15", "q": "下列不属于《证券经营机构及其工作人员廉洁从业实施细则》所规定的工作人员范畴的是（）。", "c": {"A": "受聘担任证券公司常年法律顾问的执业律师", "B": "与证券公司签署委托协议的经纪人", "C": "与证券公司建立劳动关系的正式员工", "D": "劳务派遣至证券公司的其他人员"}, var CH_MAP = [{"code": "第1章", "name": "证券市场基本法律法规", "start": 0, "count": 226}, {"code": "第2章", "name": "证券经营机构管理规范", "start": 226, "count": 89}, {"code": "第3章", "name": "证券公司业务规范", "start": 315, "count": 144}, {"code": "第4章", "name": "证券市场典型违法违规行为及法律责任", "start": 459, "count": 74}, {"code": "第5章", "name": "行业文化、职业道德与从业人员行为规范", "start": 533, "count": 84}];
var STORAGE_KEY = 'sec_exam_law_section';
var state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
var currentCh = 0;
var currentSec = -1;
var selected = {};

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function renderSectionView() {
  var el = document.getElementById('sectionView');
  var html = '';
  SECTION_DATA.forEach(function(ch, ci) {
    var chInfo = CHAPTERS[ci] || {};
    var stars = '★'.repeat(chInfo.stars||0) + '☆'.repeat(5-(chInfo.stars||0));
    html += '<div class="ch-card"><div class="ch-head" onclick="toggleSections('+ci+')">'
         + '<div><div class="name">'+esc(ch.chapter)+'</div>'
         + '<div class="meta">'+stars+' · '+ch.ch_count+'题</div></div>'
         + '<span class="arrow">▼</span></div>'
         + '<div class="sec-list" id="secList-'+ci+'">';
    ch.sections.forEach(function(sec, si) {
      var pct = ch.ch_count > 0 ? Math.round(sec.q_count/ch.ch_count*100) : 0;
      html += '<div class="sec-item" onclick="startSection('+ci+','+si+')">'
           + '<span class="sname">'+esc(sec.name)+'</span>'
           + '<div class="sbar"><div class="sbar-fill" style="width:'+pct+'%"></div></div>'
           + '<span class="scount">'+sec.q_count+'题</span></div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function toggleSections(ci) {
  var head = document.querySelectorAll('.ch-head')[ci];
  var list = document.getElementById('secList-'+ci);
  if (!list) return;
  head.classList.toggle('exp');
  list.classList.toggle('show');
}

function startSection(ci, si) {
  currentCh = ci; currentSec = si;
  renderNav(); renderStats(); renderQuestions();
  document.getElementById('sectionView').classList.add('hidden');
  document.getElementById('questionView').classList.add('show');
}

function showSectionView() {
  document.getElementById('sectionView').classList.remove('hidden');
  document.getElementById('questionView').classList.remove('show');
}

function renderNav() {
  var nav = document.getElementById('chNav');
  var html = '';
  CHAPTERS.forEach(function(ch, i) {
    var a = i === currentCh ? 'on' : '';
    html += '<div class="ch-btn '+a+'" onclick="switchCh('+i+')">'
         + '<span class="ch-title">'+esc(ch.name)+'</span>'
         + '<span class="ch-meta">'+ch.count+'题</span></div>';
  });
  nav.innerHTML = html;
}

function renderStats() {
  var ch = CH_MAP[currentCh];
  if (!ch) return;
  var start, count;
  if (currentSec >= 0) {
    var sec = SECTION_DATA[currentCh].sections[currentSec];
    start = sec.q_start; count = sec.q_count;
  } else { start = ch.start; count = ch.count; }
  var done=0, correct=0;
  for (var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) {
    if (state[i] && state[i].done) { done++; if (state[i].correct) correct++; }
  }
  var pct = done>0 ? Math.round(correct/done*100) : 0;
  document.getElementById('stats').innerHTML = '<span>📝 '+done+'/'+count+' 已做</span><span class="pct">✅ '+pct+'%</span>';
  document.getElementById('progressFill').style.width = (count>0?Math.round(done/count*100):0)+'%';
}

function getQs() {
  var ch = CH_MAP[currentCh];
  if (!ch) return [];
  var start, count;
  if (currentSec >= 0) {
    var sec = SECTION_DATA[currentCh].sections[currentSec];
    start = sec.q_start; count = sec.q_count;
  } else { start = ch.start; count = ch.count; }
  var qs = [];
  for (var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) qs.push({idx:i, q:ALL_QUESTIONS[i]});
  return qs;
}

function renderQuestions() {
  var c = document.getElementById('questionList');
  var qs = getQs();
  var html = '';
  qs.forEach(function(item) {
    var q = item.q, idx = item.idx, s = state[idx] || {};
    var keys = Object.keys(q.c);
    var isSingle = q.type==='single'||q.type==='judge';
    var tl = q.type==='judge'?'判断':(q.type==='multi'?'多选':'单选');
    html += '<div class="q-wrap" id="qw-'+idx+'">';
    html += '<div class="q-head"><span class="q-num">'+(qs.indexOf(item)+1)+'.</span><span class="q-tag">'+tl+'</span></div>';
    html += '<div class="q-text">'+esc(q.q)+'</div><div class="opts" id="opts-'+idx+'">';
    keys.forEach(function(key) {
      var val = q.c[key];
      if (val==null) return;
      var extra = '';
      if (s.done) {
        var isC = q.a.indexOf(key)>=0;
        var isSel = s.answers && s.answers.indexOf(key)>=0;
        extra = isSel&&isC ? ' correct disabled' : (isSel&&!isC ? ' wrong disabled' : (isC ? ' correct disabled' : ' disabled'));
      }
      html += '<div class="opt'+extra+'" onclick="toggleOpt('+idx+',\''+key+'\')"><span class="okey">'+key+'</span><span class="oval">'+esc(val)+'</span></div>';
    });
    html += '</div>';
    if (s.done) {
      html += '<div class="ans-box '+(s.correct?'correct':'wrong')+'">'+(s.correct?'✅ 回答正确':'❌ 回答错误')+' · 正确答案：'+esc(q.a)+(s.answers&&!s.correct?' · 你的答案：'+esc(s.answers.join('')):'')+'</div>';
      html += '<div class="ans-box" style="background:var(--card-alt);border-color:var(--border-light);color:var(--text);margin-top:0.3rem;"><div class="a-text">'+esc(q.an)+'</div></div>';
    }
    html += '</div>';
  });
  html += '<div class="action-row"><button class="btn-check" onclick="checkAll()">📝 批改本页</button><button class="btn-reset" onclick="resetAll()">🔄 重置本页</button></div>';
  c.innerHTML = html;
}

function switchCh(idx) { currentCh=idx; currentSec=-1; renderNav(); renderStats(); renderQuestions(); }

function toggleOpt(idx, key) {
  if (state[idx] && state[idx].done) return;
  if (!selected[idx]) selected[idx]=[];
  var arr = selected[idx], pos = arr.indexOf(key);
  var q = ALL_QUESTIONS[idx], isSingle = q.type==='single'||q.type==='judge';
  if (isSingle) { selected[idx]=[key]; } else { if(pos>=0) arr.splice(pos,1); else arr.push(key); }
  var opts = document.getElementById('opts-'+idx);
  if (opts) opts.querySelectorAll('.opt').forEach(function(o) {
    o.classList.toggle('selected', selected[idx].indexOf(o.dataset.key||'')>=0);
  });
}

function checkSingle(idx) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx] && state[idx].done) return;
  var sel = selected[idx]||[]; if(sel.length===0) return;
  var isC = sel.sort().join('') === q.a;
  state[idx] = {done:true, correct:isC, answers:sel.slice()};
  saveState();
}

function checkAll() { getQs().forEach(function(item){ checkSingle(item.idx); }); renderStats(); renderQuestions(); }

function resetAll() {
  getQs().forEach(function(item){ delete state[item.idx]; delete selected[item.idx]; });
  saveState(); renderStats(); renderQuestions();
}

function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

renderSectionView();
</script>
