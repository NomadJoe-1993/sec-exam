"根据《刑法》，（）是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益的行为。","c":{"A":"欺诈发行股票、债券罪","B":"诱骗他人买卖证券罪","C":"非法发行股票和公司、企业债券罪","D":"违规披露、不披露重要信息罪"},"a":"D","an":"【违规披露、不披露重要信息罪】是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益，或有其他严重情节的行为。","type":"single"},{"id":"cflue_paper_法律法规_3.json_17","q":"是否存在责任人有专业背景，对于信息披露中与其专业背景有关违法事项应当发现而未予指出的情况，是影响信息披露违法责任人员责任大小的认定因素之一。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_30","q":"在证券、期货市场上，操纵市场的行为方式主要有（）。","c":{"A":"内幕交易","B":"与他人串通，以约定的价格进行交易","C":"自买自卖期货合约","D":"合谋操纵证券交易价格或数量"},"a":"BCD","an":"期货市场上操纵市场行为包括：1、单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖，操纵证券、期货交易价格或者证券、期货交易量的；2、与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易，影响证券、期货交易价格或者证券、期货交易量的；3、在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约，影响证券、期货交易价格或者证券、期货交易量的；4、以其他方法操纵证券、期货市场的。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_44","q":"依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列（）情形的，应予立案追诉。","c":{"A":"在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的","B":"虚增或者虚减利润达到当期披露的利润总额百分之二十以上的","C":"多次提供虚假的或者隐瞒重要事实的财务会计报告的","D":"致使公司发行的股票、公司债券被终止上市交易或者多次被暂停上市交易的"},"a":"ACD","an":"依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列情形之一的，应予立案追诉：（1）造成股东、债权人或者其他人直接经济损失数额累计在100万元以上的；（2）虚增或者虚减资产达到当期披露的资产总额30%以上的；（3）虚增或者虚减利润达到当期披露的利润总额【30%】以上的；（4）未按照规定披露的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额占净资产50%以上的；（5）致使公司发行的股票、公司债券或者国务院依法认定的其他证券被终止上市交易或者多次被暂停上市交易的；（6）致使不符合发行条件的公司、企业骗取发行核准并且上市交易的；（7）在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的；（8）多次提供虚假的或者隐瞒重要事实的财务会计报告，或者多次对依法应当披露的其他重要信息不按照规定披露的；（9）其他严重损害股东、债权人或者其他人利益，或者有其他严重情节的情形。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_49","q":"2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，将负责管理该公司“A基金”账户的投资决策信息告诉其夫蒋某，并与蒋某共同出资10万元，利用其大学同学陈某账户先于“A基金”买入股票并获利1万余元。关于李某的行为，以下说法正确有（）。","c":{"A":"不构成犯罪，但是应当承担行政责任","B":"构成利用未公开信息交易罪","C":"构成泄露内幕信息罪","D":"构成内幕交易罪"},"a":"B","an":"利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。","type":"single"},{"id":"cflue_paper_法律法规_3.json_55","q":"证券发行上市保荐业务中，保荐人出具有重大遗漏的保荐书，处罚措施中包括责令改正，给予警告，没收业务收入，并处入1倍以上10倍以下罚款。（）","c":{"A":"错","B":"对"},"a":"B","an":"保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款；没有业务收入或者业务收入不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销保荐业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_11","q":"下列关于在证券交易活动中作出虚假陈述或者信息误导的法律责任的说法，错误的是（）。","c":{"A":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，并处相应罚款","B":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处相应罚款，情节严重的，并处暂停或者禁止从事证券服务业务","C":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以3万元以上20万元以下的罚款","D":"在证券交易活动中作出虚假陈述或者信息误导的人员属于国家工作人员的，经责令改正并处以罚款后，可以不予行政处分"},"a":"CD","an":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款；属于国家工作人员的，还应当依法给予行政处分。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_24","q":"王某在2020年3月因证券违法行为受到过行政处罚，2022年9月其参与内幕交易获利30万元，其行为应予立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"内幕交易获利或者避免损失数额在25万元以上，或者证券交易成交额在100万元以上，或者期货交易占用保证金数额在50万元以上，【同时】涉嫌下列情形之一的，应予立案追诉：（1）证券法规定的证券交易内幕信息的知情人实施或者与他人共同实施内幕交易行为的；（2）以出售或者变相出售内幕信息等方式，明示、暗示他人从事与该内幕信息相关的交易活动的；（3）因证券、期货犯罪行为受过刑事追究的；（4）2年内因证券、期货违法行为受过行政处罚的；（5）造成其他严重后果的。该题目，获利金额够，但受到行政处罚的时间超过两年，故按照规定，不予立案追诉。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_30","q":"操纵证券、期货市场，持有证券的流通股份数达到该证券实际流通股份总量30%以上，且在该证券连续20个交易日内连续买卖股份数累计达到该证券同期总成交量30%以上的，应予立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"持有或者实际控制证券的流通股份数量达到该证券的实际流通股份总量10%以上，实施刑法第一百八十二条第一款第一项操纵证券市场行为，连续10个交易日的累计成交量达到同期该证券总成交量20%以上的应予立案追诉。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_47","q":"根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。","c":{"A":"根据客户的真实意思表示，维护客户利益","B":"为牟取佣金收入，诱使客户进行不必要的证券买卖","C":"根据客户的委托为其买卖证券","D":"在规定的时间内向客户提供交易的确认文件"},"a":"B","an":"A选项违反了相关从业规定","type":"single"},{"id":"cflue_paper_法律法规_5.json_6","q":"证券发行上市保荐业务中，保荐人出具有重大遗漏的保荐书，处罚措施中包括责令改正，给予警告，没收业务收入，并处入1倍以上10倍以下罚款。（）","c":{"A":"错","B":"对"},"a":"B","an":"保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款；没有业务收入或者业务收入不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销保荐业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_7","q":"期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）","c":{"A":"错","B":"对"},"a":"B","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_15","q":"构成背信运用受托财产罪的立案标准的是（）。","c":{"A":"擅自运用客户资金或者其他委托、信托的财产数额在10万元以上的","B":"擅自运用多个客户资金或者其他委托、信托的财产的","C":"接受客户委托运用信托财产的","D":"擅自运用客户资金或者其他委托、信托的财产数额在20万元以上的"},"a":"B","an":"背信运用受托财产罪的刑事立案追诉标准：（1）擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；（2）虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用【多个】客户资金或者其他委托、信托的财产的；（3）其他情节严重的情形。","type":"single"},{"id":"cflue_paper_法律法规_5.json_37","q":"根据《证券法》，下列关于上市公司收购相关法律责任的说法，错误的有（）。","c":{"A":"收购人利用上市公司收购，损害被收购公司股东的合法权益，无需承担赔偿责任","B":"收购人控股股东未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款","C":"收购人的控股股东利用上市公司收购，损害被收购公司及其股东的合法权益，应当由被收购公司承担赔偿责任","D":"收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款"},"a":"ABC","an":"收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。D错误；收购人及其控股股东、实际控制人利用上市公司收购，给被收购公司及其股东造成损失的，应当依法承担赔偿责任。A、B错误。","type":"multi"},{"id":"cflue_paper_法律法规_5.json_44","q":"2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，将负责管理该公司“A基金”账户的投资决策信息告诉其夫蒋某，并与蒋某共同出资10万元，利用其大学同学陈某账户先于“A基金”买入股票并获利1万余元。关于李某的行为，以下说法正确有（）。","c":{"A":"不构成犯罪，但是应当承担行政责任","B":"构成利用未公开信息交易罪","C":"构成泄露内幕信息罪","D":"构成内幕交易罪"},"a":"B","an":"利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。","type":"single"},{"id":"cflue_mock_1.json_4","q":"关于在证券交易活动中可能作出虚假陈述或者信息误导的主体，下列说法正确的有（）。","c":{"A":"证券公司及其从业人员","B":"证券登记结算机构及其从业人员","C":"证券业协会、证券监督管理机构及其从业人员","D":"证券交易所及其从业人员"},"a":"ABCD","an":"在证券交易活动中作出虚假陈述或者信息误导，是指证券交易所、证券公司、证券登记结算机构、证券服务机构及其从业人员，证券业协会、证券监督管理机构及其工作人员，在证券交易活动中作出虚假陈述或者信息误导。","type":"multi"},{"id":"cflue_mock_1.json_58","q":"根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。","c":{"A":"根据客户的真实意思表示，维护客户利益","B":"为牟取佣金收入，诱使客户进行不必要的证券买卖","C":"根据客户的委托为其买卖证券","D":"在规定的时间内向客户提供交易的确认文件"},"a":"B","an":"A选项违反了相关从业规定","type":"single"},{"id":"cflue_mock_1.json_66","q":"期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）","c":{"A":"错","B":"对"},"a":"B","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"judge"},{"id":"cflue_mock_1.json_110","q":"构成背信运用受托财产罪的立案标准的是（）。","c":{"A":"擅自运用客户资金或者其他委托、信托的财产数额在10万元以上的","B":"擅自运用多个客户资金或者其他委托、信托的财产的","C":"接受客户委托运用信托财产的","D":"擅自运用客户资金或者其他委托、信托的财产数额在20万元以上的"},"a":"B","an":"背信运用受托财产罪的刑事立案追诉标准：（1）擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；（2）虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用【多个】客户资金或者其他委托、信托的财产的；（3）其他情节严重的情形。","type":"single"},{"id":"cflue_mock_1.json_114","q":"根据《刑法》，（）是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益的行为。","c":{"A":"欺诈发行股票、债券罪","B":"诱骗他人买卖证券罪","C":"非法发行股票和公司、企业债券罪","D":"违规披露、不披露重要信息罪"},"a":"D","an":"【违规披露、不披露重要信息罪】是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益，或有其他严重情节的行为。","type":"single"},{"id":"cflue_mock_2.json_18","q":"下列属于诱骗投资者买卖证券、期货合约罪主体范围的是（）。","c":{"A":"证券交易所从业人员","B":"银行从业人员","C":"证券公司从业人员","D":"期货经纪公司"},"a":"ACD","an":"诱骗投资者买卖证券、期货合约罪，是指证券交易所、期货交易所、证券公司、期货经纪公司的从业人员，证券业协会、期货业协会或者证券期货监管管理部门的工作人员，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为。","type":"multi"},{"id":"cflue_mock_2.json_34","q":"某公司在招股说明书中隐瞒重要事实，发行股票非法募集资金金额500万元的，应予刑事立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，非法募集资金金额在【1000万元】以上的，应予立案追诉。","type":"judge"},{"id":"cflue_mock_2.json_90","q":"下列关于利用未公开信息交易罪立案追诉标准的说法，正确的是（）。","c":{"A":"获利或者避免损失数额在100万元以上的","B":"2年内3次以上利用未公开信息交易的","C":"证券交易成交额累计在30万元以上的","D":"期货交易占用保证金数额累计在20万元以上的"},"a":"AB","an":"利用未公开信息交易行为，涉嫌下列情形之一的，应予立案追诉：（1）获利或者避免损失数额在100万元以上的；（2）2年内3次以上利用未公开信息交易的；（3）明示、暗示3人以上从事相关交易活动的；（4）具有其他严重情节的。利用未公开信息交易，获利或者避免损失数额在50万元以上，或者证券交易成交额在500万元以上，或者期货交易占用保证金数额在100万元以上，同时涉嫌下列情形之一的，应予立案追诉：（1）以出售或者变相出售未公开信息等方式，明示、暗示他人从事相关交易活动的；（2）因证券、期货犯罪行为受过刑事追究的；（3）两年内因证券、期货违法行为受过行政处罚的；（4）造成其他严重后果的。","type":"multi"},{"id":"cflue_mock_2.json_112","q":"根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。","c":{"A":"根据客户的真实意思表示，维护客户利益","B":"为牟取佣金收入，诱使客户进行不必要的证券买卖","C":"根据客户的委托为其买卖证券","D":"在规定的时间内向客户提供交易的确认文件"},"a":"B","an":"A选项违反了相关从业规定","type":"single"},{"id":"cflue_mock_2.json_116","q":"下列关于违反证券发行规定的法律责任的说法，正确的有（）。","c":{"A":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，可以不追究责任","B":"未经依法注册，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，并处罚款","C":"证券公司承销或者销售擅自公开发行的证券的，责令停止承销或者销售，没收违法所得，并处罚款","D":"发行人的控股股东、实际控制人组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，依规只对发行人进行处罚"},"a":"BC","an":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，【处以200万元以上2000万元以下的罚款】，A选项错误（A声称不追究责任明显错误）。控股股东、实际控制人组织、指使实施前款行为的，也应受处罚，D选项错误（D声称只对发行人处罚明显错误）。","type":"multi"},{"id":"xs_4782737","q":"根据《证券法》的规定，下列关于发行人、上市公司擅自改变公开发行证券所募集资金的用途的，可采取的措施有（）。Ⅰ.责令改正Ⅱ.对直接负责的主管人员和其他直接负责人员给予警告并处以三万以上五万元以下的罚款Ⅲ.发行人、上市公司的控股股东、实际控制人指使从事该违法行为，给予警告，并处以五十万元以上五百万元以下的罚款Ⅳ.中国证监会将视情节轻重，对相关机构和责任人员采取监管谈话、责令改正等监管措施","c":{"A":"Ⅰ、Ⅲ","B":"Ⅲ、Ⅳ","C":"Ⅰ、Ⅳ","D":"Ⅰ、Ⅱ"},"a":"A","an":"收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"xs_4782738","q":"欺诈发行股票、债券罪应予立案追诉的标准包括（）。Ⅰ.发行数额在500万元以上Ⅱ.伪造、变造国家机关公文、有效证明文件或者相关凭证、单据Ⅲ.利用募集的资金进行违法活动Ⅳ.转移或者隐瞒所募集资金","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4782739","q":"在证券发行行为中，符合三公原则的做法有（）。Ⅰ.非公开发行证券，不得采用广告、公开劝诱和变相公开方式Ⅱ.发行人将公司发行信息提前告知给现有股东Ⅲ.向不超过200人的不特定对象发行证券，必须经过证监会注册Ⅳ.公开发行证券，报经国务院证券监督管理机构或者国务院授权的部门核准，可以视情况突破法律、行政法规规定的条件","c":{"A":"Ⅰ、Ⅳ","B":"Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ","D":"Ⅱ、Ⅲ"},"a":"A","an":"","type":"single"},{"id":"xs_4782740","q":"根据《证券法》，下列关于擅自改变公开发行证券募集资金用途的后果说法正确的是（）。Ⅰ.未作纠正或未经股东大会认可的，不得公开发行新股Ⅱ.对直接责任人员处以警告并处以十万元以上一百万元以下的罚款Ⅲ.对指使该行为的控股股东处以警告并处以五十万元以上五百万元以下的罚款Ⅳ.对负责证券承销的证券公司处以警告，责令整改","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"C","an":"","type":"single"},{"id":"comp_57159","q":"根据《证券法》，对该上市公司信息披露违法行为的处罚措施包括（）。","c":{"A":"对发行人处以100万元以上1000万元以下的罚款","B":"对直接负责的主管人员处以50万元以上500万元以下的罚款","C":"责令改正，给予警告","D":"情节严重的，可以对有关责任人员采取证券市场禁入措施"},"a":"ABCD","an":"四个选项均正确。新证券法大幅提高了信息披露违法行为的罚款上限。同时，信息披露义务人未按照规定披露信息，或者披露的信息存在虚假记载、误导性陈述或者重大遗漏的，还应依法承担民事赔偿责任。","type":"comprehensive","material":"2023年，中国证监会对某上市公司及其高管涉嫌信息披露违法违规行为立案调查。经查，该公司未按规定披露关联交易，虚增营业收入和利润。该行为严重损害了投资者的合法权益。","sub_type":"multi"},{"id":"comp_10118","q":"关于内幕交易，下列说法正确的有（）。","c":{"A":"内幕信息是指证券交易活动中涉及公司的经营、财务或对其证券价格有重大影响的尚未公开信息","B":"内幕信息知情人员包括公司董事、监事和高级管理人员","C":"内幕交易行为给投资者造成损失的应当承担赔偿责任","D":"内幕交易只要没有获利就不构成违法"},"a":"ABC","an":"选项D错误。内幕交易行为不以是否获利为构成要件，只要行为人利用内幕信息进行证券交易就构成违法。内幕交易可能面临行政处罚（罚没违法所得并罚款）和刑事追诉。","type":"comprehensive","material":"2023年，中国证监会对某上市公司及其高管涉嫌信息披露违法违规行为立案调查。经查，该公司未按规定披露关联交易，虚增营业收入和利润。该行为严重损害了投资者的合法权益。","sub_type":"multi"},{"id":"cflue_zc_fl5.json_1","q":"下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，不正确的是（）。","c":{"A":"在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行","B":"已成为证券业协会会员的证券公司境内子公司应当执行","C":"证券投资咨询公司可自行决定是否执行","D":"证券资信评级公司在从事证券相关业务时应参照执行"},"a":"C","an":"证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。","type":"single"},{"id":"cflue_zc_fl5.json_2","q":"证券评级机构从事证券评级业务，应当制定科学的评级方法和完善的质量控制制度。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_zc_fl5.json_3","q":"被采取市场禁入措施的人员，应当遵循的规定包括（）。","c":{"A":"由所在机构按规定程序解除其被禁止担任的职务","B":"不得在任何公司担任董事、监事、高级管理人员职务","C":"立即停止从事证券业务","D":"立即停止履行上市公司董事、监事、高级管理人员职务"},"a":"ACD","an":"被采取证券市场禁入措施的人员：1、在禁入期间内，除不得继续在原机构从事证券业务或者担任原上市公司董事、监事、高级管理人员职务外，也不得在其他任何机构中从事证券业务或者担任其他上市公司董事、监事、高级管理人员职务。2、应当在收到中国证监会作出的证券市场禁入决定后，立即停止从事证券业务或者停止履行上市公司董事、监事、高级管理人员职务，并由其所在机构按规定的程序解除其被禁止担任的职务。","type":"multi"},{"id":"cflue_zc_fl5.json_4","q":"机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员可按照所在机构内部程序向高级管理人员、中国证监会报告。","c":{"A":"错","B":"对"},"a":"A","an":"机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员应及时按照所在机构内部程序向高级管理人员或者董事会报告。机构未妥善处理的，从业人员应及时向中国证监会或者中国证券业协会报告。","type":"judge"},{"id":"cflue_zc_fl5.json_5","q":"（3）保荐代表人违反《证券发行上市保荐业务管理办法》，中国证监会可以采取的监管措施包括（）。","c":{"A":"重点关注","B":"公开谴责","C":"监管谈话","D":"责令进行业务学习"},"a":"ACD","an":"保荐机构、保荐代表人、保荐业务负责人和内核负责人违反本办法，未诚实守信、勤勉尽责地履行相关义务的，中国证监会【责令改正，并对其采取监管谈话、重点关注、责令进行业务学习、出具警示函、责令公开说明、认定为不适当人选】等监管措施；依法应给予行政处罚的，依照有关规定进行处罚；情节严重涉嫌犯罪的，依法移送司法机关，追究其刑事责任。","type":"multi"},{"id":"cflue_zc_fl5.json_6","q":"有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。","c":{"A":"情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构，保荐代表人具体负责的推荐","B":"中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施","C":"情节严重的，中国证监会可以在6个月到24个月内不受理保荐机构，保荐代表人具体负责的推荐","D":"中国证监会会视情节轻重，采取监管或者市场禁入措施"},"a":"AB","an":"保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施；情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构、保荐代表人具体负责的推荐：1、制作或者出具的文件不齐备或者不符合要求；2、擅自改动申请文件、信息披露资料或者其他已提交文件；3、申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异；4、文件披露的内容表述不清，逻辑混乱，严重影响投资者理解；5、未及时报告或者未及时披露重大事项；6、指定不符合《办法》第四条规定要求的人员具体负责保荐工作；7、未通过内核程序，以公司名义对外提交或披露保荐业务项目文件；8、采取业务包干等承包方式或其他形式进行过度激励；9、以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。","type":"multi"},{"id":"cflue_zc_fl5.json_7","q":"根据《证券业从业人员资格管理办法》，从事证券业务的专业人员不包括（）。","c":{"A":"证券资信评估机构中从事证券资信评估业务的专业人员","B":"信托机构业务部门的管理人员","C":"证券公司从事证券经纪业务部门的管理人员","D":"证券投资咨询机构从事证券投资咨询业务的专业人员"},"a":"B","an":"根据《证券业从业人员资格管理办法》，从事证券业务的专业人员是指：1.证券公司中从事自营、经纪、承销、投资咨询、受托投资管理等业务的专业人员，包括相关业务部门的管理人员；2.基金管理公司、基金托管机构中从事基金销售、研究分析、投资管理、交易、监察稽核等业务的专业人员，包括相关业务部门的管理人员；基金销售机构中从事基金宣传、推销、咨询等业务的专业人员，包括相关业务部门的管理人员；3.证券投资咨询机构中从事证券投资咨询业务的专业人员及其管理人员；4.证券资信评估机构中从事证券资信评估业务的专业人员及其管理人员；5.中国证监会规定需要取得从业资格和执业证书的其他人员。","type":"single"},{"id":"cflue_zc_fl5.json_8","q":"下列关于证券公司对从事证券经纪业务相关人员的管理要求的说法，错误的是（）。","c":{"A":"客户证券账户转托管和撤销指定交易等业务可由同一人完成操作与复核","B":"涉及客户资金账户及证券账户的开立、信息修改、注销等业务应当一人操作、一人复核，复核应当留痕","C":"与客户权益变动相关业务的经办人员之间，应当建立制衡机制","D":"涉及客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事前审批，事后复核，审批及复核均应留痕"},"a":"A","an":"与客户权益变动相关业务的经办人员之间，应当建立制衡机制。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批，事后复核，审批及复核均应留痕。","type":"single"},{"id":"cflue_zc_fl5.json_9","q":"证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在（）个工作日内，向中国证券业协会有关派出机构报告。","c":{"A":"7","B":"10","C":"12","D":"5"},"a":"D","an":"证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在【5】个工作日内，向中国证券业协会有关派出机构报告。","type":"single"},{"id":"cflue_zc_fl5.json_10","q":"除财务顾问的法定代表人或者其授权代表人之外，应当在财务顾问专业意见上签名的还有（），并加盖财务顾问单位公章。","c":{"A":"项目协办人","B":"财务顾问主办人","C":"部门负责人","D":"内部核查机构负责人"},"a":"ABCD","an":"财务顾问的法定代表人或者其授权代表人、部门负责人、内部核查机构负责人、财务顾问主办人和项目协办人应当在财务顾问专业意见上签名，并加盖财务顾问单位公章。","type":"multi"},{"id":"cflue_zc_fl5.json_11","q":"下列属于证券行业文化建设的基本要求的有（）。","c":{"A":"坚持稳健经营，促进健康发展","B":"坚持廉洁自律，弘扬清风正气","C":"牢记社会责任，展现良好形象","D":"坚持创新精神，提升服务能力"},"a":"ABC","an":"行业文化建设的基本要求：1、坚持依法合规，筑牢发展基础；2、坚持诚实守信，恪守职业操守；3、坚持专业精神，提升服务能力；4、坚持稳健经营，促进健康发展；5、坚持廉洁自律，弘扬清风正气；6、牢记社会责任，展现良好形象。","type":"multi"},{"id":"cflue_zc_fl5.json_12","q":"财务顾问应当建立健全内部报告制度，并对证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由（）签名，并加盖财务顾问单位签章。","c":{"A":"财务顾问主办人","B":"部门负责人","C":"项目协办人","D":"财务顾问的法定代表人或者其授权代表人"},"a":"ACD","an":"财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核査机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人签名，并加盖财务顾问单位公章。","type":"multi"},{"id":"cflue_zc_fl5.json_13","q":"根据《关于证券业从业人员登记管理有关事项的通知》，下列关于证券业从业人员的登记程序的说法，错误的是（）。","c":{"A":"从业人员所从事的业务类别或其他重要登记信息发生变化的，所在机构应当自发生变化之日起7个工作日内办理变更登记","B":"从业人员所在机构应当自从业人员入职（不含试用期）之日起7个工作日内，通过中国证券业协会从业人员管理平台办理登记","C":"从业人员离职的，所在机构应当自劳动关系（或委托代理关系）解除之日起7个工作日内办理注销登记","D":"从业人员登记信息不完备或不符合规定要求的，中国证券业协会通知从业人员所在机构及时补正"},"a":"B","an":"从业人员应当通过所在机构进行登记，机构应当自从业人员入职（含试用期）之日起7个工作日内，通过协会从业人员管理平台，将经本机构审核过的从业人员登记信息提交至协会进行登记。","type":"single"},{"id":"cflue_zc_fl5.json_14","q":"下列关于证券投资咨询业务的说法，错误的是（）。","c":{"A":"证券投资顾问业务按照约定，可以辅助客户作出投资决策，并直接获取经济利益","B":"证券投资咨询业务中可以与投资人约定分享投资收益、分担投资损失","C":"证券投资咨询可以接受投资人委托，提供有偿证券投资咨询服务","D":"证券投资咨询业务包括证券投资顾问业务及发布证券研究报告"},"a":"B","an":"不得向投资人承诺证券投资收益；与投资人约定分享投资收益或者分担投资损失。","type":"single"},{"id":"cflue_zc_fl5.json_15","q":"根据《证券期货经营机构及其工作人员廉洁从业规定》，下列关于廉洁从业的说法，错误的是（）。","c":{"A":"廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，严格遵守法律法规、中国证监会的规定和行业自律规则","B":"廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，遵守社会公德、商业道德、职业道德和行为规范","C":"证券期货经营机构承担廉洁从业风险防控主体责任，证券期货经营机构股东（大）会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任","D":"证券期货经营机构主要负责人是落实廉洁从业管理职责的第一责任人，各级负责人在职责范围内承担相应管理责任"},"a":"C","an":"董事会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任。","type":"single"},{"id":"cflue_zc_fl5.json_16","q":"证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有下列（）情形的，中国证监会应当从重处理。","c":{"A":"连续或者多次违反该规定","B":"直接、间接或唆使、协助他人向监管人员输送利益","C":"涉及金额较大或涉及人员较多、产生恶劣社会影响","D":"曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反该规定"},"a":"ABCD","an":"从重处理的情形：1、直接、间接或者唆使、协助他人向监管人员输送利益；2、连续或者多次违反本规定；3、涉及金额较大或者涉及人员较多；4、产生恶劣社会影响；5、曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定；6、中国证监会认定应当从重处理的其他情形。","type":"multi"},{"id":"cflue_zc_fl5.json_17","q":"（2）根据《证券发行上市保荐业务管理办法》，下列关于保荐代表人应具备的条件，错误的是（）。","c":{"A":"最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施","B":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识","C":"最近12个月持续从事保荐相关业务","D":"最近5年内具备24个月以上保荐相关业务经历"},"a":"D","an":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备【36个月】以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施。","type":"multi"},{"id":"cflue_zc_fl5.json_18","q":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券公司中间介绍业务，应当经中国证监会许可，取得相关业务资格。（）","c":{"A":"错","B":"对"},"a":"A","an":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，取得证券投资咨询业务资格。","type":"judge"},{"id":"cflue_zc_fl5.json_19","q":"根据《关于加强证券经纪业务管理的规定》，证券公司技术人员可以从事客户账户及客户资金存管业务活动。（）","c":{"A":"错","B":"对"},"a":"A","an":"根据《关于加强证券经纪业务管理的规定》，从事【技术】、风险监控、合规管理的人员不得从事营销、客户账户及客户资金存管等业务活动。","type":"judge"},{"id":"cflue_zc_fl5.json_20","q":"委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部控制审批程序，协议中应明确约定（）。","c":{"A":"服务期限","B":"费用标准","C":"服务内容","D":"法律法规"},"a":"ABC","an":"证券经营机构应当加强对第三方机构或者个人有偿支付的管理。委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部审批程序，协议中应明确约定【服务内容、服务期限以及费用标准】等。","type":"multi"},{"id":"cflue_zc_fl5.json_21","q":"根据《上市公司并购重组财务顾问业务管理办法》，证券公司从事上市公司并购重组财务顾问业务，以下属于应当具备的条件的是（）。","c":{"A":"实缴注册资本和净资产不低于人民币500万元","B":"最近2年每年财务顾问业务收入不低于100万元","C":"公司净资本符合中国证监会的规定","D":"具有2年以上从事公司并购重组财务顾问业务活动的执业经历"},"a":"C","an":"根据《上市公司并购重组财务顾问业务管理办法》，财务顾问主办人应当具备下列条件：（1）具备中国证监会规定的投资银行业务经历；（2）具备从事相关业务的专业能力；（3）所任职机构同意推荐其担任本机构的财务顾问主办人；（4）未负有数额较大到期未清偿的债务；（5）最近24个月无违反诚信的不良记录；（6）最近24个月未因执业行为违反行业规范而受到行业自律组织的纪律处分；（7）最近36个月未因执业行为违法违规受到处罚。","type":"single"},{"id":"cflue_zc_fl5.json_22","q":"根据《证券期货经营机构私募资产管理业务管理办法》，下列关于证券公司从事私募资产管理业务的投资经理应具备的条件，错误的是（）。","c":{"A":"最近二年未被监管机构采取行政监管措施","B":"具有三年以上投资管理、投资研究、投资咨询等相关业务经验","C":"具备良好的诚信记录和职业操守","D":"具备从事私募资产管理业务所需的专业能力"},"a":"A","an":"根据《证券期货经营机构私募资产管理业务管理办法》《关于证券期货经营机构从事私募资产管理业务投资经理登记的通知》，证券公司投资经理应当具备从事证券业务所需的专业能力，具有三年以上投资管理、投资研究、投资咨询等相关业务经验，具备良好的诚信记录和职业操守，且最近三年未被监管机构采取重大行政监管措施、行政处罚，符合法律法规规定的其他条件。","type":"single"},{"id":"cflue_zc_fl5.json_23","q":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有（）情形时，应当回避。","c":{"A":"直系亲属在受评级机构担任普通职员","B":"本人、直系亲属合计持有受评级机构发行的证券金额10万元","C":"本人、直系亲属合计持有受评级证券发行人1%的股份","D":"直系亲属是受评级机构、受评级证券发行人的实际控制人"},"a":"D","an":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避：1、本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上，或者是受评级机构、受评级证券发行人的实际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。","type":"single"},{"id":"cflue_zc_fl5.json_24","q":"根据《证券业从业人员执业行为准则》，对证券业从业人员的执业行为进行自律管理的主体是中国证券业协会。（）","c":{"A":"错","B":"对"},"a":"B","an":"根据《证券业从业人员执业行为准则》，对证券业从业人员的执业行为进行自律管理的主体是中国证券业协会。","type":"judge"},{"id":"cflue_zc_fl5.json_25","q":"下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，错误的是（）。","c":{"A":"证券资信评级公司在从事证券相关业务时应参照执行","B":"已成为证券业协会会员的证券公司境内子公司应当执行","C":"证券投资咨询公司可自行决定是否执行","D":"在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行"},"a":"C","an":"证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。","type":"single"},{"id":"cflue_zc_fl5.json_26","q":"根据《证券市场禁入规定》，中国证监会采取证券市场禁入措施前应当告知当事人享有的各项权利中，不包括（）。","c":{"A":"陈述的权利","B":"要求举行听证的权利","C":"申辩的权利","D":"依法聘请律师的权利"},"a":"D","an":"中国证监会采取证券市场禁入措施前，应当告知当事人采取证券市场禁入措施的事实、理由及依据，并告知当事人有陈述、申辩和要求举行听证的权利。","type":"single"},{"id":"cflue_zc_fl5.json_27","q":"根据《证券市场禁入规定》，下列说法正确的有（）。","c":{"A":"组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员采取终身的证券市场禁入措施","B":"严重违反法律、行政法规或者中国证监会有关规定，构成犯罪的，可以对有关责任人员采取终身的证券市场禁入措施","C":"违反法律、行政法规或者中国证监会有关规定，情节严重的，可以对有关责任人员采取3至5年的证券市场禁入措施","D":"行为恶劣、严重扰乱证券市场秩序、严重损害投资者利益或者在重大违法活动中起主要作用等情节较为严重的，可以对有关责任人员采取3至5年的证券市场禁入措施"},"a":"ABC","an":"行为恶劣、严重扰乱证券市场秩序、严重损害投资者利益或者在重大违法活动中起主要作用等情节较为严重的，可以对有关责任人员采取6年至10年的证券市场禁入措施。B错误。","type":"multi"},{"id":"cflue_zc_fl5.json_28","q":"证券评级机构的董事、监事和高级管理人员以及评级从业人员可以在受评级机构或者受评级证券发行人兼职。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券评级机构的董事、监事和高级管理人员以及评级从业人员【不得】在受评级机构或者受评级证券发行人兼职。","type":"judge"},{"id":"cflue_zc_fl5.json_29","q":"证券期货经营机构应当制定工作人员廉洁从业规范，明确廉洁从业要求，加强从业人员廉洁培训和教育，培育廉洁从业文化，（）开展覆盖全体工作人员的连接培训与教育，确保工作人员熟悉廉洁从业的相关规定。","c":{"A":"每月","B":"每个季度","C":"每年","D":"每周"},"a":"C","an":"证券期货经营机构应当制定工作人员廉洁从业规范，明确廉洁从业要求，加强从业人员廉洁培训和教育，培育廉洁从业文化，【每年】开展覆盖全体工作人员的廉洁培训和教育，确保工作人员熟悉廉洁从业的相关规定。","type":"single"},{"id":"cflue_zc_fl5.json_30","q":"某证券公司的下列实践中，能够反映证券行业文化建设基本要求中“牢记社会责任，展现良好形象”的有（）。","c":{"A":"多措并举增加注册资本并积极推动上市","B":"将对口帮扶地区的农副产品引入工会慰问品采购名单并鼓励会员优先选择","C":"积极参与证券行业支持民营企业发展系列资管计划（纾困基金）的设立","D":"建立各业务条线负责人必须出席的定期合规展业交流机制"},"a":"BC","an":"坚持义利兼顾，正道直行，发挥专业特长，加强经济形势分析研究，合力维护市场健康舆论生态，助力国家精准扶贫和乡村振兴，积极参与社会公益事业，与经济社会共生共荣、融合发展。是牢记社会责任，展现良好形象的要求，因此选择D选项。","type":"multi"},{"id":"cflue_zc_fl5.json_31","q":"下列情形中，违反证券经纪业务有关管理规定的有（）。","c":{"A":"将掌握的客户交易信息，提供给他人暗示其从事相关交易活动","B":"向无风险承受能力的投资者推销公司资产管理产品","C":"向客户说明公司的服务职责、范围","D":"采取诋毁其他营业部竞争手段开展业务"},"a":"ABD","an":"根据《关于加强证券经纪业务管理的规定》，证券公司从事证券经纪业务的人员应当客观说明公司业务资格、服务职责、范围等情况，不得提供虚假、误导性信息，不得采取不正当竞争手段开展业务，不得诱导无投资意愿或者无风险承受能力的投资者参与证券交易活动。","type":"multi"},{"id":"cflue_zc_fl5.json_32","q":"保荐代表人出现下列哪种情形，中国证监会可根据情节轻重，自确认之日起3个月到12个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，撤销其保荐代表人资格（）。","c":{"A":"本人及其配偶待有发行人的股份","B":"受发行人与证券服务机构的误导，参与其提供存在虚假记载、误导性陈述或者重大遗漏的文件","C":"因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责","D":"因突发自然灾害未能及时参与辅导工作"},"a":"C","an":"保荐代表人出现下列情形之一的，中国证监会可根据情节轻重，自确认之日起3个月到12个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，撤销其保荐代表人资格：1.尽职调查工作日志缺失或者遗漏、隐瞒重要问题；2.未完成或者未参与辅导工作；3.未参加持续督导工作，或者持续督导工作未勤勉尽职；4.因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责；5.唆使、协助或者参与发行人干扰中国证监会及其发行审核委员会的审核工作；6.严重违反诚实守信、勤勉尽责义务的其他情形。","type":"single"},{"id":"cflue_zc_fl5.json_33","q":"证券从业人员不得从事的活动包括（）。","c":{"A":"从事与其履行职责有利益冲突的业务","B":"接受利益相关方的贿赂或对其进行贿赂","C":"隐匿、伪造、篡改或者毁损交易记录","D":"编造、传播虚假信息"},"a":"ABCD","an":"证券从业人员不得从事以下活动：1、从事内幕交易或利用未公开信息交易活动，泄露利用工作便利获取的内幕信息或其他未公开信息，或明示、暗示他人从事内幕交易活动；2、利用资金优势、持股优势和信息优势，单独或者合谋串通，影响证券交易价格或交易量，误导和干扰市场；3、编造、传播虚假信息，作出虚假陈述或信息误导，扰乱证券市场；4、损害社会公共利益、所在机构或者他人的合法权益；5、从事与其履行职责有利益冲突的业务；6、接受利益相关方的贿赂或对其进行贿赂，如接受或赠送礼物、回扣、补偿或报酬等，或从事可能导致与投资者或所在机构之间产生利益冲突的活动；7、买卖法律明文禁止买卖的证券；8、利用工作之便向任何机构和个人输送利益，损害客户和所在机构利益；9、违规向客户作出投资不受损失或保证最低收益的承诺；10、隐匿、伪造、篡改或者毁损交易记录；11、中国证监会、中国证券业协会禁止的其他行为。","type":"multi"},{"id":"cflue_zc_fl5.json_34","q":"保荐代表人出现（）情形之一的，中国证监会可以根据情节轻重，在3个月到36个月内不受理相关保荐代表人具体负责的推荐，情节严重的，采取认定为不适当人选的监管措施。","c":{"A":"重大事项未报告、未披露","B":"伪造或者变造签字、盖章","C":"尽职调查工作日志缺失或者遗漏、隐瞒重要问题","D":"未完成或者未参加辅导工作"},"a":"ABCD","an":"保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，在3个月到36个月内不受理相关保荐代表人具体负责的推荐；情节特别严重的，釆取认定为不适当人选的监管措施：1、尽职调査工作日志缺失或者遗漏、隐瞒重要问题；2、未完成或者未参加辅导工作；3、重大事项未报告、未披露；4、未参加持续督导工作，或者持续督导工作未勤勉尽责；5、因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责；6、唆使、协助或者参与发行人干扰中国证监会及其发行审核委员会、证券交易所及其上市委员会的审核工作；7、伪造或者变造签字、盖章；8、严重违反诚实守信、勤勉尽责义务的其他情形。","type":"multi"},{"id":"cflue_zc_fl5.json_35","q":"基金销售机构应该遵照《证券业从业人员资格管理办法》《证券业从业人员资格管理实施细则》等要求，统一办理（）。","c":{"A":"绩效考核","B":"执业年检","C":"后续培训","D":"执业注册"},"a":"BCD","an":"基金销售机构应该遵照《证券业从业人员资格管理办法》《证券业从业人员资格管理实施细则》等要求，统一办理执业注册、后续培训和执业年检。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_9","q":"下列属于证券行业文化建设的基本要求的有（）。","c":{"A":"坚持稳健经营，促进健康发展","B":"坚持廉洁自律，弘扬清风正气","C":"牢记社会责任，展现良好形象","D":"坚持创新精神，提升服务能力"},"a":"ABC","an":"行业文化建设的基本要求：1、坚持依法合规，筑牢发展基础；2、坚持诚实守信，恪守职业操守；3、坚持专业精神，提升服务能力；4、坚持稳健经营，促进健康发展；5、坚持廉洁自律，弘扬清风正气；6、牢记社会责任，展现良好形象。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_19","q":"根据《证券业从业人员执业行为准则》，对证券业从业人员的执业行为进行自律管理的主体是（）。","c":{"A":"中国证监会派出机构","B":"中国证券业协会","C":"证券业从业人员所在机构","D":"证券交易所"},"a":"B","an":"对证券业从业人员的执业行为进行自律管理的主体是中国证券业协会。","type":"single"},{"id":"cflue_paper_法律法规_1.json_23","q":"从事证券经纪业务的人员违反《关于加强证券经纪业务管理的规定》的，中国证监会及其派出机构可视情况依法采取的监管措施包括（）。","c":{"A":"出具警示函","B":"暂不受理与行政许可有关的文件","C":"监管谈话","D":"罚款"},"a":"ABC","an":"证券公司及证券营业部违反《关于加强证券经纪业务管理的规定》的，中国证监会及其派出机构将视情况依法采取责令改正、监管谈话、出具警示函、暂不受理与行政许可有关的文件、责令处分有关人员、暂停核准新业务、限制业务活动等监管措施。违反法律法规的，依法进行行政处罚。构成犯罪的，移送司法机关处理。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_33","q":"甲公司系某集团公司的全资子公司，因业务需要，集团公司决定甲公司分立为两个公司，鉴于甲公司已有的债权债务全部发生在集团公司内部，下列说法正确的是（）。","c":{"A":"甲公司分立应当取得债权人同意","B":"分立后，原甲公司的债权债务归集团公司继承","C":"甲公司分立事宜应当在报纸上公告","D":"因甲公司的债权债务均发生于集团公司内部，故其分立无需通知债权人"},"a":"C","an":"公司分立前的债务由分立后的公司承担连带责任。公司应当自作出分立决议之日起十日内通知债权人，并于三十日内在报纸上公告。","type":"single"},{"id":"cflue_paper_法律法规_1.json_45","q":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有（）情形时，应当回避。","c":{"A":"直系亲属在受评级机构担任普通职员","B":"本人、直系亲属合计持有受评级机构发行的证券金额10万元","C":"本人、直系亲属合计持有受评级证券发行人1%的股份","D":"直系亲属是受评级机构、受评级证券发行人的实际控制人"},"a":"D","an":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避：1、本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上，或者是受评级机构、受评级证券发行人的实际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。","type":"single"},{"id":"cflue_paper_法律法规_1.json_55","q":"根据《证券业从业人员资格管理办法》，从事证券业务的专业人员包括（）。","c":{"A":"证券公司中从事自营、经纪、承销等业务的专业人员","B":"证券投资咨询机构中从事证券投资咨询业务的专业人员","C":"证券资信评估机构中从事证券信息评估业务的专业人员","D":"证券公司中从事投资咨询、受托投资管理等业务的专业人员"},"a":"ABCD","an":"从事证券业务的专业人员是指：1、证券公司中从事自营、经纪、承销、投资咨询、受托投资管理等业务的专业人员，包括相关业务部门的管理人员；2、基金管理公司、基金托管机构中从事基金销售、研究分析、投资管理、交易、监察稽核等业务的专业人员，包括相关业务部门的管理人员；基金销售机构中从事基金宣传、推销、咨询等业务的专业人员，包括相关业务部门的管理人员；3、证券投资咨询机构中从事证券投资咨询业务的专业人员及其管理人员；4、证券资信评估机构中从事证券资信评估业务的专业人员及其管理人员；5、中国证监会规定需要取得从业资格和执业证书的其他人员。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_60","q":"（3）保荐代表人违反《证券发行上市保荐业务管理办法》，中国证监会可以采取的监管措施包括（）。","c":{"A":"重点关注","B":"公开谴责","C":"监管谈话","D":"责令进行业务学习"},"a":"ACD","an":"保荐机构、保荐代表人、保荐业务负责人和内核负责人违反本办法，未诚实守信、勤勉尽责地履行相关义务的，中国证监会【责令改正，并对其采取监管谈话、重点关注、责令进行业务学习、出具警示函、责令公开说明、认定为不适当人选】等监管措施；依法应给予行政处罚的，依照有关规定进行处罚；情节严重涉嫌犯罪的，依法移送司法机关，追究其刑事责任。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_5","q":"证券公司可以根据合同约定，为另类子公司提供的支持和服务，不包括（）。","c":{"A":"产品销售","B":"运营服务","C":"人力资源管理","D":"合规管理"},"a":"A","an":"证券公司可以根据合同约定，为另类子公司的合规管理、风险控制、稽核审计、人力资源管理、财务管理、信息技术、研究和运营等方面提供支持和服务。","type":"single"},{"id":"cflue_paper_法律法规_2.json_11","q":"证券评级机构从事证券评级业务，应当遵循一致性原则，对同一类评级对象评级，或者对同一评级对象跟踪评级，应当采用一致的评级标准和工作程序。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_17","q":"下列属于证券行业文化建设的基本要求的有（）。","c":{"A":"坚持稳健经营，促进健康发展","B":"坚持廉洁自律，弘扬清风正气","C":"牢记社会责任，展现良好形象","D":"坚持创新精神，提升服务能力"},"a":"ABC","an":"行业文化建设的基本要求：1、坚持依法合规，筑牢发展基础；2、坚持诚实守信，恪守职业操守；3、坚持专业精神，提升服务能力；4、坚持稳健经营，促进健康发展；5、坚持廉洁自律，弘扬清风正气；6、牢记社会责任，展现良好形象。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_22","q":"（2）下列属于证券行业文化建设的基本要求的有（）。","c":{"A":"牢记社会责任，展现良好形象","B":"坚持廉洁自律，弘扬清风正气","C":"坚持创新精神，提升服务能力","D":"坚持稳健经营，促进健康发展"},"a":"ABD","an":"行业文化建设的基本要求：（1）坚持依法合规，筑牢发展基础；（2）坚持诚实守信，恪守职业操守；（3）坚持【专业】精神，提升服务能力；（4）坚持稳健经营，促进健康发展；（5）坚持廉洁自律，弘扬清风正气；（6）牢记社会责任，展现良好形象。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_41","q":"证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在（）个工作日内，向中国证券业协会有关派出机构报告。","c":{"A":"7","B":"10","C":"12","D":"5"},"a":"D","an":"证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在【5】个工作日内，向中国证券业协会有关派出机构报告。","type":"single"},{"id":"cflue_paper_法律法规_2.json_45","q":"根据《关于加强证券经纪业务管理的规定》，下列关于从事证券经纪业务人员不得存在的行为的说法，不正确的是（）。","c":{"A":"不得提供虚假、误导性信息，不得采取不正当竞争手段开展业务","B":"营销人员可以经办客户账户及客户资金存管业务","C":"不得诱导无投资意愿或者无风险承受能力的投资者参与证券交易活动","D":"证券公司从事证券经纪业务，应当客观说明公司业务资格、服务职责、范围等情况"},"a":"B","an":"根据《关于加强证券经纪业务管理的规定》，营销人员【不得】经办客户账户及客户资金存管业务。","type":"single"},{"id":"cflue_paper_法律法规_2.json_60","q":"根据《证券发行上市保荐业务管理办法》，保荐代表人在2个自然年内被采取监管谈话、重点关注、出具警示函等监管措施累计2次以上，中国证监会可6个月内不受理相关保荐代表人具体负责的推荐。（）","c":{"A":"错","B":"对"},"a":"B","an":"保荐代表人在2个自然年度内被采取《证券发行上市保荐业务管理办法》规定监管措施累计2次以上，中国证监会可6个月内不受理相关保荐代表人具体负责的推荐。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_6","q":"证券评级机构从事证券评级业务，应当制定科学的评级方法和完善的质量控制制度。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_14","q":"（2）根据《证券发行上市保荐业务管理办法》，下列关于保荐代表人应具备的条件，错误的是（）。","c":{"A":"最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施","B":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识","C":"最近12个月持续从事保荐相关业务","D":"最近5年内具备24个月以上保荐相关业务经历"},"a":"D","an":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备【36个月】以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_19","q":"证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有下列（）情形的，中国证监会应当从重处理。","c":{"A":"连续或者多次违反该规定","B":"直接、间接或唆使、协助他人向监管人员输送利益","C":"涉及金额较大或涉及人员较多、产生恶劣社会影响","D":"曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反该规定"},"a":"ABCD","an":"从重处理的情形：1、直接、间接或者唆使、协助他人向监管人员输送利益；2、连续或者多次违反本规定；3、涉及金额较大或者涉及人员较多；4、产生恶劣社会影响；5、曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定；6、中国证监会认定应当从重处理的其他情形。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_24","q":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有（）情形时，应当回避。","c":{"A":"直系亲属在受评级机构担任普通职员","B":"本人、直系亲属合计持有受评级机构发行的证券金额10万元","C":"本人、直系亲属合计持有受评级证券发行人1%的股份","D":"直系亲属是受评级机构、受评级证券发行人的实际控制人"},"a":"D","an":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避：1、本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上，或者是受评级机构、受评级证券发行人的实际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。","type":"single"},{"id":"cflue_paper_法律法规_3.json_26","q":"下列关于证券公司对从事证券经纪业务相关人员的管理要求的说法，错误的是（）。","c":{"A":"客户证券账户转托管和撤销指定交易等业务可由同一人完成操作与复核","B":"涉及客户资金账户及证券账户的开立、信息修改、注销等业务应当一人操作、一人复核，复核应当留痕","C":"与客户权益变动相关业务的经办人员之间，应当建立制衡机制","D":"涉及客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事前审批，事后复核，审批及复核均应留痕"},"a":"A","an":"与客户权益变动相关业务的经办人员之间，应当建立制衡机制。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批，事后复核，审批及复核均应留痕。","type":"single"},{"id":"cflue_paper_法律法规_3.json_53","q":"按照《上市公司并购重组财务顾问业务管理办法》规定，财务顾问主办人应该最近（）个月未因执业行为违法违规受到处罚。","c":{"A":"36","B":"24","C":"12","D":"6"},"a":"A","an":"财务顾问主办人应当具备下列条件：1、具备中国证监会规定的投资银行业务经历；2、参加中国证监会认可的财务顾问主办人胜任能力考试且成绩合格；3、所任职机构同意推荐其担任本机构的财务顾问主办人；4、未负有数额较大到期未清偿的债务；5、最近24个月无违反诚信的不良记录；6、最近24个月未因执业行为违反行业规范而受到行业自律组织的纪律处分；7、最近36个月未因执业行为违法违规受到处罚；8、中国证监会规定的其他条件。","type":"single"},{"id":"cflue_paper_法律法规_4.json_1","q":"有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。","c":{"A":"情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构，保荐代表人具体负责的推荐","B":"中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施","C":"情节严重的，中国证监会可以在6个月到24个月内不受理保荐机构，保荐代表人具体负责的推荐","D":"中国证监会会视情节轻重，采取监管或者市场禁入措施"},"a":"AB","an":"保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施；情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构、保荐代表人具体负责的推荐：1、制作或者出具的文件不齐备或者不符合要求；2、擅自改动申请文件、信息披露资料或者其他已提交文件；3、申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异；4、文件披露的内容表述不清，逻辑混乱，严重影响投资者理解；5、未及时报告或者未及时披露重大事项；6、指定不符合《办法》第四条规定要求的人员具体负责保荐工作；7、未通过内核程序，以公司名义对外提交或披露保荐业务项目文件；8、采取业务包干等承包方式或其他形式进行过度激励；9、以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_15","q":"下列不属于《证券经营机构及其工作人员廉洁从业实施细则》所规定的工作人员范畴的是（）。","c":{"A":"受聘担任证券公司常年法律顾问的执业律师","B":"与证券公司签署委托协议的经纪人","C":"与证券公司建立劳动关系的正式员工","D":"劳务派遣至证券公司的其他人员"},"a":"A","an":"证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。","type":"single"},{"id":"cflue_paper_法律法规_4.json_18","q":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有（）情形时，应当回避。","c":{"A":"直系亲属在受评级机构担任普通职员","B":"本人、直系亲属合计持有受评级机构发行的证券金额10万元","C":"本人、直系亲属合计持有受评级证券发行人1%的股份","D":"直系亲属是受评级机构、受评级证券发行人的实际控制人"},"a":"D","an":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避：1、本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上，或者是受评级机构、受评级证券发行人的实际控制人；2、本人、直系亲属担任受评级机构或者受评级证券发行人的董事、监事和高级管理人员；3、本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人；4、本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元，或者与受评级机构、受评级证券发行人发生累计超过50万元的交易；5、中国证监会认定的足以影响独立、客观、公正原则的其他情形。","type":"single"},{"id":"cflue_paper_法律法规_4.json_20","q":"下列关于私募基金子公司内部控制说法，不正确的是（）。","c":{"A":"私募基金子公司下设的特殊目的机构及其从业人员在处理不同客户之间的利益冲突时，应当遵循重要客户优先原则","B":"证券公司同一高级管理人员不得同时分管投资银行业务和私募基金业务","C":"证券公司应当对本公司集合资产管理业务和私募证券投资基金业务实施统一管理，管理的尺度和标准应当基本一致","D":"私募基金子公司及下设基金管理机构应当指定高级管理人员担任合规及风险管理负责人"},"a":"A","an":"私募基金子公司、下设的特殊目的机构及其从业人员在处理与客户之间的利益冲突时，应当遵循客户利益优先的原则；在处理不同客户之间的利益冲突时，应当遵循【公平对待客户】的原则。","type":"single"},{"id":"cflue_paper_法律法规_4.json_32","q":"（3）保荐代表人违反《证券发行上市保荐业务管理办法》，中国证监会可以采取的监管措施包括（）。","c":{"A":"重点关注","B":"公开谴责","C":"监管谈话","D":"责令进行业务学习"},"a":"ACD","an":"保荐机构、保荐代表人、保荐业务负责人和内核负责人违反本办法，未诚实守信、勤勉尽责地履行相关义务的，中国证监会【责令改正，并对其采取监管谈话、重点关注、责令进行业务学习、出具警示函、责令公开说明、认定为不适当人选】等监管措施；依法应给予行政处罚的，依照有关规定进行处罚；情节严重涉嫌犯罪的，依法移送司法机关，追究其刑事责任。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_43","q":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券公司中间介绍业务，应当经中国证监会许可，取得相关业务资格。（）","c":{"A":"错","B":"对"},"a":"A","an":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，取得证券投资咨询业务资格。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_11","q":"关于私募基金子公司下列说法中，不正确的是（）。","c":{"A":"私募基金子公司不得从事与私募基金无关的业务","B":"私募基金子公司应当在完成工商登记后的10个工作日内在本公司及证券公司网站上披露私募基金子公司的名称、注册地、注册资本、业务范围、法定代表人、高级管理人员以及防范风险传递、利益冲突的制度安排等事项，并及时更新","C":"证券公司应当清晰划分证券公司与私募基金子公司及私募基金子公司与其他子公司之间的业务范围，避免利益冲突和同业竞争","D":"每家证券公司设立的私募基金子公司原则上不超过一家"},"a":"B","an":"私募基金子公司应当在完成工商登记后的【5个工作日内】在本公司及证券公司网站上披露私募基金子公司的名称、注册地、注册资本、业务范围、法定代表人、高级管理人员以及防范风险传递、利益冲突的制度安排等事项，并及时更新。","type":"single"},{"id":"cflue_paper_法律法规_5.json_24","q":"根据《证券业从业人员资格管理办法》，从事证券业务的专业人员不包括（）。","c":{"A":"证券资信评估机构中从事证券资信评估业务的专业人员","B":"信托机构业务部门的管理人员","C":"证券公司从事证券经纪业务部门的管理人员","D":"证券投资咨询机构从事证券投资咨询业务的专业人员"},"a":"B","an":"根据《证券业从业人员资格管理办法》，从事证券业务的专业人员是指：1.证券公司中从事自营、经纪、承销、投资咨询、受托投资管理等业务的专业人员，包括相关业务部门的管理人员；2.基金管理公司、基金托管机构中从事基金销售、研究分析、投资管理、交易、监察稽核等业务的专业人员，包括相关业务部门的管理人员；基金销售机构中从事基金宣传、推销、咨询等业务的专业人员，包括相关业务部门的管理人员；3.证券投资咨询机构中从事证券投资咨询业务的专业人员及其管理人员；4.证券资信评估机构中从事证券资信评估业务的专业人员及其管理人员；5.中国证监会规定需要取得从业资格和执业证书的其他人员。","type":"single"},{"id":"cflue_paper_法律法规_5.json_35","q":"根据《关于证券业从业人员登记管理有关事项的通知》，从业人员受到刑事处罚、被证券市场禁入或受到协会“终止执业”纪律处分的，协会予以（）。","c":{"A":"中止登记","B":"注销登记","C":"终生追责","D":"联合惩戒"},"a":"B","an":"从业人员受到协会“暂停执业”纪律处分的，协会予以中止登记。从业人员受到刑事处罚、被证券市场禁入或受到协会“终止执业”纪律处分的，协会予以【注销登记】。","type":"single"},{"id":"cflue_paper_法律法规_5.json_41","q":"证券公司可以根据合同约定，为另类子公司提供的支持和服务，不包括（）。","c":{"A":"产品销售","B":"运营服务","C":"人力资源管理","D":"合规管理"},"a":"A","an":"证券公司可以根据合同约定，为另类子公司的合规管理、风险控制、稽核审计、人力资源管理、财务管理、信息技术、研究和运营等方面提供支持和服务。","type":"single"},{"id":"cflue_paper_法律法规_5.json_60","q":"根据《证券市场禁入规定》，中国证监会采取证券市场禁入措施前应当告知当事人享有的各项权利中，不包括（）。","c":{"A":"陈述的权利","B":"要求举行听证的权利","C":"申辩的权利","D":"依法聘请律师的权利"},"a":"D","an":"中国证监会采取证券市场禁入措施前，应当告知当事人采取证券市场禁入措施的事实、理由及依据，并告知当事人有陈述、申辩和要求举行听证的权利。","type":"single"},{"id":"cflue_mock_1.json_42","q":"根据《证券市场禁入规定》，中国证监会采取证券市场禁入措施前应当告知当事人享有的各项权利中，不包括（）。","c":{"A":"陈述的权利","B":"要求举行听证的权利","C":"申辩的权利","D":"依法聘请律师的权利"},"a":"D","an":"中国证监会采取证券市场禁入措施前，应当告知当事人采取证券市场禁入措施的事实、理由及依据，并告知当事人有陈述、申辩和要求举行听证的权利。","type":"single"},{"id":"cflue_mock_1.json_44","q":"证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有（）情形的，中国证监会应当从重处理。","c":{"A":"曾为公职人员","B":"涉及金额较大","C":"违反该规定后及时报告","D":"连续或者多次违反该规定"},"a":"ABD","an":"从重处理的情形：1、直接、间接或者唆使、协助他人向监管人员输送利益；2、连续或者多次违反本规定；3、涉及金额较大或者涉及人员较多；4、产生恶劣社会影响；5、曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定；6、中国证监会认定应当从重处理的其他情形。","type":"multi"},{"id":"cflue_mock_1.json_48","q":"财务顾问应当建立健全内部报告制度，并对证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由（）签名，并加盖财务顾问单位签章。","c":{"A":"财务顾问主办人","B":"部门负责人","C":"项目协办人","D":"财务顾问的法定代表人或者其授权代表人"},"a":"ACD","an":"财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核査机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人签名，并加盖财务顾问单位公章。","type":"multi"},{"id":"cflue_mock_1.json_50","q":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券公司中间介绍业务，应当经中国证监会许可，取得相关业务资格。（）","c":{"A":"错","B":"对"},"a":"A","an":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，取得证券投资咨询业务资格。","type":"judge"},{"id":"cflue_mock_1.json_76","q":"根据《关于证券业从业人员登记管理有关事项的通知》，下列关于证券业从业人员违规处理的说法，错误的是（）。","c":{"A":"从业人员受到刑事处罚的，中国证券业协会予以中止登记","B":"从业人员被证券市场禁入的，中国证券业协会子以注销登记","C":"从业人员受到中国证券业协会“终止执业”纪律处分的，中国证券业协会子以注销登记","D":"从业人员受到中国证券业协会“暂停执业”纪律处分的，中国证券业协会予以中止登记"},"a":"A","an":"从业人员受到刑事处罚、被证券市场禁入或受到协会“终止执业”纪律处分的，协会予以注销登记。","type":"single"},{"id":"cflue_mock_1.json_80","q":"下列不属于《证券经营机构及其工作人员廉洁从业实施细则》所规定的工作人员范畴的是（）。","c":{"A":"受聘担任证券公司常年法律顾问的执业律师","B":"与证券公司签署委托协议的经纪人","C":"与证券公司建立劳动关系的正式员工","D":"劳务派遣至证券公司的其他人员"},"a":"A","an":"证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。","type":"single"},{"id":"cflue_mock_1.json_94","q":"除财务顾问的法定代表人或者其授权代表人之外，应当在财务顾问专业意见上签名的还有（），并加盖财务顾问单位公章。","c":{"A":"项目协办人","B":"财务顾问主办人","C":"部门负责人","D":"内部核查机构负责人"},"a":"ABCD","an":"财务顾问的法定代表人或者其授权代表人、部门负责人、内部核查机构负责人、财务顾问主办人和项目协办人应当在财务顾问专业意见上签名，并加盖财务顾问单位公章。","type":"multi"},{"id":"cflue_mock_1.json_108","q":"根据《关于加强证券经纪业务管理的规定》，下列关于从事证券经纪业务人员不得存在的行为的说法，不正确的是（）。","c":{"A":"不得提供虚假、误导性信息，不得采取不正当竞争手段开展业务","B":"营销人员可以经办客户账户及客户资金存管业务","C":"不得诱导无投资意愿或者无风险承受能力的投资者参与证券交易活动","D":"证券公司从事证券经纪业务，应当客观说明公司业务资格、服务职责、范围等情况"},"a":"B","an":"根据《关于加强证券经纪业务管理的规定》，营销人员【不得】经办客户账户及客户资金存管业务。","type":"single"},{"id":"cflue_mock_1.json_116","q":"被采取市场禁入措施的人员，应当遵循的规定包括（）。","c":{"A":"由所在机构按规定程序解除其被禁止担任的职务","B":"不得在任何公司担任董事、监事、高级管理人员职务","C":"立即停止从事证券业务","D":"立即停止履行上市公司董事、监事、高级管理人员职务"},"a":"ACD","an":"被采取证券市场禁入措施的人员：1、在禁入期间内，除不得继续在原机构从事证券业务或者担任原上市公司董事、监事、高级管理人员职务外，也不得在其他任何机构中从事证券业务或者担任其他上市公司董事、监事、高级管理人员职务。2、应当在收到中国证监会作出的证券市场禁入决定后，立即停止从事证券业务或者停止履行上市公司董事、监事、高级管理人员职务，并由其所在机构按规定的程序解除其被禁止担任的职务。","type":"multi"},{"id":"cflue_mock_2.json_4","q":"根据《关于加强证券经纪业务管理的规定》，下列关于从事证券经纪业务人员不得存在的行为的说法，不正确的是（）。","c":{"A":"不得提供虚假、误导性信息，不得采取不正当竞争手段开展业务","B":"营销人员可以经办客户账户及客户资金存管业务","C":"不得诱导无投资意愿或者无风险承受能力的投资者参与证券交易活动","D":"证券公司从事证券经纪业务，应当客观说明公司业务资格、服务职责、范围等情况"},"a":"B","an":"根据《关于加强证券经纪业务管理的规定》，营销人员【不得】经办客户账户及客户资金存管业务。","type":"single"},{"id":"cflue_mock_2.json_56","q":"（2）根据《证券发行上市保荐业务管理办法》，下列关于保荐代表人应具备的条件，错误的是（）。","c":{"A":"最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施","B":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识","C":"最近12个月持续从事保荐相关业务","D":"最近5年内具备24个月以上保荐相关业务经历"},"a":"D","an":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备【36个月】以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施。","type":"multi"},{"id":"cflue_mock_2.json_66","q":"公司的高级管理人员，不包括（）。","c":{"A":"财务负责人","B":"上市公司董事会秘书","C":"经理、副经理","D":"经理助理"},"a":"D","an":"高级管理人员，指的是公司的经理、副经理、财务负责人，上市公司董事会秘书。经理助理不属于高级管理人员。","type":"single"},{"id":"cflue_mock_2.json_67","q":"交易所市场发行国债的分销时，下列说法正确的是（）。","c":{"A":"证券交易所为同一期（次）国债向不同承销商提供同一承销代码","B":"投资者通过交易所买入债券时，缴纳佣金","C":"通过证券交易所交易后，国债不会自动过户到客户的账户内","D":"在实际运作中，承销商可以选择场内挂牌分销或场外分销两种方式"},"a":"D","an":"证券交易所为每一承销商确定当期国债【各自的承销代码】，以便于场内挂牌。B错误。投资者在买入债券时，可免缴佣金，C错误。买卖成交后，客户认购的国债自动过户至客户的账户内，D错误。","type":"single"},{"id":"cflue_mock_2.json_82","q":"从事证券经纪业务的人员违反《关于加强证券经纪业务管理的规定》的，中国证监会及其派出机构可视情况依法采取的监管措施包括（）。","c":{"A":"出具警示函","B":"暂不受理与行政许可有关的文件","C":"监管谈话","D":"罚款"},"a":"ABC","an":"证券公司及证券营业部违反《关于加强证券经纪业务管理的规定》的，中国证监会及其派出机构将视情况依法采取责令改正、监管谈话、出具警示函、暂不受理与行政许可有关的文件、责令处分有关人员、暂停核准新业务、限制业务活动等监管措施。违反法律法规的，依法进行行政处罚。构成犯罪的，移送司法机关处理。","type":"multi"},{"id":"cflue_mock_2.json_98","q":"下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，不正确的是（）。","c":{"A":"在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行","B":"已成为证券业协会会员的证券公司境内子公司应当执行","C":"证券投资咨询公司可自行决定是否执行","D":"证券资信评级公司在从事证券相关业务时应参照执行"},"a":"C","an":"证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。","type":"single"},{"id":"cflue_mock_2.json_110","q":"下列关于股份有限公司合并决议的说法，不正确的是（）。","c":{"A":"必须经出席会议的2/3以上有表决权的股东通过","B":"必须经出席会议的股东所持表决权的2/3以上通过","C":"必须经代表2/3以上表决权的股东通过","D":"必须经2/3以上股东通过"},"a":"ACD","an":"公司合并或分立，应当由公司的股东（大）会作出决议。有限责任公司，必须经代表2/3以上表决权的股东通过。股份有限公司，必须经出席会议的股东所持表决权的2/3以上通过。","type":"multi"},{"id":"comp_01297","q":"下列选项中，属于证券行业文化建设基本要求的有（）。","c":{"A":"坚持合规经营，不突破监管底线","B":"坚持诚实守信，不损害客户利益","C":"坚持专业精神，持续提升服务能力","D":"坚持稳健发展，审慎控制风险"},"a":"ABCD","an":"四个选项均正确，对应行业文化建设的合规、诚信、专业、稳健四大基本要求。证券行业文化建设是证券行业健康发展的重要基础，各证券公司应当将文化建设融入公司治理和经营管理的各个环节。","type":"comprehensive","material":"中国证券业协会发布了《证券行业文化建设十要素》，要求证券公司形成「合规、诚信、专业、稳健「的行业文化。证券从业人员应当遵守职业道德，不得从事任何违法违规行为。","sub_type":"multi"},{"id":"comp_85962","q":"根据证券从业人员行为规范，从业人员不得从事的行为包括（）。","c":{"A":"利用内幕信息买卖证券","B":"接受客户委托代理买卖证券","C":"诱导客户进行不必要的证券买卖","D":"向客户承诺投资收益"},"a":"ACD","an":"选项B不属于禁止行为。证券从业人员在取得执业资格后，按照公司安排接受客户委托代理买卖证券是正常的经纪业务行为。而利用内幕信息交易、诱导不必要交易、承诺收益均属于明确禁止的违法违规行为。","type":"comprehensive","material":"中国证券业协会发布了《证券行业文化建设十要素》，要求证券公司形成「合规、诚信、专业、稳健「的行业文化。证券从业人员应当遵守职业道德，不得从事任何违法违规行为。","sub_type":"multi"},{"id":"cy_law_617","q":"证券公司申请融资融券业务资格，其客户资产安全、完整，客户交易结算资金实行(  )。","c":{"A":"统一存管","B":"集中管理","C":"第三方存管","D":"有效控制"},"a":"C","an":"证券公司申请融资融券业务资格，其客户资产安全、完整，客户交易结算资金实行第三方存管（C选项正确），客户资料完整真实。","type":"single"},{"id":"cy_law_619","q":"证券经纪人可以代理证券公司进行(  )。","c":{"A":"代客户获取收益","B":"客户服务","C":"代理客户下单","D":"客户招揽"},"a":"B,D","an":"根据《证券公司监督管理条例》的规定，证券公司从事证券经纪业务，可以委托证券公司以外的人员作为证券经纪人，代理其进行客户招揽、客户服务等活动。BD选项正确。 A选项属于违规行为，不能做；C选项不得直接代理客户进行证券交易，客户的交易指令必须由客户本人通过证券公司交易系统自主发出。","type":"multi"},{"id":"cy_law_621","q":"我国证券市场法律法规体系，是以（）为核心，以规范证券市场的运行为目的，由相关法律、行政法规、部门规章、规范性文件及行业自律规则等构成的法律法规体系。","c":{"A":"《证券法》","B":"《公司法》","C":"《刑法》","D":"《证券投资基金法》"},"a":"A","an":"选项A正确：我国证券市场法律法规体系，是以《证券法》为核心，以规范证券市场的运行为目的，由相关法律、行政法规、部门规章、规范性文件及行业自律规则等构成的法律法规体系。 选项BCD为干扰项，《公司法》、《刑法》和《证券投资基金法》虽然也在证券市场中扮演重要角色，但不是整个证券市场法律法规体系的核心。","type":"single"},{"id":"cy_law_623","q":"《证券公司监督管理条例》是（）。","c":{"A":"行政法规","B":"自律管理","C":"法律","D":"部门规章"},"a":"A","an":"选项A正确：《证券公司监督管理条例》属于行政法规，行政法规由国务院制定。 选项B错误：自律管理规则是由行业自律组织如中国证券业协会等制定。比如《中国证券业协会证券经纪人执业规范试行》。 选项C错误：法律则是由全国人大及其常委会制定。比如《公司法》。 选项D错误：部门规章则是由国务院各部门依据法律和国务院的行政法规、决定、命令，在本部门的权限范围内制定。比如《证券公司融资融券业务管理办法》《证券经纪业务管理办法》等。","type":"single"},{"id":"cy_law_625","q":"X证券公司为全国性综合类证券公司，下列机构中，享有法人财产权的有（  ）。","c":{"A":"X证券陕西分公司","B":"X证券西安营业部","C":"X证券所属私募投资基金子公司","D":"X证券所属另类投资子公司"},"a":"C,D","an":"选项CD正确：子公司具有法人资格，能够依法独立承担民事责任。 选项AB错误：分公司不具有法人资格，其民事责任由公司承担。","type":"multi"},{"id":"cy_law_627","q":"根据《公司法》的规定，因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾（）的，不得担任证券交易所的负责人。","c":{"A":"1年","B":"2年","C":"3年","D":"5年"},"a":"D","an":"选项D正确：因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾5年的，不得担任证券交易所的负责人。","type":"single"},{"id":"cy_law_629","q":"下列关于违反证券交易规定的法律责任，说法错误的是（）。","c":{"A":"证券公司经纪人李某使用其父亲账户买卖股票，被没收违法所得","B":"王某在成为证券公司员工以前持有的股票，入职后不用转让","C":"证券监督管理机构工作人员张某化名持有股票被处以买卖证券等值以下的罚款","D":"为甲证券营业部做装修工作的赵某，可以买卖股票"},"a":"B","an":"题目问的是“说法错误的”。选项B：根据《证券法》第四十条的规定，证券交易场所、证券公司和证券登记结算机构的从业人员、证券监督管理机构的工作人员以及法律、行政法规规定禁止参与股票交易的其他人员，在任期或者法定限期内，既不得直接或者以化名、借他人名义持有、买卖股票或者其他具有股权性质的证券，也不得收受他人赠送的股票或者其他具有股权性质的证券。任何人在成为前述人员时，其原已持有的股票或者其他具有股权性质的证券，必须依法转让（而非不用转让，B错误）。因此答案选择B。 选项AC正确：根据《证券法》第一百八十七条的规定，法律、行政法规规定禁止参与股票交易的人员，违反《证券法》第四十条的规定，直接或者以化名、借他人名义持有、买卖股票的或者其他具有股权性质的证券的，责令依法处理非法持有的股票、其他具有股权性质的证券，没收违法所得，并处以买卖证券等值以下的罚款；属于国家工作人员的，还应当依法给予处分。 选项D正确：赵某为甲证券营业部做装修工作，并不属于《证券法》中禁止参与股票交易的人员范围。","type":"single"},{"id":"cy_law_631","q":"下列有关证券交易的事项中，说法正确的是（）。","c":{"A":"依法发行的股票、债券及其他证券，法律对其转让期限有限制性规定的，在限定的期限内，有特殊情形时，可以买卖","B":"公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他全国性证券交易场所交易","C":"非依法发行的证券，可以进行买卖","D":"证券在证券交易所上市交易，应当采用非公开的集中交易方式或者国务院证券监督管理机构批准的其他方式"},"a":"B","an":"选项B正确：公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他全国性证券交易场所交易。 选项A错误：依法发行的证券，《中华人民共和国公司法》和其他法律对其转让期限有限制性规定的，在限定的期限内【不得转让】。 选项C错误：证券交易当事人依法买卖的证券，必须是依法发行并交付的证券。非依法发行的证券，【不得买卖】。 选项D错误：证券在证券交易所上市交易，应当采用【公开】的集中交易方式或者国务院证券监督管理机构批准的其他方式。","type":"single"},{"id":"cy_law_633","q":"向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的（）组成。","c":{"A":"证券公司","B":"会计师事务所","C":"律师事务所","D":"证券交易所"},"a":"A","an":"选项A正确：《证券法》规定，向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的【证券公司】组成。 选项B错误：会计师事务所在证券发行过程中承担重要角色（如审计）。 选项C错误：律师事务所主要提供法律意见和支持。 选项D错误：证券交易所是证券交易的场所。","type":"single"},{"id":"cy_law_635","q":"证券公司违反证券法的规定从事证券自营业务的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足（）元的，处以（）的罚款。","c":{"A":"三十万；三十万元以上三百万元以下","B":"五十万；五十万元以上五百万元以下","C":"二十万；二十万元以上二百万元以下","D":"四十万；四十万元以上四百万元以下"},"a":"B","an":"选项B正确：《证券法》第二百零七条的规定，证券公司违反本法第一百二十九条的规定从事证券自营业务的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足【五十万元】的，处以【五十万元以上五百万元以下】的罚款；情节严重的，并处撤销相关业务许可或者责令关闭。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。","type":"single"},{"id":"cy_law_637","q":"证券公司及其主要股东、实际控制人违反相关规定，未报送、提供信息和资料，或者报送、提供的信息和资料有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以()的罚款；情节严重的，并处撤销相关业务许可。","c":{"A":"30万元以下","B":"10万元以下","C":"100万元以下","D":"50万元以下"},"a":"C","an":"选项C正确：根据《证券法》第二百一十一条的规定，证券公司及其主要股东、实际控制人违反《证券法》第一百三十八条的规定，未报送、提供信息和资料的，或者报送、提供的信息和资料有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以100万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员，给予警告，并处以50万元以下的罚款。","type":"single"},{"id":"cy_law_639","q":"证券服务机构违反《证券法》的规定，未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正。如果有业务收入，则没收业务收入，并处以业务收入（）的罚款。","c":{"A":"1倍以上3倍以下","B":"1倍以上5倍以下","C":"1倍以上10倍以下","D":"1倍以上20倍以下"},"a":"C","an":"选项C正确：证券服务机构违反《证券法》第一百六十三条的规定，未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处以业务收入1倍以上10倍以下的罚款，没有业务收入或者业务收入不足50万元的，处以50万元以上500万元以下的罚款；情节严重的，并处暂停或者禁止从事证券服务业务。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_law_641","q":"现行适用的《证券法》为根据2019年12月28日第十三届全国人民代表大会常务委员会第十五次会议修订后的《证券法》，于（）起施行。","c":{"A":"2019年12月28日","B":"2020年1月1日","C":"2020年3月1日","D":"2020年5月1日"},"a":"C","an":"选项C正确：现行适用的《证券法》为根据2019年12月28日第十三届全国人民代表大会常务委员会第十五次会议修订后的《证券法》，于2020年3月1日起施行。","type":"single"},{"id":"cy_law_643","q":"根据《中华人民共和国证券法》的规定，公司营业用主要资产的抵押、质押、出售或者报废一次超过该资产（）的，属于公司的内幕信息。","c":{"A":"0.4","B":"0.25","C":"0.3","D":"0.15"},"a":"C","an":"选项C正确：公司的重大投资行为，公司在一年内购买、出售重大资产超过公司资产总额30%，或者公司营业用主要资产的抵押、质押、出售或者报废一次超过该资产的30%均属于内幕信息。  选项ABD为干扰项。","type":"single"},{"id":"cy_law_645","q":"证券交易场所、证券公司、证券登记结算机构、证券服务机构及其从业人员对证券交易中发现的禁止的交易行为，应当及时向（）报告。","c":{"A":"证券监督管理机构","B":"国务院","C":"公安局","D":"法院"},"a":"A","an":"选项A正确：证券交易场所、证券公司、证券登记结算机构、证券服务机构及其从业人员对证券交易中发现的禁止的交易行为，应当及时向【证券监督管理机构】报告。 选项B错误：国务院是国家最高行政机关，并不是直接负责监管证券市场的机构。 选项C错误：公安局主要负责社会治安和刑事犯罪案件的处理，不直接管理证券市场的违规行为。 选项D错误：法院是司法机关，主要负责审理案件，而不是监管证券市场。","type":"single"},{"id":"cy_law_647","q":"证券发行、交易活动的当事人具有平等的法律地位，应当遵守的原则不包括（）。","c":{"A":"自愿","B":"有偿","C":"无偿","D":"诚实信用"},"a":"C","an":"题目问的是“不包括”。选项C：根据《证券法》的规定，证券发行、交易活动的当事人具有平等的法律地位，应当遵守自愿、有偿、诚实信用（不包括无偿原则）的原则。因此答案选择C。","type":"single"},{"id":"cy_law_649","q":"下列有关证券交易所的规定，说法正确的是（）。","c":{"A":"证券交易所设理事会，并设总经理1人，总经理由证券交易所的会员公开选举","B":"证券交易所章程的制定和修改，必须经国务院证券监督管理机构批准","C":"证券交易所的财产积累归会员所有，在其存续期间，每一会计年度期末进行分配","D":"个人不得使用证券交易所或者近似的名称，但是单位可以"},"a":"B","an":"选项B正确：根据《证券法》第九十九条：证券交易所履行自律管理职能，应当遵守社会公共利益优先原则，维护市场的公平、有序、透明。设立证券交易所必须制定章程。证券交易所章程的制定和修改，必须经国务院证券监督管理机构批准。 选项A错误：根据《证券法》第一百零二条：实行会员制的证券交易所设理事会、监事会。证券交易所设总经理一人，由国务院证券监督管理机构（而不是会员公开选举）任免。 选项C错误：根据《证券法》第一百零一条：证券交易所可以自行支配的各项费用收入，应当首先用于保证其证券交易场所和设施的正常运行并逐步改善。 实行会员制的证券交易所的财产积累归会员所有，其权益由会员共同享有，在其存续期间，不得将其财产积累分配给会员（而非每一会计年度期末进行分配）。 选项D错误：根据《证券法》第一百条：证券交易所必须在其名称中标明证券交易所字样。其他任何单位（而非单位可以）或者个人不得使用证券交易所或者近似的名称。","type":"single"},{"id":"cy_law_651","q":"擅自设立证券公司、非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，对直接负责的主管人员和其他直接责任人员给予（）的罚款。","c":{"A":"开除，并处以二十万元以上二百万元以下","B":"警告，并处以二十万元以上二百万元以下","C":"开除，并处以十万元以上一百万元以下","D":"警告，并处以十万元以上一百万元以下"},"a":"B","an":"选项B正确：根据《证券法》规定，擅自设立证券公司、非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，责令改正，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。对擅自设立的证券公司，由国务院证券监督管理机构予以取缔。 选项ACD错误：开除属于用人单位的内部处分，而非《证券法》规定的行政处罚措施。处罚金额属于法定处罚。","type":"single"},{"id":"cy_law_653","q":"证券公司违反证券法的规定允许他人以证券公司的名义直接参与证券的集中交易的，责令改正，可以并处（）的罚款。","c":{"A":"五十万元以上","B":"五十万元以下","C":"十万元以上","D":"十万元以下"},"a":"B","an":"选项B正确：证券公司违反《证券法》第一百三十四条第二款的规定，允许他人以证券公司的名义直接参与证券的集中交易的，责令改正，可以并处五十万元以下的罚款。 选项ACD为干扰项。","type":"single"},{"id":"cy_law_655","q":"证券公司违反证券法的规定，为其股东或者股东的关联人提供融资或者担保的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"十万元以上一百万元以下","B":"二十万元以上二百万元以下","C":"三十万元以上三百万元以下","D":"五十万元以上五百万元以下"},"a":"D","an":"选项D正确：《证券法》第二百零五条的规定，证券公司违反本法第一百二十三条第二款的规定，为其股东或者股东的关联人提供融资或者担保的，责令改正，给予警告，并处以五十万元以上五百万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款。股东有过错的，在按照要求改正前，国务院证券监督管理机构可以限制其股东权利；拒不改正的，可以责令其转让所持证券公司股权。 选项ABC为干扰项。","type":"single"},{"id":"cy_law_657","q":"证券公司的从业人员违反证券法的规定，私下接受客户委托买卖证券的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得的，处以（）的罚款。","c":{"A":"十万元以下","B":"二十万元以下","C":"三十万元以下","D":"五十万元以下"},"a":"D","an":"选项D正确：《证券法》第二百一十条的规定，证券公司的从业人员违反本法第一百三十六条的规定，私下接受客户委托买卖证券的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得的，处以五十万元以下的罚款。 选项ABC为干扰项。","type":"single"},{"id":"cy_law_659","q":"我国《证券法》规定的上市公司收购方式包括（）。","c":{"A":"要约收购","B":"协议收购","C":"竞价收购","D":"集中收购"},"a":"A,B","an":"选项AB正确：我国《证券法》规定的上市公司收购方式包括要约收购、协议收购和其他合法收购方式。 选项CD错误：为干扰项，“竞价收购”和“集中收购”并不是《证券法》中明确规定的上市公司收购方式。","type":"multi"},{"id":"cy_law_661","q":"证券公司违反证券法第一百二十二条的规定，未经核准变更证券业务范围，变更主要股东或者公司的实际控制人，（）的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款；情节严重的，并处撤销相关业务许可。","c":{"A":"合并","B":"分立","C":"停业","D":"解散"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券法》第二百零四条的规定，证券公司违反本法第一百二十二条的规定，未经核准变更证券业务范围，变更主要股东或者公司的实际控制人，合并、分立、停业、解散、破产的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。","type":"multi"},{"id":"cy_law_663","q":"下列关于证券交易的说法中，正确的有（）。","c":{"A":"证券交易当事人依法买卖的证券，必须是依法发行并交付的证券","B":"证券交易的收费必须合理，并公开收费项目、收费标准和管理办法","C":"证券交易当事人买卖的证券可以采用纸面形式","D":"依法发行的证券，《中华人民共和国公司法》和其他法律对其转让期限有限制性规定的，在限定的期限内可以转让"},"a":"A,B,C","an":"选项A正确：证券交易当事人依法买卖的证券，必须是依法发行并交付的证券。非依法发行的证券，不得买卖。 选项B正确：证券交易的收费必须合理，并公开收费项目、收费标准和管理办法。 选项C正确：证券交易当事人买卖的证券可以采用纸面形式或者国务院证券监督管理机构规定的其他形式。 选项D错误：依法发行的证券，《中华人民共和国公司法》和其他法律对其转让期限有限制性规定的，在限定的期限内【不得转让】。","type":"multi"},{"id":"cy_law_665","q":"证券交易场所、证券公司和证券登记结算机构的从业人员，证券监督管理机构的工作人员以及法律、行政法规规定禁止参与股票交易的其他人员，在任期或者法定限期内，不得（）。","c":{"A":"直接持有具有股权性质的证券","B":"借他人名义持有具有股权性质的证券","C":"收受他人赠送的股票","D":"以化名买卖其他具有股权性质的证券"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券法》第四十条的规定，证券交易场所、证券公司和证券登记结算机构的从业人员、证券监督管理机构的工作人员以及法律、行政法规规定禁止参与股票交易的其他人员，在任期或者法定限期内，既不得直接或者以化名、借他人名义持有、买卖股票或者其他具有股权性质的证券，也不得收受他人赠送的股票或者其他具有股权性质的证券。 任何人在成为前述人员时，其原已持有的股票或者其他具有股权性质的证券，必须依法转让。实施股权激励计划或者员工持股计划的证券公司的从业人员，可以按照国务院证券监督管理机构的规定持有、卖出本公司股票或者其他具有股权性质的证券。","type":"multi"},{"id":"cy_law_667","q":"下列关于擅自公开或者变相公开发行证券的说法中，正确的有()。","c":{"A":"对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同县级以上地方人民政府予以取缔","B":"违反相关规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额5%以上10%以下的罚款","C":"违反相关规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额5%以上50%以下的罚款","D":"对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款"},"a":"A,C,D","an":"根据《证券法》第一百八十条的规定，违反《证券法》第九条的规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额5%以上50%以下的罚款（C正确，B错误）；对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同县级以上地方人民政府予以取缔（A正确）。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款（D正确）。 综上，该题选ACD。","type":"multi"},{"id":"cy_law_669","q":"按照《证券公司监督管理条例》的规定，净资产低于实收资本的50％，或者或有负债达到净资产的（）％的单位或者个人，不得成为持有证券公司5％以上股权的股东、实际控制人。","c":{"A":"20","B":"30","C":"40","D":"50"},"a":"D","an":"选项D正确：根据《证券公司监督管理条例》第十条的规定，有下列情形之一的单位或者个人，不得成为持有证券公司5%以上股权的股东、实际控制人： （1）因故意犯罪被判处刑罚，刑罚执行完毕未逾3年； （2）净资产低于实收资本的50%，或者或有负债达到净资产的【50%】； （3）不能清偿到期债务。","type":"single"},{"id":"cy_law_671","q":"《证券公司监督管理条例》第十条规定，因故意犯罪被判处刑罚，刑罚执行完毕未逾（）年的个人，不得成为持有证券公司5％以上股权的股东、实际控制人。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"C","an":"选项C正确：根据《证券公司监督管理条例》第十条的规定，有下列情形之一的单位或者个人，不得成为持有证券公司5%以上股权的股东、实际控制人： （1）因故意犯罪被判处刑罚，刑罚执行完毕未逾3年； （2）净资产低于实收资本的50%，或者或有负债达到净资产的50%； （3）不能清偿到期债务。","type":"single"},{"id":"cy_law_673","q":"根据《证券公司监督管理条例》，未经批准，认购、受让或者实际控制证券公司的股权的，责令改正，给予警告，没收违法所得，并处以违法所得（）的罚款。","c":{"A":"1倍以上3倍以下","B":"1倍以上5倍以下","C":"3倍以上5倍以下","D":"5倍以上10倍以下"},"a":"B","an":"选项B正确：根据《证券公司监督管理条例》第八十六条的规定，未经批准，委托他人或者接受他人委托持有或者管理证券公司的股权，或者认购、受让或者实际控制证券公司的股权的，责令改正，给予警告，没收违法所得，并处以违法所得【1倍以上5倍以下】的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上60万元以下的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_675","q":"根据《证券公司监督管理条例》，未经批准，委托他人或者接受他人委托持有或者管理证券公司的股权，若没有违法所得或者违法所得不足10万元的，处以10万元以上（）万元以下的罚款。","c":{"A":"30","B":"40","C":"50","D":"60"},"a":"D","an":"选项D正确：根据《证券公司监督管理条例》第八十六条的规定，未经批准，委托他人或者接受他人委托持有或者管理证券公司的股权，或者认购、受让或者实际控制证券公司的股权的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上【60万元以下】的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_677","q":"根据《证券公司监督管理条例》，合规负责人未按照规定向国务院证券监督管理机构或者有关自律组织报告违法违规行为的，责令改正，给予警告，没收违法所得，并处以违法所得等值罚款；没有违法所得或者违法所得不足3万元的，处以（）万元以下的罚款。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"A","an":"选项A正确：根据《证券公司监督管理条例》第八十九条的规定，合规负责人未按照规定向国务院证券监督管理机构或者有关自律组织报告违法违规行为的，责令改正，给予警告，没收违法所得，并处以违法所得等值罚款；没有违法所得或者违法所得不足3万元的，处以【3万元以下】的罚款。","type":"single"},{"id":"cy_law_679","q":"根据《证券公司监督管理条例》，证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上（）万元以下的罚款。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"B","an":"选项B正确：根据《证券公司监督管理条例》第八十四条的规定，证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、【3万元以上10万元以下】的罚款。","type":"single"},{"id":"cy_law_681","q":"根据《证券公司监督管理条例》，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处罚款。如果没有违法所得或者违法所得不足3万元的，处以3万元以上（）万元以下的罚款。","c":{"A":"10","B":"20","C":"30","D":"50"},"a":"C","an":"选项C正确：根据《证券公司监督管理条例》第八十四条的规定，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以【3万元以上30万元以下】的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。","type":"single"},{"id":"cy_law_683","q":"根据《证券公司监督管理条例》，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，责令改正，给予警告，没收违法所得，并处罚款。如果没有违法所得或者违法所得不足10万元的，处以10万元以上（）万元以下的罚款。","c":{"A":"30","B":"40","C":"50","D":"60"},"a":"D","an":"选项D正确：根据《证券公司监督管理条例》第八十六条的规定，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以【10万元以上60万元以下】的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_685","q":"根据《证券法》的规定，设立证券公司应具备的条件不包括（）。","c":{"A":"有符合法律、行政法规规定的公司章程","B":"有合格的经营场所、业务设施和信息技术系统","C":"主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近一年无重大违法违规记录","D":"有完善的风险管理与内部控制制度"},"a":"C","an":"题目问的是“不包括”。 选项C错误：设立证券公司，主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近三年（而非1年）无重大违法违规记录。因此答案选择C。 选项ABD正确：根据《证券法》第一百一十八条的规定，设立证券公司，应当具备下列条件，并经国务院证券监督管理机构批准： （一）有符合法律、行政法规规定的公司章程； （二）主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近三年无重大违法违规记录； （三）有符合本法规定的公司注册资本； （四）董事、监事、高级管理人员、从业人员符合本法规定的条件； （五）有完善的风险管理与内部控制制度； （六）有合格的经营场所、业务设施和信息技术系统； （七）法律、行政法规和经国务院批准的国务院证券监督管理机构规定的其他条件。","type":"single"},{"id":"cy_law_687","q":"根据《证券公司监督管理条例》下列不属于动用客户的交易结算资金或者委托资金的情形的是（）。","c":{"A":"客户支付与证券交易有关的佣金","B":"客户进行证券申购","C":"客户担保账户内的证券与其债务的比例低于规定的最低维持担保比例","D":"客户支付与证券交易有关的税款"},"a":"C","an":"题目问的是“不属于”。选项C：“客户担保账户内的证券与其债务的比例低于规定的最低维持担保比例”属于可以动用“客户担保账户内的证券或资金”（而不是交易结算资金或者委托资金）的情形。因此答案选择C。 选项ABD正确：动用客户的交易结算资金或者委托资金的情形： （1）客户进行证券的申购、证券交易的结算或者客户提款；  （2）客户支付与证券交易有关的佣金、费用或者税款； （3）法律规定的其他情形。  【知识拓展】 1.动用客户的交易结算资金或者委托资金的情形 (1)客户进行证券的申购、证券交易的结算或者客户提款； (2)客户支付与证券交易有关的佣金、费用或者税款； (3)法律规定的其他情形。 2.动用客户担保账户内的证券或者资金的情形 (1)法定情形 客户担保账户内的证券或者资金与其债务的比例低于规定的最低维持担保比例、证券公司通知客户在一定的期限内补交差额但客户未能按期交足差额，或者到期未偿还融资融券债务的，证券公司可以按照约定处分其担保物。 (2)约定情形 出现法定情形以外的其他约定情形，如客户担保账户内的证券或者资金被司法冻结等。","type":"single"},{"id":"cy_law_689","q":"根据《证券公司监督管理条例》，证券公司未按照规定为客户开立账户的，责令改正；情节严重的，处以20万元以上（）万元以下的罚款，并对直接负责的董事、高级管理人员和其他直接责任人员，处以1万元以上（）万元以下的罚款。","c":{"A":"50；3","B":"50；5","C":"30；3","D":"30；5"},"a":"B","an":"选项B正确：根据《证券公司监督管理条例》第七十九条、第八十四条、第八十五条，证券公司未按照规定为客户开立账户的，责令改正；情节严重的，处以【20万元以上50万元以下】的罚款，并对直接负责的董事、高级管理人员和其他直接责任人员，处以【1万元以上5万元以下】的罚款。","type":"single"},{"id":"cy_law_691","q":"根据《证券公司监督管理条例》，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上（）万元以下的罚款。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"B","an":"选项B正确：根据《证券公司监督管理条例》第八十四条的规定，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。","type":"single"},{"id":"cy_law_693","q":"下列事项中，符合《证券公司监督管理条例》相关条款的是（）。","c":{"A":"证券公司的信息披露中存在误导性陈述","B":"证券公司向社会公开披露的信息中未包含其控股情况","C":"证券公司向社会公开披露的信息应当包括经营管理状况","D":"证券公司向社会公开披露的信息中无须包含其高级管理人员薪酬"},"a":"C","an":"选项C正确，选项BD错误：根据《证券公司监督管理条例》第六十六条的规定，证券公司应当依法向社会公开披露其基本情况、参股及控股情况、负债及或有负债情况、经营管理状况、财务收支状况、高级管理人员薪酬和其他有关信息。具体办法由国务院证券监督管理机构制定。 选项A错误：证券公司的信息披露中存在误导性陈述违反了信息披露的真实性和准确性要求。","type":"single"},{"id":"cy_law_695","q":"按照《证券基金经营机构董事、监事、高级管理人员及从业人员监督管理办法》的规定，下列不属于证券公司高级管理人员的是（）。","c":{"A":"合规负责人","B":"风控负责人","C":"财务负责人","D":"总经理秘书"},"a":"D","an":"题目问的是“不属于”。选项D：总经理秘书的核心职能是协助总经理处理日常事务（如文件流转、会议记录、行程安排等），不属于证券公司高级管理人员，因此答案选择D。 选项ABC：根据《证券基金经营机构董事、监事、高级管理人员及从业人员监督管理办法》第二条规定，证券公司高级管理人员是指证券公司的总经理、副总经理、财务负责人、合规负责人、风控负责人、信息技术负责人、行使经营管理职责并向董事会负责的管理委员会或执行委员会成员，和实际履行上述职务的人员，以及法律法规、中国证监会和公司章程规定的其他人员。高管人员应当符合规定的任职条件。","type":"single"},{"id":"cy_law_697","q":"根据《证券公司监督管理条例》，未经批准，委托他人或者接受他人委托持有或者管理证券公司的股权，或者认购、受让或者实际控制证券公司的股权的，对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上（）万元以下的罚款。","c":{"A":"10","B":"20","C":"30","D":"50"},"a":"C","an":"选项C正确：根据《证券公司监督管理条例》第八十六条的规定，未经批准，委托他人或者接受他人委托持有或者管理证券公司的股权，或者认购、受让或者实际控制证券公司的股权的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上60万元以下的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_699","q":"根据《证券公司监督管理条例》，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，责令改正，给予警告，没收违法所得，并处以违法所得（）的罚款。","c":{"A":"1倍以上3倍以下","B":"1倍以上5倍以下","C":"3倍以上5倍以下","D":"5倍以上10倍以下"},"a":"B","an":"选项B正确：根据《证券公司监督管理条例》第八十六条的规定，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上60万元以下的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_701","q":"根据《证券公司监督管理条例》，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上（）万元以下的罚款。","c":{"A":"10","B":"20","C":"30","D":"50"},"a":"C","an":"选项C正确：根据《证券公司监督管理条例》第八十六条的规定，证券公司股东、实际控制人违反规定强令、指使、协助、接受证券公司以证券经纪客户或者证券资产管理客户的资产提供融资或者担保的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上60万元以下的罚款；情节严重的，撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_law_703","q":"按照《证券公司合规管理实施指引》的要求，证券公司设立合规负责人王某，以下关于王某的说法不正确的是（）。","c":{"A":"王某为证券公司经营管理行为的合法合规性进行审查、监督或者检查","B":"王某为证券公司高级管理人员","C":"王某可以在证券公司兼任负责经营管理的职务","D":"王某组织拟定合规管理的基本制度和其他合规管理制度，督导下属各单位实施"},"a":"C","an":"题目问的是”说法不正确“。 选项C错误：合规负责人不得在证券公司兼任负责经营管理的职务。因此答案选择C。 选项A正确：证券公司设合规负责人，对证券公司经营管理行为的合法合规性进行审查、监督或者检查。 选项B正确：合规负责人为证券公司高级管理人员，由董事会决定聘任，并应当经国务院证券监督管理机构认可。 选项D正确：合规负责人组织拟定合规管理的基本制度和其他合规管理制度，督导下属各单位实施。法律法规和准则发生变动的，合规负责人应当及时建议董事会或高级管理人员并督导有关部门，评估其对合规管理的影响，修改、完善有关制度和业务流程。","type":"single"},{"id":"cy_law_705","q":"设立证券公司，应当具备主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近（）年无重大违法违规记录。","c":{"A":"2","B":"3","C":"5","D":"6"},"a":"B","an":"选项B正确：根据《证券法》第一百一十八条，设立证券公司，应当具备下列条件，并经国务院证券监督管理机构批准： （一）有符合法律、行政法规规定的公司章程； （二）主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近三年无重大违法违规记录（选项B正确）； （三）有符合本法规定的公司注册资本； （四）董事、监事、高级管理人员、从业人员符合本法规定的条件； （五）有完善的风险管理与内部控制制度； （六）有合格的经营场所、业务设施和信息技术系统； （七）法律、行政法规和经国务院批准的国务院证券监督管理机构规定的其他条件。","type":"single"},{"id":"cy_law_707","q":"证券公司从事证券自营业务，未按照《证券公司监督管理条例》有关规定将证券自营账户报（）备案的，应责令改正，给予警告，没收违法所得，并处以违法所得1倍至5倍罚款。","c":{"A":"证券交易所","B":"中国证券业协会","C":"证券登记结算机构","D":"中国证监会"},"a":"A","an":"选项A正确：证券公司从事证券自营业务，未按照《证券公司监督管理条例》有关规定将证券自营账户报【证券交易所】备案的，应责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款。 选项BCD错误：中国证券业协会、证券登记结算机构和中国证监会虽然是重要的监管机构或自律组织，但并不是证券自营账户备案的对象。","type":"single"},{"id":"cy_law_709","q":"根据《中华人民共和国证券法》的规定，证券公司客户的交易结算资金应当存放在商业银行，（）管理。","c":{"A":"在证券公司主账户下设子账户","B":"采取银证转账方式","C":"按资金率大小分类设置账户","D":"以每个客户的名义单独立户"},"a":"D","an":"选项D正确：证券公司客户的交易结算资金应当存放在商业银行，以每个客户的名义单独立户管理。 选项AC错误：不符合规定要求，因为资金需要直接存放在指定商业银行并单独立户。 选项B错误：银证转账方式是转账方式，而不是题目问的存放形式。","type":"single"},{"id":"cy_law_711","q":"按照《证券公司监督管理条例》第六十条的规定，下列哪种情况，证券公司可以动用客户的交易结算资金或者委托资金（）。","c":{"A":"客户担保账户内的证券或者资金与其债务的比例低于规定的最低维持担保比例","B":"证券公司通知客户在一定的期限内补齐差额但客户未能按期交足差额","C":"到期未偿还融资融券债务","D":"客户支付与证券交易有关的佣金、费用或者税款"},"a":"D","an":"选项ABC错误：描述的是动用客户担保账户内证券或者资金（而不是交易结算资金或委托资金）的情形。 选项D正确：动用客户的交易结算资金或者委托资金的情形： (1)客户进行证券的申购、证券交易的结算或者客户提款； (2)客户支付与证券交易有关的佣金、费用或者税款（选项D正确）； (3)法律规定的其他情形。  【知识拓展】 1.动用客户的交易结算资金或者委托资金的情形 (1)客户进行证券的申购、证券交易的结算或者客户提款； (2)客户支付与证券交易有关的佣金、费用或者税款； (3)法律规定的其他情形。 2.动用客户担保账户内的证券或者资金的情形 (1)法定情形 客户担保账户内的证券或者资金与其债务的比例低于规定的最低维持担保比例、证券公司通知客户在一定的期限内补交差额但客户未能按期交足差额，或者到期未偿还融资融券债务的，证券公司可以按照约定处分其担保物。 (2)约定情形 出现法定情形以外的其他约定情形，如客户担保账户内的证券或者资金被司法冻结等。","type":"single"},{"id":"cy_law_713","q":"《证券公司监督管理条例》第九条规定，证券公司股东的非货币财产出资总额不得超过证券公司注册资本的（）。","c":{"A":"0.1","B":"0.15","C":"0.3","D":"0.4"},"a":"C","an":"选项C正确：证券公司股东的非货币财产出资总额不得超过证券公司注册资本的【30％】。","type":"single"},{"id":"cy_law_715","q":"根据《证券公司监督管理条例》，证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上（）倍以下的罚款。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款。","type":"single"},{"id":"cy_law_717","q":"根据《证券公司监督管理条例》，证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，若没有违法所得或者违法所得不足3万元的，处以3万元以上（）万元以下的罚款。","c":{"A":"10","B":"20","C":"30","D":"50"},"a":"C","an":"选项C正确：证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以【3万元以上30万元以下】的罚款。","type":"single"},{"id":"cy_law_719","q":"根据《证券公司监督管理条例》，证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上（）倍以下的罚款。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，处以违法所得【1倍以上5倍以下】的罚款。","type":"single"},{"id":"cy_law_721","q":"根据《证券公司监督管理条例》，证券公司未按照规定公开披露信息，对直接负责的主管人员和其他直接责任人员，给予警告，可以处以（）万元以下的罚款。","c":{"A":"20","B":"50","C":"10","D":"30"},"a":"B","an":"选项B正确：证券公司未按照规定公开披露信息，或者公开披露的信息中有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以100万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员，给予警告，并处以50万元以下的罚款。","type":"single"},{"id":"cy_law_723","q":"国务院证券监督管理机构有权或者得到机构负责人批准后，采取下列（）措施，对证券公司的业务活动、财务状况、经营管理情况进行检查。","c":{"A":"询问证券公司的董事、监事、工作人员，要求其对有关检查事项作出说明","B":"进入证券公司的办公场所或者营业场所进行检查","C":"查阅、复制与检查事项有关的文件、资料，对可能被转移、隐匿或者毁损的文件、资料、电子设备予以封存","D":"查询证券公司及与证券公司有控股或者实际控制关系企业的银行账户"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券公司监督管理条例》第六十八条的规定，国务院证券监督管理机构有权采取下列措施，对证券公司的业务活动、财务状况、经营管理情况进行检查： （1）询问证券公司的董事、监事、工作人员，要求其对有关检查事项作出说明（A正确）；  （2）进入证券公司的办公场所或者营业场所进行检查（B正确）；  （3）查阅、复制与检查事项有关的文件、资料，对可能被转移、隐匿或者毁损的文件、资料、电子设备予以封存（C正确）； （4）检查证券公司的计算机信息管理系统，复制有关数据资料。 国务院证券监督管理机构为查清证券公司的业务情况、财务状况，经国务院证券监督管理机构负责人批准，可以查询证券公司及与证券公司有控股或者实际控制关系企业的银行账户（D正确）。","type":"multi"},{"id":"cy_law_725","q":"根据《证券公司监督管理条例》，证券公司的股东可以用（）出资。","c":{"A":"货币","B":"劳务","C":"信用","D":"证券公司经营必需的非货币财产"},"a":"A,D","an":"选项AD正确：证券公司的股东应当用【货币】或者【证券公司经营必需的非货币财产】出资。 选项BC错误：劳务和信用不是法律允许的出资形式。","type":"multi"},{"id":"cy_law_727","q":"因故意犯罪被判处刑罚，刑罚执行完毕未逾3年的个人不得成为持有证券公司5%以上股权的股东。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券公司监督管理条例》第十条的规定，有下列情形之一的单位或者个人，不得成为持有证券公司5%以上股权的股东、实际控制人： （1）因故意犯罪被判处刑罚，刑罚执行完毕未逾3年； （2）净资产低于实收资本的50%，或者或有负债达到净资产的50%； （3）不能清偿到期债务。","type":"judge"},{"id":"cy_law_729","q":"以下关于A证券公司总经理王某的做法，正确的是（）。","c":{"A":"王某为了应对企业危机，超出了公司章程使用其职权","B":"王某同时在两家上市制造企业任合规主管","C":"王某向董事会负责","D":"王某对A证券公司内部控制中存在的问题不承担责任"},"a":"C","an":"选项A错误，选项C正确：证券公司设总经理的，总经理依据《公司法》、公司章程的规定行使职权（不能超出章程使用职权），并向董事会负责。 选项B错误：证券公司高级管理人员不得在证券基金经营机构参股或者控股的公司以外的营利性机构兼职。 选项D错误：证券公司高级管理人员应当对内部控制不力、不及时处理或者改正内部控制中存在的缺陷或者问题承担相应的责任（并非不承担）。","type":"single"},{"id":"cy_law_731","q":"按照《证券监督管理条例》和《证券公司治理准则》的要求，证券公司在召开董事会会议时，对相关的资料和文件的处理错误的是（）。","c":{"A":"董事会会议应当制作会议记录，并可以录音","B":"董事会会议记录应当依法保存","C":"出席会议的董事应当在会议记录上签字，而记录人没有签字硬性要求","D":"董事会秘书负责股东会和董事会会议的筹备、文件的保管以及股东资料的管理"},"a":"C","an":"题目问的是”处理错误“。 选项C错误：出席会议的董事和记录人（记录人有签字要求）应当在会议记录上签字。因此答案选择C。 选项A正确：董事会会议应当制作会议记录，并可以录音。 选项B正确：会议记录应当真实、准确、完整记录会议过程、决议内容、董事发言和表决情况，并依法保存。 选项D正确：证券公司应当设董事会秘书，负责股东会和董事会会议的筹备、文件的保管以及股东资料的管理。","type":"single"},{"id":"cy_law_733","q":"按照《证券公司内部控制指引》的要求，下列关于证券公司受托投资管理业务的表述，说法错误的是（）。","c":{"A":"受托投资管理业务应与自营业务严格分离，独立决策、独立运作","B":"对委托人的资信状况、收益预期、风险承受能力、投资偏好等进行了解，并关注委托人资金来源的合法性","C":"为加强客户对证券公司资管水平的信任，受托投资管理合同中可以有承诺收益条款","D":"封闭运作、专户管理受托资产，确保客户资金与自有资金的分户管理、独立运作"},"a":"C","an":"题目问的是“说法错误的”。 选项C：受托投资管理合同中不得有（并非可以有）承诺收益条款。因此答案选择C。","type":"single"},{"id":"cy_law_735","q":"中国证监会根据（）的原则，可以提高对行业重要性证券公司的合规管理要求，并可以采取增加现场检查频率、强化合规负责人任职监管、委托外部专业机构协助开展工作等方式加强合规监管。","c":{"A":"全面监管","B":"审慎监管","C":"有效监管","D":"从严监管"},"a":"B","an":"选项B正确：中国证监会根据【审慎监管】的原则，可以提高对行业重要性证券公司的合规管理要求，并可以采取增加现场检查频率、强化合规负责人任职监管、委托外部专业机构协助开展工作等方式加强合规监管。  选项A错误：全面监管指监管覆盖市场所有主体、业务、环节，确保无监管空白。不符合题干强调的差异化监管。 选项C错误：有效监管指监管措施需实现预期效果，以最小成本达到最佳监管目标。题目未提到监管效率或成本效益。 选项D错误：从严监管指监管标准严格、处罚严厉，侧重监管力度。强调提高整体的监管标准，而不是对个别公司差异化监管。","type":"single"},{"id":"cy_law_737","q":"按照《证券监督管理条例》和《证券公司治理准则》的要求，证券公司董事会决议内容违反法律、行政法规或者中国证监会的规定的，（  ）应当要求董事会纠正，（  ）应当拒绝执行。","c":{"A":"监事会；股东会","B":"监事会；经理层","C":"股东会；经理层","D":"股东会；监事会"},"a":"B","an":"选项B正确：证券公司董事会决议内容违反法律、行政法规或者中国证监会的规定的，监事会（或行使监事会职权的监事或董事会设置的由董事组成的审计委员会）应当要求董事会纠正，经理层应当拒绝执行。 选项ACD错误：股东会不直接参与日常决议的纠正，其职责更多是通过选举、重大事项表决等方式间接影响公司治理，而非直接 “要求董事会纠正”。监事会的职责是监督和要求纠正，而非 “拒绝执行”（执行职责属于经理层）。","type":"single"},{"id":"cy_law_739","q":"《证券公司监督管理条例》《证券公司治理准则》对证券公司董事会的设置和议事规则做出了具体的规定，以下规定中错误的是（）。","c":{"A":"内部董事人数不得超过董事人数的1／2","B":"证券公司可以聘请外部专业人士担任董事","C":"证券公司董事会每年至少召开一次会议","D":"董事会表决有关关联交易的议案时，须经过无关联关系董事过半数通过"},"a":"C","an":"题目问的是”错误的“。 选项C错误：证券公司董事会每年至少召开两次（非1次）会议。因此答案选择C。 选项A正确：证券公司设董事会的，内部董事人数不得超过董事人数的1/2。 选项B正确：证券公司可以聘请外部专业人士担任董事。 选项D正确：董事会表决有关关联交易的议案时，与交易对方有关联关系的董事应当回避，决议须经无关联关系董事过半数通过。","type":"single"},{"id":"cy_law_741","q":"证券公司应当建立合理的内部控制监督、检查与评价机制，确保内部控制的有效性。其中，（）负责督促、检查和评价证券公司各项内部控制制度的建立与执行情况，对内部控制的有效性负最终责任。（）应对违反职责范围内的内部控制导致的风险和损失承担首要责任。","c":{"A":"股东会；高级管理人员","B":"董事会；业务部门和分支机构的负责人","C":"股东会；直接从事业务经营活动的业务部门和分支机构的相关人员","D":"董事会；直接从事业务经营活动的业务部门和分支机构的相关人员"},"a":"D","an":"选项D正确：董事会负责督促、检查和评价证券公司各项内部控制制度的建立与执行情况，对内部控制的有效性负最终责任。【直接从事业务经营活动的业务部门和分支机构的相关人员】应对违反职责范围内的内部控制导致的风险和损失承担首要责任。 选项ABC错误：股东会是公司最高权力机构，主要负责重大事项决策（如选举董事、审议公司重大方案等），但不直接参与公司日常内部控制的监督与管理。高级管理人员（如总经理、合规总监等）属于执行层，职责是落实董事会制定的内控政策。业务部门负责人一般承担的是部门管理责任。","type":"single"},{"id":"cy_law_743","q":"某证券公司设立监事会，下列关于监事会的说法正确的是 （  ）。","c":{"A":"监事会必须设主席和副主席","B":"监事会主席和副主席是监事会的召集人","C":"监事会可根据需要对公司财务情况、合规情况进行专项检查，必要时可聘请外部专业人士协助","D":"对董事、高级管理人员违反法律法规，严重损害客户利益的行为，监事会应当提议召开董事会，并向董事会提出专项议案"},"a":"C","an":"选项C正确：监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)可根据需要对公司财务情况、合规情况进行专项检查，必要时可聘请外部专业人士协助。 选项AB错误：证券公司设监事会的，监事会应当设主席，可以设副主席，监事会主席是监事会的召集人。 选项D错误：对董事、高级管理人员违反法律、行政法规或者公司章程，损害公司、股东或者客户利益的行为，证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)应当要求董事、高级管理人员限期改正；损害严重或者董事、高级管理人员未在限期内改正的，监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)应当提议召开股东会，并向股东会提出专项议案。","type":"single"},{"id":"cy_law_745","q":"为满足内部控制要求，某证券公司需确定其投资银行类业务专职内部控制人员的数量。已知该公司投行业务人员总数为85人，则根据规定，专职内部控制人员至少应为（  ）人。","c":{"A":"7","B":"8","C":"9","D":"10"},"a":"C","an":"应当为投资银行类业务配备具备相应专业知识和履职能力的内部控制人员，独立开展投资银行类业务内部控制工作。投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10。该证券公司业务人员总数为85人，其1/10为8.5人，向上取整为至少9人。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_747","q":"某证券公司的投资银行类业务运行正常，未受到监管立案调查。根据规定，该公司对其投行业务内部控制有效性的评估频率至少应为（  ）。","c":{"A":"每半年1次","B":"每年1次","C":"每两年1次","D":"仅在发生重大风险事件时评估"},"a":"B","an":"证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估每年不得少于1次。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_law_749","q":"某证券公司因其投资银行类业务涉嫌违规，于2025年6月1日被中国证监会立案调查。根据规定，该公司最迟应当在（  ）前完成对内部控制执行效果的评估。","c":{"A":"45853","B":"45838","C":"45869","D":"45870"},"a":"A","an":"证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估每年不得少于1次。对因投资银行类业务涉嫌违法违规而被中国证监会立案调查的证券公司，应当在45日内对内部控制执行效果进行评估（6月1日为第1天，7月15日为第45天）。证券公司应当于评估工作完成后30日内向中国证监会相关派出机构报送内部控制执行有效性评估报告，说明评估及整改情况。 综上，该题选A，选项BCD错误。","type":"single"},{"id":"cy_law_751","q":"按照《证券公司治理准则》的要求，下列关于证券公司和控股股东、实际控制人及其关联方之间开展业务竞争和关联交易的表述，说法正确的是（）。","c":{"A":"证券公司的关联方可以与其所控制的证券公司开展同类业务","B":"证券公司控制其他证券公司的，可以开展与该证券公司相同的同类业务，以竞争的形式促进双方发展","C":"证券公司的股东、实际控制人与证券公司的关联交易可以在牺牲证券公司利益的基础上进行","D":"证券公司章程应当对重大关联交易及其披露和表决程序作出规定"},"a":"D","an":"选项D正确，选项C错误：关联交易不得损害公司利益：证券公司的股东、实际控制人及其关联方与证券公司的关联交易不得损害证券公司及其客户的合法权益（而非可以牺牲公司利益）。证券公司章程应当对重大关联交易及其披露和表决程序作出规定。 选项AB错误：不得开展业务竞争：证券公司的控股股东、实际控制人及其关联方应当采取有效措施，防止与其所控制的证券公司发生业务竞争（而非可以开展同类业务）。证券公司控股其他证券公司的不得损害所控股的证券公司的利益。  【知识拓展】 证券公司对客户负有诚信义务，证券公司股东和实际控制人在行使合法权利的同时不得占用公司或客户资产，损害证券公司或客户合法权益。《证券公司治理准则》对证券公司的股东、控股股东、实际控制人的行为作出了严格要求，以维护证券公司股东、客户及利益相关者的合法权益。证券公司的股东、控股股东、实际控制人应当特别注意以下几点： 1.不得滥用权利：证券公司的控股股东、实际控制人不得利用其控制地位或者滥用权力损害证券公司、公司其他股东和公司客户的合法权益。 2.不得超越职权：证券公司的控股股东不得超越股东会、董事会任免证券公司的董事、监事和高级管理人员。证券公司的股东、实际控制人不得违反法律、行政法规和公司章程的规定干预证券公司的经营管理活动。 3.依法维护证券公司独立性：证券公司与其股东、实际控制人或者其他关联方应当在业务、机构、资产、财务、办公场所等方面严格分开，各自独立经营、独立核算、独立承担责任和风险。证券公司股东的人员在证券公司兼职的应当遵守法律、行政法规和中国证监会的规定。 4.不得开展业务竞争：证券公司的控股股东、实际控制人及其关联方应当采取有效措施，防止与其所控制的证券公司发生业务竞争。证券公司控股其他证券公司的不得损害所控股的证券公司的利益。 5.关联交易不得损害公司利益：证券公司的股东、实际控制人及其关联方与证券公司的关联交易不得损害证券公司及其客户的合法权益。证券公司章程应当对重大关联交易及其披露和表决程序作出规定。 6.不得虚假出资、抽逃出资：证券公司股东及其控股股东、实际控制人不得对证券公司虚假出资、出资不实、抽逃出资或者变相抽逃出资。 7.不得违规要求提供融资或担保：证券公司股东及其控股股东、实际控制人不得违规要求证券公司为其或其关联方提供融资或者担保，或者强令、指使、协助、接受证券公司以其证券经纪客户或者证券资产管理客户的资产提供融资或者担保。 8.未经批准不得委托持股：未经批准，证券公司股东及其控股股东、实际控制人不得委托他人或接受他人委托持有或管理证券公司股权，变相接受或让渡证券公司股权的控制权。","type":"single"},{"id":"cy_law_753","q":"某证券公司设立监事会，下列关于该监事会的表述，说法错误的是（）。","c":{"A":"监事会应当设主席，可以设副主席","B":"监事会主席是监事会的召集人","C":"监事会可根据需要对公司财务情况、合规情况进行专项检查，必要时可聘请外部专业人士协助","D":"对董事、高级管理人员违反法律、行政法规或者公司章程，损害公司、股东或者客户利益的行为，如董事、高级管理人员未在限期内改正的，监事会应当提议召开董事会，并向董事会提出专项议案"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误：对董事、高级管理人员违反法律、行政法规或者公司章程，损害公司、股东或者客户利益的行为，证券公司监事会（或行使监事会职权的监事或董事会设置的由董事组成的审计委员会）应当要求董事、高级管理人员限期改正；损害严重或者董事、高级管理人员未在限期内改正的，监事会（或行使监事会职权的监事或董事会设置的由董事组成的审计委员会）应当提议召开股东会，并向股东会（而非董事会）提出专项议案。因此答案选择D。 选项AB正确：证券公司设监事会的，监事会应当设主席，可以设副主席，监事会主席是监事会的召集人。 选项C正确：监事会（或行使监事会职权的监事或董事会设置的由董事组成的审计委员会）可根据需要对公司财务情况、合规情况进行专项检查，必要时可聘请外部专业人士协助。","type":"single"},{"id":"cy_law_755","q":"按照《证券公司信息隔离墙制度指引》的要求，某证券公司的敏感信息包括内幕信息和其他未公开信息。下列不属于该证券公司内幕信息的是（）。","c":{"A":"该证券公司的经营方针和经营范围发生了重大变化","B":"该证券公司董事会通过了一项重要投资行为","C":"该证券公司接受了一项30万元的政府补助","D":"该证券公司分配股利或者增资的计划"},"a":"C","an":"注意题目问的是“不属于”。 选项C：该证券公司接受了一项30万元的政府补助，属于已经公开的信息，不会对该证券公司的市场价格产生重大影响。因此答案选择C。 选项ABD：根据《证券法》第八十条和第八十一条的规定，以下情况属于内幕信息： 公司的经营方针和经营范围的重大变化（选项A符合）。  公司的重大投资行为（选项B符合）。  公司分配股利、增资的计划（选项D符合）。","type":"single"},{"id":"cy_law_757","q":"按照《证券公司合规管理实施指引》的要求，某证券公司设立合规负责人王某，以下关于王某的说法正确的是（）。","c":{"A":"王某是下属单位负责人","B":"王某直接向监事会负责","C":"王某组织拟订合规管理的基本制度和其他合规管理制度，督导下属各单位实施","D":"王某应当对证券公司内部规章制度、重大决策、新产品和新业务方案等进行合规审查，并出具书面或其他形式的合规审查意见"},"a":"C","an":"选项C正确：合规负责人组织拟定合规管理的基本制度和其他合规管理制度，督导下属各单位实施。 选项AB错误：合规负责人是高级管理人员（并不是某个下属单位的负责人），直接向董事会（而不是监事会）负责。 选项D错误：合规负责人应当对证券公司内部规章制度、重大决策、新产品和新业务方案等进行合规审查，并出具书面（而不是其他形式）合规审查意见。","type":"single"},{"id":"cy_law_759","q":"根据《证券监督管理条例》，以下关于证券公司持续监管方面的规定，说法错误的（）。","c":{"A":"当证券公司出现设立账外账等违法违规情况时，中国证监会可以对证券公司及其董监高给予谴责，甚至责令其更换董监高","B":"证券公司高级管理人员离任的，公司应当对其进行审计，并且自其审计结束之日起两个月内将审计报告报送中国证监会派出机构","C":"证券公司的法定代表人或者经营管理的主要负责人离任的，应当聘请符合《证券法》规定的会计师事务所对其进行审计","D":"证券公司高级管理人员离任未报送审计报告的，离任人员不得在其他证券公司任职"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司高级管理人员离任的，公司应当对其进行审计，并且自其离任之日起（而不是审计结束之日）两个月内将审计报告报送中国证监会派出机构。因此答案选择B。 选项A正确：当证券公司出现设立账外账等违法违规情况时，中国证监会可以对证券公司及其董监高给予谴责，并责令更换董监高。 选项C正确：证券公司的法定代表人或者经营管理的主要负责人离任的，应当聘请符合《证券法》规定的会计师事务所对其进行审计。 选项D正确：证券公司高级管理人员离任未报送审计报告的，离任人员不得在其他证券公司任职。","type":"single"},{"id":"cy_law_761","q":"证券公司应当建立合理的内部控制监督、检查与评价机制，确保内部控制的有效性。证券公司应当设立监督检查部门或岗位，监督检查部门应加强对内部控制执行情况的现场检查、非现场检查和常规稽核、非常规稽核，并将检查结果报（）。","c":{"A":"证券公司注册地中国证监会派出机构","B":"证券公司注册地证券业协会","C":"证券公司所在地中国证监会派出机构","D":"证券公司所在地证券业协会"},"a":"A","an":"选项A正确：监督检查部门应加强对内部控制执行情况的现场检查、非现场检查和常规稽核、非常规稽核，并将检查结果报证券公司注册地中国证监会派出机构。 选项BCD为干扰项，法律法规明确规定报送单位为注册地中国证监会派出机构，需准确记忆。","type":"single"},{"id":"cy_law_763","q":"按照《证券公司合规管理实施指引》的要求，某证券公司设立合规部门，下列关于合规负责人的表述正确的是（）。","c":{"A":"合规负责人应对公司内部规章制度、重大决策、新产品和新业务方案进行合规审查，并出具书面合规审查意见","B":"合规负责人直接对股东(大)会负责","C":"合规负责人对证券公司报送的申请材料或报告中基本事实和业务数据的真实性、准确性及完整性负责","D":"证券公司不采纳合规负责人的合规审查意见的，应当将有关事项提交董事会和监事会共同决定"},"a":"A","an":"选项A正确：合规负责人应对公司内部规章制度、重大决策、新产品和新业务方案进行合规审查，并出具书面合规审查意见 选项B错误：合规负责人直接对董事会（而不是股东会）负责。 选项C错误：其他相关高级管理人员（指的是合规负责人之外的其他高管，而不是合规负责人）对证券公司报送的申请材料或报告中基本事实和业务数据的真实性、准确性及完整性负责。 选项D错误：证券公司不采纳合规负责人的合规审查意见的，应当将有关事项提交董事会（而不是董事会+监事会共同）决定。","type":"single"},{"id":"cy_law_765","q":"按照《证券公司治理准则》的要求，证券公司在处理与股东关联方之间的关系时，应注意不得有（）行为发生。","c":{"A":"证券公司非法持有股东的股权","B":"股东违规占用证券公司资产","C":"证券公司控股其他证券公司的，不得损害所控股的证券公司的利益","D":"证券公司股东的人员在证券公司兼职的，遵守法律法规和中国证监会的规定"},"a":"A,B","an":"选项AB正确：在处理与股东及股东关联方之间的关系时，证券公司应注意不得有以下行为发生：   （1）持有股东的股权，但法律、行政法规或者中国证监会另有规定的除外；    （2）通过购买股东持有的证券等方式向股东输送不当利益；    （3）股东违规占用公司资产；    （4）法律、行政法规或者中国证监会禁止的其他行为。 选项CD错误：属于证券公司控股其他证券公司时应当遵守的行为规范。","type":"multi"},{"id":"cy_law_767","q":"证券公司内部控制应当遵循的原则包括（）。","c":{"A":"健全原则","B":"合理原则","C":"制衡原则","D":"独立原则"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司内部控制应当遵循以下原则，确保内部控制有效： （1）健全原则 （2）合理原则 （3）制衡原则 （4）独立原则","type":"multi"},{"id":"cy_law_769","q":"《证券法》对证券公司监管的基本制度作出了规定，在《证券法》确立的证券公司客户资产存管机制的基础上进一步明确了客户资产的存管、托管要求，体现了（）。","c":{"A":"证券公司对客户负有诚信义务","B":"证券公司股东可以占用客户资产","C":"证券公司不得挪用客户托管在公司的证券","D":"证券公司不得挪用客户委托管理的资产"},"a":"A,C,D","an":"选项B错误：证券公司的股东和实际控制人不得占用客户资产，损害客户合法权益。 选项ACD正确：证券公司对客户负有诚信义务，不得侵犯客户的财产权、选择权、公平交易权、知情权及其他合法权益。证券公司不得挪用客户交易结算资金，不得挪用客户委托管理的资产，不得挪用客户托管在公司的证券。","type":"multi"},{"id":"cy_law_771","q":"下列属于证券公司高级管理人员的有（）。","c":{"A":"公司财务负责人","B":"公司合规负责人","C":"公司副总经理","D":"信息技术负责人"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司的高级管理人员是指证券公司的总经理、副总经理、财务负责人、合规负责人、风控负责人、信息技术负责人、行使经营管理职责并向董事会负责的管理委员会或执行委员会成员，和实际履行上述职务的人员，以及法律法规、中国证券监督管理委员会和公司章程规定的其他人员。","type":"multi"},{"id":"cy_law_773","q":"下列关于证券公司各层级履行合规管理职责的说法正确的有（）。","c":{"A":"证券公司董事会应履行审议批准年度合规报告的职责","B":"证券公司监事会应履行对高级管理人员履行合规管理职责的情况进行监督的职责","C":"证券公司经营管理主要负责人应履行组织制定公司规章制度并督促实施的职责","D":"证券公司各单位负责人应履行在本单位主动倡导合规经营理念的职责"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司经营管理各层级及全体工作人员的合规管理职责： 证券公司董事会审议批准年度合规报告。（A项说法正确）  证券公司的监事会或者监事对董事、高级管理人员履行合规管理职责的情况进行监督。（B项说法正确）  证券公司经营管理主要负责人组织制定公司规章制度，并监督其实施。（C项说法正确）  下属各单位负责人在本单位主动倡导合规经营理念，积极培育公司合规文化。（D项说法正确）","type":"multi"},{"id":"cy_law_775","q":"《证券监督管理条例》规定，当证券公司出现（）情况时，中国证监会可以对证券公司及其有关董事、监事、高级管理人员、境内分支机构负责人给予谴责，责令证券公司更换董事、监事、高级管理人员或者限制其权利。","c":{"A":"治理结构不健全","B":"经营管理混乱","C":"账外设账","D":"账外经营"},"a":"A,B,C,D","an":"选项ABCD正确：持续监管方面，《证券公司监督管理条例》规定当证券公司出现治理结构不健全、内部控制不完善、经营管理混乱、设立账外账或者进行账外经营等违法违规情况时，中国证监会可以对证券公司及其有关董事、监事、高级管理人员、境内分支机构负责人给予谴责，责令证券公司更换董事、监事、高级管理人员或者限制其权利。","type":"multi"},{"id":"cy_law_777","q":"独立董事在任期内辞职或者被免职的，独立董事本人和证券公司应当分别向（）和（）提交书面说明。","c":{"A":"公司住所地中国证监会派出机构","B":"独立董事常住地","C":"股东会","D":"董事会"},"a":"A,C","an":"选项AC正确：独立董事在任期内辞职或者被免职的，独立董事本人和证券公司应当分别向【公司住所地中国证监会派出机构】和【股东会】提交书面说明。 选项BD错误：独立董事常住地与任职机构的治理无关。公司作为主体，需向最高权力机构股东会报告，确保股东知情权，符合公司治理的透明度要求。","type":"multi"},{"id":"cy_law_779","q":"证券公司（）应当对年度合规报告签署确认意见，保证报告的内容真实、准确、完整；对报告内容有异议的，应当注明意见和理由。","c":{"A":"高级管理人员","B":"股东","C":"董事","D":"理事"},"a":"A,C","an":"选项AC正确：证券公司的董事、高级管理人员应当对年度合规报告签署确认意见，保证报告的内容真实、准确、完整；对报告内容有异议的，应当注明意见和理由。 选项B错误：股东并不直接参与年度合规报告的签署确认。股东作为公司出资者，主要通过股东会行使重大决策权（如选举董事、批准重大事项等），但不直接参与公司日常经营管理和合规报告的签署。 选项D错误：理事并不是证券公司职位，一般对应交易所、协会等。","type":"multi"},{"id":"cy_law_781","q":"下列属于某证券公司的高级管理人员的有 （  ）。","c":{"A":"合规负责人李某","B":"副总经理王某","C":"独立董事孙某","D":"财务负责人周某"},"a":"A,B,D","an":"选项ABD正确：证券公司的高级管理人员，是指证券公司的总经理、副总经理、财务负责人、合规负责人、风控负责人、信息技术负责人、行使经营管理职责并向董事会负责的管理委员会或执行委员会成员，和实际履行上述职务的人员，以及法律法规、中国证券监督管理委员会和公司章程规定的其他人员。 选项C错误：属于董事会成员。","type":"multi"},{"id":"cy_law_783","q":"根据证券公司治理要求，公司章程必须就监事会事务明确规定的程序包括（  ）。","c":{"A":"监事会的职责","B":"监事个人的具体薪酬标准","C":"监事会会议采取通信表决方式的条件和程序","D":"监事会会议的议事方式"},"a":"A,C,D","an":"选项ACD正确：证券公司章程应当规定监事会的职责、议事方式和表决程序。证券公司章程应当明确规定监事会会议采取通信表决方式的条件和程序。除由于紧急情况、不可抗力等特殊原因无法举行现场、视频或者电话会议外，监事会会议应当采取现场、视频或者电话会议方式。 选项B为干扰项。","type":"multi"},{"id":"cy_law_785","q":"对因投资银行类业务涉嫌违法违规而被中国证监会立案调查的证券公司，应当在60日内对内部控制执行效果进行评估。（）","c":{"1":"对","0":"错"},"a":"0","an":"对因投资银行类业务涉嫌违法违规而被中国证监会立案调查的证券公司，应当在45日（并非60日）内对内部控制执行效果进行评估。","type":"judge"},{"id":"cy_law_787","q":"证券公司解聘合规负责人，应当有正当理由，并按照规定将解聘的事实和理由书面报告证券业协会。()","c":{"1":"对","0":"错"},"a":"0","an":"证券公司解聘合规负责人，应当有正当理由，并按照规定将解聘的事实和理由书面报告国务院证券监督管理机构。","type":"judge"},{"id":"cy_law_789","q":"证券公司监事会负责对公司合规管理的有效性承担最终责任。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司董事会决定本公司的合规管理目标，对合规管理的有效性承担责任，履行合规管理职责。","type":"judge"},{"id":"cy_law_791","q":"证券公司中，只有合规部门的工作人员才对合规管理负有责任。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行合规管理职责。","type":"judge"},{"id":"cy_law_793","q":"净资本指标与上月相比发生20％以上不利变化或不符合规定标准时，证券公司应当在（）个工作日内向公司全体董事报告，（）个工作日内向公司全体股东报告。","c":{"A":"5；15","B":"10；15","C":"5；10","D":"10；20"},"a":"C","an":"选项C正确：净资本指标与上月相比发生20%以上不利变化或不符合规定标准时，证券公司应当在【5个工作日】内向公司全体董事报告，【10个工作日】内向公司全体股东报告。 选项ABD为干扰项。","type":"single"},{"id":"cy_law_795","q":"下列关于证券公司反洗钱工作的要求，说法错误的是（）。","c":{"A":"证券公司应当明确董事会、监事会、高级管理层和相关部门的反洗钱职责，任命或者授权一名高级管理人员牵头负责反洗钱工作","B":"证券公司应当结合本机构经营规模以及洗钱和恐怖融资风险状况，建立健全洗钱风险自评估制度、客户尽职调查制度和风险等级划分制度、客户身份资料和交易记录保存制度、大额交易和可疑交易报告制度、信息共享制度、保密制度、宣传培训制度等反洗钱内部控制制度，制定反洗钱内部操作规程和控制措施","C":"证券公司应当根据反洗钱工作需要，建立和完善相关信息系统，并根据风险状况、工作需求变化及时优化升级","D":"证券公司总部应当对分支机构执行反洗钱内部控制制度的有效实施负责"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误：证券公司及其分支机构负责人（而非总部）应当对反洗钱内部控制制度的有效实施负责，总部应当对分支机构执行反洗钱内部控制制度进行监督管理。因此答案选择D。 选项A正确：证券公司应当明确董事会、监事会、高级管理层和相关部门的反洗钱职责，任命或者授权一名高级管理人员牵头负责反洗钱工作。 选项B正确：证券公司应当结合本机构经营规模以及洗钱和恐怖融资风险状况，建立健全洗钱风险自评估制度、客户尽职调查制度和风险等级划分制度、客户身份资料和交易记录保存制度、大额交易和可疑交易报告制度、信息共享制度、保密制度、宣传培训制度等反洗钱内部控制制度，制定反洗钱内部操作规程和控制措施。 选项C正确：证券公司应当根据反洗钱工作需要，建立和完善相关信息系统，并根据风险状况、工作需求变化及时优化升级。","type":"single"},{"id":"cy_law_797","q":"证券公司应当在总部层面制定统一的反洗钱和反恐怖融资机制安排，并确保其所有分支机构和控股附属机构结合自身业务特点有效执行。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当在总部层面制定统一的反洗钱和反恐怖融资机制安排，并确保其所有分支机构和控股附属机构结合自身业务特点有效执行。","type":"judge"},{"id":"cy_law_799","q":"下列选项中，（）是证券公司经纪业务所涉及的法律。","c":{"A":"《客户交易结算资金管理办法》","B":"《证券法》","C":"《证券登记结算管理办法》","D":"《证券经纪业务管理实施细则》"},"a":"B","an":"选项B正确：《证券法》属于法律的范畴。 选项ACD错误：《客户交易结算资金管理办法》《证券登记结算管理办法》《证券经纪业务管理实施细则》均属于部门规章及规范性文件。","type":"single"},{"id":"cy_law_801","q":"下列各项中，（）属于证券经纪业务相关的法律、行政法规。","c":{"A":"《证券法》","B":"《证券公司监督管理条例》","C":"《中国证券业协会证券经纪人执业规范（试行）》","D":"《客户交易结算资金管理办法》"},"a":"A,B","an":"选项AB正确：《证券法》《证券公司监督管理条例》属于证券经纪业务相关的法律和行政法规。 选项CD错误：《中国证券业协会证券经纪人执业规范（试行）》《客户交易结算资金管理办法》属于规范性文件。","type":"multi"},{"id":"cy_law_803","q":"对违反《中国证券登记结算有限责任公司证券账户管理规则》的开户代理机构及其网点，中国结算可视情节轻重采取的措施有（）。","c":{"A":"约见谈话","B":"口头警示","C":"通报批评","D":"公开谴责"},"a":"A,B,C,D","an":"选项ABCD正确：对违反《中国证券登记结算有限责任公司证券账户管理规则》的开户代理机构及其网点，中国结算视情节轻重单处或并处口头警示、书面警示、约见谈话、通报批评、公开谴责、暂停或终止开户代理机构或网点的开户代理业务资格、提请国务院证券监督管理机构采取相关监管措施等自律管理措施，并根据国务院证券监督管理机构及中国结算的有关规定记入诚信档案。","type":"multi"},{"id":"cy_law_805","q":"证券公司应当定期开展证券经纪业务常规稽核审计，对总部证券经纪业务部门和分支机构应当至少每5年进行一次常规稽核审计。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当定期开展证券经纪业务常规稽核审计，对总部证券经纪业务部门和分支机构应当至少每3年（并非5年）进行一次常规稽核审计。","type":"judge"},{"id":"cy_law_807","q":"证券经纪人可以同时接受两家证券公司的委托，分别从事客户招揽工作，但要注意做好利益隔离。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券经纪人为证券从业人员，只能接受一家证券公司的委托，并应当专门代理证券公司从事客户招揽和客户服务等活动。证券公司应当在与证券经纪人签订委托合同前，对其资格条件进行严格审查。","type":"judge"},{"id":"cy_law_809","q":"参与制作证券研究报告，但尚未登记为证券分析师的研究部门或者研究子公司相关人员，如果已通过证券分析师胜任能力考试并已完成一般证券业务登记的，经署名证券分析师和研究部门或研究子公司同意，可以用（）的名义在证券研究报告中列示。","c":{"A":"研究助理","B":"证券研究员","C":"证券分析师","D":"投资顾问"},"a":"A","an":"选项A正确：参与制作证券研究报告，但尚未登记为证券分析师的研究部门或者研究子公司相关人员，如果已通过证券分析师胜任能力考试并已完成一般证券业务登记的，经署名证券分析师和研究部门或研究子公司同意，可以用“【研究助理】”或“联系人”的名义在证券研究报告中列示。 选项BCD为干扰项，不符合规定称谓。","type":"single"},{"id":"cy_law_811","q":"某证券公司研究所拟发布一份关于A上市公司的证券研究报告。根据规定，该报告必须载明的事项是（  ）。","c":{"A":"证券分析师的个人联系方式","B":"证券分析师姓名及其登记编码","C":"研究报告的预估盈利目标","D":"推荐买入的具体价格区间"},"a":"B","an":"选项B正确：经营机构发布的证券研究报告，应当载明下列事项： (1)“证券研究报告”字样； (2)经营机构名称； (3)具备证券投资咨询业务资格的说明； (4)证券分析师姓名及其登记编码； (5)发布证券研究报告的时间； (6)证券研究报告采用的信息和资料来源； (7)使用证券研究报告的风险提示。 选项ACD为干扰项，教材未涉及。","type":"single"},{"id":"cy_law_813","q":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议内容应当包括（）。","c":{"A":"当事人的权利义务","B":"证券投资顾问服务的内容和方式","C":"争议或者纠纷解决方式","D":"终止或者解除协议的条件和方式"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： （1）当事人的权利义务；【A】  （2）证券投资顾问服务的内容和方式；【B】 （3）证券投资顾问的职责和禁止行为； （4）收费标准和支付方式； （5）争议或者纠纷解决方式；【C】  （6）终止或者解除协议的条件和方式。【D】","type":"multi"},{"id":"cy_law_815","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取（）的监管措施。","c":{"A":"出示警示函","B":"责令增加内部合规检查次数并提交合规检查报告","C":"监管谈话","D":"责令改正"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取【责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员】等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"multi"},{"id":"cy_law_817","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户的基本信息包括（）。","c":{"A":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","B":"证券投资顾问的姓名及其登记编码","C":"证券投资顾问服务的内容和方式","D":"投资决策由客户作出，投资风险与客户共担"},"a":"A,B,C","an":"选项D错误：应为“投资决策由客户作出，投资风险由客户承担（并非共担）。” 选项ABC正确：证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： （1）公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等。【A】  （2）证券投资顾问的姓名及其登记编码。【B】  （3）证券投资顾问服务的内容和方式。【C】 （4）投资决策由客户作出，投资风险由客户承担。 （5）证券投资顾问不得代客户作出投资决策。","type":"multi"},{"id":"cy_law_819","q":"根据《发布证券研究报告暂行规定》，证券分析师通过广播、电视、网络、报刊等公众媒体、自媒体以及报告会、交流会等形式，发表涉及具体证券的评论意见，或者解读其撰写的证券研究报告，应当符合的规定或者要求有（）。","c":{"A":"由所在证券公司或者证券投资咨询机构统一安排","B":"禁止明示或者暗示保证投资收益","C":"说明所依据的证券研究报告的发布日期","D":"准确地表述自己的研究观点，不得与其所在公司已发布证券研究报告的最新意见和建议相矛盾，也不得就所在研究机构未覆盖的公司发表证券估值或投资评级意见"},"a":"A,B,C,D","an":"选项ABCD正
