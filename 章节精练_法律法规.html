松的违约处置条件； (3)为客户违规使用融出资金、规避信息披露义务、违规减持等违规行为提供便利；（IV项正确） (4)为客户与客户之间的融资、融券违规提供中介服务； (5)其他输送或者谋取不正当利益的行为。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_law_1655","q":"某证券公司资产管理部新入职员工刘某拟任合规专员，其应当登记的从业人员类别是（）。","c":{"A":"一般证券业务","B":"证券投资咨询（投资顾问）","C":"证券经纪人","D":"保荐代表人"},"a":"A","an":"证券公司应当根据人员实际岗位、从事的业务类别和相应要求进行登记，同一人员只能登记为一个类别。登记类别包括一般证券业务、证券经纪人、证券投资咨询（证券投资顾问)、证券投资咨询（证券分析师)、保荐代表人等。 合规人员从事的业务属于一般证券业务，不符合其他的登记类别。 故本题选A，选项BCD错误。","type":"single"},{"id":"cy_law_1657","q":"下列属于从事证券投资咨询业务的投资咨询人员的有（  ）。","c":{"A":"证券经纪人","B":"证券分析师","C":"证券交易员","D":"证券投资顾问"},"a":"B,D","an":"证券投资咨询人员，即从事证券投资咨询业务的投资咨询人员，主要包括证券投资顾问（D项）及证券分析师（B项）两类。 选项A错误：证券经纪人属于证券经纪业务人员 选项C错误：证券交易员负责执行交易指令，不属于投资咨询人员 综上，该题选BD。","type":"multi"},{"id":"cy_law_1659","q":"张某是某证券公司金融产品部代销金融产品准入工作的负责人，收受某私募基金销售负责人王某赠送的礼品卡并推动该私募基金公司的产品上架，张某的行为违反了《证券公司代销金融产品管理规定》。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券公司代销金融产品管理规定》，证券公司从事代销金融产品活动的人员，应当符合规定的条件，并遵守证券从业人员的管理规定。证券公司从事代销金融产品活动的人员不得接受委托人给予的财物或其他利益。","type":"judge"},{"id":"cy_law_1661","q":"按照《证券发行上市保荐业务管理办法》的规定，保荐机构、保荐业务负责人、内核负责人或者保荐业务部门负责人在1个自然年度内被采取监管措施累计()次以上，中国证监会可暂停保荐机构的保荐业务资格3个月，依法责令保荐机构更换保荐业务负责人、内核负责人或者保荐业务部门负责人。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"C","an":"本题考查保荐代表人违反有关规定被采取的监管措施。保荐机构、保荐业务负责人、内核负责人或者保荐业务部门负责人在1个自然年度内被采取《证券发行上市保荐业务管理办法》规定的监管措施累计5次以上，中国证监会可以暂停保荐机构的保荐业务资格3个月，依法责令保荐机构更换保荐业务负责人、内核负责人或者保荐业务部门负责人。","type":"single"},{"id":"cy_law_1663","q":"证券金融公司不以营利为目的，其主要职责包括（）。","c":{"A":"为证券公司融资融券业务提供资金的转融通服务","B":"为证券公司融资融券业务提供证券的转融通服务","C":"遵循审慎原则，审核、选取并确定可充抵保证金证券的名单，并向市场公布","D":"为客户融资融券交易进行结算服务"},"a":"A,B","an":"证券金融公司是中国证监会根据国务院的决定，批准设立专司转融通业务的股份有限公司，证券金融公司不以营利为目的，履行下列职责： ①为证券公司融资融券业务提供资金和证券的转融通服务；AB项正确 ②中国证监会确定的其他职责。 C项是证券交易所的职责，D项是证券登记结算机构的职责。","type":"multi"},{"id":"cy_law_1665","q":"证券公司业务发展状况主要根据证券公司（  ）等方面的情况进行评价。","c":{"A":"经纪业务","B":"创新能力","C":"自律管理措施","D":"服务实体经济"},"a":"A,B,D","an":"证券公司业务发展和功能发挥状况主要根据证券公司经纪业务（A正确）、投资银行业务、资产管理业务、综合实力、创新能力（B正确）、服务实体经济（D正确）和国家战略等方面的情况进行评价。 （C项，自律管理措施属于中国证券业协会对证券公司做出的措施，不属于对证券公司的业务评价内容）","type":"multi"},{"id":"cy_law_1667","q":"证券投资咨询机构及其从业人员在与自身有利害冲突的哪些情况下应当进行回避？（）","c":{"A":"证券投资咨询机构或其从业人员在知悉本机构、本人以及财产上的利害关系人与有关证券有利害关系时，不得就该证券的走势或投资的可行性提出评价或建议","B":"中国证监会根据合理理由认定的其他可能存在利益冲突的情形","C":"证券公司的自营、受托投资管理、财务顾问和投资银行等业务部门的专业人员在离开原岗位后的6个月内不得从事面向社会公众开展的证券投资咨询业务","D":"经中国证监会核准的公开发行证券的企业的承销商或上市推荐人及其所属的证券投资咨询机构和证券投资咨询从业人员，不得在公众传播媒体上刊登或发布其为客户撰写的投资价值分析报告"},"a":"A,B,C,D","an":"证券投资咨询机构及其从业人员在与自身有利害冲突的下列情况下应当进行回避： 第一，经中国证监会核准的公开发行证券的企业的承销商或上市推荐人及其所属的证券投资咨询机构和证券投资咨询从业人员（包括自有关证券公开发行之日起18个月内调离的证券投资咨询从业人员），不得在公众传播媒体上刊登或发布其为客户撰写的投资价值分析报告（D正确），也不得以假借其他机构和个人名义等方式变相从事前述业务； 第二，证券公司的自营、受托投资管理、财务顾问和投资银行等业务部门的专业人员在离开原岗位后的6个月内不得从事面向社会公众开展的证券投资咨询业务；（C正确） 第三，证券投资咨询机构或其从业人员在知悉本机构、本人以及财产上的利害关系人与有关证券有利害关系时，不得就该证券的走势或投资的可行性提出评价或建议；（A正确） 第四，中国证监会根据合理理由认定的其他可能存在利益冲突的情形。（B正确）","type":"multi"},{"id":"cy_law_1669","q":"证券投资咨询机构及其从业人员从事证券投资咨询活动，应遵循的原则有()。","c":{"A":"必须客观公正、诚实信用","B":"不得以虚假信息、内幕信息或者市场传言为依据向客户或投资者提供分析、预测或建议","C":"预测证券市场、证券品种的走势或者就投资证券的可行性进行建议时需有充分的理由和依据，不得主观臆断","D":"证券投资分析报告、投资分析文章等形式的咨询服务产品不得有建议投资者在具体证券品种上进行具体价位买卖等方面的内容"},"a":"A,B,C,D","an":"证券投资咨询机构及其从业人员从事证券投资咨询活动必须遵循客观公正、诚实信用的基本原则。（A正确） 第一，不得以虚假信息、内幕信息或者市场传言为依据向客户或投资者提供分析、预测或建议。（B正确） 第二，预测证券市场、证券品种的走势或者就投资证券的可行性进行建议时需有充分的理由和依据，不得主观臆断。（C正确） 第三，证券投资分析报告、投资分析文章等形式的咨询服务产品不得有建议投资者在具体证券品种上进行具体价位买卖等方面的内容。（D正确） 第四，证券投资咨询机构及其从业人员不得参加媒体等机构举办的荐股“擂台赛”、模拟证券投资大赛或类似的栏目或节目。 第五，证券投资咨询机构及其从业人员有权拒绝媒体对其所提供的稿件进行断章取义、作有损原意的删节和修改，并自提供之日起将其稿件以书面形式保存3年。 第六，证券投资咨询从业人员向公众提供证券投资分析报告、投资分析文章等形式的咨询服务时，须先行取得所在机构的同意或认可。","type":"multi"},{"id":"cy_law_1671","q":"关于证券公司组织机构的表述，说法不正确的是（）。","c":{"A":"证券公司的独立董事，不得在本证券公司担任经理","B":"证券公司董事会设薪酬与提名委员会、审计委员会的，委员会负责人由独立董事担任","C":"证券公司经营证券资产管理业务的，其董事会应当设审计委员会","D":"合规负责人为证券公司高级管理人员"},"a":"C","an":"选项C错误：证券公司经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种及以上业务的，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会，行使公司章程规定的职权。 选项A正确：证券公司的独立董事，不得在本证券公司担任董事会外的职务，不得与本证券公司存在可能妨碍其作出独立、客观判断的关系。 选项B正确：证券公司董事会设薪酬与提名委员会、审计委员会的，委员会负责人由独立董事担任。 选项D正确：合规负责人为证券公司高级管理人员，由董事会决定聘任，并应当经国务院证券监督管理机构认可。","type":"single"},{"id":"cy_law_1673","q":"从业人员应当符合从事证券业务的条件，并按照规定由所在证券公司按照规定向中国证券业协会登记。登记类别包括一般证券业务、证券经纪人、证券投资咨询(证券投资顾问)、证券投资咨询(证券分析师)、保荐代表人等。（）","c":{"1":"对","0":"错"},"a":"1","an":"从业人员应当符合从事证券业务的条件，并按照规定由所在证券公司按照规定向中国证券业协会登记。登记类别包括一般证券业务、证券经纪人、证券投资咨询(证券投资顾问)、证券投资咨询(证券分析师)、保荐代表人等。","type":"judge"},{"id":"cy_law_1675","q":"中国证监会对保荐机构及其相关人员进行持续动态的跟踪管理，但不向社会公开保荐信用记录。（）","c":{"1":"对","0":"错"},"a":"0","an":"中国证监会对保荐机构及其相关人员进行持续动态的跟踪管理，记录其业务资格、执业情况、违法违规行为、其他不良行为以及对其采取的监管措施等。保荐信用记录向社会公开。","type":"judge"},{"id":"cy_law_1677","q":"证券公司（）使用证券经纪客户或者证券资产管理客户的资产向他人提供融资或者担保。","c":{"A":"不得","B":"可以","C":"经报批后可以","D":"经客户同意后可以"},"a":"A","an":"根据《证券公司监督管理条例》第六十一条的规定，证券公司不得以证券经纪客户或者证券资产管理客户的资产向他人提供融资或者担保。任何单位或者个人不得强令、指使、协助、接受证券公司以其证券经纪客户或者证券资产管理客户的资产提供融资或者担保。 综上，该题选A，选项BCD为干扰项。","type":"single"},{"id":"cy_law_1679","q":"()是指证券金融公司将自有或者依法筹集的资金和证券出借给证券公司，以供其办理融资融券业务的经营活动。","c":{"A":"融资融券业务","B":"转融通业务","C":"股票质押式回购业务","D":"股票约定式回购业务"},"a":"B","an":"选项B正确：所谓转融通业务，是指证券金融公司将自有或者依法筹集的资金和证券出借给证券公司，以供其办理融资融券业务的经营活动。 选项A错误：融资融券业务：是证券公司直接向客户出借资金或证券的行为 选项CD错误：属于证券公司与其他市场主体之间的担保融资行为","type":"single"},{"id":"cy_law_1681","q":"证券经纪人在执业过程中，不得有的行为包括(  )。","c":{"A":"在执业过程中索取或收受客户款项和财物","B":"代客户在相关合同、协议、文件等资料上签字","C":"向客户充分提示证券投资的风险","D":"向客户提供非由所服务证券公司统一提供的研究报告"},"a":"A,B,D","an":"选项ABD正确：证券经纪人应在有关规定和所服务证券公司授权的范围内执业，不得有以下行为：(1)以所服务证券公司或证券营业部的名义，与客户或他人签订任何合同、协议。(2)代客户在相关合同、协议、文件等资料上签字。(3)在执业过程中索取或收受客户款项和财物。(4)向客户提供非由所服务证券公司统一提供的研究报告及与证券投资有关的信息、证券类金融产品宣传推介材料及有关信息。(5)违背职业道德的其他行为。 选项C错误：是证券经纪人应尽的义务而非禁止行为。","type":"multi"},{"id":"cy_law_1683","q":"张先生到证券公司向其客户经理咨询近期哪些证券表现良好，希望客户经理能为其提供投资建议。 过期考点争议题客户经理向张先生提供投资建议的行为属于（）。","c":{"A":"证券经纪业务","B":"证券投资顾问业务","C":"证券承销与保荐业务","D":"资产管理业务"},"a":"B","an":"选项B正确：证券投资顾问业务，是证券投资咨询业务的一种基本形式，指证券公司、证券投资咨询机构接受客户委托，按照约定向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。 选项A错误：证券经纪业务主要是代理客户买卖证券。 选项C错误：证券承销与保荐业务是为企业发行证券提供中介服务。 选项D错误：资产管理业务是接受客户委托管理资产。","type":"single"},{"id":"cy_law_1685","q":"下列关于证券公司从事相关证券业务的净资本标准，说法正确的是（）。","c":{"A":"证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元","B":"证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元","C":"证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币2亿元","D":"证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币3亿元"},"a":"A,B","an":"证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元（A项正确）；经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元（B项正确）；经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元（C项错误）；经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元（D项错误）。","type":"multi"},{"id":"cy_law_1687","q":"证券投资咨询机构及其投资咨询人员，应当以行业公认的()态度，为投资人或者客户提供证券投资咨询服务。","c":{"A":"勤勉尽责","B":"平等自愿","C":"诚实","D":"谨慎"},"a":"A,C,D","an":"选项ACD正确：证券投资咨询人员应当以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务。 选项B为干扰项，平等自愿是合同法的基本原则。","type":"multi"},{"id":"cy_law_1689","q":"下列哪项是证券公司、证券投资咨询机构和其他财务顾问机构不得担任财务顾问的情形？（）","c":{"A":"最近36个月内存在违反诚信的不良记录","B":"最近36个月内因执业行为违反行业规范而受到行业自律组织的处分","C":"最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查","D":"曾依据《财务顾问业务管理办法》的规定从事上市公司并购重组财务顾问业务"},"a":"C","an":"证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问：  （1）最近24个月内存在违反诚信的不良记录；（A错误）  （2）最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分；（B错误）  （3）最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查（C正确）。 选项D为干扰项，无此情形。","type":"single"},{"id":"cy_law_1691","q":"下列证券自营业务的具体操作要求，说法正确的是（）。","c":{"A":"证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由自营业务部门负责自营账户的管理，包括开户、销户、使用登记等","B":"证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营","C":"证券自营业务资金的出入必须以公司名义进行，可以从自营账户中提取现金，禁止以个人名义从自营账户中调入调出资金","D":"对证券自营资金执行清算制度，自营清算岗位可以由经纪业务、资产管理业务及其他业务的清算岗位担任"},"a":"B","an":"选项B正确：证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营。 选项A错误：证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由非自营业务部门负责自营账户的管理，包括开户、销户、使用登记等。 选项C错误：证券自营业务资金的出入必须以公司名义进行，禁止以个人名义从自营账户中调入调出资金，禁止从自营账户中提取现金。 选项D错误：对证券自营资金执行独立清算制度，自营清算岗位应当与经纪业务、资产管理业务及其他业务的清算岗位分离。","type":"single"},{"id":"cy_law_1693","q":"关于证券自营业务的决策与授权，下列说法错误的是（）。","c":{"A":"证券公司应建立健全相对集中、权责统一的投资决策与授权机制","B":"董事会是自营业务的最高管理机构，负责确定具体的资产配置策略、投资事项和投资品种","C":"自营业务部门为自营业务的执行机构","D":"自营业务的管理和操作由证券公司自营业务部门专职负责"},"a":"B","an":"B项，投资决策机构是自营业务投资运作的最高管理机构，负责确定具体的资产配置策略、投资事项和投资品种等。","type":"single"},{"id":"cy_law_1695","q":"证券投资咨询机构及其工作人员利用「荐股软件「从事证券投资咨询业务，该“荐股软件”的功能包括（）。","c":{"A":"预测某证券的价格走势","B":"建议买入某证券","C":"建议某天买入某证券","D":"提供某证券的投资分析建议"},"a":"A,B,C,D","an":"“荐股软件”是指具备下列一项或多项证券投资咨询服务功能的软件产品、软件工具或者终端设备： （1）提供涉及具体证券投资品种的投资分析意见，或者预测具体证券投资品种的价格走势。 （2）提供具体证券投资品种选择建议。 （3）提供具体证券投资品种的买卖时机建议。 （4）提供其他证券投资分析、预测或者建议。","type":"multi"},{"id":"cy_law_1697","q":"对证券投资咨询机构从事证券投资顾问业务实行自律管理，并依据有关法律、行政法规和相关规定，制定相关执业规范和行为准则的是（   ）。","c":{"A":"中国证券业协会","B":"中国证监会","C":"证监会派出机构","D":"银监会"},"a":"A","an":"选项A正确，中国证监会及其派出机构依法对证券投资咨询机构从事证券投资顾问业务实行监督管理。 中国证券业协会对证券投资咨询机构从事证券投资顾问业务实行自律管理。并依据有关法律、行政法规和中国证监会有关规定，制定相关执业规范和行为准则。","type":"single"},{"id":"cy_law_1699","q":"（   ）对证券投资咨询机构从事证券投资顾问业务实行自律管理。","c":{"A":"中国证券业协会","B":"中国证监会","C":"国务院","D":"期货业协会"},"a":"A","an":"选项A正确，中国证监会及其派出机构依法对证券投资咨询机构从事证券投资顾问业务实行监督管理。 中国证券业协会对证券投资咨询机构从事证券投资顾问业务实行自律管理。并依据有关法律、行政法规和中国证监会有关规定，制定相关执业规范和行为准则。","type":"single"},{"id":"cy_law_1701","q":"登记人员离职的，证券投资咨询机构应当自劳动关系或者委托代理关系解除之日起（   ）个工作日内为其办理注销登记。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：登记人员离职的，证券投资咨询机构应当自劳动关系或者委托代理关系解除之日起5个工作日内为其办理注销登记。","type":"single"},{"id":"cy_law_1703","q":"证券投资咨询机构应当要求其从业人员在每个培训周期内完成一定时间的业务培训，建议不少于15学时。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构应当要求其从业人员在每个培训周期内完成一定时间的业务培训，建议不少于15学时 。因此本题说法正确。","type":"judge"},{"id":"cy_law_1705","q":"根据《证券投资顾问业务暂行规定》，证券投资咨询机构及其人员应当遵循（   ）原则，勤勉、审慎地为客户提供证券投资顾问服务。","c":{"A":"公平","B":"诚实信用","C":"公正","D":"谨慎"},"a":"B","an":"选项B正确：根据《证券投资顾问业务暂行规定》，证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务。","type":"single"},{"id":"cy_law_1707","q":"从事证券服务业务的禁止性行为包括（   ）。","c":{"A":"代理委托人从事证券投资","B":"与委托人约定分享证券投资收益或者分担证券投资损失","C":"买卖本证券投资咨询机构提供服务的证券","D":"与投资者协商并书面约定收取证券投资顾问服务费用的安排"},"a":"A,B,C","an":"证券投资咨询机构及其从业人员从事证券服务业务不得有下列行为： （1）代理委托人从事证券投资（选项A正确）； （2）与委托人约定分享证券投资收益或者分担证券投资损失（选项B正确）； （3）买卖本证券投资咨询机构提供服务的证券（选项C正确）； （4）法律、行政法规禁止的其他行为。  有以上所列行为之一，给投资者造成损失的，依法承担赔偿责任。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_law_1709","q":"根据《证券法》，证券投资咨询机构及其从业人员从事证券服务业务不得有下列（   ）行为。","c":{"A":"代理委托人从事证券投资","B":"买卖本证券投资咨询机构提供服务的证券","C":"与委托人约定分担证券投资损失","D":"与委托人约定分享证券投资收益"},"a":"A,B,C,D","an":"证券投资咨询机构及其从业人员从事证券服务业务不得有下列行为： （1）代理委托人从事证券投资； （2）与委托人约定分享证券投资收益或者分担证券投资损失； （3）买卖本证券投资咨询机构提供服务的证券； （4）法律、行政法规禁止的其他行为。 有上述所列行为之一，给投资者造成损失的，应当依法承担赔偿责任。 综上，该题选ABCD。","type":"multi"},{"id":"cy_law_1711","q":"下列关于从事证券服务业务的行为的说法正确的是（   ）。","c":{"A":"禁止代理委托人从事证券投资","B":"约定与委托人风险共担，利益共享","C":"禁止买卖本证券投资咨询机构提供服务的证券","D":"禁止与委托人约定分享证券投资收益"},"a":"A,C,D","an":"证券投资咨询机构及其从业人员从事证券服务业务不得有下列行为: （1）代理委托人从事证券投资（选项A正确）； （2）与委托人约定分享证券投资收益或者分担证券投资损失（选项B错误、选项D正确）； （3）买卖本证券投资咨询机构提供服务的证券（选项C正确）； （4）法律、行政法规禁止的其他行为。  有上述所列行为之一，给投资者造成损失的，依法承担赔偿责任。综上所述，本题应选择ACD选项。","type":"multi"},{"id":"cy_law_1713","q":"证券投资咨询机构就同一问题向不同客户提供的投资分析、预测或者建议可以不一致。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询机构就同一问题向不同客户提供的投资分析、预测或者建议应当一致。","type":"judge"},{"id":"cy_law_1715","q":"证券投资咨询机构应当为证券投资顾问服务提供必要的研究支持。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构应当为证券投资顾问服务提供必要的研究支持。","type":"judge"},{"id":"cy_law_1717","q":"证券投资咨询机构只能参与经国家有关部门批准的广播电视播出机构开办的证券节目 。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构只能参与经国家有关部门批准的广播电视播出机构开办的证券节目 。","type":"judge"},{"id":"cy_law_1719","q":"证券投资咨询机构建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理；相关业务档案的保存期限自相关协议终止之日起不得少于3年。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询机构建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理；相关业务档案的保存期限自相关协议终止之日起不得少于5年。","type":"judge"},{"id":"cy_law_1721","q":"证券投资咨询机构及其从业人员代理委托人从事证券投资，给投资者造成损失的，不需承担赔偿责任。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询机构及其从业人员代理委托人从事证券投资，给投资者造成损失的，应当依法承担赔偿责任。","type":"judge"},{"id":"cy_law_1723","q":"决定证券市场需求的政策因素的具体的政策包括（   ）。","c":{"A":"融资融券政策","B":"市场准入政策","C":"金融监管政策","D":"货币与财政政策"},"a":"A,B,C,D","an":"决定证券市场需求的政策因素的具体政策包括：融资融券政策、市场准入政策、金融监管政策、货币与财政政策等。  考点  证券市场的供求关系分析","type":"multi"},{"id":"cy_law_1725","q":"根据《证券投资顾问业务暂行规定》，证券投资顾问业务是(  )的一种基本形式。","c":{"A":"经纪业务","B":"财富管理业务","C":"资产管理业务","D":"证券投资咨询业务"},"a":"D","an":"根据《证券投资顾问业务暂行规定》第2条：本规定所称证券投资顾问业务，是证券投资咨询业务的一种基本形式，指证券公司、证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。投资建议服务内容包括投资的品种选择、投资组合以及理财规划建议等。","type":"single"},{"id":"cy_law_1727","q":"证券公司接受客户委托，按照约定向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户做出投资决策的属于(  )业务。","c":{"A":"代办股份转让","B":"证券投资顾问","C":"证券经纪","D":"证券资产管理"},"a":"B","an":"证券投资顾问业务是证券投资咨询业务的一种基本形式，指证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。投资建议服务内容包括投资品种的选择、投资组合以及投资理财规划建议等。","type":"single"},{"id":"cy_law_1729","q":"证券投资顾问业务是证券投资咨询业务的一种基本形式，指证券公司、证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问业务，是证券投资咨询业务的一种基本形式，指证券公司、证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。投资建议服务内容包括投资的品种选择 、投资组合以及理财规划建议等。","type":"judge"},{"id":"cy_law_1731","q":"证券投资顾问业务，是证券投资咨询业务的一种基本形式，指证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问业务，是证券投资咨询业务的一种基本形式，指证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。","type":"judge"},{"id":"cy_law_1733","q":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，应当经（）许可，取得证券投资咨询业务资格。","c":{"A":"证券公司","B":"证券业协会","C":"中国证监会","D":"国家金融监督管理总局"},"a":"C","an":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，应当经中国证监会许可，取得证券投资咨询业务资格。","type":"single"},{"id":"cy_law_1735","q":"根据《证券法》,目前证券投资咨询机构从事（   ）业务存在实质法律障碍。","c":{"A":"财务顾问","B":"证券资产管理业务","C":"证券投资顾问业务","D":"证券研究"},"a":"B","an":"根据《中华人民共和国证券法》，投资咨询机构及其从业人员从事证券服务业务，不得代理委托人从事证券投资。因此，目前证券投资咨询机构从事定向资产管理业务存在实质法律障碍。","type":"single"},{"id":"cy_law_1737","q":"下列关于证券投资咨询机构从事证券投资顾问业务的说法中，正确的有（  ）。","c":{"A":"证券投资咨询机构从事证券投资顾问业务，应当建立投资者回访机制，明确投资者回访的程序、内容和要求，并指定专门人员独立实施","B":"证券投资咨询机构应当向投资者提供《证券投资顾问业务风险揭示书》，并由投资者签收确认","C":"证券投资咨询机构从事证券投资顾问业务，应当建立投资者投诉处理机制，及时、妥善处理投资者投诉事项","D":"证券投资顾问可以通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议"},"a":"A,B,C","an":"D项错误，根据《证券投资顾问业务暂行规定》，证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议。","type":"multi"},{"id":"cy_law_1739","q":"证券公司、证券投资咨询机构发布证券研究报告，下列说法正确的是（）。","c":{"A":"遵循独立、客观、公平、审慎原则，有效防范利益冲突，公平对待发布对象","B":"对发布证券研究报告行为及相关人员实行独立管理","C":"从事发布证券研究报告业务的相关人员，不得同时从事证券自营、证券资产管理等存在利益冲突的业务","D":"应当采取有效措施，保证制作发布证券研究报告不<受利益相关者的干涉和影响"},"a":"A,C,D","an":"证券公司、证券投资咨询机构发布证券研究报告，应当遵守法律、行政法规和《发布证券研究报告暂行规定》，遵循独立、客观、公平、审慎原则，有效防范利益冲突，公平对待发布对象，禁止传播虚假、不实、误导性信息，禁止从事或者参与内幕交易、操纵证券市场活动。发布证券研究报告的证券公司、证券投资咨询机构，应当设立专门研究部门或者子公司，建立健全业务管理制度，对发布证券研究报告行为及相关人员实行集中统一管理。 从事发布证券研究报告业务的相关人员，不得同时从事证券自营、证券资产管理等存在利益冲突的业务。公司高级管理人员同时负责管理发布证券研究报告业务和其他证券业务的，应当采取防范利益冲突的措施，并有充分证据证明已经有效防范利益冲突。 证券公司、证券投资咨询机构应当采取有效措施，保证制作发布证券研究报告不受证券发行人、上市公司、基金管理公司、资产管理公司等利益相关者的干涉和影响。","type":"multi"},{"id":"cy_law_1741","q":"证券研究报告主要包括（）。","c":{"A":"证券及证券相关产品的价值分析报告","B":"行业研究报告","C":"市场分析报告","D":"投资策略报告"},"a":"A,B,D","an":"证券研究报告是指证券公司、证券投资咨询公司基于独立、客观的立场，对证券及证券相关产品的价值或者影响其市场价格的因素进行分析，含有对具体证券及证券相关产品的价值分析、投资评级意见等内容的文件。 证券研究报告主要包括涉及证券及证券相关产品的价值分析报告、行业研究报告、投资策略报告等。 证券研究报告可以采用书面或者电子文件形式。","type":"multi"},{"id":"cy_law_1743","q":"经营机构不得通过外包或与第三方签署业务收入分成协议等类似形式，安排没有证券投资咨询业务资质的机构或个人为客户提供前述咨询服务。","c":{"1":"对","0":"错"},"a":"1","an":"经营机构不得通过外包或与第三方签署业务收入分成协议等类似形式，安排没有证券投资咨询业务资质的机构或个人为客户提供前述咨询服务。","type":"judge"},{"id":"cy_law_1745","q":"在调查操纵证券市场，内幕交易等重大证券违法行为时，经批准，可以限制被调查事件当事人的证券买卖，但限制的期限不得超过6个月；案情复杂的，可以延长3个月。(  )","c":{"1":"对","0":"错"},"a":"0","an":"在调查操纵证券市场、内幕交易等重大证券违法行为时，经国务院证券监督管理机构主要负责人批准，可以限制被调查事件当事人的证券买卖，但限制的期限不得超过【3个月】；案情复杂的，可以延长【3个月】。","type":"judge"},{"id":"cy_law_1747","q":"根据《证券法》，关于证券服务机构的相关规定，下列说法正确的有（ ）。","c":{"A":"当证券服务机构制作的文件存在虚假记载等问题导致他人损失时，若能证明自身无过错则无需与委托人承担连带赔偿责任","B":"证券服务机构保存客户委托文件等资料的期限自业务开始之日起算不得少于10 年","C":"不可以泄露、隐匿、伪造、篡改或者毁损证券服务机构保存的相关信息和资料","D":"未按规定保存有关文件和资料与泄露、隐匿等违规处理资料承担相应的法律责任"},"a":"A,C,D","an":"根据《证券法》，证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告及其他鉴证报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。其制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与委托人承担连带赔偿责任，但是能够证明自己没有过错的除外（A正确）。证券服务机构应当妥善保存客户委托文件，核查和验证资料，工作底稿以及与质量控制、内部管理、业务经营有关的信息和资料，任何人不得泄露、隐匿、伪造、篡改或者毁损。  上述信息和资料的保存期限不得少于10年，自业务委托结束之日起算（B错误）。未按照规定保存有关文件和资料的，或泄露、隐匿、伪造、篡改、毁损有关文件和资料的，须承担相应的法律责任（CD选项正确）。","type":"multi"},{"id":"cy_law_1749","q":"证券交易内幕信息的知情人或者非法获取内幕信息的人违反《证券法》第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得（）的罚款；没有违法所得或者违法所得不足（）的，处以五十万元以上五百万元以下的罚款。","c":{"A":"一倍以上三倍以下；十万元","B":"一倍以上五倍以下；五十万元","C":"一倍以上十倍以下；五十万元","D":"一倍以上二十倍以下；十万元"},"a":"C","an":"选项C正确：《证券法》第一百九十一条规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反本法第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款。单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。国务院证券监督管理机构工作人员从事内幕交易的，从重处罚。","type":"single"},{"id":"cy_law_1751","q":"下列关于违反证券交易的法律责任的说法中，错误的是()。","c":{"A":"为甲证券营业部做装修工作的赵某，可以买卖股票","B":"王某在成为证券公司员工以前持有的股票，入职后不用转让","C":"证券公司经纪人李某使用其父亲账户买卖股票，被没收违法所得","D":"证券监督管理机构工作人员张某进行内幕交易，应当从重处罚"},"a":"B","an":"选项B错误：根据《证券法》第四十条的规定，证券交易场所、证券公司和证券登记结算机构的从业人员、证券监督管理机构的工作人员以及法律、行政法规规定禁止参与股票交易的其他人员，在任期或者法定限期内，既不得直接或者以化名、借他人名义持有、买卖股票或者其他具有股权性质的证券，也不得收受他人赠送的股票或者其他具有股权性质的证券。任何人在成为前述人员时，其原已持有的股票或者其他具有股权性质的证券，必须依法转让。 选项A正确：赵某作为装修工作人员不属于证券从业人员，可以买卖股票。 选项C正确：证券从业人员以他人名义持有、买卖股票属于违法行为，应没收违法所得。 选项D正确：监管机构工作人员从事内幕交易的应当从重处罚。","type":"single"},{"id":"cy_law_1753","q":"证券交易内幕信息的知情人或者非法获取内幕信息的人，在涉及证券的发行、交易或者其他对证券的价格有重大影响的信息公开前，买卖该证券，或者泄露该信息，或者建议他人买卖该证券的，责令依法处理非法持有的证券，没收违法所得，并处以（）的罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上30万元以下","C":"违法所得1倍以上5倍以下","D":"违法所得1倍以上10倍以下"},"a":"D","an":"选项D正确：根据《证券法》第一百九十一条，证券交易内幕信息的知情人或者非法获取内幕信息的人违反本法第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得【一倍以上十倍以下】的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款。单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。国务院证券监督管理机构工作人员从事内幕交易的，从重处罚。 违反本法第五十四条的规定，利用未公开信息进行交易的，依照前款的规定处罚。","type":"single"},{"id":"cy_law_1755","q":"违反证券法的规定，将客户的资金和证券归入自有财产，或者挪用客户的资金和证券的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上（）倍以下的罚款；没有违法所得或者违法所得不足一百万元的，处以一百万元以上一千万元以下的罚款。","c":{"A":"二","B":"三","C":"五","D":"十"},"a":"D","an":"选项D正确：根据《证券法》第二百零八条的规定，违反本法第一百三十一条的规定，将客户的资金和证券归入自有财产，或者挪用客户的资金和证券的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足一百万元的，处以一百万元以上一千万元以下的罚款；情节严重的，并处撤销相关业务许可或者责令关闭。对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。 选项ABC为干扰项。","type":"single"},{"id":"cy_law_1757","q":"证券的发行、交易活动，必须遵守法律、行政法规，禁止（）。","c":{"A":"客户电话委托下单","B":"为客户开通融资融券业务","C":"欺诈、内幕交易和操纵证券市场","D":"客户自行买卖股票"},"a":"C","an":"题目问的是”禁止“。选项C：《证券法》规定，证券的发行、交易活动，必须遵守法律、行政法规；禁止欺诈、内幕交易和操纵证券市场的行为。因此答案选择C。 选项A：客户电话委托下单是合法的证券交易方式之一。 选项B：为客户开通融资融券业务是证券公司提供的正常业务之一。 选项D：客户在合规的情况下自行买卖股票是正常的市场行为，不受禁止。","type":"single"},{"id":"cy_law_1759","q":"证券的发行、交易活动，必须遵守法律、行政法规；禁止（）的行为。","c":{"A":"为客户提供投资顾问服务","B":"欺诈","C":"内幕交易","D":"操纵证券市场"},"a":"B,C,D","an":"选项BCD正确，证券的发行、交易活动，必须遵守法律、行政法规；禁止【欺诈、内幕交易和操纵证券市场】的行为。 选项A错误：“为客户提供投资顾问服务”是证券公司的正常业务之一，并不属于禁止行为。","type":"multi"},{"id":"cy_law_1761","q":"证券公司违反《中华人民共和国证券法》规定提供证券融资融券服务的，对直接负责的主管人员和其他直接责任人员给予（）。","c":{"A":"警告","B":"撤销任职资格或者证券从业资格","C":"降职","D":"罚款"},"a":"A,D","an":"选项AD正确：证券公司违反《证券法》第一百二十条第五款规定提供证券融资融券服务的，没收违法所得，并处以融资融券等值以下的罚款；情节严重的，禁止其在一定期限内从事证券融资融券业务。对直接负责的主管人员和其他直接责任人员给予【警告】，并处以二十万元以上二百万元以下的【罚款】。 选项BC未提及，撤销任职资格或者证券从业资格通常适用于更严重的违规行为（如欺诈发行、内幕交易等）；“降职” 属于单位内部纪律处分，而非证券法规定的行政处罚。","type":"multi"},{"id":"cy_law_1763","q":"向特定对象发行证券累计超过200人（不包括依法实施员工持股计划的员工人数）的，属于非公开发行。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》的规定，有下列情形之一的，为公开发行： （1）向不特定对象发行证券的； （2）向特定对象发行证券累计超过200人的，但依法实施员工持股计划的员工人数不计算在内； （3）法律、行政法规规定的其他发行行为。","type":"judge"},{"id":"cy_law_1765","q":"下列属于基金托管人违规或不规范行为的有（）。","c":{"A":"单独为基金设立资金和证券账户","B":"为托管的所有基金设立一个银行存款账户","C":"根据需要进行投资，并在规定时间内偿还基金财产","D":"垫付基金管理人20％的注册资本"},"a":"B,C,D","an":"题目问的是”违规或不规范的行为“。 选项B错误：基金托管人应对所托管的不同基金财产分别设置账户（并非所有基金设立一个账户），确保基金财产的完整与独立。 选项C错误：基金托管人及其从业人员在执业中禁止侵占、挪用基金财产。 选项D错误：为保证基金托管人对基金管理人的有效监督，《中华人民共和国证券投资基金法》规定，基金托管人与基金管理人不得为同一机构，不得相互出资或者持有股份。 因此答案选择BCD。 选项A：“单独为基金设立资金和证券账户”是基金托管人的一项基本职责，确保基金财产的独立性和完整性。","type":"multi"},{"id":"cy_law_1767","q":"根据《证券公司治理准则》，下列关于证券公司与客户关系的基本原则，说法错误的是（）。","c":{"A":"证券公司向客户提供的产品或者服务，对有关产品和服务的内容应履行保密","B":"证券公司不得侵犯客户的财产权、选择权、公平交易权、知情权及其他合法权益","C":"证券公司不得挪用客户交易结算资金、委托管理的资产及托管在公司的证券","D":"证券公司应当设专职部门或者岗位负责与客户进行沟通，处理客户的投诉"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误：证券公司向客户提供产品或者服务应当遵守法律、行政法规和中国证监会的规定，并对有关产品或者服务的内容及风险予以充分披露（而不是保密），不得有虚假陈述、误导及其他欺诈客户的行为。因此答案选择A。 选项B正确：证券公司对客户负有诚信义务，不得侵犯客户的财产权、选择权、公平交易权、知情权及其他合法权益。 选项C正确：证券公司不得挪用客户交易结算资金，不得挪用客户委托管理的资产，不得挪用客户托管在公司的证券。 选项D正确：证券公司应当设专职部门或者岗位，负责与客户进行沟通，处理客户的投诉等事宜。","type":"single"},{"id":"cy_law_1769","q":"以下（）是证券公司对客户的义务。","c":{"A":"客户资料保密义务","B":"履行法定信息披露义务","C":"完善客户沟通、投诉处理机制","D":"履行公司财务报告披露义务"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司对客户的义务： （1）证券公司对客户负有诚信义务。 （2）不得挪用、侵占客户资产。 （3）客户资料保密义务。 （4）履行法定信息披露义务。 （5）完善客户沟通、投诉处理机制。 （6）履行公司财务报告披露义务。","type":"multi"},{"id":"cy_law_1771","q":"以下关于对证券投资咨询业务的行政处罚中，说法错误的是（）。","c":{"A":"未经中国证监会许可，擅自从事证券投资咨询业务的，由中国证监会派出机构责令停止，并处没收违法所得和违法所得等值以下的罚款","B":"证券投资咨询机构向证券监管部门报送的文件、资料有虚假陈述或者重大遗漏的，由中国证监会派出机构处1万元以上5万元以下的罚款","C":"证券、期货投资咨询人员同时在两个或者两个以上证券、期货投资咨询机构执业的，由中国证监会派出机构处1万元以上5万元以下的罚款，情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销其业务资格的处罚","D":"与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时未向证监会派出机构备案的，由证监会派出机构单处或者并处警告、没收违法所得、1万元以上10万元以下罚款"},"a":"C","an":"题目问的是“说法错误的”。 选项C错误：证券、期货投资咨询人员同时在两个或者两个以上的证券、期货投资咨询机构执业的由证监会派出机构单处或者并处警告、没收违法所得、1万元以上10万元以下罚款（并非1-5万）。因此答案选择C。 选项A正确：未经中国证监会许可，擅自从事证券投资咨询业务的，由证监会派出机构责令停止，并处没收违法所得和违法所得等值以下的罚款。 选项B正确：证券投资咨询机构向证券监管部门报送的文件、资料有虚假陈述或者重大遗漏的。由证监会派出机构处1万元以上5万元以下的罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销其业务资格的处罚。 选项D正确：与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时未向证监会派出机构备案。由证监会派出机构单处或者并处警告、没收违法所得、1万元以上10万元以下罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销业务资格的处罚；构成犯罪的，依法追究刑事责任。","type":"single"},{"id":"cy_law_1773","q":"财务顾问及其财务顾问主办人采取不正当竞争手段进行恶性竞争的，中国证监会一般采取的措施不包括()。","c":{"A":"移送司法机关追究责任","B":"监管谈话","C":"出具警示函","D":"责令改正"},"a":"A","an":"选项A不包括：移送司法机关追究责任 一般适用于涉嫌犯罪行为（如内幕交易、操纵市场等）。 选项BCD包括：财务顾问及其财务顾问主办人出现下列情形之一的，中国证监会对其采取监管谈话、出具警示函、责令改正等监管措施： (1)内部控制机制和管理制度、尽职调查制度以及相关业务规则存在重大缺陷或者未得到有效执行的； (2)未按照相关规定发表专业意见的； (3)在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下的； (4)未依法履行持续督导义务的； (5)未按照相关规定向中国证监会报告或者公告的； (6)违反其就上市公司并购重组相关业务活动所作承诺的； (7)违反保密制度或者未履行保密责任的； (8)采取不正当竞争手段进行恶性竞争的； (9)唆使、协助或者伙同委托人干扰中国证监会审核工作的； (10)中国证监会认定的其他情形。","type":"single"},{"id":"cy_law_1775","q":"（）及其直接负责的主管人员和其他直接责任人员有失诚信，存在其他违反法律、行政法规或相关规定的行为的，中国证监会可以视情节轻重采取责令改正、监管谈话、出具警示函、责令公开说明等监管措施；情节严重的，可以对有关责任人员采取证券市场禁入措施；依法应予行政处罚的，依照有关规定进行处罚；涉嫌犯罪的，依法移送司法机关，追究其刑事责任。","c":{"A":"发行人及其控股股东和实际控制人","B":"证券公司","C":"证券服务机构","D":"投资者"},"a":"A,B,C,D","an":"选项ABCD正确：【发行人及其控股股东和实际控制人、证券公司、证券服务机构、投资者】及其直接负责的主管人员和其他直接责任人员有失诚信，存在其他违反法律、行政法规或相关规定的行为的，中国证监会可以视情节轻重采取责令改正、监管谈话、出具警示函、责令公开说明等监管措施；情节严重的，可以对有关责任人员采取证券市场禁入措施；依法应予行政处罚的，依照有关规定进行处罚；涉嫌犯罪的，依法移送司法机关，追究其刑事责任。 （理解：这些主体在证券市场中都可能因为失诚信或其他违法行为而受到中国证监会的监管措施。无论是发行人及其控股股东和实际控制人在信息披露、公司治理等方面如果存在违法违规行为，还是证券公司在经纪业务、承销保荐等业务中如果存在违法违规行为，或是会计师事务所、律师事务所等在内的证券服务机构，如果在提供服务过程中存在违法违规行为，更甚至投资者在某些情况下，如操纵市场、内幕交易等，中国证监会都会对其采取监管措施）。","type":"multi"},{"id":"cy_law_1777","q":"全国股转系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为（）中小微企业发展服务。","c":{"A":"创新型","B":"创业型","C":"成长型","D":"成熟型"},"a":"A,B,C","an":"选项ABC正确：全国股转系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为创新型、创业型、成长型中小微企业发展服务。 选项D错误：“成熟型” 企业通常具备稳定盈利、较大规模和成熟商业模式，更适合在主板、科创板、创业板等更高层次市场上市（如沪深交易所）。全国股转系统的服务重心是处于早期或成长期的中小微企业，而非已成熟的大型企业。","type":"multi"},{"id":"cy_law_1779","q":"全国股转系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为科技型、增长型大企业发展服务。（）","c":{"1":"对","0":"错"},"a":"0","an":"全国股转系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为创新型、创业型、成长型中小微企业（并非科技型、增长型大企业）发展服务。","type":"judge"},{"id":"cy_law_1781","q":"按照《证券法》的规定，下列情形，属于公开发行证券的是（）。","c":{"A":"向特定对象发行证券累计未超过200人","B":"向特定对象发行证券累计210人，其中不包含依法实施员工持股计划的员工人数","C":"向特定对象发行证券累计210人，其中包含依法实施员工持股计划的员工20人","D":"向特定对象发行证券的"},"a":"B","an":"选项B正确：《证券法》的规定，有下列情形之一的，为公开发行证券：  （1）向不特定对象发行证券；  （2）向特定对象发行证券累计超过200人的，但依法实施员工持股计划的员工人数不计算在内； （3）法律、行政法规规定的其他发行行为。 选项A错误：未超过200人，因此不属于公开发行。 选项C错误：210人包含依法实施员工持股计划的员工20人，实际上参与发行的人数为190人（210-20），也不超过200人，因此也不属于公开发行。 选项D错误：属于非公开发行证券。","type":"single"},{"id":"cy_law_1783","q":"某负责承销的证券公司工作人员非法获取某证券发行的信息并在该信息公开前买卖该证券并获得利益的，对其（），没收违法所得，并处以违法所得（）的罚款。","c":{"A":"给予警告；一倍以上五倍以下","B":"处3年以下有期徒刑或者拘役；一倍以上五倍以下","C":"暂停或者撤销证券、基金从业资格；一倍以上十倍以下","D":"责令依法处理非法持有的证券；一倍以上十倍以下"},"a":"D","an":"选项D正确：《证券法》第一百九十一条的规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反本法第五十三条的规定从事内幕交易的，【责令依法处理非法持有的证券】，没收违法所得，并处以违法所得【一倍以上十倍以下】的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款。单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。国务院证券监督管理机构工作人员从事内幕交易的，从重处罚。","type":"single"},{"id":"cy_law_1785","q":"操纵证券、期货市场表现为利用资金、信息等优势或者滥用职权操纵市场、制造市场假象，影响证券、期货交易价格或者证券、期货交易量，情节严重的行为。下列属于操纵证券、期货市场的手段有（）。","c":{"A":"发行人的董事在涉及证券发行的信息尚未公开前，从事与该信息相关的证券交易活动","B":"某基金管理人与他人串通以事先约定好的时间进行交易","C":"某一散户在某一时点进行大额证券买卖","D":"某行业协会工作人员将对证券交易价格有重大影响的信息暗示给他人从而将该证券卖出"},"a":"B","an":"选项B正确：操纵证券、期货市场行为有： （1）单独或合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖； （2）【与他人串通以事先约定的时间、价格和方式相互进行交易】（B选项）； （3）在自己实际控制的账户之间进行交易，或者以自己为交易对象，自买自卖等方式。 选项AD错误：属于内幕交易行为，而不是操纵市场。 选项C错误：单一散户的大额买卖行为如果没有其他违法情节（如合谋、连续买卖等），通常不构成操纵市场。","type":"single"},{"id":"cy_law_1787","q":"组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员采取（）的证券市场禁入措施。","c":{"A":"1～3年","B":"3～5年","C":"5～10年","D":"终身"},"a":"D","an":"选项D正确：存在组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员【终身】采取《证券市场禁入规定》第四条第一款第―项规定的证券市场禁入措施。  【知识拓展】终身禁入 有下列情形之一的，可以对有关责任人员【终身】采取《禁入规定》第四条第一款第―项规定的证券市场禁入措施： （1）严重违反法律、行政法规或者中国证监会有关规定，被人民法院生效司法裁判认定构成犯罪的； （2）从业人员等负有法定职责的人员，故意不履行法律、行政法规或者中国证监会规定的义务，并造成特别恶劣社会影响，或者致使投资者利益受到特别严重损害，或者导致其他特别严重后果的； （3）在报送或者公开披露的材料中，隐瞒、编造或者篡改重要事实、重要财务数据或者其他重要信息，或者组织、指使从事前述行为或者隐瞒相关事项导致发生上述情形，严重扰乱证券市场秩序，或者造成特别恶劣社会影响，或者致使投资者利益受到特别严重损害的； （4）违反法律、行政法规或者中国证监会有关规定，从事欺诈发行、内幕交易、操纵证券市场等违法行为，严重扰乱证券市场秩序并造成特别恶劣社会影响，或者获取违法所得等不当利益数额特别巨大，或者致使投资者利益受到特别严重损害的； （5）违反法律、行政法规或者中国证监会有关规定，情节严重，应当采取证券市场禁入措施，且存在故意出具虚假重要证据，隐瞒、毁损重要证据等阻碍、抗拒执法单位及其工作人员依法行使监督检查、调查职权行为的； （6）因违反法律、行政法规或者中国证监会有关规定，5年内曾经被执法单位给予行政处罚2次以上，或者5年内曾经被采取《禁入规定》第四条第一款第一项规定的证券市场禁入措施的； （7）组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的； （8）其他违反法律、行政法规或者中国证监会有关规定，情节特别严重的。","type":"single"},{"id":"cy_law_1789","q":"根据《证券、期货投资咨询管理暂行办法》，证券投资咨询人员申请取得证券投资咨询从业资格，必须具有从事证券业务（）年以上的经历。","c":{"A":"4","B":"2","C":"1","D":"3"},"a":"B","an":"选项B正确：证券投资咨询人员必须具备下列条件： 1.具有中华人民共和国国籍； 2.具有完全民事行为能力； 3.品行良好、正直诚实，具有良好的职业道德； 4.未受过刑事处罚或者与证券、期货业务有关的严重行政处罚； 5.具有大学本科以上学历； 6.具有从事证券业务两年以上的经历（B项）； 7.具备从事业务所需的相应专业能力，符合相关从业条件； 8.中国证监会规定的其他条件。","type":"single"},{"id":"cy_law_1791","q":"李先生是一名证券从业人员，他希望转为证券投资咨询人员。他具有完全民事行为能力，从事证券业务三年，但只有大专学历。根据规定，李先生（  ）转为证券投资咨询人员。","c":{"A":"可以，因为他工作经历符合","B":"可以，因为他具有民事行为能力","C":"不可以，因为他学历不足本科","D":"不可以，因为他未通过职业道德考核"},"a":"C","an":"证券投资咨询人员必须具备下列条件： (1)具有中华人民共和国国籍； (2)具有完全民事行为能力； (3)品行良好、正直诚实，具有良好的职业道德； (4)未受过刑事处罚或者与证券业务有关的严重行政处罚； (5)具有大学本科以上学历；（大专学历，不符合条件） (6)具有从事证券业务两年以上的经历； (7)具备从事业务所需的相应专业能力，符合相关从业条件； (8)中国证监会规定的其他条件。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1793","q":"关于证券投资咨询人员申请登记为从事证券投资咨询业务的人员必须具备的条件，下列说法错误的是（）。","c":{"A":"具有从事证券业务两年以上的经历","B":"具备完全民事行为能力","C":"具有专科以上学历","D":"未受过刑事处罚或者与证券业务有关的严重行政处罚"},"a":"C","an":"题目问的是“说法错误的”。 选项C错误：应为“具有大学本科（并非专科）以上学历”，因此答案选择C。 选项ABD正确：证券投资咨询人员必须具备下列条件： 1.具有中华人民共和国国籍； 2.具有完全民事行为能力； 3.品行良好、正直诚实，具有良好的职业道德； 4.未受过刑事处罚或者与证券业务有关的严重行政处罚； 5.具有大学本科以上学历； 6.具有从事证券业务两年以上的经历； 7.具备从事业务所需的相应专业能力，符合相关从业条件； 8.中国证监会规定的其他条件。","type":"single"},{"id":"cy_law_1795","q":"根据《证券法》，投资咨询机构及其从业人员从事证券服务业务不得有的行为是（）。","c":{"A":"买卖本证券投资咨询机构提供服务的证券","B":"代理委托人从事证券投资","C":"与委托人约定分享证券投资收益或者分担证券投资损失","D":"告知投资人自主决策、自担风险"},"a":"A,B,C","an":"选项D错误：告知投资人自主决策、自担风险，是遵循市场规则与职业道德的体现，有助于投资人树立正确投资理念，不属于禁止行为。 选项ABC正确：根据《证券法》 ，证券投资咨询机构及其从业人员从事证券服务业务不得有下列行为： ①代理委托人从事证券投资（B项）； ②与委托人约定分享证券投资收益或者分担证券投资损失（C项）； ③买卖本证券投资咨询机构提供服务的证券（A项）； ④法律、行政法规禁止的其他行为。 根据《证券、期货投资咨询管理暂行办法》 ，证券投资咨询机构及其投资咨询人员，不得从事下列活动： ①代理投资人从事证券、期货买卖； ②向投资人承诺证券、期货投资收益； ③与投资人约定分享投资收益或者分担投资损失； ④为自己买卖股票及具有股票性质、功能的证券以及期货； ⑤利用咨询服务与他人合谋操纵市场或者进行内幕交易； ⑥法律、法规、规章所禁止的其他证券、期货欺诈行为。","type":"multi"},{"id":"cy_law_1797","q":"下列人员中，不符合申请证券分析师资格条件的有（  ）。","c":{"A":"李某最高学历为高中，并通过证券从业资格考试","B":"董某进入证券行业刚满一年","C":"付某为美国国籍","D":"侯某仅通过了证券从业资格考试一门科目"},"a":"A,B,C,D","an":"证券投资咨询人员必须具备下列条件： (1)具有中华人民共和国国籍；（C不符合） (2)具有完全民事行为能力； (3)品行良好、正直诚实，具有良好的职业道德； (4)未受过刑事处罚或者与证券业务有关的严重行政处罚； (5)具有大学本科以上学历；（A不符合） (6)具有从事证券业务两年以上的经历；（B不符合） (7)具备从事业务所需的相应专业能力，符合相关从业条件；（D不符合） (8)中国证监会规定的其他条件。","type":"multi"},{"id":"cy_law_1799","q":"证券投资咨询人员必须具有大学本科以上学历，但如果工作经历超过五年，学历要求可放宽至大专。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询人员必须具备下列条件： (1)具有中华人民共和国国籍； (2)具有完全民事行为能力； (3)品行良好、正直诚实，具有良好的职业道德； (4)未受过刑事处罚或者与证券业务有关的严重行政处罚； (5)具有大学本科以上学历；（无例外情形，故本题说法错误） (6)具有从事证券业务两年以上的经历； (7)具备从事业务所需的相应专业能力，符合相关从业条件； (8)中国证监会规定的其他条件。","type":"judge"},{"id":"cy_law_1801","q":"根据《证券法》，证券发行、交易活动明确禁止的行为包括（）。 I 欺诈 II 内幕交易 III 操纵证券市场 IV 融资融券","c":{"A":"I、II、IV","B":"I、II、III、IV","C":"I、II、III","D":"III、IV"},"a":"C","an":"证券的发行、交易活动，必须遵守法律、行政法规；禁止【欺诈、内幕交易和操纵证券市场】的行为。","type":"single"},{"id":"cy_law_1803","q":"根据《证券法》，向特定对象发行证券累计超过（  ）人，属于公开发行，但依法实施员工持股计划的员工人数不计算在内。","c":{"A":"100","B":"1000","C":"500","D":"200"},"a":"D","an":"选项D正确：有下列情形之一的，为公开发行： （1）向不特定对象发行证券的； （2）向特定对象发行证券累计超过200人（D项符合题意），但依法实施员工持股计划的员工人数不计算在内； （3）法律、行政法规规定的其他发行行为。","type":"single"},{"id":"cy_law_1805","q":"根据《证券法》，证券的发行、交易活动必须遵守法律、行政法规；禁止行为有（  ）。","c":{"A":"欺诈","B":"内幕交易","C":"获取利益","D":"操纵证券市场"},"a":"A,B,D","an":"选项ABD正确：证券的发行、交易活动，必须遵守法律、行政法规；禁止欺诈、内幕交易和操纵证券市场的行为。 选项C错误：证券参与方的目的是为了盈利，合法合规地通过证券交易获取利益并不违法。","type":"multi"},{"id":"cy_law_1807","q":"证券公司的股东和实际控制人的下列行为，未违反《证券公司监督管理条例》规定的是（）。","c":{"A":"通过内幕交易占用客户资产","B":"直接挪用客户资产","C":"按出资比例行使股东 (大)会表决权","D":"通过关联交易侵占证券公司资产"},"a":"C","an":"证券公司的股东和实际控制人滥用股东权利或实际控制的优势，通过关联交易、内幕交易、操纵市场或直接挪用的方式，非法占用证券公司或者客户的资产，严重损害了证券公司和客户的合法权益。","type":"single"},{"id":"cy_law_1809","q":"根据《证券公司风险处置条例》有关规定，下列关于禁止参与处置证券公司风险工作的机构或人员的情形，说法错误的是（）。","c":{"A":"涉嫌严重违法正在被行政管理部门立案稽查","B":"处于证券市场禁入期","C":"涉嫌犯罪正在被立案侦查、起诉","D":"曾受过行政处罚"},"a":"D","an":"有下列情形之一的机构或者人员，禁止参与处置证券公司风险工作： （1）曾受过刑事处罚（并非行政处罚，D错误）或者涉嫌犯罪正在被立案侦查（C）、起诉； （2）涉嫌严重违法正在被行政管理部门立案稽查（A）或者曾因严重违法行为受到行政处罚未逾3年； （3）仍处于证券市场禁入期（B）； （4）内部控制薄弱、存在重大风险隐患； （5）与被处置证券公司处置事项有利害关系； （6）国务院证券监督管理机构认定不宜参与处置证券公司风险工作的其他情形。 综上，该题选D。","type":"single"},{"id":"cy_law_1811","q":"下列不属于证券公司及相关从业人员从事私募资产管理业务的禁止行为的是 （  ）。","c":{"A":"投资决策出现严重失误导致产品净值大幅度回撤","B":"为规避监管的证券期货业务活动提供交易便利","C":"以获取佣金为目的，使用资产管理计划财产进行不必要的交易","D":"间接向投资者返还管理费"},"a":"A","an":"选项A不属于：投资决策出现严重失误导致产品净值大幅度回撤属于投资管理能力问题。 选项BCD属于：证券公司、托管人、投资顾问及相关从业人员从事私募资产管理业务，不得有下列行为： (1)利用资产管理计划从事内幕交易、操纵市场或者其他不正当、违法的证券期货业务活动。 (2)泄露因职务便利获取的未公开信息、利用该信息从事或者明示、暗示他人从事相关交易活动。 (3)为违法或者规避监管的证券期货业务活动提供交易便利。 (4)利用资产管理计划，通过直接投资、投资其他资产管理产品或者与他人进行交叉融资安排等方式，违规为本机构及其控股股东、实际控制人或者其他关联方提供融资。 (5)为本人或他人违规持有金融机构股权提供便利。 (6)从事非公平交易、利益输送等损害投资者合法权益的行为。 (7)利用资产管理计划进行商业贿赂。 (8)侵占、挪用资产管理计划财产。 (9)利用资产管理计划或者职务便利为投资者以外的第三方谋取不正当利益。 (10)直接或者间接向投资者返还管理费。 (11)以获取佣金或者其他不当利益为目的，使用资产管理计划财产进行不必要的交易。 (12)法律、行政法规和中国证监会规定禁止的其他行为。","type":"single"},{"id":"cy_law_1813","q":"根据《证券法》，下列关于内幕交易、泄露内幕信息的法律责任的说法，正确的有（）。","c":{"A":"单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以法定数额罚款","B":"国务院证券监督管理机构工作人员从事内幕交易的，从重处罚","C":"证券交易内幕信息的知情人违反规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以法定数额罚款","D":"非法获取内幕信息的人违反规定从事内幕交易，没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款"},"a":"A,B,C,D","an":"根据《证券法》第一百九十一条的规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反《证券法》第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款（C）；没有违法所得或者违法所得不足 50万元的，处以50万元以上500万元以下的罚款（D）。单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以 20万元以上200万元以下的罚款（A）。国务院证券监督管理机构工作人员从事内幕交易的，从重处罚（B）。违反《证券法》第五十四条的规定，利用未公开信息进行交易的，依照前款的规定处罚。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_law_1815","q":"根据《期货和衍生品法》，在中国境内开展期货交易和衍生品交易活动应当遵守法律、行政法规和国家有关规定，同时遵循（  ）的原则，禁止欺诈、操纵市场和内幕交易的行为。","c":{"A":"自愿、平等、有偿","B":"诚实信用、平等互利、公序良俗","C":"公开、公平、公正","D":"高效、透明、诚信"},"a":"C","an":"选项C正确：期货交易和衍生品交易活动，应当遵守法律、行政法规和国家有关规定，遵循公开、公平、公正的原则，禁止欺诈、操纵市场和内幕交易的行为。 选项ABD为干扰项，教材无原文。","type":"single"},{"id":"cy_law_1817","q":"规模失控是证券公司建立健全自营业务和受托资产管理业务内部控制制度时均应重点防范的风险。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应加强自营业务投资决策、资金、账户、清算、交易和保密等的管理，重点防范规模失控、决策失误、超越授权、变相自营、账外自营、操纵市场、内幕交易等风险。 证券公司在建立健全受托投资管理业务内部控制体制机制时，应重点防范规模失控、决策失误、越权操作、账外经营、挪用客户资产和其他损害客户利益的行为以及保本保底所导致的风险。","type":"judge"},{"id":"cy_law_1819","q":"证券投资咨询机构有（）行为之一的，由证监会派出机构处1万元以上5万元以下的罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销其业务资格的处罚。","c":{"A":"向证券监管部门报送的文件、资料有虚假陈述或者重大遗漏的","B":"干扰、阻碍证监会派出机构检查、调查，或者隐瞒、销毁证据的","C":"未按照规定履行报告和年检义务的","D":"协助证监会派出机构检查、调查"},"a":"A,B,C","an":"选项ABC正确：证券投资咨询机构有下列行为之一的，由证监会派出机构处1万元以上5万元以下的罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销其业务资格的处罚： ①向证券监管部门报送的文件、资料有虚假陈述或者重大遗漏的。 ②未按照规定履行报告和年检义务的。 ③未按照规定履行对本机构有关情况发生变化的变更手续的。 ④本机构证券投资咨询人员违反规定，受到证券监管部门行政处罚的。 ⑤干扰、阻碍证监会派出机构检查、调查，或者隐瞒、销毁证据的。 选项D错误：“协助检查”是合规行为，不会被处罚。","type":"multi"},{"id":"cy_law_1821","q":"证券投资咨询机构有（）等行为之一的，由证监会派出机构单处或者并处警告、没收违法所得、1万元以上10万元以下罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销业务资格的处罚；构成犯罪的，依法追究刑事责任。","c":{"A":"证券、期货投资咨询人员同时在两个或者两个以上的证券、期货投资咨询机构执业的","B":"未以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务的","C":"未将其向投资人或者社会公众提供的投资咨询资料自提供之日起保存1年的","D":"就同一问题向不同客户提供的投资分析、预测或者建议不一致的"},"a":"A,B,D","an":"证券投资咨询机构有下列行为之一的，由证监会派出机构单处或者并处警告、没收违法所得、1万元以上10万元以下罚款；情节严重的，证监会派出机构应当向中国证监会报告，由中国证监会作出暂停或者撤销业务资格的处罚；构成犯罪的，依法追究刑事责任：  （1）证券、期货投资咨询人员同时在两个或者两个以上的证券、期货投资咨询机构执业的。（A正确）   （2）未以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务的。（B正确）  （3）未完整、客观、准确地运用有关信息、资料向投资人或者客户提供投资分析、预测和建议；断章取义地引用或者篡改有关信息、资料；引用有关信息、资料时未注明出处和著作权人的。  （4）以虚假信息、市场传言或者内幕信息为依据向投资人或者客户提供投资分析、预测或建议的。 （5）在报刊、电台、电视台或者其他传播媒体上发表投资咨询文章、报告或者意见时，未注明所在证券、期货投资咨询机构的名称和个人真实姓名。 （6）与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时未向证监会派出机构备案。 （7）代理投资人从事证券买卖；向投资人承诺证券投资收益；与投资人约定分享投资收益或者分担投资损失；为自己买卖股票及具有股票性质、功能的证券；利用咨询服务与他人合谋操纵市场或者进行内幕交易；从事法律、法规、规章所禁止的其他证券、期货欺诈行为的。 （8）就同一问题向不同客户提供的投资分析、预测或者建议不一致的；就同一问题向社会公众和其自营部门提供的咨询意见不一致，为自营业务获利的需要误导社会公众的。（D正确）  （9）未将其向投资人或者社会公众提供的投资咨询资料自提供之日起保存2年的。（C错误）","type":"multi"},{"id":"cy_law_1823","q":"根据《中华人民共和国证券法》的规定，对内幕交易行为人可以采取的措施包括（）。","c":{"A":"责令依法处理非法持有的证券","B":"没收违法所得","C":"暂停或撤销相关业务许可","D":"罚款"},"a":"A,B,D","an":"选项ABD正确：根据《证券法》第一百九十一条规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反《证券法》第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款。单位从事内幕交易的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。国务院证券监督管理机构工作人员从事内幕交易的，从重处罚。 选项C错误：干扰项设置，对应的是《证券法》第一百九十四条（损害客户利益行为的处罚）。","type":"multi"},{"id":"cy_law_1825","q":"证券投资咨询人员申请登记为从事证券投资咨询业务的人员，在满足基本要求基础上，还应当必须具备的条件有（）。","c":{"A":"具有完全民事行为能力","B":"品行良好、正直诚实，具有良好的职业道德","C":"具有研究生以上学历","D":"具有从事证券业务两年以上的经历"},"a":"A,B,D","an":"证券投资咨询人员必须具备下列条件： （1）具有中华人民共和国国籍； （2）具有完全民事行为能力；（A正确） （3）品行良好、正直诚实，具有良好的职业道德；（B正确） （4）未受过刑事处罚或者与证券业务有关的严重行政处罚； （5）具有大学本科以上学历；（C错误） （6）具有从事证券业务两年以上的经历；（D正确） （7）具备从事业务所需的相应专业能力，符合相关从业条件； （8）中国证监会规定的其他条件。","type":"multi"},{"id":"cy_law_1827","q":"财务顾问及其财务顾问主办人采取不正当竞争手段进行恶性竞争的，中国证监会一般不会采取的措施是()。","c":{"A":"移送司法机关追究责任","B":"监管谈话","C":"出具警示函","D":"责令改正"},"a":"A","an":"财务顾问及其财务顾问主办人出现下列情形之一的，中国证监会对其采取监管谈话、出具警示函、责令改正（BCD正确）等监管措施： (1)内部控制机制和管理制度、尽职调查制度以及相关业务规则存在重大缺陷或者未得到有效执行的； (2)未按照相关规定发表专业意见的； (3)在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下的； (4)未依法履行持续督导义务的； (5)未按照相关规定向中国证监会报告或者公告的； (6)违反其就上市公司并购重组相关业务活动所作承诺的； (7)违反保密制度或者未履行保密责任的； (8)采取不正当竞争手段进行恶性竞争的； (9)唆使、协助或者伙同委托人干扰中国证监会审核工作的； (10)中国证监会认定的其他情形。 选项A错误： 移送司法机关追究责任 一般适用于涉嫌犯罪行为（如内幕交易、操纵市场等）。","type":"single"},{"id":"cy_law_1829","q":"下列行为中，（）不属于《中华人民共和国证券法》明确列举的操纵证券市场手段。","c":{"A":"与他人串通，以事先约定的时间、价格和方式相互进行证券交易，影响证券交易价格或者证券交易量","B":"利用掌握的内部信息买卖证券或者根据内部信息建议他人买卖证券","C":"将自营账户借给他人使用","D":"在自己实际控制的账户之间进行证券交易，影响证券交易价格或者证券交易量"},"a":"B,C","an":"选项B不属于：利用内部信息交易属于内幕交易行为 选项C不属于：出借账户是违规行为，但不构成操纵市场 选项AD属于：根据《中华人民共和国证券法》第五十五条规定，禁止任何人以下列手段操纵证券市场，影响或者意图影响证券交易价格或者证券交易量： （1）单独或者通过合谋，集中资金优势、持股优势或者利用信息优势联合或者连续买卖； （2）与他人串通，以事先约定的时间、价格和方式相互进行证券交易；A项 （3）在自己实际控制的账户之间进行证券交易；D项 （4）不以成交为目的，频繁或者大量申报并撤销申报； （5）利用虚假或者不确定的重大信息，诱导投资者进行证券交易； （6）对证券、发行人公开作出评价、预测或者投资建议，并进行反向证券交易； （7）利用在其他相关市场的活动操纵证券市场； （8）操纵证券市场的其他手段。","type":"multi"},{"id":"cy_law_1831","q":"全国股份转让系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为（）中小微企业发展服务。","c":{"A":"创新型","B":"创业型","C":"成长型","D":"成熟型"},"a":"A,B,C","an":"选项ABC正确：全国股转系统是经国务院批准，依据证券法设立的全国性证券交易场所，主要为创新型、创业型、成长型中小微企业发展服务。 选项D错误：成熟型企业通常选择主板或科创板等市场。","type":"multi"},{"id":"cy_law_1833","q":"下列属于证券公司及其从业人员依法合规开展各类债券交易业务的行为是（）。","c":{"A":"私下或在表外开展债券交易","B":"以人员挂靠、业务包干等承包方式开展业务","C":"按规定签订书面合同","D":"指定协议双方以外的第三方作为交易对手方开展债券回购交易"},"a":"C","an":"证券公司及其从业人员从事各类债券交易业务，应当做到： （1）不得私下或在表外开展债券交易（A不合规）。 （2）按规定应当签订书面合同的（C项合规），不得以邮件、即时通信信息等替代书面合同。 （3）不得指定协议双方以外的第三方作为交易对手方开展债券回购交易（D不合规）。 （4）不得以人员挂靠、业务包干等承包方式开展业务，或以其他形式实施过度激励（B不合规）。 （5）不得通过任何交易形式利益输送、内幕交易、操纵市场、规避监管，或者为规避监管提供服务、便利。","type":"single"},{"id":"cy_law_1835","q":"登记人员被采取证券市场禁入措施的，证券投资咨询机构应当在（   ）个工作日内为其办理注销登记。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"D","an":"登记人员受到刑事处罚 、被采取证券市场禁入措施、被认定为不适当人选、受到不适合从事相关业务相当的纪律处分等不再符合从业条件的，证券投资咨询机构应自上述情形发生之起5个工作日内（选项D正确）为其办理注销登记。","type":"single"},{"id":"cy_law_1837","q":"申请取得证券投资咨询从业资格，应当具备的条件包括(  )。 Ⅰ.未受过刑事处罚或者与证券、期货业务有关的严重行政处罚 Ⅱ.具有大学本科以上学历 Ⅲ.通过相关协会统一组织的专业考试 Ⅳ.有一年以上证券期货或银行、保险、信托等金融从业经验","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅱ、Ⅲ"},"a":"C","an":"证券公司投资咨询人员必须具备下列条件： （一）具有中华人民共和国国籍； （二）具有完全民事行为能力； （三）品行良好、正直诚实，具有良好的职业道德； Ⅰ正确：（四）未受过刑事处罚或者与证券、期货业务有关的严重行政处罚； Ⅱ正确：（五）具有大学本科以上学历； Ⅳ错误：（六）证券投资咨询人员具有从事证券业务2年以上的经历，期货投资咨询人员具有从事期货业务2年以上的经历； Ⅲ正确：（七）通过中国证监会统一组织的证券、期货从业人员水平测试； （八）中国证监会规定的其他条件。 综上，该题选C。","type":"single"},{"id":"cy_law_1839","q":"申请从事证券投资咨询业务（分析师），除通过证券分析师胜任能力考试外，还应具备（  ）条件。","c":{"A":"大学本科以上学历","B":"已被机构聘用","C":"具有从事证券业务2 年以上的经历","D":"具有完全民事行为能力"},"a":"A,B,C,D","an":"申请从事证券投资咨询业务（分析师），除通过证券分析师胜任能力考试外，还应具备以下条件： 1 年满18 周岁； 2. 大学本科以上学历； 3. 具有完全民事行为能力； 4. 已被机构聘用； 5. 未受过刑事处罚或与证券业务有关的严重行政处罚； 6. 不存在《中华人民共和国证券法》第一百三十二条规定的情形； 7. 未被中国证监会认定为证券市场禁入者，或者已过禁入期的； 8. 具有中华人民共和国国籍； 9.具有从事证券业务2 年以上的经历； 10.法律、行政法规和中国证监会规定的其他条件。","type":"multi"},{"id":"cy_law_1841","q":"下列可以担任证券交易所的负责人的是（）。","c":{"A":"二年前因违法行为被开除的证券交易所从业人员王某","B":"三年前因违法行为被撤销资格的律师李某","C":"四年前因违法行为被解除职务的证券登记结算机构的负责人文某","D":"六年前因违法行为被解除职务的证券公司的高级管理人员张某"},"a":"D","an":"选项ABC错误：因为还未逾5年不得担任证券交易所负责人； 选项D正确：张某自被解除职务之日已超5年，所以不受限制。 《公司法》第一百四十六条规定的情形或者下列情形之一的，不得担任证券交易所的负责人： （一）因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾五年； （二）因违法行为或者违纪行为被吊销执业证书或者被取消资格的律师、注册会计师或者其他证券服务机构的专业人员，自被吊销执业证书或者被取消资格之日起未逾五年。","type":"single"},{"id":"cy_law_1843","q":"基金托管人应当对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立。基金托管人违反上述规定，未对基金财产实行分别管理或者分账保管，责令改正，处（）的罚款。","c":{"A":"5万元以上30万元以下","B":"5万元以上50万元以下","C":"3万元以上10万元以下","D":"10万元以上100万元以下"},"a":"B","an":"选项B正确：基金托管人应当对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立。基金托管人违反《证券投资基金法》的规定，未对基金财产实行分别管理或者分账保管，责令改正，处5万元以上50万元以下罚款；对直接负责的主管人员和其他直接责任人员给予警告，暂停或者撤销基金从业资格，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_law_1845","q":"下列关于证券经纪人的说法正确的是（）。","c":{"A":"经验丰富的证券经纪人可以同时接受几家证券公司的委托","B":"证券经纪人可以代理证券公司从事客户招揽和客户服务以外的活动","C":"证券公司应当对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训时间不少于20个小时","D":"证券公司应当在与证券经纪人签订委托合同、对其进行执业前培训并经测试合格后，为其向中国证监会进行执业注册登记"},"a":"C","an":"选项C正确：证券公司应当对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训时间不少于20个小时。 选项AB错误：证券经纪人只能接受一家（并非同时几家，A错误）证券公司的委托，并专门代理证券公司从事客户招揽和客户服务（并非“以外”的活动，B错误）等活动； 选项D错误：应向中国证券业协会（而不是证监会）登记。","type":"single"},{"id":"cy_law_1847","q":"证券公司应对证券经纪人进行执业前培训，其中法律法规和职业道德的培训时间不少于（）个小时。","c":{"A":"10","B":"20","C":"30","D":"40"},"a":"B","an":"选项B正确：证券公司应对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训时间不少于20个小时。","type":"single"},{"id":"cy_law_1849","q":"以下属于证券分析师执业行为准则的有（）。","c":{"A":"保持独立性","B":"认真审慎、专业严谨","C":"充分尊重知识产权","D":"维护所在机构利益"},"a":"A,B,C,D","an":"选项ABCD正确：都属于证券分析师执业行为准则，除以上四项外，还有【保持客观性，公平对待发布对象，恪守诚信原则，信息保密，报告违法违规事项，防范利益冲突，珍惜职业称号和职业声誉，防范不正当竞争，规范参与公众交流活动，备案客户服务，规范外请专家服务，加强后续培训，引导市场预期、传递正能量】。","type":"multi"},{"id":"cy_law_1851","q":"某证券公司在内部培训中反复强调，所有业务开展前必须通过合规部门审查，要求员工熟知并严格遵守《证券法》等法律法规，明确告知员工触碰监管“红线”的严重后果。这一做法主要体现了行业文化建设基本要求中的（  ）","c":{"A":"坚持专业精神，提升服务能力","B":"坚持依法合规，筑牢发展基础","C":"坚持廉洁自律，弘扬清风正气","D":"牢记社会责任，展现良好形象"},"a":"B","an":"选项B正确：坚持依法合规，筑牢发展基础。敬畏市场，合规展业。坚守合规底线，牢树合规理念，夯实市场发展根基；坚持依法展业，做到全员合规、全线合规，自觉维护市场秩序；坚持合规创造价值，打造良好市场声誉，切实发挥资本市场“看门人”作用。自觉抵制违法违规行为，坚决不碰监管“红线”,推动自身专业化发展，推动资本市场规范化建设。 选项A错误：“坚持专业精神”更侧重于专业能力和服务 选项C错误：“廉洁自律”侧重于职业道德和廉洁文化 选项D错误：“社会责任”侧重于服务初心和社会贡献","type":"single"},{"id":"cy_law_1853","q":"某证券公司高度重视企业文化建设，已将“合规、诚信、专业、稳健”的核心价值观深度融入其内部治理架构、战略规划及员工日常行为规范之中，并积极推动文化建设与党建工作、人才发展协同共进。根据行业实践评估标准，该公司最可能获得的评估结果是（  ）","c":{"A":"A类","B":"B类","C":"C类","D":"D类"},"a":"A","an":"中国证券业协会根据证券公司实践评估计分的高低，将实践评估结果分为A(AA、A)、B(BB、B)、C(CC、C)、D共计四大类7个级别。 A类公司文化建设水平在行业内最高，在业务开展中能够践行“合规、诚信、专业、稳健”的核心价值观，文化建设能较好地与党建工作要求、人的全面发展、专业能力建设和历史文化传承有机结合，与公司治理、发展战略、发展方式和行为规范深度融合。 B类公司文化建设水平在行业内较高，文化建设能基本与党建工作要求、人的全面发展、专业能力建设和历史文化传承有机结合，与公司治理、发展战略、发展方式和行为规范深度融合。 C类公司文化建设在行业内处于一般水平，能够自觉践行证券行业核心价值观。 D类公司不重视文化建设工作，证券公司文化建设工作存在重大问题或缺陷。 综上，该题选A，选项BCD错误。","type":"single"},{"id":"cy_law_1855","q":"在证券公司文化建设实践评估中，一家被评为B类的公司，这通常意味着该公司（  ）","c":{"A":"完全不重视文化建设工作，文化建设存在重大问题","B":"文化建设水平在行业内最高，各方面融合程度最好","C":"文化建设水平在行业内较高，各方面融合基本到位","D":"文化建设在行业内处于一般水平，但能自觉践行行业核心价值观"},"a":"C","an":"中国证券业协会根据证券公司实践评估计分的高低，将实践评估结果分为A(AA、A)、B(BB、B)、C(CC、C)、D共计四大类7个级别。 A类公司文化建设水平在行业内最高（B错误），在业务开展中能够践行“合规、诚信、专业、稳健”的核心价值观，文化建设能较好地与党建工作要求、人的全面发展、专业能力建设和历史文化传承有机结合，与公司治理、发展战略、发展方式和行为规范深度融合。 B类公司文化建设水平在行业内较高，文化建设能基本与党建工作要求、人的全面发展、专业能力建设和历史文化传承有机结合，与公司治理、发展战略、发展方式和行为规范深度融合。（C正确） C类公司文化建设在行业内处于一般水平，能够自觉践行证券行业核心价值观。（D错误） D类公司不重视文化建设工作，证券公司文化建设工作存在重大问题或缺陷。（A错误）","type":"single"},{"id":"cy_law_1857","q":"证券公司文化建设实践评估指标主要分为（）。","c":{"A":"基础指标","B":"加分指标","C":"扣分指标","D":"特色指标"},"a":"A,B,C","an":"选项ABC正确：证券公司文化建设实践评估指标主要分为基础指标、加分指标和扣分指标。 选项D错误：干扰项  【知识拓展】评估指标 基础指标主要对证券公司践行“合规、诚信、专业、稳健”行业文化建设核心价值观、落实《证券行业文化建设十要素》等文化建设要求、公司文化建设实践情况等进行评估。 加分指标主要对证券公司积极践行行业文化建设核心价值观、推动行业文化建设作出贡献、公司文化建设取得成效被外部认可等情形进行加分。 扣分指标主要对证券公司落实行业文化建设相关要求不力、对行业文化建设实践评估工作不重视或者弄虚作假等情形进行扣分。","type":"multi"},{"id":"cy_law_1859","q":"证券经营机构应当加强廉洁文化建设，（）开展覆盖全体工作人员的廉洁培训和教育，确保工作人员熟悉廉洁从业的相关规定，提高工作人员廉洁意识。","c":{"A":"每周","B":"每月","C":"每个季度","D":"每年"},"a":"D","an":"选项D正确：证券经营机构应当加强廉洁文化建设，每年开展覆盖全体工作人员的廉洁培训和教育，确保工作人员熟悉廉洁从业的相关规定，提高工作人员廉洁意识。","type":"single"},{"id":"cy_law_1861","q":"证券经营机构应当制定覆盖全体工作人员的廉洁从业规范，将工作人员廉洁从业情况纳入人力资源管理体系，并将廉洁从业情况考察和评估结果作为人员聘用、从业人员登记和后续管理、晋级、提拔、离职以及考核、薪酬管理、审计、稽核等事项的重要考量因素。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构应当制定覆盖全体工作人员的廉洁从业规范，将工作人员廉洁从业情况纳入人力资源管理体系，并将廉洁从业情况考察和评估结果作为人员聘用、从业人员登记和后续管理、晋级、提拔、离职以及考核、薪酬管理、审计、稽核等事项的重要考量因素。","type":"judge"},{"id":"cy_law_1863","q":"证券行业执业声誉信息不包括（）。","c":{"A":"基本信息","B":"实物信息","C":"诚信信息","D":"其他执业声誉信息"},"a":"B","an":"题目问的是“不包括”。 选项B错误：干扰项，“执业声誉信息” 主要围绕从业人员的职业资质、诚信记录及职业表现等非实物性要素，而 “实物信息” 通常指具体的资产、物品等物理形态的信息（如房产、股权等），与执业声誉无直接关联。因此答案选择B。 选项ACD正确：证券行业执业声誉信息包括基本信息、诚信信息和其他执业声誉信息。","type":"single"},{"id":"cy_law_1865","q":"被执法单位采取证券市场禁入措施的人员，执法单位将通过中国证监会或者相关派出机构网站，或者指定媒体向社会公布，并记入证券市场诚信档案。（）","c":{"1":"对","0":"错"},"a":"1","an":"被执法单位采取证券市场禁入措施的人员，执法单位将通过中国证监会或者相关派出机构网站，或者指定媒体向社会公布，并记入证券市场诚信档案。","type":"judge"},{"id":"cy_law_1867","q":"下列关于证券投资咨询人员从业管理，说法错误的是（）。","c":{"A":"证券投资咨询人员主要包括证券投资顾问人员及证券分析师","B":"向客户提供证券投资顾问服务的人员，应当符合相关从业条件，并在中国证监会登记为证券投资顾问","C":"证券投资咨询人员不得以任何形式同时在2家或2家以上证券经营机构执业","D":"同一人员不得同时登记为证券分析师和证券投资顾问"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券投资咨询机构向客户提供证券投资顾问服务的人员应符合相关从业条件，并在中国证券业协会（并非中国证监会）登记为证券投资顾问。因此答案选择B。 选项ACD正确：证券投资咨询人员主要包括证券投资顾问人员及证券分析师两类。同一人员不得同时登记为证券分析师和证券投资顾问，证券投资咨询机构人员只能与一家证券经营机构签订劳动合同，不得以任何形式同时在两家或两家以上证券经营机构执业。","type":"single"},{"id":"cy_law_1869","q":"张某在5年前因经济犯罪被判处有期徒刑1年，现已刑满释放，其拟申请证券从业资格，张某是否符合从业条件（  ）。","c":{"A":"不符合，犯罪记录永久影响从业","B":"符合，因其刑罚已执行完毕超过2年","C":"符合，因其刑罚执行完毕已超过3年","D":"需经行业协会特别批准后方可从业"},"a":"C","an":"从业人员应当持续符合下列条件： (1)品行良好； (2)具备从事证券基金业务所需的专业能力，掌握证券基金业务相关的专业知识； (3)最近3年未因犯罪被判处刑罚；（张某刑罚执行完毕已超过3年，符合规定，故C正确，ABD错误） (4)不存在《证券法》第一百二十五条第二款和第三款，以及《证券投资基金法》第十五条规定的情形； (5)最近5年未被中国证监会撤销基金从业资格或者被基金业协会取消基金从业资格； (6)未被中国证监会采取证券市场禁入措施，或者执行期已经届满； (7)法律法规、中国证监会和行业协会规定的其他条件。","type":"single"},{"id":"cy_law_1871","q":"申请从事一般证券业务的人员，必须具备最近（）未因犯罪被判处刑罚。","c":{"A":"1年","B":"2年","C":"3年","D":"5年"},"a":"C","an":"选项C正确：申请从事一般证券业务的人员，必须最近【3年】未因犯罪被判处刑罚。  【知识拓展】从业人员应当具备的条件 从业人员应当持续符合下列条件： (1)品行良好； (2)具备从事证券基金业务所需的专业能力，掌握证券基金业务相关的专业知识； (3)最近3年未因犯罪被判处刑罚； (4)不存在《证券法》第一百二十五条第二款和第三款，以及《证券投资基金法》第十五条规定的情形； (5)最近5年未被中国证监会撤销基金从业资格或者被基金业协会取消基金从业资格； (6)未被中国证监会采取证券市场禁入措施，或者执行期已经届满； (7)法律法规、中国证监会和行业协会规定的其他条件。","type":"single"},{"id":"cy_law_1873","q":"证券评级机构开展证券评级业务，应当成立评级项目组。评级项目组成员应当具备从事相关项目的工作经历或者与评级项目相适应的知识结构，项目组组长应当完成证券从业人员登记且从事资信评级业务（）年以上。","c":{"A":"3","B":"5","C":"7","D":"8"},"a":"A","an":"选项A正确：证券评级机构开展证券评级业务，应当成立评级项目组。评级项目组成员应当具备从事相关项目的工作经历或者与评级项目相适应的知识结构，项目组组长应当完成证券从业人员登记且从事资信评级业务【3年】以上。","type":"single"},{"id":"cy_law_1875","q":"提供证券投资顾问服务的人员应当（）。","c":{"A":"取得投资咨询执业资格","B":"接受客户全权委托管理客户资产","C":"代理委托人从事证券投资","D":"注册为证券投资顾问"},"a":"A,D","an":"选项AD正确：向客户提供证券投资顾问服务的人员，应当符合相关从业条件【具有证券投资咨询执业资格】，并在中国证券业协会【登记】为证券投资顾问。 选项BC错误：属于禁止行为，证券投资咨询机构及其从业人员不得代理委托人从事证券投资。","type":"multi"},{"id":"cy_law_1877","q":"根据《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构投资管理人员注册登记规则》，私募资产管理业务投资经理应当具备（）。","c":{"A":"依法取得基金从业资格","B":"具有3年以上投资管理、投资研究、投资咨询等相关业务经验","C":"具备良好的诚信记录和职业操守","D":"近12个月未被监管机构采取重大行政监管措施、行政处罚"},"a":"A,B,C","an":"选项D错误：应为“最近3年（并非12个月）未被监管机构采取重大行政监管措施行政处罚” 选项ABC正确：根据《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构投资管理人员注册登记规则》，私募资产管理业务投资经理应当依法取得基金从业资格，具有3年以上投资管理、投资研究、投资咨询等相关业务经验，具备良好的诚信记录和职业操守，且最近3年未被监管机构采取重大行政监管措施行政处罚，符合法律法规规定的其他条件。","type":"multi"},{"id":"cy_law_1879","q":"证券公司从事资产管理业务违反法律，行政法规及中国证监会其他规定的，下列属于中国证监会及其派出机构可以对其采取的监管措施的有（）。 Ⅰ 责令改正 Ⅱ 监管谈话 Ⅲ 出具警示函 Ⅳ 市场禁入措施","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ"},"a":"D","an":"Ⅰ、Ⅱ、Ⅲ正确：证券公司、托管人、销售机构和投资顾问等服务机构违反法律、行政法规及中国证监会其他规定的，中国证监会及相关派出机构可以对其采取【责令改正、监管谈话、出具警示函】、责令定期报告、暂不受理与行政许可有关的文件等行政监管措施;对直接负责的主管人员和其他直接责任人员，采取监管谈话、出具警示函、责令参加培训、认定为不适当人选等行政监管措施。 Ⅳ项，市场禁入是针对“从业人员”的措施。（而不是法人或组织） 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_law_1881","q":"证券公司从事资产管理业务违反法律，行政法规及中国证监会其他规定的，下列属于中国证监会及其派出机构可以对其采取的监管措施的有（  ）。","c":{"A":"责令改正","B":"监管谈话","C":"出具警示函、责令定期报告","D":"市场禁入措施"},"a":"A,B,C","an":"选项ABC正确：证券公司、托管人、销售机构和投资顾问等服务机构违反法律、行政法规及中国证监会其他规定的，中国证监会及相关派出机构可以对其采取责令改正、监管谈话、出具警示函、责令定期报告、暂不受理与行政许可有关的文件等行政监管措施；对直接负责的主管人员和其他直接责任人员，采取监管谈话、出具警示函、责令参加培训、认定为不适当人选等行政监管措施。 选项D错误：市场禁入是针对“从业人员”的措施（而不是法人或组织）。","type":"multi"},{"id":"cy_law_1883","q":"根据《区域性股权市场自律管理与服务规范(试行)》，下列关于证券公司开展区域性股权市场业务的说法正确的是（）。 I 证券公司及其从业人员应当配合中国证券业协会对落实本规范及相关自律要求情况的监督检查 II 证券公司及其从业人员违反该规范，中国证券业协会将视情节轻重采取相关自律惩戒措施 III 证券公司及其从业人员存在违反法律、法规行为的，将移交中国证监会及其派出机构或其他有权机关依法查处 IV 证券公司及其从业人员应当勤勉尽责，严格遵守执业规范和职业道德，按规定和约定履行义务","c":{"A":"II、III、IV","B":"I、III、IV","C":"I、II","D":"I、II、III、IV"},"a":"D","an":"根据《规范》相关规定，证券公司参与区域性股权市场的自律管理要求如下： 1.证券公司作为运营机构股东或者在区域性股权市场开展相关业务，应当遵守证券行业监管和自律规则以及区域性股权市场相关的管理规定。 2.区域性股权市场运营机构、证券公司及其从业人员应当配合中国证券业协会对落实《规范》及相关自律要求情况的监督检查。（I项正确） 3.区域性股权市场运营机构、证券公司及其从业人员违反《规范》，中国证券业协会将视情节轻重采取相关自律惩戒措施（II项正确）；存在违反法律、法规行为的，将移交中国证监会及其派出机构或其他有权机关依法查处（III项正确）。 IV项正确，证券公司及其从业人员应当勤勉尽责，严格遵守执业规范和职业道德， 按规定和约定履行义务。","type":"single"},{"id":"cy_law_1885","q":"某证券公司资产管理部客户服务组与公司信息技术中心携手开发了综合信息平台，能够自动提取账户运作信息并生成定期报告通过系统后台发送客户指定邮箱，降低了漏报、错报、迟报等风险，提升了客户满意度。上述实践彰显了证券行业文化建设中的（  ）。","c":{"A":"坚持专业精神，提升服务能力","B":"坚持依法合规，筑牢发展基础","C":"坚持廉洁自律，弘扬清风正气","D":"坚持诚实守信，恪守职业操守"},"a":"A","an":"选项A正确：坚持专业精神，提升服务能力。敬畏专业，做精主业。提倡专业主义，提升专业能力，坚持守正创新，增强专业化发展“软实力”；培育工匠精神，增强学习本领，打造专业化服务的核心竞争力；着力提升把加强党的领导和专业主义精神结合起来的能力，金融服务实体经济的能力，防范化解金融风险的能力，适应国际化发展的能力，金融机构治理能力。题干描述的场景是通过技术手段优化业务流程，体现了对专业能力的追求。 选项B错误：坚持依法合规，筑牢发展基础。敬畏市场，合规展业。坚守合规底线，牢树合规理念，夯实市场发展根基；坚持依法展业，做到全员合规、全线合规，自觉维护市场秩序；坚持合规创造价值，打造良好市场声誉，切实发挥资本市场“看门人”作用。自觉抵制违法违规行为，坚决不碰监管“红线”，推动自身专业化发展，推动资本市场规范化建设。题干未涉及合规底线或监管要求。 选项C错误：坚持廉洁自律，弘扬清风正气。加强从业人员职业道德教育，倡导追求高尚道德情操，树立正确的世界观、人生观、价值观和利益观；着力培育行业廉洁文化，保持清清爽爽、规规矩矩的共事关系、客户关系，构建“亲”“清”新型政商关系，促进形成良好市场生态。自觉抵制行贿受贿、以权谋私、利益输送等不正当行为，心存纪律规矩，珍惜行业声誉，始终保持艰苦奋斗、勤俭节约的优良传统。题干与廉洁从业无关。 选项D错误：坚持诚实守信，恪守职业操守。敬畏法治，忠实履责。坚守契约精神，尊崇法律制度，公平公正对待客户、合作伙伴、竞争对手及社会公众等利益相关方；坚持诚信为本，忠于职业操守，规规矩矩做事，踏踏实实做人，真心实意为发行人服务、为投资者服务，自觉抵制欺诈、传播虚假信息、内幕交易、恶性竞争等行为，切实保护投资者合法权益。题干未体现「契约精神「「抵制欺诈「等诚信要素。","type":"single"},{"id":"cy_law_1887","q":"下列各项中，不属于证券行业文化建设基本要求的是（）。","c":{"A":"牢记社会责任，展现良好形象","B":"坚持依法合规，筑牢发展基础","C":"坚持廉洁自律，弘扬清风正气","D":"坚持盈利导向，回馈股东信任"},"a":"D","an":"行业文化建设的基本要求： （一）【坚持依法合规，筑牢发展基础】。B项 （二）坚持诚实守信，恪守职业操守。 （三）坚持专业精神，提升服务能力。 （四）坚持稳健经营，促进健康发展。 （五）【坚持廉洁自律，弘扬清风正气】。C项 （六）【牢记社会责任，展现良好形象】。A项","type":"single"},{"id":"cy_law_1889","q":"根据《证券期货经营机构及其工作人员廉洁从业规定》以及《证券经营机构及其工作人员廉洁从业实施细则》，某证券公司经纪业务从业人员王某的下列做法中、不属于违反证券经营机构工作人员廉洁从业要求的是（）。","c":{"A":"在下达资产管理产品营销任务时有意剥削熟识营业部的考核指标","B":"假期自驾出游期间给予交通协管人员好处以免除违章停车处罚","C":"协助好友伪造资料以满足科创板投资者适应性管理的核查要求","D":"指示下属营业部在不符合条件的情况下为其亲属申报股票质押式回购以获得更低融资成本"},"a":"B","an":"廉洁从业，是指证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，严格遵守法律法规、中国证监会的规定和行业自律规则，遵守社会公德、商业道德、职业道德和行为规范，公平竞争，合规经营，忠实勤勉，诚实守信，不直接或者间接向他人输送不正当利益或者谋取不正当利益。 选项B正确：王某在私人假期因违章停车给予交通协管人员好处，属于个人行为与证券业务无关，未涉及《廉洁规定》中“开展证券业务及相关活动”的范畴。廉洁从业的约束范围是证券业务活动及其利益输送行为，而非个人生活中的非业务相关行为。 选项A错误：通过剥削熟识营业部考核指标谋取不正当利益，属于业务活动中不公平竞争行为，违反“公平竞争”及禁止利益输送的规定。 选项C错误：协助伪造资料规避投资者适应性管理，属于以不正当方式干扰监管要求，违反禁止“干扰监督管理”的情形。 选项D错误：为亲属谋取更低融资成本，属于利用职务便利输送不正当利益，违反投资银行类业务中禁止“非公允价格获取利益”的规定。","type":"single"},{"id":"cy_law_1891","q":"根据《证券行业执业声誉信息管理办法》，诚信信息中的违法失信信息包括（  ）。","c":{"A":"立案时间","B":"违法失信类型","C":"作出单位","D":"违法失信名称"},"a":"B,C,D","an":"选项BCD正确：违法失信信息包括违法失信名称、作出单位、作出时间、违法失信类型等。 选项A错误：干扰项，违法失信信息强调的是对违法失信行为的处理决定（如行政处罚、纪律处分等）的相关信息，而非调查阶段的立案时间。","type":"multi"},{"id":"cy_law_1893","q":"下列关于证券投资咨询业务人员必须符合相关的从业管理要求，说法正确的是（）。","c":{"A":"证券投资咨询人员不得同时登记为证券分析师和证券投资顾问","B":"个人符合证券投资咨询从业条件，即可从事证券投资咨询业务","C":"从事证券投资咨询业务的人员，加入一家有从业资格的证券投资咨询机构后，即可从事证券投资咨询业务","D":"证券投资咨询人员可以同时在不超过2个证券投资咨询机构执业"},"a":"A","an":"选项A正确，选项D错误：证券投资咨询人员主要包括证券投资顾问人员及证券分析师两类。同一人员不得同时登记为证券分析师和证券投资顾问（A），证券投资咨询机构人员只能与一家证券经营机构签订劳动合同，不得以任何形式同时在两家或两家以上证券经营机构执业（D错误）。 选项BC项错误：从事证券投资咨询业务的人员，应当符合证券投资咨询从业条件并加入一家有从业资格的证券投资咨询机构后，方可从事证券投资咨询业务。","type":"single"},{"id":"cy_law_1895","q":"关于证券投资咨询人员资格管理，下列说法错误的是（）。","c":{"A":"从事证券投资咨询业务的人员，必须取得证券投资咨询从业资格并加入一家有从业资格的证券投资咨询机构后，方可从事证券投资咨询业务","B":"在发布的证券研究报告上署名的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为证券分析师","C":"证券投资咨询人员不得同时在2个或2个以上的证券投资咨询机构执业","D":"从事证券投资咨询业务满5年的人员，可以同时注册为证券分析师和证券投资顾问"},"a":"D","an":"选项D错误：同一人员不得同时登记为证券分析师和证券投资顾问。 选项A正确：从事证券投资咨询业务的人员必须取得资格并加入有资质的机构才能执业。 选项B正确：发布证券研究报告的署名人员需注册为证券分析师。 选项C正确：证券投资咨询机构人员只能与一家证券经营机构签订劳动合同，不得以任何形式同时在两家或两家以上证券经营机构执业。","type":"single"},{"id":"cy_law_1897","q":"2020年7月，某证券公司拟推荐部分员工担任本公司财务顾问主办人，根据《上市公司并购重组财务顾问业务管理办法》，下列人员中不符合条件的是（）。 I 刘某，2020年6月经校园招聘入职（首次参加工作），已取得证券从业资格  II 王某，办理的大额贷款已逾期  III 于某，因出具的上市保荐书存在重大遗漏于2018年12月被交易所给予通报批评处分  IV 李某，私下接受客户微投买卖证券于2017年12月被中国证监会处以罚款","c":{"A":"II、III","B":"I、III、IV","C":"I、II、III、IV","D":"I、II、IV"},"a":"C","an":"根据《上市公司并购重组财务顾问业务管理办法》，财务顾问主办人应当具备下列条件：  （1）【具备中国证监会规定的投资银行业务经历】； （2）参加中国证监会认可的财务顾问主办人胜任能力考试且成绩合格；  （3）所任职机构同意推荐其担任本机构的财务顾问主办人；  （4）【未负有数额较大到期未清偿的债务】；  （5）最近24个月无违反诚信的不良记录；  （6）【最近24个月未因执业行为违反行业规范而受到行业自律组织的纪律处分】；  （7）【最近36个月未因执业行为违法违规受到处罚】；  （8）中国证监会规定的其他条件。  Ⅰ项，刘某，首次参加工作，并未明确属于投行部门，不能确定其具备投行业务经历，不符合（1）。 Ⅱ项，王某，大额贷款逾期，不符合（4）。 Ⅲ项，于某，24个月内被纪律处分，不符合（6）。  Ⅳ项，李某，36个月内行政处罚，不符合（7）。","type":"single"},{"id":"cy_law_1899","q":"下列关于证券公司从事私募资产管理业务的投资经理应具备的条件，正确的是（  ）。","c":{"A":"最近三年未被监管机构采取行政监管措施","B":"依法取得基金从业资格","C":"具备良好的诚信记录","D":"具有三年以上投资管理、投资研究、投资咨询等相关业务经验"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构投资管理人员注册登记规则》，私募资产管理业务投资经理应当依法取得基金从业资格（B），具有3年以上投资管理、投资研究、投资咨询等相关业务经验（D），具备良好的诚信记录（C）和职业操守，且最近3年未被监管机构采取重大行政监管措施（A）、行政处罚，符合法律法规规定的其他条件。","type":"multi"},{"id":"cy_law_1901","q":"对证券行业高级管理人员的岗前培训时间和其他从业人员一致。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"培训学时根据相关人员执业情况、专业能力水平评价情况、处罚处分措施情况、诚信情况、其他执业声誉情况及为行业发展、履行社会责任作出贡献情况等实行差异化管理（并非一致）。","type":"judge"},{"id":"cy_law_1903","q":"证券公司应对证券经纪人进行执业前培训，其中法律法规和职业道德的培训不少于（）。","c":{"A":"10个小时","B":"20个小时","C":"30个小时","D":"40个小时"},"a":"B","an":"证券公司应对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训不少于20个小时。","type":"single"},{"id":"cy_law_1905","q":"以下属于证券分析师执业行为准则的是（）。","c":{"A":"保持独立性","B":"认真审慎、专业严谨","C":"充分尊重知识产权","D":"维护所在机构利益"},"a":"A,B,C,D","an":"证券分析师执业行为准则有： 1.保持独立性；（A正确） 2.保持客观性； 3.公平对待发布对象； 4.认真审慎、专业严谨；（B正确） 5.恪守诚信原则； 6.信息保密； 7.充分尊重知识产权；（C正确） 8.报告违法违规事项； 9.防范利益冲突； 10.珍惜职业称号和职业声誉； 11.防范不正当竞争； 12.规范参与公众交流活动； 13.备案客户服务； 14.维护所在机构利益；（D正确） 15.规范外请专家服务； 16.加强后续培训； 17.引导市场预期、传递正能量。","type":"multi"},{"id":"cy_law_1907","q":"证券公司应当对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训时间不少于10个小时。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当对证券经纪人进行不少于60个小时的执业前培训，其中法律法规和职业道德的培训时间不少于20个小时。","type":"judge"},{"id":"cy_law_1909","q":"有下列（）情形之一的人员不得担任证券交易所的负责人。","c":{"A":"因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾5年","B":"因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾10年","C":"因违法行为或者违纪行为被吊销执业证书或者被取消资格的律师、注册会计师或者其他证券服务机构的专业人员，自被吊销执业证书或者被取消资格之日起未逾10年","D":"因违法行为或者违纪行为被吊销执业证书或者被取消资格的律师、注册会计师或者其他证券服务机构的专业人员，自被吊销执业证书或者被取消资格之日起未逾5年"},"a":"A,D","an":"有下列情形之一的人员不得担任证券交易所的负责人： 一、因违法行为或者违纪行为被解除职务的证券交易场所、证券登记结算机构的负责人或者证券公司的董事、监事、高级管理人员，自被解除职务之日起未逾5年；（A正确，B错误） 二、因违法行为或者违纪行为被吊销执业证书或者被取消资格的律师、注册会计师或者其他证券服务机构的专业人员，自被吊销执业证书或者被取消资格之日起未逾5年。（D正确，C错误）","type":"multi"},{"id":"cy_law_1911","q":"证券分析师应当自觉遵守法律、法规、中国证监会的有关规定、行业自律规则以及所在经营机构的内部管理制度，规范执业行为，遵循的执业原则包括（）。","c":{"A":"独立","B":"客观","C":"专业","D":"公开"},"a":"A,B,C","an":"证券分析师应当自觉遵守法律、法规、中国证监会的有关规定、行业自律规则以及所在经营机构的内部管理制度，规范执业行为；遵循独立（A正确）、客观（B正确）、公平（并非公开，某些未公开信息要求保密，D错误）、审慎、专业（C正确）、诚信的执业原则，自觉弘扬行业优秀文化，加强自身职业道德修养，规范自身行为，履行社会责任，遵守社会公德。","type":"multi"},{"id":"cy_law_1913","q":"证券评级机构的人员考核和薪酬制度，不得影响评级从业人员依据（）和一致性的原则开展业务。","c":{"A":"独立性","B":"客观性","C":"公正性","D":"审慎性"},"a":"A,B,C,D","an":"选项ABCD正确：证券评级机构的人员考核和薪酬制度，不得影响评级从业人员依据独立性、客观性、公正性、审慎性、一致性的原则开展业务。","type":"multi"},{"id":"cy_law_1915","q":"张某担任甲证券公司私募资产管理业务投资经理。2022年6月1日，张某从甲证券公司离任，拟入职乙证券公司担任私募资产管理业务投资经理，从事投资业务。张某作为私募资产管理业务的投资经理，应当具备（）。","c":{"A":"从事证券业务所需的专业能力","B":"2年以上投资管理、投资研究、投资咨询等相关业务经验","C":"良好的诚信记录和职业操守","D":"最近3年未被监管机构采取重大行政监管措施"},"a":"A,C,D","an":"根据《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构投资管理人员注册登记规则》，私募资产管理业务投资经理应当依法取得基金从业资格（A正确），具有3年以上投资管理、投资研究、投资咨询等相关业务经验（B错误），具备良好的诚信记录和职业操守（C正确），且最近3年未被监管机构采取重大行政监管措施、行政处罚（D正确），符合法律法规规定的其他条件。","type":"multi"},{"id":"cy_law_1917","q":"证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，中国证监会应当从重处理的情形有（）。","c":{"A":"直接、间接或者唆使、协助他人向监管人员输送利益","B":"涉及金额较大或者涉及人员较多","C":"产生恶劣社会影响","D":"首次违反该规定"},"a":"A,B,C","an":"证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有下列情形之一的，中国证监会应当从重处理： （1）直接、间接或者唆使、协助他人向监管人员输送利益；（A正确） （2）连续或者多次违反本规定；（并非首次，D错误） （3）涉及金额较大或者涉及人员较多；（B正确）  （4）产生恶劣社会影响；（C正确） （5）曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定； （6）中国证监会认定应当从重处理的其他情形。","type":"multi"},{"id":"cy_law_1919","q":"在一个培训周期内，证券公司应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的50%。（）","c":{"1":"对","0":"错"},"a":"0","an":"在一个培训周期内，证券公司应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的30%。","type":"judge"},{"id":"cy_law_1921","q":"中国证监会将行业文化建设专项评价已纳入证券公司分类评价体系。（）","c":{"1":"对","0":"错"},"a":"1","an":"中国证监会于2021年起，启动对证券公司服务脱贫攻坚等社会责任履行情况、行业文化建设、北京证券交易所业务进行专项评价，并纳入证券公司分类评价体系，引导行业机构积极履行社会责任，逐步打造“合规、诚信、专业、稳健”的行业文化，服务资本市场重大改革。","type":"judge"},{"id":"cy_law_1923","q":"根据《证券期货经营机构私募资产管理业务管理办法》，私募资产管理业务投资经理必须具备的条件包括（  ）","c":{"A":"取得基金从业资格","B":"具有 5 年以上证券自营业务经验","C":"最近 3 年未被监管机构行政处罚","D":"具备本科以上学历"},"a":"A,C","an":"根据《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构投资管理人员注册登记规则》，私募资产管理业务投资经理应当依法取得基金从业资格（A正确），具有3年以上投资管理、投资研究、投资咨询等相关业务经验（B错误），具备良好的诚信记录和职业操守，且最近3年未被监管机构采取重大行政监管措施、行政处罚（C正确），符合法律法规规定的其他条件。 选项D错误：任职条件未提及学历要求","type":"multi"},{"id":"cy_law_1925","q":"根据《证券行业执业声誉信息管理办法》，诚信信息包括基本信息、诚信信息和其他执业声誉信息。（）","c":{"1":"对","0":"错"},"a":"0","an":"执业声誉信息包括基本信息、诚信信息和其他执业声誉信息。 诚信信息包括表彰奖励信息和违法失信信息。","type":"judge"},{"id":"cy_law_1927","q":"在一个培训周期内，证券投资咨询机构应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的（   ）。","c":{"A":"0.1","B":"0.15","C":"0.2","D":"0.3"},"a":"D","an":"选项D正确：在一个培训周期内，证券投资咨询机构应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的30%。","type":"single"},{"id":"cy_law_1929","q":"证券投资咨询机构从业人员参加持续培训的培训内容应当包括（   ）。","c":{"A":"法律法规","B":"职业道德","C":"宏观政策","D":"专业技能"},"a":"A,B,C,D","an":"证券投资咨询机构从业人员参加持续培训的培训内容应当包括法律法规（选项A）、宏观政策（选项C）、职业道德（选项B）及与所从事证券业务相关的理论、专业技能（选项D）等。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_law_1931","q":"申请证券、期货投资咨询从业资格的机构，应当有100万人民币以上的注册资本。","c":{"1":"对","0":"错"},"a":"1","an":"申请证券、期货投资咨询从业资格的机构，应当有100万人民币以上的注册资本。因此本题说法正确。","type":"judge"},{"id":"cy_law_1933","q":"证券投资咨询机构从事证券投资顾问业务，应当遵循的工作原则是（   ）。","c":{"A":"诚实信用、客户自担风险、分类管理","B":"规范运作、利益至上、公平公正","C":"依法合规，防范利益冲突、诚实信用、忠实投资者利益、廉洁从业","D":"守法合规、公平公正、集中管理"},"a":"C","an":"证券投资咨询机构从事证券投资顾问业务，应当遵循的工作原则包括： 1.依法合规，防范利益冲突 证券投资咨询机构从事证券投资顾问业务，应当遵守法律、行政法规和《证券投资顾问业务暂行规定》等，加强合规管理，健全内部控制，防范利益冲突，切实维护投资者合法权益。 2.诚实信用 证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉、审慎地为投资者提供证券投资顾问服务。 3.忠实投资者利益 证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实投资者利益，不得为公司及其关联方的利益损害投资者利益；不得为证券投资顾问人员及其利益相关者的利益损害投资者利益；不得为特定投资者利益损害其他投资者利益。 4.廉洁从业 证券投资咨询机构及其人员提供证券投资顾问服务，应严格遵守法律法规、中国证监会的规定和行业自律规则，遵守社会公德、商业道德、职业道德和行为规范，公平竞争，合规经营，忠实勤勉，诚实守信，不直接或者间接向他人输送不正当利益或者谋取不正当利益。 综上所述，本题应选择C选项。","type":"single"},{"id":"cy_law_1935","q":"证券投资顾问业务的工作原则包括（   ）。","c":{"A":"依法合规，防范利益冲突","B":"诚实信用","C":"忠实投资者利益","D":"独立客观"},"a":"A,B,C","an":"证券投资咨询机构从事证券投资顾问业务，应当遵循的工作原则包括： 1.依法合规，防范利益冲突（选项A） 证券投资咨询机构从事证券投资顾问业务，应当遵守法律、行政法规和《证券投资顾问业务暂行规定》等，加强合规管理，健全内部控制，防范利益冲突，切实维护投资者合法权益。 2.诚实信用（选项B） 证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉、审慎地为投资者提供证券投资顾问服务。 3.忠实投资者利益（选项C） 证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实投资者利益，不得为公司及其关联方的利益损害投资者利益；不得为证券投资顾问人员及其利益相关者的利益损害投资者利益；不得为特定投资者利益损害其他投资者利益。 4.廉洁从业 证券投资咨询机构及其人员提供证券投资顾问服务，应严格遵守法律法规、中国证监会的规定和行业自律规则，遵守社会公德、商业道德、职业道德和行为规范，公平竞争，合规经营，忠实勤勉，诚实守信，不直接或者间接向他人输送不正当利益或者谋取不正当利益。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_law_1937","q":"证券投资咨询机构应当制定证券投资顾问人员管理制度，加强对证券投资顾问人员（   ）的管理。","c":{"A":"注册登记","B":"岗位职责","C":"执业行为","D":"权利义务"},"a":"A,B,C","an":"证券投资咨询机构应当制定证券投资顾问人员管理制度，加强对证券投资顾问人员注册登记（选项A）、岗位职责（选项B）、执业行为（选项C）的管理。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_law_1939","q":"任何机构或个人从事就证券市场、证券品种的走势，投资证券的可行性，以口头、书面、电脑网络或中国证监会认定的其他形式向公众提供分析、预测或建议，必须先行取得中国证券业协会授予的证券投资咨询业务资格证书。","c":{"1":"对","0":"错"},"a":"0","an":"任何机构或个人就证券市场、证券品种的走势，投资证券的可行性，以口头、书面、电脑网络或中国证监会认定的其他形式向公众提供分析、预测或建议的业务，必须先行取得中国证监会【不是证券业协会】授予的证券投资咨询业务资格证书，或者经取得中国证监会授予的证券投资咨询业务资格证书的机构聘任并符合相关从业要求。因此本题说法错误。","type":"judge"},{"id":"cy_law_1941","q":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格，并在（）注册登记为证券投资顾问。","c":{"A":"中国证监会","B":"证券公司","C":"国务院监督管理机构","D":"中国证券业协会"},"a":"D","an":"向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在中国证券业协会（D项正确）注册登记为证券投资顾问。","type":"single"},{"id":"cy_law_1943","q":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为(  )","c":{"A":"理财规划师","B":"理财顾问","C":"证券投资顾问","D":"证券分析师"},"a":"C","an":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为证券投资顾问。","type":"single"},{"id":"cy_law_1945","q":"向客户提供证券投资顾问服务的人员，应当具有(  )，并向中国证券业协会登记注册为投资顾问。","c":{"A":"证券投资咨询执业资格","B":"证券分析师执业资格","C":"投资顾问从业资格","D":"CFA三级证书"},"a":"A","an":"根据《证券投资顾问业务暂行规定》第7条：向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为证券投资顾问。证券投资顾问不得同时注册为证券分析师。","type":"single"},{"id":"cy_law_1947","q":"下列关于证券投资顾问人员注册登记管理的说法，错误的是（  ）。","c":{"A":"向客户提供证券投资顾问服务的人员应在中国证券业协会注册登记为证券投资顾问","B":"证券投资顾问可以同时注册为证券分析师，但应当分开管理，以防止可能的利益","C":"证券投资顾问不得同时注册为证券分析师","D":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格"},"a":"B","an":"A正确：向客户提供证券投资顾问服务的人员，应当符合相关从业条件，并在中国证券业协会注册登记为证券投资顾问。 B错误、C正确：证券投资顾问不得同时注册为证券分析师。 D正确：向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格。","type":"single"},{"id":"cy_law_1949","q":"证券公司、证券投资咨询机构应当制定证券投资顾问人员管理制度，加强对证券投资顾问人员（  ）的管理。 Ⅰ 是否取得证券从业资格 Ⅱ 是否具有证券投资咨询执业资格 Ⅲ 是否注册登记为证券投资顾问 Ⅳ 是否注册为证券分析师","c":{"A":"Ⅰ  Ⅳ","B":"Ⅰ Ⅱ Ⅲ Ⅳ","C":"Ⅰ Ⅱ Ⅲ","D":"Ⅱ Ⅲ Ⅳ"},"a":"C","an":"证券投资咨询机构应当制定证券投资顾问人员管理制度，加强对证券投资顾问人员注册登记、岗位职责、执业行为的管理。 综上，该题选C。","type":"single"},{"id":"cy_law_1951","q":"证券投资咨询执业资格，并在()注册登记为证券投资顾问。","c":{"A":"中国证监会","B":"证券公司","C":"国务院监督管理机构","D":"中国证券业协会"},"a":"D","an":"向客户提供投资顾问服务的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为证券投资顾问。","type":"single"},{"id":"cy_law_1953","q":"关于证券期货投资咨询人员执业行为，下列说法中，正确的有 ()","c":{"A":"证券投资顾问必须加入一家有投资咨询从业资格的机构后方可执业","B":"任何人未取得证券、期货投资咨询从业资格，不得从事证券投资顾问业务","C":"获得证券期货投资咨询从业资格并取得证券投资顾问执业证书的人员，可以自行执业，自负盈亏","D":"证券期货投资咨询人员具有从事相关业务2年以上的经历才能申请执业证书"},"a":"A,B,D","an":"从事证券、期货投资咨询业务的人员，必须取得证券、期货投资咨询从业资格并加入一家有从业资格的证券、期货投资咨询机构后，方可从事证券、期货投资咨询业务。任何人未取得证券、期货投资咨询从业资格的，或者取得证券、期货投资咨询从业资格，但未在证券、期货投资咨询机构工作的，不得从事证券、期货投资咨询业务。 综上，该题选ABD。","type":"multi"},{"id":"cy_law_1955","q":"向客户提供证券投资顾问服务的人员，应当具有证券投资顾问执业资格，并在中国证券业协会注册登记为（  ）。","c":{"A":"证券投资顾问","B":"证券自营","C":"投资银行","D":"证券资产管理"},"a":"A","an":"向客户提供证券投资顾问服务的人员，应当具有证券投资顾问执业资格，并在中国证券业协会注册登记为证券投资顾问。","type":"single"},{"id":"cy_law_1957","q":"下列关于对提供证券投资顾问服务的人员的要求，正确的有（  ）。","c":{"A":"证券投资顾问可以同时注册为证券分析师","B":"应当具有证券投资咨询执业资格","C":"须在中国证券业协会注册登记为证券投资顾问","D":"证券投资顾问不能同时注册为证券分析师"},"a":"B,C,D","an":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格，并在中国证券业协会注册登记为证券投资顾问。证券投资顾问不得同时注册为证券分析师。","type":"multi"},{"id":"cy_law_1959","q":"我国的证券分析师是指那些具有（ ），并在中国证券业协会注册登记的从事发布证券研究报告的人员。","c":{"A":"证券从业资格","B":"证券投资咨询执业资格","C":"基金从业资格","D":"期货从业资格"},"a":"B","an":"选项B正确：我国的证券分析师是指那些具有证券投资咨询执业资格，并在中国证券业协会注册登记的从事发布证券研究报告的人员。","type":"single"},{"id":"cy_law_1961","q":"在一个培训周期内，证券公司应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的（  ）。","c":{"A":"0.1","B":"0.15","C":"0.3","D":"0.5"},"a":"C","an":"在一个培训周期内，证券公司应当要求其从业人员在党建引领、行业文化、职业道德方面的学时比重不低于其应完成培训学时的30% 。","type":"single"},{"id":"cy_law_1963","q":"证券分析师违反《发布证券研究报告执业规范》，（  ）根据自律规定，视情节轻重采取自律管理措施或纪律处分。","c":{"A":"证券业协会","B":"证监会","C":"证券交易所","D":"证券信用评级机构"},"a":"A","an":"根据《发布证券研究报告执业规范》，证券分析师违反本准则规定的,中国证券业协会将根据《中国证券业协会自律措施实施办法》等有关规定,视情节轻重采取谈话提醒、要求提交书面承诺、要求参加强化培训、警示、责令改正等自律管理措施或行业内通报批评、公开谴责、暂停执业、停止执业等纪律处分,并按规定将相关自律措施记入协会诚信信息管理系统,相关纪律处分信息将记入证监会诚信档案数据库。","type":"single"}];
var state = {};
var selected = {};
var currentCh = 0;

function init() {
  // 初始化state
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    state[i] = { done: false, correct: false, answers: [] };
  }
  // 恢复上次的章节
  var saved = localStorage.getItem('sec_ch_current_' + SUBJECT);
  if (saved !== null) currentCh = parseInt(saved, 10) || 0;
  render();
}

// ====== 升级：渲染章节卡片列表 ======
function renderChapterList() {
  var list = document.getElementById('chList');
  var html = '';
  for (var i = 0; i < CHAPTER_INFO.length; i++) {
    var ch = CHAPTER_INFO[i];
    var active = i === currentCh ? ' active' : '';
    var sections = SECTION_DATA[i] || [];
    var ch_color = ch.color;
    html += '<div class="ch-card' + active + '" id="chCard-' + i + '">';
    html += '<div class="ch-hd" onclick="toggleChapter(' + i + ')">';
    html += '<span class="ch-name">' + chapterName(i) + '</span>';
    html += '<span class="ch-star">' + ch.star_display + '</span>';
    html += '<span class="ch-count">' + ch.count + '题</span>';
    html += '<span class="ch-arrow' + (i === currentCh ? ' open' : '') + '">▼</span>';
    html += '</div>';
    // Weight bar
    var w = parseFloat(ch.weight) || 8;
    html += '<div class="ch-bar"><div class="ch-bar-fill" style="width:' + Math.min(w, 50) + '%;background:' + ch_color + '"></div></div>';
    html += '<div class="ch-desc">' + (ch.desc || '') + '</div>';
    // Sections
    html += '<div class="ch-body" id="chBody-' + i + '"' + (i === currentCh ? ' style="display:block"' : '') + '>';
    for (var j = 0; j < sections.length; j++) {
      var sec = sections[j];
      var selClass = (currentCh === i && currentSection === j) ? ' sel' : '';
      var hotClass = ch.star >= 4 ? ' hot' : '';
      html += '<div class="sec-item' + selClass + hotClass + '" onclick="filterToSection(' + i + ',' + j + ')">';
      html += '<span class="sec-name">第' + sectionOrdinal(j) + '节 ' + sec[0] + '</span>';
      html += '<span class="sec-count">~' + sec[1] + '题</span>';
      if (ch.star >= 4 && j < 2) html += '<span class="sec-badge">🔥</span>';
      html += '</div>';
    }
    html += '<div class="ch-all-link" onclick="filterToSection(' + i + ',-1)">📖 全部题目</div>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function chapterName(idx) {
  var ch = CHAPTER_INFO[idx];
  return '第' + (idx+1) + '章 ' + ch.name;
}

function sectionOrdinal(j) {
  var names = ['一','二','三','四','五','六','七','八','九','十'];
  return names[j] || (j+1);
}

function toggleChapter(idx) {
  var body = document.getElementById('chBody-' + idx);
  var arrow = document.querySelector('#chCard-' + idx + ' .ch-arrow');
  var isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

function filterToSection(chIdx, secIdx) {
  currentCh = chIdx;
  currentSection = secIdx;
  localStorage.setItem('sec_ch_current_' + SUBJECT, currentCh);
  
  // Update UI
  var cards = document.querySelectorAll('.ch-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('active', i === chIdx);
    var body = document.getElementById('chBody-' + i);
    if (body) body.style.display = (i === chIdx) ? 'block' : 'none';
    var arr = cards[i].querySelector('.ch-arrow');
    if (arr) arr.classList.toggle('open', i === chIdx);
  }
  
  // Update section selection
  var allSecs = document.querySelectorAll('.sec-item');
  for (var i = 0; i < allSecs.length; i++) allSecs[i].classList.remove('sel');
  if (secIdx >= 0) {
    var items = document.querySelectorAll('#chBody-' + chIdx + ' .sec-item');
    if (items[secIdx]) items[secIdx].classList.add('sel');
  }
  
  // Show/hide filter info
  var fi = document.getElementById('secFilterInfo');
  if (secIdx >= 0) {
    fi.style.display = 'flex';
    var secName = SECTION_DATA[chIdx] && SECTION_DATA[chIdx][secIdx] ? SECTION_DATA[chIdx][secIdx][0] : '';
    document.getElementById('secFilterText').textContent = '📌 当前筛选：' + CHAPTER_INFO[chIdx].name + ' → 第' + sectionOrdinal(secIdx) + '节 ' + secName;
  } else {
    fi.style.display = 'none';
  }
  
  selected = {};
  render();
}

function clearSectionFilter() {
  filterToSection(currentCh, -1);
}

// ====== 保留原渲染逻辑，加入节筛选 ======
function getChapterQuestions(chIdx) {
  var ch = CH_MAP[chIdx];
  var qs = [];
  for (var i = ch.start; i < ch.start + ch.count; i++) {
    if (currentSection >= 0 && Q_SECTION[i] !== currentSection) continue;
    qs.push({ idx: i, q: ALL_QUESTIONS[i] });
  }
  return qs;
}

function render() {
  renderChapterList();
  renderChInfo();
  renderQuestions();
  renderStats();
}

function renderChInfo() {
  var ch = CHAPTER_INFO[currentCh];
  if (!ch) return;
  // Update stats bar
  document.getElementById('totalQ').textContent = ch.count;
}

function renderStats() {
  var ch = CH_MAP[currentCh];
  if (!ch) return;
  // Count only filtered questions for stats
  var qs = getChapterQuestions(currentCh);
  var done = 0, correct = 0;
  for (var i = 0; i < qs.length; i++) {
    var st = state[qs[i].idx];
    if (st.done) { done++; if (st.correct) correct++; }
  }
  var pct = done > 0 ? Math.round(correct/done*100) : 0;
  var totalFiltered = qs.length;
  var allPct = totalFiltered > 0 ? Math.round(done/totalFiltered*100) : 0;
  
  document.getElementById('doneQ').textContent = done;
  document.getElementById('accQ').textContent = pct + '%';
}

function renderQuestions() {
  var container = document.getElementById('qContainer');
  var qs = getChapterQuestions(currentCh);
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty"><div style="font-size:3rem;margin-bottom:0.5rem">📝</div><div>暂无题目' + (currentSection >= 0 ? '（该节暂无题目）' : '') + '</div></div>';
    return;
  }
  
  var num = 0, prevMaterial = '';
  var html = '';
  
  for (var qi = 0; qi < qs.length; qi++) {
    var item = qs[qi], idx = item.idx, q = item.q, st = state[idx];
    if (q.type !== 'comprehensive' || q.material !== prevMaterial) num++;
    prevMaterial = q.material || '';
    
    var typeLabel = q.type === 'comprehensive' ? '综合' : (TYPE_LABEL[q.type] || q.type);
    var typeClass = q.type === 'comprehensive' ? 'type-c' : (TYPE_CLASS[q.type] || 'type-s');
    
    html += '<div class="qcard" id="qc-' + idx + '">';
    if (q.type === 'comprehensive' && q.material) {
      html += '<div class="material-box"><div class="mat-label">📋 材料分析</div>' + q.material + '</div>';
    }
    html += '<div class="q-header"><div class="q-num">第' + num + '题</div><span class="q-type ' + typeClass + '">' + typeLabel + '</span></div>';
    html += '<div class="q-text">' + q.q + '</div>';
    
    var optKeys = Object.keys(q.c);
    html += '<div class="options" id="opts-' + idx + '">';
    for (var oi = 0; oi < optKeys.length; oi++) {
      var k = optKeys[oi];
      var sel = selected[idx] && selected[idx].indexOf(k) >= 0 ? 'selected' : '';
      html += '<div class="opt ' + sel + '" data-q="' + idx + '" data-key="' + k + '" onclick="toggleOpt(' + idx + ',\'' + k + '\')">';
      html += '<span class="ol">' + k + '.</span><span>' + q.c[k] + '</span></div>';
    }
    html += '</div>';
    
    var doneStyle = st.done ? ' style="display:none"' : '';
    var showAn = !st.done ? ' style="display:none"' : '';
    html += '<div class="actions">';
    html += '<button class="btn btn-primary" onclick="checkAnswer(' + idx + ')"' + doneStyle + '>✅ 确认答案</button>';
    html += '<button class="btn btn-secondary" onclick="resetQuestion(' + idx + ')"' + showAn + '>🔄 重做</button>';
    html += '</div>';
    
    var anText = q.an || '暂无解析';
    html += '<div class="analysis" id="an-' + idx + '"' + showAn + '>';
    html += '<div class="a-label">📖 解析</div>';
    if (st.done) {
      var ansStr = Array.isArray(st.answers) ? st.answers.join(', ') : '';
      var isCorrect = st.correct;
      html += '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
           + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
           + ' · 正确答案：' + esc(q.a);
      if (!isCorrect && ansStr) html += ' · 你的答案：' + esc(ansStr);
      html += '</div>';
    }
    html += '<div class="a-text">' + anText + '</div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

// ====== 保留原交互函数 ======
function toggleOpt(idx, key) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  if (!selected[idx]) selected[idx] = [];
  var arr = selected[idx];
  var pos = arr.indexOf(key);
  var isSingle = (q.type === 'comprehensive' && q.sub_type === 'single') || q.type === 'single' || q.type === 'judge';
  
  if (isSingle) {
    selected[idx] = [key];
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.remove('selected');
      if (opts[i].dataset.key === key) opts[i].classList.add('selected');
    }
  } else {
    if (pos >= 0) arr.splice(pos, 1); else arr.push(key);
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      var k = opts[i].dataset.key;
      opts[i].classList.toggle('selected', selected[idx].indexOf(k) >= 0);
    }
  }
}

function checkAnswer(idx) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  var sel = selected[idx] || [];
  if (sel.length === 0) return;
  var correctAns = q.a;
  var userAns = sel.sort().join('');
  var isCorrect = userAns === correctAns;
  
  state[idx] = { done: true, correct: isCorrect, answers: sel.slice() };
  saveState();
  
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) {
    var k = opts[i].dataset.key;
    opts[i].classList.remove('selected');
    if (correctAns.indexOf(k) >= 0) opts[i].classList.add('correct');
    else if (sel.indexOf(k) >= 0) opts[i].classList.add('wrong');
  }
  
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = 'none';
  var an = document.getElementById('an-' + idx);
  var ansStr = sel.join(', ');
  an.style.display = 'block';
  an.innerHTML = '<div class="a-label">📖 解析</div>'
    + '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
    + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
    + ' · 正确答案：' + esc(correctAns)
    + (!isCorrect ? ' · 你的答案：' + esc(ansStr) : '')
    + '</div><div class="a-text">' + (q.an || '暂无解析') + '</div>';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = '';
  renderStats();
  
  // ── 记录到学情看板 ──
  if (window.ExamRecorder) {
    var typeCn = q.type === 'multi' ? '多选' : (q.type === 'judge' ? '判断' : (q.type === 'comprehensive' ? '不定项' : '单选'));
    window.ExamRecorder.record({
      questionId: SUBJECT + '-' + idx,
      subject: SUBJECT === '金融市场基础知识' ? '金融市场基础知识' : '证券市场基本法律法规',
      chapter: '第' + (currentCh + 1) + '章',
      type: q.type === 'judge' ? 'j' : (q.type === 'multi' ? 'm' : (q.type === 'comprehensive' ? 'c' : 's')),
      typeCn: typeCn,
      question: q.q || '',
      userAnswer: userAns,
      correctAnswer: correctAns,
      isCorrect: isCorrect,
      choices: q.c || {},
      source: '章节精练'
    });
  }
}

function resetQuestion(idx) {
  state[idx] = { done: false, correct: false, answers: [] };
  selected[idx] = [];
  saveState();
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('correct', 'wrong', 'selected');
  document.getElementById('an-' + idx).style.display = 'none';
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = '';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = 'none';
  renderStats();
}

function switchCh(idx) { currentCh = idx; currentSection = -1; selected = {}; render(); }

var TYPE_LABEL = { single:'单选', multi:'多选', judge:'判断', comprehensive:'综合' };
var TYPE_CLASS = { single:'type-s', multi:'type-m', judge:'type-j', comprehensive:'type-c' };
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ====== 持久化 ======
function saveState() {
  var obj = {};
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    if (state[i].done) obj[i] = state[i];
  }
  try { localStorage.setItem('sec_exam_ch_state_' + SUBJECT, JSON.stringify(obj)); } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem('sec_exam_ch_state_' + SUBJECT);
    if (raw) {
      var obj = JSON.parse(raw);
      for (var k in obj) {
        if (obj.hasOwnProperty(k) && state[k]) state[k] = obj[k];
      }
    }
  } catch(e) {}
}

loadState();
init();
</script>
<script src="recorder.js"></script>
</body>
