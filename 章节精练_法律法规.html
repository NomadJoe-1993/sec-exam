law_1281","q":"下列关于证券公司治理的基本要求，说法错误的是（）。","c":{"A":"拥有先进的信息系统","B":"建立稳健的薪酬制度","C":"健全组织架构，明确职责划分","D":"不得侵犯客户合法权益"},"a":"A","an":"题目问的是“说法错误的”。选项A：“先进的信息系统” 属于证券公司业务运营或技术保障的范畴，超出了治理基本要求的范畴，因此答案选择A。 选项BCD：证券公司治理的基本要求： （1）建立健全组织架构、明确职责划分  （2）不得侵犯客户合法权益 （3）建立完备的内部控制体系 （4）建立稳健的薪酬制度","type":"single"},{"id":"cy_law_1283","q":"下列关于证券公司跨越信息隔离墙管理的表述，说法正确的是（）。","c":{"A":"公开侧业务部门应当事先向跨墙人员所属部门和合规部门提出申请，并经其审批同意","B":"跨墙人员在跨墙活动结束且获取的内幕信息已公开或者不再具有重大影响后方可回墙","C":"跨墙人员在跨墙期间使用跨墙后知悉的内幕信息","D":"证券公司无须对跨墙人员的行为进行监督管理"},"a":"B","an":"选项B正确：跨墙人员在跨墙活动结束且获取的内幕信息已公开或者不再具有重大影响后方可回墙。 选项A错误：保密侧业务部门（非公开侧业务部门）应当事先向跨墙人员所属部门和合规部门提出申请，并经其审批同意。 选项C错误：跨墙人员在跨墙期间不应泄露或不当使用跨墙后知悉的内幕信息，不应获取与跨墙业务无关的内幕信息。 选项D错误：证券公司有关部门应对（而不是无须）跨墙人员的行为进行监督管理。","type":"single"},{"id":"cy_law_1285","q":"根据《证券公司投资银行类业务内部控制指引》，以下关于证券公司投资银行类业务内部控制的说法错误的是（）。","c":{"A":"专门从事资产管理业务的证券公司分支机构可以开展资产证券化业务","B":"非单一从事投资银行类业务的证券公司分支机构可以开展除项目承揽等辅助性活动以外的投资银行类业务","C":"分管投资银行类业务的高级管理人员不得同时管理与投资银行类业务存在或可能存在利益冲突的部门或机构","D":"证券公司依法应当承担的责任不因委托外部机构而免除"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误，选项A正确：非单一从事投资银行类业务的证券公司分支机构不得（而不是可以）开展除项目承揽等辅助性活动以外的投资银行类业务，专门从事资产管理业务的证券公司分支机构开展资产证券化业务除外。因此答案选择B。 选项C正确：分管投资银行类业务的高级管理人员不得同时管理与投资银行类业务存在或可能存在利益冲突的部门或机构。 选项D正确：证券公司依法应当承担的责任不因委托外部机构而免除。","type":"single"},{"id":"cy_law_1287","q":"按照《证券公司合规管理实施指引》的要求，A证券公司设立合规部门，任命王某作为合规负责人。以下关于合规部门的说法错误的是（）。","c":{"A":"合规部门对王某负责","B":"合规部门不得承担与合规管理相冲突的其他职责","C":"证券公司应当将合规部门与承担稽核、风控、内审、法务职责相关的部门进行区分","D":"合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5％，且不得少于3人"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误：合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5％，且不得少于5人（非3人）。因此答案选择D。 选项A正确：合规部门应当对合规负责人负责。 选项B正确：合规部门不能承担与合规管理相冲突的其他职责，比如业务、财务或信息技术等。 选项C正确：需要将合规部门与其他内部控制部门（如稽核、风控、内审和法务）进行区分，以确保各自的独立性。","type":"single"},{"id":"cy_law_1289","q":"按照《证券公司合规管理实施指引》的要求，某证券公司设立合规部门，作为合规负责人王某领导的办事机构承担合规管理职责。下列关于合规部门的说法错误的是（  ）。","c":{"A":"合规部门对王某负责","B":"合规部门不得承担与合规管理相冲突的其他职责","C":"证券公司应当将合规部门与承担稽核、风控、内审、法务职责相关的部门进行区分","D":"合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于3人"},"a":"D","an":"选项D错误：证券公司应当为合规部门配备足够的、具备与履行合规管理职责相适应的专业知识和技能的合规管理人员。合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于5人。 选项ABC说法正确。","type":"single"},{"id":"cy_law_1291","q":"某证券公司为保障客户资金划付安全，规定柜台资金存取岗位必须配备两名工作人员，一人经办、一人复核，共同完成操作并承担责任。这一组织结构设计主要体现了内部控制“三道防线”中的（  ）。","c":{"A":"第二道防线","B":"第一道防线","C":"第三道防线","D":"综合防线"},"a":"B","an":"证券公司应建立清晰合理的组织结构，依据所处环境和自身经营特点设立严密有效的三道业务监控防线。 (1)建立重要一线岗位双人、双职、双责为基础的“第一道防线”，并加强对单人单岗业务的监控。与资金、有价证券、重要空白凭证、业务合同、印章等直接接触的岗位和涉及信息系统安全的岗位，应当实行双人负责制。 (2)建立相关部门、相关岗位之间相互制衡、监督的“第二道防线”。不同部门应有明确的职责分工不相容职务应适当分离。 (3)建立独立的监督检查部门对各项业务、各部门、各分支机构、各岗位全面实施监控、检查和反馈的“第三道防线”。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_law_1293","q":"在证券公司中，下列岗位的从业人员，可被认定为投资银行类业务“专职内部控制人员”的是（  ）。","c":{"A":"投资银行部的债券承做项目经理","B":"研究所负责撰写行业研究报告的分析师","C":"专门负责投行项目合规审查的合规专员","D":"运营管理部负责项目材料归档的专员"},"a":"C","an":"选项C正确：专职内部控制人员，是指证券公司中以履行投资银行类业务质量控制、内核、合规、风险管理等内部控制职能为主要职责的从业人员。 A选项是业务执行人员，B选项是研究支持人员，D选项是运营支持人员。","type":"single"},{"id":"cy_law_1295","q":"在证券投资顾问业务的收费环节，下列做法中符合规定的是（  ）。","c":{"A":"投资顾问个人以其专业知识与客户协商确定收费标准","B":"服务费由客户直接转账至投资顾问的个人银行账户","C":"公司统一收取服务费，并按内部规定与投资顾问结算","D":"客户回访确认后，以现金形式支付服务费给投资顾问"},"a":"C","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当开展以下工作内容。 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取（C符合此规定，ABD都不符合规定）。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_law_1297","q":"在证券公司信息隔离墙制度中，当投资银行部（保密侧）因项目需要，希望研究所（公开侧）的分析师协助撰写行业分析部分时，正确的跨墙流程是（  ）。","c":{"A":"投资银行部直接向研究所负责人口头申请即可","B":"投资银行部事先向研究所和合规部门提出申请，并经审批同意","C":"研究所分析师在获取必要信息后可自行决定是否协助","D":"由公司总经理在办公会上指定分析师参与"},"a":"B","an":"选项B正确：证券公司保密侧业务部门需要公开侧业务部门派员跨墙进行业务协作的，应当事先向跨墙人员所属部门和合规部门提出申请，并经其审批同意。 选项ACD为干扰项","type":"single"},{"id":"cy_law_1299","q":"按照《证券公司合规管理实施指引》的要求，证券公司合规经营遵守的基本要求不包括（）。","c":{"A":"充分了解客户的基本信息、财务状况、投资经验、投资目标、风险偏好、诚信记录等信息并及时更新","B":"有效管理内幕信息和未公开信息，防范公司及其工作人员利用该信息买卖证券、建议他人买卖证券，或者泄露该信息","C":"合理划分客户类别和产品、服务风险等级，确保将适当的产品、服务提供给适合的客户","D":"建立业务风险识别、评估和控制的完整体系"},"a":"D","an":"题目问的是“不包括”。选项D：建立业务风险识别、评估和控制的完整体系是内部控制制度机制建设（并非合规经营）的基本要求。因此答案选择D。 选项A正确：证券公司开展各项业务，应当充分了解客户的基本信息、财务状况、投资经验、投资目标、风险偏好、诚信记录等信息并及时更新。 选项B正确：证券公司开展各项业务，应当有效管理内幕信息和未公开信息，防范公司及其工作人员利用该信息买卖证券、建议他人买卖证券，或者泄露该信息。 选项C正确：合理划分客户类别和产品、服务风险等级，确保将适当的产品、服务提供给适合的客户，不得欺诈客户。","type":"single"},{"id":"cy_law_1301","q":"证券公司内部控制是指证券公司为实现经营目标，根据经营环境变化，对证券公司经营与管理过程中的风险进行识别、评价和管理的制度安排、组织体系和控制措施。有效的内部控制应当为证券公司实现（）等目标提供合理保证。","c":{"A":"防范经营风险和道德风险","B":"保障客户及证券公司资产的安全、完整","C":"提高证券公司经营效率和效果","D":"保证证券公司利润最大化"},"a":"A,B,C","an":"选项D错误： 内部控制的核心目的是防范风险、保障资产安全和提高管理效率，而不是直接追求利润最大化。 选项ABC正确：证券公司内部控制是指证券公司为实现经营目标，根据经营环境变化，对证券公司经营与管理过程中的风险进行识别、评价和管理的制度安排、组织体系和控制措施。有效的内部控制应当为证券公司实现后述目标提供合理保证；保证经营的合法合规及证券公司内部规章制度的贯彻执行；防范经营风险和道德风险；保障客户及证券公司资产的安全、完整；保证证券公司业务记录、财务信息和其他信息的可靠、完整、及时；提高证券公司经营效率和效果。","type":"multi"},{"id":"cy_law_1303","q":"证券公司合规部门中具备3年以上（）等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于5人。","c":{"A":"金融","B":"法律","C":"会计","D":"信息技术"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于5人。","type":"multi"},{"id":"cy_law_1305","q":"下列关于证券公司合规经营的表述，说法错误的有（）。","c":{"A":"证券公司应保证关联交易的公允性","B":"证券公司不得为客户违规从事证券发行、交易活动提供便利","C":"证券公司的合规管理仅体现在执行监督环节","D":"证券公司的合规管理仅需覆盖总部各部门及分支机构，不需覆盖各层级子公司"},"a":"C,D","an":"题目问的是“说法错误的”。 选项CD错误：证券公司的合规应当覆盖所有业务，各部门、各分支机构、各层级子公司和全体工作人员，贯穿决策、执行、监督、反馈等各个环节。因此答案选择CD。 选项AB正确：证券公司开展各项业务，应当遵循合规经营、勤勉尽责，坚持客户利益至上原则，并遵守下列基本要求：  （1）充分了解客户的基本信息、财务状况、投资经验、投资目标、风险偏好、诚信记录等信息并及时更新。 （2）合理划分客户类别和产品、服务风险等级，确保将适当的产品、服务提供给适合的客户，不得欺诈客户。 （3）持续督促客户规范证券发行行为，动态监控客户交易活动，及时报告、依法处置重大异常行为，不得为客户违规从事证券发行、交易活动提供便利。 （4）严格规范工作人员执业行为，督促工作人员勤勉尽责，防范其利用职务便利从事违法违规、超越权限或者其他损害客户合法权益的行为。 （5）有效管理内幕信息和未公开信息，防范公司及其工作人员利用该信息买卖证券、建议他人买卖证券，或者泄露该信息。 （6）及时识别、妥善处理公司与客户之间、不同客户之间、公司不同业务之间的利益冲突，切实维护客户利益，公平对待客户。 （7）依法履行关联交易审议程序和信息披露义务，保证关联交易的公允性，防止不正当关联交易和利益输送。 （8）审慎评估公司经营管理行为对证券市场的影响，采取有效措施，防止扰乱市场秩序。","type":"multi"},{"id":"cy_law_1307","q":"按照《证券公司内部控制指引》的要求，证券公司应当建立的机制和制度包括（）。","c":{"A":"动态的净资本监控机制","B":"逐级问责机制","C":"隔离墙制度","D":"董监高的任职制度"},"a":"A,B,C","an":"选项D错误：董监高的任职制度是证券公司治理的重要组成部分，在教材中无相关描述。 选项ABC正确：《证券公司内部控制指引》对证券公司建立规范、有效的内部控制制度、机制提出了以下几方面的基本要求： (1)树立合法合规经营的理念和风险控制优先的意识，健全证券公司行为准则和员工道德规范，营造合规经营的制度文化环境。 (2)采取切实有效的措施杜绝挪用客户交易结算资金、客户委托管理的资产及客户托管的证券等行为，确保客户资产的安全完整。 (3)根据经营环境的变化，建立动态的净资本监控机制（A正确），确保净资本符合有关监管指标的要求。 (4)加强法人统一管理，建立具体、明确、合理的授权、检查和逐级问责制度（B正确），明确界定部门、分支机构的目标、职责和权限，确保其在授权范围内行使经营管理职能。证券公司业务授权应当采取书面形式。 (5)主要业务部门之间建立健全隔离墙制度（C正确），确保经纪、自营、受托投资管理、投资银行、研究咨询等业务相对独立。电脑部门、财务部门、监督检查部门与业务部门的人员不得相互兼任，资金清算人员不得由电脑部门人员和交易部门人员兼任。 (6)不断完善业务、财务、人力资源等综合信息管理系统，根据自身实际加强业务运作的后台管理，完善集中清算、集中核算、客户资料集中管理等制度。提高实时预警、监控、防范风险的能力。 (7)建立业务风险识别、评估和控制的完整体系，运用包括敏感性分析在内的多种手段，对信用风险、市场风险、流动性风险、操作风险、技术风险、政策法规风险和道德风险等进行持续监控，明确风险管理流程和风险化解方法。 (8)建立健全包括授权管理、岗位职责、监督检查、考核奖惩等在内的各项内部管理制度。对经纪、自营、投资银行、受托投资管理、研究咨询以及创新业务等制定统一的业务流程和操作规范，针对业务的主要风险点和风险性质，制定明确的控制措施。 (9)大力加强自有资金和客户资金的风险控制，建立自有资金运用的决策、审核、批准、监控相分离的管理体系，加强资金额度控制和资金使用的日常监控，对资金异常变动和大额资金存取等行为重点监控。 (10)建立畅通、高效的信息交流渠道和重大事项报告制度，以及内部员工和客户的信息反馈机制，确保信息准确传递，确保董事会、监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)、经理人员及监督检查部门及时了解证券公司的经营和风险状况，确保各类投诉、可疑事件和内控缺陷得到妥善处理。 (11)真实、全面、及时记载各项业务，充分发挥会计的核算监督职能，确保信息资料的真实与完整；建立完备的业务台账系统，并通过业务台账系统和会计核算系统交叉印证，防止出现账外经营、账目不清等问题。 (12)按照专人管理、相互牵制、适当审批、严格登记的原则，加强对合同、票据、印章、密押等的管理。重要合同和票据有连号控制、作废控制、空白凭证控制以及领用登记控制等专门措施。证券公司公章、合同专用章、业务专用章、财务专用章、电子印鉴等的保管、审批、使用等应适当分离、相互牵制。 (13)加强对各类档案(包括各种会议记录与决议、经营协议、客户资料、交易记录、凭证账表、投诉与纠纷处理记录以及各类法规、制度等档案)妥善保管和分类管理。","type":"multi"},{"id":"cy_law_1309","q":"证券公司治理基本要求是（）。","c":{"A":"建立健全组织架构、明确职责划分","B":"不得侵犯客户合法权益","C":"建立完备的内部控制体系","D":"建立严格的市场准入制度"},"a":"A,B,C","an":"选项D错误：“建立严格的市场准入制度”属于监管机构职责。 选项ABC正确：证券公司治理的基本要求： 1.建立健全组织架构、明确职责划分；  2.不得侵犯客户合法权益；  3.建立完备的内部控制体系； 4.建立稳健的薪酬制度。","type":"multi"},{"id":"cy_law_1311","q":"证券公司应有效管理内幕信息和未公开信息，防范公司及其工作人员（）。","c":{"A":"利用该信息买卖证券","B":"利用该信息建议他人买卖证券","C":"泄露该信息","D":"发布证券研究报告"},"a":"A,B,C","an":"选项D错误：正常合规的研究报告发布不涉及内幕信息或未公开信息滥用。 选项ABC正确：证券公司应有效管理内幕信息和未公开信息，防范公司及其工作人员利用该信息买卖证券、建议他人买卖证券，或者泄露该信息。","type":"multi"},{"id":"cy_law_1313","q":"关于证券公司内部控制“三道防线”的职责分工，下列表述正确的有（  ）。","c":{"A":"第一道防线的核心是单人单岗业务的监控","B":"第二道防线旨在建立相关部门、岗位间的监督与制衡机制","C":"第三道防线由独立于业务部门之外的监督检查部门构成","D":"第一道防线的基础是对重要一线岗位实行双人、双职、双责"},"a":"B,C,D","an":"证券公司应建立清晰合理的组织结构，依据所处环境和自身经营特点设立严密有效的三道业务监控防线。 (1)建立重要一线岗位双人、双职、双责为基础的“第一道防线”（A错误，D正确），并加强对单人单岗业务的监控。与资金、有价证券、重要空白凭证、业务合同、印章等直接接触的岗位和涉及信息系统安全的岗位，应当实行双人负责制。 (2)建立相关部门、相关岗位之间相互制衡、监督的“第二道防线”。不同部门应有明确的职责分工不相容职务应适当分离。（B正确） (3)建立独立的监督检查部门对各项业务、各部门、各分支机构、各岗位全面实施监控、检查和反馈的“第三道防线”。（C正确） 综上，该题选BCD。","type":"multi"},{"id":"cy_law_1315","q":"关于证券公司投资银行类业务内部控制人员的配备，以下说法符合规定的有（  ）。","c":{"A":"专职内部控制人员可同时兼职投行业务承揽工作","B":"专职内部控制人员数量应不低于投行业务人员总数的1/10","C":"专职内部控制人员应独立开展内部控制工作","D":"专职内部控制人员需具备相应的专业知识和履职能力"},"a":"B,C,D","an":"选项BCD正确：应当为投资银行类业务配备具备相应专业知识和履职能力的内部控制人员，独立开展投资银行类业务内部控制工作。投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10。 选项A错误：违反“独立工作”要求。","type":"multi"},{"id":"cy_law_1317","q":"关于证券公司投资银行类业务内部控制有效性的评估，以下说法符合规定的有（  ）。","c":{"A":"评估可以由证券公司自行开展","B":"评估必须委托独立的外部专业机构进行","C":"若委托外部机构评估，证券公司仍需对评估结果承担最终责任","D":"选择外部评估机构时，应重点考虑其报价是否最低"},"a":"A,C","an":"选项A正确，选项B错误：证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估每年不得少于1次。 选项C正确，选项D错误：委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查（并非报价最低），避免发生利益冲突。证券公司依法应当承担的责任不因委托外部机构而免除。","type":"multi"},{"id":"cy_law_1319","q":"在证券投资顾问业务的推广环节，下列行为被明确禁止的有（  ）。","c":{"A":"在广告中展示投资组合成立以来的历史业绩表现","B":"保证客户的本金在任何情况下都不会发生亏损","C":"对投资顾问的资格和获奖情况进行不实描述","D":"提示客户投资有风险，历史业绩不代表未来"},"a":"B,C","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当开展以下工作内容。 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。（BC属于禁止行为，AD客观展示/提示风险属于合规行为） (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。","type":"multi"},{"id":"cy_law_1321","q":"在证券投资顾问业务中，必须实行“留痕管理”的业务环节包括（  ）。","c":{"A":"投资顾问人员招聘","B":"客户投诉处理","C":"向客户提供投资建议","D":"与客户签订服务协议"},"a":"B,C,D","an":"选项BCD正确：证券公司、证券投资咨询机构从事证券投资顾问业务，应当开展以下工作内容。 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。 选项A错误：“投资顾问人员招聘”属于人力资源管理环节。","type":"multi"},{"id":"cy_law_1323","q":"证券投资顾问业务客户回访工作的具体实施，可以由为客户提供服务的投资顾问本人来执行。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当开展以下工作内容。 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。","type":"judge"},{"id":"cy_law_1325","q":"证券投资顾问的服务费用标准，由证券公司根据成本和市场情况统一设定，客户无权要求协商。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当开展以下工作内容。 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。","type":"judge"},{"id":"cy_law_1327","q":"A证券公司在开展证券投资顾问业务时，为提升自身业绩，在未充分告知客户的情况下，将部分客户资金用于投资关联方产品，该行为违背了证券投资顾问业务的（  ）原则。","c":{"A":"守法合规","B":"诚实信用","C":"忠实客户利益","D":"公平公正"},"a":"C","an":"证券投资顾问业务的基本原则： 1.守法合规 证券公司、证券投资咨询机构从事证券投资顾问业务，应当遵守法律、行政法规和其他有关规定，加强合规管理，健全内部控制，防范利益冲突，切实维护客户合法权益。 2.诚实信用 证券公司、证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务。 3.忠实客户利益 证券公司、证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害客户利益（符合题目情形）；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1329","q":"下列关于证券研究报告质量控制、合规审查，说法错误的是（）。","c":{"A":"证券期货经营机构应当建立健全证券研究报告发布前的质量控制机制，细化质量控制的目标、程序和岗位职责","B":"任何形式的分享证券投资收益或者分担证券投资损失的口头承诺无效，但在证券研究报告中书面承诺的除外","C":"证券研究报告中对证券及证券相关产品提出投资评级的，应当披露所使用的投资评级分类及其含义","D":"证券分析师应当对其署名的证券研究报告的内容和观点负责，保证信息来源合法合规"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：任何形式的分享证券投资收益或者分担证券投资损失的书面或口头承诺均为无效（无例外情形，B错误）。因此答案选择B。 选项A正确：经营机构应当建立健全证券研究报告发布前的质量控制机制，细化质量控制的目标、程序和岗位职责，建立清晰的质量审核清单和工作底稿，列明审核工作应当涵盖的内容。 选项C正确：证券研究报告中对证券及证券相关产品提出投资评级的，应当披露所使用的投资评级分类及其含义。 选项D正确：证券分析师应当对其署名的证券研究报告的内容和观点负责，保证信息来源合法合规，研究方法专业审慎，分析结论具有合理依据。","type":"single"},{"id":"cy_law_1331","q":"下列关于证券投资咨询的说法中，错误的是（）。","c":{"A":"发布证券研究报告相关业务档案的保存期限自证券研究报告发布之日起不得少于5年","B":"证券分析师应当对其署名的证券研究报告的内容和观点负责","C":"证券投资顾问业务档案的保存期限自协议终止之日起不得少于3年","D":"证券公司、证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守、合规意识和专业服务能力"},"a":"C","an":"题目问的是“说法错误的”。 选项C错误：证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年（并非3年）。因此答案选择C。 选项A正确：发布证券研究报告相关业务档案的保存期限自证券研究报告发布之日起不得少于5年。 选项B正确：证券分析师应当对其署名的证券研究报告的内容和观点负责，保证信息来源合法合规，研究方法专业审慎，分析结论具有合理依据。 选项D正确：证券公司、证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守、合规意识和专业服务能力。","type":"single"},{"id":"cy_law_1333","q":"证券投资顾问业务的内部控制要求包括（）。","c":{"A":"证券投资顾问人员管理制度要求","B":"证券投资顾问业务管理制度、合规管理和风险控制机制要求","C":"保证与服务方式、业务规模相适应","D":"业务留痕管理和档案保存要求"},"a":"A,B,C,D","an":"选项ABCD正确：证券投资顾问业务的内部控制要求除了上述选项，还包括【人员培训要求】。  【知识详解】证券投资顾问业务内部控制 (1)建立健全证券投资顾问业务管理制度、合规管理和风险控制机制，覆盖业务推广、协议签订、服务提供、客户回访、投诉处理等业务环节。 (2)保证证券投资顾问人员数量、业务能力、合规管理和风险控制与服务方式、业务规模相适应。 (3)按照公司制定的程序和要求了解客户，评估客户的风险承受能力，向客户提供适当的投资建议服务，并履行相应的信息告知和风险揭示义务。 (4)与客户签订证券投资顾问协议，并按照公平、合理、自愿的原则，与客户协商并书面约定费用收取安排。证券投资顾问服务费应当以公司账户收取。 (5)建立客户回访机制，明确客户回访的程序、内容和要求，并指定专人独立实施；建立客户投诉处理机制，及时、妥善处理客户投诉事项。 (6)规范业务推广和客户招揽行为，禁止对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 (7)对业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。业务档案保存期限自协议终止之日起不得少于5年。","type":"multi"},{"id":"cy_law_1335","q":"从事发布证券研究报告业务的机构发布的证券研究报告，应当载明的事项有（）。","c":{"A":"“证券研究报告”字样","B":"使用证券研究报告的风险提示","C":"证券分析师姓名及其登记编码","D":"发布证券研究报告的时间"},"a":"A,B,C,D","an":"选项ABCD正确：经营机构发布的证券研究报告，应当载明下列事项： （1）“证券研究报告”字样； （2）经营机构名称； （3）具备证券投资咨询业务资格的说明； （4）证券分析师姓名及其登记编码； （5）发布证券研究报告的时间； （6）证券研究报告采用的信息和资料来源； （7）使用证券研究报告的风险提示。","type":"multi"},{"id":"cy_law_1337","q":"根据《发布证券研究报告暂行规定》，下列行为不符合规定的有（）。","c":{"A":"发布证券研究报告中包含误导性信息","B":"利用发布证券研究报告参与内幕交易、操纵证券市场活动","C":"发布证券研究报告的相关人员同时从事证券自营与证券资产管理业务","D":"将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象"},"a":"A,B,C,D","an":"选项ABCD都属于禁止行为，不符合规定。 选项AB正确：从事发布证券研究报告业务的机构发布证券研究报告，应当遵守法律、行政法规和其他有关规定，遵循独立、客观、公平、审慎原则，有效防范利益冲突，公平对待发布对象，禁止传播虚假、不实、误导性信息，禁止从事或者参与内幕交易、操纵证券市场活动。 选项C正确：从事发布证券研究报告业务的相关人员，不得同时从事证券自营、证券资产管理等存在利益冲突的业务。 选项D正确：从事发布证券研究报告业务的机构应当公平对待证券研究报告的发布对象，不得将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象。","type":"multi"},{"id":"cy_law_1339","q":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当遵守的基本原则有（）。","c":{"A":"守法合规","B":"诚实信用","C":"忠实客户利益","D":"只提示客户可能发生的风险，不提示承担风险可能获得的收益"},"a":"A,B,C","an":"选项ABC正确：证券公司、证券投资咨询机构从事证券投资顾问业务应当遵循的基本原则有守法合规、诚实信用、忠实客户利益。 选项D错误：据相关规定，在向客户提供投资建议时，不仅应该全面地评估并告知潜在风险，还应当提示承担风险可能获得的收益，使客户能够基于充分的信息做出决策。","type":"multi"},{"id":"cy_law_1341","q":"经营机构发布证券研究报告相关人士进行上市公司调研活动，应当符合的要求有（）。","c":{"A":"事先履行所在经营机构的审批程序","B":"不得向证券研究报告相关销售服务人员、特定客户和其他无关人员泄露研究部门或研究子公司的调研底稿、调研后发布证券研究报告的计划、研究观点的调整信息，以及未来一段时间的非客户服务性质的独立调研计划","C":"不得主动寻求上市公司相关内幕信息或者未公开重大信息","D":"被动知悉上市公司内幕信息或者未公开重大信息的，应当对有关信息内容进行保密，并及时向所在机构的合规管理部门报告本人已获知有关信息的事实，在有关信息公开前不得发布涉及该上市公司的证券研究报告"},"a":"A,B,C,D","an":"选项ABCD正确：发布证券研究报告相关人员进行上市公司调研活动，应当符合以下要求： （1）事先履行所在经营机构的审批程序。【A】 （2）不得向证券研究报告相关销售服务人员、特定客户和其他无关人员泄露研究部门或研究子公司的调研底稿、调研后发布证券研究报告的计划、研究观点的调整信息，以及未来一段时间的非客户服务性质的独立调研计划。【B】 （3）不得主动寻求上市公司相关内幕信息或者未公开重大信息。【C】 （4）被动知悉上市公司内幕信息或者未公开重大信息的，应当对有关信息内容进行保密，并及时向所在机构的合规管理部门报告本人已获知有关信息的事实，在有关信息公开前不得发布涉及该上市公司的证券研究报告。【D】 （5）上市公司调研纪要仅供内部存档或撰写研究报告使用，不得对外发布或提供给客户。 （6）在证券研究报告中使用调研信息的，应当保留必要的信息来源依据。","type":"multi"},{"id":"cy_law_1343","q":"经营机构发布的证券研究报告，应当载明的事项有（）。","c":{"A":"发布证券研究报告的地点","B":"证券分析师姓名及其登记编码","C":"证券研究报告采用的信息和资料来源","D":"使用证券研究报告的风险提示"},"a":"B,C,D","an":"选项A错误：应为“发布证券研究报告的时间（并非地点）。” 选项BCD正确：经营机构发布的证券研究报告，应当载明下列事项： （1）“证券研究报告”字样。 （2）经营机构名称。 （3）具备证券投资咨询业务资格的说明。 （4）证券分析师姓名及其登记编码。【B】  （5）发布证券研究报告的时间。  （6）证券研究报告采用的信息和资料来源。【C】  （7）使用证券研究报告的风险提示。【D】","type":"multi"},{"id":"cy_law_1345","q":"下列属于证券投资顾问禁止行为的是（）。","c":{"A":"以任何方式向客户承诺或者保证投资收益","B":"向客户提供建议服务","C":"向他人泄露客户的投资决策计划信息","D":"以个人名义向客户收取证券投资顾问服务费用"},"a":"A,C,D","an":"选项B错误：向客户提供适当的建议服务是证券投资顾问的合规行为。 选项ACD正确：证券投资顾问不得从事下列活动： （1）以任何方式向客户承诺或者保证投资收益；【A】 （2）对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； （3）向他人泄露客户的投资决策计划信息；【C】  （4）以个人名义向客户收取证券投资顾问服务费用；【D】 （5）通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。","type":"multi"},{"id":"cy_law_1347","q":"根据《上市公司并购重组财务顾问业务管理办法》，中国证监会及其派出机构可以对财务顾问公司的（）等方面进行非现场检查或者现场检查。","c":{"A":"公司治理","B":"内部控制","C":"经营运作","D":"风险状况"},"a":"A,B,C,D","an":"选项ABCD正确：根据《上市公司并购重组财务顾问业务管理办法》等法律法规，中国证监会及其派出机构可以根据审慎监管原则，要求财务顾问提供按规定履行尽职调查义务的证明材料、工作档案和工作底稿，并对财务顾问的【公司治理、内部控制、经营运作、风险状况、从业活动】等方面进行非现场检查或者现场检查。","type":"multi"},{"id":"cy_law_1349","q":"上市公司就并购重组事项出具盈利预测报告的，在相关并购重组活动完成后，凡不属于上市公司管理层事前无法获知且事后无法控制的原因，上市公司或者购买资产实现的利润未达到盈利预测报告或者资产评估报告预测金额50％的，中国证监会可以同时对财务顾问及其财务顾问主办人采取（）等监管措施。","c":{"A":"监管谈话","B":"出具警示函","C":"责令改正","D":"责令定期报告"},"a":"A,B,D","an":"选项ABD正确：上市公司就并购重组事项出具盈利预测报告的，在相关并购重组活动完成后，凡不属于上市公司管理层事前无法获知且事后无法控制的原因，上市公司或者购买资产实现的利润未达到盈利预测报告或者资产评估报告预测金额50％的，中国证监会可以同时对财务顾问及其财务顾问主办人采取【监管谈话、出具警示函、责令定期报告】等监管措施。 选项C错误：“责令改正” 通常适用于信息披露、内部控制等结构性违规（比如内控没做好，可以责令其改好），而盈利预测未达标属于结果性违约（结果已经发生了，无法在改好，比如这道题该预测已经公布了再去责令改正不可行），需通过谈话、警示等方式强化监管压力。","type":"multi"},{"id":"cy_law_1351","q":"中国证监会及其派出机构可以根据审慎监管原则，要求财务顾问提供已按照《上市公司并购重组财务顾问业务管理办法》的规定履行尽职调查义务的有（）。","c":{"A":"证明材料","B":"工作档案","C":"工作底稿","D":"立项申请"},"a":"A,B,C","an":"选项ABC正确：中国证监会及其派出机构可以根据审慎监管原则，要求财务顾问提供已按照《上市公司并购重组财务顾问业务管理办法》的规定履行尽职调查义务的【证明材料、工作档案和工作底稿】，并对财务顾问的公司治理、内部控制、经营运作、风险状况、从业活动等方面进行非现场检查或者现场检查。 选项D错误：教材中没有“D.立项申请”的概念，此处为迷惑选项设置，无实际意义。","type":"multi"},{"id":"cy_law_1353","q":"保荐机构及其保荐代表人、其他从事保荐业务的人员出现以下（）情形的，合理区分个人责任与机构责任，对保荐机构及相关责任人员采取自律管理措施。","c":{"A":"通过从事保荐业务谋取、输送任何不正当利益","B":"未勤勉尽责履行保荐相关职责","C":"违反独立性原则违规开展保荐业务","D":"未按照相关规定参加培训"},"a":"A,B,C,D","an":"选项ABCD正确：保荐机构及其保荐代表人、其他从事保荐业务的人员出现以下情形的，合理区分个人责任与机构责任，对保荐机构及相关责任人员采取自律管理措施。 ①通过从事保荐业务谋取、输送任何不正当利益；（选项A正确） ②直接或者间接向他人提供内幕信息，泄露未公开信息、商业秘密和客户信息； ③以不合理价格、不正当竞争方式招揽业务，违反公平竞争，破坏市场秩序； ④未勤勉尽责履行保荐相关职责；（选项B正确） ⑤违反独立性原则违规开展保荐业务；（选项C正确） ⑥采取业务包干等承包方式或其他形式进行过度激励； ⑦聘用不符合规定要求的人员从事保荐业务，执业登记存在弄虚作假等违规行为； ⑧不配合、阻挠或以其他变相方式妨碍协会检查，影响自律管理人员作出自律管理决定； ⑨无正当理由不按规定及时报送相关信息，经提醒后仍不按规定报送，报送的信息中存在虚假记载、误导性陈述或者重大遗漏； ⑩未按照相关规定参加培训；（选项D正确） ⑪其他违反本规则规定的行为。","type":"multi"},{"id":"cy_law_1355","q":"下列不符合证券公司申请融资融券业务资格条件的是（）。","c":{"A":"具有证券经纪业务资格","B":"最近2年内不存在因涉嫌违法违规正被证监会立案调查的情形","C":"信息系统安全稳定运行，最近6个月未发生因公司管理问题导致的重大事故","D":"最近2年各项风险控制指标持续符合规定"},"a":"C","an":"题目问的是”不符合“。 选项C错误：证券公司申请融资融券业务资格，应当具备的条件之一为：信息系统安全稳定运行，最近1年（并非6个月，C错误）未发生因公司管理问题导致的重大事件，融资融券业务技术系统已通过证券交易所、证券登记结算机构组织的测试。因此答案选择C。 选项ABD说法正确。  【知识详解】证券公司申请融资融券业务资格应具备的条件： (1)具有证券经纪业务资格； (2)公司治理健全，内部控制有效，能有效识别、控制和防范业务经营风险和内部管理风险； (3)公司最近2年内不存在因涉嫌违法违规正被中国证监会立案调查或者正处于整改期间的情形； (4)财务状况良好，最近2年各项风险控制指标持续符合规定，注册资本和净资本符合增加融资融券业务后的规定； (5)客户资产安全、完整，客户交易结算资金第三方存管有效实施，客户资料完整真实； (6)已建立完善的客户投诉处理机制，能够及时、妥善处理与客户之间的纠纷； (7)已建立符合监管规定和自律要求的客户适当性制度，实现客户与产品的适当性匹配管理； (8)信息系统安全稳定运行，最近1年未发生因公司管理问题导致的重大事件，融资融券业务技术系统已通过证券交易所、证券登记结算机构组织的测试； (9)有拟负责融资融券业务的高级管理人员和适当数量的专业人员； (10)中国证监会规定的其他条件。","type":"single"},{"id":"cy_law_1357","q":"证券公司开展融资融券业务，需要遵循的基本原则是（）。","c":{"A":"合法合规性原则","B":"分散管理原则","C":"业务隔离原则","D":"了解客户原则"},"a":"A,C,D","an":"选项B错误：应为“集中管理原则”，而不是分散管理原则：证券公司应当对融资融券业务实行集中统一管理。融资融券业务的决策和主要管理职责应当由证券公司总部承担，并应加强对分支机构融资融券业务活动的控制，禁止分支机构未经总部批准向客户融资、融券，禁止分支机构自行决定签约、开户、授信、保证金收取等应当由总部决定的事项。 选项ACD正确：融资融券业务管理的基本原则包括：合法合规性原则；集中管理原则；业务隔离原则；了解客户原则。","type":"multi"},{"id":"cy_law_1359","q":"证券公司申请融资融券业务资格应具备的条件有（）。","c":{"A":"具有证券经纪业务资格","B":"公司最近3年内不存在因涉嫌违法违规正被中国证监会立案调查或者正处于整改期间的情形","C":"财务状况良好，最近2年各项风险控制指标持续符合规定","D":"公司治理健全，内部控制有效"},"a":"A,C,D","an":"B项错误，公司最近2年内（并非3年）不存在因涉嫌违法违规正被中国证监会立案调查或者正处于整改期间的情形。 选项ACD正确：证券公司申请融资融券业务资格应具备的条件： (1)具有证券经纪业务资格； (2)公司治理健全，内部控制有效，能有效识别、控制和防范业务经营风险和内部管理风险； (3)公司最近2年内不存在因涉嫌违法违规正被中国证监会立案调查或者正处于整改期间的情形； (4)财务状况良好，最近2年各项风险控制指标持续符合规定，注册资本和净资本符合增加融资融券业务后的规定； (5)客户资产安全、完整，客户交易结算资金第三方存管有效实施，客户资料完整真实； (6)已建立完善的客户投诉处理机制，能够及时、妥善处理与客户之间的纠纷； (7)已建立符合监管规定和自律要求的客户适当性制度，实现客户与产品的适当性匹配管理； (8)信息系统安全稳定运行，最近1年未发生因公司管理问题导致的重大事件，融资融券业务技术系统已通过证券交易所、证券登记结算机构组织的测试； (9)有拟负责融资融券业务的高级管理人员和适当数量的专业人员； (10)中国证监会规定的其他条件。","type":"multi"},{"id":"cy_law_1361","q":"合格境外机构投资者在境内开展证券投资业务，应当经营行为规范，最近（）年以来未受到监管机构的重大处罚。","c":{"A":"5","B":"4","C":"3","D":"2"},"a":"C","an":"选项C正确：合格境外投资者业务资格应经中国证监会审批，其应当具备下列条件：财务稳健，资信良好，具备证券期货投资经验；境内投资业务主要负责人员符合其所在境外国家或者地区有关从业资格的要求(如有)；治理结构、内部控制和合规管理制度健全有效，按照规定指定督察员负责对其境内投资行为的合法合规性进行监督；经营行为规范、【近3年】或者自成立以来未受到监管机构的重大处罚；不存在对境内资本市场运行产生重大影响的情形。","type":"single"},{"id":"cy_law_1363","q":"合格境内投资者资格应经中国证监会审批，其应当具备的条件有（）。","c":{"A":"申请人的财务稳健，资信良好，资产管理规模、经营年限等符合中国证监会的规定","B":"拥有符合规定的具有境外投资管理相关经验的人员","C":"具有健全的治理结构和完善的内控制度，经营行为规范","D":"最近2年没有受到监管机构的重大处罚，没有重大事项正在接受司法部门、监管机构的立案调查"},"a":"A,B,C","an":"选项D错误：应为“最近3年（并非2年）没有受到监管机构的重大处罚”。 选项ABC正确：合格境内投资者资格应经中国证监会审批，其应当具备下列条件：申请人的财务稳健，资信良好，资产管理规模、经营年限等符合中国证监会的规定（A项）；拥有符合规定的具有境外投资管理相关经验的人员（B项）；具有健全的治理结构和完善的内控制度，经营行为规范（C项）；最近3年没有受到监管机构的重大处罚，没有重大事项正在接受司法部门、监管机构的立案调查；中国证监会根据审慎监管原则规定的其他条件。","type":"multi"},{"id":"cy_law_1365","q":"在全国股份转让系统申请挂牌的公司，必须履行信息披露义务，所披露的信息应当（）。","c":{"A":"真实","B":"完整","C":"简洁","D":"准确"},"a":"A,B,D","an":"选项ABD正确：申请挂牌的公司应当业务明确、产权清晰、依法规范经营、公司治理健全，可以尚未盈利，但须履行信息披露义务，所披露的信息应当真实、准确、完整。 选项C错误：干扰项，“真实、准确、完整”是信息披露的基础性义务，直接关系到信息的合法性和可用性。“简洁” 属于信息披露的优化，但不是强制要求。","type":"multi"},{"id":"cy_law_1367","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，关于证券公司开展中间介绍业务的监管措施，以下说法错误的是（）。","c":{"A":"中国证监会及其派出机构按照审慎监管原则，对证券公司从事的介绍业务进行现场检查和非现场检查","B":"证券公司取得介绍业务资格后不符合规定条件，经限期整改仍不符合条件的，中国证监会依法暂停其介绍业务资格","C":"证券公司应当按照中国证监会的规定披露介绍业务的相关信息，报送介绍业务的相关文件、资料及数据信息","D":"证券公司获得介绍业务资格后不符合规定条件的，中国证监会及其派出机构责令其限期整改"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司取得介绍业务资格后不符合规定条件，经限期整改仍不符合条件的，中国证监会依法撤销（并非暂停）其介绍业务资格。因此答案选择B。 选项A正确：中国证监会及其派出机构按照审慎监管原则，对证券公司从事的介绍业务进行现场检查和非现场检查。 选项C正确：证券公司应当按照中国证监会的规定披露介绍业务的相关信息，报送介绍业务的相关文件、资料及数据信息。 选项D正确：证券公司获得介绍业务资格后不符合规定条件的，中国证监会及其派出机构责令其限期整改。","type":"single"},{"id":"cy_law_1369","q":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以（）的罚款；属于国家工作人员的，还应当依法给予行政处分。","c":{"A":"3万元以上20万元以下","B":"10万元以上60万元以下","C":"3万元以上60万元以下","D":"20万元以上200万元以下"},"a":"D","an":"选项D正确：根据《证券法》第一百九十三条的规定，编造、传播虚假信息或者误导性信息，扰乱证券市场的，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足20万元的，处以20万元以上200万元以下的罚款。在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以【20万元以上200万元以下】的罚款；属于国家工作人员的，还应当依法给予行政处分。","type":"single"},{"id":"cy_law_1371","q":"违反《证券法》规定，操纵证券市场的，责令依法处理非法持有的证券，没收违法所得，并处以（）的罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上60万元以下","C":"违法所得1倍以上5倍以下","D":"违法所得1倍以上10倍以下"},"a":"D","an":"选项D正确：根据《证券法》第一百九十二条的规定，违反法律规定，操纵证券市场的，责令依法处理其非法持有的证券，没收违法所得，并处以违法所得【1倍以上10倍以下】的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款。单位操纵证券市场的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"single"},{"id":"cy_law_1373","q":"编造、传播虚假信息或者误导性信息，扰乱证券市场的，没收违法所得，并处以违法所得一倍以上（）的罚款。","c":{"A":"三倍以下","B":"五倍以下","C":"十倍以下","D":"二十倍以下"},"a":"C","an":"选项C正确：根据《证券法》第一百九十三条的规定，违反《证券法》第五十六条第一款的规定，编造、传播虚假信息或者误导性信息，扰乱证券市场的，没收违法所得，并处以违法所得【1倍以上10倍以下】的罚款；没有违法所得或者违法所得不足20万元的，处以20万元以上200万元以下的罚款。违反《证券法》第五十六条第二款的规定，在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款;属于国家工作人员的,还应当依法给予行政处分。","type":"single"},{"id":"cy_law_1375","q":"按照《刑法》第一百八十条规定，对犯内幕交易、泄露内幕信息罪的人员，处5年以下有期徒刑或者拘役，并处或者单处违法所得1倍或者（）倍以下罚金；情节特别严重的，处（）年以上10年以下有期徒刑。","c":{"A":"3；1","B":"5；3","C":"3；2","D":"5；5"},"a":"D","an":"选项D正确：《刑法》第一百八十条规定，对犯内幕交易、泄露内幕信息罪的人员，处5年以下有期徒刑或者拘役，并处或者单处违法所得1倍或者【5倍】以下罚金；情节特别严重的，处【5年以上10年以下】有期徒刑。","type":"single"},{"id":"cy_law_1377","q":"若单位进行操纵证券市场的，中国证监会应当对直接负责的主管人员和其他直接责任人员给予警告，并处以10万元以上100万元以下的罚款。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》第一百九十二条的规定，违反法律规定，操纵证券市场的，责令依法处理其非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款。单位操纵证券市场的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下（并非10-100万）的罚款。","type":"judge"},{"id":"cy_law_1379","q":"以下关于从事证券经纪业务相关人员的要求，不符合规定的是（）。","c":{"A":"与客户权益变动相关业务的经办人员之间，应建立制衡机制","B":"与客户权益变动直接相关的业务可以选择一人操作并复核，复核应留痕迹","C":"非常规业务操作应当事先审批","D":"涉及限制客户资料转移的业务操作的审批和复核均应留痕迹"},"a":"B","an":"题目问的是”不符合规定“。 选项B错误：与客户权益直接相关的业务应当一人操作、一人复核（并非一人操作并复核，操作和复核的人要分开），复核应当留痕。因此答案选择B。 选项ACD正确：与客户权益变动相关业务的经办人员之间，应当建立制衡机制（A项）。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批（C项），事后复核，审批及复核均应留痕（D项）。","type":"single"},{"id":"cy_law_1381","q":"下列属于证券评级机构及其评级从业人员禁止行为的有（  ）","c":{"A":"歪曲评级结果以迎合评级委托方需求","B":"与受评级证券发行人存在不正当交易","C":"依据监管要求调整评级流程后开展业务","D":"以诋毁同行的方式招揽评级业务"},"a":"A,B,D","an":"选项ABD正确：证券评级机构及其评级从业人员不得有下列行为： （1）篡改评级相关资料或者歪曲评级结果； （2）以承诺分享投资收益或者分担投资损失、承诺或保证信用等级、低于合理成本价格竞争、诋毁同行等手段招揽业务； （3）以挂靠、外包等形式允许其他机构使用其名义开展证券评级业务； （4）与评级委托方、受评级机构、受评级证券发行人或者相关第三方存在不正当交易或者商业贿赂； （5）向评级委托方、受评级机构、受评级证券发行人或者相关第三方提供顾问或者咨询服务； （6）对评级委托方、受评级机构、受评级证券发行人或者相关第三方进行敲诈勒索； （7）违反证券评级业务规则，损害投资人、评级对象合法权益，损害资信评级业声誉的其他行为； （8）利用在开展证券评级业务时知悉的国家机密、商业秘密和个人隐私等非公开信息牟取利益或进行交易； （9）协会禁止的其他行为。 选项C错误：依据监管要求调整流程开展业务是合规行为","type":"multi"},{"id":"cy_law_1383","q":"下列哪些情形，证券公司应在5个工作日内为登记人员办理相关手续（  ）。","c":{"A":"登记人员开始从事证券业务","B":"登记人员离职","C":"登记人员年度考核为优秀","D":"登记人员业务类别发生变化"},"a":"A,B,D","an":"证券公司应当自相关人员从事证券业务之日起5个工作日内（A正确），通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。登记信息完备且符合规定的，中国证券业协会于5个工作日内办结登记并生成唯一登记编号。登记信息不完备或者不符合规定的，证券公司及相关人员应当按照要求及时补正。 登记人员从事的业务类别发生变化的，证券公司应当自发生变化之日起5个工作日内为其办理变更登记。（D正确） 登记人员离职的，证券公司应当自劳动关系或者委托代理关系解除之日起5个工作日内为其办理注销登记。（B正确） 选项C错误：年度考核结果与登记手续办理无关联。","type":"multi"},{"id":"cy_law_1385","q":"证券投资咨询机构及其证券分析师违反法律、行政法规和《发布证券研究报告暂行规定》的，中国证监会及其派出机构可以采取的监管措施包括（）。","c":{"A":"拘留有关人员","B":"责令暂停发布证券研究报告","C":"监管谈话","D":"出具警示函"},"a":"B,C,D","an":"选项A错误：拘留是公安机关等特定机关依据法律对违反治安管理等行为采取的限制人身自由的行政处罚，中国证监会及其派出机构无此职权。 选项BCD正确：证券投资咨询机构及其证券分析师违反法律、行政法规和《发布证券研究报告暂行规定》的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令暂停发布证券研究报告、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"multi"},{"id":"cy_law_1387","q":"证券投资咨询人员通过所在机构向中国证券业务协会登记。登记信息完备且符合规定的，中国证券业协会于5个工作日内办结登记并生成唯一登记编码。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询人员通过所在机构向中国证券业务协会登记。登记信息完备且符合规定的，中国证券业协会于5个工作日内办结登记并生成唯一登记编码。","type":"judge"},{"id":"cy_law_1389","q":"根据《证券法》，下列关于证券公司及其从业人员法律责任的说法，正确的有（）。 I 未对投资者开立账户提供的身份信息进行核对的，责令改正，给予警告，并处以五万元以上五十万元以下的罚款 II 非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，责令改正，没收违法所得，并处以违法所得一倍以上十倍以下的罚款:没有违法所得或者违法所得不足一百万元的， 处以一百万元以上一千万元以下的罚款 III 证券公司违反规定为其股东或者股东的关联人提供融资或者担保的，责令改正，给予警告，并处以二十万元以上二百万以下的罚款 IV 未采取有效隔离措施防范利益冲突，或者未分开办理相关业务、混合操作的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款","c":{"A":"I、II、IV","B":"I、II、III、IV","C":"II、III","D":"I、IV"},"a":"A","an":"I项正确，未对投资者开立账户提供的身份信息进行核对的，责令改正，给予警告，并处以5万元以上50万元以下的罚款。 II项正确，擅自设立证券公司、非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，责令改正，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款。 III项错误，为其股东或者股东的关联人提供融资或者担保的，责令改正，给予警告，并处以【50万元以上500万元以下】的罚款。 IV项正确，未采取有效隔离措施防范利益冲突，或者未分开办理相关业务、混合操作的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款；情节严重的，并处撤销相关业务许可。","type":"single"},{"id":"cy_law_1391","q":"证券公司合规部门中具备3年以上（）等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于5人。 I 金融 II 法律 III 会计 IV 信息技术","c":{"A":"III、IV","B":"I、II、III","C":"I、II","D":"I、II、III、IV"},"a":"D","an":"证券公司应当为合规部门配备足够的、具备与履行合规管理职责相适应的专业知识和技能的合规管理人员。合规部门中具备3年以上【证券、金融、法律、会计、信息技术】等有关领域工作经历的合规管理人员数量不得低于公司总部人数的 1.5%，且不得少于5人。","type":"single"},{"id":"cy_law_1393","q":"证券公司设立严密有效的三道业务监控防线，下列属于第三道防线的是（  ）。","c":{"A":"相关部门、相关岗位之间相互制衡、监督","B":"独立的监督检查部门对各项业务、各部门、各分支机构、各岗位全面实施监控、检查和反馈","C":"重要一线岗位双人、双职、双责","D":"建立危机处理机制和程序，制订切实有效的应急应变措施和预案"},"a":"B","an":"证券公司应建立清晰合理的组织结构，依据所处环境和自身经营特点设立严密有效的三道业务监控防线。 (1)建立重要一线岗位双人、双职、双责为基础的“第一道防线”（C错误），并加强对单人单岗业务的监控。与资金、有价证券、重要空白凭证、业务合同、印章等直接接触的岗位和涉及信息系统安全的岗位，应当实行双人负责制。 (2)建立相关部门、相关岗位之间相互制衡、监督的“第二道防线”（A错误）。不同部门应有明确的职责分工不相容职务应适当分离。 (3)建立独立的监督检查部门对各项业务、各部门、各分支机构、各岗位全面实施监控、检查和反馈的“第三道防线”（B正确）。 选项D是内部控制的其他要求，不属于三道防线范畴。 综上，该题选B。","type":"single"},{"id":"cy_law_1395","q":"根据《证券公司监督管理条例》，下列关于证券公司建立完善内部控制体系的说法，正确的有（  ）。","c":{"A":"证券公司融资融券业务应当建立逐日盯市制度","B":"证券公司资产管理业务应当订立客户保本保底条款","C":"证券公司经纪业务应当进行账户实名制管理","D":"证券公司的自营业务必须以自己的名义进行"},"a":"A,C,D","an":"证券公司应当按照法律、行政法规和中国证监会的规定建立完备的合规管理、风险管理和内部控制体系。《证券公司监督管理条例》以保护投资者利益和防范证券公司风险为出发点，重点规定了证券经纪业务、证券自营业务、证券资产管理业务和融资融券等主要业务的规则和风险控制措施。从账户实名（CD）、持股分散、规模控制等方面，对证券公司自营业务进行了规定；从账户备案、风险揭示、信息披露、禁止保本保底（B错误）、对有关账户的交易行为实行实时监控等方面，对证券资产管理业务作出了规定；从账户开立、保证金比例、担保品的收取、逐日盯市制度（A）等方面，对融资融券业务作出了规定。 综上，该题选ACD。","type":"multi"},{"id":"cy_law_1397","q":"根据《证券公司治理准则》，证券公司应当向社会公众披露本公司未经审计的年度财务报告及其他信息，并保证披露信息的真实、准确、完整。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"履行公司财务报告披露义务。证券公司应当按照规定向社会公众披露本公司经审计（并非“未经审计”）的年度财务报告及其他信息，并保证披露信息真实、准确、完整。","type":"judge"},{"id":"cy_law_1399","q":"下列关于证券公司履行反洗钱保密要求的做法，错误的是（）。","c":{"A":"配合中国人民银行调查可疑交易活动提供相关资料","B":"应同行的要求，向同行提供客户相关资料","C":"应证监会的要求，依法提供客户相关资料","D":"可以在开户协议中与客户约定向外部审计机构提供相关资料"},"a":"B","an":"B项错误，证券公司及其工作人员应对依法履行反洗钱职责或者义务获得的客户身份资料和交易信息，对依法监测、分析、报告可疑交易的有关情况，对配合中国人民银行调查可疑交易活动等有关反洗钱工作信息，以及对采取冻结措施有关的工作信息予以保密，非依法律规定不得向任何单位和个人提供。","type":"single"},{"id":"cy_law_1401","q":"证券投资顾问应当遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务。证券投资顾问不得从事的活动有（）。","c":{"A":"以任何方式向客户承诺或者保证投资收益","B":"向客户收取证券投资顾问服务费用","C":"向他人泄露客户的投资决策计划信息","D":"通过网络等公众媒体作出买入具体证券的投资建议"},"a":"A,C,D","an":"选项ACD正确：证券投资顾问不得从事下列活动： （1）以任何方式向客户承诺或者保证投资收益；（A） （2）对服务能力和过往业绩进行虚假、不实、误导性的营销宣传： （3）向他人泄露客户的投资决策计划信息；（C） （4）以个人名义向客户收取证券投资顾问服务费用； （5）通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。（D） 选项B错误：证券投资顾问收取服务费属于合规行为。除非特别说明以个人名义收取，并非禁止收费。 综上所述，本题选ACD。","type":"multi"},{"id":"cy_law_1403","q":"财务顾问及其财务顾问主办人出现下列（）情形之一的，中国证监会对其采取监管谈话、出示警示函、责令改正等监管措施。 I 在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下 II 未依法履行持续督导义务 III 违反其就上市公司并购重组相关业务活动所作承诺 IV 相关并购信息未公开前买卖该公司证券非法获利","c":{"A":"II、III、IV","B":"I、IV","C":"I、III","D":"I、II、III"},"a":"D","an":"财务顾问及其财务顾问主办人出现下列情形之一的，中国证监会对其采取监管谈话、出具警示函、责令改正等监管措施： (1)内部控制机制和管理制度、尽职调查制度以及相关业务规则存在重大缺陷或者未得到有效执行的； (2)未按照相关规定发表专业意见的； (3)在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下的；【I项】  (4)未依法履行持续督导义务的；【II项】 (5)未按照相关规定向中国证监会报告或者公告的； (6)违反其就上市公司并购重组相关业务活动所作承诺的；【III项】 (7)违反保密制度或者未履行保密责任的； (8)采取不正当竞争手段进行恶性竞争的； (9)唆使、协助或者伙同委托人干扰中国证监会审核工作的； (10)中国证监会认定的其他情形。 IV项涉嫌内幕交易，进行的处罚与题干不同，故不选此项。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_law_1405","q":"根据《融资融券合同必备条款》，下列关于融资融券合同所包含的内容，说法正确的有（）。","c":{"A":"订立合同的目的和依据","B":"载明开立信用业务相关账户的有关内容","C":"约定融资融券特定的财产信托关系","D":"约定融资融券交易所涉及的权益处理事项"},"a":"A,B,C,D","an":"融资融券业务合同的基本内容应包含： 1.当事人姓名、住所等相关信息。  2.订立合同的目的和依据。（A） 3.对融资融券交易所涉及的信用账户、融资与融券交易、担保物、保证金比例、维持担保比例、强制平仓等专业术语进行解释或定义。 4.合同应载明甲乙双方对主体资格、交易资产来源、身份证明材料的真实性等方面的声明与保证。 5.合同应载明开立信用业务相关账户的有关内容。（B） 6.合同应约定融资融券特定的财产信托关系。（C） 7.约定融资融券交易所涉及的权益处理事项。（D） 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_law_1407","q":"根据《证券经营机构及其工作人员廉洁从业实施细则》，下列属于证券经纪业务展业禁止性行为的有（  ）。","c":{"A":"以公允价格为利益关系人配售债券或者约定回购债券","B":"委托不具备资质的人员或者机构招揽客户，并输送不正当利益","C":"通过返还佣金或者其他利益、违规给予部分客户特殊优待等方式，输送或者谋取不正当利益","D":"以所在机构名义或者以所在机构员工身份，销售未经公司核准销售的金融产品"},"a":"B,C,D","an":"证券经营机构及其工作人员在证券经纪业务及其他销售产品或者提供服务过程中，不得通过以下方式输送或者谋取不正当利益： 1、协助客户通过提供虚假个人信息、伪造资料、代持等方式，向不满足适当性要求及合格投资者要求的客户销售产品或者提供服务； 2、直接或者变相向客户返还佣金（C）、赠送礼品礼券或者提供其他非证券业务性质的服务，违规给予部分客户特殊优待； 3、安排向特定客户销售显著偏离公允价格的理财产品等交易（A公允价格交易不属于违规行为）； 4、违规向其他个人或者机构泄露客户资料、账户信息、交易情况； 5、委托不具备资质的人员或者机构招揽客户，并输送不正当利益（B）； 6、以所在机构名义或者以所在机构员工身份，销售未经公司核准销售的金融产品（D）； 7、误导、诱导客户进行不必要的交易； 8、私下接受客户委托从事证券投资； 9、向客户违规承诺投资收益或者承担投资损失； 10、其他输送或者谋取不正当利益的行为。 综上，该题选BCD。","type":"multi"},{"id":"cy_law_1409","q":"证券公司应当依法向社会公开披露其基本情况、负债及或有负债情况、（  ）、高级管理人员薪酬和其他有关信息。","c":{"A":"经营管理状况","B":"参股及控股情况","C":"人均薪酬情况","D":"财务收支状况"},"a":"A,B,D","an":"选项ABD正确：根据《证券公司监督管理条例》第六十六条，证券公司应当依法向社会公开披露其基本情况、参股及控股情况（B）、负债及或有负债情况、经营管理状况（A）、财务收支状况（D）、高级管理人员薪酬和其他有关信息。 选项C错误：干扰项，证券监管聚焦公司治理与高管责任（如薪酬激励是否合规），普通员工薪酬属于公司内部管理范畴，非公众必需知情事项，且披露人均薪酬可能泄露员工个人隐私。","type":"multi"},{"id":"cy_law_1411","q":"会计师事务所、律师事务所以及从事资产评估、资信评级、财务顾问、信息技术系统服务的机构违反《证券法》第一百六十条第二款的规定，从事证券服务业务未报备案的，责令改正，可以处（）万元以下的罚款。","c":{"A":"10","B":"20","C":"50","D":"100"},"a":"B","an":"会计师事务所、律师事务所以及从事资产评估、资信评级、财务顾问、信息技术系统服务的机构违反《证券法》第一百六十条第二款的规定，从事证券服务业务未报备案的，责令改正，可以处20万元以下的罚款。","type":"single"},{"id":"cy_law_1413","q":"下列关于证券公司分支机构的说法中，错误的是()。","c":{"A":"证券公司设立分支机构的数量、管理层级应当与公司内部控制水平相匹配","B":"证券公司应当完善选聘管理机制，加强背景调查工作，聘用符合条件的人员开展业务或者担任分支机构负责人","C":"证券公司应当采取合规培训、年度考核、强制离岗、离任审计等措施，强化对分支机构负责人的管理","D":"证券公司更换分支机构负责人，应当进行审计，并在审计结束后6个月内，将审计情况报送分支机构所在地中国证监会派出机构"},"a":"D","an":"选项D错误，选项BC正确：证券公司应当完善选聘管理机制，加强背景调查工作，聘用符合条件的人员开展业务或者担任分支机构负责人。证券公司更换分支机构负责人，应当进行审计，并在审计结束后3个月内，将审计情况报送分支机构所在地中国证监会派出机构。证券公司应当采取合规培训、年度考核、强制离岗、离任审计等措施，强化对分支机构负责人的管理。 选项A正确：证券公司设立分支机构的数量、管理层级应当与公司内部控制水平相匹配。账户交易权限管理、资产转移等涉及投资者重要权益的事项应当由公司实施授权管理，分支机构根据公司授权具体办理。","type":"single"},{"id":"cy_law_1415","q":"关于客户身份资料与交易记录保存的基本要求，证券公司应按照（）原则，强化内部管理措施。","c":{"A":"安全","B":"准确","C":"完整","D":"保密"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应按照安全、准确、完整、保密的原则，强化内部管理措施，更新技术手段，逐步完善相关信息系统，统筹考虑保存范围、方式和期限，确保客户身份信息和交易记录完整准确，防止客户身份资料和交易记录的缺失、损毁，防止泄露客户身份信息和交易信息。确保足以重现和追溯每笔交易，便于证券公司反洗钱工作开展，以及反洗钱调查和监督管理。","type":"multi"},{"id":"cy_law_1417","q":"证券公司合规部门中具备3年以上(  )等有关领域工作经历的合规管理人员数量不得低于公司总部人数的一定比例，具体比例由协会规定。","c":{"A":"金融","B":"法律","C":"会计","D":"信息技术"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当为合规部门配备足够的、具备与履行合规管理职责相适应的专业知识和技能的合规管理人员。合规部门中具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的一定比例，具体比例由协会规定。","type":"multi"},{"id":"cy_law_1419","q":"证券公司合规部门中具备3年以上证券、金融、法律、会计、信息 技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于3人。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当为合规部门配备足够的、具备与履行合规管理职责相适应的专业知识和技能的合规管理人员。合规部门中具备3年以上证券、金融、法律、会计、信息 技术等有关领域工作经历的合规管理人员数量不得低于公司总部人数的1.5%，且不得少于【5人】。","type":"judge"},{"id":"cy_law_1421","q":"承销商应当对投资价值研究报告事实性信息核实、质量审核、合规审查进行留痕存档管理。（）","c":{"1":"对","0":"错"},"a":"1","an":"承销商应当对投资价值研究报告事实性信息核实、质量审核、合规审查及投资银行业务部门人员与证券分析师的交流情况进行留痕存档管理。","type":"judge"},{"id":"cy_law_1423","q":"下列关于保荐机构及其保荐代表人的一些做法，符合规定的是（）。","c":{"A":"通过从事保荐业务谋取、输送任何不正当利益","B":"直接或者间接向他人提供内幕信息，泄露未公开信息、商业秘密和客户信息","C":"勤勉尽责履行保荐相关职责","D":"采取业务包干等承包方式或其他形式进行过度激励"},"a":"C","an":"保荐机构及其保荐代表人、其他从事保荐业务的人员出现以下情形的，中国证券业协会按照《中国证券业协会自律措施实施办法》等有关规定，合理区分个人责任与机构责任，对保荐机构及相关责任人员采取谈话提醒、要求参加合规教育、警示、责令改正等自律管理措施；其中第一项至第八项违规情节严重的，可采取行业内通报批评、暂停或停止执业等纪律处分： ①通过从事保荐业务谋取、输送任何不正当利益；（A不符合规定）  ②直接或者间接向他人提供内幕信息，泄露未公开信息、商业秘密和客户信息；（B不符合规定） ③以不合理价格、不正当竞争方式招揽业务，违反公平竞争，破坏市场秩序； ④未勤勉尽责履行保荐相关职责；（C符合规定） ⑤违反独立性原则违规开展保荐业务； ⑥采取业务包干等承包方式或其他形式进行过度激励；（D不符合规定） ⑦聘用不符合规定要求的人员从事保荐业务，执业登记存在弄虚作假等违规行为； ⑧不配合、阻挠或以其他变相方式妨碍协会检查，影响自律管理人员作出自律管理决定； ⑨无正当理由不按规定及时报送相关信息，经提醒后仍不按规定报送，报送的信息中存在虚假记载、误导性陈述或者重大遗漏； ⑩未按照相关规定参加培训； ⑪其他违反本规则规定的行为。","type":"single"},{"id":"cy_law_1425","q":"以下关于证券公司治理的基本要求，说法错误的是（）。","c":{"A":"建立健全组织架构、明确职责划分","B":"有效管理内幕信息和未公开信息","C":"不得侵犯客户合法权益","D":"建立完备的内部控制体系"},"a":"B","an":"B项是证券公司合规经营的基本原则与应遵守的基本要求。 选项ACD正确：证券公司治理的基本要求： 1.建立健全组织架构、明确职责划分 2.不得侵犯客户合法权益 3.建立完备的内部控制体系 4.建立稳健的薪酬制度","type":"single"},{"id":"cy_law_1427","q":"根据反洗钱相关规定，对证券公司反洗钱内部控制制度的有效实施负责的是()。","c":{"A":"总经理","B":"合规总监","C":"董事会","D":"证券公司及其分支机构负责人"},"a":"D","an":"选项D正确：证券公司及其分支机构负责人应当对反洗钱内部控制制度的有效实施负责。 选项A错误：总经理仅覆盖总部层面，未涵盖分支机构。 选项B错误：合规总监负责监督合规性 选项C错误：董事会负责制定战略方向，不直接参与日常实施。","type":"single"},{"id":"cy_law_1429","q":"申请挂牌的公司应当业务明确、产权清晰、依法规范经营、公司治理健全，可以尚未盈利，但须履行信息披露义务，所披露的信息应当（）。","c":{"A":"真实","B":"完整","C":"唯一","D":"准确"},"a":"A,B,D","an":"选项ABD正确：申请挂牌的公司应当业务明确、产权清晰、依法规范经营、公司治理健全，可以尚未盈利，但须履行信息披露义务，所披露的信息应当真实、准确、完整。 选项C错误：信息披露强调公开透明而非“唯一性”。","type":"multi"},{"id":"cy_law_1431","q":"保荐机构及其保荐代表人、其他从事保荐业务的人员出现以下（）情形的，协会按照《中国证券业协会自律措施实施办法》等有关规定，合理区分个人责任与机构责任，对保荐机构及相关责任人员采取自律管理措施。","c":{"A":"通过从事保荐业务谋取、输送任何不正当利益","B":"违反独立性原则违规开展保荐业务","C":"以不合理价格、不正当竞争方式招揽业务，违反公平竞争，破坏市场秩序","D":"直接或者间接向他人提供内幕信息，泄露未公开信息、商业秘密和客户信息"},"a":"A,B,C,D","an":"保荐机构及其保荐代表人、其他从事保荐业务的人员出现以下情形的，协会按照《中国证券业协会自律措施实施办法》等有关规定，合理区分个人责任与机构责任，对保荐机构及相关责任人员采取自律管理措施；其中第一项至第八项违规情节严重的，可采取纪律处分： ①通过从事保荐业务谋取、输送任何不正当利益；（A正确）  ②直接或者间接向他人提供内幕信息，泄露未公开信息、商业秘密和客户信息；（D正确）  ③以不合理价格、不正当竞争方式招揽业务，违反公平竞争，破坏市场秩序；（C正确） ④未勤勉尽责履行保荐相关职责； ⑤违反独立性原则违规开展保荐业务；（B正确） ⑥采取业务包干等承包方式或其他形式进行过度激励； ⑦聘用不符合规定要求的人员从事保荐业务，执业登记存在弄虚作假等违规行为； ⑧不配合、阻挠或以其他变相方式妨碍协会检查，影响自律管理人员作出自律管理决定； ⑨无正当理由不按规定及时报送相关信息，经提醒后仍不按规定报送，报送的信息中存在虚假记载、误导性陈述或者重大遗漏； ⑩未按照相关规定参加培训； ⑪其他违反本规则规定的行为。","type":"multi"},{"id":"cy_law_1433","q":"下列属于证券公司开展各项业务，应遵守的基本要求是（）。","c":{"A":"及时识别、妥善处理公司与客户之间、不同客户之间、公司不同业务之间的利益冲突，切实维护客户利益，公平对待客户","B":"充分了解客户的基本信息、财务状况、投资经验、投资目标、风险偏好、诚信记录等信息并及时更新","C":"依法履行关联交易审议程序和信息披露义务，保证关联交易的公允性，防止不正当关联交易和利益输送","D":"审慎评估公司经营管理行为对证券市场的影响，采取有效措施，防止扰乱市场秩序"},"a":"A,B,C,D","an":"证券公司开展各项业务，应当遵循合规经营、勤勉尽责，坚持客户利益至上原则，并遵守下列基本要求：  （1）充分了解客户的基本信息、财务状况、投资经验、投资目标、风险偏好、诚信记录等信息并及时更新。（B正确） （2）合理划分客户类别和产品、服务风险等级，确保将适当的产品、服务提供给适合的客户，不得欺诈客户。 （3）持续督促客户规范证券发行行为，动态监控客户交易活动，及时报告、依法处置重大异常行为，不得为客户违规从事证券发行、交易活动提供便利。 （4）严格规范工作人员执业行为，督促工作人员勤勉尽责，防范其利用职务便利从事违法违规、超越权限或者其他损害客户合法权益的行为。 （5）有效管理内幕信息和未公开信息，防范公司及其工作人员利用该信息买卖证券、建议他人买卖证券，或者泄露该信息。 （6）及时识别、妥善处理公司与客户之间、不同客户之间、公司不同业务之间的利益冲突，切实维护客户利益，公平对待客户。（A正确）  （7）依法履行关联交易审议程序和信息披露义务，保证关联交易的公允性，防止不正当关联交易和利益输送。（C正确）  （8）审慎评估公司经营管理行为对证券市场的影响，采取有效措施，防止扰乱市场秩序。（D正确）","type":"multi"},{"id":"cy_law_1435","q":"王某2023年4月1日入职丙证券公司合规部，丙证券公司为其在证券业协会从业人员管理平台办理登记，并生成了唯一登记编号。同年7月，王某岗位调整，到资产管理总部任职。下列关于王某的登记程序，说法错误的是（）。","c":{"A":"王某入职丙证券公司合规部后，丙证券公司应在五个工作日内为其在证券业协会从业人员管理平台办理登记","B":"登记信息不完备或者不符合规定的，王某应当按照要求及时补正","C":"登记信息完备且符合规定的，中国证券业协会应于7个工作日内办结登记并生成唯一登记编号","D":"王某从事的业务类别发生变化的，丙证券公司应当自发生变化之日起5个工作日内为其办理变更登记"},"a":"C","an":"C项错误，登记信息完备且符合规定的，中国证券业协会于5个工作日内办结登记并生成唯一登记编号。 A项正确，证券公司应当自相关人员从事证券业务之日起5个工作日内，通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。 B项正确，登记信息不完备或者不符合规定的，证券公司及相关人员应当按照要求及时补正。 D项正确，登记人员从事的业务类别发生变化的，证券公司应当自发生变化之日起5个工作日内为其办理变更登记。","type":"single"},{"id":"cy_law_1437","q":"甲证券公司邀请据称为乙公司高管的外部“专家”参加电话会议，遭到乙公司董秘现场质疑其身份和发言内容，在市场上造成了较大的负面影响。甲证券公司邀请外部专家参与证券投资咨询服务以外的咨询服务，应符合的要求有（）。","c":{"A":"外部专家最近一年没有被证券监管部门处罚的记录","B":"经营机构应核实专家身份","C":"不得有虚假或误导性成分","D":"外部专家是上市公司人员，必须经过上市公司信息披露负责人的口头同意"},"a":"B,C","an":"BC项正确，经营机构应当核实专家的身份，并将经核实的专家身份告知投资者，不得有虚假或误导性成分，并应当告知外部专家必须遵守的合规要求。 A项错误，外部专家应当具有良好的社会声誉，在最近两年没有被证券监管部门处罚的记录。   D项错误，经营机构邀请的外部专家如果是上市公司人员，必须经过上市公司信息披露负责人的书面同意，同意的书面记录应保存五年。","type":"multi"},{"id":"cy_law_1439","q":"经营机构发布证券研究报告应当遵循的原则不包括（）。","c":{"A":"独立原则","B":"主观原则","C":"公平原则","D":"审慎原则"},"a":"B","an":"经营机构发布证券研究报告，应当遵守法律、行政法规和其他有关规定，遵循独立（A）、客观（非主观，B错误）、公平（C）、审慎原则（D），有效防范利益冲突，公平对待发布对象，禁止传播虚假、不实、误导性信息，禁止从事或者参与内幕交易、操纵证券市场活动。","type":"single"},{"id":"cy_law_1441","q":"根据《证券法》第一百九十一条的规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反《证券法》第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足（）万元的，处以50万元以上500万元以下的罚款。","c":{"A":"5","B":"10","C":"20","D":"50"},"a":"D","an":"根据《证券法》第一百九十一条的规定，证券交易内幕信息的知情人或者非法获取内幕信息的人违反《证券法》第五十三条的规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款。","type":"single"},{"id":"cy_law_1443","q":"以下属于我国《证券法》规定的内幕交易行为的是（）。","c":{"A":"与他人串通，以事先约定的时间，价格和方式相互进行证券交易","B":"证券公司以自营账户为他人或以他人的名义为自己买卖证券","C":"在自己实际控制的账户之间进行证券交易，影响证券交易价格","D":"上市公司股利分配计划公开前，该计划的知情人，建议他人买卖该证券"},"a":"D","an":"选项D正确：内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。 选项AC错误：属于操纵证券市场行为。 选项B错误：属于证券自营业务的其他禁止行为。","type":"single"},{"id":"cy_law_1445","q":"证券公司内部控制是指证券公司为实现经营目标，根据经营环境变化，对证券公司经营与管理过程中的风险进行识别、评价和管理的制度安排、组织体系和控制措施。有效的内部控制应当为证券公司实现（）目标提供合理保证。","c":{"A":"保证证券公司利润最大化","B":"保证经营的合法合规及证券公司内部规章制度的贯彻执行","C":"保障客户及证券公司资产的安全、完整","D":"保证证券公司业务记录、财务信息和其他信息的可靠、完整、及时"},"a":"B,C,D","an":"证券公司内部控制是指证券公司为实现经营目标，根据经营环境变化，对证券公司经营与管理过程中的风险进行识别、评价和管理的制度安排、组织体系和控制措施。有效的内部控制应当为证券公司实现后述目标提供合理保证：保证经营的合法合规及证券公司内部规章制度的贯彻执行（B项）；防范经营风险和道德风险；保障客户及证券公司资产的安全、完整（C项）；保证证券公司业务记录、财务信息和其他信息的可靠、完整、及时（D项）；提高证券公司经营效率和效果。 选项A为干扰项，内部控制的核心目标是风险控制和合规管理，而非「利润最大化「。","type":"multi"},{"id":"cy_law_1447","q":"证券投资顾问应当对其署名的证券研究报告的内容和观点负责。（）","c":{"1":"对","0":"错"},"a":"0","an":"【证券分析师】应当对其署名的证券研究报告的内容和观点负责，保证信息来源合法合规，研究方法专业审慎，分析结论具有合理依据。","type":"judge"},{"id":"cy_law_1449","q":"根据《证券公司监督管理条例》，证券公司设立时，其业务范围应当与其财务状况、内部控制制度、合规制度和人力资源状况相适应。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券公司监督管理条例》第十二条的规定，证券公司在设立时的业务范围应当与其财务状况、内部控制制度、合规制度和人力资源状况相适应。","type":"judge"},{"id":"cy_law_1451","q":"经营机构发布证券研究报告，应当审慎使用信息，对引用信息和数据来源进行核实，可以将无法确认来源合法合规性的信息写入证券研究报告。（）","c":{"1":"对","0":"错"},"a":"0","an":"经营机构发布证券研究报告，应当审慎使用信息，对引用信息和数据来源进行核实，不得将无法确认来源合法合规性的信息写入证券研究报告。","type":"judge"},{"id":"cy_law_1453","q":"证券投资咨询机构应当自相关人员从事证券业务之日起（   ）个工作日内，通过协会从业人员管理平台，将经公司审核合格的登记信息提交至协会进行登记。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"证券投资咨询机构应当自相关人员从事证券业务之日起5个工作日内（选项B正确），通过协会从业人员管理平台，将经公司审核合格的登记信息提交至协会进行登记。登记信息完备且符合规定的，协会于5个工作日内办结登记并生成唯一登记编号。登记信息不完备或不符合规定的，证券投资咨询机构及相关人员应当按照要求及时补正。","type":"single"},{"id":"cy_law_1455","q":"证券投资咨询机构从事证券投资顾问业务，应当遵守相关法律法规，（   ）。","c":{"A":"加强人员管理","B":"切实维护客户合法权益","C":"防范利益冲突","D":"健全内部控制"},"a":"B,C,D","an":"证券投资咨询机构从事证券投资顾问业务，应当遵守相关法律、行政法规和《证券投资顾问业务暂行规定》，加强合规管理，健全内部控制（选项D），防范利益冲突（选项C），切实维护客户合法权益（选项B）。  综上所述，本题应选择BCD选项。","type":"multi"},{"id":"cy_law_1457","q":"下列关于中国证券业协会发布证券行业荣辱观说法错误的是（   ）","c":{"A":"坚持守法合规，反对违法乱纪","B":"坚持诚实守信，反对背信弃义","C":"坚持审慎稳健，反对盲目扩张","D":"坚持短期理念，反对急功冒进"},"a":"D","an":"中国证券业协会发布证券行业荣辱观如下： 坚持守法合规，反对违法乱纪；坚持诚实守信，反对背信弃义；坚持专业精进，反对不思进取；坚持审慎稳健，反对盲目扩张；坚持长期理念，反对急功冒进； 坚持勤勉尽责，反对玩忽职守；坚持廉洁自律，反对拜金享乐；坚持珍惜声誉，反对损害形象；坚持服务实体，反对脱实向虚；坚持金融报国，反对自私自利。 综上，该题选D。","type":"single"},{"id":"cy_law_1459","q":"证券投资咨询机构应当加强人员培训，提升证券投资顾问的（   ）能力。","c":{"A":"职业操守","B":"业务","C":"合规意识","D":"专业服务"},"a":"A,C,D","an":"证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守（选项A）、合规意识（选项C）和专业服务（选项D）能力。 综上所述，本题应选择ACD选项。","type":"multi"},{"id":"cy_law_1461","q":"证券投资咨询机构可以通过（   ）对证券投资顾问业务进行广告宣传，且应当遵守《广告法》和证券信息传播的有关规定。","c":{"A":"广播","B":"电视","C":"网络","D":"报刊"},"a":"A,B,C,D","an":"证券投资咨询机构通过广播（选项A）、电视（选项B）、网络（选项C）、报刊（选项D）等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《广告法》和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_law_1463","q":"证券投资咨询机构从事证券投资顾问业务，应当保证证券投资顾问（   ）与服务方式、业务规模相适应。","c":{"A":"人员数量","B":"业务能力","C":"合规管理","D":"风险规避"},"a":"A,B,C","an":"证券投资咨询机构从事证券投资顾问业务，应当保证证券投资顾问人员数量（选项A）、业务能力（选项B）、合规管理（选项C）和风险控制与服务方式、业务规模相适应。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_law_1465","q":"证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守、合规意识和专业服务能力。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守、合规意识和专业服务能力。本题说法正确。","type":"judge"},{"id":"cy_law_1467","q":"证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，（   ）可以采取处罚措施。","c":{"A":"检察院","B":"国务院","C":"证券业协会","D":"中国证监会及其派出机构"},"a":"D","an":"证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构（选项D正确）可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"single"},{"id":"cy_law_1469","q":"证券投资咨询机构及其人员从事证券投资顾问业务，违反法律和行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取（   ）监管措施。","c":{"A":"出具警示函","B":"责令清理违规业务","C":"监管谈话","D":"责令改正"},"a":"A,B,C,D","an":"证券投资咨询机构及其人员从事证券投资顾问业务，违反法律和行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取责令改正（选项D）、监管谈话（选项C）、出具警示函（选项A）、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务（选项B）、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_law_1471","q":"收集和使用客户信息前，证券投资咨询机构和证券投资顾问不一定要获得客户的授权。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"收集和使用客户信息前，证券投资咨询机构和证券投资顾问应获得客户明确的授权。","type":"judge"},{"id":"cy_law_1473","q":"证券投资咨询机构应设立严格的内部访问控制机制，设定权限、使用身份验证和监控访问日志，限制未经授权的访问和使用，仅授权人员才能访问客户信息。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构应设立严格的内部访问控制机制，设定权限、使用身份验证和监控访问日志，限制未经授权的访问和使用，仅授权人员才能访问客户信息。","type":"judge"},{"id":"cy_law_1475","q":"证券投资咨询机构和证券投资顾问不可以与第三方合作伙伴共享客户信息。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询机构和证券投资顾问与第三方合作伙伴共享客户信息，应选择可信赖的合作伙伴，审查合作伙伴资质后签订保密协议，确保客户信息得到有效的保护。","type":"judge"},{"id":"cy_law_1477","q":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当遵守相关法律法规，（    ）","c":{"A":"加强人员管理","B":"切实维护客户合法权益","C":"防范利益冲突","D":"健全内部控制"},"a":"B,C,D","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当遵守法律、行政法规和本规定，加强合规管理，健全内部控制，防范利益冲突，切实维护客户合法权益。","type":"multi"},{"id":"cy_law_1479","q":"证券投资咨询机构从事证券投资顾问业务，应当保证证券投资顾问人员数量、（）、业务规模相适应。","c":{"A":"业务能力","B":"合规管理","C":"风险控制","D":"服务方式"},"a":"A,B,C,D","an":"证券投资咨询机构从事证券投资顾问业务，应当保证证券投资顾问人员数量、业务能力（A项）、合规管理（B项）和风险控制（C项）与服务方式（D项）、业务规模相适应。","type":"multi"},{"id":"cy_law_1481","q":"在证券交易活动中做出虚假陈述或者信息误导的，处以（  ）的罚款。","c":{"A":"五万元以上三十万元以下","B":"二十万元以上二百万元以下","C":"五万元以上五十万元以下","D":"三万元以上五万元以下"},"a":"B","an":"编造、传播虚假信息或者误导性信息，扰乱证券市场的，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足二十万元的，处以二十万元以上二百万元以下的罚款。在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以二十万元以上二百万元以下的罚款；属于国家工作人员的，还应当依法给予处分。","type":"single"},{"id":"cy_law_1483","q":"下列关于证券公司、证券投资咨询机构及证券分析师在证券研究报告中应履行职责的说法正确的包括（  ）。","c":{"A":"遵循独立、客观、公平、审慎原则，加强合规管理，提升研究质量和专业服务水平","B":"建立健全研究对象覆盖、信息收集、调研、证券研究报告制作、质量控制、合规审查、证券研究报告发布以及相关销售服务等关键环节的管理制度，加强流程管理和内部控制","C":"应当从组织设置、人员职责上，将证券研究报告制作发布业务与销售服务业务分开管理，以维护证券研究报告制作发布的独立性","D":"应当建立证券研究报告的信息来源管理制度，加强信息收集环节的管理，维护信息来源的合法合规性"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构在发布证券研究报告中履行的职责包括： 1.证券公司、证券投资咨询机构发布证券研究报告，应当遵循独立、客观、公平、审慎原则，加强合规管理，提升研究质量和专业服务水平。 2.证券公司、证券投资咨询机构发布证券研究报告，应当建立健全研究对象覆盖、信息收集、调研、证券研究报告制作、质量控制、合规审查、证券研究报告发布以及相关销售服务等关键环节的管理制度，加强流程管理和内部控制。建立健全证券分析师发表公开言论前的内部报备程序。 3.证券公司、证券投资咨询机构应当从组织设置、人员职责上，将证券研究报告制作发布业务与销售服务业务分开管理，以维护证券研究报告制作发布的独立性。 制作发布证券研究报告的相关人员，应当独立于证券研究报告相关销售服务人员；证券研究报告相关销售服务人员不得在证券研究报告发布前干涉和影响证券研究报告的制作过程、研究观点和发布时间。 4.证券公司、证券投资咨询机构发布证券研究报告，应当加强研究对象覆盖范围管理。将上市公司纳入研究对象覆盖范围并作出证券估值或投资评级或者将该上市公司移出研究对象覆盖范围的，应当由研究部门或者研究子公司独立作出决定并履行内部审核程序。 5.证券公司、证券投资咨询机构应当建立证券研究报告的信息来源管理制度，加强信息收集环节的管理，维护信息来源的合法合规性。","type":"multi"},{"id":"cy_law_1485","q":"证券研究报告可使用的信息来源包括（   ）。","c":{"A":"经公众媒体报道的上市公司及其子公司的其他相关信息","B":"经营机构从信息服务机构等第三方合法取得的市场、行业及企业相关信息","C":"上市公司按照法定信息披露义务通过指定媒体公开披露的信息","D":"政府部门、行业协会、证券交易所等机构发布的政策、市场、行业以及企业相关信息"},"a":"A,B,C,D","an":"证券研究报告可使用的信息来源： （1）政府部门、行业协会、证券交易所等机构发布的政策、市场、行业以及企业相关信息； （2）上市公司按照法定信息披露义务通过指定媒体公开披露的信息； （3）上市公司及其子公司通过公司网站、新闻媒体等公开渠道发布的信息，以及上市公司通过股东大会、新闻发布会、产品推介会等非正式公告方式发布的信息； （4）经营机构通过上市公司调研或者市场调查， 从上市公司及其子公司、供应商、经销商等处获取的信息，但内幕信息和未公开重大信息除外； （5）经营机构从信息服务机构等第三方合法取得的市场、行业及企业相关信息； （6）经公众媒体报道的上市公司及其子公司的其他相关信息； （7）其他合法合规信息来源。","type":"multi"},{"id":"cy_law_1487","q":"证券研究报告信息使用的禁止要求包括（  ）。","c":{"A":"不得将无法确认来源合法合规性的信息写入证券研究报告","B":"不得将无法认定真实性的市场传言作为确定性研究结论的依据","C":"不得以任何形式使用或者泄露国家保密信息、内幕信息以及上市公司未公开重大信息","D":"不得编造并传播虚假、不实、误导性信息"},"a":"A,B,C,D","an":"证券研究报告信息使用的禁止要求： 经营机构发布证券研究报告，应当审慎使用信息，对引用信息和数据来源进行核实，不得将无法确认来源合法合规性的信息写入证券研究报告；不得将无法认定真实性的市场传言作为确定性研究结论的依据；不得以任何形式使用或者泄露国家保密信息、内幕信息以及上市公司未公开重大信息；不得编造并传播虚假、不实、误导性信息。","type":"multi"},{"id":"cy_law_1489","q":"发布证券研究报告相关人员进行上市公司调研活动，应当符合（   ）要求。","c":{"A":"事先履行所在经营机构的审批程序","B":"主动寻求上市公司相关内幕信息或者未公开重大信息","C":"上市公司调研纪要仅供内部存档或撰写研究报告使用，不得对外发布或提供给客户","D":"在证券研究报告中使用调研信息的，应当保留必要的信息来源依据"},"a":"A,C,D","an":"发布证券研究报告相关人员进行上市公司调研活动，应当符合以下要求： （1）事先履行所在经营机构的审批程序； （2）不得向证券研究报告相关销售服务人员、特定客户和其他无关人员泄露研究部门或研究子公司的调研底稿、调研后发布证券研究报告的计划、研究观点的调整信息，以及未来一段时间的非客户服务性质的独立调研计划； （3）不得主动寻求上市公司相关内幕信息或者未公开重大信息； （4）被动知悉上市公内幕信息或者未公开重大信息的，应当对有关信息内容进行保密，并及时向所在机构的合规管理部门报告本人已获知有关信息的事实，在有关信息公开前不得发布涉及该上市公司的证券研究报告； （5）上市公司调研纪要仅供内部存档或撰写研究报告使用，不得对外发布或提供给客户； （6）在证券研究报告中使用调研信息的，应当保留必要的信息来源依据。","type":"multi"},{"id":"cy_law_1491","q":"经营机构邀请外部专家参与证券投资咨询服务以外咨询服务，应当符合（    ）要求。","c":{"A":"外部专家应当具有良好的社会声誉，在最近三年没有被证券监管部门处罚的记录","B":"经营机构应当核实专家的身份，并将经核实的专家身份告知投资者，不得有虚假或误导性成分，并应当告知外部专家必须遵守的合规要求","C":"经营机构邀谐的外部专家如果是上市公司人员，必须经过上市公司信息披露负责人的书面同意，同意的书面记录应保存5 年","D":"经营机构如果通过第三方邀请外部专家，应当与第三方签订专门的外部专家邀请协议，协议应当载明要求第三方核实专家身份的责任，以及如有专家身份审核不实，要求第三方承担经济赔偿的责任和媒体公开道歉的责任"},"a":"B,C,D","an":"经营机构邀请外部专家参与证券投资咨询服务以外咨询服务，应当符合以下要求： （1）外部专家应当具有良好的社会声誉，在最近两年没有被证券监管部门处罚的记录； （2）经营机构应当核实专家的身份，并将经核实的专家身份告知投资者，不得有虚假或误导性成分，并应当告知外部专家必须遵守的合规要求； （3）经营机构邀谐的外部专家如果是上市公司人员，必须经过上市公司信息披露负责人的书面同意，同意的书面记录应保存5 年； （4）经营机构如果通过第三方邀请外部专家，应当与第三方签订专门的外部专家邀请协议，协议应当载明要求第三方核实专家身份的责任，以及如有专家身份审核不实，要求第三方承担经济赔偿的责任和媒体公开道歉的责任。","type":"multi"},{"id":"cy_law_1493","q":"制作证券研究报告应当合规、客观、专业、审慎。","c":{"1":"对","0":"错"},"a":"1","an":"制作证券研究报告应当合规、客观、专业、审慎。","type":"judge"},{"id":"cy_law_1495","q":"证券经纪商在收到客户委托后，应当对下列(  )内容进行审查。","c":{"A":"委托人身份","B":"委托内容","C":"委托卖出的实际证券数量","D":"委托买入的预期证券数量"},"a":"A,B,C","an":"证券经纪商在收到客户委托后，应当对【委托人身份】、【委托内容】、【委托卖出的实际证券数量】和【委托买入的实际资金余额】进行审查。经审查符合要求后，才能接受委托。ABC符合题意，D选项说法错误。","type":"multi"},{"id":"cy_law_1497","q":"证券投资咨询机构及其从业人员从事证券服务业务可与委托人约定分享证券投资收益或者分担证券投资损失。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》，证券投资咨询机构及其从业人员从事证券服务业务【不得有】下列行为： （1）代理委托人从事证券投资。 （2）与委托人约定分享证券投资收益或者分担证券投资损失。 （3）买卖本证券投资咨询机构提供服务的证券。 （4）法律、行政法规禁止的其他行为。 有上述所列行为之一，给投资者造成损失的，应当依法承担赔偿责任。","type":"judge"},{"id":"cy_law_1499","q":"自营业务与经纪业务相比较，根本区别是自营业务是证券公司（）。","c":{"A":"代理客户买卖证券","B":"为客户提供证券及其他金融产品的投资管理服务","C":"为盈利而自己买卖证券","D":"可以向客户出借资金或证券"},"a":"C","an":"C选项正确，与经纪业务相比较，自营业务是证券公司为盈利而自己买卖证券。 A选项属于经纪业务的主要内容；B选项属于资产管理业务的内容；D选项属于融资融券业务的内容。","type":"single"},{"id":"cy_law_1501","q":"证券服务机构是指依法设立的从事证券服务业务的法人机构。下列不属于证券服务机构的是(  )。","c":{"A":"证券投资咨询机构和财务顾问机构","B":"资信评级机构和资产评估机构","C":"会计师事务所和律师事务所","D":"证券监管机构"},"a":"D","an":"证券服务机构，是指依法设立的从事证券服务业务的法人机构，包括会计师事务所、律师事务所以及从事证券投资咨询、资产评估、资信评级、财务顾问、信息技术系统服务的证券服务机构。 D属于监管机构。","type":"single"},{"id":"cy_law_1503","q":"投资咨询机构属于证券（  ）机构。","c":{"A":"自营","B":"投资","C":"服务","D":"代理"},"a":"C","an":"证券【服务】机构包括：【投资咨询机构】、财务顾问机构、资信评级机构、资产评估机构、会计师事务所等从事证券服务业务的机构。","type":"single"},{"id":"cy_law_1505","q":"(  )是指从事证券相关业务的人员为证券投资人或者客户提供证券投资分析、预测或者建议等直接或者间接有偿咨询服务的活动。","c":{"A":"证券经纪业务","B":"证券自营业务","C":"证券承销业务","D":"证券投资咨询业务"},"a":"D","an":"证券投资咨询业务是指从事证券投资咨询业务的机构及其咨询人员为证券投资人或者客户提供证券投资分析、预测或者建议等直接或者间接有偿咨询服务的活动。D选项正确 A选项证券经纪业务是指证券公司接受客户委托代客户买卖有价证券的业务；B选项证券自营业务是指证券公司以自己的名义和资金买卖证券，以获取收益的行为；C选项证券承销业务是指证券公司接受发行人的委托，代理发行人发行证券的行为。","type":"single"},{"id":"cy_law_1507","q":"根据《证券法》等法律法规，以下属于我国证券公司主要业务的有(  )。","c":{"A":"证券经纪业务","B":"证券投资咨询业务","C":"商业贷款业务","D":"证券承销与保荐业务"},"a":"A,B,D","an":"我国证券公司的主要业务包括证券经纪业务、证券投资咨询业务、与证券交易和证券投资活动有关的财务顾问业务、证券承销与保荐业务、证券自营业务、证券资产管理业务、融资融券业务、证券做市交易业务、证券公司中间介绍（IB）业务等。选项 ABD 均符合，C选项属于干扰项，商业贷款业务是商业银行的主要业务，不是证券公司的主要业务。","type":"multi"},{"id":"cy_law_1509","q":"为证券发行出具审计报告或者法律意见书等文件的证券服务机构和人员，在该证券承销期内和期满后（）内，不得买卖该证券。","c":{"A":"3个月","B":"6个月","C":"1年","D":"2年"},"a":"B","an":"选项B正确：根据《证券法》第四十二条的规定，为证券发行出具审计报告或者法律意见书等文件的证券服务机构和人员，在该证券承销期内和期满后6个月内，不得买卖该证券。","type":"single"},{"id":"cy_law_1511","q":"按照《证券公司监督管理条例》的规定，证券公司从事（），其客户的交易结算资金应当存放在指定（），以每个客户的名义单独立户管理。","c":{"A":"证券经纪业务；商业银行","B":"证券资产管理；证券交易所","C":"证券经纪业务；国务院证券监督管理机构","D":"证券承销业务；证券登记结算有限公司"},"a":"A","an":"选项A正确：根据《证券公司监督管理条例》第五十七条的规定，证券公司从事证券经纪业务，其客户的交易结算资金应当存放在指定商业银行，以每个客户的名义单独立户管理。 选项B错误：证券资产管理涉及的是委托资产的管理，而非存放在证券交易所。 选项C错误：国务院证券监管机构（证监会）是监管部门，不直接存管客户资金。 选项D错误：证券承销业务涉及的资金主要是发行募集资金，其管理由发行人与证券公司根据协议处理，与客户交易结算资金无关。且证券登记结算有限公司（如中国结算）负责证券的登记、存管和结算，但客户交易结算资金的存放主体是商业银行，而非登记结算机构。","type":"single"},{"id":"cy_law_1513","q":"关于证券公司薪酬与提名委员会、审计委员会和风险控制委员会，下列说法正确的是()。","c":{"A":"证券公司经营证券经纪业务和证券自营业务，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会","B":"证券公司经营证券经纪业务和证券投资咨询业务，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会","C":"证券公司经营证券经纪业务和融资融券业务，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会","D":"证券公司经营证券资产管理业务和证券投资咨询业务，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会"},"a":"C","an":"证券公司经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种及以上业务的，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会，行使公司章程规定的职权。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1515","q":"当证券公司经营（）和（）时，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会，行使公司章程规定的职权。","c":{"A":"证券经纪业务；融资融券业务","B":"证券资产管理业务；期货经纪业务","C":"证券承销与保荐业务；与证券交易有关财务顾问业务","D":"证券投资咨询业务；证券自营业务"},"a":"A","an":"选项A正确：按照《证券公司监督管理条例》的规定，证券公司经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种及以上业务的，其董事会应当设薪酬与提名委员会、审计委员会和风险控制委员会，行使公司章程规定的职权。 选项BCD错误：期货经纪业务、与证券交易有关财务顾问业务、证券投资咨询业务、证券自营业务不符合设立上述三个专门委员会的规定。","type":"single"},{"id":"cy_law_1517","q":"证券公司经营证券承销与保荐、证券融资融券、证券做市交易或证券自营等业务之一的，注册资本最低限额为人民币( )亿元；经营上述业务等四项业务之二的，注册资本最低限额为人民币（）亿元。","c":{"A":"2；3","B":"1；5","C":"1；2","D":"3；10"},"a":"B","an":"选项C正确：经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元；经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。  【知识拓展】注册资本要求 1.证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5 000万元； 2.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元； 3.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。","type":"single"},{"id":"cy_law_1519","q":"按照《证券法》的规定，证券公司经营（）业务的，注册资本最低限额为人民币5000万元。","c":{"A":"证券经纪","B":"证券投资咨询","C":"与证券交易、证券投资活动有关的财务顾问","D":"证券做市交易"},"a":"A,B,C","an":"选项ABC正确：证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5000万元； 选项D错误：经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元；经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。  【知识拓展】注册资本要求 1.证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5 000万元； 2.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元； 3.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。","type":"multi"},{"id":"cy_law_1521","q":"证券公司经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种及以上业务的，其董事会应当设（），行使公司章程规定的职权。","c":{"A":"专门委员会","B":"薪酬与提名委员会","C":"审计委员会","D":"风险控制委员会"},"a":"B,C,D","an":"选项A错误：题目要求选择的是具体哪些委员会是必须设立的，而“专门委员会”是一个更宽泛的概念，它包括了上述三个具体的委员会及其他可能存在的委员会。 选项BCD正确：证券公司经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种及以上业务的，其董事会应当设【薪酬与提名委员会、审计委员会和风险控制委员会】，行使公司章程规定的职权。","type":"multi"},{"id":"cy_law_1523","q":"根据《证券公司内部控制指引》，证券公司内部控制的主要内容包括（）。","c":{"A":"经纪业务内部控制","B":"银行贷款业务内部控制","C":"投资银行业务内部控制","D":"受托投资管理业务内部控制"},"a":"A,C,D","an":"选项B错误：银行贷款业务是商业银行的核心业务，与证券公司的经营范围（如融资融券、证券交易、资产管理等）无关。 选项ACD正确：证券公司内部控制的主要内容包括经纪业务内部控制、自营业务内部控制、投资银行业务内部控制、受托投资管理业务内部控制、研究咨询业务内部控制、业务创新的内部控制、分支机构内部控制、财务管理内部控制、会计系统内部控制、信息系统内部控制、人力资源管理内部控制等方面。","type":"multi"},{"id":"cy_law_1525","q":"按照《证券法》的规定，证券公司经营（），（），与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5000万元。","c":{"A":"证券经纪","B":"证券投资咨询","C":"证券自营","D":"证券资产管理"},"a":"A,B","an":"选项AB正确：证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5000万元。 选项CD错误：经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元。  【知识拓展】注册资本要求 1.证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5 000万元； 2.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元； 3.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。","type":"multi"},{"id":"cy_law_1527","q":"证券公司经营下列（）业务之一的，注册资本最低限额为人民币1亿元。","c":{"A":"证券自营","B":"证券经纪","C":"证券投资咨询","D":"证券做市交易"},"a":"A,D","an":"选项AD正确：证券公司经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元； 选项BC错误：证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5000万元。  【知识拓展】注册资本要求 1.证券公司经营证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务的，注册资本最低限额为人民币5 000万元； 2.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一的，注册资本最低限额为人民币1亿元； 3.经营证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上的，注册资本最低限额为人民币5亿元。","type":"multi"},{"id":"cy_law_1529","q":"某证券公司在设计内部控制制度时，要求相关制度必须覆盖公司自营、投行、经纪等所有业务条线，并渗透到各项业务的决策、执行、监督等全流程。这主要体现了内部控制的（  ）原则。","c":{"A":"合理","B":"独立","C":"制衡","D":"健全"},"a":"D","an":"选项D正确：健全：内部控制应当做到事前、事中、事后控制相统一；覆盖证券公司的所有业务、部门和人员，渗透到决策、执行、监督、反馈等各个环节，确保不存在内部控制的空白或漏洞。 选项A错误：合理：内部控制应当符合国家有关法律法规和中国证监会的有关规定，与证券公司经营规模、业务。 选项B错误：独立：承担内部控制监督检查职能的部门应当独立于证券公司其他部门。 选项C错误：制衡：证券公司部门和岗位的设置应当权责分明、相互牵制；前台业务运作与后台管理支持适当分离。","type":"single"},{"id":"cy_law_1531","q":"按照《证券公司内部控制指引》的要求，证券投资顾问业务是证券公司、证券投资咨询机构接受客户委托，按照约定，向客户提供涉及证券及证券相关产品的投资建议服务，辅助客户作出投资决策，并直接或者间接获取经济利益的经营活动。以下关于证券公司的证券投资顾问业务内部控制，说法正确的是（）。","c":{"A":"禁止以任何方式承诺或保证投资收益","B":"与客户签订证券投资顾问协议，按照公平、合理、自愿的原则，与客户协商并以书面或口头的方式约定费用收取安排","C":"证券投资顾问服务费应当以公司账户或者个人账户收取","D":"业务档案保存期限自协议开始之日起不得少于5年"},"a":"A","an":"选项A正确：证券投资顾问不得对服务能力和过往业绩进行虚假、不实、误导性的营销宣传，禁止以任何方式承诺或者保证投资收益。 选项B错误：与客户签订证券投资顾问协议，按照公平、合理、自愿的原则，与客户协商并书面约定（不包括口头）费用收取安排。 选项C错误：证券投资顾问服务费应当以公司账户（而不能是个人账户）收取。 选项D错误：业务档案保存期限自协议终止之日起（而不是开始之日）不得少于5年。","type":"single"},{"id":"cy_law_1533","q":"按照《证券监督管理条例》的要求，应当建立独立董事制度的是（）。","c":{"A":"经营证券经纪业务、证券资产管理业务和证券承销与保荐业务的甲公司","B":"经营融资融券业务、投资银行类业务和研究咨询业务的乙公司","C":"经营证券经纪业务、自营业务和证券投资顾问业务的丙公司","D":"经营证券承销与保荐业务、研究咨询业务和自营业务的丁公司"},"a":"A","an":"选项A正确：经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种以上业务的证券公司，应当建立独立董事制度。 选项B错误：只有融资融券业务一项，投资银行类业务和研究咨询业务不在必须建立独立董事制度的业务范围内，因此乙公司不需要建立独立董事制度。 选项C错误：只有证券经纪业务一项，自营业务和证券投资顾问业务不在必须建立独立董事制度的业务范围内，因此丙公司也不需要建立独立董事制度。 选项D错误：只有证券承销与保荐业务一项，研究咨询业务和自营业务不在必须建立独立董事制度的业务范围内，因此丁公司也不需要建立独立董事制度。","type":"single"},{"id":"cy_law_1535","q":"经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种以上业务的证券公司，应当建立独立董事制度。其中，证券公司出现（）的，独立董事人数不得少于董事人数的1／4。","c":{"A":"董事长、经营管理的主要负责人由同一人担任","B":"内部董事人数占董事人数1／5以上","C":"内部监事人员占监事人数1／3以上","D":"董事长在监事会中任职"},"a":"A,B","an":"选项C错误：监事的人员构成与独立董事制度无直接关联。 选项D错误：董事、高级管理人员不得兼任监事。属于违规行为，需纠正，与独立董事人数无关。 选项AB正确：经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种以上业务的证券公司，应当建立独立董事制度。其中，证券公司有下列情形之一的，独立董事人数不得少于董事人数的1／4： （1）董事长、经营管理的主要负责人由【同一人】担任；  （2）内部董事人数占董事人数【1／5以上】； （3）中国证监会认定的其他情形。","type":"multi"},{"id":"cy_law_1537","q":"以下属于证券公司投资银行类业务的是（）。","c":{"A":"非上市公众公司推荐","B":"上市公司并购重组财务顾问","C":"公司债券受托管理","D":"受托投资管理"},"a":"A,B,C","an":"选项D错误：受托投资管理是资产管理业务的一部分。 选项ABC正确：证券公司投资银行类业务包括：承销与保荐、上市公司并购重组财务顾问、公司债券受托管理、非上市公众公司推荐、资产证券化等其他具有投资银行特性的业务。","type":"multi"},{"id":"cy_law_1539","q":"按照《证券公司监督管理条例》的要求，证券公司要建立完备的内部控制体系。证券公司以保护投资者利益和防范证券公司风险为出发点，重点规定了（）主要业务的规则和风险控制措施。","c":{"A":"证券经纪业务","B":"证券自营业务","C":"证券资产管理业务","D":"证券公司内部审计业务"},"a":"A,B,C","an":"选项ABC正确：《证券公司监督管理条例》以保护投资者利益和防范证券公司风险为出发点，重点规定了证券经纪业务、证券自营业务、证券资产管理业务和融资融券等主要业务的规则和风险控制措施。 选项D错误：规定未涉及，《证券公司监督管理条例》重点关注的是直接涉及投资者利益和证券公司主要风险来源的业务，如证券经纪、自营和资产管理业务等，而内部审计业务主要是证券公司内部的一种监督和评价活动。","type":"multi"},{"id":"cy_law_1541","q":"证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币（）元。","c":{"A":"2000万","B":"5000万","C":"1亿","D":"2亿"},"a":"D","an":"选项D正确：证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币【2亿元】。  【知识拓展】 证券公司从事相关证券业务的净资本标准： 1、证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元。 2、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元。 3、证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元。 4、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元。","type":"single"},{"id":"cy_law_1543","q":"证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币（）。","c":{"A":"1000万元","B":"2000万元","C":"5000万元","D":"1亿元"},"a":"C","an":"选项C正确：证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币【5000万元】。  【知识拓展】 证券公司从事相关证券业务的净资本标准： 1、证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元。 2、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元。 3、证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元。 4、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元。","type":"single"},{"id":"cy_law_1545","q":"证券公司经营经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币（）元。","c":{"A":"1000万","B":"2000万","C":"5000万","D":"1亿"},"a":"D","an":"选项D正确：证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元。  【知识拓展】 证券公司从事相关证券业务的净资本标准： 1、证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元。 2、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元。 3、证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元。 4、证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元。","type":"single"},{"id":"cy_law_1547","q":"某证券公司拟拓展经纪业务，以下关于其营销渠道选择的表述，正确的是（  ）。","c":{"A":"为快速扩大规模，可委托第三方财富管理机构全权代理产品销售","B":"公司只能依靠自身内部员工开展所有营销活动","C":"可以通过电视台财经频道播放其投资顾问的服务广告","D":"委托未与公司签订委托合同的个人兼职进行客户招揽"},"a":"C","an":"目前在我国证券经纪业务营销渠道包括证券公司内部营销员工进行客户招揽和客户服务，也可由证券公司委托经纪人开展（B错误），但证券公司不得违反规定委托其他单位或者个人进行客户招揽、客户服务、产品销售活动（AD错误）。除此以外，证券公司还可以选择新闻媒体、互联网信息平台等第三方载体投放广告。（C正确） 综上，该题选C。","type":"single"},{"id":"cy_law_1549","q":"下列关于证券公司经纪业务的营销管理，说法错误的是（）。","c":{"A":"我国对证券经纪业务营销的监督管理主要体现在对开展证券经纪业务的证券公司的管理，不包括对证券经纪业务营销人员的管理","B":"证券公司经纪业务的营销，是市场营销管理与证券经纪业务相结合的产物","C":"我国证券经纪业务营销渠道包括证券公司内部营销员工进行客户招揽和客户服务，也可由证券公司委托经纪人开展","D":"证券公司开展证券经纪业务营销活动，应当制定证券经纪业务营销管理制度，加强对营销活动的统一管理"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误：根据《证券法》《证券公司监督管理条例》以及《证券经纪人管理暂行规定》的规定，我国对证券经纪业务营销的监督管理主要体现在对开展证券经纪业务的证券公司及对证券经纪人等证券经纪业务营销人员（并非不包括营销人员）的管理，以及第三方营销渠道管理。因此答案选择A。 选项B正确：证券公司经纪业务的营销，是市场营销管理与证券经纪业务相结合的产物。 选项C正确：我国证券经纪业务营销渠道包括证券公司内部营销员工进行客户招揽和客户服务，也可由证券公司委托经纪人开展，但证券公司不得违反规定委托其他单位或者个人进行客户招揽、客户服务、产品销售活动。 选项D正确：证券公司开展证券经纪业务营销活动，应当制定证券经纪业务营销管理制度，加强对营销活动的统一管理。","type":"single"},{"id":"cy_law_1551","q":"目前，我国证券经纪业务的营销渠道包括证券公司内部营销员工进行客户招揽和客户服务，也可由证券公司委托经纪人开展。（）","c":{"1":"对","0":"错"},"a":"1","an":"目前，我国证券经纪业务的营销渠道包括证券公司内部营销员工进行客户招揽和客户服务，也可由证券公司委托经纪人开展，但证券公司不得违反规定委托其他单位或者个人进行客户招揽、客户服务、产品销售活动。","type":"judge"},{"id":"cy_law_1553","q":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，相关业务档案的保存期限自相关协议终止之日起不得少于（）年。","c":{"A":"1","B":"3","C":"5","D":"10"},"a":"C","an":"选项C正确：证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理；相关业务档案的保存期限自相关协议终止之日起不得少于【5年】。","type":"single"},{"id":"cy_law_1555","q":"证券公司受托投资管理等业务部门的专业人员在离开岗位后的（）个月内不得面向社会公众开展证券投资咨询业务。","c":{"A":"12","B":"2","C":"3","D":"6"},"a":"D","an":"选项D正确：证券公司的自营、受托投资管理、财务顾问和投资银行等业务部门的专业人员在离开原岗位后的6个月内不得从事面向社会公众开展的证券投资咨询业务。","type":"single"},{"id":"cy_law_1557","q":"下列各项中，属于证券投资咨询业务的是（）。","c":{"A":"接受投资人或者客户委托，提供证券投资咨询服务","B":"举办有关证券投资咨询的讲座、报告会、分析会等","C":"在报刊上发表证券投资咨询的文章、评论、报告，以及通过电台、电视等公众传播媒体提供证券投资咨询服务","D":"通过电话、传真、电脑网络等电信设备系统，提供证券投资咨询服务"},"a":"A,B,C,D","an":"选项ABCD正确：证券投资咨询是指从事证券投资咨询业务的机构及其投资咨询人员以下列形式为证券投资人或者客户提供证券投资分析、预测或者建议等直接或者间接有偿咨询服务的活动： （1）接受投资人或者客户委托，提供证券投资咨询服务（A项）；  （2）举办有关证券投资咨询的讲座、报告会、分析会等（B项）；  （3）在报刊上发表证券投资咨询的文章、评论、报告，以及通过电台、电视等公众传播媒体提供证券投资咨询服务（C项）；  （4）通过电话、传真、电脑网络等电信设备系统，提供证券投资咨询服务（D项）； （5）中国证监会认定的其他形式。","type":"multi"},{"id":"cy_law_1559","q":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，必须遵守（）等法律法规和中国证监会的有关规定。","c":{"A":"《证券法》","B":"《证券、期货投资咨询管理暂行办法》","C":"《证券公司证券自营业务指引》","D":"《证券投资顾问业务暂行规定》"},"a":"A,B,D","an":"选项ABD正确：证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，必须遵守《证券法》《证券、期货投资咨询管理暂行办法》《证券投资顾问业务暂行规定》等法律法规和中国证监会的有关规定。 选项C错误：《证券公司证券自营业务指引》是证券公司自营业务依据的规定。","type":"multi"},{"id":"cy_law_1561","q":"证券基金经营机构使用符合某些情形之一的香港机构的证券投资咨询服务的，应当自签订协议之日起5个工作日内，将协议、香港机构签署的承诺书、香港机构符合资质的证明文件报驻所地或者经营所在地中国证监会派出机构备案。这些情形包括（）。","c":{"A":"与证券基金经营机构存在控制关系或者受同一金融机构控制","B":"提供港股研究报告的香港机构从事发布证券研究报告业务2年以上，且有30名以上经香港证监会批准取得就证券提供意见牌照的持牌代表","C":"提供港股研究报告的香港机构从事发布证券研究报告业务3年以上，且有20名以上经香港证监会批准取得就证券提供意见牌照的持牌代表","D":"提供港股投资顾问服务的香港机构从事资产管理业务5年以上，且最近一个会计年度管理的证券资产不少于100亿港元或者等值货币"},"a":"A,C,D","an":"证券基金经营机构使用符合下列情形之一的香港机构的证券投资咨询服务的，应当自签订协议之日起5个工作日内，将协议、香港机构签署的承诺书、香港机构符合资质的证明文件报驻所地或者经营所在地中国证监会派出机构备案： （1）与证券基金经营机构存在控制关系或者受同一金融机构控制；（A正确） （2）提供港股研究报告的香港机构从事发布证券研究报告业务3年以上，且有20名以上经香港证监会批准取得就证券提供意见牌照的持牌代表；（C正确，B错误） （3）提供港股投资顾问服务的香港机构从事资产管理业务5年以上，且最近一个会计年度管理的证券资产不少于100亿港元或者等值货币。（D正确） 综上，该题选ACD。","type":"multi"},{"id":"cy_law_1563","q":"证券投资咨询的活动包括（）。","c":{"A":"接受投资人或者客户委托，提供证券投资咨询服务","B":"举办有关证券投资咨询的讲座、报告会、分析会等","C":"通过电话、传真、电脑网络等电信设备系统，提供证券投资咨询服务","D":"在报刊上发表证券投资咨询的文章、评论、报告，以及通过电台、电视等公众传播媒体提供证券投资咨询服务"},"a":"A,B,C,D","an":"选项ABCD正确：证券投资咨询，是指从事证券投资咨询业务的机构及其投资咨询人员以下列形式为证券投资人或者客户提供证券投资分析、预测或者建议等直接或者间接有偿咨询服务的活动： （1）接受投资人或者客户委托，提供证券投资咨询服务。【A】  （2）举办有关证券投资咨询的讲座、报告会、分析会等。【B】  （3）在报刊上发表证券投资咨询的文章、评论、报告，以及通过电台、电视等公众传播媒体提供证券投资咨询服务。【D】  （4）通过电话、传真、电脑网络等电信设备系统，提供证券投资咨询服务。【C】 （5）中国证监会认定的其他形式。","type":"multi"},{"id":"cy_law_1565","q":"（）等业务环节均应当自行开展，不得委托未取得证券投资咨询业务资格的机构和个人代理。","c":{"A":"产品销售","B":"协议签订","C":"服务提供","D":"客户回访"},"a":"A,B,C,D","an":"选项ABCD正确：【产品销售、协议签订、服务提供、客户回访、投诉处理】等业务环节均应当自行开展，不得委托未取得证券投资咨询业务资格的机构和个人代理。","type":"multi"},{"id":"cy_law_1567","q":"证券公司、证券投资咨询机构和其他财务顾问机构有（）情形的，不得担任财务顾问。","c":{"A":"最近36个月内存在违反诚信的不良记录","B":"最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分","C":"最近36个月内因执业行为违反行业规范而受到行业自律组织的纪律处分","D":"最近48个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查"},"a":"B","an":"选项B正确：最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分，不得担任财务顾问。 选项ACD错误：证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问： （1）最近24个月（并非36个月）内存在违反诚信的不良记录（A错误）；  （2）最近24个月（并非36个月）内因执业行为违反行业规范而受到行业自律组织的纪律处分（C错误）；  （3）最近36个月（并非48个月）内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查（D错误）。","type":"single"},{"id":"cy_law_1569","q":"证券公司、证券投资咨询机构和其他财务顾问机构最近（）个月内因涉嫌违法违规经营正在被调查的，不得担任财务顾问。","c":{"A":"12","B":"24","C":"36","D":"48"},"a":"C","an":"选项C正确：证券公司、证券投资咨询机构和其他财务顾问机构最近【36个月】内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查的，不得担任财务顾问。  【知识拓展】证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问： (1)最近24个月内存在违反诚信的不良记录； (2)最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分； (3)最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查。","type":"single"},{"id":"cy_law_1571","q":"证券公司、证券投资咨询机构或者其他财务顾问机构受聘担任上市公司独立财务顾问的，应当保持独立性，不得与上市公司存在利害关系。出现下列哪些情形时，不得担任独立财务顾问？（）","c":{"A":"持有或者通过协议、其他安排与他人共同持有上市公司股份达到或者超过5%","B":"最近2年财务顾问与上市公司存在资产委托管理关系、相互提供担保","C":"在并购重组中为上市公司的交易对方提供财务顾问服务","D":"选派代表担任上市公司董事"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司、证券投资咨询机构或者其他财务顾问机构受聘担任上市公司独立财务顾问的，应当保持独立性，不得与上市公司存在利害关系；存在下列情形之一的，不得担任独立财务顾问： （1）持有或者通过协议、其他安排与他人共同持有上市公司股份达到或者超过5%，或者选派代表担任上市公司董事；【A/D】 （2）上市公司持有或者通过协议、其他安排与他人共同持有财务顾问的股份达到或者超过5%，或者选派代表担任财务顾问的董事； （3）最近2年财务顾问与上市公司存在资产委托管理关系、相互提供担保，或者最近一年财务顾问为上市公司提供融资服务；【B】 （4）财务顾问的董事、监事、高级管理人员、财务顾问主办人或者其直系亲属有在上市公司任职等影响公正履行职责的情形； （5）在并购重组中为上市公司的交易对方提供财务顾问服务；【C】 （6）与上市公司存在利害关系、可能影响财务顾问及其财务顾问主办人独立性的其他情形。","type":"multi"},{"id":"cy_law_1573","q":"证券公司、证券投资咨询机构和其他财务顾问机构不得担任财务顾问的情形包括（）。","c":{"A":"最近24个月内存在违反诚信的不良记录","B":"最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分","C":"最近48个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查","D":"最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查"},"a":"A,B,D","an":"选项C错误：应为“最近36个月（并非48个月）内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查”。 选项ABD正确：证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问： （1）最近24个月内存在违反诚信的不良记录。【A项符合】  （2）最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分。【B项符合】  （3）最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查。【D项符合】","type":"multi"},{"id":"cy_law_1575","q":"证券公司如持有或者通过协议、其他安排与他人共同持有上市公司股份达到或者超过5%的，则不能担任该上市公司的独立财务顾问。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司、证券投资咨询机构或者其他财务顾问机构受聘担任上市公司独立财务顾问的，应当保持独立性，不得与上市公司存在利害关系；存在下列情形之一的，不得担任独立财务顾问： （1）持有或者通过协议、其他安排与他人共同持有上市公司股份达到或者超过5%，或者选派代表担任上市公司董事； （2）上市公司持有或者通过协议、其他安排与他人共同持有财务顾问的股份达到或者超过5%，或者选派代表担任财务顾问的董事； （3）最近2年财务顾问与上市公司存在资产委托管理关系、相互提供担保，或者最近一年财务顾问为上市公司提供融资服务； （4）财务顾问的董事、监事、高级管理人员、财务顾问主办人或者其直系亲属有在上市公司任职等影响公正履行职责的情形； （5）在并购重组中为上市公司的交易对方提供财务顾问服务； （6）与上市公司存在利害关系、可能影响财务顾问及其财务顾问主办人独立性的其他情形。","type":"judge"},{"id":"cy_law_1577","q":"（）中专门对证券公司融资融券业务作出了一般性规定。","c":{"A":"《证券法》","B":"《证券公司监督管理条例》","C":"《证券公司融资融券业务管理办法》","D":"《转融通业务监督管理试行办法》"},"a":"B","an":"选项B正确：《证券公司监督管理条例》中专门对证券公司融资融券业务作出了一般性规定。 选项A错误：《证券法》是证券市场的基础性法律，对证券发行、交易、上市公司、证券公司等作出原则性规定。其中虽涉及融资融券业务，但仅为框架性条款，未对业务规则、风险控制等作出具体或一般性规定。 选项C错误：《证券公司融资融券业务管理办法》是部门规章，它对融资融券业务的具体操作进行了详细的规定，而不是一般性规定。 选项D错误：《转融通业务监督管理试行办法》主要涉及转融通业务（并非融资融券业务）的监管。","type":"single"},{"id":"cy_law_1579","q":"融资融券业务的合同应约定融资融券特定的（）关系。","c":{"A":"财产担保","B":"财产质押","C":"财产托管","D":"财产信托"},"a":"D","an":"选项D正确：融资融券业务的合同应约定融资融券特定的财产信托关系，即信托目的、信托财产范围、信托的成立和生效、信托财产的管理、信托财产的处分及信托的终止。 选项ABC为干扰项，融资融券合同中，客户以提交的资金、证券等设立信托，证券公司作为受托人管理担保物，该信托关系是法规明确规定的特定法律关系，区别于传统质押、托管或笼统的担保概念。","type":"single"},{"id":"cy_law_1581","q":"在某证券公司内部架构设计中，以下做法符合融资融券业务隔离要求的是（  ）。","c":{"A":"投资银行部的项目信息可实时共享给融资融券部的客户经理，以开发客户","B":"资产管理业务的投资经理同时为融资融券业务的重要客户提供投资建议","C":"融资融券业务的客户信用账户与公司自营账户实行严格的分别管理和运作","D":"为节约人力，业务稽核人员定期轮岗到融资融券部的前台岗位进行学习"},"a":"C","an":"选项C正确，选项AB错误：证券公司应确保融资融券业务与证券资产管理、证券自营、投资银行等业务在机构、人员、信息、账户等方面相互分离。 选项D错误：证券公司应当健全业务隔离制度，融资融券业务的前、中、后台应当相互分离、相互制约，各主要环节应当分别由不同的部门和岗位负责，负责风险监控和业务稽核的部门和岗位应当独立于其他部门和岗位，分管融资融券业务的高级管理人员不得兼管风险监控部门和业务稽核部门。","type":"single"},{"id":"cy_law_1583","q":"交易所“融资融券交易实施细则”规定，融资、融券期限最长不得超过（）个月。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"D","an":"选项D正确：交易所“融资融券交易实施细则”规定，融资、融券期限最长不得超过6个月。","type":"single"},{"id":"cy_law_1585","q":"根据《上海证券交易所融资融券交易实施细则》，维持担保比例超过（）时，从事融资融券交易的客户可以提取保证金可用余额中的现金或充抵保证金的有价证券。","c":{"A":"1","B":"2","C":"1.5","D":"3"},"a":"D","an":"选项D正确：根据《上海证券交易所融资融券交易实施细则》，维持担保比例【超过300％】时，客户可以提取保证金可用余额中的现金或充抵保证金的证券。","type":"single"},{"id":"cy_law_1587","q":"下列关于融资融券业务合同，说法不正确的有（）。","c":{"A":"合同应约定乙方清偿债务的范围、方式、期限","B":"合同应约定甲方强制平仓的各类情形","C":"合同应约定甲方从事融资融券交易的信用额度","D":"合同应载明甲乙双方对主体资格、交易资产来源、身份证明材料的真实性等方面的声明与保证"},"a":"A,B","an":"题目问的是”说法不正确的“。 选项A错误：合同应【约定“甲方”清偿债务】的范围、方式、期限以及债务清偿后信用账户的处理方式等有关事项。 选项B错误：合同应【约定“乙方”强制平仓】的各类情形、平仓开始与停止条件、平仓顺序等事项。 因此答案选择AB。","type":"multi"},{"id":"cy_law_1589","q":"交易所按照（）的原则，从满足规定的证券范围内选取和确定融资融券标的证券的名单，并向市场公布。","c":{"A":"从严到宽","B":"从少到多","C":"逐步扩大","D":"逐步细化"},"a":"A,B,C","an":"选项ABC正确：交易所按照【从严到宽、从少到多、逐步扩大】的原则，从满足上述规定的证券范围内选取和确定标的证券的名单，并向市场公布。 选项D错误：干扰项设置，“逐步细化” 不符合标的管理的实践逻辑，因为标的标准已明确，调整重点是扩大范围而非细化规则。","type":"multi"},{"id":"cy_law_1591","q":"关于证券自营业务的的具体操作要求，下列说法正确的是（  ）。","c":{"A":"自营业务必须以证券公司自身名义、通过专用自营席位进行，并由自营业务部门负责自营账户的管理，包括开户、销户、使用登记等","B":"证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营","C":"自营业务资金的出入必须以公司名义进行，可以从自营账户中提取现金，禁止以个人名义从自营账户中调入调出资金","D":"对自营资金执行清算制度，自营清算岗位可以由经纪业务、资产管理业务及其他业务的清算岗位担任"},"a":"B","an":"选项B正确：证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营。 选项A错误：证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由非自营业务部门负责自营账户的管理，包括开户、销户、使用登记等。 选项C错误：自营业务资金的出入必须以公司名义进行，禁止以个人名义从自营账户中调入调出资金，禁止从自营账户中提取现金。 选项D错误：对自营资金执行独立清算制度，自营清算岗位应当与经纪业务、资产管理业务及其他业务的清算岗位分离。","type":"single"},{"id":"cy_law_1593","q":"下列关于证券公司自营业务的表述，说法正确的有（）。","c":{"A":"证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由非自营业务部门负责自营账户的管理，包括开户、销户、使用登记等","B":"证券自营业务需加强自营业务资金的调度管理和自营业务的会计核算，由自营业务部门负责自营业务所需资金的调度","C":"证券公司需完善可投资证券品种的投资论证机制，建立证券池制度，自营业务部门只能在确定的自营规模和可承受风险限额内，从证券池内选择证券进行投资","D":"证券自营业务的清算、统计应由专门人员执行，并与财务部门资金清算人员及时对账，对账情况要有相应记录及相关人员签字"},"a":"A,C,D","an":"选项B错误：证券自营业务需加强自营业务资金的调度管理和自营业务的会计核算，由非自营业务部门（并非自营业务部门自己）负责自营业务所需资金的调度。（这是因为将资金调度权交给非自营业务部门可以有效避免自营业务部门因利益驱动而做出超出公司可承受风险限额的投资决策） 选项A正确：证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由非自营业务部门负责自营账户的管理，包括开户、销户、使用登记等。 选项C正确：证券公司需完善可投资证券品种的投资论证机制，建立证券池制度，自营业务部门只能在确定的自营规模和可承受风险限额内，从证券池内选择证券进行投资。 选项D正确：证券自营业务的清算、统计应由专门人员执行，并与财务部门资金清算人员及时对账，对账情况要有相应记录及相关人员签字。  【知识拓展】证券自营业务的具体操作要求 1．账户  证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由非自营业务部门负责自营账户的管理，包括开户、销户、使用登记等。  证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营。  2．投资管理  证券公司需完善可投资证券品种的投资论证机制，建立证券池制度，自营业务部门只能在确定的自营规模和可承受风险限额内，从证券池内选择证券进行投资。并建立健全自营业务运作止盈止损机制，止盈止损的决策、执行与实效评估应当符合规定的程序并进行书面记录。  证券公司需建立严密的自营业务操作流程，投资品种的研究、投资组合的制订和决策以及交易指令的执行应当相互分离并由不同人员负责；交易指令执行前应当经过审核，并强制留痕。同时，应建立健全自营业务数据资料备份制度，并由专人负责管理。  3．资金  证券自营业务需加强自营业务资金的调度管理和自营业务的会计核算，由非自营业务部门负责自营业务所需资金的调度。  自营业务资金的出入必须以公司名义进行，禁止以个人名义从自营账户中调入调出资金，禁止从自营账户中提取现金。  4．清算  证券自营业务的清算、统计应由专门人员执行，并与财务部门资金清算人员及时对账，对账情况要有相应记录及相关人员签字。  对自营资金执行独立清算制度，自营清算岗位应当与经纪业务、资产管理业务及其他业务的清算岗位分离。","type":"multi"},{"id":"cy_law_1595","q":"证券公司在柜台市场发行、销售与转让的产品有（）。","c":{"A":"证券公司及其子公司以非公开募集方式设立或者承销的资产管理计划、公司债务融资工具等产品","B":"银行通过证券公司发行、销售与转让的产品","C":"保险公司通过证券公司发行、销售与转让的产品","D":"金融衍生品及中国证监会、协会认可的产品"},"a":"A,B,C,D","an":"选项ABCD正确：在柜台市场发行、销售与转让的产品包括但不限于以下私募产品： （1）证券公司及其子公司以非公开募集方式设立或者承销的资产管理计划、公司债务融资工具等产品； （2）银行、保险公司、信托公司等其他机构设立并通过证券公司发行、销售与转让的产品； （3）金融衍生品及中国证监会、中国证券业协会认可的产品。 除金融监管部门明确规定必须事前审批、备案的私募产品外，证券公司在柜台市场发行、销售与转让的私募产品，直接实行事后备案。 在柜台市场发行、销售与转让的私募产品应当依法合规，资金投向应当符合法律法规和国家有关政策规定。","type":"multi"},{"id":"cy_law_1597","q":"《证券公司监督管理条例》是中国证监会等监管机构制定金融产品代销业务相关监管政策、实施监督管理的重要法律依据。《证券公司监督管理条例》属于（）。","c":{"A":"行政法规","B":"部门规章","C":"其他规范性文件","D":"法律"},"a":"A","an":"选项A正确：《证券公司监督管理条例》是中国证监会等监管机构制定金融产品代销业务相关监管政策、实施监督管理的重要法律依据，是行政法规。  【知识拓展】代销金融产品业务法规概述 1.法律、行政法规 《证券公司监督管理条例》是中国证监会等监管机构制定金融产品代销业务相关监管政策、实施监督管理的重要法律依据。 2.部门规章及规范性文件 除上述法律及行政法规外，证券公司代销业务涉及的主要部门规章及规范性文件包括《公开募集证券投资基金销售机构监督管理办法》《证券公司代销金融产品管理规定》《证券投资基金销售适用性指导意见》《证券投资基金销售机构内部控制指导意见》《公开募集证券投资基金宣传推介材料管理暂行规定》《证券期货经营机构私募资产管理业务运作管理暂行规定》等。","type":"single"},{"id":"cy_law_1599","q":"证券公司违反证券承销业务规定可能承担的法律责任包括（）。","c":{"A":"责令改正，给予警告，没收违法所得","B":"情节严重的，暂停或者撤销相关业务许可","C":"处50万元以500万元以下的罚款","D":"处以业务收入1倍以上10倍以下的罚款"},"a":"A,B,C","an":"选项ABC正确：根据《证券法》第一百八十四条的规定，证券公司承销证券违反《证券法》第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处50万元以上500万元以下的罚款；情节严重的，暂停或者撤销相关业务许可。 对直接负责的主管人员和其他直接责任人员给予警告，可以并处20万元以上200万元以下的罚款；情节严重的，并处以50万元以上500万元以下的罚款。 选项D错误：干扰项，无此规定 （教材中涉及到该处罚的考点为：证券服务机构违反《证券法》第一百六十三条的规定，未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处以业务收入1倍以上10 倍以下的罚款，没有业务收入或者业务收入不足 50万元的，处以 50万元以上500万元以下的罚款/ 保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款）","type":"multi"},{"id":"cy_law_1601","q":"根据《证券法》的规定，保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上5倍以下的罚款。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》第一百八十二条的规定，保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下（并非1-5倍）的罚款；没有业务收入或者业务收入不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销保荐业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"judge"},{"id":"cy_law_1603","q":"张某在A证券公司获得录用，其岗位是从事证券投资分析工作，撰写证券研究报告，A证券公司应当为他办理的从业人员登记类别是（  ）。","c":{"A":"一般证券业务","B":"证券投资咨询(证券投资顾问)","C":"证券投资咨询(证券分析师)","D":"保荐代表人"},"a":"C","an":"从业人员应当符合从事证券业务的条件，并由所在证券公司按照规定向中国证券业协会进行登记。登记类别包括一般证券业务、证券经纪人、证券投资咨询(证券投资顾问)、证券投资咨询(证券分析师)、保荐代表人等。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1605","q":"按照《证券发行上市保荐业务管理办法》的规定，保荐机构、保荐业务负责人或者内核负责人在1个自然年度内被采取监管措施累计（）次以上，中国证监会可暂停保荐机构的保荐机构资格3个月，依法责令保荐机构更换保荐业务负责人、内核负责人。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"C","an":"选项C正确：保荐机构、保荐业务负责人、内核负责人或者保荐业务部门负责人在1个自然年度内被采取上述监管措施累计5次以上，中国证监会可以暂停保荐机构的保荐业务3个月，依法责令保荐机构更换保荐业务负责人、内核负责人或者保荐业务部门负责人。保荐代表人在2个自然年度内被采取上述监管措施累计2次以上，中国证监会可以依法对相关保荐代表人采取认定为不适当人选6个月的监管措施。","type":"single"},{"id":"cy_law_1607","q":"证券从业人员的登记类别包括（）。","c":{"A":"证券经纪人","B":"证券投资咨询","C":"保荐代表人","D":"一般证券业务"},"a":"A,B,C,D","an":"选项ABCD正确：从业人员应当符合从事证券业务的条件，并按照规定由所在证券公司按照规定向中国证券业协会登记。登记类别包括一般证券业务、证券经纪人、证券投资咨询（证券投资顾问)、证券投资咨询（证券分析师)、保荐代表人等。","type":"multi"},{"id":"cy_law_1609","q":"证券投资咨询人员主要包括（）。","c":{"A":"证券咨询顾问","B":"证券投资顾问","C":"证券评估师","D":"证券分析师"},"a":"B,D","an":"选项BD正确：证券投资咨询人员主要包括【证券投资顾问】及【证券分析师】两类。 选项AC为干扰项，教材未提及。","type":"multi"},{"id":"cy_law_1611","q":"甲为证券投资顾问，乙为证券分析师，丙为保荐代表人，丁为客户资产管理业务投资主办人，其中属于证券投资咨询执业人员的有 （  ）。","c":{"A":"甲","B":"乙","C":"丙","D":"丁"},"a":"A,B","an":"选项AB正确：证券投资咨询人员主要包括证券投资顾问人员及证券分析师两类。同一人员不得同时登记为证券分析师和证券投资顾问，证券投资咨询机构人员只能与一家证券经营机构签订劳动合同，不得以任何形式同时在两家或两家以上证券经营机构执业。 选项CD为干扰项，保荐代表人属于投资银行业务人员，客户资产管理业务投资主办人属于资产管理业务人员。","type":"multi"},{"id":"cy_law_1613","q":"某证券公司计划为以下新员工办理执业登记，登记类别选择正确的是（  ）。","c":{"A":"为从事前端客户招揽的小许登记为“证券经纪人”","B":"为从事投资建议和理财规划的小赵登记为“证券投资咨询(证券投资顾问)”","C":"为从事后台清算业务的小张登记为“一般证券业务”","D":"为从事证券研究报告撰写的小李登记为“证券投资咨询(证券分析师)”"},"a":"B,C,D","an":"选项BCD正确：从业人员应当符合从事证券业务的条件，并由所在证券公司按照规定向中国证券业协会进行登记。登记类别包括一般证券业务、证券经纪人、证券投资咨询(证券投资顾问)、证券投资咨询(证券分析师)、保荐代表人等。 选项A错误：证券经纪人是指接受证券公司的委托，代理其从事客户招揽和客户服务等活动的证券公司以外的自然人。小许是证券公司的新员工，而非外部委托人，因此应登记为“一般证券业务”。","type":"multi"},{"id":"cy_law_1615","q":"证券投资咨询人员主要包括证券投资顾问人员及证券分析师两类。同一人员可以同时登记为证券分析师和证券投资顾问。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资咨询人员主要包括证券投资顾问人员及证券分析师两类。同一人员【不得】同时登记为证券分析师和证券投资顾问。","type":"judge"},{"id":"cy_law_1617","q":"根据《证券法》，证券承销业务的种类不包括（  ）。","c":{"A":"自行销售","B":"代销","C":"全额包销","D":"余额包销"},"a":"A","an":"证券承销业务采取代销（B）或者包销方式，其中包销分为全额包销（C）和余额包销（D）。 综上，该题选A。","type":"single"},{"id":"cy_law_1619","q":"证券发行上市保荐业务中，保荐人出具有重大遗漏的保荐书，处罚措施中包括：责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券法》第一百八十二条的规定，保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款；没有业务收入或者业务收入不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销保荐业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"judge"},{"id":"cy_law_1621","q":"为加强对证券公司客户资产的保护，下列符合《证券公司监督管理条例》规定的是（）。","c":{"A":"证券公司可以将客户的交易结算资金放在指定的商业银行以外的金融机构","B":"为保护客户权益，证券公司的资产不应与客户资产相互独立","C":"证券公司可以将客户资产用于向他人提供融资或者担保","D":"在符合一定条件下的情况下，证券公司可以对客户交易结算资金进行单方面的处理"},"a":"D","an":"根据《证券公司监督管理条例》，具体分析如下： A项错误，证券公司从事证券经纪业务，其客户的交易结算资金应当存放在指定商业银行，以每个客户的名义单独立户管理。 B项错误，客户的交易结算资金、证券资产管理客户的委托资产属于客户，应当与证券公司、指定商业银行、资产托管机构的自有资产相互独立、分别管理。 C项错误，证券公司不得以证券经纪客户或者证券资产管理客户的资产向他人提供融资或者担保。 D项正确，证券公司可以在符合一定条件的情况下，对客户交易结算资金或者委托资金、客户担保账户内的证券或者资金等客户资产进行单方面的处理。","type":"single"},{"id":"cy_law_1623","q":"证券公司设立时，其业务范围应当与其财务状况相适应。下列说法正确的是（）。","c":{"A":"证券公司注册资本最低限额为人民币1000万元","B":"证券公司注册资本不得为非货币财产出资","C":"证券公司经营的业务不同，其注册资本最低限额可能不同","D":"证券公司的注册资本可以是认缴资本"},"a":"C","an":"A项错误，证券公司经营【证券经纪，证券投资咨询，与证券交易、证券投资活动有关的财务顾问业务】的，注册资本最低限额为人民币5000万元。                   证券公司经营【证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务之一】的，注册资本最低限额为人民币1亿元。                   证券公司经营【证券承销与保荐、证券融资融券、证券做市交易、证券自营、其他证券业务中两项以上】的，注册资本最低限额为人民币5亿元。 B项错误，证券公司的股东【应当用货币或者证券公司经营必需的非货币财产出资】。 D项错误，证券公司经营相关业务应当符合法律对注册资本最低限额的要求，国务院证券监督管理机构根据审慎监管原则和各项业务的风险程度，可以调整注册资本最低限额、但不得少于法律规定的限额。并且，证券公司的注册资本应当是【实缴资本】。","type":"single"},{"id":"cy_law_1625","q":"关于证券公司独立董事制度及相关内容，下列说法正确的有（）。 I 经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种以上业务的证券公司，应当建立独立董事制度 II 由同一人担任董事长、总经理的证券公司，其独立董事人数不得少于董事人数的1/5 III 独立董事与公司其他董事任期相同，可以连选连任，但是连任时间不得超过6年 IV 任何人员最多可以在5家证券公司担任独立董事","c":{"A":"III、IV","B":"I、III","C":"I. II","D":"I、II、III"},"a":"B","an":"I项正确，经营证券经纪业务、证券资产管理业务、融资融券业务和证券承销与保荐业务中两种以上业务的证券公司，应当建立独立董事制度。 II项错误，证券公司有下列情形之一的，独立董事人数不得少于董事人数的【1/4】： （1）董事长、经营管理的主要负责人由同一人担任； （2）内部董事人数占董事人数1/5以上； （3）中国证监会认定的其他情形。 III项正确，独立董事与公司其他董事任期相同，连任时间不得超过6年。 IV项错误，任何人员最多可以在【2家】证券公司担任独立董事。","type":"single"},{"id":"cy_law_1627","q":"证券公司只经营证券经纪业务的，其净资本不得低于人民币 5000 万元。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司经营证券经纪业务的，其净资本不得低于人民币2 000万元；经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5 000万元；经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元；经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元。","type":"judge"},{"id":"cy_law_1629","q":"证券投资咨询业务的基本形式包括（  ）。","c":{"A":"证券投资顾问","B":"委托理财","C":"发布证券研究报告","D":"销售基金"},"a":"A,C","an":"选项AC正确：证券投资顾问业务和发布证券研究报告是证券投资咨询业务的两种基本形式。 选项BD为干扰项，教材未提及。","type":"multi"},{"id":"cy_law_1631","q":"向投资者销售或者提供荐股软件并直接或间接获取经济利益的属于从事证券投资咨询业务，应当由证监会许可，符合证券投资咨询业务相关条件。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"根据《关于加强对利用“荐股软件”从事证券投资咨询业务监管的暂行规定》，向投资者销售或者提供“荐股软件”，并直接或间接获取经济利益的，属于证券投资咨询业务，应当经中国证监会许可，取得证券投资咨询业务资格。","type":"judge"},{"id":"cy_law_1633","q":"证券公司、证券投资咨询机构或者其他财务顾问机构受聘担任上市公司独立财务顾问的，应当保持独立性，不得与上市公司存在利害关系，存在下列（）情形的，不得担任独立财务顾问。","c":{"A":"上市公司与他人共同持有财务顾问的股份达到3%","B":"持有上市公司股份达到2%","C":"上市公司持有财务顾问的股份达到1%","D":"通过其他安排与他人共同持有上市公司股份达到5%"},"a":"D","an":"AC项，上市公司持有或者通过协议、其他安排与他人共同持有财务顾问的股份达到或者超过【5%】，或者选派代表担任财务顾问的董事不得担任独立财务顾问。 BD项，持有或者通过协议、其他安排与他人共同持有上市公司股份达到或者超过【5%】，或者选派代表担任上市公司董事不得担任独立财务顾问。","type":"single"},{"id":"cy_law_1635","q":"证券公司、证券投资咨询机构或者其他财务顾问机构担任上市公司独立财务顾问，在持续督导期间解除委托协议的，应当及时履行报告、公告程序。委托人应当在（）另行聘请财务顾问对其进行持续督导。","c":{"A":"20个工作日后","B":"20个工作日内","C":"1个月内","D":"3个月内"},"a":"C","an":"在持续督导期间，财务顾问解除委托协议的，应当及时向中国证监会派出机构做出书面报告，说明无法继续履行持续督导职责的理由，并予以公告。 委托人应当在【1个月内】另行聘请财务顾问对其进行持续督导。","type":"single"},{"id":"cy_law_1637","q":"证券公司、证券投资咨询机构和其他财务顾问机构有下列（）情形之一的，不得担任财务顾问。","c":{"A":"最近24个月内存在违反诚信的不良记录","B":"最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分","C":"最近36个月内因违法违规经营受到处罚","D":"因涉嫌违法违规经营正在被调查"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问： （1）最近24个月内存在违反诚信的不良记录（A）； （2）最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分（B）； （3）最近36个月内因违法违规经营受到处罚（C）或者因涉嫌违法违规经营正在被调查（D）。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_law_1639","q":"证券公司、证券投资咨询机构和其他财务顾问机构不得担任财务顾问的情形有（  ）。","c":{"A":"最近 24个月内存在违反诚信的不良记录","B":"最近24个月内因职业行为违反行业规范而受到行业自律组织的纪律处分","C":"最近 36个月内因违法违规经营受到处罚，或者因涉嫌违法违规经营正在被调查","D":"存在大额贷款未清偿，包括房贷"},"a":"A,B,C","an":"选项ABC正确：证券公司、证券投资咨询机构和其他财务顾问机构有下列情形之一的，不得担任财务顾问： （1）最近24个月内存在违反诚信的不良记录（A）；  （2）最近24个月内因执业行为违反行业规范而受到行业自律组织的纪律处分（B）；  （3）最近36个月内因违法违规经营受到处罚或者因涉嫌违法违规经营正在被调查（C）。 选项D错误：财务顾问主办人应当具备的条件之一为“未负有数额较大到期未清偿的债务”。 综上所述，本题选ABC。","type":"multi"},{"id":"cy_law_1641","q":"以下情形不属于证券公司开展证券经纪业务禁止行为的是（）。","c":{"A":"对客户买卖股票承诺收益","B":"接受客户全权委托代理其买卖证券","C":"为客户提供融资融券信用交易服务","D":"将证券营业部承包给他人经营"},"a":"C","an":"A项错误，证券公司【不得向客户违规承诺收益】或者承担损失。 B错误项，证券公司不得接受客户【全权】委托代理其买卖证券。 C项正确，融资融券业务，是指在证券交易所或者国务院批准的其他证券交易场所进行的证券交易中，证券公司向客户出借资金供其买入证券或者出借证券供其卖出，并由客户交存相应担保物的经营活动。 D项错误，证券公司应当对分支机构实行集中统一管理，不得与他人合资、合作经营管理分支机构，也【不得将分支机构承包、租赁或者委托给他人经营管理】。","type":"single"},{"id":"cy_law_1643","q":"关于证券金融公司开展转融通业务的证券来源，说法正确的有（  ）。","c":{"A":"证券金融公司自有证券","B":"证券金融公司通过证券交易所的业务平台融入的证券","C":"证券金融公司通过转融通担保证券账户持有的证券","D":"证券金融公司直接使用证券公司客户的证券"},"a":"A,B","an":"选项AB正确：证券金融公司开展转融通业务，可以使用下列资金和证券： 第一，自有资金和证券； 第二，通过证券交易所的业务平台融入的资金和证券； 第三，通过证券金融公司的业务平台融入的资金； 第四，依法筹集的其他资金和证券。 选项C错误：转融通担保证券账户是证券金融公司为管理通过转融通业务借出的证券而设立的专用账户。这些证券并非证券金融公司可以自由支配或用于其他融资活动的资产，而是被特定用途（即作为融资融券的担保）所限制的。 选项D错误：证券金融公司无权直接使用客户证券。","type":"multi"},{"id":"cy_law_1645","q":"下列属于证券公司开展自营业务应遵循的法律法规、自律规则的有（）。 I 《证券公司监督管理条例》 II 《公司债券承销业务规范》 III 《证券公司证券自营业务指引》 Ⅳ 《证券公司融资融券业务管理办法》","c":{"A":"Ⅰ、Ⅲ","B":"Ⅰ、Ⅱ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅲ、Ⅳ"},"a":"A","an":"Ⅰ、Ⅲ项，证券公司证券自营业务涉及《证券法》【《证券公司监督管理条例》】《证券公司风险控制指标管理办法》《证券公司风险控制指标计算标准规定》《证券公司内部控制指引》【《证券公司证券自营业务指引》】《关于证券公司证券自营业务投资范围及有关事项的规定》《关于规范债券市场参与者债券交易业务的通知》《关于进一步加强证券基金经营机构债券交易监管的通知》等。 Ⅱ、Ⅳ项分别是证券公司债券承销业务和融资融券业务的规定。","type":"single"},{"id":"cy_law_1647","q":"证券公司从事证券自营业务的自营清算岗位（）。","c":{"A":"应当与资产管理业务清算岗位分离","B":"不需要与资产管理业务清算岗位分离","C":"应当与经纪业务清算岗位分离","D":"不需要与经纪业务清算岗位分离"},"a":"A,C","an":"对自营资金执行独立清算制度，自营清算岗位应当与经纪业务、资产管理业务及其他业务的清算岗位分离。 综上，该题选AC，选项BD错误。","type":"multi"},{"id":"cy_law_1649","q":"下列关于证券公司柜台市场业务的说法，错误的有（）。 I 证券公司柜台交易，是指证券公司与特定交易对手方在集中交易场所进行交易或为投资者在集中交易场所进行交易提供服务的行为 II 证券公司与特定交易对手方进行柜台交易，应取得证券经纪业务资格 III 证券公司开展柜台市场业务应遵循诚实信用、 公平自愿的原则 IV 证券公司开展柜台市场业务，应遵守中国证监会制定的《证券公司柜台交易业务规范》《证券公司柜台市场管理办法(试行)》等相关法律法规","c":{"A":"I、II、III、IV","B":"I、III","C":"III、IV","D":"I、II、IV"},"a":"D","an":"证券公司柜台交易，是指证券公司与特定交易对手方【在集中交易场所之外】（I项错误）进行的交易或为投资者在集中交易场所之外进行交易提供服务的行为。  根据【中国证券业协会】（IV项错误）《证券公司柜台交易业务规范》《证券公司柜台市场管理办法(试行)》，证券公司开展柜台市场业务，应当遵守以下要求： 1.具备从业资格：证券公司进行柜台交易，应当具备中国证监会批准的与所开展业务相适应的资格条件，即证券公司为投资者交易提供服务的，应经中国证监会批准可从事证券经纪业务；证券公司与特定交易对手方进行柜台交易的，应经中国证监会批准可从事【证券自营业务】（II项错误）。 2.遵守法律法规，遵循诚实信用、公平自愿原则。证券公司在柜台市场开展业务，应当遵守有关法律法规，遵循诚实信用、公平自愿的原则，不得欺诈、误导投资者，不得侵害投资者合法权益，不得挪用客户资产，不得利用非公开信息谋取不正当利益。","type":"single"},{"id":"cy_law_1651","q":"证券公司与特定交易对手方进行柜台交易，应经中国证监会批准可从事（）。","c":{"A":"证券承销与保荐业务","B":"客户资产管理业务","C":"证券经纪业务","D":"证券自营业务"},"a":"D","an":"证券公司【与特定交易对手方进行柜台交易】的，应经中国证监会批准可从事证券【自营业务】。 注意：证券公司进行柜台交易，应当具备中国证监会批准的与所开展业务相适应的资格条件，即证券公司为投资者交易提供服务的，应经中国证监会批准可从事证券经纪业务。 故本题选D，选项ABC为干扰项。","type":"single"},{"id":"cy_law_1653","q":"根据《证券经营机构及其工作人员廉洁从业实施细则》，下列关于证券经营机构工作人员廉洁从业禁止性行为的说法，正确的是（）。 I 在开展自营业务过程中，不得利用他人提供或者主动获取的内幕信息，未公开信息等从事或者明示、暗示他人从事相关交易活动 II 在开展另类投资业务过程中，不得以明显偏离市场公允价值的价格进行交易 III 在开展资产管理业务过程中，不得不公平对待不同投资组合，在不同账户之间输送利益 IV 在开展融资类业务过程中，不得为客户违规使用融出资金、规避信息披露义务、违规减持等违规行为提供便利","c":{"A":"II、III、IV","B":"I、II","C":"I、II、III、","D":"I、II、III、IV"},"a":"D","an":"证券经营机构及其工作人员在开展自营业务、资产管理业务、另类投资业务或者提供有关服务的过程中，不得通过以下方式输送或者谋取不正当利益： (1)利用他人提供或者主动获取的内幕信息、未公开信息等从事或者明示、暗示他人从事相关交易活动；（I项正确） (2)侵占或者挪用受托资产； (3)不公平对待不同投资组合，在不同账户之间输送利益；（III项正确）  (4)以明显偏离市场公允估值的价格进行交易；（II项正确） (5)编造、传播虚假不实信息，或者利用信息优势、资金优势、持股持券优势，单独或者通过合谋，影响证券、期货及其他衍生品交易价格、交易量； (6)以获取佣金或者其他利益为目的，用客户资产进行不必要的证券交易； (7)让渡资产管理账户实际投资决策权限； (8)代表投资组合对外行使投票表决权的过程中，不按照客观独立的专业判断投票； (9)其他输送或者谋取不正当利益的行为。 证券经营机构及其工作人员在融资融券、股票质押式回购交易等融资类业务开展过程中，不得通过以下方式输送或者谋取不正当利益： (1)违规为客户提升授信额度，或者在融资资金、融券券源有限的情况下，违反公司相关制度私自决定钱券分配； (2)向特定客户以明显低于公司资金成本或者同期市场资金价格的利率提供融资，或者违反公司规定设置较宽
