var state = {};
var selected = {};
var currentCh = 0;

function init() {
  // 初始化state
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    state[i] = { done: false, correct: false, answers: [] };
  }
  // 恢复上次的章节
  var saved = localStorage.getItem('sec_ch_current_' + SUBJECT);
  if (saved !== null) currentCh = parseInt(saved, 10) || 0;
  render();
}

// ====== 升级：渲染章节卡片列表 ======
function renderChapterList() {
  var list = document.getElementById('chList');
  var html = '';
  for (var i = 0; i < CHAPTER_INFO.length; i++) {
    var ch = CHAPTER_INFO[i];
    var active = i === currentCh ? ' active' : '';
    var sections = SECTION_DATA[i] || [];
    var ch_color = ch.color;
    html += '<div class="ch-card' + active + '" id="chCard-' + i + '">';
    html += '<div class="ch-hd" onclick="toggleChapter(' + i + ')">';
    html += '<span class="ch-name">' + chapterName(i) + '</span>';
    html += '<span class="ch-star">' + ch.star_display + '</span>';
    html += '<span class="ch-count">' + ch.count + '题</span>';
    html += '<span class="ch-arrow' + (i === currentCh ? ' open' : '') + '">▼</span>';
    html += '</div>';
    // Weight bar
    var w = parseFloat(ch.weight) || 8;
    html += '<div class="ch-bar"><div class="ch-bar-fill" style="width:' + Math.min(w, 50) + '%;background:' + ch_color + '"></div></div>';
    html += '<div class="ch-desc">' + (ch.desc || '') + '</div>';
    // Sections
    html += '<div class="ch-body" id="chBody-' + i + '"' + (i === currentCh ? ' style="display:block"' : '') + '>';
    for (var j = 0; j < sections.length; j++) {
      var sec = sections[j];
      var selClass = (currentCh === i && currentSection === j) ? ' sel' : '';
      var hotClass = ch.star >= 4 ? ' hot' : '';
      html += '<div class="sec-item' + selClass + hotClass + '" onclick="filterToSection(' + i + ',' + j + ')">';
      html += '<span class="sec-name">第' + sectionOrdinal(j) + '节 ' + sec[0] + '</span>';
      html += '<span class="sec-count">~' + sec[1] + '题</span>';
      if (ch.star >= 4 && j < 2) html += '<span class="sec-badge">🔥</span>';
      html += '</div>';
    }
    html += '<div class="ch-all-link" onclick="filterToSection(' + i + ',-1)">📖 全部题目</div>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function chapterName(idx) {
  var ch = CHAPTER_INFO[idx];
  return '第' + (idx+1) + '章 ' + ch.name;
}

function sectionOrdinal(j) {
  var names = ['一','二','三','四','五','六','七','八','九','十'];
  return names[j] || (j+1);
}

function toggleChapter(idx) {
  var body = document.getElementById('chBody-' + idx);
  var arrow = document.querySelector('#chCard-' + idx + ' .ch-arrow');
  var isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

function filterToSection(chIdx, secIdx) {
  currentCh = chIdx;
  currentSection = secIdx;
  localStorage.setItem('sec_ch_current_' + SUBJECT, currentCh);
  
  // Update UI
  var cards = document.querySelectorAll('.ch-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('active', i === chIdx);
    var body = document.getElementById('chBody-' + i);
    if (body) body.style.display = (i === chIdx) ? 'block' : 'none';
    var arr = cards[i].querySelector('.ch-arrow');
    if (arr) arr.classList.toggle('open', i === chIdx);
  }
  
  // Update section selection
  var allSecs = document.querySelectorAll('.sec-item');
  for (var i = 0; i < allSecs.length; i++) allSecs[i].classList.remove('sel');
  if (secIdx >= 0) {
    var items = document.querySelectorAll('#chBody-' + chIdx + ' .sec-item');
    if (items[secIdx]) items[secIdx].classList.add('sel');
  }
  
  // Show/hide filter info
  var fi = document.getElementById('secFilterInfo');
  if (secIdx >= 0) {
    fi.style.display = 'flex';
    var secName = SECTION_DATA[chIdx] && SECTION_DATA[chIdx][secIdx] ? SECTION_DATA[chIdx][secIdx][0] : '';
    document.getElementById('secFilterText').textContent = '📌 当前筛选：' + CHAPTER_INFO[chIdx].name + ' → 第' + sectionOrdinal(secIdx) + '节 ' + secName;
  } else {
    fi.style.display = 'none';
  }
  
  selected = {};
  render();
}

function clearSectionFilter() {
  filterToSection(currentCh, -1);
}

// ====== 保留原渲染逻辑，加入节筛选 ======
function getChapterQuestions(chIdx) {
  var ch = CH_MAP[chIdx];
  var qs = [];
  for (var i = ch.start; i < ch.start + ch.count; i++) {
    if (currentSection >= 0 && Q_SECTION[i] !== currentSection) continue;
    qs.push({ idx: i, q: ALL_QUESTIONS[i] });
  }
  return qs;
}

function render() {
  renderChapterList();
  renderChInfo();
  renderQuestions();
  renderStats();
}

function renderChInfo() {
  var ch = CHAPTER_INFO[currentCh];
  if (!ch) return;
  // Update stats bar
  document.getElementById('totalQ').textContent = ch.count;
}

function renderStats() {
  var ch = CH_MAP[currentCh];
  if (!ch) return;
  // Count only filtered questions for stats
  var qs = getChapterQuestions(currentCh);
  var done = 0, correct = 0;
  for (var i = 0; i < qs.length; i++) {
    var st = state[qs[i].idx];
    if (st.done) { done++; if (st.correct) correct++; }
  }
  var pct = done > 0 ? Math.round(correct/done*100) : 0;
  var totalFiltered = qs.length;
  var allPct = totalFiltered > 0 ? Math.round(done/totalFiltered*100) : 0;
  
  document.getElementById('doneQ').textContent = done;
  document.getElementById('accQ').textContent = pct + '%';
}

function renderQuestions() {
  var container = document.getElementById('qContainer');
  var qs = getChapterQuestions(currentCh);
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty"><div style="font-size:3rem;margin-bottom:0.5rem">📝</div><div>暂无题目' + (currentSection >= 0 ? '（该节暂无题目）' : '') + '</div></div>';
    return;
  }
  
  var num = 0, prevMaterial = '';
  var html = '';
  
  for (var qi = 0; qi < qs.length; qi++) {
    var item = qs[qi], idx = item.idx, q = item.q, st = state[idx];
    if (q.type !== 'comprehensive' || q.material !== prevMaterial) num++;
    prevMaterial = q.material || '';
    
    var typeLabel = q.type === 'comprehensive' ? '综合' : (TYPE_LABEL[q.type] || q.type);
    var typeClass = q.type === 'comprehensive' ? 'type-c' : (TYPE_CLASS[q.type] || 'type-s');
    
    html += '<div class="qcard" id="qc-' + idx + '">';
    if (q.type === 'comprehensive' && q.material) {
      html += '<div class="material-box"><div class="mat-label">📋 材料分析</div>' + q.material + '</div>';
    }
    html += '<div class="q-header"><div class="q-num">第' + num + '题</div><span class="q-type ' + typeClass + '">' + typeLabel + '</span></div>';
    html += '<div class="q-text">' + q.q + '</div>';
    
    var optKeys = Object.keys(q.c);
    html += '<div class="options" id="opts-' + idx + '">';
    for (var oi = 0; oi < optKeys.length; oi++) {
      var k = optKeys[oi];
      var sel = selected[idx] && selected[idx].indexOf(k) >= 0 ? 'selected' : '';
      html += '<div class="opt ' + sel + '" data-q="' + idx + '" data-key="' + k + '" onclick="toggleOpt(' + idx + ',\'' + k + '\')">';
      html += '<span class="ol">' + k + '.</span><span>' + q.c[k] + '</span></div>';
    }
    html += '</div>';
    
    var doneStyle = st.done ? ' style="display:none"' : '';
    var showAn = !st.done ? ' style="display:none"' : '';
    html += '<div class="actions">';
    html += '<button class="btn btn-primary" onclick="checkAnswer(' + idx + ')"' + doneStyle + '>✅ 确认答案</button>';
    html += '<button class="btn btn-secondary" onclick="resetQuestion(' + idx + ')"' + showAn + '>🔄 重做</button>';
    html += '</div>';
    
    var anText = q.an || '暂无解析';
    html += '<div class="analysis" id="an-' + idx + '"' + showAn + '>';
    html += '<div class="a-label">📖 解析</div>';
    if (st.done) {
      var ansStr = Array.isArray(st.answers) ? st.answers.join(', ') : '';
      var isCorrect = st.correct;
      html += '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
           + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
           + ' · 正确答案：' + esc(q.a);
      if (!isCorrect && ansStr) html += ' · 你的答案：' + esc(ansStr);
      html += '</div>';
    }
    html += '<div class="a-text">' + anText + '</div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

// ====== 保留原交互函数 ======
function toggleOpt(idx, key) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  if (!selected[idx]) selected[idx] = [];
  var arr = selected[idx];
  var pos = arr.indexOf(key);
  var isSingle = (q.type === 'comprehensive' && q.sub_type === 'single') || q.type === 'single' || q.type === 'judge';
  
  if (isSingle) {
    selected[idx] = [key];
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.remove('selected');
      if (opts[i].dataset.key === key) opts[i].classList.add('selected');
    }
  } else {
    if (pos >= 0) arr.splice(pos, 1); else arr.push(key);
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      var k = opts[i].dataset.key;
      opts[i].classList.toggle('selected', selected[idx].indexOf(k) >= 0);
    }
  }
}

function checkAnswer(idx) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  var sel = selected[idx] || [];
  if (sel.length === 0) return;
  var correctAns = q.a;
  var userAns = sel.sort().join('');
  var isCorrect = userAns === correctAns;
  
  state[idx] = { done: true, correct: isCorrect, answers: sel.slice() };
  saveState();
  
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) {
    var k = opts[i].dataset.key;
    opts[i].classList.remove('selected');
    if (correctAns.indexOf(k) >= 0) opts[i].classList.add('correct');
    else if (sel.indexOf(k) >= 0) opts[i].classList.add('wrong');
  }
  
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = 'none';
  var an = document.getElementById('an-' + idx);
  var ansStr = sel.join(', ');
  an.style.display = 'block';
  an.innerHTML = '<div class="a-label">📖 解析</div>'
    + '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
    + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
    + ' · 正确答案：' + esc(correctAns)
    + (!isCorrect ? ' · 你的答案：' + esc(ansStr) : '')
    + '</div><div class="a-text">' + (q.an || '暂无解析') + '</div>';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = '';
  renderStats();
}

function resetQuestion(idx) {
  state[idx] = { done: false, correct: false, answers: [] };
  selected[idx] = [];
  saveState();
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('correct', 'wrong', 'selected');
  document.getElementById('an-' + idx).style.display = 'none';
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = '';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = 'none';
  renderStats();
}

function switchCh(idx) { currentCh = idx; currentSection = -1; selected = {}; render(); }

var TYPE_LABEL = { single:'单选', multi:'多选', judge:'判断', comprehensive:'综合' };
var TYPE_CLASS = { single:'type-s', multi:'type-m', judge:'type-j', comprehensive:'type-c' };
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ====== 持久化 ======
function saveState() {
  var obj = {};
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    if (state[i].done) obj[i] = state[i];
  }
  try { localStorage.setItem('sec_exam_ch_state_' + SUBJECT, JSON.stringify(obj)); } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem('sec_exam_ch_state_' + SUBJECT);
    if (raw) {
      var obj = JSON.parse(raw);
      for (var k in obj) {
        if (obj.hasOwnProperty(k) && state[k]) state[k] = obj[k];
      }
    }
  } catch(e) {}
}

loadState();
init();
</script>
