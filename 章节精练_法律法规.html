<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>证券从业 · 章节精练 · 法律法规</title>
<style>
:root {
  --bg: #f5efe6; --card: #faf6f0; --card-alt: #f0e8db;
  --border: #d4c9b8; --border-light: #e8dfd0;
  --text: #3d3229; --text-dim: #8a7e6f; --text-light: #b8a99a;
  --blue: #1e5b8a; --blue-light: #4a8bc2; --blue-dim: #7ba3c7;
  --blue-bg: rgba(30,91,138,0.06);
  --red: #c23b22; --red-light: #d4735e; --red-bg: rgba(194,59,34,0.08);
  --green: #3d7246; --green-light: #5c9a66; --green-bg: rgba(61,114,70,0.08);
  --gold: #c9a96e; --gold-light: #e8dbaa;
  --shadow: rgba(61,50,41,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; padding:0.6rem; min-height:100vh; }
.container { max-width:860px; margin:0 auto; }
.hd { text-align:center; padding:1rem 0.5rem 0.6rem; margin-bottom:0.5rem; position:relative; }
.hd::after { content:''; display:block; width:50px; height:3px; background:linear-gradient(90deg,var(--blue),var(--gold)); margin:0.5rem auto 0; border-radius:2px; }
.hd h1 { font-size:1.2rem; font-weight:800; color:var(--blue); letter-spacing:1px; }
.hd .sub { color:var(--text-dim); font-size:0.75rem; margin-top:0.2rem; }
.legend-bar { display:flex; justify-content:center; gap:0.5rem 1.2rem; flex-wrap:wrap; padding:0.4rem 0.6rem; margin:0 0 0.5rem; font-size:0.72rem; background:var(--card); border-radius:8px; border:1px solid var(--border-light); }
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-item .star { color:var(--gold); font-size:0.8rem; letter-spacing:-1px; }
.legend-item .lbl { color:var(--text-dim); }
/* Section View */
.section-view { display:block; }
.section-view.hidden { display:none; }
.q-view { display:none; }
.q-view.show { display:block; }
.ch-card { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:0.5rem; overflow:hidden; }
.ch-head { display:flex; justify-content:space-between; align-items:center; padding:0.7rem 0.8rem; cursor:pointer; user-select:none; background:linear-gradient(135deg,var(--card),var(--card-alt)); }
.ch-head:active { background:var(--card-alt); }
.ch-head .name { font-weight:700; font-size:0.9rem; color:var(--blue); }
.ch-head .meta { font-size:0.72rem; color:var(--text-dim); }
.ch-head .arrow { transition:transform 0.2s; font-size:0.7rem; color:var(--text-light); }
.ch-head.exp .arrow { transform:rotate(180deg); }
.sec-list { display:none; padding:0.2rem 0.8rem 0.6rem; }
.sec-list.show { display:block; }
.sec-item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0.6rem; margin:0.2rem 0; border-radius:6px; cursor:pointer; border:1px solid transparent; }
.sec-item:active { background:var(--blue-bg); border-color:var(--blue-dim); }
.sec-item .sname { font-size:0.82rem; color:var(--text); }
.sec-item .scount { font-size:0.72rem; color:var(--text-dim); background:var(--card-alt); padding:0.1rem 0.5rem; border-radius:10px; font-weight:600; }
.sec-item .sbar { flex:1; height:4px; background:var(--border-light); border-radius:2px; margin:0 0.6rem; overflow:hidden; }
.sec-item .sbar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--blue),var(--blue-light)); }
/* Question View */
.ch-nav { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin:0.4rem 0 0.6rem; }
.ch-btn { padding:0.35rem 0.5rem; border-radius:8px; font-size:0.72rem; font-weight:600; border:1.5px solid var(--border); cursor:pointer; background:var(--card); color:var(--text-dim); white-space:nowrap; text-align:center; }
.ch-btn.on { background:var(--blue); color:#fff; border-color:var(--blue); }
.ch-btn .ch-title { display:block; }
.ch-btn .ch-meta { display:block; font-weight:400; font-size:0.6rem; opacity:0.8; }
.stats { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0.8rem; background:var(--card); border-radius:8px; margin-bottom:0.6rem; border:1px solid var(--border-light); font-size:0.78rem; }
.stats .pct { color:var(--blue); font-weight:700; font-size:0.9rem; }
.progress-bar { height:4px; background:var(--border-light); border-radius:2px; margin:0.4rem 0 0.8rem; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--blue-light)); border-radius:2px; transition:width 0.4s ease; }
.back-btn { display:inline-flex; align-items:center; gap:4px; padding:0.3rem 0.7rem; border-radius:6px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); cursor:pointer; background:var(--card); color:var(--blue); margin-bottom:0.4rem; }
.q-wrap { margin-bottom:1rem; padding:0.6rem; background:var(--card); border:1px solid var(--border-light); border-radius:8px; }
.q-head { display:flex; align-items:center; gap:6px; margin-bottom:0.4rem; }
.q-num { font-weight:700; font-size:0.85rem; color:var(--blue); min-width:24px; }
.q-tag { font-size:0.65rem; padding:0.05rem 0.4rem; border-radius:4px; background:var(--card-alt); color:var(--text-dim); }
.q-text { font-size:0.88rem; margin-bottom:0.5rem; line-height:1.8; }
.opt { display:flex; align-items:flex-start; gap:6px; padding:0.4rem 0.5rem; margin:0.15rem 0; border-radius:6px; border:1px solid var(--border-light); cursor:pointer; background:var(--bg); font-size:0.82rem; line-height:1.6; }
.opt.selected { border-color:var(--blue); background:var(--blue-bg); }
.opt.correct { border-color:var(--green); background:var(--green-bg); }
.opt.wrong { border-color:var(--red); background:var(--red-bg); }
.opt.disabled { opacity:0.7; pointer-events:none; }
.okey { font-weight:700; color:var(--blue); min-width:20px; }
.oval { flex:1; }
.ans-box { padding:0.5rem; border-radius:6px; margin-top:0.4rem; font-size:0.8rem; line-height:1.6; }
.ans-box.correct { background:var(--green-bg); border:1px solid var(--green); color:var(--green); }
.ans-box.wrong { background:var(--red-bg); border:1px solid var(--red); color:var(--red); }
.ans-box .a-text { color:var(--text); margin-top:0.3rem; }
.action-row { display:flex; gap:6px; margin-top:0.5rem; }
.action-row button { padding:0.35rem 0.8rem; border-radius:6px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); cursor:pointer; }
.btn-check { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-reset { background:var(--card); color:var(--text-dim); }
@media (max-width:480px) { .ch-head { padding:0.6rem; } .sec-item { padding:0.4rem; } }
</style>
</head>

var ALL_QUESTIONS = [{"id": "gw_0_1", "q": "根据《合伙企业法》，下列关于有限合伙企业事务执行的说法，错误的是（）。", "c": {"A": "执行事务合伙人可以要求在合伙协议中确定执行事务的报酬及报酬提取方式", "B": "有限合伙企业由普通合伙人执行合伙事务", "C": "有限合伙人参与选择承办有限合伙企业审计业务的会计师事务所，视为执行合伙事务", "D": "有限合伙人不执行合伙事务，不得对外代表有限合伙企业"}, "a": "C", "an": "有限合伙人不执行合伙事务，不得对外代表有限合伙企业。有限合伙人的下列行为，不视为执行合伙事务：参与决定普通合伙人入伙、退伙；对企业的经营管理提出建议；参与选择承办有限合伙企业审计业务的会计师事务所；获取经审计的有限合伙企业财务会计报告；对涉及自身利益的情况，查阅有限合伙企业财务会计账簿等财务资料；在有限合伙企业中的利益受到侵害时，向有责任的合伙人主张权利或者提起诉讼；执行事务合伙人怠于行使权利时，督促其行使权利或者为了本企业的利益以自己的名义提起诉讼；依法为本企业提供担保。", "type": "s"}, {"id": "gw_0_2", "q": "根据《证券公司风险处置条例》，下列关于证券公司被接管的说法，错误的是（）。", "c": {"A": "国务院证券监督管理机构决定对证券公司进行接管的，被接管证券公司股东会或者股东大会、董事会、监事会以及经理、副经理停止履行职责", "B": "证券公司治理混乱、管理失控，情节严重的，国务院证券监督管理机构可以对该证券公司进行接管", "C": "行政接管是监管部门对经营存在严重问题的证券公司介入，全面接收和管理其债权债务和业务经营，防止其经营风险进一步恶化的行政强制措施", "D": "接管期限届满，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过6个月"}, "a": "D", "an": "接管期限一般不超过12个月。满12个月，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过12个月。", "type": "s"}, {"id": "gw_0_3", "q": "根据《中华人民共和国证券法》，下列关于禁止虚假陈述、信息误导行为的说法，错误的是（）。", "c": {"A": "禁止证券交易场所、证券公司、证券登记结算机构、证券服务机构及从业人员，在证券交易活动中作出虚假陈述或者信息误导", "B": "禁止任何单位和个人编造、传播虚假信息或者误导性信息，扰乱证券市场", "C": "为防止信息误导，从事证券市场报道的记者不得买卖证券", "D": "编造、传播虚假信息或者误导性信息，扰乱证券市场，给投资者造成损失的，应当依法承担赔偿责任"}, "a": "C", "an": "禁止证券交易场所、证券公司、证券登记结算机构、证券服务机构及其从业人员，证券业协会、证券监督管理机构及其工作人员，在证券交易活动中作出虚假陈述或者信息误导。各种传播媒介传播证券市场信息必须真实、客观，禁止误导。传播媒介及其从事证券市场信息报道的工作人员不得从事与其工作职责发生利益冲突的证券买卖。编造、传播虚假信息或者误导性信息，扰乱证券市场，给投资者造成损失的，应当依法承担赔偿责任。", "type": "s"}, {"id": "gw_0_4", "q": "设立管理公开募集基金的基金管理公司，注册资本不低于法定要求，且资本金可以认缴出资。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据《证券投资基金法》第十三条的规定，设立管理公开募集基金的基金管理公司，应当具备的条件之一：注册资本不低于1亿元人民币，且必须为实缴货币资本。", "type": "j"}, {"id": "gw_0_5", "q": "根据《证券公司监督管理条例》，证券公司未按照规定与客户签订业务合同，中国证监会可以采取的措施是（）。", "c": {"A": "责令定期报告", "B": "责令公开说明", "C": "责令改正", "D": "出具警示函"}, "a": "C", "an": "根据《证券公司监督管理条例》规定，证券公司未指定专人向客户讲解有关业务规则和合同内容，并以书面方式向其揭示投资风险或未按照规定与客户签订业务合同，或者未在与客户签订的业务合同中载入规定的必备条款的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。", "type": "s"}, {"id": "gw_0_6", "q": "下列选项中，不属于基金管理人职责的是（）。", "c": {"A": "对基金份额持有人大会审议事项行使表决权", "B": "进行基金会计核算并编制基金财务会计报告", "C": "保存基金财产管理业务活动的记录、账册、报表和其他相关资料", "D": "按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益"}, "a": "A", "an": "公开募集基金的基金管理人应当履行下列职责：（一）依法募集资金，办理基金份额的发售和登记事宜；（二）办理基金备案手续；（三）对所管理的不同基金财产分别管理、分别记账，进行证券投资；（四）按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益；（五）进行基金会计核算并编制基金财务会计报告；（六）编制中期和年度基金报告；（七）计算并公告基金资产净值，确定基金份额申购、赎回价格；（八）办理与基金财产管理业务活动有关的信息披露事项；（九）按照规定召集基金份额持有人大会；（十）保存基金财产管理业务活动的记录、账册、报表和其他相关资料；（十一）以基金管理人名义，代表基金份额持有人利益行使诉讼权利或者实施其他法律行为。", "type": "s"}, {"id": "gw_0_7", "q": "根据《期货交易管理条例》，有下列情形之一，自被解除职务或被撤销资格之日起未逾5年，则不得担任期货交易所的负责人、财务会计的人员包括（）。", "c": {"A": "因违法行为或者违纪行为被撤销资格的律师", "B": "因违法行为或者违纪行为被撤销资格的资产评估机构的专业人员", "C": "因违法行为或者违纪行为被解除职务的期货交易所的负责人", "D": "因违法行为或者违纪行为被解除职务的证券公司董事"}, "a": "ABCD", "an": "有下列情形之一的人员不得担任期货交易所的负责人、财务会计人员：①因违法行为或者违纪行为被解除职务的期货交易所、证券交易所、证券登记结算机构的负责人，或者期货公司、证券公司的董事、监事、高级管理人员，以及国务院期货监督管理机构规定的其他人员，自被解除职务之日起未逾5年。②因违法行为或者违纪行为被撤销资格的律师、注册会计师或者投资咨询机构、财务顾问机构、资信评级机构、资产评估机构、验证机构的专业人员，自被撤销资格之日起未逾5年。", "type": "m"}, {"id": "gw_0_8", "q": "要约收购人甲公司拟要约收购上市公司乙股份，根据上市公司乙披露的“要约收购报告书”，甲公司发出要约收购前持有乙公司15万股股份，约占乙公司总股本的28%。本次为甲公司向除甲公司以外的乙公司全体股东发出的部分要约收购，要约价格为21元/股，要约收购股份数量为12000股，要约收购期限为30个自然日。根据该案例，回答以下问题：（1）根据《证券法》，下列关于上市公司收购的说法，正确的有（）。", "c": {"A": "在收购要约确定的承诺期限内，收购人可以撤销其收购要约", "B": "甲公司可以采取要约收购、协议收购及其他合法方式收购上市公司乙", "C": "收购要约提出的各项收购条件，适用于被收购公司的所有股东", "D": "上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件"}, "a": "BCD", "an": "在收购要约确定的承诺期限内，收购人不得撤销其收购要约。", "type": "m"}, {"id": "gw_0_9", "q": "某非上市证券公司通过中国证券业协会网站公开披露上一年度的审计报告、经审计的财务报表及附注。根据该案例，回答以下问题：（1）根据公司经营原则，该证券公司属于（）。", "c": {"A": "遵守社会公德", "B": "承担社会责任", "C": "遵守法律、行政法规", "D": "接受社会公众的监督"}, "a": "CD", "an": "略。", "type": "m"}, {"id": "gw_0_10", "q": "下列关于股份有限公司发起人向社会公开募集股份的说法，不正确的有（）。", "c": {"A": "认股人应按照所认购股数缴纳股款", "B": "招股说明书应当附有发起人制定的公司章程", "C": "发起人向社会公开募集股份，必须公告招股说明书，并制作认股书", "D": "认股书上认购股数、金额、住所等内容由发起人填写，认股人签名、盖章"}, "a": "D", "an": "认股书上认购股数、金额、住所等内容由【认股人】填写，认股人签名、盖章。B错误。", "type": "s"}, {"id": "gw_0_11", "q": "2019年12月4日，因行情波动，交易者赵某账号持仓的X手的某商品期货合约出现涨停，行情走势与赵某的该期货合约持仓方向相反。当日结算显示赵某的账户风险率已经高于交易所规定的风险率，赵某账户的保证金已经低于交易所规定的保证金标准。A期货公司要求赵某在下一交易日开盘前追加保证金。甲某要求期货公司允许其透支交易，并许诺资金到位立即追加保证金，公司予以拒绝。第二天交易开始后赵某没有及时追加保证金。根据该案例，回答以下问题：（1）期货公司应（）。", "c": {"A": "劝说赵某自行平仓", "B": "对赵某持有的头寸进行强行平仓", "C": "有权就其未平仓的头寸强行平仓", "D": "允许赵某继续持仓"}, "a": "C", "an": "交易者的保证金不符合结算参与人与交易者约定标准的，结算参与人应当按照约定通知交易者在约定时间内追加保证金或者自行平仓；交易者未在约定时间内追加保证金或者自行平仓的，按照约定强行平仓。", "type": "m"}, {"id": "gw_0_12", "q": "下列有关有限责任公司的说法中，错误的是（）。", "c": {"A": "执行董事的职权由公司章程规定", "B": "股东人数较少或者规模较小的有限责任公司，可以不设董事会", "C": "执行董事不得兼任公司经理", "D": "有限责任公司董事会成员为3人至13人"}, "a": "C", "an": "有限责任公司中，执行董事是可以兼任公司经理，选项A错误。", "type": "s"}, {"id": "cflue_zc_fl1a.json_1", "q": "下列关于公司税后利润分配的顺序，正确的是（）。", "c": {"A": "提取法定公积金、弥补公司以前年度亏损、提取任意公积金、向股东分配股利", "B": "弥补公司以前年度亏损、向股东分配股利、提取法定公积金、提取任意公积金", "C": "提取法定公积金、提取任意公积金、弥补公司以前年度亏损、向股东分配股利", "D": "弥补公司以前年度亏损、提取法定公积金、提取任意公积金、向股东分配股利"}, "a": "D", "an": "根据我国《公司法》的规定，公司税后利润分配的顺序是：（1）弥补亏损；（2）提取法定盈余公积金；（3）提取任意盈余公积金；（4）支付普通股股利（分配利润）。", "type": "single"}, {"id": "cflue_zc_fl1a.json_2", "q": "下列关于普通合伙企业与有限合伙企业主要区别的说法，正确的有（）。", "c": {"A": "利润分配方面不同", "B": "合伙人拥有的权利方面不同", "C": "合伙人对企业债务的责任方面不同", "D": "关联交易方面不同"}, "a": "ABCD", "an": "普通合伙企业和有限合伙企业的主要区别：1、合伙人对企业债务的责任方面；2、合伙人数量方面；3、合伙人权利方面；4、利润分配方面；5、竞业禁止方面；6、关联交易方面；7、出资份额出质方面", "type": "multi"}, {"id": "cflue_zc_fl1a.json_3", "q": "我国《证券法》规定的证券种类的品种有包括股票、公司债券、存托凭证、汇票。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用证券法", "type": "judge"}, {"id": "cflue_zc_fl1a.json_4", "q": "下列关于《证券法》的适用范围的说法，错误的是（）。", "c": {"A": "政府债券、证券投资基金份额的上市交易", "B": "在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易", "C": "在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照境外相关规定处理并追究责任", "D": "资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定"}, "a": "C", "an": "《证券法》的适用范围包括：1、在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用本法；本法未规定的，适用《中华人民共和国公司法》和其他法律、行政法规的规定。2、政府债券、证券投资基金份额的上市交易，适用本法；其他法律、行政法规另有规定的，适用其规定。3、资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照本法的原则规定。在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照本法有关规定处理并追究法律责任。", "type": "single"}, {"id": "cflue_zc_fl1a.json_5", "q": "下列选项中，不符合有限责任公司应当具备条件的是（）。", "c": {"A": "有公司住所", "B": "有符合公司章程规定的全体股东认缴的出资额", "C": "股东符合法定人数。应当有2人以上200人以下为发起人，其中须有半数以上发起人在中国境内有住所", "D": "股东共同制定公司章程"}, "a": "C", "an": "设立有限责任公司，应当具备下列条件：（1）股东符合法定人数。有限责任公司由50个以下股东出资设立；（2）有符合公司章程规定的全体股东认缴的出资额；（3）股东共同制定公司章程；（4）有公司名称，建立符合有限责任公司要求的组织机构；（5）有公司住所。选项B是股份有限公司的要求。", "type": "single"}, {"id": "cflue_zc_fl1a.json_6", "q": "股份有限公司发行新股募足股款后，必须向证券交易所办理变更登记，并公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司发行新股募足股款后，必须向公司登记机关办理变更登记，并公告。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_7", "q": "根据《合伙企业法》，关于特殊普通合伙企业的说法，不正确的有（）。", "c": {"A": "一个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任", "B": "合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任", "C": "特殊的普通合伙企业名称中可以标明“特殊普通合伙”字样", "D": "以专业知识和专门技能为客户提供有偿服务的专业服务机构，可以设立为特殊的普通合伙企业"}, "a": "C", "an": "以专业知识和专门技能为客户提供有偿服务的专业服务机构，可以设立为特殊的普通合伙企业。特殊的普通合伙企业名称中【应当】标明“特殊普通合伙”字样，B错误，在法律术语中，应当是必须的意思表示。1个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任。合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任。", "type": "single"}, {"id": "cflue_zc_fl1a.json_8", "q": "《证券公司合规管理实施指引》属于部门规章。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "中国证券业协会制定的自律规则，如《中国证券业协会会员管理办法》《证券公司合规管理实施指引》《证券公司柜台交易业务规范》《证券公司另类投资子公司管理规范》《证券公司私募投资基金子公司管理规范》《发布证券研究报告执业规范》等。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_10", "q": "下列有关公积金的说法，错误的是（）。", "c": {"A": "公司的法定公积金不足弥补以前年度亏损的，在提取法定公积金之前，应当先用当年利润弥补亏损", "B": "法定公积金转为资本时，所留存的该项公积金不得少于转增前公司注册资本的30%", "C": "公司法定公积金累计额为公司注册资本的50%以上的，可以不再提取", "D": "公司应当提取税后利润的10%列入公司法定公积金"}, "a": "B", "an": "法定公积金转为资本时，所留存的该项公积金不得少于转增前公司注册资本的25%。选项B、C、D说法正确。", "type": "single"}, {"id": "cflue_zc_fl1a.json_11", "q": "关于法的国家意志性，下列说法正确的有（）。", "c": {"A": "法对人们的行为或者社会关系具有指引、评价、预测、教育及强制的作用", "B": "在国家主权范围内法具有高度的统一性与最高的权威性", "C": "国家将之前司法机关对具体案件的裁决赋予其普遍使用的效力属于法的认可", "D": "法的制定，是指由国家司法机关按照法定程序创制规范性法律文件的活动"}, "a": "BC", "an": "法的制定，是指由国家【立法】机关按照法定程序创制规范性法律文件的活动，A错误。法的规范性是法的基本特征，正是基于法的规范性，使法对人们的行为或社会关系具有指引、评价、预测、教育及强制的作用。C错误。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_12", "q": "公司应当自作出合并决议之日起30日内通知债权人，并于30日内在报纸上公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司应当自作出合并、分立决议之日起【10日内】通知债权人，并于30日内在报纸上公告。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_13", "q": "公司作出合并决议，按照规定通知债权人并予以公告后，债权人自接到通知书之日起30日内有权要求公司清偿债务或提供相应担保。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "债权人接到通知书之日起30日内，未接到通知书的自公告之日起45日内，有权要求公司清偿债务或者提供相应的担保。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_14", "q": "纵向法律关系是指在不平等的法律主体之间所建立的权力服从关系，属于典型的纵向法律关系的是行政法律关系。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "按照法律主体在法律关系中的地位不同，可以将法律关系分为纵向法律关系与横向法律关系。纵向法律关系是指在不平等的法律主体之间所建立的权力服从关系，又称为“隶属法律关系”。【行政法律】关系是典型的纵向法律关系。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_15", "q": "根据《公司法》，公司股东可以在一定的期限内请求人民法院撤销决议的情形包括（）。", "c": {"A": "股东会或者股东大会的决议内容违反公司章程", "B": "股东会或者股东大会的会议召集程序违反法律、行政法规规定", "C": "董事会的决议内容违反公司章程", "D": "董事会的表决方式违反法律、行政法规规定"}, "a": "ABCD", "an": "公司股东会或者股东大会、董事会的决议内容违反法律、行政法规的无效。股东会或者股东大会、董事会的会议召集程序、表决方式违反法律、行政法规或者公司章程，或者决议内容违反公司章程的，股东可以自决议作出之日起六十日内，请求人民法院撤销。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_16", "q": "公司享有法人财产权，应对公司债务承担有限清偿责任。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产为限对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_17", "q": "下列关于股东滥用权利的说法，正确的是（）。", "c": {"A": "公司股东会或者股东大会决议内容违反公司章程的，股东可以请求人民法院撤销", "B": "公司股东滥用股东权利给公司造成损失的，股东应当对公司承担赔偿责任", "C": "公司股东滥用股东权利给其他股东造成损失的，受损害的股东有权要求股东直接承担赔偿责任", "D": "公司的实际控制人利用关联关系损害公司利益，给公司造成损失的，公司有权要求实际控制人承担赔偿责任"}, "a": "ABCD", "an": "公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司的控股股东、实际控制人、董事、监事、高级管理人员不得利用其关联关系损害公司利益。违反前款规定，给公司造成损失的，应当承担赔偿责任。股东会或者股东大会、董事会的会议召集程序、表决方式违反法律、行政法规或者公司章程，或者决议内容违反公司章程的，股东可以自决议作出之日起六十日内，请求人民法院撤销。公司根据股东会或者股东大会、董事会决议已办理变更登记的，人民法院宣告该决议无效或者撤销该决议后，公司应当向公司登记机关申请撤销变更登记。", "type": "multi"}, {"id": "gw_1_1", "q": "根据《证券基金经营机构信息技术管理办法》，信息技术服务的范围包括（）。", "c": {"A": "中国证券业协会规定的其他情形", "B": "中国证监会规定的其他情形", "C": "重要信息系统的运维及日常安全管理", "D": "重要信息系统的开发、测试、集成及测评"}, "a": "BCD", "an": "信息技术服务的范围如下：1、重要信息系统的开发、测试、集成及测评；2、重要信息系统的运维及日常安全管理；3、中国证监会规定的其他情形。", "type": "m"}, {"id": "gw_1_2", "q": "根据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "依据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。", "type": "j"}, {"id": "gw_1_3", "q": "根据《证券公司流动性风险管理指引》，证券公司的融资管理应符合的要求包括（）。", "c": {"A": "加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，不定期评估市场融资和资产变现能力", "B": "分析正常和压力情景下未来不同时间段的融资需求和来源", "C": "密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响", "D": "加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额"}, "a": "BCD", "an": "证券公司的融资管理应符合以下要求：1、分析正常和压力情景下未来不同时间段的融资需求和来源。2、加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额。3、加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，【并定期】评估市场融资和资产变现能力。4、密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响。", "type": "m"}, {"id": "gw_1_4", "q": "根据《证券公司全面风险管理规范》，对证券公司全面风险管理情况进行自律管理的是中国证券业协会。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "中国证券业协会可以对证券公司全面风险管理情况进行自律管理，证券公司应予以配合。", "type": "j"}, {"id": "gw_1_5", "q": "赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（1）赵某可在（）家证券基金经营机构担任独立董事。", "c": {"A": "3", "B": "4", "C": "2", "D": "1"}, "a": "C", "an": "任何人员最多可以在2家证券公司担任独立董事。", "type": "m"}, {"id": "gw_1_6", "q": "甲证券公司营销人员王某拟向某70岁以上的高龄退休客户张某主动推介代销的某私募基金，根据张某在营业部填写的风险承受能力测评问卷，显示张某的风险承受能力结果为R1，但营销人员王某拟推荐的私募基金产品风险等级结果为R5，于是营销人员王某放弃了主动向张某超风险推荐该私募基金的计划。（1）关于证券公司向客户推介金融产品的行为，下列说法错误的是（）。", "c": {"A": "应当了解客户的身份、财产和收入状况", "B": "应当了解客户的金融知识和投资经验、投资目标、风险偏好等", "C": "证券公司认为客户购买金融产品不适当或者无法判断其适当性的，可以向其主动推介，但应由客户签字确认", "D": "委托人明确约定购买人范围的，证券公司不得超出委托人确定的购买人范围"}, "a": "C", "an": "证券公司认为客户购买金融产品不适当或者无法判断其适当性的，【不可以】向其主动推介。", "type": "m"}, {"id": "gw_1_7", "q": "证券公司应当按照法律、行政法规和中国证监会的规定建立完备的盈利评估体系。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司应当按照法律、行政法规和中国证监会的规定建立完备的【合规管理、风险管理和内部控制体系】，故选B。", "type": "j"}, {"id": "gw_1_8", "q": "证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为不低于每半年一次。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。", "type": "j"}, {"id": "gw_1_9", "q": "洗钱风险管理工作基本原则中，（）是指证券公司应赋予同一客户在本金融机构唯一的风险等级。", "c": {"A": "同一性原则", "B": "自主管理原则", "C": "保密原则", "D": "风险相当原则"}, "a": "A", "an": "【同一性原则】是指证券公司应赋予同一客户在本金融机构唯一的风险等级。", "type": "s"}, {"id": "gw_1_10", "q": "中国证监会根据证券公司评价计分的高低，将证券公司分为五大类十一个级别，其中C级是正常经营状态的最低等级。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "中国证监会根据证券公司评价计分的高低，将证券公司分为A（AAA，AA、A）、B（BBB、BB、B）、C（CCC、CC、C）、D、E五大类十一个级别。其中，C级是正常经营状态的最低等级。", "type": "j"}, {"id": "gw_1_11", "q": "按照《证券监督管理条例》和《证券公司治理准则》的要求，证券公司董事会决议内容违反法律、行政法规或者中国证监会的规定的，监事会应当要求董事会纠正，股东会应当拒绝执行。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司董事会决议内容违反法律、行政法规或者中国证监会的规定的，【监事会】应当要求董事会纠正，【经理层】应当拒绝执行。", "type": "j"}, {"id": "gw_1_12", "q": "根据《证券公司合规管理实施指引》，下列关于证券公司合规管理基本制度的说法，错误的是（）。", "c": {"A": "证券公司应当制定工作人员行为准则，引导其合规执业意识而非道德行为规范", "B": "证券公司制定的合规管理基本制度应经董事会审议通过后实施", "C": "合规管理基本制度应明确合规风险、市场风险、信用风险等风险管理的各个方面", "D": "证券公司根据自身内部控制的需要确定是否制定合规管理基本制度"}, "a": "ACD", "an": "证券公司应当制定合规管理的基本制度，经董事会审议通过后实施。合规管理的基本制度应当明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容。证券公司应当结合本公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理。证券公司应当制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规。", "type": "m"}, {"id": "gw_1_13", "q": "证券公司净资本指标与上月相比发生30%以上不利变化的，证券公司应当及时向全体董事、股东报告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "净资本指标与上月相比发生20%以上不利变化或不符合规定标准时，证券公司应当在5个工作日内向公司全体董事报告，10个工作日内向公司全体股东报告。", "type": "j"}, {"id": "cflue_zc_fl2.json_1", "q": "根据《证券公司信用风险管理指引》，下列关于证券公司信用风险业务类型的说法，正确的是（）。", "c": {"A": "包括互换、场外期权、远期等场外衍生品业务（不包括信用衍生品）", "B": "包括股票投资、约定购回式证券交易、融资融券等融资类业务", "C": "包括债券投资交易业务（不包括国债、地方债、金融债、政府支持机构债）", "D": "包括非标准化债权资产投资业务"}, "a": "D", "an": "按照业务类型分类，包括但不限于：【股票质押式回购交易】、约定购回式证券交易、融资融券等融资类业务；互换、场外期权、远期、【信用衍生品】等场外衍生品业务；债券投资交易（包括债券现券交易、债券回购交易、债券远期交易、债券借贷业务等债券相关交易业务），债券包括但不限于【国债】、地方债、金融债、政府支持机构债、企业债、非金融企业债务融资工具、公司债、资产支持证券、同业存单；【非标准化债权资产投资】；其他涉及信用风险的自有资金出资业务。", "type": "single"}, {"id": "cflue_zc_fl2.json_2", "q": "委托信息技术服务机构提供产品或服务的，证券公司依法应当承担的责任可因委托而免除或减轻。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司借助信息技术手段从事证券基金业务活动的，可以委托信息技术服务机构提供产品或服务，【但证券公司依法应当承担的责任不因委托而免除或减轻。】", "type": "judge"}, {"id": "cflue_zc_fl2.json_3", "q": "下列关于证券公司投资者适当性留痕的说法，正确的是（）。", "c": {"A": "通过互联网等非现场方式进行的，由专业投资者通过符合规定的电子方式进行确认", "B": "通过营业部网点向专业投资者进行警示的，应当全过程录音录像", "C": "通过互联网等非现场方式进行的，由普通投资者通过符合规定的电子方式进行确认", "D": "通过营业部网点向普通投资者进行告知的，必须全程录像"}, "a": "C", "an": "通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像；通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。", "type": "single"}, {"id": "cflue_zc_fl2.json_4", "q": "当可疑交易明显涉嫌洗钱、恐怖融资等犯罪活动的，证券公司应当在向中国反洗钱监测分析中心提交可疑交易报告的同时，以电子形式或书面形式向（）或者其分支机构报告，并配合反洗钱调查。", "c": {"A": "所在地中国人民银行", "B": "中国反洗钱监测分析中心", "C": "所在地中国证监会", "D": "注册地中国证监会"}, "a": "A", "an": "当可疑交易明显涉嫌洗钱、恐怖融资等犯罪活动的，证券公司应当在向中国反洗钱监测分析中心提交可疑交易报告的同时，以电子形式或书面形式向【所在地中国人民银行】或者其分支机构报告，并配合反洗钱调查。", "type": "single"}, {"id": "cflue_zc_fl2.json_6", "q": "下列关于证券公司分支机构的说法，正确的是（）。", "c": {"A": "证券公司设立分支机构具有法人资格", "B": "分支机构负责人资格无需证监局审批", "C": "证券公司设立分支机构需要证监局审批", "D": "证券公司某营业部负责人可以兼任其他营业部的负责人"}, "a": "B", "an": "分支机构负责人资格无需审批，A选项正确。【国务院证券监督管理机构】审批证券公司及其分支机构的设立申请。设立申请，由【证监会】审批，B选项错误。证券公司某营业部负责人不可以兼任其他营业部的负责人，C选项错误。证券公司设立分支机构不具有法人资格，D选项错误。", "type": "single"}, {"id": "cflue_zc_fl2.json_7", "q": "根据《证券公司信息隔离墙制度指引》，下列关于合规总监和合规部门建立信息隔离墙相关制度职责的说法，不正确的有（）。", "c": {"A": "合规总监和合规部门负有信息隔离墙相关制度的培训职责", "B": "合规总监和合规部门承担执行信息隔离墙相关制度的直接管理责任", "C": "合规总监和合规部门负有信息隔离墙相关制度的咨询职责", "D": "合规总监和合规部门负有信息隔离墙相关制度的审查职责"}, "a": "B", "an": "合规总监和合规部门负责协助董事会和高级管理人员建立和执行信息隔离墙制度，并负有审查、监督、检查、咨询和培训等职责。【各业务部门和分支机构的负责人】对本部门和本机构执行信息隔离墙制度的有效性承担管理责任。", "type": "single"}, {"id": "cflue_zc_fl2.json_10", "q": "根据《证券公司投资银行类业务内部控制指引》，下列说法错误的有（）。", "c": {"A": "通过委托外部机构对投资银行类业务内部控制有效性进行评估的，证券公司依法应当承担的责任可以免除", "B": "对投资银行类项目负有主要管理责任人员的收入递延支付年限原则上不得多于3年", "C": "投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10", "D": "投资银行内部控制执行效果评估每两年评估1次"}, "a": "ABD", "an": "对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得【少】于3年。应当根据监管要求、业务发展等情况的需要，建立内部控制执行效果定期评估机制。证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估【每年】不得少于1次。委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查，避免发生利益冲突。证券公司依法应当承担的责任【不因】委托外部机构而免除。", "type": "multi"}, {"id": "cflue_zc_fl2.json_12", "q": "经营机构告知投资者不适合购买相关产品，投资者主动要求购买风险等级高于其风险承受能力的产品时，下列做法正确的是（）。", "c": {"A": "拒绝向其销售高于其风险承受能力的产品，但如投资者仍坚持购买的，可向其销售", "B": "书面形式进行风险特别提示后，向其销售高于其风险承受能力的产品", "C": "对于确认不属于风险承受能力最低级别、以口头进行特别风险警示的，可销售", "D": "对于风险承受能力最低级别的投资者，应该拒绝向其销售"}, "a": "D", "an": "以书面形式进行特别风险警示：如投资者不属于风险承受能力最低类别，经营机构业务人员应当就产品或服务的风险等级高于投资者承受能力的情况进行特别书面风险警示。如投资者仍坚持购买的，可以向其销售相关产品或者提供相关服务。", "type": "single"}, {"id": "cflue_zc_fl2.json_13", "q": "关于证券公司治理的基本要求，下列说法正确的有（）。", "c": {"A": "建立完备的内部控制体系", "B": "建立健全“三会一层”组织架构", "C": "不得侵犯客户的合法权益", "D": "搭建先进的信息系统"}, "a": "ABC", "an": "证券公司治理的基本要求：1、建立健全组织架构、明确职责划分，建立健全“三会一层”的组织架构，明确股东（大）会、董事会、监事会、经理层之间的职责划分。2、不得侵犯客户合法权益。3、建立完备的内部控制体系。", "type": "multi"}, {"id": "cflue_zc_fl2.json_14", "q": "对证券公司投资银行类项目负有主要管理或执行责任人员的收入递延支付年限，原则上不得少于3年。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "应当针对管理和执行投资银行类项目的主要人员建立收入递延支付机制，合理确定收入递延支付标准，明确递延支付人员范围、递延支付年限和比例等内容。对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得少于3年。", "type": "judge"}, {"id": "cflue_zc_fl2.json_15", "q": "根据《证券公司流动性风险管理指引》，证券公司应至少（）对流动性风险限额进行一次评估，必要时进行调整。", "c": {"A": "每季度", "B": "每年", "C": "每月", "D": "每半年"}, "a": "B", "an": "证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。证券公司应至少【每年】对流动性风险限额进行【一次】评估，必要时进行调整。", "type": "single"}, {"id": "cflue_zc_fl2.json_19", "q": "洗钱风险管理工作基本原则中，（）是指证券公司应依据风险评估结果科学配置反洗钱资源，在洗钱风险较高的领域采取强化的反洗钱措施，在洗钱风险较低的领域采取简洁的反洗钱措施。", "c": {"A": "动态管理原则", "B": "自主管理原则", "C": "同一性原则", "D": "风险相当原则"}, "a": "D", "an": "【风险相当原则】是指证券公司应依据风险评估结果科学配置反洗钱资源，在洗钱风险较高的领域采取强化的反洗钱措施，在洗钱风险较低的领域采取简洁的反洗钱措施。", "type": "single"}, {"id": "cflue_zc_fl2.json_20", "q": "证券公司应当将子公司的风险管理纳入统一体系，子公司风险管理工作负责人的任命应由证券公司首席风险官提名，子公司董事会聘任，其解聘应征得（）同意。", "c": {"A": "子公司董事长", "B": "证券公司首席风险官", "C": "证券公司总经理", "D": "证券公司董事长"}, "a": "B", "an": "子公司风险管理工作负责人的任命应由证券公司首席风险官提名、子公司董事会聘任，其解聘应征得【证券公司首席风险官】同意。", "type": "single"}, {"id": "cflue_zc_fl2.json_21", "q": "下列关于恐怖活动资产冻结工作的说法，正确的是（）。", "c": {"A": "证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施", "B": "证券公司可以自行解除冻结措施", "C": "证券公司应当严格按照公安部发布的恐怖活动组织名单，依法对相关资产进行查封", "D": "证券公司只能依据公安机关的相关规定对被采取冻结措施的资产进行管理及处置"}, "a": "A", "an": "证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的【决定】，依法对相关资产采取冻结措施。证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施。证券公司采取冻结措施后，除【中国人民银行及其分支机构、公安机关、国家安全机关】另有要求外，应当及时告知客户，并说明采取冻结措施的依据和理由。境外有关部门以涉及恐怖活动为由，要求证券公司冻结相关资产、提供客户身份信息及交易信息的，证券公司应当告知对方通过外交途径或者司法协助途径提出请求；【不得擅自采取冻结措施】，不得擅自提供客户身份信息及交易信息。", "type": "single"}, {"id": "cflue_zc_fl2.json_22", "q": "证券公司分类评价中，属于风险管理能力评价指标的有（）。", "c": {"A": "司法机关采取的刑事处罚措施", "B": "信息披露", "C": "客户权益保护", "D": "资本充足"}, "a": "BCD", "an": "风险管理能力主要根据资本充足、公司治理与合规管理、全面风险管理、信息技术管理、客户权益保护、信息披露六类评价指标进行评价，体现证券公司对流动性风险、合规风险、市场风险、信用风险、技术风险及操作风险等管理能力。", "type": "multi"}, {"id": "gw_2_1", "q": "某证券投资咨询公司开发了一款荐股软件，具有提供具体证券投资品种的买卖时机建议等功能，该公司利用其开展证券投资咨询业务。根据该案例，回答以下问题：（2）证券投资咨询机构开展“荐股软件”销售，应将营销宣传资料报（）备案。", "c": {"A": "证券交易所", "B": "证监会", "C": "住所地证监局和中国证券业协会", "D": "住所地证监局"}, "a": "C", "an": "证券投资咨询机构开展“荐股软件”销售，应将销售（服务）协议格式、营销宣传、产品推介等营销推介材料报【住所地证监局和中国证券业协会】备案。", "type": "m"}, {"id": "gw_2_2", "q": "根据《证券、期货投资咨询管理暂行办法》，申请证券、期货投资咨询从业资格的机构，应当具备的条件包括：单独从事证券投资咨询业务的机构，有2名以上符合证券投资咨询从业条件的专职人员。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "单独从事证券投资咨询业务的机构，有5名以上符合证券投资咨询从业条件的专职人员；同时从事证券投资咨询业务和期货交易咨询业务的机构，有10名以上符合证券投资咨询、期货交易咨询从业条件的专职人员；其高级管理人员中，至少有1名符合规定的证券投资咨询从业条件；有100万元人民币以上的注册资本；有固定的业务场所和与业务相适应的通讯及其他信息传递设施；有公司章程；有健全的内部管理制度；具备中国证监会要求的其他条件。", "type": "j"}, {"id": "gw_2_3", "q": "证券公司受期货公司委托从事中间介绍业务，应当提供协助客户办理开户手续、代理客户进行期货交易、提供期货行情信息、交易设施等服务。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司受期货公司委托从事介绍业务，应当提供下列服务：（1）协助办理开户手续；（2）提供期货行情信息、交易设施；（3）中国证监会规定的其他服务。证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。", "type": "j"}, {"id": "gw_2_4", "q": "根据《证券公司融资融券业务管理办法》的规定，除（）情形外，任何人不得动用证券公司客户信用交易担保证券账户内的证券和客户信用交易担保资金账户内的资金。", "c": {"A": "收取客户应当支付的违约金", "B": "收取客户应当支付的利息、费用、税款", "C": "收取客户应当归还的资金、证券", "D": "为客户进行融资融券交易的结算"}, "a": "ABCD", "an": "除上述答案外，还有按照该办法的规定以及客户的约定处分担保物；客户提取还本付息、支付税费及违约金后的剩余证券和资金；法律法规和该办法规定的其他情形。", "type": "m"}, {"id": "gw_2_5", "q": "下列关于证券公司柜台市场信息披露的相关说法，错误的是（）。", "c": {"A": "根据信息性质及私募业务相关规定分类披露，信息披露义务人按照约定向投资者披露的信息包括公开披露信息和向特定对象披露信息", "B": "证券公司应当通过本公司网站、机构间私募产品报价与服务系统等信息披露平台，披露私募产品相关信息", "C": "涉及证券公司客户隐私的信息、涉及第三方商业秘密的信息均为证券公司不得向公众披露的私募业务信息", "D": "证券公司应当制定明确的柜台市场信息披露规则，并由证券公司对柜台市场所披露信息的真实性、准确性、完整性负责"}, "a": "D", "an": "证券公司应当制定明确的柜台市场信息披露规则，【信息披露义务人】应当对所披露信息的真实性、准确性、完整性负责。", "type": "s"}, {"id": "gw_2_6", "q": "对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "对转融通担保证券账户内记录的证券，由【证券金融公司】以自己的名义，行使对证券发行人的权利。", "type": "j"}, {"id": "gw_2_7", "q": "证券公司、证券投资咨询机构或者其他财务顾问机构担任上市公司独立财务顾问，在持续督导期间解除委托协议的，应当及时履行报告、公告程序。委托人应当在1个月内另行聘请财务顾问对其进行持续督导。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "委托人应当在1个月内另行聘请财务顾问对其进行持续督导。", "type": "j"}, {"id": "gw_2_8", "q": "在客户交易结算资金第三方存管模式下的客户资金存入过程中，指定商业银行根据客户转账指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "客户资金存取应当以银证转账方式通过本人银行结算账户进行。【指定商业银行】根据客户指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金，无须证券公司介入，从而防止证券公司假借客户提款挪用资金。", "type": "j"}, {"id": "gw_2_9", "q": "下列关于证券资产管理业务基本要求的说法，错误的有（）。", "c": {"A": "证券公司从事私募资产管理业务，应当确保业务开展与资本实力、管理能力和风险控制水平相适应", "B": "中国证券业协会依据法律、行政法规等规定，对证券公司私募资产管理业务实施行政管理", "C": "证券公司从事私募资产管理业务，应当遵循自愿、公平、诚实信用、客户利益至上原则", "D": "证券公司从事私募资产管理业务，应当依法经中国基金业协会批准"}, "a": "BD", "an": "证券公司从事私募资产管理业务，应当依法经中国证监会批准。中国证监会及其派出机构依据法律、行政法规等规定，对证券公司私募资产管理业务实施监督管理。", "type": "m"}, {"id": "gw_2_10", "q": "证券公司进行柜台交易，向投资者收取履约保证金的，应当在双方约定的金融机构开立专门账户存放，不得违约动用。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "证券公司进行柜台交易，向投资者收取履约保证金的，应当在双方约定的金融机构开立【专门账户】存放，不得违约动用。", "type": "j"}, {"id": "gw_2_11", "q": "证券金融公司开展转融通业务，应当了解证券公司的基本情况、业务范围、财务状况、违约记录等，并以书面和电子的方式予以记录和保存。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "考查证券金融公司在了解客户及信用评估时需要考察哪些方面，还包括风险控制能力。", "type": "j"}, {"id": "gw_2_12", "q": "根据《证券公司私募投资基金子公司管理规范》，私募基金子公司及其下设特殊目的机构以现金管理为目的的管理闲置资金，可以投资的证券包括（）。", "c": {"A": "股票", "B": "央行票据", "C": "期权", "D": "投资级公司债"}, "a": "BD", "an": "私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保持流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。", "type": "m"}, {"id": "gw_2_13", "q": "全国中小企业股份转让系统是经国务院批准设立的全国性证券交易场所。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "全国中小企业股份转让系统，是经【国务院】批准设立的全国性证券交易场所，全国中小企业股份转让系统有限责任公司为其运营管理机构。", "type": "j"}, {"id": "gw_2_14", "q": "下列关于证券经纪业务特点的说法，正确的有（）。", "c": {"A": "委托人的指令具有权威性", "B": "委托人的资料应当及时披露", "C": "证券经纪商具有中介性", "D": "证券经纪业务的对象具有广泛性"}, "a": "ACD", "an": "客户资料的保密性，在证券经纪业务中，委托人的资料关系到其资产的安全和投资决策的实施，证券经纪商有义务为客户保密，但法律法规另有规定的除外。", "type": "m"}, {"id": "cflue_zc_fl3a.json_1", "q": "证券公司（）合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。", "c": {"A": "客户普通证券账户", "B": "自营证券账户", "C": "融券专用证券账户", "D": "转融通担保证券明细账户"}, "a": "BCD", "an": "证券公司通过其自营证券账户、融券专用证券账户和转融通担保证券明细账户合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。", "type": "multi"}, {"id": "cflue_zc_fl3a.json_3", "q": "财务顾问应规范执业行为，提高其执业质量，下列说法中，符合要求的是（）。", "c": {"A": "财务顾问应当建立健全内部报告制度，财务顾问主办人对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或授权代表人、财务顾问主办人和项目协办人签名，并加盖上市公司单位公章", "B": "结合上市公司披露的定期报告出具持续督导意见，并在前述定期报告披露后的15日内向上市公司所在地的中国证监会派出机构报告", "C": "只要进行了充分的内部核查，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺", "D": "财务顾问在开始工作时可直接利用其他证券服务机构出具的专业意见，对委托人提供的资料和披露的信息进行独立判断"}, "a": "B", "an": "财务顾问在开始工作时可利用其他证券服务机构出具的专业意见，但应对其进行必要的审慎核查，对委托人提供的资料和披露的信息进行独立判断。选项A错误。进行了充分的内部核查和尽职调查基础上，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺，选项B错误。选项C应该加盖财务顾问单位公章。", "type": "single"}, {"id": "cflue_zc_fl3a.json_4", "q": "下列关于证券公司的证券交易佣金收费标准的说法，错误的是（）。", "c": {"A": "交易佣金实行最高上限向下浮动制度", "B": "证券公司向客户收取的佣金无下限限制，可以实行0佣金", "C": "证券公司向客户收取的佣金不得高于证券交易金额的3‰", "D": "佣金的收费标准因交易品种、交易场所的不同而有所差异"}, "a": "B", "an": "证券经纪商向客户收取的佣金（包括代收的证券交易监管费和证券交易所手续费等）不得高于证券交易金额的3‰，【也不得低于】代收的证券交易监管费和证券交易所手续费等。", "type": "single"}, {"id": "cflue_zc_fl3a.json_5", "q": "下列不属于对财务顾问及其财务顾问主办人进行持续动态监管，并应计入其诚信档案的事项是（）。", "c": {"A": "财务顾问及其财务顾问主办人被中国证监会采取监管措施", "B": "在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异", "C": "财务顾问采取不正当竞争手段进行恶性竞争", "D": "财务顾问主办人与证监会进行专业沟通，并按照证监会提出的反馈意见做出答复"}, "a": "D", "an": "中国证监会建立监管信息系统，对财务顾问及其财务顾问主办人进行持续动态监管，并将以下事项记入其诚信档案：1、财务顾问及其财务顾问主办人被中国证监会采取监管措施的；2、在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的；3、中国证监会认定的其他事项。", "type": "single"}, {"id": "cflue_zc_fl3a.json_6", "q": "证券公司开展证券经纪业务中，禁止的行为包括（）。", "c": {"A": "对客户买卖证券承诺收益或赔偿", "B": "拒绝客户全权委托代理其买卖证券", "C": "在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽", "D": "将客户的资金账户、证券账户提供给他人使用"}, "a": "ACD", "an": "不得接受客户委托或接受客户的全权委托代理其买卖证券。因此D不属于禁止行为。", "type": "multi"}, {"id": "cflue_zc_fl3a.json_7", "q": "下列不属于沪港通可交易的证券品种为（）。", "c": {"A": "A+H股上市公司的证券交易所上市A股", "B": "上证380指数成分股", "C": "上证180指数成分股", "D": "香港联合交易所上市的A+H股公司股票"}, "a": "D", "an": "香港联合交易所上市的A+H股公司股票属于深港通，不属于沪港通交易的证券品种。", "type": "single"}, {"id": "cflue_zc_fl3a.json_8", "q": "证券、期货投资咨询机构与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时，应当向地方证管办（中国证监会）备案，备案材料包括版面安排或者节目时间段、项目负责人等。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "证券、期货投资咨询机构与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时，应当向地方证管办（中国证监会）备案，备案材料包括：合作内容、起止时间、版面安排或者节目时间段、项目负责人等，并加盖双方单位的印鉴。", "type": "judge"}, {"id": "cflue_zc_fl3a.json_11", "q": "保荐机构持续督导的内容有（）。", "c": {"A": "关注发行人为他人提供担保事项，并发表意见", "B": "防止大股东和其他关联方违规占用发行人资源", "C": "防止公司高管人员利用职务之便损害发行人利益", "D": "保障关联交易的公允性和合规性，并对关联交易发表意见"}, "a": "ABCD", "an": "保荐机构应当针对发行人的具体情况，确定证券发行上市后持续督导的内容，在持续督导期内督导发行人履行有关上市公司规范运作、信守承诺和信息披露等义务，审阅信息披露文件及向中国证监会、证券交易所提交的其他文件，并承担下列工作：（1）督导发行人有效执行并完善防止控股股东、实际控制人、其他关联方违规占用发行人资源的制度；（2）督导发行人有效执行并完善防止其董事、监事、高级管理人员利用职务之便损害发行人利益的内控制度；（3）督导发行人有效执行并完善保障关联交易公允性和合规性的制度，并对关联交易发表意见；（4）持续关注发行人募集资金的专户存储、投资项目的实施等承诺事项；（5）持续关注发行人为他人提供担保等事项，并发表意见。", "type": "multi"}, {"id": "cflue_zc_fl3a.json_12", "q": "融资融券客户融资买入证券时，融资保证金比例的计算公式为（）。", "c": {"A": "保证金/（融资买入证券数量×收盘价格）×100%", "B": "保证金/（融资买入证券数量×证券市价）×100%", "C": "保证金/（融资买入证券数量×卖出价格）×100%", "D": "保证金/（融资买入证券数量×买入价格）×100%"}, "a": "D", "an": "融资保证金比例＝保证金／（融资买入证券数量×买入价格）×100%，故选A。", "type": "single"}, {"id": "cflue_zc_fl3a.json_13", "q": "中国证监会建立监管信息系统，对财务顾问主办人进行持续动态监管，需记入其诚信档案的事项不包括（）。", "c": {"A": "在从事业务期间更换财务顾问主办人的", "B": "中国证监会认定应当记入的相关事项的", "C": "财务顾问主办人被中国证监会采取监管措施的", "D": "在持续督导期间，上市公司违反规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的"}, "a": "A", "an": "中国证监会建立监管信息系统，对财务顾问及其财务顾问主办人进行持续动态监管，并将以下事项记入其诚信档案：1、财务顾问及其财务顾问主办人被中国证监会采取监管措施的。2、在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的。3、中国证监会认定的其他事项。", "type": "single"}, {"id": "cflue_zc_fl3a.json_14", "q": "下列关于改变公开发行证券募集资金用途及其法律责任的说法，正确的有（）。", "c": {"A": "对发行人擅自改变公开发行证券募集资金用途负有直接责任的人员应给予警告，并处罚款", "B": "改变公开发行股票所募集资金用途的，应由发行人股东大会作出决议", "C": "改变公开发行公司债券筹集资金用途的，应由发行人股东大会作出决议", "D": "公开发行公司债券筹集的资金不得用于弥补亏损，但确有结余的部分可以购买对公理财产品"}, "a": "AB", "an": "公开发行公司债券筹集的资金，必须按照公司债券募集办法所列资金用途使用；改变资金用途，必须经【债券持有人会议】作出决议。B错误；【公开发行公司债券筹集的资金，不得用于弥补亏损和非生产性支出】。C错误。", "type": "multi"}, {"id": "cflue_zc_fl3a.json_15", "q": "下列选项中不正确的是（\t）。", "c": {"A": "一般商业银行就可以担任存托人", "B": "存托人应与境外基础证券发行人签署存托协议，并根据存托协议约定协助完成存托凭证的发行上市", "C": "托管人应当向存托人提供基础证券的市场信息", "D": "托管人应当按照托管协议约定，协助办理分红派息、投票"}, "a": "A", "an": "存托人和托管人应当承担的职责：1、存托人与境外基础证券发行人签署存托协议，并根据存托协议约定协助完成存托凭证的发行上市；2、托管人按照托管协议约定，协助办理分红派息、投票；3、托管人向存托人提供基础证券的市场信息。", "type": "single"}, {"id": "cflue_zc_fl3a.json_17", "q": "证券公司以自己名义开立，用于记载客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券账户是客户信用交易担保资金账户。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "客户信用交易【担保证券】账户是用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。", "type": "judge"}, {"id": "cflue_zc_fl3a.json_18", "q": "与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及到的主要部门规章及规范性文件不包括（）。", "c": {"A": "《上市公司并购重组财务顾问业务管理办法》", "B": "《证券投资顾问业务暂行规定》", "C": "《上市公司重大资产重组管理办法》", "D": "《上市公司收购管理办法》"}, "a": "B", "an": "与证券交易、证券投资活动有关的财务顾问依据的法律法规主要包括《证券法》《上市公司并购重组财务顾问业务管理办法》《上市公司重大资产重组管理办法》和《上市公司收购管理办法》等。", "type": "single"}, {"id": "gw_3_1", "q": "2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，将负责管理该公司“A基金”账户的投资决策信息告诉其夫蒋某，并与蒋某共同出资10万元，利用其大学同学陈某账户先于“A基金”买入股票并获利1万余元。关于李某的行为，以下说法正确有（）。", "c": {"A": "不构成犯罪，但是应当承担行政责任", "B": "构成利用未公开信息交易罪", "C": "构成泄露内幕信息罪", "D": "构成内幕交易罪"}, "a": "B", "an": "利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券 股票103支，买入金额共计人民币8067万元（以下币种均为人民币），卖出金额共计3841万元，获利金额共计18万元。根据该案例，回答以下问题：（2）证券从业人员不得从事的活动包括（）。", "c": {"A": "编造、传播虚假信息", "B": "隐匿、伪造、篡改或者毁损交易记录", "C": "接受利益相关方的贿赂或对其进行贿赂", "D": "从事与其履行职责有利益冲突的业务"}, "a": "ABCD", "an": "证券从业人员不得从事以下活动：（1）从事内幕交易或利用未公开信息交易活动，泄露利用工作便利获取的内幕信息或其他未公开信息，或明示、暗示他人从事内幕交易活动；（2）利用资金优势、持股优势和信息优势，单独或者合谋串通，影响证券交易价格或交易量，误导和干扰市场；（3）编造、传播虚假信息，作出虚假陈述或信息误导，扰乱证券市场；（4）损害社会公共利益、所在机构或者他人的合法权益；（5）从事与其履行职责有利益冲突的业务；（6）接受利益相关方的贿赂或对其进行贿赂，如接受或赠送礼物、回扣、补偿或报酬等，或从事可能导致与投资者或所在机构之间产生利益冲突的活动；（7）买卖法律明文禁止买卖的证券；（8）利用工作之便向任何机构和个人输送利益，损害客户和所在机构利益；（9）违规向客户作出投资不受损失或保证最低收益的承诺；（10）隐匿、伪造、篡改或者毁损交易记录；（11）中国证监会、中国证券业协会禁止的其他行为。", "type": "multi"}, {"id": "cflue_zc_fl4.json_7", "q": "在证券、期货市场上，操纵市场的行为方式主要有（）。", "c": {"A": "内幕交易", "B": "与他人串通，以约定的价格进行交易", "C": "自买自卖期货合约", "D": "合谋操纵证券交易价格或数量"}, "a": "BCD", "an": "期货市场上操纵市场行为包括：1、单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖，操纵证券、期货交易价格或者证券、期货交易量的；2、与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易，影响证券、期货交易价格或者证券、期货交易量的；3、在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约，影响证券、期货交易价格或者证券、期货交易量的；4、以其他方法操纵证券、期货市场的。", "type": "multi"}, {"id": "cflue_zc_fl4.json_8", "q": "下列关于在证券交易活动中作出虚假陈述或者信息误导的法律责任的说法，错误的是（）。", "c": {"A": "证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，并处相应罚款", "B": "证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处相应罚款，情节严重的，并处暂停或者禁止从事证券服务业务", "C": "在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以3万元以上20万元以下的罚款", "D": "在证券交易活动中作出虚假陈述或者信息误导的人员属于国家工作人员的，经责令改正并处以罚款后，可以不予行政处分"}, "a": "CD", "an": "在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款；属于国家工作人员的，还应当依法给予行政处分。", "type": "multi"}, {"id": "cflue_zc_fl4.json_9", "q": "下列关于违反证券发行规定的法律责任的说法，正确的有（）。", "c": {"A": "发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，可以不追究责任", "B": "未经依法注册，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，并处罚款", "C": "证券公司承销或者销售擅自公开发行的证券的，责令停止承销或者销售，没收违法所得，并处罚款", "D": "发行人的控股股东、实际控制人组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，依规只对发行人进行处罚"}, "a": "BC", "an": "发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，【处以200万元以上2000万元以下的罚款】，B选项错误。控股股东、实际控制人组织、指使实施前款行为的，处5年以下有期徒刑或者拘役，并处或者单处非法募集资金金额20%以上1倍以下罚金；数额特别巨大、后果特别严重或者有其他特别严重情节的，处5年以上有期徒刑，并处非法募集资金金额20%以上1倍以下罚金，C选项错误。", "type": "multi"}, {"id": "cflue_zc_fl4.json_10", "q": "证券交易所不能成为背信运用受托财产罪主体。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "该罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公式、期货经纪公司、保险公司或者其他金融机构。", "type": "judge"}, {"id": "cflue_zc_fl4.json_11", "q": "下列说法不属于变相公开发行股票情形的有（）。", "c": {"A": "向特定对象转让股票，未经中国证监会核准，转让后公司股东139人", "B": "非公开发行股票及其股权转让采用推介会的方式向社会公众发行", "C": "公司股东自行以公开方式向社会公众转让股票", "D": "公司股东委托他人以公开方式向社会公众转让股票"}, "a": "A", "an": "变相公开发行包括但不限于以下几种情形：1、非公开发行股票及其股权转让，采用广告、公告、广播、电话、传真、信函、推介会、说明会、网络、短信、公开劝诱等公开方式或变相公开方式向社会公众发行；2、公司股东自行或委托他人以公开方式向社会公众转让股票，亦构成变相公开发行股票；3、向特定对象转让股票，未经中国证监会核准，转让后公司股东累计超过200人。", "type": "single"}, {"id": "cflue_zc_fl4.json_12", "q": "操纵证券市场行为给投资者造成损失的，行为人应当依法承担赔偿责任。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "操纵证券市场行为给投资者造成损失的，应当依法承担赔偿责任。", "type": "judge"}, {"id": "cflue_zc_fl4.json_13", "q": "下列关于内幕交易、泄露内幕信息的相关说法，错误的是（）。", "c": {"A": "内幕交易、泄露内幕信息罪的主观方面包括故意和过失", "B": "内幕交易、泄露内幕信息行为，证券交易成交额累计在200万元以上的，应予立案追诉", "C": "内幕交易、泄露内幕信息罪侵犯的客体是证券、期货交易市场的正常管理秩序和证券、期货投资人的合法利益", "D": "证券交易内幕信息的知情人违反规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以法定数额罚款"}, "a": "A", "an": "内幕交易、泄露内幕信息罪的主观方面只能是故意，过失不构成本罪。", "type": "single"}, {"id": "cflue_zc_fl4.json_14", "q": "甲期货公司营业部客户经理陈某向客户高某推介保本理财产品。经时任营业部总经理孟某同意，陈某向高某承诺通过寻找第三方投资顾问的方式为高某操作期货账户，保本保息基础上达到7%的年收益。后孟某、陈某未能找到愿意接盘的投资顾问，在未通知高某也未取得其同意的情况下，二人擅自运用高某账户进行操作造成损失一千余万元，为甲公司赚取手续费八十余万元。以下说法错误的有（）。", "c": {"A": "陈某构成操纵期货市场罪", "B": "甲公司营业部不构成背信运用受托财产罪", "C": "甲公司营业部构成背信运用受托财产罪", "D": "孟某构成操纵期货市场罪"}, "a": "ABD", "an": "甲公司营业部擅自运用高某账户进行投资，属于背信运用受托财产罪，不构成操纵期货市场罪。", "type": "multi"}, {"id": "cflue_zc_fl4.json_15", "q": "下列关于利用未公开信息交易罪立案追诉标准的说法，正确的是（）。", "c": {"A": "获利或者避免损失数额在100万元以上的", "B": "2年内3次以上利用未公开信息交易的", "C": "证券交易成交额累计在30万元以上的", "D": "期货交易占用保证金数额累计在20万元以上的"}, "a": "AB", "an": "利用未公开信息交易行为，涉嫌下列情形之一的，应予立案追诉：（1）获利或者避免损失数额在100万元以上的；（2）2年内3次以上利用未公开信息交易的；（3）明示、暗示3人以上从事相关交易活动的；（4）具有其他严重情节的。利用未公开信息交易，获利或者避免损失数额在50万元以上，或者证券交易成交额在500万元以上，或者期货交易占用保证金数额在100万元以上，同时涉嫌下列情形之一的，应予立案追诉：（1）以出售或者变相出售未公开信息等方式，明示、暗示他人从事相关交易活动的；（2）因证券、期货犯罪行为受过刑事追究的；（3）两年内因证券、期货违法行为受过行政处罚的；（4）造成其他严重后果的。", "type": "multi"}, {"id": "cflue_zc_fl4.json_16", "q": "依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列（）情形的，应予立案追诉。", "c": {"A": "在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的", "B": "虚增或者虚减利润达到当期披露的利润总额百分之二十以上的", "C": "多次提供虚假的或者隐瞒重要事实的财务会计报告的", "D": "致使公司发行的股票、公司债券被终止上市交易或者多次被暂停上市交易的"}, "a": "ACD", "an": "依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列情形之一的，应予立案追诉：（1）造成股东、债权人或者其他人直接经济损失数额累计在100万元以上的；（2）虚增或者虚减资产达到当期披露的资产总额30%以上的；（3）虚增或者虚减利润达到当期披露的利润总额【30%】以上的；（4）未按照规定披露的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额占净资产50%以上的；（5）致使公司发行的股票、公司债券或者国务院依法认定的其他证券被终止上市交易或者多次被暂停上市交易的；（6）致使不符合发行条件的公司、企业骗取发行核准并且上市交易的；（7）在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的；（8）多次提供虚假的或者隐瞒重要事实的财务会计报告，或者多次对依法应当披露的其他重要信息不按照规定披露的；（9）其他严重损害股东、债权人或者其他人利益，或者有其他严重情节的情形。", "type": "multi"}, {"id": "cflue_zc_fl4.json_17", "q": "下列关于背信运用受托财产罪的刑事追诉标准的说法，正确的是（）。", "c": {"A": "本罪的刑事追诉标准跟具体涉案金额数无关", "B": "本罪即使行为人多次擅自运用客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准", "C": "本罪即使涉案金额达不到标准，但多次擅自运用客户资金或者其他委托财产的，也满足刑事追诉的标准", "D": "本罪即使行为人擅自运用多个客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准"}, "a": "C", "an": "背信运用受托财产罪的刑事立案追诉标准：1、擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；1、虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用多个客户资金或者其他委托、信托的财产的；3、其他情节严重的情形。", "type": "single"}, {"id": "cflue_zc_fl4.json_18", "q": "某公司在招股说明书中隐瞒重要事实，发行股票非法募集资金金额500万元的，应予刑事立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，非法募集资金金额在【1000万元】以上的，应予立案追诉。", "type": "judge"}, {"id": "cflue_zc_fl4.json_19", "q": "期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。", "type": "judge"}, {"id": "cflue_zc_fl4.json_20", "q": "下列属于诱骗投资者买卖证券、期货合约罪主体范围的是（）。", "c": {"A": "证券交易所从业人员", "B": "银行从业人员", "C": "证券公司从业人员", "D": "期货经纪公司"}, "a": "ACD", "an": "诱骗投资者买卖证券、期货合约罪，是指证券交易所、期货交易所、证券公司、期货经纪公司的从业人员，证券业协会、期货业协会或者证券期货监管管理部门的工作人员，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为。", "type": "multi"}, {"id": "cflue_zc_fl4.json_22", "q": "操纵证券、期货市场，持有证券的流通股份数达到该证券实际流通股份总量30%以上，且在该证券连续20个交易日内连续买卖股份数累计达到该证券同期总成交量30%以上的，应予立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "持有或者实际控制证券的流通股份数量达到该证券的实际流通股份总量10%以上，实施刑法第一百八十二条第一款第一项操纵证券市场行为，连续10个交易日的累计成交量达到同期该证券总成交量20%以上的应予立案追诉。", "type": "judge"}, {"id": "cflue_zc_fl4.json_23", "q": "下列可以成为背信运用受托财产罪犯罪主体的是（）。", "c": {"A": "自然人", "B": "律师事务所", "C": "会计师事务所", "D": "期货经纪公司"}, "a": "D", "an": "背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。", "type": "single"}, {"id": "cflue_zc_fl4.json_24", "q": "根据《证券法》，下列关于公开发行证券的说法，正确的有（）。", "c": {"A": "报经国务院证券监督管理机构或者国务院授权的部门注册", "B": "符合法规、行政法规规定的条件", "C": "证券发行注册制的具体范围、实施步骤、由国务院证券监督管理机构规定", "D": "未经依法注册，任何单位和个人不得公开发行证券"}, "a": "ABD", "an": "公开发行证券，必须符合法律、行政法规规定的条件，并依法报经国务院证券监督管理机构或者国务院授权的部门核准；未经依法核准，任何单位和个人不得公开发行证券。注册制的具体范围、实施步骤由国务院规定，D错误。", "type": "multi"}, {"id": "cflue_zc_fl4.json_25", "q": "王某在2020年3月因证券违法行为受到过行政处罚，2022年9月其参与内幕交易获利30万元，其行为应予立案追诉。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "内幕交易获利或者避免损失数额在25万元以上，或者证券交易成交额在100万元以上，或者期货交易占用保证金数额在50万元以上，【同时】涉嫌下列情形之一的，应予立案追诉：（1）证券法规定的证券交易内幕信息的知情人实施或者与他人共同实施内幕交易行为的；（2）以出售或者变相出售内幕信息等方式，明示、暗示他人从事与该内幕信息相关的交易活动的；（3）因证券、期货犯罪行为受过刑事追究的；（4）2年内因证券、期货违法行为受过行政处罚的；（5）造成其他严重后果的。该题目，获利金额够，但受到行政处罚的时间超过两年，故按照规定，不予立案追诉。", "type": "judge"}, {"id": "cflue_zc_fl4.json_26", "q": "2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，利用管理该公司“某优选成长基金”账户而掌握有关投资决策、交易等方面信息的职务便利，使用其实际控制的“左某”证券账户，先于或同期于基金账户买入或卖出相同股票103支，买入金额共计人民币8067万元（以下币种均为人民币），卖出金额共计3841万元，获利金额共计18万元。根据该案例，回答以下问题：（1）李某的行为（）。", "c": {"A": "构成利用未公开信息交易罪", "B": "不构成犯罪", "C": "构成内幕交易罪", "D": "构成泄露内幕信息罪"}, "a": "A", "an": "利用未公开信息交易罪，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。根据该条规定，“未公开信息”是指金融机构从业人员及有关监管部门、行业协会工作人员，利用职务便利获取的，与证券、期货交易有关的内幕信息以外的其他未公开的信息。", "type": "multi"}, {"id": "cflue_zc_fl4.json_27", "q": "发行人违反《证券法》相关规定擅自改变公开发行证券所募集资金的用途的，对其直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "擅自改变公开发行证券所募集资金的用途的，责令改正，处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款。咪鸭课堂APP提醒：考核的是2020新《证券法》。", "type": "judge"}, {"id": "cflue_zc_fl4.json_28", "q": "根据《证券法》，收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处罚款十万元以上三十万元以下。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。", "type": "judge"}, {"id": "cflue_zc_fl5.json_1", "q": "下列关于执行《证券经营机构及其工作人员廉洁从业实施细则》的说法，不正确的是（）。", "c": {"A": "在证券业协会进行业务注册并接受协会自律管理的非证券期货经营机构在从事证券相关业务时应参照执行", "B": "已成为证券业协会会员的证券公司境内子公司应当执行", "C": "证券投资咨询公司可自行决定是否执行", "D": "证券资信评级公司在从事证券相关业务时应参照执行"}, "a": "C", "an": "证券经营机构是指证券公司及其境内子公司会员；工作人员是指以公司名义开展业务的人员，包括与公司建立劳动关系的正式员工、与公司签署委托协议的经纪人、劳务派遣至公司的其他人员等。证券投资咨询公司、证券资信评级公司等中国证券业协会（以下简称协会）会员，以及在协会进行业务注册或者备案并接受协会自律管理的其他机构及个人，在从事证券相关业务时参照本细则执行。", "type": "single"}, {"id": "cflue_zc_fl5.json_2", "q": "证券评级机构从事证券评级业务，应当制定科学的评级方法和完善的质量控制制度。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_fl5.json_3", "q": "被采取市场禁入措施的人员，应当遵循的规定包括（）。", "c": {"A": "由所在机构按规定程序解除其被禁止担任的职务", "B": "不得在任何公司担任董事、监事、高级管理人员职务", "C": "立即停止从事证券业务", "D": "立即停止履行上市公司董事、监事、高级管理人员职务"}, "a": "ACD", "an": "被采取证券市场禁入措施的人员：1、在禁入期间内，除不得继续在原机构从事证券业务或者担任原上市公司董事、监事、高级管理人员职务外，也不得在其他任何机构中从事证券业务或者担任其他上市公司董事、监事、高级管理人员职务。2、应当在收到中国证监会作出的证券市场禁入决定后，立即停止从事证券业务或者停止履行上市公司董事、监事、高级管理人员职务，并由其所在机构按规定的程序解除其被禁止担任的职务。", "type": "multi"}, {"id": "cflue_zc_fl5.json_4", "q": "机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员可按照所在机构内部程序向高级管理人员、中国证监会报告。", "c": {"A": "错", "B": "对"}, "a": "A", "an": "机构或者其管理人员对从业人员发出指令涉嫌违法违规的，从业人员应及时按照所在机构内部程序向高级管理人员或者董事会报告。机构未妥善处理的，从业人员应及时向中国证监会或者中国证券业协会报告。", "type": "judge"}, {"id": "cflue_zc_fl5.json_5", "q": "（3）保荐代表人违反《证券发行上市保荐业务管理办法》，中国证监会可以采取的监管措施包括（）。", "c": {"A": "重点关注", "B": "公开谴责", "C": "监管谈话", "D": "责令进行业务学习"}, "a": "ACD", "an": "保荐机构、保荐代表人、保荐业务负责人和内核负责人违反本办法，未诚实守信、勤勉尽责地履行相关义务的，中国证监会【责令改正，并对其采取监管谈话、重点关注、责令进行业务学习、出具警示函、责令公开说明、认定为不适当人选】等监管措施；依法应给予行政处罚的，依照有关规定进行处罚；情节严重涉嫌犯罪的，依法移送司法机关，追究其刑事责任。", "type": "multi"}, {"id": "cflue_zc_fl5.json_6", "q": "有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。", "c": {"A": "情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构，保荐代表人具体负责的推荐", "B": "中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施", "C": "情节严重的，中国证监会可以在6个月到24个月内不受理保荐机构，保荐代表人具体负责的推荐", "D": "中国证监会会视情节轻重，采取监管或者市场禁入措施"}, "a": "AB", "an": "保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施；情节严重的，中国证监会可以在3个月到12个月内不受理保荐机构、保荐代表人具体负责的推荐：1、制作或者出具的文件不齐备或者不符合要求；2、擅自改动申请文件、信息披露资料或者其他已提交文件；3、申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异；4、文件披露的内容表述不清，逻辑混乱，严重影响投资者理解；5、未及时报告或者未及时披露重大事项；6、指定不符合《办法》第四条规定要求的人员具体负责保荐工作；7、未通过内核程序，以公司名义对外提交或披露保荐业务项目文件；8、采取业务包干等承包方式或其他形式进行过度激励；9、以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。", "type": "multi"}, {"id": "cflue_zc_fl5.json_7", "q": "根据《证券业从业人员资格管理办法》，从事证券业务的专业人员不包括（）。", "c": {"A": "证券资信评估机构中从事证券资信评估业务的专业人员", "B": "信托机构业务部门的管理人员", "C": "证券公司从事证券经纪业务部门的管理人员", "D": "证券投资咨询机构从事证券投资咨询业务的专业人员"}, "a": "B", "an": "根据《证券业从业人员资格管理办法》，从事证券业务的专业人员是指：1.证券公司中从事自营、经纪、承销、投资咨询、受托投资管理等业务的专业人员，包括相关业务部门的管理人员；2.基金管理公司、基金托管机构中从事基金销售、研究分析、投资管理、交易、监察稽核等业务的专业人员，包括相关业务部门的管理人员；基金销售机构中从事基金宣传、推销、咨询等业务的专业人员，包括相关业务部门的管理人员；3.证券投资咨询机构中从事证券投资咨询业务的专业人员及其管理人员；4.证券资信评估机构中从事证券资信评估业务的专业人员及其管理人员；5.中国证监会规定需要取得从业资格和执业证书的其他人员。", "type": "single"}, {"id": "cflue_zc_fl5.json_8", "q": "下列关于证券公司对从事证券经纪业务相关人员的管理要求的说法，错误的是（）。", "c": {"A": "客户证券账户转托管和撤销指定交易等业务可由同一人完成操作与复核", "B": "涉及客户资金账户及证券账户的开立、信息修改、注销等业务应当一人操作、一人复核，复核应当留痕", "C": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制", "D": "涉及客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事前审批，事后复核，审批及复核均应留痕"}, "a": "A", "an": "与客户权益变动相关业务的经办人员之间，应当建立制衡机制。涉及客户资金账户及证券账户的开立、信息修改、注销，建立及变更客户资金存管关系，客户证券账户转托管和撤销指定交易等与客户权益直接相关的业务应当一人操作、一人复核，复核应当留痕。涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当事先审批，事后复核，审批及复核均应留痕。", "type": "single"}, {"id": "cflue_zc_fl5.json_9", "q": "证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在（）个工作日内，向中国证券业协会有关派出机构报告。", "c": {"A": "7", "B": "10", "C": "12", "D": "5"}, "a": "D", "an": "证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在【5】个工作日内，向中国证券业协会有关派出机构报告。", "type": "single"}, {"id": "cflue_zc_fl5.json_10", "q": "除财务顾问的法定代表人或者其授权代表人之外，应当在财务顾问专业意见上签名的还有（），并加盖财务顾问单位公章。", "c": {"A": "项目协办人", "B": "财务顾问主办人", "C": "部门负责人", "D": "内部核查机构负责人"}, "a": "ABCD", "an": "财务顾问的法定代表人或者其授权代表人、部门负责人、内部核查机构负责人、财务顾问主办人和项目协办人应当在财务顾问专业意见上签名，并加盖财务顾问单位公章。", "type": "multi"}, {"id": "cflue_zc_fl5.json_11", "q": "下列属于证券行业文化建设的基本要求的有（）。", "c": {"A": "坚持稳健经营，促进健康发展", "B": "坚持廉洁自律，弘扬清风正气", "C": "牢记社会责任，展现良好形象", "D": "坚持创新精神，提升服务能力"}, "a": "ABC", "an": "行业文化建设的基本要求：1、坚持依法合规，筑牢发展基础；2、坚持诚实守信，恪守职业操守；3、坚持专业精神，提升服务能力；4、坚持稳健经营，促进健康发展；5、坚持廉洁自律，弘扬清风正气；6、牢记社会责任，展现良好形象。", "type": "multi"}, {"id": "cflue_zc_fl5.json_12", "q": "财务顾问应当建立健全内部报告制度，并对证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由（）签名，并加盖财务顾问单位签章。", "c": {"A": "财务顾问主办人", "B": "部门负责人", "C": "项目协办人", "D": "财务顾问的法定代表人或者其授权代表人"}, "a": "ACD", "an": "财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核査机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人签名，并加盖财务顾问单位公章。", "type": "multi"}, {"id": "cflue_zc_fl5.json_13", "q": "根据《关于证券业从业人员登记管理有关事项的通知》，下列关于证券业从业人员的登记程序的说法，错误的是（）。", "c": {"A": "从业人员所从事的业务类别或其他重要登记信息发生变化的，所在机构应当自发生变化之日起7个工作日内办理变更登记", "B": "从业人员所在机构应当自从业人员入职（不含试用期）之日起7个工作日内，通过中国证券业协会从业人员管理平台办理登记", "C": "从业人员离职的，所在机构应当自劳动关系（或委托代理关系）解除之日起7个工作日内办理注销登记", "D": "从业人员登记信息不完备或不符合规定要求的，中国证券业协会通知从业人员所在机构及时补正"}, "a": "B", "an": "从业人员应当通过所在机构进行登记，机构应当自从业人员入职（含试用期）之日起7个工作日内，通过协会从业人员管理平台，将经本机构审核过的从业人员登记信息提交至协会进行登记。", "type": "single"}, {"id": "cflue_zc_fl5.json_14", "q": "下列关于证券投资咨询业务的说法，错误的是（）。", "c": {"A": "证券投资顾问业务按照约定，可以辅助客户作出投资决策，并直接获取经济利益", "B": "证券投资咨询业务中可以与投资人约定分享投资收益、分担投资损失", "C": "证券投资咨询可以接受投资人委托，提供有偿证券投资咨询服务", "D": "证券投资咨询业务包括证券投资顾问业务及发布证券研究报告"}, "a": "B", "an": "不得向投资人承诺证券投资收益；与投资人约定分享投资收益或者分担投资损失。", "type": "single"}, {"id": "cflue_zc_fl5.json_15", "q": "根据《证券期货经营机构及其工作人员廉洁从业规定》，下列关于廉洁从业的说法，错误的是（）。", "c": {"A": "廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，严格遵守法律法规、中国证监会的规定和行业自律规则", "B": "廉洁从业要求证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，遵守社会公德、商业道德、职业道德和行为规范", "C": "证券期货经营机构承担廉洁从业风险防控主体责任，证券期货经营机构股东（大）会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任", "D": "证券期货经营机构主要负责人是落实廉洁从业管理职责的第一责任人，各级负责人在职责范围内承担相应管理责任"}, "a": "C", "an": "董事会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任。", "type": "single"}, {"id": "cflue_zc_fl5.json_16", "q": "证券期货经营机构及其工作人员违反《证券期货经营机构及其工作人员廉洁从业规定》，有下列（）情形的，中国证监会应当从重处理。", "c": {"A": "连续或者多次违反该规定", "B": "直接、间接或唆使、协助他人向监管人员输送利益", "C": "涉及金额较大或涉及人员较多、产生恶劣社会影响", "D": "曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反该规定"}, "a": "ABCD", "an": "从重处理的情形：1、直接、间接或者唆使、协助他人向监管人员输送利益；2、连续或者多次违反本规定；3、涉及金额较大或者涉及人员较多；4、产生恶劣社会影响；5、曾为公职人员特别是监管人员，以及曾任证券期货经营机构合规风控职务的人员违反本规定；6、中国证监会认定应当从重处理的其他情形。", "type": "multi"}, {"id": "cflue_zc_fl5.json_17", "q": "（2）根据《证券发行上市保荐业务管理办法》，下列关于保荐代表人应具备的条件，错误的是（）。", "c": {"A": "最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施", "B": "保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识", "C": "最近12个月持续从事保荐相关业务", "D": "最近5年内具备24个月以上保荐相关业务经历"}, "a": "D", "an": "保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备【36个月】以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近3年未受到证券交易所等自律组织的重大纪律处分或者中国证监会的行政处罚、重大行政监管措施。", "type": "multi"}, {"id": "cflue_zc_fl5.json_18", "q": "向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券公司中间介绍业务，应当经中国证监会许可，取得相关业务资格。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，取得证券投资咨询业务资格。", "type": "judge"}, {"id": "cflue_zc_fl5.json_19", "q": "根据《关于加强证券经纪业务管理的规定》，证券公司技术人员可以从事客户账户及客户资金存管业务活动。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据《关于加强证券经纪业务管理的规定》，从事【技术】、风险监控、合规管理的人员不得从事营销、客户账户及客户资金存管等业务活动。", "type": "judge"}, {"id": "cflue_zc_fl5.json_20", "q": "委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部控制审批程序，协议中应明确约定（）。", "c": {"A": "服务期限", "B": "费用标准", "C": "服务内容", "D": "法律法规"}, "a": "ABC", "an": "证券经营机构应当加强对第三方机构或者个人有偿支付的管理。委托、聘用第三方机构或者个人提供投资顾问、财务顾问、产品代销、专业咨询等服务，应当明确第三方的资质条件，事先签署服务协议，履行内部审批程序，协议中应明确约定【服务内容、服务期限以及费用标准】等。", "type": "multi"}, {"id": "cflue_zc_fl5.json_21", "q": "根据《上市公司并购重组财务顾问业务管理办法》，证券公司从事上市公司并购重组财务顾问业务，以下属于应当具备的条件的是（）。", "c": {"A": "实缴注册资本和净资产不低于人民币500万元", "B": "最近2年每年财务顾问业务收入不低于100万元 }

function resetAll() { getQs().forEach(function(item){ delete state[item.idx]; delete selected[item.idx]; }); saveState(); renderStats(); renderQuestions(); }
function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
renderSectionView();
</script>
