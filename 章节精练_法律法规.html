: "根据《合伙企业法》，关于特殊普通合伙企业的说法，不正确的有（）。", "c": {"A": "一个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任", "B": "合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任", "C": "特殊的普通合伙企业名称中可以标明“特殊普通合伙”字样", "D": "以专业知识和专门技能为客户提供有偿服务的专业服务机构，可以设立为特殊的普通合伙企业"}, "a": "C", "an": "以专业知识和专门技能为客户提供有偿服务的专业服务机构，可以设立为特殊的普通合伙企业。特殊的普通合伙企业名称中【应当】标明“特殊普通合伙”字样，B错误，在法律术语中，应当是必须的意思表示。1个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任。合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任。", "type": "single"}, {"id": "cflue_zc_fl1a.json_8", "q": "《证券公司合规管理实施指引》属于部门规章。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "中国证券业协会制定的自律规则，如《中国证券业协会会员管理办法》《证券公司合规管理实施指引》《证券公司柜台交易业务规范》《证券公司另类投资子公司管理规范》《证券公司私募投资基金子公司管理规范》《发布证券研究报告执业规范》等。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_9", "q": "根据《合伙企业法》，下列关于有限合伙企业事务执行的说法，错误的是（）。", "c": {"A": "执行事务合伙人可以要求在合伙协议中确定执行事务的报酬及报酬提取方式", "B": "有限合伙企业由普通合伙人执行合伙事务", "C": "有限合伙人参与选择承办有限合伙企业审计业务的会计师事务所，视为执行合伙事务", "D": "有限合伙人不执行合伙事务，不得对外代表有限合伙企业"}, "a": "C", "an": "有限合伙人不执行合伙事务，不得对外代表有限合伙企业。有限合伙人的下列行为，不视为执行合伙事务：参与决定普通合伙人入伙、退伙；对企业的经营管理提出建议；参与选择承办有限合伙企业审计业务的会计师事务所；获取经审计的有限合伙企业财务会计报告；对涉及自身利益的情况，查阅有限合伙企业财务会计账簿等财务资料；在有限合伙企业中的利益受到侵害时，向有责任的合伙人主张权利或者提起诉讼；执行事务合伙人怠于行使权利时，督促其行使权利或者为了本企业的利益以自己的名义提起诉讼；依法为本企业提供担保。", "type": "single"}, {"id": "cflue_zc_fl1a.json_10", "q": "下列有关公积金的说法，错误的是（）。", "c": {"A": "公司的法定公积金不足弥补以前年度亏损的，在提取法定公积金之前，应当先用当年利润弥补亏损", "B": "法定公积金转为资本时，所留存的该项公积金不得少于转增前公司注册资本的30%", "C": "公司法定公积金累计额为公司注册资本的50%以上的，可以不再提取", "D": "公司应当提取税后利润的10%列入公司法定公积金"}, "a": "B", "an": "法定公积金转为资本时，所留存的该项公积金不得少于转增前公司注册资本的25%。选项B、C、D说法正确。", "type": "single"}, {"id": "cflue_zc_fl1a.json_11", "q": "关于法的国家意志性，下列说法正确的有（）。", "c": {"A": "法对人们的行为或者社会关系具有指引、评价、预测、教育及强制的作用", "B": "在国家主权范围内法具有高度的统一性与最高的权威性", "C": "国家将之前司法机关对具体案件的裁决赋予其普遍使用的效力属于法的认可", "D": "法的制定，是指由国家司法机关按照法定程序创制规范性法律文件的活动"}, "a": "BC", "an": "法的制定，是指由国家【立法】机关按照法定程序创制规范性法律文件的活动，A错误。法的规范性是法的基本特征，正是基于法的规范性，使法对人们的行为或社会关系具有指引、评价、预测、教育及强制的作用。C错误。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_12", "q": "公司应当自作出合并决议之日起30日内通知债权人，并于30日内在报纸上公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司应当自作出合并、分立决议之日起【10日内】通知债权人，并于30日内在报纸上公告。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_13", "q": "公司作出合并决议，按照规定通知债权人并予以公告后，债权人自接到通知书之日起30日内有权要求公司清偿债务或提供相应担保。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "债权人接到通知书之日起30日内，未接到通知书的自公告之日起45日内，有权要求公司清偿债务或者提供相应的担保。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_14", "q": "纵向法律关系是指在不平等的法律主体之间所建立的权力服从关系，属于典型的纵向法律关系的是行政法律关系。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "按照法律主体在法律关系中的地位不同，可以将法律关系分为纵向法律关系与横向法律关系。纵向法律关系是指在不平等的法律主体之间所建立的权力服从关系，又称为“隶属法律关系”。【行政法律】关系是典型的纵向法律关系。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_15", "q": "根据《公司法》，公司股东可以在一定的期限内请求人民法院撤销决议的情形包括（）。", "c": {"A": "股东会或者股东大会的决议内容违反公司章程", "B": "股东会或者股东大会的会议召集程序违反法律、行政法规规定", "C": "董事会的决议内容违反公司章程", "D": "董事会的表决方式违反法律、行政法规规定"}, "a": "ABCD", "an": "公司股东会或者股东大会、董事会的决议内容违反法律、行政法规的无效。股东会或者股东大会、董事会的会议召集程序、表决方式违反法律、行政法规或者公司章程，或者决议内容违反公司章程的，股东可以自决议作出之日起六十日内，请求人民法院撤销。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_16", "q": "公司享有法人财产权，应对公司债务承担有限清偿责任。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产为限对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_17", "q": "下列关于股东滥用权利的说法，正确的是（）。", "c": {"A": "公司股东会或者股东大会决议内容违反公司章程的，股东可以请求人民法院撤销", "B": "公司股东滥用股东权利给公司造成损失的，股东应当对公司承担赔偿责任", "C": "公司股东滥用股东权利给其他股东造成损失的，受损害的股东有权要求股东直接承担赔偿责任", "D": "公司的实际控制人利用关联关系损害公司利益，给公司造成损失的，公司有权要求实际控制人承担赔偿责任"}, "a": "ABCD", "an": "公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司的控股股东、实际控制人、董事、监事、高级管理人员不得利用其关联关系损害公司利益。违反前款规定，给公司造成损失的，应当承担赔偿责任。股东会或者股东大会、董事会的会议召集程序、表决方式违反法律、行政法规或者公司章程，或者决议内容违反公司章程的，股东可以自决议作出之日起六十日内，请求人民法院撤销。公司根据股东会或者股东大会、董事会决议已办理变更登记的，人民法院宣告该决议无效或者撤销该决议后，公司应当向公司登记机关申请撤销变更登记。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_18", "q": "公司作为企业法人，具有以自有财产独立对外承担各种责任的能力。这种责任能力的基础在于公司享有法人财产权。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_19", "q": "下列对于公司章程的描述，说法错误的是（）。", "c": {"A": "公司章程是公司成立的必要条件", "B": "公司章程仅对普通员工有效，对公司股东、董事、高级管理人员没有约束力", "C": "公司章程是公司治理的重要依据", "D": "公司章程是一种自治性规则"}, "a": "B", "an": "公司章程是公司组织或活动的基本准则，它对公司、股东、董事、监事、高级管理人员具有同样的约束力。", "type": "single"}, {"id": "cflue_zc_fl1a.json_20", "q": "个别合伙因重大过失造成企业债务的，应当以其在合伙企业中的财产份额为限承担责任。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "1个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任。合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任。合伙人执业活动中因故意或者重大过失造成的合伙企业债务，以合伙企业财产对外承担责任后，该合伙人应当按照合伙协议的约定对合伙企业造成的损失承担赔偿责任。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_21", "q": "我国《公司法》适用的公司种类包括（）。", "c": {"A": "两合公司", "B": "股份有限公司", "C": "无限责任公司", "D": "有限责任公司"}, "a": "BD", "an": "根据我国《公司法》规定，公司包括有限责任公司和股份有限公司两种类型。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_22", "q": "股份有限公司的设立，可以采取发起设立或募集设立的方式，募集设立，是指发行人认购公司发行股份的一部分，其余股份向特定对象募集而设立公司。以募集设立方式设立股份有限公司的，发起人认购的股份不得少于公司股份总数的25%。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "发起人认购的股份不得少于公司股份总数的35%，但是法律、行政法规另有规定的，从其规定。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_23", "q": "根据《公司法》，有限责任公司由五十个以下股东出资设立。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "设立有限责任公司，应当具备下列条件：（1）股东符合法定人数，有限责任公司由【50】个以下股东出资设立；（2）有符合公司章程规定的全体股东认缴的出资额；（3）股东共同制定公司章程；（4）有公司名称，建立符合有限责任公司要求的组织机构；（5）有公司住所。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_24", "q": "根据《合伙企业法》，关于普通合伙企业利润分配原则，下列说法错误的是（）。", "c": {"A": "按照合伙协议的约定办理", "B": "合伙人协商不成的，由合伙人按照实缴出资比例分配", "C": "合伙协议未约定或者约定不明确的，由合伙人协商确定", "D": "合伙协议可以约定将全部利润分配给部分合伙人"}, "a": "D", "an": "普通合伙企业的出资人【不得】在合伙协议中约定将全部利润分配给部分合伙人，或由部分合伙人承担企业的全部亏损；而有限合伙企业根据合伙协议的约定可以将全部利润分配给部分合伙人，但不得约定企业全部亏损由部分合伙人承担。", "type": "single"}, {"id": "cflue_zc_fl1a.json_25", "q": "根据《证券法》，证券的发行、交易活动，必须遵循公允、合理、客观的原则。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券的发行、交易活动，必须遵循公开、公平、公正的“三公”原则。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_26", "q": "以下关于合伙协议的订立形式与基本原则的说法，错误的是（）。", "c": {"A": "订立合伙协议应当遵循自愿、平等、公平、诚实信用原则", "B": "合伙协议必须以书面形式订立", "C": "合伙企业设立时，合伙协议由执行事务合伙人协商一致", "D": "订立合伙协议，是平等民事主体合伙人之间的民事活动"}, "a": "C", "an": "合伙企业设立时，合伙协议应由【全体合伙人】协商一致，且必须以书面形式订立。", "type": "single"}, {"id": "cflue_zc_fl1a.json_27", "q": "根据合伙人对合伙企业债务承担责任的不同，合伙企业可分为人合合伙企业、资合合伙企业。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据合伙人对合伙企业债务承担的责任不同，合伙企业可分为普通合伙企业和有限合伙企业。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_28", "q": "合伙人发生当然退伙情形的，退伙生效日为退伙事由实际发生之日。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "合伙人当然退伙的，退伙事由实际发生之日为退伙生效日。", "type": "judge"}, {"id": "cflue_zc_fl1a.json_29", "q": "下列属于有限责任公司监事会职权的有（）。", "c": {"A": "向股东会会议提出提案", "B": "检查公司财务", "C": "罢免董事、高级管理人员", "D": "提议召开临时股东会会议"}, "a": "ABD", "an": "根据公司法的规定，监事会、不设监事会的公司的监事行使下列职权：1、检查公司财务；2、对董事、高级管理人员执行公司职务的行为进行监督，对违反法律、行政法规、公司章程或者股东会决议的董事、高级管理人员提出罢免的建议；3、当董事、高级管理人员的行为损害公司的利益时，要求董事、高级管理人员予以纠正；4、提议召开临时股东会会议，在董事会不履行本法规定的召集和主持股东会会议职责时召集和主持股东会会议；5、向股东会会议提出提案；6、依照公司法的规定，对董事、高级管理人员提起诉讼；7、公司章程规定的其他职权。", "type": "multi"}, {"id": "cflue_zc_fl1a.json_30", "q": "甲公司是一家有限责任公司，下列有关该公司的说法中，错误的是（）。", "c": {"A": "董事李某任期内辞职导致董事会成员低于法定人数，在改选出的董事就任前，李某仍应当按照法律、行政法规和公司章程的规定，履行董事职务", "B": "董事张某任期5年", "C": "甲公司决定不设副董事长", "D": "甲公司股东人数只有3人，规模较小，决定不设董事会"}, "a": "B", "an": "董事任期由公司章程规定，每届任期不得超过3年，董事张某任期5年超过公司章程规定。", "type": "single"}, {"id": "cflue_zc_fl1a.json_31", "q": "我国证券市场法律法规体系，是以（）为核心的。", "c": {"A": "《证券投资基金法》", "B": "《证券法》", "C": "《公司法》", "D": "《刑法》"}, "a": "B", "an": "我国证券市场法律法规体系，是以《证券法》为核心。", "type": "single"}, {"id": "cflue_zc_fl1a.json_32", "q": "下列关于有限责任公司股权转让的说法，错误的是（）。", "c": {"A": "人民法院依照法律规定的强制执行程序转让股东的股权时，其他股东自人民法院通知之日起满20日不行使优先购买权的，视为放弃优先购买权", "B": "股东转让股权后，公司应修改公司章程，此项修改需要股东会表决通过", "C": "自然人股东死亡后，其合法继承人可以继承股东资格，但是公司章程另外有规定的除外", "D": "除公司章程另外有规定外，股东向股东以外的人转让股权的，应当经其他股东过半数同意"}, "a": "B", "an": "转让股权后，公司应当注销原股东的出资证明书，向新股东签发出资证明书，并相应修改公司章程和股东名册中有关股东及其出资额的记载。对公司章程的该项修改【不需】再由股东会表决，故A错误。", "type": "single"}, {"id": "cflue_zc_fl1a.json_33", "q": "股份有限公司董事、监事、高级管理人员应当向公司申报所持有的本公司股权及其变动情况，在任职期间每年转让的股份不得超过其所持有本公司股份总数的（）。", "c": {"A": "25%", "B": "35%", "C": "20%", "D": "30%"}, "a": "A", "an": "公司董事、监事、高级管理人员应当向公司申报所持有的本公司股权及其变动情况，在任职期间每年转让的股份不得超过其所持有本公司股份总数的25%。", "type": "single"}, {"id": "cflue_zc_fl1a.json_34", "q": "根据《合伙企业法》，下列关于合伙企业的表述，错误的是（）。", "c": {"A": "对合伙企业债务承担责任", "B": "是经营性组织", "C": "财产不属于合伙人共有", "D": "共同出资，共担风险，共享收益"}, "a": "C", "an": "合伙企业及其合伙人的合法财产及其权益受法律保护，归属于合伙人共有。", "type": "single"}, {"id": "cflue_zc_fl1a.json_35", "q": "下列关于股份发行公平、公正原则的说法，不正确的有（）。", "c": {"A": "同次发行的同种类股票，每股的发行条件应当相同", "B": "同次发行的同种类股票，每股的发行价格应当相同", "C": "因机构认购股份数额较大，其每股支付的价款，可以低于个人", "D": "同种类的每一股份应当具有同等权利"}, "a": "C", "an": "股份的发行，实行公平、公正的原则，同种类的每一股份应当具有同等权利。同次发行的同种类股票，每股的发行条件和价格应当相同；任何单位或者个人所认购的股份，每股应当支付【相同】价额。D错误。", "type": "single"}, {"id": "cflue_zc_fl1b.json_1", "q": "证券的代销、包销期限最长不得超过（）日。", "c": {"A": "45", "B": "30", "C": "180", "D": "90"}, "a": "D", "an": "证券的代销、包销期限最长不得超过90日。", "type": "single"}, {"id": "cflue_zc_fl1b.json_2", "q": "设立管理公开募集基金的基金管理公司，注册资本不低于法定要求，且资本金可以认缴出资。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据《证券投资基金法》第十三条的规定，设立管理公开募集基金的基金管理公司，应当具备的条件之一：注册资本不低于1亿元人民币，且必须为实缴货币资本。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_3", "q": "下列关于上市公司收购方式的说法，错误的是（）。", "c": {"A": "采取要约收购方式的，收购人在收购期限内不得采取要约规定以外的形式和超出要约的条件买入被收购公司的股票", "B": "采取要约收购方式的，收购人在收购期限内不得卖出被收购公司的股票", "C": "收购要约约定的收购期限不得少于30日，并不得超过60日", "D": "采取协议收购方式的，协议双方必须委托证券登记结算机构保管协议转让的资金"}, "a": "D", "an": "采取协议收购方式的，协议双方可以临时委托证券登记结算机构保管协议转让的股票，并将资金存放于指定的银行。", "type": "single"}, {"id": "cflue_zc_fl1b.json_4", "q": "根据《证券公司监督管理条例》，证券公司未按照规定与客户签订业务合同，中国证监会可以采取的措施是（）。", "c": {"A": "责令定期报告", "B": "责令公开说明", "C": "责令改正", "D": "出具警示函"}, "a": "C", "an": "根据《证券公司监督管理条例》规定，证券公司未指定专人向客户讲解有关业务规则和合同内容，并以书面方式向其揭示投资风险或未按照规定与客户签订业务合同，或者未在与客户签订的业务合同中载入规定的必备条款的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。", "type": "single"}, {"id": "cflue_zc_fl1b.json_5", "q": "下列不属于期货交易所职责的是（）。", "c": {"A": "提供交易的场所、设施和服务", "B": "为期货交易提供集中履约担保", "C": "设计合约，安排合约上市", "D": "直接或间接参与期货交易"}, "a": "D", "an": "期货交易所履行下列职责：1.提供交易的场所、设施和服务；2.设计合约，安排合约上市；3.组织并监督交易、结算和交割；4.为期货交易提供集中履约担保；5.按照章程和交易规则对会员进行监督管理；6.国务院期货监督管理机构规定的其他职责。", "type": "single"}, {"id": "cflue_zc_fl1b.json_6", "q": "下列选项中，不属于基金管理人职责的是（）。", "c": {"A": "对基金份额持有人大会审议事项行使表决权", "B": "进行基金会计核算并编制基金财务会计报告", "C": "保存基金财产管理业务活动的记录、账册、报表和其他相关资料", "D": "按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益"}, "a": "A", "an": "公开募集基金的基金管理人应当履行下列职责：（一）依法募集资金，办理基金份额的发售和登记事宜；（二）办理基金备案手续；（三）对所管理的不同基金财产分别管理、分别记账，进行证券投资；（四）按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益；（五）进行基金会计核算并编制基金财务会计报告；（六）编制中期和年度基金报告；（七）计算并公告基金资产净值，确定基金份额申购、赎回价格；（八）办理与基金财产管理业务活动有关的信息披露事项；（九）按照规定召集基金份额持有人大会；（十）保存基金财产管理业务活动的记录、账册、报表和其他相关资料；（十一）以基金管理人名义，代表基金份额持有人利益行使诉讼权利或者实施其他法律行为。", "type": "single"}, {"id": "cflue_zc_fl1b.json_7", "q": "合格投资者投资于单只混合类产品的金额不低于（）万元。", "c": {"A": "100", "B": "50", "C": "30", "D": "40"}, "a": "D", "an": "合格投资者投资于单只混合类产品的金额【不低于40万元】。", "type": "single"}, {"id": "cflue_zc_fl1b.json_8", "q": "根据《期货交易管理条例》，有下列情形之一，自被解除职务或被撤销资格之日起未逾5年，则不得担任期货交易所的负责人、财务会计的人员包括（）。", "c": {"A": "因违法行为或者违纪行为被撤销资格的律师", "B": "因违法行为或者违纪行为被撤销资格的资产评估机构的专业人员", "C": "因违法行为或者违纪行为被解除职务的期货交易所的负责人", "D": "因违法行为或者违纪行为被解除职务的证券公司董事"}, "a": "ABCD", "an": "有下列情形之一的人员不得担任期货交易所的负责人、财务会计人员：①因违法行为或者违纪行为被解除职务的期货交易所、证券交易所、证券登记结算机构的负责人，或者期货公司、证券公司的董事、监事、高级管理人员，以及国务院期货监督管理机构规定的其他人员，自被解除职务之日起未逾5年。②因违法行为或者违纪行为被撤销资格的律师、注册会计师或者投资咨询机构、财务顾问机构、资信评级机构、资产评估机构、验证机构的专业人员，自被撤销资格之日起未逾5年。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_9", "q": "关于证券公司的合并、分立、停业，下列说法错误的是（）。", "c": {"A": "证券公司的合并、分立、停业，必须经国务院证券监督管理机构批准", "B": "证券公司出现重大风险，严重危害证券市场秩序、损害投资者利益的，国务院证券监督管理机构可以对该证券公司采取责令停业整顿、接管等监管措施", "C": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，在受理之日起30个工作日内作出批准或者不予批准的书面决定", "D": "证券公司停止全部证券业务，应当在国务院证券监督管理机构指定的报刊上进行公告"}, "a": "C", "an": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，并在自受理之日起【3个月内】作出批准或者不予批准的书面决定。证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起30个工作日作出批准或者不予批准的书面决定。", "type": "single"}, {"id": "cflue_zc_fl1b.json_10", "q": "下列四家证券公司的净资本，符合《证券公司风险控制指标管理办法》要求的有（）。", "c": {"A": "丁证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营业务，其净资本为人民币3亿元", "B": "丙证券公司经营证券经纪业务，同时经营证券资产管理业务，其净资本为人民币2亿元", "C": "乙证券公司经营证券承销与保荐业务，其净资本为人民币1亿元", "D": "甲证券公司仅经营证券经纪业务，其净资本为人民币1000万元"}, "a": "ABC", "an": "证券公司经营证券经纪业务的，其净资本不得低于人民币2000万元。证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币5000万元。证券公司经营证券经纪业务，同时经营证券承销与保荐、证券自营、证券资产管理、其他证券业务等业务之一的，其净资本不得低于人民币1亿元。证券公司经营证券承销与保荐、证券自营、证券资产管理、其他证券业务中两项及两项以上的，其净资本不得低于人民币2亿元。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_11", "q": "封闭式基金的基金份额总额在基金合同期限内固定不变。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "采用开放式运作方式的基金，是指基金份额总额不固定，基金份额可以在基金合同约定的时间和场所申购或者赎回的基金。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_12", "q": "根据《证券公司风险处置条例》，下列关于证券公司被接管的说法，错误的是（）。", "c": {"A": "国务院证券监督管理机构决定对证券公司进行接管的，被接管证券公司股东会或者股东大会、董事会、监事会以及经理、副经理停止履行职责", "B": "证券公司治理混乱、管理失控，情节严重的，国务院证券监督管理机构可以对该证券公司进行接管", "C": "行政接管是监管部门对经营存在严重问题的证券公司介入，全面接收和管理其债权债务和业务经营，防止其经营风险进一步恶化的行政强制措施", "D": "接管期限届满，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过6个月"}, "a": "D", "an": "接管期限一般不超过12个月。满12个月，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过12个月。", "type": "single"}, {"id": "cflue_zc_fl1b.json_13", "q": "根据《证券投资基金法》，公开募集基金管理人的下列行为中，正确的是（）。", "c": {"A": "短期挪用基金财产后归还", "B": "向基金份额持有人承诺承担损失", "C": "将基金管理人固有财产混同于基金财产从事证券投资", "D": "公平地对待其管理的不同基金财产"}, "a": "D", "an": "略。", "type": "single"}, {"id": "cflue_zc_fl1b.json_14", "q": "设立管理公开募集基金的基金管理公司，应当具备的条件正确的有（）。", "c": {"A": "取得基金从业资格的人员达到法定人数", "B": "注册资本不低于1亿元人民币，且必须为实缴货币资本", "C": "有符合《证券法》和《公司法》规定的章程", "D": "董事、监事、高级管理人员具备相应的任职条件"}, "a": "ABD", "an": "设立管理公开募集基金的基金管理公司，应当具备的条件有：1、有符合《证券投资基金法》和《公司法》规定的章程；（D错误）2、注册资本不低于1亿元人民币，且必须为实缴货币资本；3、主要股东应当具有经营金融业务或者管理金融机构的良好业绩、良好的财务状况和社会信誉，资产规模达到国务院规定的标准，最近3年没有违法记录；4、取得基金从业资格的人员达到法定人数；5、董事、监事、高级管理人员具备相应的任职条件；6、有符合要求的营业场所、安全防范设施和与基金管理业务有关的其他设施；7、有良好的内部治理结构、完善的内部稽核监控制度、风险控制制度。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_15", "q": "要约收购人甲公司拟要约收购上市公司乙股份，根据上市公司乙披露的“要约收购报告书”，甲公司发出要约收购前持有乙公司15万股股份，约占乙公司总股本的28%。本次为甲公司向除甲公司以外的乙公司全体股东发出的部分要约收购，要约价格为21元/股，要约收购股份数量为12000股，要约收购期限为30个自然日。根据该案例，回答以下问题：（1）根据《证券法》，下列关于上市公司收购的说法，正确的有（）。", "c": {"A": "在收购要约确定的承诺期限内，收购人可以撤销其收购要约", "B": "甲公司可以采取要约收购、协议收购及其他合法方式收购上市公司乙", "C": "收购要约提出的各项收购条件，适用于被收购公司的所有股东", "D": "上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件"}, "a": "BCD", "an": "在收购要约确定的承诺期限内，收购人不得撤销其收购要约。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_16", "q": "通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一个上市公司已发行股权达到（）时，应当在该事实发生之日起3日内向国务院证券监督管理机构及证券交易所做出书面报告，通知该上市公司，并予公告。", "c": {"A": "15%", "B": "30%", "C": "10%", "D": "5%"}, "a": "D", "an": "通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有个上市公司已发行股权达到【5%】应当在该事实发生之日起【3日内】向国务院证券监督管理机构及证券交易所做出书面报告，通知该上市公司，并予公告。", "type": "single"}, {"id": "cflue_zc_fl1b.json_17", "q": "下列情形中，需经国务院证券监督管理机构批准的有（）。", "c": {"A": "证券公司合并", "B": "聘任会计师事务所", "C": "证券公司变更业务范围", "D": "证券公司分立"}, "a": "ACD", "an": "证券公司设立、收购或者撤销分支机构，变更业务范围，增加注册资本且股权结构发生重大调整，减少注册资本，变更持有百分之五以上股权的股东、实际控制人，变更公司章程中的重要条款，合并、分立、停业、解散、破产，必须经国务院证券监督管理机构批准。前款所称公司章程中的重要条款，是指规定下列事项的条款：1、证券公司的名称、住所；2、证券公司的组织机构及其产生办法、职权、议事规则；3、证券公司对外投资、对外提供担保的类型、金额和内部审批程序；4、证券公司的解散事由与清算办法；5、国务院证券监督管理机构要求证券公司章程规定的其他事项。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_18", "q": "私募基金管理人及其从业人员从事私募基金业务，不得（）。", "c": {"A": "将其固有财产或者他人财产与基金财产做到完全隔离", "B": "按照规定履行职责", "C": "从事内幕交易、操纵交易价格", "D": "公平地对待其管理的不同基金财产"}, "a": "C", "an": "私募基金管理人及其从业人员从事私募基金业务，不得有以下行为：（1）将其固有财产或者他人财产混同于基金财产从事投资活动；（2）不公平地对待其管理的不同基金财产；（3）利用基金财产或者职务之便，为本人或者投资者以外的人牟取利益，进行利益输送；（4）侵占、挪用基金财产；（5）泄露因职务便利获取的未公开信息，利用该信息从事或者明示、暗示他人从事相关的交易活动；（6）从事损害基金财产和投资者利益的投资活动；（7）玩忽职守，不按照规定履行职责；（8）从事内幕交易、操纵交易价格及其他不正当交易活动。除上述禁止行为以外，私募基金管理人及其从业人员也不得从事法律、行政法规和中国证监会规定禁止的其他行为。", "type": "single"}, {"id": "cflue_zc_fl1b.json_19", "q": "根据《证券法》，持有公司5%以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员等均属于证券交易内幕信息的知情人员。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "证券交易内幕信息的知情人包括：（1）发行人的董事、监事、高级管理人员；（2）持有公司【5%】以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员；（3）发行人控股的公司及其董事、监事、高级管理人员；（4）由于所任公司职务可以获取公司有关内幕信息的人员；（5）证券监督管理机构工作人员以及由于法定职责对证券的发行、交易进行管理的其他人员；（6）保荐人、承销的证券公司、证券交易所、证券登记结算机构、证券服务机构的有关人员；（7）国务院证券监督管理机构规定的其他人。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_20", "q": "证券投资基金托管人应当履行的职责包括（）。", "c": {"A": "按照规定开设基金财产的资金账户和证券账户", "B": "按照规定召集基金份额持有人大会", "C": "负责办理基金名下的资金往来", "D": "复核、审查基金管理人计算的基金资产净值"}, "a": "ABD", "an": "基金托管人应当履行下列职责：（1）安全保管基金财产；（2）按照规定开设基金财产的资金账户和证券账户；（3）对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立；（4）保存基金托管业务活动的记录、账册、报表和其他相关资料；（5）按照基金合同的约定，根据基金管理人的投资指令，及时办理清算、交割事宜；（6）办理与基金托管业务活动有关的信息披露事项；（7）对基金财务会计报告、中期和年度基金报告出具意见；（8）复核、审查基金管理人计算的基金资产净值和基金份额申购、赎回价格；（9）按照规定召集基金份额持有人大会；（10）按照规定监督基金管理人的投资运作；（11）国务院证券监督管理机构规定的其他职责。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_21", "q": "根据《中华人民共和国证券法》，下列关于禁止虚假陈述、信息误导行为的说法，错误的是（）。", "c": {"A": "禁止证券交易场所、证券公司、证券登记结算机构、证券服务机构及从业人员，在证券交易活动中作出虚假陈述或者信息误导", "B": "禁止任何单位和个人编造、传播虚假信息或者误导性信息，扰乱证券市场", "C": "为防止信息误导，从事证券市场报道的记者不得买卖证券", "D": "编造、传播虚假信息或者误导性信息，扰乱证券市场，给投资者造成损失的，应当依法承担赔偿责任"}, "a": "C", "an": "禁止证券交易场所、证券公司、证券登记结算机构、证券服务机构及其从业人员，证券业协会、证券监督管理机构及其工作人员，在证券交易活动中作出虚假陈述或者信息误导。各种传播媒介传播证券市场信息必须真实、客观，禁止误导。传播媒介及其从事证券市场信息报道的工作人员不得从事与其工作职责发生利益冲突的证券买卖。编造、传播虚假信息或者误导性信息，扰乱证券市场，给投资者造成损失的，应当依法承担赔偿责任。", "type": "single"}, {"id": "cflue_zc_fl1b.json_22", "q": "下列做法不符合证券公司客户资产保护规定的是（）。", "c": {"A": "证券公司以证券资产管理客户的资产向他人提供融资", "B": "客户资产与证券公司的自有资产相互独立、分别管理", "C": "证券公司将证券资产管理客户的委托资产交由符合条件的资产托管机构托管", "D": "证券公司将客户的交易结算资金以每个客户的名义单独立户管理"}, "a": "A", "an": "根据《证券公司监督管理条例》规定，证券公司不得以证券经纪客户或者证券资产管理客户的资产向他人提供融资或者担保。任何单位或者个人不得强令、指使、协助、接受证券公司以其证券经纪客户或证券资产管理客户的资产提供融资或者担保。", "type": "single"}, {"id": "cflue_zc_fl1b.json_23", "q": "下列关于证券公司包销决策内部控制规定的说法，不正确的有（）。", "c": {"A": "经纪业务部门应委派代表参与包销决策过程，独立发表意见", "B": "通过事先评估、制定风险处置预案等措施有效控制包销风险", "C": "制定包销事宜的决策流程", "D": "明确包销事宜的表决机制"}, "a": "A", "an": "证券公司【风险管理部】应当委派代表参与包销决策过程，独立发表意见。B错误。", "type": "single"}, {"id": "cflue_zc_fl1b.json_24", "q": "设立证券公司需要符合的条件有（）。", "c": {"A": "有完善的风险管理和内部控制制度", "B": "董事、监事、高级管理人员具备任职条件", "C": "有与公司经营业务范围相应的注册资本", "D": "主要股东具有持续盈利能力，信誉良好"}, "a": "ABCD", "an": "设立证券公司，应当符合下列条件：（1）有符合法律、行政法规规定的公司章程；（2）主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近三年无重大违法违规记录；（3）有符合证券法规定的公司注册资本；（4）董事、监事、高级管理人员、从业人员符合本法规定的条件；（5）有完善的风险管理与内部控制制度；（6）有合格的经营场所、业务设施和信息技术系统；（7）法律、行政法规和经国务院批准的国务院证券监督管理机构规定的其他条件。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_25", "q": "证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件资料，其保存期限不得少于（）。", "c": {"A": "永久", "B": "20年", "C": "10年", "D": "15年"}, "a": "B", "an": "证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件资料。其保存期限不得少于20年。", "type": "single"}, {"id": "cflue_zc_fl1b.json_26", "q": "根据《证券公司风险处置条例》，证券公司挪用客户资产并且不能自行弥补，下列关于国务院证券监督管理机构采取措施的说法，正确的是（）。", "c": {"A": "应当将其证券经纪等涉及客户的业务进行托管", "B": "应当对该证券公司进行接管", "C": "情节严重的，可以将其证券经纪等涉及客户的业务进行托管", "D": "情节严重的，可以对该证券公司进行接管"}, "a": "D", "an": "国务院证券监督管理机构先将问题证券公司行政撤销或关闭，再指定有关机构对其进行托管，直到其原有证券业务平稳过渡。证券公司有下列情形之一的，国务院证券监督管理机构可以将其证券经纪等涉及客户的业务进行托管；情节严重的，可以对该证券公司进行接管：1、治理混乱、管理失控；2、挪用客户资产并且不能自行弥补；3、在证券交易结算中多次发生交收违约或者交收违约数额较大；4、风险控制指标不符合规定，发生重大财务危机；5、其他可能影响证券公司持续经营的情形。", "type": "single"}, {"id": "cflue_zc_fl1b.json_27", "q": "私募投资基金的投资范围包括（）。", "c": {"A": "基金份额", "B": "期货", "C": "股票", "D": "债券"}, "a": "ABCD", "an": "私募基金财产的投资包括买卖【股票、股权、债券、期货、期权、基金份额】及投资合同约定的其他投资标的。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_28", "q": "根据《期货交易管理条例》，申请设立期货公司，主要股东及实际控制人最近2年无重大违法违规记录。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "申请设立期货公司，应当符合《公司法》的规定（包括：有符合法律、行政法规规定的公司章程），并具备下列条件：1、注册资本最低限额为人民币1亿元；2、董事、监事、高级管理人员具备任职条件，从业人员具有期货从业资格；3、有符合法律、行政法规规定的公司章程；4、主要股东以及实际控制人具有持续盈利能力，信誉良好，最近【3年】无重大违法违规记录；5、有合格的经营场所和业务设施；6、有健全的风险管理和内部控制制度；7、国务院期货监督管理机构规定的其他条件。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_29", "q": "基金财产的债权与债务与基金管理人的固有财产严格区分，体现的是基金财产的收益性。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "基金的独立性体现在基金财产独立于基金管理人、基金托管人的固有财产。基金管理人、基金托管人不得将基金财产归入其固有财产。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_30", "q": "根据《证券公司监督管理条例》，证券公司在设立时的业务范围应当与其（）相适应。", "c": {"A": "合规制度", "B": "财务状况", "C": "人力资源状况", "D": "内部控制制度"}, "a": "ABCD", "an": "根据《证券公司监督管理条例》，证券公司在设立时的业务范围应当与其【财务状况、内部控制制度、合规制度和人力资源状况】相适应。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_31", "q": "下列关于证券公司客户资产管理业务投资主办人的说法，不正确的有（）。", "c": {"A": "应当具有2年以上的证券投资从业经历", "B": "最近3年内没有受到监管部门的行政处罚", "C": "应当已取得证券从业资格", "D": "应当具备良好的诚信记录"}, "a": "A", "an": "根据《证券公司客户资产管理业务规范》，证券公司客户资产管理业务投资主办人应当在中国证券业协会进行执业注册。申请投资主办人注册的人员应当具备下列条件：（1）已取得证券从业资格；（2）具有3年以上证券投资、研究、投资顾问或类似从业经历；（3）具备良好的诚信记录及职业操守，且最近3年内没有受到监管部门的行政处罚；（4）证券业协会规定的其他条件。", "type": "single"}, {"id": "cflue_zc_fl1b.json_32", "q": "收购要约约定的收购期限不得少于（），并不得超过（）。", "c": {"A": "15日；30日", "B": "30日；45日", "C": "15日；60日", "D": "30日；60日"}, "a": "D", "an": "收购要约约定的收购期限不得少于30日，并不得超过60日。", "type": "single"}, {"id": "cflue_zc_fl1b.json_33", "q": "在证券投资基金当事人中，负责运用基金资产进行证券投资的机构是基金托管人。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在证券投资基金当事人中，负责运用基金资产进行证券投资的机构是基金管理人。", "type": "judge"}, {"id": "cflue_zc_fl1b.json_34", "q": "某非上市证券公司通过中国证券业协会网站公开披露上一年度的审计报告、经审计的财务报表及附注。根据该案例，回答以下问题：（1）根据公司经营原则，该证券公司属于（）。", "c": {"A": "遵守社会公德", "B": "承担社会责任", "C": "遵守法律、行政法规", "D": "接受社会公众的监督"}, "a": "CD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_fl1b.json_35", "q": "根据《证券法》，向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的证券公司组成。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的【证券公司】组成。", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_2", "q": "下列关于证券公司合规管理的说法，正确的有（）。", "c": {"A": "证券公司应当制定工作人员执业行为规范", "B": "合规管理的基本制度，经股东会审议通过后方可实施", "C": "合规管理的基本制度中不强制包含合规考核、合规风险隐患报告等内容", "D": "证券公司应当制定指导经营活动依法合规开展的具体管理制度或操作流程"}, "a": "AD", "an": "证券公司应当制定合规管理的基本制度，经【董事会】审议通过后实施，A错误；合规管理的基本制度应当明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容。证券公司应当结合本公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理。证券公司应当制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_5", "q": "证券公司某营业部根据司法机关作出的裁定书以及协助执行通知书，对该营业部甲客户账户进行限制资金转出、限制撤销指定交易以及限制转托管操作。在开展恐怖活动资产冻结工作中，对该营业部乙客户账户采取冻结措施。根据该案例，回答以下问题：（1）根据《关于加强证券经纪业务管理的规定》，该营业部应当采取的操作包括（）。", "c": {"A": "第一时间通知客户", "B": "事先报营业部领导及公司总部批准", "C": "事后按规定流程进行复核", "D": "对审批及复核做好留痕备查"}, "a": "BCD", "an": "涉及限制客户资产转移、改变客户证券账户和资金账户的对应关系、客户账户资产变动记录的差错确认与调整等非常规性业务操作，应当【事先审批，事后复核，审批及复核均应留痕】。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_6", "q": "某证券营业部总经理虚构投资理财项目，使用私刻的公司印章和客户签订虚假合同，骗取客户巨额钱财，最终被判处刑罚。其所在的证券公司根据法院判决须向投资者赔偿经济损失。根据该案例，回答以下问题：（1）上述案例揭示出证券行业文化建设的重要意义在于（）。", "c": {"A": "健康良好的行业文化是全面深化资本市场改革的重要保障", "B": "健康良好的行业文化能够快速提升证券公司的营利水平", "C": "健康良好的行业文化是防范金融风险的有力抓手", "D": "健康良好的行业文化是服务实体经济的内在要求"}, "a": "C", "an": "健康良好的行业文化是防范金融风险的有力抓手，实践表明，证券从业人员如果没有良好的道德操守，能力越强，风险越高，破坏力越大。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_10", "q": "下列有关股份有限公司设立的说法中，正确的是（）。", "c": {"A": "股份有限公司设立时，发起人认足公司章程规定的出资后，应当选举董事会和监事会，董事会应于创立大会结束20日内，向公司登记机关报送文件，申请设立登记", "B": "股份有限公司只能通过募集设立的方式来设立公司", "C": "募集设立时，发起人认购的股份不得少于公司股份总数的30%", "D": "股份有限公司必须有公司住所"}, "a": "D", "an": "募集设立时，发起人认购的股份不得少于公司股份总数的35%。但是，法律、行政法规另有规定的，从其规定，选项A错误。股份有限公司设立时，发起人认足公司章程规定的出资后，应当选举董事会和监事会。董事会应于创立大会结束30日内，向公司登记机关报送文件，申请设立登记，选项C错误。股份有限公司的设立，可以采取发起设立或者募集设立的方式，选项D错误。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_11", "q": "公司应当自作出合并决议之日起30日内通知债权人，并于30日内在报纸上公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司应当自作出合并、分立决议之日起【10日内】通知债权人，并于30日内在报纸上公告。", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_14", "q": "证券公司应当对销售的产品划分风险等级。下列关于划分产品风险等级时应当综合考虑的因素内容，正确的有（）。", "c": {"A": "结构复杂性", "B": "杠杆情况", "C": "募集方式", "D": "投资产品的总金额"}, "a": "ABC", "an": "划分产品或者服务风险等级时应综合考虑如下因素：流动性、到期时限、杠杆情况、结构复杂性、投资单位产品或者相关服务的最低金额、投资方向和投资范围、募集方式、发行人等相关主体的信用状况、同类产品或者服务过往业绩等。涉及投资组合的产品或者服务，应当按照产品或者服务整体风险等级进行评估。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_17", "q": "设立管理公开募集基金的基金管理公司，应当具备的条件正确的有（）。", "c": {"A": "取得基金从业资格的人员达到法定人数", "B": "注册资本不低于1亿元人民币，且必须为实缴货币资本", "C": "有符合《证券法》和《公司法》规定的章程", "D": "董事、监事、高级管理人员具备相应的任职条件"}, "a": "ABD", "an": "设立管理公开募集基金的基金管理公司，应当具备的条件有：1、有符合《证券投资基金法》和《公司法》规定的章程；（D错误）2、注册资本不低于1亿元人民币，且必须为实缴货币资本；3、主要股东应当具有经营金融业务或者管理金融机构的良好业绩、良好的财务状况和社会信誉，资产规模达到国务院规定的标准，最近3年没有违法记录；4、取得基金从业资格的人员达到法定人数；5、董事、监事、高级管理人员具备相应的任职条件；6、有符合要求的营业场所、安全防范设施和与基金管理业务有关的其他设施；7、有良好的内部治理结构、完善的内部稽核监控制度、风险控制制度。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_21", "q": "公司享有法人财产权，应对公司债务承担有限清偿责任。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产为限对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_24", "q": "下列关于证券公司包销决策内部控制规定的说法，不正确的有（）。", "c": {"A": "经纪业务部门应委派代表参与包销决策过程，独立发表意见", "B": "通过事先评估、制定风险处置预案等措施有效控制包销风险", "C": "制定包销事宜的决策流程", "D": "明确包销事宜的表决机制"}, "a": "A", "an": "证券公司【风险管理部】应当委派代表参与包销决策过程，独立发表意见。B错误。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_25", "q": "根据《证券公司监督管理条例》，证券公司未按照规定与客户签订业务合同，中国证监会可以采取的措施是（）。", "c": {"A": "责令定期报告", "B": "责令公开说明", "C": "责令改正", "D": "出具警示函"}, "a": "C", "an": "根据《证券公司监督管理条例》规定，证券公司未指定专人向客户讲解有关业务规则和合同内容，并以书面方式向其揭示投资风险或未按照规定与客户签订业务合同，或者未在与客户签订的业务合同中载入规定的必备条款的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_26", "q": "根据《期货交易管理条例》，申请设立期货公司，主要股东及实际控制人最近2年无重大违法违规记录。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "申请设立期货公司，应当符合《公司法》的规定（包括：有符合法律、行政法规规定的公司章程），并具备下列条件：1、注册资本最低限额为人民币1亿元；2、董事、监事、高级管理人员具备任职条件，从业人员具有期货从业资格；3、有符合法律、行政法规规定的公司章程；4、主要股东以及实际控制人具有持续盈利能力，信誉良好，最近【3年】无重大违法违规记录；5、有合格的经营场所和业务设施；6、有健全的风险管理和内部控制制度；7、国务院期货监督管理机构规定的其他条件。", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_27", "q": "根据《证券公司风险处置条例》，证券公司挪用客户资产并且不能自行弥补，下列关于国务院证券监督管理机构采取措施的说法，正确的是（）。", "c": {"A": "应当将其证券经纪等涉及客户的业务进行托管", "B": "应当对该证券公司进行接管", "C": "情节严重的，可以将其证券经纪等涉及客户的业务进行托管", "D": "情节严重的，可以对该证券公司进行接管"}, "a": "D", "an": "国务院证券监督管理机构先将问题证券公司行政撤销或关闭，再指定有关机构对其进行托管，直到其原有证券业务平稳过渡。证券公司有下列情形之一的，国务院证券监督管理机构可以将其证券经纪等涉及客户的业务进行托管；情节严重的，可以对该证券公司进行接管：1、治理混乱、管理失控；2、挪用客户资产并且不能自行弥补；3、在证券交易结算中多次发生交收违约或者交收违约数额较大；4、风险控制指标不符合规定，发生重大财务危机；5、其他可能影响证券公司持续经营的情形。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_29", "q": "根据《证券公司分类监管规定》，证券公司分类评价每半年进行一次。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "分类评价每年进行一次，评价期为上一年度5月1日至本年度4月30日。", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_35", "q": "除《证券法》外，与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及的法律法规、部门规章和规范性文件不包括（）。", "c": {"A": "《关于加强证券经纪业务管理的规定》", "B": "《科创板上市公司重大资产重组特别规定》", "C": "《上市公司收购管理办法》", "D": "《上市公司并购重组财务顾问业务管理办法》"}, "a": "A", "an": "《关于加强证券经纪业务管理的规定》属于证券经纪的部门规章及规范性文件。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_39", "q": "设立证券公司需要符合的条件有（）。", "c": {"A": "有完善的风险管理和内部控制制度", "B": "董事、监事、高级管理人员具备任职条件", "C": "有与公司经营业务范围相应的注册资本", "D": "主要股东具有持续盈利能力，信誉良好"}, "a": "ABCD", "an": "设立证券公司，应当符合下列条件：（1）有符合法律、行政法规规定的公司章程；（2）主要股东及公司的实际控制人具有良好的财务状况和诚信记录，最近三年无重大违法违规记录；（3）有符合证券法规定的公司注册资本；（4）董事、监事、高级管理人员、从业人员符合本法规定的条件；（5）有完善的风险管理与内部控制制度；（6）有合格的经营场所、业务设施和信息技术系统；（7）法律、行政法规和经国务院批准的国务院证券监督管理机构规定的其他条件。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_40", "q": "甲公司拟申请在科创板首次公开发行股票并上市，聘请乙公司担任保荐机构。乙公司擅自改动已提交的股票转让、股票发行申请文件。根据该案例，回答以下问题：（2）下列关于违反科创板证券（股票类）发行与承销有关规定的法律责任的说法，正确的是（）。", "c": {"A": "保荐代表人未勤勉尽责，致使发行人信息披露资料存在虚假记载，按规定可以采取认定为不适当人选的监管措施", "B": "保荐人未勤勉尽责，致使发行人信息披露资料存在一般性漏洞的，证监会将视情节轻重，自确定之日起采取暂停保荐人业务资格1到2年的监管措施", "C": "证券服务机构未勤勉尽责，致使发行人信息披露资料中与其职责相关的内容及其所出具的文件有虚假记载的，无论情节如何，该机构相关责任人不应该承担法律责任", "D": "证券服务机构未勤勉尽责，致使发行人信息披露资料中与其职责相关的内容及其所出具的文件有虚假记载的，按规定撤销保荐表人资格"}, "a": "A", "an": "保荐人未勤勉尽责，致使发行人信息披露资料存在虚假记载、误导性陈述或者重大遗漏的，中国证监会将视情节轻重，自确认之日起采取暂停保荐人业务资格1年到3年；A错误；证券服务机构未勤勉尽责，致使发行人信息披露资料中与其职责有关的内容及其所出具的文件存在虚假记载、误导性陈述或者重大遗漏的，中国证监会可以视情节轻重，自确认之日起采取3个月至3年不接受相关单位及其责任人员出具的发行证券专项文件的监管措施；情节严重的，对证券服务机构相关责任人员采取证券市场禁入的措施；C和D错误。", "type": "multi"}, {"id": "cflue_paper_法律法规_1.json_42", "q": "我国《证券法》规定的证券种类的品种有包括股票、公司债券、存托凭证、汇票。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用证券法", "type": "judge"}, {"id": "cflue_paper_法律法规_1.json_54", "q": "关于反洗钱工作保密，下列证券公司及其工作人员的做法，不正确的有（）。", "c": {"A": "对采取冻结措施有关的信息，可向任何单位和个人提供或说明", "B": "对配合人民银行调查可疑交易活动等有关反洗钱工作信息予以保密", "C": "对依法监测、分析、报告可疑交易的有关情况予以保密", "D": "对依法履行反洗钱职责或者义务获取的客户身份资料和交易信息保密"}, "a": "A", "an": "证券公司及其工作人员应对依法履行反洗钱职责或者义务获得的客户身份资料和交易信息，对依法监测、分析、报告可疑交易的有关情况，对配合中国人民银行调查可疑交易活动等有关反洗钱工作信息，以及对采取冻结措施有关的工作信息予以保密。非依法律规定，不得向任何单位和个人提供。", "type": "single"}, {"id": "cflue_paper_法律法规_1.json_59", "q": "下列有关利润分配的说法，正确的是（）。", "c": {"A": "公司持有的本公司股份可以分配利润", "B": "有限责任公司中，全体股东可以约定不按照出资比例分取红利和优先认缴出资", "C": "股份有限公司中，公司章程不可以规定不按照持股比例分配利润", "D": "董事会可以在公司弥补亏损前向股东分配利润"}, "a": "B", "an": "有限责任公司全体股东约定不按照出资比例分取红利或者不按照出资比例优先认缴出资的，可以不按照实缴的出资比例分取红利和认缴出资，选项D正确；股份有限公司按照股东持有的股份比例分配，但股份有限公司章程规定不按持股比例分配的除外；董事会违反规定，在公司弥补亏损和提取法定公积金之前向股东分配利润的，股东必须将违反规定分配的利润退还公司；公司持有的本公司股份不得分配利润。ABC错误。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_4", "q": "下列对法的概念的描述，正确的是（）。", "c": {"A": "法是反映特定物质生活条件所决定的统治阶级意志", "B": "法是以确认、保护和发展对统治阶级有利的社会关系和社会秩序为目的的规范系统", "C": "法以保障和约束为内容", "D": "法是由国家制定或认可并由国家强制力保证实施的"}, "a": "ABD", "an": "法是由国家制定或认可并由国家强制力保证实施的，反映特定物质生活条件所决定的统治阶级意志，以权利和义务为内容，以确认、保护和发展对统治阶级有利的社会关系和秩序为目的的规范系统。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_10", "q": "下列关于证券行业文化理念的说法，错误的是（）。", "c": {"A": "稳健是保证", "B": "合规是底线", "C": "诚信是义务", "D": "创新是特色"}, "a": "D", "an": "行业的文化理念包括，合规是底线、诚信是义务、专业是特色、稳健是保证。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_14", "q": "下列关于《证券法》的适用范围的说法，错误的是（）。", "c": {"A": "政府债券、证券投资基金份额的上市交易", "B": "在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易", "C": "在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照境外相关规定处理并追究责任", "D": "资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定"}, "a": "C", "an": "《证券法》的适用范围包括：1、在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用本法；本法未规定的，适用《中华人民共和国公司法》和其他法律、行政法规的规定。2、政府债券、证券投资基金份额的上市交易，适用本法；其他法律、行政法规另有规定的，适用其规定。3、资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照本法的原则规定。在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照本法有关规定处理并追究法律责任。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_15", "q": "下列情形中，需经国务院证券监督管理机构批准的有（）。", "c": {"A": "证券公司合并", "B": "聘任会计师事务所", "C": "证券公司变更业务范围", "D": "证券公司分立"}, "a": "ACD", "an": "证券公司设立、收购或者撤销分支机构，变更业务范围，增加注册资本且股权结构发生重大调整，减少注册资本，变更持有百分之五以上股权的股东、实际控制人，变更公司章程中的重要条款，合并、分立、停业、解散、破产，必须经国务院证券监督管理机构批准。前款所称公司章程中的重要条款，是指规定下列事项的条款：1、证券公司的名称、住所；2、证券公司的组织机构及其产生办法、职权、议事规则；3、证券公司对外投资、对外提供担保的类型、金额和内部审批程序；4、证券公司的解散事由与清算办法；5、国务院证券监督管理机构要求证券公司章程规定的其他事项。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_19", "q": "设立管理公开募集基金的基金管理公司，注册资本不低于法定要求，且资本金可以认缴出资。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据《证券投资基金法》第十三条的规定，设立管理公开募集基金的基金管理公司，应当具备的条件之一：注册资本不低于1亿元人民币，且必须为实缴货币资本。", "type": "judge"}, {"id": "cflue_paper_法律法规_2.json_21", "q": "下列关于证券资产管理业务信息披露的说法，正确的是（）。", "c": {"A": "投资非标准化资产的资产管理计划应至少每周披露一次净值", "B": "每年度结束之日起3个月内披露年度报告", "C": "投资标准化资产的资产管理计划应每日披露一次净值", "D": "每季度结束之日起1个月内披露季度报告"}, "a": "D", "an": "A和B错误：投资标准化资产的资产管理计划至少【每周】披露一次净值，投资非标准化资产的资产管理计划至少【每季度】披露一次净值。D选项错误：每季度结束之日起1个月内披露季度报告，每年度结束之日起【4个月】内披露年度报告。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_27", "q": "下列关于有限责任公司股权转让的说法，错误的是（）。", "c": {"A": "人民法院依照法律规定的强制执行程序转让股东的股权时，其他股东自人民法院通知之日起满20日不行使优先购买权的，视为放弃优先购买权", "B": "股东转让股权后，公司应修改公司章程，此项修改需要股东会表决通过", "C": "自然人股东死亡后，其合法继承人可以继承股东资格，但是公司章程另外有规定的除外", "D": "除公司章程另外有规定外，股东向股东以外的人转让股权的，应当经其他股东过半数同意"}, "a": "B", "an": "转让股权后，公司应当注销原股东的出资证明书，向新股东签发出资证明书，并相应修改公司章程和股东名册中有关股东及其出资额的记载。对公司章程的该项修改【不需】再由股东会表决，故A错误。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_28", "q": "根据《证券公司风险控制指标管理办法》，（）应当对证券公司净资本等各项风险控制指标数据的生成过程及计算结果的真实性、准确性、完整性进行定期或者不定期检查。", "c": {"A": "证券交易所", "B": "证券业协会", "C": "中国证监会", "D": "中国证监会的派出机构"}, "a": "CD", "an": "【中国证监会及其派出机构】应当对证券公司净资本等各项风险控制指标数据的生成过程及计算结果的真实性、准确性、完整性进行定期或不定期检查，并可以根据监管需要，要求证券公司聘请具有证券、期货相关业务资格的会计师事务所对其风险控制指标监管报表进行审计。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_37", "q": "证券公司应当对销售的产品划分风险等级。下列关于划分产品风险等级时应当综合考虑的因素内容，正确的有（）。", "c": {"A": "结构复杂性", "B": "杠杆情况", "C": "募集方式", "D": "投资产品的总金额"}, "a": "ABC", "an": "划分产品或者服务风险等级时应综合考虑如下因素：流动性、到期时限、杠杆情况、结构复杂性、投资单位产品或者相关服务的最低金额、投资方向和投资范围、募集方式、发行人等相关主体的信用状况、同类产品或者服务过往业绩等。涉及投资组合的产品或者服务，应当按照产品或者服务整体风险等级进行评估。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_47", "q": "以下关于合伙企业注销后的债务承担的说法，错误的是（）。", "c": {"A": "合伙企业不能清偿到期债务的，债权人可以向法院提出破产清算申请", "B": "合伙企业不能清偿到期债务的，债权人可以要求普通合伙人清偿", "C": "合伙企业注销后，原普通合伙人对合伙企业存续期间的债务应承担无限连带责任", "D": "合伙企业被宣告破产后，原普通合伙人对合伙企业存续期间的债务不再承担无限连带责任"}, "a": "D", "an": "合伙企业依法被宣告破产的，普通合伙人对合伙企业债务仍应承担无限连带责任。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_52", "q": "某证券营业部总经理虚构投资理财项目，使用私刻的公司印章和客户签订虚假合同，骗取客户巨额钱财，最终被判处刑罚。其所在的证券公司根据法院判决须向投资者赔偿经济损失。根据该案例，回答以下问题：（1）上述案例揭示出证券行业文化建设的重要意义在于（）。", "c": {"A": "健康良好的行业文化是全面深化资本市场改革的重要保障", "B": "健康良好的行业文化能够快速提升证券公司的营利水平", "C": "健康良好的行业文化是防范金融风险的有力抓手", "D": "健康良好的行业文化是服务实体经济的内在要求"}, "a": "C", "an": "健康良好的行业文化是防范金融风险的有力抓手，实践表明，证券从业人员如果没有良好的道德操守，能力越强，风险越高，破坏力越大。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_54", "q": "根据《证券公司风险处置条例》，下列关于国务院证券监督管理机构在处置证券公司风险工作中应履行的职责，错误的是（）。", "c": {"A": "向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况", "B": "派驻纪检工作组，对被处置证券公司、托管组、接管组、行政清理组、管理人以及参与风险处置的其他机构和人员进行监督和指导", "C": "协调证券交易所、证券登记结算机构、证券投资者保护基金管理机构，保障被处置证券公司各项证券业务正常进行", "D": "及时向公安机关等通报涉嫌证券违规的情况，按照有关规定移送违规的案件"}, "a": "BCD", "an": "国务院证券监督管理机构在处置证券公司风险工作中的职责：1、制订证券公司风险处置方案并组织实施；2、派驻风险处置现场工作组，对被处置证券公司、托管组、接管组、行政清理组、管理人以及参与风险处置的其他机构和人员进行监督和指导；3、协调证券交易所、证券登记结算机构、证券投资者保护基金管理机构，保障被处置证券公司证券经纪业务正常进行；4、对证券公司的违法行为立案稽查并予以处罚；5、及时向公安机关等通报涉嫌刑事犯罪的情况，按照有关规定移送涉嫌犯罪的案件；6、向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况；7、依照本条例对证券公司进行处置的，可以向人民法院提出申请中止以该证券公司以及其分支机构为被告、第三人或者被执行人的民事诉讼程序或者执行程序；8、证券公司设立或者实际控制的关联公司，其资产、人员、财务或者业务与被处置证券公司混合的，国务院证券监督管理机构可以向人民法院提出申请中止以该关联公司为被告、第三人或者被执行人的民事诉讼程序或者执行程序；9、采取风险处置措施期间，除为保护客户和债权人利益的情形外，不得对被处置证券公司债务进行个别清偿；被处置证券公司或者其关联客户可能转移、隐匿违法资金、证券，或者证券公司违反本条例规定可能对债务进行个别清偿的，国务院证券监督管理机构可以禁止相关资金账户、证券账户的资金和证券转出；10、对于被处置证券公司的股东以及债权人对托管组、接管组、行政清理组以及其工作人员未依法履行职责的有证据证明的投诉，经调查核实，由国务院证券监督管理机构责令托管组、接管组、行政清理组以及其工作人员改正或者对其予以更换；11、法律、行政法规要求履行的其他职责。", "type": "multi"}, {"id": "cflue_paper_法律法规_2.json_55", "q": "根据《证券法》，下列关于证券投资咨询机构及其从业人员从事证券服务业务的做法，正确的是（）。", "c": {"A": "代理委托人从事证券投资", "B": "买卖本证券投资咨询机构提供服务的证券", "C": "与委托人约定分享证券投资收益", "D": "举办有关证券投资咨询的讲座、报告会、分析会等"}, "a": "D", "an": "证券投资咨询机构及其从业人员从事证券服务业务不得有下列行为：1、代理委托人从事证券投资；2、与委托人约定分享证券投资收益或者分担证券投资损失；3、买卖本证券投资咨询机构提供服务的证券；4、法律、行政法规禁止的其他行为。有前款所列行为之一，给投资者造成损失的，依法承担赔偿责任。", "type": "single"}, {"id": "cflue_paper_法律法规_2.json_58", "q": "基金财产的债权与债务与基金管理人的固有财产严格区分，体现的是基金财产的收益性。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "基金的独立性体现在基金财产独立于基金管理人、基金托管人的固有财产。基金管理人、基金托管人不得将基金财产归入其固有财产。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_5", "q": "下列有关合伙企业设立条件的说法，错误的是（）。", "c": {"A": "有合伙人认缴或者实际缴付的出资", "B": "有书面合伙协议", "C": "有合伙企业的名称，但不必有生产经营场所", "D": "有两个以上合伙人"}, "a": "C", "an": "设立合伙企业，应当具备下列条件：（1）有两个以上合伙人。合伙人为自然人的，应当具有完全民事行为能力。（2）有书面合伙协议。（3）有合伙人认缴或者实际缴付的出资。（4）有合伙企业的名称和生产经营场所。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_7", "q": "公司应当自作出合并决议之日起30日内通知债权人，并于30日内在报纸上公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司应当自作出合并、分立决议之日起【10日内】通知债权人，并于30日内在报纸上公告。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_10", "q": "2019年12月4日，因行情波动，交易者赵某账号持仓的X手的某商品期货合约出现涨停，行情走势与赵某的该期货合约持仓方向相反。当日结算显示赵某的账户风险率已经高于交易所规定的风险率，赵某账户的保证金已经低于交易所规定的保证金标准。A期货公司要求赵某在下一交易日开盘前追加保证金。甲某要求期货公司允许其透支交易，并许诺资金到位立即追加保证金，公司予以拒绝。第二天交易开始后赵某没有及时追加保证金。根据该案例，回答以下问题：（1）期货公司应（）。", "c": {"A": "劝说赵某自行平仓", "B": "对赵某持有的头寸进行强行平仓", "C": "有权就其未平仓的头寸强行平仓", "D": "允许赵某继续持仓"}, "a": "C", "an": "交易者的保证金不符合结算参与人与交易者约定标准的，结算参与人应当按照约定通知交易者在约定时间内追加保证金或者自行平仓；交易者未在约定时间内追加保证金或者自行平仓的，按照约定强行平仓。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_12", "q": "根据《合格境内机构投资者境外证券投资管理试行办法》，合格境内机构投资者资格应当经中国证监会审批。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "境内机构投资者资格应经【中国证监会】审批。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_15", "q": "根据《期货交易管理条例》，有下列情形之一，自被解除职务或被撤销资格之日起未逾5年，则不得担任期货交易所的负责人、财务会计的人员包括（）。", "c": {"A": "因违法行为或者违纪行为被撤销资格的律师", "B": "因违法行为或者违纪行为被撤销资格的资产评估机构的专业人员", "C": "因违法行为或者违纪行为被解除职务的期货交易所的负责人", "D": "因违法行为或者违纪行为被解除职务的证券公司董事"}, "a": "ABCD", "an": "有下列情形之一的人员不得担任期货交易所的负责人、财务会计人员：①因违法行为或者违纪行为被解除职务的期货交易所、证券交易所、证券登记结算机构的负责人，或者期货公司、证券公司的董事、监事、高级管理人员，以及国务院期货监督管理机构规定的其他人员，自被解除职务之日起未逾5年。②因违法行为或者违纪行为被撤销资格的律师、注册会计师或者投资咨询机构、财务顾问机构、资信评级机构、资产评估机构、验证机构的专业人员，自被撤销资格之日起未逾5年。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_21", "q": "个别合伙因重大过失造成企业债务的，应当以其在合伙企业中的财产份额为限承担责任。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "1个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任。合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任。合伙人执业活动中因故意或者重大过失造成的合伙企业债务，以合伙企业财产对外承担责任后，该合伙人应当按照合伙协议的约定对合伙企业造成的损失承担赔偿责任。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_28", "q": "下列关于有限责任公司股权转让的说法，错误的是（）。", "c": {"A": "人民法院依照法律规定的强制执行程序转让股东的股权时，其他股东自人民法院通知之日起满20日不行使优先购买权的，视为放弃优先购买权", "B": "股东转让股权后，公司应修改公司章程，此项修改需要股东会表决通过", "C": "自然人股东死亡后，其合法继承人可以继承股东资格，但是公司章程另外有规定的除外", "D": "除公司章程另外有规定外，股东向股东以外的人转让股权的，应当经其他股东过半数同意"}, "a": "B", "an": "转让股权后，公司应当注销原股东的出资证明书，向新股东签发出资证明书，并相应修改公司章程和股东名册中有关股东及其出资额的记载。对公司章程的该项修改【不需】再由股东会表决，故A错误。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_29", "q": "我国《证券法》规定的证券种类的品种有包括股票、公司债券、存托凭证、汇票。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用证券法", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_31", "q": "下列关于证券公司债券交易关键环节管控的说法，错误的是（）。", "c": {"A": "证券公司应当审慎设置规模、杠杆、集中度及价格偏离度等指标，实现阈值控制和全程留痕，并向中后台部门开放管理和监测权限", "B": "签订债券交易协议应当使用部门印章，并以书面形式集中存档", "C": "证券公司应建立多指标、差异化的债券交易价格和利率比较基准体系，避免过度依赖单一比较基准", "D": "债券投资交易人员开展债券交易询价使用的工作邮件、通话记录、即时通讯信息等应监测留痕，并接受合规部门监督检查"}, "a": "B", "an": "签订债券交易协议应当使用公司公章或者经公司书面明确授权的业务专用章，并以书面或电子形式集中存档。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_32", "q": "设立管理公开募集基金的基金管理公司，应当具备的条件正确的有（）。", "c": {"A": "取得基金从业资格的人员达到法定人数", "B": "注册资本不低于1亿元人民币，且必须为实缴货币资本", "C": "有符合《证券法》和《公司法》规定的章程", "D": "董事、监事、高级管理人员具备相应的任职条件"}, "a": "ABD", "an": "设立管理公开募集基金的基金管理公司，应当具备的条件有：1、有符合《证券投资基金法》和《公司法》规定的章程；（D错误）2、注册资本不低于1亿元人民币，且必须为实缴货币资本；3、主要股东应当具有经营金融业务或者管理金融机构的良好业绩、良好的财务状况和社会信誉，资产规模达到国务院规定的标准，最近3年没有违法记录；4、取得基金从业资格的人员达到法定人数；5、董事、监事、高级管理人员具备相应的任职条件；6、有符合要求的营业场所、安全防范设施和与基金管理业务有关的其他设施；7、有良好的内部治理结构、完善的内部稽核监控制度、风险控制制度。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_34", "q": "证券投资基金托管人应当履行的职责包括（）。", "c": {"A": "按照规定开设基金财产的资金账户和证券账户", "B": "按照规定召集基金份额持有人大会", "C": "负责办理基金名下的资金往来", "D": "复核、审查基金管理人计算的基金资产净值"}, "a": "ABD", "an": "基金托管人应当履行下列职责：（1）安全保管基金财产；（2）按照规定开设基金财产的资金账户和证券账户；（3）对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立；（4）保存基金托管业务活动的记录、账册、报表和其他相关资料；（5）按照基金合同的约定，根据基金管理人的投资指令，及时办理清算、交割事宜；（6）办理与基金托管业务活动有关的信息披露事项；（7）对基金财务会计报告、中期和年度基金报告出具意见；（8）复核、审查基金管理人计算的基金资产净值和基金份额申购、赎回价格；（9）按照规定召集基金份额持有人大会；（10）按照规定监督基金管理人的投资运作；（11）国务院证券监督管理机构规定的其他职责。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_35", "q": "根据《证券公司内部控制指引》，下列关于证券公司业务部门承担的内控职责的说法，正确的有（）。", "c": {"A": "业务部门仅接受证券公司上级管理部门的业务检查和指导", "B": "相关业务人员有义务向证券公司报告内部控制的缺陷并及时加以纠正", "C": "业务部门负责人对其业务范围内的具体作业程序和风险控制措施进行自我检查和评价", "D": "相关业务人员应对违反职责范围内的内部控制导致的风险和损失承担首要责任"}, "a": "BCD", "an": "业务部门和分支机构的负责人负责对其业务范围内的具体作业程序和风险控制措施进行自我检查和评价，【并】接受证券公司上级管理部门和监督检查部门的业务检查和指导。因此D错误。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_39", "q": "下列做法不符合证券公司客户资产保护规定的是（）。", "c": {"A": "证券公司以证券资产管理客户的资产向他人提供融资", "B": "客户资产与证券公司的自有资产相互独立、分别管理", "C": "证券公司将证券资产管理客户的委托资产交由符合条件的资产托管机构托管", "D": "证券公司将客户的交易结算资金以每个客户的名义单独立户管理"}, "a": "A", "an": "根据《证券公司监督管理条例》规定，证券公司不得以证券经纪客户或者证券资产管理客户的资产向他人提供融资或者担保。任何单位或者个人不得强令、指使、协助、接受证券公司以其证券经纪客户或证券资产管理客户的资产提供融资或者担保。", "type": "single"}, {"id": "cflue_paper_法律法规_3.json_47", "q": "根据《公司法》，以下属于关联关系的有（）。", "c": {"A": "公司的董事、监事、高级管理人员与其直接或者间接控制的企业之间的关系", "B": "同受国家控股的企业之间的关系", "C": "公司实际控制人与其直接或者间接控制的企业之间的关系", "D": "公司控股股东与其直接或者间接控制的企业之间的关系"}, "a": "ACD", "an": "关联关系，是指公司控股股东、实际控制人、董事、监事、高级管理人员与其直接或者间接控制的企业之间的关系，以及可能导致公司利益转移的其他关系。但是，国家控股的企业之间不因为同受国家控股而具有关联关系。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_52", "q": "根据《证券公司声誉风险管理指引》，下列可能引发证券公司声誉风险的行为活动有（）。", "c": {"A": "一般性经营损失", "B": "司法性事件及监管调查、处罚", "C": "新闻媒体的不实报道或网络不实言论", "D": "客户投诉及其涉及证券公司的不当言论或行为"}, "a": "BCD", "an": "证券公司应确定可能影响公司声誉的风险来源，全面、系统、持续地收集和识别相关内外部信息，重点关注以下行为活动中可能引发声誉风险的驱动因素：（1）战略规划或调整、股权结构变动、内部组织机构调整或核心人员变动；（2）业务投资活动及产品、服务的设计、提供或推介；（3）内部控制设计、执行及系统控制的重大缺陷或重大经营损失事件；（4）司法性事件及监管调查、处罚；（5）新闻媒体的不实报道或网络不实言论；（6）股东、关联方或其他利益相关方发生声誉事件传导至证券公司；（7）客户投诉及其涉及证券公司的不当言论或行为；（8）工作人员出现不当言论或行为，违反廉洁规定、职业道德、业务规范、行规行约等相关行为；（9）他人仿冒公司名称、商标、网址等侵权或误导公众行为；（10）其他可能引发公司声誉风险的重要因素。", "type": "multi"}, {"id": "cflue_paper_法律法规_3.json_54", "q": "中国证监会可依据违法违规情节的严重程度，对其采取证券市场禁入措施的人员包括证券公司的董事、监事、高级管理人员。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "证券市场禁入措施的实施对象根据《证券市场禁入规定》，下列人员违反法律、行政法规或者中国证监会有关规定，情节严重的，中国证监会可以根据情节严重的程度，采取证券市场禁入措施：（1）发行人、上市公司、非上市公众公司的董事、监事、高级管理人员，其他信息披露义务人或者其他信息披露义务人的董事、监事、高级管理人员；（2）发行人、上市公司、非上市公众公司的控股股东、实际控制人，或者发行人、上市公司、非上市公众公司控股股东、实际控制人的董事、监事、高级管理人员；（3）证券公司的董事、监事、高级管理人员及其内设业务部门负责人、分支机构负责人或者其他证券从业人员；（4）证券公司的控股股东、实际控制人或者证券公司控股股东、实际控制人的董事、监事、高级管理人员；（5）证券服务机构的董事、监事、高级管理人员等从事证券服务业务的人员和证券服务机构的实际控制人或者证券服务机构实际控制人的董事、监事、高级管理人员；（6）证券投资基金管理人、证券投资基金托管人的董事、监事、高级管理人员及其内设业务部门、分支机构负责人或者其他证券投资基金从业人员；（7）中国证监会认定的其他违反法律、行政法规或者中国证监会有关规定的有关责任人员。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_57", "q": "《证券公司合规管理实施指引》属于部门规章。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "中国证券业协会制定的自律规则，如《中国证券业协会会员管理办法》《证券公司合规管理实施指引》《证券公司柜台交易业务规范》《证券公司另类投资子公司管理规范》《证券公司私募投资基金子公司管理规范》《发布证券研究报告执业规范》等。", "type": "judge"}, {"id": "cflue_paper_法律法规_3.json_60", "q": "根据《上市公司并购重组财务顾问业务管理办法》，下列关于财务顾问主办人执业行为规范的说法，正确的有（）。", "c": {"A": "财务顾问主办人应当参加中国证券业协会组织的相关培训", "B": "财务顾问主办人和项目协办人应当在财务顾问专业意见上签名", "C": "就中国证监会在反馈意见中提出的问题，财务顾问主办人应当与项目团队成员商议后直接尽快回复", "D": "财务顾问主办人应当督促委托人的董事、监事和高级管理人员及其他内幕信息知情人对所知悉的内幕信息严格保密"}, "a": "ABD", "an": "财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核查机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_2", "q": "甲证券公司（以下简称“保荐机构”）指派员工张某、王某担任乙股份公司（以下简称“发行人”）首次公开发行股票并上市项目的保荐代表人。中国证监会在审核过程中发现，保荐机构及保荐代表人在保荐过程中未勤勉尽责，导致存在以下问题：①未对发行人两名主要客户的关联关系履行充分的核查程序并合并披露相关信息；②涉诉专利涉及产品金额前后披露不一致且差异很大；③对发行人相关流水核查存在依赖发行人提供资料的情形。（1）下列关于保荐代表人的执业行为规范的说法，正确的是（）。", "c": {"A": "保荐代表人及其配偶可以间接持有发行人的股份", "B": "保荐机构应当指定2名保荐代表人具体负责1家发行人的保荐工作", "C": "保荐代表人履行保荐职责，可免除其发行人及其董事、监事、高级管理人员的责任", "D": "保荐代表人仅需为其主要负责项目建立尽职调查工作日志"}, "a": "B", "an": "保荐机构应当建立健全工作底稿制度，为每个项目建立独立的保荐工作底稿。保荐代表人及其配偶不可以间接持有发行人的股份。保荐代表人履行保荐职责，不可免除其发行人及其董事、监事、高级管理人员的责任。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_4", "q": "下列关于证券期货经营机构资产管理计划募集资金来源的说法，正确的是（）。", "c": {"A": "具有2年以上投资经历，且近3年本人年均收入不低于40万元的自然人，可以使用自有资金参与", "B": "证券公司及其子公司，不得使用自有资金参与", "C": "期货公司及其子公司，可以使用贷款资金参与", "D": "最近1年末净资产不低于1000万元的法人单位，可以使用发行债券筹集的资金参与"}, "a": "A", "an": "投资于单只资产管理产品不低于一定金额且符合下列条件的自然人和法人或者其他组织：（1）具有2年以上投资经历，且满足以下条件之一：家庭金融净资产不低于300万元，家庭金融资产不低于500万元，或者近3年本人年均收入不低于40万元；（2）最近1年末净资产不低于1000万元的法人单位；（3）金融管理部门视为合格投资者的其他情形。投资者不得使用贷款、发行债券等筹集的【非自有资金】投资资产管理产品", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_5", "q": "私募投资基金的投资范围包括（）。", "c": {"A": "基金份额", "B": "期货", "C": "股票", "D": "债券"}, "a": "ABCD", "an": "私募基金财产的投资包括买卖【股票、股权、债券、期货、期权、基金份额】及投资合同约定的其他投资标的。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_7", "q": "中国证监会等监管机构制定证券公司信用业务相关监管政策、实施监督管理的法律依据是《证券法》和《证券公司监督管理条例》。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "《证券法》、《证券公司监督管理条例》是中国证监会等监管机构制定信用业务相关监管政策、实施监督管理的重要法律依据。", "type": "judge"}, {"id": "cflue_paper_法律法规_4.json_13", "q": "某非上市证券公司通过中国证券业协会网站公开披露上一年度的审计报告、经审计的财务报表及附注。根据该案例，回答以下问题：（1）根据公司经营原则，该证券公司属于（）。", "c": {"A": "遵守社会公德", "B": "承担社会责任", "C": "遵守法律、行政法规", "D": "接受社会公众的监督"}, "a": "CD", "an": "略。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_14", "q": "下列不属于期货交易所职责的是（）。", "c": {"A": "提供交易的场所、设施和服务", "B": "为期货交易提供集中履约担保", "C": "设计合约，安排合约上市", "D": "直接或间接参与期货交易"}, "a": "D", "an": "期货交易所履行下列职责：1.提供交易的场所、设施和服务；2.设计合约，安排合约上市；3.组织并监督交易、结算和交割；4.为期货交易提供集中履约担保；5.按照章程和交易规则对会员进行监督管理；6.国务院期货监督管理机构规定的其他职责。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_16", "q": "下列关于股份发行公平、公正原则的说法，不正确的有（）。", "c": {"A": "同次发行的同种类股票，每股的发行条件应当相同", "B": "同次发行的同种类股票，每股的发行价格应当相同", "C": "因机构认购股份数额较大，其每股支付的价款，可以低于个人", "D": "同种类的每一股份应当具有同等权利"}, "a": "C", "an": "股份的发行，实行公平、公正的原则，同种类的每一股份应当具有同等权利。同次发行的同种类股票，每股的发行条件和价格应当相同；任何单位或者个人所认购的股份，每股应当支付【相同】价额。D错误。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_17", "q": "我国证券市场法律法规体系，是以（）为核心的。", "c": {"A": "《证券投资基金法》", "B": "《证券法》", "C": "《公司法》", "D": "《刑法》"}, "a": "B", "an": "我国证券市场法律法规体系，是以《证券法》为核心。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_25", "q": "以下关于证券公司内部控制制度建设的基本要求中，说法错误的是（）。", "c": {"A": "应当建立完备的业务台账系统，并通过业务台账系统和会计核算系统交叉印证，防止出现账外经营、账目不清等问题", "B": "证券公司业务授权应当采用书面形式", "C": "重要合同和票据应有连号控制、作废控制等专门措施", "D": "应当提高工作效率，比如资金清算人员由技术部人员兼任，以及时解决资金收支时发生的技术难题"}, "a": "D", "an": "资金清算人员【不得】由电脑部门人员和交易部门人员兼任。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_28", "q": "公司作为企业法人，具有以自有财产独立对外承担各种责任的能力。这种责任能力的基础在于公司享有法人财产权。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_paper_法律法规_4.json_29", "q": "下列关于证券公司信息隔离墙制度执行职责分工的说法，正确的有（）。", "c": {"A": "合规负责人和合规部门负有审查、监督、检查、咨询和培训等职责", "B": "证券公司工作人员对本人在执业活动中遵守信息隔离墙制度承担直接责任", "C": "各业务部门分管领导对分管部门执行信息隔离墙制度的有效性承担管理责任", "D": "董事会和经营管理的主要负责人对信息隔离墙制度的总体有效性负最终责任"}, "a": "ABCD", "an": "在信息隔离墙制度建立和执行方面，董事会、管理层、各业务部门及分支机构、广大工作人员、合规总监和合规部门的具体职责如下：1.证券公司董事会和经营管理的主要负责人对公司信息隔离墙制度的总体有效性负最终责任；2.各业务部门和分支机构的负责人对本部门和本机构执行信息隔离墙制度的有效性承担管理责任；3.证券公司工作人员对本人在执业活动中遵守信息隔离制度承担直接责任；4.合规总监和合规部门负责协助董事会和管理层建立信息隔离墙相关制度，并负有审查、监督、检查、咨询和培训等职责。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_31", "q": "下列有关利润分配的说法，正确的是（）。", "c": {"A": "公司持有的本公司股份可以分配利润", "B": "有限责任公司中，全体股东可以约定不按照出资比例分取红利和优先认缴出资", "C": "股份有限公司中，公司章程不可以规定不按照持股比例分配利润", "D": "董事会可以在公司弥补亏损前向股东分配利润"}, "a": "B", "an": "有限责任公司全体股东约定不按照出资比例分取红利或者不按照出资比例优先认缴出资的，可以不按照实缴的出资比例分取红利和认缴出资，选项D正确；股份有限公司按照股东持有的股份比例分配，但股份有限公司章程规定不按持股比例分配的除外；董事会违反规定，在公司弥补亏损和提取法定公积金之前向股东分配利润的，股东必须将违反规定分配的利润退还公司；公司持有的本公司股份不得分配利润。ABC错误。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_33", "q": "根据《合伙企业法》的规定，关于普通合伙企业新合伙人入伙，下列说法错误的是（）。", "c": {"A": "入伙的新合伙人与原合伙人享有同等权利、承担同等责任，合伙协议另有约定的，从其约定", "B": "除合伙协议另有约定外，应当经全体合伙人一致同意", "C": "订立入伙协议时，原合伙人应当向新合伙人如实告知合伙企业的经营状况和财务状况", "D": "新合伙人以其认缴的出资额为限对入伙前合伙企业的债务承担责任"}, "a": "D", "an": "新合伙人对入伙前合伙企业的债务承担无限连带责任。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_35", "q": "根据《证券公司风险控制指标管理办法》，（）应当对证券公司净资本等各项风险控制指标数据的生成过程及计算结果的真实性、准确性、完整性进行定期或者不定期检查。", "c": {"A": "证券交易所", "B": "证券业协会", "C": "中国证监会", "D": "中国证监会的派出机构"}, "a": "CD", "an": "【中国证监会及其派出机构】应当对证券公司净资本等各项风险控制指标数据的生成过程及计算结果的真实性、准确性、完整性进行定期或不定期检查，并可以根据监管需要，要求证券公司聘请具有证券、期货相关业务资格的会计师事务所对其风险控制指标监管报表进行审计。", "type": "multi"}, {"id": "cflue_paper_法律法规_4.json_39", "q": "根据《证券期货市场诚信监督管理办法》及《中国证券业协会诚信管理办法》，下列关于诚信管理的说法，错误的是（）。", "c": {"A": "效力期限自奖励、处罚处分决定生效之日起算。奖励、处罚处分本身有执行期间的，效力期限自执行期间届满之日起算", "B": "因证券期货犯罪或者其他犯罪被人民法院判处刑罚相关诚信信息，记入诚信档案", "C": "奖励信息、处罚处分信息效力期限为5年，但因证券期货违法行为被行政处罚、市场禁入的信息，效力期限为3年", "D": "中国证监会建立全国统一的证券期货市场诚信档案数据库，记录证券期货市场诚信信息"}, "a": "C", "an": "奖励信息、处罚处分信息效力期限为3年，但因证券期货违法行为被行政处罚、市场禁入的信息，效力期限为5年。", "type": "single"}, {"id": "cflue_paper_法律法规_4.json_40", "q": "下列关于风险管理的政策和机制的说法，错误的是（）。", "c": {"A": "证券公司应当制定包括风险容忍度和风险限额等的风险指标体系", "B": "证券公司应当建立健全授权管理体系，严禁越权从事经营活动", "C": "证券公司保证风险管理制度贯彻落实的手段主要为评估、检查，不含绩效考核", "D": "证券公司应当关注风险的关联性，审慎评估公司面临的总体风险水平"}, "a": "C", "an": "证券公司应当建立与风险管 者在国务院批准的其他【全国性】证券交易场所交易。非公开发行的证券，可以在证券交易所、国务院批准的其他全国性证券交易场所、按照国务院规定设立的区域性股权市场转让。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_19", "q": "下列选项中，属于证券发行、交易活动禁止的行为的是（）", "c": {"A": "传播虚假信息", "B": "证券欺诈", "C": "内幕交易", "D": "操纵证券交易价格"}, "a": "ABCD", "an": "证券发行、交易活动禁止的行为包括内幕交易、操纵证券交易价格、传播虚假信息和证券欺诈。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_23", "q": "根据《证券公司开立客户账户规范》，以下符合证券公司对客户回访要求的有（）。", "c": {"A": "客户回访应当留痕，相关资料应当保存不少于2年", "B": "证券公司应当统一组织回访客户，对新开户客户应当在1个月内完成回访", "C": "回访内容应当包括但不限于确认客户身份、确认客户已阅读各类风险揭示文件并理解相关条款等", "D": "对原有客户的回访比例应当不低于上年末客户总数（不含休眠账户及中止交易账户客户）的10%"}, "a": "BCD", "an": "证券公司应当统一组织回访客户，对新开户客户应当在1个月内完成回访，对原有客户的回访比例应当不低于上年末客户总数（不含休眠账户及中止交易账户客户）的10%。客户回访应当留痕，相关资料应当保存不少于3年。回访内容包括但不限于：①确认客户身份，如客户委托他人代理开户的，应向客户确认代理人身份及代理权限。②确认客户已阅读各类风险揭示文件并理解相关条款。③确认客户开户为其真实意愿。④提醒客户自行设置和妥善保管密码。⑤确认客户开户方式。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_25", "q": "下列关于证券发行与承销监管措施的说法，正确的是（）。", "c": {"A": "中国证监会应建立对承销商询价、定价、配售行为和网下投资者报价行为的日常监督制度", "B": "中国证监会对股票和可转换公司债券发行承销过程实施事前事中事后全程管理", "C": "中国证监会可以对保荐机构及其保荐代表人从事保荐业务的情况进行定期或者不定期现场检查", "D": "中国证监会对保荐机构及其相关人员进行持续动态跟踪管理，包括其业务资格、执业资格、执业情况、违法违规行为、其他不良行为等"}, "a": "C", "an": "B选项：【中国证券业协会】应建立对承销商询价、定价、配售行为和网下投资者报价行为的日常监督制度。C选项：中国证监会对保荐机构及其相关人员进行持续动态的跟踪管理，【记录】其业务资格、执业情况、违法违规行为、其他不良行为以及对其采取的【监管措施等】。D选项：中国证监会对证券发行承销过程实施【事中事后】监管，发现涉嫌违法违规或者存在异常情形的，可责令发行人和承销商暂停或中止发行，对相关事项进行调查处理。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_28", "q": "下列关于募集资金的说法，正确的是（）。", "c": {"A": "非公开募集基金，不得向合格投资者之外的单位和个人募集资金", "B": "非公开募集基金可以向任何普通投资者募集，但投资者累计不得超过二百人", "C": "公开募集基金包括不特定对象募集资金、向特定对象募集资金累计不超过二百人", "D": "合格投资者的标准不包括“基金份额认购金额达到规定下限”"}, "a": "A", "an": "公开募集基金包括向不特定对象募集资金、向特定对象募集资金累计超过200人，以及法律、行政法规规定的其他情形。而非公开募集基金应当向合格投资者募集，合格投资者累计不得超过200人，不得向合格投资者之外的单位和个人募集资金。非公开募集基金合格投资者，是指达到规定资产规模或者收入水平，并且具备相应的风险识别能力和风险承担能力、其基金份额认购金额不低于规定限额的单位和个人", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_31", "q": "根据《证券法》，下列投资者的做法，错误的是（）。", "c": {"A": "乙某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例每增加或者减少百分之五，乙某按照规定报告并通知该上市公司予以公告", "B": "丙某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例每增加或者减少百分之一，丙某在该事实发生的次日通知该上市公司并公告", "C": "丁某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例又增加百分之五，丁某按照规定报告并公告，在公告后三日内再行买入该上市公司股票", "D": "甲某通过证券交易所交易某上市公司股票，在持股比例达到该上市公司已发行的有表决权股份达到百分之五时，甲某按照规定报告并通知该上市公司予以公告"}, "a": "C", "an": "相关规定：1、持股比例达到5%时的程序和规则：通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%时，应当在该事实发生之日起3日内，向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。在上述期限内不得再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。2、持股比例每增减5%时的程序和规则：投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%后，其所持该上市公司已发行的有表决权股份比例每增加或者减少5%，应当依照前款规定进行报告和公告。在该事实发生之日起至公告后【3日内，不得】再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。违反上述规定买入上市公司有表决权的股份的，在买入后的36个月内，对该超过规定比例部分的股份不得行使表决权。3、持股比例每增减1%时的程序和规则：投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%后，其所持该上市公司已发行的有表决权股份比例每增加或者减少1%，应当在该事实发生的次日通知该上市公司，并予公告。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_32", "q": "下列关于证券经纪业务营销人员执业行为管理的说法，正确的有（）。", "c": {"A": "证券经纪人可以向客户介绍证券投资开户、交易、资金存取等业务流程", "B": "证券经纪人可以替客户办理证券认购、交易或者资金存取、划转、查询等", "C": "证券经纪人可以向客户介绍证券公司和证券市场的基本情况", "D": "证券经纪人可以替客户办理账户开立、注销、转移等"}, "a": "AC", "an": "证券经纪人应在《暂行规定》规定和所服务证券公司授权的范围内执业，不得有下列行为：1、替客户办理账户开立、注销、转移，证券认购、交易或者资金存取、划转、查询等事宜；2、提供、传播虚假或者误导客户的信息，或者诱使客户进行不必要的证券买卖；3、与客户约定分享投资收益，对客户证券买卖的收益或者赔偿证券买卖的损失作出承诺；4、采取贬低竞争对手、进入竞争对手营业场所劝导客户等不正当手段招揽客户；5、泄漏客户的商业秘密或者个人隐私；6、为客户之间的融资提供中介、担保或者其他便利；7、为客户提供非法的服务场所或者交易设施，或者通过互联网络、新闻媒体从事客户招揽和客户服务等活动；8、委托他人代理其从事客户招揽和客户服务等活动；9、损害客户合法权益或者扰乱市场秩序的其他行为。10、以所服务证券公司或证券营业部的名义，与客户或他人签订任何合同、协议。11、代客户在相关合同、协议、文件等资料上签字。12、在执业过程中索取或收受客户款项和财物。13、向客户提供非由所服务证券公司统一提供的研究报告及与证券投资有关的信息、证券类金融产品宣传推介材料及有关信息。14、违背职业道德的其他行为。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_40", "q": "下列对法的概念的描述，正确的是（）。", "c": {"A": "法是反映特定物质生活条件所决定的统治阶级意志", "B": "法是以确认、保护和发展对统治阶级有利的社会关系和社会秩序为目的的规范系统", "C": "法以保障和约束为内容", "D": "法是由国家制定或认可并由国家强制力保证实施的"}, "a": "ABD", "an": "法是由国家制定或认可并由国家强制力保证实施的，反映特定物质生活条件所决定的统治阶级意志，以权利和义务为内容，以确认、保护和发展对统治阶级有利的社会关系和秩序为目的的规范系统。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_42", "q": "某证券公司资产管理部客户服务组与公司信息技术中心携手开发了综合信息平台，能够自动提取账户运作信息并生成定期报告，通过系统后台发送客户指定邮箱，降低了漏报、错报、迟报等风险，提升了客户满意度。根据该案例，回答以下问题：（1）下列关于中国特色证券行业文化的说法，错误的是（）。", "c": {"A": "健康良好的行业文化是服务实体经济的内在要求", "B": "健康的内部人文化缺失将制约行业经营质量效率的提升", "C": "证券经营机构必须从战略的高度来充分认识行业文化建设的重大意义", "D": "证券行业文化、职业道德等“软实力”不影响经营活动"}, "a": "D", "an": "我国证券行业在过去二三十年的发展中，一路披荆斩棘、砥砺前行，在实践中不断厚植发展力量和文化基因，初步形成了具有中国特色的证券行业文化。但整体来看，与证券行业规模、资本实力、利润水平等“硬指标”的快速扩张相比，行业文化、职业道德等“软实力”发展相对滞后，与业务经营发展不平衡、不协调的问题比较突出，健康的投资者文化和内部人文化缺失，制约着行业经营质量效率的全面提升。行业机构必须从战略的高度来充分认识行业文化建设的重大意义，准确把握行业文化建设规律，坚持问题导向，补短板、强弱项，不断提升行业文化“软实力”，积极塑造健康向上的良好行业形象。", "type": "multi"}, {"id": "cflue_paper_法律法规_5.json_46", "q": "下列有关公司合并、分立的说法，错误的是（）。", "c": {"A": "有限责任公司合并或分立，必须经代表2/3以上表决权的股东通过", "B": "股份有限公司合并或分立，必须经出席会议的股东所持表决权的2/3以上通过", "C": "公司应当自作出合并、分立决议之日起10日内通知债权人，并于30日内在报纸上公告", "D": "公司合并、分立的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保"}, "a": "D", "an": "公司合并的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保；公司分立的，分立前的债务由分立后的公司承担连带责任。因此，选项A错误。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_49", "q": "关于证券公司的合并、分立、停业，下列说法错误的是（）。", "c": {"A": "证券公司的合并、分立、停业，必须经国务院证券监督管理机构批准", "B": "证券公司出现重大风险，严重危害证券市场秩序、损害投资者利益的，国务院证券监督管理机构可以对该证券公司采取责令停业整顿、接管等监管措施", "C": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，在受理之日起30个工作日内作出批准或者不予批准的书面决定", "D": "证券公司停止全部证券业务，应当在国务院证券监督管理机构指定的报刊上进行公告"}, "a": "C", "an": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，并在自受理之日起【3个月内】作出批准或者不予批准的书面决定。证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起30个工作日作出批准或者不予批准的书面决定。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_51", "q": "下列关于沪港通与深港通基本交易规则的说法，错误的是（）。", "c": {"A": "订单设计", "B": "额度控制", "C": "回转交易", "D": "T+0交收制度"}, "a": "D", "an": "沪港通与深港通的基本交易规则包括订单设计、订单修改、T+2交收制度、额度控制、回转交易等内容。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_52", "q": "除《证券法》外，与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及的法律法规、部门规章和规范性文件不包括（）。", "c": {"A": "《关于加强证券经纪业务管理的规定》", "B": "《科创板上市公司重大资产重组特别规定》", "C": "《上市公司收购管理办法》", "D": "《上市公司并购重组财务顾问业务管理办法》"}, "a": "A", "an": "《关于加强证券经纪业务管理的规定》属于证券经纪的部门规章及规范性文件。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_54", "q": "根据《证券投资基金销售人员从业资质管理规则》，基金销售人员在开展基金宣传推介活动时应通过适当方式向基金投资人出示（）。", "c": {"A": "基金代销协议", "B": "个人身份证件", "C": "从业资质证明", "D": "任职机构出具的委托手续"}, "a": "C", "an": "基金销售人员在开展基金宣传推介、基金理财业务咨询等活动时应通过适当的方式向基金投资人出示从业资质证明。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_56", "q": "下列关于合伙企业的说法，正确的是（）。", "c": {"A": "合伙企业的财产属于合伙人共有", "B": "普通合伙人对合伙企业承担有限责任", "C": "合伙企业与公司一样，具有高度的人合性", "D": "合伙企业具有独立的法人主体资格"}, "a": "A", "an": "合伙企业与公司的区别主要有：1、法律地位不同。公司具有独立的法人主体资格，是企业法人；合伙企业不是法人，是非法人企业。2、财产独立性不同。公司的财产独立于股东；合伙企业的财产与合伙人仅相对独立，合伙企业的财产属于合伙人共有。3、承担的责任不同。股东对公司的责任以出资为限，承担有限责任；而合伙企业中，普通合伙人对合伙企业承担无限责任。此外，与公司相比，合伙企业具有高度的人合性，因此合伙企业的加入、退出、运营管理等方面，与公司均有较大不同。", "type": "single"}, {"id": "cflue_paper_法律法规_5.json_57", "q": "证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件资料，其保存期限不得少于（）。", "c": {"A": "永久", "B": "20年", "C": "10年", "D": "15年"}, "a": "B", "an": "证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件资料。其保存期限不得少于20年。", "type": "single"}, {"id": "cflue_mock_1.json_6", "q": "下列关于有限责任公司股权转让的说法，错误的是（）。", "c": {"A": "人民法院依照法律规定的强制执行程序转让股东的股权时，其他股东自人民法院通知之日起满20日不行使优先购买权的，视为放弃优先购买权", "B": "股东转让股权后，公司应修改公司章程，此项修改需要股东会表决通过", "C": "自然人股东死亡后，其合法继承人可以继承股东资格，但是公司章程另外有规定的除外", "D": "除公司章程另外有规定外，股东向股东以外的人转让股权的，应当经其他股东过半数同意"}, "a": "B", "an": "转让股权后，公司应当注销原股东的出资证明书，向新股东签发出资证明书，并相应修改公司章程和股东名册中有关股东及其出资额的记载。对公司章程的该项修改【不需】再由股东会表决，故A错误。", "type": "single"}, {"id": "cflue_mock_1.json_13", "q": "首次公开发行股票采用询价方式定价的说法中，错误的是（）。", "c": {"A": "网下投资者不得协商报价", "B": "网下机构和个人投资者可以自主决定是否报价", "C": "网下投资者的报价应当包含每股价格和该价格对应的拟申购股数", "D": "网下投资者应当给出三个不同报价供主承销商参考"}, "a": "D", "an": "B选项说法错误，网下投资者只能有一个报价。", "type": "single"}, {"id": "cflue_mock_1.json_16", "q": "下列关于公司税后利润分配的顺序，正确的是（）。", "c": {"A": "提取法定公积金、弥补公司以前年度亏损、提取任意公积金、向股东分配股利", "B": "弥补公司以前年度亏损、向股东分配股利、提取法定公积金、提取任意公积金", "C": "提取法定公积金、提取任意公积金、弥补公司以前年度亏损、向股东分配股利", "D": "弥补公司以前年度亏损、提取法定公积金、提取任意公积金、向股东分配股利"}, "a": "D", "an": "根据我国《公司法》的规定，公司税后利润分配的顺序是：（1）弥补亏损；（2）提取法定盈余公积金；（3）提取任意盈余公积金；（4）支付普通股股利（分配利润）。", "type": "single"}, {"id": "cflue_mock_1.json_18", "q": "私募投资基金的投资范围包括（）。", "c": {"A": "基金份额", "B": "期货", "C": "股票", "D": "债券"}, "a": "ABCD", "an": "私募基金财产的投资包括买卖【股票、股权、债券、期货、期权、基金份额】及投资合同约定的其他投资标的。", "type": "multi"}, {"id": "cflue_mock_1.json_21", "q": "证券服务机构为证券的发行、上市、交易等证券业务活动提供相关服务时，关于其法律责任，下列说法正确的有（）。", "c": {"A": "如果与被服务机构有利益冲突，只要做好防火墙即可", "B": "其出具的相关文件资料不得有虚假记载、误导性陈述或重大遗漏", "C": "如果给他人造成损失，即使能够证明自己没有过错，也必须承担带赔偿责任", "D": "若造成他人损失的，应当与发行人、上市公司承担连带赔偿责任"}, "a": "BD", "an": "证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。其制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与发行人、上市公司承担连带赔偿责任，但是，能够证明自己没有过错的除外。如果与被服务机构有利益冲突，需要建立严格的防火墙制度与业务隔离制度，有效执行信息隔离等内部控制制度，切实防范利益输送。", "type": "multi"}, {"id": "cflue_mock_1.json_22", "q": "下列关于股东滥用权利的说法，正确的是（）。", "c": {"A": "公司股东会或者股东大会决议内容违反公司章程的，股东可以请求人民法院撤销", "B": "公司股东滥用股东权利给公司造成损失的，股东应当对公司承担赔偿责任", "C": "公司股东滥用股东权利给其他股东造成损失的，受损害的股东有权要求股东直接承担赔偿责任", "D": "公司的实际控制人利用关联关系损害公司利益，给公司造成损失的，公司有权要求实际控制人承担赔偿责任"}, "a": "ABCD", "an": "公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司的控股股东、实际控制人、董事、监事、高级管理人员不得利用其关联关系损害公司利益。违反前款规定，给公司造成损失的，应当承担赔偿责任。股东会或者股东大会、董事会的会议召集程序、表决方式违反法律、行政法规或者公司章程，或者决议内容违反公司章程的，股东可以自决议作出之日起六十日内，请求人民法院撤销。公司根据股东会或者股东大会、董事会决议已办理变更登记的，人民法院宣告该决议无效或者撤销该决议后，公司应当向公司登记机关申请撤销变更登记。", "type": "multi"}, {"id": "cflue_mock_1.json_31", "q": "下列关于存款准备金与存款派生能力的说法，正确的有（）。", "c": {"A": "法定存款准备金越高，银行放贷能力越弱", "B": "法定存款准备金越高，存款派生能力越强", "C": "法定存款备金和超额存款准备金对银行放贷能力的影响方向一致", "D": "超额存款准备金越高，存款派生能力越强"}, "a": "AC", "an": "存款准备金制度是银行创造信用货币的基本前提条件。银行在吸收一笔现金或支票后，会留存一部分准备，再将其余部分用于贷款。对于一定数量的存款来说，准备金的比例越高，银行可用于贷款的资金就越少，存款派生的能力就越低；反之，准备金的比例越低，银行的存款派生能力就越强。所以AB错误。", "type": "multi"}, {"id": "cflue_mock_1.json_36", "q": "关于证券公司股东出资的规定，下列说法正确的有（）。", "c": {"A": "证券公司股东的非货币财产出资总额不得超过证券公司注册资本的30%", "B": "证券公司股东可以用证券公司经营必需的非货币资产出资", "C": "证券公司股东的非货币出资，不需要资产评估机构评估", "D": "证券公司股东出资应当经具有证券、期货相关业务资格的律师事务所验资"}, "a": "AB", "an": "证券公司股东的出资，应当经具有证券、期货相关业务资格的会计师事务所验资并出具证明；出资中的非货币财产，应当经具有证券相关业务资格的资产评估机构评估。", "type": "multi"}, {"id": "cflue_mock_1.json_41", "q": "下列关于项目收益债券的说法，正确的有（）。", "c": {"A": "发行项目收益债券募集的资金可以置换项目资本金或偿还与项目有关的其他债务", "B": "非公开发行的项目收益债券的债项评级应达到AA级及以上", "C": "项目收益债券的本息偿还资金完全或主要来源于项目建成后的运营收益", "D": "项目收益债券可以以招标或簿记建档形式公开发行，也可以面向机构投资者非公开发行"}, "a": "BCD", "an": "发行项目收益债券募集的资金，只能用于该项目建设、运营或设备购置，不得置换项目资本金或偿还与项目有关的其他债务，但偿还已使用的超过项目融资安排约定规模的银行贷款除外。B错误。", "type": "multi"}, {"id": "cflue_mock_1.json_49", "q": "下列关于债券信用评级的说法，正确的有（）。", "c": {"A": "信用评级能够为投资者购买债券和证券市场债券的流通转让活动提供信息服务", "B": "地方政府、非国家银行金融机构发行的某些有价证券，有必要进行信用评级", "C": "债券信用评级是对债券按期还本付息的可靠程度进行客观公正的评估", "D": "债券信用评级的对象包括企业、国家财政、国家银行发行的有价债券"}, "a": "ABC", "an": "国家财政发行的国库券和国家银行发行的金融债券，由于有政府的保证，因此不参加债券信用评级，B错误。", "type": "multi"}, {"id": "cflue_mock_1.json_51", "q": "下列关于债券价值的说法，错误的是（）。", "c": {"A": "付息间隔越短的债券，风险相对越小", "B": "债券条款中包含发行人提前赎回权不会影响债券价值", "C": "短期债券一般到期一次性还本，因此要折价交易", "D": "免税债券与可比的纳税债券相比价值更大"}, "a": "B", "an": "凡是有利于发行人的条款都会相应降低债券价值；反之，有利于持有人的条款则会提高债券价值。", "type": "single"}, {"id": "cflue_mock_1.json_54", "q": "个别合伙因重大过失造成企业债务的，应当以其在合伙企业中的财产份额为限承担责任。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "1个合伙人或者数个合伙人在执业活动中因故意或者重大过失造成合伙企业债务的，应当承担无限责任或者无限连带责任，其他合伙人以其在合伙企业中的财产份额为限承担责任。合伙人在执业活动中非因故意或者重大过失造成的合伙企业债务以及合伙企业的其他债务，由全体合伙人承担无限连带责任。合伙人执业活动中因故意或者重大过失造成的合伙企业债务，以合伙企业财产对外承担责任后，该合伙人应当按照合伙协议的约定对合伙企业造成的损失承担赔偿责任。", "type": "judge"}, {"id": "cflue_mock_1.json_60", "q": "下列有关合伙企业设立条件的说法，错误的是（）。", "c": {"A": "有合伙人认缴或者实际缴付的出资", "B": "有书面合伙协议", "C": "有合伙企业的名称，但不必有生产经营场所", "D": "有两个以上合伙人"}, "a": "C", "an": "设立合伙企业，应当具备下列条件：（1）有两个以上合伙人。合伙人为自然人的，应当具有完全民事行为能力。（2）有书面合伙协议。（3）有合伙人认缴或者实际缴付的出资。（4）有合伙企业的名称和生产经营场所。", "type": "single"}, {"id": "cflue_mock_1.json_64", "q": "下列有关公司增加或者减少注册资本的说法，正确的是（）。", "c": {"A": "公司应当自做出减少注册资本决议之日起30日内通知债权人，并于45日内在报纸上公告", "B": "债权人自接到通知书之日起10日内，未接到通知书的自公告之日起30日内，要求公司清偿债务或者提供担保", "C": "债权人自接到通知书之日起30日内，未接到通知书的自公告之日起30日内，要求公司清偿债务或者提供担保", "D": "公司应当自做出减少注册资本决议之日起10日内通知债权人，并于30日内在报纸上公告"}, "a": "D", "an": "公司应当自做出减少注册资本决议之日起10日内通知债权人，并于30日内在报纸上公告；债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保。", "type": "single"}, {"id": "cflue_mock_1.json_69", "q": "下列选项中，标志着股票市场正式运作开始的事件是（）。", "c": {"A": "上海证券交易所和深圳证券交易所的开业", "B": "1922年，国务院证券管理委员会和中国监督管理委员会的成立", "C": "资本市场的初步建立", "D": "2004年，中国银行业监督委员会的成立"}, "a": "A", "an": "1990年12月，上海证券交易所和深圳证券交易所先后开业，标志着股票市场正式运作的开始。", "type": "single"}, {"id": "cflue_mock_1.json_70", "q": "下列对法的概念的描述，正确的是（）。", "c": {"A": "法是反映特定物质生活条件所决定的统治阶级意志", "B": "法是以确认、保护和发展对统治阶级有利的社会关系和社会秩序为目的的规范系统", "C": "法以保障和约束为内容", "D": "法是由国家制定或认可并由国家强制力保证实施的"}, "a": "ABD", "an": "法是由国家制定或认可并由国家强制力保证实施的，反映特定物质生活条件所决定的统治阶级意志，以权利和义务为内容，以确认、保护和发展对统治阶级有利的社会关系和秩序为目的的规范系统。", "type": "multi"}, {"id": "cflue_mock_1.json_74", "q": "下列有关公司合并、分立的说法，错误的是（）。", "c": {"A": "有限责任公司合并或分立，必须经代表2/3以上表决权的股东通过", "B": "股份有限公司合并或分立，必须经出席会议的股东所持表决权的2/3以上通过", "C": "公司应当自作出合并、分立决议之日起10日内通知债权人，并于30日内在报纸上公告", "D": "公司合并、分立的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保"}, "a": "D", "an": "公司合并的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保；公司分立的，分立前的债务由分立后的公司承担连带责任。因此，选项A错误。", "type": "single"}, {"id": "cflue_mock_1.json_75", "q": "根据《会员持续开展创业板市场投资者适当性管理业务指引》，证券公司应当根据客户（）等情况，对客户进行分类管理。", "c": {"A": "异常交易行为发生频率", "B": "收到深圳证券交易所警示次数", "C": "交易活跃程度", "D": "资金规模"}, "a": "ABCD", "an": "《会员持续开展创业板市场投资者适当性管理业务指引》第二十一条会员应当根据客户的资金规模、交易活跃程度、异常交易行为发生频率、收到本所警示次数以及是否为本所重点监控账户等情况，对客户进行分类管理。", "type": "multi"}, {"id": "cflue_mock_1.json_77", "q": "A公司目前的资产总额是8000万元，负债总额为3000万元，发行在外的普通股股数是1000万股，无优先股，因此A公司的股票账面价值为（）元。", "c": {"A": "11", "B": "8", "C": "3", "D": "5"}, "a": "D", "an": "每股账面价值等于公司净资产除以发行在外的普通股票的股数。净资产等于公司资产总额减去负债总额后的净值。故，每股账面价值=（8000-3000）/1000=5。", "type": "single"}, {"id": "cflue_mock_1.json_82", "q": "根据《证券法》，下列关于证券公司将其自营账户借给他人使用的法律责任，说法正确的有（）。", "c": {"A": "没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款", "B": "情节严重的，并处撤销相关业务许可或者责令关闭", "C": "对直接负责的主管人员和其他直接责任人员给予警告，并处以五万元以上五十万元以下的罚款", "D": "责令改正，给予警告，没收违法所得，并处以违法所得一倍以上五倍以下的罚款"}, "a": "AB", "an": "证券公司违反《证券法》129条（不得将自营账户借给他人使用）的规定从事证券自营业务的，责令改正，给予警告，没收违法所得，并处以违法所得【一倍以上十倍】以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款；情节严重的，并处撤销相关业务许可或者责令关闭。对直接负责的主管人员和其他直接责任人员给予警告，并处以【二十万元以上二百万元】以下的罚款。", "type": "multi"}, {"id": "cflue_mock_1.json_86", "q": "以下关于证券公司内部控制制度建设的基本要求中，说法错误的是（）。", "c": {"A": "应当建立完备的业务台账系统，并通过业务台账系统和会计核算系统交叉印证，防止出现账外经营、账目不清等问题", "B": "证券公司业务授权应当采用书面形式", "C": "重要合同和票据应有连号控制、作废控制等专门措施", "D": "应当提高工作效率，比如资金清算人员由技术部人员兼任，以及时解决资金收支时发生的技术难题"}, "a": "D", "an": "资金清算人员【不得】由电脑部门人员和交易部门人员兼任。", "type": "single"}, {"id": "cflue_mock_1.json_89", "q": "下列关于企业短期融资融券的说法，正确的有（）。", "c": {"A": "债务融资工具发行注册实行注册会议制度，由注册会议决定是否接受债务融资工具发行注册", "B": "交易商协会接受注册的企业出具《接受注册通知书》，注册有效期为2年", "C": "企业短期融资融券是指具有法人资格的非金融企业在银行间债券市场发行的，约定在1年内还本付息的债务融资工具", "D": "交易所市场交易商协会负责受理企业债务融资工具的发行注册"}, "a": "ABC", "an": "【中国银行间市场交易商协会】负责受理企业债务融资工具的发行注册。C错误。", "type": "multi"}, {"id": "cflue_mock_1.json_90", "q": "股份有限公司发行新股募足股款后，必须向证券交易所办理变更登记，并公告。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司发行新股募足股款后，必须向公司登记机关办理变更登记，并公告。", "type": "judge"}, {"id": "cflue_mock_1.json_98", "q": "关于证券公司的合并、分立、停业，下列说法错误的是（）。", "c": {"A": "证券公司的合并、分立、停业，必须经国务院证券监督管理机构批准", "B": "证券公司出现重大风险，严重危害证券市场秩序、损害投资者利益的，国务院证券监督管理机构可以对该证券公司采取责令停业整顿、接管等监管措施", "C": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，在受理之日起30个工作日内作出批准或者不予批准的书面决定", "D": "证券公司停止全部证券业务，应当在国务院证券监督管理机构指定的报刊上进行公告"}, "a": "C", "an": "证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，并在自受理之日起【3个月内】作出批准或者不予批准的书面决定。证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起30个工作日作出批准或者不予批准的书面决定。", "type": "single"}, {"id": "cflue_mock_1.json_100", "q": "根据《中华人民共和国证券法》，下列关于证券转让的说法，正确的有（）。", "c": {"A": "上市公司董事、监事、高级管理人员转让其持有的本公司股份的，应当遵守证券交易所的业务规则", "B": "依法发行的证券，《中华人民共和国公司法》对其转让期限有限制性规定的，在限定的期限内不得转让", "C": "非公开发行的证券，可以在证券交易所、国务院证券监督管理机构批准的其他全国性证券交易场所转让", "D": "上市公司持有百分之五以上股份的股东转让其持有的本公司股份的，不得违反法律、行政法规的规定"}, "a": "ABD", "an": "非公开发行的证券，可以在证券交易所、国务院批准的其他全国性证券交易场所、按照【国务院】规定设立的区域性股权市场转让。", "type": "multi"}, {"id": "cflue_mock_1.json_104", "q": "根据《证券经纪人管理暂行规定》，可以替客户办理账户开立、注销、转移，证券认购、交易或者资金存取、划转、查询等事宜。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券经纪人不得替客户办理账户开立、注销、转移，证券认购、交易或者资金存取、划转、查询等事宜。", "type": "judge"}, {"id": "cflue_mock_1.json_109", "q": "下列关于债券应计利息的说法，正确的有（）。", "c": {"A": "我国交易所市场对附息债券的计息规定时全年天数统一按360天计算", "B": "计算累计利息时，针对不同类别债券，全年天数和利息累计天数的计算分别有行业惯例", "C": "我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日不计息", "D": "通常短期债券的利息累计天数分为按实际天数计算和按每月30天计算两种"}, "a": "BD", "an": "我国交易所市场对附息债券的计息规定是全年天数统一按【365天】计算，利息累计天数规则是按实际天数计算，算头不算尾、闰年2月29日不计息，C错误；我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日【也计利息】，D错误。", "type": "multi"}, {"id": "cflue_mock_1.json_113", "q": "改革后的创业板投资者交易权限需要开通前20个交易日资产日均不低于人民币（）万元，并具有2年的证券交易经验。", "c": {"A": "10", "B": "30", "C": "5", "D": "20"}, "a": "A", "an": "创业板投资者交易权限需要开通前20个交易日资产日均不低于人民币10万元，并具有2年的证券交易经验。", "type": "single"}, {"id": "cflue_mock_1.json_115", "q": "下列对于风险转移的说法中，正确的是（）。", "c": {"A": "金融机构会借助衍生产品（如期权合约等）作为特殊保单转移利率、汇率、股票和商品价格风险", "B": "风险转移可分为保险转移和非保险转移", "C": "保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司", "D": "非保险转移通常采用担保和备用信用证等方式将风险转移给第三方"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_mock_1.json_118", "q": "设立管理公开募集基金的基金管理公司，应当具备的条件正确的有（）。", "c": {"A": "取得基金从业资格的人员达到法定人数", "B": "注册资本不低于1亿元人民币，且必须为实缴货币资本", "C": "有符合《证券法》和《公司法》规定的章程", "D": "董事、监事、高级管理人员具备相应的任职条件"}, "a": "ABD", "an": "设立管理公开募集基金的基金管理公司，应当具备的条件有：1、有符合《证券投资基金法》和《公司法》规定的章程；（D错误）2、注册资本不低于1亿元人民币，且必须为实缴货币资本；3、主要股东应当具有经营金融业务或者管理金融机构的良好业绩、良好的财务状况和社会信誉，资产规模达到国务院规定的标准，最近3年没有违法记录；4、取得基金从业资格的人员达到法定人数；5、董事、监事、高级管理人员具备相应的任职条件；6、有符合要求的营业场所、安全防范设施和与基金管理业务有关的其他设施；7、有良好的内部治理结构、完善的内部稽核监控制度、风险控制制度。", "type": "multi"}, {"id": "cflue_mock_2.json_3", "q": "关于股票，下列说法正确的有（）。", "c": {"A": "股票是证权证券", "B": "股票属于债权证券", "C": "股票属于物权证券", "D": "股票是一种有价证券"}, "a": "AD", "an": "股票具有的性质：1、是有价证券；2、是要式凭证；3、是证权凭证；4、是资本证券；5、是综合权利证券。", "type": "multi"}, {"id": "cflue_mock_2.json_8", "q": "私募基金管理人及其从业人员从事私募基金业务，不得（）。", "c": {"A": "将其固有财产或者他人财产与基金财产做到完全隔离", "B": "按照规定履行职责", "C": "从事内幕交易、操纵交易价格", "D": "公平地对待其管理的不同基金财产"}, "a": "C", "an": "私募基金管理人及其从业人员从事私募基金业务，不得有以下行为：（1）将其固有财产或者他人财产混同于基金财产从事投资活动；（2）不公平地对待其管理的不同基金财产；（3）利用基金财产或者职务之便，为本人或者投资者以外的人牟取利益，进行利益输送；（4）侵占、挪用基金财产；（5）泄露因职务便利获取的未公开信息，利用该信息从事或者明示、暗示他人从事相关的交易活动；（6）从事损害基金财产和投资者利益的投资活动；（7）玩忽职守，不按照规定履行职责；（8）从事内幕交易、操纵交易价格及其他不正当交易活动。除上述禁止行为以外，私募基金管理人及其从业人员也不得从事法律、行政法规和中国证监会规定禁止的其他行为。", "type": "single"}, {"id": "cflue_mock_2.json_23", "q": "根据《证券交易所管理办法》，下列关于证券交易所职能的说法，正确的有（）。", "c": {"A": "审核、安排证券上市交易", "B": "对首次公开发行股票网下投资者进行注册和自律管理", "C": "依法审核公开发行证券申请", "D": "决定证券终止和重新上市"}, "a": "ACD", "an": "D属于根据《注册制下首次公开发行股票网下投资者管理规则》，担任科创板、创业板首发股票主承销商的证券公司的职责。故选ABC。", "type": "multi"}, {"id": "cflue_mock_2.json_27", "q": "下列关于融资融券交易的说法，正确的有（）。", "c": {"A": "融券交易是借入证券并卖出", "B": "融资交易中投资者需向证券公司缴纳一定的保证金或者可冲抵保证金的证券", "C": "融资交易是借入资金买入证券", "D": "融券交易投资者无需向证券公司缴纳一定的保证金或者可冲抵保证金的证券"}, "a": "ABC", "an": "融资融券交易中，投资者均需向证券公司缴纳一定的保证金，C错误。", "type": "multi"}, {"id": "cflue_mock_2.json_30", "q": "根据《证券公司分类监管规定》，证券公司分类评价每半年进行一次。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "分类评价每年进行一次，评价期为上一年度5月1日至本年度4月30日。", "type": "judge"}, {"id": "cflue_mock_2.json_31", "q": "关于股票价格变化，下列说法正确的有（）。", "c": {"A": "一般情况下，采取紧缩货币政策，会促使股价上升", "B": "一般情况下，公司盈利增加，会促使股价上升", "C": "公司的盈利水平是影响股票价格的基本因素之一", "D": "一般情况下，采取宽松货币政策，会促使股价下跌"}, "a": "BC", "an": "一般情况下，采取宽松货币政策，会促使股价上涨，采取紧缩货币政策，会促使股价下跌。BD错误。", "type": "multi"}, {"id": "cflue_mock_2.json_37", "q": "下列关于利率期限结构理论的说法，正确的有（）。", "c": {"A": "市场分割理论认为利率期限结构完全取决于对未来即期利率的市场预期", "B": "流动性偏好理论认为利率曲线的形状是由未来利率的预期和延长偿还期所必需的流动性溢价共同决定", "C": "市场预期利率认为利率期限结构取决于短期资金市场供求状况与长期资金市场供求状况的比较", "D": "流动性偏好理论认为流动性溢价是远期利率和未来的预期即期利率之间的差额"}, "a": "BD", "an": "市场预期理论又被称为无偏预期理论，认为利率期限结构完全取决于对未来即期利率的市场预期，A错误；市场分割理论下，利率期限结构取决于短期资金市场供求状况与长期资金市场供求状况的比较，或者说取决于短期资金市场供需曲线交叉点的利率与长期资金市场供需曲线交叉点的利率对比，C错误。", "type": "multi"}, {"id": "cflue_mock_2.json_38", "q": "公司作为企业法人，具有以自有财产独立对外承担各种责任的能力。这种责任能力的基础在于公司享有法人财产权。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "公司是企业法人，有独立的法人财产，享有法人财产权。公司以其全部财产对公司的债务承担责任。", "type": "judge"}, {"id": "cflue_mock_2.json_42", "q": "下列有关公司合并、分立的说法，错误的是（）。", "c": {"A": "有限责任公司合并或分立，必须经代表2/3以上表决权的股东通过", "B": "股份有限公司合并或分立，必须经出席会议的股东所持表决权的2/3以上通过", "C": "公司应当自作出合并、分立决议之日起10日内通知债权人，并于30日内在报纸上公告", "D": "公司合并、分立的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保"}, "a": "D", "an": "公司合并的，债权人自接到通知书之日起30日内，未接到通知书的自公告之日起45日内，要求公司清偿债务或者提供担保；公司分立的，分立前的债务由分立后的公司承担连带责任。因此，选项A错误。", "type": "single"}, {"id": "cflue_mock_2.json_46", "q": "根据《上市公司并购重组财务顾问业务管理办法》，下列关于财务顾问主办人执业行为规范的说法，正确的有（）。", "c": {"A": "财务顾问主办人应当参加中国证券业协会组织的相关培训", "B": "财务顾问主办人和项目协办人应当在财务顾问专业意见上签名", "C": "就中国证监会在反馈意见中提出的问题，财务顾问主办人应当与项目团队成员商议后直接尽快回复", "D": "财务顾问主办人应当督促委托人的董事、监事和高级管理人员及其他内幕信息知情人对所知悉的内幕信息严格保密"}, "a": "ABD", "an": "财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核查机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，审慎回复。", "type": "multi"}, {"id": "cflue_mock_2.json_58", "q": "基金财产的债权与债务与基金管理人的固有财产严格区分，体现的是基金财产的收益性。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "基金的独立性体现在基金财产独立于基金管理人、基金托管人的固有财产。基金管理人、基金托管人不得将基金财产归入其固有财产。", "type": "judge"}, {"id": "cflue_mock_2.json_59", "q": "证券服务机构为证券的发行、上市、交易等证券业务活动提供相关服务时，关于其法律责任，下列说法正确的有（）。", "c": {"A": "如果与被服务机构有利益冲突，只要做好防火墙即可", "B": "其出具的相关文件资料不得有虚假记载、误导性陈述或重大遗漏", "C": "如果给他人造成损失，即使能够证明自己没有过错，也必须承担带赔偿责任", "D": "若造成他人损失的，应当与发行人、上市公司承担连带赔偿责任"}, "a": "BD", "an": "证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。其制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与发行人、上市公司承担连带赔偿责任，但是，能够证明自己没有过错的除外。如果与被服务机构有利益冲突，需要建立严格的防火墙制度与业务隔离制度，有效执行信息隔离等内部控制制度，切实防范利益输送。", "type": "multi"}, {"id": "cflue_mock_2.json_60", "q": "封闭式基金的基金份额总额在基金合同期限内固定不变。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "采用开放式运作方式的基金，是指基金份额总额不固定，基金份额可以在基金合同约定的时间和场所申购或者赎回的基金。", "type": "judge"}, {"id": "cflue_mock_2.json_62", "q": "下列有关有限责任公司的说法中，错误的是（）。", "c": {"A": "执行董事的职权由公司章程规定", "B": "股东人数较少或者规模较小的有限责任公司，可以不设董事会", "C": "执行董事不得兼任公司经理", "D": "有限责任公司董事会成员为3人至13人"}, "a": "C", "an": "有限责任公司中，执行董事是可以兼任公司经理，选项A错误。", "type": "single"}, {"id": "cflue_mock_2.json_63", "q": "下列关于存托凭证（ADR）的说法，正确的有（）。", "c": {"A": "存托凭证能避开直接发行股票和债券的相关法律要求，上市手续简单，发行成本低", "B": "上市交易的ADR不须经过SE注册", "C": "由于市场容量大，在美国发行ADR的外国公司能在短期内筹集到大量的外汇资金", "D": "存托凭证由J.P摩根首创"}, "a": "ACD", "an": "上市交易的ADR须经美国证券交易委员会(SEC)注册，有助于保障投资者权益。D错误。", "type": "multi"}, {"id": "cflue_mock_2.json_68", "q": "下列关于监管部门对全国股转系统业务监管措施的说法，错误的是（）。", "c": {"A": "中国证监会可以要求全国股转系统对股票发行承销过程中涉嫌违法违规的进行调查处理，或者直接责令公司、证券公司暂停或终止发行", "B": "全国股转系统应当发挥自律管理作用，对股票公开转让的公众公司及相关信息披露义务人披露信息进行监督，督促其依法及时、准确地披露信息", "C": "监管对象不服全国股转公司作出的纪律处分决定的，可自收到处分通知之日起15个工作日内向全国股转公司申请复核，复核期间该处分决定不停止执行", "D": "全国股转系统可以依据相关规则对股票公开转让的公众公司进行检查"}, "a": "A", "an": "全国股转系统对股票发行承销过程实施自律管理。发现异常情形或者涉嫌违法违规的，中国证监会可以要求全国股转系统对相关事项进行调查处理，或者直接责令公司、证券公司暂停或【中止】发行。", "type": "single"}, {"id": "cflue_mock_2.json_76", "q": "根据《中华人民共和国证券法》，下列关于证券交易场所的说法，错误的是（）。", "c": {"A": "非公开发行的证券，可以在证券交易所、国务院批准的其他全国性证券交易场所转让", "B": "公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他地方性证券交易所交易", "C": "公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他全国性证券交易所交易", "D": "非公开发行的证券，可以在按照国务院规定设立的区域性股权市场转让"}, "a": "B", "an": "公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他【全国性】证券交易场所交易。非公开发行的证券，可以在证券交易所、国务院批准的其他全国性证券交易场所、按照国务院规定设立的区域性股权市场转让。", "type": "single"}, {"id": "cflue_mock_2.json_84", "q": "关于反洗钱工作保密，下列证券公司及其工作人员的做法，不正确的有（）。", "c": {"A": "对采取冻结措施有关的信息，可向任何单位和个人提供或说明", "B": "对配合人民银行调查可疑交易活动等有关反洗钱工作信息予以保密", "C": "对依法监测、分析、报告可疑交易的有关情况予以保密", "D": "对依法履行反洗钱职责或者义务获取的客户身份资料和交易信息保密"}, "a": "A", "an": "证券公司及其工作人员应对依法履行反洗钱职责或者义务获得的客户身份资料和交易信息，对依法监测、分析、报告可疑交易的有关情况，对配合中国人民银行调查可疑交易活动等有关反洗钱工作信息，以及对采取冻结措施有关的工作信息予以保密。非依法律规定，不得向任何单位和个人提供。", "type": "single"}, {"id": "cflue_mock_2.json_86", "q": "下列关于证券经纪业务特点的说法，正确的有（）。", "c": {"A": "委托人的指令具有权威性", "B": "委托人的资料应当及时披露", "C": "证券经纪商具有中介性", "D": "证券经纪业务的对象具有广泛性"}, "a": "ACD", "an": "客户资料的保密性，在证券经纪业务中，委托人的资料关系到其资产的安全和投资决策的实施，证券经纪商有义务为客户保密，但法律法规另有规定的除外。", "type": "multi"}, {"id": "cflue_mock_2.json_88", "q": "除《证券法》外，与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及的法律法规、部门规章和规范性文件不包括（）。", "c": {"A": "《关于加强证券经纪业务管理的规定》", "B": "《科创板上市公司重大资产重组特别规定》", "C": "《上市公司收购管理办法》", "D": "《上市公司并购重组财务顾问业务管理办法》"}, "a": "A", "an": "《关于加强证券经纪业务管理的规定》属于证券经纪的部门规章及规范性文件。", "type": "single"}, {"id": "cflue_mock_2.json_94", "q": "要约收购人甲公司拟要约收购上市公司乙股份，根据上市公司乙披露的“要约收购报告书”，甲公司发出要约收购前持有乙公司15万股股份，约占乙公司总股本的28%。本次为甲公司向除甲公司以外的乙公司全体股东发出的部分要约收购，要约价格为21元/股，要约收购股份数量为12000股，要约收购期限为30个自然日。根据该案例，回答以下问题：（1）根据《证券法》，下列关于上市公司收购的说法，正确的有（）。", "c": {"A": "在收购要约确定的承诺期限内，收购人可以撤销其收购要约", "B": "甲公司可以采取要约收购、协议收购及其他合法方式收购上市公司乙", "C": "收购要约提出的各项收购条件，适用于被收购公司的所有股东", "D": "上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件"}, "a": "BCD", "an": "在收购要约确定的承诺期限内，收购人不得撤销其收购要约。", "type": "multi"}, {"id": "cflue_mock_2.json_95", "q": "下列关于佣金的说法，正确的有（）。", "c": {"A": "A股交易佣金不得低于代收的证券交易监管费和证券交易所手续费", "B": "佣金的收费标准因交易品种、交易场所的不同而有所差异", "C": "目前我国证券投资基金交易实行固定佣金制度", "D": "A股佣金标准的起点与B股相同"}, "a": "AB", "an": "按照沪、深证券交易所公布的收费标准，我国基金交易佣金不得高于成交金额的0.5%（深圳证券交易所特别规定该佣金水平不得低于代收的证券交易监管费和证券交易经手费，上海证券交易所无此规定），起点5元，由证券公司向投资者收取。B错误。A股、证券投资基金每笔交易佣金不足5元的，按5元收取；B股每笔交易佣金不足1美元或5港元的，按1美元或5港元收取；C错误。", "type": "multi"}, {"id": "cflue_mock_2.json_100", "q": "根据《证券公司合规管理实施指引》，下列关于证券公司合规管理基本制度的说法，错误的是（）。", "c": {"A": "证券公司应当制定工作人员行为准则，引导其合规执业意识而非道德行为规范", "B": "证券公司制定的合规管理基本制度应经董事会审议通过后实施", "C": "合规管理基本制度应明确合规风险、市场风险、信用风险等风险管理的各个方面", "D": "证券公司根据自身内部控制的需要确定是否制定合规管理基本制度"}, "a": "ACD", "an": "证券公司应当制定合规管理的基本制度，经董事会审议通过后实施。合规管理的基本制度应当明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容。证券公司应当结合本公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理。证券公司应当制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规。", "type": "multi"}, {"id": "cflue_mock_2.json_101", "q": "下列关于城市商业银行特点的说法，错误的是（）。", "c": {"A": "各项业务均衡发展", "B": "通常在特定区域从事商业银行业务", "C": "依靠地缘优势与当地经济发展水平", "D": "主要针对当地企业和居民需求提供金融服务"}, "a": "A", "an": "城市商业银行通常在特定的区域从事商业银行业务，依靠地缘优势、当地经济发展水平，重点针对当地企业和居民的需求提供金融产品和服务。", "type": "single"}, {"id": "cflue_mock_2.json_104", "q": "根据《证券投资基金销售人员从业资质管理规则》，基金销售人员在开展基金宣传推介活动时应通过适当方式向基金投资人出示（）。", "c": {"A": "基金代销协议", "B": "个人身份证件", "C": "从业资质证明", "D": "任职机构出具的委托手续"}, "a": "C", "an": "基金销售人员在开展基金宣传推介、基金理财业务咨询等活动时应通过适当的方式向基金投资人出示从业资质证明。", "type": "single"}, {"id": "cflue_mock_2.json_107", "q": "某公司拟上市发行股票，已知股票每股面额为1元，按照我国《公司法》要求，该公司的股票发行价格可以是（）。", "c": {"A": "1元", "B": "5.4元", "C": "20元", "D": "0.5元"}, "a": "ABC", "an": "我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。", "type": "multi"}, {"id": "cflue_mock_2.json_108", "q": "下列关于证券公司的股东和实际控制人的说法，正确的是（）。", "c": {"A": "证券公司股东可以通过关联交易占用证券公司资产", "B": "不能清偿到期债务的个人不得成为持有证券公司5%以上股权的股东、实际控制人", "C": "证券公司股东可以通过协议使用证券公司客户资金", "D": "证券公司可以为股东融资提供担保"}, "a": "B", "an": "有下列情形之一的单位或者个人，不得成为持有证券公司5%以上股权的股东、实际控制人：1、因故意犯罪被判处刑罚，刑罚执行完毕未逾3年；2、净资产低于实收资本的50%，或者或有负债达到净资产的50%；3、不能清偿到期债务。证券公司不得挪用客户交易结算资金，不得挪用客户委托管理的资产，不得挪用客户托管在公司的证券。", "type": "single"}, {"id": "cflue_mock_2.json_118", "q": "下列选项中，不属于基金管理人职责的是（）。", "c": {"A": "对基金份额持有人大会审议事项行使表决权", "B": "进行基金会计核算并编制基金财务会计报告", "C": "保存基金财产管理业务活动的记录、账册、报表和其他相关资料", "D": "按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益"}, "a": "A", "an": "公开募集基金的基金管理人应当履行下列职责：（一）依法募集资金，办理基金份额的发售和登记事宜；（二）办理基金备案手续；（三）对所管理的不同基金财产分别管理、分别记账，进行证券投资；（四）按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益；（五）进行基金会计核算并编制基金财务会计报告；（六）编制中期和年度基金报告；（七）计算并公告基金资产净值，确定基金份额申购、赎回价格；（八）办理与基金财产管理业务活动有关的信息披露事项；（九）按照规定召集基金份额持有人大会；（十）保存基金财产管理业务活动的记录、账册、报表和其他相关资料；（十一）以基金管理人名义，代表基金份额持有人利益行使诉讼权利或者实施其他法律行为。", "type": "single"}, {"id": "comp_32949", "q": "关于注册制的说法，正确的有（）。", "c": {"A": "注册制下证监会不再对发行人的实质条件进行判断", "B": "证券交易所对发行申请进行审核", "C": "注册制以信息披露为核心", "D": "所有证券发行均实行注册制"}, "a": "ABC", "an": "选项D错误。并非所有证券发行都实行注册制，公开发行证券实行注册制，但非公开发行（定向发行）不适用注册制要求。注册制下，证监会关注信息披露质量，不对发行人投资价值做实质判断。", "type": "comprehensive", "material": "2024年修订的《中华人民共和国证券法》全面推行注册制，强化信息披露要求，提高证券违法违规成本。根据新证券法，公开发行证券实行注册制，证券交易所负责审核发行申请，中国证监会负责注册。", "sub_type": "multi"}, {"id": "comp_99326", "q": "根据《公司法》，下列事项中必须经出席股东大会的股东所持表决权的三分之二以上通过的有（）。", "c": {"A": "修改公司章程", "B": "增加注册资本", "C": "选举董事", "D": "公司合并"}, "a": "ABD", "an": "根据《公司法》规定，股东大会作出修改公司章程、增加或者减少注册资本、公司合并、分立、解散或者变更公司形式的决议，必须经出席会议的股东所持表决权的三分之二以上通过。选举董事属于普通决议事项，过半数通过即可。", "type": "comprehensive", "material": "2024年修订的《中华人民共和国证券法》全面推行注册制，强化信息披露要求，提高证券违法违规成本。根据新证券法，公开发行证券实行注册制，证券交易所负责审核发行申请，中国证监会负责注册。", "sub_type": "multi"}, {"id": "comp_27105", "q": "根据《合伙企业法》，下列行为中乙（有限合伙人）可以实施的有（）。", "c": {"A": "参与决定普通合伙人甲退伙", "B": "执行合伙事务，对外代表合伙企业", "C": "获取经审计的有限合伙企业财务会计报告", "D": "对企业经营管理提出建议"}, "a": "ACD", "an": "根据《合伙企业法》，有限合伙人不执行合伙事务，不得对外代表有限合伙企业。选项B错误。ACD均属于有限合伙人可以实施且不被视为执行合伙事务的行为。", "type": "comprehensive", "material": "合伙企业法规定了普通合伙企业和有限合伙企业两种形式。某有限合伙企业由普通合伙人甲和有限合伙人乙共同出资设立。", "sub_type": "multi"}, {"id": "comp_98871", "q": "关于合伙企业解散和清算的说法，正确的有（）。", "c": {"A": "合伙期限届满，合伙人决定不再经营的应当解散", "B": "清算人由全体合伙人担任", "C": "清算期间合伙企业不得开展与清算无关的经营活动", "D": "合伙企业注销后原普通合伙人对合伙企业债务不再承担责任"}, "a": "ABC", "an": "选项D错误。普通合伙人对合伙企业债务承担无限连带责任，即使合伙企业注销后，原普通合伙人对合伙企业存续期间的债务仍承担无限连带责任（法律规定诉讼时效等除外）。", "type": "comprehensive", "material": "合伙企业法规定了普通合伙企业和有限合伙企业两种形式。某有限合伙企业由普通合伙人甲和有限合伙人乙共同出资设立。", "sub_type": "multi"}, {"id": "cflue_zc_fl2.json_1", "q": "根据《证券公司信用风险管理指引》，下列关于证券公司信用风险业务类型的说法，正确的是（）。", "c": {"A": "包括互换、场外期权、远期等场外衍生品业务（不包括信用衍生品）", "B": "包括股票投资、约定购回式证券交易、融资融券等融资类业务", "C": "包括债券投资交易业务（不包括国债、地方债、金融债、政府支持机构债）", "D": "包括非标准化债权资产投资业务"}, "a": "D", "an": "按照业务类型分类，包括但不限于：【股票质押式回购交易】、约定购回式证券交易、融资融券等融资类业务；互换、场外期权、远期、【信用衍生品】等场外衍生品业务；债券投资交易（包括债券现券交易、债券回购交易、债券远期交易、债券借贷业务等债券相关交易业务），债券包括但不限于【国债】、地方债、金融债、政府支持机构债、企业债、非金融企业债务融资工具、公司债、资产支持证券、同业存单；【非标准化债权资产投资】；其他涉及信用风险的自有资金出资业务。", "type": "single"}, {"id": "cflue_zc_fl2.json_2", "q": "委托信息技术服务机构提供产品或服务的，证券公司依法应当承担的责任可因委托而免除或减轻。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司借助信息技术手段从事证券基金业务活动的，可以委托信息技术服务机构提供产品或服务，【但证券公司依法应当承担的责任不因委托而免除或减轻。】", "type": "judge"}, {"id": "cflue_zc_fl2.json_3", "q": "下列关于证券公司投资者适当性留痕的说法，正确的是（）。", "c": {"A": "通过互联网等非现场方式进行的，由专业投资者通过符合规定的电子方式进行确认", "B": "通过营业部网点向专业投资者进行警示的，应当全过程录音录像", "C": "通过互联网等非现场方式进行的，由普通投资者通过符合规定的电子方式进行确认", "D": "通过营业部网点向普通投资者进行告知的，必须全程录像"}, "a": "C", "an": "通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像；通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。", "type": "single"}, {"id": "cflue_zc_fl2.json_4", "q": "当可疑交易明显涉嫌洗钱、恐怖融资等犯罪活动的，证券公司应当在向中国反洗钱监测分析中心提交可疑交易报告的同时，以电子形式或书面形式向（）或者其分支机构报告，并配合反洗钱调查。", "c": {"A": "所在地中国人民银行", "B": "中国反洗钱监测分析中心", "C": "所在地中国证监会", "D": "注册地中国证监会"}, "a": "A", "an": "当可疑交易明显涉嫌洗钱、恐怖融资等犯罪活动的，证券公司应当在向中国反洗钱监测分析中心提交可疑交易报告的同时，以电子形式或书面形式向【所在地中国人民银行】或者其分支机构报告，并配合反洗钱调查。", "type": "single"}, {"id": "cflue_zc_fl2.json_5", "q": "根据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "依据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。", "type": "judge"}, {"id": "cflue_zc_fl2.json_6", "q": "下列关于证券公司分支机构的说法，正确的是（）。", "c": {"A": "证券公司设立分支机构具有法人资格", "B": "分支机构负责人资格无需证监局审批", "C": "证券公司设立分支机构需要证监局审批", "D": "证券公司某营业部负责人可以兼任其他营业部的负责人"}, "a": "B", "an": "分支机构负责人资格无需审批，A选项正确。【国务院证券监督管理机构】审批证券公司及其分支机构的设立申请。设立申请，由【证监会】审批，B选项错误。证券公司某营业部负责人不可以兼任其他营业部的负责人，C选项错误。证券公司设立分支机构不具有法人资格，D选项错误。", "type": "single"}, {"id": "cflue_zc_fl2.json_7", "q": "根据《证券公司信息隔离墙制度指引》，下列关于合规总监和合规部门建立信息隔离墙相关制度职责的说法，不正确的有（）。", "c": {"A": "合规总监和合规部门负有信息隔离墙相关制度的培训职责", "B": "合规总监和合规部门承担执行信息隔离墙相关制度的直接管理责任", "C": "合规总监和合规部门负有信息隔离墙相关制度的咨询职责", "D": "合规总监和合规部门负有信息隔离墙相关制度的审查职责"}, "a": "B", "an": "合规总监和合规部门负责协助董事会和高级管理人员建立和执行信息隔离墙制度，并负有审查、监督、检查、咨询和培训等职责。【各业务部门和分支机构的负责人】对本部门和本机构执行信息隔离墙制度的有效性承担管理责任。", "type": "single"}, {"id": "cflue_zc_fl2.json_8", "q": "甲证券公司营销人员王某拟向某70岁以上的高龄退休客户张某主动推介代销的某私募基金，根据张某在营业部填写的风险承受能力测评问卷，显示张某的风险承受能力结果为R1，但营销人员王某拟推荐的私募基金产品风险等级结果为R5，于是营销人员王某放弃了主动向张某超风险推荐该私募基金的计划。（1）关于证券公司向客户推介金融产品的行为，下列说法错误的是（）。", "c": {"A": "应当了解客户的身份、财产和收入状况", "B": "应当了解客户的金融知识和投资经验、投资目标、风险偏好等", "C": "证券公司认为客户购买金融产品不适当或者无法判断其适当性的，可以向其主动推介，但应由客户签字确认", "D": "委托人明确约定购买人范围的，证券公司不得超出委托人确定的购买人范围"}, "a": "C", "an": "证券公司认为客户购买金融产品不适当或者无法判断其适当性的，【不可以】向其主动推介。", "type": "multi"}, {"id": "cflue_zc_fl2.json_9", "q": "根据《证券公司流动性风险管理指引》，证券公司的融资管理应符合的要求包括（）。", "c": {"A": "加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，不定期评估市场融资和资产变现能力", "B": "分析正常和压力情景下未来不同时间段的融资需求和来源", "C": "密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响", "D": "加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额"}, "a": "BCD", "an": "证券公司的融资管理应符合以下要求：1、分析正常和压力情景下未来不同时间段的融资需求和来源。2、加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额。3、加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，【并定期】评估市场融资和资产变现能力。4、密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响。", "type": "multi"}, {"id": "cflue_zc_fl2.json_10", "q": "根据《证券公司投资银行类业务内部控制指引》，下列说法错误的有（）。", "c": {"A": "通过委托外部机构对投资银行类业务内部控制有效性进行评估的，证券公司依法应当承担的责任可以免除", "B": "对投资银行类项目负有主要管理责任人员的收入递延支付年限原则上不得多于3年", "C": "投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10", "D": "投资银行内部控制执行效果评估每两年评估1次"}, "a": "ABD", "an": "对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得【少】于3年。应当根据监管要求、业务发展等情况的需要，建立内部控制执行效果定期评估机制。证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估【每年】不得少于1次。委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查，避免发生利益冲突。证券公司依法应当承担的责任【不因】委托外部机构而免除。", "type": "multi"}, {"id": "cflue_zc_fl2.json_11", "q": "证券公司应当按照法律、行政法规和中国证监会的规定建立完备的盈利评估体系。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司应当按照法律、行政法规和中国证监会的规定建立完备的【合规管理、风险管理和内部控制体系】，故选B。", "type": "judge"}, {"id": "cflue_zc_fl2.json_12", "q": "经营机构告知投资者不适合购买相关产品，投资者主动要求购买风险等级高于其风险承受能力的产品时，下列做法正确的是（）。", "c": {"A": "拒绝向其销售高于其风险承受能力的产品，但如投资者仍坚持购买的，可向其销售", "B": "书面形式进行风险特别提示后，向其销售高于其风险承受能力的产品", "C": "对于确认不属于风险承受能力最低级别、以口头进行特别风险警示的，可销售", "D": "对于风险承受能力最低级别的投资者，应该拒绝向其销售"}, "a": "D", "an": "以书面形式进行特别风险警示：如投资者不属于风险承受能力最低类别，经营机构业务人员应当就产品或服务的风险等级高于投资者承受能力的情况进行特别书面风险警示。如投资者仍坚持购买的，可以向其销售相关产品或者提供相关服务。", "type": "single"}, {"id": "cflue_zc_fl2.json_13", "q": "关于证券公司治理的基本要求，下列说法正确的有（）。", "c": {"A": "建立完备的内部控制体系", "B": "建立健全“三会一层”组织架构", "C": "不得侵犯客户的合法权益", "D": "搭建先进的信息系统"}, "a": "ABC", "an": "证券公司治理的基本要求：1、建立健全组织架构、明确职责划分，建立健全“三会一层”的组织架构，明确股东（大）会、董事会、监事会、经理层之间的职责划分。2、不得侵犯客户合法权益。3、建立完备的内部控制体系。", "type": "multi"}, {"id": "cflue_zc_fl2.json_14", "q": "对证券公司投资银行类项目负有主要管理或执行责任人员的收入递延支付年限，原则上不得少于3年。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "应当针对管理和执行投资银行类项目的主要人员建立收入递延支付机制，合理确定收入递延支付标准，明确递延支付人员范围、递延支付年限和比例等内容。对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得少于3年。", "type": "judge"}, {"id": "cflue_zc_fl2.json_15", "q": "根据《证券公司流动性风险管理指引》，证券公司应至少（）对流动性风险限额进行一次评估，必要时进行调整。", "c": {"A": "每季度", "B": "每年", "C": "每月", "D": "每半年"}, "a": "B", "an": "证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。证券公司应至少【每年】对流动性风险限额进行【一次】评估，必要时进行调整。", "type": "single"}, {"id": "cflue_zc_fl2.json_16", "q": "证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为不低于每半年一次。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。", "type": "judge"}, {"id": "cflue_zc_fl2.json_17", "q": "赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（1）赵某可在（）家证券基金经营机构担任独立董事。", "c": {"A": "3", "B": "4", "C": "2", "D": "1"}, "
