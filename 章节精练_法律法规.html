确：证券分析师通过广播、电视、网络、报刊等公众媒体、自媒体以及报告会、交流会等形式，发表涉及具体证券的评论意见，或者解读其撰写的证券研究报告，应当符合证券信息传播的有关规定以及下列要求： （1）由所在证券公司或者证券投资咨询机构统一安排。【A】 （2）说明所依据的证券研究报告的发布日期。【C】 （3）禁止明示或者暗示保证投资收益。【B】 （4）准确地表述自己的研究观点，不得与其所在公司已发布证券研究报告的最新意见和建议相矛盾，也不得就所在研究机构未覆盖的公司发表证券估值或投资评级意见。【D】","type":"multi"},{"id":"cy_law_821","q":"财务顾问及其财务顾问主办人被证监会责令改正的，在证监会验收合格之前（）。","c":{"A":"可以开展新的上市公司并购重组财务顾问业务","B":"已上报项目，监管机关暂停审理","C":"不得接受新的上市公司并购重组财务顾问业务","D":"已上报项目，监管机关终止审理"},"a":"C","an":"选项C正确：《证券法》《上市公司并购重组财务顾问业务管理办法》《上市公司重大资产重组管理办法》和《上市公司收购管理办法》等法律法规均对财务顾问的法律责任进行了规定，财务顾问及其财务顾问主办人被要求责令改正的，财务顾问及其财务顾问主办人在改正期间，或者按照要求完成整改并经中国证监会验收合格之前，【不得接受新的上市公司并购重组财务顾问业务】。 选项A错误：在证监会验收合格之前，财务顾问及其财务顾问主办人是不可以开展新的上市公司并购重组财务顾问业务的。 选项BD错误：已上报项目的审理情况并没有明确规定会被暂停或终止。","type":"single"},{"id":"cy_law_823","q":"下列人员中，不属于财务顾问应当采取有效方式对其进行证券市场规范化运作的辅导的是（）。","c":{"A":"新进入上市公司的董事、监事","B":"新进入上市公司的高级管理人员、控股股东","C":"上市公司收购人","D":"新进入上市公司的实际控制人的主要负责人"},"a":"C","an":"题目问的是“说法错误的”。 选项C错误：辅导对象的核心是 “新进入上市公司内的人员或主体”（如董监高、控股股东、实际控制人及其负责人），而 “上市公司收购人” 是实施收购行为的外部主体。上市公司收购人不属于需要辅导的范畴，符合题意。因此答案选择C。 选项ABD正确：财务顾问应当采取有效方式对新进入上市公司的董事、监事和高级管理人员、控股股东和实际控制人的主要负责人进行证券市场规范化运作的辅导，包括上述人员应履行的责任和义务、上市公司治理的基本原则、公司决策的法定程序和信息披露的基本要求，并对辅导结果进行验收，将验收结果存档。验收不合格的，财务顾问应当重新进行辅导和验收。","type":"single"},{"id":"cy_law_825","q":"财务顾问及财务顾问主办人出现（），中国证监会对其采取监管谈话，出具警示函，责令改正等监管措施。","c":{"A":"内部控制机制和管理制度、尽职调查制度以及相关业务规则存在重大缺陷或者未得到有效执行的","B":"未按照相关规定发表专业意见的","C":"在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下的","D":"未依法履行持续督导义务的"},"a":"A,B,C,D","an":"选项ABCD正确：财务顾问及其财务顾问主办人出现下列情形之一的，中国证监会对其采取监管谈话、出具警示函、责令改正等监管措施： （1）内部控制机制和管理制度、尽职调查制度以及相关业务规则存在重大缺陷或者未得到有效执行的。【A】  （2）未按照相关规定发表专业意见的。【B】  （3）在受托报送申报材料过程中，未切实履行组织、协调义务、申报文件制作质量低下的。【C】  （4）未依法履行持续督导义务的。【D】 （5）未按照相关规定向中国证监会报告或者公告的。 （6）违反其就上市公司并购重组相关业务活动所作承诺的。 （7）违反保密制度或者未履行保密责任的。 （8）采取不正当竞争手段进行恶性竞争的。 （9）唆使、协助或者伙同委托人干扰中国证监会审核工作的。 （10）中国证监会认定的其他情形。","type":"multi"},{"id":"cy_law_827","q":"财务顾问应当采取有效方式对新进入上市公司的董事、监事和高级管理人员、控股股东和实际控制人的主要负责人进行证券市场规范化运作的辅导，包括上述人员应履行的责任和义务、上市公司治理的基本原则、公司决策的法定程序和信息披露的基本要求，并对辅导结果进行验收，将验收结果存档。（）","c":{"1":"对","0":"错"},"a":"1","an":"财务顾问应当采取有效方式对新进入上市公司的董事、监事和高级管理人员、控股股东和实际控制人的主要负责人进行证券市场规范化运作的辅导，包括上述人员应履行的责任和义务、上市公司治理的基本原则、公司决策的法定程序和信息披露的基本要求，并对辅导结果进行验收，将验收结果存档。","type":"judge"},{"id":"cy_law_829","q":"证券公司发行与承销业务的主要法律、行政法规包括《公司法》《证券法》《证券公司监督管理条例》《企业债券管理条例》等。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司发行与承销业务的主要法律、行政法规包括《公司法》《证券法》《证券公司监督管理条例》《企业债券管理条例》等。","type":"judge"},{"id":"cy_law_831","q":"证券公司融资融券业务中，（）负责制定融资融券合同的标准文本，确定对具体客户的授信额度。","c":{"A":"业务执行部门","B":"业务决策机构","C":"分支机构","D":"董事会"},"a":"A","an":"选项A正确：证券公司融资融券业务中，业务执行部门负责融资融券业务的具体管理和运作，【制定融资融券合同的标准文本】，【确定对具体客户的授信额度】，对分支机构的业务操作进行审批、复核和监督。 选项B错误：业务决策机构由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率(费率)、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。 选项C错误：分支机构在公司总部的集中监控下，按照公司的统一规定和决定，具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。 选项D错误：董事会负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。","type":"single"},{"id":"cy_law_833","q":"证券公司（）负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。","c":{"A":"分支机构","B":"业务决策机构","C":"董事会","D":"业务执行机构"},"a":"C","an":"选项C正确：证券公司【董事会】负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。 选项A错误：分支机构在公司总部的集中监控下，按照公司的统一规定和决定，具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。 选项B错误：业务决策机构由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率(费率)、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。 选项D错误：业务执行部门负责融资融券业务的具体管理和运作，制定融资融券合同的标准文本，确定对具体客户的授信额度，对分支机构的业务操作进行审批、复核和监督。","type":"single"},{"id":"cy_law_835","q":"自2025年起，负责融资融券交易情况监测分析并每日披露市场数据的机构是（  ）。","c":{"A":"上海证券交易所","B":"深圳证券交易所","C":"中证数据有限责任公司","D":"中国证券登记结算有限责任公司"},"a":"C","an":"中证数据有限责任公司成立于2012年8月7日，自2025年起融资融券交易情况的监测分析职责，并每日披露融资融券市场数据（涵盖融资融券余额、交易情况等18项指标）。","type":"single"},{"id":"cy_law_837","q":"（）是指客户在证券公司开立的，用于记载客户交存的担保资金及融资融券负债明细数据的账户。","c":{"A":"客户信用资金台账","B":"客户信用资金账户","C":"客户信用证券台账","D":"客户信用证券账户"},"a":"A","an":"A选项正确：【客户信用资金台账】：客户在证券公司开立的，用于记载客户交存的担保资金及融资融券负债明细数据的账户。 B选项错误：客户信用资金账户：客户在指定的商业银行开立的用于记载客户交存的担保资金的明细数据的账户。 D选项错误：客户信用证券账户：证券公司客户信用交易担保证券账户的二级账户，用于记录客户委托证券公司持有的担保证券的明细数据。 C选项错误：教材中无此概念。","type":"single"},{"id":"cy_law_839","q":"融资融券业务的决策与授权体系原则上按照（）的架构设立和运行。","c":{"A":"业务执行部门-董事会-业务决策机构-分支机构","B":"董事会-业务执行部门-业务决策机构-分支机构","C":"董事会-业务决策机构-业务执行部门-分支机构","D":"业务决策机构-业务执行部门-分支机构-董事会"},"a":"C","an":"选项C正确：融资融券业务的决策与授权体系原则上按照“董事会——业务决策机构——业务执行部门——分支机构”的架构设立和运行。 选项ABD为干扰项。","type":"single"},{"id":"cy_law_841","q":"对于客户信用交易担保证券账户内的证券转板，证券公司应当首先（  ）。","c":{"A":"直接划转证券至普通账户","B":"提示客户及时申请划转证券","C":"暂停客户融资融券交易权限","D":"要求客户追加保证金"},"a":"B","an":"《北京证券交易所融资融券业务指南》规定，客户信用交易担保证券账户内的证券转板的，证券公司应当提示客户在符合提取保证金可用余额相关维持担保比例要求的前提下，及时申请将有关证券从客户信用交易担保证券账户划转到客户普通证券账户中；客户未申请的，证券公司应当在保障客户维持担保比例不低于最低维持担保比例的前提下，于有关证券终止上市前将其从客户信用交易担保证券账户划转到客户普通证券账户中。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_law_843","q":"若客户未申请划转转板证券，证券公司应在保障维持担保比例不低于最低要求的前提下，于证券（  ）完成划转。","c":{"A":"转板申请提交时","B":"终止上市前","C":"转板上市后5个交易日内","D":"风险警示发布时"},"a":"B","an":"《北京证券交易所融资融券业务指南》规定，客户信用交易担保证券账户内的证券转板的，证券公司应当提示客户在符合提取保证金可用余额相关维持担保比例要求的前提下，及时申请将有关证券从客户信用交易担保证券账户划转到客户普通证券账户中；客户未申请的，证券公司应当在保障客户维持担保比例不低于最低维持担保比例的前提下，于有关证券终止上市前将其从客户信用交易担保证券账户划转到客户普通证券账户中。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_law_845","q":"某证券公司的董事会最近审议了年度经营计划，以下关于融资融券业务的部分，董事会负责（  ）。","c":{"A":"确定客户张先生500万元的融资额度申请","B":"修订融资融券业务合同中的违约处理条款细节","C":"将公司融资融券业务的总规模上限设定为200亿元","D":"确定沪深300成分股作为可充抵保证金的具体证券名单"},"a":"C","an":"融资融券业务的决策与授权体系原则上按照“董事会—业务决策机构—业务执行部门一分支机构”的架构设立和运行。 1.董事会负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。（C正确） 2.业务决策机构由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率(费率)、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率（D错误）、客户可融资买入和融券卖出的证券种类。 3.业务执行部门负责融资融券业务的具体管理和运作，制定融资融券合同的标准文本，确定对具体客户的授信额度（AB错误），对分支机构的业务操作进行审批、复核和监督。 4.分支机构在公司总部的集中监控下，按照公司的统一规定和决定，具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。","type":"single"},{"id":"cy_law_847","q":"下列事项中，证券公司分支机构可以做的是（）。","c":{"A":"经总部批准向客户融资融券","B":"自行决定签约","C":"自行决定开户","D":"自行决定保证金收取"},"a":"A","an":"选项A正确：分支机构可以在总部的批准下向客户融资融券，符合集中管理原则。 选项BCD错误：融资融券业务的决策和主要管理职责应当由证券公司总部承担，并应加强对分支机构融资融券业务活动的控制，禁止分支机构未经总部批准向客户融资、融券，禁止分支机构自行决定签约、开户、授信、保证金收取等应当由总部决定的事项。","type":"single"},{"id":"cy_law_849","q":"证券公司或其分支机构违反《证券公司融资融券业务管理办法》，（）可采取责令改正、监管谈话、出具警示函、责令公开说明、责令参加培训、责令定期报告、暂不受理与行政许可有关的文件、暂停部分或者全部业务、撤销业务许可等相关监管措施。","c":{"A":"中国证监会或者其派出机构","B":"中国人民银行","C":"国务院","D":"证券业协会"},"a":"A","an":"选项A正确：证券公司或其分支机构违反《证券公司融资融券业务管理办法》，【中国证监会或者其派出机构】可采取责令改正、监管谈话、出具警示函、责令公开说明、责令参加培训、责令定期报告、暂不受理与行政许可有关的文件、暂停部分或者全部业务、撤销业务许可等相关监管措施。 选项B错误：中国人民银行的职责主要包括货币政策制定、金融宏观调控、支付结算管理、反洗钱等，不直接负责证券业务的日常监管。 选项C错误：国务院作为最高国家行政机关，统一领导全国行政工作，但具体的行业监管职责由其下属的职能部门（如中国证监会）承担。 选项D错误：证券业协会是证券行业的自律性组织，主要通过制定自律规则、开展行业检查等方式实施自律管理。","type":"single"},{"id":"cy_law_851","q":"融资融券业务中，证券公司在可以存管证券公司客户交易结算资金的商业银行开立（），用于存放客户交存的、担保证券公司因向客户融资融券所生债权的资金。","c":{"A":"信用交易资金交收账户","B":"客户信用交易担保资金账户","C":"融资专用资金账户","D":"结算备付金账户"},"a":"B","an":"选项B正确：【客户信用交易担保资金账户】，用于存放客户交存的、担保证券公司因向客户融资融券所生债权的资金。 选项A错误：信用交易资金交收账户：用于客户融资融券交易的资金结算，不是用来存放客户担保资金的。 选项C错误：融资专用资金账户：用于存放证券公司拟向客户融出的资金及客户归还的资金，并非专门存放客户担保资金的账户。 选项D错误：结算备付金账户：与本题无关，它主要用于存放证券公司在登记结算机构的资金，以备日常交收使用。","type":"single"},{"id":"cy_law_853","q":"证券公司开展融资融券业务，必须经（）批准。","c":{"A":"证券行业协会","B":"证券交易所","C":"中国证监会","D":"证券信用公司"},"a":"C","an":"选项C正确：证券公司开展融资融券业务，必须经【中国证监会】批准。 选项A错误：中国证券业协会是证券行业的自律性组织，属于社会团体法人，职责包括制定行业自律规则、开展行业培训、组织合规检查等自律管理，但不具备行政审批权限。 选项B错误：证券交易所是为证券集中交易提供场所和设施。 选项D错误：干扰项，无此概念。","type":"single"},{"id":"cy_law_855","q":"获得批准的证券公司应当按照规定，向公司登记机关申请业务范围变更登记，向（）申请换发经营证券业务许可证。","c":{"A":"证券行业协会","B":"证券交易所","C":"中国证监会","D":"证券登记结算机构"},"a":"C","an":"选项C正确：获得批准的证券公司应当按照规定，向公司登记机关申请业务范围变更登记，向【中国证监会】申请换发经营证券业务许可证。 选项A错误：中国证券业协会是证券行业的自律性组织，主要职责是制定行业规范、开展自律管理、提供行业服务等。 选项B错误：证券交易所的职能是为证券交易提供场所和设施、审核证券上市等，不涉及证券公司业务范围的行政许可或许可证管理。 选项D错误：证券登记结算机构的主要职责是证券账户管理、证券登记、存管和结算等，不涉及证券公司业务资格的行政许可。","type":"single"},{"id":"cy_law_857","q":"（）负责制定融资融券业务的操作流程，确定对单一客户和单一证券的授信额度。","c":{"A":"董事会","B":"业务决策机构","C":"业务执行部门","D":"分支机构"},"a":"B","an":"选项B正确：业务决策机构由有关高级管理人员和部门负责人组成，负责【制定融资融券业务操作流程】，选择可从事融资融券业务的分支机构，【确定对单一客户和单一证券的授信额度】、融资融券的期限和利率（费率）、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。 选项A错误：董事会负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。 选项C错误：业务执行部门负责融资融券业务的具体管理和运作，制定融资融券合同的标准文本，确定对具体客户的授信额度，对分支机构的业务操作进行审批、复核和监督。 选项D错误：分支机构在公司总部的集中监控下，按照公司的统一规定和决定，具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。","type":"single"},{"id":"cy_law_859","q":"客户向证券公司申请开展融资融券业务，应当由客户本人向证券公司营业部提出申请，并应根据证券公司营业部的要求提供相应的书面申请材料，一般包括（）。","c":{"A":"有效身份证明文件","B":"融资融券业务申请表","C":"客户财务状况证明","D":"担保品证明"},"a":"A,B,C,D","an":"选项ABCD正确：客户向证券公司申请开展融资融券业务，应当由客户本人向证券公司营业部提出申请，并应根据证券公司营业部的要求提供相应的书面申请材料，一般包括：【有效身份证明文件、融资融券业务申请表】、客户已开设相关账户的基本信息、【客户财务状况证明、担保品证明】等相关材料。","type":"multi"},{"id":"cy_law_861","q":"证券公司经营融资融券业务，应当以自己的名义，在商业银行分别开立（）。","c":{"A":"融券专用证券账户","B":"客户信用交易担保证券账户","C":"融资专用资金账户","D":"客户信用交易担保资金账户"},"a":"C,D","an":"选项CD正确：证券公司经营融资融券业务，应当以自己的名义，在商业银行分别开立【融资专用资金账户和客户信用交易担保资金账户】。 选项AB错误：证券公司经营融资融券业务，应当以自己的名义，在证券登记结算机构分别开立融券专用证券账户、客户信用交易担保证券账户、信用交易证券交收账户和信用交易资金交收账户。","type":"multi"},{"id":"cy_law_863","q":"根据中国证券业协会发布的《融资融券合同必备条款》，融资融券业务合同的基本内容应包含（）。","c":{"A":"当事人姓名、住所等相关信息","B":"订立合同的目的和依据","C":"开立信用业务相关账户的有关内容","D":"甲乙双方对主体资格、交易资产来源、身份证明材料的真实性等方面的声明与保证"},"a":"A,B,C,D","an":"选项ABCD正确：根据中国证券业协会发布的《融资融券合同必备条款》，融资融券业务合同的基本内容应包含： 1.当事人姓名、住所等相关信息（A项）。  2.订立合同的目的和依据（B项）。 3.对融资融券交易所涉及的信用账户、融资与融券交易、担保物、保证金比例、维持担保比例、强制平仓等专业术语进行解释或定义。合同还应当对《证券公司监督管理条例》中的“客户证券担保账户”“客户资金担保账户”“授信账户”与《证券公司融资融券业务管理办法》中的“客户信用交易担保证券账户”“客户信用交易担保资金账户”“客户信用证券账户和客户信用资金账户”之间的对应关系作出解释和说明。 4.合同应载明甲乙双方对主体资格、交易资产来源、身份证明材料的真实性等方面的声明与保证（D项）。 5.合同应载明开立信用业务相关账户的有关内容（C项）。 6.合同应约定融资融券特定的财产信托关系，即信托目的、信托财产范围、信托的成立和生效、信托财产的管理、信托财产的处分及信托的终止。 7.合同应约定甲方从事融资融券交易的保证金比例及计算公式、保证金可用余额计算公式、可充抵保证金的证券范围和折算率、标的证券范围等。 8.合同应约定甲方从事融资融券交易的信用额度、融资融券期限、融资利率和融券费用的确定方式及相应的计算公式等事项。 9.合同应对融资融券交易的主要业务操作环节加以约定。 10.合同应约定甲方从事融资融券交易的维持担保比例和计算公式、补仓时间、补仓期限、补仓后应达到的维持担保比例以及乙方要求甲方补仓的通知方式。约定内容应当符合证券交易所的有关规定。 11.合同应约定乙方强制平仓的各类情形、平仓开始与停止条件、平仓顺序等事项。合同还可以约定，如甲方逾期偿还债务的，乙方将收取违约金，并明确违约金的计算方式。 12.合同应约定甲方清偿债务的范围、方式、期限以及债务清偿后信用账户的处理方式等有关事项。 13.合同应约定在融资融券交易期间，当出现可充抵保证金证券范围和折算率调整；保证金比例与维持担保比例调整；标的证券范围调整；标的证券暂停交易或终止上市；乙方被取消或限制融资融券交易权限；司法机关对甲方信用证券账户记载的权益采取财产保全或强制执行措施；甲方信用证券账户记载的权益被继承、财产细分或无偿转让等特殊情况时，对尚未了结的融资融券交易的处理方式。 14.约定融资融券交易所涉及的权益处理事项。 15.合同应载明通知与送达的有关事项。 16.合同应明确载人因火灾、地震等不可抗力；非因乙方自身原因导致的技术系统异常事故；政策法规修改；法律法规规定的其他情形等因素，导致合同任何一方不能及时或完全履行合同，免除其相应责任的条款。 17.合同应约定导致合同终止的各种具体情形。 18.合同应约定适用的法律和争议处理方式（仲裁或诉讼方式选择一种）。 19.合同应明确约定合同成立与生效条件、合同期限、合同份数等事项。 20.合同应明确载明“乙方确认已向甲方说明融资融券交易的风险，不保证甲方获得投资收益或承担甲方投资损失；甲方确认，已充分理解本合同内容，自行承担风险和损失。”","type":"multi"},{"id":"cy_law_865","q":"根据中国证券业协会发布的《融资融券业务交易风险揭示书》，其基本内容应包含（）。","c":{"A":"提示客户注意融资融券交易具有普通证券交易所具有的政策风险、市场风险、违约风险、系统风险等各种风险","B":"提示客户在开户从事融资融券交易前，必须了解所在的证券公司是否具有开展融资融券业务的资格","C":"提示客户在从事融资融券交易期间，如果其信用资质状况降低，证券公司会相应降低对其的授权额度","D":"提示客户应妥善保管信用账户卡、身份证件和交易密码等资料"},"a":"A,B,C,D","an":"选项ABCD正确：《融资融券业务交易风险揭示书》的基本内容应包含： 1.提示客户注意融资融券交易具有普通证券交易所具有的政策风险、市场风险、违约风险、系统风险等各种风险（A项），以及其特有的投资风险放大等风险。 2.提示客户在开户从事融资融券交易前，必须了解所在的证券公司是否具有开展融资融券业务的资格（B项）。 3.提示客户在从事融资融券交易期间，如果不能按照约定的期限清偿债务，或上市证券价格波动导致担保物价值与其融资融券债务之间的比例低于维持担保比例，且不能按照约定的时间、数量追加担保物时，将面临担保物被证券公司强制平仓的风险。 4.提示客户在从事融资融券交易期间，如果其信用资质状况降低，证券公司会相应降低对其的授信额度（C项），或者证券公司提高相关警戒指标、平仓指标所产生的风险，可能会给客户造成经济损失。 5.提示客户在从事融资融券交易期间，如果中国人民银行规定的同期金融机构贷款基准利率调高，证券公司将相应调高融资利率或融券费率，客户将面临融资融券成本增加的风险。 6.提示客户在从事融资融券交易期间，如果因自身原因导致其资产被司法机关采取财产保全或强制执行措施，或者出现丧失民事行为能力、破产、解散等情况时，客户将面临被证券公司提前了结融资融券交易的风险，可能会给客户造成经济损失。 7.提示客户在从事融资融券交易期间，如果发生融资融券标的证券范围调整、标的证券暂停交易或终止上市等情况，客户将可能面临被证券公司提前了结融资融券交易的风险，可能会给客户造成经济损失。 8.提示客户在从事融资融券交易期间，证券公司将以《融资融券合同》约定的通知与送达方式及通讯地址，向客户发送通知。通知发出并经过约定的时间后，将视作证券公司已经履行对客户的通知义务。客户无论因何种原因没有及时收到有关通知，都会面临担保物被证券公司强制平仓的风险，可能会给客户造成经济损失。 9.提示客户应妥善保管信用账户卡、身份证件和交易密码等资料（D项），如客户将信用账户、身份证件、交易密码等出借给他人使用，由此造成的盾果由客户承担。 10.除上述九项风险提示外，各证券公司还可以根据具体情况在其制订的《融资融券交易风险揭示书》中对融资融券交易存在的风险进一步列举。","type":"multi"},{"id":"cy_law_867","q":"证券公司经营融资融券业务，应当以自己的名义，在证券登记结算机构开立的账户有（）。","c":{"A":"融券专用证券账户","B":"客户信用交易担保资金账户","C":"信用交易证券交收账户","D":"信用交易资金交收账户"},"a":"A,C,D","an":"选项B错误：证券公司经营融资融券业务，应当以自己的名义，在商业银行分别开立融资专用资金账户和客户信用交易担保资金账户。 选项ACD正确：证券公司经营融资融券业务，应当以自己的名义，在证券登记结算机构分别开立【融券专用证券账户、客户信用交易担保证券账户、信用交易证券交收账户和信用交易资金交收账户】。  【知识拓展】融资融券业务的账户体系 一、证券公司经营融资融券业务，应当以自己的名义，在证券登记结算机构分别开立融券专用证券账户、客户信用交易担保证券账户、信用交易证券交收账户和信用交易资金交收账户。 1.融券专用证券账户：用于记录证券公司持有的拟向客户融出的证券和客户归还的证券，不得用于证券买卖。 2.客户信用交易担保证券账户：用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。 3.信用交易证券交收账户：用于客户融资融券交易的证券结算。 4.信用交易资金交收账户：用于客户融资融券交易的资金结算。 二、证券公司经营融资融券业务，应当以自己的名义，在商业银行分别开立融资专用资金账户和客户信用交易担保资金账户。 1.融资专用资金账户：用于存放证券公司拟向客户融出的资金及客户归还的资金。 2.客户信用交易担保资金账户：用于存放客户交存的、担保证券公司因向客户融资融券所生债权的资金。","type":"multi"},{"id":"cy_law_869","q":"应当建立融资融券信息共享机制的主要机构包括（）。","c":{"A":"商业银行","B":"证券金融公司","C":"证券登记结算机构","D":"证券交易所"},"a":"B,C,D","an":"选项BCD正确：【证券交易所、证券登记结算机构、证券金融公司】应当建立融资融券信息共享机制。 选项A错误：融资融券的信息共享主要涉及交易数据、证券登记、信用交易监控等证券市场内部环节，商业银行不直接参与融资融券业务，因此不需要与证券金融公司等机构建立融资融券信息共享机制。","type":"multi"},{"id":"cy_law_871","q":"在对融资融券客户的选择过程中，主要标准包括（）。","c":{"A":"客户的犯罪记录","B":"客户的投资风格","C":"客户的账户状态","D":"客户的资产状况"},"a":"B,C,D","an":"选项BCD正确：在对融资融券客户的选择过程中，主要标准包括：（1）从事证券交易时间。（2）账户状态。（3）信誉状况。（4）资产状况。（5）投资风格。（6）关联关系。 选项A错误：干扰项，其背后原因为融资融券本质是信用交易，证券公司关注的是客户的还款能力和履约意愿：犯罪记录与还款能力无直接关联。例如，醉酒交通肇事罪不影响还款能力。","type":"multi"},{"id":"cy_law_873","q":"证券公司申请融资融券业务资格，应当向中国证监会提交的材料包括（）。","c":{"A":"融资融券业务资格申请书","B":"股东(大)会关于经营融资融券业务的决议","C":"中国证券业协会出具的关于融资融券业务技术系统已通过测试的证明文件","D":"融资融券业务内部管理制度文本"},"a":"A,B,D","an":"选项C错误：应为“证券交易所、证券登记结算机构（并非中国证券业协会）出具的关于融资融券业务技术系统已通过测试的证明文件” 选项ABD正确：证券公司申请融资融券业务资格，应当向中国证监会提交下列材料，同时抄报住所地证监会派出机构： （1）融资融券业务资格申请书；（A项正确）  （2）股东会关于经营融资融券业务的决议；（B项正确）  （3）融资融券业务方案、内部管理制度文本和按照《证券公司融资融券业务管理办法》第十二条制定的选择客户的标准；（D项正确） （4）负责融资融券业务的高级管理人员与业务人员的名册及资格证明文件； （5）证券交易所、证券登记结算机构出具的关于融资融券业务技术系统已通过测试的证明文件； （6）中国证监会要求提交的其他文件。","type":"multi"},{"id":"cy_law_875","q":"北交所融资融券业务中，证券公司对转板证券的处理措施包括（  ）。","c":{"A":"强制客户卖出证券","B":"提示客户申请划转至普通账户","C":"在符合条件时主动划转证券","D":"暂停证券交易权限"},"a":"B,C","an":"《北京证券交易所融资融券业务指南》规定，客户信用交易担保证券账户内的证券转板的，证券公司应当提示客户在符合提取保证金可用余额相关维持担保比例要求的前提下，及时申请将有关证券从客户信用交易担保证券账户划转到客户普通证券账户中（B正确）；客户未申请的，证券公司应当在保障客户维持担保比例不低于最低维持担保比例的前提下，于有关证券终止上市前将其从客户信用交易担保证券账户划转到客户普通证券账户中（C正确）。 综上，该题选BC，选项AD错误。","type":"multi"},{"id":"cy_law_877","q":"关于融资融券业务交易风险揭示书，下列说法正确的有（  ）。","c":{"A":"证券公司与客户签订融资融券合同之后，应将融资融券交易风险揭示书交由客户书面确认并妥善存档保管","B":"融资融券业务交易风险揭示书应当提示客户，在从事融资融券交易期间，在特定情况下可能面临担保物被证券公司强制平仓的风险","C":"融资融券业务交易风险揭示书应当提示客户，在从事融资融券交易期间，如果发生融资融券标的证券终止上市情况，将面临被证券公司提前了结融资融券交易的风险","D":"融资融券业务交易风险揭示书应当提示客户，如果其信用资质状况降低，将面临授信额度降低而造成经济损失的风险"},"a":"B,C,D","an":"选项BCD正确：根据中国证券业协会发布的《融资融券交易风险揭示书必备条款》，融资融券业务交易风险揭示书的基本内容应包含： 1.提示客户注意融资融券交易具有普通证券交易所具有的政策风险、市场风险、违约风险、系统风险等各种风险，以及其特有的投资风险放大等风险。 2.提示客户在开户从事融资融券交易前，必须了解所在的证券公司是否具有开展融资融券业务的资格。 3.提示客户在从事融资融券交易期间，如果不能按照约定的期限清偿债务，或上市证券价格波动导致担保物价值与其融资融券债务之间的比例低于维持担保比例，且不能按照约定的时间、数量追加担保物时，将面临担保物被证券公司强制平仓的风险。 4.提示客户在从事融资融券交易期间，如果其信用资质状况降低，证券公司会相应降低对其的授信额度，或者证券公司提高相关警戒指标、平仓指标所产生的风险，可能会给客户造成经济损失。 5.提示客户在从事融资融券交易期间，如果中国人民银行规定的同期金融机构贷款基准利率调高，证券公司将相应调高融资利率或融券费率，客户将面临融资融券成本增加的风险。 6.提示客户在从事融资融券交易期间，如果因自身原因导致其资产被司法机关采取财产保全或强制执行措施，或者出现丧失民事行为能力、破产、解散等情况时，客户将面临被证券公司提前了结融资融券交易的风险，可能会给客户造成经济损失。 7.提示客户在从事融资融券交易期间，如果发生融资融券标的证券范围调整、标的证券暂停交易或终止上市等情况，客户将可能面临被证券公司提前了结融资融券交易的风险，可能会给客户造成经济损失。 8.提示客户在从事融资融券交易期间，证券公司将以《融资融券合同》约定的通知与送达方式及通信地址，向客户发送通知。通知发出并经过约定的时间后，将视作证券公司已经履行对客户的通知义务。客户无论因何种原因没有及时收到有关通知，都会面临担保物被证券公司强制平仓的风险，可能会给客户造成经济损失。 9.提示客户应妥善保管信用账户卡、身份证件和交易密码等资料，如客户将信用账户、身份证件、交易密码等出借给他人使用，由此造成的后果由客户承担。 10.除上述9项风险提示外，各证券公司还可以根据具体情况在其制定的《融资融券交易风险揭示书》中对融资融券交易存在的风险进一步列举。 选项A错误：证券公司与客户签订融资融券合同前，应将融资融券交易风险揭示书交由客户书面确认。","type":"multi"},{"id":"cy_law_879","q":"根据沪、深、北证券交易所“融资融券交易实施细则”，证券公司按照相关规定开立融券专用证券账户、客户信用交易担保证券账户、融资专用资金账户及客户信用交易担保资金账户后，应在开户后5个交易日内报交易所备案。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据沪、深、北证券交易所“融资融券交易实施细则”，证券公司按照相关规定开立融券专用证券账户、客户信用交易担保证券账户、融资专用资金账户及客户信用交易担保资金账户后，应在开户后3个交易日（并非5个交易日）内报交易所备案。","type":"judge"},{"id":"cy_law_881","q":"G证券公司开展融资融券业务，在搭建决策与授权体系时，业务决策机构成员认为普通员工对业务更熟悉，所以由普通员工组成业务决策机构。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"业务决策机构由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率(费率)、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。","type":"judge"},{"id":"cy_law_883","q":"证券公司委托其他证券公司或者基金管理公司进行证券投资管理，且投资规模合计不超过其净资本（）的，无须取得证券自营业务资格。","c":{"A":"0.9","B":"0.8","C":"0.7","D":"0.6"},"a":"B","an":"选项B正确：证券公司委托其他证券公司或者基金管理公司进行证券投资管理，且投资规模合计【不超过其净资本80％】的，无须取得证券自营业务资格。","type":"single"},{"id":"cy_law_885","q":"证券公司自营业务违反《中华人民共和国刑法》规定的行为不包括（）。","c":{"A":"以自己为交易对象，进行不转移证券所有权的自买自卖，影响证券交易价格的行为","B":"单独或者合谋，集中利用资金优势等操纵证券交易量的行为","C":"与他人串通，以事先约定的时间、价格和方式相互进行证券交易，影响证券交易价格的行为","D":"假借他人名义或者以个人名义从事证券自营业务"},"a":"D","an":"题目问的是“不包括”。 选项D错误：假借他人名义或者以个人名义从事证券自营业务属于证券公司自营业务违反《中华人民共和国证券法》规定的行为。 选项ABC正确：证券公司自营业务违反《中华人民共和国刑法》规定的行为： （1）证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动的行为。 （2）编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的行为。 （3）操纵证券、期货市场，影响证券、期货交易价格或者证券、期货交易量的行为，比如单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖（B项）；与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易（C项）；在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约（A项）等。 因此答案选择D。","type":"single"},{"id":"cy_law_887","q":"下列关于证券自营业务授权的说法，正确的有（）。","c":{"A":"证券公司应建立健全自营业务授权制度","B":"证券公司要制定标准的业务操作流程","C":"证券公司要建立层次分明、职责明确的业务管理体系","D":"证券公司要对授权过程作书面记录，保证授权制度的有效执行"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应建立健全自营业务授权制度（A项正确），明确授权权限、时效和责任，对授权过程做书面记录，保证授权制度的有效执行（D项正确）。同时建立层次分明、职责明确的业务管理体系（C项正确），制定标准的业务操作流程（B项正确），明确自营业务相关部门、相关岗位的职责。","type":"multi"},{"id":"cy_law_889","q":"证券公司自营业务部门的职责不包括（）。","c":{"A":"自营账户开户","B":"自营账户使用登记","C":"自营账户销户","D":"自营业务所需资金的调度"},"a":"A,B,C,D","an":"选项ABC正确：证券自营业务必须以证券公司自身名义、通过专用自营席位进行，并由【非自营业务部门】负责自营账户的管理，包括【开户、销户、使用登记】等。 选项D正确：建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营。加强自营业务资金的调度管理和自营业务的会计核算，由【非自营业务部门负责自营业务所需资金的调度】。","type":"multi"},{"id":"cy_law_891","q":"证券公司证券自营业务决策机构原则上应当按照（）的三级体制设立。","c":{"A":"股东(大)会","B":"董事会","C":"投资决策机构","D":"自营业务部门"},"a":"B,C,D","an":"选项BCD正确：证券公司应建立健全相对集中、权责统一的投资决策与授权机制。自营业务决策机构原则上应当按照【董事会—投资决策机构—自营业务部门】的三级体制设立。 选项A错误：股东大会是公司的最高权力机构，负责重大事项的决策（如公司章程修改、注册资本增减等），但不参与日常经营管理或具体业务的决策。不属于三级体制内。","type":"multi"},{"id":"cy_law_893","q":"证券公司在进行自营业务时的禁止行为包括（）。","c":{"A":"内幕交易","B":"操纵市场","C":"将自营账户借给他人使用","D":"将自营业务与代理业务混合操作"},"a":"A,B,C,D","an":"选项ABCD正确：证券自营业务的禁止性行为包括： (1)禁止内幕交易（A项）。 (2)禁止操纵市场（B项）。 (3)其他禁止的行为。包括：假借他人名义或者以个人名义进行自营业务；违反规定委托他人代为买卖证券；违反规定购买本证券公司控股股东或者与本证券公司有其他重大利害关系的发行人发行的证券；将自营账户借给他人使用（C项）；将自营业务与代理业务混合操作（D项）；法律、行政法规或中国证监会禁止的其他行为。","type":"multi"},{"id":"cy_law_895","q":"证券公司被依法撤销资产管理业务资格或者依法解散、被撤销、被宣告破产，且在（）个月内没有新的管理人承接，资产管理计划应当终止。","c":{"A":"3","B":"6","C":"12","D":"18"},"a":"B","an":"选项B正确：证券公司被依法撤销资产管理业务资格或者依法解散、被撤销、被宣告破产，且在6个月内没有新的管理人承接，资产管理计划应当终止。","type":"single"},{"id":"cy_law_897","q":"证券公司申请开展私募资产管理业务，其投资研究部门中专职从事投资研究的人员至少应为（  ）。","c":{"A":"2人","B":"3人","C":"5人","D":"10人"},"a":"B","an":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和3名以上投资经理，应具有投资研究部门且专职从事投资研究的人员不少于3人。","type":"single"},{"id":"cy_law_899","q":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和（）名以上投资经理。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"A","an":"选项A正确：证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和【3名以上投资经理】，应具有投资研究部门，且专职从事投资研究的人员不少于3人。","type":"single"},{"id":"cy_law_901","q":"证券公司私募资产管理业务的基本要求包括（）。","c":{"A":"勤勉尽责","B":"客户利益至上","C":"审慎经营","D":"业务融合"},"a":"A,B,C","an":"选项D错误：私募资产管理业务要求为业务隔离（并非业务融合）。 选项ABC正确：私募资产管理业务的基本要求包括业务资质，审慎经营，客户利益至上、勤勉尽责，业务隔离。","type":"multi"},{"id":"cy_law_903","q":"证券公司申请开展私募资产管理业务，在人员配备方面需满足的条件包括（  ）。","c":{"A":"具备符合条件的高级管理人员","B":"拥有3名以上投资经理","C":"设立投资研究部门","D":"投资研究部门的专职研究人员不少于3人"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和3名以上投资经理，应具有投资研究部门且专职从事投资研究的人员不少于3人。","type":"multi"},{"id":"cy_law_905","q":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和3名以上投资经理，应具有投资研究部门，且专职从事投资研究的人员不少于3人。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和3名以上投资经理，应具有投资研究部门，且专职从事投资研究的人员不少于3人。","type":"judge"},{"id":"cy_law_907","q":"擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法募集资金金额（）的罚款。","c":{"A":"10％以上50％以下","B":"5％以上50％以下","C":"违法所得1倍以上5倍以下","D":"违法所得1倍以上10倍以下"},"a":"B","an":"选项B正确：《证券法》第一百八十条，违反本法第九条的规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额【百分之五以上百分之五十以下】的罚款；对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同县级以上地方人民政府予以取缔。对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"single"},{"id":"cy_law_909","q":"收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"5万元以上50万元以下","B":"50万元以上500万元以下","C":"30万元以上300万元以下","D":"30万元以上500万元以下"},"a":"B","an":"选项B正确：根据《证券法》的规定，收购人未按照本法规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以【50万元以上500万元以下】的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_law_911","q":"按照《证券法》的规定，关于违规披露、不披露重要信息行政责任的具体承担方式，理解错误的是（）。","c":{"A":"信息披露义务人报送的报告或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款","B":"信息披露义务人报送的报告或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以一百万元以上一千万元以下的罚款","C":"收购人未按照规定履行上市公司收购的公告、发出收购要约等义务的，责令改正，给予警告，并处以五十万元以上五百万元以下的罚款","D":"收购人未按照规定履行上市公司收购的公告、发出收购要约等义务的，对直接负责的主管人员和其他直接责任人员给予警告，并处以30万元以上60万元以下的罚款"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误，选项C正确：收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以五十万元以上五百万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下（并非30-60万，D错误）的罚款。收购人及其控股股东、实际控制人利用上市公司收购，给被收购公司及其股东造成损失的，应当依法承担赔偿责任。 选项AB正确：信息披露义务人报送的报告或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以一百万元以上一千万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。 因此答案选择D。","type":"single"},{"id":"cy_law_913","q":"擅自公开或者变相公开发行证券的，对直接负责的主管人员和其他直接责任人员给予警告，并处以（）的罚款。","c":{"A":"五十万元以上五百万元以下","B":"六十万元以上六百万元以下","C":"七十万元以上七百万元以下","D":"八十万元以上八百万元以下"},"a":"A","an":"选项A正确：《证券法》第一百八十条的规定，违反本法第九条的规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额百分之五以上百分之五十以下的罚款；对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同县级以上地方人民政府予以取缔。对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"single"},{"id":"cy_law_915","q":"擅自公开或者变相公开发行证券的，可予以的监管措施有（）。","c":{"A":"责令停止发行","B":"退还所募资金并加算银行同期存款利息","C":"处以非法所募资金金额百分之五以上百分之五十以下的罚款","D":"对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同省级以上地方人民政府予以取缔"},"a":"A,B,C","an":"选项ABC正确：《证券法》第一百八十条的规定，违反本法第九条的规定，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，处以非法所募资金金额百分之五以上百分之五十以下的罚款。 选项D错误：对擅自公开或者变相公开发行证券设立的公司，由依法履行监督管理职责的机构或者部门会同县级（并非省级）以上地方人民政府予以取缔。对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"multi"},{"id":"cy_law_917","q":"证券公司从业人员王某，为完成考核指标，诱使客户进行了大量不必要的基金转换交易。经核算，其违法所得共计15万元。依据《证券法》，王某可能面临的罚款金额是（  ）","c":{"A":"5万元以上50万元以下","B":"15万元","C":"15万元以上150万元以下","D":"10万元以上100万元以下"},"a":"C","an":"根据《证券法》第五十七条规定，禁止证券公司及其从业人员为牟取佣金收入，诱使客户进行不必要的证券买卖。根据《证券法》第一百九十四条的规定，证券公司及其从业人员违反《证券法》第五十七条的规定，有损害客户利益的行为的，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款（15万的1-10倍即15-150万）；没有违法所得或者违法所得不足10万元的，处以10万元以上100万元以下的罚款；情节严重的，暂停或者撤销相关业务许可。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_919","q":"持有公司（）以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员，构成内幕交易、泄露内幕信息罪的犯罪主体。","c":{"A":"0.01","B":"0.05","C":"0.1","D":"0.15"},"a":"B","an":"选项B正确：","type":"single"},{"id":"cy_law_921","q":"证券公司及其从业人员违反《证券法》的规定，为牟取佣金收入，诱使客户进行不必要的证券买卖，给客户造成损失的，应当依法承担赔偿责任。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券法》第五十七条的规定，证券公司及其从业人员违反规定，为牟取佣金收入，诱使客户进行不必要的证券买卖，给客户造成损失的，应当依法承担赔偿责任。","type":"judge"},{"id":"cy_law_923","q":"证券公司从业人员赵某诱使客户交易，共获取佣金收入5万元。监管部门依法没收其5万元违法所得后，还必须对其处以最低5万元的罚款。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》第五十七条规定，禁止证券公司及其从业人员为牟取佣金收入，诱使客户进行不必要的证券买卖。根据《证券法》第一百九十四条的规定，证券公司及其从业人员违反《证券法》第五十七条的规定，有损害客户利益的行为的，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上100万元以下的罚款（并非最低5万元）；情节严重的，暂停或者撤销相关业务许可。","type":"judge"},{"id":"cy_law_925","q":"李某在A证券公司登记为一般证券业务人员，后内部转岗为证券经纪人。关于其登记信息变更，下列说法正确的是（  ）。","c":{"A":"无需变更，登记一次即可","B":"由李某本人在转岗后10个工作日内自行变更","C":"A公司应当在其转岗后5个工作日内办理变更登记","D":"向中国证监会提交变更申请"},"a":"C","an":"登记人员从事的业务类别发生变化的，证券公司应当自发生变化之日起5个工作日内为其办理变更登记。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_law_927","q":"为保障客户资金安全，监管法规对证券公司及其从业人员的行为作出了明确限制。以下做法中合规的是（  ）。","c":{"A":"为满足临时头寸需求，营业部总经理指令将某大额客户资金短暂划入公司自有账户周转一日","B":"为帮助重要客户解决紧急资金需求，客户经理以其托管的证券为担保，向第三方提供短期融资便利","C":"将客户资金和自有资金在银行开立不同的账户分别进行管理","D":"为撮合两位熟悉的投资者之间的资金借贷，客户经理主动提供合同范本并作为见证人"},"a":"C","an":"选项C正确：“开立不同的账户分别进行管理”是履行账户管理的具体措施，是正确做法。 证券公司应当将投资者的证券和资金与自有财产分别管理，并采取措施保障投资者证券和资金的安全、完整。证券公司及其从业人员不得有下列行为： (1)将投资者的证券和资金归入自有财产、擅自划出投资者账户；（A不合规） (2)违规将投资者的证券和资金冻结、提供给他人使用或者为他人提供担保；（B不合规） (3)违规为投资者与投资者之间、投资者与他人之间的融资提供中介、担保或者其他便利和服务；（D不合规） (4)其他损害投资者证券和资金安全的行为。","type":"single"},{"id":"cy_law_929","q":"证券公司应当自相关人员从事证券业务之日起（）个工作日内，通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。","c":{"A":"5","B":"7","C":"15","D":"30"},"a":"A","an":"选项A正确：证券公司应当自相关人员从事证券业务之日起5个工作日内，通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。","type":"single"},{"id":"cy_law_931","q":"根据《证券经纪人管理暂行规定》，以下关于证券经纪人和证券公司的表述，说法不正确的是（）。","c":{"A":"证券公司应当在与证券经纪人签订委托合同前，对其资格条件进行严格审查","B":"证券公司只能通过本公司员工的人员从事客户招揽和客户服务活动","C":"证券经纪人只能接受一家证券公司的委托","D":"证券经纪人只能是自然人"},"a":"B","an":"题目问的是”说法不正确的“。 选项B错误：证券公司可以通过公司员工或者委托公司以外的人员（并非仅内部员工）从事客户招揽和客户服务等活动。因此答案选择B。 选项A正确：证券公司应当在与证券经纪人签订委托合同前，对其资格条件进行严格审查。 选项C正确：证券经纪人只能接受一家证券公司的委托，并应当专门代理证券公司从事客户招揽和客户服务等活动。 选项D正确：证券经纪人是指接受证券公司的委托，代理其从事客户招揽和客户服务等活动的证券公司以外的自然人。","type":"single"},{"id":"cy_law_933","q":"接受证券公司的委托，代理其从事客户招揽和客户服务等活动的证券公司以外的自然人指（）。","c":{"A":"证券经纪人","B":"证券公司客户经理","C":"做市商","D":"委托代理人"},"a":"A","an":"选项A正确：证券经纪人是指接受证券公司的委托，代理其从事客户招揽和客户服务等活动的证券公司以外的自然人。 选项B错误：证券公司客户经理通常指的是证券公司内部的员工，负责客户关系管理和客户服务，而不是接受委托的外部自然人。 选项C错误：做市商主要职责是在市场上提供买卖报价，为市场提供流动性，而不是专门从事客户招揽和客户服务。 选项D错误：委托代理人是一个更广泛的概念，可以指任何受托进行某种代理行为的人，但并不特指证券行业的客户招揽和客户服务工作。","type":"single"},{"id":"cy_law_935","q":"根据《证券经纪人管理暂行规定》，证券经纪人不得有的行为包括（）。","c":{"A":"替客户办理账户开立、注销、转移","B":"与客户约定分享投资收益","C":"向客户传递由证券公司统一提供的证券类金融产品宣传推介材料及有关信息","D":"为客户之间的融资提供中介、担保或者其他便利"},"a":"A,B,D","an":"选项C错误：证券经纪人可以向客户提供由其服务的证券公司统一提供的相关信息和材料。不属于禁止行为。 选项ABD正确：根据《证券经纪人管理暂行规定》，证券经纪人不得有的行为： 1.替客户办理账户开立、注销、转移，证券认购、交易或者资金存取、划转、查询等事宜； 2.提供、传播虚假或者误导客户的信息，或者诱使客户进行不必要的证券买卖； 3.与客户约定分享投资收益，对客户证券买卖的收益或者赔偿证券买卖的损失作出承诺； 4.采取贬低竞争对手、进入竞争对手营业场所劝导客户等不正当手段招揽客户； 5.泄露客户的商业秘密或者个人隐私； 6.为客户之间的融资提供中介、担保或者其他便利； 7.为客户提供非法的服务场所或者交易设施，或者通过互联网络、新闻媒体从事客户招揽和客户服务等活动； 8.委托他人代理其从事客户招揽和客户服务等活动； 9.损害客户合法权益或者扰乱市场秩序的其他行为。","type":"multi"},{"id":"cy_law_937","q":"根据《证券法》，下列关于证券交易的说法，正确的有（）。 I 证券交易当事人依法买卖的证券，必须是依法发行并交付的证券 II 公开发行的证券，可以在按照国务院规定设立的区域性股权市场转让 III 证券在证券交易所上市交易，应当采用公开的集中交易方式或者国务院证券监督管理机构批准的其他方式 IV 依法发行的证券，《公司法》 和其他法律对其转让期限有限制性规定的，在限定的期限内不得转让","c":{"A":"I、II、IV","B":"I、III、IV","C":"II、III","D":"III、IV"},"a":"B","an":"I项正确，证券交易当事人依法买卖的证券，必须是依法发行并交付的证券。非依法发行的证券，不得买卖。 II项错误，【非公开发行】的证券，可以在证券交易所、国务院批准的其他全国性证券交易场所、按照国务院规定设立的区域性股权市场转让。 III项正确，证券在证券交易所上市交易，应当采用公开的集中交易方式或者国务院证券监督管理机构批准的其他方式。 IV项正确，依法发行的证券，《公司法》和其他法律对其转让期限有限制性规定的，在限定的期限内不得转让。","type":"single"},{"id":"cy_law_939","q":"根据《证券法》，下列关于上市公司收购方式的说法，错误的是（）。","c":{"A":"上市公司发行不同种类股份的。收购人可以针对不同种类股份提出不同的收购条件","B":"在收购要约确定的承诺期限内，收购人不得变更其收购要约","C":"采取协议收购方式的，协议双方可以临时委托证券登记结算机构保管协议转让的股票，并将资金存放于指定的银行","D":"收购要约约定的收购期限是不得少于30日，并不得超过60日"},"a":"B","an":"B项说法错误，在收购要约确定的承诺期限内，收购人不得撤销其收购要约。【收购人需要变更收购要约的，应当及时公告，载明具体变更事项】。","type":"single"},{"id":"cy_law_941","q":"根据《证券法》，证券的发行、交易活动，必须遵循（）的原则。","c":{"A":"公开、公平、客观","B":"公允、合理、客观","C":"公开、公平、公正","D":"合理、合法、有效"},"a":"C","an":"选项C正确：证券的发行、交易活动，必须遵循公开、公平、公正“三公”原则。 选项ABD为干扰项，教材未提及。","type":"single"},{"id":"cy_law_943","q":"根据《证券法》下列关于禁止内幕交易的相关说法，错误的是（  ）。","c":{"A":"证券交易内幕信息的知情人，在内幕信息公开前，不得买卖该公司的证券","B":"非法获取内幕信息的人，在内幕信息公开前，不得买卖该公司的证券","C":"证券交易内幕信息的知情人，在内幕信息公开前，不得买卖该公司的证券，但可以建议他人买卖该证券","D":"禁止证券交易内幕信息的知情人和非法获取内幕信息的人利用内幕信息从事证券交易活动"},"a":"C","an":"选项C错误，选项ABD正确：证券交易内幕信息的知情人和非法获取内幕信息的人，在内幕信息公开前，不得买卖该公司的证券，或者泄露该信息，或者建议他人买卖该证券（不可以建议，C错误）。","type":"single"},{"id":"cy_law_945","q":"根据《中华人民共和国证券法》，证券发行、交易活动的当事人应当遵守的原则不包括（  ）。","c":{"A":"诚实信用","B":"自愿","C":"有偿","D":"稳健"},"a":"D","an":"证券发行、交易活动的当事人具有平等的法律地位，应当遵守自愿、有偿、诚实信用（不包括稳健）的原则。 综上，该题选D。","type":"single"},{"id":"cy_law_947","q":"根据《证券法》，下列关于证券转让的说法，正确的是（）。 Ⅰ 依法发行的证券，《公司法》对其转让期限有限制性规定的，在限定的期限内不得转让 Ⅱ 上市公司持有百分之五以上股份的股东转让其持有的本公司股份的，不得违反法律、行政法规的规定 Ⅲ 上市公司董事、监事、高级管理人员转让其持有的本公司股份的，应当遵守证券交易所的业务规则 Ⅳ 非公开发行的证券，可以在证券交易所、国务院证券监督管理机构批准的其他全国性证券交易场所转让","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅲ、Ⅳ"},"a":"C","an":"Ⅰ项正确，依法发行的证券，《公司法》和其他法律对其转让期限有限制性规定的，在限定的期限内不得转让。 Ⅱ、Ⅲ两项正确，上市公司持有5%以上股份的股东、实际控制人、董事、监事、高级管理人员，以及其他持有发行人首次公开发行前发行的股份或者上市公司向特定对象发行的股份的股东，转让其持有的本公司股份的，不得违反法律、行政法规和国务院证券监督管理机构关于持有期限、卖出时间、卖出数量、卖出方式、信息披露等规定，并应当遵守证券交易所的业务规则。 Ⅳ项错误，非公开发行的证券，可以在证券交易所、【国务院】批准的其他全国性证券交易场所、按照国务院规定设立的区域性股权市场转让。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_law_949","q":"根据《证券法》，下列关于上市公司收购的说法，正确的有（）。","c":{"A":"在及时公告并载明具体变更事项的情况下，收购人可以缩短收购期限","B":"在及时公告并载明具体变更事项的情况下，收购人可以减少预定收购股份数额","C":"收购人需要变更收购要约的，应当及时公告，载明具体变更事项，且不得降低收购价格","D":"在收购要约确定的承诺期限内，收购人不得撤销其收购要约"},"a":"C,D","an":"收购要约约定的收购期限不得少于30日，并不得超过60日，在收购要约确定的承诺期限内，收购人不得撤销其收购要约。收购人需要变更收购要约的，应当及时公告，载明具体变更事项，且不得存在下列情形： （1）降低收购价格； （2）减少预定收购股份数额（B错误）； （3）缩短收购期限（A错误）； （4）国务院证券监督管理机构规定的其他情形。 综上所述，本题选CD。","type":"multi"},{"id":"cy_law_951","q":"设立管理公开募集基金的基金管理公司，应当具备的条件有（）。 I 有符合《公司法》和《证券投资基金法》规定的章程 II 取得基金从业资格的人员达到法定人数 III 董事、监事、高级管理人员具备相应的任职条件 IV 注册资本不低于5000万元人民币，且必须为实缴资本","c":{"A":"I、II、III、IV","B":"I、II、III","C":"I、III、IV","D":"II、IV"},"a":"B","an":"IV项错误，注册资本不低于【1亿元】人民币，且必须为实缴货币资本。 Ⅰ、Ⅱ、Ⅲ说法正确。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_law_953","q":"下列关于基金管理人的表述，说法正确的是（）。","c":{"A":"是基金资产保管人","B":"是基金管理运作机构","C":"是基金财产利润分配人","D":"包括公司、合伙企业等机构"},"a":"B,C,D","an":"选项BCD正确：基金管理人是指按照法律、法规的规定和基金合同的约定，为基金份额持有人的利益，对基金财产进行管理及运作的机构（B）。基金管理人按照基金合同的约定确定基金收益分配方案（C），及时向基金份额持有人分配收益。 《证券投资基金法》规定，基金管理人由依法设立的公司或者合伙企业担任（D）。 选项A错误：“基金托管人”是基金资产保管人。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_law_955","q":"根据《证券公司监督管理条例》，证券公司以及有关单位和个人披露、报送或者提供的资料、信息应当（），不得有虚假记载、误导性陈述或者重大遗漏。 I 真实 II 准确 III 完整 IV 全面","c":{"A":"I、II、III、IV","B":"I、II","C":"II、IV","D":"I、II、III"},"a":"D","an":"根据 《证券公司监督管理条例》 第六十九条的规定，证券公司以及有关单位和个人披露、报送或者提供的资料、信息应当【真实、准确 、完整】，不得有虚假记载 、误导性陈述或者重大遗漏。","type":"single"},{"id":"cy_law_957","q":"根据《证券公司监督管理条例》，净资产低于实收资本50%的公司，不得成为持有证券公司（）以上股权的股东。","c":{"A":"0.05","B":"0.03","C":"0.3","D":"0.5"},"a":"A","an":"根据《证券公司监督管理条例》第十条的规定，有下列情形之一的单位或者个人，不得成为持有证券公司【5%】以上股权的股东、实际控制人： 1.因故意犯罪被判处刑罚，刑罚执行完毕未逾3年； 2.净资产低于实收资本的50% ,或者或有负债达到净资产的50% ； 3.不能清偿到期债务。","type":"single"},{"id":"cy_law_959","q":"设立证券公司，应当具备《公司法》《证券法》和《证券公司监督管理条例》规定的条件，并经（）批准。","c":{"A":"证券交易所","B":"证券业协会","C":"国务院证券监督管理机构","D":"证券登记结算机构"},"a":"C","an":"选项C正确：设立证券公司，应符合《公司法》《证券法》及《证券公司监督管理条例》的要求，并经【国务院证券监督管理机构】批准。 选项A错误：证券交易所负责提供证券交易平台 选项B错误：证券业协会属于自律组织 选项D错误：证券登记结算机构负责证券登记结算业务","type":"single"},{"id":"cy_law_961","q":"证券公司及其股东之间的下列行为中，属于法律法规禁止情形的是（  ）。","c":{"A":"股东为证券公司提供担保","B":"证券公司向股东分配税后利润","C":"证券公司向股东出借挪用的客户交易结算资金","D":"股东在证券公司开立证券账户"},"a":"C","an":"选项C正确：根据《证券公司监督管理条例》第三条的规定，证券公司的股东和实际控制人不得滥用权力，占用证券公司或者客户的资产，损害证券公司或者客户的合法权益。 选项A错误：股东为证券公司提供担保属于正常商业行为，法律法规并未禁止。 选项B错误：证券公司向股东分配利润是公司法允许的，只要符合公司章程和利润分配规则即可。 选项D错误：股东在证券公司开立账户是正常的，除非是特定禁止对象。","type":"single"},{"id":"cy_law_963","q":"根据《证券公司监督管理条例》，证券公司未按照规定为客户开立账户，相关主体可能承担的法律后果不包括（  ）。","c":{"A":"公司罚款","B":"没收违法所得","C":"责令改正","D":"对相关责任人员罚款"},"a":"B","an":"根据《证券公司监督管理条例》第七十九条、第八十四条、第八十五条，证券公司未按照规定为客户开立账户的，责令改正（C）；情节严重的，处以20万元以上50万元以下的罚款（A），并对直接负责的董事、高级管理人员和其他直接责任人员，处以1万元以上5万元以下的罚款（D）。 题目问的是“不包括”。综上，该题选B。","type":"single"},{"id":"cy_law_965","q":"根据《证券公司监督管理条例》，下列关于禁止同业竞争的说法错误的是（）。","c":{"A":"特定情况下一个集团可以控股两家以上证券公司","B":"某集团可以控股一家证券公司，还可以参股另外一家证券公司","C":"一般情况一个集团可以控股两家证券公司","D":"证券公司可以设立专业证券子公司"},"a":"C","an":"根据《证券公司监督管理条例》第26条的规定，2个以上的证券公司受同一单位、个人控制或者相互之间存在控制关系的，不得经营相同的证券业务，但国务院证券监督管理机构另有规定的除外。该规定主要是为了避免因母公司与子公司之间存在同业竞争而损害公司小股东的利益。【除非国务院证券监督管理机构另有规定，否则，受同一单位、个人控制或者相互之间存在控制关系的2个以上证券公司不得经营相同的证券业务】（C项错误）。","type":"single"},{"id":"cy_law_967","q":"证券公司应当依法向社会公开披露其基本情况、负债及或有负债情况、（）、高级管理人员薪酬和其他有关信息。 I 财务收支状况 II 经营管理状况 III 人均薪酬情况 IV 参股及控股情况","c":{"A":"I、III、IV","B":"I、II、IV","C":"II、III、IV","D":"I、II、III"},"a":"B","an":"I、II、IV三项正确，根据《证券公司监督管理条例》 第六十六条的规定，证券公司应当依法向社会公开披露其基本情况、参股及控股情况、负债及或有负债情况、经营管理状况 、财务收支状况、高级管理人员薪酬和其他有关信息。 Ⅲ错误：薪酬一般属于公司内部保密事项。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_law_969","q":"下列属于证券公司违反规定委托其他单位或者个人进行客户招揽、客户服务或者产品销售活动可能承担的法律责任的有（）。","c":{"A":"没收违法所得","B":"罚款","C":"警告","D":"责令改正"},"a":"A,B,C,D","an":"根据《证券公司监督管理条例》第八十三条的规定，证券公司委托其他单位或者个人进行客户招揽、客户服务或者产品销售活动的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款（ABCD）；没有违法所得或者违法所得不足10万元的，处以10万元以上30万元以下的罚款；情节严重的，暂停或者撤销其相关证券业务许可。对直接负责的主管人员和其他直接责任人员，给予警告，并处以3万元以上10万元以下的罚款。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_law_971","q":"根据《证券公司监督管理条例》，客户的交易结算资金、证券资产管理客户的委托资产属于客户，应当与证券公司、指定商业银行、资产托管机构的自有资产相互独立、分别管理。非因客户本身的债务或者法律规定的其他情形，任何单位或者个人不得对客户的交易结算资金、委托资产申请查封、冻结或者强制执行。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券公司监督管理条例》第五十九条的规定，客户的交易结算资金、证券资产管理客户的委托资产属于客户，应当与证券公司、指定商业银行、资产托管机构的自有资产相互独立、分别管理。非因客户本身的债务或者法律规定的其他情形，任何单位或者个人不得对客户的交易结算资金、委托资产申请查封、冻结或者强制执行。","type":"judge"},{"id":"cy_law_973","q":"根据《证券公司风险处置条例》，证券公司出现重大风险，在实施某些风险处置措施过程中达到规定条件的，可以由证监会对其进行行政重组。上述风险处置措施不包括（  ）。","c":{"A":"接管","B":"停业整顿","C":"托管","D":"撤销证券业务许可"},"a":"D","an":"题目问的是“不包括”。 选项D错误：撤销证券业务许可属于最终处置措施，通常发生在证券公司经停业整顿、托管、接管或行政重组后仍无法恢复正常经营的情况下（《条例》第三章规定）。此时证券公司丧失业务许可资格，已不符合行政重组的前提条件。因此答案选择D。 选项ABC正确：证券公司出现重大风险，但具备下列条件的，可以由国务院证券监督管理机构对其进行行政重组： (1)财务信息真实、完整； (2)省级人民政府或者有关方面予以支持； (3)整改措施具体，有可行的重组计划。 被停业整顿、托管、接管的证券公司，具备前款规定条件的，也可以由国务院证券监督管理机构对其进行行政重组。","type":"single"},{"id":"cy_law_975","q":"根据《证券公司内部控制指引》，下列关于建立证券公司业务创新机制的说法，错误的是（）。","c":{"A":"建立完整的业务创新工作程序","B":"在可行性研究的基础上，及时与中国证券业协会沟通，履行创新业务的报备（报批）程序","C":"对创新业务设计科学合理的流程，制定风险控制措施及相应财务核算、资金管理办法","D":"注重业务创新的过程控制，及时纠正偏离目标行为"},"a":"B","an":"B项说法错误，在可行性研究的基础上，及时与【中国证监会】沟通，履行创新业务的报备(报批)程序 。","type":"single"},{"id":"cy_law_977","q":"证券公司应当制定合规管理的基本制度，经 （  ）审议通过后实施。","c":{"A":"监事会","B":"经理人员","C":"董事会","D":"审计委员会"},"a":"C","an":"证券公司应当制定合规管理的基本制度，经董事会审议通过后实施。","type":"single"},{"id":"cy_law_979","q":"下列关于证券公司薪酬安排的说法，正确的是 （  ）。","c":{"A":"高级管理人员的薪酬按照业务人员的平均水平确定","B":"高级管理人员的薪酬处于公司员工薪酬中位数","C":"合规管理人员的平均薪酬水平不得低于公司同级员工的平均薪酬水平","D":"合规管理人员的绩效薪酬不得高于业务部门员工的平均水平"},"a":"C","an":"选项C正确，选项D错误：合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应当不低于中位数。其他合规管理人员工作称职的，其年度薪酬收入总额应当不低于公司同级别人员的平均水平。 选项AB错误：无强制性规定，有其他专门的薪酬考核体系。","type":"single"},{"id":"cy_law_981","q":"下列关于证券公司合规管理要求的说法，错误的是（  ）。","c":{"A":"贯穿决策、执行、监督、反馈等各个环节","B":"覆盖所有业务","C":"覆盖各部门，各分支机构、各关联公司","D":"覆盖全体工作人员"},"a":"C","an":"证券公司的合规管理应当覆盖所有业务（B），各部门、各分支机构、各层级子公司(统称“下属单位”)（并不包括关联公司，C错误）和全体工作人员（D），贯穿决策、执行、监督、反馈等各个环节（A）。 综上，该题选C。","type":"single"},{"id":"cy_law_983","q":"证券公司内部控制应当遵循的原则包括（）。 I 健全 II 合理 III 制衡 IV 独立","c":{"A":"I、II、III、IV","B":"I、II、III","C":"II、III、IV","D":"I、IV"},"a":"A","an":"Ⅰ、Ⅱ、Ⅲ、Ⅳ正确：证券公司内部控制应当遵循以下原则，确保内部控制有效： (1) 健全； (2) 合理； (3) 制衡； (4) 独立。 故本题选A，选项BCD错误。","type":"single"},{"id":"cy_law_985","q":"证券公司合规经营的基本原则应该遵循合规经营、勤勉尽责、股东利益至上原则。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司开展各项业务，应当遵循合规经营、勤勉尽责，坚持【客户利益至上】原则。","type":"judge"},{"id":"cy_law_987","q":"证券公司建立稳健薪酬制度应以贯彻稳健经营理念、确保合规底线要求、促进形成正向激励、提升公司短期利益为原则目标。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司建立稳健薪酬制度应以贯彻稳健经营理念、确保合规底线要求、促进形成正向激励、提升公司长期价值（并非短期利益）为原则目标。","type":"judge"},{"id":"cy_law_989","q":"证券公司合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应不低于平均数。（）","c":{"1":"对","0":"错"},"a":"0","an":"合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应不低于中位数（并非平均数）。 其他合规管理人员工作称职的，其年度薪酬收入总额应当不低于公司同级别人员的平均水平。","type":"judge"},{"id":"cy_law_991","q":"合规负责人应当对证券公司内部规章制度、重大决策、新产品和新业务方案等进行合规审查，并出具书面合规审查意见。（）","c":{"1":"对","0":"错"},"a":"1","an":"合规负责人应当对证券公司内部规章制度、重大决策、新产品和新业务方案等进行合规审查，并出具书面合规审查意见。","type":"judge"},{"id":"cy_law_993","q":"某证券公司营业部技术人员，由于其熟悉公司系统，因此可以由其兼任营业部开户岗。（）","c":{"1":"对","0":"错"},"a":"0","an":"合规、风控和技术不能兼任前台业务（开户岗）工作和从事业务活动，技术人员不能承担合规、风控职责，合规、风控人员可以兼任与本岗位职责不相冲突的职务。","type":"judge"},{"id":"cy_law_995","q":"证券公司内部控制应遵循健全、合理、制衡、独立的原则，确保内部控制的有效性。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司内部控制应遵循健全、合理、制衡、独立的原则，确保内部控制的有效性。","type":"judge"},{"id":"cy_law_997","q":"合规管理人员工作称职的，其年度薪酬收入总额原则上不低于所在机构同等条件(同岗位类型、同职级、同考核结果)人员的平均水平。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应当不低于中位数。其他合规管理人员工作称职的，其年度薪酬收入总额应当不低于公司同级别人员的平均水平。","type":"judge"},{"id":"cy_law_999","q":"证券经纪人能接受 （  ）家证券公司的委托。","c":{"A":"三家","B":"多家","C":"一家","D":"二家"},"a":"C","an":"证券经纪人为证券从业人员，只能接受一家证券公司的委托，并应当专门代理证券公司从事客户招揽和客户服务等活动。证券公司应当在与证券经纪人签订委托合同前，对其资格条件进行严格审查。","type":"single"},{"id":"cy_law_1001","q":"下列属于证券公司开展经纪业务应符合的行政法规是（）。","c":{"A":"《公司法》","B":"《企业会计准则》","C":"《非金融企业绿色债务融资工具业务指引》","D":"《证券公司监督管理条例》"},"a":"D","an":"《证券法》“第七章 证券交易场所”“第八章 证券公司”对证券公司的证券经纪业务作出了原则性规定。 【《证券公司监督管理条例》】“第四章业务规则与风险控制”“第二节 证券经纪业务”对证券经纪业务作出了一般规定。 上述法律及行政法规是中国证监会等监管机构制定证券经纪业务相关监管政策、实施监督管理的重要法律依据。","type":"single"},{"id":"cy_law_1003","q":"证券公司可以通过（）从事客户招揽和客户服务等活动。 Ⅰ 公司经纪业务员工 Ⅱ 证券经纪人 Ⅲ 商业银行 Ⅳ 保险公司","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"C","an":"Ⅰ、Ⅱ正确：目前，在我国证券经纪业务营销渠道包括【证券公司内部营销员工】进行客户招揽和客户服务，也可由证券公司委托【经纪人】开展证券客户招揽和客户服务。 Ⅲ、Ⅳ错误：证券公司不得直接委托商业银行、保险公司等机构从事客户招揽和服务活动。第三方渠道（如互联网平台、新闻媒体）仅可用于广告投放。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1005","q":"以下关于证券经营机构开展证券投资顾问业务，在收费环节应遵守的规范要求，说法正确的有（）。 Ⅰ 证券经营机构应与客户协商并书面约定收取服务费用的安排 Ⅱ 证券经营机构可以按照服务期限、客户资产规模收取服务费用 Ⅲ 证券经营机构可以按照差别佣金方式收取服务费用 Ⅳ 证券经营机构可以以证券投资顾问个人名义收取服务费用","c":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","B":"Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"C","an":"Ⅰ、Ⅱ、Ⅲ项正确，证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、客户资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。  Ⅳ项错误，【禁止】证券公司、证券投资咨询机构及其人员以个人名义向客户收取证券投资顾问服务费用。","type":"single"},{"id":"cy_law_1007","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户的基本信息包括（  ）。","c":{"A":"证券投资顾问不得代客户作出投资决策","B":"证券投资顾问的姓名及其登记编码","C":"证券投资顾问服务的内容和方式","D":"投资决策由客户作出，投资风险与客户共担"},"a":"A,B,C","an":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： （1）公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等。 （2）证券投资顾问的姓名及其登记编码（B正确）。 （3）证券投资顾问服务的内容和方式（C正确）。 （4）投资决策由客户作出，投资风险由客户承担（并非共担，D错误）。 （5）证券投资顾问不得代客户作出投资决策（A正确）。 综上，该题选ABC。","type":"multi"},{"id":"cy_law_1009","q":"下列不属于证券公司发行与承销业务适用的主要法律法规的是（）。","c":{"A":"《证券发行与承销管理办法》","B":"《公司法》","C":"《企业债券管理条例》","D":"《上市公司收购管理办法》"},"a":"D","an":"证券公司发行与承销业务的主要法律、行政法规包括：《公司法》《证券法》《证券公司监督管理条例》《企业债券管理条例》等。 D项属于与证券交易、证券投资活动有关的财务顾问涉及的主要部门规章及规范性文件。","type":"single"},{"id":"cy_law_1011","q":"下列法律法规及主要部门规章、规范性文件中，不属于证券公司发行与承销业务适用的是（）。","c":{"A":"《证券公司监督管理条例》","B":"《科创板上市公司持续监管办法(试行) 》","C":"《上市公司收购管理办法》","D":"《企业债券管理条例》"},"a":"C","an":"证券公司发行与承销业务的主要法律、行政法规包括【《公司法》《证券法》《证券公司监督管理条例》 《企业债券管理条例》】 等。 C项属于与证券交易、证券投资活动有关的财务顾问涉及的主要部门规章及规范性文件。","type":"single"},{"id":"cy_law_1013","q":"中国证监会等监管机构制定证券公司信用业务相关监管政策、实施监督管理的法律依据是（）。","c":{"A":"《证券法》和《证券公司监督管理条例》","B":"《证券公司融资融券业务管理办法》","C":"《转融通业务监督管理试行办法》","D":"《中国证券登记结算有限责任公司证券出借及转融通登记结算业务规则（试行）》"},"a":"A","an":"选项A正确：《证券法》“第八章证券公司”明确经国务院证券监督管理机构核准，证券公司可以经营证券融资融券业务，《证券公司监督管理条例》则在其“第四章业务规则与风险控制”的第五节专门对证券公司融资融券业务作出一般性规定。上述法律及行政法规（即《证券法》和《证券公司监督管理条例》）是中国证监会等监管机构制定融资融券业务相关监管政策、实施监督管理的重要法律依据。  选项BCD错误：属于部门规章或业务规则","type":"single"},{"id":"cy_law_1015","q":"中国证监会等监管机构制定证券公司信用业务相关监管政策、实施监督管理的法律、行政法规依据是（）。","c":{"A":"《中国证券登记结算有限责任公司证券出借及转融通登记结算业务规则（试行）》","B":"《证券法》和《证券公司监督管理条例》","C":"《转融通业务监督管理试行办法》","D":"《证券公司融资融券业务管理办法》"},"a":"B","an":"选项B正确：《证券法》“第八章 证券公司”明确经国务院证券监督管理机构核准，证券公司可以经营证券融资融券业务，《证券公司监督管理条例》则在其“第四章 业务规则与风险控制”的第五节专门对证券公司融资融券业务作出一般性规定。上述法律及行政法规是中国证监会等监管机构制定融资融券业务相关监管政策、实施监督管理的重要法律依据。 选项ACD错误：均属于部门规章或自律规则。 综上，该题选B。","type":"single"},{"id":"cy_law_1017","q":"证券公司以自己名义开立，用于记载客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券账户是（）。","c":{"A":"客户信用交易担保资金账户","B":"客户信用交易担保证券账户","C":"客户信用资金账户","D":"客户信用证券账户"},"a":"B","an":"A项，客户信用交易担保资金账户：用于存放客户交存的、担保证券公司因向客户融资融券所生债权的资金。 B项，【客户信用交易担保证券账户】：用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。 C项，客户信用资金账户指的是客户在指定的商业银行开立的用于记载客户交存的担保资金的明细数据的账户。 D项，客户信用证券账户指的是证券公司客户信用交易担保证券账户的二级账户，用于记录客户委托证券公司持有的担保证券的明细数据。","type":"single"},{"id":"cy_law_1019","q":"融资融券业务中，证券公司逐日计算客户交存的担保物价值与其所欠债务的比例，当该比例低于约定的维持担保比例时，客户应当在约定的期限内补交经证券公司认可的担保物，补交的担保物可以是（）。","c":{"A":"劳务","B":"其他证券","C":"不动产","D":"股权"},"a":"B,C,D","an":"选项BCD正确：当客户维持担保比例低于最低维持担保比例时，证券公司应当通知客户在约定的期限内追加担保物，客户经证券公司认可后，可以提交除可充抵保证金证券外的其他证券、不动产、股权等依法可以担保的财产或财产权利作为其他担保物。 选项A错误：劳务因无法估值且不具备担保属性，不属于可担保的财产或财产权利。","type":"multi"},{"id":"cy_law_1021","q":"根据《证券公司融资融券业务管理办法》，证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金除现金形式外还可以证券充抵。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金。保证金除现金形式外还可以证券充抵。","type":"judge"},{"id":"cy_law_1023","q":"下列不属于证券自营业务禁止性行为的是（）。","c":{"A":"将自营账户借给他人使用","B":"违反规定委托他人代为买卖证券","C":"将自营业务与经纪业务混合操作","D":"通过专用自营席位进行证券交易"},"a":"D","an":"选项D正确：根据监管规定，证券公司应当通过专用自营席位进行自营交易，符合合规要求。因此不属于证券自营业务禁止性行为。 选项ABC错误：证券禁止的行为包括：假借他人名义或者个人名义进行自营业务；违反规定委托他人代为买卖证券；违反规定购买本证券公司控股股东或者与本证券公司有其他重大利害关系的发行人发行的证券；将自营账户借给他人使用；将自营业务与经纪业务混合操作；法律、行政法规或中国证监会禁止的其他行为。","type":"single"},{"id":"cy_law_1025","q":"证券公司从事证券自营业务，可以依据（  ）的附件《证券公司证券自营投资品种清单》买卖其中所列的证券。","c":{"A":"《证券公司证券自营业务指引》","B":"《证券公司内部控制指引》","C":"《证券公司风险控制指标管理办法》","D":"《关于证券公司证券自营业务投资范围及有关事项的规定》"},"a":"D","an":"选项D正确：根据《关于证券公司证券自营业务投资范围及有关事项的规定》，证券公司从事证券自营业务，可以买卖此规定附件《证券公司证券自营投资品种清单》所列证券。 选项A错误：《证券公司证券自营业务指引》主要规范业务操作而非投资范围 选项B错误：《证券公司内部控制指引》规范内控机制 选项C错误：《证券公司风险控制指标管理办法》规范风险指标计算和监管规则","type":"single"},{"id":"cy_law_1027","q":"根据《证券法》，证券公司可以将其自营账户借给他人使用。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司需建立健全自营账户的审核和稽核制度，严禁出借自营账户、使用非自营席位变相自营、账外自营。","type":"judge"},{"id":"cy_law_1029","q":"下列不属于证券公司资产管理业务相关法律、行政法规的是（  ）。","c":{"A":"《中华人民共和国证券法》","B":"《中华人民共和国证券投资基金法》","C":"《发布证券研究报告暂行规定》","D":"《证券公司监督管理条例》"},"a":"C","an":"题目问的是“不属于”。 选项C错误：《发布证券研究报告暂行规定》属于部门规章，规范的是证券研究分析业务，与资产管理业务无直接关联。 选项ABD正确：《证券投资基金法》对资产管理业务作了基础性法律规定。《证券法》“第八章 证券公司”中明确证券公司经营证券资产管理业务的，应符合《证券投资基金法》等法律、行政法规的规定。《证券公司监督管理条例》则在“第四章 业务规则与风险控制”第四节专门对证券公司资产管理业务作出基本性规定。上述法律及行政法规是中国证监会等监管机构制定资产管理业务相关监管政策、实施监督管理的重要法律依据。 综上，该题选C。","type":"single"},{"id":"cy_law_1031","q":"证券公司在资产管理业务中违反中国证监会相关规定，中国证监会及其派出机构可以对其直接负责的主管人员和其他直接负责人采取的行政监管措施有（）。","c":{"A":"暂不受理与其所在机构行政许可有关的文件","B":"出具警示函","C":"责令改正","D":"责令定期报告"},"a":"B","an":"证券公司、托管人、销售机构和投资顾问等服务机构违反法律、行政法规及中国证监会其他规定的，中国证监会及相关派出机构可以对其采取责令改正、监管谈话、【出具警示函】、责令定期报告、暂不受理与行政许可有关的文件等行政监管措施；对直接负责的主管人员和其他直接责任人员，采取监管谈话、出具警示函、责令参加培训、认定为不适当人选等行政监管措施。 注意：题目问的是对相关人员的处罚，而不是对公司的。","type":"single"},{"id":"cy_law_1033","q":"涉及规范证券公司资产管理业务的法律、行政法规包括（）。 I 《证券法》 II 《证券公司监督管理条例》 III 《证券期货经营机构私募资产管理计划运作管理规定》 IV 《证券期货经营机构私募资产管理业务管理办法》","c":{"A":"I、II、III、IV","B":"II、III、IV","C":"I、II","D":"III、IV"},"a":"C","an":"I项，涉及规范证券公司资产管理业务的法律包括：《证券投资基金法》《证券法》。 II项，涉及到的行政法规包括：《证券公司监督管理条例》。 III、IV项属于部门规章及规或规范性文件。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_law_1035","q":"根据《区域性股权市场自律管理与服务规范（试行）》，应当遵守证券行业自律管理的主体包括（  ）。","c":{"A":"区域性股权市场运营机构","B":"区域性股权市场运营机构从业人员","C":"参与区域性股权市场的证券公司","D":"参与区域性股权市场的证券公司从业人员"},"a":"A,B,C,D","an":"选项ABCD正确：根据《规范》相关规定，证券公司参与区域性股权市场的自律管理要求如下： 1.证券公司作为运营机构股东或者在区域性股权市场开展相关业务，应当遵守证券行业监管和自律规则以及区域性股权市场相关的管理规定。 2.区域性股权市场运营机构、证券公司及其从业人员应当配合中国证券业协会对落实《规范》及相关自律要求情况的监督检查。 3.区域性股权市场运营机构、证券公司及其从业人员违反《规范》，中国证券业协会将视情节轻重采取相关自律惩戒措施；存在违反法律、法规行为的，将移交中国证监会及其派出机构或其他有权机关依法查处。","type":"multi"},{"id":"cy_law_1037","q":"关于证券公司从业人员持有股票的相关规定，下列说法正确的是（）。","c":{"A":"从业人员可以直接持有、买卖股票","B":"从业人员可以以他人名义持有、买卖股票","C":"从业人员可以以化名持有、买卖股票","D":"从业人员不能收受他人赠送的股票"},"a":"D","an":"根据《证券法》，证券公司的从业人员在任期或者法定限期内，不得直接或者以化名、借他人名义持有、买卖股票（ABC错误）或者其他具有股权性质的证券，也不得收受他人赠送的股票（D正确）或者其他具有股权性质的证券。相关人员在成为证券公司的从业人员时，其原已持有的股票或者其他具有股权性质的证券，必须依法转让。 综上，该题选D。","type":"single"},{"id":"cy_law_1039","q":"证券公司董事长不属于证券行业从业人员。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券公司董事、监事、高级管理人员及从业人员管理规则》，证券公司董事长、从事业务管理工作的其他董事和监事、高级管理人员、分支机构负责人均为本章所称从业人员。","type":"judge"},{"id":"cy_law_1041","q":"根据《证券法》和《证券公司监督管理条例》等法律法规的规定，在内部约束机制方面，证券公司应当健全内部制度建设，防控风险，加强对分支机构实行独立授权管理。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》和《证券公司监督管理条例》等法律法规的规定，在外部约束机制方面，证券公司及其分支机构在业务经营上应当符合国家法律、法规的规定，经营相关业务须获得监管部门的批准；在内部约束机制方面，证券公司应当健全内部制度建设，防控风险，加强对分支机构实行集中统一（而不是独立授权）管理。","type":"judge"},{"id":"cy_law_1043","q":"根据《证券公司监督管理条例》的要求，国务院证券监督管理机构应对证券公司报送的年度报告、月度报告等指定专人进行审核，并制作审核报告。（）","c":{"1":"对","0":"错"},"a":"1","an":"对证券公司报送的年度报告、月度报告，国务院证券监督管理机构应当指定专人进行审核，并制作审核报告。","type":"judge"},{"id":"cy_law_1045","q":"关于证券公司分支机构的经营管理，下列说法正确的是（）。","c":{"A":"证券公司可以与他人合资、合作经营管理分支机构","B":"证券公司应当对分支机构实行分开管理","C":"证券公司可以将分支机构承包、租赁或者委托给他人经营管理","D":"证券公司及其境内分支机构经营的业务应当经国务院证券监督管理机构批准"},"a":"D","an":"选项D正确：根据《证券公司监督管理条例》第十七条的规定，未取得经营证券业务许可证，证券公司及其境内分支机构不得经营证券业务。根据《证券公司监督管理条例》第二十六条的规定，证券公司及其境内分支机构从事《证券法》规定的证券业务，应当遵守《证券法》和《证券公司监督管理条例》的规定。 选项ABC错误：证券公司应当对分支机构实行集中统一管理，不得与他人合资、合作经营管理分支机构，也不得将分支机构承包、租赁或者委托给他人经营管理。","type":"single"},{"id":"cy_law_1047","q":"根据《证券法》第一百八十四条的规定，证券公司承销证券违反《证券法》第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处（）万元以上（）万元以下的罚款；情节严重的，暂停或者撤销相关业务许可。","c":{"A":"20；20","B":"50；500","C":"10；100","D":"30；300"},"a":"B","an":"根据《证券法》第一百八十四条的规定，证券公司承销证券违反《证券法》第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处50万元以上500万元以下的罚款；情节严重的，暂停或者撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，可以并处20万元以上200万元以下的罚款；情节严重的，并处以50万元以上500万元以下的罚款。","type":"single"},{"id":"cy_law_1049","q":"证券基金经营机构董事长、总经理、合规负责人和分支机构负责人因故不能履行职务的，证券基金经营机构应当按照《中华人民共和国公司法》和公司章程的规定，在()个工作日内决定由符合任职条件的人员代为履行职务，相关人员代为履行职务应当谨慎勤勉尽责，且时间不得超过()个月。","c":{"A":"10;3","B":"15;6","C":"10;6","D":"15;3"},"a":"B","an":"本题考查董事、监事、高级管理人员及分支机构负责人的履职限制。证券基金经营机构董事长、总经理、合规负责人和分支机构负责人因故不能履行职务的，证券基金经营机构应当按照《中华人民共和国公司法》和公司章程的规定，在15个工作日内决定由符合任职条件的人员代为履行职务，相关人员代为履行职务应当谨慎勤勉尽责，且时间不得超过6个月。中国证监会另有规定的，从其规定。","type":"single"},{"id":"cy_law_1051","q":"可以进行动用证券公司客户信用交易担保证券账户内的证券和客户信用交易担保资金账户内资金的情形包括（）。","c":{"A":"为客户进行融资融券交易的结算","B":"收取客户应当归还的资金、证券","C":"收取客户应当支付的利息、费用、税款","D":"客户提取还本付息、支付税费及违约金后的剩余证券和资金"},"a":"A,B,C,D","an":"除下列情形外，任何人不得动用证券公司客户信用交易担保证券账户内的证券和客户信用交易担保资金账户内的资金： ①为客户进行融资融券交易的结算；（A正确）  ②收取客户应当归还的资金、证券；（B正确）  ③收取客户应当支付的利息、费用、税款；（C正确） ④按照该办法的规定以及与客户的约定处分担保物； ⑤收取客户应当支付的违约金； ⑥客户提取还本付息、支付税费及违约金后的剩余证券和资金；（D正确） ⑦法律、行政法规和该办法规定的其他情形。","type":"multi"},{"id":"cy_law_1053","q":"根据《证券公司监督管理条例》，下列关于证券公司独立董事的说法正确的有（）。","c":{"A":"独立董事不得在本证券公司担任高级管理人员","B":"独立董事可以兼任本证券公司监事","C":"独立董事可以兼任本证券公司稽核审计部门的负责人","D":"独立董事不得为本证券公司提供审计服务"},"a":"A,D","an":"证券公司的独立董事，不得在本证券公司担任董事会外的职务（A项正确，BC项错误），不得与本证券公司存在可能妨碍其作出独立、客观判断的关系（审计服务不可以，D正确）。","type":"multi"},{"id":"cy_law_1055","q":"证券公司未经核准变更证券业务范围，变更主要股东或者公司的实际控制人，合并、分立、停业、解散、破产的，责令改正，给予警告，没收违法所得，并处以违法所得（）的罚款。","c":{"A":"一倍以上五倍以下","B":"二倍以上五倍以下","C":"二倍以上十倍以下","D":"一倍以上十倍以下"},"a":"D","an":"根据《证券法》第二百零四条的规定，证券公司违反《证券法》第一百二十二条的规定，未经核准变更证券业务范围，变更主要股东或者公司的实际控制人，合并、分立、停业、解散、破产的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_law_1057","q":"根据《证券法》的规定，收购要约约定的收购期限为（）。","c":{"A":"10日—30日","B":"10日—45日","C":"30日—45日","D":"30日—60日"},"a":"D","an":"根据《证券法》的规定，收购要约约定的收购期限不得少于30日，并不得超过60日。","type":"single"},{"id":"cy_law_1059","q":"因故意犯罪被判处刑罚，刑罚执行完毕未逾3年的张某，不得成为证券公司的()。","c":{"A":"持股5%以上股权的股东","B":"客户","C":"合格投资者","D":"外聘顾问"},"a":"A","an":"选项A正确：根据《证券公司监督管理条例》第十条的规定，有下列情形之一的单位或者个人，不得成为持有证券公司5%以上股权的股东、实际控制人: (1)因故意犯罪被判处刑罚，刑罚执行完毕未逾3年; (2）净资产低于实收资本的50%，或者或有负债达到净资产的50% ; (3）不能清偿到期债务。 选项BCD为干扰项，无此限制。","type":"single"},{"id":"cy_law_1061","q":"证券公司开展柜台市场业务的总体要求有（）。","c":{"A":"具备展业资格","B":"遵守法律法规","C":"遵循诚实信用","D":"遵循公开原则"},"a":"A,B,C","an":"根据中国证券业协会《证券公司柜台交易业务规范》《证券公司柜台市场管理办法(试行)》,证券公司开展柜台市场业务，应当遵守以下要求： 1.展业资格（A正确）   2.遵守法律法规，遵循诚实信用、公平自愿原则（BC正确，强调公平而非公开，柜台市场业务本质是私募性质，D错误）","type":"multi"},{"id":"cy_law_1063","q":"以下属于某证券公司高级管理人员的有（）。","c":{"A":"合规负责人李某","B":"副总经理王某","C":"独立董事孙某","D":"财务负责人周某"},"a":"A,B,D","an":"选项ABD正确：证券公司高级管理人员，是指证券公司的总经理、副总经理、财务负责人、合规负责人、风控负责人、信息技术负责人、行使经营管理职责并向董事会负责的管理委员会或执行委员会成员，和实际履行上述职务的人员，以及法律法规、中国证监会和公司章程规定的其他人员。 选项C错误：独立董事是董事会成员。","type":"multi"},{"id":"cy_law_1065","q":"下列关于证券公司合规负责人及其他合规管理人员薪酬的说法中，正确的有()。","c":{"A":"合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名不得低于中位数","B":"合规负责人工作称职的，其年度薪酬收入在公司高级管理人员年度薪酬收入中的排名不低于公司同级别业务人员的平均水平","C":"其他合规管理人员工作称职的，其薪酬收入应当不高于公司同级别业务人员的平均水平","D":"其他合规管理人员工作称职的，其年度薪酬收入总额应当不低于公司同级别人员的平均水平"},"a":"A,D","an":"合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应当不低于中位数（A正确，B错误）。其他合规管理人员工作称职的，其年度薪酬收入总额应当不低于公司同级别人员的平均水平。（D正确，C错误）","type":"multi"},{"id":"cy_law_1067","q":"证券从业人员不得为牟取佣金收入，诱使客户进行不必要的证券买卖。（）","c":{"1":"对","0":"错"},"a":"1","an":"禁止证券公司及其从业人员从事下列损害客户利益的行为：  （1）违背客户的委托为其买卖证券；  （2）不在规定时间内向客户提供交易的确认文件； （3）未经客户的委托，擅自为客户买卖证券，或者假借客户的名义买卖证券；  （4）为牟取佣金收入，诱使客户进行不必要的证券买卖；  （5）其他违背客户真实意思表示，损害客户利益的行为。","type":"judge"},{"id":"cy_law_1069","q":"根据《证券公司监督管理条例》，证券公司应当依法向社会公开披露的信息不包括（）。","c":{"A":"经营管理状况","B":"参股及控股情况","C":"负债及或有负债情况","D":"高级管理人员的家庭成员薪酬状况"},"a":"D","an":"根据《证券公司监督管理条例》，证券公司应当依法向社会公开披露其基本情况、参股及控股情况（B包括）、负债及或有负债情况（C包括）、经营管理状况（A包括）、财务收支状况、高级管理人员薪酬（并非其家庭成员的，D不包括）和其他有关信息。","type":"single"},{"id":"cy_law_1071","q":"以下关于《中国证券登记结算有限责任公司证券账户管理规则》的有关规定，说法错误的是（）。","c":{"A":"对违反该规则的开户代理机构及其网点，中国结算视情节轻重单处或并处口头警示、书面警示、约见谈话、通报批评、公开谴责","B":"对违反该规则的开户代理机构及其网点，中国结算视情节轻重单处或并处暂停或终止开户代理机构或网点的开户代理业务资格","C":"对违反该规则的开户代理机构及其网点，中国结算无权终止开户代理机构或网点的开户代理业务资格","D":"可根据国务院证券监督管理机构及中国结算的有关规定记入诚信档案"},"a":"C","an":"中国结算发布的《中国证券登记结算有限责任公司证券账户管理规则》的有关规定：    对违反该规则的开户代理机构及其网点，中国结算视情节轻重单处或并处口头警示、书面警示、约见谈话、通报批评、公开谴责（A正确）、暂停或终止开户代理机构或网点的开户代理业务资格（B正确）；终止开户代理机构或网点的开户代理业务资格（C错误）、提请国务院证券监督管理机构采取相关监管措施等自律管理措施，并根据国务院证券监督管理机构及中国结算的有关规定记入诚信档案（D正确）。","type":"single"},{"id":"cy_law_1073","q":"证券公司设（），负责股东会和董事会会议的筹备、文件的保管以及股东资料的管理，按照规定或者根据国务院证券监督管理机构、股东等有关单位或者个人的要求，依法提供有关资料，办理信息报送或者信息披露事项","c":{"A":"财务负责人","B":"独立董事","C":"董事会秘书","D":"合规负责人"},"a":"C","an":"选项C正确：证券公司设董事会秘书，负责股东会和董事会会议的筹备、文件的保管以及股东资料的管理，按照规定或者根据国务院证券监督管理机构、股东等有关单位或者个人的要求，依法提供有关资料，办理信息报送或者信息披露事项。 选项A错误：财务负责人负责财务管理工作。 选项B错误：独立董事属于董事会成员，负责监督职能。 选项D错误：合规负责人负责合规管理。","type":"single"},{"id":"cy_law_1075","q":"我国证券法法律体系以《证券法》为核心，由相关法律、行政法规、部门规章、规范性文件和自律性规则共同组成，下列属于我国证券法法律体系中的法律的有（）。","c":{"A":"《证券公司监督管理条例》","B":"《中华人民共和国证券法》","C":"《证券公司风险控制指标管理办法》","D":"《中华人民共和国公司法》"},"a":"B,D","an":"选项BD正确：证券市场的法律主要包括《中华人民共和国证券法》《中华人民共和国证券投资基金法》《中华人民共和国期货和衍生品法》(依次简称为《证券法》《证券投资基金法》《期货和衍生品法》)等。《中华人民共和国民法典》《中华人民共和国刑法》《中华人民共和国公司法》《中华人民共和国反洗钱法》(依次简称为《民法典》《刑法》《公司法》《反洗钱法》)等也与证券资本市场有着密切联系。 选项A错误：《证券公司监督管理条例》属于行政法规。 选项C错误：《证券公司风险控制指标管理办法》属于部门规章。","type":"multi"},{"id":"cy_law_1077","q":"证券经纪人从事业务未向客户出示证券经纪人证书、同时接受多家证券公司的委托，进行客户招揽、客户服务等活动或接受客户的委托，为客户办理证券认购、交易等事项的，（）；没有违法所得或者违法所得不足3万元的，处以3万元以下的罚款。","c":{"A":"责令改正","B":"给予警告","C":"没收违法所得","D":"并处以违法所得等值罚款"},"a":"A,B,C,D","an":"选项ABCD正确：证券经纪人从事业务未向客户出示证券经纪人证书、同时接受多家证券公司的委托，进行客户招揽、客户服务等活动或接受客户的委托，为客户办理证券认购、交易等事项的，责令改正，给予警告，没收违法所得，并处以违法所得等值罚款；没有违法所得或者违法所得不足3万元的，处以3万元以下的罚款。","type":"multi"},{"id":"cy_law_1079","q":"证券公司及其从业人员违反《证券经纪业务管理办法》规定，依法应予处罚的，按照相关法律法规的规定进行处罚。相关法律法规没有规定且存在以下()情形之一的，给予警告，可以并处国务院规定的一定数额的罚款。","c":{"A":"造成恶劣社会影响","B":"业务管控存在重大缺陷","C":"严重危及市场正常秩序","D":"严重损害证券行业形象"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司及其从业人员违反《证券经纪业务管理办法》规定，依法应予处罚的，按照相关法律法规的规定进行处罚。相关法律法规没有规定且存在以下情形之一的，给予警告，可以并处国务院规定的一定数额的罚款：(1)业务管控存在重大缺陷。(2)严重损害投资者合法权益。(3)严重危及市场正常秩序。(4)严重损害证券行业形象。(5)造成恶劣社会影响。","type":"multi"},{"id":"cy_law_1081","q":"证券公司内部控制主要包括：证券公司各业务部门内部控制的主要内容；证券公司业务创新的相关规定；证券公司内部控制的监督、检查与评价机制等内容。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司内部控制主要包括：证券公司各业务部门内部控制的主要内容；证券公司业务创新的相关规定；证券公司内部控制的监督、检查与评价机制等内容。","type":"judge"},{"id":"cy_law_1083","q":"证券公司应当自相关人员从事证券业务之日起7个工作日内，通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当自相关人员从事证券业务之日起【5个工作日】内，通过中国证券业协会从业人员管理平台，将经公司审核合格的登记信息提交至中国证券业协会进行登记。","type":"judge"},{"id":"cy_law_1085","q":"根据《证券法》的规定，证券的代销、包销期限最长不得超过（）日。","c":{"A":"15","B":"30","C":"60","D":"90"},"a":"D","an":"证券的代销、包销期限最长不得超过90日。证券公司在代销、包销期内，对所代销、包销的证券应当保证先行出售给认购人，证券公司不得为本公司预留所代销的证券和预先购入并留存所包销的证券。","type":"single"},{"id":"cy_law_1087","q":"国务院证券监督管理机构决定对证券公司进行接管的，应当按照规定程序组织专业人员成立接管组，接管组负责人行使被接管证券公司（）职权。","c":{"A":"法定代表人","B":"股东会","C":"董事会","D":"监事会"},"a":"A","an":"选项A正确：国务院证券监督管理机构决定对证券公司进行接管的，应当按照规定程序组织专业人员成立接管组，行使被接管证券公司的经营管理权，接管组负责人行使被接管证券公司法定代表人职权。 选项BCD为干扰项","type":"single"},{"id":"cy_law_1089","q":"关于证券公司治理，下列说法错误的是(  )。","c":{"A":"证券公司章程应当对重大关联交易及其披露和表决程序作出规定","B":"证券公司实际控制人可以直接干预证券公司的经营管理活动","C":"证券公司可以在法规允许的范围内控股其他证券公司","D":"证券公司与其股东应当在业务、机构、资产等方面严格分离"},"a":"B","an":"选项B错误：证券公司的股东、实际控制人不得违反法律、行政法规和公司章程的规定干预证券公司的经营管理活动。 选项ACD说法正确。","type":"single"},{"id":"cy_law_1091","q":"收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约等义务的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"3万元以上30万元以下","B":"10万元以上30万元以下","C":"30万元以上300万元以下","D":"50万元以上500万元以下"},"a":"D","an":"根据《证券法》第一百九十六条的规定，收购人未按照《证券法》的规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。收购人及其控股股东、实际控制人利用上市公司收购，给被收购公司及其股东造成损失的，应当依法承担赔偿责任。","type":"single"},{"id":"cy_law_1093","q":"关于证券公司的股东、控股股东、实际控制人应予以特别注意的事项，下列说法正确的是（）。","c":{"A":"证券公司的控股股东可以自行任免证券公司的董事、监事和高级管理人员","B":"证券公司可为证券公司股东及其控股股东、实际控制人或其关联方提供融资或者担保","C":"证券公司可与其所控制的证券公司开展业务竞争","D":"证券公司应当将股东的权利义务、股权锁定期、股权管理事务责任人等关于股权管理的监管要求写入公司章程"},"a":"D","an":"选项D正确：证券公司应当将股东的权利义务、股权锁定期、股权管理事务责任人等关于股权管理的监管要求写入公司章程。此外，证券公司章程应当规定对外投资、对外担保的类型、金额和内部审批程序。 选项A错误：证券公司的控股股东不得超越股东会、董事会任免证券公司的董事、监事和高级管理人员。 选项B错误：证券公司股东及其控股股东、实际控制人不得违规要求证券公司为其或其关联方提供融资或者担保，或者强令、指使、协助、接受证券公司以其证券经纪客户或者证券资产管理客户的资产提供融资或者担保。 选项C错误：证券公司的控股股东、实际控制人及其关联方应当采取有效措施，防止与其所控制的证券公司发生业务竞争。","type":"single"},{"id":"cy_law_1095","q":"根据《证券公司风险处置条例》的规定，国务院证券监督管理机构决定对证券公司进行接管的，应当按照规定程序组织专业人员成立接管组。下列属于接管组职责的有（）。","c":{"A":"接管证券公司的财产、印章和账簿、文书等资料","B":"清理账户，核实资产负债有关情况，对符合国家规定的债权进行登记","C":"清查证券公司风险，依法保全、追收资产","D":"核查证券公司有关人员的违法行为"},"a":"A,C,D","an":"选项ACD正确：接管组自接管之日行使下列职责： （1）接管证券公司的财产、印章和账簿、文书等资料； （2）决定证券公司的管理事务； （3）保障证券公司证券经纪业务正常合规运行，完善内控制度； （4）清查证券公司风险，依法保全、追收资产； （5）控制证券公司风险，提出风险化解方案； （6）核查证券公司有关人员的违法行为； （7）国务院证券监督管理机构要求履行的其他职责。 选项B错误：为行政清理组的职责。","type":"multi"},{"id":"cy_law_1097","q":"以下哪些机构应当建立融资融券信息共享机制？（）","c":{"A":"证券业协会","B":"证券登记结算机构","C":"证券交易所","D":"证券金融公司"},"a":"B,C,D","an":"选项BCD正确：证券交易所、证券登记结算机构、证券金融公司应当建立融资融券信息共享机制。 选项A错误：与两融交易无直接关联，主要负责行业自律。","type":"multi"},{"id":"cy_law_1099","q":"国务院证券监督管理机构决定对证券公司证券经纪等涉及客户的业务进行托管的，应当按照规定程序选择证券公司等专业机构成立托管组，行使被托管证券公司的证券经纪等涉及客户的业务的经营管理权，托管组自托管之日行使的职责有（）。","c":{"A":"违法经营情节特别严重、存在巨大经营风险","B":"采取有效措施维护托管期间客户资产的安全","C":"核查证券公司存在的风险，及时向证券监管机构报告业务运行中出现的紧急情况，并提出解决方案","D":"保障证券公司证券经纪业务正常合规运行，必要时依照规定垫付营运资金和客户交易结算资金"},"a":"B,C,D","an":"选项BCD正确：国务院证券监督管理机构决定对证券公司证券经纪等涉及客户的业务进行托管的，应当按照规定程序选择证券公司等专业机构成立托管组，行使被托管证券公司的证券经纪等涉及客户的业务的经营管理权。托管组自托管之日行使下列职责： （1）保障证券公司证券经纪业务正常合规运行，必要时依照规定垫付营运资金和客户交易结算资金；  （2）采取有效措施维护托管期间客户资产的安全；  （3）核查证券公司存在的风险，及时向国务院证券监督管理机构报告业务运行中出现的紧急情况，并提出解决方案； （4）国务院证券监督管理机构要求履行的其他职责。 A项属于直接撤销证券公司的情形。","type":"multi"},{"id":"cy_law_1101","q":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，协议内容包括（）。","c":{"A":"收费标准和支付方式","B":"终止或者解除协议的条件和方式","C":"证券投资顾问服务的内容和方式","D":"证券投资顾问的职责和禁止行为"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： (1)当事人的权利义务； (2)证券投资顾问服务的内容和方式；（C正确） (3)证券投资顾问的职责和禁止行为；（D正确） (4)收费标准和支付方式；（A正确） (5)争议或者纠纷解决方式； (6)终止或者解除协议的条件和方式。（B正确）","type":"multi"},{"id":"cy_law_1103","q":"以下关于融资融券业务的决策授权体系，说法错误的有（）。","c":{"A":"由部门负责人确定融资融券业务的总规模","B":"业务决策机构确定对具体客户的授信额度","C":"业务执行部门确定单一客户的授信额度","D":"分支机构可自行决定客户的开户、保证金收取"},"a":"A,B,C,D","an":"A项错误，由【董事会】确定融资融券业务的总规模。 B项错误，业务【执行机构】确定对具体客户的授信额度。 C项错误，业务【决策部门】确定单一客户的授信额度。 D项错误，分支机构【不可】自行决定客户的开户、保证金收取。","type":"multi"},{"id":"cy_law_1105","q":"证券公司申请融资融券业务资格，应当提交中国证券业协会出具的关于融资融券业务技术系统已通过测试的证明文件。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司申请融资融券业务资格，应当向中国证监会提交【证券交易所、证券登记结算机构】出具的关于融资融券业务技术系统已通过测试的证明文件。","type":"judge"},{"id":"cy_law_1107","q":"证券公司公开侧业务部门需要保密侧业务部门派员跨墙进行业务协作的，应当事先向跨墙人员所属部门和合规部门提出申请，并经其审批同意。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司【保密侧】业务部门需要公开侧业务部门派员跨墙进行业务协作的，应当事先向跨墙人员所属部门和合规部门提出申请，并经其审批同意。","type":"judge"},{"id":"cy_law_1109","q":"根据《证券公司监督管理条例》，指定商业银行、资产托管机构和证券登记结算机构应当对存放在本机构的客户的交易结算资金、委托资金和客户担保账户内的资金、证券的动用情况进行监督。（）","c":{"1":"对","0":"错"},"a":"1","an":"指定商业银行、资产托管机构和证券登记结算机构应当对存放在本机构的客户的交易结算资金、委托资金和客户担保账户内的资金、证券的动用情况进行监督。","type":"judge"},{"id":"cy_law_1111","q":"根据《中华人民共和国证券法》的规定，持有公司（）以上股份的股东为证券交易内幕信息的知情人。","c":{"A":"0.03","B":"0.05","C":"0.02","D":"0.1"},"a":"B","an":"根据《中华人民共和国证券法》的规定，持有公司5％以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员为证券交易内幕信息的知情人。","type":"single"},{"id":"cy_law_1113","q":"根据《证券公司监督管理条例》，证券公司从事（），其客户的交易结算资金应当存放在指定（），以每个客户的名义单独立户管理。","c":{"A":"证券经纪业务；商业银行","B":"证券资产管理；证券交易所","C":"证券经纪业务；国务院证券监督管理机构","D":"证券承销业务；证券登记结算有限公司"},"a":"A","an":"根据《证券公司监督管理条例》，证券公司从事证券经纪业务，其客户的交易结算资金应当存放在指定商业银行，以每个客户的名义单独立户管理。 （交易结算资金一般都是在商业银行存放，因此只有A符合，可以排除掉BCD其他交易所、登记结算机构等选项）","type":"single"},{"id":"cy_law_1115","q":"证券公司在合规负责人任期届满前免除其职务的正当理由不包括（）。","c":{"A":"合规负责人本人申请","B":"中国证监会责令更换","C":"公司的股东要求替换","D":"确有证据证明其无法正常履职、未能勤勉尽责"},"a":"C","an":"证券公司在合规负责人任期届满前免除其职务的正当理由只能是合规负责人本人申请，或被中国证监会或其派出机构责令更换，或确有证据证明其无法正常履职、未能勤勉尽责等情形。 （选项C“公司的股东要求替换”并不构成免除合规负责人职务的正当理由。合规负责人的独立性需要得到保障，不应受制于个别股东的意志。）","type":"single"},{"id":"cy_law_1117","q":"根据《证券公司监督管理条例》，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上（）倍以下的罚款。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"根据《证券公司监督管理条例》第八十四条的规定，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款。","type":"single"},{"id":"cy_law_1119","q":"证券公司应当在（）层面制定统一的反洗钱和反恐怖融资机制安排，并确保其所有分支机构和控股附属机构结合自身业务特点有效执行。","c":{"A":"子公司","B":"营业部","C":"分公司","D":"总部"},"a":"D","an":"证券公司应当在总部层面制定统一的反洗钱和反恐怖融资机制安排，并确保其所有分支机构和控股附属机构结合自身业务特点有效执行。","type":"single"},{"id":"cy_law_1121","q":"中国证监会根据审慎监管的原则，可以提高对行业重要性证券公司的合规管理要求，并可以采取（）等方式加强合规监管。","c":{"A":"增加现场检查频率","B":"强化合规负责人任职监管","C":"委托外部专业机构协助开展工作","D":"减少合规管理人员的配备"},"a":"A,B,C","an":"选项ABC正确：中国证监会根据审慎监管的原则，可以提高对行业重要性证券公司的合规管理要求，并可以采取增加现场检查频率、强化合规负责人任职监管、委托外部专业机构协助开展工作等方式加强合规监管。 选项D错误：无此说法，且“减少合规管理人员的配备”与加强合规管理的目标相悖。","type":"multi"},{"id":"cy_law_1123","q":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。下列属于该协议内容的有（）。","c":{"A":"当事人的权利义务","B":"证券投资顾问服务的内容和方式","C":"争议或者纠纷解决方式","D":"终止或者解除协议的条件和方式"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： （1）当事人的权利义务； （2）证券投资顾问服务的内容和方式； （3）证券投资顾问的职责和禁止行为； （4）收费标准和支付方式； （5）争议或者纠纷解决方式； （6）终止或者解除协议的条件和方式。","type":"multi"},{"id":"cy_law_1125","q":"按照《证券公司监督管理条例》和《证券法》的要求，以下关于证券公司治理的基本要求中有关不得侵犯客户合法权益的说法，正确的有（）。","c":{"A":"证券公司不得挪用客户交易结算资金","B":"证券公司不得挪用客户委托管理的资产","C":"证券公司可以根据实际情况将客户托管在公司的证券挪用","D":"证券公司的股东和实际控制人不得占用客户资产，损害客户合法权益"},"a":"A,B,D","an":"根据《证券法》及《证券公司监督管理条例》的规定，证券公司对客户负有诚信义务，不得侵犯客户的财产权、选择权、公平交易权、知情权及其他合法权益。证券公司不得挪用客户交易结算资金（A正确），不得挪用客户委托管理的资产（B正确），不得挪用客户托管在公司的证券（C错误）。证券公司的股东和实际控制人不得占用客户资产，损害客户合法权益（D正确）。","type":"multi"},{"id":"cy_law_1127","q":"监事会负责督促、检查和评价证券公司各项内部控制制度的建立与执行情况，对内部控制的有效性负最终责任。（）","c":{"1":"对","0":"错"},"a":"0","an":"董事会负责督促、检查和评价证券公司各项内部控制制度的建立与执行情况，对内部控制的有效性负最终责任。","type":"judge"},{"id":"cy_law_1129","q":"证券公司投资咨询人员必须通过证券公司统一组织的证券、期货从业人员水平测试。","c":{"1":"对","0":"错"},"a":"0","an":"证券公司投资咨询人员必须通过中国证监会统一组织的证券、期货从业人员水平测试。因此本题说法错误。","type":"judge"},{"id":"cy_law_1131","q":"下列对证券投资顾问服务的有关规定表述正确的是（   ）。","c":{"A":"证券投资咨询机构及其人员不得为特定客户利益损害其他客户利益","B":"证券投资咨询机构及其人员不得为公司及其关联方的利益损害客户利益","C":"证券投资咨询机构及其人员不得为证券投资顾问人员及其利益相关者的利益损害客户利益","D":"证券投资顾问应当忠实于客户利益"},"a":"A,B,C,D","an":"证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益（选项D正确），不得为公司及其关联方的利益损害客户利益（选项B正确）；不得为证券投资顾问人员及其利益相关者的利益损害客户利益（选项C正确）；不得为特定客户利益损害其他客户利益（选项A正确）。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_law_1133","q":"证券投资咨询机构应当通过营业场所、中国证券业协会和公司网站，公示公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等、证券投资顾问的姓名及其（   ），方便投资者查询、监督。","c":{"A":"登记编码信息","B":"登记类别","C":"工作经历","D":"所在机构"},"a":"A","an":"选项A正确：证券投资咨询机构应当通过营业场所、中国证券业协会和公司网站，公示公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等、证券投资顾问的姓名及其登记编码信息，方便投资者查询、监督。","type":"single"},{"id":"cy_law_1135","q":"证券投资咨询机构经营管理主要负责人 、合规负责人对公司合规运营负责。","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构经营管理主要负责人 、合规负责人对公司合规运营负责。","type":"judge"},{"id":"cy_law_1137","q":"证券公司及其从业人员有损害客户利益的行为的，给予警告，没收违法所得，并处以（   ）；没有违法所得或者违法所得不足10万元的，处以10万元以上 100 万元以下的罚款；情节严重的，暂停或者撤销相关业务许可。","c":{"A":"违法所得1倍以上3倍以下的罚款","B":"违法所得1倍以上10倍以下的罚款","C":"10万元以上30万元以下的罚款","D":"10万元以上50万元以下的罚款"},"a":"B","an":"选项B正确：证券公司及其从业人员有损害客户利益的行为的，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足10万元的，处以10万元以上100万元以下的罚款;情节严重的，暂停或者撤销相关业务许可。","type":"single"},{"id":"cy_law_1139","q":"证券公司的从业人员不得私下接受客户委托买卖证券。","c":{"1":"对","0":"错"},"a":"1","an":"证券公司的从业人员不得私下接受客户委托买卖证券。","type":"judge"},{"id":"cy_law_1141","q":"证券公司的从业人员在证券交易活动中，执行所属的证券公司的指令或者利用职务违反交易规则的，由从业人员承担全部责任。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司的从业人员在证券交易活动中，执行所属的证券公司的指令或者利用职务违反交易规则的，由所属的证券公司承担全部责任。","type":"judge"},{"id":"cy_law_1143","q":"根据《证券投资顾问业务暂行规定》，下列客户服务内容属于证券公司、证券投资咨询机构的证券投资顾问业务范畴的是()","c":{"A":"向客户建议适当的投资组合","B":"向客户进行理财规划建议","C":"向客户建议如何选择适当的投资品种","D":"接受客户全权委托，管理客户资产"},"a":"A,B,C","an":"证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。投资建议内容包括投资的品种选择、投资组合以及理财规划建议等。证券公司在从事证券投资顾问业务过程中禁止接受客户的全权委托而决定证券买卖、选择证券种类、决定买卖数量或者买卖价格的行为。","type":"multi"},{"id":"cy_law_1145","q":"申请证券投资咨询从业资格的机构，应当具备的条件包括（  ）。 Ⅰ 有5名以上取得证券投资咨询从业资格的专职人员 Ⅱ 有10名以上取得证券投资咨询从业资格的专职人员 Ⅲ 100万元人民币以上的注册资本 Ⅳ 50万元人民币以上的注册资本","c":{"A":"Ⅰ、Ⅲ","B":"Ⅱ、Ⅲ","C":"Ⅰ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"A","an":"申请证券投资咨询从业资格的机构，应当具备的条件包括： 1）分别从事证券或者期货投资咨询业务的机构，有5名以上取得证券、期货投资咨询从业资格的专职人员，同时从事证券和期货投资咨询业务的机构，有10名以上取得证券、期货投资咨询从业资格的专职人员，其高级管理人员中，至少有1名取得证券或者期货投资咨询从业资格； 2）有100万元人民币以上的注册资本； 3）有固定的业务场所和与业务相适应的通信及其他信息传递设施； 4）有公司章程； 5）有健全的内部管理制度； 6）具备中国证监会要求的其他条件。 综上，该题选A。、","type":"single"},{"id":"cy_law_1147","q":"根据有关法律、行政法规和《证券投资顾问业务暂行规定》，对证券公司、证券投资咨询机构从事证券投资顾问业务实行自律管理，制定相关的职业规范和行为准则的机构是(  )。","c":{"A":"中国证券业协会","B":"中国证监会","C":"地方金融办公室","D":"中国证监会授权的派出机构"},"a":"A","an":"对证券公司、证券投资咨询机构从事证券投资顾问业务实行自律管理，制定相关的职业规范和行为准则的机构是中国证券业协会。","type":"single"},{"id":"cy_law_1149","q":"()对证券公司和证券投资咨询机构发布证券研究报告行为实行自律管理，并制定相应的职业规范和行为准则。","c":{"A":"中国证券业协会","B":"证券交易所","C":"中国证监会","D":"证券登记结算公司"},"a":"A","an":"中国证券业协会对证券公司和证券投资咨询机构发布证券研究报告行为实行自律管理，并制定相应的职业规范和行为准则。","type":"single"},{"id":"cy_law_1151","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构的人员从事证券投资顾问业务时应当（）。  Ⅰ忠实客户利益，切实维护客户合法权益  Ⅱ遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务  Ⅲ与客户签订证券投资顾问服务协议  Ⅳ优先维护特定客户利益","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ"},"a":"D","an":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害客户利益；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。  综上，该题选D。","type":"single"},{"id":"cy_law_1153","q":"证券公司、证券投资咨询机构及其人员应当遵循( )原则，勤勉、审慎地为客户提供证券投资顾问服务。","c":{"A":"公平公正","B":"诚实信用","C":"公开透明","D":"独立尽职"},"a":"B","an":"证券公司、证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉 审慎地为客户提 供证券投资顾问服务。","type":"single"},{"id":"cy_law_1155","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构的人员从事证券投资顾问业务时应当 ()","c":{"A":"忠实客户利益，切实维护客户合法权益","B":"遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务","C":"与客户签订证券投资顾问服务协议","D":"优先维护特定客户利益"},"a":"A,B,C","an":"AB正确、D错误：证券公司、证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害客户利益；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。证券投资顾问业务的基本原则是：依法合规、诚实信用、公平维护客户利益。 C正确：证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。 综上，该题选ABC。","type":"multi"},{"id":"cy_law_1157","q":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明（  ）。","c":{"A":"证券研究报告的发布人、发布日期","B":"证券投资顾问本人关于证券研究报告的观点","C":"与该证券研究报告冲突的其他证券研究报告的观点","D":"除作为依据之外的第三方证券研究报告的观点"},"a":"A","an":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。","type":"single"},{"id":"cy_law_1159","q":"按照《证券投资顾问业务暂行规定》的要求，证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确客户回访的程序、内容和要求，并（  ）。","c":{"A":"成立专门的委员会","B":"指定专门人员独立实施","C":"指定多部门分别独立实施","D":"指定多部门共同实施"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第二十一条，证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确客户回访的程序、内容和要求，并指定专门人员独立实施。","type":"single"},{"id":"cy_law_1161","q":"证券投资顾问服务协议应当约定自签订协议之日起5个工作日内客户可以用（  ）方式提出解除协议。","c":{"A":"口头","B":"口头或书面通知","C":"口头和书面通知","D":"书面通知"},"a":"D","an":"根据《证券投资顾问业务暂行规定》第14条：证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以书面通知方式提出解除协议。证券公司、证券投资咨询机构收到客户解除协议书面通知时，证券投资顾问服务协议解除。","type":"single"},{"id":"cy_law_1163","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确客户回访的程序，内容和要求，并(   )。","c":{"A":"指定多部门共同实施","B":"指定专门人员独立实施","C":"指定多部门分别独立实施","D":"成立专门的委员会"},"a":"B","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确客户回访的程序、内容和要求，并指定专门人员独立实施。","type":"single"},{"id":"cy_law_1165","q":"以下不属于证券公司、证券投资咨询机构向客户提供证券投资顾问服务应当告知客户的基本信息的是()","c":{"A":"投资决策由客户作出，投资风险由客户承担","B":"证券投资顾问服务的内容和方式","C":"证券投资顾问的姓名","D":"与投资人约定分享投资收益"},"a":"D","an":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： ①公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等； ②证券投资顾问的姓名及其登记编码； ③证券投资顾问服务的内容和方式； ④投资决策由客户作出，投资风险由客户承担； ⑤证券投资顾问不得代客户作出投资决策。 证券投资咨询机构及其从业人员从事证券服务业务不得与委托人约定分享证券投资收益或者分担证券投资损失。 综上，该题选D。","type":"single"},{"id":"cy_law_1167","q":"证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并（）约定收取证券投资顾问服务费用的安排。","c":{"A":"口头","B":"书面","C":"口头和书面","D":"口头或书面"},"a":"B","an":"证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、客户资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。","type":"single"},{"id":"cy_law_1169","q":"证券公司、证券投资咨询机构向客户提供投资顾问业务服务，应当告知客户公司名称、地址、联系方式、投诉电话、证券投资咨询资格业务等方便投资者查询、监督，公示方式包括（  ）。 Ⅰ营业场所 Ⅱ中国证券业协会网站 Ⅲ对外宣传资料 Ⅳ公司网站","c":{"A":"Ⅱ Ⅲ Ⅳ","B":"Ⅰ Ⅱ Ⅳ","C":"Ⅰ Ⅲ Ⅳ","D":"Ⅰ Ⅱ"},"a":"B","an":"证券公司、证券投资咨询机构向客户提供投资顾问业务服务，应当通过营业场所、中国证券业协会网站、公司网站告知客户公司名称、地址、联系方式、投诉电话、证券投资咨询资格业务等信息，方便投资者查询、监督。 综上，该题选B。","type":"single"},{"id":"cy_law_1171","q":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订投资顾问服务协议。协议应当包括的内容，正确的是(  )。 Ⅰ.当事人的权利和义务 Ⅱ.收费标准和支付方式 Ⅲ.证券投资顾问服务的内容和方式 Ⅳ.争议或者纠纷解决方式","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第14条：证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： （一）当事人的权利义务； （二）证券投资顾问服务的内容和方式； （三）证券投资顾问的职责和禁止行为； （四）收费标准和支付方式； （五）争议或者纠纷解决方式； （六）终止或者解除协议的条件和方式。 综上，该题选B。","type":"single"},{"id":"cy_law_1173","q":"证券公司、证券投资咨询机构应当按照(  )原则，与客户协商并书面约定收取证券投资顾问服务费用的安排。  Ⅰ.公平  Ⅱ.公正  Ⅲ.合理  Ⅳ.自愿","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第23条：证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、客户资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。 综上，该题选B。","type":"single"},{"id":"cy_law_1175","q":"证券公司正在探索形成的证券投资顾问服务收费模式有（）  Ⅰ按照服务期限收取固定顾问服务费用  Ⅱ在服务期内按客户资产规模的一定比例收取顾问服务费用  Ⅲ在服务期内按客户资产增值的部分提取一定比例的业绩报酬  Ⅳ以差别佣金方式收取顾问服务费用","c":{"A":"Ⅱ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"D","an":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、客户资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。    综上，该题选D。","type":"single"},{"id":"cy_law_1177","q":"证券公司、证券投资咨询机构应当加强人员培训，提升证券投资顾问的（    ）。  Ⅰ文化水平  Ⅱ职业操守  Ⅲ合规意识  Ⅳ专业服务能力","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ"},"a":"B","an":"证券投资咨询机构应当加强人员培训，提升证券投资顾问的职业操守、合规意识和专业服务能力。 综上，该题选B。","type":"single"},{"id":"cy_law_1179","q":"证券公司提供证券投资顾问服务，应当与客户签订证券投资顾问协议，并对协议实行(  )管理。","c":{"A":"编号","B":"分类","C":"统一","D":"保密"},"a":"A","an":"根据《证券投资顾问业务暂行规定》第14条：证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。","type":"single"},{"id":"cy_law_1181","q":"证券公司、证券投资咨询机构通过广播、电视、网络、报刊等大众媒体对证券投资顾问业务进行广告宣传，应当遵守(  )和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息及其他违法违规情形。","c":{"A":"《证券投资顾问业务暂行规定》","B":"《中华人民共和国广告法》","C":"《证券、期货投资咨询管理暂行办法》","D":"《证券法》"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第25条，证券公司、证券投资咨询机构通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《广告法》和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。","type":"single"},{"id":"cy_law_1183","q":"证券投资顾问服务协议应当约定，自签订协议之日起(  )个工作日内，客户可以书面通知方式提出解除协议。","c":{"A":"5","B":"3","C":"10","D":"7"},"a":"A","an":"根据《证券投资顾问业务暂行规定》第14条：证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以书面通知方式提出解除协议。证券公司、证券投资咨询机构收到客户解除协议书面通知时，证券投资顾问服务协议解除。","type":"single"},{"id":"cy_law_1185","q":"根据《证券投资顾问业务暂行规定》的要求，证券投资顾问业务档案的保存期限自协议终止之日起不得少于(  )年。","c":{"A":"3","B":"10","C":"5","D":"1"},"a":"C","an":"根据《证券投资顾问业务暂行规定》第28条，证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_law_1187","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守（）和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息及其他违法违规情形。","c":{"A":"《发布证券研究报告暂行规定》","B":"《广告法》","C":"《证券投资基金法》","D":"《证券、期货投资咨询管理暂行办法》"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第二十五条，证券公司、证券投资咨询机构通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《中华人民共和国广告法》和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。","type":"single"},{"id":"cy_law_1189","q":"证券投资顾问业务档案的保存期限自协议终止之日起不少于()年。","c":{"A":"3","B":"5","C":"1","D":"10"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第28条，证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_law_1191","q":"证券投资咨询机构从事证券投资顾问业务，应当建立客户投诉处理机制，在公司网站及营业场所显著位置公示（  ）。","c":{"A":"投诉电话","B":"投诉传真","C":"投诉电子信箱","D":"负责投诉处理的人员姓名"},"a":"A,B,C","an":"证券公司及证券营业部应当在公司网站及营业场所显著位置公示客户投诉电话、传真、电子信箱，保证投诉电话至少在营业时间内有人值守。 综上，该题选ABC。","type":"multi"},{"id":"cy_law_1193","q":"证券公司、证券投资咨询机构开展证券投资顾问业务，向客户提供投资建议的（  ）等信息，应当以书面或者电子文件形式予以记录留存","c":{"A":"时间","B":"内容","C":"方式","D":"依据"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。 向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。","type":"multi"},{"id":"cy_law_1195","q":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务时，应当遵循诚实信用原则，下列行为中违背上述原则的有（  ）","c":{"A":"在业务推广和客户招揽过程中，对服务能力和过往业绩进行夸大宣传","B":"在业务推广和客户招揽过程中，客观介绍服务能力和过往业绩","C":"提供虚假、不实、误导性的信息，诱导客户进行不必要的证券买卖","D":"基于合理依据向客户提供投资建议，并提示潜在的投资风险"},"a":"A,C","an":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务时，不得对服务能力和过往业绩进行夸大宣传；不得提供虚假、不实、误导性的信息，诱导客户进行不必要的证券买卖。 综上，该题选AC。","type":"multi"},{"id":"cy_law_1197","q":"证券公司、证券投资咨询机构向客户提供证券顾问服务，应当告知客户的基本信息包括（  ）。","c":{"A":"证券投资顾问不得代客户作出投资决策","B":"投资决策由客户作出，投资风险由客户承担","C":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","D":"证券投资顾问的姓名及其登记编码，服务的内容和方式"},"a":"A,B,C,D","an":"根据《证券投资顾问业务暂行规定》第十二条，证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： C正确：①公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等； D正确：②证券投资顾问的姓名及其登记编码；③证券投资顾问服务的内容和方式； B正确：④投资决策由客户作出，投资风险由客户承担； A正确：⑤证券投资顾问不得代客户作出投资决策。 综上，该题选ABCD。","type":"multi"},{"id":"cy_law_1199","q":"根据《证券投资顾问业务暂行规定》的要求，证券公司、证券投资咨询机构，应当对证券投资顾问()等环节实行留痕管理。","c":{"A":"服务提供","B":"客户回访和投诉处理","C":"业务推广","D":"协议签订"},"a":"A,B,C,D","an":"根据《证券投资顾问业务暂行规定》第二十八条，证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。","type":"multi"},{"id":"cy_law_1201","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当公示公司的名称、地址、联系方式、投诉电话、证券投资咨询业务资格和证券投资顾问的姓名与登记编码，方便投资者查询、监督，公示方式包括（）","c":{"A":"营业场所","B":"中国证券业协会网站","C":"对外宣传资料","D":"公司网站"},"a":"A,B,D","an":"证券公司、证券投资咨询机构向客户提供投资顾问业务服务，应当通过营业场所、中国证券业协会网站、公司网站告知客户公司名称、地址、联系方式、投诉电话、证券投资咨询资格业务等信息，方便投资者查询、监督。","type":"multi"},{"id":"cy_law_1203","q":"证券公司、证券投资咨询机构从事投资顾问业务，应当建立客户回访机制，明确客户回访的（   ）","c":{"A":"前提","B":"程序","C":"内容","D":"要求"},"a":"B,C,D","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确回访的程序、内容和要求，并指定专门人员独立实施。 综上，该题选了BCD。","type":"multi"},{"id":"cy_law_1205","q":"证券公司、证券投资咨询机构应当按照（    ）的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排。","c":{"A":"公平","B":"公正","C":"合理","D":"自愿"},"a":"A,C,D","an":"证券公司、证券投资咨询机构应当按照公平、合理、自愿的原则，与客户协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、客户资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。","type":"multi"},{"id":"cy_law_1207","q":"按照《证券投资顾问业务暂行规定》的要求，证券公司、证券投资咨询机构应当对证券投资顾问（）和投诉处理等环节实行留痕管理。","c":{"A":"客户回访","B":"协议签订","C":"业务推广","D":"服务提供"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。","type":"multi"},{"id":"cy_law_1209","q":"证券公司、证券投资咨询机构应当对证券投资顾问()等服务提供环节实现留痕管理。","c":{"A":"通过电话向客户提供投资建议","B":"对客户的账户进行诊断并反馈诊断结果","C":"以当面拜访的形式向客户提供投资建议","D":"接受客户委托代理买卖证券"},"a":"A,B,C","an":"证券公司、证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、客户回访、投诉处理等环节实行留痕管理。证券公司、证券投资咨询机构从业人员不得接受客户委托代理买卖证券。","type":"multi"},{"id":"cy_law_1211","q":"根据《证券投资顾问业务暂行规定》，证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的()。","c":{"A":"发布日期","B":"发布机构","C":"核心思想","D":"发布人"},"a":"A,D","an":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。","type":"multi"},{"id":"cy_law_1213","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当将()告知客户。","c":{"A":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","B":"证券投资顾问的姓名及其登记编码","C":"证券投资顾问服务的内容和方式","D":"投资决策由客户作出，投资风险由客户承担，证券投资顾问不得代客户作出投资决策"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： (1)公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等。 (2)证券投资顾问的姓名及其登记编码。 (3)证券投资顾问服务的内容和方式。 (4)投资决策由客户作出，投资风险由客户承担。 (5)证券投资顾问不得代客户作出投资决策。 综上，该题选ABCD。","type":"multi"},{"id":"cy_law_1215","q":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。","type":"judge"},{"id":"cy_law_1217","q":"证券投资顾问服务协议应当约定，自签订协议之日起15个工作日内，客户可以书面通知方式提出解除协议。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以书面通知方式提出解除协议。证券公司、证券投资咨询机构收到客户解除协议书面通知时，证券投资顾问服务协议解除。","type":"judge"},{"id":"cy_law_1219","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《公司法》和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。","c":{"1":"对","0":"错"},"a":"0","an":"通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《广告法》和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。","type":"judge"},{"id":"cy_law_1221","q":"证券公司从事证券投资顾问业务，应当遵循的基本原则是守法合规、诚实信用、忠实客户利益。","c":{"1":"对","0":"错"},"a":"1","an":"证券公司从事证券投资顾问业务，应当遵循的基本原则是守法合规、诚实信用、忠实客户利益。","type":"judge"},{"id":"cy_law_1223","q":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。()","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券投资顾问业务暂行规定》第14条：证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。","type":"judge"},{"id":"cy_law_1225","q":"证券投资顾问人员可以以个人名义向客户收取投资顾问服务费用。（）","c":{"1":"对","0":"错"},"a":"0","an":"禁止证券公司、证券投资咨询机构及其人员以个人名义向客户收取证券投资顾问服务费用。","type":"judge"},{"id":"cy_law_1227","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律，行政法规和《证券投资顾问业务暂行规定》，情节严重的，由（  ）进行行政处罚。","c":{"A":"中国证券业协会","B":"中国证监会","C":"中国证监会及其派出机构","D":"司法机关"},"a":"B","an":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定做出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"single"},{"id":"cy_law_1229","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务违反法律行政法规和《证券投资顾问业务暂行规定》，情节严重的，由()依照法律、行政法规和有关规定作出行政处罚。","c":{"A":"中国证监会及其派出机构","B":"中国证监会派出机构","C":"中国证券业协会","D":"中国证监会"},"a":"D","an":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和本规定的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"single"},{"id":"cy_law_1231","q":"证券公司对客户买卖证券的收益或者赔偿证券买卖的损失作出承诺的，可（ ）。 Ⅰ责令改正 Ⅱ给予警告 Ⅲ没收违法所得，并处以罚款 Ⅳ情节严重的，并处撤销相关业务许可","c":{"A":"Ⅰ Ⅱ","B":"Ⅰ Ⅱ Ⅲ Ⅳ","C":"Ⅱ Ⅲ Ⅳ","D":"Ⅰ Ⅲ Ⅳ"},"a":"B","an":"证券公司办理经纪业务接受客户的全权委托买卖证券的，或者违反《证券法》第一百三十五条的规定对客户的收益或者赔偿客户的损失作出承诺的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足50万元的，处以50万元以上500万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上 200万元以下的罚款。 综上，该题选B。","type":"single"},{"id":"cy_law_1233","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律。行政法规和相关规定的，中国证监会及其派出机构可以采取监管措施，下列属于相关监管措施的有（）  Ⅰ监管谈话  Ⅱ出具警示函  Ⅲ处以罚款  Ⅳ责令处分有关人员","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"C","an":"《证券投资顾问业务暂行规定》第三十三条的规定：证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和本规定的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。 综上，该题选C。","type":"single"},{"id":"cy_law_1235","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和相关规定的，中国证监会及其派出机构可以采取监管措施，下列属于相关监管措施的有()。","c":{"A":"监管谈话","B":"出具警示函","C":"拘留","D":"责令处分有关人员"},"a":"A,B,D","an":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"multi"},{"id":"cy_law_1237","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律和行政法规规定的中国证监会及其派出机构可以采取()监管措施。","c":{"A":"出具警示函","B":"责令清理违规业务","C":"监管谈话","D":"责令改正"},"a":"A,B,C,D","an":"根据《证券投资顾问业务暂行规定》第三十三条，证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和本规定的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"multi"},{"id":"cy_law_1239","q":"证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和《证券投资顾问业务暂行规定》的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施;情节严重的，中国证券业协会依照法律、行政法规和有关规定作出行政处罚;涉嫌犯罪的依法移送司法机关。","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券投资顾问业务暂行规定》第三十三条，证券公司、证券投资咨询机构及其人员从事证券投资顾问业务，违反法律、行政法规和本规定的，中国证监会及其派出机构可以采取责令改正、监管谈话、出具警示函、责令增加内部合规检查次数并提交合规检查报告、责令清理违规业务、责令暂停新增客户、责令处分有关人员等监管措施；情节严重的，中国证监会依照法律、行政法规和有关规定作出行政处罚；涉嫌犯罪的，依法移送司法机关。","type":"judge"},{"id":"cy_law_1241","q":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立的客户回访机制的内容包括( )。","c":{"A":"回访的程序","B":"回访的内容","C":"回访人员安排","D":"回访的要求和标准"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确回访的程序、内容和要求，并指定专门人员独立实施。","type":"multi"},{"id":"cy_law_1243","q":"证券公司应当要求其从业人员在每个培训周期内完成一定时间的业务培训，建议不少于（   ）学时。","c":{"A":"5","B":"10","C":"15","D":"30"},"a":"C","an":"证券公司应当要求其从业人员在每个培训周期内完成一定时间的业务培训，建议不少于15学时。培训内容应当符合协会制定的培训大纲要求。","type":"single"},{"id":"cy_law_1245","q":"证券投资咨询机构发布证券研究报告应当遵守法律、行政法规相关规定，遵循（  ）的原则。","c":{"A":"独立、客观、公正、审慎","B":"独立、客观、公开、审慎","C":"独立、客观、公平、审慎","D":"独立、客观、专业、审慎"},"a":"C","an":"根据《发布证券研究报告执业规范》第二条，证券公司、证券投资咨询机构发布证券研究报告，应当遵循独立、客观、公平、审慎的原则，加强合规管理，提升研究质量和专业服务水平。","type":"single"},{"id":"cy_law_1247","q":"根据《发布证券研究报告执业规范》，证券公司、证券投资咨询机构及证券分析师应履行的职责不包括（）","c":{"A":"建立证券研究报告的信息来源管理制度，加强信息收集环节的管理","B":"将证券研究报告制作发布业务与销售服务业务分开管理","C":"证券研究报告相关销售服务人员可以在证券研究报告发布前干涉和影响证券研究报告的制作过程、研究观点和发布时间","D":"遵循独立、客观、公平、审慎原则"},"a":"C","an":"C选项错误，证券研究报告相关销售服务人员不得在证券研究报告发布前干涉和影响证券研究报告的制作过程、研究观点和发布时间。","type":"single"},{"id":"cy_law_1249","q":"证券公司、证券投资咨询机构发布证券研究报告，应当遵循独立、客观、公平、审慎原则，加强合规管理，提升研究质量和专业服务水平。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司、证券投资咨询机构发布证券研究报告，应当遵循独立、客观、公平、审慎原则，加强合规管理，提升研究质量和专业服务水平。","type":"judge"},{"id":"cy_law_1251","q":"证券公司、证券投资咨询机构应当公平对待证券研究报告的发布对象，可以将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司、证券投资咨询机构应当公平对待证券研究报告的发布对象，不得将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象。","type":"judge"},{"id":"cy_law_1253","q":"在投资管理领域，分布式账本技术的应用方向主要包括加密货币及实物资产代币化、场外交易、结算清算及合规管理等。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"在投资管理领域，分布式账本技术的应用方向主要包括加密货币及实物资产代币化、场外交易、结算清算及合规管理等。","type":"judge"},{"id":"cy_law_1255","q":"下列关于证券市场监管的说法中，正确的有(  )。","c":{"A":"国际证监会组织于1998年公布的证券市场监管的目标之一是降低系统性风险","B":"公开市场业务也是对证券市场进行干预的经济手段之一","C":"证券市场监管手段包括法律手段、经济手段和行政手段","D":"经济手段包括利率政策、信贷政策、税收政策等，是证券市场监管部门的主要手段"},"a":"A,B,C","an":"D项错误，法律手段是通过建立完善的证券法律、法规体系和严格执法来实现的，这是证券市场监管部门的主要手段，具有较强的威慑力和约束力。","type":"multi"},{"id":"cy_law_1257","q":"在证券市场发展初期，法制尚不健全、市场机制尚未理顺，在遇到突发性事件时，证券监督管理部门一般较多采取（），对证券市场进行监管。","c":{"A":"法律手段","B":"经济手段","C":"行政手段","D":"自律手段"},"a":"C","an":"行政手段是通过制定政策和计划等对证券市场进行行政性的干预（C选项正确）。这种手段比较直接，但运用不当可能违背市场规律，无法发挥作用甚至遭到惩罚。一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性事件时使用。 补充： 1、法律手段是通过建立完善的证券法律、法规体系和严格执法来实现的。这是证券市场监管部门的主要手段，具有较强的威慑力和约束力。 2、经济手段是通过运用利率政策、公开市场业务、信贷政策、税收政策等，对证券市场进行干预。这种手段相对比较灵活，但调节过程可能较慢，存在时滞。","type":"single"},{"id":"cy_law_1259","q":"证券公司将合规管理有效性评估纳入内部控制评价的，其合规管理有效性评估工作应当符合该指引的要求，不必单独出具合规管理有效性评估报告。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"为指导证券公司开展合规管理有效性评估，有效防范和控制合规风险，2021年5月28日，中国证券业协会发布《证券公司合规管理有效性评估指引（2021修订）》。证券公司将合规管理有效性评估纳入内部控制评价的，其合规管理有效性评估工作应当符合该指引的要求，并单独出具合规管理有效性评估报告。","type":"judge"},{"id":"cy_law_1261","q":"为加强对证券服务机构的管理，《中华人民共和国证券法》授予证券监督管理机构对证券服务机构的（）。","c":{"A":"监管权","B":"管理权","C":"现场检查权","D":"审查权"},"a":"A,C","an":"本题考查市场准入及退出机制。为加强对证券服务机构的管理，《中华人民共和国证券法》授予证券监督管理机构对证券服务机构的监管权和现场检查权。AC选项正确，BD属于干扰项。","type":"multi"},{"id":"cy_law_1263","q":"违反《证券法》的规定，操纵证券市场的，责令依法处理其非法持有的证券，没收违法所得，并处以违法所得（）的罚款；没有违法所得或者违法所得不足（）的，处以一百万元以上一千万元以下的罚款。","c":{"A":"一倍以上十倍以下；一百万元","B":"一倍以上五倍以下；五十万元","C":"一倍以上十倍以下；五十万元","D":"一倍以上五倍以下；一百万元"},"a":"A","an":"选项A正确：违反《证券法》的规定，操纵证券市场的，责令依法处理其非法持有的证券，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足一百万元的，处以一百万元以上一千万元以下的罚款。单位操纵证券市场的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"single"},{"id":"cy_law_1265","q":"违反法律规定，擅自设立证券登记结算机构的，由（）予以取缔。","c":{"A":"法院","B":"证券交易所","C":"证券业协会","D":"国务院证券监督管理机构"},"a":"D","an":"选项D正确：根据《证券法》第二百一十二条的规定，违反本法第一百四十五条的规定，擅自设立证券登记结算机构的，由国务院证券监督管理机构予以取缔，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。 选项A错误：法院的主要职责是审判和执行法律，而不是直接负责监管市场活动或取缔非法机构。 选项B错误：证券交易所主要负责制定和实施业务规则、管理证券交易等，没有权力取缔非法设立的证券登记结算机构。 选项C错误：证券业协会是自律性组织，主要负责行业自律和服务，不具备行政监管职能。","type":"single"},{"id":"cy_law_1267","q":"财务顾问及其财务顾问主办人在相关并购重组信息未依法公开前，利用相关并购重组信息散布虚假信息、操纵证券市场的，中国证监会可依据《中华人民共和国证券法》责令依法处理其非法持有的证券，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没收违法所得或者违法所得不足100万元的，处以100万元以上（）万元以下的罚款。","c":{"A":"1000","B":"3000","C":"600","D":"200"},"a":"A","an":"选项A正确：《证券法》第一百九十二条，违反本法第五十五条的规定，操纵证券市场的，责令依法处理其非法持有的证券，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足一百万元的，处以【一百万元以上一千万元以下】的罚款。单位操纵证券市场的，还应当对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"single"},{"id":"cy_law_1269","q":"证券公司违反证券法的规定，未采取有效隔离措施防范利益冲突，或者未分开办理相关业务、混合操作的，应（）。","c":{"A":"责令改正","B":"给予警告","C":"没收违法所得","D":"并处以违法所得一倍以上十倍以下的罚款"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券法》第二百零六条的规定，证券公司违反本法第一百二十八条的规定，未采取有效隔离措施防范利益冲突，或者未分开办理相关业务、混合操作的，责令改正，给予警告，没收违法所得，并处以违法所得一倍以上十倍以下的罚款；没有违法所得或者违法所得不足五十万元的，处以五十万元以上五百万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。","type":"multi"},{"id":"cy_law_1271","q":"《证券投资基金法》规定，基金信息披露义务人不依法披露基金信息或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，暂停或者撤销基金从业资格，并处（）罚款。","c":{"A":"1万元以上10万元以下","B":"1万元以上30万元以下","C":"3万元以上10万元以下","D":"3万元以上30万元以下"},"a":"D","an":"选项D正确：根据《证券投资基金法》第七十四条及第一百三十一条的规定，基金信息披露义务人不依法披露基金信息或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收违法所得，并处10万元以上100万元以下罚款；对直接负责的主管人员和其他直接责任人员给予警告，暂停或者撤销基金从业资格，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_law_1273","q":"根据《证券公司监督管理条例》，证券公司设立时，其业务范围应当与其财务状况、内部控制制度、合规制度和（）相适应。","c":{"A":"人力资源状况","B":"技术条件","C":"市场风险","D":"政策法规环境"},"a":"A","an":"选项A正确：证券公司设立时，其业务范围应当与其财务状况、内部控制制度、合规制度和人力资源状况相适应。（其他选项为迷惑选项设置，无实际意义）  【知识拓展】 财务状况：经营相关业务应当符合法律对注册资本最低限额的要求。 内部控制制度：确保公司的运营规范和风险可控。 合规制度：保证公司的业务活动符合法律法规的要求。 人力资源状况：高级管理人员和从业人员的素质与状况，以确保公司有能力开展各项业务。","type":"single"},{"id":"cy_law_1275","q":"国务院证券监督管理机构对治理结构不健全、内部控制不完善、经营管理混乱、设立账外账或者进行账外经营、拒不执行监督管理决定、违法违规的证券公司，应当责令其限期改正，并可以采取的措施有（）。","c":{"A":"责令增加内部合规检查的次数并提交合规检查报告","B":"对证券公司及其有关董事、监事、高级管理人员、境内分支机构负责人给予谴责","C":"责令处分有关责任人员，并报告结果","D":"责令暂停证券公司或者其境内分支机构的部分或者全部业务、限期撤销境内分支机构"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券公司监督管理条例》第七十条的规定，国务院证券监督管理机构对治理结构不健全、内部控制不完善、经营管理混乱、设立账外账或者进行账外经营、拒不执行监督管理决定、违法违规的证券公司，应当责令其限期改正，并可以采取下列措施： （1）责令增加内部合规检查的次数并提交合规检查报告（A正确）；  （2）对证券公司及其有关董事、监事、高级管理人员、境内分支机构负责人给予谴责（B正确）；  （3）责令处分有关责任人员，并报告结果（C正确）； （4）责令更换董事、监事、高级管理人员或者限制其权利； （5）对证券公司进行临时接管，并进行全面核查； （6）责令暂停证券公司或者其境内分支机构的部分或者全部业务、限期撤销境内分支机构（D正确）。","type":"multi"},{"id":"cy_law_1277","q":"根据《证券公司监督管理条例》，证券公司设立时，其业务范围应当与其（）相适应。","c":{"A":"财务状况","B":"内部控制制度","C":"合规制度","D":"人力资源状况"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司设立时，其业务范围应当与其【财务状况、内部控制制度、合规制度和人力资源状况】相适应。","type":"multi"},{"id":"cy_law_1279","q":"按照《证券市场基本法律法规》的要求，（）不属于证券公司治理的基本要求。","c":{"A":"建立健全组织架构、明确职责划分","B":"不得侵犯客户合法权益","C":"建立完备的客户投资盈利保障制度","D":"建立完备的内部控制体系"},"a":"C","an":"题目问的是“不属于”。 选项C：“盈利保障制度”属于超范围责任，不属于公司治理（如内控、组织架构）。因此答案选择C。 选项ABD：证券公司治理的基本要求： （1）建立健全组织架构、明确职责划分  （2）不得侵犯客户合法权益  （3）建立完备的内部控制体系 （4）建立稳健的薪酬制度","type":"single"},{"id":"cy_
