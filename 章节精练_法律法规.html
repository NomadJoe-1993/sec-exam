险承受能力的产品，但如投资者仍坚持购买的，可向其销售","B":"书面形式进行风险特别提示后，向其销售高于其风险承受能力的产品","C":"对于确认不属于风险承受能力最低级别、以口头进行特别风险警示的，可销售","D":"对于风险承受能力最低级别的投资者，应该拒绝向其销售"},"a":"D","an":"以书面形式进行特别风险警示：如投资者不属于风险承受能力最低类别，经营机构业务人员应当就产品或服务的风险等级高于投资者承受能力的情况进行特别书面风险警示。如投资者仍坚持购买的，可以向其销售相关产品或者提供相关服务。","type":"single"},{"id":"cflue_zc_fl2.json_13","q":"关于证券公司治理的基本要求，下列说法正确的有（）。","c":{"A":"建立完备的内部控制体系","B":"建立健全“三会一层”组织架构","C":"不得侵犯客户的合法权益","D":"搭建先进的信息系统"},"a":"ABC","an":"证券公司治理的基本要求：1、建立健全组织架构、明确职责划分，建立健全“三会一层”的组织架构，明确股东（大）会、董事会、监事会、经理层之间的职责划分。2、不得侵犯客户合法权益。3、建立完备的内部控制体系。","type":"multi"},{"id":"cflue_zc_fl2.json_14","q":"对证券公司投资银行类项目负有主要管理或执行责任人员的收入递延支付年限，原则上不得少于3年。（）","c":{"A":"错","B":"对"},"a":"B","an":"应当针对管理和执行投资银行类项目的主要人员建立收入递延支付机制，合理确定收入递延支付标准，明确递延支付人员范围、递延支付年限和比例等内容。对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得少于3年。","type":"judge"},{"id":"cflue_zc_fl2.json_15","q":"根据《证券公司流动性风险管理指引》，证券公司应至少（）对流动性风险限额进行一次评估，必要时进行调整。","c":{"A":"每季度","B":"每年","C":"每月","D":"每半年"},"a":"B","an":"证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。证券公司应至少【每年】对流动性风险限额进行【一次】评估，必要时进行调整。","type":"single"},{"id":"cflue_zc_fl2.json_16","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为不低于每半年一次。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。","type":"judge"},{"id":"cflue_zc_fl2.json_17","q":"赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（1）赵某可在（）家证券基金经营机构担任独立董事。","c":{"A":"3","B":"4","C":"2","D":"1"},"a":"C","an":"任何人员最多可以在2家证券公司担任独立董事。","type":"multi"},{"id":"cflue_zc_fl2.json_18","q":"洗钱风险管理工作基本原则中，（）是指证券公司应赋予同一客户在本金融机构唯一的风险等级。","c":{"A":"同一性原则","B":"自主管理原则","C":"保密原则","D":"风险相当原则"},"a":"A","an":"【同一性原则】是指证券公司应赋予同一客户在本金融机构唯一的风险等级。","type":"single"},{"id":"cflue_zc_fl2.json_19","q":"洗钱风险管理工作基本原则中，（）是指证券公司应依据风险评估结果科学配置反洗钱资源，在洗钱风险较高的领域采取强化的反洗钱措施，在洗钱风险较低的领域采取简洁的反洗钱措施。","c":{"A":"动态管理原则","B":"自主管理原则","C":"同一性原则","D":"风险相当原则"},"a":"D","an":"【风险相当原则】是指证券公司应依据风险评估结果科学配置反洗钱资源，在洗钱风险较高的领域采取强化的反洗钱措施，在洗钱风险较低的领域采取简洁的反洗钱措施。","type":"single"},{"id":"cflue_zc_fl2.json_20","q":"证券公司应当将子公司的风险管理纳入统一体系，子公司风险管理工作负责人的任命应由证券公司首席风险官提名，子公司董事会聘任，其解聘应征得（）同意。","c":{"A":"子公司董事长","B":"证券公司首席风险官","C":"证券公司总经理","D":"证券公司董事长"},"a":"B","an":"子公司风险管理工作负责人的任命应由证券公司首席风险官提名、子公司董事会聘任，其解聘应征得【证券公司首席风险官】同意。","type":"single"},{"id":"cflue_zc_fl2.json_21","q":"下列关于恐怖活动资产冻结工作的说法，正确的是（）。","c":{"A":"证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施","B":"证券公司可以自行解除冻结措施","C":"证券公司应当严格按照公安部发布的恐怖活动组织名单，依法对相关资产进行查封","D":"证券公司只能依据公安机关的相关规定对被采取冻结措施的资产进行管理及处置"},"a":"A","an":"证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的【决定】，依法对相关资产采取冻结措施。证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施。证券公司采取冻结措施后，除【中国人民银行及其分支机构、公安机关、国家安全机关】另有要求外，应当及时告知客户，并说明采取冻结措施的依据和理由。境外有关部门以涉及恐怖活动为由，要求证券公司冻结相关资产、提供客户身份信息及交易信息的，证券公司应当告知对方通过外交途径或者司法协助途径提出请求；【不得擅自采取冻结措施】，不得擅自提供客户身份信息及交易信息。","type":"single"},{"id":"cflue_zc_fl2.json_22","q":"证券公司分类评价中，属于风险管理能力评价指标的有（）。","c":{"A":"司法机关采取的刑事处罚措施","B":"信息披露","C":"客户权益保护","D":"资本充足"},"a":"BCD","an":"风险管理能力主要根据资本充足、公司治理与合规管理、全面风险管理、信息技术管理、客户权益保护、信息披露六类评价指标进行评价，体现证券公司对流动性风险、合规风险、市场风险、信用风险、技术风险及操作风险等管理能力。","type":"multi"},{"id":"cflue_zc_fl2.json_23","q":"证券公司在销售金融产品的过程中，禁止进行的活动是（）。","c":{"A":"向符合准入要求的投资者销售金融产品","B":"向普通投资者主动推介符合其投资目标的金融产品","C":"向普通投资者主动推介风险等级低于其风险承受能力的金融产品","D":"向投资者就不确定事项提供确定性的判断"},"a":"D","an":"经营机构在销售产品或者提供服务的过程中，应勤勉尽责，审慎履职，全面了解投资者情况，充分揭示风险，基于投资者的不同风险承受能力以及产品或者服务的不同风险等级等因素，提出明确的适当性匹配意见，将适当的产品或者服务提供给适合的投资者，并禁止进行下列活动：1、向不符合准入要求的投资者销售产品或者提供服务；2、向投资者就不确定事项提供确定性的判断，或者告知投资者有可能使其误认为具有确定性的意见；3、向普通投资者主动推介风险等级高于其风险承受能力的产品或者服务；4、向普通投资者主动推介不符合其投资目标的产品或者服务；5、向风险承受能力最低类别的投资者销售或者提供风险等级高于其风险承受能力的产品或者服务；6、其他违背适当性要求，损害投资者合法权益的行为。","type":"single"},{"id":"cflue_zc_fl2.json_24","q":"根据《证券公司全面风险管理规范》，对证券公司全面风险管理情况进行自律管理的是中国证券业协会。（）","c":{"A":"错","B":"对"},"a":"B","an":"中国证券业协会可以对证券公司全面风险管理情况进行自律管理，证券公司应予以配合。","type":"judge"},{"id":"cflue_zc_fl2.json_25","q":"根据《证券期货投资者适当性管理办法》，下列关于落实投资者适当性应遵循的原则，错误的是（）。","c":{"A":"经营机构应对普通投资者和专业投资者实施差别化管理","B":"经营机构应当采取科学管理的方法，设置必要的标准和流程，保证适当性管理的实施","C":"经营机构应当对投资者进行保护性管理，保证投资者收益的可持续性和平稳性","D":"当经营机构及其工作人员的利益与投资者的利益发生冲突时，应当优先保障投资者的合法权益"},"a":"C","an":"应保护投资者的合法权益，无需保护收益的持续性和平稳性。","type":"single"},{"id":"cflue_zc_fl2.json_26","q":"下列关于分类监管制度对证券公司正向激励作用的说法，错误的是（）。","c":{"A":"提升风险控制能力","B":"加强合规管理","C":"便于证券公司广告宣传","D":"培育核心竞争力"},"a":"C","an":"证券公司分类监管制度是证券行业的一项基础性制度，对促进证券公司加强合规管理、提升风险控制能力、培育核心竞争力，发挥了正向激励作用。","type":"single"},{"id":"cflue_zc_fl2.json_27","q":"根据《证券期货投资者适当性管理办法》，产品或服务存在下列（）因素的，经营机构应当审慎评估其风险等级。","c":{"A":"存在收益损失的可能性，因杠杆交易等因素容易导致收益大部分或者全部损失的产品或者服务","B":"自律组织认定的中风险产品或者服务","C":"产品或者服务的可理解性，因结构单一、易估值等因素导致普通人简单化理解其条款和特征的产品或者服务","D":"产品或者服务的募集方式，涉及面广、影响力大的公募产品或者相关服务"},"a":"D","an":"产品或者服务存在下列因素的，应当审慎评估其风险等级：（l）存在本金损失的可能性，因杠杆交易等因素容易导致本金大部分或者全部损失的产品或者服务；2、产品或者服务的流动变现能力，因无公开交易市场、参与投资者少等因素导致难以在短期内以合理价格顺利变现的产品或者服务；3、产品或者服务的可理解性，因结构复杂、不易估值等因素导致普通人难以理解其条款和特征的产品或者服务；4、产品或者服务的募集方式，涉及面广、影响力大的公募产品或者相关服务；5、产品或者服务的跨境因素，存在市场差异、适用境外法律等情形的跨境发行或者交易的产品或者服务；6、自律组织认定的高风险产品或者服务；7、其他有可能构成投资风险的因素。","type":"single"},{"id":"cflue_zc_fl2.json_28","q":"根据《证券基金经营机构信息技术管理办法》，信息技术服务的范围包括（）。","c":{"A":"中国证券业协会规定的其他情形","B":"中国证监会规定的其他情形","C":"重要信息系统的运维及日常安全管理","D":"重要信息系统的开发、测试、集成及测评"},"a":"BCD","an":"信息技术服务的范围如下：1、重要信息系统的开发、测试、集成及测评；2、重要信息系统的运维及日常安全管理；3、中国证监会规定的其他情形。","type":"multi"},{"id":"cflue_zc_fl2.json_29","q":"下列不属于证券公司融资渠道的是向客户拆借。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司应建立并完善融资策略，提高融资来源的多元化和稳定程度，建立包括但不限于银行借款、同业拆借、债券、收益凭证、短期融资券、证券回购等灵活的场内及场外融资渠道。","type":"judge"},{"id":"cflue_zc_fl2.json_30","q":"证券公司风险管理部门应当向董事会提交风险管理日报、月报、年报等定期报告。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险管理部门应当向【经理层】提交风险管理日报、月报、年报等定期报告，反映风险识别、评估结果和应对方案，对重大风险应提供专项评估报告，确保经理层及时、充分了解公司风险状况。","type":"judge"},{"id":"cflue_zc_fl2.json_31","q":"根据《证券期货投资者适当性管理办法》，下列关于客户投资者适当性的说法，正确的有（）。","c":{"A":"证券公司可以向普通投资者主动推介不符合其投资目标的产品或者服务","B":"证券公司不得损害投资者合法权益","C":"证券公司不得向投资者销售高于其风险承受能力的产品","D":"证券公司不得主动向机构投资者推荐产品"},"a":"B","an":"经营机构在销售产品或者提供服务的过程中，应勤勉尽责，审慎履职，全面了解投资者情况，充分揭示风险，基于投资者的不同风险承受能力以及产品或者服务的不同风险等级等因素，提出明确的适当性匹配意见，将适当的产品或者服务提供给适合的投资者，并禁止进行下列活动：1、向不符合准入要求的投资者销售产品或者提供服务；2、向投资者就不确定事项提供确定性的判断，或者告知投资者有可能使其误认为具有确定性的意见；3、向普通投资者【主动推介】风险等级高于其风险承受能力的产品或者服务；4、向普通投资者【主动推介】不符合其投资目标的产品或者服务（当风险承受能力非最低类别的投资者打算购买销售高于其风险承受能力的产品时，销售机构是可以向其销售的）；5、向风险承受能力最低类别的投资者销售或者提供风险等级高于其风险承受能力的产品或者服务；6、其他违背适当性要求，损害投资者合法权益的行为。","type":"single"},{"id":"cflue_zc_fl2.json_32","q":"证券公司分类评价中，司法机关采取的刑事处罚措施是属于风险管理能力评价指标。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险管理能力主要根据【资本充足、公司治理与合规管理、全面风险管理、信息技术管理、客户权益保护、信息披露】六类评价指标进行评价，体现证券公司对流动性风险、合规风险、市场风险、信用风险、技术风险及操作风险等管理能力。","type":"judge"},{"id":"cflue_zc_fl2.json_33","q":"下列关于证券公司流动性风险管理目标，描述最准确的是（）。","c":{"A":"建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保流动性需求能够及时以合理成本得到满足","B":"确保具有充足的日间流动性头寸和相关融资安排，及时满足正常和压力情景下的日间支付需求","C":"制定有效的流动性风险应急计划","D":"确保公司可以应对紧急情况下的流动性需求"},"a":"A","an":"证券公司流动性风险管理的目标是，建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。","type":"single"},{"id":"cflue_zc_fl2.json_34","q":"中国证监会根据证券公司评价计分的高低，将证券公司分为五大类十一个级别，其中C级是正常经营状态的最低等级。（）","c":{"A":"错","B":"对"},"a":"B","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A（AAA，AA、A）、B（BBB、BB、B）、C（CCC、CC、C）、D、E五大类十一个级别。其中，C级是正常经营状态的最低等级。","type":"judge"},{"id":"cflue_zc_fl2.json_35","q":"公司对高级管理人员和下属各单位进行考核时，合规负责人应当对其（）进行专项考核。","c":{"A":"经营管理的合规性","B":"合规管理的有效性","C":"经营管理的盈利性","D":"执业行为的合规性"},"a":"ABD","an":"证券经营机构对高级管理人员和下属各单位进行考核时，应当由合规负责人对其合规管理的有效性、经营管理和执业行为的合规性进行专项考核，作为绩效考核的重要内容。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_20","q":"甲证券公司营销人员王某拟向某70岁以上的高龄退休客户张某主动推介代销的某私募基金，根据张某在营业部填写的风险承受能力测评问卷，显示张某的风险承受能力结果为R1，但营销人员王某拟推荐的私募基金产品风险等级结果为R5，于是营销人员王某放弃了主动向张某超风险推荐该私募基金的计划。（2）按照《证券经营机构投资者适当性管理实施指引（试行）》，适当性管理主要包括以下（）安排。","c":{"A":"适当性匹配","B":"对产品或服务分级","C":"全面了解客户","D":"全面计算收益"},"a":"ABC","an":"适当性管理主要分为三大安排：全面了解客户，对产品或服务分级，适当性匹配。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_36","q":"根据《证券公司流动性风险管理指引》，下列关于证券公司流动性风险管理目标的说法，正确的有（）。","c":{"A":"对流动性风险实施有效识别、计量","B":"对流动性风险实施有效监测、控制","C":"确保其流动性需求能够及时得到满足","D":"建立健全流动性风险管理体系"},"a":"ABCD","an":"证券公司流动性风险管理的目标，是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_37","q":"根据《证券公司投资银行类业务内部控制指引》，下列说法错误的有（）。","c":{"A":"通过委托外部机构对投资银行类业务内部控制有效性进行评估的，证券公司依法应当承担的责任可以免除","B":"对投资银行类项目负有主要管理责任人员的收入递延支付年限原则上不得多于3年","C":"投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10","D":"投资银行内部控制执行效果评估每两年评估1次"},"a":"ABD","an":"对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得【少】于3年。应当根据监管要求、业务发展等情况的需要，建立内部控制执行效果定期评估机制。证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估【每年】不得少于1次。委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查，避免发生利益冲突。证券公司依法应当承担的责任【不因】委托外部机构而免除。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_38","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为（）。","c":{"A":"不低于每五年一次","B":"不低于每一年一次","C":"不低于每半年一次","D":"不低于每三年一次"},"a":"D","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。","type":"single"},{"id":"cflue_paper_法律法规_1.json_41","q":"根据《证券公司信用风险管理指引》，下列关于证券公司信用风险业务类型的说法，正确的是（）。","c":{"A":"包括互换、场外期权、远期等场外衍生品业务（不包括信用衍生品）","B":"包括股票投资、约定购回式证券交易、融资融券等融资类业务","C":"包括债券投资交易业务（不包括国债、地方债、金融债、政府支持机构债）","D":"包括非标准化债权资产投资业务"},"a":"D","an":"按照业务类型分类，包括但不限于：【股票质押式回购交易】、约定购回式证券交易、融资融券等融资类业务；互换、场外期权、远期、【信用衍生品】等场外衍生品业务；债券投资交易（包括债券现券交易、债券回购交易、债券远期交易、债券借贷业务等债券相关交易业务），债券包括但不限于【国债】、地方债、金融债、政府支持机构债、企业债、非金融企业债务融资工具、公司债、资产支持证券、同业存单；【非标准化债权资产投资】；其他涉及信用风险的自有资金出资业务。","type":"single"},{"id":"cflue_paper_法律法规_1.json_58","q":"根据《证券期货投资者适当性管理办法》，下列关于普通投资者特别保护的说法，正确的是（）。","c":{"A":"普通投资者在收益保障、风险警示、适当性匹配等方面享有特别保护","B":"普通投资者在信息告知、收益保障、适当性匹配等方面享有特别保护","C":"普通投资者在信息告知、风险警示、收益保障等方面享有特别保护","D":"普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护"},"a":"D","an":"投资者分为普通投资者与专业投资者。普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护。","type":"single"},{"id":"cflue_paper_法律法规_2.json_7","q":"下列关于恐怖活动资产冻结工作的说法，正确的是（）。","c":{"A":"证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施","B":"证券公司可以自行解除冻结措施","C":"证券公司应当严格按照公安部发布的恐怖活动组织名单，依法对相关资产进行查封","D":"证券公司只能依据公安机关的相关规定对被采取冻结措施的资产进行管理及处置"},"a":"A","an":"证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的【决定】，依法对相关资产采取冻结措施。证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施。证券公司采取冻结措施后，除【中国人民银行及其分支机构、公安机关、国家安全机关】另有要求外，应当及时告知客户，并说明采取冻结措施的依据和理由。境外有关部门以涉及恐怖活动为由，要求证券公司冻结相关资产、提供客户身份信息及交易信息的，证券公司应当告知对方通过外交途径或者司法协助途径提出请求；【不得擅自采取冻结措施】，不得擅自提供客户身份信息及交易信息。","type":"single"},{"id":"cflue_paper_法律法规_2.json_29","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为不低于每半年一次。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_30","q":"洗钱风险管理工作基本原则中，（）是指证券公司应赋予同一客户在本金融机构唯一的风险等级。","c":{"A":"同一性原则","B":"自主管理原则","C":"保密原则","D":"风险相当原则"},"a":"A","an":"【同一性原则】是指证券公司应赋予同一客户在本金融机构唯一的风险等级。","type":"single"},{"id":"cflue_paper_法律法规_2.json_33","q":"证券公司分类评价中，司法机关采取的刑事处罚措施是属于风险管理能力评价指标。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险管理能力主要根据【资本充足、公司治理与合规管理、全面风险管理、信息技术管理、客户权益保护、信息披露】六类评价指标进行评价，体现证券公司对流动性风险、合规风险、市场风险、信用风险、技术风险及操作风险等管理能力。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_36","q":"赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（3）下列关于证券公司独立董事的说法，正确的有（）。","c":{"A":"证券公司的独立董事，不得在本证券公司担任董事会外的职务","B":"证券公司的独立董事，可以在本证券公司担任董事会外的职务","C":"证券公司的独立董事，不得与本证券公司存在可能妨碍其做出独立、客观判断的关系","D":"证券公司的独立董事，可以与本证券公司存在可能妨碍其做出独立、客观判断的关系"},"a":"AC","an":"证券公司的独立董事，不得在本证券公司担任董事会外的职务，不得与本证券公司存在可能妨碍其作出独立、客观判断的关系。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_42","q":"经营机构告知投资者不适合购买相关产品，投资者主动要求购买风险等级高于其风险承受能力的产品时，下列做法正确的是（）。","c":{"A":"拒绝向其销售高于其风险承受能力的产品，但如投资者仍坚持购买的，可向其销售","B":"书面形式进行风险特别提示后，向其销售高于其风险承受能力的产品","C":"对于确认不属于风险承受能力最低级别、以口头进行特别风险警示的，可销售","D":"对于风险承受能力最低级别的投资者，应该拒绝向其销售"},"a":"D","an":"以书面形式进行特别风险警示：如投资者不属于风险承受能力最低类别，经营机构业务人员应当就产品或服务的风险等级高于投资者承受能力的情况进行特别书面风险警示。如投资者仍坚持购买的，可以向其销售相关产品或者提供相关服务。","type":"single"},{"id":"cflue_paper_法律法规_2.json_44","q":"证券公司风险管理部门应当向董事会提交风险管理日报、月报、年报等定期报告。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险管理部门应当向【经理层】提交风险管理日报、月报、年报等定期报告，反映风险识别、评估结果和应对方案，对重大风险应提供专项评估报告，确保经理层及时、充分了解公司风险状况。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_50","q":"根据《证券期货投资者适当性管理办法》，下列关于经营机构销售产品或提供服务的做法不属于禁止性行为的是（）。","c":{"A":"向风险承受能力最低类别的投资者销售产品或者提供服务","B":"向普通投资者主动推介风险等级高于其风险承受能力的产品或者服务","C":"向投资者就不确定事项提供确定性的判断，或者告知投资者有可能使其误认为具有确定性的意见","D":"向普通投资者主动推介不符合其投资目标的产品或者服务"},"a":"A","an":"向风险承受能力最低类别的投资者销售符合其风险承受能力的产品或者提供服务是合法的行为。","type":"single"},{"id":"cflue_paper_法律法规_2.json_59","q":"赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（1）赵某可在（）家证券基金经营机构担任独立董事。","c":{"A":"3","B":"4","C":"2","D":"1"},"a":"C","an":"任何人员最多可以在2家证券公司担任独立董事。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_1","q":"根据《证券公司全面风险管理规范》，属于保障风险管理制度贯彻执行的手段的是稽核、分类监管、绩效考核、检查。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当通过【评估、稽核、检查和绩效考核】等手段保证风险管理制度的贯彻落实。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_8","q":"根据《证券基金经营机构信息技术管理办法》，证券基金经营机构是从事证券基金业务活动的责任主体，应当保障充足的信息技术投入，在依法合规、有效防范风险的前提下，充分利用现代信息技术手段实现（）等功能。","c":{"A":"增强合规风控能力","B":"提升内部管理水平","C":"改进业务运营模式","D":"完善客户服务体系"},"a":"ABCD","an":"证券公司是从事证券基金业务活动的责任主体，应当保障充足的信息技术投入，在依法合规、有效防范风险的前提下，充分利用现代信息技术手段完善客户服务体系、改进业务运营模式、提升内部管理水平、增强合规风控能力，持续强化现代信息技术对证券基金业务活动的支撑作用。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_18","q":"根据《证券公司流动性风险管理指引》，证券公司的融资管理应符合的要求包括（）。","c":{"A":"加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，不定期评估市场融资和资产变现能力","B":"分析正常和压力情景下未来不同时间段的融资需求和来源","C":"密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响","D":"加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额"},"a":"BCD","an":"证券公司的融资管理应符合以下要求：1、分析正常和压力情景下未来不同时间段的融资需求和来源。2、加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置集中度限额。3、加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当活跃程度，【并定期】评估市场融资和资产变现能力。4、密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_33","q":"根据《证券公司流动性风险管理指引》，下列关于流动性风险限额管理的说法，正确的有（）。","c":{"A":"证券公司应结合业务发展实际状况和流动性风险管理情况，制定流动性风险控制指标","B":"证券公司应建立现金流测算和分析框架，有效计量、监测和控制正常和压力情景下未来不同时间段的现金流缺口","C":"证券公司应对流动性风险实施限额管理","D":"证券公司应至少每半年对流动性风险限额进行一次评估，必要时进行调整"},"a":"ABC","an":"证券公司应至少【每年】对流动性风险限额进行一次评估，必要时进行调整。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_56","q":"根据《证券公司投资银行类业务内部控制指引》，下列说法错误的有（）。","c":{"A":"通过委托外部机构对投资银行类业务内部控制有效性进行评估的，证券公司依法应当承担的责任可以免除","B":"对投资银行类项目负有主要管理责任人员的收入递延支付年限原则上不得多于3年","C":"投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10","D":"投资银行内部控制执行效果评估每两年评估1次"},"a":"ABD","an":"对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得【少】于3年。应当根据监管要求、业务发展等情况的需要，建立内部控制执行效果定期评估机制。证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估【每年】不得少于1次。委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查，避免发生利益冲突。证券公司依法应当承担的责任【不因】委托外部机构而免除。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_9","q":"根据《证券期货投资者适当性管理办法》，下列关于普通投资者特别保护的说法，正确的是（）。","c":{"A":"普通投资者在收益保障、风险警示、适当性匹配等方面享有特别保护","B":"普通投资者在信息告知、收益保障、适当性匹配等方面享有特别保护","C":"普通投资者在信息告知、风险警示、收益保障等方面享有特别保护","D":"普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护"},"a":"D","an":"投资者分为普通投资者与专业投资者。普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护。","type":"single"},{"id":"cflue_paper_法律法规_4.json_37","q":"根据《证券公司流动性风险管理指引》，证券公司应加强（）方面的预测分析，合理预见各种可能出现的风险。","c":{"A":"资金运用规模","B":"期限结构变化","C":"主要客户资产负债率","D":"资金来源"},"a":"ABD","an":"预见性原则，是指证券公司应加强资金来源、资金运用规模及期限结构变化方面的预测分析，合理预见各种可能出现的风险，协调公司表内外各项业务发展。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_41","q":"证券公司应当按照法律、行政法规和中国证监会的规定建立完备的盈利评估体系。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当按照法律、行政法规和中国证监会的规定建立完备的【合规管理、风险管理和内部控制体系】，故选B。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_50","q":"赵某为乙证券公司独立董事，工作勤勉尽责、廉洁从业、专业能力强。乙证券公司拟聘请赵某分管公司某业务，丙证券公司、丁基金公司均欲邀请赵某兼职独立董事。根据该案例，回答以下问题：（1）赵某可在（）家证券基金经营机构担任独立董事。","c":{"A":"3","B":"4","C":"2","D":"1"},"a":"C","an":"任何人员最多可以在2家证券公司担任独立董事。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_60","q":"根据《证券公司信用风险管理指引》，下列关于证券公司信用风险业务类型的说法，正确的是（）。","c":{"A":"包括互换、场外期权、远期等场外衍生品业务（不包括信用衍生品）","B":"包括股票投资、约定购回式证券交易、融资融券等融资类业务","C":"包括债券投资交易业务（不包括国债、地方债、金融债、政府支持机构债）","D":"包括非标准化债权资产投资业务"},"a":"D","an":"按照业务类型分类，包括但不限于：【股票质押式回购交易】、约定购回式证券交易、融资融券等融资类业务；互换、场外期权、远期、【信用衍生品】等场外衍生品业务；债券投资交易（包括债券现券交易、债券回购交易、债券远期交易、债券借贷业务等债券相关交易业务），债券包括但不限于【国债】、地方债、金融债、政府支持机构债、企业债、非金融企业债务融资工具、公司债、资产支持证券、同业存单；【非标准化债权资产投资】；其他涉及信用风险的自有资金出资业务。","type":"single"},{"id":"cflue_paper_法律法规_5.json_2","q":"证券经营机构违反《证券期货投资者适当性管理办法》规定的，中国证监会及其派出机构可以对经营机构及其直接负责的主管人员和其他直接责任人员采取监督管理措施，可采取的措施不包括（）。","c":{"A":"监管谈话","B":"责令参加培训","C":"注销执业证书","D":"出具警示函"},"a":"C","an":"经营机构违反《证券期货投资者适当性管理办法》规定的，中国证监会及其派出机构可以对经营机构及其直接负责的主管人员和其他直接责任人员，采取责令改正、监管谈话、出具警示函、责令参加培训等监督管理措施。","type":"single"},{"id":"cflue_paper_法律法规_5.json_27","q":"根据《证券期货投资者适当性管理办法》，下列关于普通投资者特别保护的说法，正确的是（）。","c":{"A":"普通投资者在收益保障、风险警示、适当性匹配等方面享有特别保护","B":"普通投资者在信息告知、收益保障、适当性匹配等方面享有特别保护","C":"普通投资者在信息告知、风险警示、收益保障等方面享有特别保护","D":"普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护"},"a":"D","an":"投资者分为普通投资者与专业投资者。普通投资者在信息告知、风险警示、适当性匹配等方面享有特别保护。","type":"single"},{"id":"cflue_paper_法律法规_5.json_30","q":"证券公司应当将子公司的风险管理纳入统一体系，子公司风险管理工作负责人的任命应由证券公司首席风险官提名，子公司董事会聘任，其解聘应征得（）同意。","c":{"A":"子公司董事长","B":"证券公司首席风险官","C":"证券公司总经理","D":"证券公司董事长"},"a":"B","an":"子公司风险管理工作负责人的任命应由证券公司首席风险官提名、子公司董事会聘任，其解聘应征得【证券公司首席风险官】同意。","type":"single"},{"id":"cflue_paper_法律法规_5.json_39","q":"中国证监会对证券公司实施《证券公司全面风险管理规范》的情况进行自律管理。（）","c":{"A":"错","B":"对"},"a":"A","an":"中国证券业协会对证券公司实施《证券公司全面风险管理规范》的情况进行自律管理，督促证券公司持续完善全面风险管理体系。","type":"judge"},{"id":"cflue_mock_1.json_28","q":"证券公司分类评价中，属于风险管理能力评价指标的有（）。","c":{"A":"司法机关采取的刑事处罚措施","B":"信息披露","C":"客户权益保护","D":"资本充足"},"a":"BCD","an":"风险管理能力主要根据资本充足、公司治理与合规管理、全面风险管理、信息技术管理、客户权益保护、信息披露六类评价指标进行评价，体现证券公司对流动性风险、合规风险、市场风险、信用风险、技术风险及操作风险等管理能力。","type":"multi"},{"id":"cflue_mock_1.json_46","q":"下列不属于证券公司融资渠道的是向客户拆借。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司应建立并完善融资策略，提高融资来源的多元化和稳定程度，建立包括但不限于银行借款、同业拆借、债券、收益凭证、短期融资券、证券回购等灵活的场内及场外融资渠道。","type":"judge"},{"id":"cflue_mock_1.json_88","q":"（）对证券公司实施《证券公司全面风险管理规范》的情况进行自律管理，督促证券公司持续完善全面风险管理体系。","c":{"A":"中国证券业协会","B":"中国人民银行","C":"中国银保监会","D":"中国证监会"},"a":"A","an":"【中国证券业协会】对证券公司实施《证券公司全面风险管理规范》的情况进行自律管理，督促证券公司持续完善全面风险管理体系。","type":"single"},{"id":"cflue_mock_1.json_120","q":"根据《证券期货投资者适当性管理办法》，下列关于落实投资者适当性应遵循的原则，错误的是（）。","c":{"A":"经营机构应对普通投资者和专业投资者实施差别化管理","B":"经营机构应当采取科学管理的方法，设置必要的标准和流程，保证适当性管理的实施","C":"经营机构应当对投资者进行保护性管理，保证投资者收益的可持续性和平稳性","D":"当经营机构及其工作人员的利益与投资者的利益发生冲突时，应当优先保障投资者的合法权益"},"a":"C","an":"应保护投资者的合法权益，无需保护收益的持续性和平稳性。","type":"single"},{"id":"cflue_mock_2.json_15","q":"我国股票市场参与主体日益成熟，投资者群体包括个人投资者、证券投资基金以及其他机构投资者。其中，对股票市场形成长期价值投资的理念具有重要引导作用的是（）。","c":{"A":"证券基金和其他机构投资者","B":"个人投资者","C":"证券投资基金","D":"其他机构投资者"},"a":"C","an":"【证券投资基金】对股票市场形成长期价值投资的理念具有重要引导作用，其他选项不符合题意。","type":"single"},{"id":"cflue_mock_2.json_20","q":"委托信息技术服务机构提供产品或服务的，证券公司依法应当承担的责任可因委托而免除或减轻。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司借助信息技术手段从事证券基金业务活动的，可以委托信息技术服务机构提供产品或服务，【但证券公司依法应当承担的责任不因委托而免除或减轻。】","type":"judge"},{"id":"cflue_mock_2.json_36","q":"下列关于证券公司投资者适当性留痕的说法，正确的是（）。","c":{"A":"通过互联网等非现场方式进行的，由专业投资者通过符合规定的电子方式进行确认","B":"通过营业部网点向专业投资者进行警示的，应当全过程录音录像","C":"通过互联网等非现场方式进行的，由普通投资者通过符合规定的电子方式进行确认","D":"通过营业部网点向普通投资者进行告知的，必须全程录像"},"a":"C","an":"通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像；通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。","type":"single"},{"id":"cflue_mock_2.json_40","q":"下列关于恐怖活动资产冻结工作的说法，正确的是（）。","c":{"A":"证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施","B":"证券公司可以自行解除冻结措施","C":"证券公司应当严格按照公安部发布的恐怖活动组织名单，依法对相关资产进行查封","D":"证券公司只能依据公安机关的相关规定对被采取冻结措施的资产进行管理及处置"},"a":"A","an":"证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的【决定】，依法对相关资产采取冻结措施。证券公司发现恐怖活动组织及恐怖活动人员拥有或者控制的资产，应立即采取冻结措施。证券公司采取冻结措施后，除【中国人民银行及其分支机构、公安机关、国家安全机关】另有要求外，应当及时告知客户，并说明采取冻结措施的依据和理由。境外有关部门以涉及恐怖活动为由，要求证券公司冻结相关资产、提供客户身份信息及交易信息的，证券公司应当告知对方通过外交途径或者司法协助途径提出请求；【不得擅自采取冻结措施】，不得擅自提供客户身份信息及交易信息。","type":"single"},{"id":"cflue_mock_2.json_44","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为（）。","c":{"A":"不低于每五年一次","B":"不低于每一年一次","C":"不低于每半年一次","D":"不低于每三年一次"},"a":"D","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次。","type":"single"},{"id":"cflue_mock_2.json_74","q":"根据《证券公司投资银行类业务内部控制指引》，下列说法错误的有（）。","c":{"A":"通过委托外部机构对投资银行类业务内部控制有效性进行评估的，证券公司依法应当承担的责任可以免除","B":"对投资银行类项目负有主要管理责任人员的收入递延支付年限原则上不得多于3年","C":"投资银行类业务专职内部控制人员数量不得低于投资银行类业务人员总数的1/10","D":"投资银行内部控制执行效果评估每两年评估1次"},"a":"ABD","an":"对投资银行类项目负有主要管理或执行责任人员的收入递延支付年限原则上不得【少】于3年。应当根据监管要求、业务发展等情况的需要，建立内部控制执行效果定期评估机制。证券公司应当自行或委托外部专业机构对投资银行类业务内部控制的有效性进行全面评估。内部控制执行效果评估【每年】不得少于1次。委托外部机构对投资银行类业务内部控制有效性进行评估的，应当对外部机构的独立性和专业性进行审慎调查，避免发生利益冲突。证券公司依法应当承担的责任【不因】委托外部机构而免除。","type":"multi"},{"id":"xs_4782236","q":"根据《证券公司合规管理实施指引》，证券公司总部合规部门中具备3年以上相关领域工作经历的合规管理人员数量不得低于公司总部人数的（）。","c":{"A":"1%","B":"2%","C":"1.5%","D":"0.5%"},"a":"C","an":"","type":"single"},{"id":"xs_4782237","q":"证券公司的董事、高级管理人员应当对证券公司（）合规报告签署确认意见。","c":{"A":"季度","B":"月度","C":"年度","D":"半年度"},"a":"C","an":"","type":"single"},{"id":"xs_4782238","q":"下列关于证券公司违反合规管理规定被采取监管措施的说法中，错误的是（）。","c":{"A":"监管谈话","B":"认定为不适当人选","C":"责令定期报告","D":"责令改正"},"a":"B","an":"","type":"single"},{"id":"xs_4782239","q":"担任首次公开发行股票项目的上市辅导人、保荐机构或主承销商的，在信息公开之日，证券公司应当对项目公司和与其有重大关联的公司或者证券采取以下（）措施。","c":{"A":"信息隔离","B":"信息披露","C":"列入观察名单","D":"列入限制名单"},"a":"D","an":"","type":"single"},{"id":"xs_4782240","q":"下列关于E类证券公司的说法中，错误的是（）。","c":{"A":"被依法采取指定其他机构托管的证券公司","B":"被依法采取行政重组的证券公司","C":"被依法采取责令停业整顿的证券公司","D":"评价计分低于60分但高于0分的证券公司"},"a":"D","an":"","type":"single"},{"id":"xs_4782241","q":"下列关于证券公司合规负责人的说法中，正确的是（）。","c":{"A":"合规负责人可以在证券公司兼任负责经营管理的职务","B":"负责对证券公司经营管理行为的合法合规性进行审查、监督或者检查","C":"由股东会决定聘任，并应当经国务院证券监督管理机构认可","D":"合规负责人不是证券公司高级管理人员"},"a":"B","an":"","type":"single"},{"id":"xs_4782242","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司开展各项业务，应当（）。","c":{"A":"稳健经营、控制规模，坚持股东利益至上原则","B":"规范管理、执行到位，坚持各方利益均衡发展原则","C":"合规经营、勤勉尽责，坚持客户利益至上原则","D":"控制风险、保障经营，坚持公司利益至上原则"},"a":"C","an":"","type":"single"},{"id":"xs_4782243","q":"下列关于证券公司治理的说法中，错误的是（）。","c":{"A":"证券公司章程应当对重大关联交易及其披露和表决程序作出规定","B":"证券公司实际控制人可以直接干预证券公司的经营管理活动","C":"证券公司可以在法规允许的范围内控股其他证券公司","D":"证券公司与其股东应当在业务、机构、资产等方面严格分离"},"a":"B","an":"","type":"single"},{"id":"xs_4782244","q":"下列关于董事与董事会会议决议事项的说法中，错误的是（）。","c":{"A":"所涉及的企业有关联关系的，董事不得对该项决议行使表决权","B":"所涉及的企业有关联关系的，董事不得代理其他董事行使表决权","C":"出席董事会的无关联关系董事人数不足3人的，应将该事项提交上市公司股东大会审议","D":"董事会会议应有2/3的董事出席方可举行"},"a":"D","an":"","type":"single"},{"id":"xs_4782245","q":"关于证券投资顾问业务，下列说法不正确的是（）。","c":{"A":"是证券投资咨询业务的一种基本形式","B":"向客户提供涉及证券及证券相关产品的投资建议服务","C":"直接或间接获取经济利益的经营活动","D":"在报刊上发表证券、期货投资咨询的文章、评论、报告"},"a":"D","an":"","type":"single"},{"id":"xs_4782247","q":"下列行为可能涉嫌构成未公开信息交易罪的是（）。","c":{"A":"某注册会计师利用上市公司财务信息买卖股票","B":"基金经理利用所掌握的基金持仓信息买卖股票且情节严重","C":"上市公司董事泄露该公司重组信息","D":"投资者甲利用非法获取的内幕信息买卖股票"},"a":"B","an":"","type":"single"},{"id":"xs_4782248","q":"证券公司的（）应当对证券公司年度合规报告签署确认意见。","c":{"A":"财务负责人","B":"经营管理的主要负责人","C":"经营管理的主要负责人和财务负责人","D":"董事、高级管理人员"},"a":"D","an":"","type":"single"},{"id":"xs_4782249","q":"下列关于证券公司在合规负责人任期届满前免除其职务的说法中，错误的是（）。","c":{"A":"被中国证监会责令更换","B":"合规负责人本人申请","C":"证券公司认为合规负责人未能勤勉尽责的","D":"证券公司和合规负责人协商一致调整岗位"},"a":"D","an":"","type":"single"},{"id":"comp_41345","q":"关于证券公司合规管理的说法，正确的有（）。","c":{"A":"合规负责人由董事会决定聘任","B":"合规负责人发现违法违规行为应当向公司章程规定的机构报告","C":"合规负责人可以兼任业务部门的负责人","D":"证券公司应当建立合规管理的考核机制"},"a":"ABD","an":"选项C错误。合规负责人不得兼任业务部门的负责人，以确保合规管理的独立性。合规负责人直接向董事会负责，负责对公司经营管理行为的合规性进行监督。","type":"comprehensive","material":"证券公司应当建立有效的公司治理结构、内部控制机制和合规管理体系。根据《证券公司监督管理条例》和相关规定，证券公司应当设立合规负责人，对经营管理行为的合规性进行审查、监督和检查。","sub_type":"multi"},{"id":"comp_81141","q":"根据《证券公司风险控制指标管理办法》，证券公司的风险控制指标体系中，净资本计算需要调整的项目包括（）。","c":{"A":"金融资产的风险调整","B":"或有负债的风险调整","C":"长期资产的流动性折扣","D":"应收款项的风险扣减"},"a":"ABD","an":"净资本是在净资产的基础上对资产等项目进行风险调整后得出的综合性风险控制指标。金融资产的风险调整、或有负债的风险调整、应收款项的风险扣减均属于调整项目。长期资产的流动性折扣与此不同。","type":"comprehensive","material":"证券公司应当建立有效的公司治理结构、内部控制机制和合规管理体系。根据《证券公司监督管理条例》和相关规定，证券公司应当设立合规负责人，对经营管理行为的合规性进行审查、监督和检查。","sub_type":"multi"},{"id":"cflue_zc_fl3a.json_1","q":"证券公司（）合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","c":{"A":"客户普通证券账户","B":"自营证券账户","C":"融券专用证券账户","D":"转融通担保证券明细账户"},"a":"BCD","an":"证券公司通过其自营证券账户、融券专用证券账户和转融通担保证券明细账户合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","type":"multi"},{"id":"cflue_zc_fl3a.json_2","q":"根据《证券公司融资融券业务管理办法》的规定，除（）情形外，任何人不得动用证券公司客户信用交易担保证券账户内的证券和客户信用交易担保资金账户内的资金。","c":{"A":"收取客户应当支付的违约金","B":"收取客户应当支付的利息、费用、税款","C":"收取客户应当归还的资金、证券","D":"为客户进行融资融券交易的结算"},"a":"ABCD","an":"除上述答案外，还有按照该办法的规定以及客户的约定处分担保物；客户提取还本付息、支付税费及违约金后的剩余证券和资金；法律法规和该办法规定的其他情形。","type":"multi"},{"id":"cflue_zc_fl3a.json_3","q":"财务顾问应规范执业行为，提高其执业质量，下列说法中，符合要求的是（）。","c":{"A":"财务顾问应当建立健全内部报告制度，财务顾问主办人对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或授权代表人、财务顾问主办人和项目协办人签名，并加盖上市公司单位公章","B":"结合上市公司披露的定期报告出具持续督导意见，并在前述定期报告披露后的15日内向上市公司所在地的中国证监会派出机构报告","C":"只要进行了充分的内部核查，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺","D":"财务顾问在开始工作时可直接利用其他证券服务机构出具的专业意见，对委托人提供的资料和披露的信息进行独立判断"},"a":"B","an":"财务顾问在开始工作时可利用其他证券服务机构出具的专业意见，但应对其进行必要的审慎核查，对委托人提供的资料和披露的信息进行独立判断。选项A错误。进行了充分的内部核查和尽职调查基础上，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺，选项B错误。选项C应该加盖财务顾问单位公章。","type":"single"},{"id":"cflue_zc_fl3a.json_4","q":"下列关于证券公司的证券交易佣金收费标准的说法，错误的是（）。","c":{"A":"交易佣金实行最高上限向下浮动制度","B":"证券公司向客户收取的佣金无下限限制，可以实行0佣金","C":"证券公司向客户收取的佣金不得高于证券交易金额的3‰","D":"佣金的收费标准因交易品种、交易场所的不同而有所差异"},"a":"B","an":"证券经纪商向客户收取的佣金（包括代收的证券交易监管费和证券交易所手续费等）不得高于证券交易金额的3‰，【也不得低于】代收的证券交易监管费和证券交易所手续费等。","type":"single"},{"id":"cflue_zc_fl3a.json_5","q":"下列不属于对财务顾问及其财务顾问主办人进行持续动态监管，并应计入其诚信档案的事项是（）。","c":{"A":"财务顾问及其财务顾问主办人被中国证监会采取监管措施","B":"在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异","C":"财务顾问采取不正当竞争手段进行恶性竞争","D":"财务顾问主办人与证监会进行专业沟通，并按照证监会提出的反馈意见做出答复"},"a":"D","an":"中国证监会建立监管信息系统，对财务顾问及其财务顾问主办人进行持续动态监管，并将以下事项记入其诚信档案：1、财务顾问及其财务顾问主办人被中国证监会采取监管措施的；2、在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的；3、中国证监会认定的其他事项。","type":"single"},{"id":"cflue_zc_fl3a.json_6","q":"证券公司开展证券经纪业务中，禁止的行为包括（）。","c":{"A":"对客户买卖证券承诺收益或赔偿","B":"拒绝客户全权委托代理其买卖证券","C":"在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽","D":"将客户的资金账户、证券账户提供给他人使用"},"a":"ACD","an":"根据《证券法》，证券公司经纪业务禁止行为包括：对客户买卖证券承诺收益或赔偿（A）；在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽（C）；将客户的资金账户、证券账户提供给他人使用（D）。拒绝客户全权委托（B）是合规行为，不属于禁止行为。","type":"multi"},{"id":"cflue_zc_fl3a.json_7","q":"下列不属于沪港通可交易的证券品种为（）。","c":{"A":"A+H股上市公司的证券交易所上市A股","B":"上证380指数成分股","C":"上证180指数成分股","D":"香港联合交易所上市的A+H股公司股票"},"a":"D","an":"香港联合交易所上市的A+H股公司股票属于深港通，不属于沪港通交易的证券品种。","type":"single"},{"id":"cflue_zc_fl3a.json_8","q":"证券、期货投资咨询机构与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时，应当向地方证管办（中国证监会）备案，备案材料包括版面安排或者节目时间段、项目负责人等。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券、期货投资咨询机构与报刊、电台、电视台合办或者协办证券、期货投资咨询版面、节目或者与电信服务部门进行业务合作时，应当向地方证管办（中国证监会）备案，备案材料包括：合作内容、起止时间、版面安排或者节目时间段、项目负责人等，并加盖双方单位的印鉴。","type":"judge"},{"id":"cflue_zc_fl3a.json_9","q":"对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。（）","c":{"A":"错","B":"对"},"a":"B","an":"对转融通担保证券账户内记录的证券，由【证券金融公司】以自己的名义，行使对证券发行人的权利。","type":"judge"},{"id":"cflue_zc_fl3a.json_10","q":"证券公司、证券投资咨询机构或者其他财务顾问机构担任上市公司独立财务顾问，在持续督导期间解除委托协议的，应当及时履行报告、公告程序。委托人应当在1个月内另行聘请财务顾问对其进行持续督导。（）","c":{"A":"错","B":"对"},"a":"B","an":"委托人应当在1个月内另行聘请财务顾问对其进行持续督导。","type":"judge"},{"id":"cflue_zc_fl3a.json_11","q":"保荐机构持续督导的内容有（）。","c":{"A":"关注发行人为他人提供担保事项，并发表意见","B":"防止大股东和其他关联方违规占用发行人资源","C":"防止公司高管人员利用职务之便损害发行人利益","D":"保障关联交易的公允性和合规性，并对关联交易发表意见"},"a":"ABCD","an":"保荐机构应当针对发行人的具体情况，确定证券发行上市后持续督导的内容，在持续督导期内督导发行人履行有关上市公司规范运作、信守承诺和信息披露等义务，审阅信息披露文件及向中国证监会、证券交易所提交的其他文件，并承担下列工作：（1）督导发行人有效执行并完善防止控股股东、实际控制人、其他关联方违规占用发行人资源的制度；（2）督导发行人有效执行并完善防止其董事、监事、高级管理人员利用职务之便损害发行人利益的内控制度；（3）督导发行人有效执行并完善保障关联交易公允性和合规性的制度，并对关联交易发表意见；（4）持续关注发行人募集资金的专户存储、投资项目的实施等承诺事项；（5）持续关注发行人为他人提供担保等事项，并发表意见。","type":"multi"},{"id":"cflue_zc_fl3a.json_12","q":"融资融券客户融资买入证券时，融资保证金比例的计算公式为（）。","c":{"A":"保证金/（融资买入证券数量×收盘价格）×100%","B":"保证金/（融资买入证券数量×证券市价）×100%","C":"保证金/（融资买入证券数量×卖出价格）×100%","D":"保证金/（融资买入证券数量×买入价格）×100%"},"a":"D","an":"融资保证金比例＝保证金／（融资买入证券数量×买入价格）×100%，故选A。","type":"single"},{"id":"cflue_zc_fl3a.json_13","q":"中国证监会建立监管信息系统，对财务顾问主办人进行持续动态监管，需记入其诚信档案的事项不包括（）。","c":{"A":"在从事业务期间更换财务顾问主办人的","B":"中国证监会认定应当记入的相关事项的","C":"财务顾问主办人被中国证监会采取监管措施的","D":"在持续督导期间，上市公司违反规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的"},"a":"A","an":"中国证监会建立监管信息系统，对财务顾问及其财务顾问主办人进行持续动态监管，并将以下事项记入其诚信档案：1、财务顾问及其财务顾问主办人被中国证监会采取监管措施的。2、在持续督导期间，上市公司或者其他委托人违反公司治理有关规定、相关资产状况及上市公司经营成果等与财务顾问的专业意见出现较大差异的。3、中国证监会认定的其他事项。","type":"single"},{"id":"cflue_zc_fl3a.json_14","q":"下列关于改变公开发行证券募集资金用途及其法律责任的说法，正确的有（）。","c":{"A":"对发行人擅自改变公开发行证券募集资金用途负有直接责任的人员应给予警告，并处罚款","B":"改变公开发行股票所募集资金用途的，应由发行人股东大会作出决议","C":"改变公开发行公司债券筹集资金用途的，应由发行人股东大会作出决议","D":"公开发行公司债券筹集的资金不得用于弥补亏损，但确有结余的部分可以购买对公理财产品"},"a":"AB","an":"公开发行公司债券筹集的资金，必须按照公司债券募集办法所列资金用途使用；改变资金用途，必须经【债券持有人会议】作出决议。B错误；【公开发行公司债券筹集的资金，不得用于弥补亏损和非生产性支出】。C错误。","type":"multi"},{"id":"cflue_zc_fl3a.json_15","q":"下列选项中不正确的是（ ）。","c":{"A":"一般商业银行就可以担任存托人","B":"存托人应与境外基础证券发行人签署存托协议，并根据存托协议约定协助完成存托凭证的发行上市","C":"托管人应当向存托人提供基础证券的市场信息","D":"托管人应当按照托管协议约定，协助办理分红派息、投票"},"a":"A","an":"存托人和托管人应当承担的职责：1、存托人与境外基础证券发行人签署存托协议，并根据存托协议约定协助完成存托凭证的发行上市；2、托管人按照托管协议约定，协助办理分红派息、投票；3、托管人向存托人提供基础证券的市场信息。","type":"single"},{"id":"cflue_zc_fl3a.json_16","q":"在客户交易结算资金第三方存管模式下的客户资金存入过程中，指定商业银行根据客户转账指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金。（）","c":{"A":"错","B":"对"},"a":"B","an":"客户资金存取应当以银证转账方式通过本人银行结算账户进行。【指定商业银行】根据客户指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金，无须证券公司介入，从而防止证券公司假借客户提款挪用资金。","type":"judge"},{"id":"cflue_zc_fl3a.json_17","q":"证券公司以自己名义开立，用于记载客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券账户是客户信用交易担保资金账户。（）","c":{"A":"错","B":"对"},"a":"A","an":"客户信用交易【担保证券】账户是用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。","type":"judge"},{"id":"cflue_zc_fl3a.json_18","q":"与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及到的主要部门规章及规范性文件不包括（）。","c":{"A":"《上市公司并购重组财务顾问业务管理办法》","B":"《证券投资顾问业务暂行规定》","C":"《上市公司重大资产重组管理办法》","D":"《上市公司收购管理办法》"},"a":"B","an":"与证券交易、证券投资活动有关的财务顾问依据的法律法规主要包括《证券法》《上市公司并购重组财务顾问业务管理办法》《上市公司重大资产重组管理办法》和《上市公司收购管理办法》等。","type":"single"},{"id":"cflue_zc_fl3a.json_19","q":"证券投资顾问服务和证券研究报告的区别有（）。","c":{"A":"服务方式","B":"立场不同","C":"服务对象","D":"服务内容"},"a":"ABCD","an":"证券投资顾问服务和发布研究报告本质上是提供证券价值分析意见、证券投资建议。两者均是证券机构服务客户的手段。但两者具有不同的特征，主要体现在：1、立场不同。2、服务方式和内容不同。3、服务对象不同。4、市场影响不同。5、规范重点不同。","type":"multi"},{"id":"cflue_zc_fl3a.json_20","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司开展各项业务，关联交易管理方面，坚决防止关联交易和利益输送。（）","c":{"A":"错","B":"对"},"a":"A","an":"可以进行关联交易，需要完善保障关联交易公允性和合规性的制度。","type":"judge"},{"id":"cflue_zc_fl3a.json_21","q":"下列关于公开发行公司债券的资金用途的说法，不正确的有（）。","c":{"A":"擅自改变公司债券所募资金的用途，不得再次公开发行公司债券","B":"可以用于非生产性支出","C":"必须按照公司债券募集办法所列资金用途使用","D":"不得用于弥补亏损"},"a":"B","an":"公开发行公司债券筹集的资金，必须用于核准的用途，不得用于弥补亏损和非生产性支出。","type":"single"},{"id":"cflue_zc_fl3a.json_22","q":"沪港通下的港股通每日额度由中国证监会控制。（）","c":{"A":"错","B":"对"},"a":"A","an":"沪港通和深港通下的港股通每日额度由沪、深证券交易所分别控制。","type":"judge"},{"id":"cflue_zc_fl3a.json_23","q":"根据《证券、期货投资咨询管理暂行办法》，申请证券、期货投资咨询从业资格的机构，应当具备的条件包括：单独从事证券投资咨询业务的机构，有2名以上符合证券投资咨询从业条件的专职人员。（）","c":{"A":"错","B":"对"},"a":"A","an":"单独从事证券投资咨询业务的机构，有5名以上符合证券投资咨询从业条件的专职人员；同时从事证券投资咨询业务和期货交易咨询业务的机构，有10名以上符合证券投资咨询、期货交易咨询从业条件的专职人员；其高级管理人员中，至少有1名符合规定的证券投资咨询从业条件；有100万元人民币以上的注册资本；有固定的业务场所和与业务相适应的通讯及其他信息传递设施；有公司章程；有健全的内部管理制度；具备中国证监会要求的其他条件。","type":"judge"},{"id":"cflue_zc_fl3a.json_24","q":"证券金融公司开展转融通业务，应当了解证券公司的基本情况、业务范围、财务状况、违约记录等，并以书面和电子的方式予以记录和保存。（）","c":{"A":"错","B":"对"},"a":"B","an":"考查证券金融公司在了解客户及信用评估时需要考察哪些方面，还包括风险控制能力。","type":"judge"},{"id":"cflue_zc_fl3a.json_25","q":"证券经纪商的中介性是指证券经纪商必须严格地按照委托人指定的证券、数量、价格和有效时间买卖证券。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券经纪商发挥着沟通买卖双方和按一定的要求和规则执行指令并代办手续，同时尽量使买卖双方按自己意愿成交的媒介作用，因此具有中介性的特点。","type":"judge"},{"id":"cflue_zc_fl3a.json_26","q":"证券公司的业务执行部门负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构。（）","c":{"A":"错","B":"对"},"a":"A","an":"【业务决策机构】由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率（费率）、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。","type":"judge"},{"id":"cflue_zc_fl3a.json_27","q":"关于“沪伦通”，下列说法不正确的是（）。","c":{"A":"沪伦通是沪伦两地满足一定条件的上市公司到对方市场上市交易存托凭证的模式","B":"沪伦通，即上海证券交易所与伦敦证券交易所互联互通机制，是指符合条件的两地上市公司，依照对方市场的法律法规，发行存托凭证并在对方市场上市交易","C":"沪伦通包括南、北两个业务方向。南向业务，是指伦交所上市公司在上交所挂牌中国存托凭证（Chinese Depositary Receipt），是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券；北向业务，是指上交所A股上市公司在伦交所挂牌全球存托凭证（Global Depositary Receipt）","D":"沪伦通下的全球存托凭证是由存托人签发、以沪市A股为基础在英国发行、代表中国境内基础证券权益的证券"},"a":"C","an":"沪伦通包括东、西两个业务方向。东向业务，是指伦交所上市公司在上交所挂牌中国存托凭证（Chinese Depositary Receipt），是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券；西向业务，是指上交所A股上市公司在伦交所挂牌全球存托凭证（Global Depositary Receipt）。","type":"single"},{"id":"cflue_zc_fl3a.json_28","q":"单只转融通标的证券转融券余额达到该证券上市可流通市值的10%时，暂停该证券的转融券业务，并向市场公布。（）","c":{"A":"错","B":"对"},"a":"B","an":"单只转融通标的证券转融券余额达到该证券上市可流通市值的10%时，暂停该证券的转融券业务，并向市场公布。","type":"judge"},{"id":"cflue_zc_fl3a.json_29","q":"证券投资咨询业务人员分为（）。","c":{"A":"证券咨询师和证券分析师","B":"证券研究员和证券经纪人","C":"证券分析师和证券投资顾问","D":"证券分析师和客户经理"},"a":"C","an":"投资咨询业务人员分为证券分析师和证券投资顾问。","type":"single"},{"id":"cflue_zc_fl3a.json_30","q":"证券公司从事融资融券业务应当遵守的原则不包括（）。","c":{"A":"了解客户原则","B":"集中管理原则","C":"业务隔离原则","D":"同亏同盈原则"},"a":"D","an":"融资融券业务管理的基本原则：1、合法合规性原则；2、集中管理原则；3、业务隔离原则；4、了解客户原则。","type":"single"},{"id":"cflue_zc_fl3a.json_31","q":"按风险起因不同，证券经纪业务的风险主要包括合规风险、管理风险、技术风险、政策风险。（）","c":{"A":"错","B":"对"},"a":"A","an":"经纪业务的风险主要包括合规风险、管理风险和技术风险等。","type":"judge"},{"id":"cflue_zc_fl3a.json_32","q":"证券公司、证券投资咨询机构以软件工具、终端设备等为载体提供建议的，下列说法，不符合要求的是（）。","c":{"A":"表示软件工具、终端设备具有选择证券投资品种或者提示买卖时机功能的，应当说明其方法和局限","B":"客观说明软件工具、终端设备的功能，不得对其功能进行虚假、不实、误导性宣传","C":"揭示软件工具、终端设备的固有缺陷和使用风险，不得隐瞒或者有重大","D":"对软件工具、终端设备所使用的数据信息来源要保密"},"a":"D","an":"应当说明软件工具、终端设备所使用数据的信息来源，选项C错误。","type":"single"},{"id":"cflue_zc_fl3a.json_33","q":"从事证券投资咨询业务的人员，须符合相关执业管理要求，下列情形符合执业管理要求的是（）。","c":{"A":"甲证券投资咨询公司从业人员刘某在中国证券业协会注册登记为证券投资顾问，方可从事投资顾问业务","B":"丁证券公司证券分析师在中国证券业协会申请注册登记为证券投资顾问","C":"乙证券公司证券分析师王某兼职在某证券投资咨询公司执业","D":"丙证券公司证券投资顾问李某在发布的研究报告上署名"},"a":"A","an":"证券投资咨询人员不得同时注册证券分析师和证券投资顾问，通过专项考试并且从业两年后可申请证券投资咨询资格。【证券分析师】应当对其署名的证券研究报告的内容和观点负责。证券分析师不得兼职执业。","type":"single"},{"id":"cflue_zc_fl3a.json_34","q":"沪港通中港股通的股票范围和深港通中港股通的股票范围完全相同。（）","c":{"A":"错","B":"对"},"a":"A","an":"与沪股通标的偏重大型蓝筹股相比，深股通标的充分展现了深交所新兴行业集中、成长特征鲜明的市场特色。","type":"judge"},{"id":"cflue_zc_fl3a.json_35","q":"根据《中国证券业协会自律措施实施办法》，证券业协会对会员实施的自律管理措施包括下发行政措施函。（）","c":{"A":"错","B":"对"},"a":"A","an":"对会员实施的自律管理措施包括：（1）谈话提醒；（2）要求提交书面承诺；（3）要求参加合规教育；（4）警示；（5）责令改正；（6）责令进行合规检查；（7）暂不接受备案或注册；（8）协会规定的其他自律管理措施（协会没有行政处罚的权力，因此不包括下发行政措施函）。","type":"judge"},{"id":"cflue_zc_fl3b.json_1","q":"证券公司受期货公司委托从事中间介绍业务，应当提供协助客户办理开户手续、代理客户进行期货交易、提供期货行情信息、交易设施等服务。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司受期货公司委托从事介绍业务，应当提供下列服务：（1）协助办理开户手续；（2）提供期货行情信息、交易设施；（3）中国证监会规定的其他服务。证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"judge"},{"id":"cflue_zc_fl3b.json_2","q":"中国证监会对违反《证券公司融资融券业务管理办法》的证券公司可采取的监管措施不包括（）。","c":{"A":"暂停部分业务","B":"暂停全部业务","C":"追究刑事责任","D":"撤销业务许可"},"a":"C","an":"证券公司或其分支机构违反《证券公司融资融券业务管理办法》，中国证监会或者其派出机构可采取责令改正、监管谈话、出具警示函、责令公开说明、责令参加培训、责令定期报告、暂不受理与行政许可有关的文件、暂停部分或者全部业务、撤销业务许可等相关监管措施。","type":"single"},{"id":"cflue_zc_fl3b.json_3","q":"私募基金子公司应当于（）结束后10个工作日内编制并向协会报送私募基金业务（）度报告。","c":{"A":"每季；季","B":"每周；周","C":"每年；年","D":"每月；月"},"a":"D","an":"私募基金子公司应当于【每月】结束后10个工作日内编制并向协会报送私募基金业务【月】度报告。","type":"single"},{"id":"cflue_zc_fl3b.json_4","q":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构（）以上的股权或出资，且拥有管理控制权。","c":{"A":"35%","B":"10%","C":"50%","D":"20%"},"a":"A","an":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构【35%以上】的股权或出资，且拥有管理控制权。","type":"single"},{"id":"cflue_zc_fl3b.json_5","q":"下列关于证券公司柜台市场信息披露的相关说法，错误的是（）。","c":{"A":"根据信息性质及私募业务相关规定分类披露，信息披露义务人按照约定向投资者披露的信息包括公开披露信息和向特定对象披露信息","B":"证券公司应当通过本公司网站、机构间私募产品报价与服务系统等信息披露平台，披露私募产品相关信息","C":"涉及证券公司客户隐私的信息、涉及第三方商业秘密的信息均为证券公司不得向公众披露的私募业务信息","D":"证券公司应当制定明确的柜台市场信息披露规则，并由证券公司对柜台市场所披露信息的真实性、准确性、完整性负责"},"a":"D","an":"证券公司应当制定明确的柜台市场信息披露规则，【信息披露义务人】应当对所披露信息的真实性、准确性、完整性负责。","type":"single"},{"id":"cflue_zc_fl3b.json_6","q":"下列关于证券公司代销金融产品的说法，错误的是（）","c":{"A":"证券公司在代销金融产品中需避免利益冲突","B":"从事基金销售业务的人员应当取得基金销售业务资格","C":"证券公司审查确认委托人依法设立并可以发行金融产品后方可接受其委托","D":"证券公司分支机构可以自行代销金融产品"},"a":"D","an":"证券公司应当对代销金融产品活动实行集中统一管理，明确内设部门和分支机构在代销金融产品活动中的职责，防止分支机构擅自代销金融产品。","type":"single"},{"id":"cflue_zc_fl3b.json_7","q":"不具备承销业务资格的证券公司只能以对冲风险为目的，从事金融衍生品交易。（）","c":{"A":"错","B":"对"},"a":"A","an":"具备证券自营业务资格的证券公司可以从事金融衍生产品交易，不具备证券自营业务资格的证券公司只能以对冲风险为目的，从事金融衍生产品交易。","type":"judge"},{"id":"cflue_zc_fl3b.json_8","q":"金融机构将本机构的资产管理产品资金委托给其他机构进行投资的，该受托机构应当（）。","c":{"A":"切实履行主动管理责任、不具备条件的情况下再进行转委托","B":"可以再投资公募证券投资基金以外的资产管理产品","C":"接受金融监督管理部门监管","D":"具有专业投资能力和资质"},"a":"CD","an":"该受托机构应当为具有专业投资能力和资质的受金融监督管理部门监管的机构。受托机构应当切实履行主动管理职责，不得进行转委托，不得再投资公募证券投资基金以外的资产管理产品。","type":"multi"},{"id":"cflue_zc_fl3b.json_9","q":"下列关于专项计划管理人职责的说法，错误的是（）。","c":{"A":"为资产支持证券原始权益人的利益管理专项计划资产","B":"对交易主体和基础资产进行全面尽职调查，聘请具有证券期货业务资格的中介机构出具专业意见","C":"办理资产支持证券发行事宜","D":"履行信息披露义务"},"a":"A","an":"为资产支持【证券投资者】的利益管理专项计划资产。","type":"single"},{"id":"cflue_zc_fl3b.json_10","q":"某证券投资咨询公司开发了一款荐股软件，具有提供具体证券投资品种的买卖时机建议等功能，该公司利用其开展证券投资咨询业务。根据该案例，回答以下问题：（2）证券投资咨询机构开展“荐股软件”销售，应将营销宣传资料报（）备案。","c":{"A":"证券交易所","B":"证监会","C":"住所地证监局和中国证券业协会","D":"住所地证监局"},"a":"C","an":"证券投资咨询机构开展“荐股软件”销售，应将销售（服务）协议格式、营销宣传、产品推介等营销推介材料报【住所地证监局和中国证券业协会】备案。","type":"multi"},{"id":"cflue_zc_fl3b.json_11","q":"下列关于股票质押回购业务资金融出方的说法，错误的是（）。","c":{"A":"证券公司资产管理子公司管理的集合资产管理计划","B":"证券公司管理的集合资产管理计划","C":"证券公司资产管理子公司自有资金","D":"证券公司自有资金"},"a":"C","an":"资金融出方一般为证券公司、证券公司管理的集合资产管理计划或定向资产管理客户、证券公司资产管理子公司管理的集合资产管理计划或定向资产管理客户。","type":"single"},{"id":"cflue_zc_fl3b.json_12","q":"证券公司设立的自营业务投资决策机构是自营业务的最高决策机构，负责确定公司自营业务规模、可承受的风险限额、资产配置策略等。（）","c":{"A":"错","B":"对"},"a":"A","an":"董事会是自营业务的最高决策机构，在严格遵守监管法规中关于自营业务规模等风险控制指标规定基础上，根据公司资产、负债、损益和资本充足等情况确定自营业务规模、可承受的风险限额等，并以董事会决议的形式进行落实，自营业务具体投资运作管理由董事会授权公司投资决策机构决定。","type":"judge"},{"id":"cflue_zc_fl3b.json_13","q":"某证券投资咨询公司开发了一款荐股软件，具有提供具体证券投资品种的买卖时机建议等功能，该公司利用其开展证券投资咨询业务。根据该案例，回答以下问题：（1）以下不符合对这种业务监管要求的是（）。","c":{"A":"通过公司网站公示产品分类、具体功能、产品价格、服务收费标准和收费方式等信息","B":"产品销售等业务环节可以委托所有机构和个人代理","C":"相关业务档案的保存期限自相关协议终止之日起不得少于5年","D":"将“荐股软件”销售（服务）协议格式、营销宣传、产品推介等材料报住所地证监局和中国证券业协会备案"},"a":"B","an":"产品销售、协议签订、服务提供、客户回访、投诉处理等业务环节均应当自行开展，【不得委托未取得证券投资咨询业务资格的机构和个人代理。】","type":"multi"},{"id":"cflue_zc_fl3b.json_14","q":"下列属于质押式报价回购交易异常情况的情形有（）。","c":{"A":"客户资金账户被司法机关强制执行的","B":"证券公司质押专用账户中质押券被司法机关冻结的","C":"标的证券终止上市的","D":"证券公司被暂停报价回购业务权限的"},"a":"ABD","an":"质押式报价回购交易的异常情况一般包括：1、证券公司质押专用账户中质押券或质押现金被司法等机关冻结或强制执行的；2、证券公司被暂停或终止报价回购业务权限的；3、证券公司进入风险处置或破产程序的；4、客户资金账户被司法等机关冻结或强制执行的；5、质押券中的债券到期的。D标的证券暂停上市或终止上市属于约定购回式证券交易的异常情况。","type":"multi"},{"id":"cflue_zc_fl3b.json_15","q":"集合资产管理计划作为融出方的，单一集合资产管理计划接受单只A股股票质押的数量不得超过该股票A股股本的15%。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司作为融出方的，单一证券公司接受单只A股股票质押的数量不得超过该股票A股股本的30%。集合资产管理计划或定向资产管理客户作为融出方的，单一集合资产管理计划或定向资产管理客户接受单只A股股票质押的数量不得超过该股票A股股本的15%。","type":"judge"},{"id":"cflue_zc_fl3b.json_16","q":"在股票质押回购交易中的待购回期间，下列说法正确的有（）。","c":{"A":"由标的证券产生的需支付对价的证券，如老股东配售方式的增发，随标的证券一并质押","B":"标的证券产生的现金红利不予以质押","C":"由标的证券产生的需支付对价的证券，如老股东配售方式的增发，不随标的证券一并质押","D":"标的证券产生的现金红利一并予以质押"},"a":"CD","an":"待购回期间，标的证券产生的无需支付对价的股东权益，如送股、转增股份、现金红利等，一并予以质押，故第A项表述正确；标的证券产生的需支付对价的股东权益，如老股东配售方式的增发、配股等，由融入方自行行使，所取得的证券不随标的证券一并质押，故第D项表述正确。","type":"multi"},{"id":"cflue_zc_fl3b.json_17","q":"下列关于证券资产管理业务基本要求的说法，错误的有（）。","c":{"A":"证券公司从事私募资产管理业务，应当确保业务开展与资本实力、管理能力和风险控制水平相适应","B":"中国证券业协会依据法律、行政法规等规定，对证券公司私募资产管理业务实施行政管理","C":"证券公司从事私募资产管理业务，应当遵循自愿、公平、诚实信用、客户利益至上原则","D":"证券公司从事私募资产管理业务，应当依法经中国基金业协会批准"},"a":"BD","an":"证券公司从事私募资产管理业务，应当依法经中国证监会批准。中国证监会及其派出机构依据法律、行政法规等规定，对证券公司私募资产管理业务实施监督管理。","type":"multi"},{"id":"cflue_zc_fl3b.json_18","q":"涉及规范证券公司资产管理业务的法律、行政法规包括（）。","c":{"A":"《证券期货经营机构私募资产管理业务管理办法》","B":"《中华人民共和国证券法》","C":"《证券公司监督管理条例》","D":"《证券期货经营机构私募资产管理计划运作管理规定》"},"a":"BC","an":"C、D项属于证券公司资产管理业务涉及的主要部门规章及规范性文件。","type":"multi"},{"id":"cflue_zc_fl3b.json_19","q":"证券公司进行柜台交易，向投资者收取履约保证金的，应当在双方约定的金融机构开立专门账户存放，不得违约动用。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司进行柜台交易，向投资者收取履约保证金的，应当在双方约定的金融机构开立【专门账户】存放，不得违约动用。","type":"judge"},{"id":"cflue_zc_fl3b.json_20","q":"私募基金子公司应当加入（），成为其会员，接受其的自律管理。","c":{"A":"中国证券业协会","B":"中国注册会计师协会","C":"深圳证券交易所","D":"上海证券交易所"},"a":"A","an":"私募基金子公司应当加入中国证券业协会，成为协会会员，接受协会的自律管理。","type":"single"},{"id":"cflue_zc_fl3b.json_21","q":"私募基金子公司具有5年以上投资管理或资产管理经验的高级管理人员不得少于（）人；具有2年以上投资管理或资产管理经验的投资管理人员不得少于（）人。","c":{"A":"3；5","B":"3；4","C":"2；3","D":"1；2"},"a":"C","an":"私募基金子公司具有5年以上投资管理或资产管理经验的高级管理人员不得少于2人；具有2年以上投资管理或资产管理经验的投资管理人员不得少于3人。","type":"single"},{"id":"cflue_zc_fl3b.json_22","q":"资产管理业务的基本要求包括（）。","c":{"A":"业务融合","B":"勤勉尽责","C":"充分了解客户","D":"资格审批"},"a":"BCD","an":"资产管理业务的基本要求包括勤勉尽责，充分了解客户，资格审批。","type":"multi"},{"id":"cflue_zc_fl3b.json_23","q":"根据《证券期货经营机构私募资产管理业务管理办法》有关规定，证券公司应当对资产管理计划实行滚动发行、分离定价管理。（）","c":{"A":"错","B":"对"},"a":"A","an":"金融机构对资产管理产品应当实行净值化管理。","type":"judge"},{"id":"cflue_zc_fl3b.json_24","q":"股票期权卖方（）权利金，并应当根据证券交易所、证券登记结算机构的规定缴纳保证金。","c":{"A":"支付","B":"保管","C":"使用","D":"收取"},"a":"D","an":"股票期权买方应当支付权利金。股票期权卖方【收取】权利金，并应当根据证券交易所、证券登记结算机构的规定缴纳保证金。","type":"single"},{"id":"cflue_zc_fl3b.json_25","q":"根据《证券期货经营机构私募资产管理业务管理办法》，违反法律、行政法规和相关规定，情节严重，中国证监会可以对证券公司相关从业人员依法采取市场禁入措施。（）","c":{"A":"错","B":"对"},"a":"B","an":"【证券公司、托管人、销售机构和投资顾问】等服务机构的相关从业人员违反法律、行政法规和相关规定，情节严重的，中国证监会可以依法采取市场禁入措施。","type":"judge"},{"id":"cflue_zc_fl3b.json_26","q":"根据《证券公司另类投资子公司管理规范》，证券公司另类投资子公司开展金融产品投资、股权投资、上市证券投资业务，与母公司自营投资品种重合的，应当明确划分业务界线，防止利益冲突。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当清晰划分证券公司与另类子公司及另类子公司与其他子公司之间的业务范围，避免利益冲突和利益输送。因此，与母公司的自营投资品种不能重合。","type":"judge"},{"id":"cflue_zc_fl3b.json_27","q":"涉及规范全国股转系统业务的主要法律、行政法规不包括（）。","c":{"A":"《资产支持专项计划备案管理办法》","B":"《公司法》","C":"《证券法》","D":"《国务院关于开展优先股试点的指导意见》"},"a":"A","an":"全国股转系统业务的主要法律、行政法规包括《公司法》《证券法》《国务院关于全国中小企业股份转让系统有关问题的决定》《国务院关于开展优先股试点的指导意见》等。","type":"single"},{"id":"cflue_zc_fl3b.json_28","q":"证券公司金融衍生品备案和后续监测管理由中国证监会负责。（）","c":{"A":"错","B":"对"},"a":"A","an":"中证机构间报价系统股份有限公司负责对证券公司金融衍生品备案和后续监测管理。","type":"judge"},{"id":"cflue_zc_fl3b.json_29","q":"资产管理计划运作期间，证券资产管理业务信息披露为投资非标准化资产的资产管理计划至少每月披露一次净值，每年度结束之日起3个月内披露年度报告。（）","c":{"A":"错","B":"对"},"a":"A","an":"资产管理计划运作期间，证券期货经营机构应当按照以下要求向投资者提供相关信息：1、投资标准化资产的资产管理计划至少每周披露一次净值，投资非标准化资产的资产管理计划至少【每季度】披露一次净值。2、开放式资产管理计划净值的披露频率不得低于资产管理计划的开放频率，分级资产管理计划应当披露各类别份额净值。3、每季度结束之日起1个月内披露季度报告，每年度结束之日起【4个月内】披露年度报告。4、发生资产管理合同约定的或者可能影响投资者利益的重大事项时，在事项发生之日起5日内向投资者披露。5、中国证监会规定的其他要求。资产管理计划成立不足3个月或者存续期间不足3个月的，证券公司可以不编制资产管理计划当期的季度报告和年度报告。","type":"judge"},{"id":"cflue_zc_fl3b.json_30","q":"收购人或者收购人的控股股东，利用上市公司收购，损害被收购公司及其股东的合法权益的，应责令改正，给予通报批评；情节严重的，并处以罚款。（）","c":{"A":"错","B":"对"},"a":"A","an":"收购人或者收购人的控股股东，利用上市公司收购，损害被收购公司及其股东的合法权益的，责令改正，给予警告；情节严重的，并处以十万元以上六十万元以下的罚款。给被收购公司及其股东造成损失的，依法承担赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告，并处以三万元以上三十万元以下的罚款。","type":"judge"},{"id":"cflue_zc_fl3b.json_31","q":"根据《证券公司柜台市场管理办法（试行）》，在柜台市场发行、销售与转让的产品不包括（）。","c":{"A":"公司债务融资工具","B":"金融衍生品","C":"信托公司设立并通过证券公司发行、销售与转让的产品","D":"证券公司以公开募集方式设立或者承销的资产管理计划"},"a":"D","an":"在柜台市场发行、销售与转让的产品包括但不限于以下私募产品：（1）证券公司及其子公司以【非公开】募集方式设立或者承销的资产管理计划、公司债务融资工具等产品；（2）银行、保险公司、信托公司等其他机构设立并通过证券公司发行、销售与转让的产品；（3）金融衍生品及中国证监会、中国证券业协会认可的产品。","type":"single"},{"id":"cflue_zc_fl3b.json_32","q":"下列关于全国中小企业股份转让系统的说法中有误的是（）。","c":{"A":"是经国务院批准成立的","B":"2012年9月正式注册成立","C":"全国中小企业股份转让系统有限责任公司为其运营机构","D":"是依据《证券法》设立的继上海证券交易所之后的第二家全国性证券交易场所"},"a":"D","an":"全国中小企业股份转让系统是依据《证券法》设立的继上海证券交易所、深圳证券交易所之后的第三家全国性证券交易场所。","type":"single"},{"id":"cflue_zc_fl3b.json_33","q":"证券公司开展柜台交易业务中，需要向投资者收取履约保证金的，保证金应存入在证券公司与投资者双方约定的金融机构开立的专门账户。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司与投资者约定抵押、质押等财产担保的，应当依法办理担保设定手续；向投资者收取履约保证金的，应当在双方约定的金融机构开立专门账户存放，不得违约动用。","type":"judge"},{"id":"cflue_zc_fl3b.json_34","q":"根据《证券公司私募投资基金子公司管理规范》，私募基金子公司及其下设特殊目的机构以现金管理为目的的管理闲置资金，可以投资的证券包括（）。","c":{"A":"股票","B":"央行票据","C":"期权","D":"投资级公司债"},"a":"BD","an":"私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保持流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。","type":"multi"},{"id":"cflue_zc_fl3b.json_35","q":"根据行业协会相关规则规定，以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单范畴，但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。（）","c":{"A":"错","B":"对"},"a":"B","an":"以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单。但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_3","q":"证券公司以自己名义开立，用于记载客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券账户是客户信用交易担保资金账户。（）","c":{"A":"错","B":"对"},"a":"A","an":"客户信用交易【担保证券】账户是用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_12","q":"根据《证券公司融资融券业务管理办法》的规定，除（）情形外，任何人不得动用证券公司客户信用交易担保证券账户内的证券和客户信用交易担保资金账户内的资金。","c":{"A":"收取客户应当支付的违约金","B":"收取客户应当支付的利息、费用、税款","C":"收取客户应当归还的资金、证券","D":"为客户进行融资融券交易的结算"},"a":"ABCD","an":"除上述答案外，还有按照该办法的规定以及客户的约定处分担保物；客户提取还本付息、支付税费及违约金后的剩余证券和资金；法律法规和该办法规定的其他情形。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_13","q":"证券公司或其分支机构违反《证券公司融资融券业务管理办法》，下列关于中国证监会或其派出机构可采取的措施，正确的有（）。","c":{"A":"判处罚金","B":"责令公开说明","C":"监管谈话","D":"出具警示函"},"a":"BCD","an":"证券公司或其分支机构违反《证券公司融资融券业务管理办法》，中国证监会或者其派出机构可采取责令改正、监管谈话、出具警示函、责令公开说明、责令参加培训、责令定期报告、暂不受理与行政许可有关的文件、暂停部分或者全部业务、撤销业务许可等相关监管措施。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_18","q":"私募基金子公司应当加入（），成为其会员，接受其的自律管理。","c":{"A":"中国证券业协会","B":"中国注册会计师协会","C":"深圳证券交易所","D":"上海证券交易所"},"a":"A","an":"私募基金子公司应当加入中国证券业协会，成为协会会员，接受协会的自律管理。","type":"single"},{"id":"cflue_paper_法律法规_1.json_28","q":"财务顾问应规范执业行为，提高其执业质量，下列说法中，符合要求的是（）。","c":{"A":"财务顾问应当建立健全内部报告制度，财务顾问主办人对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或授权代表人、财务顾问主办人和项目协办人签名，并加盖上市公司单位公章","B":"结合上市公司披露的定期报告出具持续督导意见，并在前述定期报告披露后的15日内向上市公司所在地的中国证监会派出机构报告","C":"只要进行了充分的内部核查，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺","D":"财务顾问在开始工作时可直接利用其他证券服务机构出具的专业意见，对委托人提供的资料和披露的信息进行独立判断"},"a":"B","an":"财务顾问在开始工作时可利用其他证券服务机构出具的专业意见，但应对其进行必要的审慎核查，对委托人提供的资料和披露的信息进行独立判断。选项A错误。进行了充分的内部核查和尽职调查基础上，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺，选项B错误。选项C应该加盖财务顾问单位公章。","type":"single"},{"id":"cflue_paper_法律法规_1.json_30","q":"下列关于公开发行公司债券的资金用途的说法，不正确的有（）。","c":{"A":"擅自改变公司债券所募资金的用途，不得再次公开发行公司债券","B":"可以用于非生产性支出","C":"必须按照公司债券募集办法所列资金用途使用","D":"不得用于弥补亏损"},"a":"B","an":"公开发行公司债券筹集的资金，必须用于核准的用途，不得用于弥补亏损和非生产性支出。","type":"single"},{"id":"cflue_paper_法律法规_1.json_32","q":"证券公司、证券投资咨询机构或者其他财务顾问机构担任上市公司独立财务顾问，在持续督导期间解除委托协议的，应当及时履行报告、公告程序。委托人应当在1个月内另行聘请财务顾问对其进行持续督导。（）","c":{"A":"错","B":"对"},"a":"B","an":"委托人应当在1个月内另行聘请财务顾问对其进行持续督导。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_34","q":"在客户交易结算资金第三方存管模式下的客户资金存入过程中，指定商业银行根据客户转账指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金。（）","c":{"A":"错","B":"对"},"a":"B","an":"客户资金存取应当以银证转账方式通过本人银行结算账户进行。【指定商业银行】根据客户指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金，无须证券公司介入，从而防止证券公司假借客户提款挪用资金。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_47","q":"沪港通中港股通的股票范围和深港通中港股通的股票范围完全相同。（）","c":{"A":"错","B":"对"},"a":"A","an":"与沪股通标的偏重大型蓝筹股相比，深股通标的充分展现了深交所新兴行业集中、成长特征鲜明的市场特色。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_49","q":"集合资产管理计划作为融出方的，单一集合资产管理计划接受单只A股股票质押的数量不得超过该股票A股股本的15%。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司作为融出方的，单一证券公司接受单只A股股票质押的数量不得超过该股票A股股本的30%。集合资产管理计划或定向资产管理客户作为融出方的，单一集合资产管理计划或定向资产管理客户接受单只A股股票质押的数量不得超过该股票A股股本的15%。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_3","q":"涉及规范全国股转系统业务的主要法律、行政法规不包括（）。","c":{"A":"《资产支持专项计划备案管理办法》","B":"《公司法》","C":"《证券法》","D":"《国务院关于开展优先股试点的指导意见》"},"a":"A","an":"全国股转系统业务的主要法律、行政法规包括《公司法》《证券法》《国务院关于全国中小企业股份转让系统有关问题的决定》《国务院关于开展优先股试点的指导意见》等。","type":"single"},{"id":"cflue_paper_法律法规_2.json_8","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司开展各项业务，关联交易管理方面，坚决防止关联交易和利益输送。（）","c":{"A":"错","B":"对"},"a":"A","an":"可以进行关联交易，需要完善保障关联交易公允性和合规性的制度。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_12","q":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构（）以上的股权或出资，且拥有管理控制权。","c":{"A":"35%","B":"10%","C":"50%","D":"20%"},"a":"A","an":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构【35%以上】的股权或出资，且拥有管理控制权。","type":"single"},{"id":"cflue_paper_法律法规_2.json_16","q":"根据《证券公司金融衍生品备案指引（试行）》，金融衍生品存续期间发生的重大事件包括（）。","c":{"A":"一方拒不履行约定义务或丧失履行能力的","B":"证券公司或交易对手方破产的","C":"金融衍生品交易系统出现重大技术故障，导致交易暂停超过1个工作日的","D":"履约保证金或履约保障品价值低于预警阈值且未能在1个工作日内补足的"},"a":"ABC","an":"重大事件包括但不限于以下情况：证券公司或交易对手方破产的；证券公司被取消金融衍生品交易业务资格的；一方拒不履行约定义务或丧失履行能力的；履约保证金或履约保障品价值低于预警阈值且未能在【2个】工作日内补足的；标的产品集中度、波动率达到预警阈值，或者标的产品因违反法律法规被相关监管机构采取暂停、终止上市等重大措施的；金融衍生品交易系统出现重大技术故障，导致交易暂停超过1个工作日的；其他影响金融衍生品交易的重大情况。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_18","q":"证券经纪商的中介性是指证券经纪商必须严格地按照委托人指定的证券、数量、价格和有效时间买卖证券。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券经纪商发挥着沟通买卖双方和按一定的要求和规则执行指令并代办手续，同时尽量使买卖双方按自己意愿成交的媒介作用，因此具有中介性的特点。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_35","q":"某证券投资咨询公司开发了一款荐股软件，具有提供具体证券投资品种的买卖时机建议等功能，该公司利用其开展证券投资咨询业务。根据该案例，回答以下问题：（1）以下不符合对这种业务监管要求的是（）。","c":{"A":"通过公司网站公示产品分类、具体功能、产品价格、服务收费标准和收费方式等信息","B":"产品销售等业务环节可以委托所有机构和个人代理","C":"相关业务档案的保存期限自相关协议终止之日起不得少于5年","D":"将“荐股软件”销售（服务）协议格式、营销宣传、产品推介等材料报住所地证监局和中国证券业协会备案"},"a":"B","an":"产品销售、协议签订、服务提供、客户回访、投诉处理等业务环节均应当自行开展，【不得委托未取得证券投资咨询业务资格的机构和个人代理。】","type":"multi"},{"id":"cflue_paper_法律法规_2.json_38","q":"中国证监会对违反《证券公司融资融券业务管理办法》的证券公司可采取的监管措施不包括（）。","c":{"A":"暂停部分业务","B":"暂停全部业务","C":"追究刑事责任","D":"撤销业务许可"},"a":"C","an":"证券公司或其分支机构违反《证券公司融资融券业务管理办法》，中国证监会或者其派出机构可采取责令改正、监管谈话、出具警示函、责令公开说明、责令参加培训、责令定期报告、暂不受理与行政许可有关的文件、暂停部分或者全部业务、撤销业务许可等相关监管措施。","type":"single"},{"id":"cflue_paper_法律法规_2.json_49","q":"证券公司从事融资融券业务应当遵守的原则不包括（）。","c":{"A":"了解客户原则","B":"集中管理原则","C":"业务隔离原则","D":"同亏同盈原则"},"a":"D","an":"融资融券业务管理的基本原则：1、合法合规性原则；2、集中管理原则；3、业务隔离原则；4、了解客户原则。","type":"single"},{"id":"cflue_paper_法律法规_3.json_3","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构的人员从事证券投资顾问业务时，应当做到（）。","c":{"A":"优先维护公司利益，特殊情形下可以牺牲客户利益","B":"忠实客户利益，切实维护客户合法权益","C":"遵守法律、行政法规的规定","D":"遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务"},"a":"BCD","an":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害客户利益；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_4","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司开展各项业务，关联交易管理方面，坚决防止关联交易和利益输送。（）","c":{"A":"错","B":"对"},"a":"A","an":"可以进行关联交易，需要完善保障关联交易公允性和合规性的制度。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_11","q":"与证券交易、证券投资活动有关的上市公司收购以及上市公司重大资产重组财务顾问业务涉及到的主要部门规章及规范性文件不包括（）。","c":{"A":"《上市公司并购重组财务顾问业务管理办法》","B":"《证券投资顾问业务暂行规定》","C":"《上市公司重大资产重组管理办法》","D":"《上市公司收购管理办法》"},"a":"B","an":"与证券交易、证券投资活动有关的财务顾问依据的法律法规主要包括《证券法》《上市公司并购重组财务顾问业务管理办法》《上市公司重大资产重组管理办法》和《上市公司收购管理办法》等。","type":"single"},{"id":"cflue_paper_法律法规_3.json_13","q":"根据行业协会相关规则规定，以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单范畴，但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。（）","c":{"A":"错","B":"对"},"a":"B","an":"以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单。但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_20","q":"根据《中国证券业协会自律措施实施办法》，证券业协会对会员实施的自律管理措施包括下发行政措施函。（）","c":{"A":"错","B":"对"},"a":"A","an":"对会员实施的自律管理措施包括：（1）谈话提醒；（2）要求提交书面承诺；（3）要求参加合规教育；（4）警示；（5）责令改正；（6）责令进行合规检查；（7）暂不接受备案或注册；（8）协会规定的其他自律管理措施（协会没有行政处罚的权力，因此不包括下发行政措施函）。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_22","q":"下列关于证券公司代销金融产品的说法，错误的是（）","c":{"A":"证券公司在代销金融产品中需避免利益冲突","B":"从事基金销售业务的人员应当取得基金销售业务资格","C":"证券公司审查确认委托人依法设立并可以发行金融产品后方可接受其委托","D":"证券公司分支机构可以自行代销金融产品"},"a":"D","an":"证券公司应当对代销金融产品活动实行集中统一管理，明确内设部门和分支机构在代销金融产品活动中的职责，防止分支机构擅自代销金融产品。","type":"single"},{"id":"cflue_paper_法律法规_3.json_37","q":"金融机构将本机构的资产管理产品资金委托给其他机构进行投资的，该受托机构应当（）。","c":{"A":"切实履行主动管理责任、不具备条件的情况下再进行转委托","B":"可以再投资公募证券投资基金以外的资产管理产品","C":"接受金融监督管理部门监管","D":"具有专业投资能力和资质"},"a":"CD","an":"该受托机构应当为具有专业投资能力和资质的受金融监督管理部门监管的机构。受托机构应当切实履行主动管理职责，不得进行转委托，不得再投资公募证券投资基金以外的资产管理产品。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_40","q":"涉及规范全国股转系统业务的主要法律、行政法规不包括（）。","c":{"A":"《资产支持专项计划备案管理办法》","B":"《公司法》","C":"《证券法》","D":"《国务院关于开展优先股试点的指导意见》"},"a":"A","an":"全国股转系统业务的主要法律、行政法规包括《公司法》《证券法》《国务院关于全国中小企业股份转让系统有关问题的决定》《国务院关于开展优先股试点的指导意见》等。","type":"single"},{"id":"cflue_paper_法律法规_3.json_43","q":"根据《证券公司金融衍生品备案指引（试行）》，金融衍生品存续期间发生的重大事件包括（）。","c":{"A":"一方拒不履行约定义务或丧失履行能力的","B":"证券公司或交易对手方破产的","C":"金融衍生品交易系统出现重大技术故障，导致交易暂停超过1个工作日的","D":"履约保证金或履约保障品价值低于预警阈值且未能在1个工作日内补足的"},"a":"ABC","an":"重大事件包括但不限于以下情况：证券公司或交易对手方破产的；证券公司被取消金融衍生品交易业务资格的；一方拒不履行约定义务或丧失履行能力的；履约保证金或履约保障品价值低于预警阈值且未能在【2个】工作日内补足的；标的产品集中度、波动率达到预警阈值，或者标的产品因违反法律法规被相关监管机构采取暂停、终止上市等重大措施的；金融衍生品交易系统出现重大技术故障，导致交易暂停超过1个工作日的；其他影响金融衍生品交易的重大情况。","type":"multi"},{"id":"cflue_paper_法律法规_3.json_50","q":"证券经纪商的中介性是指证券经纪商必须严格地按照委托人指定的证券、数量、价格和有效时间买卖证券。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券经纪商发挥着沟通买卖双方和按一定的要求和规则执行指令并代办手续，同时尽量使买卖双方按自己意愿成交的媒介作用，因此具有中介性的特点。","type":"judge"},{"id":"cflue_paper_法律法规_3.json_59","q":"证券公司开展证券经纪业务中，禁止的行为包括（）。","c":{"A":"对客户买卖证券承诺收益或赔偿","B":"拒绝客户全权委托代理其买卖证券","C":"在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽","D":"将客户的资金账户、证券账户提供给他人使用"},"a":"ACD","an":"根据《证券法》，证券公司经纪业务禁止行为包括：对客户买卖证券承诺收益或赔偿（A）；在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽（C）；将客户的资金账户、证券账户提供给他人使用（D）。拒绝客户全权委托（B）是合规行为，不属于禁止行为。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_6","q":"财务顾问应规范执业行为，提高其执业质量，下列说法中，符合要求的是（）。","c":{"A":"财务顾问应当建立健全内部报告制度，财务顾问主办人对中国证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由财务顾问的法定代表人或授权代表人、财务顾问主办人和项目协办人签名，并加盖上市公司单位公章","B":"结合上市公司披露的定期报告出具持续督导意见，并在前述定期报告披露后的15日内向上市公司所在地的中国证监会派出机构报告","C":"只要进行了充分的内部核查，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺","D":"财务顾问在开始工作时可直接利用其他证券服务机构出具的专业意见，对委托人提供的资料和披露的信息进行独立判断"},"a":"B","an":"财务顾问在开始工作时可利用其他证券服务机构出具的专业意见，但应对其进行必要的审慎核查，对委托人提供的资料和披露的信息进行独立判断。选项A错误。进行了充分的内部核查和尽职调查基础上，财务顾问就可以按照中国证监会的相关规定，对并购重组事项出具财务顾问专业意见，并作出相关承诺，选项B错误。选项C应该加盖财务顾问单位公章。","type":"single"},{"id":"cflue_paper_法律法规_4.json_8","q":"下列关于证券公司代销金融产品的说法，错误的是（）","c":{"A":"证券公司在代销金融产品中需避免利益冲突","B":"从事基金销售业务的人员应当取得基金销售业务资格","C":"证券公司审查确认委托人依法设立并可以发行金融产品后方可接受其委托","D":"证券公司分支机构可以自行代销金融产品"},"a":"D","an":"证券公司应当对代销金融产品活动实行集中统一管理，明确内设部门和分支机构在代销金融产品活动中的职责，防止分支机构擅自代销金融产品。","type":"single"},{"id":"cflue_paper_法律法规_4.json_10","q":"沪港通下的港股通每日额度由中国证监会控制。（）","c":{"A":"错","B":"对"},"a":"A","an":"沪港通和深港通下的港股通每日额度由沪、深证券交易所分别控制。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_21","q":"私募基金子公司应当加入（），成为其会员，接受其的自律管理。","c":{"A":"中国证券业协会","B":"中国注册会计师协会","C":"深圳证券交易所","D":"上海证券交易所"},"a":"A","an":"私募基金子公司应当加入中国证券业协会，成为协会会员，接受协会的自律管理。","type":"single"},{"id":"cflue_paper_法律法规_4.json_23","q":"证券公司进行柜台交易，应当与特定交易对手方或投资者签订柜台交易合同，约定双方的权利义务。不能采用（）的方式签订交易合同。","c":{"A":"电子","B":"书面","C":"口头","D":"邮件"},"a":"C","an":"证券公司进行柜台交易，应当与特定交易对手方或投资者以【书面或电子（邮件）方式】签订柜台交易合同，约定双方的权利义务。","type":"single"},{"id":"cflue_paper_法律法规_4.json_36","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构的人员从事证券投资顾问业务时，应当做到（）。","c":{"A":"优先维护公司利益，特殊情形下可以牺牲客户利益","B":"忠实客户利益，切实维护客户合法权益","C":"遵守法律、行政法规的规定","D":"遵循诚实信用原则，勤勉、审慎地为客户提供证券投资顾问服务"},"a":"BCD","an":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害客户利益；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_45","q":"下列关于全国中小企业股份转让系统的说法中有误的是（）。","c":{"A":"是经国务院批准成立的","B":"2012年9月正式注册成立","C":"全国中小企业股份转让系统有限责任公司为其运营机构","D":"是依据《证券法》设立的继上海证券交易所之后的第二家全国性证券交易场所"},"a":"D","an":"全国中小企业股份转让系统是依据《证券法》设立的继上海证券交易所、深圳证券交易所之后的第三家全国性证券交易场所。","type":"single"},{"id":"cflue_paper_法律法规_4.json_51","q":"中国证监会、国务院其他主管部门等其他省部级以上单位作出的表彰、奖励应当记入中国证监会建立的全国统一的证券期货市场诚信档案数据库。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_53","q":"证券公司（）合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","c":{"A":"客户普通证券账户","B":"自营证券账户","C":"融券专用证券账户","D":"转融通担保证券明细账户"},"a":"BCD","an":"证券公司通过其自营证券账户、融券专用证券账户和转融通担保证券明细账户合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","type":"multi"},{"id":"cflue_paper_法律法规_4.json_57","q":"证券公司以自己名义开立，用于记载客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券账户是客户信用交易担保资金账户。（）","c":{"A":"错","B":"对"},"a":"A","an":"客户信用交易【担保证券】账户是用于记录客户委托证券公司持有、担保证券公司因向客户融资融券所生债权的证券。","type":"judge"},{"id":"cflue_paper_法律法规_4.json_59","q":"集合资产管理计划作为融出方的，单一集合资产管理计划接受单只A股股票质押的数量不得超过该股票A股股本的15%。（）","c":{"A":"错","B":"对"},"a":"B","an":"证券公司作为融出方的，单一证券公司接受单只A股股票质押的数量不得超过该股票A股股本的30%。集合资产管理计划或定向资产管理客户作为融出方的，单一集合资产管理计划或定向资产管理客户接受单只A股股票质押的数量不得超过该股票A股股本的15%。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_4","q":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构（）以上的股权或出资，且拥有管理控制权。","c":{"A":"35%","B":"10%","C":"50%","D":"20%"},"a":"A","an":"私募基金子公司根据税收、政策、监管、合作方需求等需要下设基金管理机构等特殊目的机构的，应当持有该机构【35%以上】的股权或出资，且拥有管理控制权。","type":"single"},{"id":"cflue_paper_法律法规_5.json_20","q":"下列关于专项计划管理人职责的说法，错误的是（）。","c":{"A":"为资产支持证券原始权益人的利益管理专项计划资产","B":"对交易主体和基础资产进行全面尽职调查，聘请具有证券期货业务资格的中介机构出具专业意见","C":"办理资产支持证券发行事宜","D":"履行信息披露义务"},"a":"A","an":"为资产支持【证券投资者】的利益管理专项计划资产。","type":"single"},{"id":"cflue_paper_法律法规_5.json_26","q":"证券公司（）合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","c":{"A":"客户普通证券账户","B":"自营证券账户","C":"融券专用证券账户","D":"转融通担保证券明细账户"},"a":"BCD","an":"证券公司通过其自营证券账户、融券专用证券账户和转融通担保证券明细账户合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。","type":"multi"},{"id":"cflue_paper_法律法规_5.json_43","q":"按照《证券发行市场保荐业务管理办法》的规定，保荐机构、保荐业务负责人或者内核负责人在1个自然年度内被采取监管措施累计（）次以上，中国证监会可暂停保荐机构的保荐机构资格3个月，责令保荐机构更换保荐业务负责人、内核负责人。","c":{"A":"6","B":"3","C":"4","D":"5"},"a":"D","an":"保荐机构、保荐业务负责人、内核负责人或者保荐业务部门负责人在1个自然年度内被采取《办法》第六十五条规定的监管措施累计5次以上，中国证监会可以暂停保荐机构的保荐业务资格3个月，责令保荐机构更换保荐业务负责人、内核负责人或者保荐业务部门负责人。","type":"single"},{"id":"cflue_paper_法律法规_5.json_47","q":"沪港通中港股通的股票范围和深港通中港股通的股票范围完全相同。（）","c":{"A":"错","B":"对"},"a":"A","an":"与沪股通标的偏重大型蓝筹股相比，深股通标的充分展现了深交所新兴行业集中、成长特征鲜明的市场特色。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_48","q":"中国证监会、国务院其他主管部门等其他省部级以上单位作出的表彰、奖励应当记入中国证监会建立的全国统一的证券期货市场诚信档案数据库。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_法律法规_5.json_50","q":"私募基金子公司应当加入（），成为其会员，接受其的自律管理。","c":{"A":"中国证券业协会","B":"中国注册会计师协会","C":"深圳证券交易所","D":"上海证券交易所"},"a":"A","an":"私募基金子公司应当加入中国证券业协会，成为协会会员，接受协会的自律管理。","type":"single"},{"id":"cflue_paper_法律法规_5.json_53","q":"证券公司开展证券经纪业务中，禁止的行为包括（）。","c":{"A":"对客户买卖证券承诺收益或赔偿","B":"拒绝客户全权委托代理其买卖证券","C":"在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽","D":"将客户的资金账户、证券账户提供给他人使用"},"a":"ACD","an":"根据《证券法》，证券公司经纪业务禁止行为包括：对客户买卖证券承诺收益或赔偿（A）；在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽（C）；将客户的资金账户、证券账户提供给他人使用（D）。拒绝客户全权委托（B）是合规行为，不属于禁止行为。","type":"multi"},{"id":"cflue_paper_法律法规_5.json_59","q":"下列不属于沪港通可交易的证券品种为（）。","c":{"A":"A+H股上市公司的证券交易所上市A股","B":"上证380指数成分股","C":"上证180指数成分股","D":"香港联合交易所上市的A+H股公司股票"},"a":"D","an":"香港联合交易所上市的A+H股公司股票属于深港通，不属于沪港通交易的证券品种。","type":"single"},{"id":"cflue_mock_1.json_3","q":"根据《上海证券交易所科创板股票交易特别规定》，下列关于投资者开通科创板股票交易权限应符合条件的说法，错误的有（）。","c":{"A":"个人投资者申请开通科创板权限，需要参与证券交易24个月以上","B":"个人投资者申请科创板权限开通前20个交易日证券账户及资金账户内的资产日均不低于人民币30万元（不包含该投资者通过融资融券融入的资金和证券）","C":"机构投资者不能参与科创板股票交易","D":"机构投资者参与科创板股票交易，应当符合法律法规及上海交易所业务规则的规定"},"a":"BC","an":"个人投资者开通科创板股票交易权限的，应当符合下列条件：（1）申请权限开通前20个交易日证券账户及资金账户内的资产日均不低于人民币【50万元】（不包括该投资者通过融资融券融入的资金和证券）；（2）参与证券交易24个月以上；（3）上海证券交易所规定的其他条件。机构投资者参与科创板股票交易，应当符合法律法规及上海证券交易所业务规则的规定。","type":"multi"},{"id":"cflue_mock_1.json_14","q":"证券公司的业务执行部门负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构。（）","c":{"A":"错","B":"对"},"a":"A","an":"【业务决策机构】由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率（费率）、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。","type":"judge"},{"id":"cflue_mock_1.json_20","q":"根据行业协会相关规则规定，以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单范畴，但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。（）","c":{"A":"错","B":"对"},"a":"B","an":"以地方政府为直接或间接债务人的基础资产，属于资产证券化基础资产负面清单。但地方政府按照事先公开的收益约定规则，在政府与社会资本合作模式（PPP）下应当支付或承担的财政补贴除外。","type":"judge"},{"id":"cflue_mock_1.json_24","q":"中国证监会、国务院其他主管部门等其他省部级以上单位作出的表彰、奖励应当记入中国证监会建立的全国统一的证券期货市场诚信档案数据库。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_mock_1.json_34","q":"证券公司开展证券经纪业务中，禁止的行为包括（）。","c":{"A":"对客户买卖证券承诺收益或赔偿","B":"拒绝客户全权委托代理其买卖证券","C":"在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽","D":"将客户的资金账户、证券账户提供给他人使用"},"a":"ACD","an":"根据《证券法》，证券公司经纪业务禁止行为包括：对客户买卖证券承诺收益或赔偿（A）；在经纪业务营销活动中委托不具有受托资格的单位进行客户招揽（C）；将客户的资金账户、证券账户提供给他人使用（D）。拒绝客户全权委托（B）是合规行为，不属于禁止行为。","type":"multi"},{"id":"cflue_mock_1.json_38","q":"根据《证券公司另类投资子公司管理规范》，证券公司另类投资子公司开展金融产品投资、股权投资、上市证券投资业务，与母公司自营投资品种重合的，应当明确划分业务界线，防止利益冲突。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司应当清晰划分证券公司与另类子公司及另类子公司与其他子公司之间的业务范围，避免利益冲突和利益输送。因此，与母公司的自营投资品种不能重合。","type":"judge"},{"id":"cflue_mock_1.json_40","q":"下列关于证券公司代销金融产品的说法，错误的是（）","c":{"A":"证券公司在代销金融产品中需避免利益冲突","B":"从事基金销售业务的人员应当取得基金销售业务资格","C":"证券公司审查确认委托人依法设立并可以发行金融产品后方可接受其委托","D":"证券公司分支机构可以自行代销金融产品"},"a":"D","an":"证券公司应当对代销金融产品活动实行集中统一管理，明确内设部门和分支机构在代销金融产品活动中的职责，防止分支机构擅自代销金融产品。","type":"single"},{"id":"cflue_mock_1.json_52","q":"证券经纪商的中介性是指证券经纪商必须严格地按照委托人指定的证券、数量、价格和有效时间买卖证券。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券经纪商发挥着沟通买卖双方和按一定的要求和规则执行指令并代办手续，同时尽量使买卖双方按自己意愿成交的媒介作用，因此具有中介性的特点。","type":"judge"},{"id":"cflue_mock_1.json_62","q":"单只转融通标的证券转融券余额达到该证券上市可流通市值的10%时，暂停该证券的转融券业务，并向市场公布。（）","c":{"A":"错","B":"对"},"a":"B","an":"单只转融通标的证券转融券余额达到该证券上市可流通市值的10%时，暂停该证券的转融券业务，并向市场公布。","type":"judge"},{"id":"cflue_mock_1.json_87","q":"按照《证券公司融资融券业务管理办法》的规定，关于证券公司申请融资融券业务资格，应当具备的条件，下列说法正确的是（）。","c":{"A":"已建立符合监管规定和自律要求的客户适当性制度，实现客户与产品的适当性匹配管理","B":"公司最近两年内不存在因涉嫌违法违规正被中国证监会立案调查或者正处于整改期间的情形","C":"公司治理健全，内部控制有效，能有效识别、控制和防范业务经营风险和内部管理风险","D":"有拟负责融资融券业务的高级管理人员和适当数量的专业人员，融资融券业务方案和内部管理制度已通过中国证监会的专业评价"},"a":"ABC","an":"按照《证券公司融资融券业务管理办法》的规定，关于证券公司申请融资融券业务资格，应当具备的条件：有拟负责融资融券业务的高级管理人员和适当数量的专业人员，融资融券业务方案和内部管理制度已通过中国证券业协会组织的专业评价，故B错误。","type":"multi"},{"id":"cflue_mock_1.json_91","q":"下列关于我国衍生品市场的各项表述中，错误的有（）。","c":{"A":"2010年10月，中国银行间市场交易商协会推出信用风险缓释合约和信用风险缓释凭证两项产品","B":"全球第二黑色金属期货市场是上海期货交易所","C":"2017年3月，我国首个国际化期货品种原油期货在上海期货交易所子公司上海国际能源交易中心挂牌交易","D":"截至2017年末，我国商品期货交易量已经连续9年位居世界第一"},"a":"BCD","an":"2018年3月26日，我国首个国际化期货品种原油期货在上海期货交易所子公司上海国际能源交易中心挂牌交易，A错误；截至2017年末，我国商品期货交易量已经连续8年位居世界第一，上海期货交易所成为全球第一大黑色金属期货市场和第二大有色金属期货市场；BC错误；","type":"multi"},{"id":"cflue_mock_1.json_111","q":"下列关于全球金融市场监管的说法，错误的有（）。","c":{"A":"目前，中国香港的金融监管机构主要包括香港金融管理局、银行业监理处、证券及期货事务监察委员会和保险业监理处","B":"美国国会于1986年通过的《政府债券法案》赋予财政部监管整个政府债券市场的职责","C":"当前英国金融市场的主要监管机构包括英格兰银行、金融服务局和财政部","D":"在美国，商品期货交易委员会负责监管期货和期权市场"},"a":"AC","an":"2016年5月，英国通过《2016年英格兰银行和金融服务法》，其中第3条规定英格兰银行设立审慎监管委员会（PRC）作为内设机构，承担原审慎监管局对金融机构的微观审慎监管职权。A错误；目前，中国香港的金融监管机构主要包括香港金融管理局（金管局）、证券及期货事务监察委员会（证监会）和保险业监理处（保监处），分别负责监管银行业、证券和期货业以及保险业。D错误。","type":"multi"},{"id":"cflue_mock_1.json_112","q":"在客户交易结算资金第三方存管模式下的客户资金存入过程中，指定商业银行根据客户转账指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金。（）","c":{"A":"错","B":"对"},"a":"B","an":"客户资金存取应当以银证转账方式通过本人银行结算账户进行。【指定商业银行】根据客户指令，负责在客户银行结算账户与客户资金汇总账户之间划转资金，无须证券公司介入，从而防止证券公司假借客户提款挪用资金。","type":"judge"},{"id":"cflue_mock_2.json_2","q":"对转融通担保证券账户内记录的证券，由（）以自己的名义，行使对证券发行人的权利。","c":{"A":"证券登记结算机构","B":"商业银行","C":"证券金融公司","D":"证券公司"},"a":"C","an":"对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。证券金融公司行使对证券发行人的权利，应当事先征求委托其持有该证券的证券公司意见，并按照其意见办理。","type":"single"},{"id":"cflue_mock_2.json_10","q":"按照《证券发行市场保荐业务管理办法》的规定，保荐机构、保荐业务负责人或者内核负责人在1个自然年度内被采取监管措施累计（）次以上，中国证监会可暂停保荐机构的保荐机构资格3个月，责令保荐机构更换保荐业务负责人、内核负责人。","c":{"A":"6","B":"3","C":"4","D":"5"},"a":"D","an":"保荐机构、保荐业务负责人、内核负责人或者保荐业务部门负责人在1个自然年度内被采取《办法》第六十五条规定的监管措施累计5次以上，中国证监会可以暂停保荐机构的保荐业务资格3个月，责令保荐机构更换保荐业务负责人、内核负责人或者保荐业务部门负责人。","type":"single"},{"id":"cflue_mock_2.json_12","q":"下列关于全国中小企业股份转让系统的说法中有误的是（）。","c":{"A":"是经国务院批准成立的","B":"2012年9月正式注册成立","C":"全国中小企业股份转让系统有限责任公司为其运营机构","D":"是依据《证券法》设立的继上海证券交易所之后的第二家全国性证券交易场所"},"a":"D","an":"全国中小企业股份转让系统是依据《证券法》设立的继上海证券交易所、深圳证券交易所之后的第三家全国性证券交易场所。","type":"single"},{"id":"cflue_mock_2.json_22","q":"根据《证券经纪人管理暂行规定》、《证券经纪人执业规范（试行）》，下列关于证券经纪人执业行为的说法，错误的有（）。","c":{"A":"替客户办理证券认购、交易或者资金存取、划转、查询等","B":"为客户之间的融资提供中介、担保或者其他便利","C":"向客户介绍证券投资开户、交易、资金存取等业务流程","D":"替客户办理账户开立、注销、转移等"},"a":"ABD","an":"证券经纪业务营销人员执业行为的禁止性规定：1、营销人员不得经办客户账户及客户资金存管业务；2、根据《证券经纪人管理暂行规定》。证券经纪人不得有下列行为：1、替客户办理账户开立、注销、转移，证券认购、交易或者资金存取、划转、查询等事宜；1、提供、传播虚假或者误导客户的信息，或者诱使客户进行不必要的证券买卖；3、与客户约定分享投资收益，对客户证券买卖的收益或者赔偿证券买卖的损失作出承诺；4、采取贬低竞争对手、进入竞争对手营业场所劝导客户等不正当手段招揽客户；5、泄漏客户的商业秘密或者个人隐私；6、为客户之间的融资提供中介、担保或者其他便利；7、为客户提供非法的服务场所或者交易设施，或者通过互联网络、新闻媒体从事客户招揽和客户服务等活动；8、委托他人代理其从事客户招揽和客户服务等活动；9、损害客户合法权益或者扰乱市场秩序的其他行为。3、根据《证券经纪人执业规范（试行）》，证券经纪人应在《证券经纪人管理暂行规定》和所服务证券公司授权的范围内执业，除不得有《证券经纪人管理暂行规定》禁止的行为外，也不得有以下行为：1、以所服务证券公司或证券营业部的名义，与客户或他人签订任何合同、协议；2、代客户在相关合同、协议、文件等资料上签字；3、在执业过程中索取或收受客户款项和财物；4、向客户提供非由所服务证券公司统一提供的研究报告及与证券投资有关的信息、证券类金融产品宣传推介材料及有关信息；5、违背职业道德的其他行为。","type":"multi"},{"id":"cflue_mock_2.json_24","q":"涉及规范全国股转系统业务的主要法律、行政法规不包括（）。","c":{"A":"《资产支持专项计划备案管理办法》","B":"《公司法》","C":"《证券法》","D":"《国务院关于开展优先股试点的指导意见》"},"a":"A","an":"全国股转系统业务的主要法律、行政法规包括《公司法》《证券法》《国务院关于全国中小企业股份转让系统有关问题的决定》《国务院关于开展优先股试点的指导意见》等。","type":"single"},{"id":"cflue_mock_2.json_28","q":"证券公司受期货公司委托从事中间介绍业务，应当提供协助客户办理开户手续、代理客户进行期货交易、提供期货行情信息、交易设施等服务。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券公司受期货公司委托从事介绍业务，应当提供下列服务：（1）协助办理开户手续；（2）提供期货行情信息、交易设施；（3）中国证监会规定的其他服务。证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"judge"},{"id":"cflue_mock_2.json_93","q":"关于我国基金监管的目标，下列说法中，正确的有（）。","c":{"A":"保护投资人及相关当事人的合法权益","B":"降低市场的系统性风险","C":"促进基金资产估值方法的多样性","D":"保证市场的公平、效率和透明"},"a":"ABD","an":"我国基金监管的目标是：保护投资人及相关当事人的合法权益；规范基金活动，保证市场的公平、效率和透明，降低系统风险；促进证券投资基金和资本市场的健康发展。","type":"multi"},{"id":"cflue_mock_2.json_106","q":"不具备承销业务资格的证券公司只能以对冲风险为目的，从事金融衍生品交易。（）","c":{"A":"错","B":"对"},"a":"A","an":"具备证券自营业务资格的证券公司可以从事金融衍生产品交易，不具备证券自营业务资格的证券公司只能以对冲风险为目的，从事金融衍生产品交易。","type":"judge"},{"id":"cflue_mock_2.json_114","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司开展各项业务，关联交易管理方面，坚决防止关联交易和利益输送。（）","c":{"A":"错","B":"对"},"a":"A","an":"可以进行关联交易，需要完善保障关联交易公允性和合规性的制度。","type":"judge"},{"id":"comp_33890","q":"关于证券经纪业务的说法，正确的有（）。","c":{"A":"证券公司不得接受客户的全权委托而决定买卖证券","B":"证券公司可以承诺客户买卖证券的收益","C":"证券经纪业务是代理买卖证券的业务","D":"客户交易结算资金应当存放在商业银行"},"a":"ACD","an":"选项B错误。证券公司不得以任何方式对客户证券买卖的收益或者赔偿证券买卖的损失作出承诺。证券经纪业务的本质是代理，不承担交易风险。客户交易结算资金实行第三方存管制度。","type":"comprehensive","material":"某证券公司接受客户委托进行证券交易。客户王某开立了证券账户和资金账户，欲买入某上市公司股票。根据证券经纪业务规范，证券公司应当严格履行投资者适当性管理义务，了解客户的身份、财产与收入状况、证券投资经验、风险偏好等信息。","sub_type":"multi"},{"id":"comp_21081","q":"关于证券投资咨询业务的说法，正确的是（）。","c":{"A":"从事证券投资咨询业务的人员应当取得证券投资咨询执业资格","B":"证券投资咨询机构可以代理客户进行证券买卖","C":"发布证券研究报告是证券投资咨询业务的一种形式","D":"证券投资咨询机构及其从业人员不得利用咨询服务谋取不正当利益"},"a":"ACD","an":"选项B错误。证券投资咨询机构提供建议，但不得代理客户进行证券买卖。投资咨询和资产管理是两种不同的业务。发布研究报告、提供投资顾问服务均属于投资咨询业务范畴。","type":"comprehensive","material":"某证券公司接受客户委托进行证券交易。客户王某开立了证券账户和资金账户，欲买入某上市公司股票。根据证券经纪业务规范，证券公司应当严格履行投资者适当性管理义务，了解客户的身份、财产与收入状况、证券投资经验、风险偏好等信息。","sub_type":"multi"},{"id":"comp_54862","q":"关于融资融券业务，下列说法正确的有（）。","c":{"A":"客户融资买入证券的，应当以自有资金偿还","B":"融资融券业务应当签订融资融券合同","C":"客户融券卖出的资金应当存入证券公司指定的账户","D":"证券公司向客户融资融券应当收取保证金"},"a":"BCD","an":"选项A错误。客户融资买入证券的，可以以卖券还款或直接还款的方式偿还，不一定使用自有资金。融券卖出的资金除买券还券外不得他用。保证金可以是现金或可充抵保证金的证券。","type":"comprehensive","material":"某证券公司接受客户委托进行证券交易。客户王某开立了证券账户和资金账户，欲买入某上市公司股票。根据证券经纪业务规范，证券公司应当严格履行投资者适当性管理义务，了解客户的身份、财产与收入状况、证券投资经验、风险偏好等信息。","sub_type":"multi"},{"id":"cflue_zc_fl4.json_1","q":"2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，将负责管理该公司“A基金”账户的投资决策信息告诉其夫蒋某，并与蒋某共同出资10万元，利用其大学同学陈某账户先于“A基金”买入股票并获利1万余元。关于李某的行为，以下说法正确有（）。","c":{"A":"不构成犯罪，但是应当承担行政责任","B":"构成利用未公开信息交易罪","C":"构成泄露内幕信息罪","D":"构成内幕交易罪"},"a":"B","an":"利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。","type":"single"},{"id":"cflue_zc_fl4.json_2","q":"根据《证券法》，下列属于证券公司及其从业人员从事的损害客户利益的行为的是（）。","c":{"A":"根据客户的真实意思表示，维护客户利益","B":"为牟取佣金收入，诱使客户进行不必要的证券买卖","C":"根据客户的委托为其买卖证券","D":"在规定的时间内向客户提供交易的确认文件"},"a":"B","an":"A选项违反了相关从业规定","type":"single"},{"id":"cflue_zc_fl4.json_3","q":"下列关于集资诈骗罪的说法，正确的有（）。","c":{"A":"集资诈骗罪的犯罪客观方面为使用诈骗手段实施非法集资，且数额较大的行为","B":"集资诈骗罪的犯罪主观方面是故意，无需以非法占有为目的","C":"单位犯集资诈骗罪的，对单位判处罚金，并对其直接负责的主管人员和其他直接责任人员依照《刑法》相关规定进行处罚","D":"个人集资诈骗，数额在10万元以上的；单位集资诈骗，数额在50万元以上的，应予以立案追诉"},"a":"ACD","an":"集资诈骗罪是指以非法占有为目的，使用诈骗方法非法集资的行为。","type":"multi"},{"id":"cflue_zc_fl4.json_4","q":"根据《证券法》，下列关于上市公司收购相关法律责任的说法，错误的有（）。","c":{"A":"收购人利用上市公司收购，损害被收购公司股东的合法权益，无需承担赔偿责任","B":"收购人控股股东未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款","C":"收购人的控股股东利用上市公司收购，损害被收购公司及其股东的合法权益，应当由被收购公司承担赔偿责任","D":"收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以罚款"},"a":"ABC","an":"收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。D错误；收购人及其控股股东、实际控制人利用上市公司收购，给被收购公司及其股东造成损失的，应当依法承担赔偿责任。A、B错误。","type":"multi"},{"id":"cflue_zc_fl4.json_5","q":"是否存在责任人有专业背景，对于信息披露中与其专业背景有关违法事项应当发现而未予指出的情况，是影响信息披露违法责任人员责任大小的认定因素之一。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_zc_fl4.json_6","q":"2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，利用管理该公司“某优选成长基金”账户而掌握有关投资决策、交易等方面信息的职务便利，使用其实际控制的“左某”证券账户，先于或同期于基金账户买入或卖出相同股票103支，买入金额共计人民币8067万元（以下币种均为人民币），卖出金额共计3841万元，获利金额共计18万元。根据该案例，回答以下问题：（2）证券从业人员不得从事的活动包括（）。","c":{"A":"编造、传播虚假信息","B":"隐匿、伪造、篡改或者毁损交易记录","C":"接受利益相关方的贿赂或对其进行贿赂","D":"从事与其履行职责有利益冲突的业务"},"a":"ABCD","an":"证券从业人员不得从事以下活动：（1）从事内幕交易或利用未公开信息交易活动，泄露利用工作便利获取的内幕信息或其他未公开信息，或明示、暗示他人从事内幕交易活动；（2）利用资金优势、持股优势和信息优势，单独或者合谋串通，影响证券交易价格或交易量，误导和干扰市场；（3）编造、传播虚假信息，作出虚假陈述或信息误导，扰乱证券市场；（4）损害社会公共利益、所在机构或者他人的合法权益；（5）从事与其履行职责有利益冲突的业务；（6）接受利益相关方的贿赂或对其进行贿赂，如接受或赠送礼物、回扣、补偿或报酬等，或从事可能导致与投资者或所在机构之间产生利益冲突的活动；（7）买卖法律明文禁止买卖的证券；（8）利用工作之便向任何机构和个人输送利益，损害客户和所在机构利益；（9）违规向客户作出投资不受损失或保证最低收益的承诺；（10）隐匿、伪造、篡改或者毁损交易记录；（11）中国证监会、中国证券业协会禁止的其他行为。","type":"multi"},{"id":"cflue_zc_fl4.json_7","q":"在证券、期货市场上，操纵市场的行为方式主要有（）。","c":{"A":"内幕交易","B":"与他人串通，以约定的价格进行交易","C":"自买自卖期货合约","D":"合谋操纵证券交易价格或数量"},"a":"BCD","an":"期货市场上操纵市场行为包括：1、单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖，操纵证券、期货交易价格或者证券、期货交易量的；2、与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易，影响证券、期货交易价格或者证券、期货交易量的；3、在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约，影响证券、期货交易价格或者证券、期货交易量的；4、以其他方法操纵证券、期货市场的。","type":"multi"},{"id":"cflue_zc_fl4.json_8","q":"下列关于在证券交易活动中作出虚假陈述或者信息误导的法律责任的说法，错误的是（）。","c":{"A":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，并处相应罚款","B":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处相应罚款，情节严重的，并处暂停或者禁止从事证券服务业务","C":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以3万元以上20万元以下的罚款","D":"在证券交易活动中作出虚假陈述或者信息误导的人员属于国家工作人员的，经责令改正并处以罚款后，可以不予行政处分"},"a":"CD","an":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款；属于国家工作人员的，还应当依法给予行政处分。","type":"multi"},{"id":"cflue_zc_fl4.json_9","q":"下列关于违反证券发行规定的法律责任的说法，正确的有（）。","c":{"A":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，可以不追究责任","B":"未经依法注册，擅自公开或者变相公开发行证券的，责令停止发行，退还所募资金并加算银行同期存款利息，并处罚款","C":"证券公司承销或者销售擅自公开发行的证券的，责令停止承销或者销售，没收违法所得，并处罚款","D":"发行人的控股股东、实际控制人组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，依规只对发行人进行处罚"},"a":"BC","an":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，【处以200万元以上2000万元以下的罚款】，A选项错误（A声称不追究责任明显错误）。控股股东、实际控制人组织、指使实施前款行为的，也应受处罚，D选项错误（D声称只对发行人处罚明显错误）。","type":"multi"},{"id":"cflue_zc_fl4.json_10","q":"证券交易所不能成为背信运用受托财产罪主体。（）","c":{"A":"错","B":"对"},"a":"A","an":"该罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公式、期货经纪公司、保险公司或者其他金融机构。","type":"judge"},{"id":"cflue_zc_fl4.json_11","q":"下列说法不属于变相公开发行股票情形的有（）。","c":{"A":"向特定对象转让股票，未经中国证监会核准，转让后公司股东139人","B":"非公开发行股票及其股权转让采用推介会的方式向社会公众发行","C":"公司股东自行以公开方式向社会公众转让股票","D":"公司股东委托他人以公开方式向社会公众转让股票"},"a":"A","an":"变相公开发行包括但不限于以下几种情形：1、非公开发行股票及其股权转让，采用广告、公告、广播、电话、传真、信函、推介会、说明会、网络、短信、公开劝诱等公开方式或变相公开方式向社会公众发行；2、公司股东自行或委托他人以公开方式向社会公众转让股票，亦构成变相公开发行股票；3、向特定对象转让股票，未经中国证监会核准，转让后公司股东累计超过200人。","type":"single"},{"id":"cflue_zc_fl4.json_12","q":"操纵证券市场行为给投资者造成损失的，行为人应当依法承担赔偿责任。（）","c":{"A":"错","B":"对"},"a":"B","an":"操纵证券市场行为给投资者造成损失的，应当依法承担赔偿责任。","type":"judge"},{"id":"cflue_zc_fl4.json_13","q":"下列关于内幕交易、泄露内幕信息的相关说法，错误的是（）。","c":{"A":"内幕交易、泄露内幕信息罪的主观方面包括故意和过失","B":"内幕交易、泄露内幕信息行为，证券交易成交额累计在200万元以上的，应予立案追诉","C":"内幕交易、泄露内幕信息罪侵犯的客体是证券、期货交易市场的正常管理秩序和证券、期货投资人的合法利益","D":"证券交易内幕信息的知情人违反规定从事内幕交易的，责令依法处理非法持有的证券，没收违法所得，并处以法定数额罚款"},"a":"A","an":"内幕交易、泄露内幕信息罪的主观方面只能是故意，过失不构成本罪。","type":"single"},{"id":"cflue_zc_fl4.json_14","q":"甲期货公司营业部客户经理陈某向客户高某推介保本理财产品。经时任营业部总经理孟某同意，陈某向高某承诺通过寻找第三方投资顾问的方式为高某操作期货账户，保本保息基础上达到7%的年收益。后孟某、陈某未能找到愿意接盘的投资顾问，在未通知高某也未取得其同意的情况下，二人擅自运用高某账户进行操作造成损失一千余万元，为甲公司赚取手续费八十余万元。以下说法错误的有（）。","c":{"A":"陈某构成操纵期货市场罪","B":"甲公司营业部不构成背信运用受托财产罪","C":"甲公司营业部构成背信运用受托财产罪","D":"孟某构成操纵期货市场罪"},"a":"ABD","an":"甲公司营业部擅自运用高某账户进行投资，属于背信运用受托财产罪，不构成操纵期货市场罪。","type":"multi"},{"id":"cflue_zc_fl4.json_15","q":"下列关于利用未公开信息交易罪立案追诉标准的说法，正确的是（）。","c":{"A":"获利或者避免损失数额在100万元以上的","B":"2年内3次以上利用未公开信息交易的","C":"证券交易成交额累计在30万元以上的","D":"期货交易占用保证金数额累计在20万元以上的"},"a":"AB","an":"利用未公开信息交易行为，涉嫌下列情形之一的，应予立案追诉：（1）获利或者避免损失数额在100万元以上的；（2）2年内3次以上利用未公开信息交易的；（3）明示、暗示3人以上从事相关交易活动的；（4）具有其他严重情节的。利用未公开信息交易，获利或者避免损失数额在50万元以上，或者证券交易成交额在500万元以上，或者期货交易占用保证金数额在100万元以上，同时涉嫌下列情形之一的，应予立案追诉：（1）以出售或者变相出售未公开信息等方式，明示、暗示他人从事相关交易活动的；（2）因证券、期货犯罪行为受过刑事追究的；（3）两年内因证券、期货违法行为受过行政处罚的；（4）造成其他严重后果的。","type":"multi"},{"id":"cflue_zc_fl4.json_16","q":"依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列（）情形的，应予立案追诉。","c":{"A":"在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的","B":"虚增或者虚减利润达到当期披露的利润总额百分之二十以上的","C":"多次提供虚假的或者隐瞒重要事实的财务会计报告的","D":"致使公司发行的股票、公司债券被终止上市交易或者多次被暂停上市交易的"},"a":"ACD","an":"依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌下列情形之一的，应予立案追诉：（1）造成股东、债权人或者其他人直接经济损失数额累计在100万元以上的；（2）虚增或者虚减资产达到当期披露的资产总额30%以上的；（3）虚增或者虚减利润达到当期披露的利润总额【30%】以上的；（4）未按照规定披露的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额占净资产50%以上的；（5）致使公司发行的股票、公司债券或者国务院依法认定的其他证券被终止上市交易或者多次被暂停上市交易的；（6）致使不符合发行条件的公司、企业骗取发行核准并且上市交易的；（7）在公司财务会计报告中将亏损披露为盈利，或者将盈利披露为亏损的；（8）多次提供虚假的或者隐瞒重要事实的财务会计报告，或者多次对依法应当披露的其他重要信息不按照规定披露的；（9）其他严重损害股东、债权人或者其他人利益，或者有其他严重情节的情形。","type":"multi"},{"id":"cflue_zc_fl4.json_17","q":"下列关于背信运用受托财产罪的刑事追诉标准的说法，正确的是（）。","c":{"A":"本罪的刑事追诉标准跟具体涉案金额数无关","B":"本罪即使行为人多次擅自运用客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准","C":"本罪即使涉案金额达不到标准，但多次擅自运用客户资金或者其他委托财产的，也满足刑事追诉的标准","D":"本罪即使行为人擅自运用多个客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准"},"a":"C","an":"背信运用受托财产罪的刑事立案追诉标准：1、擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；1、虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用多个客户资金或者其他委托、信托的财产的；3、其他情节严重的情形。","type":"single"},{"id":"cflue_zc_fl4.json_18","q":"某公司在招股说明书中隐瞒重要事实，发行股票非法募集资金金额500万元的，应予刑事立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，非法募集资金金额在【1000万元】以上的，应予立案追诉。","type":"judge"},{"id":"cflue_zc_fl4.json_19","q":"期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）","c":{"A":"错","B":"对"},"a":"B","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"judge"},{"id":"cflue_zc_fl4.json_20","q":"下列属于诱骗投资者买卖证券、期货合约罪主体范围的是（）。","c":{"A":"证券交易所从业人员","B":"银行从业人员","C":"证券公司从业人员","D":"期货经纪公司"},"a":"ACD","an":"诱骗投资者买卖证券、期货合约罪，是指证券交易所、期货交易所、证券公司、期货经纪公司的从业人员，证券业协会、期货业协会或者证券期货监管管理部门的工作人员，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为。","type":"multi"},{"id":"cflue_zc_fl4.json_21","q":"甲在不同证券公司以不同身份开设了十余个账户，并且以自己为交易对象，自买自卖相关股票，严重影响上述股票的价格，获得巨大非法收益。根据该案例，回答以下问题：（1）则甲的行为构成（）罪。","c":{"A":"内幕交易","B":"诱骗消费者购买证券","C":"操纵证券市场","D":"利用未公开信息交易"},"a":"C","an":"禁止任何人以下列手段操纵证券市场，影响或者意图影响证券交易价格或者证券交易量：（1）单独或者通过合谋，集中资金优势、持股优势或者利用信息优势联合或者连续买卖；（2）与他人串通，以事先约定的时间、价格和方式相互进行证券交易；（3）【在自己实际控制的账户之间进行证券交易】；（4）不以成交为目的，频繁或者大量申报并撤销申报；（5）利用虚假或者不确定的重大信息，诱导投资者进行证券交易；（6）对证券、发行人公开作出评价、预测或者投资建议，并进行反向证券交易；（7）利用在其他相关市场的活动操纵证券市场；（8）操纵证券市场的其他手段。","type":"multi"},{"id":"cflue_zc_fl4.json_22","q":"操纵证券、期货市场，持有证券的流通股份数达到该证券实际流通股份总量30%以上，且在该证券连续20个交易日内连续买卖股份数累计达到该证券同期总成交量30%以上的，应予立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"持有或者实际控制证券的流通股份数量达到该证券的实际流通股份总量10%以上，实施刑法第一百八十二条第一款第一项操纵证券市场行为，连续10个交易日的累计成交量达到同期该证券总成交量20%以上的应予立案追诉。","type":"judge"},{"id":"cflue_zc_fl4.json_23","q":"下列可以成为背信运用受托财产罪犯罪主体的是（）。","c":{"A":"自然人","B":"律师事务所","C":"会计师事务所","D":"期货经纪公司"},"a":"D","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"single"},{"id":"cflue_zc_fl4.json_24","q":"根据《证券法》，下列关于公开发行证券的说法，正确的有（）。","c":{"A":"报经国务院证券监督管理机构或者国务院授权的部门注册","B":"符合法规、行政法规规定的条件","C":"证券发行注册制的具体范围、实施步骤、由国务院证券监督管理机构规定","D":"未经依法注册，任何单位和个人不得公开发行证券"},"a":"ABD","an":"公开发行证券，必须符合法律、行政法规规定的条件，并依法报经国务院证券监督管理机构或者国务院授权的部门核准；未经依法核准，任何单位和个人不得公开发行证券。注册制的具体范围、实施步骤由国务院规定，D错误。","type":"multi"},{"id":"cflue_zc_fl4.json_25","q":"王某在2020年3月因证券违法行为受到过行政处罚，2022年9月其参与内幕交易获利30万元，其行为应予立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"内幕交易获利或者避免损失数额在25万元以上，或者证券交易成交额在100万元以上，或者期货交易占用保证金数额在50万元以上，【同时】涉嫌下列情形之一的，应予立案追诉：（1）证券法规定的证券交易内幕信息的知情人实施或者与他人共同实施内幕交易行为的；（2）以出售或者变相出售内幕信息等方式，明示、暗示他人从事与该内幕信息相关的交易活动的；（3）因证券、期货犯罪行为受过刑事追究的；（4）2年内因证券、期货违法行为受过行政处罚的；（5）造成其他严重后果的。该题目，获利金额够，但受到行政处罚的时间超过两年，故按照规定，不予立案追诉。","type":"judge"},{"id":"cflue_zc_fl4.json_26","q":"2019年10月至2022年2月间，李某担任甲基金管理有限责任公司基金经理，利用管理该公司“某优选成长基金”账户而掌握有关投资决策、交易等方面信息的职务便利，使用其实际控制的“左某”证券账户，先于或同期于基金账户买入或卖出相同股票103支，买入金额共计人民币8067万元（以下币种均为人民币），卖出金额共计3841万元，获利金额共计18万元。根据该案例，回答以下问题：（1）李某的行为（）。","c":{"A":"构成利用未公开信息交易罪","B":"不构成犯罪","C":"构成内幕交易罪","D":"构成泄露内幕信息罪"},"a":"A","an":"利用未公开信息交易罪，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。根据该条规定，“未公开信息”是指金融机构从业人员及有关监管部门、行业协会工作人员，利用职务便利获取的，与证券、期货交易有关的内幕信息以外的其他未公开的信息。","type":"multi"},{"id":"cflue_zc_fl4.json_27","q":"发行人违反《证券法》相关规定擅自改变公开发行证券所募集资金的用途的，对其直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。（）","c":{"A":"错","B":"对"},"a":"A","an":"擅自改变公开发行证券所募集资金的用途的，责令改正，处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款。咪鸭课堂APP提醒：考核的是2020新《证券法》。","type":"judge"},{"id":"cflue_zc_fl4.json_28","q":"根据《证券法》，收购人未按照规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处罚款十万元以上三十万元以下。（）","c":{"A":"错","B":"对"},"a":"A","an":"收购人未按照《证券法》规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"judge"},{"id":"cflue_zc_fl4.json_29","q":"欺诈发行股票、债券罪侵犯的客体是（）。","c":{"A":"复杂客体","B":"国家对证券市场的管理制度","C":"投资者的合法权益","D":"单一客体"},"a":"ABC","an":"欺诈发行股票、债券罪侵犯的客体是复杂客体，即国家对证券市场的管理制度以及投资者（即股东、债权人和公众）的合法权益。","type":"multi"},{"id":"cflue_zc_fl4.json_30","q":"根据《刑法》，（）是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益的行为。","c":{"A":"欺诈发行股票、债券罪","B":"诱骗他人买卖证券罪","C":"非法发行股票和公司、企业债券罪","D":"违规披露、不披露重要信息罪"},"a":"D","an":"【违规披露、不披露重要信息罪】是指依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，严重损害股东或者其他人利益，或有其他严重情节的行为。","type":"single"},{"id":"cflue_zc_fl4.json_31","q":"下列关于非法吸收公众存款罪的说法，错误的是（）。","c":{"A":"非法吸收公众存款罪主体只能是单位，主观方面既可以是故意，也可以是过失","B":"非法吸收公众存款是指非法吸收公众存款或变相吸收公众存款，扰乱金融秩序的行为","C":"非法吸收公众存款罪侵犯的客体是国家金融管理秩序","D":"单位犯非法吸收公众存款罪的，对单位判处罚金，并对其直接负责的主管人员和其他直接责任人员，依照《刑法》相关规定进行处罚"},"a":"A","an":"本罪的犯罪主体为一般主体，包括自然人和单位，主观方面为故意。","type":"single"},{"id":"cflue_zc_fl4.json_32","q":"关于在证券交易活动中可能作出虚假陈述或者信息误导的主体，下列说法正确的有（）。","c":{"A":"证券公司及其从业人员","B":"证券登记结算机构及其从业人员","C":"证券业协会、证券监督管理机构及其从业人员","D":"证券交易所及其从业人员"},"a":"ABCD","an":"在证券交易活动中作出虚假陈述或者信息误导，是指证券交易所、证券公司、证券登记结算机构、证券服务机构及其从业人员，证券业协会、证券监督管理机构及其工作人员，在证券交易活动中作出虚假陈述或者信息误导。","type":"multi"},{"id":"cflue_zc_fl4.json_33","q":"根据《证券法》，下列关于欺诈发行证券的法律责任的说法，错误的是（）。","c":{"A":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，对直接负责的主管人员和其他直接责任人员，处以100万元以上1000万元以下的罚款","B":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，责令改正，给予警告","C":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，已经发行证券的，处以非法所募资金金额10%以上1倍以下的罚款","D":"发行人的控股股东组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容的，没收违法所得，并处以违法所得10%以上1倍以下的罚款"},"a":"B","an":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以200万元以上2000万元以下的罚款","type":"single"},{"id":"cflue_zc_fl4.json_34","q":"下列关于诱骗投资者买卖证券、期货合约的说法，错误的是（）。","c":{"A":"诱骗投资者买卖证券、期货合约罪侵犯的客体是证券、期货交易市场的正常管理秩序和证券、期货投资人的合法利益","B":"因诱骗投资者买卖证券、期货合约而应当承担民事赔偿责任和缴纳罚款、罚金，其财产不足以同时支付时，先承担民事赔偿责任","C":"诱骗投资者买卖证券、期货合约罪的主观方面可以是过失","D":"诱骗投资者买卖证券、期货合约罪的客观要件表现为行为人故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为"},"a":"C","an":"诱骗投资者买卖证券、期货合约罪的主观方面只能是故意，过失不构成本罪。","type":"single"},{"id":"cflue_zc_fl4.json_35","q":"构成背信运用受托财产罪的立案标准的是（）。","c":{"A":"擅自运用客户资金或者其他委托、信托的财产数额在10万元以上的","B":"擅自运用多个客户资金或者其他委托、信托的财产的","C":"接受客户委托运用信托财产的","D":"擅自运用客户资金或者其他委托、信托的财产数额在20万元以上的"},"a":"B","an":"背信运用受托财产罪的刑事立案追诉标准：（1）擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；（2）虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用【多个】客户资金或者其他委托、信托的财产的；（3）其他情节严重的情形。","type":"single"},{"id":"cflue_paper_法律法规_1.json_16","q":"下列关于在证券交易活动中作出虚假陈述或者信息误导的法律责任的说法，错误的是（）。","c":{"A":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，对直接负责的主管人员和其他直接责任人员给予警告，并处相应罚款","B":"证券服务机构未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，并处相应罚款，情节严重的，并处暂停或者禁止从事证券服务业务","C":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以3万元以上20万元以下的罚款","D":"在证券交易活动中作出虚假陈述或者信息误导的人员属于国家工作人员的，经责令改正并处以罚款后，可以不予行政处分"},"a":"CD","an":"在证券交易活动中作出虚假陈述或者信息误导的，责令改正，处以20万元以上200万元以下的罚款；属于国家工作人员的，还应当依法给予行政处分。","type":"multi"},{"id":"cflue_paper_法律法规_1.json_43","q":"某公司在招股说明书中隐瞒重要事实，发行股票非法募集资金金额500万元的，应予刑事立案追诉。（）","c":{"A":"错","B":"对"},"a":"A","an":"在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，非法募集资金金额在【1000万元】以上的，应予立案追诉。","type":"judge"},{"id":"cflue_paper_法律法规_1.json_46","q":"下列关于背信运用受托财产罪的刑事追诉标准的说法，正确的是（）。","c":{"A":"本罪的刑事追诉标准跟具体涉案金额数无关","B":"本罪即使行为人多次擅自运用客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准","C":"本罪即使涉案金额达不到标准，但多次擅自运用客户资金或者其他委托财产的，也满足刑事追诉的标准","D":"本罪即使行为人擅自运用多个客户资金，如果涉案金额达不到标准，也不满足刑事追诉的标准"},"a":"C","an":"背信运用受托财产罪的刑事立案追诉标准：1、擅自运用客户资金或者其他委托、信托的财产数额在30万元以上的；1、虽未达到上述数额标准，但多次擅自运用客户资金或者其他委托、信托的财产，或者擅自运用多个客户资金或者其他委托、信托的财产的；3、其他情节严重的情形。","type":"single"},{"id":"cflue_paper_法律法规_1.json_50","q":"在证券、期货市场上，操纵市场的行为方式主要有（）。","c":{"A":"内幕交易","B":"与他人串通，以约定的价格进行交易","C":"自买自卖期货合约","D":"合谋操纵证券交易价格或数量"},"a":"BCD","an":"期货市场上操纵市场行为包括：1、单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖，操纵证券、期货交易价格或者证券、期货交易量的；2、与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易，影响证券、期货交易价格或者证券、期货交易量的；3、在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约，影响证券、期货交易价格或者证券、期货交易量的；4、以其他方法操纵证券、期货市场的。","type":"multi"},{"id":"cflue_paper_法律法规_2.json_9","q":"根据《证券法》，下列关于欺诈发行证券的法律责任的说法，错误的是（）。","c":{"A":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，对直接负责的主管人员和其他直接责任人员，处以100万元以上1000万元以下的罚款","B":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，责令改正，给予警告","C":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，已经发行证券的，处以非法所募资金金额10%以上1倍以下的罚款","D":"发行人的控股股东组织、指使发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容的，没收违法所得，并处以违法所得10%以上1倍以下的罚款"},"a":"B","an":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以200万元以上2000万元以下的罚款","type":"single"},{"id":"cflue_paper_法律法规_2.json_26","q":"下列说法不属于变相公开发行股票情形的有（）。","c":{"A":"向特定对象转让股票，未经中国证监会核准，转让后公司股东139人","B":"非公开发行股票及其股权转让采用推介会的方式向社会公众发行","C":"公司股东自行以公开方式向社会公众转让股票","D":"公司股东委托他人以公开方式向社会公众转让股票"},"a":"A","an":"变相公开发行包括但不限于以下几种情形：1、非公开发行股票及其股权转让，采用广告、公告、广播、电话、传真、信函、推介会、说明会、网络、短信、公开劝诱等公开方式或变相公开方式向社会公众发行；2、公司股东自行或委托他人以公开方式向社会公众转让股票，亦构成变相公开发行股票；3、向特定对象转让股票，未经中国证监会核准，转让后公司股东累计超过200人。","type":"single"},{"id":"cflue_paper_法律法规_2.json_32","q":"下列可以成为背信运用受托财产罪犯罪主体的是（）。","c":{"A":"自然人","B":"律师事务所","C":"会计师事务所","D":"期货经纪公司"},"a":"D","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"single"},{"id":"cflue_paper_法律法规_2.json_34","q":"期货经纪公司可以成为背信运用受托财产罪犯罪主体。（）","c":{"A":"错","B":"对"},"a":"B","an":"背信运用受托财产罪的主体是特殊主体，为商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构。","type":"judge"},{"id":"cflue_paper_法律法规_2.json_43","q":
