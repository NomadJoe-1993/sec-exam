<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>证券从业 · 章节精练 · 金融市场基础</title>
<style>
:root {
  --bg: #f5efe6; --card: #faf6f0; --card-alt: #f0e8db;
  --border: #d4c9b8; --border-light: #e8dfd0;
  --text: #3d3229; --text-dim: #8a7e6f; --text-light: #b8a99a;
  --blue: #1e5b8a; --blue-light: #4a8bc2; --blue-dim: #7ba3c7;
  --blue-bg: rgba(30,91,138,0.06);
  --red: #c23b22; --red-light: #d4735e; --red-bg: rgba(194,59,34,0.08);
  --green: #3d7246; --green-light: #5c9a66; --green-bg: rgba(61,114,70,0.08);
  --gold: #c9a96e; --gold-light: #e8dbaa;
  --shadow: rgba(61,50,41,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; padding:0.6rem; min-height:100vh; }
.container { max-width:860px; margin:0 auto; }
.hd { text-align:center; padding:1rem 0.5rem 0.6rem; margin-bottom:0.5rem; position:relative; }
.hd::after { content:''; display:block; width:50px; height:3px; background:linear-gradient(90deg,var(--blue),var(--gold)); margin:0.5rem auto 0; border-radius:2px; }
.hd h1 { font-size:1.2rem; font-weight:800; color:var(--blue); letter-spacing:1px; }
.hd .sub { color:var(--text-dim); font-size:0.75rem; margin-top:0.2rem; }
.legend-bar { display:flex; justify-content:center; gap:0.5rem 1.2rem; flex-wrap:wrap; padding:0.4rem 0.6rem; margin:0 0 0.5rem; font-size:0.72rem; background:var(--card); border-radius:8px; border:1px solid var(--border-light); }
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-item .star { color:var(--gold); font-size:0.8rem; letter-spacing:-1px; }
.legend-item .lbl { color:var(--text-dim); }
/* Section View */
.section-view { display:block; }
.section-view.hidden { display:none; }
.q-view { display:none; }
.q-view.show { display:block; }
.ch-card { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:0.5rem; overflow:hidden; }
.ch-head { display:flex; justify-content:space-between; align-items:center; padding:0.7rem 0.8rem; cursor:pointer; user-select:none; background:linear-gradient(135deg,var(--card),var(--card-alt)); }
.ch-head:active { background:var(--card-alt); }
.ch-head .name { font-weight:700; font-size:0.9rem; color:var(--blue); }
.ch-head .meta { font-size:0.72rem; color:var(--text-dim); }
.ch-head .arrow { transition:transform 0.2s; font-size:0.7rem; color:var(--text-light); }
.ch-head.exp .arrow { transform:rotate(180deg); }
.sec-list { display:none; padding:0.2rem 0.8rem 0.6rem; }
.sec-list.show { display:block; }
.sec-item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0.6rem; margin:0.2rem 0; border-radius:6px; cursor:pointer; border:1px solid transparent; }
.sec-item:active { background:var(--blue-bg); border-color:var(--blue-dim); }
.sec-item .sname { font-size:0.82rem; color:var(--text); }
.sec-item .scount { font-size:0.72rem; color:var(--text-dim); background:var(--card-alt); padding:0.1rem 0.5rem; border-radius:10px; font-weight:600; }
.sec-item .sbar { flex:1; height:4px; background:var(--border-light); border-radius:2px; margin:0 0.6rem; overflow:hidden; }
.sec-item .sbar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--blue),var(--blue-light)); }
/* Question View */
.ch-nav { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin:0.4rem 0 0.6rem; }
.ch-btn { padding:0.35rem 0.5rem; border-radius:8px; font-size:0.72rem; font-weight:600; border:1.5px solid var(--border); cursor:pointer; background:var(--card); color:var(--text-dim); white-space:nowrap; text-align:center; }
.ch-btn.on { background:var(--blue); color:#fff; border-color:var(--blue); }
.ch-btn .ch-title { display:block; }
.ch-btn .ch-meta { display:block; font-weight:400; font-size:0.6rem; opacity:0.8; }
.stats { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0.8rem; background:var(--card); border-radius:8px; margin-bottom:0.6rem; border:1px solid var(--border-light); font-size:0.78rem; }
.stats .pct { color:var(--blue); font-weight:700; font-size:0.9rem; }
.progress-bar { height:4px; background:var(--border-light); border-radius:2px; margin:0.4rem 0 0.8rem; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--blue-light)); border-radius:2px; transition:width 0.4s ease; }
.back-btn { display:inline-flex; align-items:center; gap:4px; padding:0.3rem 0.7rem; border-radius:6px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); cursor:pointer; background:var(--card); color:var(--blue); margin-bottom:0.4rem; }
.q-wrap { margin-bottom:1rem; padding:0.6rem; background:var(--card); border:1px solid var(--border-light); border-radius:8px; }
.q-head { display:flex; align-items:center; gap:6px; margin-bottom:0.4rem; }
.q-num { font-weight:700; font-size:0.85rem; color:var(--blue); min-width:24px; }
.q-tag { font-size:0.65rem; padding:0.05rem 0.4rem; border-radius:4px; background:var(--card-alt); color:var(--text-dim); }
.q-text { font-size:0.88rem; margin-bottom:0.5rem; line-height:1.8; }
.opt { display:flex; align-items:flex-start; gap:6px; padding:0.4rem 0.5rem; margin:0.15rem 0; border-radius:6px; border:1px solid var(--border-light); cursor:pointer; background:var(--bg); font-size:0.82rem; line-height:1.6; }
.opt.selected { border-color:var(--blue); background:var(--blue-bg); }
.opt.correct { border-color:var(--green); background:var(--green-bg); }
.opt.wrong { border-color:var(--red); background:var(--red-bg); }
.opt.disabled { opacity:0.7; pointer-events:none; }
.okey { font-weight:700; color:var(--blue); min-width:20px; }
.oval { flex:1; }
.ans-box { padding:0.5rem; border-radius:6px; margin-top:0.4rem; font-size:0.8rem; line-height:1.6; }
.ans-box.correct { background:var(--green-bg); border:1px solid var(--green); color:var(--green); }
.ans-box.wrong { background:var(--red-bg); border:1px solid var(--red); color:var(--red); }
.ans-box .a-text { color:var(--text); margin-top:0.3rem; }
.action-row { display:flex; gap:6px; margin-top:0.5rem; }
.action-row button { padding:0.35rem 0.8rem; border-radius:6px; font-size:0.78rem; font-weight:600; border:1px solid var(--border); cursor:pointer; }
.btn-check { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-reset { background:var(--card); color:var(--text-dim); }
@media (max-width:480px) { .ch-head { padding:0.6rem; } .sec-item { padding:0.4rem; } }
</style>
</head>

<script>
var ALL_QUESTIONS = [{"id": "gw_0_1", "q": "下列关于全球金融市场监管的说法，错误的有（）。", "c": {"A": "目前，中国香港的金融监管机构主要包括香港金融管理局、银行业监理处、证券及期货事务监察委员会和保险业监理处", "B": "美国国会于1986年通过的《政府债券法案》赋予财政部监管整个政府债券市场的职责", "C": "当前英国金融市场的主要监管机构包括英格兰银行、金融服务局和财政部", "D": "在美国，商品期货交易委员会负责监管期货和期权市场"}, "a": "AC", "an": "2016年5月，英国通过《2016年英格兰银行和金融服务法》，其中第3条规定英格兰银行设立审慎监管委员会（PRC）作为内设机构，承担原审慎监管局对金融机构的微观审慎监管职权。A错误；目前，中国香港的金融监管机构主要包括香港金融管理局（金管局）、证券及期货事务监察委员会（证监会）和保险业监理处（保监处），分别负责监管银行业、证券和期货业以及保险业。D错误。", "type": "m"}, {"id": "cflue_zc_ch1.json_1", "q": "期限在1年以上的资金的跨国流动是国际长期资金流动。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "国际长期资金流动，是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷三种形式。", "type": "judge"}, {"id": "cflue_zc_ch1.json_2", "q": "根据市场组织方式，证券市场可以分为（）。", "c": {"A": "场外市场", "B": "发行市场", "C": "流通市场", "D": "交易所市场"}, "a": "AD", "an": "按组织方式分为交易所市场和场外交易市场。", "type": "multi"}, {"id": "cflue_zc_ch1.json_3", "q": "直接融资与间接融资的区别主要在于资金需求者与供给者是否直接形成债权债务关系。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "直接融资与间接融资的区别主要在于资金需求者与供给者【是否直接形成债权债务关系】。直接融资的特点包括直接性、分散性、融资的信誉有较大的差异性、部分融资方式具有不可逆性、融资者有相对较强的自主性。间接融资的特点包括资金获得的间接性、融资的相对集中性、融资信誉的差异性相对较小、全部具有可逆性（即可返还性）、融资的主动权主要掌握在金融机构手中。", "type": "judge"}, {"id": "cflue_zc_ch1.json_4", "q": "下列关于金融市场的说法，错误的是（）。", "c": {"A": "金融市场是政府调控经济的一个主要渠道", "B": "金融市场的发展可以促成厂商“正常存货投资”的减少", "C": "金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联", "D": "金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"}, "a": "B", "an": "金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。", "type": "single"}, {"id": "cflue_zc_ch1.json_5", "q": "股票市场融资的特点有（）。", "c": {"A": "可以退股", "B": "保证收益", "C": "可以转让", "D": "无须退还本金"}, "a": "CD", "an": "股票市场融资无须退还本金、售出的股票只能转让，不能退股，也不保证收益，但如果企业盈利，股票持有人享受企业盈余的分配权。", "type": "multi"}, {"id": "cflue_zc_ch1.json_6", "q": "金融市场的重要性主要体现在（）。", "c": {"A": "优化资源配置", "B": "宏观调控", "C": "促进储蓄-投资转化", "D": "风险管理"}, "a": "ABC", "an": "金融市场的重要性主要体现在：促进储蓄—投资转化、优化资源配置、反映经济状态和宏观调控。", "type": "multi"}, {"id": "cflue_zc_ch1.json_7", "q": "间接融资相对集中于银行或非银行金融机构，国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，一些国家还实行了存款保险制度，这反映出间接融资具有资金获得的间接性的特点。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【融资信誉的差异性相对较小】：间接融资相对集中于银行或非银行金融机构，由于国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，加上一些国家实行了存款保险制度，相对于直接融资来说，间接融资的信誉程度高，风险也相对较小，融资的稳定性较强。", "type": "judge"}, {"id": "cflue_zc_ch1.json_8", "q": "下列关于直接融资对金融市场的影响的说法，正确的有（）。", "c": {"A": "发展多种股权融资方式并不能够弥补间接融资的不足", "B": "提高直接融资比重，可以起到分散过度集中于银行的金融风险作用", "C": "直接融资占比反映了一国金融体系风险及风险分布情况", "D": "直接融资与间接融资的比例可以反映一国金融体系配置的效率是否与实体经济相匹配"}, "a": "BCD", "an": "我国正处于转变经济发展方式、调整产业结构的经济转型期，在这个过程中提高直接融资比重，特别是发展多种股权融资方式【能够】弥补间接融资的不足，也有利于提高实体经济的健康稳定发展。C错误。", "type": "multi"}, {"id": "cflue_zc_ch1.json_9", "q": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡。这是金融市场的价格发现功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡，这也被称为【价格发现】过程。", "type": "judge"}, {"id": "cflue_zc_ch1.json_10", "q": "OTC是芝加哥期权交易所的简称。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "柜台市场（OTC）又称场外交易市场、店头交易市场，指在证券交易所以外进行证券交易的广泛市场。", "type": "judge"}, {"id": "cflue_zc_ch1.json_11", "q": "下列关于直接融资与间接融资区别的说法，正确的有（）。", "c": {"A": "直接融资和间接融资在可逆性上存在一定的差异，间接融资全部具有可逆性，而直接融资则不一定", "B": "间接融资的主动权主要掌握在金融中介机构手中，而直接融资中的投资者和融资者则有相对较强的自主性", "C": "一般认为，直接融资活动从时间上要晚于间接融资活动", "D": "直接融资和间接融资的区别主要在于融资过程中资金的需求者和资金的供给者是否直接形成债权债务关系"}, "a": "ABD", "an": "一般认为，直接融资活动从时间上早于间接融资，A错误；", "type": "multi"}, {"id": "cflue_zc_ch1.json_12", "q": "根据国际货币基金组织的《金融稳健指标编制指南》，不属于全球金融体系的参与者的是（）。", "c": {"A": "中央银行", "B": "为住户服务的非营利机构，包括由政府部门控制和提供资金支持的机构", "C": "建房互助协会", "D": "租赁公司"}, "a": "B", "an": "根据国际货币基金组织的《金融稳健指标编制指南》，全球金融体系的主要参与者包括金融公司（含建房互助协会）、非金融公司、住户、为住户服务的非营利机构、广义政府、公共部门。为住户服务的非营利机构。为住户服务的非营利机构的主要活动是向住户和社会提供免费的或价格不具有经济意义的商品或服务，【不包括】由政府部门控制和提供资金支持的机构。", "type": "single"}, {"id": "cflue_zc_ch1.json_13", "q": "下列属于资本市场的有（）。", "c": {"A": "大额可转让存单市场", "B": "中长期国债市场", "C": "银行间同业拆借市场", "D": "股票市场"}, "a": "BD", "an": "资本市场包括：股票市场、中长期国债市场、中长期银行存款市场等。", "type": "multi"}, {"id": "cflue_zc_ch1.json_14", "q": "金融资产的持有者为了资金安全而进行资金调拨所形成的国际资金流动被称为（）。", "c": {"A": "国际间接投资", "B": "投机性资金流动", "C": "保值性资金流动", "D": "盈利性资金流动"}, "a": "C", "an": "套利性（盈利性）资金的流动是利用各国金融市场上利率差异与汇率差异进行套利活动而引起的短期资本流动。保值性资金的流动又称作避险性资金流动或资本外逃，它是指金融资产的持有者为了资金安全而进行资金调拨所形成的短期资金流动。投机性资金的流动是指投资者利用国际市场上金融资产或商品价格的波动，进行高抛低吸而形成的资金流动。", "type": "single"}, {"id": "cflue_zc_ch1.json_15", "q": "股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式是（）。", "c": {"A": "风险投资融资", "B": "民间借贷", "C": "债券市场融资", "D": "股票市场融资"}, "a": "D", "an": "【股票市场融资】是股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式", "type": "single"}, {"id": "cflue_zc_ch1.json_16", "q": "下列属于场外交易市场的有（）。", "c": {"A": "证券交易所", "B": "黄金市场", "C": "拆借市场", "D": "期货交易所"}, "a": "BC", "an": "银行信贷市场、拆借市场、外汇市场、黄金市场等市场传统上比较松散，通常没有固定的交易场所，也不一定有统一的交易时间，属于场外市场。", "type": "multi"}, {"id": "cflue_zc_ch1.json_17", "q": "下列各项中，不属于间接融资特点的是（）。", "c": {"A": "融资信誉的差异性相对较小", "B": "融资者具有相对较强的自主性", "C": "全部具有可逆性", "D": "融资的相对集中性"}, "a": "B", "an": "间接融资的特点：1、资金获得的间接性；2、融资的相对集中性；3、融资信誉的差异性相对较小；4、全部具有可逆性（即可返还性）；5、融资的主动权主要掌握在金融中介机构手中。A属于直接融资特点。", "type": "single"}, {"id": "cflue_zc_ch1.json_19", "q": "下列属于国际资金流动方式中的“国际长期资金流动”的活动有（）。", "c": {"A": "美国的A公司为从英国B公司进口商品，预付了20万英镑的货款", "B": "美国的A公司以合资形式在英国投资设立了B公司", "C": "美国的A公司将其从位于英国的控股子公司分到的年度利润再投资于这家子公司", "D": "美国的A公司购买了位于英国B公司2%的股权"}, "a": "BCD", "an": "国际长期资金流动是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷。D属于国际短期资金流动。", "type": "multi"}, {"id": "cflue_zc_ch1.json_20", "q": "下列属于货币市场的有（）。", "c": {"A": "商业票据市场", "B": "股票市场", "C": "大额可转让存单市场", "D": "银行间同业拆借市场"}, "a": "ACD", "an": "货币市场包括：银行间同业拆借市场、商业票据市场、短期国库券市场、大额可转让存单市场等。", "type": "multi"}, {"id": "cflue_zc_ch1.json_21", "q": "在美国银行业的监管机构中，（）作为监管机构的协调机构，负责制定统一的监管准则和报告格式。", "c": {"A": "储蓄机构监管署", "B": "联邦金融机构检查委员会", "C": "联邦储备体系", "D": "货币监理署"}, "a": "B", "an": "美国实行的是“双层多头”金融监管体制。联邦金融机构检查委员会在美国银行业的监管机构中作为监管机构的协调机构，负责制定统一的监管准则和报告格式。", "type": "single"}, {"id": "cflue_zc_ch1.json_22", "q": "资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，两者只与金融机构发生债权债务关系。这反映了间接融资的融资的相对集中性特点。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，二者只与金融机构发生债权债务关系。这反映了间接融资的资金获得的【间接性】特点&amp;nbsp;&amp;nbsp;。", "type": "judge"}, {"id": "cflue_zc_ch1.json_23", "q": "将有形资产产生的风险在资金供求双方之间重新配置，反映了金融市场的风险管理功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_ch1.json_24", "q": "金融市场通过金融资产交易实现货币资金在供给者和需求者之间的转移，促进有形资本形成，这是金融市场的资金融通功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_ch1.json_25", "q": "证券市场以证券发行与交易的方式实现了筹资与并购的对接，有效地解决了资本的供需矛盾。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券市场以证券发行与交易的方式实现了【筹资与投资】的对接，有效地解决了资本的供需矛盾。", "type": "judge"}, {"id": "cflue_zc_ch1.json_26", "q": "下列各项经济活动中，属于直接融资的有（）。", "c": {"A": "D公司以支付租金的方式从H租赁公司处获得了价值300万元设备的使用权", "B": "美国政府通过发行国库券筹集了200亿美元资金", "C": "B商业银行向C商业银行出售了价值1000万元的贷款", "D": "A商业银行通过发行CDS筹集了2000万资金"}, "a": "BD", "an": "直接融资是指拥有暂时闲置资金的单位（包括企业、机构和个人）与资金短缺需要补充资金的单位，相互之间直接进行协议，或者在金融市场上前者购买后者发行的有价证券，将货币资金提供给所需要补充资金的单位使用，从而完成资金融通的过程。B属于银行贷款、C属于租赁融资均为间接融资方式。", "type": "multi"}, {"id": "cflue_zc_ch1.json_27", "q": "金融市场的参与各方是以信用为基础参与市场各种交易，其体现的是（）关系。", "c": {"A": "借贷", "B": "监管", "C": "委托代理", "D": "竞争"}, "a": "AC", "an": "金融市场上的市场参与各方是以信用为基础的【借贷】关系和【委托代理】关系，其交易对象是【货币资金】这一特殊的商品。", "type": "multi"}, {"id": "cflue_zc_ch1.json_28", "q": "下列关于全球金融市场历史的相关说法，正确的有（）。", "c": {"A": "一般认为，有形的、有组织的金融市场首先形成于17世纪的欧洲大陆", "B": "大约公元前2000年，古巴比伦乌尔城已经出现了明显的金融区，乌尔城出现的金融活动不仅包括借贷，还包括股权投资甚至风险投资", "C": "1957年签署的《罗马条约》建立了欧洲经济共同体，从最初6个成员国发展成为包括28个成员国的联盟", "D": "1790年，美国成立了第一个证券交易所—纽约证券交易所"}, "a": "ABC", "an": "1790年成立了美国第一个证券交易所——费城证券交易所。C错误。", "type": "multi"}, {"id": "gw_1_1", "q": "中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。中央银行作为证券发行主体，既可以发行股票，也可以发行债券。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "中央银行作为证券发行主体，主要涉及两类证券：1、中央银行【股票】。在一些国家（如美国），中央银行采取了股份制组织结构，通过发行股票募集资金，但是，中央银行的股东并不享有决定中央银行政策的权利，只能按期收取固定的红利，其股票类似于优先股。2、中央银行出于调控货币供给量目的而发行的【特殊债券】。", "type": "j"}, {"id": "cflue_zc_ch2.json_1", "q": "国际经济环境因素作为影响我国金融市场运行的主要因素，内容不包括（）。", "c": {"A": "世界货币制度影响", "B": "放松监管和加强监管两种经济哲学的交替", "C": "汇率和国际资本流动", "D": "经济全球化"}, "a": "C", "an": "国际经济环境因素包括经济全球化、世界货币制度影响、放松监管和加强监管两种经济哲学的交替。汇率和国际资本流动属于宏观经济运行对金融市场的影响。", "type": "single"}, {"id": "cflue_zc_ch2.json_2", "q": "中央银行采取宽松性货币政策，（）货币供给，促使股价（）。", "c": {"A": "减少，上升", "B": "减少，下降", "C": "增加，下降", "D": "增加，上升"}, "a": "D", "an": "中央银行采取宽松性货币政策，增加货币供给，股市资金增加，对股票的需求增加，立即促使股价上升。", "type": "single"}, {"id": "cflue_zc_ch2.json_4", "q": "在上海证券交易所设立科创板，坚持面向（），主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。", "c": {"A": "世界科技前沿", "B": "资本市场前沿", "C": "国家重大需求", "D": "经济主战场"}, "a": "ACD", "an": "在上海证券交易所新设科创板，坚持面向【世界科技前沿、面向经济主战场、面向国家重大需求】，主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。&amp;nbsp;&amp;nbsp;", "type": "multi"}, {"id": "cflue_zc_ch2.json_5", "q": "以下关于我国金融业主要行业的基本情况，不正确的是（）。", "c": {"A": "股份制银行资产规模增长较快", "B": "在分业监管体系下，相较于银行业和证券业，信托业务的融资活动灵活性不具有优势", "C": "证券业传统业务面临激烈的同质化竞争", "D": "大型商业银行在资产规模、资金来源和网点布局上占有主导地位"}, "a": "B", "an": "在分业监管体系下，相较于银行业和证券业，信托业务的融资活动更具灵活性优势。", "type": "single"}, {"id": "cflue_zc_ch2.json_6", "q": "《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为（）个月，中国证监会注册期限为（）个工作日。同时，针对（）融资设置简易程序。", "c": {"A": "2；15；小额快速", "B": "2；10；小额便捷", "C": "3；15；小额便捷", "D": "2；15；小额便捷"}, "a": "A", "an": "《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为2个月，中国证监会注册期限为15个工作日。同时，针对“小额快速”融资设置简易程序", "type": "single"}, {"id": "cflue_zc_ch2.json_7", "q": "诚信租行是一家金融租赁公司，拟今年上市，因此聘请A投资银行进行IPO材料的编写，按照行业分类，在联合国统计署按经济活动类型分类的表里，A投资银行属于金融中介的（）子类。", "c": {"A": "辅助金融中介的活动", "B": "非银行金融中介结构", "C": "保险和养老基金", "D": "不包含保险和养老基金的金融中介活动"}, "a": "A", "an": "投资银行属于辅助金融中介的活动，选项C是按照业务特征及货币创造、交换媒介和支付手段的功能划分。", "type": "single"}, {"id": "cflue_zc_ch2.json_8", "q": "上海证券交易所在《上海证券交易所科创板企业上市推荐指引》中指出，根据科创板定位，保荐机构优先推荐的科技创新企业所属的领域包括（）。", "c": {"A": "新能源领域", "B": "节能环保领域", "C": "生物医药领域", "D": "新型农业"}, "a": "ABC", "an": "科创板重点推荐六大领域的科技创新企业包括：新一代信息技术领域；高端装备领域；新材料领域；新能源领域；节能环保领域；生物医药领域。", "type": "multi"}, {"id": "cflue_zc_ch2.json_9", "q": "当前我国银行业中，在资产规模、资金来源和网点布局上占据主导地位的是城市商业银行。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【国有大型商业银行】在资产规模、资金来源和网点布局上占据主导地位，业务遍布全国主要城市及大部分县域地区，网点众多且分散，各项业务均衡发展。", "type": "judge"}, {"id": "cflue_zc_ch2.json_10", "q": "金融产品的创新和复杂化，使得实体经济和金融的界限日益分明。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "实体经济发展水平和质量从根本上决定着金融发展水平和质量，实体经济发展不好，风险最后会集中反映在金融体系中，金融的健康发展可以促进经济增长；反之则不利于经济增长，金融产品的创新和复杂化，使得实体经济和金融的界限【日益模糊】。", "type": "judge"}, {"id": "cflue_zc_ch2.json_11", "q": "在场外交易市场，金融机构（）。", "c": {"A": "仅是交易的组织者", "B": "仅是交易的监管者", "C": "既是证券交易的组织者，又是证券交易的直接参加者", "D": "仅是交易的直接参与者"}, "a": "C", "an": "通常，在柜台上交易的证券，其买卖价格由开设柜台的金融机构报出，投资者根据金融机构柜台所报的买入价或卖出价与柜台交易，即证券出售者将证券直接卖给柜台，证券购入者直接从柜台买入证券。所以，金融机构的柜台既是证券交易的组织者，也是证券交易的直接参加者。", "type": "single"}, {"id": "cflue_zc_ch2.json_12", "q": "下列关于SHIBOR的说法，不正确的是（）。", "c": {"A": "目前已成为认可度高、应用广泛的货币市场基准利率之一", "B": "不具有广泛性，不能帮助金融结构提高自主定价能力", "C": "属于货币市场格局之一", "D": "由中国人民银行于2007年开始试运行"}, "a": "B", "an": "为推进利率市场化改革，提高金融机构自主定价能力，健全货币政策传导机制，培育货币市场基准利率，中国人民银行于2007年开始运行上海银行间同业拆拆借利率，目前它已成为认可度高、应用广泛的货币市场基准利率之－。选项D不正确，其余符合。", "type": "single"}, {"id": "cflue_zc_ch2.json_13", "q": "对于债券市场来说，不同市场的债券分别由不同机构负责托管和结算，关于债券的托管，以下说法正确的是（）。", "c": {"A": "上海证券交易所对应中央国债登记公司", "B": "银行间市场对应中央国债登记公司", "C": "银行间市场对应中国证券登记结算总公司", "D": "深圳交易所对应中央国债登记公司"}, "a": "B", "an": "银行间市场对应中央国债登记公司，上海（深圳）证券交易所对应于中国证券登记结算上海（深圳）分公司，选项A正确，选项B、C、D说法不正确。", "type": "single"}, {"id": "cflue_zc_ch2.json_14", "q": "截至2017年末，全球第一大黑色金属期货市场和第二大有色金属期货市场的是纽约期货交易所。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "截至2017年末，上海期货交易所成为全球第一大黑色金属期货市场和第二大有色金属期货市场。", "type": "judge"}, {"id": "cflue_zc_ch2.json_15", "q": "在我国金融中介体系中，信托机构属于（）。", "c": {"A": "房地产中介体系", "B": "保险中介体系", "C": "投资中介体系", "D": "银行机构体系"}, "a": "C", "an": "目前，我国已经形成了多层次的金融中介机构体系，拥有以中央银行为主导、国有商业银行为主体，包括股份制商业银行、城市商业银行、农村商业银行、跨国银行、农村信用社在内的多层次银行机构体系；拥有以证券公司、期货公司和证券投资基金为主，以各类投资咨询中介、信托机构为辅的多元化【投资中介体系】；拥有人寿保险公司、财产保险公司、再保险公司以及提供多种多样保险服务的保险中介体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_16", "q": "场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备的功能有（）。", "c": {"A": "拓宽融资渠道，改善中小企业融资环境", "B": "为不能在证券交易所上市交易的证券提供流通转让的场所", "C": "提供风险分层的金融资产管理渠道", "D": "宏观调控"}, "a": "ABC", "an": "场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备功能：1、拓宽融资渠道，改善中小企业融资环境；2、为不能在证券交易所上市交易的证券提供流通转让的场所；3、提供风险分层的金融资产管理渠道。", "type": "multi"}, {"id": "cflue_zc_ch2.json_17", "q": "在期货市场监管方面，我国形成了中国证监会、地方证监局、（）、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。", "c": {"A": "期货交易所", "B": "原中国银监会", "C": "中央银行", "D": "原中国保监会"}, "a": "A", "an": "期货市场监管方面，我国形成了中国证监会、地方证监局、期货交易所、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_18", "q": "20世纪80年代以来中央银行职能的变化突出表现在（）。", "c": {"A": "金融政策的制定", "B": "强调金融稳定职能，维护金融体系安全", "C": "货币职能与金融监管日益紧密，相辅相成", "D": "货币职能与金融监管相分离，突出货币政策调控职能"}, "a": "BD", "an": "20世纪80年代以来中央银行职能的变化突出表现在包括：货币职能与金融监管相分离，突出货币政策调控职能；强调金融稳定职能，维护金融体系安全。", "type": "multi"}, {"id": "cflue_zc_ch2.json_19", "q": "中央银行是代表一国政府（）的重要机构。", "c": {"A": "实施金融监管", "B": "发行法偿货币", "C": "制定和执行货币政策", "D": "创造利润"}, "a": "ABC", "an": "中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。", "type": "multi"}, {"id": "cflue_zc_ch2.json_20", "q": "甲客户将10000元现金存入A银行，假定法定准备金率为25%，在不考虑派生存款的情况下，A银行可用于发放贷款的最大额度是（）。", "c": {"A": "7500元", "B": "10000元", "C": "2500元", "D": "40000元"}, "a": "A", "an": "法定存款准备金，是银行吸收客户存款，上存中央银行的金额，根据题意，银行留存用于发放存款的金额=10000×（1-25%）=7500元。", "type": "single"}, {"id": "cflue_zc_ch2.json_21", "q": "标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展的是（）。", "c": {"A": "沪深两市的形成", "B": "银行业与信托业、证券业分离", "C": "国务院证券管理委员会和中国监督管理委员会成立", "D": "中国银行监督委员会成立"}, "a": "C", "an": "1992年10月，国务院证券管理委员会和中国监督管理委员会成立标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展。选项B标志着我国“分业经营，分业监管”的金融体系得以确立。选项C时间不符，选项D标志着股票市场正式运作的开始。", "type": "single"}, {"id": "cflue_zc_ch2.json_22", "q": "银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务是表内业务。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【中间业务】是银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务。中间业务包括两类，一般意义上的金融服务业务类业务和一般意义上的表外业务。中间业务不需要动用银行自己的资金，且具有收入稳定、风险程度低的特点，集中体现了商业银行的服务功能。", "type": "judge"}, {"id": "cflue_zc_ch2.json_23", "q": "目前，中国已基本形成了由（）调控和监督、国家银行为主体、政策性金融与商业性金融机构相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系。", "c": {"A": "中央银行", "B": "原中国银监会", "C": "中国证监会", "D": "财政部"}, "a": "A", "an": "目前，中国已经基本形成了由【中央银行】调控和监督、国家银行为主体、政策性金融与商业性金融相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系，并建立了与之相适应的金融监管体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_24", "q": "我国政策性银行不包括（）。", "c": {"A": "中国进出口银行", "B": "中国人民银行", "C": "国家开发银行", "D": "中国农业发展银行"}, "a": "B", "an": "中国人民银行不属于政策性银行，是“银行的银行”。", "type": "single"}, {"id": "cflue_zc_ch2.json_25", "q": "下列关于金融与实体经济关系的说法，正确的有（）。", "c": {"A": "“金融加速器”理论认为，金融市场摩擦会放大实体经济产出的影响", "B": "古典经济学家认为货币是中性的，货币供应量的变化不影响实体经济", "C": "2008年金融危机表明，金融活动本身就是经济衰退或萧条的诱因", "D": "凯恩斯认为通过利率对投资的诱导，货币能影响实体经济产出"}, "a": "ABCD", "an": "全部正确。", "type": "multi"}, {"id": "cflue_zc_ch2.json_26", "q": "央行的公开市场操作包括买卖政府债券或（）。", "c": {"A": "金融债券", "B": "公司债券", "C": "企业债券", "D": "次级债券"}, "a": "A", "an": "中央银行以公开市场操作作为政策手段，通过买卖政府债券或金融债券，影响货币供应量或利率水平，进行宏观调控。", "type": "single"}, {"id": "cflue_zc_ch2.json_27", "q": "联合国统计署按经济活动类型分类的金融中介包括（）。", "c": {"A": "辅助金融中介，如交易所、投资银行等", "B": "货币中介", "C": "中央银行及其他货币中介（主要指存款银行）", "D": "保险和养老基金（包括强制性社会保障）"}, "a": "ABC", "an": "联合国统计署按经济活动类型，把现今世界上的经济活动分成17个大类。金融中介类包括：不包含保险和养老基金的金融中介活动：货币中介；中央银行和其他货币中介（主要是指存款货币银行）的活动；其他金融中介；金融租赁以及其他如农业信贷、进出口信贷、消费信贷等专业信贷的活动。保险和养老基金（【不包括】强制性社会保障）：生命保险活动；养老基金活动；非生命保险活动。辅助金融中介的活动：金融市场组织（如证券交易所）的活动，包括投资银行、投资基金之类的证券交易活动；与金融中介有关的其他辅助活动。", "type": "multi"}, {"id": "cflue_zc_ch2.json_28", "q": "国务院金融稳定发展委员会的职责有（）。", "c": {"A": "审议金融业改革发展重大规划", "B": "统筹金融改革和发展", "C": "指导中央金融改革发展与监管", "D": "落实党中央、国务院关于金融工作的决策部署"}, "a": "ABD", "an": "国务院金融稳定发展委员会的主要职责：1、落实党中央、国务院关于金融工作的决策部署；2、审议金融业改革发展重大规划；3、统筹金融改革发展与监管，协调货币政策与金融监管相关事项，统筹协调金融监管重大事项，协调金融政策与相关财政政策、产业政策等；4、分析研判国际国内金融形势，做好国际金融风险应对，研究系统性金融风险防范处置和维护金融稳定重大政策；5、指导地方金融改革发展与监管，对金融管理部门和地方政府进行业务监督和履职问责等。", "type": "multi"}, {"id": "gw_2_1", "q": "根据《证券法》，下列关于证券服务机构法律责任和市场准入的说法，正确的有（）。", "c": {"A": "证券服务机构从事证券投资咨询服务业务，应当经国务院证券监督管理机构核准", "B": "证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当承担独立赔偿责任", "C": "会计师事务所等证券服务机构从事证券服务业务，应当报国务院证券监督管理机构和国务院有关主管部门备案", "D": "证券服务机构工作底稿的保存期限不得少于10年，自工作底稿形成之日起算"}, "a": "AC", "an": "证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与委托人承担连带赔偿责任，但是能够证明自己没有过错的除外。A错误；信息和资料的保存期限不得少于10年，自业务委托结束之日起算，B错误；故答案选CD。", "type": "m"}, {"id": "gw_2_2", "q": "按照《证券公司私募投资基金子公司管理规范》，下列说法错误的是（）。", "c": {"A": "私募基金子公司管理的闲置资金只能投资于依法公开发行的国债、央行票据等风险较低的证券", "B": "私募基金子公司管理闲置资金应当坚持有效控制风险、保证流动性的原则", "C": "私募基金子公司不得从事与私募基金无关的业务", "D": "私募基金子公司及其下设特殊目的机构可以以盈利为目的管理闲置资金"}, "a": "D", "an": "按照《证券公司私募投资基金子公司管理规范》，私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。", "type": "s"}, {"id": "gw_2_3", "q": "下列关于证券公司开展融资融券业务的说法错误的是（）。", "c": {"A": "证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金不可以证券充抵", "B": "证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例", "C": "证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面方式予以记载、保存", "D": "证券公司开展融资融券业务，必须中国证监会批准"}, "a": "AC", "an": "证券公司开展融资融券业务。证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面和电子方式予以记载、保存，故B错误。证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金可以证券充抵，故C错误。", "type": "m"}, {"id": "gw_2_4", "q": "企业年金基金按照规定不得直接投资于（）。", "c": {"A": "权证", "B": "国债", "C": "股票基金", "D": "金融债"}, "a": "A", "an": "企业年金基金按照规定不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。", "type": "s"}, {"id": "gw_2_5", "q": "证券服务机构为证券的发行、上市、交易等证券业务活动提供相关服务时，关于其法律责任，下列说法正确的有（）。", "c": {"A": "如果与被服务机构有利益冲突，只要做好防火墙即可", "B": "其出具的相关文件资料不得有虚假记载、误导性陈述或重大遗漏", "C": "如果给他人造成损失，即使能够证明自己没有过错，也必须承担带赔偿责任", "D": "若造成他人损失的，应当与发行人、上市公司承担连带赔偿责任"}, "a": "BD", "an": "证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。其制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与发行人、上市公司承担连带赔偿责任，但是，能够证明自己没有过错的除外。如果与被服务机构有利益冲突，需要建立严格的防火墙制度与业务隔离制度，有效执行信息隔离等内部控制制度，切实防范利益输送。", "type": "m"}, {"id": "cflue_zc_ch3.json_1", "q": "合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过基金形式募集一定额度的人民币资金。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过【基金】形式募集一定额度的人民币资金。", "type": "judge"}, {"id": "cflue_zc_ch3.json_2", "q": "国务院证券监督管理机构依法履行职责，有权对（）进行现场检查。", "c": {"A": "证券交易所", "B": "上市公司", "C": "证券发行人", "D": "证券登记结算机构"}, "a": "ABCD", "an": "中国证监会有权对证券发行人、上市公司、证券公司、证券投资基金管理公司、证券服务机构（资产评估机构和资信评级机构属于证券服务机构。）、证券交易所、证券登记结算机构进行现场检查。", "type": "multi"}, {"id": "cflue_zc_ch3.json_3", "q": "证券公司为期货公司介绍客户时，应当（）。", "c": {"A": "向客户作获利保证、共担风险等承诺", "B": "不得向客户虚假宣传、误导客户", "C": "向客户解释期货交易的方式、流程及风险", "D": "向客户明示其与期货公司的介绍业务委托关系"}, "a": "BCD", "an": "证券公司为期货公司介绍客户时，应当向客户明示其与期货公司的介绍业务委托关系，解释期货交易的方式、流程及风险，不得作获利保证、共担风险等承诺，不得向客户虚假宣传、误导客户。", "type": "multi"}, {"id": "cflue_zc_ch3.json_4", "q": "我国对合格境外投资者机构汇出汇入资金的规定有（）。", "c": {"A": "合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出口头解释", "B": "已批准额度和实际汇入金额的差额，在未经国家外汇局批准之前不得汇入", "C": "合格境外投资者应当在国家外汇管理局规定的时间内汇入本金", "D": "汇入的本金应当是国家外汇局批准的可兑换货币"}, "a": "BCD", "an": "合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出【书面】解释。", "type": "multi"}, {"id": "cflue_zc_ch3.json_5", "q": "负责证券投资者保护基金筹集、管理和使用的是（）。", "c": {"A": "社保基金理事会", "B": "中国证券投资者保护基金有限责任公司", "C": "证券投资基金", "D": "中国证券登记结算机构"}, "a": "B", "an": "证券投资者保护基金公司负责保护基金筹集、管理和使用。", "type": "single"}, {"id": "cflue_zc_ch3.json_6", "q": "政府机构类投资者参与证券投资的主要目的有（）。", "c": {"A": "提高资金收益率", "B": "调剂资金余缺", "C": "实行特定产业政策", "D": "实施宏观调控"}, "a": "BCD", "an": "政府机构类投资者，是指进行证券投资的政府机构。政府机构类投资者的特点是，通常很少考虑盈利，参与证券投资的目的主要是为了调剂资金余缺、实施宏观调控、实行特定产业政策等要求。", "type": "multi"}, {"id": "cflue_zc_ch3.json_7", "q": "理事会是证券交易所的决策机构，其行使的职权包括（）。", "c": {"A": "选举和罢免会员理事", "B": "审定总经理提出的工作计划", "C": "审定证券交易所业务规则", "D": "召集会员大会，并向会员大会报告工作"}, "a": "BCD", "an": "理事会是证券交易所的决策机构，行使下列职权：1、召集会员大会，并向会员大会报告工作；2、执行会员大会的决议；3、审定总经理提出的工作计划；4、审定总经理提出的年度财务预算、决算方案；5、审定对会员的接纳和退出；6、审定取消会员资格的纪律处分；7、审定证券交易所业务规则；8、审定证券交易所上市新的证券交易品种或者对现有上市证券交易品种作出较大调整；9、审定证券交易所收费项目、收费标准及收费调整程序；10、审定证券交易所重大财务管理事项；11、审定证券交易所重大风险管理和处置事项，管理证券交易所风险基金；12、审定重大投资者教育和保护工作事项；13、决定高级管理人员的聘任、解聘及薪酬事项，但中国证监会任免的除外；14、会员大会授予和证券交易所章程规定的其他职权。", "type": "multi"}, {"id": "cflue_zc_ch3.json_8", "q": "私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的20%。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的【20%】。", "type": "judge"}, {"id": "cflue_zc_ch3.json_9", "q": "根据《证券交易所管理办法》，下列关于证券交易所职能的说法，正确的有（）。", "c": {"A": "审核、安排证券上市交易", "B": "对首次公开发行股票网下投资者进行注册和自律管理", "C": "依法审核公开发行证券申请", "D": "决定证券终止和重新上市"}, "a": "ACD", "an": "D属于根据《注册制下首次公开发行股票网下投资者管理规则》，担任科创板、创业板首发股票主承销商的证券公司的职责。故选ABC。", "type": "multi"}, {"id": "cflue_zc_ch3.json_10", "q": "全国社会保障基金理事会投资运行全国社会保障基金，应当坚待的原则包括（）。", "c": {"A": "长期性", "B": "收益性", "C": "安全性", "D": "谨慎性"}, "a": "ABC", "an": "按照《全国社会保障基金条例》规定，全国社会保障基金理事会投资运行全国社会保障基金，应当坚待【安全性、收益性和长期性】原则。", "type": "multi"}, {"id": "cflue_zc_ch3.json_13", "q": "政府作为债券发行的重要主体之一，所筹集的资金可以用来（）。", "c": {"A": "兴建大型基础设施项目", "B": "弥补战争费用", "C": "协调财政资金短期周转，弥补财政赤字", "D": "实施某项特殊政策"}, "a": "ABCD", "an": "政府发行债券所筹集的资金既可以用于协调财政资金短期周转、弥补财政赤字、兴建政府投资的大型基础性的建设项目，也可以用于实施某种特殊的政策，可以用于弥补战争费用的开支。", "type": "multi"}, {"id": "cflue_zc_ch3.json_14", "q": "会员大会可以行使的职能不包括（）。", "c": {"A": "管理人员的聘任、解聘及薪酬事项", "B": "审议和通过理事会、监事会和总经理的工作报告", "C": "选举和罢免会员理事、会员监事", "D": "制定和修改证券交易所章程"}, "a": "A", "an": "会员大会可以行使的职能有制定和修改证券交易所章程；选举和罢免会员理事、会员监事；审议和通过理事会、监事会和总经理的工作报告；审议和通过证券交易所的财务预算、决算报告；法律、行政法规、部门规章和证券交易所章程规定的其他重大事项。", "type": "single"}, {"id": "cflue_zc_ch3.json_15", "q": "证券金融公司应当按照国家宏观政策，根据市场状况和风险控制需要，确定和调整（）。", "c": {"A": "保证金比例", "B": "担保金比例", "C": "转融通资金率", "D": "转融通费率"}, "a": "AD", "an": "证券金融公司可根据市场状况和风险控制需要，确定和调整【转融通费率和保证金的比例】。", "type": "multi"}, {"id": "cflue_zc_ch3.json_16", "q": "根据《中华人民共和国保险法》，保险公司资金运用范围包括（）。", "c": {"A": "债券", "B": "不动产", "C": "股票", "D": "基金"}, "a": "ABCD", "an": "保险资金运用限于下列形式：1.银行存款；2.买卖债券、股票、证券投资基金份额等有价证券；3.资金不动产；4.国务院规定的其他资金运用形式。", "type": "multi"}, {"id": "cflue_zc_ch3.json_17", "q": "2019年9月10日，国家外汇管理局决定取消合格境外投资者和人民币合格境外投资者投资额度限制，包括（）。", "c": {"A": "RQFII试点国家和地区限制也一并取消", "B": "取消QFII投资额度限制", "C": "明确不再对单家合格境外投资者的投资额度进行备案和审批", "D": "投资范围由交易所市场金融工具扩展到银行间债券市场"}, "a": "ABC", "an": "国家外汇管理局决定取消合格境外机构投资者和人民币合格境外机构投资者投资额度限制。包括：一是取消QFII和RQFII投资额度限制；二是明确不再对单家合格境外投资者的投资额度进行备案和审批；三是此次取消合格境外投资者投资额度限制时，RQFII试点国家和地区限制也一并取消。", "type": "multi"}, {"id": "cflue_zc_ch3.json_18", "q": "《证券期货投资者适当性管理办法》的实施对我国金融市场具有很重要的意义，从根本上体现了经营机构和投资者利益的辩证统一，下列说法正确的有（）。", "c": {"A": "对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证", "B": "该管理办法要求对投资者进行分类评估和分类管理，为经营机构提供标准化服务奠定了基础", "C": "该管理办法同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制", "D": "该管理办法要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配"}, "a": "ACD", "an": "《证券期货投资者适当性管理办法》从根本上体现经营机构和投资者利益的辩证统一。从投资者角度来看，该管理办法将投资者分为专业投资者和普通投资者，要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配，同时在销售和服务过程中，对普通投资者实行有别于专业投资者的告知和风险警示义务。对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证。从经营机构角度来看，该管理办法要求经营机构对投资进行分类评估和分类管理，为经营机构提供【差异化】服务奠定了基础，同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制。", "type": "multi"}, {"id": "cflue_zc_ch3.json_19", "q": "下面对于证券市场融资活动特征的描述正确的有（）。", "c": {"A": "是一种间接融资活动", "B": "是在由各种证券中介机构组成的证券中介服务体系的支持下完成的", "C": "促成证券发行买卖的中介机构自身可以充当权利义务主体", "D": "是一种强市场性的融资活动"}, "a": "BD", "an": "资金赤字单位和盈余单位直接接触，形成直接的权利和义务关系，而没有另外的权利义务主体介入其中。促成证券发行买卖的中介机构，如证券公司等自身不充当权利义务主体，是连接赤字单位和盈余单位的服务性媒介，证券市场融资是一种直接融资。", "type": "multi"}, {"id": "cflue_zc_ch3.json_20", "q": "不具备证券自营业务资格的证券公司，其自有资金只能以（）为目的，参与国债期货交易。", "c": {"A": "利益输送", "B": "增加流动性", "C": "套期保值", "D": "活跃证券市场"}, "a": "C", "an": "2013年8月，中国证监会制定并发布《证券公司参与股指期货、国债期货交易指引》，规定证券公司以自有资金或受托管理资金参与股指期货、国债期货交易；不具备证券自营业务资格的证券公司，其自有资金只能以【套期保值】为目的，参与国债期货交易。", "type": "single"}, {"id": "cflue_zc_ch3.json_21", "q": "我国基金类投资者包括（）。", "c": {"A": "产业基金", "B": "社保基金", "C": "社会公益基金", "D": "企业年金"}, "a": "BCD", "an": "基金类投资者包括证券投资基金、社保基金、企业年金和社会公益基金。", "type": "multi"}, {"id": "cflue_zc_ch3.json_22", "q": "根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。下列说法错误的是（）。", "c": {"A": "证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等", "B": "拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续", "C": "在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，仍可继续投资股指期货、国债期货", "D": "在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项"}, "a": "C", "an": "根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。（1）在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项。证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等。（2）在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，原则上不得投资股指期货、国债期货。拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续。", "type": "single"}, {"id": "cflue_zc_ch3.json_23", "q": "（）一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性事件时使用。", "c": {"A": "市场手段", "B": "法律手段", "C": "经济手段", "D": "行政手段"}, "a": "D", "an": "【行政手段】是通过制订计划、政策等对证券市场进行行政性的干预。这种手段比较直接，但运用不当可能违背市场规律，无法发挥作用甚至遭到惩罚。一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性时间时使用。", "type": "single"}, {"id": "cflue_zc_ch3.json_24", "q": "关于证券经纪业务的表述正确的是（）。", "c": {"A": "经纪关系的建立形成实质上的委托关系", "B": "我国证券公司从事的证券经纪业务以证券公司的柜台代理买卖证券业务为主", "C": "经纪委托关系的建立表现为开户和委托两个环节", "D": "不可以通过证券交易所代理买卖证券业务"}, "a": "C", "an": "证券经纪业务分为柜台代理买卖证券业务和通过证券交易所代理买卖证券业务。我国证券公司从事的证券经纪业务以通过证券交易所代理买卖证券业务为主。在证券经纪业务中，经纪委托关系的建立表现为开户和委托两个环节。经纪关系的建立只是确立了投资者和证券公司直接的代理关系，还没有形成实质上的委托关系。", "type": "single"}, {"id": "cflue_zc_ch3.json_25", "q": "按照《证券公司私募投资基金子公司管理规范》，下列说法正确的是（）。", "c": {"A": "私募基金子公司管理的闲置资金只能投资于风险较低的证券", "B": "私募基金子公司管理的闲置资金只能投资于流动性较弱的证券", "C": "私募基金子公司及其下设特殊目的机构可以以任何合法目的管理闲置资金", "D": "私募基金子公司从事P2P平台网贷的业务"}, "a": "A", "an": "按照《证券公司私募投资基金子公司管理规范》，私募基金子公司不得从事与私募基金无关的业务。私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。", "type": "single"}, {"id": "gw_3_1", "q": "首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%，然后根据剩余报价及拟申购数量协商确定发行价格。剔除部分不得参与网下申购。", "type": "j"}, {"id": "gw_3_2", "q": "根据《上海证券交易所科创板股票交易特别规定》，下列关于投资者开通科创板股票交易权限应符合条件的说法，错误的有（）。", "c": {"A": "个人投资者申请开通科创板权限，需要参与证券交易24个月以上", "B": "个人投资者申请科创板权限开通前20个交易日证券账户及资金账户内的资产日均不低于人民币30万元（不包含该投资者通过融资融券融入的资金和证券）", "C": "机构投资者不能参与科创板股票交易", "D": "机构投资者参与科创板股票交易，应当符合法律法规及上海交易所业务规则的规定"}, "a": "BC", "an": "个人投资者开通科创板股票交易权限的，应当符合下列条件：（1）申请权限开通前20个交易日证券账户及资金账户内的资产日均不低于人民币【50万元】（不包括该投资者通过融资融券融入的资金和证券）；（2）参与证券交易24个月以上；（3）上海证券交易所规定的其他条件。机构投资者参与科创板股票交易，应当符合法律法规及上海证券交易所业务规则的规定。", "type": "m"}, {"id": "cflue_zc_ch4a.json_1", "q": "甲公司公开发行股票5亿股，有效报价投资者的数量最少为10家。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公开发行股票数量在4亿股（含）以下的，有效报价投资者的数量不少于10家；公开发行股票数量在【4亿股以上】的，有效报价投资者的数量不少于20家。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_2", "q": "境内上市外资股又被称为B股。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "境内上市外资股，是指在中国境内注册的股份有限公司向境内外投资者发行并在中国境内证券交易所上市，以人民币标明其面值，以外币认购、交易和结算的股份。境内上市外资股又被称为“B股”。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_3", "q": "与股份公司股利政策密切相关的日期有（）。", "c": {"A": "股权登记日", "B": "公司半年报公布日", "C": "除权除息日", "D": "派息日"}, "a": "ACD", "an": "与股份公司股利政策密切相关的日期有：1、除权除息日；2、派息日；3、股利宣布日；4、股权登记日。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_4", "q": "普通股的红利是不固定的，它取决于股份公司的（）。", "c": {"A": "股票市值", "B": "盈利水平", "C": "经营状况", "D": "股票面值"}, "a": "BC", "an": "认购股票后，公司派发的股息、红利数量取决于股份公司的【经营状况】和【盈利水平】。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_5", "q": "股票的特征包括（）。", "c": {"A": "收益性", "B": "参与性", "C": "流动性", "D": "永久性"}, "a": "ABCD", "an": "股票的特征：收益性、风险性、流动性、永久性、参与性。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_6", "q": "深圳证券交易所规定，首个交易日无价格涨跌幅限制的情形有（）。", "c": {"A": "配股上市的股票", "B": "增发上市的股票", "C": "暂停上市后恢复上市的股票", "D": "首次公开发行上市的股票"}, "a": "CD", "an": "深圳证券交易所规定，属于下列情形之一的，股票上市首日不实行价格涨跌幅限制：首次公开发行股票上市的；暂停上市后恢复上市的；中国证监会或深圳证券交易所认定的其他情形。故AB正确。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_8", "q": "北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。", "c": {"A": "最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告", "B": "最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）", "C": "具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形", "D": "最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"}, "a": "BCD", "an": "C属于是向【不特定】合格投资者发行时需要符合的条件。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_9", "q": "丙公司是一家大型国有石油公司，2018年3月，该公司投资1亿元入股甲公司，甲公司为国家扶持的专项高科技公司，成长迅速，则该丙公司的股份为（）。", "c": {"A": "国家股", "B": "政策股", "C": "内资股", "D": "法人股"}, "a": "D", "an": "国家股定义：有权代表国家投资的部门或机构以国有资产向公司投资形成的股份，与国有法人股投资主体不同，具有法人资格的国有企业使用法人资产向独立于自己的股份公司出资属于“国有法人股”，是“法人股”的一种。", "type": "single"}, {"id": "cflue_zc_ch4a.json_10", "q": "股票实质上代表了股东对股份公司净资产的所有权，股东凭借股票可以获得公司的（）。", "c": {"A": "等额资金", "B": "红利", "C": "股息", "D": "等额资本"}, "a": "BC", "an": "股票实质上代表了股东对股份公司净资产的所有权，这种所有权是一种综合权利，股东凭借股票可以获得公司的【股息和红利】，参加股东大会并行使自己投票表决、参与公司重大决策等权利，同时也承担相应的责任与风险。故BC正确。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_11", "q": "关于普通股股东义务，下列说法正确的有（）。", "c": {"A": "如违反相关规定，给公司造成损失的，应当承担赔偿责任", "B": "公司的控股股东、实际控制人不得利用其关联关系损害公司利益", "C": "公司股东滥用法人独立地位和股东有限责任逃避责任，严重损害公司债权人利益的，应当对公司债务承担连带责任", "D": "公司股东滥用股东权利给公司或者其他股东造成损失的，可以申请豁免承担赔偿责任"}, "a": "ABC", "an": "股东应当遵守法律、行政法规和公司章程，依法行使股东权利，不得滥用股东权利损害公司或者其他股东的利益；不得滥用公司法人独立地位和股东有限责任损害公司债权人的利益。公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司股东滥用公司法人独立地位和股东有限责任，逃避债务，严重损害公司债权人利益的，应当对公司债务承担连带责任。公司的控股股东、实际控制人不得利用其关联关系损害公司利益，由此给公司造成损失的，应当承担赔偿责任。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_12", "q": "上市公司出现下列描述的情形中，属于可以向证券交易所申请主动退市的有（）。", "c": {"A": "上市公司被法院宣告破产", "B": "上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销", "C": "上市公司股东大会决议主动撤回其股票在证券交易所的交易，并决定不在该交易所交易", "D": "上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件"}, "a": "BCD", "an": "关于主动申请退市的法定情形：1、上市公司股东大会决议主动撤回其股票在本所的交易，并决定不再在交易所交易；2、上市公司股东大会决议主动撤回其股票在本所的交易，并转而申请在其他交易场所交易或转让；3、上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；4、上市公司股东向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；5、除上市公司股东外的其他人向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；6、上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销；7、上市公司股东大会决议公司解散。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_13", "q": "无限售条件股份是指流通转让不受限制的股份，具体包括（）。", "c": {"A": "境外上市外资股", "B": "境内上市外资股", "C": "人民币普通股", "D": "国有法人股"}, "a": "ABC", "an": "无限售条件股份是指流通转让不受限制的股份。具体包括：1、人民币普通股，即A股，含向社会公开发行股票时向公司职工配售的公司职工股。2、境内上市外资股，即B股。3、境外上市外资股，即在境外证券市场上市的普通股，如H股。4、其他。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_14", "q": "我国境外上市外资股主要由（）等构成。", "c": {"A": "N股", "B": "B股", "C": "S股", "D": "H股"}, "a": "ACD", "an": "境外上市外资股主要由H股（香港）、N股（纽约）、S股（新加坡）、L股（伦敦）等构成。B股属于境内上市外资股。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_15", "q": "关于优先股，下列说法正确的是（）。", "c": {"A": "优先股股息可税前扣除，减轻企业税负", "B": "优先股股东享有与普通股股东相同的决策权力", "C": "优先股股息收益并不总是高于普通股", "D": "优先股二级市场价格波动大，适合投机交易"}, "a": "C", "an": "优先股收入较稳定适合中长线投资；优先股股息不可税前扣除；优先股股东的经营决策受限；当公司盈利丰厚的情况下，优先股的股息可能会大大低于普通股。", "type": "single"}, {"id": "cflue_zc_ch4a.json_16", "q": "公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购新股的方式，按老股一般配售若干新股，以保护原股东的权益及其对公司控制权的是定向增发。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【配股】是公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购股份的方式。即按老股一股配售若干新股，以保护原股东的权益及其对公司的控制权。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_17", "q": "公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_18", "q": "下列有关优先股票的说法，正确的有（）。", "c": {"A": "相对于普通股的权利，优先股股东的权利都是优先的", "B": "优先股和普通股一样，拥有对公司的所有权", "C": "优先股的股息率一般在发行时事先固定", "D": "优先股兼有债券的特点"}, "a": "BCD", "an": "相对于普通股的权利，优先股股东在股息的分配和剩余财产的索取上，是优先的，但优先股股东对公司日常经营管理的一般事项没有表决权，而普通股股东是有表决权的。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_19", "q": "根据《公司法》，公司不得收购本公司股份，但是有下列情形之一的除外（）。", "c": {"A": "与持有本公司股份的其他公司合并", "B": "将股份奖励给本公司职工", "C": "股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份", "D": "减少公司注册资本"}, "a": "ABCD", "an": "公司不得收购本公司股份。但是，有下列情形之一的除外：&amp;lt;br&amp;gt;1、减少公司注册资本；&amp;lt;br&amp;gt;2、与持有本公司股份的其他公司合并；&amp;lt;br&amp;gt;3、将股份用于员工持股计划或者股权激励；&amp;lt;br&amp;gt;4、股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份；&amp;lt;br&amp;gt;5、将股份用于转换上市公司发行的可转换为股票的公司债券；&amp;lt;br&amp;gt;6、上市公司为维护公司价值及股东权益所必需。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_20", "q": "首次公开发行股票采用询价方式定价的说法中，错误的是（）。", "c": {"A": "网下投资者不得协商报价", "B": "网下机构和个人投资者可以自主决定是否报价", "C": "网下投资者的报价应当包含每股价格和该价格对应的拟申购股数", "D": "网下投资者应当给出三个不同报价供主承销商参考"}, "a": "D", "an": "B选项说法错误，网下投资者只能有一个报价。", "type": "single"}, {"id": "cflue_zc_ch4a.json_21", "q": "下列（）股份变动不会影响每位股东所持股东权益占公司全部股东权益的比重。", "c": {"A": "增发股票", "B": "股份分割与合并", "C": "股份回购", "D": "资本公积转增股本"}, "a": "BCD", "an": "股份回购是公司利用自有资金购买，不影响公司内部股东份额占比；增发股票在通常情况下，由于可能有除原股东之外的其他人购入股票，或原股东并不按原持有份额比例购入相应比例的股票，极可能导致该比重的变化；资本公积、股票的分割与合并不影响每位股东占公司股份比例。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_22", "q": "在上市公司增资发行方式中，公司发行可转换债券的主要动因是保护原股东的权益及其对公司的控制权。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "可转换公司债券是指其持有者可以在一定时期内按一定比例或价格将之转换成一定数量的另一种证券的证券，通常转化为普通股票，公司发行可转换债券的主要动因是为了【增强证券对投资者的吸引力，能以较低的成本筹集到所需要的资金】。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_23", "q": "甲公司由于经营不善，连年亏损，已连续3年年未能按约分配股息，则持有优先股的股东当年所持每一股优先股的表决权相当于（）股的普通股的表决权。", "c": {"A": "1", "B": "二分之一", "C": "0", "D": "三分之二"}, "a": "A", "an": "公司长期未按约定分配股息，优先股股东恢复到与普通股股东相同的表决权。", "type": "single"}, {"id": "cflue_zc_ch4a.json_24", "q": "根据我国《上市公司证券发行管理办法》规定，不属于上市公司再融资方式的是（）。", "c": {"A": "非公开发行股票", "B": "向原股东配售股份", "C": "发行可转换公司债券", "D": "发行可交换公司债券"}, "a": "D", "an": "我国上市公司再融资的方式主要包括配股、公开增发、非公开发行、可转换公司债券、优先股、公司债券、企业资产证券化等。", "type": "single"}, {"id": "cflue_zc_ch4a.json_25", "q": "上市公司强制退市的原因包括（）。", "c": {"A": "股权分布不合理", "B": "交投不活跃", "C": "存在严重违法违规行为", "D": "市值过低而不再适合公开交易"}, "a": "ABCD", "an": "依照规则要求交投不活跃、股权分布不合理、市值过低而不再适合公开交易的股票应终止交易，特别是对于存在严重违法违规行为的公司，证券交易所可以依法强制其股票退出市场交易。故答案选ABCD。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_26", "q": "下列不属于境外上市外资股的特点的是（）。", "c": {"A": "公司支付股利时以外币计价", "B": "人民币标明股票面值", "C": "记名股票", "D": "外币认购买卖"}, "a": "A", "an": "境外上市外资股，公司向境外上市外资股股东支付股利及其他款项，以【人民币】计价和宣布，以外币支付。", "type": "single"}, {"id": "cflue_zc_ch4a.json_27", "q": "上市公司发生下列（）情形，应当被强制退市。", "c": {"A": "法定期限届满后，上市公司在证券交易所规定的期限内未能披露半年度报告", "B": "上市公司在证券交易所规定期限内，未改正财务会计报告中的重大错报", "C": "上市公司社会公众持股比例不足25%，或者公司股本总额超过人民币4亿元，社会公众持股比例不足公司股份总数的10%", "D": "上市公司连续10个交易日（不含停牌交易日）每日股票收盘价均低于股票面值"}, "a": "ABC", "an": "上市公司发生被强制退市的情形。上市公司连续【20个交易日】（不含停牌交易日）每日股票收盘价均低于股票面值，会被强制退市。", "type": "multi"}, {"id": "gw_4_1", "q": "下列关于证券公司债券的说法，正确的有（）。", "c": {"A": "非公开发行的公司债券仅限于合格投资者范围内转让", "B": "非公开发行的证券公司债券，每次发行对象不得超过二百人", "C": "对证券公司债券发行有强制性担保要求", "D": "证券公司债券公开发行的利率由询价或公开招标等市场化方式确定"}, "a": "ABD", "an": "对证券公司债券发行没有强制性担保要求，D错误。", "type": "m"}, {"id": "gw_4_2", "q": "下列关于商业银行次级债券的说法，正确的有（）。", "c": {"A": "不属于金融债券", "B": "本金和利息的清偿顺序列于商业银行的股权资本之后", "C": "由商业银行发行", "D": "本金和利息的清偿顺序列于商业银行其他负债之后"}, "a": "CD", "an": "商业银行次级债券是指商业银行发行的、本金和利息的清偿顺序列于商业银行其他负债之后、先于商业银行股权资本的债券。属于金融债券的一种。", "type": "m"}, {"id": "cflue_zc_ch5a.json_1", "q": "下列关于流通国债的特征，说法错误的是（）。", "c": {"A": "转让价格取决于对该国债的供给与需求", "B": "通常记名", "C": "投资者可以自由认购", "D": "投资者可以自由转让"}, "a": "B", "an": "流通国债的特征有：投资者可以自由认购、自由转让、通常不记名、转让价格取决于对该国债的供给与需求。", "type": "single"}, {"id": "cflue_zc_ch5a.json_2", "q": "下列关于外国债券的说法，正确的是（）。", "c": {"A": "它的特点是债券发行人和面值货币属于同一个国家", "B": "在英国发行以英镑计价的外国债券被称为“扬基债券”", "C": "在中国发行的以人民币计价的外国债券被称为“熊猫债券”", "D": "是借款人在本国以外的某一国家发行以本国货币为面值的债券"}, "a": "C", "an": "外国债券是指某一国家借款人在本国以外的某一国家发行以该国货币为面值的债券。它的特点是债券发行人属于一个国家，债券的面值货币和发行市场属于另一个国家。如在英国发行以英镑计价的外国债券被称为“猛犬债券”。", "type": "single"}, {"id": "cflue_zc_ch5a.json_3", "q": "下列关于债券的说法，错误的是（）。", "c": {"A": "实物债券是一种具有标准格式实物券面的债券", "B": "凭证式债券是由债券发行人制定的标准格式的债券", "C": "我国的凭证式国债券面上不印刷票面金额", "D": "发行人可以利用证券交易所的交易系统发行记账式债券"}, "a": "B", "an": "凭证式债券的形式是债权人认购债券的一种收款凭证，而不是债券发行人制定的标准格式的债券。故A说法错误。", "type": "single"}, {"id": "cflue_zc_ch5a.json_4", "q": "（）是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。", "c": {"A": "商业银行金融债券", "B": "商业银行一般债券", "C": "商业银行次级债券", "D": "商业银行资本补充债券"}, "a": "D", "an": "【商业银行资本补充债券】是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_5", "q": "关于储蓄国债（电子式）的说法中，错误的是（）", "c": {"A": "收益安全稳定，由财政部负责还本付息，免缴利息税", "B": "付息方式较为多样", "C": "采用实名制，不可流通转让", "D": "针对个人投资者，同时也向机构投资者发行"}, "a": "D", "an": "储蓄国债（电子式）是2006年推出的国债新品种，其特点：针对个人投资者，不向机构投资者发行；采用实名制，不可流通转让；收益安全稳定，由财政部负责还本付息，免缴利息税；鼓励持有到期，手续简化；付息方式较为多样", "type": "single"}, {"id": "cflue_zc_ch5a.json_6", "q": "下列属于金融债券品种的有（）。", "c": {"A": "证券公司债券", "B": "政策性金融债券", "C": "保险公司次级债", "D": "商业银行债券"}, "a": "ABCD", "an": "我国金融债券品种包括：政策性金融债券、商业银行债券、证券公司债券、保险公司次级债务、财务公司债券、金融租赁公司和汽车金融公司的金融债券。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_7", "q": "债券与股票的不同之处包括（）。", "c": {"A": "期限不同", "B": "收益不同", "C": "目的不同", "D": "权利不同"}, "a": "ABCD", "an": "债券与股票的区别：权利不同；目的不同；主体不同；期限不同；收益不同；风险不同。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_8", "q": "资产证券化运作流程中，发起人的职责不包括（）。", "c": {"A": "根据证券化目标确定资产数，并将资产汇集形成资产池", "B": "判断组合的现金流水平，并决定借款人信用、抵押担保贷款的抵押价值", "C": "根据自身的资产证券化融资要求，确定资产证券化目标", "D": "与银行达成必要时提供流动性支持的周转协议，与券商达成承销协议"}, "a": "D", "an": "发起人（一般是发放贷款的金融机构，也被称为原始权益人）根据自身的资产证券化融资要求，确定资产证券化目标，对自己拥有的能够产生未来现金收入流的信贷资产进行清理、估算和考核，根据历史经验数据对整个组合的现金流的平均水平有一个基本判断，决定借款人信用、抵押担保贷款的抵押价值等；并将应收和可预见现金流资产进行组合，对现金流的重组可按贷款的期限结构、本金和利息的重新安排或风险的重新分配等进行，根据证券化目标确定资产数，最后将这些资产汇集形成一个资产池。C选项是特设信托机构的职责。", "type": "single"}, {"id": "cflue_zc_ch5a.json_9", "q": "下列关于欧洲债券的说法中有误的是（）。", "c": {"A": "大多数欧洲债券是以美元为面值发行的", "B": "欧洲债券不可以在欧洲以外的国家发行", "C": "由于这种发行方式最早出现在欧洲，故被称为欧洲债券", "D": "指在本国境外市场发行的、不以发行市场所在国货币为面值的国际债券"}, "a": "B", "an": "欧洲债券可以在欧洲以外的国家发行，同时其发行面值也可以以欧元之外的其他货币来表示。", "type": "single"}, {"id": "cflue_zc_ch5a.json_10", "q": "根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为（）。", "c": {"A": "离岸资产证券化", "B": "在岸资产证券化", "C": "境内资产证券化", "D": "境外资产证券化"}, "a": "AC", "an": "根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为境内资产证券化和离岸资产证券化。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_12", "q": "下列关于国债按资金用途分类，说法正确的有（）。", "c": {"A": "特种国债是指政府为了实施某种特殊政策而发行的国债", "B": "战争国债专指用于弥补战争费用的国债", "C": "建设国债是指发债筹措的资金用于建设项目的国债", "D": "赤字国债是指用于弥补政府预算赤字的国债"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_13", "q": "小王报名参加了今年的证券从业资格考试，在复习《金融市场基础知识》的时候，对政府债券的有关知识出现了疑惑。请帮他选出下列有关政府债券的说法中，不正确的说法是（）。", "c": {"A": "国债的利息收入可免纳个人所得税", "B": "在各类债券中，政府债券的信用等级并非最高", "C": "购买政府债券，是一种较安全的投资选择", "D": "发达的二级市场为政府债券的转让提供了方便，使其流通性大大增强"}, "a": "B", "an": "在各类债券中，政府债券的信用等级是最高的。", "type": "single"}, {"id": "cflue_zc_ch5a.json_14", "q": "根据付息方式不同，国债可分为（）。", "c": {"A": "特种国债", "B": "长期国债", "C": "附息国债", "D": "贴现国债"}, "a": "CD", "an": "按付息方式分类，国债分为贴现国债和附息国债。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_15", "q": "根据我国财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的，约定一定期限内主要以（）还本付息的政府债券。", "c": {"A": "中央政府收入", "B": "专项收入", "C": "金融机构收入", "D": "政府性基金"}, "a": "BD", "an": "根据财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的、约定一定期限内以公益性项目对应的【政府性基金或专项收入】还本付息的政府债券。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_16", "q": "地方政府债券按资金用途和偿还资金来源不同可以分为普通债券、特种债券。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "地方政府债券按资金用途和偿还资金来源不同，通常可以分为一般债券（普通债券）和专项债券（收入债券）。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_17", "q": "按信用状况，债券可以分为（）和（）。", "c": {"A": "企业债；政府债", "B": "普通公司债；可转换公司债", "C": "国债；地方政府债", "D": "利率债；信用债"}, "a": "D", "an": "按信用状况，债券可以分为利率债和信用债，在我国，狭义的利率债包括国债和地方政府债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_18", "q": "规定了票面利率、在到期时一次性获得本息、存续期间没有利息支付的债券，称之为附息债券。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据债券发行条款中是否规定在约定期限向债券持有人支付利息，债券可分为贴现债券、附息债券、息票累积债券三类。其中，息票累积债券规定了票面利率，但是，债券持有人必须在债券到期时一次性获得本息，存续期间没有利息支付。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_19", "q": "可交换债券与可转换公司债券的相同之处有（）。", "c": {"A": "投资价值与上市公司价值无关", "B": "发行要素相似", "C": "都包括票面利率、期限、转股价格和转股比率、转股期限等", "D": "在约定期限内都可以以约定的价格交换为标的股票"}, "a": "BCD", "an": "对投资者来说，可交换债券与持有标的上市公司的可转换公司债券相同，投资价值与上市公司价值相关，在约定期限内可以以约定的价格交换为标的的股票。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_20", "q": "与国内债券相比，国际债券具有（）等特点。", "c": {"A": "发行规模大", "B": "存在汇率风险", "C": "存在信用风险", "D": "资金来源广"}, "a": "ABD", "an": "与国内债券相比，国际债券具有：&amp;lt;br&amp;gt;1、资金来源广、发行规模大；&amp;lt;br&amp;gt;2、存在汇率风险；&amp;lt;br&amp;gt;3、有国家主权保障；&amp;lt;br&amp;gt;4、以自由兑换货币作为计量货币。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_21", "q": "以下（）不是我国其他类型国债的种类。", "c": {"A": "保值债券", "B": "普通债券", "C": "财政债券", "D": "国家重点建设债券"}, "a": "B", "an": "我国其他类型国债的种类有：国家重点建设债券、国家建设债券、财政债券、特种债券、保值债券、基本建设债券、特别国债、长期建设国债。", "type": "single"}, {"id": "cflue_zc_ch5a.json_22", "q": "传统的证券发行是以企业为基础，而资产证券化是以特定的资产池为基础发行证券。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "资产证券化是以【特定资产组合或特定现金流】为支持，发行可交易证券的一种融资形式。传统的证券发行是以【企业】为基础，而资产证券化是以【特定的资产池】为基础发行证券。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_23", "q": "有关私募债券的发行对象，说法有误的是（）。", "c": {"A": "私募债券募集对象为有限数量的专业投资机构", "B": "私募公司债的发行对象为合格投资者", "C": "私募债券可以采取公开制度向合格投资者发行债券", "D": "私募公司债每次发行对象不得超过200人"}, "a": "C", "an": "私募债券采取【非公开制度】向合格投资者发行债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_24", "q": "通常，零息债券以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "根据债券发行条款中是否规定在约定期限向债券持有入支付利息，债券可分为零息债券、附息债券和息票累积债券。其中，【零息债券】以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_25", "q": "下列关于债券的说法，正确的有（）。", "c": {"A": "零息债券发行价高于票面面值", "B": "债券估值的基本原理就是现金流贴现", "C": "附息债券可以视为一组零息债券的组合", "D": "累息债券可以视为面值等于到期还本付息额的零息债券"}, "a": "BCD", "an": "零息债券发行价【低于】票面面值，B错误。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_26", "q": "地方政府债券是地方政府根据本地区（）状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。", "c": {"A": "财政预算", "B": "经济发展", "C": "社会保障", "D": "资金需求"}, "a": "BD", "an": "地方政府根据本地区【经济发展和资金需求】状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_27", "q": "关于利率债和信用债，下列说法有误的是（）。", "c": {"A": "信用债券与政府债券相比最显著的差异是发行期限不同", "B": "信用债比国债有着更高的收益", "C": "正常情况下，利率债的信用风险较大", "D": "利率债可能出现本息兑付延期乃至实质性违约的情况"}, "a": "AC", "an": "由于有政府信用背书，正常情况下利率债的信用风险很小，但不一定对于信用违约绝对“免疫”，也可能出现本息兑付延期乃至实质性违约的情况。信用债券与政府债券相比最显著的差异就是存在信用风险。", "type": "multi"}, {"id": "gw_5_1", "q": "私募基金运行期间，信息披露义务人应当在每季度结束之日起（）个工作日以内向投资者披露基金净值、主要财务指标以及投资组合情况等信息。", "c": {"A": "15", "B": "5", "C": "7", "D": "10"}, "a": "D", "an": "私募基金运行期间，信息披露义务人应当在每季度结束之日起【10个工作日以内】向投资者披露基金净值、主要财务指标以及投资组合情况等信息。单只私募证券投资基金管理规模金额达到5000万元以上的，应当持续在每月结束之日起5个工作日以内向投资者披露基金净值信息。", "type": "s"}, {"id": "gw_5_2", "q": "下列关于基础设施公募REITS的说法，正确的是（）。", "c": {"A": "公募REITS产品规则透明度低，不利于监管", "B": "80%以上基金资产投资于基础设施资产支持证券", "C": "采用开放式运作，收益分配比例不低于合并后基金年度可供分配金额的90%", "D": "公募REITS可盘活存量资产，提升基础设施资产估值"}, "a": "BD", "an": "【封闭式】运作，收益分配比例不低于合并后基金年度可供分配金额的90%，B错误；产品规则透明健全，比照公开发行证券要求建立上市审査制度，制定了完备的发售、上市、交易、收购、信息披露、退市等具体业务规则，D错误。", "type": "m"}, {"id": "cflue_zc_ch6.json_1", "q": "基金的交易实行集体交易管理制度，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "基金的交易实行【集中交易管理】制度，基金管理人设有中央交易室，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。", "type": "judge"}, {"id": "cflue_zc_ch6.json_2", "q": "关于投资者申购、赎回一般开放式基金时的价格，下列说法正确的是（）。", "c": {"A": "债券基金的申赎遵循“已知价”原则进行申赎", "B": "有时能即时获知买卖的成交价格", "C": "只能以申、赎日交易时间结束后基金管理人公布的基金份额净值为基准进行计算", "D": "与封闭式基金一样，按“已知价”原则进行申赎"}, "a": "C", "an": "对一般开放式基金（股票基金、债券基金、混合基金等）而言，在申购、赎回时则遵循“未知价”交易原则，投资者在申购、赎回一般开放式基金份额时并不能即时获知买卖的成交价格。申购、赎回价格只能以申购、赎回日交易时间结束后基金管理人公布的基金份额净值为基准进行计算，这与股票、封闭式基金等金融产品按”已知价”原则进行买卖不同。", "type": "single"}, {"id": "cflue_zc_ch6.json_3", "q": "如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起（）内编制并披露临时报告书。", "c": {"A": "3日", "B": "5日", "C": "2日", "D": "1日"}, "a": "C", "an": "如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起2日内编制并披露临时报告书。", "type": "single"}, {"id": "cflue_zc_ch6.json_4", "q": "开放式基金的特点有（）。", "c": {"A": "没有发行规模限制", "B": "没有固定期限", "C": "全部资金可用于长期投资", "D": "基金份额资产净值每周公布一次"}, "a": "AB", "an": "开放式基金是指基金份额总额不固定，基金份额可以在合同约定的时间和场所内申请申购或者赎回的基金，基金份额资产净值每个交易日公布一次，募集资金需要保持一定的流动性，不能全部用来做长期投资。", "type": "multi"}, {"id": "cflue_zc_ch6.json_5", "q": "投资者适当性管理通常采用的方法有（）。", "c": {"A": "承诺收益", "B": "组合管理", "C": "产品风险评估", "D": "客户调查问卷"}, "a": "CD", "an": "投资者适当性管理通常采用【客户调查问卷、产品风险评估与充分披露】等方法，根据客户分级和资产分级匹配原则，避免误导投资者和错误销售。", "type": "multi"}, {"id": "cflue_zc_ch6.json_6", "q": "以下关于私募基金的说法正确的有（）。", "c": {"A": "私募基金只能采取非公开方式发行", "B": "私募基金向特定合格投资者发售", "C": "私募基金的投资范围广", "D": "私募基金的投资金额较小，风险较小"}, "a": "ABC", "an": "私募基金的投资金额高，风险较大。C错误。", "type": "multi"}, {"id": "cflue_zc_ch6.json_7", "q": "存续期募集信息披露主要指开放式基金在基金合同生效后每（）披露一次更新的招募说明书。", "c": {"A": "6个月", "B": "1年", "C": "3个月", "D": "9个月"}, "a": "A", "an": "存续期募集信息披露主要指开放式基金在基金合同生效后每【6个月】披露一次更新的招募说明书。", "type": "single"}, {"id": "cflue_zc_ch6.json_8", "q": "在我国，非公开募集证券投资基金合格投资者累计不得超过（）人。", "c": {"A": "250", "B": "200", "C": "150", "D": "100"}, "a": "B", "an": "在我国，非公开募集证券投资基金合格投资者累计不得超过200人。", "type": "single"}, {"id": "cflue_zc_ch6.json_9", "q": "为履行基金托管人的职责，托管银行在托管部门设立不同的处室来履行职责，这些处室一般不包括（）。", "c": {"A": "负责基金资产清算、核算的部门", "B": "负责市场开拓、研究、客户关系维护的市场部门", "C": "负责基金交易监管、内部风险控制的部门", "D": "负责基金销售的部门"}, "a": "D", "an": "托管银行在托管部设立的处室不包括基金销售部门。", "type": "single"}, {"id": "cflue_zc_ch6.json_10", "q": "我国基金监管法律法规体系的核心是（）。", "c": {"A": "《基金运作管理办法》", "B": "《证券法》", "C": "《证券投资基金法》", "D": "《基金管理公司管理办法》"}, "a": "C", "an": "我国基金监管法律法规体系的核心是《证券投资基金法》。", "type": "single"}, {"id": "cflue_zc_ch6.json_11", "q": "不参与基金会计核算的基金费用有（）。", "c": {"A": "申购费", "B": "管理费", "C": "认购费", "D": "托管费"}, "a": "AC", "an": "基金申购费和认购费，不参与基金的会计核算。", "type": "multi"}, {"id": "cflue_zc_ch6.json_12", "q": "基金合同是约定基金管理人、基金托管人和基金份额持有人权利义务关系的基本法律文件。基金合同的主要披露事项包括（）。", "c": {"A": "基金份额发售日期", "B": "募集基金的目的和名称", "C": "基金份额持有人", "D": "基金运作方式"}, "a": "ABCD", "an": "基金合同的主要披露事项包括募集基金的目的和基金名称，基金运作方式，基金份额发售日期、价格和费用原则，基金份额持有人、基金管理人和基金托管人的权利与义务，基金份额发售、交易、申购、赎回的程序、时间、地点、费用计算方式以及给付赎回款项的时间和方式，基金收益分配原则，费用提取及支付方式，投资方向和投资限制，净值的计算方式和公告方式等。故全选。", "type": "multi"}, {"id": "cflue_zc_ch6.json_13", "q": "基金运作可分为（）三大部分。", "c": {"A": "基金的信息披露", "B": "基金的投资管理", "C": "基金的后台管理", "D": "基金的市场营销"}, "a": "BCD", "an": "基金运作可分为基金的市场营销、投资管理与后台管理三大部分。信息披露包含在投资管理内容里。", "type": "multi"}, {"id": "cflue_zc_ch6.json_14", "q": "从事基金服务业务的机构，按照中国证监会的有关规定应进行注册或者备案，这些机构包括（）。", "c": {"A": "从事公募基金的信息技术系统服务的机构", "B": "从事公募基金的份额登记的机构", "C": "从事公募基金的投资顾问的机构", "D": "从事公募基金的销售机构"}, "a": "ABCD", "an": "从事基金服务业务的机构，应当按照国务院证券监督管理机构的规定进行注册或者备案，这些机构主要包括基金销售机构、基金销售支付机构、基金份额登记机构、基金估值核算机构、基金投资顾问机构、基金评价机构、律师事务所、会计师事务所、信息技术系统服务机构等。", "type": "multi"}, {"id": "cflue_zc_ch6.json_15", "q": "关于对公募基金募集的监管，下列说法中，正确的有（）。", "c": {"A": "公开募集基金，不需要经中国证监会注册", "B": "基金募集期满，不论是否达到设立标准，均需向中国证监会办理基金备案手续", "C": "公开募集基金应当经中国证监会注册", "D": "基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续"}, "a": "CD", "an": "公开募集基金应当经中国证监会注册，A正确，D错误；基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续，B正确，C错误。", "type": "multi"}, {"id": "cflue_zc_ch6.json_16", "q": "下列属于基金收入来源的有（）。", "c": {"A": "证券买卖差价", "B": "存款利息", "C": "债券利息", "D": "管理费收入"}, "a": "ABC", "an": "基金收入主要包括利息收入、投资收益以及其他收入。管理费收入是从基金财产中计提，归属于基金管理人的收入。", "type": "multi"}, {"id": "cflue_zc_ch6.json_17", "q": "证券投资基金支付的费用主要包括（）。", "c": {"A": "基金销售服务费", "B": "基金交易费", "C": "基金托管费", "D": "基金管理费"}, "a": "ABCD", "an": "基金从设立到终止都要支付一定的费用。通常情况下，基金所支付的费用主要有以下几个方面：基金管理费、基金托管费、基金交易费、基金运作费、基金销售服务费。", "type": "multi"}, {"id": "cflue_zc_ch6.json_18", "q": "小张拟认购开放式基金，在开立基金账户和资金账户后于20×8年6月11日提交了认购申请表，那么，自（）日起小张可到办理认购的网点查询认购申请的受理情况。", "c": {"A": "20×8年6月16日", "B": "20×8年6月13日", "C": "20×8年6月14日", "D": "20×8年6月15日"}, "a": "B", "an": "投资者于T日提交认购申请后，可于T+2日起到办理认购的网点査询认购申请的受理情况。", "type": "single"}, {"id": "cflue_zc_ch6.json_19", "q": "基金管理人会针对不同的基金类型、不同的认购金额设置不同的认购费率。我国股票型基金的认购费率大多为1%—1.5%，货币市场基金一般不收取认购费，债券型基金的认购费率通常在（）以下。", "c": {"A": "1%", "B": "0.5%", "C": "2%", "D": "1.5%"}, "a": "A", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch6.json_20", "q": "基础设施公募REITs的申请文件包括（）。", "c": {"A": "招募说明书草案", "B": "基金托管协议草案", "C": "上市申请", "D": "基金托管人与主要参与机构签订的协议文件"}, "a": "ABC", "an": "申请文件应当包括以下内容：（1）上市申请；（2）基金合同草案；（3）基金托管协议草案；（4）招募说明书草案；（5）律师事务所对基金出具的法律意见书；（6）基金管理人及资产支持证券管理人相关说明材料，包括但不限于：投资管理、项目运营、风险控制制度和流程，部门设置与人员配备，同类产品与业务管理情况等；（7）拟投资基础设施资产支持证券认购协议；（8）【基金管理人】与主要参与机构签订的协议文件；（B错误）（9）要求的其他材料。", "type": "multi"}, {"id": "cflue_zc_ch6.json_21", "q": "基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后（）日内返还投资者已缴纳的款项，并加计银行同期存款利息。", "c": {"A": "50", "B": "15", "C": "30", "D": "25"}, "a": "C", "an": "基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后30日内返还投资者已缴纳的款项，并加计银行同期存款利息。", "type": "single"}, {"id": "cflue_zc_ch6.json_22", "q": "基金管理费率通常与基金规模成（），与风险成（）。", "c": {"A": "反比；反比", "B": "正比；正比", "C": "反比；正比", "D": "正比；反比"}, "a": "C", "an": "基金规模越大，风险程度越低，基金管理费率越低。", "type": "single"}, {"id": "cflue_zc_ch6.json_23", "q": "私募基金信息披露义务人应当向投资者披露的信息包括（）。", "c": {"A": "基金份额总额", "B": "招募说明书", "C": "可能存在的利益冲突", "D": "基金的资产负债情况"}, "a": "BCD", "an": "私募基金信息披露义务人应当向投资者披露的信息包括基金合同；招募说明书等宣传推介文件；基金销售协议中的主要权利义务条款（如有）；基金的投资情况；基金的资产负债情况；基金的投资收益分配情况；基金承担的费用和业绩报酬安排；可能存在的利益冲突；涉及私募基金管理业务、基金财产、基金托管业务的重大诉讼、仲裁；中国证监会以及中国证券投资基金业协会规定的影响投资者合法权益的其他重大信息。", "type": "multi"}, {"id": "cflue_zc_ch6.json_24", "q": "基金管理人运用基金财产进行证券投资，不得有下列（）情形。", "c": {"A": "同一基金管理人管理的全部基金持有一家公司发行的证券，超过该证券的10%", "B": "基金总资产超过基金净资产的140%", "C": "一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%", "D": "违反基金合同关于投资范围、投资策略和投资比例等约定"}, "a": "ABCD", "an": "基金管理人运用基金财产进行证券投资，不得有下列情形：（1）一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%；（2）同一基金管理人管理的全部基金持有一家公司发行的证券，其市值超过该证券的10%；（3）基金财产参与股票发行申购，单只基金所申报的金额超过该基金的总资产，单只基金所申报的股票数量超过拟发行股票公司本次发行股票的总量；（4）一只基金持有其他基金（不含货币市场基金），其市值超过基金资产净值的10%，但基金中基金除外；（5）基金中基金持有其他单只基金，其市值超过基金资产净值的20%,或者投资于其他基金中基金；（6）基金总资产超过基金净资产的140%；（7）违反基金合同关于投资范围、投资策略和投资比例等约定；（8）中国证监会规定禁止的其他情形。完全按照有关指数的构成比例进行证券投资的基金品种可以不受前款（1）项、（2）项规定的比例限制。", "type": "multi"}, {"id": "cflue_zc_ch6.json_25", "q": "在基金市场上存在着许多不同的参与主体，依据所承担的责任与作用的不同，可以将基金市场的参与主体分为（）。", "c": {"A": "其他机构", "B": "基金的监管机构和自律组织", "C": "基金当事人", "D": "基金市场服务机构"}, "a": "BCD", "an": "基金市场参与主体，分为三大类，即基金当事人、基金市场服务机构和基金的监管机构和自律组织。", "type": "multi"}, {"id": "cflue_zc_ch6.json_26", "q": "首次募集信息披露主要包括基金份额发售前至基金合同生效期间进行的信息披露。在基金份额发售前，基金管理人需要编制并披露（）。", "c": {"A": "基金份额发售公告", "B": "基金净值公告", "C": "基金招募说明书", "D": "基金合同"}, "a": "ACD", "an": "首次募集信息的披露包括的内容，除上述ABD选项外，还包括基金托管协议。", "type": "multi"}, {"id": "gw_6_1", "q": "按照《中国金融期货交易所交易规则》及相关细则，下列关于金融期货的主要交易规则的说法错误的是（）。", "c": {"A": "结算价是指某一合约当日一定时间内成交价格按照成交量的加权平均价", "B": "保证金分为结算准备金和交易保证金。交易保证金是指未被合约占用的保证金；结算准备金是指已被合约占用的保证金", "C": "对于沪深300股指期货合约，进行投机交易的客户某一合约单边持仓限额为5000手", "D": "股指期货竞价交易采用集合竞价交易和连续竞价交易两种方式"}, "a": "B", "an": "保证金分为结算准备金和交易保证金。结算准备金是指未被合约占用的保证金；交易保证金是指已被合约占用的保证金。", "type": "s"}, {"id": "gw_6_2", "q": "下列关于金融期权的说法中错误的是（）。", "c": {"A": "市场无风险利率与认沽期权为正相关关系，与认购期权为负相关关系", "B": "标的证券价格与认购期权价值为正相关关系，与认沽期权价值为负相关关系", "C": "波动率与认购、认沽期权价值均为正相关关系", "D": "到期期限与认购、认沽期权价值均为正相关关系"}, "a": "A", "an": "市场无风险利率与认购期权为正相关关系，与认沽期权为负相关关系。", "type": "s"}, {"id": "cflue_zc_ch7.json_1", "q": "自1981年美国所罗门兄弟公司为IBM和世界银行办理了首笔（）之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。", "c": {"A": "美元与马克和瑞士法郎", "B": "美元与英镑和瑞士法郎", "C": "美元与英镑和法郎", "D": "美元与日元和英镑"}, "a": "A", "an": "自1981年美国所罗门兄弟公司为IBM和世界银行办理首笔【美元与马克和瑞士法郎】之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。", "type": "single"}, {"id": "cflue_zc_ch7.json_2", "q": "从理论上说，潜在盈利有可能无限大的交易者有（）。", "c": {"A": "期货出售者", "B": "期货购买者", "C": "期权出售者", "D": "期权购买者"}, "a": "ABD", "an": "期货交易双方潜在的盈利和亏损都是无限的，而期权购买者潜在的盈利无限大，期权卖方的潜在损失无限大。", "type": "multi"}, {"id": "cflue_zc_ch7.json_3", "q": "根据交易合约的签订与实际交割之间的关系，可以将市场交易的组织形态分为（）。", "c": {"A": "期权交易", "B": "期货交易", "C": "远期交易", "D": "现货交易"}, "a": "BCD", "an": "根据交易合约的签订与实际交割之间的关系，可以将市场交易的组织形态分为现货交易、远期交易及期货交易。", "type": "multi"}, {"id": "cflue_zc_ch7.json_4", "q": "沪深300股指期货合约交易代码为SH。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "沪深300股指期货合约交易代码为IF，中证500股指期货合约代码为IC，上证50股指期货合约代码为IH。", "type": "judge"}, {"id": "cflue_zc_ch7.json_5", "q": "对投资者而言，美国存托凭证ADR的优点包括（）。", "c": {"A": "以美元交易，且通过投资者熟悉的当地清算公司进行清算", "B": "上市公司发放股利时，ADR投资者能及时获得，且以当地货币支付", "C": "上市交易的ADR需经美国证券交易委员会注册，有助于保障投资者权益", "D": "某些机构投资者受投资政策限制，不能投资非美国上市证券，ADR可以规避相关限制"}, "a": "ACD", "an": "上市公司发放股利时，ADR投资者能及时获得，而且是以【美元】支付。A错误，其余均正确。", "type": "multi"}, {"id": "cflue_zc_ch7.json_6", "q": "强制减仓制度是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "【强制减仓制度】是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。", "type": "judge"}, {"id": "cflue_zc_ch7.json_7", "q": "与金融现货交易相比，金融期货的特征具体表现在（）。", "c": {"A": "交易目的不同", "B": "交易价格的含义不同", "C": "交易方式不同", "D": "交易对象不同"}, "a": "ABCD", "an": "与金融现货交易相比，金融期货的特征具体表现在：交易对象不同、交易目的不同、交易价格的含义不同、交易方式不同、结算方式不同。", "type": "multi"}, {"id": "cflue_zc_ch7.json_8", "q": "按基础工具划分，金融期货的主要类型包括（）。", "c": {"A": "商品类期货", "B": "外汇期货", "C": "股权类期货", "D": "利率期货"}, "a": "BCD", "an": "按基础工具划分，金融期货类型包括：外汇期货、利率期货、股权类期货。", "type": "multi"}, {"id": "cflue_zc_ch7.json_9", "q": "某大型农场为了防止农用化肥尿素市场价格变动对企业经营带来的风险，于是与某大型尿素供应商签订了以固定价格购货的长期合同。但后来考虑到合同可能存在对手违约风险，于是将规避风险的方式改为在期货市场上利用尿素期货进行套期保值操作。以上描述中，企业的行为旨在规避的风险包括（）。", "c": {"A": "信用风险", "B": "操作风险", "C": "流动性风险", "D": "市场风险"}, "a": "AD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch7.json_10", "q": "关于信用违约互换（简称CDS），下列说法中，正确的有（）。", "c": {"A": "信用违约互换双方约定以某一信用工具做参考", "B": "若参考工具发生规模的信用违约事件，则信用违约出售方须向购买方支付赔偿", "C": "信用违约互换交易具有较高的杠杆性", "D": "最基本的信用违约互换涉及两个或者两个以上当事人"}, "a": "ABC", "an": "最基本的信用违约互换涉及两个当事人，双方约定以某一信用工具为参考，一方向另一方出售信用保护，若参考工具发生规定的信用违约事件，则信用保护出售方必须向购买方支付赔偿。信用违约具有较高的杠杆性。", "type": "multi"}, {"id": "cflue_zc_ch7.json_11", "q": "中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体有（）。", "c": {"A": "发行人", "B": "存托人", "C": "持有人", "D": "托管人"}, "a": "ABC", "an": "中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体：发行人、持有人、存托人。", "type": "multi"}, {"id": "cflue_zc_ch7.json_12", "q": "金融衍生工具可以按照（）分为独立衍生工具和嵌入式衍生工具。", "c": {"A": "自身交易方式", "B": "交易场所", "C": "基础工具种类", "D": "产品形态"}, "a": "D", "an": "金融衍生工具根据【产品形态】可分为独立衍生工具和嵌入式衍生工具。&amp;lt;br&amp;gt;按照【自身交易的方法和特点】可以分为金融远期合约、金融期货、金融期权、金融互换和结构化金融衍生工具；&amp;lt;br&amp;gt;按照【基础工具种类】，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具；&amp;lt;br&amp;gt;按照【交易场所】可分为交易所交易的衍生工具和场外交易市场交易的衍生工具。", "type": "single"}, {"id": "cflue_zc_ch7.json_13", "q": "以政府债券、欧洲美元债券、大面额可转让存单为基础资产的期权属于（）。", "c": {"A": "股票期权", "B": "货币期权", "C": "利率期权", "D": "互换期权"}, "a": "C", "an": "利率期权合约通常以政府短期、中期、长期债券，欧洲美元债券，大面额可转让存单等利率工具为标的物。", "type": "single"}, {"id": "cflue_zc_ch7.json_14", "q": "下列关于沪深300股指期货交易涨跌幅限制的规定，正确的有（）。", "c": {"A": "股指期货合约最后交易日不设涨跌停板", "B": "股指期货合约的涨跌停板幅度为上一交易日结算价的±10%", "C": "季月合约上市首日涨跌停板幅度为挂盘基准价的±20%", "D": "股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±15%"}, "a": "BC", "an": "CD项，股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±20%。", "type": "multi"}, {"id": "cflue_zc_ch7.json_15", "q": "下列关于期货交易的说法，错误的有（）。", "c": {"A": "期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格不受最小价格变动单位限定和日交易振幅规定", "B": "期货合约在交易所内交易，具有公开性", "C": "期货合约是标准化合约", "D": "期货合约的结算通过专门的结算公司，投资者需要对对方负责，存在信用风险"}, "a": "AD", "an": "期货合约的结算通过专门的结算公司，这是独立于买卖双方的第三方，投资者无须对对方负责，不存在信用风险，而只有价格变动的风险。C错误；期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格受最小价格变动单位限定和日交易振幅限定。D错误。", "type": "multi"}, {"id": "cflue_zc_ch7.json_16", "q": "下列关于存托凭证（ADR）的说法，正确的有（）。", "c": {"A": "存托凭证能避开直接发行股票和债券的相关法律要求，上市手续简单，发行成本低", "B": "上市交易的ADR不须经过SE注册", "C": "由于市场容量大，在美国发行ADR的外国公司能在短期内筹集到大量的外汇资金", "D": "存托凭证由J.P摩根首创"}, "a": "ACD", "an": "上市交易的ADR须经美国证券交易委员会(SEC)注册，有助于保障投资者权益。D错误。", "type": "multi"}, {"id": "cflue_zc_ch7.json_17", "q": "关于期货交易，下列说法正确的是（）。", "c": {"A": "期货合约可以不进行实物交收", "B": "期货合约交易双方并不知道交易对手的情况", "C": "期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易", "D": "期货合约可以进行反向交易、平仓了结"}, "a": "ABCD", "an": "期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易，具备对冲机制（可进行方向交易）、履约回旋余地较大实物交割比例极低，交易双方不知道互相情况。", "type": "multi"}, {"id": "cflue_zc_ch7.json_18", "q": "与金融衍生产品相对应的基础金融产品可以有（）。", "c": {"A": "银行定期存款单", "B": "商品期货", "C": "股票", "D": "债券"}, "a": "ABCD", "an": "金融衍生工具又被称为金融衍生产品，是与基础金融产品相对应的一个概念，指建立在基础产品或基础变量之上，其价格取决于基础金融产品价格（或数值）变动的派生金融产品。基础金融产品包括现货金融产品（如债券、股票、银行定期存款单等等），也包括金融衍生工具。作为金融衍生工具基础的变量种类繁多，主要是各类资产价格、价格指数、利率、汇率、费率、通货膨胀率以及信用等级等等；近些年来，某些自然现象（如气温、降雪量、霜冻、飓风）甚至人类行为（如选举、温室气体排放）也逐渐成为金融衍生工具的基础变量。商品期货也属于金融衍生工具的一种。", "type": "multi"}, {"id": "cflue_zc_ch7.json_19", "q": "美式期权则可在期权到期日或到期日之前的任何一个营业日执行。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "欧式期权只能在期权到期日执行；美式期权则可在期权到期日或到期日之前的任何一个营业日执行；修正的美式期权也被称为“百慕大期权”或“大西洋期权”，可以在期权到期日之前的一系列规定日期执行。", "type": "judge"}, {"id": "cflue_zc_ch7.json_20", "q": "金融衍生工具按照基础工具种类，可以分为（）。", "c": {"A": "股权类产品的衍生工具", "B": "结构化金融衍生工具", "C": "利率衍生工具", "D": "货币衍生工具"}, "a": "ACD", "an": "金融衍生工具按照基础工具种类，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具，结构化金融衍生工具属于金融衍生工具按照金融衍生工具自身交易的方式及特点分类下的一种。", "type": "multi"}, {"id": "cflue_zc_ch7.json_21", "q": "上证50ETF期权的合约到期月份有（）。", "c": {"A": "下月", "B": "随后两个季月", "C": "随后三个季月", "D": "当月"}, "a": "ABD", "an": "上证50ETF期权的合约到期月份分别为当月、下月及随后的两个季月。", "type": "multi"}, {"id": "cflue_zc_ch7.json_22", "q": "2018年4月17日沪深300指数开盘报价为3812.87点，当年9月份到期的沪深300指数期货合约开盘价为3718.8点，若期货投机者预期当日期货报价下跌，开盘即空头开仓，并在当日最低价3661.6点进行空头平仓。若期货公司要求的初始保证金为10%，则该投机者当日即实现盈利（）元，日收益率（）。", "c": {"A": "17160；15.38%", "B": "28221；10.25%", "C": "28221；15.38%", "D": "17160；10.25%"}, "a": "A", "an": "隐含考点是沪深300股指期货合约合约乘数为每点300元。实现盈利为（3718.8-3661.6）×300=17160（元），投入资金为3718.8×300×10%=111564（元），日收益率为17160÷111564×100%=15.38%。", "type": "single"}, {"id": "cflue_zc_ch7.json_23", "q": "期货市场上的投机者利用对未来期货价格走势的预期进行投机交易，（）。", "c": {"A": "预计价格上涨的投机者会建立期货多头", "B": "预计价格下跌的投机者会建立期货多头", "C": "预计价格上涨的投机者会建立期货空头", "D": "预计价格下跌的投机者会建立期货空头"}, "a": "AD", "an": "期货市场上的投机者也会利用对未来期货价格走势的预期进行投机交易，预计价格上涨的投机者会建立期货多头，反之则建立空头。", "type": "multi"}, {"id": "cflue_zc_ch7.json_24", "q": "按照合约所规定的履约时间的不同，金融期权可以分为（）。", "c": {"A": "欧式期权、美式期权和修正的美式期权", "B": "认购期权和认沽期权", "C": "单只股票期权、股票组合期权和股价指数期权", "D": "股票类期权、利率期权、货币期权、金融期货合约期权、互换期权等"}, "a": "A", "an": "A选项为金融期权按照选择权的性质划分。B选项为按照合约所规定的履约时间的不同划分。C选项为按照金融期权基础资产性质的不同划分。D选项为金融期权中股权类期权之下的分类。", "type": "single"}, {"id": "cflue_zc_ch7.json_26", "q": "可在期权到期日或到期日之前的任何一个营业日执行的期权是认沽期权。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "欧式期权只能在期权到期日执行；美式期权则可在期权到期日或到期日之前的任何一个营业日执行；修正的美式期权也被称为百慕大期权或大西洋期权”，可以在期权到期日之前的一系列规定日期执行。", "type": "judge"}, {"id": "cflue_zc_ch7.json_27", "q": "人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的（）计算利息并进行利息交换的金融合约。", "c": {"A": "人民币资产", "B": "利率", "C": "人民币汇率", "D": "人民币本金"}, "a": "BD", "an": "人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的【人民币本金和利率】计算利息并进行利息交换的金融合约。利率互换的参考利率应为经中国人民银行授权的全国银行间同业拆借中心等机构发布的银行间市场具有基准性质的市场利率或经中国人民银行公布的基准利率。", "type": "multi"}, {"id": "cflue_zc_ch8.json_1", "q": "（）可以管理系统性风险和非系统性风险。", "c": {"A": "风险对冲", "B": "风险控制", "C": "风险分散", "D": "风险转业"}, "a": "A", "an": "与风险分散策略不同，风险对冲可以管理系统性风险和非系统性风险，还可以根据投资者的风险承受能力和偏好，通过对冲比率的调节，将风险降低到预期水平。", "type": "single"}, {"id": "cflue_zc_ch8.json_2", "q": "操作风险损失数据收集主要基于（）等几个方面。", "c": {"A": "外部损失数据", "B": "情景分析", "C": "业务环境和内部控制因素", "D": "内部损失数据"}, "a": "ABCD", "an": "操作风险损失数据收集主要基于：（1）内部损失数据；（2）外部损失数据；（3）情景分析；（4）业务环境和内部控制因素。", "type": "multi"}, {"id": "cflue_zc_ch8.json_3", "q": "（）通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。", "c": {"A": "操作风险", "B": "信用风险", "C": "违约风险", "D": "市场风险"}, "a": "B", "an": "【信用风险】通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。", "type": "single"}, {"id": "cflue_zc_ch8.json_4", "q": "内部评级所反映的被评级对象的风险特征主要是（）。", "c": {"A": "交易工具的违约损失率", "B": "借款者的违约概率", "C": "预期损失和非预期损失", "D": "违约风险暴露"}, "a": "AB", "an": "内部评级所反映的被评级对象的风险特征主要是借款者的违约概率和交易工具的违约损失率。", "type": "multi"}, {"id": "cflue_zc_ch8.json_5", "q": "如果某金融机构风险管理部门计算得到其资产组合在持有期100天内，在99%的置信水平下的VaR值为1000万人民币，那么这意味着该金融机构的资产组合可以被预期（）。", "c": {"A": "在未来的100天中有1%的概率至多损失1000万人民币", "B": "在未来的100天中有99%的概率至少损失1000万人民币", "C": "在未来的100天中有1%的概率至少损失1000万人民币", "D": "在未来的100天中有99%的概率至多损失1000万人民币"}, "a": "D", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch8.json_6", "q": "风险识别是指（）的过程。", "c": {"A": "找出风险原因", "B": "鉴定风险性质", "C": "对影响各类目标实现的潜在事项或因素予以全面识别", "D": "依据风险定义进行系统分类"}, "a": "ABCD", "an": "风险识别是指对影响各类目标实现的潜在事项或因素予以全面识别、依据风险定义进行系统分类、鉴定风险性质并找出风险原因的过程。", "type": "multi"}, {"id": "cflue_zc_ch8.json_7", "q": "根据导致市场风险因素的不同，市场风险一般划分为（）。", "c": {"A": "外汇风险", "B": "股票价格风险", "C": "商品风险", "D": "利率风险"}, "a": "ABCD", "an": "根据导致市场风险他因素的不同，市场风险一般划分为利率风险、外汇风险、股票价格风险与商品风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_8", "q": "下面属于风险管理的方法是（）。", "c": {"A": "风险补偿", "B": "风险分散", "C": "风险预防", "D": "风险规避"}, "a": "ABCD", "an": "风险管理的主要方法包括：风险预防、风险规避、风险分散、风险对冲、风险转移和风险补偿。", "type": "multi"}, {"id": "cflue_zc_ch8.json_9", "q": "证券市场系统性风险可以来自于（）。", "c": {"A": "通货膨胀", "B": "新政策出台", "C": "证券价格日常波动", "D": "市场利率变动"}, "a": "ABD", "an": "系统性风险是指是指对整个股票市场或绝大多数股票普遍产生不利影响，由于公司外部、不为公司所预计和控制的因素造成的风险。B不属于系统性风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_10", "q": "属于非系统性风险的有（）。", "c": {"A": "市场加息引起股票指数下跌", "B": "公司财产因火灾受损", "C": "某公司产品研发导致股价下跌", "D": "因债务人违约导致公司股价波动"}, "a": "BCD", "an": "非系统风险，是指发生于个别公司的特有事件造成的风险，纯粹由于个股自身的因素引起的个股价格变化以及由于这种变化导致的个股收益率的不确定性。", "type": "multi"}, {"id": "cflue_zc_ch8.json_11", "q": "下列各项中，不属于风险管理中的风险转移策略的有（）。", "c": {"A": "风险补偿", "B": "风险规避", "C": "风险分散", "D": "信用担保"}, "a": "ABC", "an": "风险转移可分为保险转移和非保险转移。保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司。非保险转移通常采用【担保】和备用信用证等方式将风险转嫁给第三方。例如，当金融机构提供信用贷款时，通常需要借款人提供第三方担保，如不能到期偿还贷款，由担保方代为偿还。故只有C属于。答案选择ABD。", "type": "multi"}, {"id": "cflue_zc_ch8.json_12", "q": "在一般情况下，风险管理的流程主要包括（）。", "c": {"A": "风险的应对", "B": "风险的识别", "C": "风险的监测、预警与报告", "D": "风险的衡量"}, "a": "ABCD", "an": "在一般情况下，风险管理的流程主要包括：风险的识别，风险的衡量，风险的应对，风险的监测、预警与报告。", "type": "multi"}, {"id": "cflue_zc_ch8.json_13", "q": "流动性覆盖率的计算公式为（）。", "c": {"A": "优质流动性资产/未来30天现金净流出量×100%", "B": "优质流动性资产/未来90天现金净流出量×100%", "C": "贷款余额/存款余额×100%", "D": "流动性资产余额/流动性负债余额×100%"}, "a": "A", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch8.json_14", "q": "从机构层面衡量流动性风险的资产负债结构指标不包括（）。", "c": {"A": "速动比率", "B": "净稳定资金率", "C": "现金流量比率", "D": "流动比率"}, "a": "C", "an": "从机构层面衡量流动性风险的资产负债结构指标包括流动比率、速动比率和净稳定资金率。", "type": "single"}, {"id": "cflue_zc_ch8.json_15", "q": "中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到（）情形时，应当开展专项或综合压力测试。", "c": {"A": "利润分配或其他资本性支出", "B": "重大固定资产投资", "C": "重大对外投资或收购", "D": "重大对外担保"}, "a": "ABCD", "an": "中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到以下情形之一时，应当开展专项或综合压力测试：重大对外投资或收购、重大对外担保、重大固定资产投资、利润分配或其他资本性支出、证券公司分类评价结果负向调整、负债集中到期或赎回等可能导致净资本和流动性等风险控制指标发生明显不利变化或接近预警线的情形；确定重大业务规模和开展重大创新业务；确定经营计划和业务规模、确定自营投资规模限额、开展重大创新业务、承担重大包销责任等；预期或已经出现重大内部风险状况；自营投资大幅亏损，政府部门行政处罚、诉讼、声誉受损等；预期或已经出现重大外部风险和政策变化事件；证券市场大幅波动，监管政策发生重大变化等；其他可能或已经出现的压力情景。", "type": "multi"}, {"id": "cflue_zc_ch8.json_16", "q": "下列属于传统信用风险评估方法的是（）。", "c": {"A": "5Cs", "B": "信用评级", "C": "专家系统", "D": "信用打分模型"}, "a": "ACD", "an": "传统信用风险评估方法包括：专家系统、5Cs和信用打分模型。", "type": "multi"}, {"id": "cflue_zc_ch8.json_17", "q": "（）作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。", "c": {"A": "波动性分析", "B": "置信水平", "C": "VaR模型", "D": "期望损失模型"}, "a": "D", "an": "期望损失模型作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。", "type": "single"}, {"id": "cflue_zc_ch8.json_18", "q": "现代信用风险转移方法不包括（）。", "c": {"A": "信用远期协议", "B": "TRP", "C": "辛迪加贷款", "D": "信用关联票据"}, "a": "C", "an": "【现代】信用风险转移方法包括TRP、信用关联票据和信用远期协议。&amp;lt;br&amp;gt;【传统】信用风险转移的方法主要有信用保险、【辛迪加贷款】、贷款出售、资产互换等形式。故B错误。", "type": "single"}, {"id": "cflue_zc_ch8.json_19", "q": "证券公司声誉风险管理应遵循以下（）原则。", "c": {"A": "快速响应原则", "B": "审慎管理原则", "C": "预防第一原则", "D": "全程全员原则"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch8.json_20", "q": "关于VaR，下列说法正确的有（）。", "c": {"A": "能够用于对整个行业的各种风险进行全面的量化", "B": "可以用于不同的金融产品", "C": "最初由摩根公司开发", "D": "可以定量地对市场总风险进行度量"}, "a": "BCD", "an": "D项，VaR方法衡量的主要是市场风险，如单纯依靠VaR方法，就会忽视其他种类的风险如信用风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_21", "q": "操作风险分为（）所引发的四类风险。", "c": {"A": "外部事件", "B": "人员", "C": "系统", "D": "流程"}, "a": "ABCD", "an": "操作风险的一种分类方法是根据定义将其划分为由人员、系统、流程和外部事件所引发的四类风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_22", "q": "市场的流动性是由（）维度因素决定的。", "c": {"A": "密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好", "B": "弹性，即基础价格在受到影响后重新恢复的速度", "C": "深度，即执行大规模交易而不对价格产生过度影响的能力", "D": "即时性，即交易执行的速度"}, "a": "ABCD", "an": "市场的流动性是由四个维度因素决定的：一是深度，即执行大规模交易而不对价格产生过度影响的能力；二是密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好；三是即时性，即交易执行的速度；四是弹性，即基础价格在受到影响后重新恢复的速度。", "type": "multi"}, {"id": "cflue_zc_ch8.json_23", "q": "风险分散是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【风险对冲】是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。", "type": "judge"}, {"id": "cflue_zc_ch8.json_24", "q": "风险控制是金融机构的核心竞争力。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "风险管理是金融机构的核心竞争力。", "type": "judge"}, {"id": "cflue_zc_ch8.json_25", "q": "风险管理的“三道防线”指的是在金融机构内部构造出三支对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。这三道防线是指（）。", "c": {"A": "风险管理部门和合规部门", "B": "外部审计", "C": "内部审计", "D": "业务条线部门"}, "a": "ACD", "an": "风险管理的“三道防线”指的是在金融机构内部构造出三个对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。【业务条线部门】是第一道风险防线，是风险的承担者，应负责持续识别、评估和报告风险敞口。【风险管理部门和合规部门】是第二道风险防线。风险管理部门负责监督和评估业务部门承担风险的业务活动；合规部门负责定期监控机构对于法律、公司治理规则、监管规定、行为规范和政策的执行情况。风险管理和合规部门均应独立于业务条线部门。【内部审计】是第三道风险防线。内部审计部门对机构风险治理框架的质量和有效性进行独立的审计。", "type": "multi"}, {"id": "cflue_zc_ch8.json_26", "q": "下列对于风险限额的相关概念，说法正确的是（）。", "c": {"A": "限额管理体现了现代风险管理是一种全面的风险管理", "B": "限额管理体现了任何金融产品是风险与收益的组合，投资是以风险换收益", "C": "限额管理是一种对风险的实时动态管理", "D": "限额管理体现了风险管理是一种积极的事前管理"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch8.json_27", "q": "从市场层面衡量流动性风险的指标不包括（）。", "c": {"A": "流动性覆盖率", "B": "冲击成本", "C": "买卖价差法", "D": "换手率"}, "a": "A", "a var STORAGE_KEY = 'sec_exam_chapter_金融市场基础';
var state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
var currentCh = 0, currentSec = -1, selected = {};

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function renderSectionView() {
  var el = document.getElementById('sectionView');
  var html = '';
  SECTION_DATA.forEach(function(ch, ci) {
    var chInfo = CHAPTERS[ci] || {};
    var stars = '★'.repeat(chInfo.stars||0) + '☆'.repeat(5-(chInfo.stars||0));
    html += '<div class="ch-card"><div class="ch-head" onclick="toggleSections('+ci+')">'
         + '<div><div class="name">'+esc(ch.chapter)+'</div>'
         + '<div class="meta">'+stars+' · '+ch.ch_count+'题</div></div>'
         + '<span class="arrow">▼</span></div>'
         + '<div class="sec-list" id="sl-'+ci+'">';
    ch.sections.forEach(function(sec, si) {
      var pct = ch.ch_count > 0 ? Math.round(sec.q_count/ch.ch_count*100) : 0;
      html += '<div class="sec-item" onclick="startSection('+ci+','+si+')">'
           + '<span class="sname">'+esc(sec.name)+'</span>'
           + '<div class="sbar"><div class="sbar-fill" style="width:'+pct+'%"></div></div>'
           + '<span class="scount">'+sec.q_count+'题</span></div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}
function toggleSections(ci) {
  var head = document.querySelectorAll('.ch-head')[ci];
  var list = document.getElementById('sl-'+ci);
  if (!list) return;
  head.classList.toggle('exp'); list.classList.toggle('show');
}
function startSection(ci, si) { currentCh=ci; currentSec=si; renderNav(); renderStats(); renderQuestions(); document.getElementById('sectionView').classList.add('hidden'); document.getElementById('questionView').classList.add('show'); }
function showSectionView() { document.getElementById('sectionView').classList.remove('hidden'); document.getElementById('questionView').classList.remove('show'); }
function renderNav() {
  var nav = document.getElementById('chNav');
  var html = '';
  CHAPTERS.forEach(function(ch, i) {
    var a = i === currentCh ? 'on' : '';
    html += '<div class="ch-btn '+a+'" onclick="switchCh('+i+')"><span class="ch-title">'+esc(ch.name)+'</span><span class="ch-meta">'+ch.count+'题</span></div>';
  });
  nav.innerHTML = html;
}
function renderStats() {
  var ch = CH_MAP[currentCh]; if(!ch) return;
  var start, count;
  if(currentSec>=0) { var sec = SECTION_DATA[currentCh].sections[currentSec]; start=sec.q_start; count=sec.q_count; }
  else { start=ch.start; count=ch.count; }
  var done=0, correct=0;
  for(var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) { if(state[i]&&state[i].done){ done++; if(state[i].correct) correct++; } }
  var pct = done>0 ? Math.round(correct/done*100) : 0;
  document.getElementById('stats').innerHTML = '<span>📝 '+done+'/'+count+' 已做</span><span class="pct">✅ '+pct+'%</span>';
  document.getElementById('progressFill').style.width = (count>0?Math.round(done/count*100):0)+'%';
}
function getQs() {
  var ch = CH_MAP[currentCh]; if(!ch) return[];
  var start, count;
  if(currentSec>=0) { var sec = SECTION_DATA[currentCh].sections[currentSec]; start=sec.q_start; count=sec.q_count; }
  else { start=ch.start; count=ch.count; }
  var qs = [];
  for(var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) qs.push({idx:i, q:ALL_QUESTIONS[i]});
  return qs;
}
function renderQuestions() {
  var c = document.getElementById('questionList');
  var qs = getQs(); var html = '';
  qs.forEach(function(item) {
    var q=item.q, idx=item.idx, s=state[idx]||{};
    var keys = Object.keys(q.c);
    var tl = q.type==='judge'?'判断':(q.type==='multi'?'多选':'单选');
    html += '<div class="q-wrap"><div class="q-head"><span class="q-num">'+(qs.indexOf(item)+1)+'.</span><span class="q-tag">'+tl+'</span></div>';
    html += '<div class="q-text">'+esc(q.q)+'</div><div class="opts" id="opts-'+idx+'">';
    keys.forEach(function(key) {
      var val = q.c[key]; if(val==null) return;
      var extra = '';
      if(s.done) { var isC=q.a.indexOf(key)>=0; var isSel=s.answers&&s.answers.indexOf(key)>=0; extra=isSel&&isC?' correct disabled':(isSel&&!isC?' wrong disabled':(isC?' correct disabled':' disabled')); }
      html += '<div class="opt'+extra+'" onclick="toggleOpt('+idx+',\''+key+'\')"><span class="okey">'+key+'</span><span class="oval">'+esc(val)+'</span></div>';
    }); html += '</div>';
    if(s.done) {
      html += '<div class="ans-box '+(s.correct?'correct':'wrong')+'">'+(s.correct?'✅ 回答正确':'❌ 回答错误')+' · 正确答案：'+esc(q.a)+(s.answers&&!s.correct?' · 你的答案：'+esc(s.answers.join('')):'')+'</div>';
      html += '<div class="ans-box" style="background:var(--card-alt);border-color:var(--border-light);color:var(--text);margin-top:0.3rem;"><div class="a-text">'+esc(q.an)+'</div></div>';
    }
    html += '</div>';
  });
  html += '<div class="action-row"><button class="btn-check" onclick="checkAll()">📝 批改本页</button><button class="btn-reset" onclick="resetAll()">🔄 重置本页</button></div>';
  c.innerHTML = html;
}
function switchCh(idx) { currentCh=idx; currentSec=-1; renderNav(); renderStats(); renderQuestions(); }
function toggleOpt(idx, key) {
  if(state[idx]&&state[idx].done) return;
  if(!selected[idx]) selected[idx]=[];
  var arr=selected[idx], pos=arr.indexOf(key);
  var q=ALL_QUESTIONS[idx], isSingle=q.type==='single'||q.type==='judge';
  if(isSingle) selected[idx]=[key]; else { if(pos>=0) arr.splice(pos,1); else arr.push(key); }
  var opts=document.getElementById('opts-'+idx);
  if(opts) opts.querySelectorAll('.opt').forEach(function(o){ o.classList.toggle('selected', selected[idx].indexOf(o.dataset.key||'')>=0); });
}
function checkSingle(idx) {
  var q=ALL_QUESTIONS[idx]; if(state[idx]&&state[idx].done) return;
  var sel=selected[idx]||[]; if(sel.length===0) return;
  var isC=sel.sort().join('')===q.a;
  state[idx]={done:true, correct:isC, answers:sel.slice()}; saveState();
}
function checkAll() { getQs().forEach(function(item){ checkSingle(item.idx); }); renderStats(); renderQuestions(); }
function resetAll() { getQs().forEach(function(item){ delete state[item.idx]; delete selected[item.idx]; }); saveState(); renderStats(); renderQuestions(); }
function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
renderSectionView();
</script>
