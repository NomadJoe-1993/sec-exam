C":"都包括票面利率、期限、转股价格和转股比率、转股期限等","D":"在约定期限内都可以以约定的价格交换为标的股票"},"a":"BCD","an":"对投资者来说，可交换债券与持有标的上市公司的可转换公司债券相同，投资价值与上市公司价值相关，在约定期限内可以以约定的价格交换为标的的股票。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_48","q":"公开发行的证券公司债券，可以在（）上市交易或转让。","c":{"A":"证券交易所","B":"银行间债券市场","C":"中证机构间报价系统","D":"全国中小企业股份转让系统"},"a":"AD","an":"公开发行公司债券并在证券交易所、全国中小企业股份转让系统交易或转让，非公开发行公司债券并按照规定承销或自行销售、或在证券交易所、全国中小企业股份转让系统、机构间私募产品报价与服务系统、证券公司柜台转让的。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_54","q":"与现券交易相比，远期交易的特点主要表现在以下（）方面。","c":{"A":"远期交易的买卖双方进行商品交收或交割的时间与达成交易的时间，通常有较长的时间间隔","B":"远期交易存在价格风险，价格会随着时间的推移而变动","C":"远期交易买卖双方必须签订远期合同","D":"远期交易通过正式谈判，双方达成一致后签订合同才算成立"},"a":"ACD","an":"注意远期交易的货款早已谈妥，不会随时间的推移而改变，无价格风险。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_58","q":"规定了票面利率、在到期时一次性获得本息、存续期间没有利息支付的债券，称之为附息债券。（）","c":{"A":"错","B":"对"},"a":"A","an":"根据债券发行条款中是否规定在约定期限向债券持有人支付利息，债券可分为贴现债券、附息债券、息票累积债券三类。其中，息票累积债券规定了票面利率，但是，债券持有人必须在债券到期时一次性获得本息，存续期间没有利息支付。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_3","q":"下列关于金融债券的说法中，有误的是（）。","c":{"A":"金融债券的资信通常高于其他非金融机构债券","B":"金融债券能够较有效地解决银行等金融机构的资金来源不足和期限不匹配的矛盾","C":"金融债券的利率通常高于一般的企业债券","D":"金融债券违约风险相对较小，具有较高的安全性"},"a":"C","an":"金融债券的利率通常【低于】一般的企业债券，但高于风险更小的国债和银行储蓄存款利率。","type":"single"},{"id":"cflue_paper_金融基础_3.json_19","q":"目前我国企业债券发行实行（），公司债券公开发行执行中国证监会（）。","c":{"A":"注册制，审批制","B":"核准制，注册制","C":"审批制，核准制","D":"注册制，注册制"},"a":"D","an":"目前企业债券的发行和公司债券公开发行都是注册制。","type":"single"},{"id":"cflue_paper_金融基础_3.json_43","q":"银行业金融机构发行资本补充债券，应满足的条件不包括（）。","c":{"A":"偿债能力良好，且成立满一年","B":"具有完善的公司治理机制","C":"经营稳健，资产结构符合行业特征","D":"遵守国家产业政策和信贷政策"},"a":"A","an":"根据中国人民银行2018年第3号公告，银行业金融机构发行资本补充债券，应满足以下条件：具有完善的公司治理机制；偿债能力良好，且成立满【三年】；经营稳健，资产结构符合行业特征，以服务实体经济为导向，遵守国家产业政策和信贷政策；满足宏观审慎管理要求，且主要金融监管指标符合监管部门的有关规定。","type":"single"},{"id":"cflue_paper_金融基础_3.json_45","q":"中期票据发行业务中，（）。","c":{"A":"主承销商可以向投资者逆向询价","B":"投资者可以向主承销商逆向询价","C":"发行人可以向投资者逆向询价","D":"投资者可以向发行人逆向询价"},"a":"B","an":"企业发行中期票据应由符合条件的承销机构承销。中期票据投资者可就特定投资需求向主承销商进行逆向询价，主承销商可与企业协商发行符合特定需求的中期票据。","type":"single"},{"id":"cflue_paper_金融基础_3.json_51","q":"关于可交换公司债券与可转换公司债券的不同之处包括（）。","c":{"A":"参与主体不同","B":"交割方式不同","C":"适用的法规不同","D":"条款设置不同"},"a":"ABCD","an":"可交换公司债券与可转换公司债券的不同之处有：发债主体和偿债主体不同、适用的法规不同、发行目的不同、所换股份的来源不同、股权稀释效应不同、交割方式不同、条款设置不同。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_53","q":"下列关于中央银行票据的说法，有误的是（）。","c":{"A":"中央银行票据实质是中央银行债券","B":"期限通常在6个月到3年","C":"发行它的目的主要是进行对冲操作，回收外汇占款所投放的基础货币","D":"具有短期性的特点"},"a":"B","an":"中央银行票据的期限通常在3个月到3年。","type":"single"},{"id":"cflue_paper_金融基础_4.json_4","q":"通常，零息债券以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。（）","c":{"A":"错","B":"对"},"a":"B","an":"根据债券发行条款中是否规定在约定期限向债券持有入支付利息，债券可分为零息债券、附息债券和息票累积债券。其中，【零息债券】以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。","type":"judge"},{"id":"cflue_paper_金融基础_4.json_14","q":"一般来说，具有高度流动性的债券同时也是较安全的，因为它不仅可以迅速地转换为货币，还可以按一个较稳定的价格转换。关于债券不能收回投资的风险的说法有误的是（）。","c":{"A":"政府债券不履行债务的风险较高","B":"不同的债务人不履行债务的风险程度是不一样的","C":"债务人不履行债务导致债券不能收回投资","D":"市场利率水平影响债券的转让价格"},"a":"A","an":"一般来说，政府债券不履行债务的风险最低，D说法错误。","type":"single"},{"id":"cflue_paper_金融基础_4.json_15","q":"以下（）不是我国企业债券的种类。","c":{"A":"可续期企业债券","B":"国际债券","C":"普通企业债券","D":"中小企业集合债券"},"a":"B","an":"国际债券是指一国借款人在国际证券市场上以外国货币为面值、向外国投资者发行的债券。它是一种跨国发行的债券，涉及两个或两个以上的国家。","type":"single"},{"id":"cflue_paper_金融基础_4.json_16","q":"影响债券现金流的因素包括（）。","c":{"A":"计付息间隔","B":"债券的税收待遇","C":"票面利率","D":"债券的嵌入式期权条款"},"a":"ABCD","an":"债券发行条款规定了债券的现金流，具体包括：①债券的面值和票面利率；②计付息间隔；③债券的嵌入式期权条款；④债券的税收待遇；⑤其他因素。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_24","q":"下列关于可续期企业债券的说法，有误的是（）。","c":{"A":"具有期限超长、主动赎回、可充当资本金等诸多优势","B":"发改委并未对该类债券制定专门的规定","C":"计息周期一般在5到10年","D":"理论上可不断续期永续存在"},"a":"C","an":"可续期企业债券，是指在约定的计息周期（一般3-5年）到期时，发行人可按约定的利率调整机制调整利率后，继续延长一个周期的企业债券，理论上可不断续期永续存在，具有期限超长、主动赎回、可充当资本金等诸多优势。","type":"single"},{"id":"cflue_paper_金融基础_4.json_25","q":"下列关于财政部代理发行地方政府债可选择的托管单位的说法，正确的有（）。","c":{"A":"在国家规定的证券登记结算机构办理登记托管","B":"在中国证券登记结算有限责任公司深圳分公司托管","C":"在中央国债登记结算有限责任公司托管","D":"在中国证券登记结算有限责任公司上海分公司托管"},"a":"ABCD","an":"财政部代理发行的地方政府债券可选择的托管规定：在中央国债登记结算有限责任公司和中国证券登记结算有限责任公司上海分公司、深圳分公司选择托管。逾时未填制的，系统默认全部在中央国债登记结算有限责任公司托管。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_33","q":"下列关于金融衍生工具发展现状，说法有误的是（）","c":{"A":"按基础产品比较，利率衍生品无论在场内还是场外，均是名义金额最大的衍生品种类","B":"近年来，由于场外利率类衍生品名义金额下降较多，场外衍生品整体呈下降趋势，而场内衍生品却大幅增长","C":"金融衍生工具以场内交易为主","D":"按产品形态比较，远期和互换这两类具有对称性收益的衍生产品的名义金额比收益不对称的期权类产品大得多"},"a":"C","an":"金融衍生工具以【场外交易】为主。","type":"single"},{"id":"cflue_paper_金融基础_4.json_37","q":"在债券的以收益率为标的的美式招标发行方式中，各中标者（）。","c":{"A":"认购成本不同","B":"中标收益率相同","C":"到期收益率不同","D":"中标价格单一"},"a":"AC","an":"以收益率为标的的美式招标，是以募满发行额为止的中标者所投标的各个价位上的中标收益率作为中标者各自的最终中标收益率（中标收益率不同），各中标者的认购成本是不相同的。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_58","q":"资产证券化运作流程中，发起人的职责不包括（）。","c":{"A":"根据证券化目标确定资产数，并将资产汇集形成资产池","B":"判断组合的现金流水平，并决定借款人信用、抵押担保贷款的抵押价值","C":"根据自身的资产证券化融资要求，确定资产证券化目标","D":"与银行达成必要时提供流动性支持的周转协议，与券商达成承销协议"},"a":"D","an":"发起人（一般是发放贷款的金融机构，也被称为原始权益人）根据自身的资产证券化融资要求，确定资产证券化目标，对自己拥有的能够产生未来现金收入流的信贷资产进行清理、估算和考核，根据历史经验数据对整个组合的现金流的平均水平有一个基本判断，决定借款人信用、抵押担保贷款的抵押价值等；并将应收和可预见现金流资产进行组合，对现金流的重组可按贷款的期限结构、本金和利息的重新安排或风险的重新分配等进行，根据证券化目标确定资产数，最后将这些资产汇集形成一个资产池。C选项是特设信托机构的职责。","type":"single"},{"id":"cflue_paper_金融基础_5.json_4","q":"下列关于金融债券的说法中，有误的是（）。","c":{"A":"金融债券的资信通常高于其他非金融机构债券","B":"金融债券能够较有效地解决银行等金融机构的资金来源不足和期限不匹配的矛盾","C":"金融债券的利率通常高于一般的企业债券","D":"金融债券违约风险相对较小，具有较高的安全性"},"a":"C","an":"金融债券的利率通常【低于】一般的企业债券，但高于风险更小的国债和银行储蓄存款利率。","type":"single"},{"id":"cflue_paper_金融基础_5.json_10","q":"公司在发行不动产抵押公司债券时通常用做抵押的有（）。","c":{"A":"土地","B":"房屋","C":"有价证券","D":"艺术品"},"a":"AB","an":"不动产抵押公司债券是以公司的不动产（如房屋、土地等）作抵押而发行的债券，是抵押证券的一种。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_12","q":"下列关于证券公司债券的说法，正确的有（）。","c":{"A":"非公开发行的公司债券仅限于合格投资者范围内转让","B":"非公开发行的证券公司债券，每次发行对象不得超过二百人","C":"对证券公司债券发行有强制性担保要求","D":"证券公司债券公开发行的利率由询价或公开招标等市场化方式确定"},"a":"ABD","an":"对证券公司债券发行没有强制性担保要求，D错误。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_14","q":"交易所市场发行国债的分销时，下列说法正确的是（）。","c":{"A":"证券交易所为同一期（次）国债向不同承销商提供同一承销代码","B":"投资者通过交易所买入债券时，缴纳佣金","C":"通过证券交易所交易后，国债不会自动过户到客户的账户内","D":"在实际运作中，承销商可以选择场内挂牌分销或场外分销两种方式"},"a":"D","an":"证券交易所为每一承销商确定当期国债【各自的承销代码】，以便于场内挂牌。B错误。投资者在买入债券时，可免缴佣金，C错误。买卖成交后，客户认购的国债自动过户至客户的账户内，D错误。","type":"single"},{"id":"cflue_paper_金融基础_5.json_20","q":"以下（）不是我国其他类型国债的种类。","c":{"A":"保值债券","B":"普通债券","C":"财政债券","D":"国家重点建设债券"},"a":"B","an":"我国其他类型国债的种类有：国家重点建设债券、国家建设债券、财政债券、特种债券、保值债券、基本建设债券、特别国债、长期建设国债。","type":"single"},{"id":"cflue_paper_金融基础_5.json_31","q":"与现券交易相比，远期交易的特点主要表现在以下（）方面。","c":{"A":"远期交易的买卖双方进行商品交收或交割的时间与达成交易的时间，通常有较长的时间间隔","B":"远期交易存在价格风险，价格会随着时间的推移而变动","C":"远期交易买卖双方必须签订远期合同","D":"远期交易通过正式谈判，双方达成一致后签订合同才算成立"},"a":"ACD","an":"注意远期交易的货款早已谈妥，不会随时间的推移而改变，无价格风险。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_37","q":"根据我国财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的，约定一定期限内主要以（）还本付息的政府债券。","c":{"A":"中央政府收入","B":"专项收入","C":"金融机构收入","D":"政府性基金"},"a":"BD","an":"根据财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的、约定一定期限内以公益性项目对应的【政府性基金或专项收入】还本付息的政府债券。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_55","q":"下列关于金融衍生工具发展现状，说法有误的是（）","c":{"A":"按基础产品比较，利率衍生品无论在场内还是场外，均是名义金额最大的衍生品种类","B":"近年来，由于场外利率类衍生品名义金额下降较多，场外衍生品整体呈下降趋势，而场内衍生品却大幅增长","C":"金融衍生工具以场内交易为主","D":"按产品形态比较，远期和互换这两类具有对称性收益的衍生产品的名义金额比收益不对称的期权类产品大得多"},"a":"C","an":"金融衍生工具以【场外交易】为主。","type":"single"},{"id":"cflue_paper_金融基础_5.json_58","q":"银行业金融机构发行资本补充债券，应满足的条件不包括（）。","c":{"A":"偿债能力良好，且成立满一年","B":"具有完善的公司治理机制","C":"经营稳健，资产结构符合行业特征","D":"遵守国家产业政策和信贷政策"},"a":"A","an":"根据中国人民银行2018年第3号公告，银行业金融机构发行资本补充债券，应满足以下条件：具有完善的公司治理机制；偿债能力良好，且成立满【三年】；经营稳健，资产结构符合行业特征，以服务实体经济为导向，遵守国家产业政策和信贷政策；满足宏观审慎管理要求，且主要金融监管指标符合监管部门的有关规定。","type":"single"},{"id":"comp_85756","q":"关于中国债券市场的说法，正确的有（）。","c":{"A":"国债是以国家信用为担保发行的债券","B":"地方政府债券由地方政府发行，以地方政府信用为担保","C":"金融债券的发行主体是银行或非银行金融机构","D":"可转换债券可以在特定条件下转换为发行公司的普通股"},"a":"ABCD","an":"四个选项均正确。此外，公司债券的发行主体是股份有限公司或有限责任公司，企业债券的发行主体通常为中央政府部门所属机构、国有独资企业或国有控股企业。","type":"comprehensive","material":"2024年，中国债券市场总规模位居全球第二。债券品种包括国债、地方政府债、金融债、企业债和公司债等。国债收益率曲线是金融市场的重要基准利率曲线，对债券定价和货币政策传导具有重要作用。","sub_type":"multi"},{"id":"comp_67475","q":"关于债券收益率，下列说法错误的是（）。","c":{"A":"名义收益率是票面利息与面值的比率","B":"当期收益率是票面利息与当前市场价格的比率","C":"到期收益率考虑了利息再投资因素","D":"持有期收益率等同于到期收益率"},"a":"D","an":"选项D错误。持有期收益率是投资者持有债券期间的收益率，取决于卖出价格和持有期间的利息收入。到期收益率是从买入持有至到期的年平均收益率，两者计算前提不同。选项ABC均正确。","type":"comprehensive","material":"2024年，中国债券市场总规模位居全球第二。债券品种包括国债、地方政府债、金融债、企业债和公司债等。国债收益率曲线是金融市场的重要基准利率曲线，对债券定价和货币政策传导具有重要作用。","sub_type":"single"},{"id":"comp_87739","q":"关于债券发行方式的说法，正确的是（）。","c":{"A":"公开发行债券必须进行信用评级","B":"定向发行的债券可以公开转让","C":"国债的发行方式包括公开招标方式","D":"公司债券公开发行实行注册制"},"a":"ACD","an":"选项B错误。定向发行的债券仅限于合格投资者范围内转让，不能公开转让。公开招标是国债发行的主要方式。公司债券公开发行实行注册制，由证券交易所负责审核，证监会履行注册程序。","type":"comprehensive","material":"债券的发行与交易有特定的规则。债券发行方式包括公开发行和定向发行。债券交易市场分为银行间债券市场和交易所债券市场，其中银行间债券市场是中国债券市场的主体。","sub_type":"multi"},{"id":"comp_41736","q":"关于银行间债券市场，下列说法正确的是（）。","c":{"A":"银行间债券市场是场外市场（OTC）","B":"只有银行类金融机构可以参与银行间债券市场交易","C":"银行间债券市场的交易方式以询价交易为主","D":"中国人民银行对银行间债券市场进行监管"},"a":"ACD","an":"选项B错误。银行间债券市场的参与主体包括各类金融机构（商业银行、证券公司、保险公司、基金公司等）以及非法人产品（理财产品、资管计划等），并非仅限于银行类金融机构。","type":"comprehensive","material":"债券的发行与交易有特定的规则。债券发行方式包括公开发行和定向发行。债券交易市场分为银行间债券市场和交易所债券市场，其中银行间债券市场是中国债券市场的主体。","sub_type":"multi"},{"id":"cflue_zc_ch6.json_1","q":"基金的交易实行集体交易管理制度，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。（）","c":{"A":"错","B":"对"},"a":"A","an":"基金的交易实行【集中交易管理】制度，基金管理人设有中央交易室，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。","type":"judge"},{"id":"cflue_zc_ch6.json_2","q":"关于投资者申购、赎回一般开放式基金时的价格，下列说法正确的是（）。","c":{"A":"债券基金的申赎遵循“已知价”原则进行申赎","B":"有时能即时获知买卖的成交价格","C":"只能以申、赎日交易时间结束后基金管理人公布的基金份额净值为基准进行计算","D":"与封闭式基金一样，按“已知价”原则进行申赎"},"a":"C","an":"对一般开放式基金（股票基金、债券基金、混合基金等）而言，在申购、赎回时则遵循“未知价”交易原则，投资者在申购、赎回一般开放式基金份额时并不能即时获知买卖的成交价格。申购、赎回价格只能以申购、赎回日交易时间结束后基金管理人公布的基金份额净值为基准进行计算，这与股票、封闭式基金等金融产品按”已知价”原则进行买卖不同。","type":"single"},{"id":"cflue_zc_ch6.json_3","q":"如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起（）内编制并披露临时报告书。","c":{"A":"3日","B":"5日","C":"2日","D":"1日"},"a":"C","an":"如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起2日内编制并披露临时报告书。","type":"single"},{"id":"cflue_zc_ch6.json_4","q":"开放式基金的特点有（）。","c":{"A":"没有发行规模限制","B":"没有固定期限","C":"全部资金可用于长期投资","D":"基金份额资产净值每周公布一次"},"a":"AB","an":"开放式基金是指基金份额总额不固定，基金份额可以在合同约定的时间和场所内申请申购或者赎回的基金，基金份额资产净值每个交易日公布一次，募集资金需要保持一定的流动性，不能全部用来做长期投资。","type":"multi"},{"id":"cflue_zc_ch6.json_5","q":"投资者适当性管理通常采用的方法有（）。","c":{"A":"承诺收益","B":"组合管理","C":"产品风险评估","D":"客户调查问卷"},"a":"CD","an":"投资者适当性管理通常采用【客户调查问卷、产品风险评估与充分披露】等方法，根据客户分级和资产分级匹配原则，避免误导投资者和错误销售。","type":"multi"},{"id":"cflue_zc_ch6.json_6","q":"以下关于私募基金的说法正确的有（）。","c":{"A":"私募基金只能采取非公开方式发行","B":"私募基金向特定合格投资者发售","C":"私募基金的投资范围广","D":"私募基金的投资金额较小，风险较小"},"a":"ABC","an":"私募基金的投资金额高，风险较大。C错误。","type":"multi"},{"id":"cflue_zc_ch6.json_7","q":"存续期募集信息披露主要指开放式基金在基金合同生效后每（）披露一次更新的招募说明书。","c":{"A":"6个月","B":"1年","C":"3个月","D":"9个月"},"a":"A","an":"存续期募集信息披露主要指开放式基金在基金合同生效后每【6个月】披露一次更新的招募说明书。","type":"single"},{"id":"cflue_zc_ch6.json_8","q":"在我国，非公开募集证券投资基金合格投资者累计不得超过（）人。","c":{"A":"250","B":"200","C":"150","D":"100"},"a":"B","an":"在我国，非公开募集证券投资基金合格投资者累计不得超过200人。","type":"single"},{"id":"cflue_zc_ch6.json_9","q":"为履行基金托管人的职责，托管银行在托管部门设立不同的处室来履行职责，这些处室一般不包括（）。","c":{"A":"负责基金资产清算、核算的部门","B":"负责市场开拓、研究、客户关系维护的市场部门","C":"负责基金交易监管、内部风险控制的部门","D":"负责基金销售的部门"},"a":"D","an":"托管银行在托管部设立的处室不包括基金销售部门。","type":"single"},{"id":"cflue_zc_ch6.json_10","q":"我国基金监管法律法规体系的核心是（）。","c":{"A":"《基金运作管理办法》","B":"《证券法》","C":"《证券投资基金法》","D":"《基金管理公司管理办法》"},"a":"C","an":"我国基金监管法律法规体系的核心是《证券投资基金法》。","type":"single"},{"id":"cflue_zc_ch6.json_11","q":"不参与基金会计核算的基金费用有（）。","c":{"A":"申购费","B":"管理费","C":"认购费","D":"托管费"},"a":"AC","an":"基金申购费和认购费，不参与基金的会计核算。","type":"multi"},{"id":"cflue_zc_ch6.json_12","q":"基金合同是约定基金管理人、基金托管人和基金份额持有人权利义务关系的基本法律文件。基金合同的主要披露事项包括（）。","c":{"A":"基金份额发售日期","B":"募集基金的目的和名称","C":"基金份额持有人","D":"基金运作方式"},"a":"ABCD","an":"基金合同的主要披露事项包括募集基金的目的和基金名称，基金运作方式，基金份额发售日期、价格和费用原则，基金份额持有人、基金管理人和基金托管人的权利与义务，基金份额发售、交易、申购、赎回的程序、时间、地点、费用计算方式以及给付赎回款项的时间和方式，基金收益分配原则，费用提取及支付方式，投资方向和投资限制，净值的计算方式和公告方式等。故全选。","type":"multi"},{"id":"cflue_zc_ch6.json_13","q":"基金运作可分为（）三大部分。","c":{"A":"基金的信息披露","B":"基金的投资管理","C":"基金的后台管理","D":"基金的市场营销"},"a":"BCD","an":"基金运作可分为基金的市场营销、投资管理与后台管理三大部分。信息披露包含在投资管理内容里。","type":"multi"},{"id":"cflue_zc_ch6.json_14","q":"从事基金服务业务的机构，按照中国证监会的有关规定应进行注册或者备案，这些机构包括（）。","c":{"A":"从事公募基金的信息技术系统服务的机构","B":"从事公募基金的份额登记的机构","C":"从事公募基金的投资顾问的机构","D":"从事公募基金的销售机构"},"a":"ABCD","an":"从事基金服务业务的机构，应当按照国务院证券监督管理机构的规定进行注册或者备案，这些机构主要包括基金销售机构、基金销售支付机构、基金份额登记机构、基金估值核算机构、基金投资顾问机构、基金评价机构、律师事务所、会计师事务所、信息技术系统服务机构等。","type":"multi"},{"id":"cflue_zc_ch6.json_15","q":"关于对公募基金募集的监管，下列说法中，正确的有（）。","c":{"A":"公开募集基金，不需要经中国证监会注册","B":"基金募集期满，不论是否达到设立标准，均需向中国证监会办理基金备案手续","C":"公开募集基金应当经中国证监会注册","D":"基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续"},"a":"CD","an":"公开募集基金应当经中国证监会注册，C正确；基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续，D正确。A错误（公募基金必须经注册），B错误（须达到设立标准才备案）。故本题选CD。","type":"multi"},{"id":"cflue_zc_ch6.json_16","q":"下列属于基金收入来源的有（）。","c":{"A":"证券买卖差价","B":"存款利息","C":"债券利息","D":"管理费收入"},"a":"ABC","an":"基金收入主要包括利息收入、投资收益以及其他收入。管理费收入是从基金财产中计提，归属于基金管理人的收入。","type":"multi"},{"id":"cflue_zc_ch6.json_17","q":"证券投资基金支付的费用主要包括（）。","c":{"A":"基金销售服务费","B":"基金交易费","C":"基金托管费","D":"基金管理费"},"a":"ABCD","an":"基金从设立到终止都要支付一定的费用。通常情况下，基金所支付的费用主要有以下几个方面：基金管理费、基金托管费、基金交易费、基金运作费、基金销售服务费。","type":"multi"},{"id":"cflue_zc_ch6.json_18","q":"小张拟认购开放式基金，在开立基金账户和资金账户后于20×8年6月11日提交了认购申请表，那么，自（）日起小张可到办理认购的网点查询认购申请的受理情况。","c":{"A":"20×8年6月16日","B":"20×8年6月13日","C":"20×8年6月14日","D":"20×8年6月15日"},"a":"B","an":"投资者于T日提交认购申请后，可于T+2日起到办理认购的网点査询认购申请的受理情况。","type":"single"},{"id":"cflue_zc_ch6.json_19","q":"基金管理人会针对不同的基金类型、不同的认购金额设置不同的认购费率。我国股票型基金的认购费率大多为1%—1.5%，货币市场基金一般不收取认购费，债券型基金的认购费率通常在（）以下。","c":{"A":"1%","B":"0.5%","C":"2%","D":"1.5%"},"a":"A","an":"略。","type":"single"},{"id":"cflue_zc_ch6.json_20","q":"基础设施公募REITs的申请文件包括（）。","c":{"A":"招募说明书草案","B":"基金托管协议草案","C":"上市申请","D":"基金托管人与主要参与机构签订的协议文件"},"a":"ABC","an":"申请文件应当包括以下内容：（1）上市申请；（2）基金合同草案；（3）基金托管协议草案；（4）招募说明书草案；（5）律师事务所对基金出具的法律意见书；（6）基金管理人及资产支持证券管理人相关说明材料，包括但不限于：投资管理、项目运营、风险控制制度和流程，部门设置与人员配备，同类产品与业务管理情况等；（7）拟投资基础设施资产支持证券认购协议；（8）【基金管理人】与主要参与机构签订的协议文件；（B错误）（9）要求的其他材料。","type":"multi"},{"id":"cflue_zc_ch6.json_21","q":"基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后（）日内返还投资者已缴纳的款项，并加计银行同期存款利息。","c":{"A":"50","B":"15","C":"30","D":"25"},"a":"C","an":"基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后30日内返还投资者已缴纳的款项，并加计银行同期存款利息。","type":"single"},{"id":"cflue_zc_ch6.json_22","q":"基金管理费率通常与基金规模成（），与风险成（）。","c":{"A":"反比；反比","B":"正比；正比","C":"反比；正比","D":"正比；反比"},"a":"C","an":"基金规模越大，风险程度越低，基金管理费率越低。","type":"single"},{"id":"cflue_zc_ch6.json_23","q":"私募基金信息披露义务人应当向投资者披露的信息包括（）。","c":{"A":"基金份额总额","B":"招募说明书","C":"可能存在的利益冲突","D":"基金的资产负债情况"},"a":"BCD","an":"私募基金信息披露义务人应当向投资者披露的信息包括基金合同；招募说明书等宣传推介文件；基金销售协议中的主要权利义务条款（如有）；基金的投资情况；基金的资产负债情况；基金的投资收益分配情况；基金承担的费用和业绩报酬安排；可能存在的利益冲突；涉及私募基金管理业务、基金财产、基金托管业务的重大诉讼、仲裁；中国证监会以及中国证券投资基金业协会规定的影响投资者合法权益的其他重大信息。","type":"multi"},{"id":"cflue_zc_ch6.json_24","q":"基金管理人运用基金财产进行证券投资，不得有下列（）情形。","c":{"A":"同一基金管理人管理的全部基金持有一家公司发行的证券，超过该证券的10%","B":"基金总资产超过基金净资产的140%","C":"一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%","D":"违反基金合同关于投资范围、投资策略和投资比例等约定"},"a":"ABCD","an":"基金管理人运用基金财产进行证券投资，不得有下列情形：（1）一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%；（2）同一基金管理人管理的全部基金持有一家公司发行的证券，其市值超过该证券的10%；（3）基金财产参与股票发行申购，单只基金所申报的金额超过该基金的总资产，单只基金所申报的股票数量超过拟发行股票公司本次发行股票的总量；（4）一只基金持有其他基金（不含货币市场基金），其市值超过基金资产净值的10%，但基金中基金除外；（5）基金中基金持有其他单只基金，其市值超过基金资产净值的20%,或者投资于其他基金中基金；（6）基金总资产超过基金净资产的140%；（7）违反基金合同关于投资范围、投资策略和投资比例等约定；（8）中国证监会规定禁止的其他情形。完全按照有关指数的构成比例进行证券投资的基金品种可以不受前款（1）项、（2）项规定的比例限制。","type":"multi"},{"id":"cflue_zc_ch6.json_25","q":"在基金市场上存在着许多不同的参与主体，依据所承担的责任与作用的不同，可以将基金市场的参与主体分为（）。","c":{"A":"其他机构","B":"基金的监管机构和自律组织","C":"基金当事人","D":"基金市场服务机构"},"a":"BCD","an":"基金市场参与主体，分为三大类，即基金当事人、基金市场服务机构和基金的监管机构和自律组织。","type":"multi"},{"id":"cflue_zc_ch6.json_26","q":"首次募集信息披露主要包括基金份额发售前至基金合同生效期间进行的信息披露。在基金份额发售前，基金管理人需要编制并披露（）。","c":{"A":"基金份额发售公告","B":"基金净值公告","C":"基金招募说明书","D":"基金合同"},"a":"ACD","an":"首次募集信息的披露包括的内容，除上述ABD选项外，还包括基金托管协议。","type":"multi"},{"id":"cflue_zc_ch6.json_27","q":"以资本资产定价模型为基础的评价基金业绩的绝对指标是指（）。","c":{"A":"标准普尔指数","B":"詹森指数","C":"夏普指数","D":"特雷诺指数"},"a":"B","an":"1968年，迈克尔•詹森提出了一种以资本资产定价模型（CAPM）为基础的评价基金业绩的绝对指标，通常被称为詹森α。","type":"single"},{"id":"cflue_zc_ch6.json_28","q":"为了防止信息误导给投资者造成损失，保护公众投资者的合法权益，维护证券市场的正常秩序，法律法规对借公开信息披露基金信息为名编制、传播虚假基金信息，恶意进行信息误导，诋毁同行或竞争对手等行为做出了禁止性规定。具体包括下列（）情形。","c":{"A":"禁止诋毁其他基金管理人、托管人或者基金销售机构","B":"禁止进行虚假记载、误导性陈述或者重大遗漏","C":"禁止对基金的证券投资业绩进行预测","D":"禁止违规承诺收益或承担损失"},"a":"ABCD","an":"为了防止信息误导给投资者造成损失，保护公众投资者的合法权益，维护证券市场的正常秩序，法律法规对于借公开披露基金信息为名编制、传播虚假基金信息，恶意进行信息误导，诋毁同行或竞争对手等行为作出了禁止性规定。具体包括：&amp;lt;br&amp;gt;（1）禁止进行虚假记载、误导性陈述或者重大遗漏；&amp;lt;br&amp;gt;（2）禁止对基金的证券投资业绩进行预测；&amp;lt;br&amp;gt;（3）禁止违规承诺收益或者承担损失；&amp;lt;br&amp;gt;（4）禁止诋毁其他基金管理人、托管人或者基金销售机构；&amp;lt;br&amp;gt;（5）禁止登载任何自然人、法人或者其他组织的祝贺性、恭维性或推荐性的文字。","type":"multi"},{"id":"cflue_zc_ch6.json_29","q":"下列关于佣金的说法，正确的有（）。","c":{"A":"A股交易佣金不得低于代收的证券交易监管费和证券交易所手续费","B":"佣金的收费标准因交易品种、交易场所的不同而有所差异","C":"目前我国证券投资基金交易实行固定佣金制度","D":"A股佣金标准的起点与B股相同"},"a":"AB","an":"按照沪、深证券交易所公布的收费标准，我国基金交易佣金不得高于成交金额的0.5%（深圳证券交易所特别规定该佣金水平不得低于代收的证券交易监管费和证券交易经手费，上海证券交易所无此规定），起点5元，由证券公司向投资者收取。B错误。A股、证券投资基金每笔交易佣金不足5元的，按5元收取；B股每笔交易佣金不足1美元或5港元的，按1美元或5港元收取；C错误。","type":"multi"},{"id":"cflue_zc_ch6.json_30","q":"下列关于ETF的说法，正确的有（）。","c":{"A":"ETF基金份额是变化的","B":"ETF可能出现折价交易现象","C":"ETF的独特之处在于实行一级市场与二级市场交易同步进行的制度安排","D":"正常情况下，套利活动会使套利机会消失"},"a":"ABCD","an":"ETF是一种在交易所上市交易的、基金份额可变的一种开放式基金。同时，又可以像封闭式基金一样在二级市场上按市场价格买卖ETF份额，不过，申购赎回必须以一篮子股票换取基金份额或者以基金份额换回一篮子股票。由于同时存在证券市场交易和申购赎回机制，投资者可以在ETF市场价格与基金单位净值之间存在差价时进行套利交易。套利机制的存在，使得ETF避免了封闭式基金普遍存在的折价问题。","type":"multi"},{"id":"cflue_zc_ch6.json_31","q":"下列关于证券投资基金的运作关系的说法，正确的有（）。","c":{"A":"监管机构对基金市场上的各类参与主体实施全面监管","B":"各种中介服务机构都是为基金管理人及其管理的基金服务，居于外围服务位置","C":"监管机构在基金运作关系中居于顶层主导和核心位置","D":"基金投资者、基金管理人和基金托管人都是基金的主要当事人"},"a":"ABD","an":"基金管理人是基金的募集者和管理者，在整个基金的运作中起着核心的作用。B错误。","type":"multi"},{"id":"cflue_zc_ch6.json_32","q":"A公司将自已拥有的85%的资金资产投资于股票，剩余的15%用于投资国债，则该证券投资基金为（）。","c":{"A":"债券基金","B":"混合型基金","C":"偏股基金","D":"股票基金"},"a":"D","an":"根据中国证监会对基金类别的分类标准，80%以上的基金资产投资于股票的，为股票基金。","type":"single"},{"id":"cflue_zc_ch6.json_33","q":"私募基金运行 理人应当依法募集资金，办理基金份额的发售和登记事宜。","sub_type":"multi"},{"id":"cflue_zc_ch7.json_1","q":"自1981年美国所罗门兄弟公司为IBM和世界银行办理了首笔（）之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。","c":{"A":"美元与马克和瑞士法郎","B":"美元与英镑和瑞士法郎","C":"美元与英镑和法郎","D":"美元与日元和英镑"},"a":"A","an":"自1981年美国所罗门兄弟公司为IBM和世界银行办理首笔【美元与马克和瑞士法郎】之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。","type":"single"},{"id":"cflue_zc_ch7.json_2","q":"从理论上说，潜在盈利有可能无限大的交易者有（）。","c":{"A":"期货出售者","B":"期货购买者","C":"期权出售者","D":"期权购买者"},"a":"ABD","an":"期货交易双方潜在的盈利和亏损都是无限的，而期权购买者潜在的盈利无限大，期权卖方的潜在损失无限大。","type":"multi"},{"id":"cflue_zc_ch7.json_3","q":"根据交易合约的签订与实际交割之间的关系，可以将市场交易的组织形态分为（）。","c":{"A":"期权交易","B":"期货交易","C":"远期交易","D":"现货交易"},"a":"BCD","an":"根据交易合约的签订与实际交割之间的关系，可以将市场交易的组织形态分为现货交易、远期交易及期货交易。","type":"multi"},{"id":"cflue_zc_ch7.json_4","q":"沪深300股指期货合约交易代码为SH。（）","c":{"A":"错","B":"对"},"a":"A","an":"沪深300股指期货合约交易代码为IF，中证500股指期货合约代码为IC，上证50股指期货合约代码为IH。","type":"judge"},{"id":"cflue_zc_ch7.json_5","q":"对投资者而言，美国存托凭证ADR的优点包括（）。","c":{"A":"以美元交易，且通过投资者熟悉的当地清算公司进行清算","B":"上市公司发放股利时，ADR投资者能及时获得，且以当地货币支付","C":"上市交易的ADR需经美国证券交易委员会注册，有助于保障投资者权益","D":"某些机构投资者受投资政策限制，不能投资非美国上市证券，ADR可以规避相关限制"},"a":"ACD","an":"上市公司发放股利时，ADR投资者能及时获得，而且是以【美元】支付。A错误，其余均正确。","type":"multi"},{"id":"cflue_zc_ch7.json_6","q":"强制减仓制度是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。（）","c":{"A":"错","B":"对"},"a":"B","an":"【强制减仓制度】是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。","type":"judge"},{"id":"cflue_zc_ch7.json_7","q":"与金融现货交易相比，金融期货的特征具体表现在（）。","c":{"A":"交易目的不同","B":"交易价格的含义不同","C":"交易方式不同","D":"交易对象不同"},"a":"ABCD","an":"与金融现货交易相比，金融期货的特征具体表现在：交易对象不同、交易目的不同、交易价格的含义不同、交易方式不同、结算方式不同。","type":"multi"},{"id":"cflue_zc_ch7.json_8","q":"按基础工具划分，金融期货的主要类型包括（）。","c":{"A":"商品类期货","B":"外汇期货","C":"股权类期货","D":"利率期货"},"a":"BCD","an":"按基础工具划分，金融期货类型包括：外汇期货、利率期货、股权类期货。","type":"multi"},{"id":"cflue_zc_ch7.json_9","q":"某大型农场为了防止农用化肥尿素市场价格变动对企业经营带来的风险，于是与某大型尿素供应商签订了以固定价格购货的长期合同。但后来考虑到合同可能存在对手违约风险，于是将规避风险的方式改为在期货市场上利用尿素期货进行套期保值操作。以上描述中，企业的行为旨在规避的风险包括（）。","c":{"A":"信用风险","B":"操作风险","C":"流动性风险","D":"市场风险"},"a":"AD","an":"略。","type":"multi"},{"id":"cflue_zc_ch7.json_10","q":"关于信用违约互换（简称CDS），下列说法中，正确的有（）。","c":{"A":"信用违约互换双方约定以某一信用工具做参考","B":"若参考工具发生规模的信用违约事件，则信用违约出售方须向购买方支付赔偿","C":"信用违约互换交易具有较高的杠杆性","D":"最基本的信用违约互换涉及两个或者两个以上当事人"},"a":"ABC","an":"最基本的信用违约互换涉及两个当事人，双方约定以某一信用工具为参考，一方向另一方出售信用保护，若参考工具发生规定的信用违约事件，则信用保护出售方必须向购买方支付赔偿。信用违约具有较高的杠杆性。","type":"multi"},{"id":"cflue_zc_ch7.json_11","q":"中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体有（）。","c":{"A":"发行人","B":"存托人","C":"持有人","D":"托管人"},"a":"ABC","an":"中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体：发行人、持有人、存托人。","type":"multi"},{"id":"cflue_zc_ch7.json_12","q":"金融衍生工具可以按照（）分为独立衍生工具和嵌入式衍生工具。","c":{"A":"自身交易方式","B":"交易场所","C":"基础工具种类","D":"产品形态"},"a":"D","an":"金融衍生工具根据【产品形态】可分为独立衍生工具和嵌入式衍生工具。&amp;lt;br&amp;gt;按照【自身交易的方法和特点】可以分为金融远期合约、金融期货、金融期权、金融互换和结构化金融衍生工具；&amp;lt;br&amp;gt;按照【基础工具种类】，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具；&amp;lt;br&amp;gt;按照【交易场所】可分为交易所交易的衍生工具和场外交易市场交易的衍生工具。","type":"single"},{"id":"cflue_zc_ch7.json_13","q":"以政府债券、欧洲美元债券、大面额可转让存单为基础资产的期权属于（）。","c":{"A":"股票期权","B":"货币期权","C":"利率期权","D":"互换期权"},"a":"C","an":"利率期权合约通常以政府短期、中期、长期债券，欧洲美元债券，大面额可转让存单等利率工具为标的物。","type":"single"},{"id":"cflue_zc_ch7.json_14","q":"下列关于沪深300股指期货交易涨跌幅限制的规定，正确的有（）。","c":{"A":"股指期货合约最后交易日不设涨跌停板","B":"股指期货合约的涨跌停板幅度为上一交易日结算价的±10%","C":"季月合约上市首日涨跌停板幅度为挂盘基准价的±20%","D":"股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±15%"},"a":"BC","an":"CD项，股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±20%。","type":"multi"},{"id":"cflue_zc_ch7.json_15","q":"下列关于期货交易的说法，错误的有（）。","c":{"A":"期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格不受最小价格变动单位限定和日交易振幅规定","B":"期货合约在交易所内交易，具有公开性","C":"期货合约是标准化合约","D":"期货合约的结算通过专门的结算公司，投资者需要对对方负责，存在信用风险"},"a":"AD","an":"期货合约的结算通过专门的结算公司，这是独立于买卖双方的第三方，投资者无须对对方负责，不存在信用风险，而只有价格变动的风险。C错误；期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格受最小价格变动单位限定和日交易振幅限定。D错误。","type":"multi"},{"id":"cflue_zc_ch7.json_16","q":"下列关于存托凭证（ADR）的说法，正确的有（）。","c":{"A":"存托凭证能避开直接发行股票和债券的相关法律要求，上市手续简单，发行成本低","B":"上市交易的ADR不须经过SE注册","C":"由于市场容量大，在美国发行ADR的外国公司能在短期内筹集到大量的外汇资金","D":"存托凭证由J.P摩根首创"},"a":"ACD","an":"上市交易的ADR须经美国证券交易委员会(SEC)注册，有助于保障投资者权益。D错误。","type":"multi"},{"id":"cflue_zc_ch7.json_17","q":"关于期货交易，下列说法正确的是（）。","c":{"A":"期货合约可以不进行实物交收","B":"期货合约交易双方并不知道交易对手的情况","C":"期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易","D":"期货合约可以进行反向交易、平仓了结"},"a":"ABCD","an":"期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易，具备对冲机制（可进行方向交易）、履约回旋余地较大实物交割比例极低，交易双方不知道互相情况。","type":"multi"},{"id":"cflue_zc_ch7.json_18","q":"与金融衍生产品相对应的基础金融产品可以有（）。","c":{"A":"银行定期存款单","B":"商品期货","C":"股票","D":"债券"},"a":"ABCD","an":"金融衍生工具又被称为金融衍生产品，是与基础金融产品相对应的一个概念，指建立在基础产品或基础变量之上，其价格取决于基础金融产品价格（或数值）变动的派生金融产品。基础金融产品包括现货金融产品（如债券、股票、银行定期存款单等等），也包括金融衍生工具。作为金融衍生工具基础的变量种类繁多，主要是各类资产价格、价格指数、利率、汇率、费率、通货膨胀率以及信用等级等等；近些年来，某些自然现象（如气温、降雪量、霜冻、飓风）甚至人类行为（如选举、温室气体排放）也逐渐成为金融衍生工具的基础变量。商品期货也属于金融衍生工具的一种。","type":"multi"},{"id":"cflue_zc_ch7.json_19","q":"美式期权则可在期权到期日或到期日之前的任何一个营业日执行。（）","c":{"A":"错","B":"对"},"a":"B","an":"欧式期权只能在期权到期日执行；美式期权则可在期权到期日或到期日之前的任何一个营业日执行；修正的美式期权也被称为“百慕大期权”或“大西洋期权”，可以在期权到期日之前的一系列规定日期执行。","type":"judge"},{"id":"cflue_zc_ch7.json_20","q":"金融衍生工具按照基础工具种类，可以分为（）。","c":{"A":"股权类产品的衍生工具","B":"结构化金融衍生工具","C":"利率衍生工具","D":"货币衍生工具"},"a":"ACD","an":"金融衍生工具按照基础工具种类，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具，结构化金融衍生工具属于金融衍生工具按照金融衍生工具自身交易的方式及特点分类下的一种。","type":"multi"},{"id":"cflue_zc_ch7.json_21","q":"上证50ETF期权的合约到期月份有（）。","c":{"A":"下月","B":"随后两个季月","C":"随后三个季月","D":"当月"},"a":"ABD","an":"上证50ETF期权的合约到期月份分别为当月、下月及随后的两个季月。","type":"multi"},{"id":"cflue_zc_ch7.json_22","q":"2018年4月17日沪深300指数开盘报价为3812.87点，当年9月份到期的沪深300指数期货合约开盘价为3718.8点，若期货投机者预期当日期货报价下跌，开盘即空头开仓，并在当日最低价3661.6点进行空头平仓。若期货公司要求的初始保证金为10%，则该投机者当日即实现盈利（）元，日收益率（）。","c":{"A":"17160；15.38%","B":"28221；10.25%","C":"28221；15.38%","D":"17160；10.25%"},"a":"A","an":"隐含考点是沪深300股指期货合约合约乘数为每点300元。实现盈利为（3718.8-3661.6）×300=17160（元），投入资金为3718.8×300×10%=111564（元），日收益率为17160÷111564×100%=15.38%。","type":"single"},{"id":"cflue_zc_ch7.json_23","q":"期货市场上的投机者利用对未来期货价格走势的预期进行投机交易，（）。","c":{"A":"预计价格上涨的投机者会建立期货多头","B":"预计价格下跌的投机者会建立期货多头","C":"预计价格上涨的投机者会建立期货空头","D":"预计价格下跌的投机者会建立期货空头"},"a":"AD","an":"期货市场上的投机者也会利用对未来期货价格走势的预期进行投机交易，预计价格上涨的投机者会建立期货多头，反之则建立空头。","type":"multi"},{"id":"cflue_zc_ch7.json_24","q":"按照合约所规定的履约时间的不同，金融期权可以分为（）。","c":{"A":"欧式期权、美式期权和修正的美式期权","B":"认购期权和认沽期权","C":"单只股票期权、股票组合期权和股价指数期权","D":"股票类期权、利率期权、货币期权、金融期货合约期权、互换期权等"},"a":"A","an":"A选项为金融期权按照选择权的性质划分。B选项为按照合约所规定的履约时间的不同划分。C选项为按照金融期权基础资产性质的不同划分。D选项为金融期权中股权类期权之下的分类。","type":"single"},{"id":"cflue_zc_ch7.json_25","q":"按照《中国金融期货交易所交易规则》及相关细则，下列关于金融期货的主要交易规则的说法错误的是（）。","c":{"A":"结算价是指某一合约当日一定时间内成交价格按照成交量的加权平均价","B":"保证金分为结算准备金和交易保证金。交易保证金是指未被合约占用的保证金；结算准备金是指已被合约占用的保证金","C":"对于沪深300股指期货合约，进行投机交易的客户某一合约单边持仓限额为5000手","D":"股指期货竞价交易采用集合竞价交易和连续竞价交易两种方式"},"a":"B","an":"保证金分为结算准备金和交易保证金。结算准备金是指未被合约占用的保证金；交易保证金是指已被合约占用的保证金。","type":"single"},{"id":"cflue_zc_ch7.json_26","q":"可在期权到期日或到期日之前的任何一个营业日执行的期权是认沽期权。（）","c":{"A":"错","B":"对"},"a":"A","an":"欧式期权只能在期权到期日执行；美式期权则可在期权到期日或到期日之前的任何一个营业日执行；修正的美式期权也被称为百慕大期权或大西洋期权”，可以在期权到期日之前的一系列规定日期执行。","type":"judge"},{"id":"cflue_zc_ch7.json_27","q":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的（）计算利息并进行利息交换的金融合约。","c":{"A":"人民币资产","B":"利率","C":"人民币汇率","D":"人民币本金"},"a":"BD","an":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的【人民币本金和利率】计算利息并进行利息交换的金融合约。利率互换的参考利率应为经中国人民银行授权的全国银行间同业拆借中心等机构发布的银行间市场具有基准性质的市场利率或经中国人民银行公布的基准利率。","type":"multi"},{"id":"cflue_zc_ch7.json_28","q":"以转移或防范信用风险为核心的金融衍生工具有（）。","c":{"A":"利率互换","B":"信用联结票据","C":"保证金互换","D":"信用互换"},"a":"BD","an":"以转移或防范信用风险为核心的金融衍生工具主要包括信用互换、信用联结票据以及信用风险缓释合约、信用风险缓释凭证等信用风险缓释工具。","type":"multi"},{"id":"cflue_zc_ch7.json_29","q":"下列关于金融期货与金融期权的区别说法正确的有（）。","c":{"A":"履约保证不同","B":"基础资产不同","C":"套期保值的作用与效果不同","D":"现金流转不同"},"a":"ABCD","an":"除上述选项外，还包括交易者权利与义务的对称性不同、盈亏特点不同。","type":"multi"},{"id":"cflue_zc_ch7.json_30","q":"1993年3月10日，海南证券交易中心推出中国第一只股票指数期货合约，其标的物有（）。","c":{"A":"沪深300指数","B":"深证综合指数","C":"沪深500指数","D":"深证A股指数"},"a":"BD","an":"1993年3月10日，海南证券交易中心推出股票指数期货交易，这是中国第一只股票指数期货合约。标的物为深证综合指数和深证A股指数。","type":"multi"},{"id":"cflue_zc_ch7.json_31","q":"下列关于金融期权的说法中错误的是（）。","c":{"A":"市场无风险利率与认沽期权为正相关关系，与认购期权为负相关关系","B":"标的证券价格与认购期权价值为正相关关系，与认沽期权价值为负相关关系","C":"波动率与认购、认沽期权价值均为正相关关系","D":"到期期限与认购、认沽期权价值均为正相关关系"},"a":"A","an":"市场无风险利率与认购期权为正相关关系，与认沽期权为负相关关系。","type":"single"},{"id":"cflue_zc_ch7.json_32","q":"下列属于金融衍生工具的说法，正确的有（）。","c":{"A":"包括独立衍生工具和嵌入式衍生工具","B":"又称金融衍生产品，与基础金融产品相对应","C":"衍生工具包括远期合同、期货合同、互换和期权等","D":"其价格取决于基础金融产品价格的变动和赋予投资者的权利大小"},"a":"ABC","an":"金融衍生工具又称“金融衍生产品”，是与基础金融产品相对应的概念，其建立在基础产品或基础变量之上，其价格随基础金融产品的价格变动的派生金融产品。金融衍生工具分独立衍生工具与嵌入式衍生工具，目前最主要的金融衍生工具有：远期合同、金融期货、期权和互换等。","type":"multi"},{"id":"cflue_zc_ch7.json_33","q":"下列关于金融期权的定义说法正确的有（）。","c":{"A":"金融期权是指以金融工具或金融变量为基础工具的期权交易形式","B":"期权的卖方则在收取了一定数量的期权费后，在一定期限内必须无条件服从买方的选择并履行成交时的允诺","C":"期权是指其持有者能在规定的期限内按交易双方商定的价格购买或出售一定数量的基础工具的权利","D":"期权的买方以支付一定数量的期权费为代价而拥有了这种权利，但不承担必须买进或卖出的义务"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_zc_ch7.json_34","q":"金融衍生工具的基础变量包括（）。","c":{"A":"气温","B":"选举","C":"资产价格","D":"价格指数"},"a":"ABCD","an":"作为金融衍生工具的基础变量种类繁多，主要是各类资产价格、价格指数、利率、汇率、费率、通货膨胀率以及信用等级等等。近些年来，某些自然现象（如气温、降雪量、霜冻、台风）甚至人类行为（如选举、温室气体排放）也逐渐成为金融衍生工具的基础变量。","type":"multi"},{"id":"cflue_zc_ch7.json_35","q":"在利率互换交易中，当利率看涨时，投资者的操作错误的是（）。","c":{"A":"将固定利率债务类金融工具转换成浮动利率金融工具","B":"将浮动利率债务类金融工具转换成固定利率金融工具","C":"将浮动利率资产类金融工具转换成固定利率金融工具","D":"将固定利率资产类金融工具转换成浮动利率金融工具"},"a":"AC","an":"当利率看涨时，可将浮动利率债务类金融工具转换成固定利率金融工具，锁定较低的利息支出。将固定利率资产类金融工具转换成浮动利率金融工具，从而获得浮动的较高的利息收入；而当利率看跌时，做相反交易，可将浮动利率资产类金融工具转换成固定利率金融工具，获得较高的利息收入。将固定利率负债类金融工具转换成浮动利率金融工具，支付较低的利息支出。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_25","q":"下列属于金融衍生工具的说法，正确的有（）。","c":{"A":"包括独立衍生工具和嵌入式衍生工具","B":"又称金融衍生产品，与基础金融产品相对应","C":"衍生工具包括远期合同、期货合同、互换和期权等","D":"其价格取决于基础金融产品价格的变动和赋予投资者的权利大小"},"a":"ABC","an":"金融衍生工具又称“金融衍生产品”，是与基础金融产品相对应的概念，其建立在基础产品或基础变量之上，其价格随基础金融产品的价格变动的派生金融产品。金融衍生工具分独立衍生工具与嵌入式衍生工具，目前最主要的金融衍生工具有：远期合同、金融期货、期权和互换等。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_26","q":"按照合约所规定的履约时间的不同，金融期权可以分为（）。","c":{"A":"欧式期权、美式期权和修正的美式期权","B":"认购期权和认沽期权","C":"单只股票期权、股票组合期权和股价指数期权","D":"股票类期权、利率期权、货币期权、金融期货合约期权、互换期权等"},"a":"A","an":"A选项为金融期权按照选择权的性质划分。B选项为按照合约所规定的履约时间的不同划分。C选项为按照金融期权基础资产性质的不同划分。D选项为金融期权中股权类期权之下的分类。","type":"single"},{"id":"cflue_paper_金融基础_1.json_38","q":"沪深300股指期货合约交易代码为SH。（）","c":{"A":"错","B":"对"},"a":"A","an":"沪深300股指期货合约交易代码为IF，中证500股指期货合约代码为IC，上证50股指期货合约代码为IH。","type":"judge"},{"id":"cflue_paper_金融基础_1.json_42","q":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的（）计算利息并进行利息交换的金融合约。","c":{"A":"人民币资产","B":"利率","C":"人民币汇率","D":"人民币本金"},"a":"BD","an":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的【人民币本金和利率】计算利息并进行利息交换的金融合约。利率互换的参考利率应为经中国人民银行授权的全国银行间同业拆借中心等机构发布的银行间市场具有基准性质的市场利率或经中国人民银行公布的基准利率。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_36","q":"美式期权则可在期权到期日或到期日之前的任何一个营业日执行。（）","c":{"A":"错","B":"对"},"a":"B","an":"欧式期权只能在期权到期日执行；美式期权则可在期权到期日或到期日之前的任何一个营业日执行；修正的美式期权也被称为“百慕大期权”或“大西洋期权”，可以在期权到期日之前的一系列规定日期执行。","type":"judge"},{"id":"cflue_paper_金融基础_2.json_47","q":"按照合约所规定的履约时间的不同，金融期权可以分为（）。","c":{"A":"欧式期权、美式期权和修正的美式期权","B":"认购期权和认沽期权","C":"单只股票期权、股票组合期权和股价指数期权","D":"股票类期权、利率期权、货币期权、金融期货合约期权、互换期权等"},"a":"A","an":"A选项为金融期权按照选择权的性质划分。B选项为按照合约所规定的履约时间的不同划分。C选项为按照金融期权基础资产性质的不同划分。D选项为金融期权中股权类期权之下的分类。","type":"single"},{"id":"cflue_paper_金融基础_3.json_8","q":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的（）计算利息并进行利息交换的金融合约。","c":{"A":"人民币资产","B":"利率","C":"人民币汇率","D":"人民币本金"},"a":"BD","an":"人民币利率互换是指交易双方约定在未来的一定期限内，根据约定的【人民币本金和利率】计算利息并进行利息交换的金融合约。利率互换的参考利率应为经中国人民银行授权的全国银行间同业拆借中心等机构发布的银行间市场具有基准性质的市场利率或经中国人民银行公布的基准利率。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_26","q":"沪深300股指期货合约交易代码为SH。（）","c":{"A":"错","B":"对"},"a":"A","an":"沪深300股指期货合约交易代码为IF，中证500股指期货合约代码为IC，上证50股指期货合约代码为IH。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_29","q":"金融衍生工具可以按照（）分为独立衍生工具和嵌入式衍生工具。","c":{"A":"自身交易方式","B":"交易场所","C":"基础工具种类","D":"产品形态"},"a":"D","an":"金融衍生工具根据【产品形态】可分为独立衍生工具和嵌入式衍生工具。&amp;lt;br&amp;gt;按照【自身交易的方法和特点】可以分为金融远期合约、金融期货、金融期权、金融互换和结构化金融衍生工具；&amp;lt;br&amp;gt;按照【基础工具种类】，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具；&amp;lt;br&amp;gt;按照【交易场所】可分为交易所交易的衍生工具和场外交易市场交易的衍生工具。","type":"single"},{"id":"cflue_paper_金融基础_4.json_1","q":"自1981年美国所罗门兄弟公司为IBM和世界银行办理了首笔（）之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。","c":{"A":"美元与马克和瑞士法郎","B":"美元与英镑和瑞士法郎","C":"美元与英镑和法郎","D":"美元与日元和英镑"},"a":"A","an":"自1981年美国所罗门兄弟公司为IBM和世界银行办理首笔【美元与马克和瑞士法郎】之间的货币互换业务以来，互换市场的发展非常迅速，目前，按名义金额计算的互换交易已经成为最大的衍生交易品种。","type":"single"},{"id":"cflue_paper_金融基础_4.json_10","q":"下列关于金融期权的说法中错误的是（）。","c":{"A":"市场无风险利率与认沽期权为正相关关系，与认购期权为负相关关系","B":"标的证券价格与认购期权价值为正相关关系，与认沽期权价值为负相关关系","C":"波动率与认购、认沽期权价值均为正相关关系","D":"到期期限与认购、认沽期权价值均为正相关关系"},"a":"A","an":"市场无风险利率与认购期权为正相关关系，与认沽期权为负相关关系。","type":"single"},{"id":"cflue_paper_金融基础_4.json_31","q":"关于期货交易，下列说法正确的是（）。","c":{"A":"期货合约可以不进行实物交收","B":"期货合约交易双方并不知道交易对手的情况","C":"期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易","D":"期货合约可以进行反向交易、平仓了结"},"a":"ABCD","an":"期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易，具备对冲机制（可进行方向交易）、履约回旋余地较大实物交割比例极低，交易双方不知道互相情况。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_15","q":"大宗商品类金融衍生工具按照其自身交易的方法及特点，可以分为（）。","c":{"A":"商品互换","B":"商品期货","C":"商品现货","D":"商品期权"},"a":"ABD","an":"大宗商品类金融衍生工具按照其自身交易的方法及特点可以分为商品期货、商品期权、商品远期以及商品互换。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_35","q":"按照《中国金融期货交易所交易规则》及相关细则，下列关于金融期货的主要交易规则的说法错误的是（）。","c":{"A":"结算价是指某一合约当日一定时间内成交价格按照成交量的加权平均价","B":"保证金分为结算准备金和交易保证金。交易保证金是指未被合约占用的保证金；结算准备金是指已被合约占用的保证金","C":"对于沪深300股指期货合约，进行投机交易的客户某一合约单边持仓限额为5000手","D":"股指期货竞价交易采用集合竞价交易和连续竞价交易两种方式"},"a":"B","an":"保证金分为结算准备金和交易保证金。结算准备金是指未被合约占用的保证金；交易保证金是指已被合约占用的保证金。","type":"single"},{"id":"xs_4781780","q":"我国金融衍生工具市场分为（）。Ⅰ.银行间市场Ⅱ.银行柜台市场Ⅲ.交易所交易市场Ⅳ.创业板市场","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"A","an":"","type":"single"},{"id":"xs_4781781","q":"下列金融衍生工具中，属于交易所交易的衍生工具有（）。&nbsp;Ⅰ.期权合约Ⅱ.OTC交易的衍生工具Ⅲ.期货合约Ⅳ.股票期权产品","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"C","an":"","type":"single"},{"id":"xs_4781782","q":"按基础工具的种类，金融衍生工具可以分为（）。Ⅰ.信用衍生工具Ⅱ.股权类产品的衍生工具Ⅲ.货币衍生工具Ⅳ.利率衍生工具","c":{"A":"Ⅰ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781783","q":"投资者进行金融衍生工具交易时，要想获得交易的成功，必须能较准确地预测（）等因素的未来变化趋势。Ⅰ.利率Ⅱ.汇率Ⅲ.股价Ⅳ.凸度","c":{"A":"Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"","type":"single"},{"id":"xs_4781784","q":"国际证监会组织认为，金融衍生工具的风险有（）。Ⅰ.信用风险Ⅱ.市场风险Ⅲ.结算风险Ⅳ.操作风险","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ"},"a":"B","an":"","type":"single"},{"id":"xs_4781785","q":"金融中介机构积极参与金融衍生工具发展，主要原因是（）。Ⅰ.金融衍生工具业务属于表外业务，不影响资产负债表状况Ⅱ.金融衍生工具业务能带来手续费收入Ⅲ.逃避监管Ⅳ.金融机构可以进行金融衍生工具自营交易，扩大利润来源","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"","type":"single"},{"id":"xs_4781786","q":"下列属于用来转移或防范信用风险的金融衍生工具的有（）。Ⅰ.利率互换Ⅱ.信用联结票据Ⅲ.信用互换Ⅳ.保证金互换","c":{"A":"Ⅰ、Ⅱ","B":"Ⅲ、Ⅳ","C":"Ⅱ、Ⅲ","D":"Ⅰ、Ⅳ"},"a":"C","an":"","type":"single"},{"id":"xs_4781787","q":"金融远期合约主要包括（）。Ⅰ.远期期货合约Ⅱ.远期股票合约Ⅲ.远期外汇合约Ⅳ.远期利率协议","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781788","q":"金融衍生工具按其自身交易的方法和特点可以分为（）。Ⅰ.金融远期Ⅱ.金融期货Ⅲ.金融期权和金融互换Ⅳ.结构化金融衍生工具","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅱ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781789","q":"关于金融衍生工具的说法，错误的有（）。Ⅰ.金融衍生产品的价格决定基础金融产品的价格Ⅱ.金融衍生工具是与基础金融产品相对应的一个概念Ⅲ.金融衍生工具是指建立在基础金融产品或基础变量以上，其价格取决于基础金融产品价格（或数值）变动的派生金融产品Ⅳ.温室气体排放不能成为金融衍生工具的基础变量","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅳ","C":"Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"B","an":"","type":"single"},{"id":"xs_4781790","q":"从全球来看，场外衍生品市场的（）是最大的单个衍生品种类。","c":{"A":"货币互换","B":"利率互换","C":"汇率互换","D":"信用违约互换"},"a":"B","an":"","type":"single"},{"id":"xs_4781791","q":"外汇期货交易在20世纪70年代由（）率先推出。","c":{"A":"法兰克福交易所","B":"伦敦国际金融期货交易所","C":"纽约证券交易所","D":"芝加哥商业交易所"},"a":"D","an":"","type":"single"},{"id":"comp_14350","q":"关于金融衍生工具的表述，正确的有（）。","c":{"A":"远期合约是交易双方约定在未来某一确定时间按确定价格买卖一定数量资产的合约","B":"期货合约是标准化合约，在交易所交易","C":"期权买方的最大损失是期权费，但收益可以无限","D":"互换合约主要是为了规避利率和汇率风险"},"a":"ABCD","an":"四个选项均正确。远期是非标准化场外合约；期货是标准化场内合约；期权买方风险有限（最多损失期权费），收益理论上无限；互换主要用于管理利率风险和汇率风险。","type":"comprehensive","material":"金融衍生工具是建立在基础金融工具或金融变量基础之上的金融合约。常见的衍生工具包括远期、期货、期权和互换。2024年，中国金融期货交易所上市了多个股指期货和国债期货品种。","sub_type":"multi"},{"id":"comp_47575","q":"某投资者预期上证50指数将上涨，买入了一张上证50股指期货合约。如果上证50指数上涨2%，则该投资者的盈亏情况是（）。","c":{"A":"盈利，杠杆放大收益","B":"亏损，因为需要支付保证金","C":"不盈不亏，因为期货是指数","D":"盈利但需要扣除交易费用"},"a":"A","an":"股指期货采用保证金交易，具有杠杆效应。投资者买入期货合约（做多），指数上涨则盈利，且保证金制度会放大收益（同时也放大亏损）。选项B和C明显错误，D虽然交易费用确实存在，但核心特征是杠杆收益。","type":"comprehensive","material":"金融衍生工具是建立在基础金融工具或金融变量基础之上的金融合约。常见的衍生工具包括远期、期货、期权和互换。2024年，中国金融期货交易所上市了多个股指期货和国债期货品种。","sub_type":"single"},{"id":"comp_86154","q":"某投资者买入一份股票看涨期权，期权费5元，行权价100元。到期日股票价格为120元，该投资者的每股收益为（）。","c":{"A":"15元","B":"20元","C":"5元","D":"25元"},"a":"A","an":"看涨期权收益 = 标的资产价格 - 行权价 - 期权费 = 120 - 100 - 5 = 15元。投资者以5元成本获得按100元买入股票的权利，在股价涨到120元时行权，净赚15元/股。","type":"comprehensive","material":"期权合约是赋予买方在约定日期或在此之前以约定价格买卖一定数量标的资产的权利的合约。期权分为看涨期权（Call）和看跌期权（Put），按行权时间分为欧式期权和美式期权。","sub_type":"single"},{"id":"cflue_zc_ch8.json_1","q":"（）可以管理系统性风险和非系统性风险。","c":{"A":"风险对冲","B":"风险控制","C":"风险分散","D":"风险转业"},"a":"A","an":"与风险分散策略不同，风险对冲可以管理系统性风险和非系统性风险，还可以根据投资者的风险承受能力和偏好，通过对冲比率的调节，将风险降低到预期水平。","type":"single"},{"id":"cflue_zc_ch8.json_2","q":"操作风险损失数据收集主要基于（）等几个方面。","c":{"A":"外部损失数据","B":"情景分析","C":"业务环境和内部控制因素","D":"内部损失数据"},"a":"ABCD","an":"操作风险损失数据收集主要基于：（1）内部损失数据；（2）外部损失数据；（3）情景分析；（4）业务环境和内部控制因素。","type":"multi"},{"id":"cflue_zc_ch8.json_3","q":"（）通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。","c":{"A":"操作风险","B":"信用风险","C":"违约风险","D":"市场风险"},"a":"B","an":"【信用风险】通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。","type":"single"},{"id":"cflue_zc_ch8.json_4","q":"内部评级所反映的被评级对象的风险特征主要是（）。","c":{"A":"交易工具的违约损失率","B":"借款者的违约概率","C":"预期损失和非预期损失","D":"违约风险暴露"},"a":"AB","an":"内部评级所反映的被评级对象的风险特征主要是借款者的违约概率和交易工具的违约损失率。","type":"multi"},{"id":"cflue_zc_ch8.json_5","q":"如果某金融机构风险管理部门计算得到其资产组合在持有期100天内，在99%的置信水平下的VaR值为1000万人民币，那么这意味着该金融机构的资产组合可以被预期（）。","c":{"A":"在未来的100天中有1%的概率至多损失1000万人民币","B":"在未来的100天中有99%的概率至少损失1000万人民币","C":"在未来的100天中有1%的概率至少损失1000万人民币","D":"在未来的100天中有99%的概率至多损失1000万人民币"},"a":"D","an":"略。","type":"single"},{"id":"cflue_zc_ch8.json_6","q":"风险识别是指（）的过程。","c":{"A":"找出风险原因","B":"鉴定风险性质","C":"对影响各类目标实现的潜在事项或因素予以全面识别","D":"依据风险定义进行系统分类"},"a":"ABCD","an":"风险识别是指对影响各类目标实现的潜在事项或因素予以全面识别、依据风险定义进行系统分类、鉴定风险性质并找出风险原因的过程。","type":"multi"},{"id":"cflue_zc_ch8.json_7","q":"根据导致市场风险因素的不同，市场风险一般划分为（）。","c":{"A":"外汇风险","B":"股票价格风险","C":"商品风险","D":"利率风险"},"a":"ABCD","an":"根据导致市场风险他因素的不同，市场风险一般划分为利率风险、外汇风险、股票价格风险与商品风险。","type":"multi"},{"id":"cflue_zc_ch8.json_8","q":"下面属于风险管理的方法是（）。","c":{"A":"风险补偿","B":"风险分散","C":"风险预防","D":"风险规避"},"a":"ABCD","an":"风险管理的主要方法包括：风险预防、风险规避、风险分散、风险对冲、风险转移和风险补偿。","type":"multi"},{"id":"cflue_zc_ch8.json_9","q":"证券市场系统性风险可以来自于（）。","c":{"A":"通货膨胀","B":"新政策出台","C":"证券价格日常波动","D":"市场利率变动"},"a":"ABD","an":"系统性风险是指是指对整个股票市场或绝大多数股票普遍产生不利影响，由于公司外部、不为公司所预计和控制的因素造成的风险。B属于系统性风险（政策风险）。","type":"multi"},{"id":"cflue_zc_ch8.json_10","q":"属于非系统性风险的有（）。","c":{"A":"市场加息引起股票指数下跌","B":"公司财产因火灾受损","C":"某公司产品研发导致股价下跌","D":"因债务人违约导致公司股价波动"},"a":"BCD","an":"非系统风险，是指发生于个别公司的特有事件造成的风险，纯粹由于个股自身的因素引起的个股价格变化以及由于这种变化导致的个股收益率的不确定性。","type":"multi"},{"id":"cflue_zc_ch8.json_11","q":"下列各项中，不属于风险管理中的风险转移策略的有（）。","c":{"A":"风险补偿","B":"风险规避","C":"风险分散","D":"信用担保"},"a":"ABC","an":"风险转移可分为保险转移和非保险转移。保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司。非保险转移通常采用【担保】和备用信用证等方式将风险转嫁给第三方。例如，当金融机构提供信用贷款时，通常需要借款人提供第三方担保，如不能到期偿还贷款，由担保方代为偿还。故只有C属于。答案选择ABD。","type":"multi"},{"id":"cflue_zc_ch8.json_12","q":"在一般情况下，风险管理的流程主要包括（）。","c":{"A":"风险的应对","B":"风险的识别","C":"风险的监测、预警与报告","D":"风险的衡量"},"a":"ABCD","an":"在一般情况下，风险管理的流程主要包括：风险的识别，风险的衡量，风险的应对，风险的监测、预警与报告。","type":"multi"},{"id":"cflue_zc_ch8.json_13","q":"流动性覆盖率的计算公式为（）。","c":{"A":"优质流动性资产/未来30天现金净流出量×100%","B":"优质流动性资产/未来90天现金净流出量×100%","C":"贷款余额/存款余额×100%","D":"流动性资产余额/流动性负债余额×100%"},"a":"A","an":"略。","type":"single"},{"id":"cflue_zc_ch8.json_14","q":"从机构层面衡量流动性风险的资产负债结构指标不包括（）。","c":{"A":"速动比率","B":"净稳定资金率","C":"现金流量比率","D":"流动比率"},"a":"C","an":"从机构层面衡量流动性风险的资产负债结构指标包括流动比率、速动比率和净稳定资金率。","type":"single"},{"id":"cflue_zc_ch8.json_15","q":"中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到（）情形时，应当开展专项或综合压力测试。","c":{"A":"利润分配或其他资本性支出","B":"重大固定资产投资","C":"重大对外投资或收购","D":"重大对外担保"},"a":"ABCD","an":"中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到以下情形之一时，应当开展专项或综合压力测试：重大对外投资或收购、重大对外担保、重大固定资产投资、利润分配或其他资本性支出、证券公司分类评价结果负向调整、负债集中到期或赎回等可能导致净资本和流动性等风险控制指标发生明显不利变化或接近预警线的情形；确定重大业务规模和开展重大创新业务；确定经营计划和业务规模、确定自营投资规模限额、开展重大创新业务、承担重大包销责任等；预期或已经出现重大内部风险状况；自营投资大幅亏损，政府部门行政处罚、诉讼、声誉受损等；预期或已经出现重大外部风险和政策变化事件；证券市场大幅波动，监管政策发生重大变化等；其他可能或已经出现的压力情景。","type":"multi"},{"id":"cflue_zc_ch8.json_16","q":"下列属于传统信用风险评估方法的是（）。","c":{"A":"5Cs","B":"信用评级","C":"专家系统","D":"信用打分模型"},"a":"ACD","an":"传统信用风险评估方法包括：专家系统、5Cs和信用打分模型。","type":"multi"},{"id":"cflue_zc_ch8.json_17","q":"（）作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。","c":{"A":"波动性分析","B":"置信水平","C":"VaR模型","D":"期望损失模型"},"a":"D","an":"期望损失模型作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。","type":"single"},{"id":"cflue_zc_ch8.json_18","q":"现代信用风险转移方法不包括（）。","c":{"A":"信用远期协议","B":"TRP","C":"辛迪加贷款","D":"信用关联票据"},"a":"C","an":"【现代】信用风险转移方法包括TRP、信用关联票据和信用远期协议。&amp;lt;br&amp;gt;【传统】信用风险转移的方法主要有信用保险、【辛迪加贷款】、贷款出售、资产互换等形式。故B错误。","type":"single"},{"id":"cflue_zc_ch8.json_19","q":"证券公司声誉风险管理应遵循以下（）原则。","c":{"A":"快速响应原则","B":"审慎管理原则","C":"预防第一原则","D":"全程全员原则"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_zc_ch8.json_20","q":"关于VaR，下列说法正确的有（）。","c":{"A":"能够用于对整个行业的各种风险进行全面的量化","B":"可以用于不同的金融产品","C":"最初由摩根公司开发","D":"可以定量地对市场总风险进行度量"},"a":"BCD","an":"D项，VaR方法衡量的主要是市场风险，如单纯依靠VaR方法，就会忽视其他种类的风险如信用风险。","type":"multi"},{"id":"cflue_zc_ch8.json_21","q":"操作风险分为（）所引发的四类风险。","c":{"A":"外部事件","B":"人员","C":"系统","D":"流程"},"a":"ABCD","an":"操作风险的一种分类方法是根据定义将其划分为由人员、系统、流程和外部事件所引发的四类风险。","type":"multi"},{"id":"cflue_zc_ch8.json_22","q":"市场的流动性是由（）维度因素决定的。","c":{"A":"密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好","B":"弹性，即基础价格在受到影响后重新恢复的速度","C":"深度，即执行大规模交易而不对价格产生过度影响的能力","D":"即时性，即交易执行的速度"},"a":"ABCD","an":"市场的流动性是由四个维度因素决定的：一是深度，即执行大规模交易而不对价格产生过度影响的能力；二是密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好；三是即时性，即交易执行的速度；四是弹性，即基础价格在受到影响后重新恢复的速度。","type":"multi"},{"id":"cflue_zc_ch8.json_23","q":"风险分散是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。（）","c":{"A":"错","B":"对"},"a":"A","an":"【风险对冲】是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。","type":"judge"},{"id":"cflue_zc_ch8.json_24","q":"风险控制是金融机构的核心竞争力。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险管理是金融机构的核心竞争力。","type":"judge"},{"id":"cflue_zc_ch8.json_25","q":"风险管理的“三道防线”指的是在金融机构内部构造出三支对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。这三道防线是指（）。","c":{"A":"风险管理部门和合规部门","B":"外部审计","C":"内部审计","D":"业务条线部门"},"a":"ACD","an":"风险管理的“三道防线”指的是在金融机构内部构造出三个对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。【业务条线部门】是第一道风险防线，是风险的承担者，应负责持续识别、评估和报告风险敞口。【风险管理部门和合规部门】是第二道风险防线。风险管理部门负责监督和评估业务部门承担风险的业务活动；合规部门负责定期监控机构对于法律、公司治理规则、监管规定、行为规范和政策的执行情况。风险管理和合规部门均应独立于业务条线部门。【内部审计】是第三道风险防线。内部审计部门对机构风险治理框架的质量和有效性进行独立的审计。","type":"multi"},{"id":"cflue_zc_ch8.json_26","q":"下列对于风险限额的相关概念，说法正确的是（）。","c":{"A":"限额管理体现了现代风险管理是一种全面的风险管理","B":"限额管理体现了任何金融产品是风险与收益的组合，投资是以风险换收益","C":"限额管理是一种对风险的实时动态管理","D":"限额管理体现了风险管理是一种积极的事前管理"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_zc_ch8.json_27","q":"从市场层面衡量流动性风险的指标不包括（）。","c":{"A":"流动性覆盖率","B":"冲击成本","C":"买卖价差法","D":"换手率"},"a":"A","an":"从市场层面衡量流动性风险的指标包括买卖价差法、换手率、冲击成本。","type":"single"},{"id":"cflue_zc_ch8.json_28","q":"（）是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。","c":{"A":"有效价差","B":"资料流动性风险","C":"买卖价差法","D":"冲击成本"},"a":"D","an":"冲击成本是机构大户面临的流动性成本的重要表现，是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。国际上通常用它来衡量股市、期市的流动性。","type":"single"},{"id":"cflue_zc_ch8.json_29","q":"风险预警是风险偏好、风险限额以及日常风险管理得以有效实施的重要保障。（）","c":{"A":"错","B":"对"},"a":"A","an":"风险监测是风险管理的重要一环，是风险偏好、风险限额以及日常风险管理得以有效实施的重要保障。","type":"judge"},{"id":"cflue_zc_ch8.json_30","q":"（）是因市场价格变量波动而给经济主体带来损益的风险。","c":{"A":"操作风险","B":"信用风险","C":"流动性风险","D":"市场风险"},"a":"D","an":"【市场风险】是因市场价格变量波动而给经济主体带来损益的风险。","type":"single"},{"id":"cflue_zc_ch8.json_31","q":"证券公司董事会承担全面风险管理的最终责任，履行的职责包括（）。","c":{"A":"审议批准公司全面风险管理的基本制度","B":"推进风险文化建设","C":"风险容忍度以及重大风险限额","D":"审议批准公司的风险偏好"},"a":"ABCD","an":"证券公司董事会承担全面风险管理的最终责任，履行的职责包括：推进风险文化建设，审议批准公司全面风险管理的基本制度，审议批准公司的风险偏好、风险容忍度以及重大风险限额，审议公司定期风险评估报告，任免并考核首席风险官、确定其薪酬待遇、建立与首席风险官的直接沟通机制等。","type":"multi"},{"id":"cflue_zc_ch8.json_32","q":"国别风险管理体系包括（）等基本要素。","c":{"A":"完善的国别风险管理政策和程序","B":"完善的国别风险识别、计量、监测和控制过程","C":"完善的内部控制和审计","D":"董事会和高级管理层的有效监控"},"a":"ABCD","an":"国别风险管理体系包括四个基本要素：董事会和高级管理层的有效监控；完善的国别风险管理政策和程序；完善的国别风险识别、计量、监测和控制过程；完善的内部控制和审计。","type":"multi"},{"id":"cflue_zc_ch8.json_33","q":"下面关于风险对冲，说法正确的是（）。","c":{"A":"为了防范和化解非系统性风险，人们需要借助于金融衍生工具进行风险对冲","B":"风险对冲是指投资者通过购买某种金融产品或采取某些合法的手段将风险转嫁给愿意和有能力承接的主体","C":"风险对冲对管理系统性风险和非系统性风险都有效","D":"套期保值是常见的风险对冲工具"},"a":"CD","an":"为了防范和化解【系统性风险】，人们需要借助于金融衍生工具进行风险对冲。C错误；【风险转移】是指投资者通过购买某种金融产品或采取某些合法的手段将风险转嫁给愿意和有能力承接的主体。D错误。","type":"multi"},{"id":"cflue_zc_ch8.json_34","q":"下列关于净稳定资金率计算方法正确的是（）。","c":{"A":"净稳定资金率=可用稳定资金/所需的资金×100%","B":"净稳定资金率=可用稳定资金/所需的稳定资金×100%","C":"净稳定资金率=可用资金/所需的稳定资金×100%","D":"净稳定资金率=总体稳定资金/所需的稳定资金×100%"},"a":"B","an":"略。","type":"single"},{"id":"cflue_zc_ch8.json_35","q":"（）依据RAROC最大化原则，将风险指标分解至公司的不同层面、不同业务线乃至具体组合与策略，将风险控制在可以承受的合理范围之内，使风险大小与风险管理能力和资本实力相匹配。","c":{"A":"风险限额","B":"风险缓释","C":"风险拨备","D":"风险偏好"},"a":"A","an":"【风险限额】是依据RAROC最大化原则，将风险指标以风险限额的形式分解至公司的不同层面、不同业务线乃至具体组合与策略，将风险控制在可以承受的合理范围之内，使风险大小与风险管理能力和资本实力相匹配。凡在限额以内发生的损失，都可以通过自有资本金来抵御。","type":"single"},{"id":"cflue_paper_金融基础_1.json_1","q":"证券公司董事会承担全面风险管理的最终责任，履行的职责包括（）。","c":{"A":"审议批准公司全面风险管理的基本制度","B":"推进风险文化建设","C":"风险容忍度以及重大风险限额","D":"审议批准公司的风险偏好"},"a":"ABCD","an":"证券公司董事会承担全面风险管理的最终责任，履行的职责包括：推进风险文化建设，审议批准公司全面风险管理的基本制度，审议批准公司的风险偏好、风险容忍度以及重大风险限额，审议公司定期风险评估报告，任免并考核首席风险官、确定其薪酬待遇、建立与首席风险官的直接沟通机制等。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_3","q":"证券市场系统性风险可以来自于（）。","c":{"A":"通货膨胀","B":"新政策出台","C":"证券价格日常波动","D":"市场利率变动"},"a":"ABD","an":"系统性风险是指是指对整个股票市场或绝大多数股票普遍产生不利影响，由于公司外部、不为公司所预计和控制的因素造成的风险。B属于系统性风险（政策风险）。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_23","q":"内部评级所反映的被评级对象的风险特征主要是（）。","c":{"A":"交易工具的违约损失率","B":"借款者的违约概率","C":"预期损失和非预期损失","D":"违约风险暴露"},"a":"AB","an":"内部评级所反映的被评级对象的风险特征主要是借款者的违约概率和交易工具的违约损失率。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_34","q":"下列各项中，不属于风险管理中的风险转移策略的有（）。","c":{"A":"风险补偿","B":"风险规避","C":"风险分散","D":"信用担保"},"a":"ABC","an":"风险转移可分为保险转移和非保险转移。保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司。非保险转移通常采用【担保】和备用信用证等方式将风险转嫁给第三方。例如，当金融机构提供信用贷款时，通常需要借款人提供第三方担保，如不能到期偿还贷款，由担保方代为偿还。故只有C属于。答案选择ABD。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_24","q":"现代信用风险转移方法不包括（）。","c":{"A":"信用远期协议","B":"TRP","C":"辛迪加贷款","D":"信用关联票据"},"a":"C","an":"【现代】信用风险转移方法包括TRP、信用关联票据和信用远期协议。&amp;lt;br&amp;gt;【传统】信用风险转移的方法主要有信用保险、【辛迪加贷款】、贷款出售、资产互换等形式。故B错误。","type":"single"},{"id":"cflue_paper_金融基础_2.json_26","q":"（）是因市场价格变量波动而给经济主体带来损益的风险。","c":{"A":"操作风险","B":"信用风险","C":"流动性风险","D":"市场风险"},"a":"D","an":"【市场风险】是因市场价格变量波动而给经济主体带来损益的风险。","type":"single"},{"id":"cflue_paper_金融基础_2.json_39","q":"下面关于风险对冲，说法正确的是（）。","c":{"A":"为了防范和化解非系统性风险，人们需要借助于金融衍生工具进行风险对冲","B":"风险对冲是指投资者通过购买某种金融产品或采取某些合法的手段将风险转嫁给愿意和有能力承接的主体","C":"风险对冲对管理系统性风险和非系统性风险都有效","D":"套期保值是常见的风险对冲工具"},"a":"CD","an":"为了防范和化解【系统性风险】，人们需要借助于金融衍生工具进行风险对冲。C错误；【风险转移】是指投资者通过购买某种金融产品或采取某些合法的手段将风险转嫁给愿意和有能力承接的主体。D错误。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_32","q":"风险识别是指（）的过程。","c":{"A":"找出风险原因","B":"鉴定风险性质","C":"对影响各类目标实现的潜在事项或因素予以全面识别","D":"依据风险定义进行系统分类"},"a":"ABCD","an":"风险识别是指对影响各类目标实现的潜在事项或因素予以全面识别、依据风险定义进行系统分类、鉴定风险性质并找出风险原因的过程。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_47","q":"证券公司声誉风险管理应遵循以下（）原则。","c":{"A":"快速响应原则","B":"审慎管理原则","C":"预防第一原则","D":"全程全员原则"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_12","q":"操作风险分为（）所引发的四类风险。","c":{"A":"外部事件","B":"人员","C":"系统","D":"流程"},"a":"ABCD","an":"操作风险的一种分类方法是根据定义将其划分为由人员、系统、流程和外部事件所引发的四类风险。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_30","q":"证券公司声誉风险管理应遵循以下（）原则。","c":{"A":"快速响应原则","B":"审慎管理原则","C":"预防第一原则","D":"全程全员原则"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_57","q":"在一般情况下，风险管理的流程主要包括（）。","c":{"A":"风险的应对","B":"风险的识别","C":"风险的监测、预警与报告","D":"风险的衡量"},"a":"ABCD","an":"在一般情况下，风险管理的流程主要包括：风险的识别，风险的衡量，风险的应对，风险的监测、预警与报告。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_16","q":"（）是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。","c":{"A":"有效价差","B":"资料流动性风险","C":"买卖价差法","D":"冲击成本"},"a":"D","an":"冲击成本是机构大户面临的流动性成本的重要表现，是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。国际上通常用它来衡量股市、期市的流动性。","type":"single"},{"id":"cflue_paper_金融基础_5.json_23","q":"如果某金融机构风险管理部门计算得到其资产组合在持有期100天内，在99%的置信水平下的VaR值为1000万人民币，那么这意味着该金融机构的资产组合可以被预期（）。","c":{"A":"在未来的100天中有1%的概率至多损失1000万人民币","B":"在未来的100天中有99%的概率至少损失1000万人民币","C":"在未来的100天中有1%的概率至少损失1000万人民币","D":"在未来的100天中有99%的概率至多损失1000万人民币"},"a":"D","an":"略。","type":"single"},{"id":"comp_89414","q":"关于各类金融风险的说法，正确的有（）。","c":{"A":"市场风险包括利率风险、汇率风险和股票价格风险","B":"操作风险是由不完善或有问题的内部程序、人员或系统造成的","C":"声誉风险是金融机构最核心的风险类型","D":"流动性风险可能导致金融机构无法以合理成本获得充足资金"},"a":"ABD","an":"选项C错误。信用风险（违约风险）通常被认为是金融机构最核心的风险类型，而非声誉风险。声誉风险是次生风险，往往由其他风险引发。ABD均正确。","type":"comprehensive","material":"金融风险是指金融变量的变动所引起的资产组合未来收益的不确定性。根据巴塞尔协议和中国的监管要求，商业银行和证券公司需要建立全面的风险管理体系，覆盖信用风险、市场风险、操作风险、流动性风险和声誉风险等。","sub_type":"multi"},{"id":"comp_29110","q":"中国证券监督管理委员会对证券公司风险控制指标的主要要求包括（）。","c":{"A":"净资本与各项风险资本准备之和的比例不得低于100%","B":"净资本与净资产的比例不得低于40%","C":"净资本与负债的比例不得低于8%","D":"净资产与负债的比例不得低于20%"},"a":"ABCD","an":"四个选项均正确。此外还有：流动资产与流动负债的比例不得低于100%、净资本不得低于人民币2000万元等。这些风控指标构成了证券公司风险管理的核心框架。","type":"comprehensive","material":"金融风险是指金融变量的变动所引起的资产组合未来收益的不确定性。根据巴塞尔协议和中国的监管要求，商业银行和证券公司需要建立全面的风险管理体系，覆盖信用风险、市场风险、操作风险、流动性风险和声誉风险等。","sub_type":"multi"},{"id":"cy_fin_615","q":"国际金融市场的剧烈动荡对我国的证券市场的影响途径不包括（  ）","c":{"A":"国际金融市场动荡通过人民币汇率预期影响我国证券市场","B":"国际金融市场动荡通过宏观层面间接影响我国证券市场","C":"国际金融市场动荡通过微观层面直接影响我国证券市场","D":"国际金融市场动荡通过国际直接投资影响我国证券市场"},"a":"D","an":"国际金融市场环境对我国证券市场的影响：    1．国际金融市场动荡通过人民币汇率预期影响证券市场。    2．国际金融市场动荡通过宏观面间接影响我国证券市场。     3．国际金融市场动荡通过微观面直接影响我国证券市场。","type":"single"},{"id":"cy_fin_617","q":"企业年金基金投资于银行活期存款、中央银行票据、债券回购等流动性产品以及货币市场基金的比例，不得低于资产投资组合企业年金基金财产净值的(  )。","c":{"A":"0.01","B":"0.03","C":"0.05","D":"0.08"},"a":"C","an":"企业年金基金投资于银行活期存款、中央银行票据、债券回购等流动性产品以及货币市场基金的比例，不得低于资产投资组合企业年金基金财产净值的5％（C选项正确）。","type":"single"},{"id":"cy_fin_619","q":"股票及其他有价证券的理论价格是根据(  )确定的。","c":{"A":"预期理论","B":"流动性理论","C":"合理收益理论","D":"现值理论"},"a":"D","an":"股票及其他有价证券的理论价格是根据现值理论而来的（D选项正确）。现值理论认为，人们之所以愿意购买股票和其他证券，是因为它能够为它的持有人带来预期收益。因此，它的价值取决于未来收益的大小。 A选项预期理论这是关于利率期限结构的一种理论，B选项流动性偏好理论解释了为什么长期债券的收益率通常高于短期债券，C选项属于干扰项。","type":"single"},{"id":"cy_fin_621","q":"证券金融公司应当每年按照税后利润的10％提取风险准备金。（）","c":{"1":"对","0":"错"},"a":"1","an":"本题考查对证券金融公司从事转融通业务的管理。证券金融公司应当每年按照税后利润的10％提取风险隹备金。证监会可以根据防范证券金融公司风险的需要，对提取比例进行调整。","type":"judge"},{"id":"cy_fin_623","q":"在我国，早期对各类证券类机构的监管职责主要由中国证监会承担。（）","c":{"1":"对","0":"错"},"a":"0","an":"本题考查我国证券类机构的监管机构。在我国，早期对各类证券类机构的监管职责主要由中国人民银行承担。","type":"judge"},{"id":"cy_fin_625","q":"关于科创板申报要求，下列说法正确的是（）。","c":{"A":"无论通过市价还是限价申报买卖科创板股票的，单笔申报数量均应当不小于200股","B":"卖出科创板股票时，余额不足200股的部分，应当分次申报卖出","C":"通过市价申报买卖科创板股票的，单笔申报数量应不超过10万股","D":"通过限价申报买卖科创板股票的，单笔申报数量应不超过5万股"},"a":"A","an":"通过限价申报买卖科创板股票的，单笔申报数量均应当不小于200股，且不超过10万股；通过市价申报买卖的，单笔申报数量均应当不小于200股，且不超过5万股。A正确，CD错误 卖出时，余额不足200股的部分，应当一次性申报卖出。B错误","type":"single"},{"id":"cy_fin_627","q":"货币证券包括商业汇票、商业本票、银行汇票、银行本票和支票（）","c":{"1":"对","0":"错"},"a":"1","an":"货币证券主要包括两大类：一类是商业证券，主要包括商业汇票和商业本票；另一类是银行证券，主要包括银行汇票、银行本票和支票。","type":"judge"},{"id":"cy_fin_629","q":"在中国境内申请发行人民币债券的国际开发机构应向证监会等窗口单位递交债券发行申请。","c":{"1":"对","0":"错"},"a":"0","an":"在中国境内申请发行人民币债券的国际开发机构应向【财政部】等窗口单位递交债券发行申请。 由窗口单位会同中国人民银行、国家发改委、中国证监会等部门审核后，报国务院同意。  国家发改委会同财政部，根据国家产业政策、外资外债情况、宏观经济和国际收支状况，对人民币债券的发行规模及所筹资金用途进行审核。","type":"judge"},{"id":"cy_fin_631","q":"科创板上市指标包括(  )。","c":{"A":"最近三年研发投入占营业收入比例5%以上","B":"研发人员占当年员工总数的比例不低于10%","C":"应用于公司主营业务的发明专利5项以上","D":"最近三年营业收入复合增长率达到20%"},"a":"A,B","an":"2024年版本的修改后的《科创属性评价指引（试行）》支持和鼓励同时符合下列4项指标的企业申报科创板上市：   1.最近三年研发投入占营业收入比例5%以上，或最近三年研发投入金额累计在8000万元以上；A正确 2.研发人员占当年员工总数的比例不低于10%；B正确 3.应用于公司主营业务的发明专利7项以上；C错误 4.最近三年营业收入复合增长率达到25%，或最近一年营业收入金额达到3亿元。D错误 故本题答案选AB。","type":"multi"},{"id":"cy_fin_633","q":"申请证券评级业务许可的资信评级机构，其(  )均需要不少于2 000万元。","c":{"A":"注册资本","B":"实收资本","C":"总资产","D":"净资产"},"a":"B,D","an":"2021年2月发布的《证券市场资信评级业务管理办法》，鼓励具备条件的资信评级机构开展证券评级业务，其中包括【实收资本】与【净资产】均超过人民币2000万元。BD符合要求，AC属于干扰项。","type":"multi"},{"id":"cy_fin_635","q":"中国当前的金融监管体制已经从“一行三会”“一委一行两会”过渡到「一委一行一局一会”，其中“一委一行一局一会”指中央金融委员会、国务院金融监督管理总局、中国银行以及中国证券监督管理委员会。(  )","c":{"1":"对","0":"错"},"a":"0","an":"题干说法错误，“一委一行一局一会”指的是中央金融委员会、中国人民银行、国家金融监督管理总局和中国证券监督管理委员会。","type":"judge"},{"id":"cy_fin_637","q":"科创板允许尚未盈利或存在累计未弥补亏损的企业上市。(  )","c":{"1":"对","0":"错"},"a":"1","an":"科创板的上市条件 “更加注重企业科技创新能力，允许符合科创板定位、尚未盈利或存在累计未弥补亏损的企业在科创板上市”，因此该表述正确。","type":"judge"},{"id":"cy_fin_639","q":"我国场内交易市场包括主板市场、科创板市场、创业板市场和证券公司柜台市场。（）","c":{"1":"对","0":"错"},"a":"0","an":"【证券公司柜台市场是场外市场】  我国在以上海、深圳证券交易所作为证券市场主板市场的基础上，又在深圳证券交易所设置了创业板市场和在主板市场内增设中小企业板块市场，在上海证券交易所新设科创板市场并试点注册制，并将全国中小企业股份转让系统划入交易所市场，后以新三板精选层为基础设立北京证券交易所，从而形成交易所市场内的不同市场层次。","type":"judge"},{"id":"cy_fin_641","q":"在我国多层次资本市场体系构建中，券商柜台市场属于场外市场。(  )","c":{"1":"对","0":"错"},"a":"1","an":"主板市场、创业板市场、科创板市场和全国中小企业股份转让系统属于场内市场，区域股权交易市场、券商柜台市场、机构间私募产品报价与服务系统和私募基金业务活动属于场外市场。","type":"judge"},{"id":"cy_fin_643","q":"2021年2月5日，经中国证监会批准，深交所启动合并主板与中小板相关准备工作，并发布两板合并业务通知及相关规则，明确合并实施后的相关安排，于4月6日正式实施两板合并。(  )","c":{"1":"对","0":"错"},"a":"1","an":"【2021年2月5日】，经中国证监会批准，深交所启动合并主板与中小板相关准备工作，并发布两板合并业务通知及相关规则，明确合并实施后的相关安排，于4月6日正式实施两板合并。","type":"judge"},{"id":"cy_fin_645","q":"公开募集基金财产应当用于投资上市交易的股票、债券或（）规定的其他证券及其衍生品种。","c":{"A":"证券业协会","B":"中国人民银行","C":"国务院证券监督管理机构","D":"财政部"},"a":"C","an":"选项C正确：公开募集基金财产应当用于投资上市交易的股票、债券或国务院证券监督管理机构规定的其他证券及其衍生品种。 选项A错误：证券业协会主要负责行业自律管理。 选项B错误：中国人民银行主要负责货币政策和金融稳定。 选项D错误：财政部主要负责财政政策和预算管理。","type":"single"},{"id":"cy_fin_647","q":"根据《证券公司业务范围审批暂行规定》，除中国证监会另有规定外，依照法定条件对新设证券公司核准的业务一般不超过（）种。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"B","an":"选项B正确：根据《证券公司业务范围审批暂行规定》第七条的规定，证券公司设立时，中国证监会依照法定条件核准其业务范围。对新设公司核准的业务不超过4种，但中国证监会另有规定的除外。 （原因：这一限制旨在确保新设证券公司能够在初期专注于核心业务，逐步积累经验和能力，以保证其稳健经营和发展）","type":"single"},{"id":"cy_fin_649","q":"下列关于证券公司股东出资的规定中，错误的有()。","c":{"A":"证券公司股东只能用货币出资","B":"证券公司的债权人可以将其债权转为证券公司股权","C":"证券公司股东的货币财产出资总额不得超过证券公司注册资本的30%","D":"证券公司股东的出资可以聘请不具有证券相关业务资格的会计师事务所验资"},"a":"A,C,D","an":"证券公司的股东应当用货币或者证券公司经营必需的非货币财产出资（A错误）。证券公司股东的非货币财产出资总额不得超过证券公司注册资本的30%（C错误）。证券公司股东的出资，应当经具有证券、期货相关业务资格的会计师事务所验资并出具证明（D错误）。但是，在证券公司经营过程中，证券公司的债权人将其债权转为证券公司股权的（B正确），不受前述规定的限制。 题目问的是“说法错误的”。故本题选ACD。","type":"multi"},{"id":"cy_fin_651","q":"按照《证券监督管理条例》的要求，证券公司有（）情形时，独立董事人数不得少于董事人数的1／4。","c":{"A":"内部董事人数占董事人数的1／6","B":"证券公司有连任6年以上的独立董事","C":"总经理和财务总监由同一人担任","D":"董事长、经营管理的主要负责人由同一人担任"},"a":"D","an":"选项D正确：董事长、经营管理的主要负责人由同一人担任，独立董事人数不得少于董事人数的1／4。 选项A错误：1/6不符合“内部董事人数占董事人数的1／5以上”的条件。 选项B错误：内部董事人数与独立董事人数的比例无关。 选项C错误：干扰项。  【知识详解】证券公司有以下情形之一的，独立董事人数不得少于董事人数的1／4： （1）董事长、经营管理的主要负责人由同一人担任； （2）内部董事人数占董事人数的1／5以上； （3）中国证监会认定的其他情形。","type":"single"},{"id":"cy_fin_653","q":"证券公司聘任董事、监事和高级管理人员前，应当审慎考察并确认其符合相应的任职条件，自作出聘任决定之日起7个工作日内向中国证监会相关派出机构报送相关备案材料。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司聘任董事、监事和高级管理人员前，应当审慎考察并确认其符合相应的任职条件，自作出聘任决定之日起5个工作日（并非7个工作日）内向中国证监会相关派出机构报送相关备案材料。","type":"judge"},{"id":"cy_fin_655","q":"证券公司的分类评价等级一旦确定，在整个评价年度内都不会改变。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"中国证监会每年根据行业发展情况，结合以前年度分类评价结果，事先确定A、B、C三大类别公司的相对比例，并根据评价计分的分布情况，具体确定各类别、各级别公司的数量。（结果在当年度内具有效力，一般不会在年度内随意动态调整）","type":"judge"},{"id":"cy_fin_657","q":"证券公司未按照监管部门要求报送风险控制指标监管报表，或者风险控制指标监管报表存在重大错报、漏报以及虚假报送情况，（）及其派出机构可以根据情况采取出具警示函、责令改正、监管谈话、责令处分有关人员等监管措施。","c":{"A":"自律组织","B":"中国证券业协会","C":"中国人民银行","D":"中国证监会"},"a":"D","an":"选项D正确：证券公司未按照监管部门要求报送风险控制指标监管报表，或者风险控制指标监管报表存在重大错报、漏报以及虚假报送情况，中国证监会及其派出机构可以根据情况采取出具警示函、责令改正、监管谈话、责令处分有关人员等监管措施。 选项A错误：自律组织侧重行业自我管理，如制定行业规范、组织培训等，不具备行政监管措施的权力。 选项B错误：中国证券业协会：作为证券业自律组织，其职责是行业自律管理。 选项C错误：中国人民银行：负责宏观金融政策，如货币政策制定、金融稳定维护等。","type":"single"},{"id":"cy_fin_659","q":"证券公司为防范风险在并表管理体系内部无序传递，可以采取的措施包括（  ）。","c":{"A":"审慎隔离业务","B":"审慎隔离人员","C":"审慎隔离信息","D":"严格禁止关联交易"},"a":"A,B,C","an":"选项ABC正确：证券公司应当在并表管理体系内建立并持续完善内部隔离墙及利益冲突体系，通过审慎隔离业务、人员和信息等措施，有效防范金融风险在并表管理体系内部无序传递和跨区域、跨市场、跨境传染。 选项D错误：“禁止关联交易”过于绝对。","type":"multi"},{"id":"cy_fin_661","q":"证券公司统筹规划附属经营机构定位，是为了避免内部业务混同操作。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当统筹规划附属经营机构定位，确保各附属机构有明确的经营目标和市场定位，避免证券公司并表管理体系内部业务混同操作。","type":"judge"},{"id":"cy_fin_663","q":"《证券期货投资者适当性管理办法》规定，由（）制定并定期更新本行业的产品或者服务风险等级名录，经营机构评估相关产品或者服务的风险等级不得低于前述名录规定的风险等级。","c":{"A":"行业协会","B":"中国人民银行","C":"中国证监会","D":"中国证监会派出机构"},"a":"A","an":"选项A正确：《证券期货投资者适当性管理办法》规定，由【行业协会】制定并定期更新本行业的产品或者服务风险等级名录，经营机构评估相关产品或者服务的风险等级不得低于行业协会名录规定的风险等级。 选项B错误：中国人民银行主要负责货币政策和金融稳定。 选项C错误：中国证监会主要负责监管证券市场，但具体的名录制定工作由行业协会承担。 选项D错误：中国证监会派出机构主要负责地方性的监管工作。","type":"single"},{"id":"cy_fin_665","q":"证券期货经营机构违反《证券期货投资者适当性管理办法》规定的，（）可以对经营机构及其直接负责的主管人员和其他直接责任人员，采取责令改正、监管谈话、出具警示函等监督管理措施。","c":{"A":"中国证监会及其派出机构","B":"中国证券业协会","C":"中国人民银行","D":"中国银行业协会"},"a":"A","an":"选项A正确：证券期货经营机构违反《证券期货投资者适当性管理办法》规定的，中国证监会及其派出机构可以对经营机构及其直接负责的主管人员和其他直接责任人员，采取责令改正、监管谈话、出具警示函等监督管理措施。 选项B错误：中国证券业协会是证券行业的自律性组织，主要职责是行业自律、会员服务、纠纷调解等，不具备行政监管权力。 选项C错误：中国人民银行是我国的中央银行，主要负责货币政策制定、金融宏观调控、维护金融稳定等宏观层面事务。 选项D错误：中国银行业协会主要负责银行业自律管理和协调工作，与证券期货市场监管无关。","type":"single"},{"id":"cy_fin_667","q":"证券公司向普通投资者销售低风险的货币市场基金时，也必须对销售过程进行全过程录音或录像。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"在普通投资者申请转为专业投资者，向普通投资者销售高风险产品或者提供相关服务（货币市场基金通常属于低风险产品，不属于“高风险产品”。），经营机构主动调整投资者分类、产品或者服务分级、适当性匹配意见及向普通投资者履行信息告知义务这四种情形下，经营机构应： 1.通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像； 2.通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。","type":"judge"},{"id":"cy_fin_669","q":"证券公司在反洗钱特别预防措施方面的职责包括（  ）。","c":{"A":"识别和评估相关风险并制定相应制度","B":"及时获取法定监控名单","C":"对客户及其交易对象进行核查","D":"采取相应措施并向中国人民银行或其分支机构报告"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当按照国家有关机关要求对下列名单所列对象开展实时监测并采取反洗钱特别预防措施： 1.国家反恐怖主义工作领导机构认定并由其办事机构公告的恐怖活动组织和人员名单； 2.外交部发布的执行联合国安理会决议通知中涉及定向金融制裁的组织和人员名单； 3.国务院反洗钱行政主管部门认定或者会同国家有关机关认定的，具有重大洗钱风险、不采取措施可能造成严重后果的组织和人员名单。 证券公司应当识别、评估相关风险并制定相应的制度，及时获取上述名单，对客户及其交易对象进行核查，采取相应措施，并向所在地中国人民银行或者其分支机构报告。","type":"multi"},{"id":"cy_fin_671","q":"证券公司应当按照（）有关规定采集、记录、存储、报送客户交易终端信息，并采取有效的技术措施，保障相关信息真实、准确、完整。","c":{"A":"中国人民银行","B":"中国证监会","C":"中国证券业协会","D":"工商管理局"},"a":"B","an":"选项B正确：证券公司应当按照【中国证监会】有关规定采集、记录、存储、报送客户交易终端信息，并采取有效的技术措施，保障相关信息真实、准确、完整。 选项A错误：中国人民银行主要负责货币政策的制定与执行，以及金融市场的宏观调控 选项C错误：中国证券业协会对证券行业进行自律管理，但具体的信息采集、记录等操作要求由中国证监会规定。 选项D错误：工商管理局则主要负责企业的注册登记及部分市场监管工作，不涉及证券交易的具体监管事务。","type":"single"},{"id":"cy_fin_673","q":"上海证券交易在科创板推出不同于主板的交易机制改革措施，其中有（）。","c":{"A":"引入盘后固定价格交易","B":"优化融券交易机制","C":"新增两种市价申报方式","D":"收紧涨跌幅限制"},"a":"A,B,C","an":"选项D错误：应为“放宽涨跌幅限制”，而不是收紧涨跌幅限制。 选项ABC正确：上交所科创板交易机制的特别规定：引入盘后固定价格交易、优化融券交易机制、新增两种市价申报方式、放宽涨跌幅限制、调整单笔申报数量、可以根据市场情况调整微观交易机制、调整交易信息公开指标、交易行为监督方面。","type":"multi"},{"id":"cy_fin_675","q":"证券研究报告的质量审核应当严格按照公司规定的标准进行认真审查，涵盖（）等内容，重点关注研究方法和研究结论的专业性和审慎性。","c":{"A":"信息处理","B":"分析逻辑","C":"研究结论","D":"销售预测"},"a":"A,B,C","an":"选项ABC正确：证券研究报告的质量审核应当严格按照公司规定的标准进行认真审查，涵盖【信息处理、分析逻辑、研究结论】等内容，重点关注研究方法和研究结论的专业性和审慎性。 选项D错误：干扰项，教材未提及。研究报告要确保其客观性和公正性以及研究的准确性和深度，其质量审核标准通常针对研究报告的核心组成部分，如研究方法、数据分析、结论推导等。而销售预测更侧重于基于历史数据和市场趋势对企业未来销售情况的预估。这种预估往往涉及多种不确定因素，如市场需求变化、竞争加剧、经济环境变化等，因此其准确性和可靠性较难保证。而且在证券研究报告中过多涉及销售预测可能引发潜在偏见，影响研究报告的客观性和公正性。一般是不把销售预测纳入质量审核内容。","type":"multi"},{"id":"cy_fin_677","q":"财务顾问及其财务顾问主办人采取不正当竞争手段进行恶性竞争的，中国证监会一般不会对其采取（）。","c":{"A":"移送司法机关追究责任","B":"监管谈话","C":"出具警示函","D":"责令改正"},"a":"A","an":"题目问的是”不会采取“。 选项A错误：“移送司法机关追究责任”通常是在涉嫌犯罪的情况下才会采取的措施。题目中提到的是不正当竞争行为，并未涉及犯罪行为，因此答案选择A。 选项BCD正确：财务顾问及其财务顾问主办人采取不正当竞争手段进行恶性竞争的，中国证监会对其采取【监管谈话、出具警示函、责令改正】等监管措施。","type":"single"},{"id":"cy_fin_679","q":"财务顾问应当建立健全内部报告制度，并对证监会提出的问题进行充分的研究、论证，审慎回复。回复意见应当由（）签名，并加盖财务顾问单位签章。","c":{"A":"部门负责人","B":"财务顾问的法定代表人或者其授权代表人","C":"财务顾问主办人","D":"项目协办人"},"a":"B,C,D","an":"注意：这道题考察的是“回复意见”，不包括A.部门负责人，如果考察“专业意见”则需要选择A选项。 选项BCD正确：财务顾问应当建立健全内部报告制度，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核查机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证、审慎回复。意见应当由【财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人】签名，并加盖财务顾问单位公章。  【易混淆】专业意见签名vs回复意见签名 1.财务顾问的法定代表人或者其授权代表人、部门负责人、内部核查机构负责人、财务顾问主办人和项目协办人应当在财务顾问专业意见上签名，并加盖财务顾问单位公章。 2.回复意见应当由财务顾问的法定代表人或者其授权代表人、财务顾问主办人和项目协办人签名，并加盖财务顾问单位公章。（不包括部门负责人）","type":"multi"},{"id":"cy_fin_681","q":"证券公司从事证券发行上市保荐业务，应当依照《证券发行上市保荐业务管理办法》相关规定向（）申请保荐业务资格。","c":{"A":"中国人民银行","B":"财政部","C":"中国证监会","D":"中国证券业协会"},"a":"C","an":"选项C正确：证券公司从事证券发行上市保荐业务，应当依照《证券发行上市保荐业务管理办法》相关规定向【中国证监会】申请保荐业务资格。未经中国证监会核准，任何机构不得从事保荐业务。 选项A错误：中国人民银行是国家金融宏观调控部门，主要职责是制定和执行货币政策、维护金融稳定、提供金融服务，不直接负责证券发行上市保荐业务的资格审批。 选项B错误：财政部是国务院负责财政事务的行政部门，主要职责包括财政预算管理、税收政策制定、国有资产管理等。 选项D错误：中国证券业协会是证券行业的自律性组织，接受中国证监会的指导和监督，主要职能是行业自律、规范发展、服务会员等。","type":"single"},{"id":"cy_fin_683","q":"证券公司从事发行上市保荐业务，应向（）申请保荐业务资格。","c":{"A":"中国人民银行","B":"财政部","C":"中国证监会","D":"国务院"},"a":"C","an":"选项C正确：按照证券发行保荐业务的一般规定，证券公司从事证券发行上市保荐业务，应按照《证券发行上市保荐业务管理办法》的规定向【中国证监会】申请保荐业务资格。 选项A错误：中国人民银行是我国的中央银行，主要职责包括制定和执行货币政策、监督管理银行间市场、维护金融稳定等，保荐业务属于证券发行与承销范畴，由中国证监会直接监管，与中国人民银行职责无关。 选项B错误：财政部是国务院负责财政事务的组成部门，主要职责包括财政预算管理、税收政策制定、国有资产管理等，不涉及证券行业的具体业务监管。 选项D错误：国务院是最高国家行政机关，统一领导全国行政工作，但具体的行业监管职责由其下属的职能部门（如证监会）承担。","type":"single"},{"id":"cy_fin_685","q":"（）可以对保荐机构及其与发行上市保荐工作相关的人员、证券服务机构、发行人及其与证券发行上市工作相关的人员等进行定期或者不定期现场检查。","c":{"A":"中国人民银行","B":"财政部","C":"中国证监会","D":"国务院"},"a":"C","an":"选项C正确：【中国证监会】可以对保荐机构及其与发行上市保荐工作相关的人员、证券服务机构、发行人及其与证券发行上市工作相关的人员等进行定期或者不定期现场检查，相关主体应当积极配合检查，如实提供有关资料，不得拒绝、阻挠、逃避检查，不得谎报、隐匿、销毁相关证据材料。 选项A错误：中国人民银行的核心职能是制定货币政策、维护金融稳定和人民币管理，其监管对象主要是银行间市场的宏观运行（如同业拆借、债券交易），而非证券发行上市的具体业务。 选项B错误：财政部的主要职责是财政政策制定、预算管理、税收政策等。 选项D错误：国务院作为最高国家行政机关，负责制定国家发展战略和重大政策，但具体监管事务通过职能部门（如证监会）实施","type":"single"},{"id":"cy_fin_687","q":"某证券公司的融资融券业务发展迅速，业务规模不断扩大。为了更好地把控业务风险，公司重新梳理了融资融券业务决策与授权体系。业务决策机构正在开会，讨论关于单一客户和单一证券的相关授信及业务参数设定问题。以下属于业务决策机构确定内容的是（  ）。","c":{"A":"制定融资融券合同的标准文本","B":"确定对具体客户的授信额度","C":"确定融资融券的期限和利率(费率)","D":"负责客户征信、签约、开户"},"a":"C","an":"选项C正确：业务决策机构由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，确定对单一客户和单一证券的授信额度、融资融券的期限和利率(费率)、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。 选项AB错误：业务执行部门负责融资融券业务的具体管理和运作，制定融资融券合同的标准文本，确定对具体客户的授信额度，对分支机构的业务操作进行审批、复核和监督。 选项D错误：分支机构在公司总部的集中监控下，按照公司的统一规定和决定，具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。","type":"single"},{"id":"cy_fin_689","q":"证券金融公司应当每年按照税后利润的（）提取风险准备金。","c":{"A":"0.05","B":"0.1","C":"0.15","D":"0.2"},"a":"B","an":"选项B正确：证券金融公司应当每年按照税后利润的10％提取风险准备金。","type":"single"},{"id":"cy_fin_691","q":"仅计算现金及信用证券账户内证券市场总和的维持保证金比例超过（）时，客户可以提取保证金可用额度中的现金或冲抵保证金的证券，但提取后仅计算现金及信用证券账户内证券市场总和的维持担保比例不得低于（）。","c":{"A":"250％；300％","B":"250％；250％","C":"300％；300％","D":"300％；250％"},"a":"C","an":"选项C正确：仅计算现金及信用证券账户内证券市场总和的维持保证金比例【超过300％】时，客户可以提取保证金可用额度中的现金或冲抵保证金的证券，但提取后仅计算现金及信用证券账户内证券市场总和的维持担保比例【不得低于300％】。","type":"single"},{"id":"cy_fin_693","q":"在转融通业务中，证券金融公司向证券公司收取的保证金可以用证券充抵，但货币资金占应收取保证金的比例不得低于（）。","c":{"A":"0.05","B":"0.1","C":"0.15","D":"0.2"},"a":"C","an":"选项C正确：证券金融公司开展转融通业务，应当向证券公司收取一定比例的保证金。保证金可以证券充抵，但【货币资金】占应收取保证金的比例【不得低于15%】。","type":"single"},{"id":"cy_fin_695","q":"证券金融公司开展转融通业务，应当向证券公司收取一定比例的保证金，保证金不可以用证券充抵。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券金融公司开展转融通业务，应当向证券公司收取一定比例的保证金。保证金可以证券充抵，但货币资金占应收取保证金的比例不得低于15%。","type":"judge"},{"id":"cy_fin_697","q":"证券公司将自有资金委托基金管理公司进行证券投资管理，且投资规模合计不超过其净资本80%的，则无须取得证券自营业务资格。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司将自有资金投资于依法公开发行的国债、投资级公司债、货币市场基金、央行票据等中国证监会认可的风险较低、流动性较强的证券，或者委托其他证券公司或者基金管理公司进行证券投资管理，且投资规模合计不超过其净资本80%的，无须取得证券自营业务资格。","type":"judge"},{"id":"cy_fin_699","q":"合格境内投资者可以委托符合条件的投资顾问进行境外证券投资，要求投资顾问经营投资管理业务达5年以上，且最近一个会计年度管理的证券资产不少于（）或等值货币。","c":{"A":"100亿美元","B":"100亿元人民币","C":"200亿美元","D":"200亿元人民币"},"a":"A","an":"选项A正确：合格境内投资者可以委托符合条件的投资顾问进行境外证券投资，要求投资顾问经营投资管理业务达5年以上，且最近一个会计年度管理的证券资产【不少于100亿美元】或等值货币。","type":"single"},{"id":"cy_fin_701","q":"证券公司柜台市场产品账户代码由（）位字符组成，前（）位为机构代码，由报价系统自动分配；后（）位由阿拉伯数字和英文字母组成。","c":{"A":"12；2；10","B":"12；3；9","C":"12；4；8","D":"12；5；7"},"a":"B","an":"选项B正确：证券公司柜台市场产品账户代码由12位字符组成，前3位为机构代码，由报价系统自动分配；后9位由阿拉伯数字和英文字母组成，优先使用阿拉伯数字，由报价系统、证券公司或者中国证监会认可的其他登记机构分配并管理。","type":"single"},{"id":"cy_fin_703","q":"下列关于证券公司柜台交易结算管理的说法中，正确的有 （  ）。","c":{"A":"收付双方的结算账户都是同一证券公司第三方存管账户的，证券公司可以根据结算需要在收付双方资金账户之间进行资金划转","B":"收付双方的结算账户均不是第三方存管账户的，开展结算业务的机构可以通过报价系统或中国证监会认可的其他机构为收付双方办理资金结算业务","C":"收付双方的结算账户都是同一证券公司第三方存管账户的，开展结算业务的机构可以通过报价系统或中国证监会认可的其他机构为收付双方办理资金结算业务","D":"证券公司与其第三方存管客户发生交易的，应当通过参与柜台市场的自有资金专用存款账户与柜台市场客户资金专用存款账户进行资金结算"},"a":"A,B,D","an":"选项A正确，选项C错误：收付双方的结算账户都是同一证券公司第三方存管账户的，证券公司可以根据结算需要在收付双方资金账户之间进行资金划转。 选项B正确：收付双方的结算账户均不是第三方存管账户的，开展结算业务的机构可以通过报价系统或者中国证监会认可的其他机构为收付双方办理资金结算业务。 选项D正确：证券公司与其第三方存管客户发生交易的，应当通过参与柜台市场的自有资金专用存款账户与柜台市场客户资金专用存款账户进行资金结算，相关资金划转应当符合客户交易结算资金存管的规定。","type":"multi"},{"id":"cy_fin_705","q":"证券公司开展区域性股权市场业务，应当在每个月的前（）个工作日内将上个月度业务开展情况报送至中国证券业协会。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"B","an":"选项B正确：证券公司开展区域性股权市场业务，应当在每个月的前【10个工作日】内将上个月度业务开展情况报送至中国证券业协会。","type":"single"},{"id":"cy_fin_707","q":"证券公司代销金融产品，应当遵守法律、行政法规和中国证监会的规定，遵循（  ）原则，避免利益冲突，不得损害客户合法权益。","c":{"A":"自愿","B":"公平","C":"平等","D":"适当性"},"a":"A,B,C,D","an":"选项ABCD正确：券公司代销金融产品，应当遵守法律、行政法规和中国证监会的规定，遵循平等、自愿、公平、诚实信用和适当性原则，避免利益冲突，不得损害客户合法权益。","type":"multi"},{"id":"cy_fin_709","q":"证券公司应在每年6月30日前将上一年度参与区域性股权市场情况报送至中国证券业协会。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应在每年4月30日（并非6月30日）前将上一年度参与区域性股权市场情况报送至中国证券业协会。","type":"judge"},{"id":"cy_fin_711","q":"有（）等情形的，中国证监会可以对有关责任人员从轻、减轻或者免予采取证券市场禁入措施。","c":{"A":"主动消除或者减轻违法行为危害后果的","B":"故意出具虚假重要证据的","C":"配合查处违法行为有立功表现的","D":"受他人胁迫或者诱骗实施违法行为的"},"a":"A,C,D","an":"选项B错误：故意出具虚假重要证据的行为属于严重的违法行为，反而可能加重处罚（并非从轻/减轻处罚）。 选项ACD正确：有下列情形之一的，应当对有关责任人员从轻、减轻采取证券市场禁入措施： （1）主动消除或者减轻违法行为危害后果的（A项）；  （2）配合查处违法行为有立功表现的（C项）；  （3）受他人胁迫或者诱骗实施违法行为的（D项）； （4）在执法单位依法作出行政处罚决定或者证券市场禁入决定前主动交代违法行为的； （5）其他依法应当从轻、减轻采取证券市场禁入措施的。 违法情节轻微并及时纠正，没有造成危害后果的，免予采取证券市场禁入措施。初次违法并且危害后果轻微并及时纠正的，可以免予采取证券市场禁入措施。","type":"multi"},{"id":"cy_fin_713","q":"下列关于证券公司与客户关系的基本原则，说法正确的是（  ）。","c":{"A":"证券公司不得挪用客户交易结算资金，但是经公司最高决策机构审批同意的除外","B":"证券公司有权拒绝其他任何单位或者个人对客户资料的查询","C":"从控制公司成本支出考虑，证券公司可以设置职能部门或者岗位，负责与客户进行沟通，处理客户的投诉等事宜","D":"证券公司在经营活动中应当履行法定的信息披露义务，保障客户在充分知情的基础上作出决定"},"a":"D","an":"选项D正确：证券公司在经营活动中应当履行法定的信息披露义务，保障客户在充分知情的基础上作出决定。 选项A错误：证券公司不得挪用客户交易结算资金（没有特例情形），不得挪用客户委托管理的资产，不得挪用客户托管在公司的证券。 选项B错误：证券公司对客户资料负有保密义务。证券公司有权拒绝其他任何单位或者个人对客户资料的查询，但法律、行政法规或者中国证监会另有规定的除外（存在例外情形，B错误）。 选项C错误：证券公司应当（并非“可以”）设专职部门或者岗位负责与客户进行沟通，处理客户的投诉等事宜。","type":"single"},{"id":"cy_fin_715","q":"证券公司持续合规状况的评价依据之一为（  ）采取的刑事处罚措施。","c":{"A":"中国证监会","B":"司法机关","C":"中国证监会及其派出机构","D":"中国人民银行"},"a":"B","an":"选项B正确：证券公司分证券公司持续合规状况主要根据司法机关采取的刑事处罚措施、中国证监会及其派出机构采取的行政处罚措施、行政监管措施及证券期货行业自律组织纪律处分、自律管理措施等情况进行评价。 选项AC错误：中国证监会及其派出机构采取的行政处罚措施、行政监管措施（如警告、罚款、吊销业务许可等）。 选项D错误：中国人民银行主要监管银行体系（如反洗钱、支付结算等），不直接负责证券公司监管，且央行无权实施刑事处罚。","type":"single"},{"id":"cy_fin_717","q":"证券公司分类监管评级中，D级是正常经营机构中的最低级别。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E五大类11个级别。其中，C级是正常经营状态的最低等级。","type":"judge"},{"id":"cy_fin_719","q":"开展恐怖活动资产冻结工作，证券公司正确的做法有（）。","c":{"A":"采取冻结措施后，除法律规定的机关另有要求外，应及时告知客户，并说明采取冻结的依据和理由","B":"采取冻结措施后，不需告知客户，也不需说明采取冻结的依据和理由","C":"非依法律规定，不得擅自解除冻结措施","D":"应当依据重新风险评估结果决定解除冻结措施"},"a":"A,C","an":"选项A正确，选项B错误：证券公司采取冻结措施后，除中国人民银行及其分支机构、公安机关、国家安全机关另有要求外，应当及时告知客户，并说明采取冻结措施的依据和理由（并非不需告知和说明，B错误）。 选项C正确，选项D错误：证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的决定，依法对相关资产采取冻结措施，并不得擅自解除冻结措施（并非依据结果自行决定，D错误）。","type":"multi"},{"id":"cy_fin_721","q":"创业板沿用了科创板（）交易机制。","c":{"A":"申报数量","B":"引入盘后交易","C":"两融业务","D":"涨跌幅限制"},"a":"B,C,D","an":"选项BCD正确：创业板在整体上充分借鉴科创板改革经验，在涨跌幅限制、限价申报限制、盘后定价交易机制、两融交易标的等方面均沿用科创板的交易机制。 选项A错误：同时创业板针对自身特殊情况作出了部分针对性的安排，如单笔申报数量方面，限价申报的单笔买卖申报数量不得超过30万股，市价申报的单笔买卖数量不得超过15万股。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_fin_723","q":"下列关于证券投资顾问与发布证券研究报告的区别有（）。 I 立场相同 II 服务方式和内容相同 III 服务对象有所不同 IV 市场影响有所不同","c":{"A":"I、II","B":"III、IV","C":"I、III、IV","D":"I、II、III、IV"},"a":"B","an":"证券投资顾问业务和发布证券研究报告的区别： (1) 立场不同。【I项错误】  (2) 服务方式和内容不同。【II项错误】  (3) 服务对象有所不同。【III项正确】  (4) 市场影响有所不同。【IV项正确】 注意：第I、II项说的是“相同”，而不是“不同”，故不选这两项。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_725","q":"证券公司应根据()确定尽职调查覆盖的业务范围。","c":{"A":"监管要求","B":"管理需要","C":"市场要求","D":"内部实际情况"},"a":"A,B,D","an":"选项ABD正确：证券公司应当建立健全尽职调查机制。证券公司应根据监管要求、内部实际情况及管理需要确定尽职调查覆盖的业务范围。 选项C为干扰项，尽职调查主要依据监管规定和内部管理需求，而非市场自发要求。","type":"multi"},{"id":"cy_fin_727","q":"证券公司可以在经营场所内为客户现场开立账户，也可以通过见证为客户开立账户，不能通过网上为客户开立账户。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司可通过现场、见证、网上及中国证监会认可的其他方式为客户办理资金账户信息变更、销户等资金账户后续业务。","type":"judge"},{"id":"cy_fin_729","q":"证券投资顾问服务和发布证券研究报告的区别，主要体现在()。","c":{"A":"立场不同","B":"服务对象有所不同","C":"市场影响有所不同","D":"服务方式和内容不同"},"a":"A,B,C,D","an":"证券投资顾问服务和发布证券研究报告的区别，主要体现在以下方面： (1)立场不同。（A正确） (2)服务方式和内容不同。（D正确） (3)服务对象有所不同。（B正确） (4)市场影响有所不同。（C正确）","type":"multi"},{"id":"cy_fin_731","q":"证券公司股东的货币财产出资总额不得超过证券公司注册资本的30％。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司股东的非货币（不是货币）财产出资总额不得超过证券公司注册资本的30％。","type":"judge"},{"id":"cy_fin_733","q":"在证券公司经营过程中，证券公司的债权人将其债权转为证券公司股权的，不受货币出资限制。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司的股东应当用货币或者证券公司经营必需的非货币财产出资。证券公司股东的非货币财产出资总额不得超过证券公司注册资本的30％。但是，在证券公司经营过程中，证券公司的债权人将其债权转为证券公司股权的，不受前述规定的限制。","type":"judge"},{"id":"cy_fin_735","q":"财务顾问将申报文件报中国证监会审核期间，委托人和财务顾问终止委托协议的，财务顾问和委托人应当自终止之日起(  )个工作日内向中国证监会报告，申请撤回申报文件，并说明原因。","c":{"A":"1","B":"5","C":"10","D":"20"},"a":"B","an":"财务顾问将申报文件报中国证监会审核期间，委托人和财务顾问终止委托协议的，财务顾问和委托人应当自终止之日起5个工作日内向中国证监会报告，申请撤回申报文件，并说明原因。","type":"single"},{"id":"cy_fin_737","q":"下列关于证券公司为客户开立账户的要求，说法错误的是（）。","c":{"A":"证券公司为客户办理开户，应当遵循合法、自愿、审慎原则","B":"证券公司应建立健全客户账户开户管理制度、操作流程和风险识别、评估与控制体系，确保风险可测、可控、可承受","C":"证券公司只允许在经营场所内为客户现场开立账户","D":"证券公司应当注意审核客户身份的真实性，确保客户资料真实、准确和完整"},"a":"C","an":"选项C错误：证券公司可通过现场、见证、网上及中国证监会认可的其他方式为客户办理资金账户信息变更、销户等资金账户后续业务。 选项ABD说法正确。","type":"single"},{"id":"cy_fin_739","q":"按照《证券公司分类监管规定》，中国证监会及其派出机构可以根据证券公司专业评价及专项评价结果，对证券公司评价计分进行调整，每项评价最高可加（）分。","c":{"A":"5","B":"4","C":"3","D":"2"},"a":"C","an":"按照《证券公司分类监管规定》，中国证监会及其派出机构可以根据证券公司专业评价及专项评价结果，对证券公司评价计分进行调整，每项评价最高可加3分或扣3分。","type":"single"},{"id":"cy_fin_741","q":"证券账户开立方式包括现场方式和非现场方式。其中，非现场方式不包括（）。","c":{"A":"见证开户","B":"网上开户","C":"证券公司等开户代理机构工作人员在营业场所内为客户现场办理证券账户的开立手续","D":"中国结算认可的其他非现场开户方式"},"a":"C","an":"证券账户的开立方式。证券账户开立方式包括现场方式和非现场方式。其中，非现场方式包括见证开户、网上开户，以及中国结算认可的其他非现场开户方式（ABD属于）。现场开户，是指证券公司等开户代理机构工作人员在营业场所内为客户现场办理证券账户的开立手续（C为现场），该开户方式适用于机构与自然人。","type":"single"},{"id":"cy_fin_743","q":"证券金融公司开展转融通业务，应当向证券公司收取一定比例的保证金。该保证金可以证券充抵，但货币资金占应收取保证金的比例不得低于（）。","c":{"A":"0.1","B":"0.15","C":"0.18","D":"0.2"},"a":"B","an":"证券金融公司开展转融通业务，应当向证券公司收取一定比例的保证金。保证金可以证券充抵，但货币资金占应收取保证金的比例不得低于15％。","type":"single"},{"id":"cy_fin_745","q":"组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员采取（）的证券市场禁入措施。","c":{"A":"1～3年","B":"3～5年","C":"5～10年","D":"终身"},"a":"D","an":"组织、策划、领导或者实施重大违反法律、行政法规或者中国证监会有关规定的活动的，可以对有关责任人员采取终身的证券市场禁入措施。","type":"single"},{"id":"cy_fin_747","q":"根据《证券投资顾问业务暂行规定》，证券投资顾问不得从事的行为包括（  ）","c":{"A":"通过微博发布某上市公司的买入建议","B":"向客户承诺投资本金 100% 安全","C":"以个人名义收取投资顾问服务费","D":"向客户提供市场趋势分析报告"},"a":"A,B,C","an":"选项ABC包括：证券投资顾问不得从事下列活动： (1)以任何方式向客户承诺或者保证投资收益； (2)对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； (3)向他人泄露客户的投资决策计划信息； (4)以个人名义向客户收取证券投资顾问服务费用； (5)通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。 选项D不包括：未禁止向客户提供市场趋势分析报告，只要不涉及具体证券的投资建议。","type":"multi"},{"id":"cy_fin_749","q":"有价证券的价格实际上是以一定市场利率和预期收益为基础计算得出的现值。","c":{"1":"对","0":"错"},"a":"1","an":"不同信用工具，其价格确定方式各不相同。有价证券的价格实际上是以一定市场利率和预期收益为基础计算得出的现值。","type":"judge"},{"id":"cy_fin_751","q":"市场有效性与证券投资分析的关系描述正确的是（   ）。","c":{"A":"在半强式有效市场中只有通过获取资产价格本身尚未反映的内幕信息才有可能获得超额收益","B":"弱式有效市场在技术分析上无效，基本分析有效","C":"半强式有效市场采用技术分析或者基本分析无法取得超额收益","D":"强式有效市场无论是技术分析、基本面分析，还是获取内幕信息，都无法获得超额收益"},"a":"A,B,C,D","an":"选项AC正确：在半强式有效市场中，由于资产价格已经反映了所有相关的公开信息，故采用技术分析或者基本面分析的方法，对历史和现时的成交量价、公司公开的财务情况等进行分析，都无法取得超额收益。只有通过获取资产价格本身尚未反映的内幕信息才有可能获得超额收益。 选项B正确：在弱式有效市场中，由于资产价格已经反映了所有相关的历史信息，故采用技术分析的方法，对历史成交的量价信息进行研究，无法取得超额收益。只有通过获取资产价格本身尚未反映的信息才有可能获得超额收益。 选项D正确：在强式有效市场中，由于资产价格已经反映了所有相关信息，故无论是技术分析、基本面分析，还是获取内幕信息，都无法获得超额收益。","type":"multi"},{"id":"cy_fin_753","q":"市场组合方差是市场中每一证券（   ）协方差的（   ）。","c":{"A":"加权平均值","B":"调和平均值","C":"算术平均值","D":"几何平均值"},"a":"A","an":"市场组合方差是市场中每一证券(或组合)协方差的加权平均值，加权值是单一证券(或组合)的投资比例。","type":"single"},{"id":"cy_fin_755","q":"证券组合可行域的形状满足的一个共同特性是（   ）。","c":{"A":"左边界必然向原点凹或呈线性","B":"左边界必然向外凸或呈线性","C":"左边界呈线性","D":"左边界必然向外凸"},"a":"B","an":"一般而言，当由多种证券(不少于三种证券)构造证券组合时，组合可行域是所有合法证券组合构成的E—β坐标系中的一个区域。可行域满足一个共同的特点：左边界必然向外凸或呈线性，即不会出现凹陷。","type":"single"},{"id":"cy_fin_757","q":"在均值一方差模型中，如果不允许卖空，由两种风险证券构建的证券组合的可行域（   ）。","c":{"A":"可能是均值标准差平面上的一个无限区域","B":"可能是均值标准差平面上的两条直线段","C":"可能是均值标准差平面上的一条直线段","D":"可能是均值标准差平面上的一条光滑的曲线段"},"a":"B,C,D","an":"当这两种风险证券完全正相关时，其构建的证券组合的可行域是均值标准差平面上的一条直线段；当这两种风险证券完全负相关时，其构建的证券组合的可行域是均值标准差平面上的一个三角形区域；当这两种风险证券完全不相关时，其构建的证券组合的可行域是均值标准差平面上的一条光滑的曲线段。","type":"multi"},{"id":"cy_fin_759","q":"当由多种证券（   ）构成证券组合时，组合可行域是所有合法证券组合构成的坐标系中的一个区域满足一个共同的特点（   ）。","c":{"A":"左边界呈线性","B":"左边界向外凸","C":"左边界向内凹","D":"左边界没有规律"},"a":"A,B","an":"该题考查证券组合可行域和有效边界的一般图形。当由多种证券（不少于三种证券）构成证券组合时，组合可行域是所有合法证券组合构成的坐标系中的一个区域，可行域满足一个共同的特点：左边界必然是向外凸或呈线性，也就是说不会出现凹陷。","type":"multi"},{"id":"cy_fin_761","q":"指数型证券投资组合的特点是（   ）。","c":{"A":"是一种被动的投资策略","B":"投资风险较大","C":"模拟特定的市场指数表现","D":"投资于海外国家"},"a":"A,C","an":"指数型证券投资组合的目标是模拟特定的市场指数表现（选项C正确）。通过购买组成该指数的各种证券，按照相应权重进行配置，以实现与该指数相似的投资回报，是一种被动的投资策略（选项A正确）。 综上所述，本题应选择AC选项。","type":"multi"},{"id":"cy_fin_763","q":"如果风险的市值保持不变，则无风险利率的上升会使证券市场线（   ）。","c":{"A":"斜率增加","B":"斜率减少","C":"平行移动","D":"旋转"},"a":"C","an":"证券市场线的公式为E(Rp）=Rf+[E(Rm）-Rf]βp。 无风险利率Rf为纵轴的截距，则当无风险利率上升，风险的市值不变时，证券市场线会平行移动。","type":"single"},{"id":"cy_fin_765","q":"下列关于证券系数β的说法正确的是（   ）。","c":{"A":"β系数是衡量证券承担系统风险水平的指数","B":"β系数反映了证券或组合的收益水平对市场总收益水平变化的敏感性","C":"牛市时，在估值优势相差不大的情况下，投资者会选择β系数较大的股票，以期获得较高的收益","D":"熊市时，投资者会选择β系数较小的股票，以减少股票下跌的损失"},"a":"A,C,D","an":"选项B错误：β系数反映了证券或组合的收益水平对市场平均收益水平（不是总收益水平）变化的敏感性。","type":"multi"},{"id":"cy_fin_767","q":"用资本资产定价模型计算出来的单个证券的期望收益率（   ）。","c":{"A":"应与市场预期收益率相同","B":"可被用作资产估值","C":"可被视为必要收益率","D":"与无风险利率无关"},"a":"B,C","an":"由CAPM公式：预期收益率=无风险收益率+β*（市场组合的预期收益率-无风险收益率）可知，证券预期收益率与无风险利率有关，与市场预期收益率可以不同。因此选项AD说法错误。","type":"multi"},{"id":"cy_fin_769","q":"假设证券市场只有证券A和证券B，证券A和证券B的期望收益率分别为6％和12％，β系数分别为0.6和1.2，无风险借贷利率为3％，那么根据资本资产定价模型，（   ）。","c":{"A":"这个证券市场不处于均衡状态","B":"这个证券市场处于均衡状态","C":"证券A的单位系统风险补偿为0.05","D":"证券B的单位系统风险补偿为0.075"},"a":"A,C,D","an":"根据证券市场线，证券A的单位系统风险补偿为：， 证券B的单位系统风险补偿为：  当市场均衡时，单位系统风险补偿应该相同。","type":"multi"},{"id":"cy_fin_771","q":"β系数值绝对值越大，表明市场指数对证券或组合的敏感性越大。","c":{"1":"对","0":"错"},"a":"0","an":"β系数值绝对值越大，表明证券或组合对市场指数的敏感性越大。","type":"judge"},{"id":"cy_fin_773","q":"下列关于GDP与证券市场被动关系表述错误的是（   ）。","c":{"A":"持续、稳定、高速的GDP增长，证券市场将呈现上升走势","B":"高通货膨胀下的GDP增长将导致证券市场行情下跌","C":"GDP负增长速度逐渐减缓并呈现向正增长转变的趋势时，证券市场走势将由下跌转为上升","D":"高通货膨胀下GDP增长将导致证券市场同步上升"},"a":"D","an":"A正确：持续、稳定、高速的GDP增长，证券市场将呈现上升走势。 B正确：高通货膨胀下的GDP增长将导致市场行情下跌。 C正确：GDP负增长速度逐渐减缓并呈现向正增长转变的趋势时，证券市场走势将由下跌转为上升。 D错误：高通货膨胀下的GDP增长将导致证券市场行情下跌，当经济处于严重失衡下的高速增长时，总需求大大超过总供给，这将表现为高的通货膨胀率。企业经营将面临困境，居民实际收入也将降低，因而失衡的经济增长必将导致证券市场行情下跌。","type":"single"},{"id":"cy_fin_775","q":"关于证券投资的基本分析法，下列说法错误的是（   ）。","c":{"A":"以经济学、金融学、财务管理学及投资学等基本原理为依据","B":"对决定证券价值及价格的基本要素进行分析","C":"是根据证券市场自身变化规律得出结果的分析方法","D":"评估证券的投资价值，判断证券的合理价位，提出相应的投资建议"},"a":"C","an":"ABD正确：基本分析法又称基本面分析法，是指根据经济学、金融学、财务管理学及投资学等基本原理，对决定证券价值及价格的基本要素，如宏观经济指标、经济政策走势行业发展状况、公司经营和财务状况等进行分析，从而评估证券的投资价值，判断证券的合理价位，提出相应投资建议的一种分析方法。 C错误：证券投资的分析方法有基本分析法和技术分析法，技术分析法是主要根据证券市场自身变化规律得出结果的分析方法。","type":"single"},{"id":"cy_fin_777","q":"（   ）财政政策将使过热的经济受到控制，证券市场将走弱。","c":{"A":"紧的","B":"松的","C":"中性","D":"弹性"},"a":"A","an":"一般来说，紧缩财政政策将使得过热的经济受到控制，证券市场也将走弱，因为这预示着未来经济将减速增长或走向衰退；而扩张性财政政策将刺激经济发展，证券市场则将走强，因为这预示着未来经济将加速增长或进入繁荣阶段。","type":"single"},{"id":"cy_fin_779","q":"分析证券产品应该运用（   ）对具体证券的真实价值、市场价格及价格涨跌趋势进行深入分析。","c":{"A":"基本分析","B":"技术分析","C":"相对分析","D":"组合理论"},"a":"A,B,D","an":"分析证券产品：运用基本分析、技术分析和组合理论对具体证券的真实价值、市场价格及价格涨跌趋势进行深入分析。","type":"multi"},{"id":"cy_fin_781","q":"在进行证券投资技术分析的假设中，最根本、最核心的条件是（   ）。","c":{"A":"市场行为涵盖一切信息","B":"证券价格沿趋势移动","C":"历史会重演","D":"投资者都是理性的"},"a":"B","an":"证券市场技术分析是以一定的假设条件为前提的，这些假设是：市场行为涵盖一切信息（是进行技术分析的基础）；证券价格沿趋势移动（进行技术分析最根本、最核心的条件）；历史会重演（从人的心理因素方面考虑的）。","type":"single"},{"id":"cy_fin_783","q":"证券投资技术分析的特点包括（   ）。","c":{"A":"技术分析进行交易的见效快，获得利益的周期短","B":"考虑问题的范围相对较窄，对市场长远的趋势不能进行有益的判断","C":"预测时间跨度比较长","D":"能够比较全面地把握证券市场的基本走势，应用起来相对简单"},"a":"A,B","an":"A正确：技术分析的优点：具备全面、直接、准确、可操作性强、适用范围广等显著特点。与基本分析相比，技术分析进行交易的见效快，获得利益的周期短。此外，技术分析对市场的反应比较直接，分析的结果也更接近实际B市场的局部现象。通过市场分析得到的进出场位置相比较基本分析而言，往往比较准确。 B正确：技术分析的缺点：考虑对象的范围相对较窄，对长远的市场趋势难以进行有效的判断。技术分析相对于基本分析更适用于短期的行情预测，要进行周期较长的分析则必须参考基本分析，这是应用技术分析最应该注意的问题。 C项和D项属于基本分析的特点。","type":"multi"},{"id":"cy_fin_785","q":"证券投资组合管理是一个系统性的工作，其基本步骤中的第一步是（   ）。","c":{"A":"构建投资组合","B":"确定投资目标","C":"形成市场预期","D":"业绩评价"},"a":"B","an":"管理型投资顾问业务的投资组合管理及资产配置步骤，包括：明确投资组合管理的收益目标，根据投资目标制定相应的组合管理政策，形成资本市场预期，建立战略性资产配置方案，构建具体的投资组合，对投资组合进行修正，评价投资组合的业绩。","type":"single"},{"id":"cy_fin_787","q":"某基金公司经理运用夏普比率衡量一只基金业绩，经计算得出基金证券的资产组合的预期收益率为8％，资产组合的标准差为10％，当前国债利率是3％，则夏普比率为（   ）。","c":{"A":"0.3","B":"1.3","C":"0.5","D":"1.5"},"a":"C","an":"夏普比率：Sp=（rp-rf）/σp=（8%-3%）/10%=0.5","type":"single"},{"id":"cy_fin_789","q":"某证券组合今年实际平均收益率为0.15，当前的无风险利率为0.03，市场组合的风险溢价为0.06，该证券组合的β值为1.5。那么，根据詹森指数评价方法，该证券组合绩效（   ）。","c":{"A":"不如市场绩效好","B":"与市场绩效一样","C":"好于市场绩效","D":"无法评价"},"a":"C","an":"αp=0.15-[0.03+0.06×1.5]=0.03，由于詹森指数为正数，所以其绩效好于市场绩效。","type":"single"},{"id":"cy_fin_791","q":"下列选项中，属于证券组合根据投资目标不同的划分类型的是()。","c":{"A":"国际型、国内型、混合型","B":"收入型、增长型、指数型","C":"激进型、稳健性、均衡型","D":"保值型、增值型、平衡型"},"a":"B","an":"证券组合按不同的投资目标可以分为：避税型、收入型、增长型、收入和增长混合型、货币市场型、国际型及指数型等。","type":"single"},{"id":"cy_fin_793","q":"在马柯威茨模型中，当允许卖空时，由四种不完全相关证券构建的证券组合的可行域是均值标准差平面上的（）。","c":{"A":"一条曲线","B":"有限区域","C":"一条直线","D":"无限区域"},"a":"D","an":"假设可供选择的证券有A、B、C三种，可能的投资组合便不再局限于一条曲线上，而是坐标系中的一个区域。在不允许卖空的情况下，三种证券所组成的可行域是有限区域，如果允许卖空，三种证券组合的可行域不再是有限区域，而是包含该有限区域的一个无限区域。 一般而言，当由多种证券(不少于三种证券)构造证券组合时，组合可行域是所有合法证券组合构成的E-σ坐标系中的一个区域。在不允许卖空下是有限区域，在允许卖空下则是包含有限区域的无限区域。","type":"single"},{"id":"cy_fin_795","q":"关于不完全相关证券组合的可行域，下列说法正确的是（  ） Ⅰ两个证券组合的可行域是一条直线 Ⅱ多个证券组合的可行域是一条曲线 Ⅲ 在不允许卖空的情况下，三个证券的可行域是一个有限区域 Ⅳ在允许卖空的情况下，三个证券的可行域是一个无限区域","c":{"A":"Ⅰ Ⅱ Ⅲ","B":"Ⅱ Ⅲ Ⅳ","C":"Ⅲ Ⅳ","D":"Ⅰ Ⅱ"},"a":"C","an":"Ⅰ错误：当两个证券完全正相关时，证券组合的可行域是一条直线；当两个证券完全负相关时，证券组合的可行域是一条折线；当两个证券不完全相关时，证券组合的可行域是一条曲线。 Ⅱ错误：多个证券组合的可行域是一个区间。 Ⅲ正确：在不允许卖空的情况下，三个证券的可行域是一个有限区域。 Ⅳ正确：在允许卖空的情况下，三个证券的可行域是一个无限区域。 综上，该题选C。","type":"single"},{"id":"cy_fin_797","q":"指数化证券组合通常是模拟().","c":{"A":"夏普指数","B":"特雷尔指数","C":"詹森指数","D":"市场指数"},"a":"D","an":"指数化证券组合模拟某种市场指数。","type":"single"},{"id":"cy_fin_799","q":"根据资本资产定价模型(CAPM)，当我们在衡量某证券的收益率时，其风险溢价收益应为()。","c":{"A":"无风险利率和贝塔(β)的乘积","B":"贝塔(β)和市场预期收益率的乘积","C":"无风险利率和市场风险溢价之和","D":"贝塔(β)和市场风险溢价的乘积"},"a":"D","an":"根据资本资产定价模型，任意证券或组合的期望收益率由两部分构成：一部分是无风险利率rF，它是由时间创造的，是对放弃即期消费的补偿；另一部分则是[E(rP)-rF]βP，是对承担风险的补偿，通常称为“风险溢价”。它与承担的风险βP的大小成正比。其中的[E(rP)-rF]代表了对单位风险的补偿，通常称之为风险的价格（市场组合的风险溢价）。","type":"single"},{"id":"cy_fin_801","q":"证券市场线方程表明，在市场均衡时，(  )。  Ⅰ.收益包含承担系统风险的补偿  Ⅱ.系统风险的价格是市场组合期望收益率与无风险利率的差额  Ⅲ.所有证券或组合的单位系统风险补偿相等  Ⅳ.期望收益率相同的证券具有相同的贝塔（β）系数","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"证券市场线公式：E（ri）=rF+β[E（rM）-rF）] 任意证券或组合的期望收益率由两部分构成： 一部分是无风险利率rF，是对放弃即期消费的补偿； 另一部分β[E（rM）-rF）]是对承担系统风险的补偿，通常称为风险溢价。[E（rM）-rF）]代表了单位风险的补偿，通常称为风险的价格。 综上，该题选D。","type":"single"},{"id":"cy_fin_803","q":"下列关于利率变动对证券投资的影响，说法正确的是","c":{"A":"利率水平的变动直接影响到公司的融资成本，从而影响股票价格。利率低，可以降低公司的利息负担，增加公司盈利，股票价格也将随之下降","B":"利率降低，部分投资者将把储蓄投资转成股票投资，需求增加，促成股价上升","C":"利率降低，部分投资者将把储蓄投资转成股票投资，需求增加，促成股价下降","D":"利率是计算股票内在投资价值的重要依据之一，当利率上升时，股票的内在投资价值上升，从而导致股票价格上涨"},"a":"B","an":"一般来说,利率下降时,股票价格就上升;而利率上升时,股票价格就下降。","type":"single"},{"id":"cy_fin_805","q":"下列有关通货膨胀对证券市场的影响，正确的是（  ） Ⅰ 温和的、稳定的通货膨胀对股价的影响较小 Ⅱ 如果通胀在可容忍的范围内持续，而经济处于扩张阶段，那么股价也将持续上升 Ⅲ 通货膨胀不仅产生经济影响，还可能产生社会影响，并影响投资者的心理和预期，从而对股价产生影响 Ⅳ 通货膨胀使得各种商品价格具有更大的不确定性","c":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"A","an":"温和的、稳定的通货膨胀对股价的影响较小。 通货膨胀提高了投资者对债券的收益率的要求，从而引起债券价格下跌。严重的通货膨胀是很危险的，经济将被严重扭曲，货币每年以50%的速度以至更快地贬值，这时人们将会囤积商品，购买房屋以期对资金保值。 这可能从两个方面影响股价： ①资金流出金融市场，引起股价下跌； ②经济扭曲和失去效率，企业一方面筹集不到必需的生产资金，同时，原材料、劳务价格等成本飞涨，使企业经营严重受挫，盈利水平下降，甚至倒闭。","type":"single"},{"id":"cy_fin_807","q":"下列关于宏观经济政策对证券市场影响和传导机制的说法，正确的有()。","c":{"A":"收入总量调控政策通过财政政策和货币政策的传导对证券市场产生影响","B":"以外币为基准，汇率上升，本币贬值，将会导致出口型企业收益增加，出口型企业的股票和债券价格将上涨","C":"一般来说，紧缩财政政策将使得过热的经济受到控制，证券市场将走弱，扩张性财政政策将刺激经济发展，证券市场将走强","D":"中央银行降低法定存款准备金率或降低再贴现率都可能会导致证券市场行情上扬"},"a":"A,B,C,D","an":"A正确：收入总量调控政策可以通过财政、货币机制来实施，还可以通过行政干预和法律调整等机制来实施。 B正确：一般而言，以外币为基准，汇率上升，本币贬值，本国产品竞争力强，出口型企业收益将增加，因而企业的股票和债券价格将上涨。 C正确：一般来说，紧缩财政政策将使得过热的经济受到控制，证券市场也将走弱。 D正确：如果中央银行降低法定存款准备金率或降低再贴现率，通常都会导致证券市场行情上扬。","type":"multi"},{"id":"cy_fin_809","q":"证券投资技术分析的特点包括(  )。  Ⅰ.能够比较全面地把握证券市场的基本走势，应用起来相对简单  Ⅱ.预测时间跨度比较长  Ⅲ.与市场接近，考虑问题直观  Ⅳ.考虑问题的范围相对较窄，对市场长远的趋势不能进行有益的判断过期考点","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ"},"a":"C","an":"证券投资技术分析的特点包括与市场接近，考虑问题直观、考虑问题的范围相对较窄，对市场长远的趋势不能进行有益的判断。","type":"single"},{"id":"cy_fin_811","q":"下列关于技术分析的局限性表述，正确的是(  )。  Ⅰ.技术分析是以一定假设条件为前提的，而这些假设条件本身就有局限性  Ⅱ.技术分析假设市场行为包括了一切，但市场行为反应的信息同原始信息有差异，信息损失是必然的  Ⅲ.技术分析体现了供求关系影响证券价格和交易量，但证券价格最终要受其内在价值的影响  Ⅳ.技术分析认为历史会重演，这符合证券市场规律，也反复被证券历史证明了的","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅱ、Ⅲ","C":"Ⅱ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"A","an":"技术分析方法的局限性： Ⅰ、Ⅱ正确：1.假设条件在实践中不完全成立。技术分析是以一定假设条件为前提的，包括市场行为涵盖一切信息、证券价格沿着趋势移动和历史会重演。但是，在实践中，技术分析的假设条件往往很难完全成立，市场行为一般并不会涵盖所有的信息，历史也并不会百分之百精准地重演以前的情景。 2.使用历史数据预测未来走势。技术分析采用历史中已经发生过的信息去预测未来走势，具有一定的滞后性，但市场或资产的未来走势很多时候与过去关联不大，而是与未来的改变有关。 Ⅲ正确：3.无法反映基本面影响因素。技术分析主要关注价格和交易量，忽视了基本面的因素，如公司财务状况、行业趋势、市场需求等。这些基本面因素对价格有重要影响但技术分析很难预测或捕捉到这些因素的变化。 4.更适合短周期。长周期的变化和扰动因素更多，技术分析主要适用于周期相对比较短的证券价格预测。 Ⅳ错误：技术分析认为历史会重演，但是历史会不会重演无法证实。 综上，该题选A。","type":"single"},{"id":"cy_fin_813","q":"证券市场技术分析是以一定的假设条件为前提的,这些假设不包括()。","c":{"A":"市场行为涵盖一切信息","B":"证券价格沿趋势移动","C":"历史会重演","D":"指标须可靠"},"a":"D","an":"证券市场技术分析是以一定的假设条件为前提的，这些假设是：市场行为涵盖一切信息（是进行技术分析的基础）；证券价格沿趋势移动（进行技术分析最根本、最核心的条件）；历史会重演（从人的心理因素方面考虑的）。","type":"single"},{"id":"cy_fin_815","q":"证券投资技术分析方法的要素包括（）","c":{"A":"证券市场价格的波动幅度","B":"证券的交易量","C":"证券市场的交易制度","D":"证券的市场价格"},"a":"A,B,D","an":"证券市场中，价格、成交量、时间和空间是进行技术分析的要素。这几个因素的具体情况和相互关系是进行正确分析的基础。 其中，空间在某种意义上可以认为是价格的一方面，指的是价格波动能够达到的极限。","type":"multi"},{"id":"cy_fin_817","q":"证券投资顾问可以通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎地对（）发表评论意见。","c":{"A":"某上市公司","B":"特定的指数期货合约","C":"宏观经济、行业状况、证券市场变动情况","D":"特定的分级基金"},"a":"C","an":"证券投资顾问可以通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎的对宏观经济、行业状况、证券市场变动情况发表评论意见。","type":"single"},{"id":"cy_fin_819","q":"证券投资组合按不同的投资目标可以分为（  ）。","c":{"A":"国际型","B":"避税型","C":"货币市场型","D":"收入和增长混合型"},"a":"A,B,C,D","an":"证券投资组合按不同的投资目标可以分为避税型、收入型、增长型、收入和增长混合型、货币市场型、国际型及指数型等。","type":"multi"},{"id":"cy_fin_821","q":"在进行贷款或融资活动时，贷款者和借款者并不能自由地在利率预期的基础上将证券从一个偿还期部分替换成另一个偿还期部分，这是（  ）的观点。","c":{"A":"市场预期理论","B":"合理分析理论","C":"流动性偏好理论","D":"市场分割理论"},"a":"D","an":"市场分割理论认为在贷款或融资活动进行时，贷款者和借款者并不能自由地在利率预期的基础上将证券从一个偿还期部分替换成另一个偿还期部分。在最严格的限制形式下，即使现行的利率水平说明如果他们进行市场间的转移会获得比实际要高的预期利率，投资者和借款人也不会离开自己的市场而进入另一个市场。这样的结果使市场划分为两大部分：一部分是短期资金市场；另一部分是长期资金市场。","type":"single"},{"id":"cy_fin_823","q":"如果当前的证券价格反映了历史价格信息和所有公开的价格信息，则该市场属于 （　　）。","c":{"A":"弱式有效市场","B":"半弱式有效市场","C":"强式有效市场","D":"半强式有效市场"},"a":"D","an":"半强式有效市场假说是指当前的证券价格不仅反映了历史价格包含的所有信息，而且反映了所有有关证券的能公开获得的信息。","type":"single"},{"id":"cy_fin_825","q":"在半强式有效市场中，证券当前价格反映的信息有（  ）。","c":{"A":"公司的财务报告","B":"公司公告","C":"有关公司红利政策的信息","D":"内幕信息"},"a":"A,B,C","an":"半强式有效市场中，当前的证券价格不仅反映了历史价格包含的所有信
