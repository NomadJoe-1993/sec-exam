"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅰ、Ⅱ"},"a":"A","an":"I错误：资本资产定价模型假设任何证券的交易单位都是无限可分的。 资本资产定价模型三大假设： Ⅲ正确：假设1：投资者都依据期望收益率评价证券组合的收益水平，依据方差(或标准差)评价证券组合的风险水平，并按照投资者共同偏好规则选择最优证券组合。 Ⅱ正确：假设2：投资者对证券的收益、风险及证券间的关联性具有完全相同的预期。 Ⅳ正确：假设3：资本市场没有摩擦。 综上，该题选A。","type":"single"},{"id":"cy_fin_2159","q":"套利定价模型的目标是寻找 ()的证券。","c":{"A":"低风险","B":"价格被低估","C":"高成长性","D":"高收益"},"a":"B","an":"套利定价模型的目标是寻找价格被低估的证券。","type":"single"},{"id":"cy_fin_2161","q":"假设市场中存在三种不同的证券，当前的初始投资成本为1 000，经过一个时期之后，证券的收益依状态确定(未来有两种状态，每个状态出现的概率均为50％)，每个状态下的价值如下表所示。那么，依据资本资产定价模型中关于投资者证券选择偏好的假设，下列说法中，正确的有（）。","c":{"A":"在证券1和证券2中，投资者偏好于选择证券1","B":"在证券1和证券3中，投资者偏好于选择证券3","C":"在证券2和证券3中，投资者偏好于选择证券3","D":"在证券1和证券3中，投资者偏好于选择证券1"},"a":"A,B,C","an":"根据题意，证券1的期望收益=1050×50％+1200×50％=1125，证券2的期望收益=500×50％+1600×50％=1050，证券3的期望收益=1050×50％+1600×50％=1325。","type":"multi"},{"id":"cy_fin_2163","q":"经营机构代销其他机构发行的产品，应当在合同中约定要求委托方提供的信息，包括《证券期货投资者适当性管理办法》规定的产品分级考虑因素等，并履行投资者评估、适当性匹配等适当性义务。委托方不提供规定的信息、提供信息不完整的，经营机构应当()。","c":{"A":"自行调查取得相关信息","B":"拒绝代销产品","C":"上调产品风险等级","D":"在代销产品时向投资者说明"},"a":"B","an":"证券经营机构代销其他机构发行的产品或者服务，应当在合同中约定要求委托方提供的信息，包括产品或者服务分级考虑因素等，自行对该信息进行调查核实，并履行投资者评估、适当性匹配等适当性义务。委托方不提供规定的信息、提供信息不完整的，证券经营机构应当拒绝代销产品或者服务。","type":"single"},{"id":"cy_fin_2165","q":"根据《证券期货投资者适当性管理办法》普通投资者在（）方面不享有特别保护。","c":{"A":"信息告知","B":"适当性匹配","C":"风险警示","D":"收益保证"},"a":"D","an":"《证券期货投资者适当性管理办法》规定， 投资者分为普通投资者与专业投资者；普通投资者在信息告知（A项）、风险警示（C项）、适当性匹配（B项）等方面享有特别保护。","type":"single"},{"id":"cy_fin_2167","q":"证券经营机构代销其他机构发行的产品，应当在合同中约定要求委托方提供的信息，包括产品分级考虑因素等，并履行投资者评估、适当性匹配等适当性义务。委托方不提供规定的信息、提供信息不完整的，证券经营机构应当（）。","c":{"A":"自行调查取得相关信息","B":"拒绝代销产品","C":"上调产品风险等级","D":"在代销产品时向投资者说明"},"a":"B","an":"证券经营机构代销其他机构发行的产品或者服务，应当在合同中约定要求委托方提供的信息，包括产品或者服务分级考虑因素等，自行对该信息进行调查核实，并履行投资者评估、适当性匹配等适当性义务。委托方不提供规定的信息、提供信息不完整的，证券经营机构应当拒绝代销产品或者服务。","type":"single"},{"id":"cy_fin_2169","q":"证券经营机构对销售的产品划分风险等级时需要考虑产品的到期期限。()","c":{"1":"对","0":"错"},"a":"1","an":"经营机构应当了解所销售产品或者所提供服务的信息，根据风险特征和程度，对销售产品或者提供的服务划分风险等级。划分产品或者服务风险等级时应综合考虑如下因素：流动性、到期期限、杠杆情况、结构复杂性、投资单位产品或者相关服务的最低金额、投资方向和投资范围、募集方式、发行人等相关主体的信用状况、同类产品或者服务过往业绩等。","type":"judge"},{"id":"cy_fin_2171","q":"下列关于证券投资宏观经济分析中总量分析法和结构分析法的说法，正确的是（  ）。","c":{"A":"总量分析和结构分析是互不相干的","B":"结构分析侧重于对经济指标增长速度的分析","C":"总量分析要服从结构分析的目标","D":"总量分析侧重分析经济运行的动态过程"},"a":"D","an":"A错误：总量分析和结构分析是相互联系的。 D正确：总量分析侧重于总量指标速度的考察，侧重分析经济运行的动态过程； B错误：结构分析侧重于对一定时期经济整体中各组成部分相互关系的研究，侧重分析经济现象的相对静止状态。 C错误：总量分析非常重要，但它需要结构分析来深化和补充， 而结构分析要服从于总量分析的目标。 为使经济正常运行，需要对经济运行进行全面把握， 将总量分析方法和结构分析方法结合起来使用。","type":"single"},{"id":"cy_fin_2173","q":"宏观经济运行对证券市场的影响主要表现在（ ）  Ⅰ企业经济效益  Ⅱ居民收入水平  Ⅲ投资者对股价的预期  Ⅳ资金成本","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅰ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"宏观经济运行对证券市场的影响主要表现在： （1）企业经济效应。 （2）居民收入水平。 （3）投资者对股价的预期。 （4）资金成本。  综上，该题选D。","type":"single"},{"id":"cy_fin_2175","q":"关于证券相对估值法指标市盈率一般不适用（ ）。","c":{"A":"周期性较弱的企业","B":"一般制造业","C":"服装业","D":"亏损公司"},"a":"D","an":"市盈率一般适用周期性较弱行业如一般制造业、服装业。不适用亏损公司、周期性行业。 综上，该题选D。","type":"single"},{"id":"cy_fin_2177","q":"通过对证券基本财务要素的计算和处理得出该证券的绝对金额，该估值方法是()。","c":{"A":"绝对估值","B":"相对估值","C":"风险中性定价","D":"无套利定价"},"a":"A","an":"绝对估值法是指通过对证券的基本财务要素的计算和处理得出该证券的绝对金额，各种基于现金流贴现的方法均属此类。","type":"single"},{"id":"cy_fin_2179","q":"在构建证券投资组合环节，投资者需要决定的主要事项包括()。","c":{"A":"投资风格","B":"个别证券选择","C":"投资时机选择","D":"多元化"},"a":"B,C,D","an":"在构建证券投资组合时,投资者需要注意个别证券选择、投资时机选择和多元化三个问题。","type":"multi"},{"id":"cy_fin_2181","q":"证券投资技术分析的趋势分析中，趋势类型包括()。","c":{"A":"短暂趋势","B":"分散趋势","C":"主要趋势","D":"次要趋势"},"a":"A,C,D","an":"道氏理论认为，价格的波动尽管表现形式不同，但最终可以将它们分为3种趋势：主要趋势、次要趋势和短暂趋势。","type":"multi"},{"id":"cy_fin_2183","q":"证券投资分析的方法主要有()。  Ⅰ基本分析  Ⅱ技术分析  Ⅲ量化分析  Ⅳ策略分析","c":{"A":"Ⅰ、Ⅱ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅲ、Ⅳ"},"a":"C","an":"证券投资分析的方法有基本分析、技术分析、量化分析。  综上，该题选C。","type":"single"},{"id":"cy_fin_2185","q":"证券投资咨询机构甲和乙根据某投资者的收益要求、风险偏好等特征，分别推荐了A股票投资组合和B股票投资组合。 B股票投资组合采用指数型消极投资策略，跟踪某个指数。该指数共有100支成分股，前10支成分股市值在指数中合计权重为50%，股票C在指数中权重为10%。请根据上述背景信息回答问题。 可以衡量投资组合收益率的波动程度及损失风险的指标是（    ）。","c":{"A":"货币加强收益率","B":"最大回撤","C":"持有到期收益率","D":"投资组合规模"},"a":"B","an":"最大回撤是指在评估周期内从任一高点到其后续最低点之间的下跌幅度，用于衡量持有该投资组合的最大可能损失。","type":"single"},{"id":"cy_fin_2187","q":"向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在（）注册登记为证券投资顾问。","c":{"A":"中国证监会","B":"证券公司","C":"国务院监督管理机构","D":"中国证券业协会"},"a":"D","an":"向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在中国证券业协会（选项D正确）注册登记为证券投资顾问。","type":"single"},{"id":"cy_fin_2189","q":"证券投资顾问与证券分析师的区别主要体现在（  ）。","c":{"A":"立场不同","B":"服务方式不同","C":"收费不同","D":"市场影响不同"},"a":"A,B,D","an":"证券投资顾问与证券分析师存在如下不同： 1、立场不同（选项A） 证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 2、服务方式和内容不同（选项B） 证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等；证券分析师制作的证券研究报告通常向不特定的客户发布，提供证券价值评估等研究成果，关注证券定价的合理性，而不关注买卖时机选择等具体的操作性投资建议。 3、服务对象有所不同 证券投资顾问已般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务；证券分析师制作的证券研究报告一般服务于基金、QFII 等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 4、提供服务的市场影响有所不同（选项D） 证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券分析师制作的证券研究报告会向多个机构客户同时发布，对证券价格可能产生较大影响。 证券投资顾问与证券分析师的区别不包括收费的不同。综上所述，本题应选择ABD选项。","type":"multi"},{"id":"cy_fin_2191","q":"向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在中国证监会注册登记为证券投资顾问。","c":{"1":"对","0":"错"},"a":"0","an":"向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在中国证券业协会注册登记为证券投资顾问，本题说法错误。","type":"judge"},{"id":"cy_fin_2193","q":"证券投资顾问基于独立、客观的立场，向客户提供适当的证券投资建议。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议。 证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 因此本题说法错误。","type":"judge"},{"id":"cy_fin_2195","q":"证券投资顾问服务与特定客户的证券投资及其利益密切相关，对证券价格可能产生较大影响。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券分析师制作的证券研究报告会向多个机构客户同时发布，对证券价格可能产生较大影响。","type":"judge"},{"id":"cy_fin_2197","q":"证券投资咨询机构应当建立健全投资者回访制度，对购买产品或接受服务的投资者，每年抽取不低于上一年度末购买产品或接受服务的投资者总数(含购买或者接受产品或服务的风险等级高于其风险承受能力的投资者，不含休眠账户及中止交易账户投资者)的 （   ）进行回访。","c":{"A":"0.1","B":"0.05","C":"0.15","D":"0.2"},"a":"A","an":"证券投资咨询机构应当建立健全投资者回访制度，对购买产品或接受服务的投资者，每年抽取不低于上一年度末购买产品或接受服务的投资者总数(含购买或者接受产品或服务的风险等级高于其风险承受能力的投资者，不含休眠账户及中止交易账户投资者)的10%（选项A正确）进行回访。","type":"single"},{"id":"cy_fin_2199","q":"证券公司的个人客户的需求主要是（）","c":{"A":"投资性需求","B":"消费性需求","C":"经营性需求","D":"储蓄性需求"},"a":"A","an":"证券公司的个人客户的需求主要是投资性需求。","type":"single"},{"id":"cy_fin_2201","q":"假设某证券最近10周收盘价分别为22、21、22、24、26、27、25、24、26、25，那么本周的RSI(9)等于（  ）。","c":{"A":"45","B":"50","C":"61.54","D":"56"},"a":"C","an":"每周的收盘价减去上一周的收盘价，可得到下面9个数字：-1、1、2、2、1、-2、-1、2、-1。最近10周收盘价格上涨总数=1+2+2+1+2=8；最近10周收盘价格下跌总数=（-1-2-1-1）×（-1）=5。因此RSI（9）=8/（8+5）×100≈61.54。","type":"single"},{"id":"cy_fin_2203","q":"在证券公司持续从事证券业务10 年以上，且不存在效力期限内违法失信信息或者其他负面执业声誉信息，无须证券公司验证其专业能力水平的，在培训周期内减少（  ）学时培训。","c":{"A":"3","B":"5","C":"6","D":"10"},"a":"B","an":"在证券公司持续从事证券业务10 年以上，且不存在效力期限内违法失信信息或者其他负面执业声誉信息，无须证券公司验证其专业能力水平的，在培训周期内减少5学时培训。","type":"single"},{"id":"cy_fin_2205","q":"证券投资顾问业务和发布证券研究报告的区别有（   ）。","c":{"A":"立场不同","B":"服务方式和内容不同","C":"服务对象有所不同","D":"市场影响有所不同"},"a":"A,B,C,D","an":"证券投资顾问业务和发布证券研究报告的区别： (1 ) 立场不同。证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 (2) 服务方式和内容不同。证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。证券研究报告向不特定的客户发布， 提供证券估值等研究成果， 关注证券定价，不关注买卖时机选择等具体的操作性投资建议。 (3) 服务对象有所不同。证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务； 证券研究报告一般服务于基金、QFII 等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 (4) 市场影响有所不同。证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价； 证券研究报告向多个机构客户同时发布， 对证券价格可能产生较大影响。","type":"multi"},{"id":"cy_fin_2207","q":"存在效力期限内被中国证监会采取行政处罚、行政监管措施或者被行业自律组织实施纪律处分等违法失信信息的，在培训周期内增加45 学时培训。","c":{"1":"对","0":"错"},"a":"1","an":"存在效力期限内被中国证监会采取行政处罚、行政监管措施或者被行业自律组织实施纪律处分等违法失信信息的，在培训周期内增加45 学时培训。","type":"judge"},{"id":"cy_fin_2209","q":"下列违背证券分析师执业行为准则的是（  ）。","c":{"A":"证券分析师应当遵循独立、客观、公平、审慎、专业、诚信的执业原则","B":"以经营机构的名义发布研究观点、提供研究服务的人员必须是公司正式员工","C":"证券分析师不得使用互联网工具等传播媒介，发表涉及具体证券的评论意见","D":"证券分析师制作发布证券研究报告、提供相关服务，应当向客户进行必要的风险提示"},"a":"C","an":"C项符合题意，证券分析师使用互联网工具等传播媒介向客户提供投资分析意见，依法属于发布证券研究报告行为的，应当按照发布证券研究报告的要求履行发布程序，遵守《发布证券研究报告执业规范》等相关要求，不得与其所在公司已发布证券研究报告的最新意见和建议相矛盾，也不得就所在研究机构未覆盖的公司发表证券估值或投资评级意见；提供研究报告后续解读服务应是对既往已发布报告的解读，不涉及新的分析意见。","type":"single"},{"id":"cy_fin_2211","q":"下列关于证券公司、证券投资咨询机构制作证券研究报告时，应当遵循的说法中不正确的是（  ）。","c":{"A":"证券公司、证券投资咨询机构制作证券研究报告应当秉承专业的态度","B":"证券公司、证券投资咨询机构制作证券研究报告应当坚持客观原则，避免使用夸大、诱导性的标题或者用语","C":"证券公司、证券投资咨询机构应采用严谨的研究方法和分析逻辑，基于合理的数据基础和事实依据，审慎提出研究结论","D":"证券公司、证券投资咨询机构可对投资者作出证券投资收益或者分担证券投资损失的书面或口头承诺"},"a":"D","an":"根据《发布证券研究报告执业规范》，证券公司、证券投资咨询机构应提示投资者自主作出投资决策并自行承担投资风险，任何形式的分享证券投资收益或者分担证券投资损失的书面或口头承诺均为无效。","type":"single"},{"id":"cy_fin_2213","q":"有关媒体刊载、转发证券研究报告的管理要求，说法错误的是（   ）。","c":{"A":"与相关公众媒体及其他机构作出协议约定，明确由被授权机构承担相关刊载或者转发责任，强化媒体合作管理","B":"加强证券研究报告发布环节管理，要求公司相关人员不得将证券研究报告私自提供给未经公司授权的公众媒体或者其他机构， 提示客户不要将证券研究报告转发给他人","C":"媒体机构可以对公司所提供材料的标题或者内容作实质性修改","D":"建立跟踪监测机制，发现公司证券研究报告被私自刊载或者转发的，及时采取维权措施"},"a":"C","an":"C项错误，要求媒体机构不得自行对公司所提供材料的标题或者内容作实质性修改。","type":"single"},{"id":"cy_fin_2215","q":"以下有关证券分析师发表言论管理的说法，错误的是（   ）。","c":{"A":"以经营机构的名义发布研究观点、提供研究服务的人员必须是公司正式员工","B":"经营机构应当建立证券分析师向客户发布信息和言论的事前报备程序，拟发布的主要内容应当经所在部门负责人或公司分管高管人员签批同意，并报合规部门备案","C":"不得私自以公司名义、冠以公司职务或者其他容易引发身份误导的方式对外公开发表言论","D":"提供研究报告后续解读服务应是对既往已发布报告的解读，可以涉及新的分析意见"},"a":"D","an":"提供研究报告后续解读服务应是对既往已发布报告的解读，不涉及新的分析意见。","type":"single"},{"id":"cy_fin_2217","q":"发布证券研究报告的基本原则有（   ）。","c":{"A":"独立原则","B":"客观原则","C":"公平原则","D":"审慎原则"},"a":"A,B,C,D","an":"发布证券研究报告的基本原则： 独立原则、客观原则、公平原则、审慎原则。","type":"multi"},{"id":"cy_fin_2219","q":"证券分析师在执业过程中遇到自身利益与公司利益、客户利益存在冲突时，应当主动向公司报告。","c":{"1":"对","0":"错"},"a":"1","an":"证券分析师在执业过程中遇到自身利益与公司利益、客户利益存在冲突时，应当主动向公司报告。","type":"judge"},{"id":"cy_fin_2221","q":"发布证券研究报告的平台应由公司指定，且必须是以公司名义注册或拥有。","c":{"1":"对","0":"错"},"a":"1","an":"发布证券研究报告的平台应由公司指定，且必须是以公司名义注册或拥有。","type":"judge"},{"id":"cy_fin_2223","q":"经营机构发布证券研究报告，应当对发布的时间、方式、内容和审阅过程实行留痕管理。发布证券研究报告相关业务档案的保存期限自证券研究报告发布之日起不得少于5年。","c":{"1":"对","0":"错"},"a":"1","an":"经营机构发布证券研究报告，应当对发布的时间、方式、内容和审阅过程实行留痕管理。发布证券研究报告相关业务档案的保存期限自证券研究报告发布之日起不得少于5 年。","type":"judge"},{"id":"cy_fin_2225","q":"制作发布证券研究报告的相关人员，应当独立于证券研究报告相关销售服务人员。","c":{"1":"对","0":"错"},"a":"1","an":"制作发布证券研究报告的相关人员，应当独立于证券研究报告相关销售服务人员。","type":"judge"},{"id":"cy_fin_2227","q":"中国证券业协会制定《证券从业人员职业道德准则》。主要内容包括（  ）。","c":{"A":"敬畏法律，遵纪守规","B":"诚实守信，勤勉尽责","C":"守正笃实，严谨专业","D":"审慎稳健，严控风险"},"a":"A,B,C,D","an":"中国证券业协会制定《证券从业人员职业道德准则》。主要内容包括： 敬畏法律，遵纪守规。 诚实守信，勤勉尽责。 守正笃实，严谨专业。 审慎稳健，严控风险。 公正清明，廉洁自律。 持续精进，追求卓越。 爱岗敬业，忠于职守。 尊重包容，共同发展。 关爱社会，益国利民。","type":"multi"},{"id":"cy_fin_2229","q":"证券组合则通常指代投资者所持有的各种有价证券的总称，包括各种类型的存款、债券、股票、大宗 商品、外汇等。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券组合则通常指代投资者所持有的各种有价证券的总称，包括各种类型的存款、债券、股票、大宗 商品、外汇等。","type":"judge"},{"id":"cy_fin_2231","q":"1952年，哈理•马柯威茨发表了一篇题为《证券组合选择》的论文，标志着现代证券组合理论的开端。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"1952年，哈理•马柯威茨(Harry M. Markowitz)发表了一篇题为《证券组合选择》的论文，标志着现代证券组合理论的开端。","type":"judge"},{"id":"cy_fin_2233","q":"有关最优证券组合的说法正确的是（   ）。","c":{"A":"这一组合是能带来最高收益的组合","B":"这一组合肯定不在有效边界上","C":"这一组合是无差异曲线簇与有效边界的切点","D":"这一组合是风险最小的组合"},"a":"C","an":"最优证券组合的含义：使投资者最满意的有效组合，它是无差异曲线簇与有效边界的切点所表示的组合。","type":"single"},{"id":"cy_fin_2235","q":"证券组合的可行域表示了所有可能的证券组合，为投资者提供了一切可行的组合投资机会，投资者需要在其中选择最满意的证券组合进行投资。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券组合的可行域表示了所有可能的证券组合，为投资者提供了一切可行的组合投资机会，投资者需要在其中选择最满意的证券组合进行投资。","type":"judge"},{"id":"cy_fin_2237","q":"在半强式有效市场中，由于所有信息均反映在证券价格上，投资者不可能获得超额收益。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"在强式有效市场中，由于所有信息均反映在证券价格上，投资者不可能获得超额收益。","type":"judge"},{"id":"cy_fin_2239","q":"关于证券市场线，下列说法错误的是（  ）。","c":{"A":"定价正确的证券将处于证券市场线上","B":"证券市场线使所有的投资者都选择相同的风险资产组合","C":"证券市场线为评价预期投资业绩提供了基准","D":"证券市场线表示证券的预期收益率与其β系数之间的关系"},"a":"B","an":"B项，资本市场线使所有的投资者都选择相同的风险资产组合。","type":"single"},{"id":"cy_fin_2241","q":"套利组合是指满足（    ）条件的证券组合。","c":{"A":"组合中各资产的权重之和为0","B":"该组合对于公共因素的敏感度为0","C":"该组合的期望收益率为正值","D":"组合中各资产的权重之和为1"},"a":"A,B,C","an":"套利组合是指满足下述三个条件的证券组合： 条件1：组合中各资产的权重之和为0。 条件2：该组合对于公共因素的敏感度为0。 条件3：该组合的期望收益率为正值。","type":"multi"},{"id":"cy_fin_2243","q":"在BAPM 中，投资者可分为信息交易者和噪音交易者。噪音交易者是证券错误定价的重要原因之一。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"在BAPM 中，投资者可分为信息交易者和噪音交易者。其中，信息交易者完全理性，严格按照 CAPM进行投资决策，仅受资产预期收益和方差影响，而不会被认知偏差所左右，信息交易者的套利行为使得资产价格不会与其内在价值产生过大差距；与之相反，噪音交易者会受到认知偏差的影响。 根据BAPM，噪音交易者是证券错误定价的重要原因之一，该类投资者常常将噪音(如虚假的财务信号等)与真正有用的信息混为一谈，导致资产价格偏离其内在价值，从而产生套利机会，该机会被信息交易者所利用，使得价格有向内在价值回归的动力。","type":"judge"},{"id":"cy_fin_2245","q":"羊群行为，是指投资者在不确定性的环境下，效仿他人行为或严重依靠舆论的行为。由于该行为对市场的稳定和高效构成了威胁，并往往与金融危机有关，因此引起了学界和政府的广泛关注。当机构投资者存在羊群行为时，许多机构投资者将在同一 时间买卖相同证券，可能导致证券价格的过度波动。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"羊群行为，是指投资者在不确定性的环境下，效仿他人行为或严重依靠舆论的行为。由于该行为对市场的稳定和高效构成了威胁，并往往与金融危机有关，因此引起了学界和政府的广泛关注。当机构投资者存在羊群行为时，许多机构投资者将在同一 时间买卖相同证券，可能导致证券价格的过度波动。","type":"judge"},{"id":"cy_fin_2247","q":"根据2018年9月30日中国证监会发布的 《上市公司治理准则》规定，上市公司治理体系规范至少体现在（    ）。","c":{"A":"完善的公司章程及与治理相关的文件","B":"保障和维护股东权利","C":"有效的股东大会制度","D":"优秀的职业经理层"},"a":"A,B,C,D","an":"根据2018年9月30日中国证监会发布的 《上市公司治理准则》规定，上市公司治理体系规范至少体现在以下方面： (1)完善的公司章程及与治理相关的文件；(2)保障和维护股东权利；(3)有效的股东大会制度；(4)对董事会权力的合理界定与约束；(5)完善的独立董事制度； (6)明确监事会的独立性和监督责任；(7)优秀的职业经理层；(8)机构投资者及其他机构发挥积极作用；(9)相关利益者的共同治理；(10)建立并执行完善的信息披露事务管理制度。","type":"multi"},{"id":"cy_fin_2249","q":"证券分析师在进行公司调研时通常遵循以下（   ）流程。","c":{"A":"调研前的相关准备工作","B":"编写调研计划","C":"实地调研","D":"撰写和发布报告"},"a":"A,B,C,D","an":"证券分析师在进行公司调研时通常遵循以下的流程： (1)调研前的相关准备工作，包括资料收集和分析，完成财务模型的初步搭建， 整理好问题清单。 (2)编写调研计划，包括调研目的、调研对象、调研内容、调研参与人员、调研时间、调研费用等。该计划需要满足合规和内部管理要求并获得批准。 (3)实地调研，包括访谈、考察、笔录。其中，访谈是目前上市公司实地调研中最常用的方法。上市公司高管或投资者关系负责人在接待来访的调研人员时，通常首先进行企业相关情况介绍，然后再与调研人员进行对话或就相关提问进行回答。随后， 调研人员还可能有机会与上市公司员工、上市公司外部利益相关者、地方政府及监管机构、竞争对手等进行对话。而对上市公司相关人、财、物进行客观而具有针对性的观察是考察环节的主要方法。 (4)撰写和发布报告，主要包括调研成果和投资建议。报告撰写和发布应当遵循相关的法律法规。","type":"multi"},{"id":"cy_fin_2251","q":"证券分析师在进行公司财务分析时，一般应特别关注财务报表附注以下内容：一是重要会计政策和会计估计及其变更的说明，二是或有事项。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券分析师在进行公司财务分析时，一般应特别关注财务报表附注以下内容： (1)重要会计政策和会计估计及其变更的说明。 (2)或有事项。","type":"judge"},{"id":"cy_fin_2253","q":"信奉技术分析的投资者在进行证券分析时，更注重当前的（）。","c":{"A":"经济趋势","B":"市场价格","C":"交易成本","D":"股利分配"},"a":"B","an":"信奉技术分析的投资者在进行证券分析时，更注重当前的市场价格。","type":"single"},{"id":"cy_fin_2255","q":"如果价格的变动呈“头肩底”形，证券分析人员通常会认为（）。","c":{"A":"价格将反转向下","B":"价格将反转向上","C":"价格呈横向盘整","D":"无法预测价格走势"},"a":"B","an":"头肩底是头肩顶的倒转形态，是个可靠的买进时机。这—形态的构成和分析方法，除了在成交量方面与头肩顶有所区别外，其余与头肩顶类同，只是方向正好相反，价格将反转向上。","type":"single"},{"id":"cy_fin_2257","q":"套利定价理论将证券收益率与一系列因子线性 相关的假设建立在收益率产生过程的多因子模型上，这些因素表明了证券收益率的一些基本因子。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"套利定价理论将证券收益率与一系列因子线性相关的假设建立在收益率产生过程的多因子模型上，这些因素表明了证券收益率的一 些基本因子。","type":"judge"},{"id":"cy_fin_2259","q":"无风险收益率为5%，市场期望收益率为12%的条件下：A证券的期望收益率为10%，β系数为1．1；B证券的期望收益率为17%，β系数为1．2，那么投资者可以买进哪一个证券?（　　）","c":{"A":"A证券","B":"B证券","C":"A证券或B证券","D":"A证券和B证券"},"a":"B","an":"根据CAPM模型，A证券：5%+(12%一5%) ×1．1=12．7%，因为12．7%>10%，所以A证券价格被高估，应卖出；B证券：5%+(12%-5%)×1．2=13．4%，因为13．4%<17%，所以B证券价格被低估，应买进。","type":"single"},{"id":"cy_fin_2261","q":"证券的绝对估计值法包括（）。","c":{"A":"市盈率法","B":"现金流贴现模型","C":"经济利润估值模型","D":"市值回报增长比法"},"a":"B,C","an":"绝对估值是指通过对证券基本财务要素的计算和处理得出该证券的绝对金额。主要包括：现金流贴现模型、经济利润估值模型、调整现值模型、资本现金流模型、权益现金流模型。","type":"multi"},{"id":"cy_fin_2263","q":"某债券面值100元，每半年付息次，利息4元，债券期限为5年，若投资者在该债券发行时以108.53元购得，其实际的年收益率是（）。","c":{"A":"0.0588","B":"0.0609","C":"0.0625","D":"0.0641"},"a":"B","an":"半年收益率计算公式为：  得出r=3%，则实际年收益率=(1+r)2-1=6.09%。","type":"single"},{"id":"cy_fin_2265","q":"对证券投资基金从证券市场取得的收入，暂不征收企业所得税的有(  )。","c":{"A":"买卖股票的差价收入","B":"买卖债券的差价收入","C":"股权的股息和红利收入","D":"债券的利息收入"},"a":"A,B,C,D","an":"对证券投资基金从证券市场中取得的收入，包括买卖股票、债券的差价收入，股权的股息、红利收入，债券的利息收入及其他收入，暂不征收企业所得税。ABCD选项都要选上。","type":"multi"},{"id":"cy_fin_2267","q":"《上海证券交易所科创板股票上市规则》规定，发行人申请在上海证券交易所科创板上市，应当符合的条件有（）。","c":{"A":"发行后股本总额不低于人民币5000万元","B":"首次公开发行的股份达到公司股份总数的25％以上","C":"公司股本总额超过人民币4亿元的，首次公开发行股份的比例为10％以上","D":"市值及财务指标符合本规则规定的标准"},"a":"B,C,D","an":"根据《上海证券交易所科创板股票上市规则》，发行人申请在上海证券交易所科创板上市，应当符合中国证监会和上海证券交易所规定的相关上市条件，其中主要的上市条件包含： （1）发行后股本总额不低于人民币3000万元； （2）首次公开发行的股份达到公司股份总数的25％以上； （3）公司股本总额超过人民币4亿元的，首次公开发行股份的比例为10％以上； （4）市值和财务指标满足规定的标准等其他条件。","type":"multi"},{"id":"cy_fin_2269","q":"证券公司为满足正常流动性资金需要，借入或发行期限在6个月以上(含 6个月)、1 年以下(含1 年)的次级债为短期次级债。(  )","c":{"1":"对","0":"错"},"a":"0","an":"证券公司为满足正常流动性资金需要，借入或发行期限在【3个月】以上(含3个月)、1 年以下(含1 年)的次级债为短期次级债。","type":"judge"},{"id":"cy_fin_2271","q":"仅从证券的市场行为来分析证券价格未来变化趋势的股票投资分析方法是(  )。","c":{"A":"基本分析法","B":"技术分析法","C":"量化分析法","D":"定性分析法"},"a":"B","an":"B选项正确，技术分析法直接选取公开的市场数据，采用图表等方法对市场走势作出直观的解释，是仅从证券的市场行为来分析证券价格未来变化趋势的方法。 基本分析法：主要通过宏观经济指标、行业状况以及公司基本面等信息来评估股票的价值和价格。 量化分析法：利用统计模型和计算机模拟等定量工具进行分析，结合了大量数据和复杂的数理模型。 定性分析法：基于非量化的因素来进行分析。","type":"single"},{"id":"cy_fin_2273","q":"证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具(  )时，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。","c":{"A":"审计报告","B":"资产评估报告","C":"财务顾问报告","D":"资信评级报告"},"a":"A,B,C,D","an":"证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具【审计报告】及其他鉴证报告、【资产评估报告】、【财务顾问报告】、【资信评级报告】或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。ABCD选项都正确。","type":"multi"},{"id":"cy_fin_2275","q":"根据《上海证券交易所科创板股票上市规则》，科创板上市公司可能强制退市的情形主要包括 (  )。","c":{"A":"重大违法强制退市","B":"财务类强制退市","C":"交易类强制退市","D":"规范类强制退市"},"a":"A,B,C,D","an":"根据《上海证券交易所科创板股票上市规则》，科创板上市公司可能强制退市的情形主要包括：一是重大违法强制退市，二是交易类强制退市，三是财务类强制退市，四是规范类强制退市。ABCD都要选上。","type":"multi"},{"id":"cy_fin_2277","q":"证券服务机构为证券的发行、上市、交易等证券业务活动提供相关服务时，关于其法律责任，下列说法中，正确的有(  )。","c":{"A":"其出具的相关文件资料不得有虚假记载、误导性陈述或重大遗漏","B":"若造成他人损失的，应当与委托人承担连带赔偿责任","C":"如果与被服务机构有利益冲突，只要做好防火墙即可","D":"如果给他人造成损失，即使能够证明自己没有过错，也必须承担连带赔偿责任"},"a":"A,B","an":"证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告及其他鉴证报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。其制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与委托人承担连带赔偿责任（A、B选项正确），但是，能够证明自己没有过错的除外（D选项错误）。证券评级机构与评级对象存在利害关系的，不得受托开展证券评级业务。证券评级机构应建立回避制度，建立清晰合理的组织结构，合理划分内部机构职能，建立健全防火墙制度，从事证券评级业务的业务部门应当与营销等其他业务部门保持独立。 C选项错误，即使设置了防火墙来管理利益冲突，证券服务机构仍需遵循相关法律法规及行业规范以确保独立性和客观性，并不是简单地做好防火墙就可以完全避免法律责任。","type":"multi"},{"id":"cy_fin_2279","q":"企业年金基金财产以投资组合为单位按照公允价值计算应当符合：投资股票等权益类产品以及股票基金、混合基金、投资连结保险产品（股票投资比例高于或者等于30％）的比例，不得高于投资组合企业年金基金财产净值的（）。","c":{"A":"0.3","B":"0.1","C":"0.4","D":"0.2"},"a":"A","an":"企业年金基金投资组合规定，每个投资组合的企业年金基金财产应当由一个投资管理人管理，企业年金基金财产以投资组合为单位按照公允价值计算应当符合的规定之一为： 投资股票等权益类产品以及股票基金、混合基金、投资连结保险产品(股票投资比例高于或者等于30％)的比例，不得高于投资组合企业年金基金【财产净值】的【30％】，A选项正确。 其中，企业年金基金不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。","type":"single"},{"id":"cy_fin_2281","q":"证券市场以证券发行与交易的方式实现了(  )的对接，有效地解决了资本的供需矛盾。","c":{"A":"筹资与并购","B":"筹资与投资","C":"发行与回购","D":"投资与并购"},"a":"B","an":"证券市场是股票、债券、投资基金等有价证券发行和交易的场所。证券市场是市场经济发展到一定阶段的产物，是为解决资本供求矛盾和流动性而产生的市场。证券市场以证券发行与交易的方式实现了筹资与投资的对接，有效地化解了资本的供求矛盾和资本结构调整的难题。","type":"single"},{"id":"cy_fin_2283","q":"证券公司目前可以发行的债券品种包括(  )。","c":{"A":"证券公司普通债券","B":"证券公司短期融资券","C":"证券公司次级债券","D":"混合资本债券"},"a":"A,B,C","an":"证券公司目前可以发行的债券品种包括证券公司普通债券、证券公司短期融资券、证券公司次级债券、证券公司次级债务。不包括D选项，混合资本债券是由商业银行发行的，用于补充其附属资本的一种金融工具。这种债券的清偿顺序位于股权资本之前但列在一般债务和次级债务之后，期限通常在15年以上，并且自发行之日起10年内不可赎回。","type":"multi"},{"id":"cy_fin_2285","q":"资产证券化是以（）为支持，发行可交易证券的一种融资形式.","c":{"A":"特定股票组合","B":"特定现金流","C":"特定资产组合","D":"特定债券组合"},"a":"B,C","an":"资产证券化是以特定资产组合或特定现金流为支持，发行可交易证券的一种形式。传统的证券发行是以企业为基础，而资产证券化是以特定的资产池为基础发行证券。","type":"multi"},{"id":"cy_fin_2287","q":"金融债券是指上市公司依照法定程序发行并约定在一定期限内还本付息的有价证券。","c":{"1":"对","0":"错"},"a":"0","an":"金融债券，是指银行及非银行金融机构依照法定程序发行并约定在一定期限内还本付息的有价证券。","type":"judge"},{"id":"cy_fin_2289","q":"股票基金是指以股票为主要投资对象的证券投资基金，其中60% 以上的基金资产投资于股票。（）","c":{"1":"对","0":"错"},"a":"0","an":"本题考查股票基金的含义。股票基金是指以股票为主要投资对象的证券投资基金。在我国，根据中国证监会对基金类别的分类标准，80%以上的基金资产投资于股票的，为股票基金。","type":"judge"},{"id":"cy_fin_2291","q":"根据《上海证券交易所科创板股票上市规则》的规定，以下关于科创板上市条件的说法，正确的是(  )。","c":{"A":"发行人申请科创板上市，发行后股本总额应不低于人民币 5000 万元","B":"公司股本总额超过人民币 4 亿元的，公开发行股份的比例为 15% 以上","C":"发行人必须盈利且不存在累计未弥补亏损才能在科创板上市","D":"市值和财务指标需符合上交所制定的 5 条标准之一，如预计市值 + 净利润 / 营业收入标准等"},"a":"D","an":"发行人申请科创板上市，发行后股本总额应不低于人民币 3000 万元，而不是 5000 万元，所以A选项错误。 公司股本总额超过人民币 4 亿元的，公开发行股份的比例为 10% 以上，而不是 15% 以上，所以B选项错误。 科创板允许符合科创板定位、尚未盈利或存在累计未弥补亏损的企业上市，并非发行人必须盈利且不存在累计未弥补亏损，所以C选项错误。 发行人申请在科创板上市，市值及财务指标应当至少符合上交所制定的5条标准中的一项，包括预计市值 + 净利润 / 营业收入标准等，所以D选项正确。","type":"single"},{"id":"cy_fin_2293","q":"通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到（）时，应当在该事实发生之日起3日内向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。","c":{"A":"0.05","B":"0.1","C":"0.15","D":"0.3"},"a":"A","an":"选项A正确：通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%时，应当在该事实发生之日起3日内向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。在上述期限内不得再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。","type":"single"},{"id":"cy_fin_2295","q":"在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用（）。","c":{"A":"《保险法》","B":"《担保法》","C":"《证券法》","D":"《证券投资基金法》"},"a":"C","an":"选项C正确：在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易，适用《证券法》。 选项A错误：《保险法》的调整范围限于保险活动，包括保险合同的订立、保险公司的设立与监管、保险事故的理赔等。 选项B错误：《担保法》主要规范担保行为，如保证、抵押、质押等，旨在保障债权的实现。 选项D错误：《证券投资基金法》的调整范围限于证券投资基金，包括基金的募集、管理、托管及份额交易等。","type":"single"},{"id":"cy_fin_2297","q":"上市公司、公司债券上市交易的公司、股票在国务院批准的其他全国性证券交易场所交易的公司，应当按照国务院证券监督管理机构和证券交易场所规定的内容和格式编制定期报告，按照规定报送和公告，下列说法错误的是（）。","c":{"A":"在每一会计年度结束之日起4个月内，报送并公告年度报告","B":"年度财务会计报告应当经符合《证券法》规定的会计师事务所审计","C":"在每一会计年度的上半年结束之日起2个月内，报送并公告中期报告","D":"在每一会计年度的上半年结束之日起3个月内，报送并公告中期报告"},"a":"D","an":"选项AB正确：在每一会计年度结束之日起4个月内，报送并公告年度报告，其中的年度财务会计报告应当经符合《证券法》规定的会计师事务所审计。 选项C正确，选项D错误：在每一会计年度的上半年结束之日起2个月内（非3个月），报送并公告中期报告。","type":"single"},{"id":"cy_fin_2299","q":"投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例每增加或者减少百分之五，应当依照前款规定进行报告和公告，在该事实发生之日起至公告后（）日内，不得再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。","c":{"A":"2","B":"3","C":"5","D":"10"},"a":"B","an":"选项B正确：《证券法》第六十三条的规定，通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到百分之五时，应当在该事实发生之日起【三日内】，向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告，在上述期限内不得再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。","type":"single"},{"id":"cy_fin_2301","q":"向特定对象发行证券累计超过（）人（依法实施员工持股计划的员工人数不计算在内）的为公开发行证券。","c":{"A":"100","B":"200","C":"300","D":"400"},"a":"B","an":"选项B正确：有下列情形之一的，为公开发行： （1）向不特定对象发行证券的； （2）向特定对象发行证券累计超过【200】人，但依法实施员工持股计划的员工人数不计算在内。B项符合题意 （3）法律、行政法规规定的其他发行行为。","type":"single"},{"id":"cy_fin_2303","q":"下列关于公开发行证券募集资金用途的说法中，正确的是()。","c":{"A":"对公开发行的股票、债券募集资金用途没有限制","B":"通过董事会的决议可以改变募集资金用途","C":"擅自改变用途未做纠正的不得再次公开发行","D":"对擅自改变用途的发行人、上市公司直接负责人员仅处警告，不处罚款"},"a":"C","an":"选项C正确，选项AB错误：公司对公开发行股票所募集资金，必须按照招股说明书或者其他公开发行募集文件所列资金用途使用；改变资金用途，必须经股东会作出决议。擅自改变用途、未作纠正的，或者未经股东会认可的，不得公开发行新股。 选项D错误：根据《证券法》第一百八十五条的规定，发行人违反《证券法》第十四条、第十五条的规定擅自改变公开发行证券所募集资金的用途的，责令改正，并处以50万元以上500万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以10万元以上100万元以下的罚款。","type":"single"},{"id":"cy_fin_2305","q":"关于擅自改变公开发行证券募集资金用途的认定，下列选项正确的是()。","c":{"A":"公司对于公开发行股票所募集的资金，可以私下用于公司生产经营活动","B":"公司改变招股说明书所列资金用途的，必须经过股东会作出决议","C":"发行公司债券募集的资金，可以用于弥补亏损","D":"发行公司债券筹集的资金，可以用于非生产性支出"},"a":"B","an":"选项B正确，选项A错误：公司对公开发行股票所募集资金，必须按照招股说明书或者其他公开发行募集文件所列资金用途使用；改变资金用途，必须经股东会作出决议。擅自改变用途、未作纠正的，或者未经股东会认可的，不得公开发行新股。 选项CD错误：公开发行公司债券筹集的资金，不得用于弥补亏损和非生产性支出。","type":"single"},{"id":"cy_fin_2307","q":"《证券法》规定，证券交易活动中，涉及公司的经营、财务或者对该公司证券的市场价格有重大影响的尚未公开的信息，为内幕信息。下列信息不属于内幕信息的是（）。","c":{"A":"公司订立重要合同，可能对公司的资产、负债、权益和经营成果产生重要影响","B":"公司发生重大债务和未能清偿到期重大债务的违约情况","C":"公司的董事、三分之一以上监事或者经理发生变动","D":"持有公司百分之三以上股份的股东或者实际控制人，其持有股份或者控制公司的情况发生较大变化"},"a":"D","an":"题目问的是“不属于”。选项D：持有公司5％以上（3%不达标准，D不属于内幕信息）股份的股东或者实际控制人，其持有股份或者控制公司的情况发生较大变化属于内幕信息。因此答案选择D。 选项ABC：《证券法》第八十条第二款、第八十一条第二款所列重大事件属于内幕信息，其中第八十条第二款所称可能对上市公司、股票在国务院批准的其他全国性证券交易场所交易的公司的股票交易价格产生较大影响的重大事件，包括： (1)公司的经营方针和经营范围的重大变化； (2)公司的重大投资行为，公司在一年内购买、出售重大资产超过公司资产总额30%，或者公司营业用主要资产的抵押、质押、出售或者报废一次超过该资产的30%; (3)公司订立重要合同、提供重大担保或者从事关联交易，可能对公司的资产、负债、权益和经营成果产生重要影响； (4)公司发生重大债务和未能清偿到期重大债务的违约情况； (5)公司发生重大亏损或者重大损失； (6)公司生产经营的外部条件发生的重大变化； (7)公司的董事、1/3 以上监事或者经理发生变动，董事长或者经理无法履行职责； (8)持有公司5%以上股份的股东或者实际控制人持有股份或者控制公司的情况发生较大变化，公司的实际控制人及其控制的其他企业从事与公司相同或者相似业务的情况发生较大变化； (9)公司分配股利、增资的计划，公司股权结构的重要变化，公司减资、合并、分立、解散及申请破产的决定，或者依法进入破产程序、被责令关闭； (10)涉及公司的重大诉讼、仲裁，股东大会、董事会决议被依法撤销或者宣告无效； (11)公司涉嫌犯罪被依法立案调查，公司的控股股东、实际控制人、董事、监事、高级管理人员涉嫌犯罪被依法采取强制措施； (12)国务院证券监督管理机构规定的其他事项。","type":"single"},{"id":"cy_fin_2309","q":"上市公司、股票在国务院批准的其他全国性证券交易场所交易的公司持有（）以上股份的股东、董事、监事、高级管理人员，将其持有的该公司的股票或者其他具有股权性质的证券在买入后六个月内卖出，或者在卖出后六个月内又买入，由此所得收益归该公司所有，公司董事会应当收回其所得收益。","c":{"A":"0.01","B":"0.03","C":"0.04","D":"0.05"},"a":"D","an":"选项D正确：上市公司、股票在国务院批准的其他全国性证券交易场所交易的公司持有百分之五以上股份的股东、董事、监事、高级管理人员，将其持有的该公司的股票或者其他具有股权性质的证券在买入后六个月内卖出，或者在卖出后六个月内又买入，由此所得收益归该公司所有，公司董事会应当收回其所得收益。但是，证券公司因购入包销售后剩余股票而持有百分之五以上股份，以及有国务院证券监督管理机构规定的其他情形的除外。 选项ABC为干扰项。","type":"single"},{"id":"cy_fin_2311","q":"上市公司、股票在国务院批准的其他全国性证券交易场所交易的公司持有百分之五以上股份的股东、董事、监事、高级管理人员，将其持有的该公司的股票或者其他具有股权性质的证券在买入后（）内卖出，或者在卖出后（）内又买入，由此所得收益归该公司所有，公司董事会应当收回其所得收益。","c":{"A":"三个月；六个月","B":"六个月；六个月","C":"六个月；九个月","D":"三个月；三个月"},"a":"B","an":"选项B正确：《证券法》第四十四条规定，上市公司、股票在国务院批准的其他全国性证券交易场所交易的公司持有百分之五以上股份的股东、董事、监事、高级管理人员，将其持有的该公司的股票或者其他具有股权性质的证券在买入后六个月内卖出，或者在卖出后六个月内又买入，由此所得收益归该公司所有，公司董事会应当收回其所得收益。但是，证券公司因购入包销售后剩余股票而持有百分之五以上股份，以及有国务院证券监督管理机构规定的其他情形的除外。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_2313","q":"证券承销业务采取代销或者包销方式，包销与代销的区别包括（）。","c":{"A":"代销承销期结束时，未售出的股票承销商自己购买","B":"包销承销期结束时，未售出的股票承销商自己购买","C":"采用代销方式时，证券发行风险由发行人自行承担","D":"全额包销的承销商承担全部发行风险"},"a":"B,C,D","an":"选项A错误：代销方式下，未售出的股票在承销期结束时是退还给发行人的，而不是由承销商自己购买。 选项B正确：包销方式下，承销商会按照协议全部购入发行人的证券，或者在承销期结束时将售后剩余证券全部自行购入。 选项C正确：采用代销方式时，如果证券没有全部售出，未售出部分需要退还给发行人，因此发行风险由发行人自行承担。 选项D正确：全额包销意味着承销商必须按照协议价格买下所有发行的证券，无论是否能够全部售出，所以承销商承担全部发行风险。  【知识拓展】代销VS包销 代销，是证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式。 包销，是证券公司将发行人的证券按照协议全部购入，或者在承销期结束时将售后剩余证券全部自行购入的承销方式。 综上所述，包销和代销的区别是：承销期结束时，将未售出的股票承销商是否自己购买。如果自己购买了未出售部分，则是包销，反之不购买是代销。","type":"multi"},{"id":"cy_fin_2315","q":"某上市公司计划发行新的股票，委托证券公司进行承销，以下关于该证券公司承销方式的说法正确的有（  ）","c":{"A":"若采用证券代销方式，承销期结束时，未售出的证券由证券公司自行留存","B":"证券承销业务可采用代销或者包销方式","C":"若采用证券包销方式，证券公司可能会将发行人的证券按照协议全部购入","D":"若采用证券包销方式，在承销期结束时，证券公司要将售后剩余证券全部退还给发行人"},"a":"B,C","an":"选项B正确：证券承销业务采取代销或者包销方式。 选项C正确：证券包销，是指证券公司将发行人的证券按照协议全部购入，或者在承销期结束时将售后剩余证券全部自行购入的承销方式。 选项A错误：证券代销，是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人（而不是由证券公司自行留存）的承销方式。 选项D错误：证券包销在承销期结束时，售后剩余的证券应由证券公司自行购入，而不是退还给发行人。","type":"multi"},{"id":"cy_fin_2317","q":"国务院证券监督管理机构或者国务院授权的部门应当自受理证券发行申请文件之日起6个月内，依照法定条件和法定程序作出予以注册或者不予注册的决定。（）","c":{"1":"对","0":"错"},"a":"0","an":"国务院证券监督管理机构或者国务院授权的部门应当自受理证券发行申请文件之日起【3个月内】，依照法定条件和法定程序作出予以注册或者不予注册的决定。","type":"judge"},{"id":"cy_fin_2319","q":"向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的证券公司组成。（）","c":{"1":"对","0":"错"},"a":"1","an":"向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的证券公司组成。","type":"judge"},{"id":"cy_fin_2321","q":"任何单位或者个人未经批准，持有或者实际控制证券公司（）以上股权的，国务院证券监督管理机构应当责令其限期改正；改正前，相应股权不具有表决权。","c":{"A":"0.05","B":"0.1","C":"0.15","D":"0.2"},"a":"A","an":"选项A正确：任何单位或者个人未经批准，持有或者实际控制证券公司【5%】以上股权的，国务院证券监督管理机构应当责令其限期改正；改正前，相应股权不具有表决权。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_2323","q":"按照《证券监督管理条例》的要求，以下关于证券公司独立董事的规定，说法正确的是（）。","c":{"A":"独立董事连任时间最多不超过7年","B":"任何人员最多可以在3家证券公司担任独立董事","C":"独立董事应当在股东会上提交工作报告","D":"出于公司业务保密需要，某些情况下，独立董事享有的知情权可以少于其他董事"},"a":"C","an":"选项C正确：独立董事应当根据法律、行政法规和中国证监会的规定独立履行董事职责，并在股东会年会上提交工作报告。 选项A错误：独立董事与公司其他董事任期相同，连任时间最多不超过6年（非7年）。 选项B错误：任何人员最多可以在2家（非3家）证券公司担任独立董事。 选项D错误：证券公司应当保障独立董事享有与其他董事同等的知情权（不可以少于其他董事）。","type":"single"},{"id":"cy_fin_2325","q":"下列关于发布证券研究报告业务信息隔离墙管理要求的说法中，错误的是（）。","c":{"A":"担任发行人股票首次公开发行的保荐机构、主承销商或者财务顾问，自确定并公告发行价格之日起40日内，不得发布与该发行人有关的证券研究报告","B":"担任上市公司股票增发、配股、发行可转换公司债券等再融资项目的保荐机构、主承销商或者财务顾问，自确定并公告公开发行价格之日起20日内，不得发布与该上市公司有关的证券研究报告","C":"担任上市公司并购重组财务顾问，经营机构的合规部门将该上市公司列入相关限制名单期间，按照合规管理要求限制发布与该上市公司有关的证券研究报告","D":"证券公司对研究部门及其研究人员的绩效考评和激励措施，不应与保密侧业务部门的业绩挂钩"},"a":"B","an":"题目问的是“说法错误的”。 选项B：担任上市公司股票增发、配股、发行可转换公司债券等再融资项目的保荐机构、主承销商或者财务顾问，自确定并公告公开发行价格之日起10日内（非20日），不得发布与该上市公司有关的证券研究报告，因此答案选择B。","type":"single"},{"id":"cy_fin_2327","q":"证券公司应当建立观察名单和限制名单制度，以下关于观察名单和限制名单的进出时点，说法错误的是（）。","c":{"A":"观察名单的进入时点，以与客户签署保密协议、对项目立项、进场开展工作和实际获知项目内幕信息中较晚者为准","B":"限制名单的进入时点之一是担任首次公开发行股票项目的上市辅导人、保荐机构或主承销商的信息公开之日","C":"担任上市公司股权类、债权类再融资项目或并购重组项目保荐机构、主承销商或财务顾问的，限制名单的进入时点是项目公司首次对外公告该项目之日","D":"证券公司可以根据实际需要，将列入限制名单的时点前移"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误：观察名单的进入时点，以与客户签署保密协议、对项目立项、进场开展工作和实际获知项目内幕信息中较“早”者（而不是较晚者）为准。因此答案选择A。 选项B正确：担任首次公开发行股票项目的上市辅导人、保荐机构或主承销商的，为担任前述角色的信息公开之日为限制名单的进入时点之一。 选项C正确：担任上市公司股权类、债权类再融资项目或并购重组项目保荐机构、主承销商或财务顾问的，限制名单的进入时点是项目公司首次对外公告该项目之日。 选项D正确：证券公司可以根据实际需要，将列入限制名单的时点前移。","type":"single"},{"id":"cy_fin_2329","q":"关于证券公司的股东、控股股东、实际控制人不得开展业务竞争的描述中，说法正确的是（）。","c":{"A":"控股占比5％以下的小股东可以损害证券公司的利益","B":"控股股东的关联方有义务采取有效措施防止与其所控制的证券公司发生业务竞争","C":"控股股东应当采取有效措施监控是否有其他控股股东损害公司利益的行为","D":"证券公司控股其他证券公司的，可以损害所控股的证券公司的利益"},"a":"B","an":"选项B正确：证券公司的控股股东、实际控制人及其关联方应当采取有效措施，防止与其所控制的证券公司发生业务竞争。 选项A错误：无论持股比例大小，不得损害所控股的证券公司的利益。 选项C错误：干扰项，没有“监控其他股东”的规定，不得开展业务竞争是要求证券公司的控股股东和实际控制人不得损害公司利益，并且应当采取措施防止业务竞争等行为发生。其主要责任在于确保自身不损害公司利益及避免业务竞争，而不是主动去监控其他股东的行为。 选项D错误：证券公司控股其他证券公司的，不得损害所控股的证券公司的利益。","type":"single"},{"id":"cy_fin_2331","q":"独立董事在任期内辞职或者被免职的，独立董事本人和证券公司应当分别向（）提交书面说明。","c":{"A":"公司住所地中国证监会派出机构","B":"独立董事常住地","C":"股东会","D":"董事会"},"a":"A,C","an":"选项AC正确：独立董事在任期内辞职或者被免职的，独立董事本人和证券公司应当分别向【公司住所地中国证监会派出机构】和【股东会】提交书面说明。 选项BD为干扰项。","type":"multi"},{"id":"cy_fin_2333","q":"证券公司与其股东(或者股东的关联方)之间不得有的行为包括（）。","c":{"A":"持有股东的股权，但法律、行政法规或者中国证监会另有规定的除外","B":"通过购买股东持有的证券等方式向股东输送不当利益","C":"股东违规占用公司资产","D":"法律、行政法规或者中国证监会禁止的其他行为"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司与其股东(或者股东的关联方)之间不得有下列行为： （1）持有股东的股权，但法律、行政法规或者中国证监会另有规定的除外。 （2）通过购买股东持有的证券等方式向股东输送不当利益。 （3）股东违规占用公司资产。 （4）法律、行政法规或者中国证监会禁止的其他行为。","type":"multi"},{"id":"cy_fin_2335","q":"下列哪项描述的是发布证券研究报告遵循的独立性原则？（）","c":{"A":"证券期货经营机构制作证券研究报告应当坚持客观原则，避免使用夸大、低俗、诱导性、煽动性的标题或者用语，不得对证券估值、投资评级作出任何形式的保证","B":"证券期货经营机构应当公平对待证券研究报告的发布对象，不得将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象","C":"证券期货经营机构应当采取有效措施，保证制作发布证券研究报告不受利益相关者的干涉和影响","D":"证券期货经营机构制作证券研究报告应当采用严谨的研究方法和分析逻辑，基于合理的数据基础和事实依据，审慎提出研究结论"},"a":"C","an":"选项C正确：独立性原则：经营机构应当采取有效措施，保证制作发布证券研究报告不受利益相关者的干涉和影响。 选项A错误：客观原则：经营机构制作证券研究报告应当坚持客观原则，避免使用夸大、低俗、诱导性、煽动性的标题或者用语，不得对证券估值、投资评级作出任何形式的保证。 选项B错误：公平原则：经营机构应当公平对待证券研究报告的发布对象，不得将证券研究报告的内容或者观点，优先提供给公司内部部门、人员或者特定对象。 选项D错误：审慎原则：经营机构制作证券研究报告应当采用严谨的研究方法和分析逻辑，重点围绕宏观经济形势、资本市场走势、行业发展、上市公司投资价值等进行深入分析，基于合理的数据基础和事实依据，审慎提出研究结论。","type":"single"},{"id":"cy_fin_2337","q":"根据《发布证券研究报告暂行规定》，证券公司、证券投资咨询机构发布对具体股票做出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1%以上的，在证券研究报告的(),不得进行与证券研究报告观点相反的交易。","c":{"A":"自发布之日起5个交易日","B":"自发布之日起3个交易日","C":"发布日及第2个交易日","D":"发布日之前1个交易日"},"a":"C","an":"发布对具体股票作出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1%以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况，并且在证券研究报告发布日及第二个交易日，不得进行与证券研究报告观点相反的交易。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2339","q":"根据证券基金经营机构使用香港机构证券投资咨询服务的有关规定，下列说法错误的是（）。","c":{"A":"业务模式主要包括港股研究报告业务模式和港股投资顾问业务模式","B":"最近5年因发布证券研究报告业务违法违规行为受到行政处罚或者被采取重大行政监管措施的证券公司不可以向客户转发港股研究报告","C":"香港机构发布港股研究报告的程序符合香港证监会的规定","D":"证券公司依法就港股研究报告的内容和转发行为对客户承担责任"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：从事发布证券研究报告业务的证券公司可以向客户转发港股研究报告，但最近3年（并非5年）因发布证券研究报告业务违法违规行为受到行政处罚或者被采取重大行政监管措施的证券公司除外。因此答案选择B。 选项A正确：业务模式主要包括港股研究报告业务模式和港股投资顾问业务模式。 选项C正确：香港机构发布港股研究报告的程序符合香港证监会的规定。 选项D正确：证券公司依法就港股研究报告的内容和转发行为对客户承担责任。","type":"single"},{"id":"cy_fin_2341","q":"证券公司发布对具体股票做出明确估值和投资评级的证券研究报告时，公司持有该股票达到公司已发行股份（）以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况。","c":{"A":"0.03","B":"0.1","C":"0.01","D":"0.05"},"a":"C","an":"选项C正确：发布对具体股票做出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1％以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况，并且在证券研究报告发布日及第2个交易日，不得进行与证券研究报告观点相反的交易。","type":"single"},{"id":"cy_fin_2343","q":"以下属于证券分析师行为准则中防范利益冲突具体要求的是（）。","c":{"A":"证券分析师在执业过程中遇到自身利益与公司利益、客户利益存在冲突时，应该主动向公司报告","B":"证券分析师只能与一家经营机构签订劳动合同，不得以任何形式同时在两家或两家以上的机构执业","C":"证券分析师应当遵守所在公司的管理制度，履行岗位执业，充分尊重和维护所在公司的合法权益","D":"证券分析师离职后，应当履行与原所在公司所签署的劳务合同或协议的有关规定"},"a":"A,B","an":"注意审题，题目问的是证券分析师行为准则中“防范利益冲突”的具体要求，需要判断排除其他干扰项。 选项AB正确：证券分析师行为准则中【防范利益冲突】的具体要求包括：(1)证券分析师在执业过程中遇到自身利益与公司利益、客户利益存在冲突时，应当主动向公司报告；(2)证券分析师的配偶、子女、父母担任其所研究覆盖的上市公司的董事、监事、高级管理人员的，证券分析师应当按照公司的规定进行执业回避或者在证券研究报告中对上述事实进行披露；(3)证券分析师只能与一家经营机构签订劳动合同，不得以任何形式同时在2家或2家以上的机构执业；(4)证券分析师不得在公司内部或外部兼任有损其独立性与客观性的其他职务，包括担任上市公司的独立董事。 选项CD错误：属于证券分析师行为准则中【维护所在机构利益】的要求。证券分析师应当遵守所在公司的管理制度，履行岗位职责，充分尊重和维护所在公司的合法权益。证券分析师离职后，应当履行与原所在公司所签署的劳动合同或协议的有关约定，承担相应的保密、竟业限制、培训赔偿等义务。","type":"multi"},{"id":"cy_fin_2345","q":"财务顾问代表委托人向中国证监会提交申请文件后，应当配合中国证监会的审核，并承担的工作有（）。","c":{"A":"指定财务顾问主办人与中国证监会进行专业沟通，并按照中国证监会提出的反馈意见作出回复","B":"按照中国证监会的要求对涉及本次并购重组活动的特定事项进行尽职调查或者核查","C":"组织委托人及其他专业机构对中国证监会的意见进行答复","D":"申报本次担任并购重组财务顾问的收费情况"},"a":"A,B,C,D","an":"选项ABCD正确：财务顾问代表委托人向中国证监会提交申请文件后，应当配合中国证监会的审核，并承担以下工作： （1）指定财务顾问主办人与中国证监会进行专业沟通，并按照中国证监会提出的反馈意见作出回复；【A】  （2）按照中国证监会的要求对涉及本次并购重组活动的特定事项进行尽职调查或者核查；【B】  （3）组织委托人及其他专业机构对中国证监会的意见进行答复；【C】 （4）委托人未能在行政许可的期限内公告相关并购重组报告全文的，财务顾问应当督促委托人及时公开披露中国证监会提出的问题及委托人未能如期公告的原因； （5）自申报至并购重组事项完成前，对于上市公司和其他并购重组当事人发生较大变化对本次并购重组构成较大影响的情况予以高度关注，并及时向中国证监会报告； （6）申报本次担任并购重组财务顾问的收费情况；【D】 （7）中国证监会要求的其他事项。","type":"multi"},{"id":"cy_fin_2347","q":"为进一步规范股份减持行为及董事、监事和高级管理人员转让股份的行为，中国证监会修订《上市公司董事、监事和高级管理人员所持本公司股份及其变动管理规则》，并发布《上市公司股东减持股份管理暂行办法》。对市场反映的突出问题作出针对性调整完善，以下不属于其调整内容的是（  ）。","c":{"A":"完善减持规则体系","B":"严格规范小股东减持","C":"有效防范绕道减持","D":"细化违规责任条款"},"a":"B","an":"题目问的是“不属于”。 选项B错误：应为“严格规范大股东（并非小股东）减持”，因此答案选择B。 选项ACD正确：为贯彻落实《国务院关于加强监管防范风险推动资本市场高质量发展的若干意见》《关于加强上市公司监管的意见(试行)》，进一步规范股份减持行为及董事和高级管理人员转让股份的行为，中国证监会修订《上市公司董事和高级管理人员所持本公司股份及其变动管理规则》，并发布《上市公司股东减持股份管理暂行办法》。对市场反映的突出问题作出针对性调整完善：一是完善减持规则体系；二是严格规范大股东减持；三是有效防范绕道减持；四是细化违规责任条款；五是强化大股东、董事会秘书的责任。","type":"single"},{"id":"cy_fin_2349","q":"证券发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过（）。","c":{"A":"一家","B":"两家","C":"三家","D":"四家"},"a":"B","an":"选项B正确：证券（股票类）发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过【2家】。","type":"single"},{"id":"cy_fin_2351","q":"证券(股票类)发行与承销业务中，承销商应当保留推介、定价、配售等承销过程中的相关资料至少（）年并存档备查。","c":{"A":"5","B":"4","C":"3","D":"2"},"a":"C","an":"承销商应当保留推介、定价、配售等承销过程中的相关资料至少3年并存档备查，包括推介宣传材料、路演现场录音等，如实、全面反映询价、定价和配售过程。","type":"single"},{"id":"cy_fin_2353","q":"发行人可以就（）事项聘请保荐机构履行保荐职责。","c":{"A":"首次公开发行股票","B":"上市公司并购重组","C":"重大资产重组","D":"破产清算"},"a":"A","an":"选项A正确：发行人申请从事下列发行事项，依法采取承销方式的，应当聘请具有保荐业务资格的证券公司(即保荐机构)履行保荐职责： （1）首次公开发行股票； （2）向不特定合格投资者公开发行股票并在北京证券交易所上市； （3）上市公司发行新股、可转换公司债券； （4）公开发行存托凭证； （5）中国证监会认定的其他情形。 选项B错误：上市公司并购重组（如收购、资产注入等）属于重组类业务，其主要责任主体是财务顾问（需具备财务顾问业务资格），而非保荐机构。 选项C错误：重大资产重组属于上市公司资产交易行为，不涉及 “证券发行”（如新股发行、债券发行等），因此无需保荐机构。 选项D错误：破产清算属于企业法人终止程序，涉及资产清算、债务清偿等，与 “证券发行上市” 无直接关联。","type":"single"},{"id":"cy_fin_2355","q":"（）依法采取承销方式的，无需聘请具有保荐机构资格的证券公司履行保荐职责。","c":{"A":"上市公司发行可转换公司债券","B":"发行人发行企业债券","C":"上市公司发行新股","D":"发行人首次公开发行股票"},"a":"B","an":"选项B正确：发行企业债券不需要保荐。这是因为企业债券的发行由国家发改委监管，不适用证监会的保荐制度，其发行流程以承销为主，无需保荐机构参与。 选项ACD错误：发行人申请从事下列发行事项，依法采取承销方式的，应当聘请具有保荐业务资格的证券公司（即保荐机构）履行保荐职责： （1）首次公开发行股票并上市； （2）向不特定合格投资者公开发行股票并在北京证券交易所上市； （3）上市公司发行新股、可转换公司债券； （4）公开发行存托凭证； （5）中国证券监督管理委员会认定的其他情形。","type":"single"},{"id":"cy_fin_2357","q":"发生下列（）事项时，依法采取承销方式的，发行人应聘请具有保荐机构资格的证券公司履行保荐职责。","c":{"A":"首次公开发行股票并上市","B":"上市公司发行新股、可转换公司债券","C":"增资扩股","D":"配股"},"a":"A,B","an":"选项AB正确：发行人申请从事下列发行事项，依法采取承销方式的，应当聘请具有保荐业务资格的证券公司（即保荐机构）履行保荐职责： （1）首次公开发行股票并上市；A项符合 （2）向不特定合格投资者公开发行股票并在北京证券交易所上市； （3）上市公司发行新股、可转换公司债券；B项符合 （4）公开发行存托凭证； （5）中国证券监督管理委员会认定的其他情形。 选项C错误：增资扩股一般是指现有股东增加投资或引入新的股东，不一定涉及公开发行，因此不需要聘请保荐机构。 选项D错误：配股是向现有股东按比例分配新股，不属于上述法定需要聘请保荐机构的情形。","type":"multi"},{"id":"cy_fin_2359","q":"同次发行的证券，其发行保荐和上市保荐可以由不同保荐机构承担。（）","c":{"1":"对","0":"错"},"a":"0","an":"同次发行的证券，其发行保荐和上市保荐应当由同一保荐机构承担。 （原因：这是为了确保保荐机构在整个发行和上市过程中能够保持连续性和一致性，从而更有效地履行保荐职责，保护投资者的利益。）","type":"judge"},{"id":"cy_fin_2361","q":"在股票质押式回购业务中，证券公司作为融出方的，单一证券公司接受单只A股股票质押的数量不得超过该股票A股股本的（）。","c":{"A":"0.2","B":"0.3","C":"0.4","D":"0.5"},"a":"B","an":"选项B正确：证券公司作为融出方的，单一证券公司接受单只A股股票质押的数量不得超过该股票A股股本的【30%】。  【知识拓展】 证券公司作为融出方的，单一证券公司接受单只 A股股票质押的数量不得超过该股票 A股股本的30%。 集合资产管理计划或定向资产管理客户作为融出方的，单一集合资产管理计划或定向资产管理客户接受单只 A股股票质押的数量不得超过该股票A 股股本的15%。 因履约保障比例达到或低于约定数值，补充质押导致超过上述比例或超过上述比例后继续补充质押的情况除外。单只 A股股票市场整体质押比例不得超过50%。","type":"single"},{"id":"cy_fin_2363","q":"A证券公司客户李先生前来申请开立信用业务账户，他表示自己从事证券交易已经有3个月时间，并且愿意按照要求提供相关资料，同时他最近20个交易日日均证券类资产达到60万元，也没有重大违约记录，但他持有A证券公司8%的流通股份。以下关于A证券公司能否为李先生开立信用业务账户的说法，正确的是（  ）。","c":{"A":"可以，因为李先生交易时间、资产和资料提供都符合要求","B":"可以，因为李先生不是A证券公司关联人","C":"不可以，因为李先生是本公司股东","D":"不可以，因为李先生缺乏风险承担能力"},"a":"C","an":"证券公司不得为客户开立信用业务账户的情形 (1)未按照要求提供有关情况； (2)从事证券交易时间不足半年；缺乏风险承担能力； (3)最近20个交易日日均证券类资产低于50万元或者有重大违约记录的客户； (4)本公司的股东(不包括仅持有上市证券公司5%以下流通股份的股东)、关联人。 李先生持有A证券公司8%的流通股份，是股东，因此不得开立账户。故本题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2365","q":"可充抵保证金的证券，在计算保证金金额时应当以证券市值或净值按规定折算率进行折算。其中上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过（），其他A股股票折算率最高不超过（）。","c":{"A":"80％；75％","B":"75％；70％","C":"70％；65％","D":"65％；60％"},"a":"C","an":"选项C正确：可充抵保证金的证券，在计算保证金金额时应当以证券市值或净值按一定的折算率进行折算，其中上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过70%，其他A股股票折算率最高不超过65%。  【知识拓展】可充抵保证金的证券的折算率 ①上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过70%，其他A股股票折算率最高不超过65%; ②交易型开放式指数基金折算率最高不超过90%; ③证券公司现金管理产品、货币市场基金、国债折算率最高不超过95%; ④被实施风险警示、进入退市整理期的证券，静态市盈率在300倍以上或者为负数的 A股股票，以及权证的折算率为0%; ⑤其他上市证券投资基金和债券折算率最高不超过80%。","type":"single"},{"id":"cy_fin_2367","q":"充抵融资融券保证金的有价证券，在计算保证金金额时，应当以证券市值按一定折算率进行折算，其中国债折算率最高不超过（）。","c":{"A":"0.75","B":"0.65","C":"0.95","D":"0.85"},"a":"C","an":"选项C正确：可充抵保证金的有价证券，在计算保证金金额时，应当以证券市值或净值按一定折算率进行折算，其中，国债折算率最高不超过95%。  【知识拓展】可充抵保证金的证券的折算率 ①上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过70%，其他A股股票折算率最高不超过65%; ②交易型开放式指数基金折算率最高不超过90%; ③证券公司现金管理产品、货币市场基金、国债折算率最高不超过95%; ④被实施风险警示、进入退市整理期的证券，静态市盈率在300倍以上或者为负数的 A股股票，以及权证的折算率为0%; ⑤其他上市证券投资基金和债券折算率最高不超过80%。","type":"single"},{"id":"cy_fin_2369","q":"下列关于融资融券的标的证券，说法错误的有（）。","c":{"A":"标的证券暂停交易后恢复交易日在融资融券债务到期日之后的，融资融券的期限不可以顺延","B":"标的股票交易被实施风险警示的，交易所自该股票被实施风险警示日后一天将其调整出标的证券范围","C":"标的证券进入终止上市程序的，交易所自发行人作出相关公告当日起将其调整出标的证券范围","D":"证券被调整出标的证券范围的，在调整实施前未了结的融资融券合同无效"},"a":"A,B,D","an":"题目问的是“说法错误的”。 选项A错误：标的证券暂停交易后恢复交易日在融资融券债务到期日之后的，融资融券的期限【可以顺延】。 选项B错误：标的股票交易被实施风险警示的，交易所自该股票被实施风险警示当日（并非后一天）将其调整出标的证券范围。 选项D错误：证券被调整出标的证券范围的，在调整实施前未了结的融资融券合同仍然有效（并非无效）。 选项C正确：标的证券进入终止上市程序的，交易所自发行人作出相关公告当日起将其调整出标的证券范围。 因此答案选择ABD。","type":"multi"},{"id":"cy_fin_2371","q":"证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例。当该比例低于约定的维持担保比例时，应当通知客户在约定的期限内补交担保物，客户经证券公司认可后，可以提交除可充抵保证金证券以外的（）等资产。","c":{"A":"其他证券","B":"动产","C":"不动产","D":"股权"},"a":"A,C,D","an":"选项ACD正确：证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例。当该比例低于约定的维持担保比例时，应当通知客户在约定的期限内补交担保物，客户经证券公司认可后，可以提交除可充抵保证金证券以外的其他证券、不动产、股权等资产。 选项B为干扰项","type":"multi"},{"id":"cy_fin_2373","q":"可作为融资买入或融券卖出的标的证券，一般是在交易所上市并经交易所认可的（）。","c":{"A":"股票","B":"证券投资基金","C":"债券","D":"其他证券"},"a":"A,B,C,D","an":"选项ABCD正确：在交易所上市交易的并经交易所认可的可作为融资买入或融券卖出的证券统称为标的证券，标的证券涵盖四大类证券，主要包括【股票、证券投资基金、债券、其他证券】。","type":"multi"},{"id":"cy_fin_2375","q":"下列关于证券公司选择融资融券业务客户的标准，说法不正确的有（）。","c":{"A":"从事证券交易的时间满3个月以上","B":"最近20个交易日日均证券类资产不低于10万元","C":"可以选择本公司的关联人","D":"客户信誉良好，无重大违约记录"},"a":"A,B,C","an":"题目问的是“说法错误的”。 选项A错误：客户申请开立信用业务证券账户前，应当已经开设普通证券账户且从事证券交易的时间满半年（并非3个月）以上。 选项B错误：最近20个交易日日均证券类资产不低于50万元（并非10万）。 选项C错误：要求是不属于本公司的股东(持有上市证券公司5%以下流通股份的股东除外)或关联人（并非可以选择关联人）。 选项D正确：客户信誉良好，无重大违约记录 因此答案选择ABC。  【知识拓展】证券公司应当按《证券公司融资融券业务管理办法》规定的有关条件和征信要求制定选择客户的具体标准，一般主要包括以下几个方面： （1）从事证券交易的时间 客户申请开立信用业务证券账户前，应当已经开设普通证券账户且从事证券交易的时间满半年以上。 （2）账户状态 客户开户手续齐全、资料完备，资金账户与证券账户对应关系清晰，交易结算状态正常。 （3）信誉状况 要求客户信誉良好，无重大违约记录。 （4）资产状况 最近20个交易日日均证券类资产不低于50万元，具有符合要求的担保品及较强的还款能力。 （5）投资风格 具有较强的风险承受能力，符合适当性相关规定。 （6）关联关系 不属于本公司的股东(持有上市证券公司5%以下流通股份的股东除外)或关联人。","type":"multi"},{"id":"cy_fin_2377","q":"融资融券标的证券为股票的，应当符合的条件有（）。","c":{"A":"在交易所上市交易超过2个月的","B":"股东人数不少于4000人","C":"股票发行公司已完成股权分置改革","D":"股票交易未被交易所实施风险警示"},"a":"B,C,D","an":"选项A错误：当标的证券是股票时，要求股票在交易所上市交易要超过3个月（并非2个月）。 选项BCD正确：标的证券为股票的，应当符合下列条件： ①在交易所上市交易超过3个月。但科创板与实施注册制的创业板股票上市首日即可成为标的证券。 ②融资买入标的股票的流通股本不少于1亿股或流通市值不低于5亿元，融券卖出标的股票的流通股本不少于2亿股或流通市值不低于8亿元。 ③股东人数不少于4 000人。 ④在最近3个月内没有出现下列情形之一：日均换手率低于基准指数日均换手率的15%，且日均成交金额小于5 000万元；日均涨跌幅平均值与基准指数涨跌幅平均值的偏离值超过4%；波动幅度达到基准指数波动幅度的5倍以上。 ⑤股票发行公司已完成股权分置改革。 ⑥股票交易未被交易所实施风险警示。 ⑦交易所规定的其他条件。","type":"multi"},{"id":"cy_fin_2379","q":"《股票质押回购交易业务协议》应明确约定融入方融入资金存放于其在证券公司指定银行开立的专用账户，不得直接或间接用于（）。","c":{"A":"进行新股申购","B":"通过竞价交易或者大宗交易方式买入上市公司交易的股票","C":"投资于被列入国家相关部委发布的淘汰类产业目录","D":"实体经济生产经营"},"a":"A,B,C","an":"选项ABC正确：《业务协议》应明确约定融入方融入资金存放于其在证券公司指定银行开立的专用账户，并用于实体经济生产经营，不得直接或者间接用于下列用途：【投资于被列入国家相关部委发布的淘汰类产业目录】，或者违反国家宏观调控政策、环境保护政策的项目进行新股申购；【进行新股申购】；【通过竞价交易或者大宗交易方式买入上市交易的股票】；法律法规、中国证监会相关部门规章和规范性文件禁止的其他用途。 选项D错误：融入方融入资金存放于其在证券公司指定银行开立的专用账户，并用于实体经济生产经营。D项不属于禁止用途。","type":"multi"},{"id":"cy_fin_2381","q":"证券公司不得为客户开立信用业务账户的情形包括（）。","c":{"A":"未按照要求提供有关情况","B":"缺乏风险承担能力","C":"从事证券交易时间不足12个月","D":"本公司的股东（不包括仅持有上市证券公司5%以下流通股份的股东）、关联人"},"a":"A,B,D","an":"选项C错误：应为“从事证券交易时间不足半年（并非12个月）”。 选项ABD正确：证券公司不得为客户开立信用业务账户的情形有： （1）未按照要求提供有关情况。 （2）从事证券交易时间不足半年。  （3）缺乏风险承担能力。 （4）最近20个交易日日均证券类资产低于50万元或者有重大违约记录的客户。 （5）本公司的股东（不包括仅持有上市证券公司5%以下流通股份的股东）、关联人。","type":"multi"},{"id":"cy_fin_2383","q":"股票质押回购式证券交易的异常情况包括但不限于（）。","c":{"A":"质押标的证券、证券账户或资金账户被司法等机关冻结或强制执行","B":"质押标的证券被作出终止上市决定","C":"集合资产管理计划提前终止","D":"证券公司被暂停或终止股票质押回购交易权限"},"a":"A,B,C,D","an":"选项ABCD正确：异常情况一般包括以下情形： ①质押标的证券、证券账户或资金账户被司法等机关冻结或强制执行（A选项正确）；  ②质押标的证券被作出终止上市决定（B选项正确）；  ③集合资产管理计划提前终止（C选项正确）；  ④证券公司被暂停或终止股票质押回购交易权限（D选项正确）； ⑤证券公司进入风险处置或破产程序； ⑥交易所认定的其他情形。","type":"multi"},{"id":"cy_fin_2385","q":"证券公司客户蒋先生从事证券交易时间满半年，最近20个交易日日均证券类资产为60万元，无重大违约记录，按照要求提供了有关情况，且他仅持有G证券公司4%流通股份。G证券公司可以为其开立信用业务账户。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司不得为客户开立信用业务账户的情形 (1)未按照要求提供有关情况； (2)从事证券交易时间不足半年；缺乏风险承担能力； (3)最近20个交易日日均证券类资产低于50万元或者有重大违约记录的客户； (4)本公司的股东(不包括仅持有上市证券公司5%以下流通股份的股东)、关联人。","type":"judge"},{"id":"cy_fin_2387","q":"证券公司将自有资金投资于（），且投资规模合计不超过净资本80%的，无须取得证券自营业务资格。","c":{"A":"权证","B":"上市股票","C":"国债","D":"股票型基金"},"a":"C","an":"选项C正确：证券公司将自有资金投资于依法公开发行的【国债】、投资级公司债、货币市场基金、央行票据等中国证监会认可的风险较低、流动性较强的证券，或者委托其他证券公司或者基金管理公司进行证券投资管理，且投资规模合计不超过其净资本80%的，无须取得证券自营业务资格。 选项A错误：权证属于高风险的投资品种。 选项BD错误：上市股票和股票型基金不属于风险较低、流动性较强的范畴，因此仍需取得自营业务资格。","type":"single"},{"id":"cy_fin_2389","q":"依法可以在境内证券交易所上市交易的证券主要包括（）。","c":{"A":"股票","B":"可转换公司债券","C":"票据","D":"证券投资基金"},"a":"A,B,D","an":"选项ABD正确：依法可以在境内证券交易所上市交易的证券包括【股票、债券、权证和证券投资基金】等。 选项C错误：票据通常指的是商业汇票、银行承兑汇票等，这类金融工具主要在银行间市场进行交易，并不是在证券交易所上市交易的证券品种。","type":"multi"},{"id":"cy_fin_2391","q":"资产支持证券初始挂牌交易单位所对应的发行面值或等值份额应不少于人民币（）万元。","c":{"A":"100","B":"200","C":"300","D":"500"},"a":"A","an":"选项A正确：资产支持证券【初始挂牌交易单位】所对应的发行面值或等值份额应【不少于人民币100万元】。","type":"single"},{"id":"cy_fin_2393","q":"下列关于证券公司柜台市场发行、销售与转让私募产品的结算管理，说法有误的是（）。","c":{"A":"收付双方的结算账户都是同一证券公司第三方存管账户的，证券公司可以根据结算需要在收付双方资金账户之间进行资金划转","B":"收付双方的结算账户均不是第三方存管账户的，开展结算业务的机构可以通过报价系统或者中国证监会认可的其他机构为收付双方办理资金结算业务","C":"付款方或者收款方的结算账户是证券公司第三方存管账户、对方结算账户不是该证券公司第三方存管账户的，证券公司应当将柜台市场客户资金专用存款账户作为过渡账户，进行客户交易结算资金专用存款账户与对方结算账户资金划付","D":"证券公司与其第三方存管客户发生交易的，证券公司应当将柜台市场客户资金专用存款账户作为过渡账户，进行客户交易结算资金专用存款账户与对方结算账户资金划付"},"a":"D","an":"题目问的是”说法有误的“。 选项D错误：证券公司与其第三方存管客户发生交易的，应当通过参与柜台市场的自有资金专用存款账户与柜台市场客户资金专用存款账户进行资金结算（D选项：将柜台市场客户资金专用存款账户作为过渡账户适用于“付款方或者收款方的结算账户是证券公司第三方存管账户、对方结算账户不是该证券公司第三方存管账户”的情形），相关资金划转应当符合客户交易结算资金存管的规定。因此答案选择D。 选项A正确：收付双方的结算账户都是同一证券公司第三方存管账户的，证券公司可以根据结算需要在收付双方资金账户之间进行资金划转。 选项B正确：收付双方的结算账户均不是第三方存管账户的，开展结算业务的机构可以通过报价系统或者中国证监会认可的其他机构为收付双方办理资金结算业务 选项C正确：付款方或者收款方的结算账户是证券公司第三方存管账户、对方结算账户不是该证券公司第三方存管账户的，证券公司应当将柜台市场客户资金专用存款账户作为过渡账户，进行客户交易结算资金专用存款账户与对方结算账户资金划付。","type":"single"},{"id":"cy_fin_2395","q":"股东人数未超过（）的公司申请股票公开转让并挂牌，中国证监会豁免注册，由全国股转公司作出同意公开转让并挂牌的审核决定或终止审核决定。","c":{"A":"50人","B":"100人","C":"150人","D":"200人"},"a":"D","an":"选项D正确：股东人数未超过200人的公司申请股票公开转让并挂牌，中国证监会豁免注册，由全国股转公司作出同意公开转让并挂牌的审核决定或终止审核决定。","type":"single"},{"id":"cy_fin_2397","q":"境内符合条件的股份公司均可通过主办券商申请在全国股转系统挂牌，公开转让股份，进行（）等活动。","c":{"A":"股权融资","B":"债权融资","C":"债务重组","D":"资产重组"},"a":"A,B,D","an":"选项ABD正确：境内符合条件的股份公司均可通过主办券商申请在全国股转系统挂牌，公开转让股份，进行股权融资、债权融资、资产重组等。 选项C错误：债务重组是企业与债权人之间通过协议调整债务条款（如延期、减免债务等）的财务行为，属于债权人和债务人之间的行为，全国股转系统并不直接参与或主导债务重组活动，而是为公司的资本运作和融资活动提供平台和支持。","type":"multi"},{"id":"cy_fin_2399","q":"根据相关业务规则，主办券商可在全国股份转让系统从事的业务包括（）。","c":{"A":"推荐业务","B":"经纪业务","C":"做市业务","D":"全国股转公司规定的其他业务"},"a":"A,B,C,D","an":"选项ABCD正确：主办券商可在全国股转系统从事以下部分或全部业务：【推荐业务、经纪业务、做市业务】，以及全国股转公司规定的其他业务。","type":"multi"},{"id":"cy_fin_2401","q":"证券公司在柜台市场发行、销售与转让产品可采取的方式包括但不限于（）。","c":{"A":"协议","B":"拍卖竞价","C":"标购竞价","D":"集中竞价"},"a":"A,B,C","an":"选项ABC正确，选项D错误：证券公司开展柜台市场业务发行、销售与转让的产品可采取的方式有：【协议、报价、做市、拍卖竞价、标购竞价】等，不得采用集中竞价的方式（D错误）。 （理解：集中竞价是交易所市场的典型特征，通过电脑系统对买卖申报进行撮合，形成统一的成交价（如 A 股市场的集合竞价与连续竞价）。柜台市场定位于私募市场，交易双方以协商为主，柜台市场禁止采用此类方式）","type":"multi"},{"id":"cy_fin_2403","q":"（）是指投资者事先交存足额合约标的作为将来行权结算所应交付的证券，并据此卖出相应数量的认购期权。","c":{"A":"备兑开仓","B":"保证金","C":"做市","D":"行权"},"a":"A","an":"选项A正确：【备兑开仓】是指投资者事先交存足额合约标的作为将来行权结算所应交付的证券，并据此卖出相应数量的认购期权。 选项B错误：保证金是指用于结算和保证股票期权合约履行的现金或者证券，与题目描述不符。 选项C错误：做市是指经证券交易所认可、为其上市交易的股票期权合约提供双边持续报价或者双边回应报价等服务的机构，与题目描述不符。 选项D错误：行权是指股票期权合约买方按照规定行使权利，以行权价格买入或者卖出约定标的证券，或者按照规定结算价格进行现金差价结算，与题目描述不符。","type":"single"},{"id":"cy_fin_2405","q":"根据《股票期权交易试点管理办法》，下列关于证券公司从事股票期权业务的说法错误的是（）。","c":{"A":"可以从事股票期权经纪业务","B":"可以从事与股票期权备兑开仓及行权相关的证券现货经纪业务","C":"可以从事股票期权做市业务","D":"可以从事股票期权自营业务"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：期货公司（并非证券公司）可以从事股票期权经纪业务、与股票期权备兑开仓以及行权相关的证券现货经纪业务。因此答案选择B。（股票期权备兑开仓，是指投资者事先交存足额合约标的作为将来行权结算所应交付的股票，并据此卖出相应数量的认购期权。属于期货公司经营的业务） 选项ACD正确：证券公司可以从事以下业务： 股票期权经纪业务（选项A正确） 股票期权自营业务（选项D正确） 股票期权做市业务（选项C正确）","type":"single"},{"id":"cy_fin_2407","q":"证券公司申请股票期权做市业务资格，应当向中国证监会提交的申请材料有（）。","c":{"A":"股票期权做市业务方案、内部管理制度文本","B":"负责股票期权做市业务的高级管理人员与业务人员的名册及资质证明文件","C":"股东会）或董事会关于开展股票期权做市业务的决议文件","D":"证券交易所出具的股票期权做市业务技术系统验收报告"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司申请股票期权做市业务资格，应当向中国证监会提交下列申请材料：   （1）申请书；    （2）股东会或董事会关于开展股票期权做市业务的决议文件（C项）；    （3）股票期权做市业务方案、内部管理制度文本（A项）；    （4）负责股票期权做市业务的高级管理人员与业务人员的名册及资质证明文件（B项）；    （5）证券交易所出具的股票期权做市业务技术系统验收报告（D项）；    （6）中国证监会规定的其他申请材料。","type":"multi"},{"id":"cy_fin_2409","q":"证券公司应当审慎选择代销的金融产品，充分了解金融产品的（）等内容。","c":{"A":"发行依据","B":"风险收益特征","C":"投资安排","D":"管理费用"},"a":"A,B,C,D","an":"选项ABCD正确：产品尽职调查：证券公司应当审慎选择代销的金融产品，充分了解金融产品的发行依据、基本性质、投资安排、风险收益特征、管理费用等信息。证券公司确认金融产品依法发行、有明确的投资安排和风险管控措施，风险收益特征清晰且可以对其风险状况作出合理判断的，方可代销。","type":"multi"},{"id":"cy_fin_2411","q":"某投资机构A公司通过协议转让方式，累计持有上市公司B公司已发行股份的35%。A公司未依法履行公告程序，也未向B公司所有股东发出收购要约，继续在二级市场买入B公司股票。证监会调查后认定A公司违规。根据《证券法》，监管机构可对A公司给予的行政处罚是（  ）。","c":{"A":"对A公司处以20万元罚款","B":"对A公司处以30万元罚款","C":"对A公司处以40万元罚款","D":"对A公司处以50万元罚款"},"a":"D","an":"《证券法》第一百九十六条规定，收购人未按照本法规定履行上市公司收购的公告、发出收购要约义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款（只有D符合，ABC不符合）。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_fin_2413","q":"某科技公司为融资，在未获证监会批准的情况下，通过线上平台向公众发行“股权认购凭证”，募集资金达5000万元。该公司的行为主要涉嫌构成（  ）。","c":{"A":"非法吸收公众存款罪","B":"擅自发行股票、公司、企业债券罪","C":"集资诈骗罪","D":"欺诈发行证券罪"},"a":"B","an":"选项B正确：擅自发行股票、公司、企业债券罪客观方面变现为：(1)未经国家有关部门批准，擅自发行股票或者公司、企业债券。包括未经批准，不具有发行资格而擅自发行股票或者公司、企业债券，和具有合法发行资格但违反《证券法》等法律法规的规定发行股票或公司、企业债券；(2)数额巨大，后果严重或者有其他严重情节。 选项A错误：本案核心是发行“股权凭证”，属于发行证券行为。 选项C错误：集资诈骗罪，是指以非法占有为目的，使用诈骗方法非法集资的行为。 选项D错误：欺诈发行的前提是已获批准但虚假披露，与“未经批准”不符。","type":"single"},{"id":"cy_fin_2415","q":"某上市公司A计划申请公开发行新股，经查该公司三年前IPO募集的资金，在实际使用中部分改变了招股说明书所列的资金用途，且该变更未经公司股东会决议认可。中国证监会在审核其新股发行申请时，对此情况应当（  ）","c":{"A":"要求A公司立即纠正变更行为，纠正后即可核准其发行新股","B":"要求A公司就该变更事项补充提交股东会决议，决议通过后可核准其发行新股","C":"因A公司存在擅自改变募集资金用途且未经股东会认可的情形，不得核准其公开发行新股","D":"对A公司处以罚款，但不应影响其本次新股发行申请"},"a":"C","an":"公司对公开发行股票所募集资金，必须按照招股说明书或者其他公开发行募集文件所列资金用途使用；改变资金用途，必须经股东会作出决议。擅自改变用途未作纠正的，或者未经股东会认可的，不得公开发行新股。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2417","q":"为获取某大型国企A公司IPO的承销资格，甲证券公司向A公司承诺，上市后将利用自身资管产品维持其股价。该行为属于（  ）","c":{"A":"合法的商业推广","B":"违反承销业务规定的行为","C":"正常的投资者关系管理","D":"有效的营销策略"},"a":"B","an":"证券公司承销证券，不得有下列行为： (1)进行虚假的或者误导投资者的广告宣传或者其他宣传推介活动； (2)以不正当竞争手段招揽承销业务； (3)其他违反证券承销业务规定的行为。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2419","q":"在甲公司申请首次公开发行股票的保荐业务中，其保荐机构乙证券公司的工作人员王某，明知甲公司部分财务数据不实，仍在其出具的发行保荐书中予以确认，最终使甲公司成功发行上市，融资额巨大，情节特别严重。王某的行为，依法可处（  ）","c":{"A":"5年以下有期徒刑或者拘役，并处罚金","B":"3年以下有期徒刑或者拘役，并处或者单处罚金","C":"5年以上10年以下有期徒刑，并处罚金","D":"10年以上有期徒刑，并处罚金"},"a":"C","an":"根据《刑法》第二百二十九条规定，承担资产评估、验资、验证、会计、审计、法律服务、保荐、安全评价、环境影响评价、环境监测等职责的中介组织的人员故意提供虚假证明文件，情节严重的，处5年以下有期徒刑或者拘役，并处罚金；有下列情形之一的，处5年以上10年以下有期徒刑，并处罚金： (1)提供与证券发行相关的虚假的资产评估、会计、审计、法律服务、保荐等证明文件，情节特别严重的； (2)提供与重大资产交易相关的虚假的资产评估、会计、审计等证明文件，情节特别严重的； (3)在涉及公共安全的重大工程、项目中提供虚假的安全评价、环境影响评价等证明文件，致使公共财产、国家和人民利益遭受特别重大损失的。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2421","q":"一家公司发行股票、债券进行筹资，下列哪些行为构成欺诈发行证券罪？（）","c":{"A":"行为人在招股说明书、认股书、公司、企业债券募集办法中隐瞒重要事实或编造重大虚假内容，但尚未发行股票和公司、企业债券","B":"行为人因过失制作了虚假招股说明书、认股书、公司、企业债券募集办法，且已经发行股票和公司、企业债券","C":"行为人制作了虚假的招股说明书、认股书、公司、企业债券募集办法发行股票或者公司、企业债券，并达到数量巨大、后果严重或者有其他严重情节","D":"行为人制作并向社会发行了虚假招股说明书、认股书、公司、企业债券募集办法"},"a":"C","an":"选项C正确：行为人制作虚假的招股说明书、认股书、公司、企业债券募集办法等发行文件发行证券的行为，必须达到一定的严重程度，即达到数额巨大、后果严重或者有其他严重情节的，构成欺诈发行证券罪。 选项A错误：仅仅制作了虚假文件而没有实际发行证券不构成欺诈发行证券罪。 选项B错误：欺诈发行证券罪在主观方面必须是故意，即行为人明知其制作的文件是虚假的仍然为之。因此，因过失制作虚假文件的行为不符合本罪的主观方面要求。 选项D错误：没有明确指出是否达到了“数额巨大、后果严重或者有其他严重情节”的标准，因此不符合犯罪构成要件。  【知识拓展】欺诈发行证券罪的犯罪构成： （1）主观方面 本罪在主观上只能由故意构成，过失不构成本罪。即行为人明知自己所制作的招股说明书、认股书、债券募集办法等发行文件不是对本公司状况或本次证券发行状况的真实、准确、完整反映，仍然积极为之。因而在本罪中行为人的罪过实质是欺诈发行证券。 （2）客观方面 ①行为人必须实施在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容的行为。 ②行为人必须实施了发行证券的行为。如果行为人仅是制作了虚假的招股说明书、认股书、公司、企业债券募集办法等发行文件，而未实施发行证券的行为，不构成本罪。必须是既制作了虚假的上述文件，且已经发行证券的才构成本罪。 ③行为人制作虚假的招股说明书、认股书、公司、企业债券募集办法等发行文件发行证券的行为，必须达到一定的严重程度，即达到数额巨大、后果严重或者有其他严重情节的，才构成犯罪。","type":"single"},{"id":"cy_fin_2423","q":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第六条的规定，依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌未按照规定披露的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续（）个月的累计数额占净资产（）以上的，应予立案追诉。","c":{"A":"12；40％","B":"6：40％","C":"12；50％","D":"6：50％"},"a":"C","an":"选项C正确：根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第六条规定，依法负有信息披露义务的公司、企业向股东和社会公众提供虚假的或者隐瞒重要事实的财务会计报告，或者对依法应当披露的其他重要信息不按照规定披露，涉嫌未按照规定披露的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续【12个月】的累计数额占净资产【50％】以上的，应予立案追诉。","type":"single"},{"id":"cy_fin_2425","q":"（）直接授意、指挥从事信息披露违法行为，或者隐瞒应当披露信息、不告知应当披露信息的，应当认定其指使从事信息披露违法行为。","c":{"A":"控股股东","B":"实际控制人","C":"控股股东、实际控制人","D":"以上都不是"},"a":"C","an":"选项C正确：《信息披露违法行为行政责任认定规则》第十八条规定，【控股股东、实际控制人】直接授意、指挥从事信息披露违法行为，或者隐瞒应当披露信息、不告知应当披露信息的，应当认定控股股东、实际控制人指使从事信息披露违法行为。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_2427","q":"变相公开发行证券的行为特征不包括（）。","c":{"A":"非公开发行股票及其股权转让，采用广告、公告、广播、电话等公开方式或变相公开方式向社会公众发行","B":"向不特定对象发行证券","C":"公司股东自行或委托他人以公开方式向社会公众转让股票","D":"向特定对象转让股票，未经中国证监会注册，转让后公司股东累计超过200人"},"a":"B","an":"注意：这道题考察比较细致，题目问的是“变相公开发行”，意味着不是公开发行，但其行为特征已经符合公开发行。 题目问的是“不包括”。 选项B错误： “向不特定对象发行证券” 实际上是公开发行证券的一种情形，而不是变相公开发行证券的行为特征。因此答案选择B。 选项ACD正确：变相公开发行证券包括但不限于以下几种情形： （1）非公开发行股票及其股权转让，采用广告、公告、广播、电话、传真、信函、推介会、说明会、网络、短信、公开劝诱等公开方式或变相公开方式向社会公众发行。 （2）公司股东自行或委托他人以公开方式向社会公众转让股票。 （3）向特定对象转让股票，未经中国证监会注册，转让后公司股东累计超过200人。","type":"single"},{"id":"cy_fin_2429","q":"下列关于公开发行证券的说法中，错误的是（）。","c":{"A":"申请文件置备于指定场所供公众查阅","B":"改变招股说明书所列资金用途，必须经股东会做出决议","C":"股票依法发行后，发行人经营与收益的变化，由发行人自行负责","D":"公开发行公司债券筹集的资金不可以用于弥补亏损和生产性支出"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误：公开发行公司债券筹集的资金，不得用于弥补亏损和非生产性支出（并非禁止用于生产性支出）。因此答案选择D。 选项A正确：证券发行申请经注册后，发行人应当依照法律、行政法规的规定，在证券公开发行前公告公开发行募集文件，并将该文件置备于指定场所供公众查阅。 选项B正确：公司对公开发行股票所募集资金，必须按照招股说明书或者其他公开发行募集文件所列资金用途使用；改变资金用途，必须经股东会作出决议。 选项C正确：股票依法发行后，由于市场风险等原因造成的经营与收益的变化，由发行人自行负责。","type":"single"},{"id":"cy_fin_2431","q":"欺诈发行证券罪应予立案追诉的标准包括（）。","c":{"A":"非法募集资金金额在500万元以上的","B":"虚增或者虚减利润达到当期利润总额30%以上的","C":"为欺诈发行证券而伪造、变造国家机关公文、有效证明文件或者相关凭证、单据的","D":"虚增或者虚减资产达到当期资产总额30%以上的"},"a":"B,C,D","an":"选项A错误：应为“非法募集资金金额在1000万元（并非500万）以上”。 选项BCD正确：根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定（二）》第五条规定，在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，涉嫌下列情形之一的，应予立案追诉： （1）非法募集资金金额在1000万元以上的； （2）虚增或者虚减资产达到当期资产总额30%以上的（D项）； （3）虚增或者虚减营业收入达到当期营业收入总额30%以上的； （4）虚增或者虚减利润达到当期利润总额30%以上的（B项）； （5）隐瞒或者编造的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额达到最近一期披露的净资产50%以上的； （6）造成投资者直接经济损失数额累计在100万元以上的； （7）为欺诈发行证券而伪造、变造国家机关公文、有效证明文件或者相关凭证、单据的（C项）； （8）为欺诈发行证券向负有金融监督管理职责的单位或者人员行贿的； （9）募集的资金全部或者主要用于违法犯罪活动的； （10）其他后果严重或者有其他严重情节的情形。","type":"multi"},{"id":"cy_fin_2433","q":"《刑法》规定，未经国家有关主管部门批准，擅自公开或变相公开发行证券，数额巨大、后果严重的，可予以的处罚有（）。","c":{"A":"处5年以下有期徒刑或者拘役，并处或者单处非法募集资金金额1％以上5％以下罚金","B":"退还所募资金并加算银行同期存款利息，处以非法所募资金金额1％以上5％以下罚款","C":"单位犯该罪的，对单位处以罚金，并对其直接负责的主管人员和其他直接责任人员，处5年以下有期徒刑或者拘役","D":"对直接负责的主管人员和其他责任人员给予警告，并处以3万元以上30万元以下的罚款"},"a":"A,C","an":"选项AC正确：根据《刑法》第一百七十九条规定，未经国家有关主管部门批准，擅自发行股票或者公司、企业债券，数额巨大、后果严重或者有其他严重情节的，处5年以下有期徒刑或者拘役，并处或者单处非法募集资金金额1％以上5％以下罚金。单位犯该罪的，对单位处以罚金，并对其直接负责的主管人员和其他直接责任人员，【处5年以下有期徒刑或者拘役】。 选项B错误：是《证券法》中规定的行政责任，不是《刑法》中的刑事责任。 选项D错误：干扰项。","type":"multi"},{"id":"cy_fin_2435","q":"下列选项中，属于《刑法》中关于证券犯罪的规定有（）。","c":{"A":"欺诈发行股票、债券罪","B":"内幕交易、泄露内幕信息罪","C":"操纵证券市场罪","D":"提供虚假财务会计报告罪"},"a":"A,B,C,D","an":"选项ABCD正确：《刑法》及修正案关于证券犯罪主要有： （1）欺诈发行股票、债券罪（A项）；  （2）提供虚假财务会计报告罪（D项）； （3）非法发行股票和公司、企业债券罪； （4）内幕交易、泄露内幕信息罪（B项）； （5）编造并传播影响证券交易虚假信息罪、诱骗他人买卖证券罪； （6）操纵证券市场罪（C项）。","type":"multi"},{"id":"cy_fin_2437","q":"一家公司发行股票、债券进行筹资，下列不构成欺诈发行证券罪的行为有（  ）。","c":{"A":"行为人在招股说明书、认股书、公司、企业债券募集办法中隐瞒重要事实或编造重大虚假内容，但尚未发行股票和公司、企业债券","B":"行为人因过失制作了虚假招股说明书、认股书、公司、企业债券募集办法，且已经发行股票和公司、企业债券","C":"行为人制作了虚假的招股说明书、认股书、公司债券募集办法发行股票或者公司、企业债券，并达到数额巨大、后果严重或者有其他严重情节","D":"行为人制作并向社会发行了虚假招股说明书、认股书，以及公司、企业债券募集办法，情节轻微"},"a":"A,B,D","an":"本题考查欺诈发行证券罪的犯罪构成。 欺诈发行证券罪的犯罪构成的主观方面表现为：本罪主观上只能是故意构成，过失不构成本罪（B不构成）。 客观方面表现为： (1)行为人必须实施在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容的行为 (2)行为人必须实施了发行证券的行为（A不构成）。如果行为人仅是制作了虚假的招股说明书、认股书、公司、企业债券募集办法等发行文件，而未实施发行证券的行为，不构成本罪。必须是既制作了虚假的上述文件，且已经发行证券的才构成本罪 (3)行为人制作虚假的招股说明书、认股书、公司、企业债券募集办法等发行文件发行证券的行为，必须达到一定的严重程度，即达到“数额巨大、后果严重或者有其他严重情节的”，才构成犯罪。（D不构成，C三项条件同时符合，构成） 综上，该题选ABD。","type":"multi"},{"id":"cy_fin_2439","q":"某公司董事长因工作疏忽，未发现财务报告中存在重大错报，导致招股说明书数据严重失实。该董事长的行为构成欺诈发行证券罪。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"欺诈发行证券罪的主观方面只能由故意构成，过失不构成本罪。即行为人明知自己所制作的招股说明书、认股书、债券募集办法等发行文件不是对本公司状况或本次证券发行状况的真实、准确、完整反映，仍然积极为之。","type":"judge"},{"id":"cy_fin_2441","q":"为欺诈发行证券而伪造国家机关所出具的公文批示，若存在此行为，应予立案追诉。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第五条规定，在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，涉嫌下列情形之一的，应予立案追诉： (1)非法募集资金金额在1000万元以上的； (2)虚增或者虚减资产达到当期资产总额30%以上的； (3)虚增或者虚减营业收入达到当期营业收入总额30%以上的； (4)虚增或者虚减利润达到当期利润总额30%以上的； (5)隐瞒或者编造的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额达到最近一期披露的净资产50%以上的； (6)造成投资者直接经济损失数额累计在100万元以上的； (7)为欺诈发行证券而伪造、变造国家机关公文、有效证明文件或者相关凭证、单据的； (8)为欺诈发行证券向负有金融监督管理职责的单位或者人员行贿的； (9)募集的资金全部或者主要用于违法犯罪活动的； (10)其他后果严重或者有其他严重情节的情形。","type":"judge"},{"id":"cy_fin_2443","q":"某证券公司营业部负责人李某，为争取一位潜在高净值客户王某，邀请其全家前往海南进行为期一周的高尔夫度假旅行，所有费用由李某所在营业部承担。王某尚未成为该证券公司客户。李某的行为（  ）","c":{"A":"属于正当的客户开发活动","B":"构成向潜在客户输送不正当利益","C":"符合依法合理营销的规定","D":"仅为增进私人友谊的个人行为"},"a":"B","an":"证券经营机构及其工作人员在开展证券业务及相关活动中，不得以下列方式(即《廉洁规定》第九条规定的方式)向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益： (1)提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利； (2)提供旅游、宴请、娱乐健身、工作安排等利益；（符合题目情形） (3)安排显著偏离公允价格的结构化、高收益、保本理财产品等交易； (4)直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动； (5)其他输送不正当利益的情形。 证券经营机构及其工作人员按照证券经营机构依法制定的内部规定及限定标准，依法合理营销的，不适用前款规定。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2445","q":"证券经营机构及其工作人员在开展证券业务及相关活动中，不得以（）方式向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益。","c":{"A":"提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利","B":"提供旅游、宴请、娱乐健身、工作安排等利益","C":"安排显著偏离公允价格的结构化、高收益、保本理财产品等交易","D":"直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动"},"a":"A,B,C,D","an":"选项ABCD正确：证券经营机构及其工作人员在开展证券业务及相关活动中，不得以下列方式向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益： 1.提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利；  2.提供旅游、宴请、娱乐健身、工作安排等利益；  3.安排显著偏离公允价格的结构化、高收益、保本理财产品等交易；  4.直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动； 5.其他输送不正当利益的情形。","type":"multi"},{"id":"cy_fin_2447","q":"证券经营机构及其工作人员在开展投资银行类业务过程中的禁止性行为有（）。","c":{"A":"以非公允价格或者不正当方式为自身或者利益关系人获取拟上市公司股权","B":"以非公允价格为利益关系人配售债券或者约定回购债券","C":"泄露证券发行询价和定价信息，操纵证券发行价格","D":"在证券发行与承销过程中暗箱操作，以代持、信托等方式输送或者谋取不正当利益"},"a":"A,B,C,D","an":"选项ABCD正确：投资银行类业务禁止性行为： 1.以非公允价格或者不正当方式为自身或者利益关系人获取拟上市公司股权（A项）。 2.以非公允价格或者不正当方式为自身或者利益关系人获取拟并购重组上市公司股权或者标的资产股权。 3.以非公允价格为利益关系人配售债券或者约定回购债券（B项）。  4.泄露证券发行询价和定价信息，操纵证券发行价格（C项）。 5.直接或者间接通过聘请第三方机构或者个人的方式输送利益。 6.在证券发行与承销过程中暗箱操作，以代持、信托等方式输送或者谋取不正当利益（D项）。 7.以与监管人员或者其他相关人员熟悉，或者以承诺价格、利率、获得批复及获得批复时间等为手段招揽项目、商定服务费。 8.违规收受发行人或者其利益关系人不正当利益，帮助发行人欺诈上市或者发行证券。 9.以不正当方式教唆、指使、协助他人干预影响审核，在项目申报、审核、注册过程中通过利益输送、行贿等方式“围猎”审核、监管人员，利用中国证监会系统在职人员或者离职人员及其近亲属等关系或者身份谋取不正当利益。 10.其他输送或者谋取不正当利益的行为。","type":"multi"},{"id":"cy_fin_2449","q":"某证券公司营业部为吸引客户，推出“交易佣金全额返还前三个月”的促销活动，所有新开户客户均可享受。这属于《廉洁规定》所禁止的“佣金返还”式不正当利益输送。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"题干描述的是面向不特定“所有新开户客户”的公开促销活动，属于正常商业营销策略。 证券经营机构及其工作人员在开展证券业务及相关活动中，不得以下列方式(即《廉洁规定》第九条规定的方式)向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益： (1)提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利； (2)提供旅游、宴请、娱乐健身、工作安排等利益； (3)安排显著偏离公允价格的结构化、高收益、保本理财产品等交易； (4)直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动； (5)其他输送不正当利益的情形。 证券经营机构及其工作人员按照证券经营机构依法制定的内部规定及限定标准，依法合理营销的，不适用前款规定。","type":"judge"},{"id":"cy_fin_2451","q":"发行人在持续督导期间首次公开发行股票并上市之日起（）个月内控股股东或者实际控制人发生变更，中国证监会可以根据情节轻重，对保荐机构及其相关责任人员采取出具警示函、责令改正、监管谈话、对保荐代表人依法认定为不适当人选、暂停保荐机构的保荐业务等监管措施。","c":{"A":"6","B":"12","C":"24","D":"36"},"a":"B","an":"选项B正确：发行人在持续督导期间出现下列情形之一的，中国证监会可以根据情节轻重，对保荐机构及其相关责任人员采取出具警示函、责令改正、监管谈话、对保荐代表人依法认定为不适当人选、暂停保荐机构的保荐业务等监管措施： （1）首次公开发行股票并在主板上市和主板上市公司向不特定对象公开发行证券并上市当年营业利润比上年下滑50%以上； （2）首次公开发行股票并上市、股票向不特定合格投资者公开发行并在北交所上市和上市公司向不特定对象公开发行证券并上市当年即亏损且选取的上市标准含净利润标准； （3）首次公开发行股票并上市和股票向不特定合格投资者公开发行并在北交所上市之日起【12个月】内控股股东或者实际控制人发生变更（B选项正确）； （4）证券上市当年累计50%以上募集资金的用途与承诺不符； （5）首次公开发行股票并上市和股票向不特定合格投资者公开发行并在北交所上市之日起12个月内累计50%以上资产或者主营业务发生重组； （6）上市公司向不特定对象公开发行证券并上市之日起12个月内累计50%以上资产或者主营业务发生重组，且未在证券发行募集文件中披露； （7）实际盈利低于盈利预测达20%以上； （8）关联交易显失公允或者程序违规，涉及金额较大； （9）控股股东、实际控制人或其他关联方违规占用发行人资源，涉及金额较大； （10）违规为他人提供担保，涉及金额较大； （11）违规购买或出售资产、借款、委托资产管理等，涉及金额较大； （12）董事、监事、高级管理人员侵占发行人利益受到行政处罚或者被追究刑事责任； （13）违反上市公司规范运作和信息披露等有关法律法规，情节严重的； （14）中国证监会规定的其他情形。","type":"single"},{"id":"cy_fin_2453","q":"发行人在持续督导期间首次公开发行股票并上市之日起12个月内累计（）以上资产或者主营业务发生重组，中国证监会可以根据情节轻重，对保荐机构及其相关责任人员采取出具警示函、责令改正、监管谈话、对保荐代表人依法认定为不适当人选、暂停保荐机构的保荐业务等监管措施。","c":{"A":"0.2","B":"0.3","C":"0.5","D":"0.8"},"a":"C","an":"选项C正确：发行人在持续督导期间出现下列情形之一的，中国证监会可以根据情节轻重，对保荐机构及其相关责任人员采取出具警示函、责令改正、监管谈话、对保荐代表人依法认定为不适当人选、暂停保荐机构的保荐业务等监管措施： （1）首次公开发行股票并在主板上市和主板上市公司向不特定对象公开发行证券并上市当年营业利润比上年下滑50%以上； （2）首次公开发行股票并上市、股票向不特定合格投资者公开发行并在北交所上市和上市公司向不特定对象公开发行证券并上市当年即亏损且选取的上市标准含净利润标准； （3）首次公开发行股票并上市和股票向不特定合格投资者公开发行并在北交所上市之日起12个月内控股股东或者实际控制人发生变更； （4）证券上市当年累计50%以上募集资金的用途与承诺不符； （5）首次公开发行股票并上市和股票向不特定合格投资者公开发行并在北交所上市之日起12个月内累计50%以上资产或者主营业务发生重组； （6）上市公司向不特定对象公开发行证券并上市之日起12个月内累计50%以上资产或者主营业务发生重组，且未在证券发行募集文件中披露（故C选项正确）； （7）实际盈利低于盈利预测达20%以上； （8）关联交易显失公允或者程序违规，涉及金额较大； （9）控股股东、实际控制人或其他关联方违规占用发行人资源，涉及金额较大； （10）违规为他人提供担保，涉及金额较大； （11）违规购买或出售资产、借款、委托资产管理等，涉及金额较大； （12）董事、监事、高级管理人员侵占发行人利益受到行政处罚或者被追究刑事责任； （13）违反上市公司规范运作和信息披露等有关法律法规，情节严重的； （14）中国证监会规定的其他情形。","type":"single"},{"id":"cy_fin_2455","q":"根据《证券法》，下列关于证券的销售期限的说法，正确的有（）。 I 证券的代销、包销期限最长不得超过90日 II 证券的代销、包销期限最长不得超过180日 III 公开发行股票，代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报国务院证券监督管理机构备案 IV 证券公司在代销、包销期内，对所代销、包销的证券应当保证先行出售给认购人，证券公司不得为本公司预留所代销的证券和预先购入并留存所包销的证券","c":{"A":"III、IV","B":"I、III、IV","C":"I、III","D":"II、IV"},"a":"B","an":"I项正确、II项错误，证券的代销、包销期限最长不得超过【90日】。 III项正确，公开发行股票，代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报国务院证券监督管理机构备案。 IV项正确，证券公司在代销、包销期内，对所代销、包销的证券应当保证先行出售给认购人，证券公司不得为本公司预留所代销的证券和预先购入并留存所包销的证券。","type":"single"},{"id":"cy_fin_2457","q":"根据《证券法》，下列关于上市公司收购的说法，正确的有（）。 I 投资者可以采取要约收购、协议收购及其他合法方式收购上市公司 II 在收购要约确定的承诺期限内，收购人可以撤销其收购要约 III 上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件 IV 收购要约提出的各项收购条件，适用于被收购公司的所有股东","c":{"A":"II、III、IV","B":"I、II、III、IV","C":"I、III、IV","D":"I、II"},"a":"C","an":"II项错误，在收购要约确定的承诺期限内，收购人【不得撤销】其收购要约。","type":"single"},{"id":"cy_fin_2459","q":"根据《证券法》，下列尚未公开的信息中，属于内幕信息的有（）。 Ⅰ 公司申请破产的决定 Ⅱ 公司经营方针和经营范围发生重大变化 Ⅲ 公司的董事发生变动 Ⅳ 公司发生重大亏损","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"证券交易活动中，涉及发行人的经营、财务或者对该发行人证券的市场价格有重大影响的尚未公开的信息，为内幕信息。 《证券法》第八十条第二款所列重大事件属于【内幕信息】。具体如下： （1）公司的经营方针和经营范围的重大变化（II项正确）； （2）公司的重大投资行为，公司在一年内购买、出售重大资产超过公司资产总额百分之三十，或者公司营业用主要资产的抵押、质押、出售或者报废一次超过该资产的百分之三十； （3）公司订立重要合同、提供重大担保或者从事关联交易，可能对公司的资产、负债、权益和经营成果产生重要影响； （4）公司发生重大债务和未能清偿到期重大债务的违约情况;  （5）公司发生重大亏损或者重大损失（IV项正确）； （6）公司生产经营的外部条件发生的重大变化； （7）公司的董事、三分之一以上监事或者经理发生变动，董事长或者经理无法履行职责（III项正确）； （8）持有公司自分之五以上股份的股东或者实际控制人持有股份或者控制公司的情况发生较大变化，公司的实际控制人及其控制的其他企业从事与公司相同或者相似业务的情况发生较大变化； （9）公司分配股利、增资的计划，公司股权结构的重要变化，公司减资、合并、分立、解散及申请破产的决定，或者依法进入破产程序、被责令关闭（I项正确）； （10）涉及公司的重大诉讼、仲裁，股东大会、董事会决议被依法撤销或者宣告无效； （11）公司涉嫌犯罪被依法立案调查，公司的控股股东、实际控制人、董事、监事、高级管理人员涉嫌犯罪被依法采取强制措施； （12）国务院证券监督管理机构规定的其他事项。","type":"single"},{"id":"cy_fin_2461","q":"根据《证券法》，下列关于上市公司信息披露的说法，错误的是（）。","c":{"A":"上市公司应在每一会计年度结束之日起二个月内，报送并公告年度报告","B":"发行人及其控股股东、实际控制人、董事、监事、高级管理人员等作出公开承诺的，应当披露","C":"证券同时在境内境外公开发行、交易的，其信息披露义务人在境外披露的信息，应当在境内同时披露","D":"董事、监事和高级管理人员无法保证证券发行文件和定期报告内容的真实性、准确性、完整性或者有异议的，应当在书面确认意见中发表意见并陈述理由，发行人应当披露"},"a":"A","an":"上市公司、公司债券上市交易的公司、股票在国务院批准的其他全国性证券交易场所交易的公司，应当按照国务院证券监督管理机构和证券交易场所规定的内容和格式编制定期报告，并按照以下规定报送和公告： 1、在每一会计年度结束之日起四个月内，报送并公告年度报告，其中的年度财务会计报告应当经符合《证券法》 规定的会计师事务所审计； 2、在每一会计年度的上半年结束之日起2个月内，报送并公告【中期报告】（A项错误）。","type":"single"},{"id":"cy_fin_2463","q":"根据《证券法》，下列投资者的做法错误的是（）。","c":{"A":"乙某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例每增加或者减少百分之五，乙某按照规定报告并通知该上市公司予以公告","B":"丁某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例又增加百分之五，丁某按照规定报告并公告，在公告后三日内再行买入该上市公司股票","C":"丙某持有某上市公司已发行的有表决权股份达到百分之五后，其所持该上市公司已发行的有表决权股份比例每增加或者减少百分之一，丙某在该事实发生的次日通知该上市公司并公告","D":"甲某通过证券交易所交易某上市公司股票。在持股比例达到该上市公司已发行的有表决权股份达到百分之五时，甲某按照规定报告并通知该上市公司予以公告"},"a":"B","an":"选项B错误，选项A正确：投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%后，其所持该上市公司已发行的有表决权股份比例每增加或者减少5%，应当向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告（A）。在该事实发生之日起至公告后3日内，不得再行买卖该上市公司的股票（B错误）。 选项C正确：投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%后，其所持该上市公司已发行的有表决权股份比例每增加或者减少1%，应当在该事实发生的次日通知该上市公司，并予公告。 选项D正确：通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%时，应当在该事实发生之日起3日内，向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。在上述期限内不得再行买卖该上市公司的股票，但国务院证券监督管理机构规定的情形除外。","type":"single"},{"id":"cy_fin_2465","q":"证券的发行、交易活动，必须遵循的原则是 （  ）。","c":{"A":"公开、平等、公正","B":"公开、公平、平等","C":"开放、公平、公正","D":"公平、公开、公正"},"a":"D","an":"证券的发行、交易活动，必须遵循公开、公平、公正“三公”原则。","type":"single"},{"id":"cy_fin_2467","q":"根据《证券法》，下列关于上市公司收购方式的说法，错误的是（  ）。","c":{"A":"收购要约约定的收购期限不得少于30日，并不得超过60日","B":"上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件","C":"在收购要约确定的承诺期限内，收购人不得变更其收购要约","D":"采取协议收购方式的，协议双方可以临时委托证券登记结算机构保管协议转让的股票，并将资金存放于指定的银行"},"a":"C","an":"选项C错误：在收购要约确定的承诺期限内，收购人不得撤销其收购要约。收购人需要变更收购要约的，应当及时公告，载明具体变更事项（并非禁止变更）。 选项A正确：收购要约约定的收购期限不得少于30日，并不得超过60日。 选项B正确：收购要约提出的各项收购条件，适用于被收购公司的所有股东。上市公司发行不同种类股份的，收购人可以针对不同种类股份提出不同的收购条件。 选项D正确：采取协议收购方式的，协议双方可以临时委托证券登记结算机构保管协议转让的股票，并将资金存放于指定的银行。 综上，该题选C。","type":"single"},{"id":"cy_fin_2469","q":"根据《证券法》，下列关于法律、行政法规规定禁止参与股票交易的人员违反规定的法律责任，正确的有（）。 Ⅰ 直接持有、买卖股票，责令依法处理非法持有的股票，没收违法所得，并处以买卖股票等值以上的罚款 Ⅱ 化名持有、买卖股票，责令依法处理非法持有的股票，没收违法所得，并处以买卖股票等值以上的罚款 Ⅲ 借他人名义持有，买卖股票，责令依法处理非法持有的股票，没收违法所得，并处以买卖股票等值以下的罚款 Ⅳ 属于国家工作人员的，应当依法给予处分","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"C","an":"Ⅰ、Ⅱ项错误，根据《证券法》第一百八十七条的规定，法律、行政法规规定禁止参与股票交易的人员，违反《证券法》第四十条的规定，直接或者以化名、借他人名义持有、买卖股票的或者其他具有股权性质的证券的，责令依法处理非法持有的股票、其他具有股权性质的证券，没收违法所得，并处以买卖证券等值【以下】的罚款；属于国家工作人员的，还应当依法给予处分。 Ⅲ、Ⅳ说法正确。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2471","q":"下列关于《证券法》适用范围的说法。正确的有（）。 I 存托凭证的发行和交易适用《证券法》 II 资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定 III 证券衍生品种发行、交易的管理办法，由国务院依照《证券法》的原则规定 IV 在境外的证券发行和交易活动，扰乱境内市场秩序，损害境内投资者合法权益的，依照《证券法》有关规定处理并追究法律责任","c":{"A":"I、II、III","B":"I、III、IV","C":"I、II、IV","D":"II、IV"},"a":"C","an":"《证券法》的适用范围包括以下四类： 一是在中华人民共和国内股票、公司债券、存托凭证和国务院认定的其他证券的发行和交易；（I项正确） 二是政府债券、证券投资基金份额的上市交易； 三是资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定；（II项正确） 四是在中华人民共和国境外的证券发行和交易活动，扰乱中华人民国境内市场秩序，损害境内投资者合法权的依照《证券法》有关规定并追究法律责任。（IV项正确） III项错误，应由《期货和衍生品法》规定。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2473","q":"根据《证券法》，下列关于证券的销售期限，说法正确的有（）。","c":{"A":"证券的代销、包销期限最长不得超过180日","B":"公开发行股票，代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报国务院证券监督管理机构备案","C":"证券的代销、包销期限最长不得超过90日","D":"证券公司在代销、包销期内，对所代销、包销的证券应当保证先行出售给认购人，证券公司不得为本公司预留所代销的证券和预先购入并留存所包销的证券"},"a":"B,C,D","an":"选项B正确：公开发行股票，代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报国务院证券监督管理机构备案。 选项C正确，选项A错误：证券的代销、包销期限最长不得超过90日。 选项D正确：证券公司在代销、包销期内，对所代销、包销的证券应当保证先行出售给认购人，证券公司不得为本公司预留所代销的证券和预先购入并留存所包销的证券。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_fin_2475","q":"中华人民共和国境内股票、公司债券、存托凭证和国务院认定的其他证券的发行和交易，政府债券、证券投资基金份额的上市交易应当适用《证券法》有关规定。（）","c":{"1":"对","0":"错"},"a":"1","an":"《证券法》的适用范围包括以下四类： 一是在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易； 二是政府债券、证券投资基金份额的上市交易； 三是资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定； 四是在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照《证券法》有关规定处理并追究法律责任。","type":"judge"},{"id":"cy_fin_2477","q":"证券市场当事人具有不平等地位，在自愿、有偿、诚实信用的原则下进行交易活动。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券发行、交易活动的当事人具有平等（并非不平等）的法律地位，应当遵守自愿、有偿、诚实信用的原则。","type":"judge"},{"id":"cy_fin_2479","q":"根据期货衍生品法，期货交易实行保证金制度，以有价证券作为保证金。可以依法通过质押等具有履约保障功能的方式进行。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"期货交易实行保证金制度，期货结算机构向结算参与人收取保证金，结算参与人向交易者收取保证金。保证金用于结算和履约保障。 保证金的形式包括现金，国债、股票、基金份额、标准仓单等流动性强的有价证券，以及国务院期货监督管理机构规定的其他财产。以有价证券等作为保证金的，可以依法通过质押等具有履约保障功能的方式进行。","type":"judge"},{"id":"cy_fin_2481","q":"相关并购重组活动完成后，凡不属于上市公司管理层事前无法获知且事后无法控制的原因，上市公司或者购买资产实现的利润未达到盈利预测报告金额50%的，中国证监会可以同时对财务顾问及其财务顾问主办人采取的监管措施包括（）。","c":{"A":"罚款","B":"监管谈话","C":"出具警示函","D":"责令定期报告"},"a":"B,C,D","an":"选项BCD正确：利润实现数未达到盈利预测50%的，中国证监会可以同时对财务顾问及其财务顾问主办人采取监管谈话、出具警示函、责令定期报告等监管措施。 选项A错误：罚款主要适用于更严重的违法违规行为（如虚假记载、信息披露违规等），而题目描述的情形是利润未达标，属于监管警示范畴，不涉及直接罚款。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_fin_2483","q":"根据《证券发行上市保荐业务管理办法》，证券发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过（）家。","c":{"A":"2","B":"3","C":"4","D":"5"},"a":"A","an":"选项A正确：证券发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过2家。","type":"single"},{"id":"cy_fin_2485","q":"证券发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过（）家。","c":{"A":"3","B":"2","C":"1","D":"4"},"a":"B","an":"选项B正确：证券发行规模达到一定数量的，可以采用联合保荐，但参与联合保荐的保荐机构不得超过2家。","type":"single"},{"id":"cy_fin_2487","q":"证券公司（）合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。 Ⅰ 自营证券账户 Ⅱ 融券专用证券账户 Ⅲ 转融通担保证券明细账户 Ⅳ 客户普通证券账户","c":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅱ、Ⅲ","D":"Ⅰ、Ⅳ"},"a":"B","an":"Ⅰ、Ⅱ、Ⅲ正确：证券公司通过其自营证券账户、融券专用证券账户和转融通担保证券明细账户合计持有一家上市公司股票及其权益的数量或者其增减变动达到规定的比例时，应当依法履行信息报告、披露或者要约收购义务。 Ⅳ错误：客户普通证券账户属于客户自有资产，证券公司不因客户账户中的证券变动承担报告或披露义务。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2489","q":"证券公司开展股票质押式回购业务，资金融出方可以是证券公司，也可以是证券公司管理的公开募集或非公开募集集合资产管理计划、单一资产管理计划。（）","c":{"1":"对","0":"错"},"a":"0","an":"资金融出方一般为证券公司、证券公司管理的集合资产管理计划或单一资产管理计划客户、证券公司资产管理子公司管理的集合资产管理计划或单一资产管理计划客户。 证券公司及其资产管理子公司管理的公开募集集合资产管理计划不得作为融出方参与股票质押回购。","type":"judge"},{"id":"cy_fin_2491","q":"下列关于股票期权交易的说法，正确的有（）。 I 做市商是指经证券交易所认可、为其上市交易的股票期权合约提供双边持续报价或者双边回应报价等服务的机构 II 股票期权结算参与人，是指具有证券登记结算机构股票期权结算业务结算参与人资格的机构 III 认沽期权是指买方有权在将来特定时间以特定价格买入约定数量合约标的的期权合约 IV 认购期权是指买方有权在将来特定时间以特定价格卖出约定数量合约标的的期权合约","c":{"A":"III、IV","B":"I、II","C":"II、III、IV","D":"I、II、III、IV"},"a":"B","an":"III项错误，【认沽期权】（又称“看跌期权”），是指买方有权在将来特定时间以特定价格【卖出】约定数量合约标的的期权合约。 IV项错误，【认购期权】（又称“看涨期权”），是指买方有权在将来特定时间以特定价格【买入】约定数量合约标的的期权合约。 I、II说法正确。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2493","q":"操纵证券、期货市场罪的客观方面包括在自己实际控制的账户之间进行大量证券交易，造成股票价格上升后卖出获利。（）","c":{"1":"对","0":"错"},"a":"1","an":"操纵证券、期货市场罪的客观方面表现为利用其资金、信息等优势或者滥用职权操纵市场、制造市场假象，影响证券、期货交易价格或者证券、期货交易量，情节严重的行为。","type":"judge"},{"id":"cy_fin_2495","q":"《证券法》适用于在中华人民共和国境内的股票、公司债券、存托凭证、证券投资基金和国务院依法认定的其他证券的发行和交易。（）","c":{"1":"对","0":"错"},"a":"0","an":"《证券法》的适用范围包括以下四类： 一是在中华人民共和国境内，股票、公司债券、存托凭证和国务院依法认定的其他证券的发行和交易（不包括证券投资基金，基金的发行适用《证券投资基金法》）； 二是政府债券、证券投资基金份额的上市交易； 三是资产支持证券、资产管理产品发行、交易的管理办法，由国务院依照《证券法》的原则规定； 四是在中华人民共和国境外的证券发行和交易活动，扰乱中华人民共和国境内市场秩序，损害境内投资者合法权益的，依照《证券法》有关规定处理并追究法律责任。","type":"judge"},{"id":"cy_fin_2497","q":"保荐代表人在（）个自然年度内被采取《证券发行上市保荐业务管理办法》第六十五条规定的监管措施累计（）次以上，中国证监会可以依法对相关保荐代表人采取认定为不适当人选6个月的监管措施。","c":{"A":"1；2","B":"2；2","C":"1；3","D":"2；3"},"a":"B","an":"保荐代表人在2个自然年度内被采取《证券发行上市保荐业务管理办法》第六十五条规定的监管措施累计2次以上，中国证监会可以依法对相关保荐代表人采取认定为不适当人选6个月的监管措施。","type":"single"},{"id":"cy_fin_2499","q":"根据《发布证券研究报告执业规范》中关于静默期安排的相关规定，担任上市公司股票增发、配股、发行可转换公司债券等再融资项目的保荐机构、主承销商或者财务顾问，自确定并公告公开发行价格之日起（）日内，不得发布与该上市公司有关的证券研究报告。","c":{"A":"10","B":"20","C":"5","D":"25"},"a":"A","an":"担任上市公司股票增发、配股、发行可转换公司债券等再融资项目的保荐机构、主承销商或者财务顾问，自确定并公告公开发行价格之日起【10日】内，不得发布与该上市公司有关的证券研究报告。","type":"single"},{"id":"cy_fin_2501","q":"证券服务机构应当对所依据的文件资料内容的(  )进行核查和验证。","c":{"A":"真实性","B":"准确性","C":"完整性","D":"公开性"},"a":"A,B,C","an":"选项ABC正确：证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具审计报告及其他鉴证报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。 选项D为干扰项，并非所有的信息都能公开。","type":"multi"},{"id":"cy_fin_2503","q":"证券公司应当按《证券公司融资融券业务管理办法》规定的有关条件和征信要求制定选择客户的具体标准，一般包括（）。","c":{"A":"账户状态","B":"信誉状况","C":"关联关系","D":"从事证券交易的时间"},"a":"A,B,C,D","an":"证券公司应当按《证券公司融资融券业务管理办法》规定的有关条件和征信要求制定选择客户的具体标准，一般主要包括以下几个方面： （1）从事证券交易的时间（D正确） 客户申请开立信用业务证券账户前，应当已经开设普通证券账户且从事证券交易的时间满半年以上。 （2）账户状态（A正确） 客户开户手续齐全、资料完备，资金账户与证券账户对应关系清晰，交易结算状态正常。 （3）信誉状况（B正确） 要求客户信誉良好，无重大违约记录。 （4）资产状况 最近20个交易日日均证券类资产不低于50万元，具有符合要求的担保品及较强的还款能力。 （5）投资风格 具有较强的风险承受能力，符合适当性相关规定。 （6）关联关系（C正确） 不属于本公司的股东（持有上市证券公司5%以下流通股份的股东除外）或关联人。","type":"multi"},{"id":"cy_fin_2505","q":"股票质押式回购业务是符合条件的资金融入方以所持有的股票或其他证券质押，向符合条件的资金融出方融入资金，并约定在未来返还资金、解除质押的交易。（）","c":{"1":"对","0":"错"},"a":"1","an":"股票质押式回购业务是符合条件的资金融入方以所持有的股票或其他证券质押，向符合条件的资金融出方融入资金，并约定在未来返还资金、解除质押的交易。","type":"judge"},{"id":"cy_fin_2507","q":"证券投资顾问不得通过网络作出买卖具体股票的投资建议。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问不得从事下列活动： （1）以任何方式向客户承诺或者保证投资收益；  （2）对服务能力和过往业绩进行虚假、不实、误导性的营销宣传；  （3）向他人泄露客户的投资决策计划信息； （4）以个人名义向客户收取证券投资顾问服务费用；  （5）通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。","type":"judge"},{"id":"cy_fin_2509","q":"考虑到科创企业具有投入大、迭代快等特点，在总结现有股票交易涨跌幅制度实施中的利弊得失基础上，将科创板股票的涨跌幅限制放宽至（）。为尽快形成合理价格，新股上市后的前（）个交易日不设涨跌幅限制。","c":{"A":"20%；5","B":"10%；5","C":"10%；10","D":"20%；10"},"a":"A","an":"考虑到科创企业具有投入大、迭代快等特点，在总结现有股票交易涨跌幅制度实施中的利弊得失基础上，将科创板股票的涨跌幅限制放宽至20%。为尽快形成合理价格，新股上市后的前5个交易日不设涨跌幅限制。","type":"single"},{"id":"cy_fin_2511","q":"证券公司可以为客户依法持有或管理的在其柜台市场发行、销售、转让的私募产品提供的服务包括（）。","c":{"A":"清算交割","B":"过户及权利变更登记","C":"估值核算","D":"出具资产证明"},"a":"A,C","an":"选项AC正确：证券公司可以接受委托，为客户依法持有或者管理的在其柜台市场发行、销售与转让的私募产品提供保管、清算交割、估值核算、投资监督、风险监控、出具托管报告等服务。 选项B错误：过户及权利变更登记一般是证券登记机构。 选项D错误：出具资产证明一般是银行。","type":"multi"},{"id":"cy_fin_2513","q":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金，除现金外，保证金可以证券充抵。对于可充抵保证金的证券，在计算保证金金额时应当以证券市值或净值进行折算。下列关于折算率说法正确的是（）。","c":{"A":"上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过70%","B":"证券公司现金管理产品、货币市场基金、国债折算率最高不超过80%","C":"交易型开放式指数基金折算率最高不超过90%","D":"被实施风险警示、进入退市整理期的证券，静态市盈率在300倍以上或者为负数的A股股票，以及权证的折算率为0%"},"a":"A,C,D","an":"可充抵保证金的证券，在计算保证金金额时应当以证券市值或净值按下列折算率进行折算: ①上证180指数成分股股票及深证100指数成分股股票的折算率最高不超过70%（A正确） ，其他A股股票折算率最高不超过65% ; ②交易型开放式指数基金折算率最高不超过90% ;（C正确） ③证券公司现金管理产品、货币市场基金、国债折算率最高不超过95% ;（B错误） ④被实施风险警示、进入退市整理期的证券，静态市盈率在300倍以上或者为负数的A股股票，以及权证的折算率为0%;（D正确） ⑤其他上市证券投资基金和债券折算率最高不超过80%。","type":"multi"},{"id":"cy_fin_2515","q":"证券公司承销证券，应当对公开发行募集文件的真实性、准确性、完整性进行核查。发现有虚假记载、误导性陈述或者重大遗漏的，不得进行销售活动；已经销售的，必须立即停止销售活动，并采取纠正措施。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司承销证券，应当对公开发行募集文件的真实性、准确性、完整性进行核查。发现有虚假记载、误导性陈述或者重大遗漏的，不得进行销售活动；已经销售的，必须立即停止销售活动，并采取纠正措施。","type":"judge"},{"id":"cy_fin_2517","q":"根据《证券公司另类投资子公司管理规范》，证券公司另类投资子公司开展金融产品投资、股权投资、上市证券投资业务，与母公司自营投资品种重合的，应当明确划分业务界线，防止利益冲突。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当清晰划分证券公司与另类子公司及另类子公司与其他子公司之间的业务范围，统筹制定业务划分方案，采取切实措施，防范同业竞争、利益冲突及利益输送。","type":"judge"},{"id":"cy_fin_2519","q":"证券公司应当建立以（）为核心的股票质押回购和约定购回式证券交易规模监控和调整机制。","c":{"A":"净利润","B":"总资本","C":"净资产","D":"净资本"},"a":"D","an":"证券公司应当建立以净资本为核心的股票质押回购和约定购回式证券交易规模监控和调整机制。 综上，该题选D，选项ABC为干扰项。","type":"single"},{"id":"cy_fin_2521","q":"下列人员中，可以成为持有证券公司5%以上股权的股东是（）。","c":{"A":"甲因抢劫罪被判处3年有期徒刑，现已刑罚执行完毕5年","B":"乙公司净资产占实收资本的35%","C":"丙因做生意亏本，欠别人5万元已经到期，至今不能清偿","D":"丁公司负债达到净资产的75%"},"a":"A","an":"有下列情形之一的单位或个人，不得成为持有证券公司5%以上股权的股东、实际控制人： （1）因故意犯罪被判处刑罚，刑罚执行完毕未逾3年；（5年已过禁止期，A可以） （2）净资产低于实收资本的50%（B不可以），或者或有负债达到净资产的50%；（D不可以） （3）不能清偿到期债务；（C不可以） （4）国务院证券监督管理机构认定的其他情形。","type":"single"},{"id":"cy_fin_2523","q":"上市公司并购重组项目的财务顾问主办人发生变化的，财务顾问应当在(  )个工作日内向中国证监会报告。","c":{"A":"4","B":"3","C":"5","D":"2"},"a":"C","an":"财务顾问主办人发生变化的，财务顾问应当在5个工作日内向中国证监会报告。","type":"single"},{"id":"cy_fin_2525","q":"证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例。当该比例低于约定的维持担保比例时，应当通知客户在约定的期限内补交担保物，客户经证券公司认可后，可以提交的资产有（）。","c":{"A":"证券","B":"动产","C":"不动产","D":"股权"},"a":"A,C,D","an":"选项ACD正确：证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例。当该比例低于约定的维持担保比例时，应当通知客户在约定的期限内补交担保物，客户经证券公司认可后，可以提交除可充抵保证金证券以外的其他证券、不动产、股权等资产。 选项B错误：干扰项设置，动产作为担保物存在一些问题，如估值难度大、流动性差、处置不便等。此外，动产还需要考虑折旧、损耗等因素，这增加了管理和处置的复杂性。","type":"multi"},{"id":"cy_fin_2527","q":"企业发行债务融资工具应由金融机构承销。企业可自主选择主承销商。需要组织承销团的，由企业组织承销团。（）","c":{"1":"对","0":"错"},"a":"0","an":"企业发行债务融资工具应由金融机构承销。企业可自主选择主承销商。需要组织承销团的，由【主承销商】组织承销团。","type":"judge"},{"id":"cy_fin_2529","q":"上市公司董事长、经理、董事会秘书，应当对公司临时报告信息披露的真实性、准确性、完整性、及时性、公平性承担主要责任。()","c":{"1":"对","0":"错"},"a":"1","an":"本题考查《上市公司信息披露管理办法》的相关规定。上市公司董事长、经理、董事会秘书，应当对公司临时报告信息披露的真实性、准确性、完整性、及时性、公平性承担主要责任。","type":"judge"},{"id":"cy_fin_2531","q":"2023年11月，甲公司的股票首发申请获通过。甲公司本次发行的联席保荐机构为乙证券公司、丙证券公司。随后甲公司启动新股申购，次年，甲公司登陆上海证券交易所主板。证券代销、包销期限最长不超过（）日。","c":{"A":"30","B":"60","C":"90","D":"120"},"a":"C","an":"证券的代销、包销期限最长不得超过90日。","type":"single"},{"id":"cy_fin_2533","q":"经营机构的研究部门或者研究子公司接受特定客户委托，按照协议约定就尚未覆盖的具体股票提供含有证券估值或投资评级的研究成果或者投资分析意见的，自提供之日起（）个月内不得就该股票发布证券研究报告。","c":{"A":"1","B":"3","C":"6","D":"12"},"a":"C","an":"经营机构的研究部门或者研究子公司接受特定客户委托，按照协议约定就尚未覆盖的具体股票提供含有证券估值、或投资评级的研究成果、或投资分析意见的，自提供之日起6个月内不得就该股票发布证券研究报告。","type":"single"},{"id":"cy_fin_2535","q":"假设某股份有限公司成立于2018年9月10日，发起人甲认购公司股份200万股，为公司的小股东，2022年12月15日公司向社会公开发行A股10000万股，2023年1月5日，公司股票在证券交易所上市交易。下列关于公司上市后甲在公司成立时认购的股份转让的表述，正确的是（）。","c":{"A":"2024年1月5日后方可以转让","B":"2023年9月10日后方可以转让","C":"2024年12月15日后方可以转让","D":"2023年1月5日后方可以转让"},"a":"A","an":"公司公开发行股份前已发行的股份，自公司股票在证券交易所上市交易之日起一年内不得转让。 在本题中，公司股票于 2023年1月5日上市，因此限制转让期为2023年1月5日至2024年1月5日。 综上，该题选A，选项BCD错误","type":"single"},{"id":"cy_fin_2537","q":"下列关于证券交易的说法正确的有（）。","c":{"A":"公开发行的证券，应当在依法设立的证券交易所上市交易或者在国务院批准的其他全国性证券交易场所交易","B":"证券交易内幕信息的知情人和非法获取内幕信息的人，在内幕信息公开前，不得买卖该公司的证券，或者泄露该信息，或者建议他人买卖该证券","C":"证券在证券交易所上市交易，应当采用公开的集中交易方式或者国务院证券监督管理机构批准的其他方式","D":"非依法发行的证券，可以买卖，但不能上市交易"},"a":"A,B,C","an":"选项D错误：证券交易当事人依法买卖的证券，必须是依法发行并交付的证券。非依法发行的证券，不得买卖。 选项ABC说法正确。","type":"multi"},{"id":"cy_fin_2539","q":"发行人依法采取承销方式，应当聘请具有保荐业务资格的证券公司履行保荐职责的事项包括(  )。","c":{"A":"首次公开发行股票","B":"上市公司发行新股、可转换公司债券","C":"股票在二级市场上进行转让","D":"公开发行存托凭证"},"a":"A,B,D","an":"选项ABD正确：发行人申请从事下列发行事项，依法采取承销方式的，应当聘请具有保荐业务资格的证券公司(即保荐机构)履行保荐职责： (1)首次公开发行股票； (2)向不特定合格投资者公开发行股票并在北京证券交易所上市； (3)上市公司发行新股、可转换公司债券； (4)公开发行存托凭证； (5)中国证监会认定的其他情形。 选项C错误：“股票在二级市场转让”属于交易行为而非发行行为，无需保荐机构参与。","type":"multi"},{"id":"cy_fin_2541","q":"证券经营机构向社会公众提供本机构内部使用的证券、期货信息简报、快讯、动态以及信息系统等，或者经中国证监会批准的公开发行股票的公司的承销商或者上市推荐人及其所属证券投资咨询机构在公众传播媒体上刊登其为客户撰写的投资价值分析报告的，由证监会派出机构责令改正，并可以处以（）万元罚款。","c":{"A":"2","B":"4","C":"6","D":"8"},"a":"A,B","an":"证券经营机构向社会公众提供本机构内部使用的证券、期货信息简报、快讯、动态以及信息系统等，或者经中国证监会批准的公开发行股票的公司的承销商或者上市推荐人及其所属证券投资咨询机构在公众传播媒体上刊登其为客户撰写的投资价值分析报告的，由证监会派出机构责令改正，并处以警告或者1万元以上5万元以下罚款。 本题中，只有AB选项在1-5万元范围内，综上，该题选AB，选项CD错误。","type":"multi"},{"id":"cy_fin_2543","q":"专项计划可以通过内部或者外部信用增级方式提升资产支持证券信用等级。同一专项计划发行的资产支持证券不得划分为不同种类。（）","c":{"1":"对","0":"错"},"a":"0","an":"专项计划可以通过内部或者外部信用增级方式提升资产支持证券信用等级。同一专项计划发行的资产支持证券可以划分为不同种类。","type":"judge"},{"id":"cy_fin_2545","q":"客户张某向甲证券公司某营业部提出荐股需求。首先，投资顾问王某应向客户张某提供风险揭示书与投顾服务协议，并与客户进行签署：其次，投资顾问王某以甲证券公司发布的研究报告作为投资建议依据，向客户张某提供买入8股票的投资建议，同时提示潜在的投资风险，并向客户张某明示证券研究报告的发布人与发布日期。投资顾问王某与客户张某签订的证券投资顾问服务协议，应当包括下列内容(  )。","c":{"A":"当事人的权利义务","B":"收费标准和支付方式","C":"收益分享规定","D":"争议或者纠纷解决方式"},"a":"A,B,D","an":"证券公司、证券投资咨询机构提供证券投资顾问服务，应当与客户签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： (1)当事人的权利义务；（A正确） (2)证券投资顾问服务的内容和方式； (3)证券投资顾问的职责和禁止行为； (4)收费标准和支付方式；（B正确） (5)争议或者纠纷解决方式；（D正确） (6)终止或者解除协议的条件和方式。 选项C为干扰项。","type":"multi"},{"id":"cy_fin_2547","q":"证券经营机构发布对具体股票作出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1％以上的，在证券研究报告的(  )，不得进行与证券研究报告观点相反的交易。","c":{"A":"自发布之日起5个交易日","B":"自发布之日起3个交易日","C":"发布日及第2个交易日","D":"发布日之前1个交易日"},"a":"C","an":"经营机构发布对具体股票作出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1%以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况，并且在证券研究报告发布日及第二个交易日，不得进行与证券研究报告观点相反的交易。","type":"single"},{"id":"cy_fin_2549","q":"按照《证券发行上市保荐业务管理办法》的规定，保荐代表人在2个自然年度内被采取监管措施累计2次以上，中国证监会可以依法对相关保荐代表人采取认定为不适当人选（）个月的监管措施。","c":{"A":"3","B":"6","C":"9","D":"12"},"a":"B","an":"保荐代表人在2个自然年度内被采取《证券发行上市保荐业务管理办法》规定的监管措施累计2次以上，中国证监会可以依法对相关保荐代表人采取认定为不适当人选6个月的监管措施。","type":"single"},{"id":"cy_fin_2551","q":"证券发行包括公开发行和非公开发行，公司公开发行新股需要向证监会报送的文件有（）。","c":{"A":"营业执照","B":"公司章程","C":"税务登记证","D":"发起人协议"},"a":"A,B","an":"选项AB正确：公司公开发行新股，应当报送募股申请和下列文件： （1）公司营业执照； （2）公司章程； （3）股东大会决议； （4）招股说明书或其他公开发行募集文件； （5）财务会计报告； （6）代收股款银行的名称及地址。 选项C为干扰项，教材无。 选项D错误：“发起人协议”是设立股份有限公司公开发行股票报送文件。","type":"multi"},{"id":"cy_fin_2553","q":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定（二）》，公司欺诈发行证券涉及下列哪些情形时应予立案追诉？（）","c":{"A":"利用募集的资金从事公司活动的","B":"非法募集资金金额在500万元的","C":"造成投资者直接经济损失数额累计在100万元以上的","D":"为欺诈发行证券而伪造、变造国家机关公文、有效证明文件或者相关凭证、单据的"},"a":"C,D","an":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定（二）》 第五条规定，在招股说明书、认股书、公司、企业债券募集办法等发行文件中隐瞒重要事实或者编造重大虚假内容，发行股票或者公司、企业债券、存托凭证或者国务院依法认定的其他证券，涉嫌下列情形之一的，应予立案追诉： （1）非法募集资金金额在1000万元以上（B不符合追诉标准）的； （2）虚增或者虚减资产达到当期资产总额30%以上的； （3）虚增或者虚减营业收入达到当期营业收入总额30%以上的； （4）虚增或者虚减利润达到当期利润总额30%以上的； （5）隐瞒或者编造的重大诉讼、仲裁、担保、关联交易或者其他重大事项所涉及的数额或者连续12个月的累计数额达到最近一期披露的净资产50%以上的； （6）造成投资者直接经济损失数额累计在100万元以上的；（C符合） （7）为欺诈发行证券而伪造、变造国家机关公文、有效证明文件或者相关凭证、单据的；（D符合） （8）为欺诈发行证券向负有金融监督管理职责的单位或者人员行贿的； （9）募集的资金全部或者主要用于违法犯罪活动（从事公司活动属于正常经营行为，A不符合追诉标准）的； （10）其他后果严重或者有其他严重情节的情形。","type":"multi"},{"id":"cy_fin_2555","q":"下列属于变相公开发行证券的情形有（）。","c":{"A":"采用广告、电话、传真、信函、推介会、说明会、网络、短信等方式向社会公众非公开进行股权转让","B":"公司股东委托他人以公开方式向社会公众转让股票，累计超过200人","C":"向特定对象发行证券累计不超过200人","D":"未经中国证监会核准，向特定对象转让股票，转让后公司股东累计超过200人"},"a":"A,B,D","an":"选项ABD属于：变相公开发行包括但不限于以下几种情形： （1）非公开发行股票及其股权转让，采用广告、公告、广播、电话、传真、信函、推介会、说明会、网络、短信、公开劝诱等公开方式或变相公开方式向社会公众发行； （2）公司股东自行或委托他人以公开方式向社会公众转让股票； （3）向特定对象转让股票，未经中国证监会注册，转让后公司股东累计超过200人。 选项C不属于：“向特定对象发行证券累计不超过200人”为非公开发行。","type":"multi"},{"id":"cy_fin_2557","q":"根据《关于加强对利用“荐股软件”从事证券投资咨询业务监管的暂行规定》，“荐股软件”是指具备(  )功能的软件产品、软件工具或者终端设备。","c":{"A":"预测具体证券投资品种的价格走势","B":"提供具体证券投资品种选择建议","C":"提供具体证券投资品种的买卖时机建议","D":"支持股票交易下单操作"},"a":"A,B,C","an":"选项ABC正确：《关于加强对利用“荐股软件”从事证券投资咨询业务监管的暂行规定》所称“荐股软件”，是指具备下列一项或多项证券投资咨询服务功能的软件产品、软件工具或者终端设备：(1)提供涉及具体证券投资品种的投资分析意见，或者预测具体证券投资品种的价格走势。(2)提供具体证券投资品种选择建议。(3)提供具体证券投资品种的买卖时机建议。(4)提供其他证券投资分析、预测或者建议。 选项D错误：「支持股票交易下单操作「属于交易执行功能，荐股软件只是提供投资建议，不一定能下单。","type":"multi"},{"id":"cy_fin_2559","q":"全国股转公司针对各市场层级分别揭示证券交易行情、展示信息披露文件，为各市场层级挂牌公司提供差异化服务。（）","c":{"1":"对","0":"错"},"a":"1","an":"全国股转公司针对各市场层级分别揭示证券交易行情、展示信息披露文件，为各市场层级挂牌公司提供差异化服务。","type":"judge"},{"id":"cy_fin_2561","q":"由股票和债券构成的收入型证券组合追求（   ）最大化。","c":{"A":"股息收入","B":"资本利得","C":"资本收益","D":"债息收入"},"a":"A,D","an":"收入型证券组合的特点是追求基本收益(即利息、股息收益)的最大化，由股票和债券构成的收入型证券组合的基本收益包括股息收入和债息收入。","type":"multi"},{"id":"cy_fin_2563","q":"对于退休人员，证券投资顾问可以建议客户购买的金融产品有（   ）。","c":{"A":"股票","B":"长期债券","C":"短期国债","D":"货币市场基金"},"a":"B,C,D","an":"股票属于高风险高收益产品。","type":"multi"},{"id":"cy_fin_2565","q":"影响证券市场供给的制度因素主要有（   ）。","c":{"A":"发行上市制度","B":"市场设立制度","C":"上市公司质量","D":"股权流通制度"},"a":"A,B,D","an":"影响证券市场供给的制度因素主要有发行上市制度 、市场设立制度度和股权流通制度三大因素。 C项，上市公司质量不属于制度因素。","type":"multi"},{"id":"cy_fin_2567","q":"财政政策对证券市场的影响有（   ）。","c":{"A":"减少税收，降低税率，扩大减免税范围会推动证券市场价格上涨","B":"扩大财政支出，加大财政赤字会推动证券市场价格上涨","C":"减少国债发行（   ）会推动证券市场上扬","D":"增加财政补贴会推动证券市场总体水平趋于上涨"},"a":"A,B,C,D","an":"实施积极财政政策对证券市场的影响如下： （1）减少税收，降低税率，扩大减免税范围，会推动证券市场价格上涨。  （2）扩大财政支出，加大财政赤字，会推动证券市场价格上涨。  （3） 减少国债发行（或回购部分短期国债）会推动证券市场上扬。  （4）增加财政补贴会推动证券市场总体水平趋于上涨。  综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_2569","q":"证券相对估值法是通过对上市公司历史及当前的基本面的分析和对未来反映公司经营状况的财务数据的预测，获得上市公司证券的绝对内在价值。","c":{"1":"对","0":"错"},"a":"0","an":"证券绝对估值法是通过对上市公司历史及当前的基本面的分析和对未来反映公司经营状况的财务数据的预测，获得上市公司证券的绝对内在价值。","type":"judge"},{"id":"cy_fin_2571","q":"以下（   ）为买卖证券产品时机的一般原则。","c":{"A":"明白选时不如选股","B":"抓住买进时机与卖出时机","C":"逢高买进、逢低卖出","D":"不用注意掌握先机"},"a":"B","an":"A项，明白选股不如选时；C项，逢低买进、逢高卖出；D项，注意掌握先机。 买卖证券产品时机的一般原则： (1)注意掌握先机，明白选股不如选时； (2)抓住买进时机与卖出时机，牢记挫落是获利的契机，逢低买进、逢高卖出。  考点  买卖证券产品时机的一般原则","type":"single"},{"id":"cy_fin_2573","q":"根据中国证监会对基金类别的分类标准，50%以上的基金资产投资于股票的为股票基金。","c":{"1":"对","0":"错"},"a":"0","an":"根据中国证监会对基金类别的分类标准，80%以上的基金资产投资于股票的为股票基金。","type":"judge"},{"id":"cy_fin_2575","q":"按照策略适用期限的不同，证券投资策略分为（   ）。","c":{"A":"积极型投资策略","B":"战略性投资策略","C":"战术性投资策略","D":"股票投资策略"},"a":"B,C","an":"证券投资策略按照不同的标准有不同的分类： ①根据投资决策的灵活性不同，可以将投资组合管理策略分为积极型投资策略（选项A错误）、消极性投资策略和半积极型投资策略。 ②按照策略适用期限的不同，一般将投资组合策略分为战略性投资策略（选项B正确）和战术性投资策略（选项C正确）。 ③根据投资品种的不同，可以将投资组合管理策略分为股票投资策略（选项D错误）、债券投资策略、另类投资策略等。 综上所述，本题应选择BC选项。","type":"multi"},{"id":"cy_fin_2577","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据包括(  )。  Ⅰ.证券研究报告  Ⅱ.新闻报道  Ⅲ.上市公司董事会秘书的意见  Ⅳ.基于证券研究报告、理论模型以及分析方法形成的投资分析意见","c":{"A":"Ⅰ、Ⅳ","B":"Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"A","an":"根据《证券投资顾问业务暂行规定》第16条：证券投资顾问向客户提供投资建议，应当具有合理的依据。 投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。 综上，该题选A。","type":"single"},{"id":"cy_fin_2579","q":"证券组合的目标是追求股息收益的最大化，我们可以判断这种证券组合属于（  ）类型。","c":{"A":"收入型","B":"货币市场型","C":"指数型","D":"增长型"},"a":"A","an":"A正确：收入型证券组合追求基本收益（即利息、股息收益）的最大化。能够带来基本收益的证券有附息债券、优先股及一些避税债券。 B错误：货币市场型证券投资组合是由各种货币市场工具构成的投资组合，如国债 、高信用等级的商业票据等，安全性很强。 C错误：指数型证券投资组合的目标是模拟特定的市场指数表现。 D错误：增长型证券投资组合以资本升值(即未来价格上升带来的价差收益)为目标。","type":"single"},{"id":"cy_fin_2581","q":"一般而言，追求股票市场平均收益水平的证券投资者会选择（  ） Ⅰ股票指数基金 Ⅱ收入型证券组合 Ⅲ平衡型证券组合 Ⅳ指数化证券组合","c":{"A":"Ⅱ  Ⅳ","B":"Ⅰ  Ⅲ","C":"Ⅱ Ⅲ","D":"Ⅰ  Ⅳ"},"a":"D","an":"Ⅱ错误：收入型证券组合追求基本收益（即利息、股息收益）的最大化。 Ⅲ错误：平衡型证券组合试图在基本收入与资本增长之间达到某种均衡，一般会寻找风险适中、收益适中的产品，以获得社会平均水平的收益，同时承受社会平均风险。 综上，该题选D。","type":"single"},{"id":"cy_fin_2583","q":"如果某一证券组合的目标是追求股息利益最大化，我们可以判断这种证券组合属于增长型。","c":{"1":"对","0":"错"},"a":"0","an":"收入型证券组合追求基本收益（即利息、股息收益）的最大化。 增长型证券投资组合以资本升值(即未来价格上升带来的价差收益)为目标，投资者往往愿意通过延迟获得基本收益来获得未来收益的增长，这类投资者很少会购买分红较高的收入型证券，整体来说增长型证券投资组合的风险较高。","type":"judge"},{"id":"cy_fin_2585","q":"罗尔与罗斯利用套利定价模型对美国股票市场上市股票的影响因素进行了实证分析。实证结果发现，影响证券收益的宏观经济变量(因素)有（   ）。  Ⅰ工业产值指数  Ⅱ未预期的通货膨胀率  Ⅲ投机级债券与高等级债券收益率差额  Ⅳ长期政府债券与短期政府债券收益率差额","c":{"A":"Ⅰ、Ⅱ","B":"Ⅲ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"罗尔与罗斯利用套利定价模型对美国股票市场上市股票的影响因素进行了实证分析，使用的数据是纽约 股票交易所上市股票的日收益率数据，样本区间从 1962 年 7 月 5 日到 1972 年 12 月 31 日。 实证结果发现， 下述四个宏观经济变量影响证券收益：工业产值指数、未预期的通货膨胀率、投机级债券与高等级债券收益率差额、长期政府债券与短期政府债券收益率差额。","type":"single"},{"id":"cy_fin_2587","q":"套利定价理论（APT），由罗斯于20世纪70年代中期建立，是描述资产合理定价但又有别于CAPM的均衡模型。罗尔与罗斯利用套利定价模型对美国股票市场上市股票的影响因素进行了实证分析，使用的数据是纽约股票交易所上市股票的日收益率数据，样本区间从1962年7月5日到1972年12月31日。实证结果发现，下述四个宏观经济变量影响证券收益：未预期的工业产值指数、未预期的通货膨胀率、投机级债券与高等级债券收益率差额、长期政府债券与短期政府债券收益率差额。;假设通过回归分析得知某个证券A对上述四个因素的灵敏度系数b1、b2、b3和b4依次为1.2、-0.6， 0. 4和0. 80。已知无风险利率为5% ；工业产值增速实际值为6% ， 高于预期的4% ；通货膨胀率实际值为-1%，低于预期的3% ；投机级债券与高等级债券收益率差额为3% ；长、短期政府债券收益率差额为-2% ，则预期的证券A的收益率为（）。","c":{"A":"9.1","B":"9.4","C":"9.2","D":"9.3"},"a":"B","an":"5%+1.2×2% - 0. 6×（- 4%）+ 0. 4×3%+0. 8×（- 2%）= 9. 4%","type":"single"},{"id":"cy_fin_2589","q":"下列与证券基本分析相关的说法中，错误的是（  ）。","c":{"A":"宏观经济活动是行业经济活动的总和","B":"行业分析和公司分析是相辅相成的","C":
