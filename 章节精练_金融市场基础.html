var ALL_QUESTIONS = [{"id": "cflue_zc_ch1.json_1", "q": "期限在1年以上的资金的跨国流动是国际长期资金流动。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "国际长期资金流动，是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷三种形式。", "type": "judge"}, {"id": "cflue_zc_ch1.json_2", "q": "根据市场组织方式，证券市场可以分为（）。", "c": {"A": "场外市场", "B": "发行市场", "C": "流通市场", "D": "交易所市场"}, "a": "AD", "an": "按组织方式分为交易所市场和场外交易市场。", "type": "multi"}, {"id": "cflue_zc_ch1.json_3", "q": "直接融资与间接融资的区别主要在于资金需求者与供给者是否直接形成债权债务关系。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "直接融资与间接融资的区别主要在于资金需求者与供给者【是否直接形成债权债务关系】。直接融资的特点包括直接性、分散性、融资的信誉有较大的差异性、部分融资方式具有不可逆性、融资者有相对较强的自主性。间接融资的特点包括资金获得的间接性、融资的相对集中性、融资信誉的差异性相对较小、全部具有可逆性（即可返还性）、融资的主动权主要掌握在金融机构手中。", "type": "judge"}, {"id": "cflue_zc_ch1.json_4", "q": "下列关于金融市场的说法，错误的是（）。", "c": {"A": "金融市场是政府调控经济的一个主要渠道", "B": "金融市场的发展可以促成厂商“正常存货投资”的减少", "C": "金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联", "D": "金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"}, "a": "B", "an": "金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。", "type": "single"}, {"id": "cflue_zc_ch1.json_5", "q": "股票市场融资的特点有（）。", "c": {"A": "可以退股", "B": "保证收益", "C": "可以转让", "D": "无须退还本金"}, "a": "CD", "an": "股票市场融资无须退还本金、售出的股票只能转让，不能退股，也不保证收益，但如果企业盈利，股票持有人享受企业盈余的分配权。", "type": "multi"}, {"id": "cflue_zc_ch1.json_6", "q": "金融市场的重要性主要体现在（）。", "c": {"A": "优化资源配置", "B": "宏观调控", "C": "促进储蓄-投资转化", "D": "风险管理"}, "a": "ABC", "an": "金融市场的重要性主要体现在：促进储蓄—投资转化、优化资源配置、反映经济状态和宏观调控。", "type": "multi"}, {"id": "cflue_zc_ch1.json_7", "q": "间接融资相对集中于银行或非银行金融机构，国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，一些国家还实行了存款保险制度，这反映出间接融资具有资金获得的间接性的特点。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【融资信誉的差异性相对较小】：间接融资相对集中于银行或非银行金融机构，由于国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，加上一些国家实行了存款保险制度，相对于直接融资来说，间接融资的信誉程度高，风险也相对较小，融资的稳定性较强。", "type": "judge"}, {"id": "cflue_zc_ch1.json_8", "q": "下列关于直接融资对金融市场的影响的说法，正确的有（）。", "c": {"A": "发展多种股权融资方式并不能够弥补间接融资的不足", "B": "提高直接融资比重，可以起到分散过度集中于银行的金融风险作用", "C": "直接融资占比反映了一国金融体系风险及风险分布情况", "D": "直接融资与间接融资的比例可以反映一国金融体系配置的效率是否与实体经济相匹配"}, "a": "BCD", "an": "我国正处于转变经济发展方式、调整产业结构的经济转型期，在这个过程中提高直接融资比重，特别是发展多种股权融资方式【能够】弥补间接融资的不足，也有利于提高实体经济的健康稳定发展。C错误。", "type": "multi"}, {"id": "cflue_zc_ch1.json_9", "q": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡。这是金融市场的价格发现功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡，这也被称为【价格发现】过程。", "type": "judge"}, {"id": "cflue_zc_ch1.json_10", "q": "OTC是芝加哥期权交易所的简称。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "柜台市场（OTC）又称场外交易市场、店头交易市场，指在证券交易所以外进行证券交易的广泛市场。", "type": "judge"}, {"id": "cflue_zc_ch1.json_11", "q": "下列关于直接融资与间接融资区别的说法，正确的有（）。", "c": {"A": "直接融资和间接融资在可逆性上存在一定的差异，间接融资全部具有可逆性，而直接融资则不一定", "B": "间接融资的主动权主要掌握在金融中介机构手中，而直接融资中的投资者和融资者则有相对较强的自主性", "C": "一般认为，直接融资活动从时间上要晚于间接融资活动", "D": "直接融资和间接融资的区别主要在于融资过程中资金的需求者和资金的供给者是否直接形成债权债务关系"}, "a": "ABD", "an": "一般认为，直接融资活动从时间上早于间接融资，A错误；", "type": "multi"}, {"id": "cflue_zc_ch1.json_12", "q": "根据国际货币基金组织的《金融稳健指标编制指南》，不属于全球金融体系的参与者的是（）。", "c": {"A": "中央银行", "B": "为住户服务的非营利机构，包括由政府部门控制和提供资金支持的机构", "C": "建房互助协会", "D": "租赁公司"}, "a": "B", "an": "根据国际货币基金组织的《金融稳健指标编制指南》，全球金融体系的主要参与者包括金融公司（含建房互助协会）、非金融公司、住户、为住户服务的非营利机构、广义政府、公共部门。为住户服务的非营利机构。为住户服务的非营利机构的主要活动是向住户和社会提供免费的或价格不具有经济意义的商品或服务，【不包括】由政府部门控制和提供资金支持的机构。", "type": "single"}, {"id": "cflue_zc_ch1.json_13", "q": "下列属于资本市场的有（）。", "c": {"A": "大额可转让存单市场", "B": "中长期国债市场", "C": "银行间同业拆借市场", "D": "股票市场"}, "a": "BD", "an": "资本市场包括：股票市场、中长期国债市场、中长期银行存款市场等。", "type": "multi"}, {"id": "cflue_zc_ch1.json_14", "q": "金融资产的持有者为了资金安全而进行资金调拨所形成的国际资金流动被称为（）。", "c": {"A": "国际间接投资", "B": "投机性资金流动", "C": "保值性资金流动", "D": "盈利性资金流动"}, "a": "C", "an": "套利性（盈利性）资金的流动是利用各国金融市场上利率差异与汇率差异进行套利活动而引起的短期资本流动。保值性资金的流动又称作避险性资金流动或资本外逃，它是指金融资产的持有者为了资金安全而进行资金调拨所形成的短期资金流动。投机性资金的流动是指投资者利用国际市场上金融资产或商品价格的波动，进行高抛低吸而形成的资金流动。", "type": "single"}, {"id": "cflue_zc_ch1.json_15", "q": "股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式是（）。", "c": {"A": "风险投资融资", "B": "民间借贷", "C": "债券市场融资", "D": "股票市场融资"}, "a": "D", "an": "【股票市场融资】是股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式", "type": "single"}, {"id": "cflue_zc_ch1.json_16", "q": "下列属于场外交易市场的有（）。", "c": {"A": "证券交易所", "B": "黄金市场", "C": "拆借市场", "D": "期货交易所"}, "a": "BC", "an": "银行信贷市场、拆借市场、外汇市场、黄金市场等市场传统上比较松散，通常没有固定的交易场所，也不一定有统一的交易时间，属于场外市场。", "type": "multi"}, {"id": "cflue_zc_ch1.json_17", "q": "下列各项中，不属于间接融资特点的是（）。", "c": {"A": "融资信誉的差异性相对较小", "B": "融资者具有相对较强的自主性", "C": "全部具有可逆性", "D": "融资的相对集中性"}, "a": "B", "an": "间接融资的特点：1、资金获得的间接性；2、融资的相对集中性；3、融资信誉的差异性相对较小；4、全部具有可逆性（即可返还性）；5、融资的主动权主要掌握在金融中介机构手中。A属于直接融资特点。", "type": "single"}, {"id": "cflue_zc_ch1.json_18", "q": "下列关于全球金融市场监管的说法，错误的有（）。", "c": {"A": "目前，中国香港的金融监管机构主要包括香港金融管理局、银行业监理处、证券及期货事务监察委员会和保险业监理处", "B": "美国国会于1986年通过的《政府债券法案》赋予财政部监管整个政府债券市场的职责", "C": "当前英国金融市场的主要监管机构包括英格兰银行、金融服务局和财政部", "D": "在美国，商品期货交易委员会负责监管期货和期权市场"}, "a": "AC", "an": "2016年5月，英国通过《2016年英格兰银行和金融服务法》，其中第3条规定英格兰银行设立审慎监管委员会（PRC）作为内设机构，承担原审慎监管局对金融机构的微观审慎监管职权。A错误；目前，中国香港的金融监管机构主要包括香港金融管理局（金管局）、证券及期货事务监察委员会（证监会）和保险业监理处（保监处），分别负责监管银行业、证券和期货业以及保险业。D错误。", "type": "multi"}, {"id": "cflue_zc_ch1.json_19", "q": "下列属于国际资金流动方式中的“国际长期资金流动”的活动有（）。", "c": {"A": "美国的A公司为从英国B公司进口商品，预付了20万英镑的货款", "B": "美国的A公司以合资形式在英国投资设立了B公司", "C": "美国的A公司将其从位于英国的控股子公司分到的年度利润再投资于这家子公司", "D": "美国的A公司购买了位于英国B公司2%的股权"}, "a": "BCD", "an": "国际长期资金流动是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷。D属于国际短期资金流动。", "type": "multi"}, {"id": "cflue_zc_ch1.json_20", "q": "下列属于货币市场的有（）。", "c": {"A": "商业票据市场", "B": "股票市场", "C": "大额可转让存单市场", "D": "银行间同业拆借市场"}, "a": "ACD", "an": "货币市场包括：银行间同业拆借市场、商业票据市场、短期国库券市场、大额可转让存单市场等。", "type": "multi"}, {"id": "cflue_zc_ch1.json_21", "q": "在美国银行业的监管机构中，（）作为监管机构的协调机构，负责制定统一的监管准则和报告格式。", "c": {"A": "储蓄机构监管署", "B": "联邦金融机构检查委员会", "C": "联邦储备体系", "D": "货币监理署"}, "a": "B", "an": "美国实行的是“双层多头”金融监管体制。联邦金融机构检查委员会在美国银行业的监管机构中作为监管机构的协调机构，负责制定统一的监管准则和报告格式。", "type": "single"}, {"id": "cflue_zc_ch1.json_22", "q": "资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，两者只与金融机构发生债权债务关系。这反映了间接融资的融资的相对集中性特点。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，二者只与金融机构发生债权债务关系。这反映了间接融资的资金获得的【间接性】特点&amp;nbsp;&amp;nbsp;。", "type": "judge"}, {"id": "cflue_zc_ch1.json_23", "q": "将有形资产产生的风险在资金供求双方之间重新配置，反映了金融市场的风险管理功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_ch1.json_24", "q": "金融市场通过金融资产交易实现货币资金在供给者和需求者之间的转移，促进有形资本形成，这是金融市场的资金融通功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_zc_ch1.json_25", "q": "证券市场以证券发行与交易的方式实现了筹资与并购的对接，有效地解决了资本的供需矛盾。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券市场以证券发行与交易的方式实现了【筹资与投资】的对接，有效地解决了资本的供需矛盾。", "type": "judge"}, {"id": "cflue_zc_ch1.json_26", "q": "下列各项经济活动中，属于直接融资的有（）。", "c": {"A": "D公司以支付租金的方式从H租赁公司处获得了价值300万元设备的使用权", "B": "美国政府通过发行国库券筹集了200亿美元资金", "C": "B商业银行向C商业银行出售了价值1000万元的贷款", "D": "A商业银行通过发行CDS筹集了2000万资金"}, "a": "BD", "an": "直接融资是指拥有暂时闲置资金的单位（包括企业、机构和个人）与资金短缺需要补充资金的单位，相互之间直接进行协议，或者在金融市场上前者购买后者发行的有价证券，将货币资金提供给所需要补充资金的单位使用，从而完成资金融通的过程。B属于银行贷款、C属于租赁融资均为间接融资方式。", "type": "multi"}, {"id": "cflue_zc_ch1.json_27", "q": "金融市场的参与各方是以信用为基础参与市场各种交易，其体现的是（）关系。", "c": {"A": "借贷", "B": "监管", "C": "委托代理", "D": "竞争"}, "a": "AC", "an": "金融市场上的市场参与各方是以信用为基础的【借贷】关系和【委托代理】关系，其交易对象是【货币资金】这一特殊的商品。", "type": "multi"}, {"id": "cflue_zc_ch1.json_28", "q": "下列关于全球金融市场历史的相关说法，正确的有（）。", "c": {"A": "一般认为，有形的、有组织的金融市场首先形成于17世纪的欧洲大陆", "B": "大约公元前2000年，古巴比伦乌尔城已经出现了明显的金融区，乌尔城出现的金融活动不仅包括借贷，还包括股权投资甚至风险投资", "C": "1957年签署的《罗马条约》建立了欧洲经济共同体，从最初6个成员国发展成为包括28个成员国的联盟", "D": "1790年，美国成立了第一个证券交易所—纽约证券交易所"}, "a": "ABC", "an": "1790年成立了美国第一个证券交易所——费城证券交易所。C错误。", "type": "multi"}, {"id": "cflue_zc_ch1.json_29", "q": "企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式是（）。", "c": {"A": "债券市场融资", "B": "商业信用融资", "C": "股票市场融资", "D": "风险投资融资"}, "a": "B", "an": "商业信用融资是企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式。", "type": "single"}, {"id": "cflue_zc_ch1.json_30", "q": "商业票据市场的特点有（）。", "c": {"A": "融资灵活性低", "B": "对利率的变动不灵敏", "C": "资本成本比较低", "D": "有利于提高发行公司的信誉"}, "a": "ACD", "an": "商业票据市场的特点如下：（1）发行成本较低；（2）采用信用发行的方式；（3）可以提高发行企业的信誉；（4）可以足额运用资金；（5）对利率的变动反应灵敏；（D错误）（6）一级市场发行量大但二级市场较弱。故正确答案ABC。", "type": "multi"}, {"id": "cflue_paper_金融基础_1.json_5", "q": "下列关于金融市场的说法，错误的是（）。", "c": {"A": "金融市场是政府调控经济的一个主要渠道", "B": "金融市场的发展可以促成厂商“正常存货投资”的减少", "C": "金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联", "D": "金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"}, "a": "B", "an": "金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。", "type": "single"}, {"id": "cflue_paper_金融基础_1.json_15", "q": "间接融资相对集中于银行或非银行金融机构，国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，一些国家还实行了存款保险制度，这反映出间接融资具有资金获得的间接性的特点。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【融资信誉的差异性相对较小】：间接融资相对集中于银行或非银行金融机构，由于国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，加上一些国家实行了存款保险制度，相对于直接融资来说，间接融资的信誉程度高，风险也相对较小，融资的稳定性较强。", "type": "judge"}, {"id": "cflue_paper_金融基础_1.json_19", "q": "下列关于新股网上网下申购的说法，正确的有（）。", "c": {"A": "首次公开发行股票网下投资者申购数量低于网下初始发行量的，发行人和主承销不得将网下发行部分向网上回拨，应当中止发行", "B": "网上投资者申购数量不足网上初始发行量的，不得回拨给网下投资者", "C": "首次公开发行股票采用询价方式的，公开发行股票后总股本在4亿股（含）以下的，网下初始发行比例不低于本次公开发行股票数量的60%", "D": "首次公开发行股票采用询价方式的，发行后总股本超过4亿股的，网下初始发行比例不低于本次公开发行股票数量的70%"}, "a": "ACD", "an": "网上投资者申购数量不足网上初始发行量的，可回拨给网下投资者。D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_1.json_30", "q": "证券市场以证券发行与交易的方式实现了筹资与并购的对接，有效地解决了资本的供需矛盾。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "证券市场以证券发行与交易的方式实现了【筹资与投资】的对接，有效地解决了资本的供需矛盾。", "type": "judge"}, {"id": "cflue_paper_金融基础_1.json_44", "q": "关于证券托管和存管中账户记录的说法，错误的有（）。", "c": {"A": "对股权、债权变更引起的证券转移，均通过账面予以划转", "B": "证券登记结算机构一般以证券公司在各地的营业部为单位进行记载", "C": "由于实现了无纸化，账户记录采用电脑记账的方式", "D": "证券交易所一般以证券公司在各地的营业部为单位进行记载"}, "a": "BD", "an": "在账户记录上，实现了无纸化，证券登记结算机构一般以证券公司为单位，采用电脑记账方式记载证券公司交给的证券；证券公司也采用电脑记账的方式记载投资者的证券。对股权、债权变更引起的证券转移，通过账面予以划转。", "type": "multi"}, {"id": "cflue_paper_金融基础_1.json_51", "q": "企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式是（）。", "c": {"A": "债券市场融资", "B": "商业信用融资", "C": "股票市场融资", "D": "风险投资融资"}, "a": "B", "an": "商业信用融资是企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式。", "type": "single"}, {"id": "cflue_paper_金融基础_1.json_54", "q": "OTC是芝加哥期权交易所的简称。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "柜台市场（OTC）又称场外交易市场、店头交易市场，指在证券交易所以外进行证券交易的广泛市场。", "type": "judge"}, {"id": "cflue_paper_金融基础_1.json_58", "q": "下列关于证券登记结算制度的说法，正确的有（）。", "c": {"A": "全额结算是指交易双方对所达成的交易实行轧差清算，并对轧抵之后的证券和资金的净额进行交付", "B": "货银对付俗称“一手交钱，一手交货”，是指证券登记结算机构与结算参与人在交手过程中，当且仅当资金交付时给付证券、证券交付时给付资金", "C": "投资者开立证券账户应当向证券公司提出申请，投资者申请开立证券账户应当保证其提交的开户资料真实、准确、完整", "D": "证券登记结算公司按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算、交收，不得被强制执行"}, "a": "BD", "an": "【全额结算】是指交易双方对所达成的交易实行逐笔清算，并逐笔转移证券和资金；【净额结算】是指交易双方对所达成的交易实行轧差清算，并对轧抵之后的证券和资金的净额进行交付。B错误；投资者开立证券账户应当向【证券登记结算机构】提出申请，投资者申请开立证券账户应当保证其提交的开户资料真实、准确、完整，投资者不得将本人的证券账户提供给他人使用。D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_2.json_29", "q": "下列关于金融期权的说法，正确的有（）。", "c": {"A": "期权的购买者，无需开立保证金账户", "B": "期权的购买者，无需缴纳保证金", "C": "可作期权交易的金融工具未必可作期货交易", "D": "可作期权交易的金融工具都可作期货交易"}, "a": "ABC", "an": "一般地说，凡可作期货交易的金融工具都可作期权交易；然而，可作期权交易的金融工具却未必可作期货交易。A错误，其余正确。", "type": "multi"}, {"id": "cflue_paper_金融基础_2.json_30", "q": "下列关于我国信托业务的发展的说法，错误的是（）。", "c": {"A": "2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》", "B": "2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响", "C": "2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度", "D": "2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"}, "a": "B", "an": "2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。", "type": "single"}, {"id": "cflue_paper_金融基础_2.json_50", "q": "下列关于金融市场的说法，错误的是（）。", "c": {"A": "金融市场是政府调控经济的一个主要渠道", "B": "金融市场的发展可以促成厂商“正常存货投资”的减少", "C": "金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联", "D": "金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"}, "a": "B", "an": "金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。", "type": "single"}, {"id": "cflue_paper_金融基础_2.json_56", "q": "将有形资产产生的风险在资金供求双方之间重新配置，反映了金融市场的风险管理功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "略。", "type": "judge"}, {"id": "cflue_paper_金融基础_3.json_20", "q": "下列属于场外交易市场的有（）。", "c": {"A": "证券交易所", "B": "黄金市场", "C": "拆借市场", "D": "期货交易所"}, "a": "BC", "an": "银行信贷市场、拆借市场、外汇市场、黄金市场等市场传统上比较松散，通常没有固定的交易场所，也不一定有统一的交易时间，属于场外市场。", "type": "multi"}, {"id": "cflue_paper_金融基础_3.json_28", "q": "下列关于我国信托业务的发展的说法，错误的是（）。", "c": {"A": "2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》", "B": "2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响", "C": "2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度", "D": "2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"}, "a": "B", "an": "2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。", "type": "single"}, {"id": "cflue_paper_金融基础_3.json_36", "q": "金融市场的参与各方是以信用为基础参与市场各种交易，其体现的是（）关系。", "c": {"A": "借贷", "B": "监管", "C": "委托代理", "D": "竞争"}, "a": "AC", "an": "金融市场上的市场参与各方是以信用为基础的【借贷】关系和【委托代理】关系，其交易对象是【货币资金】这一特殊的商品。", "type": "multi"}, {"id": "cflue_paper_金融基础_3.json_46", "q": "下列关于报价的计价单位和申报价格最小变动单位的说法，错误的是（）。", "c": {"A": "股票计价单位为每股价格", "B": "A股申报价格最小变动单位为0.01元人民币", "C": "深圳证券交易所B股申报价格最小变动单位为0.01美元", "D": "基金计价单位为每份基金价格"}, "a": "C", "an": "深圳证券交易所B股申报价格最小变动单位为0.01港元。", "type": "single"}, {"id": "cflue_paper_金融基础_4.json_11", "q": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡。这是金融市场的价格发现功能。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡，这也被称为【价格发现】过程。", "type": "judge"}, {"id": "cflue_paper_金融基础_4.json_40", "q": "下列关于直接融资对金融市场的影响的说法，正确的有（）。", "c": {"A": "发展多种股权融资方式并不能够弥补间接融资的不足", "B": "提高直接融资比重，可以起到分散过度集中于银行的金融风险作用", "C": "直接融资占比反映了一国金融体系风险及风险分布情况", "D": "直接融资与间接融资的比例可以反映一国金融体系配置的效率是否与实体经济相匹配"}, "a": "BCD", "an": "我国正处于转变经济发展方式、调整产业结构的经济转型期，在这个过程中提高直接融资比重，特别是发展多种股权融资方式【能够】弥补间接融资的不足，也有利于提高实体经济的健康稳定发展。C错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_41", "q": "下列关于新股网上网下申购的说法，正确的有（）。", "c": {"A": "首次公开发行股票网下投资者申购数量低于网下初始发行量的，发行人和主承销不得将网下发行部分向网上回拨，应当中止发行", "B": "网上投资者申购数量不足网上初始发行量的，不得回拨给网下投资者", "C": "首次公开发行股票采用询价方式的，公开发行股票后总股本在4亿股（含）以下的，网下初始发行比例不低于本次公开发行股票数量的60%", "D": "首次公开发行股票采用询价方式的，发行后总股本超过4亿股的，网下初始发行比例不低于本次公开发行股票数量的70%"}, "a": "ACD", "an": "网上投资者申购数量不足网上初始发行量的，可回拨给网下投资者。D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_44", "q": "下列关于存款准备金与存款派生能力的说法，正确的有（）。", "c": {"A": "法定存款准备金越高，银行放贷能力越弱", "B": "法定存款准备金越高，存款派生能力越强", "C": "法定存款备金和超额存款准备金对银行放贷能力的影响方向一致", "D": "超额存款准备金越高，存款派生能力越强"}, "a": "AC", "an": "存款准备金制度是银行创造信用货币的基本前提条件。银行在吸收一笔现金或支票后，会留存一部分准备，再将其余部分用于贷款。对于一定数量的存款来说，准备金的比例越高，银行可用于贷款的资金就越少，存款派生的能力就越低；反之，准备金的比例越低，银行的存款派生能力就越强。所以AB错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_53", "q": "下列关于企业短期融资融券的说法，正确的有（）。", "c": {"A": "债务融资工具发行注册实行注册会议制度，由注册会议决定是否接受债务融资工具发行注册", "B": "交易商协会接受注册的企业出具《接受注册通知书》，注册有效期为2年", "C": "企业短期融资融券是指具有法人资格的非金融企业在银行间债券市场发行的，约定在1年内还本付息的债务融资工具", "D": "交易所市场交易商协会负责受理企业债务融资工具的发行注册"}, "a": "ABC", "an": "【中国银行间市场交易商协会】负责受理企业债务融资工具的发行注册。C错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_59", "q": "下列关于凭证式国债的说法，错误的是（）。", "c": {"A": "凭证式国债是一种可上市流通的储蓄型债券", "B": "商业银行可以申请加入凭证式国债承销团", "C": "发售采取开具凭证式国债收款凭证的方式", "D": "承销商发售数量不得突破所承销的国债量"}, "a": "A", "an": "凭证式国债是一种不可上市流通的储蓄型证券。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_13", "q": "下列关于证券交易所的特征的说法，错误的是（）。", "c": {"A": "证券交易所有固定的交易场所和交易时间", "B": "集中证券的供求双方，但成交速度和成交率较低", "C": "实行“公开、公平、公正”原则，并对证券交易进行严格管理。", "D": "交易的对象限于合乎一定标准的上市证券"}, "a": "B", "an": "证券交易所的特征：（1）有固定的交易场所和交易时间；（2）参加交易者为具备会员资格的证券经营机构，交易采取经纪制度，即一般投资者不能直接进入交易所买卖证券，只能委托会员作为经纪人间接进行交易；（3）交易的对象限于合乎一定标准的上市证券；（4）通过公开竞价的方式决定交易价格；（5）集中证券的供求双方，【具有较高的成交速度和成交率】；（6）实行“公开、公平、公正”原则，并对证券交易进行严格管理。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_27", "q": "下列关于我国信托业务的发展的说法，错误的是（）。", "c": {"A": "2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》", "B": "2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响", "C": "2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度", "D": "2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"}, "a": "B", "an": "2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_29", "q": "商业票据市场的特点有（）。", "c": {"A": "融资灵活性低", "B": "对利率的变动不灵敏", "C": "资本成本比较低", "D": "有利于提高发行公司的信誉"}, "a": "ACD", "an": "商业票据市场的特点如下：（1）发行成本较低；（2）采用信用发行的方式；（3）可以提高发行企业的信誉；（4）可以足额运用资金；（5）对利率的变动反应灵敏；（D错误）（6）一级市场发行量大但二级市场较弱。故正确答案ABC。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_38", "q": "下列关于债券应计利息的说法，正确的有（）。", "c": {"A": "我国交易所市场对附息债券的计息规定时全年天数统一按360天计算", "B": "计算累计利息时，针对不同类别债券，全年天数和利息累计天数的计算分别有行业惯例", "C": "我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日不计息", "D": "通常短期债券的利息累计天数分为按实际天数计算和按每月30天计算两种"}, "a": "BD", "an": "我国交易所市场对附息债券的计息规定是全年天数统一按【365天】计算，利息累计天数规则是按实际天数计算，算头不算尾、闰年2月29日不计息，C错误；我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日【也计利息】，D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_45", "q": "下列关于城市商业银行特点的说法，错误的是（）。", "c": {"A": "各项业务均衡发展", "B": "通常在特定区域从事商业银行业务", "C": "依靠地缘优势与当地经济发展水平", "D": "主要针对当地企业和居民需求提供金融服务"}, "a": "A", "an": "城市商业银行通常在特定的区域从事商业银行业务，依靠地缘优势、当地经济发展水平，重点针对当地企业和居民的需求提供金融产品和服务。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_50", "q": "下列关于债券报价方式的说法，正确的有（）。", "c": {"A": "对话报价是指参与者为达成交易而直接向交易对手作出的、对手方确认即可成交的报价", "B": "小额报价是指在交易系统中，一次报价、规定交易数量范围和对手范围的现券双向撮合交易方式", "C": "公开报价是指参与者为表明自身交易意向而面向市场作出的、不可直接确认成交的报价", "D": "双边报价是指银行间债券市场开展双边报价业务的交易员进行现券买卖报价时，在中国人民银行核定的债券买卖差价范围内连续报出该券种的买卖实价，并同时报出该券种的买卖数量、清算速度等交易要素"}, "a": "ACD", "an": "小额报价是在交易系统中，一次报价、规定交易数量范围和对手范围的现券【单向】撮合交易方式。D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_54", "q": "下列关于金融市场的说法，错误的是（）。", "c": {"A": "金融市场是政府调控经济的一个主要渠道", "B": "金融市场的发展可以促成厂商“正常存货投资”的减少", "C": "金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联", "D": "金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"}, "a": "B", "an": "金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。", "type": "single"}, {"id": "comp_74567", "q": "根据上述材料，下列关于中国金融监管体系的说法，正确的是（）。", "c": {"A": "中国金融监管体系实行\\\"一委一行两会\\\"的架构", "B": "国务院金融稳定发展委员会负责统筹协调金融稳定和改革发展", "C": "中国银行保险监督管理委员会负责监管证券业", "D": "中国人民银行负责所有金融机构的微观审慎监管"}, "a": "B", "an": "中国金融监管体系是\\\"一委一行一局一会\\\"：国务院金融稳定发展委员会（一委）+ 中国人民银行（一行）+ 国家金融监督管理总局（一局）+ 中国证券监督管理委员会（一会）。选项B正确。国家金融监督管理总局负责除证券业之外的金融监管，证监会负责证券业监管。", "type": "comprehensive", "material": "2024年10月，中国证券业协会发布了《证券行业专业人员一般业务水平评价测试大纲（2024）》，自2024年11月1日起施行。该大纲对金融市场基础知识科目的考查范围进行了调整。其中涉及全球金融体系、中国金融体系与多层次资本市场等内容。", "sub_type": "single"}, {"id": "comp_68094", "q": "关于国际金融市场监管，下列说法正确的有（）。", "c": {"A": "美国证券交易委员会（SEC）负责监管美国证券市场", "B": "英国金融行为监管局（FCA）负责监管英国金融机构的行为", "C": "香港金融管理局（金管局）负责监管香港证券和期货业", "D": "日本金融厅（FSA）是日本金融监管的统一机构"}, "a": "ABD", "an": "选项C错误。香港金融管理局（金管局）负责监管银行业，证券及期货事务监察委员会（证监会）负责监管证券和期货业。其他选项均正确。", "type": "comprehensive", "material": "2024年10月，中国证券业协会发布了《证券行业专业人员一般业务水平评价测试大纲（2024）》，自2024年11月1日起施行。该大纲对金融市场基础知识科目的考查范围进行了调整。其中涉及全球金融体系、中国金融体系与多层次资本市场等内容。", "sub_type": "multi"}, {"id": "comp_15943", "q": "按上述分类，下列属于货币市场工具的是（）。", "c": {"A": "股票", "B": "10年期国债", "C": "商业票据", "D": "证券投资基金份额"}, "a": "C", "an": "货币市场是短期（1年以内）资金融通市场。商业票据是企业发行的短期无担保本票，期限通常在270天以内，属于货币市场工具。股票、10年期国债、证券投资基金均属于资本市场工具。", "type": "comprehensive", "material": "金融市场按照交易标的物可分为货币市场、资本市场、外汇市场和黄金市场等。货币市场是短期资金融通市场，资本市场是长期资金融通市场。金融市场的基本功能包括资金融通、价格发现、风险管理、流动性提供和降低交易成本。", "sub_type": "single"}, {"id": "comp_33054", "q": "金融市场通过价格信号引导资金流向效益最高的部门，这体现了金融市场的（）功能。", "c": {"A": "资金融通", "B": "价格发现", "C": "风险管理", "D": "流动性提供"}, "a": "B", "an": "价格发现功能是指金融市场通过公开竞价形成均衡价格，引导资金流向效益最高的部门。资金融通是实现资金盈余者向短缺者转移；风险管理是通过衍生工具等转移风险；流动性提供是使资产快速变现。", "type": "comprehensive", "material": "金融市场按照交易标的物可分为货币市场、资本市场、外汇市场和黄金市场等。货币市场是短期资金融通市场，资本市场是长期资金融通市场。金融市场的基本功能包括资金融通、价格发现、风险管理、流动性提供和降低交易成本。", "sub_type": "single"}, {"id": "cflue_zc_ch2.json_1", "q": "国际经济环境因素作为影响我国金融市场运行的主要因素，内容不包括（）。", "c": {"A": "世界货币制度影响", "B": "放松监管和加强监管两种经济哲学的交替", "C": "汇率和国际资本流动", "D": "经济全球化"}, "a": "C", "an": "国际经济环境因素包括经济全球化、世界货币制度影响、放松监管和加强监管两种经济哲学的交替。汇率和国际资本流动属于宏观经济运行对金融市场的影响。", "type": "single"}, {"id": "cflue_zc_ch2.json_2", "q": "中央银行采取宽松性货币政策，（）货币供给，促使股价（）。", "c": {"A": "减少，上升", "B": "减少，下降", "C": "增加，下降", "D": "增加，上升"}, "a": "D", "an": "中央银行采取宽松性货币政策，增加货币供给，股市资金增加，对股票的需求增加，立即促使股价上升。", "type": "single"}, {"id": "cflue_zc_ch2.json_3", "q": "中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。中央银行作为证券发行主体，既可以发行股票，也可以发行债券。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "中央银行作为证券发行主体，主要涉及两类证券：1、中央银行【股票】。在一些国家（如美国），中央银行采取了股份制组织结构，通过发行股票募集资金，但是，中央银行的股东并不享有决定中央银行政策的权利，只能按期收取固定的红利，其股票类似于优先股。2、中央银行出于调控货币供给量目的而发行的【特殊债券】。", "type": "judge"}, {"id": "cflue_zc_ch2.json_4", "q": "在上海证券交易所设立科创板，坚持面向（），主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。", "c": {"A": "世界科技前沿", "B": "资本市场前沿", "C": "国家重大需求", "D": "经济主战场"}, "a": "ACD", "an": "在上海证券交易所新设科创板，坚持面向【世界科技前沿、面向经济主战场、面向国家重大需求】，主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。&amp;nbsp;&amp;nbsp;", "type": "multi"}, {"id": "cflue_zc_ch2.json_5", "q": "以下关于我国金融业主要行业的基本情况，不正确的是（）。", "c": {"A": "股份制银行资产规模增长较快", "B": "在分业监管体系下，相较于银行业和证券业，信托业务的融资活动灵活性不具有优势", "C": "证券业传统业务面临激烈的同质化竞争", "D": "大型商业银行在资产规模、资金来源和网点布局上占有主导地位"}, "a": "B", "an": "在分业监管体系下，相较于银行业和证券业，信托业务的融资活动更具灵活性优势。", "type": "single"}, {"id": "cflue_zc_ch2.json_6", "q": "《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为（）个月，中国证监会注册期限为（）个工作日。同时，针对（）融资设置简易程序。", "c": {"A": "2；15；小额快速", "B": "2；10；小额便捷", "C": "3；15；小额便捷", "D": "2；15；小额便捷"}, "a": "A", "an": "《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为2个月，中国证监会注册期限为15个工作日。同时，针对“小额快速”融资设置简易程序", "type": "single"}, {"id": "cflue_zc_ch2.json_7", "q": "诚信租行是一家金融租赁公司，拟今年上市，因此聘请A投资银行进行IPO材料的编写，按照行业分类，在联合国统计署按经济活动类型分类的表里，A投资银行属于金融中介的（）子类。", "c": {"A": "辅助金融中介的活动", "B": "非银行金融中介结构", "C": "保险和养老基金", "D": "不包含保险和养老基金的金融中介活动"}, "a": "A", "an": "投资银行属于辅助金融中介的活动，选项C是按照业务特征及货币创造、交换媒介和支付手段的功能划分。", "type": "single"}, {"id": "cflue_zc_ch2.json_8", "q": "上海证券交易所在《上海证券交易所科创板企业上市推荐指引》中指出，根据科创板定位，保荐机构优先推荐的科技创新企业所属的领域包括（）。", "c": {"A": "新能源领域", "B": "节能环保领域", "C": "生物医药领域", "D": "新型农业"}, "a": "ABC", "an": "科创板重点推荐六大领域的科技创新企业包括：新一代信息技术领域；高端装备领域；新材料领域；新能源领域；节能环保领域；生物医药领域。", "type": "multi"}, {"id": "cflue_zc_ch2.json_9", "q": "当前我国银行业中，在资产规模、资金来源和网点布局上占据主导地位的是城市商业银行。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【国有大型商业银行】在资产规模、资金来源和网点布局上占据主导地位，业务遍布全国主要城市及大部分县域地区，网点众多且分散，各项业务均衡发展。", "type": "judge"}, {"id": "cflue_zc_ch2.json_10", "q": "金融产品的创新和复杂化，使得实体经济和金融的界限日益分明。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "实体经济发展水平和质量从根本上决定着金融发展水平和质量，实体经济发展不好，风险最后会集中反映在金融体系中，金融的健康发展可以促进经济增长；反之则不利于经济增长，金融产品的创新和复杂化，使得实体经济和金融的界限【日益模糊】。", "type": "judge"}, {"id": "cflue_zc_ch2.json_11", "q": "在场外交易市场，金融机构（）。", "c": {"A": "仅是交易的组织者", "B": "仅是交易的监管者", "C": "既是证券交易的组织者，又是证券交易的直接参加者", "D": "仅是交易的直接参与者"}, "a": "C", "an": "通常，在柜台上交易的证券，其买卖价格由开设柜台的金融机构报出，投资者根据金融机构柜台所报的买入价或卖出价与柜台交易，即证券出售者将证券直接卖给柜台，证券购入者直接从柜台买入证券。所以，金融机构的柜台既是证券交易的组织者，也是证券交易的直接参加者。", "type": "single"}, {"id": "cflue_zc_ch2.json_12", "q": "下列关于SHIBOR的说法，不正确的是（）。", "c": {"A": "目前已成为认可度高、应用广泛的货币市场基准利率之一", "B": "不具有广泛性，不能帮助金融结构提高自主定价能力", "C": "属于货币市场格局之一", "D": "由中国人民银行于2007年开始试运行"}, "a": "B", "an": "为推进利率市场化改革，提高金融机构自主定价能力，健全货币政策传导机制，培育货币市场基准利率，中国人民银行于2007年开始运行上海银行间同业拆拆借利率，目前它已成为认可度高、应用广泛的货币市场基准利率之－。选项D不正确，其余符合。", "type": "single"}, {"id": "cflue_zc_ch2.json_13", "q": "对于债券市场来说，不同市场的债券分别由不同机构负责托管和结算，关于债券的托管，以下说法正确的是（）。", "c": {"A": "上海证券交易所对应中央国债登记公司", "B": "银行间市场对应中央国债登记公司", "C": "银行间市场对应中国证券登记结算总公司", "D": "深圳交易所对应中央国债登记公司"}, "a": "B", "an": "银行间市场对应中央国债登记公司，上海（深圳）证券交易所对应于中国证券登记结算上海（深圳）分公司，选项A正确，选项B、C、D说法不正确。", "type": "single"}, {"id": "cflue_zc_ch2.json_14", "q": "截至2017年末，全球第一大黑色金属期货市场和第二大有色金属期货市场的是纽约期货交易所。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "截至2017年末，上海期货交易所成为全球第一大黑色金属期货市场和第二大有色金属期货市场。", "type": "judge"}, {"id": "cflue_zc_ch2.json_15", "q": "在我国金融中介体系中，信托机构属于（）。", "c": {"A": "房地产中介体系", "B": "保险中介体系", "C": "投资中介体系", "D": "银行机构体系"}, "a": "C", "an": "目前，我国已经形成了多层次的金融中介机构体系，拥有以中央银行为主导、国有商业银行为主体，包括股份制商业银行、城市商业银行、农村商业银行、跨国银行、农村信用社在内的多层次银行机构体系；拥有以证券公司、期货公司和证券投资基金为主，以各类投资咨询中介、信托机构为辅的多元化【投资中介体系】；拥有人寿保险公司、财产保险公司、再保险公司以及提供多种多样保险服务的保险中介体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_16", "q": "场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备的功能有（）。", "c": {"A": "拓宽融资渠道，改善中小企业融资环境", "B": "为不能在证券交易所上市交易的证券提供流通转让的场所", "C": "提供风险分层的金融资产管理渠道", "D": "宏观调控"}, "a": "ABC", "an": "场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备功能：1、拓宽融资渠道，改善中小企业融资环境；2、为不能在证券交易所上市交易的证券提供流通转让的场所；3、提供风险分层的金融资产管理渠道。", "type": "multi"}, {"id": "cflue_zc_ch2.json_17", "q": "在期货市场监管方面，我国形成了中国证监会、地方证监局、（）、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。", "c": {"A": "期货交易所", "B": "原中国银监会", "C": "中央银行", "D": "原中国保监会"}, "a": "A", "an": "期货市场监管方面，我国形成了中国证监会、地方证监局、期货交易所、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_18", "q": "20世纪80年代以来中央银行职能的变化突出表现在（）。", "c": {"A": "金融政策的制定", "B": "强调金融稳定职能，维护金融体系安全", "C": "货币职能与金融监管日益紧密，相辅相成", "D": "货币职能与金融监管相分离，突出货币政策调控职能"}, "a": "BD", "an": "20世纪80年代以来中央银行职能的变化突出表现在包括：货币职能与金融监管相分离，突出货币政策调控职能；强调金融稳定职能，维护金融体系安全。", "type": "multi"}, {"id": "cflue_zc_ch2.json_19", "q": "中央银行是代表一国政府（）的重要机构。", "c": {"A": "实施金融监管", "B": "发行法偿货币", "C": "制定和执行货币政策", "D": "创造利润"}, "a": "ABC", "an": "中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。", "type": "multi"}, {"id": "cflue_zc_ch2.json_20", "q": "甲客户将10000元现金存入A银行，假定法定准备金率为25%，在不考虑派生存款的情况下，A银行可用于发放贷款的最大额度是（）。", "c": {"A": "7500元", "B": "10000元", "C": "2500元", "D": "40000元"}, "a": "A", "an": "法定存款准备金，是银行吸收客户存款，上存中央银行的金额，根据题意，银行留存用于发放存款的金额=10000×（1-25%）=7500元。", "type": "single"}, {"id": "cflue_zc_ch2.json_21", "q": "标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展的是（）。", "c": {"A": "沪深两市的形成", "B": "银行业与信托业、证券业分离", "C": "国务院证券管理委员会和中国监督管理委员会成立", "D": "中国银行监督委员会成立"}, "a": "C", "an": "1992年10月，国务院证券管理委员会和中国监督管理委员会成立标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展。选项B标志着我国“分业经营，分业监管”的金融体系得以确立。选项C时间不符，选项D标志着股票市场正式运作的开始。", "type": "single"}, {"id": "cflue_zc_ch2.json_22", "q": "银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务是表内业务。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【中间业务】是银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务。中间业务包括两类，一般意义上的金融服务业务类业务和一般意义上的表外业务。中间业务不需要动用银行自己的资金，且具有收入稳定、风险程度低的特点，集中体现了商业银行的服务功能。", "type": "judge"}, {"id": "cflue_zc_ch2.json_23", "q": "目前，中国已基本形成了由（）调控和监督、国家银行为主体、政策性金融与商业性金融机构相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系。", "c": {"A": "中央银行", "B": "原中国银监会", "C": "中国证监会", "D": "财政部"}, "a": "A", "an": "目前，中国已经基本形成了由【中央银行】调控和监督、国家银行为主体、政策性金融与商业性金融相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系，并建立了与之相适应的金融监管体系。", "type": "single"}, {"id": "cflue_zc_ch2.json_24", "q": "我国政策性银行不包括（）。", "c": {"A": "中国进出口银行", "B": "中国人民银行", "C": "国家开发银行", "D": "中国农业发展银行"}, "a": "B", "an": "中国人民银行不属于政策性银行，是“银行的银行”。", "type": "single"}, {"id": "cflue_zc_ch2.json_25", "q": "下列关于金融与实体经济关系的说法，正确的有（）。", "c": {"A": "“金融加速器”理论认为，金融市场摩擦会放大实体经济产出的影响", "B": "古典经济学家认为货币是中性的，货币供应量的变化不影响实体经济", "C": "2008年金融危机表明，金融活动本身就是经济衰退或萧条的诱因", "D": "凯恩斯认为通过利率对投资的诱导，货币能影响实体经济产出"}, "a": "ABCD", "an": "全部正确。", "type": "multi"}, {"id": "cflue_zc_ch2.json_26", "q": "央行的公开市场操作包括买卖政府债券或（）。", "c": {"A": "金融债券", "B": "公司债券", "C": "企业债券", "D": "次级债券"}, "a": "A", "an": "中央银行以公开市场操作作为政策手段，通过买卖政府债券或金融债券，影响货币供应量或利率水平，进行宏观调控。", "type": "single"}, {"id": "cflue_zc_ch2.json_27", "q": "联合国统计署按经济活动类型分类的金融中介包括（）。", "c": {"A": "辅助金融中介，如交易所、投资银行等", "B": "货币中介", "C": "中央银行及其他货币中介（主要指存款银行）", "D": "保险和养老基金（包括强制性社会保障）"}, "a": "ABC", "an": "联合国统计署按经济活动类型，把现今世界上的经济活动分成17个大类。金融中介类包括：不包含保险和养老基金的金融中介活动：货币中介；中央银行和其他货币中介（主要是指存款货币银行）的活动；其他金融中介；金融租赁以及其他如农业信贷、进出口信贷、消费信贷等专业信贷的活动。保险和养老基金（【不包括】强制性社会保障）：生命保险活动；养老基金活动；非生命保险活动。辅助金融中介的活动：金融市场组织（如证券交易所）的活动，包括投资银行、投资基金之类的证券交易活动；与金融中介有关的其他辅助活动。", "type": "multi"}, {"id": "cflue_zc_ch2.json_28", "q": "国务院金融稳定发展委员会的职责有（）。", "c": {"A": "审议金融业改革发展重大规划", "B": "统筹金融改革和发展", "C": "指导中央金融改革发展与监管", "D": "落实党中央、国务院关于金融工作的决策部署"}, "a": "ABD", "an": "国务院金融稳定发展委员会的主要职责：1、落实党中央、国务院关于金融工作的决策部署；2、审议金融业改革发展重大规划；3、统筹金融改革发展与监管，协调货币政策与金融监管相关事项，统筹协调金融监管重大事项，协调金融政策与相关财政政策、产业政策等；4、分析研判国际国内金融形势，做好国际金融风险应对，研究系统性金融风险防范处置和维护金融稳定重大政策；5、指导地方金融改革发展与监管，对金融管理部门和地方政府进行业务监督和履职问责等。", "type": "multi"}, {"id": "cflue_zc_ch2.json_29", "q": "2020年4月27日，中央全面深化改革委员会第十三次会议审议通过了《创业板改革并试点注册制总体实施方案》。创业板在试点注册制安排方面，参照科创板的做法，在坚持规范、透明、公开，严把质量关的基础上，将审核注册程序分为（）两个相互衔接的环节。", "c": {"A": "证券业协会审核、中国证监会注册", "B": "证券业协会注册、中国证监会审核", "C": "交易所注册、中国证监会审核", "D": "交易所审核、中国证监会注册"}, "a": "D", "an": "2020年4月27日，中央全面深化改革委员会第十三次会议审议通过了《创业板改革并试点注册制总体实施方案》。创业板在试点注册制安排方面，参照科创板的做法，在坚持规范、透明、公开，严把质量关的基础上，将审核注册程序分为【交易所审核、中国证监会注册】两个相互衔接的环节。", "type": "single"}, {"id": "cflue_zc_ch2.json_30", "q": "2018年7月，小王手头有一笔闲钱，正考虑将这笔钱投资于金融市场，在其进行基本面分析时，应考虑主要宏观经济变量包括（）。", "c": {"A": "经济周期", "B": "国内生产总值", "C": "国际资本流动", "D": "财政政策"}, "a": "ABC", "an": "影响我国金融市场运行的主要因素包括：经济因素。经济因素包括宏观经济环境、宏观经济政策和国际经济因素。宏观经济变量包括国内生产总值、经济周期、通货膨胀与利率、汇率和国际资本流动。财政政策属于宏观经济政策，选择不包括C的选项。", "type": "multi"}, {"id": "cflue_zc_ch2.json_31", "q": "目前，我国的商品期货交易所包括（）。", "c": {"A": "郑州商品交易所", "B": "广州期货交易所", "C": "上海期货交易所", "D": "大连商品交易所"}, "a": "ABCD", "an": "目前，我国成立了上海期货交易所、大连商品交易所和郑州商品交易所、广州期货交易所四大商品期货交易所。&amp;nbsp;&amp;nbsp;", "type": "multi"}, {"id": "cflue_zc_ch2.json_32", "q": "以下属于选择性货币政策的是（）。", "c": {"A": "不动产信用控制", "B": "公开市场业务", "C": "消费者信用控制", "D": "证券市场信用控制"}, "a": "ACD", "an": "选择性货币政策工具主要包括：消费者信用控制、证券市场信用控制、不动产信用控制，除此之外，还有直接信用控制和间接信用控制等。", "type": "multi"}, {"id": "cflue_zc_ch2.json_33", "q": "商业银行的主要业务包括（）。", "c": {"A": "负债业务", "B": "表外业务", "C": "资产业务", "D": "信托业务"}, "a": "ABC", "an": "商业银行的主要业务包括负债业务、资产业务和表外业务（担保承诺类、代理投融资服务类、中介服务类、其他类等）。", "type": "multi"}, {"id": "cflue_zc_ch2.json_34", "q": "区域性市场投资者可以是（）。", "c": {"A": "金融资产低于50万元人民币的个人投资者", "B": "合伙企业", "C": "具备一定条件的法人", "D": "私募股权投资基金"}, "a": "BCD", "an": "《关于规范发展区域性股权市场的通知》规定，区域性股权市场实行合格投资者制度。合格投资者应是依法设立且具备一定条件的法人机构、合伙企业，金融机构依法管理的投资性计划，以及具备较强风险承受能力且金融资产【不低于】五十万元人民币的自然人。不得通过拆分、代持等方式变相突破合格投资者标 "q": "根据材料，下列关于中国多层次资本市场的说法，错误的是（）。", "c": {"A": "科创板主要服务于符合国家战略、突破关键核心技术的科创企业", "B": "创业板对拟上市企业的行业包容性比科创板更窄", "C": "北交所服务于创新型中小企业", "D": "主板主要服务成熟期的大型企业"}, "a": "B", "an": "选项B错误。相比之下，创业板对行业的包容性更宽，不仅限于\\\"硬科技\\\"，还包括\\\"三创四新\\\"（创新、创造、创意；新技术、新产业、新业态、新模式）。科创板定位更聚焦于\\\"硬科技\\\"企业。", "type": "comprehensive", "material": "2023年中央金融工作会议提出要加快建设金融强国，做好科技金融、绿色金融、普惠金融、养老金融、数字金融五篇大文章。同时，中国多层次资本市场体系不断完善，包括主板、科创板、创业板、北交所和新三板等板块。", "sub_type": "single"}, {"id": "comp_62240", "q": "下列属于直接融资方式的有（）。", "c": {"A": "企业发行股票融资", "B": "企业向银行贷款", "C": "企业发行债券融资", "D": "企业通过融资租赁获得设备"}, "a": "AC", "an": "直接融资是指资金需求者与供给者直接形成债权债务关系的融资方式，包括股票融资和债券融资。银行贷款和融资租赁均属于间接融资，资金供需双方不直接形成债权债务关系。", "type": "comprehensive", "material": "2023年中央金融工作会议提出要加快建设金融强国，做好科技金融、绿色金融、普惠金融、养老金融、数字金融五篇大文章。同时，中国多层次资本市场体系不断完善，包括主板、科创板、创业板、北交所和新三板等板块。", "sub_type": "multi"}, {"id": "comp_15736", "q": "关于中国人民银行货币政策工具，下列说法正确的有（）。", "c": {"A": "公开市场操作是中央银行吞吐基础货币的主要工具之一", "B": "中期借贷便利（MLF）的期限通常为6个月", "C": "存款准备金率调整属于一般性货币政策工具", "D": "再贴现政策是中央银行对商业银行持有的未到期票据进行再贴现"}, "a": "ACD", "an": "选项B错误。MLF的期限通常为3个月至1年，以1年期为主。公开市场操作、存款准备金率、再贴现均属于一般性货币政策工具。MLF是央行提供中期基础货币的货币政策工具。", "type": "comprehensive", "material": "中国人民银行为维护银行体系流动性合理充裕，可以通过多种货币政策工具进行调控。2024年，中国人民银行多次通过公开市场操作、中期借贷便利（MLF）等工具向市场投放流动性，同时调整了贷款市场报价利率（LPR）报价机制。", "sub_type": "multi"}, {"id": "cflue_zc_ch3.json_1", "q": "合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过基金形式募集一定额度的人民币资金。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过【基金】形式募集一定额度的人民币资金。", "type": "judge"}, {"id": "cflue_zc_ch3.json_2", "q": "国务院证券监督管理机构依法履行职责，有权对（）进行现场检查。", "c": {"A": "证券交易所", "B": "上市公司", "C": "证券发行人", "D": "证券登记结算机构"}, "a": "ABCD", "an": "中国证监会有权对证券发行人、上市公司、证券公司、证券投资基金管理公司、证券服务机构（资产评估机构和资信评级机构属于证券服务机构。）、证券交易所、证券登记结算机构进行现场检查。", "type": "multi"}, {"id": "cflue_zc_ch3.json_3", "q": "证券公司为期货公司介绍客户时，应当（）。", "c": {"A": "向客户作获利保证、共担风险等承诺", "B": "不得向客户虚假宣传、误导客户", "C": "向客户解释期货交易的方式、流程及风险", "D": "向客户明示其与期货公司的介绍业务委托关系"}, "a": "BCD", "an": "证券公司为期货公司介绍客户时，应当向客户明示其与期货公司的介绍业务委托关系，解释期货交易的方式、流程及风险，不得作获利保证、共担风险等承诺，不得向客户虚假宣传、误导客户。", "type": "multi"}, {"id": "cflue_zc_ch3.json_4", "q": "我国对合格境外投资者机构汇出汇入资金的规定有（）。", "c": {"A": "合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出口头解释", "B": "已批准额度和实际汇入金额的差额，在未经国家外汇局批准之前不得汇入", "C": "合格境外投资者应当在国家外汇管理局规定的时间内汇入本金", "D": "汇入的本金应当是国家外汇局批准的可兑换货币"}, "a": "BCD", "an": "合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出【书面】解释。", "type": "multi"}, {"id": "cflue_zc_ch3.json_5", "q": "负责证券投资者保护基金筹集、管理和使用的是（）。", "c": {"A": "社保基金理事会", "B": "中国证券投资者保护基金有限责任公司", "C": "证券投资基金", "D": "中国证券登记结算机构"}, "a": "B", "an": "证券投资者保护基金公司负责保护基金筹集、管理和使用。", "type": "single"}, {"id": "cflue_zc_ch3.json_6", "q": "政府机构类投资者参与证券投资的主要目的有（）。", "c": {"A": "提高资金收益率", "B": "调剂资金余缺", "C": "实行特定产业政策", "D": "实施宏观调控"}, "a": "BCD", "an": "政府机构类投资者，是指进行证券投资的政府机构。政府机构类投资者的特点是，通常很少考虑盈利，参与证券投资的目的主要是为了调剂资金余缺、实施宏观调控、实行特定产业政策等要求。", "type": "multi"}, {"id": "cflue_zc_ch3.json_7", "q": "理事会是证券交易所的决策机构，其行使的职权包括（）。", "c": {"A": "选举和罢免会员理事", "B": "审定总经理提出的工作计划", "C": "审定证券交易所业务规则", "D": "召集会员大会，并向会员大会报告工作"}, "a": "BCD", "an": "理事会是证券交易所的决策机构，行使下列职权：1、召集会员大会，并向会员大会报告工作；2、执行会员大会的决议；3、审定总经理提出的工作计划；4、审定总经理提出的年度财务预算、决算方案；5、审定对会员的接纳和退出；6、审定取消会员资格的纪律处分；7、审定证券交易所业务规则；8、审定证券交易所上市新的证券交易品种或者对现有上市证券交易品种作出较大调整；9、审定证券交易所收费项目、收费标准及收费调整程序；10、审定证券交易所重大财务管理事项；11、审定证券交易所重大风险管理和处置事项，管理证券交易所风险基金；12、审定重大投资者教育和保护工作事项；13、决定高级管理人员的聘任、解聘及薪酬事项，但中国证监会任免的除外；14、会员大会授予和证券交易所章程规定的其他职权。", "type": "multi"}, {"id": "cflue_zc_ch3.json_8", "q": "私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的20%。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的【20%】。", "type": "judge"}, {"id": "cflue_zc_ch3.json_9", "q": "根据《证券交易所管理办法》，下列关于证券交易所职能的说法，正确的有（）。", "c": {"A": "审核、安排证券上市交易", "B": "对首次公开发行股票网下投资者进行注册和自律管理", "C": "依法审核公开发行证券申请", "D": "决定证券终止和重新上市"}, "a": "ACD", "an": "D属于根据《注册制下首次公开发行股票网下投资者管理规则》，担任科创板、创业板首发股票主承销商的证券公司的职责。故选ABC。", "type": "multi"}, {"id": "cflue_zc_ch3.json_10", "q": "全国社会保障基金理事会投资运行全国社会保障基金，应当坚待的原则包括（）。", "c": {"A": "长期性", "B": "收益性", "C": "安全性", "D": "谨慎性"}, "a": "ABC", "an": "按照《全国社会保障基金条例》规定，全国社会保障基金理事会投资运行全国社会保障基金，应当坚待【安全性、收益性和长期性】原则。", "type": "multi"}, {"id": "cflue_zc_ch3.json_11", "q": "根据《证券法》，下列关于证券服务机构法律责任和市场准入的说法，正确的有（）。", "c": {"A": "证券服务机构从事证券投资咨询服务业务，应当经国务院证券监督管理机构核准", "B": "证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当承担独立赔偿责任", "C": "会计师事务所等证券服务机构从事证券服务业务，应当报国务院证券监督管理机构和国务院有关主管部门备案", "D": "证券服务机构工作底稿的保存期限不得少于10年，自工作底稿形成之日起算"}, "a": "AC", "an": "证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与委托人承担连带赔偿责任，但是能够证明自己没有过错的除外。A错误；信息和资料的保存期限不得少于10年，自业务委托结束之日起算，B错误；故答案选CD。", "type": "multi"}, {"id": "cflue_zc_ch3.json_12", "q": "按照《证券公司私募投资基金子公司管理规范》，下列说法错误的是（）。", "c": {"A": "私募基金子公司管理的闲置资金只能投资于依法公开发行的国债、央行票据等风险较低的证券", "B": "私募基金子公司管理闲置资金应当坚持有效控制风险、保证流动性的原则", "C": "私募基金子公司不得从事与私募基金无关的业务", "D": "私募基金子公司及其下设特殊目的机构可以以盈利为目的管理闲置资金"}, "a": "D", "an": "按照《证券公司私募投资基金子公司管理规范》，私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。", "type": "single"}, {"id": "cflue_zc_ch3.json_13", "q": "政府作为债券发行的重要主体之一，所筹集的资金可以用来（）。", "c": {"A": "兴建大型基础设施项目", "B": "弥补战争费用", "C": "协调财政资金短期周转，弥补财政赤字", "D": "实施某项特殊政策"}, "a": "ABCD", "an": "政府发行债券所筹集的资金既可以用于协调财政资金短期周转、弥补财政赤字、兴建政府投资的大型基础性的建设项目，也可以用于实施某种特殊的政策，可以用于弥补战争费用的开支。", "type": "multi"}, {"id": "cflue_zc_ch3.json_14", "q": "会员大会可以行使的职能不包括（）。", "c": {"A": "管理人员的聘任、解聘及薪酬事项", "B": "审议和通过理事会、监事会和总经理的工作报告", "C": "选举和罢免会员理事、会员监事", "D": "制定和修改证券交易所章程"}, "a": "A", "an": "会员大会可以行使的职能有制定和修改证券交易所章程；选举和罢免会员理事、会员监事；审议和通过理事会、监事会和总经理的工作报告；审议和通过证券交易所的财务预算、决算报告；法律、行政法规、部门规章和证券交易所章程规定的其他重大事项。", "type": "single"}, {"id": "cflue_zc_ch3.json_15", "q": "证券金融公司应当按照国家宏观政策，根据市场状况和风险控制需要，确定和调整（）。", "c": {"A": "保证金比例", "B": "担保金比例", "C": "转融通资金率", "D": "转融通费率"}, "a": "AD", "an": "证券金融公司可根据市场状况和风险控制需要，确定和调整【转融通费率和保证金的比例】。", "type": "multi"}, {"id": "cflue_zc_ch3.json_16", "q": "根据《中华人民共和国保险法》，保险公司资金运用范围包括（）。", "c": {"A": "债券", "B": "不动产", "C": "股票", "D": "基金"}, "a": "ABCD", "an": "保险资金运用限于下列形式：1.银行存款；2.买卖债券、股票、证券投资基金份额等有价证券；3.资金不动产；4.国务院规定的其他资金运用形式。", "type": "multi"}, {"id": "cflue_zc_ch3.json_17", "q": "2019年9月10日，国家外汇管理局决定取消合格境外投资者和人民币合格境外投资者投资额度限制，包括（）。", "c": {"A": "RQFII试点国家和地区限制也一并取消", "B": "取消QFII投资额度限制", "C": "明确不再对单家合格境外投资者的投资额度进行备案和审批", "D": "投资范围由交易所市场金融工具扩展到银行间债券市场"}, "a": "ABC", "an": "国家外汇管理局决定取消合格境外机构投资者和人民币合格境外机构投资者投资额度限制。包括：一是取消QFII和RQFII投资额度限制；二是明确不再对单家合格境外投资者的投资额度进行备案和审批；三是此次取消合格境外投资者投资额度限制时，RQFII试点国家和地区限制也一并取消。", "type": "multi"}, {"id": "cflue_zc_ch3.json_18", "q": "《证券期货投资者适当性管理办法》的实施对我国金融市场具有很重要的意义，从根本上体现了经营机构和投资者利益的辩证统一，下列说法正确的有（）。", "c": {"A": "对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证", "B": "该管理办法要求对投资者进行分类评估和分类管理，为经营机构提供标准化服务奠定了基础", "C": "该管理办法同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制", "D": "该管理办法要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配"}, "a": "ACD", "an": "《证券期货投资者适当性管理办法》从根本上体现经营机构和投资者利益的辩证统一。从投资者角度来看，该管理办法将投资者分为专业投资者和普通投资者，要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配，同时在销售和服务过程中，对普通投资者实行有别于专业投资者的告知和风险警示义务。对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证。从经营机构角度来看，该管理办法要求经营机构对投资进行分类评估和分类管理，为经营机构提供【差异化】服务奠定了基础，同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制。", "type": "multi"}, {"id": "cflue_zc_ch3.json_19", "q": "下面对于证券市场融资活动特征的描述正确的有（）。", "c": {"A": "是一种间接融资活动", "B": "是在由各种证券中介机构组成的证券中介服务体系的支持下完成的", "C": "促成证券发行买卖的中介机构自身可以充当权利义务主体", "D": "是一种强市场性的融资活动"}, "a": "BD", "an": "资金赤字单位和盈余单位直接接触，形成直接的权利和义务关系，而没有另外的权利义务主体介入其中。促成证券发行买卖的中介机构，如证券公司等自身不充当权利义务主体，是连接赤字单位和盈余单位的服务性媒介，证券市场融资是一种直接融资。", "type": "multi"}, {"id": "cflue_zc_ch3.json_20", "q": "不具备证券自营业务资格的证券公司，其自有资金只能以（）为目的，参与国债期货交易。", "c": {"A": "利益输送", "B": "增加流动性", "C": "套期保值", "D": "活跃证券市场"}, "a": "C", "an": "2013年8月，中国证监会制定并发布《证券公司参与股指期货、国债期货交易指引》，规定证券公司以自有资金或受托管理资金参与股指期货、国债期货交易；不具备证券自营业务资格的证券公司，其自有资金只能以【套期保值】为目的，参与国债期货交易。", "type": "single"}, {"id": "cflue_zc_ch3.json_21", "q": "我国基金类投资者包括（）。", "c": {"A": "产业基金", "B": "社保基金", "C": "社会公益基金", "D": "企业年金"}, "a": "BCD", "an": "基金类投资者包括证券投资基金、社保基金、企业年金和社会公益基金。", "type": "multi"}, {"id": "cflue_zc_ch3.json_22", "q": "根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。下列说法错误的是（）。", "c": {"A": "证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等", "B": "拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续", "C": "在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，仍可继续投资股指期货、国债期货", "D": "在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项"}, "a": "C", "an": "根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。（1）在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项。证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等。（2）在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，原则上不得投资股指期货、国债期货。拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续。", "type": "single"}, {"id": "cflue_zc_ch3.json_23", "q": "（）一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性事件时使用。", "c": {"A": "市场手段", "B": "法律手段", "C": "经济手段", "D": "行政手段"}, "a": "D", "an": "【行政手段】是通过制订计划、政策等对证券市场进行行政性的干预。这种手段比较直接，但运用不当可能违背市场规律，无法发挥作用甚至遭到惩罚。一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性时间时使用。", "type": "single"}, {"id": "cflue_zc_ch3.json_24", "q": "关于证券经纪业务的表述正确的是（）。", "c": {"A": "经纪关系的建立形成实质上的委托关系", "B": "我国证券公司从事的证券经纪业务以证券公司的柜台代理买卖证券业务为主", "C": "经纪委托关系的建立表现为开户和委托两个环节", "D": "不可以通过证券交易所代理买卖证券业务"}, "a": "C", "an": "证券经纪业务分为柜台代理买卖证券业务和通过证券交易所代理买卖证券业务。我国证券公司从事的证券经纪业务以通过证券交易所代理买卖证券业务为主。在证券经纪业务中，经纪委托关系的建立表现为开户和委托两个环节。经纪关系的建立只是确立了投资者和证券公司直接的代理关系，还没有形成实质上的委托关系。", "type": "single"}, {"id": "cflue_zc_ch3.json_25", "q": "按照《证券公司私募投资基金子公司管理规范》，下列说法正确的是（）。", "c": {"A": "私募基金子公司管理的闲置资金只能投资于风险较低的证券", "B": "私募基金子公司管理的闲置资金只能投资于流动性较弱的证券", "C": "私募基金子公司及其下设特殊目的机构可以以任何合法目的管理闲置资金", "D": "私募基金子公司从事P2P平台网贷的业务"}, "a": "A", "an": "按照《证券公司私募投资基金子公司管理规范》，私募基金子公司不得从事与私募基金无关的业务。私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。", "type": "single"}, {"id": "cflue_zc_ch3.json_26", "q": "合格投资者应在每个会计年度结束后3个月内，向国家外汇管理局报送上一年度境外投资情况报告（包括投资额度使用情况、投资收益情况等）。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "在QDII制度中，合格投资者应在每个会计年度结束后【4个月内】，向国家外汇管理局报送上一年度境外投资情况报告（包括投资额度使用情况、投资收益情况等）。", "type": "judge"}, {"id": "cflue_zc_ch3.json_27", "q": "下列关于证券公司开展融资融券业务的说法错误的是（）。", "c": {"A": "证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金不可以证券充抵", "B": "证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例", "C": "证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面方式予以记载、保存", "D": "证券公司开展融资融券业务，必须中国证监会批准"}, "a": "AC", "an": "证券公司开展融资融券业务。证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面和电子方式予以记载、保存，故B错误。证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金可以证券充抵，故C错误。", "type": "multi"}, {"id": "cflue_zc_ch3.json_28", "q": "企业年金基金按照规定不得直接投资于（）。", "c": {"A": "权证", "B": "国债", "C": "股票基金", "D": "金融债"}, "a": "A", "an": "企业年金基金按照规定不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。", "type": "single"}, {"id": "cflue_zc_ch3.json_29", "q": "根据我国有关法规的规定，证券服务机构的设立需要按照工商管理法规的要求办理注册，从事证券服务业务必须得到中国证监会和有关主管部门的批准。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "根据我国有关法规的规定，证券服务机构的设立需要按照工商管理法规的要求办理注册，从事证券服务业务必须得到【中国证监会】和有关主管部门的批准。", "type": "judge"}, {"id": "cflue_zc_ch3.json_30", "q": "证券公司为多个客户办理集合资产管理业务，不应当（）。", "c": {"A": "与客户签订集合资产管理合同", "B": "通过证券公司自营账户为客户提供资产管理服务", "C": "设立集合资产管理计划并担任集合资产管理计划管理人", "D": "将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管"}, "a": "B", "an": "证券公司为多个客户办理集合资产管理业务，应当设立集合资产管理计划并担任集合资产管理计划管理人，与客户签订集合资产管理合同，将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管，通过专门账户为客户提供资产管理服务。", "type": "single"}, {"id": "cflue_zc_ch3.json_31", "q": "证券金融公司开展转融通业务，须以自己的名义开立相关资金账户，其中有（）。", "c": {"A": "在证券登记结算机构开立的转融通担保资金账户", "B": "在证券登记结算机构开立的转融通信用账户", "C": "在证券登记结算机构开立的转融通资金交收账户", "D": "在商业银行开立的转融通专用资金账户"}, "a": "ACD", "an": "证券金融公司开展转融通业务，应当以自己的名义，在证券登记结算机构分别开立转融通专用证券账户、转融通担保证券账户和转融通证券交收账户。证券金融公司开展转融通业务，应当以自己的名义，在商业银行开立转融通专用资金账户，在证券登记结算机构分别开立转融通担保资金账户和转融通资金交收账户。", "type": "multi"}, {"id": "cflue_zc_ch3.json_32", "q": "按照目前的投资者构成，境内上市外资股的投资者包括（）。", "c": {"A": "我国香港、澳门、台湾地区的自然人、法人和其他组织", "B": "定居在国外的中国公民", "C": "我国的境内居民", " ;gt;（3）机构投资者在境内买卖基金份额获得的差价收入，应并入企业的应纳税所得额，征收企业所得税。机构投资者从基金分配中获得的收入，暂不征收所得税。", "type": "multi"}, {"id": "xs_4781042", "q": "金融债券作为一种特殊类型的债券，它具有以下（）特点。Ⅰ.金融债券表示的是银行等金融机构与金融债券持有者之间的债权债务关系Ⅱ.金融债券一般不记名、不挂失，不可以抵押和转让Ⅲ.我国金融债券的发行对象主要是个人Ⅳ.金融债券的利息不记复利，不能提前支取，延期兑付亦不计逾期利息", "c": {"A": "Ⅰ、Ⅱ、Ⅲ", "B": "Ⅰ、Ⅱ、Ⅳ", "C": "Ⅰ、Ⅲ、Ⅳ", "D": "Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, "a": "C", "an": "", "type": "single"}, {"id": "xs_4781043", "q": "下列不属于我国《公司法》规定的公司类型的有（）。Ⅰ.无限责任公司Ⅱ.两合公司Ⅲ.合伙制企业Ⅳ.股份有限公司", "c": {"A": "Ⅰ、Ⅱ、Ⅲ", "B": "Ⅰ、Ⅱ", "C": "Ⅰ、Ⅲ、Ⅳ", "D": "Ⅱ、Ⅲ"}, "a": "A", "an": "", "type": "single"}, {"id": "comp_11992", "q": "关于证券公司的业务，下列说法正确的是（）。", "c": {"A": "证券经纪业务中证券公司是交易的对手方", "B": "证券自营业务是证券公司以自有资金买卖证券", "C": "资产管理业务中证券公司承担投资风险", "D": "证券承销业务只包括包销方式"}, "a": "B", "an": "选项A错误：证券经纪业务中，证券公司作为代理人不作为交易对手。选项C错误：资产管理业务中，风险由委托人（投资者）承担。选项D错误：证券承销包括包销和代销两种方式。选项B正确。", "type": "comprehensive", "material": "证券公司是重要的证券中介机构，其业务范围包括证券经纪、证券投资咨询、财务顾问、证券承销与保荐、证券自营、证券资产管理等。根据《证券法》，证券公司的设立需经中国证监会批准。", "sub_type": "single"}, {"id": "comp_70271", "q": "下列属于证券投资者保护基金制度内容的有（）。", "c": {"A": "保护基金的资金来源于证券公司缴纳的资金", "B": "保护基金对每个投资者的保护限额为50万元", "C": "保护基金公司负责基金的筹集、管理和使用", "D": "保护基金主要用于处置证券公司风险时补偿投资者"}, "a": "ACD", "an": "选项B错误。保护基金对每个投资者的保护限额为500万元（注意区分存款保险的50万元）。保护基金公司负责基金的筹集、管理和使用，在证券公司被撤销、关闭和破产或被证监会实施行政接管、托管经营等强制性监管措施时，按照国家有关政策对债权人予以偿付。", "type": "comprehensive", "material": "证券公司是重要的证券中介机构，其业务范围包括证券经纪、证券投资咨询、财务顾问、证券承销与保荐、证券自营、证券资产管理等。根据《证券法》，证券公司的设立需经中国证监会批准。", "sub_type": "multi"}, {"id": "cflue_zc_ch4a.json_1", "q": "甲公司公开发行股票5亿股，有效报价投资者的数量最少为10家。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公开发行股票数量在4亿股（含）以下的，有效报价投资者的数量不少于10家；公开发行股票数量在【4亿股以上】的，有效报价投资者的数量不少于20家。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_2", "q": "境内上市外资股又被称为B股。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "境内上市外资股，是指在中国境内注册的股份有限公司向境内外投资者发行并在中国境内证券交易所上市，以人民币标明其面值，以外币认购、交易和结算的股份。境内上市外资股又被称为“B股”。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_3", "q": "与股份公司股利政策密切相关的日期有（）。", "c": {"A": "股权登记日", "B": "公司半年报公布日", "C": "除权除息日", "D": "派息日"}, "a": "ACD", "an": "与股份公司股利政策密切相关的日期有：1、除权除息日；2、派息日；3、股利宣布日；4、股权登记日。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_4", "q": "普通股的红利是不固定的，它取决于股份公司的（）。", "c": {"A": "股票市值", "B": "盈利水平", "C": "经营状况", "D": "股票面值"}, "a": "BC", "an": "认购股票后，公司派发的股息、红利数量取决于股份公司的【经营状况】和【盈利水平】。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_5", "q": "股票的特征包括（）。", "c": {"A": "收益性", "B": "参与性", "C": "流动性", "D": "永久性"}, "a": "ABCD", "an": "股票的特征：收益性、风险性、流动性、永久性、参与性。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_6", "q": "深圳证券交易所规定，首个交易日无价格涨跌幅限制的情形有（）。", "c": {"A": "配股上市的股票", "B": "增发上市的股票", "C": "暂停上市后恢复上市的股票", "D": "首次公开发行上市的股票"}, "a": "CD", "an": "深圳证券交易所规定，属于下列情形之一的，股票上市首日不实行价格涨跌幅限制：首次公开发行股票上市的；暂停上市后恢复上市的；中国证监会或深圳证券交易所认定的其他情形。故AB正确。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_7", "q": "首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%，然后根据剩余报价及拟申购数量协商确定发行价格。剔除部分不得参与网下申购。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_8", "q": "北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。", "c": {"A": "最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告", "B": "最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）", "C": "具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形", "D": "最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"}, "a": "BCD", "an": "C属于是向【不特定】合格投资者发行时需要符合的条件。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_9", "q": "丙公司是一家大型国有石油公司，2018年3月，该公司投资1亿元入股甲公司，甲公司为国家扶持的专项高科技公司，成长迅速，则该丙公司的股份为（）。", "c": {"A": "国家股", "B": "政策股", "C": "内资股", "D": "法人股"}, "a": "D", "an": "国家股定义：有权代表国家投资的部门或机构以国有资产向公司投资形成的股份，与国有法人股投资主体不同，具有法人资格的国有企业使用法人资产向独立于自己的股份公司出资属于“国有法人股”，是“法人股”的一种。", "type": "single"}, {"id": "cflue_zc_ch4a.json_10", "q": "股票实质上代表了股东对股份公司净资产的所有权，股东凭借股票可以获得公司的（）。", "c": {"A": "等额资金", "B": "红利", "C": "股息", "D": "等额资本"}, "a": "BC", "an": "股票实质上代表了股东对股份公司净资产的所有权，这种所有权是一种综合权利，股东凭借股票可以获得公司的【股息和红利】，参加股东大会并行使自己投票表决、参与公司重大决策等权利，同时也承担相应的责任与风险。故BC正确。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_11", "q": "关于普通股股东义务，下列说法正确的有（）。", "c": {"A": "如违反相关规定，给公司造成损失的，应当承担赔偿责任", "B": "公司的控股股东、实际控制人不得利用其关联关系损害公司利益", "C": "公司股东滥用法人独立地位和股东有限责任逃避责任，严重损害公司债权人利益的，应当对公司债务承担连带责任", "D": "公司股东滥用股东权利给公司或者其他股东造成损失的，可以申请豁免承担赔偿责任"}, "a": "ABC", "an": "股东应当遵守法律、行政法规和公司章程，依法行使股东权利，不得滥用股东权利损害公司或者其他股东的利益；不得滥用公司法人独立地位和股东有限责任损害公司债权人的利益。公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司股东滥用公司法人独立地位和股东有限责任，逃避债务，严重损害公司债权人利益的，应当对公司债务承担连带责任。公司的控股股东、实际控制人不得利用其关联关系损害公司利益，由此给公司造成损失的，应当承担赔偿责任。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_12", "q": "上市公司出现下列描述的情形中，属于可以向证券交易所申请主动退市的有（）。", "c": {"A": "上市公司被法院宣告破产", "B": "上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销", "C": "上市公司股东大会决议主动撤回其股票在证券交易所的交易，并决定不在该交易所交易", "D": "上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件"}, "a": "BCD", "an": "关于主动申请退市的法定情形：1、上市公司股东大会决议主动撤回其股票在本所的交易，并决定不再在交易所交易；2、上市公司股东大会决议主动撤回其股票在本所的交易，并转而申请在其他交易场所交易或转让；3、上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；4、上市公司股东向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；5、除上市公司股东外的其他人向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；6、上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销；7、上市公司股东大会决议公司解散。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_13", "q": "无限售条件股份是指流通转让不受限制的股份，具体包括（）。", "c": {"A": "境外上市外资股", "B": "境内上市外资股", "C": "人民币普通股", "D": "国有法人股"}, "a": "ABC", "an": "无限售条件股份是指流通转让不受限制的股份。具体包括：1、人民币普通股，即A股，含向社会公开发行股票时向公司职工配售的公司职工股。2、境内上市外资股，即B股。3、境外上市外资股，即在境外证券市场上市的普通股，如H股。4、其他。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_14", "q": "我国境外上市外资股主要由（）等构成。", "c": {"A": "N股", "B": "B股", "C": "S股", "D": "H股"}, "a": "ACD", "an": "境外上市外资股主要由H股（香港）、N股（纽约）、S股（新加坡）、L股（伦敦）等构成。B股属于境内上市外资股。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_15", "q": "关于优先股，下列说法正确的是（）。", "c": {"A": "优先股股息可税前扣除，减轻企业税负", "B": "优先股股东享有与普通股股东相同的决策权力", "C": "优先股股息收益并不总是高于普通股", "D": "优先股二级市场价格波动大，适合投机交易"}, "a": "C", "an": "优先股收入较稳定适合中长线投资；优先股股息不可税前扣除；优先股股东的经营决策受限；当公司盈利丰厚的情况下，优先股的股息可能会大大低于普通股。", "type": "single"}, {"id": "cflue_zc_ch4a.json_16", "q": "公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购新股的方式，按老股一般配售若干新股，以保护原股东的权益及其对公司控制权的是定向增发。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【配股】是公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购股份的方式。即按老股一股配售若干新股，以保护原股东的权益及其对公司的控制权。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_17", "q": "公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_18", "q": "下列有关优先股票的说法，正确的有（）。", "c": {"A": "相对于普通股的权利，优先股股东的权利都是优先的", "B": "优先股和普通股一样，拥有对公司的所有权", "C": "优先股的股息率一般在发行时事先固定", "D": "优先股兼有债券的特点"}, "a": "BCD", "an": "相对于普通股的权利，优先股股东在股息的分配和剩余财产的索取上，是优先的，但优先股股东对公司日常经营管理的一般事项没有表决权，而普通股股东是有表决权的。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_19", "q": "根据《公司法》，公司不得收购本公司股份，但是有下列情形之一的除外（）。", "c": {"A": "与持有本公司股份的其他公司合并", "B": "将股份奖励给本公司职工", "C": "股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份", "D": "减少公司注册资本"}, "a": "ABCD", "an": "公司不得收购本公司股份。但是，有下列情形之一的除外：&amp;lt;br&amp;gt;1、减少公司注册资本；&amp;lt;br&amp;gt;2、与持有本公司股份的其他公司合并；&amp;lt;br&amp;gt;3、将股份用于员工持股计划或者股权激励；&amp;lt;br&amp;gt;4、股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份；&amp;lt;br&amp;gt;5、将股份用于转换上市公司发行的可转换为股票的公司债券；&amp;lt;br&amp;gt;6、上市公司为维护公司价值及股东权益所必需。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_20", "q": "首次公开发行股票采用询价方式定价的说法中，错误的是（）。", "c": {"A": "网下投资者不得协商报价", "B": "网下机构和个人投资者可以自主决定是否报价", "C": "网下投资者的报价应当包含每股价格和该价格对应的拟申购股数", "D": "网下投资者应当给出三个不同报价供主承销商参考"}, "a": "D", "an": "B选项说法错误，网下投资者只能有一个报价。", "type": "single"}, {"id": "cflue_zc_ch4a.json_21", "q": "下列（）股份变动不会影响每位股东所持股东权益占公司全部股东权益的比重。", "c": {"A": "增发股票", "B": "股份分割与合并", "C": "股份回购", "D": "资本公积转增股本"}, "a": "BCD", "an": "股份回购是公司利用自有资金购买，不影响公司内部股东份额占比；增发股票在通常情况下，由于可能有除原股东之外的其他人购入股票，或原股东并不按原持有份额比例购入相应比例的股票，极可能导致该比重的变化；资本公积、股票的分割与合并不影响每位股东占公司股份比例。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_22", "q": "在上市公司增资发行方式中，公司发行可转换债券的主要动因是保护原股东的权益及其对公司的控制权。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "可转换公司债券是指其持有者可以在一定时期内按一定比例或价格将之转换成一定数量的另一种证券的证券，通常转化为普通股票，公司发行可转换债券的主要动因是为了【增强证券对投资者的吸引力，能以较低的成本筹集到所需要的资金】。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_23", "q": "甲公司由于经营不善，连年亏损，已连续3年年未能按约分配股息，则持有优先股的股东当年所持每一股优先股的表决权相当于（）股的普通股的表决权。", "c": {"A": "1", "B": "二分之一", "C": "0", "D": "三分之二"}, "a": "A", "an": "公司长期未按约定分配股息，优先股股东恢复到与普通股股东相同的表决权。", "type": "single"}, {"id": "cflue_zc_ch4a.json_24", "q": "根据我国《上市公司证券发行管理办法》规定，不属于上市公司再融资方式的是（）。", "c": {"A": "非公开发行股票", "B": "向原股东配售股份", "C": "发行可转换公司债券", "D": "发行可交换公司债券"}, "a": "D", "an": "我国上市公司再融资的方式主要包括配股、公开增发、非公开发行、可转换公司债券、优先股、公司债券、企业资产证券化等。", "type": "single"}, {"id": "cflue_zc_ch4a.json_25", "q": "上市公司强制退市的原因包括（）。", "c": {"A": "股权分布不合理", "B": "交投不活跃", "C": "存在严重违法违规行为", "D": "市值过低而不再适合公开交易"}, "a": "ABCD", "an": "依照规则要求交投不活跃、股权分布不合理、市值过低而不再适合公开交易的股票应终止交易，特别是对于存在严重违法违规行为的公司，证券交易所可以依法强制其股票退出市场交易。故答案选ABCD。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_26", "q": "下列不属于境外上市外资股的特点的是（）。", "c": {"A": "公司支付股利时以外币计价", "B": "人民币标明股票面值", "C": "记名股票", "D": "外币认购买卖"}, "a": "A", "an": "境外上市外资股，公司向境外上市外资股股东支付股利及其他款项，以【人民币】计价和宣布，以外币支付。", "type": "single"}, {"id": "cflue_zc_ch4a.json_27", "q": "上市公司发生下列（）情形，应当被强制退市。", "c": {"A": "法定期限届满后，上市公司在证券交易所规定的期限内未能披露半年度报告", "B": "上市公司在证券交易所规定期限内，未改正财务会计报告中的重大错报", "C": "上市公司社会公众持股比例不足25%，或者公司股本总额超过人民币4亿元，社会公众持股比例不足公司股份总数的10%", "D": "上市公司连续10个交易日（不含停牌交易日）每日股票收盘价均低于股票面值"}, "a": "ABC", "an": "上市公司发生被强制退市的情形。上市公司连续【20个交易日】（不含停牌交易日）每日股票收盘价均低于股票面值，会被强制退市。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_28", "q": "关于国家股，下列说法错误的是（）。", "c": {"A": "国有股股利收入纳入国有资产经营预算", "B": "国家股不能转让", "C": "国有资产折价入股需按规定进行评估确认", "D": "是国有股权的组成部分"}, "a": "B", "an": "国家股可以转让，但是需要按照国家的有关规定。", "type": "single"}, {"id": "cflue_zc_ch4a.json_29", "q": "下列选项中，应当由保荐机构推荐的有（）。", "c": {"A": "申请上市后公开发行新股", "B": "申请可转换公司债券上市", "C": "公司股票被暂停上市后申请恢复上市", "D": "申请首次公开发行的股票"}, "a": "ABD", "an": "发行人应当就下列事项聘请具有保荐机构资格的证券公司履行保荐职责：（1）首次公开发行股票并上市；（2）上市公司发行新股、可转换公司债券；（3）中国证监会认定的其他情形。", "type": "multi"}, {"id": "cflue_zc_ch4a.json_30", "q": "下列（）股票发行制度直接影响有关参与各方的利益分配。", "c": {"A": "发行方式", "B": "发行定价", "C": "发行监管制度", "D": "发行主体"}, "a": "A", "an": "股票的发行方式直接影响参与各方的利益分配。", "type": "single"}, {"id": "cflue_zc_ch4a.json_31", "q": "代销期满，原股东认购股票的数量未达到拟配售数量的比例为65%时，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "代销期满，原股东认购股票的数量未达到拟配售数量的比例【70%】的，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_32", "q": "首次公开发行股票采用直接定价方式的（）。", "c": {"A": "按发行人和主承销商确定的比例向网上或网下投资者发行", "B": "需进行网下询价", "C": "全部向网下投资者发行", "D": "全部向网上投资者发行"}, "a": "D", "an": "首次公开发行股票采用直接定价方式的，全部向网上投资者发行。", "type": "single"}, {"id": "cflue_zc_ch4a.json_33", "q": "首次公开发行股票，网上投资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的20%。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "网上资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的10%。", "type": "judge"}, {"id": "cflue_zc_ch4a.json_34", "q": "下列关于优先股与普通股、债券的区别的说法，错误的是（）。", "c": {"A": "优先股没有到期的概念，发行人没有偿还本金的压力；而除了永续债券这种特殊的混合证券外，绝大多数债券需要到期还本付息", "B": "普通股股东可全面参与公司的经营管理，享有资产收益、参与重大决策和选择管理者等权利，而优先股股东一般不参与公司的日常经营", "C": "普通股股东除了获取股息收益外，收益来源二级市场价格上涨也是重要的；而优先股的二级市场股价波动相对较小，依靠买卖价差获利的空间也较小", "D": "优先股的股息一般来自税前利润，而债券的利息来自可分配税后利润"}, "a": "D", "an": "优先股的股息一般来自【可分配税后】利润，而债券的利息来自【税前】利润。", "type": "single"}, {"id": "cflue_zc_ch4a.json_35", "q": "核准制是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定的股票发行监管制度。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【注册制】的特点是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定。", "type": "judge"}, {"id": "cflue_zc_ch4b.json_1", "q": "引起股票价格变动的直接原因是（）。", "c": {"A": "公司经营状况的变化", "B": "买卖双方力量强弱的转换", "C": "流动性挤压", "D": "政治因素"}, "a": "B", "an": "引起股票价格变动的直接原因是供求关系的变化或者买卖双方力量强弱的转换。", "type": "single"}, {"id": "cflue_zc_ch4b.json_2", "q": "证券账户信息中的关键信息包括（）。", "c": {"A": "投资者有效身份证明文件及号码", "B": "投资者电话", "C": "投资者地址", "D": "投资者姓名或名称"}, "a": "AD", "an": "证券账户信息中的关键信息包括投资者姓名或名称和投资者有效身份证明文件及号码，其他信息为非关键信息。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_3", "q": "股票理论价值的相关因素包括（）。", "c": {"A": "未来资本利得收入", "B": "必要收益率", "C": "上一期股息收入", "D": "未来股息收入"}, "a": "ABD", "an": "股票及其他有价证券的理论价格就是以一定的【必要收益率】计算出来的未来收入的现值。其中未来收入包括【未来股息收入、资本利得收入】。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_4", "q": "A公司今年的净利润为500万元，折旧（摊销）共计20万元，本期营运资金增加50万元，长期经营性资产增加15万元，偿还债务80万元。因此当年的股权自由现金流为（）万元。", "c": {"A": "365", "B": "405", "C": "335", "D": "375"}, "a": "D", "an": "FCFE=净利润＋折旧＋摊销－营运资金的增加＋长期经营性负债的增加－长期经营性资产的增加－资本性支出＋新增付息债务－债务本金的偿还=500+20-50-15-80=375万元。", "type": "single"}, {"id": "cflue_zc_ch4b.json_5", "q": "做市商制度的特点有（）。", "c": {"A": "证券交易价格由买方和卖方的力量直接决定", "B": "校正买卖指令不均衡现象", "C": "提高流动性，增强市场吸引力", "D": "有效稳定市场，促进市场平衡运行"}, "a": "BCD", "an": "在做市商制度下，证券市场的交易价格是由做市商进行双向报价而产生，不是由卖方和买方的力量直接决定，C错误。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_6", "q": "刘某是S公司的股东，所持有的股票的账面价值为200万元，2018年12月31日，S公司以每10股送2股的形式发放股票股利，送股后，刘某所持股票的账面价值为（）。", "c": {"A": "200万元", "B": "180万元", "C": "240万元", "D": "220万元"}, "a": "A", "an": "发放股票股利不影响股东在公司中占有的权益比例和股票的账面价值，故刘某的账面价值还是200万不变。", "type": "single"}, {"id": "cflue_zc_ch4b.json_7", "q": "某公司拟上市发行股票，已知股票每股面额为1元，按照我国《公司法》要求，该公司的股票发行价格可以是（）。", "c": {"A": "1元", "B": "5.4元", "C": "20元", "D": "0.5元"}, "a": "ABC", "an": "我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_8", "q": "下列股票能被选入沪深300指数的有（）。", "c": {"A": "丁股票为主板上市股票，由于连年亏损被认定为ST股票，但从近期季度财务报告来看，本年有望扭亏为盈。", "B": "丙股票为主板上市的蓝筹股，但是由于政策影响，近期涨势低迷", "C": "甲股票是创业板股票，虽总市值不高，但是涨势良好", "D": "乙股票为主板上市股票，由于年度报告未及时披露等问题，被暂停上市"}, "a": "B", "an": "沪深300指数是由沪深A股中规模大、流动性好、最具代表性的300只股票组成，不能是创业板股票，除非该股票上市以来日均A股总市值在全部沪深A股（非创业板股票）中排在前30位；也不能是ST、*ST股票和暂停上市股票。", "type": "single"}, {"id": "cflue_zc_ch4b.json_9", "q": "沪伦通中的（）是指符合条件的伦交所上市公司在上交所主板上市中国存托凭证。", "c": {"A": "西向业务", "B": "东向业务", "C": "南向业务", "D": "北向业务"}, "a": "B", "an": "沪伦通中的【东向业务】是指符合条件的伦交所上市公司在上交所主板上市中国存托凭证", "type": "single"}, {"id": "cflue_zc_ch4b.json_10", "q": "自然人客户申请开通创业板市场交易，营业部应根据客户是否具有（）以上股票交易经验，分别按不同方式进行管理。", "c": {"A": "一年（含）", "B": "两年（含）", "C": "半年（含）", "D": "三年（含）"}, "a": "B", "an": "自然人客户申请开通创业板市场交易，营业部应根据客户是否具有两年（含）以上股票交易经验，分别按不同方式进行管理。", "type": "single"}, {"id": "cflue_zc_ch4b.json_11", "q": "下列关于证券委托的说法，正确的有（）。", "c": {"A": "柜台委托需由本人填写委托单并签章", "B": "柜台委托必须由委托人亲自到证券营业部交易柜台办理", "C": "证券委托可以分为柜台委托和非柜台委托两大类", "D": "客户在办理委托买卖证券时，需要向证券经纪商下达委托指令"}, "a": "ACD", "an": "柜台委托是指委托人亲自或由其【代理人】到证券营业部交易柜台，根据委托程序和必需的证件采用书面方式表达委托意向，由本人填写委托单并签章的形式，C错误，故选ABD。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_12", "q": "参与上海证券交易所证券买卖的投资者必须事先指定一家会员作为其买卖证券的受托人，通过该会员参与本所市场证券的买卖，这种制度被称为托管制。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【全面指定交易】是指参与上海证券交易所证券买卖的投资者必须实现指定一家会员作为其买卖证券的受托人，通过该会员参与本所市场证券的买卖。", "type": "judge"}, {"id": "cflue_zc_ch4b.json_13", "q": "由于影响股票价格的因素复杂多变，股票的市场价格呈现出（）的特征。", "c": {"A": "复杂性", "B": "稳定性", "C": "波动性", "D": "灵活性"}, "a": "C", "an": "由于影响股票价格的因素复杂多变，股票的市场价格呈现出高低起伏的【波动性】特征。", "type": "single"}, {"id": "cflue_zc_ch4b.json_14", "q": "沪深300指数是中国证券市场中历史最悠久、数据最完整的成分股指数。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【深证成分指数】是中国证券市场中历史最悠久、数据最完整的成分股指数。", "type": "judge"}, {"id": "cflue_zc_ch4b.json_15", "q": "下列行为中，违反了证券交易必须遵守的公正原则的有（）。", "c": {"A": "上市公司的董事长发生变动未向社会披露", "B": "有关部门未严格按要求审批某证券经营机构的设立申请", "C": "内幕交易", "D": "有关部门未严格按要求核准股票的发行和上市申请"}, "a": "BD", "an": "公正原则要求证券监管机构在公开、公平原则的基础上，对一切被监管对象给予公正待遇。根据公正原则，证券立法机构应当制定体现公平精神的法律、法规和政策；证券监管机构应当根据法律授予的权限履行监管职责，以法律为依据，对一切证券市场参与者给予公正的待遇；对证券违法行为的处罚及对证券纠纷事件和争议的处理，都应当公平进行。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_16", "q": "中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。", "type": "judge"}, {"id": "cflue_zc_ch4b.json_17", "q": "根据我国现行的证券交易原则，属于连续竞价时成交价格的确定原则是（）。", "c": {"A": "最高买入申报与最低卖出申报价位相同，不成交", "B": "卖出申报价格低于即时揭示的最高买入申报价格时，以中间价成交", "C": "最高买入申报与最低卖出申报价位相同，以该价格为成交价", "D": "买入申报价格高于即时揭示的最低卖出申报价格时，以中间价成交"}, "a": "C", "an": "连续竞价时，成交价格的确定原则为：1、最高买入申报与最低卖出申报价位相同，以该价格为成交价。2、买入申报价格高于即时揭示的最低卖出申报价格时，以即时揭示的最低卖出申报价格为成交价。3、卖出申报价格低于即时揭示的最高买入申报价格时，以即时揭示的最高买入申报价格为成交价。", "type": "single"}, {"id": "cflue_zc_ch4b.json_18", "q": "关于股票的清算价值，下列说法正确的是（）。", "c": {"A": "公司清算时每一股份所代表的实际价值", "B": "公司破产清算时，其发行的股票的交易价值", "C": "股票清仓时，股票所能获得的出售价值", "D": "股票的清算价值应与账面价值相等"}, "a": "A", "an": "股票的清算价值是公司清算时每一股份所代表的实际价值。从理论上说，股票的清算价值应与账面价值一致，实际上并非如此。只有当清算时公司资产实际出售价款与财务报表上的账面价值一致时，每一股份的清算价值才与账面价值一致。但在公司 、公司并购重组。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_26", "q": "关于股票价格指数编制说法正确的是（）。", "c": {"A": "股票价格指数的基期就是计算平均股价的当日", "B": "选择样本股时，只能选择具有代表性的这部分股票", "C": "指数化时应当将基期平均股价或市值定为100%", "D": "计算计算期平均股价或市值应当作出必要的修正"}, "a": "D", "an": "样本股可以是全部上市股票，也可以是其中有代表性的一部分；股票价格指数的基期是所选取的某一有代表性或者股价相对稳定的日期；计算计算期平均股价或市值应当作出必要的修正；指数化时，基期平均股价或市值定为某一常数（通常为100、1000或者10）。", "type": "single"}, {"id": "cflue_zc_ch4b.json_27", "q": "如果有两个以上申报价格符合集合竞价确定成交价的原则，上海交易所规定的成交价格为（）。", "c": {"A": "行情显示的前收盘价格", "B": "各个价格的平均价格", "C": "使未成交量最小的申报价格", "D": "可实现成交价格的最低价格"}, "a": "C", "an": "集合竞价时，如果有两个以上申报价格符合集合竞价确定成交价的原则，上海证券交易所规定的成交价格为【使未成交量最小的申报价格】。", "type": "single"}, {"id": "cflue_zc_ch4b.json_28", "q": "沪伦通存托凭证业务包括（）两个业务方向。", "c": {"A": "南北", "B": "上下", "C": "左右", "D": "东西"}, "a": "D", "an": "沪伦通，是指上交所与伦交所的互联互通机制。初期从存托凭证起步。沪伦通存托凭证业务包括东西两个业务方向。", "type": "single"}, {"id": "cflue_zc_ch4b.json_29", "q": "竞价的结果不包括（）。", "c": {"A": "不成交", "B": "部分成交", "C": "继续成交", "D": "全部成交"}, "a": "C", "an": "竞价结果有三种可能：全部成交、部分成交、不成交。", "type": "single"}, {"id": "cflue_zc_ch4b.json_30", "q": "在对影响股价变动的行业因素进行分析时发现，手机的普遍采用终结了早期作为移动通信主要方式的传呼机，这对应行业因素中的（）。", "c": {"A": "抗外部冲击的能力", "B": "行业估值水平", "C": "行业竞争结构", "D": "行业可持续性"}, "a": "D", "an": "技术及其他因素的变化有可能终结某些行业的发展，故选B，手机的普遍使用影响到了传呼机的可持续性。", "type": "single"}, {"id": "cflue_zc_ch4b.json_31", "q": "深圳证券交易所在确定深证成份指数的深证成份股指数选取样本成分数时一般考虑的因素包括（）。", "c": {"A": "交易活跃程度", "B": "是否是行业龙头公司", "C": "平均可流动股市值", "D": "平均总市值"}, "a": "ABCD", "an": "选取样本时考虑的因素有：&amp;lt;br&amp;gt;1、上市交易日期的长短；&amp;lt;br&amp;gt;2、上市规模，按每家公司一段时期内的平均总市值和平均可流通股市值计；&amp;lt;br&amp;gt;3、交易活跃程度，按每家公司一段时期总成交金额计。样本调整原则：为保证指数的代表性，必须视上市公司的变动更换成份股；&amp;lt;br&amp;gt;4、行业代表性及其成长性；&amp;lt;br&amp;gt;5、公司的财务状况和经营业绩；&amp;lt;br&amp;gt;6、公司近两年的规范运作情况等。", "type": "multi"}, {"id": "cflue_zc_ch4b.json_32", "q": "关于沪深300指数，以下说法错误的是（）。", "c": {"A": "其成分股原则上每三个月调整一次", "B": "指数计算采用派许加权法", "C": "基点为1000点", "D": "自由流通量是计算沪深300指数时使用的一个重要指标"}, "a": "A", "an": "沪深300指数，是由沪深证券交易所于2005年4月8日联合发布的反映沪深300指数编制目标和运行状况的金融指标，并能够作为投资业绩的评价标准，为指数化投资 20元", "D": "0.5元"}, "a": "ABC", "an": "我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_56", "q": "下列股票能被选入沪深300指数的有（）。", "c": {"A": "丁股票为主板上市股票，由于连年亏损被认定为ST股票，但从近期季度财务报告来看，本年有望扭亏为盈。", "B": "丙股票为主板上市的蓝筹股，但是由于政策影响，近期涨势低迷", "C": "甲股票是创业板股票，虽总市值不高，但是涨势良好", "D": "乙股票为主板上市股票，由于年度报告未及时披露等问题，被暂停上市"}, "a": "B", "an": "沪深300指数是由沪深A股中规模大、流动性好、最具代表性的300只股票组成，不能是创业板股票，除非该股票上市以来日均A股总市值在全部沪深A股（非创业板股票）中排在前30位；也不能是ST、*ST股票和暂停上市股票。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_57", "q": "公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。", "type": "judge"}, {"id": "cflue_paper_金融基础_5.json_60", "q": "上市公司发生下列（）情形，应当被强制退市。", "c": {"A": "法定期限届满后，上市公司在证券交易所规定的期限内未能披露半年度报告", "B": "上市公司在证券交易所规定期限内，未改正财务会计报告中的重大错报", "C": "上市公司社会公众持股比例不足25%，或者公司股本总额超过人民币4亿元，社会公众持股比例不足公司股份总数的10%", "D": "上市公司连续10个交易日（不含停牌交易日）每日股票收盘价均低于股票面值"}, "a": "ABC", "an": "上市公司发生被强制退市的情形。上市公司连续【20个交易日】（不含停牌交易日）每日股票收盘价均低于股票面值，会被强制退市。", "type": "multi"}, {"id": "xs_4781230", "q": "有限售条件股份包括（）。Ⅰ.其他内资持股Ⅱ.国有法人持股Ⅲ.外资持股Ⅳ.国家持股", "c": {"A": "Ⅰ、Ⅲ", "B": "Ⅰ、Ⅱ、Ⅳ", "C": "Ⅱ、Ⅲ", "D": "Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, "a": "D", "an": "", "type": "single"}, {"id": "xs_4781231", "q": "我国境内居民个人可以用（）从事B股交易。Ⅰ.外币现钞Ⅱ.外币现钞存款Ⅲ.从境外汇入的外汇资金Ⅳ.外汇现汇存款", "c": {"A": "Ⅰ、Ⅱ、Ⅲ", "B": "Ⅰ、Ⅲ、Ⅳ", "C": "Ⅰ、Ⅱ、Ⅳ", "D": "Ⅱ、Ⅲ、Ⅳ"}, "a": "D", "an": "", "type": "single"}, {"id": "xs_4781232", "q": "我国《证券法》规定，股份有限公司申请股票上市的条件包括（）。Ⅰ.向社会公开发行的股份达到公司股份总数的25%以上Ⅱ.向社会公开发行的股份达到公司股份总额的15%以上Ⅲ.公司股本总额超过人民币4亿元的，向社会公开发行股份比例为10%以上Ⅳ.公司股本总额超过人民币4亿元的，向社会公开发行股份比例为15%以上", "c": {"A": "Ⅰ、Ⅳ", "B": "Ⅱ、Ⅲ", "C": "Ⅱ、Ⅳ", "D": "Ⅰ、Ⅲ"}, "a": "D", "an": "", "type": "single"}, {"id": "xs_4781233", "q": "下列有关国有股权界定的表述，正确的有（）。Ⅰ.国家授权投资的机构或部门直接向新设成立的股份公司投资形成的股份界定为国家股Ⅱ.有权代表国家投资的机构或部门直接设立的国有企业以其部分资产（连同部分负债）改建为股份公司的界定为国家股Ⅲ.国有企业（行业性总公司和具有政府行政管理职的公司除外）或国有企业（集团公司）的全资子企业（子公司）和控股子企业（控股子公司），以其依法占用的法人资产直接向新设立的股份公司投资入股形成的股份，界定为国有法人股Ⅳ.有权代表国家投资的机构或部门直接设立的国有企业以其全部资产改建为股份有限公司的，原企业应予撤销，原企业的国家净资产折成的股份界定为国家股", "c": {"A": "Ⅰ、Ⅲ", "B": "Ⅰ、Ⅱ、Ⅳ", "C": "Ⅱ、Ⅲ", "D": "Ⅰ、Ⅱ、Ⅲ、Ⅳ"}, "a": "D", "an": "", "type": "single"}, {"id": "xs_4781234", "q": "按照股息在当年未能足额分派时，能否在以后年度补发为依据，优先股可分为（）。Ⅰ.不可赎回优先股Ⅱ.非累积优先股Ⅲ.累积优先股Ⅳ.可赎回优先股", "c": {"A": "Ⅰ、Ⅳ", "B": "Ⅱ、Ⅲ", "C": "Ⅰ、Ⅱ", "D": "Ⅱ、Ⅳ"}, "a": "B", "an": "", "type": "single"}, {"id": "comp_44201", "q": "根据《证券法》，该公司公开发行新股需要满足的条件包括（）。", "c": {"A": "具备健全且运行良好的组织机构", "B": "最近3年财务会计报告被出具无保留意见审计报告", "C": "最近3年累计向原股东配股数量不超过股本总额的30%", "D": "具有持续经营能力"}, "a": "ABD", "an": "根据《证券法》规定，公开发行新股的条件包括：（1）具备健全且运行良好的组织机构；（2）具有持续经营能力；（3）最近3年财务会计报告被出具无保留意见审计报告；（4）发行人及其控股股东、实际控制人最近3年不存在贪污、贿赂等刑事犯罪。选项C是关于配股的限制，不是公开发行新股的法定条件。", "type": "comprehensive", "material": "某上市公司拟公开发行新股募集资金。公司当前总股本10亿股，拟公开发行3亿股。该公司最近3年连续盈利，财务状况良好，符合公开发行条件。发行价格由主承销商通过询价方式确定。", "sub_type": "multi"}, {"id": "comp_04331", "q": "关于股票发行的询价制度，下列说法正确的有（）。", "c": {"A": "首次公开发行股票应当通过向特定机构投资者询价的方式确定发行价格", "B": "主承销商可以向其管理的资产管理产品配售股票", "C": "发行人和主承销商应当事先确定发行方案", "D": "所有投资者都可以参与询价"}, "a": "AC", "an": "选项B错误：主承销商不得向其管理的资产管理产品配售股票，防止利益输送。选项D错误：只有符合条件的专业机构投资者可以参与询价，不是所有投资者。", "type": "comprehensive", "material": "某上市公司拟公开发行新股募集资金。公司当前总股本10亿股，拟公开发行3亿股。该公司最近3年连续盈利，财务状况良好，符合公开发行条件。发行价格由主承销商通过询价方式确定。", "sub_type": "multi"}, {"id": "comp_96530", "q": "该投资者的持有期收益率约为（）。", "c": {"A": "20%", "B": "23%", "C": "3%", "D": "15%"}, "a": "B", "an": "持有期收益率 = [（卖出价 - 买入价）+ 持有期现金股利] / 买入价 × 100% = [（12-10）+ 0.3] / 10 × 100% = 2.3/10 × 100% = 23%。注意这里计算的是绝对收益率，未年化。", "type": "comprehensive", "material": "某投资者以每股10元的价格买入某股票1000股，半年后以每股12元的价格全部卖出。持有期间该股票每股分红0.3元。同期上证指数上涨5%。", "sub_type": "single"}, {"id": "comp_36944", "q": "某公司当前股价20元，每股收益1元，每股净资产10元，该公司的市盈率是（）。", "c": {"A": "20倍", "B": "10倍", "C": "2倍", "D": "30倍"}, "a": "A", "an": "市盈率（P/E）= 股价 / 每股收益 = 20 / 1 = 20倍。市净率（P/B）= 股价 / 每股净资产 = 20 / 10 = 2倍。两者都是常用的相对估值指标，但含义不同。", "type": "comprehensive", "material": "股票估值是投资者判断股票价值的重要方法。常见的估值方法包括市盈率（P/E）法、市净率（P/B）法、股利贴现模型（DDM）和自由现金流贴现模型（DCF）等。", "sub_type": "single"}, {"id": "cflue_zc_ch5a.json_1", "q": "下列关于流通国债的特征，说法错误的是（）。", "c": {"A": "转让价格取决于对该国债的供给与需求", "B": "通常记名", "C": "投资者可以自由认购", "D": "投资者可以自由转让"}, "a": "B", "an": "流通国债的特征有：投资者可以自由认购、自由转让、通常不记名、转让价格取决于对该国债的供给与需求。", "type": "single"}, {"id": "cflue_zc_ch5a.json_2", "q": "下列关于外国债券的说法，正确的是（）。", "c": {"A": "它的特点是债券发行人和面值货币属于同一个国家", "B": "在英国发行以英镑计价的外国债券被称为“扬基债券”", "C": "在中国发行的以人民币计价的外国债券被称为“熊猫债券”", "D": "是借款人在本国以外的某一国家发行以本国货币为面值的债券"}, "a": "C", "an": "外国债券是指某一国家借款人在本国以外的某一国家发行以该国货币为面值的债券。它的特点是债券发行人属于一个国家，债券的面值货币和发行市场属于另一个国家。如在英国发行以英镑计价的外国债券被称为“猛犬债券”。", "type": "single"}, {"id": "cflue_zc_ch5a.json_3", "q": "下列关于债券的说法，错误的是（）。", "c": {"A": "实物债券是一种具有标准格式实物券面的债券", "B": "凭证式债券是由债券发行人制定的标准格式的债券", "C": "我国的凭证式国债券面上不印刷票面金额", "D": "发行人可以利用证券交易所的交易系统发行记账式债券"}, "a": "B", "an": "凭证式债券的形式是债权人认购债券的一种收款凭证，而不是债券发行人制定的标准格式的债券。故A说法错误。", "type": "single"}, {"id": "cflue_zc_ch5a.json_4", "q": "（）是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。", "c": {"A": "商业银行金融债券", "B": "商业银行一般债券", "C": "商业银行次级债券", "D": "商业银行资本补充债券"}, "a": "D", "an": "【商业银行资本补充债券】是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_5", "q": "关于储蓄国债（电子式）的说法中，错误的是（）", "c": {"A": "收益安全稳定，由财政部负责还本付息，免缴利息税", "B": "付息方式较为多样", "C": "采用实名制，不可流通转让", "D": "针对个人投资者，同时也向机构投资者发行"}, "a": "D", "an": "储蓄国债（电子式）是2006年推出的国债新品种，其特点：针对个人投资者，不向机构投资者发行；采用实名制，不可流通转让；收益安全稳定，由财政部负责还本付息，免缴利息税；鼓励持有到期，手续简化；付息方式较为多样", "type": "single"}, {"id": "cflue_zc_ch5a.json_6", "q": "下列属于金融债券品种的有（）。", "c": {"A": "证券公司债券", "B": "政策性金融债券", "C": "保险公司次级债", "D": "商业银行债券"}, "a": "ABCD", "an": "我国金融债券品种包括：政策性金融债券、商业银行债券、证券公司债券、保险公司次级债务、财务公司债券、金融租赁公司和汽车金融公司的金融债券。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_7", "q": "债券与股票的不同之处包括（）。", "c": {"A": "期限不同", "B": "收益不同", "C": "目的不同", "D": "权利不同"}, "a": "ABCD", "an": "债券与股票的区别：权利不同；目的不同；主体不同；期限不同；收益不同；风险不同。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_8", "q": "资产证券化运作流程中，发起人的职责不包括（）。", "c": {"A": "根据证券化目标确定资产数，并将资产汇集形成资产池", "B": "判断组合的现金流水平，并决定借款人信用、抵押担保贷款的抵押价值", "C": "根据自身的资产证券化融资要求，确定资产证券化目标", "D": "与银行达成必要时提供流动性支持的周转协议，与券商达成承销协议"}, "a": "D", "an": "发起人（一般是发放贷款的金融机构，也被称为原始权益人）根据自身的资产证券化融资要求，确定资产证券化目标，对自己拥有的能够产生未来现金收入流的信贷资产进行清理、估算和考核，根据历史经验数据对整个组合的现金流的平均水平有一个基本判断，决定借款人信用、抵押担保贷款的抵押价值等；并将应收和可预见现金流资产进行组合，对现金流的重组可按贷款的期限结构、本金和利息的重新安排或风险的重新分配等进行，根据证券化目标确定资产数，最后将这些资产汇集形成一个资产池。C选项是特设信托机构的职责。", "type": "single"}, {"id": "cflue_zc_ch5a.json_9", "q": "下列关于欧洲债券的说法中有误的是（）。", "c": {"A": "大多数欧洲债券是以美元为面值发行的", "B": "欧洲债券不可以在欧洲以外的国家发行", "C": "由于这种发行方式最早出现在欧洲，故被称为欧洲债券", "D": "指在本国境外市场发行的、不以发行市场所在国货币为面值的国际债券"}, "a": "B", "an": "欧洲债券可以在欧洲以外的国家发行，同时其发行面值也可以以欧元之外的其他货币来表示。", "type": "single"}, {"id": "cflue_zc_ch5a.json_10", "q": "根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为（）。", "c": {"A": "离岸资产证券化", "B": "在岸资产证券化", "C": "境内资产证券化", "D": "境外资产证券化"}, "a": "AC", "an": "根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为境内资产证券化和离岸资产证券化。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_11", "q": "下列关于证券公司债券的说法，正确的有（）。", "c": {"A": "非公开发行的公司债券仅限于合格投资者范围内转让", "B": "非公开发行的证券公司债券，每次发行对象不得超过二百人", "C": "对证券公司债券发行有强制性担保要求", "D": "证券公司债券公开发行的利率由询价或公开招标等市场化方式确定"}, "a": "ABD", "an": "对证券公司债券发行没有强制性担保要求，D错误。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_12", "q": "下列关于国债按资金用途分类，说法正确的有（）。", "c": {"A": "特种国债是指政府为了实施某种特殊政策而发行的国债", "B": "战争国债专指用于弥补战争费用的国债", "C": "建设国债是指发债筹措的资金用于建设项目的国债", "D": "赤字国债是指用于弥补政府预算赤字的国债"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_13", "q": "小王报名参加了今年的证券从业资格考试，在复习《金融市场基础知识》的时候，对政府债券的有关知识出现了疑惑。请帮他选出下列有关政府债券的说法中，不正确的说法是（）。", "c": {"A": "国债的利息收入可免纳个人所得税", "B": "在各类债券中，政府债券的信用等级并非最高", "C": "购买政府债券，是一种较安全的投资选择", "D": "发达的二级市场为政府债券的转让提供了方便，使其流通性大大增强"}, "a": "B", "an": "在各类债券中，政府债券的信用等级是最高的。", "type": "single"}, {"id": "cflue_zc_ch5a.json_14", "q": "根据付息方式不同，国债可分为（）。", "c": {"A": "特种国债", "B": "长期国债", "C": "附息国债", "D": "贴现国债"}, "a": "CD", "an": "按付息方式分类，国债分为贴现国债和附息国债。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_15", "q": "根据我国财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的，约定一定期限内主要以（）还本付息的政府债券。", "c": {"A": "中央政府收入", "B": "专项收入", "C": "金融机构收入", "D": "政府性基金"}, "a": "BD", "an": "根据财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的、约定一定期限内以公益性项目对应的【政府性基金或专项收入】还本付息的政府债券。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_16", "q": "地方政府债券按资金用途和偿还资金来源不同可以分为普通债券、特种债券。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "地方政府债券按资金用途和偿还资金来源不同，通常可以分为一般债券（普通债券）和专项债券（收入债券）。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_17", "q": "按信用状况，债券可以分为（）和（）。", "c": {"A": "企业债；政府债", "B": "普通公司债；可转换公司债", "C": "国债；地方政府债", "D": "利率债；信用债"}, "a": "D", "an": "按信用状况，债券可以分为利率债和信用债，在我国，狭义的利率债包括国债和地方政府债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_18", "q": "规定了票面利率、在到期时一次性获得本息、存续期间没有利息支付的债券，称之为附息债券。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "根据债券发行条款中是否规定在约定期限向债券持有人支付利息，债券可分为贴现债券、附息债券、息票累积债券三类。其中，息票累积债券规定了票面利率，但是，债券持有人必须在债券到期时一次性获得本息，存续期间没有利息支付。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_19", "q": "可交换债券与可转换公司债券的相同之处有（）。", "c": {"A": "投资价值与上市公司价值无关", "B": "发行要素相似", "C": "都包括票面利率、期限、转股价格和转股比率、转股期限等", "D": "在约定期限内都可以以约定的价格交换为标的股票"}, "a": "BCD", "an": "对投资者来说，可交换债券与持有标的上市公司的可转换公司债券相同，投资价值与上市公司价值相关，在约定期限内可以以约定的价格交换为标的的股票。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_20", "q": "与国内债券相比，国际债券具有（）等特点。", "c": {"A": "发行规模大", "B": "存在汇率风险", "C": "存在信用风险", "D": "资金来源广"}, "a": "ABD", "an": "与国内债券相比，国际债券具有：&amp;lt;br&amp;gt;1、资金来源广、发行规模大；&amp;lt;br&amp;gt;2、存在汇率风险；&amp;lt;br&amp;gt;3、有国家主权保障；&amp;lt;br&amp;gt;4、以自由兑换货币作为计量货币。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_21", "q": "以下（）不是我国其他类型国债的种类。", "c": {"A": "保值债券", "B": "普通债券", "C": "财政债券", "D": "国家重点建设债券"}, "a": "B", "an": "我国其他类型国债的种类有：国家重点建设债券、国家建设债券、财政债券、特种债券、保值债券、基本建设债券、特别国债、长期建设国债。", "type": "single"}, {"id": "cflue_zc_ch5a.json_22", "q": "传统的证券发行是以企业为基础，而资产证券化是以特定的资产池为基础发行证券。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "资产证券化是以【特定资产组合或特定现金流】为支持，发行可交易证券的一种融资形式。传统的证券发行是以【企业】为基础，而资产证券化是以【特定的资产池】为基础发行证券。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_23", "q": "有关私募债券的发行对象，说法有误的是（）。", "c": {"A": "私募债券募集对象为有限数量的专业投资机构", "B": "私募公司债的发行对象为合格投资者", "C": "私募债券可以采取公开制度向合格投资者发行债券", "D": "私募公司债每次发行对象不得超过200人"}, "a": "C", "an": "私募债券采取【非公开制度】向合格投资者发行债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_24", "q": "通常，零息债券以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "根据债券发行条款中是否规定在约定期限向债券持有入支付利息，债券可分为零息债券、附息债券和息票累积债券。其中，【零息债券】以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_25", "q": "下列关于债券的说法，正确的有（）。", "c": {"A": "零息债券发行价高于票面面值", "B": "债券估值的基本原理就是现金流贴现", "C": "附息债券可以视为一组零息债券的组合", "D": "累息债券可以视为面值等于到期还本付息额的零息债券"}, "a": "BCD", "an": "零息债券发行价【低于】票面面值，B错误。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_26", "q": "地方政府债券是地方政府根据本地区（）状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。", "c": {"A": "财政预算", "B": "经济发展", "C": "社会保障", "D": "资金需求"}, "a": "BD", "an": "地方政府根据本地区【经济发展和资金需求】状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_27", "q": "关于利率债和信用债，下列说法有误的是（）。", "c": {"A": "信用债券与政府债券相比最显著的差异是发行期限不同", "B": "信用债比国债有着更高的收益", "C": "正常情况下，利率债的信用风险较大", "D": "利率债可能出现本息兑付延期乃至实质性违约的情况"}, "a": "AC", "an": "由于有政府信用背书，正常情况下利率债的信用风险很小，但不一定对于信用违约绝对“免疫”，也可能出现本息兑付延期乃至实质性违约的情况。信用债券与政府债券相比最显著的差异就是存在信用风险。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_28", "q": "按发行主体分类，债券可以分为（）。", "c": {"A": "零息债券、附息债券和息票累积债券", "B": "实物债券、凭证式债券和记账式债券", "C": "短期债券、中期债券和长期债券", "D": "政府债券、金融债券和公司债券"}, "a": "D", "an": "债券种类很多，依据不同的标准有不同分类。按发行主体，债券可以分为政府债券、金融债券和公司债券；按付息方式，债券可以分为零息债券、附息债券和息票累积债券；按债券形态，债券可以分为实物债券、凭证式债券和记账式债券；按期限长短，债券可以分为短期债券、中期债券和长期债券。", "type": "single"}, {"id": "cflue_zc_ch5a.json_29", "q": "地方政府一般债券的发行主体可以有（）。", "c": {"A": "自治区政府", "B": "直辖市政府", "C": "省政府", "D": "县级政府"}, "a": "ABC", "an": "地方政府一般债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为没有收益的公益性项目发行的、约定一定期限内主要以一般公共预算收入还本付息的政府债券。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_30", "q": "关于可交换公司债券与可转换公司债券的不同之处包括（）。", "c": {"A": "参与主体不同", "B": "交割方式不同", "C": "适用的法规不同", "D": "条款设置不同"}, "a": "ABCD", "an": "可交换公司债券与可转换公司债券的不同之处有：发债主体和偿债主体不同、适用的法规不同、发行目的不同、所换股份的来源不同、股权稀释效应不同、交割方式不同、条款设置不同。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_31", "q": "从基本性质上理解，债券属于（）。", "c": {"A": "商品证券", "B": "虚拟资本", "C": "证权证券", "D": "有价证券"}, "a": "BCD", "an": "债券有以下基本性质：①债券属于有价证券；②债券是一种虚拟资本；③债券是债权（证权）的表现。债券代表债券投资者的权利，这种权利不是直接支配财产权，也不以资产所有权表现，而是一种债权。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_32", "q": "企业资产证券化的基础资产可以有（）。", "c": {"A": "棚户区改造", "B": "租赁资产", "C": "基础设施收费权", "D": "小额贷款"}, "a": "ABCD", "an": "企业资产证券化的基础资产可以有BT/BOT债权、基础设施收费权、棚户区改造、入园凭证收费、小额贷款、租赁资产等。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_33", "q": "关于公司债券的分类，下列说法正确的有（）。", "c": {"A": "按是否记名分为记名公司债券和不记名公司债券", "B": "按内含选择权的不同分为可转换公司债券、附认股权证的公司债券、可交换公司债券", "C": "按担保抵押情况分为信用债券、不动产抵押公司债券", "D": "按付息方式不同分为普通公司债券和收益公司债券"}, "a": "ABD", "an": "按不同的标准，公司债券可以划分为很多种类。按担保抵押情况分为信用债券、不动产抵押公司债券、保证公司债券。A错误。", "type": "multi"}, {"id": "cflue_zc_ch5a.json_34", "q": "记账式国债交易手续繁琐。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "记账式国债可以记名、挂失，安全性较高，同时由于记账式债券的发行和交易均无纸化，所以发行时间短，发行效率高，【交易手续简便】，成本低，交易安全。", "type": "judge"}, {"id": "cflue_zc_ch5a.json_35", "q": "下列关于中央银行票据的说法，有误的是（）。", "c": {"A": "中央银行票据实质是中央银行债券", "B": "期限通常在6个月到3年", "C": "发行它的目的主要是进行对冲操作，回收外汇占款所投放的基础货币", "D": "具有短期性的特点"}, "a": "B", "an": "中央银行票据的期限通常在3个月到3年。", "type": "single"}, {"id": "cflue_zc_ch5b.json_1", "q": "下列关于债券价值的说法，错误的是（）。", "c": {"A": "付息间隔越短的债券，风险相对越小", "B": "债券条款中包含发行人提前赎回权不会影响债券价值", "C": "短期债券一般到期一次性还本，因此要折价交易", "D": "免税债券与可比的纳税债券相比价值更大"}, "a": "B", "an": "凡是有利于发行人的条款都会相应降低债券价值；反之，有利于持有人的条款则会提高债券价值。", "type": "single"}, {"id": "cflue_zc_ch5b.json_2", "q": "银行业金融机构发行资本补充债券，应满足的条件不包括（）。", "c": {"A": "偿债能力良好，且成立满一年", "B": "具有完善的公司治理机制", "C": "经营稳健，资产结构符合行业特征", "D": "遵守国家产业政策和信贷政策"}, "a": "A", "an": "根据中国人民银行2018年第3号公告，银行业金融机构发行资本补充债券，应满足以下条件：具有完善的公司治理机制；偿债能力良好，且成立满【三年】；经营稳健，资产结构符合行业特征，以服务实体经济为导向，遵守国家产业政策和信贷政策；满足宏观审慎管理要求，且主要金融监管指标符合监管部门的有关规定。", "type": "single"}, {"id": "cflue_zc_ch5b.json_3", "q": "一般来说，具有高度流动性的债券同时也是较安全的，因为它不仅可以迅速地转换为货币，还可以按一个较稳定的价格转换。关于债券不能收回投资的风险的说法有误的是（）。", "c": {"A": "政府债券不履行债务的风险较高", "B": "不同的债务人不履行债务的风险程度是不一样的", "C": "债务人不履行债务导致债券不能收回投资", "D": "市场利率水平影响债券的转让价格"}, "a": "A", "an": "一般来说，政府债券不履行债务的风险最低，D说法错误。", "type": "single"}, {"id": "cflue_zc_ch5b.json_4", "q": "下列关于债券贴现率的说法，正确的有（）。", "c": {"A": "信用债的风险溢价一般比浮动利率债的风险溢价低", "B": "债券贴现率是投资者对债券要求的最低回报率", "C": "一般用相同期限零息国债的到期收益率来近似表示名义无风险收益率", "D": "债券必要回报率=真实无风险收益率+预期通货膨胀率+风险溢价"}, "a": "BCD", "an": "信用债的风险溢价一般比浮动利率债的风险溢价高，D错误。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_5", "q": "证券公司发行短期融资券实行余额管理，待偿还短期融资券余额不超过净资本的（），在此范围内，证券公司自主确定每期短期融资券的发行规模。", "c": {"A": "50%", "B": "70%", "C": "40%", "D": "60%"}, "a": "D", "an": "证券公司发行短期融资券实行余额管理，待偿还短期融资券余额不超过净资本的60%，在此范围内，证券公司自主确定每期短期融资券的发行规模。", "type": "single"}, {"id": "cflue_zc_ch5b.json_6", "q": "2018年3月6日，某年息5%、面值100元、每半年付息1次的1年期债券，上次付息为2017年12月31日。如市场净价报价为97元，按30/180计算，实际支付价格为（）元。", "c": {"A": "97.9", "B": "98.05", "C": "97.88", "D": "97.51"}, "a": "A", "an": "30/180即每半年付息1次，按每月30天计算。累计天数（算头不算尾）=30天（1月）+30天（2月）+5天（3月）=65天。累计利息=100×5%÷2×65/180≈0.9。实际支付价格=97+0.9=97.90（元）。", "type": "single"}, {"id": "cflue_zc_ch5b.json_7", "q": "影响债券现金流的因素包括（）。", "c": {"A": "计付息间隔", "B": "债券的税收待遇", "C": "票面利率", "D": "债券的嵌入式期权条款"}, "a": "ABCD", "an": "债券发行条款规定了债券的现金流，具体包括：①债券的面值和票面利率；②计付息间隔；③债券的嵌入式期权条款；④债券的税收待遇；⑤其他因素。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_8", "q": "在面向机构投资者非公开发行项目收益债券时，需要满足的要求有（）。", "c": {"A": "单笔认购不少于500万元人民币", "B": "所募集的资金可以用来置换项目资本金或偿还与项目有关的其他债务", "C": "债项评级达AAA级以上", "D": "每次发行时认购的机构投资者不超过200人"}, "a": "AD", "an": "非公开发行的项目收益债券的债项评级达【AA级】以上。所募集的资金【不可以】用来置换项目资本金或偿还与项目有关的其他债务。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_9", "q": "2011年1月1日，中国人民银行发行1年期零息债券，每张面值为100元人民币。年贴现率为4%，则在2011年6月30日，其理论价格为（）元。", "c": {"A": "95.13", "B": "94.89", "C": "98.04", "D": "96.15"}, "a": "C", "an": "理论价格=100/（1+4%）^0.5=98.04（元）。", "type": "single"}, {"id": "cflue_zc_ch5b.json_10", "q": "公司债券的发行申报在中国证监会收到申请文件后，（）个工作日内决定是否受理。", "c": {"A": "10", "B": "7", "C": "5", "D": "3"}, "a": "C", "an": "我国公司债券和企业债券在发行申报程序方面的不同之处。公司债券的发行申报在中国证监会收到申请文件后，5个工作日内决定是否受理。", "type": "single"}, {"id": "cflue_zc_ch5b.json_11", "q": "在债券的以收益率为标的的美式招标发行方式中，各中标者（）。", "c": {"A": "认购成本不同", "B": "中标收益率相同", "C": "到期收益率不同", "D": "中标价格单一"}, "a": "AC", "an": "以收益率为标的的美式招标，是以募满发行额为止的中标者所投标的各个价位上的中标收益率作为中标者各自的最终中标收益率（中标收益率不同），各中标者的认购成本是不相同的。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_12", "q": "发行人不得认购或变相认购自己发行的金融债券。发行人应在中国人民银行核准金融债券发行之日起（）内开始发行金融债券，并在规定期限内完成发行。", "c": {"A": "30个工作日", "B": "60个工作日", "C": "10个工作日", "D": "15个工作日"}, "a": "B", "an": "发行人不得认购或变相认购自己发行的金融债券。发行人应在中国人民银行核准金融债券发行之日起【60个工作日】内开始发行金融债券，并在规定期限内完成发行。", "type": "single"}, {"id": "cflue_zc_ch5b.json_13", "q": "根据《全国银行间债券市场金融债券发行管理办法》，商业银行发行金融债券应具备的条件有（）。", "c": {"A": "最近三年没有重大违法、违规行为", "B": "最近三年连续盈利", "C": "核心资本充足率不低于3%", "D": "实行贷款五级分类，贷款五级分类偏差小"}, "a": "AB", "an": "根据《全国银行间债券市场金融债券发行管理办法》，商业银行发行金融债券应具备的条件有：具有良好的公司治理机制；核心资本充足率不低于4%；最近三年连续盈利；贷款损失准备计提充足；风险监管指标符合监管机构的有关规定；最近三年没有重大违法、违规行为；中国人民银行要求的其他条件。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_14", "q": "交易所市场发行国债的分销时，下列说法正确的是（）。", "c": {"A": "证券交易所为同一期（次）国债向不同承销商提供同一承销代码", "B": "投资者通过交易所买入债券时，缴纳佣金", "C": "通过证券交易所交易后，国债不会自动过户到客户的账户内", "D": "在实际运作中，承销商可以选择场内挂牌分销或场外分销两种方式"}, "a": "D", "an": "证券交易所为每一承销商确定当期国债【各自的承销代码】，以便于场内挂牌。B错误。投资者在买入债券时，可免缴佣金，C错误。买卖成交后，客户认购的国债自动过户至客户的账户内，D错误。", "type": "single"}, {"id": "cflue_zc_ch5b.json_15", "q": "债券成交的竞价方式包括（）。", "c": {"A": "计算机终端申报", "B": "电话申报", "C": "板牌竞价", "D": "口头报唱"}, "a": "ACD", "an": "债券在交易所的竞价方式包括口头报唱、板牌竞价以及计算机终端申报竞价。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_16", "q": "与现券交易相比，远期交易的特点主要表现在以下（）方面。", "c": {"A": "远期交易的买卖双方进行商品交收或交割的时间与达成交易的时间，通常有较长的时间间隔", "B": "远期交易存在价格风险，价格会随着时间的推移而变动", "C": "远期交易买卖双方必须签订远期合同", "D": "远期交易通过正式谈判，双方达成一致后签订合同才算成立"}, "a": "ACD", "an": "注意远期交易的货款早已谈妥，不会随时间的推移而改变，无价格风险。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_17", "q": "商业银行公开发行次级债券应具备的条件不包括下列（）。", "c": {"A": "核心资本充足率不低于4%", "B": "贷款损失准备计提充足", "C": "实行贷款五级分类", "D": "最近三年没有重大违法、违规行为"}, "a": "A", "an": "公开发行次级债券核心资本充足率不低于5%，私募方式发行次级债券核心资本充足率不低于4%。", "type": "single"}, {"id": "cflue_zc_ch5b.json_18", "q": "下列有关信用增级机构的说法，正确的有（）。", "c": {"A": "信用增级可以通过内部增级和外部增级", "B": "第三方信用增级机构包括政府机构、保险公司等", "C": "信用增级机构向投资者收取租赁费用", "D": "信用增级机构在证券违约时不承担赔偿责任"}, "a": "AB", "an": "信用增级机构是指资产证券化交易各方之外的外部第三方信用提供者。一般是在内部信用增级无法达到所需的发行评级时才需要外部信用增级机构提供信用支持。信用增级分为内部增级和外部增级。信用增级机构负责提升证券化产品的信用等级，因此要向【特定目的机构收取】相应费用，并在证券违约时【承担】赔偿责任。第三方信用增级机构包括：政府机构、保险公司、金融担保公司、银行、大型企业的财务公司等。举例：咪鸭教育向银行贷款，企业信用不够，可找担保公司担保，支付担保费。当咪鸭教育不能按期偿付银行贷款时，银行可要求担保公司代为偿付；常见的如：责任保险、企业担保、信用证等。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_19", "q": "关于债券的到期期限，下列说法错误的是（）。", "c": {"A": "各种债券的偿还期限都是相同的", "B": "习惯上有短期债券、中期债券和长期债券之分", "C": "债券到期期限是债券发行人承诺履行合同义务的全部时间", "D": "债券到期期限是指债券从发行之日起至清偿本息之日止的时间"}, "a": "A", "an": "各种债券有不同的偿还期限，短则几个月，长则几十年，并非偿还期限都是相同的。", "type": "single"}, {"id": "cflue_zc_ch5b.json_20", "q": "全国银行间市场买断式回购的（）由交易双方确定。", "c": {"A": "回购债券数量", "B": "债券面值", "C": "到期交易净价", "D": "首期交易净价"}, "a": "ACD", "an": "全国银行间市场买断式回购以净价交易，全价结算。买断式回购的首期交易净价、到期交易净价和回购债券数量由交易双方确定，但到期交易净价加债券在回购期间的新增应计利息应大于首期交易净价。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_21", "q": "下列关于债券信用等级含义的说法中，错误的是（）。", "c": {"A": "银行间债券市场长期债券信用等级AA级表示：偿还债务的能力很强，受不利经济环境的影响不大，违约风险很低", "B": "银行间债券市场短期债券信用等级A-2级表示：还本付息能力较强，安全性较高", "C": "银行间债券市场短期债券信用等级C级表示：还本付息能力很低，违约风险较高", "D": "银行间债券市场长期债券信用等级BBB级表示：偿还债务能力一般，受不利经济环境影响较大，违约风险较高"}, "a": "D", "an": "银行间债券市场长期债券信用等级BBB级表示：偿还债务能力一般，受不利经济环境影响较大，违约风险【一般】。", "type": "single"}, {"id": "cflue_zc_ch5b.json_22", "q": "公开发行的证券公司债券，可以在（）上市交易或转让。", "c": {"A": "证券交易所", "B": "银行间债券市场", "C": "中证机构间报价系统", "D": "全国中小企业股份转让系统"}, "a": "AD", "an": "公开发行公司债券并在证券交易所、全国中小企业股份转让系统交易或转让，非公开发行公司债券并按照规定承销或自行销售、或在证券交易所、全国中小企业股份转让系统、机构间私募产品报价与服务系统、证券公司柜台转让的。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_23", "q": "公司在发行不动产抵押公司债券时通常用做抵押的有（）。", "c": {"A": "土地", "B": "房屋", "C": "有价证券", "D": "艺术品"}, "a": "AB", "an": "不动产抵押公司债券是以公司的不动产（如房屋、土地等）作抵押而发行的债券，是抵押证券的一种。", "type": "multi"}, {"id": "cflue_zc_ch5b.json_24", "q": "目前我国企业债券发行实行（），公司债券公开发行执行中国证监会（）。", "c": {"A": "注册制，审批制", "B": "核准制，注册制", "C": "审批制，核准制", "D": "注册制，注册制"}, "a"
