var ALL_QUESTIONS = [{"id":"cflue_zc_ch1.json_1","q":"期限在1年以上的资金的跨国流动是国际长期资金流动。（）","c":{"A":"错","B":"对"},"a":"B","an":"国际长期资金流动，是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷三种形式。","type":"judge"},{"id":"cflue_zc_ch1.json_2","q":"根据市场组织方式，证券市场可以分为（）。","c":{"A":"场外市场","B":"发行市场","C":"流通市场","D":"交易所市场"},"a":"AD","an":"按组织方式分为交易所市场和场外交易市场。","type":"multi"},{"id":"cflue_zc_ch1.json_3","q":"直接融资与间接融资的区别主要在于资金需求者与供给者是否直接形成债权债务关系。（）","c":{"A":"错","B":"对"},"a":"B","an":"直接融资与间接融资的区别主要在于资金需求者与供给者【是否直接形成债权债务关系】。直接融资的特点包括直接性、分散性、融资的信誉有较大的差异性、部分融资方式具有不可逆性、融资者有相对较强的自主性。间接融资的特点包括资金获得的间接性、融资的相对集中性、融资信誉的差异性相对较小、全部具有可逆性（即可返还性）、融资的主动权主要掌握在金融机构手中。","type":"judge"},{"id":"cflue_zc_ch1.json_4","q":"下列关于金融市场的说法，错误的是（）。","c":{"A":"金融市场是政府调控经济的一个主要渠道","B":"金融市场的发展可以促成厂商“正常存货投资”的减少","C":"金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联","D":"金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"},"a":"B","an":"金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。","type":"single"},{"id":"cflue_zc_ch1.json_5","q":"股票市场融资的特点有（）。","c":{"A":"可以退股","B":"保证收益","C":"可以转让","D":"无须退还本金"},"a":"CD","an":"股票市场融资无须退还本金、售出的股票只能转让，不能退股，也不保证收益，但如果企业盈利，股票持有人享受企业盈余的分配权。","type":"multi"},{"id":"cflue_zc_ch1.json_6","q":"金融市场的重要性主要体现在（）。","c":{"A":"优化资源配置","B":"宏观调控","C":"促进储蓄-投资转化","D":"风险管理"},"a":"ABC","an":"金融市场的重要性主要体现在：促进储蓄—投资转化、优化资源配置、反映经济状态和宏观调控。","type":"multi"},{"id":"cflue_zc_ch1.json_7","q":"间接融资相对集中于银行或非银行金融机构，国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，一些国家还实行了存款保险制度，这反映出间接融资具有资金获得的间接性的特点。（）","c":{"A":"错","B":"对"},"a":"A","an":"【融资信誉的差异性相对较小】：间接融资相对集中于银行或非银行金融机构，由于国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，加上一些国家实行了存款保险制度，相对于直接融资来说，间接融资的信誉程度高，风险也相对较小，融资的稳定性较强。","type":"judge"},{"id":"cflue_zc_ch1.json_8","q":"下列关于直接融资对金融市场的影响的说法，正确的有（）。","c":{"A":"发展多种股权融资方式并不能够弥补间接融资的不足","B":"提高直接融资比重，可以起到分散过度集中于银行的金融风险作用","C":"直接融资占比反映了一国金融体系风险及风险分布情况","D":"直接融资与间接融资的比例可以反映一国金融体系配置的效率是否与实体经济相匹配"},"a":"BCD","an":"我国正处于转变经济发展方式、调整产业结构的经济转型期，在这个过程中提高直接融资比重，特别是发展多种股权融资方式【能够】弥补间接融资的不足，也有利于提高实体经济的健康稳定发展。C错误。","type":"multi"},{"id":"cflue_zc_ch1.json_9","q":"金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡。这是金融市场的价格发现功能。（）","c":{"A":"错","B":"对"},"a":"B","an":"金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡，这也被称为【价格发现】过程。","type":"judge"},{"id":"cflue_zc_ch1.json_10","q":"OTC是芝加哥期权交易所的简称。（）","c":{"A":"错","B":"对"},"a":"A","an":"柜台市场（OTC）又称场外交易市场、店头交易市场，指在证券交易所以外进行证券交易的广泛市场。","type":"judge"},{"id":"cflue_zc_ch1.json_11","q":"下列关于直接融资与间接融资区别的说法，正确的有（）。","c":{"A":"直接融资和间接融资在可逆性上存在一定的差异，间接融资全部具有可逆性，而直接融资则不一定","B":"间接融资的主动权主要掌握在金融中介机构手中，而直接融资中的投资者和融资者则有相对较强的自主性","C":"一般认为，直接融资活动从时间上要晚于间接融资活动","D":"直接融资和间接融资的区别主要在于融资过程中资金的需求者和资金的供给者是否直接形成债权债务关系"},"a":"ABD","an":"一般认为，直接融资活动从时间上早于间接融资，A错误；","type":"multi"},{"id":"cflue_zc_ch1.json_12","q":"根据国际货币基金组织的《金融稳健指标编制指南》，不属于全球金融体系的参与者的是（）。","c":{"A":"中央银行","B":"为住户服务的非营利机构，包括由政府部门控制和提供资金支持的机构","C":"建房互助协会","D":"租赁公司"},"a":"B","an":"根据国际货币基金组织的《金融稳健指标编制指南》，全球金融体系的主要参与者包括金融公司（含建房互助协会）、非金融公司、住户、为住户服务的非营利机构、广义政府、公共部门。为住户服务的非营利机构。为住户服务的非营利机构的主要活动是向住户和社会提供免费的或价格不具有经济意义的商品或服务，【不包括】由政府部门控制和提供资金支持的机构。","type":"single"},{"id":"cflue_zc_ch1.json_13","q":"下列属于资本市场的有（）。","c":{"A":"大额可转让存单市场","B":"中长期国债市场","C":"银行间同业拆借市场","D":"股票市场"},"a":"BD","an":"资本市场包括：股票市场、中长期国债市场、中长期银行存款市场等。","type":"multi"},{"id":"cflue_zc_ch1.json_14","q":"金融资产的持有者为了资金安全而进行资金调拨所形成的国际资金流动被称为（）。","c":{"A":"国际间接投资","B":"投机性资金流动","C":"保值性资金流动","D":"盈利性资金流动"},"a":"C","an":"套利性（盈利性）资金的流动是利用各国金融市场上利率差异与汇率差异进行套利活动而引起的短期资本流动。保值性资金的流动又称作避险性资金流动或资本外逃，它是指金融资产的持有者为了资金安全而进行资金调拨所形成的短期资金流动。投机性资金的流动是指投资者利用国际市场上金融资产或商品价格的波动，进行高抛低吸而形成的资金流动。","type":"single"},{"id":"cflue_zc_ch1.json_15","q":"股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式是（）。","c":{"A":"风险投资融资","B":"民间借贷","C":"债券市场融资","D":"股票市场融资"},"a":"D","an":"【股票市场融资】是股份制企业以让渡一定的企业经营控制权、收益分配权和剩余索取权而获得企业经营资金的一种方式","type":"single"},{"id":"cflue_zc_ch1.json_16","q":"下列属于场外交易市场的有（）。","c":{"A":"证券交易所","B":"黄金市场","C":"拆借市场","D":"期货交易所"},"a":"BC","an":"银行信贷市场、拆借市场、外汇市场、黄金市场等市场传统上比较松散，通常没有固定的交易场所，也不一定有统一的交易时间，属于场外市场。","type":"multi"},{"id":"cflue_zc_ch1.json_17","q":"下列各项中，不属于间接融资特点的是（）。","c":{"A":"融资信誉的差异性相对较小","B":"融资者具有相对较强的自主性","C":"全部具有可逆性","D":"融资的相对集中性"},"a":"B","an":"间接融资的特点：1、资金获得的间接性；2、融资的相对集中性；3、融资信誉的差异性相对较小；4、全部具有可逆性（即可返还性）；5、融资的主动权主要掌握在金融中介机构手中。A属于直接融资特点。","type":"single"},{"id":"cflue_zc_ch1.json_18","q":"下列关于全球金融市场监管的说法，错误的有（）。","c":{"A":"目前，中国香港的金融监管机构主要包括香港金融管理局、银行业监理处、证券及期货事务监察委员会和保险业监理处","B":"美国国会于1986年通过的《政府债券法案》赋予财政部监管整个政府债券市场的职责","C":"当前英国金融市场的主要监管机构包括英格兰银行、金融服务局和财政部","D":"在美国，商品期货交易委员会负责监管期货和期权市场"},"a":"AC","an":"2016年5月，英国通过《2016年英格兰银行和金融服务法》，其中第3条规定英格兰银行设立审慎监管委员会（PRC）作为内设机构，承担原审慎监管局对金融机构的微观审慎监管职权。A错误；目前，中国香港的金融监管机构主要包括香港金融管理局（金管局）、证券及期货事务监察委员会（证监会）和保险业监理处（保监处），分别负责监管银行业、证券和期货业以及保险业。D错误。","type":"multi"},{"id":"cflue_zc_ch1.json_19","q":"下列属于国际资金流动方式中的“国际长期资金流动”的活动有（）。","c":{"A":"美国的A公司为从英国B公司进口商品，预付了20万英镑的货款","B":"美国的A公司以合资形式在英国投资设立了B公司","C":"美国的A公司将其从位于英国的控股子公司分到的年度利润再投资于这家子公司","D":"美国的A公司购买了位于英国B公司2%的股权"},"a":"BCD","an":"国际长期资金流动是指期限在1年以上的资金的跨国流动，包括国际直接投资、国际间接投资和国际信贷。D属于国际短期资金流动。","type":"multi"},{"id":"cflue_zc_ch1.json_20","q":"下列属于货币市场的有（）。","c":{"A":"商业票据市场","B":"股票市场","C":"大额可转让存单市场","D":"银行间同业拆借市场"},"a":"ACD","an":"货币市场包括：银行间同业拆借市场、商业票据市场、短期国库券市场、大额可转让存单市场等。","type":"multi"},{"id":"cflue_zc_ch1.json_21","q":"在美国银行业的监管机构中，（）作为监管机构的协调机构，负责制定统一的监管准则和报告格式。","c":{"A":"储蓄机构监管署","B":"联邦金融机构检查委员会","C":"联邦储备体系","D":"货币监理署"},"a":"B","an":"美国实行的是“双层多头”金融监管体制。联邦金融机构检查委员会在美国银行业的监管机构中作为监管机构的协调机构，负责制定统一的监管准则和报告格式。","type":"single"},{"id":"cflue_zc_ch1.json_22","q":"资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，两者只与金融机构发生债权债务关系。这反映了间接融资的融资的相对集中性特点。（）","c":{"A":"错","B":"对"},"a":"A","an":"资金需求者与资金初始供应者之间不发生直接信贷关系，而是由金融中介机构起桥梁作用，二者只与金融机构发生债权债务关系。这反映了间接融资的资金获得的【间接性】特点&amp;nbsp;&amp;nbsp;。","type":"judge"},{"id":"cflue_zc_ch1.json_23","q":"将有形资产产生的风险在资金供求双方之间重新配置，反映了金融市场的风险管理功能。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_zc_ch1.json_24","q":"金融市场通过金融资产交易实现货币资金在供给者和需求者之间的转移，促进有形资本形成，这是金融市场的资金融通功能。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_zc_ch1.json_25","q":"证券市场以证券发行与交易的方式实现了筹资与并购的对接，有效地解决了资本的供需矛盾。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券市场以证券发行与交易的方式实现了【筹资与投资】的对接，有效地解决了资本的供需矛盾。","type":"judge"},{"id":"cflue_zc_ch1.json_26","q":"下列各项经济活动中，属于直接融资的有（）。","c":{"A":"D公司以支付租金的方式从H租赁公司处获得了价值300万元设备的使用权","B":"美国政府通过发行国库券筹集了200亿美元资金","C":"B商业银行向C商业银行出售了价值1000万元的贷款","D":"A商业银行通过发行CDS筹集了2000万资金"},"a":"BD","an":"直接融资是指拥有暂时闲置资金的单位（包括企业、机构和个人）与资金短缺需要补充资金的单位，相互之间直接进行协议，或者在金融市场上前者购买后者发行的有价证券，将货币资金提供给所需要补充资金的单位使用，从而完成资金融通的过程。B属于银行贷款、C属于租赁融资均为间接融资方式。","type":"multi"},{"id":"cflue_zc_ch1.json_27","q":"金融市场的参与各方是以信用为基础参与市场各种交易，其体现的是（）关系。","c":{"A":"借贷","B":"监管","C":"委托代理","D":"竞争"},"a":"AC","an":"金融市场上的市场参与各方是以信用为基础的【借贷】关系和【委托代理】关系，其交易对象是【货币资金】这一特殊的商品。","type":"multi"},{"id":"cflue_zc_ch1.json_28","q":"下列关于全球金融市场历史的相关说法，正确的有（）。","c":{"A":"一般认为，有形的、有组织的金融市场首先形成于17世纪的欧洲大陆","B":"大约公元前2000年，古巴比伦乌尔城已经出现了明显的金融区，乌尔城出现的金融活动不仅包括借贷，还包括股权投资甚至风险投资","C":"1957年签署的《罗马条约》建立了欧洲经济共同体，从最初6个成员国发展成为包括28个成员国的联盟","D":"1790年，美国成立了第一个证券交易所—纽约证券交易所"},"a":"ABC","an":"1790年成立了美国第一个证券交易所——费城证券交易所。C错误。","type":"multi"},{"id":"cflue_zc_ch1.json_29","q":"企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式是（）。","c":{"A":"债券市场融资","B":"商业信用融资","C":"股票市场融资","D":"风险投资融资"},"a":"B","an":"商业信用融资是企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式。","type":"single"},{"id":"cflue_zc_ch1.json_30","q":"商业票据市场的特点有（）。","c":{"A":"融资灵活性低","B":"对利率的变动不灵敏","C":"资本成本比较低","D":"有利于提高发行公司的信誉"},"a":"ACD","an":"商业票据市场的特点如下：（1）发行成本较低；（2）采用信用发行的方式；（3）可以提高发行企业的信誉；（4）可以足额运用资金；（5）对利率的变动反应灵敏；（D错误）（6）一级市场发行量大但二级市场较弱。故正确答案ABC。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_5","q":"下列关于金融市场的说法，错误的是（）。","c":{"A":"金融市场是政府调控经济的一个主要渠道","B":"金融市场的发展可以促成厂商“正常存货投资”的减少","C":"金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联","D":"金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"},"a":"B","an":"金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。","type":"single"},{"id":"cflue_paper_金融基础_1.json_15","q":"间接融资相对集中于银行或非银行金融机构，国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，一些国家还实行了存款保险制度，这反映出间接融资具有资金获得的间接性的特点。（）","c":{"A":"错","B":"对"},"a":"A","an":"【融资信誉的差异性相对较小】：间接融资相对集中于银行或非银行金融机构，由于国家对金融机构的管理一般都较为严格，银行自身的经营也多采取稳健方针，加上一些国家实行了存款保险制度，相对于直接融资来说，间接融资的信誉程度高，风险也相对较小，融资的稳定性较强。","type":"judge"},{"id":"cflue_paper_金融基础_1.json_19","q":"下列关于新股网上网下申购的说法，正确的有（）。","c":{"A":"首次公开发行股票网下投资者申购数量低于网下初始发行量的，发行人和主承销不得将网下发行部分向网上回拨，应当中止发行","B":"网上投资者申购数量不足网上初始发行量的，不得回拨给网下投资者","C":"首次公开发行股票采用询价方式的，公开发行股票后总股本在4亿股（含）以下的，网下初始发行比例不低于本次公开发行股票数量的60%","D":"首次公开发行股票采用询价方式的，发行后总股本超过4亿股的，网下初始发行比例不低于本次公开发行股票数量的70%"},"a":"ACD","an":"网上投资者申购数量不足网上初始发行量的，可回拨给网下投资者。D错误。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_30","q":"证券市场以证券发行与交易的方式实现了筹资与并购的对接，有效地解决了资本的供需矛盾。（）","c":{"A":"错","B":"对"},"a":"A","an":"证券市场以证券发行与交易的方式实现了【筹资与投资】的对接，有效地解决了资本的供需矛盾。","type":"judge"},{"id":"cflue_paper_金融基础_1.json_44","q":"关于证券托管和存管中账户记录的说法，错误的有（）。","c":{"A":"对股权、债权变更引起的证券转移，均通过账面予以划转","B":"证券登记结算机构一般以证券公司在各地的营业部为单位进行记载","C":"由于实现了无纸化，账户记录采用电脑记账的方式","D":"证券交易所一般以证券公司在各地的营业部为单位进行记载"},"a":"BD","an":"在账户记录上，实现了无纸化，证券登记结算机构一般以证券公司为单位，采用电脑记账方式记载证券公司交给的证券；证券公司也采用电脑记账的方式记载投资者的证券。对股权、债权变更引起的证券转移，通过账面予以划转。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_51","q":"企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式是（）。","c":{"A":"债券市场融资","B":"商业信用融资","C":"股票市场融资","D":"风险投资融资"},"a":"B","an":"商业信用融资是企业与企业之间相互提供的，和商品交易直接相联系的资金融通形式。","type":"single"},{"id":"cflue_paper_金融基础_1.json_54","q":"OTC是芝加哥期权交易所的简称。（）","c":{"A":"错","B":"对"},"a":"A","an":"柜台市场（OTC）又称场外交易市场、店头交易市场，指在证券交易所以外进行证券交易的广泛市场。","type":"judge"},{"id":"cflue_paper_金融基础_1.json_58","q":"下列关于证券登记结算制度的说法，正确的有（）。","c":{"A":"全额结算是指交易双方对所达成的交易实行轧差清算，并对轧抵之后的证券和资金的净额进行交付","B":"货银对付俗称“一手交钱，一手交货”，是指证券登记结算机构与结算参与人在交手过程中，当且仅当资金交付时给付证券、证券交付时给付资金","C":"投资者开立证券账户应当向证券公司提出申请，投资者申请开立证券账户应当保证其提交的开户资料真实、准确、完整","D":"证券登记结算公司按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算、交收，不得被强制执行"},"a":"BD","an":"【全额结算】是指交易双方对所达成的交易实行逐笔清算，并逐笔转移证券和资金；【净额结算】是指交易双方对所达成的交易实行轧差清算，并对轧抵之后的证券和资金的净额进行交付。B错误；投资者开立证券账户应当向【证券登记结算机构】提出申请，投资者申请开立证券账户应当保证其提交的开户资料真实、准确、完整，投资者不得将本人的证券账户提供给他人使用。D错误。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_29","q":"下列关于金融期权的说法，正确的有（）。","c":{"A":"期权的购买者，无需开立保证金账户","B":"期权的购买者，无需缴纳保证金","C":"可作期权交易的金融工具未必可作期货交易","D":"可作期权交易的金融工具都可作期货交易"},"a":"ABC","an":"一般地说，凡可作期货交易的金融工具都可作期权交易；然而，可作期权交易的金融工具却未必可作期货交易。A错误，其余正确。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_30","q":"下列关于我国信托业务的发展的说法，错误的是（）。","c":{"A":"2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》","B":"2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响","C":"2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度","D":"2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"},"a":"B","an":"2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。","type":"single"},{"id":"cflue_paper_金融基础_2.json_50","q":"下列关于金融市场的说法，错误的是（）。","c":{"A":"金融市场是政府调控经济的一个主要渠道","B":"金融市场的发展可以促成厂商“正常存货投资”的减少","C":"金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联","D":"金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"},"a":"B","an":"金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。","type":"single"},{"id":"cflue_paper_金融基础_2.json_56","q":"将有形资产产生的风险在资金供求双方之间重新配置，反映了金融市场的风险管理功能。（）","c":{"A":"错","B":"对"},"a":"B","an":"略。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_20","q":"下列属于场外交易市场的有（）。","c":{"A":"证券交易所","B":"黄金市场","C":"拆借市场","D":"期货交易所"},"a":"BC","an":"银行信贷市场、拆借市场、外汇市场、黄金市场等市场传统上比较松散，通常没有固定的交易场所，也不一定有统一的交易时间，属于场外市场。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_28","q":"下列关于我国信托业务的发展的说法，错误的是（）。","c":{"A":"2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》","B":"2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响","C":"2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度","D":"2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"},"a":"B","an":"2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。","type":"single"},{"id":"cflue_paper_金融基础_3.json_36","q":"金融市场的参与各方是以信用为基础参与市场各种交易，其体现的是（）关系。","c":{"A":"借贷","B":"监管","C":"委托代理","D":"竞争"},"a":"AC","an":"金融市场上的市场参与各方是以信用为基础的【借贷】关系和【委托代理】关系，其交易对象是【货币资金】这一特殊的商品。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_46","q":"下列关于报价的计价单位和申报价格最小变动单位的说法，错误的是（）。","c":{"A":"股票计价单位为每股价格","B":"A股申报价格最小变动单位为0.01元人民币","C":"深圳证券交易所B股申报价格最小变动单位为0.01美元","D":"基金计价单位为每份基金价格"},"a":"C","an":"深圳证券交易所B股申报价格最小变动单位为0.01港元。","type":"single"},{"id":"cflue_paper_金融基础_4.json_11","q":"金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡。这是金融市场的价格发现功能。（）","c":{"A":"错","B":"对"},"a":"B","an":"金融市场当中供求双方的相互作用决定了交易资产的价格，价格反过来又为潜在的市场参与者提供了信号，引导资金在不同的金融资产之间进行配置，达成供需平衡，这也被称为【价格发现】过程。","type":"judge"},{"id":"cflue_paper_金融基础_4.json_40","q":"下列关于直接融资对金融市场的影响的说法，正确的有（）。","c":{"A":"发展多种股权融资方式并不能够弥补间接融资的不足","B":"提高直接融资比重，可以起到分散过度集中于银行的金融风险作用","C":"直接融资占比反映了一国金融体系风险及风险分布情况","D":"直接融资与间接融资的比例可以反映一国金融体系配置的效率是否与实体经济相匹配"},"a":"BCD","an":"我国正处于转变经济发展方式、调整产业结构的经济转型期，在这个过程中提高直接融资比重，特别是发展多种股权融资方式【能够】弥补间接融资的不足，也有利于提高实体经济的健康稳定发展。C错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_41","q":"下列关于新股网上网下申购的说法，正确的有（）。","c":{"A":"首次公开发行股票网下投资者申购数量低于网下初始发行量的，发行人和主承销不得将网下发行部分向网上回拨，应当中止发行","B":"网上投资者申购数量不足网上初始发行量的，不得回拨给网下投资者","C":"首次公开发行股票采用询价方式的，公开发行股票后总股本在4亿股（含）以下的，网下初始发行比例不低于本次公开发行股票数量的60%","D":"首次公开发行股票采用询价方式的，发行后总股本超过4亿股的，网下初始发行比例不低于本次公开发行股票数量的70%"},"a":"ACD","an":"网上投资者申购数量不足网上初始发行量的，可回拨给网下投资者。D错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_44","q":"下列关于存款准备金与存款派生能力的说法，正确的有（）。","c":{"A":"法定存款准备金越高，银行放贷能力越弱","B":"法定存款准备金越高，存款派生能力越强","C":"法定存款备金和超额存款准备金对银行放贷能力的影响方向一致","D":"超额存款准备金越高，存款派生能力越强"},"a":"AC","an":"存款准备金制度是银行创造信用货币的基本前提条件。银行在吸收一笔现金或支票后，会留存一部分准备，再将其余部分用于贷款。对于一定数量的存款来说，准备金的比例越高，银行可用于贷款的资金就越少，存款派生的能力就越低；反之，准备金的比例越低，银行的存款派生能力就越强。所以AB错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_53","q":"下列关于企业短期融资融券的说法，正确的有（）。","c":{"A":"债务融资工具发行注册实行注册会议制度，由注册会议决定是否接受债务融资工具发行注册","B":"交易商协会接受注册的企业出具《接受注册通知书》，注册有效期为2年","C":"企业短期融资融券是指具有法人资格的非金融企业在银行间债券市场发行的，约定在1年内还本付息的债务融资工具","D":"交易所市场交易商协会负责受理企业债务融资工具的发行注册"},"a":"ABC","an":"【中国银行间市场交易商协会】负责受理企业债务融资工具的发行注册。C错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_59","q":"下列关于凭证式国债的说法，错误的是（）。","c":{"A":"凭证式国债是一种可上市流通的储蓄型债券","B":"商业银行可以申请加入凭证式国债承销团","C":"发售采取开具凭证式国债收款凭证的方式","D":"承销商发售数量不得突破所承销的国债量"},"a":"A","an":"凭证式国债是一种不可上市流通的储蓄型证券。","type":"single"},{"id":"cflue_paper_金融基础_5.json_13","q":"下列关于证券交易所的特征的说法，错误的是（）。","c":{"A":"证券交易所有固定的交易场所和交易时间","B":"集中证券的供求双方，但成交速度和成交率较低","C":"实行“公开、公平、公正”原则，并对证券交易进行严格管理。","D":"交易的对象限于合乎一定标准的上市证券"},"a":"B","an":"证券交易所的特征：（1）有固定的交易场所和交易时间；（2）参加交易者为具备会员资格的证券经营机构，交易采取经纪制度，即一般投资者不能直接进入交易所买卖证券，只能委托会员作为经纪人间接进行交易；（3）交易的对象限于合乎一定标准的上市证券；（4）通过公开竞价的方式决定交易价格；（5）集中证券的供求双方，【具有较高的成交速度和成交率】；（6）实行“公开、公平、公正”原则，并对证券交易进行严格管理。","type":"single"},{"id":"cflue_paper_金融基础_5.json_27","q":"下列关于我国信托业务的发展的说法，错误的是（）。","c":{"A":"2016年，监管层对信托业加强监管，发布了《关于进一步加强信托公司风险监管工作的意见》","B":"2018年4月，监管机构发布《资管新规》，其实施不会对信托通道业务产生太大影响","C":"2017年8月，《信托登记管理办法》发布，信托业正式建立了统一登记制度","D":"2018年4月发布的《资管新规》的新增内容包括打破刚兑、限制嵌套等"},"a":"B","an":"2018年4月，中国人民银行等四部委联合发布《关于规范金融机构资产管理业务的指导意见》（《资管新规》）。《资管新规》中打破刚兑、限制嵌套、提高合格投资者门槛等诸多规定都将对信托行业产生影响。《资管新规》的实施将对信托行业尤其是信托通道业务产生较大影响，其中受影响较大的包括通道业务占比较高的信托公司，还有一些受到监管处罚且业务运营风险较高的信托公司。","type":"single"},{"id":"cflue_paper_金融基础_5.json_29","q":"商业票据市场的特点有（）。","c":{"A":"融资灵活性低","B":"对利率的变动不灵敏","C":"资本成本比较低","D":"有利于提高发行公司的信誉"},"a":"ACD","an":"商业票据市场的特点如下：（1）发行成本较低；（2）采用信用发行的方式；（3）可以提高发行企业的信誉；（4）可以足额运用资金；（5）对利率的变动反应灵敏；（D错误）（6）一级市场发行量大但二级市场较弱。故正确答案ABC。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_38","q":"下列关于债券应计利息的说法，正确的有（）。","c":{"A":"我国交易所市场对附息债券的计息规定时全年天数统一按360天计算","B":"计算累计利息时，针对不同类别债券，全年天数和利息累计天数的计算分别有行业惯例","C":"我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日不计息","D":"通常短期债券的利息累计天数分为按实际天数计算和按每月30天计算两种"},"a":"BD","an":"我国交易所市场对附息债券的计息规定是全年天数统一按【365天】计算，利息累计天数规则是按实际天数计算，算头不算尾、闰年2月29日不计息，C错误；我国目前对于贴现发行的零息债券按照实际天数计算累计利息，闰年2月29日【也计利息】，D错误。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_45","q":"下列关于城市商业银行特点的说法，错误的是（）。","c":{"A":"各项业务均衡发展","B":"通常在特定区域从事商业银行业务","C":"依靠地缘优势与当地经济发展水平","D":"主要针对当地企业和居民需求提供金融服务"},"a":"A","an":"城市商业银行通常在特定的区域从事商业银行业务，依靠地缘优势、当地经济发展水平，重点针对当地企业和居民的需求提供金融产品和服务。","type":"single"},{"id":"cflue_paper_金融基础_5.json_50","q":"下列关于债券报价方式的说法，正确的有（）。","c":{"A":"对话报价是指参与者为达成交易而直接向交易对手作出的、对手方确认即可成交的报价","B":"小额报价是指在交易系统中，一次报价、规定交易数量范围和对手范围的现券双向撮合交易方式","C":"公开报价是指参与者为表明自身交易意向而面向市场作出的、不可直接确认成交的报价","D":"双边报价是指银行间债券市场开展双边报价业务的交易员进行现券买卖报价时，在中国人民银行核定的债券买卖差价范围内连续报出该券种的买卖实价，并同时报出该券种的买卖数量、清算速度等交易要素"},"a":"ACD","an":"小额报价是在交易系统中，一次报价、规定交易数量范围和对手范围的现券【单向】撮合交易方式。D错误。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_54","q":"下列关于金融市场的说法，错误的是（）。","c":{"A":"金融市场是政府调控经济的一个主要渠道","B":"金融市场的发展可以促成厂商“正常存货投资”的减少","C":"金融市场的繁荣与萧条与实体经济的兴旺与不景气存在一定的关联","D":"金融市场使得“意愿储蓄”脱离了实物窖藏的方式，使社会可用的投资品增长。"},"a":"B","an":"金融市场是经济运行状态的“晴雨表”，繁荣的金融市场往往对应着实体经济的兴旺发达，而金融市场的萧条通常也意味着真实经济部门的不景气。金融市场或金融体系首先使“意愿的储蓄”脱离了实物窖藏的方式，使社会可用的投资品总量增长，同时，又将“货币形态”的储蓄提供给需要追加投资的部门，使它们能够支付得起对投资品的需要，最后促成厂商【“非正常存货投资”】的减少，最终实现全社会储蓄与投资的一种事前的或计划的均衡，增进了社会福利。由于金融市场在联系储蓄—投资以及在调整资源配置方面所具有的重要作用，再加上金融市场主体对市场变化的敏感性，金融市场逐渐成为政府调控经济的一个主要渠道。","type":"single"},{"id":"comp_74567","q":"根据上述材料，下列关于中国金融监管体系的说法，正确的是（）。","c":{"A":"中国金融监管体系实行「一委一行两会「的架构","B":"国务院金融稳定发展委员会负责统筹协调金融稳定和改革发展","C":"中国银行保险监督管理委员会负责监管证券业","D":"中国人民银行负责所有金融机构的微观审慎监管"},"a":"B","an":"中国金融监管体系是「一委一行一局一会「：国务院金融稳定发展委员会（一委）+ 中国人民银行（一行）+ 国家金融监督管理总局（一局）+ 中国证券监督管理委员会（一会）。选项B正确。国家金融监督管理总局负责除证券业之外的金融监管，证监会负责证券业监管。","type":"comprehensive","material":"2024年10月，中国证券业协会发布了《证券行业专业人员一般业务水平评价测试大纲（2024）》，自2024年11月1日起施行。该大纲对金融市场基础知识科目的考查范围进行了调整。其中涉及全球金融体系、中国金融体系与多层次资本市场等内容。","sub_type":"single"},{"id":"comp_68094","q":"关于国际金融市场监管，下列说法正确的有（）。","c":{"A":"美国证券交易委员会（SEC）负责监管美国证券市场","B":"英国金融行为监管局（FCA）负责监管英国金融机构的行为","C":"香港金融管理局（金管局）负责监管香港证券和期货业","D":"日本金融厅（FSA）是日本金融监管的统一机构"},"a":"ABD","an":"选项C错误。香港金融管理局（金管局）负责监管银行业，证券及期货事务监察委员会（证监会）负责监管证券和期货业。其他选项均正确。","type":"comprehensive","material":"2024年10月，中国证券业协会发布了《证券行业专业人员一般业务水平评价测试大纲（2024）》，自2024年11月1日起施行。该大纲对金融市场基础知识科目的考查范围进行了调整。其中涉及全球金融体系、中国金融体系与多层次资本市场等内容。","sub_type":"multi"},{"id":"comp_15943","q":"按上述分类，下列属于货币市场工具的是（）。","c":{"A":"股票","B":"10年期国债","C":"商业票据","D":"证券投资基金份额"},"a":"C","an":"货币市场是短期（1年以内）资金融通市场。商业票据是企业发行的短期无担保本票，期限通常在270天以内，属于货币市场工具。股票、10年期国债、证券投资基金均属于资本市场工具。","type":"comprehensive","material":"金融市场按照交易标的物可分为货币市场、资本市场、外汇市场和黄金市场等。货币市场是短期资金融通市场，资本市场是长期资金融通市场。金融市场的基本功能包括资金融通、价格发现、风险管理、流动性提供和降低交易成本。","sub_type":"single"},{"id":"comp_33054","q":"金融市场通过价格信号引导资金流向效益最高的部门，这体现了金融市场的（）功能。","c":{"A":"资金融通","B":"价格发现","C":"风险管理","D":"流动性提供"},"a":"B","an":"价格发现功能是指金融市场通过公开竞价形成均衡价格，引导资金流向效益最高的部门。资金融通是实现资金盈余者向短缺者转移；风险管理是通过衍生工具等转移风险；流动性提供是使资产快速变现。","type":"comprehensive","material":"金融市场按照交易标的物可分为货币市场、资本市场、外汇市场和黄金市场等。货币市场是短期资金融通市场，资本市场是长期资金融通市场。金融市场的基本功能包括资金融通、价格发现、风险管理、流动性提供和降低交易成本。","sub_type":"single"},{"id":"cflue_zc_ch2.json_1","q":"国际经济环境因素作为影响我国金融市场运行的主要因素，内容不包括（）。","c":{"A":"世界货币制度影响","B":"放松监管和加强监管两种经济哲学的交替","C":"汇率和国际资本流动","D":"经济全球化"},"a":"C","an":"国际经济环境因素包括经济全球化、世界货币制度影响、放松监管和加强监管两种经济哲学的交替。汇率和国际资本流动属于宏观经济运行对金融市场的影响。","type":"single"},{"id":"cflue_zc_ch2.json_2","q":"中央银行采取宽松性货币政策，（）货币供给，促使股价（）。","c":{"A":"减少，上升","B":"减少，下降","C":"增加，下降","D":"增加，上升"},"a":"D","an":"中央银行采取宽松性货币政策，增加货币供给，股市资金增加，对股票的需求增加，立即促使股价上升。","type":"single"},{"id":"cflue_zc_ch2.json_3","q":"中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。中央银行作为证券发行主体，既可以发行股票，也可以发行债券。（）","c":{"A":"错","B":"对"},"a":"B","an":"中央银行作为证券发行主体，主要涉及两类证券：1、中央银行【股票】。在一些国家（如美国），中央银行采取了股份制组织结构，通过发行股票募集资金，但是，中央银行的股东并不享有决定中央银行政策的权利，只能按期收取固定的红利，其股票类似于优先股。2、中央银行出于调控货币供给量目的而发行的【特殊债券】。","type":"judge"},{"id":"cflue_zc_ch2.json_4","q":"在上海证券交易所设立科创板，坚持面向（），主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。","c":{"A":"世界科技前沿","B":"资本市场前沿","C":"国家重大需求","D":"经济主战场"},"a":"ACD","an":"在上海证券交易所新设科创板，坚持面向【世界科技前沿、面向经济主战场、面向国家重大需求】，主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。&amp;nbsp;&amp;nbsp;","type":"multi"},{"id":"cflue_zc_ch2.json_5","q":"以下关于我国金融业主要行业的基本情况，不正确的是（）。","c":{"A":"股份制银行资产规模增长较快","B":"在分业监管体系下，相较于银行业和证券业，信托业务的融资活动灵活性不具有优势","C":"证券业传统业务面临激烈的同质化竞争","D":"大型商业银行在资产规模、资金来源和网点布局上占有主导地位"},"a":"B","an":"在分业监管体系下，相较于银行业和证券业，信托业务的融资活动更具灵活性优势。","type":"single"},{"id":"cflue_zc_ch2.json_6","q":"《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为（）个月，中国证监会注册期限为（）个工作日。同时，针对（）融资设置简易程序。","c":{"A":"2；15；小额快速","B":"2；10；小额便捷","C":"3；15；小额便捷","D":"2；15；小额便捷"},"a":"A","an":"《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为2个月，中国证监会注册期限为15个工作日。同时，针对“小额快速”融资设置简易程序","type":"single"},{"id":"cflue_zc_ch2.json_7","q":"诚信租行是一家金融租赁公司，拟今年上市，因此聘请A投资银行进行IPO材料的编写，按照行业分类，在联合国统计署按经济活动类型分类的表里，A投资银行属于金融中介的（）子类。","c":{"A":"辅助金融中介的活动","B":"非银行金融中介结构","C":"保险和养老基金","D":"不包含保险和养老基金的金融中介活动"},"a":"A","an":"投资银行属于辅助金融中介的活动，选项C是按照业务特征及货币创造、交换媒介和支付手段的功能划分。","type":"single"},{"id":"cflue_zc_ch2.json_8","q":"上海证券交易所在《上海证券交易所科创板企业上市推荐指引》中指出，根据科创板定位，保荐机构优先推荐的科技创新企业所属的领域包括（）。","c":{"A":"新能源领域","B":"节能环保领域","C":"生物医药领域","D":"新型农业"},"a":"ABC","an":"科创板重点推荐六大领域的科技创新企业包括：新一代信息技术领域；高端装备领域；新材料领域；新能源领域；节能环保领域；生物医药领域。","type":"multi"},{"id":"cflue_zc_ch2.json_9","q":"当前我国银行业中，在资产规模、资金来源和网点布局上占据主导地位的是城市商业银行。（）","c":{"A":"错","B":"对"},"a":"A","an":"【国有大型商业银行】在资产规模、资金来源和网点布局上占据主导地位，业务遍布全国主要城市及大部分县域地区，网点众多且分散，各项业务均衡发展。","type":"judge"},{"id":"cflue_zc_ch2.json_10","q":"金融产品的创新和复杂化，使得实体经济和金融的界限日益分明。（）","c":{"A":"错","B":"对"},"a":"A","an":"实体经济发展水平和质量从根本上决定着金融发展水平和质量，实体经济发展不好，风险最后会集中反映在金融体系中，金融的健康发展可以促进经济增长；反之则不利于经济增长，金融产品的创新和复杂化，使得实体经济和金融的界限【日益模糊】。","type":"judge"},{"id":"cflue_zc_ch2.json_11","q":"在场外交易市场，金融机构（）。","c":{"A":"仅是交易的组织者","B":"仅是交易的监管者","C":"既是证券交易的组织者，又是证券交易的直接参加者","D":"仅是交易的直接参与者"},"a":"C","an":"通常，在柜台上交易的证券，其买卖价格由开设柜台的金融机构报出，投资者根据金融机构柜台所报的买入价或卖出价与柜台交易，即证券出售者将证券直接卖给柜台，证券购入者直接从柜台买入证券。所以，金融机构的柜台既是证券交易的组织者，也是证券交易的直接参加者。","type":"single"},{"id":"cflue_zc_ch2.json_12","q":"下列关于SHIBOR的说法，不正确的是（）。","c":{"A":"目前已成为认可度高、应用广泛的货币市场基准利率之一","B":"不具有广泛性，不能帮助金融结构提高自主定价能力","C":"属于货币市场格局之一","D":"由中国人民银行于2007年开始试运行"},"a":"B","an":"为推进利率市场化改革，提高金融机构自主定价能力，健全货币政策传导机制，培育货币市场基准利率，中国人民银行于2007年开始运行上海银行间同业拆拆借利率，目前它已成为认可度高、应用广泛的货币市场基准利率之－。选项D不正确，其余符合。","type":"single"},{"id":"cflue_zc_ch2.json_13","q":"对于债券市场来说，不同市场的债券分别由不同机构负责托管和结算，关于债券的托管，以下说法正确的是（）。","c":{"A":"上海证券交易所对应中央国债登记公司","B":"银行间市场对应中央国债登记公司","C":"银行间市场对应中国证券登记结算总公司","D":"深圳交易所对应中央国债登记公司"},"a":"B","an":"银行间市场对应中央国债登记公司，B正确。上海证券交易所对应于中国证券登记结算上海分公司，深圳交易所对应于中国证券登记结算深圳分公司，故A、C、D说法错误。","type":"single"},{"id":"cflue_zc_ch2.json_14","q":"截至2017年末，全球第一大黑色金属期货市场和第二大有色金属期货市场的是纽约期货交易所。（）","c":{"A":"错","B":"对"},"a":"A","an":"截至2017年末，上海期货交易所成为全球第一大黑色金属期货市场和第二大有色金属期货市场。","type":"judge"},{"id":"cflue_zc_ch2.json_15","q":"在我国金融中介体系中，信托机构属于（）。","c":{"A":"房地产中介体系","B":"保险中介体系","C":"投资中介体系","D":"银行机构体系"},"a":"C","an":"目前，我国已经形成了多层次的金融中介机构体系，拥有以中央银行为主导、国有商业银行为主体，包括股份制商业银行、城市商业银行、农村商业银行、跨国银行、农村信用社在内的多层次银行机构体系；拥有以证券公司、期货公司和证券投资基金为主，以各类投资咨询中介、信托机构为辅的多元化【投资中介体系】；拥有人寿保险公司、财产保险公司、再保险公司以及提供多种多样保险服务的保险中介体系。","type":"single"},{"id":"cflue_zc_ch2.json_16","q":"场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备的功能有（）。","c":{"A":"拓宽融资渠道，改善中小企业融资环境","B":"为不能在证券交易所上市交易的证券提供流通转让的场所","C":"提供风险分层的金融资产管理渠道","D":"宏观调控"},"a":"ABC","an":"场外交易市场是我国多层次资本市场体系的重要组成部分，主要具备功能：1、拓宽融资渠道，改善中小企业融资环境；2、为不能在证券交易所上市交易的证券提供流通转让的场所；3、提供风险分层的金融资产管理渠道。","type":"multi"},{"id":"cflue_zc_ch2.json_17","q":"在期货市场监管方面，我国形成了中国证监会、地方证监局、（）、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。","c":{"A":"期货交易所","B":"原中国银监会","C":"中央银行","D":"原中国保监会"},"a":"A","an":"期货市场监管方面，我国形成了中国证监会、地方证监局、期货交易所、期货市场监控中心和中国期货业协会“五位一体”的期货监管协调工作机制与较为完善的期货监管法律体系。","type":"single"},{"id":"cflue_zc_ch2.json_18","q":"20世纪80年代以来中央银行职能的变化突出表现在（）。","c":{"A":"金融政策的制定","B":"强调金融稳定职能，维护金融体系安全","C":"货币职能与金融监管日益紧密，相辅相成","D":"货币职能与金融监管相分离，突出货币政策调控职能"},"a":"BD","an":"20世纪80年代以来中央银行职能的变化突出表现在包括：货币职能与金融监管相分离，突出货币政策调控职能；强调金融稳定职能，维护金融体系安全。","type":"multi"},{"id":"cflue_zc_ch2.json_19","q":"中央银行是代表一国政府（）的重要机构。","c":{"A":"实施金融监管","B":"发行法偿货币","C":"制定和执行货币政策","D":"创造利润"},"a":"ABC","an":"中央银行是代表一国政府发行法偿货币、制定和执行货币政策、实施金融监管的重要机构。","type":"multi"},{"id":"cflue_zc_ch2.json_20","q":"甲客户将10000元现金存入A银行，假定法定准备金率为25%，在不考虑派生存款的情况下，A银行可用于发放贷款的最大额度是（）。","c":{"A":"7500元","B":"10000元","C":"2500元","D":"40000元"},"a":"A","an":"法定存款准备金，是银行吸收客户存款，上存中央银行的金额，根据题意，银行留存用于发放存款的金额=10000×（1-25%）=7500元。","type":"single"},{"id":"cflue_zc_ch2.json_21","q":"标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展的是（）。","c":{"A":"沪深两市的形成","B":"银行业与信托业、证券业分离","C":"国务院证券管理委员会和中国监督管理委员会成立","D":"中国银行监督委员会成立"},"a":"C","an":"1992年10月，国务院证券管理委员会和中国监督管理委员会成立标志着中国资本市场开始逐步纳入全国统一监管框架，全国性市场由此形成并初步发展。选项B标志着我国“分业经营，分业监管”的金融体系得以确立。选项C时间不符，选项D标志着股票市场正式运作的开始。","type":"single"},{"id":"cflue_zc_ch2.json_22","q":"银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务是表内业务。（）","c":{"A":"错","B":"对"},"a":"A","an":"【中间业务】是银行利用自身在机构网点、技术手段和信息处理等方面的优势，代理客户承办收付和委托事项，并收取手续费的业务。中间业务包括两类，一般意义上的金融服务业务类业务和一般意义上的表外业务。中间业务不需要动用银行自己的资金，且具有收入稳定、风险程度低的特点，集中体现了商业银行的服务功能。","type":"judge"},{"id":"cflue_zc_ch2.json_23","q":"目前，中国已基本形成了由（）调控和监督、国家银行为主体、政策性金融与商业性金融机构相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系。","c":{"A":"中央银行","B":"原中国银监会","C":"中国证监会","D":"财政部"},"a":"A","an":"目前，中国已经基本形成了由【中央银行】调控和监督、国家银行为主体、政策性金融与商业性金融相分离，多种金融机构分工合作、功能互补的现代化金融中介机构体系，并建立了与之相适应的金融监管体系。","type":"single"},{"id":"cflue_zc_ch2.json_24","q":"我国政策性银行不包括（）。","c":{"A":"中国进出口银行","B":"中国人民银行","C":"国家开发银行","D":"中国农业发展银行"},"a":"B","an":"中国人民银行不属于政策性银行，是“银行的银行”。","type":"single"},{"id":"cflue_zc_ch2.json_25","q":"下列关于金融与实体经济关系的说法，正确的有（）。","c":{"A":"“金融加速器”理论认为，金融市场摩擦会放大实体经济产出的影响","B":"古典经济学家认为货币是中性的，货币供应量的变化不影响实体经济","C":"2008年金融危机表明，金融活动本身就是经济衰退或萧条的诱因","D":"凯恩斯认为通过利率对投资的诱导，货币能影响实体经济产出"},"a":"ABCD","an":"全部正确。","type":"multi"},{"id":"cflue_zc_ch2.json_26","q":"央行的公开市场操作包括买卖政府债券或（）。","c":{"A":"金融债券","B":"公司债券","C":"企业债券","D":"次级债券"},"a":"A","an":"中央银行以公开市场操作作为政策手段，通过买卖政府债券或金融债券，影响货币供应量或利率水平，进行宏观调控。","type":"single"},{"id":"cflue_zc_ch2.json_27","q":"联合国统计署按经济活动类型分类的金融中介包括（）。","c":{"A":"辅助金融中介，如交易所、投资银行等","B":"货币中介","C":"中央银行及其他货币中介（主要指存款银行）","D":"保险和养老基金（包括强制性社会保障）"},"a":"ABC","an":"联合国统计署按经济活动类型，把现今世界上的经济活动分成17个大类。金融中介类包括：不包含保险和养老基金的金融中介活动：货币中介；中央银行和其他货币中介（主要是指存款货币银行）的活动；其他金融中介；金融租赁以及其他如农业信贷、进出口信贷、消费信贷等专业信贷的活动。保险和养老基金（【不包括】强制性社会保障）：生命保险活动；养老基金活动；非生命保险活动。辅助金融中介的活动：金融市场组织（如证券交易所）的活动，包括投资银行、投资基金之类的证券交易活动；与金融中介有关的其他辅助活动。","type":"multi"},{"id":"cflue_zc_ch2.json_28","q":"国务院金融稳定发展委员会的职责有（）。","c":{"A":"审议金融业改革发展重大规划","B":"统筹金融改革和发展","C":"指导中央金融改革发展与监管","D":"落实党中央、国务院关于金融工作的决策部署"},"a":"ABD","an":"国务院金融稳定发展委员会的主要职责：1、落实党中央、国务院关于金融工作的决策部署；2、审议金融业改革发展重大规划；3、统筹金融改革发展与监管，协调货币政策与金融监管相关事项，统筹协调金融监管重大事项，协调金融政策与相关财政政策、产业政策等；4、分析研判国际国内金融形势，做好国际金融风险应对，研究系统性金融风险防范处置和维护金融稳定重大政策；5、指导地方金融改革发展与监管，对金融管理部门和地方政府进行业务监督和履职问责等。","type":"multi"},{"id":"cflue_zc_ch2.json_29","q":"2020年4月27日，中央全面深化改革委员会第十三次会议审议通过了《创业板改革并试点注册制总体实施方案》。创业板在试点注册制安排方面，参照科创板的做法，在坚持规范、透明、公开，严把质量关的基础上，将审核注册程序分为（）两个相互衔接的环节。","c":{"A":"证券业协会审核、中国证监会注册","B":"证券业协会注册、中国证监会审核","C":"交易所注册、中国证监会审核","D":"交易所审核、中国证监会注册"},"a":"D","an":"2020年4月27日，中央全面深化改革委员会第十三次会议审议通过了《创业板改革并试点注册制总体实施方案》。创业板在试点注册制安排方面，参照科创板的做法，在坚持规范、透明、公开，严把质量关的基础上，将审核注册程序分为【交易所审核、中国证监会注册】两个相互衔接的环节。","type":"single"},{"id":"cflue_zc_ch2.json_30","q":"2018年7月，小王手头有一笔闲钱，正考虑将这笔钱投资于金融市场，在其进行基本面分析时，应考虑主要宏观经济变量包括（）。","c":{"A":"经济周期","B":"国内生产总值","C":"国际资本流动","D":"财政政策"},"a":"ABC","an":"影响我国金融市场运行的主要因素包括：经济因素。经济因素包括宏观经济环境、宏观经济政策和国际经济因素。宏观经济变量包括国内生产总值、经济周期、通货膨胀与利率、汇率和国际资本流动。财政政策属于宏观经济政策，选择不包括C的选项。","type":"multi"},{"id":"cflue_zc_ch2.json_31","q":"目前，我国的商品期货交易所包括（）。","c":{"A":"郑州商品交易所","B":"广州期货交易所","C":"上海期货交易所","D":"大连商品交易所"},"a":"ABCD","an":"目前，我国成立了上海期货交易所、大连商品交易所和郑州商品交易所、广州期货交易所四大商品期货交易所。&amp;nbsp;&amp;nbsp;","type":"multi"},{"id":"cflue_zc_ch2.json_32","q":"以下属于选择性货币政策的是（）。","c":{"A":"不动产信用控制","B":"公开市场业务","C":"消费者信用控制","D":"证券市场信用控制"},"a":"ACD","an":"选择性货币政策工具主要包括：消费者信用控制、证券市场信用控制、不动产信用控制，除此之外，还有直接信用控制和间接信用控制等。","type":"multi"},{"id":"cflue_zc_ch2.json_33","q":"商业银行的主要业务包括（）。","c":{"A":"负债业务","B":"表外业务","C":"资产业务","D":"信托业务"},"a":"ABC","an":"商业银行的主要业务包括负债业务、资产业务和表外业务（担保承诺类、代理投融资服务类、中介服务类、其他类等）。","type":"multi"},{"id":"cflue_zc_ch2.json_34","q":"区域性市场投资者可以是（）。","c":{"A":"
