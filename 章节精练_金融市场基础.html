客户购买金融产品的资金。 （5）证券公司从事代销金融产品活动的人员不得接受委托人给予的财物或其他利益（D做法错误）。 （6）其他可能损害客户合法权益的行为。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_1651","q":"证券公司可以在区域性股权市场开展的业务包括但不限于（  ）。","c":{"A":"代理开立区域性股权市场证券账户","B":"推荐企业展示","C":"推荐企业挂牌","D":"为合格投资者提供企业研究报告和尽职调查信息"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司可以在区域性股权市场开展以下业务： （1）推荐企业挂牌（C）； （2）承销可转换为股票的公司债券，推荐本公司承销的可转换为股票的公司债券在区域性股权市场挂牌转让； （3）代理开立区域性股权市场证券账户（A）； （4）为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务； （5）利用自有资金或依法管理的资产管理等产品投资区域性股权市场的证券； （6）为证券的非公开发行组织合格投资者进行路演推介或其他促成投融资需求对接的活动； （7）为合格投资者提供企业研究报告和尽职调查信息（D）； （8）与商业银行、小额贷款公司等开展业务合作，为企业提供融资服务； （9）改制辅导、管理培训、管理咨询、财务顾问等相关服务； （10）推荐企业展示（B）； （11）中国证监会或中国证券业协会规定的其他业务。","type":"multi"},{"id":"cy_fin_1653","q":"根据《证券法》，下列关于擅自改变公开发行证券募集资金用途的说法，正确的有（）。 I 发行人违反该法规擅自改变公开发行证券所募集资金的用途的，责令改正，处以法定数额罚款 II 发行人违反该法规擅自改变公开发行证券所募集资金用途的，对直接负责的主管人员和其他直接责任人员给予警告，并处以法定数额罚款 III 发行人的控股股东、实际控制人从事或者组织、指使发行人违反规定擅自改变公开发行证券所募集资金的用途的，给予警告，并处以法定数额罚款 IV 发行人的实际控制人从事或者组织、指使发行人违反规定擅自改变公开发行证券所募集资金的用途的，对直接负责的主管人员和其他直接责任人员给予警告","c":{"A":"I、II、III、IV","B":"I、II、III","C":"I、III、IV","D":"II、III、IV"},"a":"B","an":"IV项错误，根据《证券法》第一百八十五条的规定，发行人违反本法相关规定擅自改变公开发行证券所募集资金的用途的，责令改正，处以50万元以上500万元以下的罚款；【对直接负责的主管人员和其他直接责任人员给予警告，并处以10万元以上100万元以下的罚款】。发行人的控股股东、实际控制人从事或者组织、指使从事前款违法行为的，给予警告，并处以50万元以上500万元以下的罚款；【对直接负责的主管人员和其他直接责任人员，处以10万元以上100万元以下的罚款】。 Ⅰ、Ⅱ、Ⅲ说法正确 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1655","q":"根据《证券法》，下列关于证券公司因违法承销证券而应承担法律责任的说法，正确的有（）。","c":{"A":"因不正当竞争给其他证券公司造成损失的，应当依法承担赔偿责任","B":"对直接负责的主管人员和其他直接责任人员可单独处罚款","C":"违法情节严重的，证券监督管理部门可暂停或撤销其证券承销业务许可","D":"除没收违法所得外，证券监督管理部门还可以并处罚款"},"a":"A,C,D","an":"选项A正确：证券公司承销证券存在《证券法》第二十九条第二款所列行为，给其他证券承销机构或者投资者造成损失的，应当依法承担赔偿责任。 选项CD正确，选项B错误：证券公司承销证券违反《证券法》第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处50万元以上500万元以下的罚款（D）；情节严重的，暂停或者撤销相关业务许可（C）。对直接负责的主管人员和其他直接责任人员给予警告，可以并处（并非单独处罚款，B错误） 20万元以上200万元以下的罚款；情节严重的，并处以50万元以上500万元以下的罚款。 综上所述，本题选ACD。","type":"multi"},{"id":"cy_fin_1657","q":"在对信息披露违法行为进行行政责任认定时，是否存在责任人有专业背景，对于信息披露中与其专业背景有关违法事项应当发现而未予指出的情况，是影响信息披露违法责任人员责任大小的认定因素之一。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"","type":"judge"},{"id":"cy_fin_1659","q":"诱骗投资者买卖证券，期货合约罪的犯罪主体包括（）。 Ⅰ 证券交易所的从业人员 Ⅱ 证券公司的从业人员 Ⅲ 证券业协会的工作人员 Ⅳ 证券期货监督管理部门的工作人员","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"该罪的主体是特殊主体，主要包括两个方面： （1）证券交易所、期货交易所、证券公司、期货经纪公司的从业人员。（Ⅰ、Ⅱ项正确）  （2）证券业协会、期货业协会或者证券期货监督管理部门的工作人员。（Ⅲ、Ⅳ项正确） 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_1661","q":"加强声誉约束是证券文化建设十个方面行为层关键要素之一。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券行业文化建设包括三个层次十个方面的关键要素。其中十个方面的要素包括：平衡各方利益、建立长效激励、“加强声誉约束”、落实责任担当、融合发展战略、强化文化认同、激发组织活力、秉承守正创新、崇尚专业精神以及坚持可持续发展。","type":"judge"},{"id":"cy_fin_1663","q":"根据《证券期货市场诚信监督管理办法》及《中国证券业协会诚信管理办法》，下列关于诚信管理的说法，错误的是（）。","c":{"A":"中国证监会建立全国统一的证券期货市场诚信档案数据库，记录证券期货市场诚信信息","B":"奖励信息、处罚处分信息效力期限为5年，但因证券期货违法行为被行政处罚、市场禁入的信息，效力期限为3年","C":"效力期限自奖励、处罚处分决定生效之日起算，奖励、处罚处分本身有执行期间的，效力期限自执行期间届满之日起算","D":"因证券期货犯罪或者其他犯罪被人民法院判处刑罚相关诚信信息，计入诚信档案"},"a":"B","an":"B项说法错误，奖励信息、处罚处分信息效力期限为3年，但因证券期货违法行为被行政处罚、市场禁入的信息，效力期限为【5年】。","type":"single"},{"id":"cy_fin_1665","q":"根据《证券市场禁入规定》，证券市场禁入措施不包括（  ）。","c":{"A":"不得担任发行人的核心技术人员","B":"不得在证券交易场所交易证券","C":"不得从事证券业务、证券服务业务","D":"不得担任证券发行人的董事、监事、高级管理人员"},"a":"A","an":"根据《证券市场禁入规定》第四条，执法单位可以采取的市场禁入种类包括： (1)不得从事证券业务、证券服务业务，不得担任证券发行人的董事、监事、高级管理人员（不包括核心技术人员，A错误）。 (2)不得在证券交易场所交易证券。 综上，该题选A。","type":"single"},{"id":"cy_fin_1667","q":"根据《上市公司并购重组财务顾问业务管理办法》，下列关于财务顾问主办人执业行为规范的说法，正确的有（）。 I 财务顾问主办人和项目协办人应当在财务顾问专业意见上签名 II 就中国证监会在反馈意见中提出的问题，财务顾问主办人应当与项目团队成员商议后直接尽快回复 III 财务顾问主办人应当督促委托人的董事、监事和高级管理人员及其他内幕信息知情人对所知悉的内幕信息严格保密 IV 财务顾问主办人应当参加中国证券业协会组织的相关培训","c":{"A":"I、II、III","B":"I、II","C":"I、III、IV","D":"II、III、IV"},"a":"C","an":"II项错误，财务顾问主办人应当就中国证监会在反馈意见中提出的问题按照内部程序向部门负责人、内部核查机构负责人等相关负责人报告，并对中国证监会提出的问题进行充分的研究、论证，【审慎回复】。","type":"single"},{"id":"cy_fin_1669","q":"根据《证券市场资信评级业务管理办法》，证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间应当回避的情形，说法错误的是（  ）。","c":{"A":"本人、直系亲属持有受评级机构或者受评级证券发行人的股份达到5%以上","B":"本人、直系亲属为受评级机构或者受评级证券发行人的普通员工","C":"本人、直系亲属持有受评级证券或者受评级机构发行的证券金额超过50万元","D":"本人、直系亲属担任受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所财务顾问等证券服务机构的负责人或者项目签字人"},"a":"B","an":"证券评级机构应当建立回避制度。证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间有下列情形之一的，应当回避： (1)本人、直系亲属持有评级委托方、受评级机构或者受评级证券发行人的股份达到5%以上（A），或者是受评级机构、受评级证券发行人的实际控制人； (2)本人、直系亲属担任评级委托方、受评级机构或者受评级证券发行人的董事、监事和高级管理人员（不包括普通员工，B错误）； (3)本人、直系亲属担任评级委托方、受评级机构或者受评级证券发行人聘任的会计师事务所、律师事务所、财务顾问等证券服务机构的负责人或者项目签字人（D）； (4)本人、直系亲属持有评级委托方、受评级证券或者受评级机构发行的证券金额超过 50万元（C），或者与评级委托方、受评级机构、受评级证券发行人发生累计超过50万元的交易； (5)中国证监会认定的足以影响独立、客观、公正、审慎性原则的其他情形。 综上，该题选B。","type":"single"},{"id":"cy_fin_1671","q":"证券投资者保护基金管理机构无权对证券投资者保护基金的使用情况进行检查。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金。证券投资者保护基金管理机构可以（并非无权）对证券投资者保护基金的使用情况进行检查。","type":"judge"},{"id":"cy_fin_1673","q":"资产支持证券初始挂牌交易单位所对应的发行面值或等值份额应不少于人民币（）。","c":{"A":"100万元","B":"1000万元","C":"500万元","D":"1亿元"},"a":"A","an":"资产支持证券仅限于在合格投资者范围内转让。转让后，持有资产支持证券的合格投资者合计不得超过200人。资产支持证券初始挂牌交易单位所对应的发行面值或等值份额应不少于人民币100万元。","type":"single"},{"id":"cy_fin_1675","q":"证券公司专项计划的原始权益人，其职责不包括（）。","c":{"A":"配合并支持管理人、托管人以及其他为资产证券化业务提供服务的机构履行职责","B":"依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产","C":"专项计划法律文件约定的职责","D":"办理资产支持证券发行事宜"},"a":"D","an":"D项是管理人的职责。 选项ABC包括：原始权益人不得侵占、损害专项计划资产，并应当履行下列职责：依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产；配合并支持管理人、托管人以及其他为资产证券化业务提供服务的机构履行职责；专项计划法律文件约定的其他职责。","type":"single"},{"id":"cy_fin_1677","q":"发行人申请公开发行股票、可转换为股票的公司债券，依法采取承销方式的，或者公开发行法律、行政法规规定实行保荐制度的其他证券的，应当聘请（）担任保荐人。","c":{"A":"证券交易所","B":"证券公司","C":"证券登记结算机构","D":"中国证监会"},"a":"B","an":"选项B正确：发行人申请公开发行股票、可转换为股票的公司债券，依法采取承销方式的，或者公开发行法律、行政法规规定实行保荐制度的其他证券的，应当聘请证券公司担任保荐人。 选项A错误：证券交易所负责证券上市审核及监管，不担任保荐人。 选项C错误：证券登记结算机构负责证券登记、结算等业务，与保荐无关。 选项D错误：中国证监会是监管机构，而非市场中介服务机构。","type":"single"},{"id":"cy_fin_1679","q":"下列关于保荐机构撤销业务资格的说法正确的是（）。","c":{"A":"终止保荐协议的，保荐机构和发行人应当自终止之日起10个工作日内向中国证监会、证券交易所报告，说明原因","B":"刊登证券发行募集文件以后直至持续督导工作结束，保荐机构和发行人不得终止保荐协议，但存在合理理由的情形除外","C":"持续督导期间，保荐机构被撤销保荐业务资格的，发行人应当在3个月内另行聘请保荐机构","D":"因原保荐机构被撤销保荐业务资格而另行聘请保荐机构的，另行聘请的保荐机构持续督导的时间不得少于3个完整的会计年度"},"a":"B","an":"B项正确，刊登证券发行募集文件以后直至持续督导工作结束，保荐机构和发行人不得终止保荐协议，但存在合理理由的情形除外。 A项错误，终止保荐协议的，保荐机构和发行人应当自终止之日起5个工作日内向中国证监会、证券交易所报告，说明原因。 C项错误，持续督导期间，保荐机构被撤销保荐业务资格的，发行人应当在1个月内另行聘请保荐机构。 D项错误，因原保荐机构被撤销保荐业务资格而另行聘请保荐机构的，另行聘请的保荐机构持续督导的时间不得少于1个完整的会计年度。","type":"single"},{"id":"cy_fin_1681","q":"以下不符合证券投资顾问执业行为准则的是（）。","c":{"A":"忠实客户利益","B":"提供适当的投资建议服务","C":"以个人名义向客户收取适当的证券投资顾问服务费用","D":"提供投资建议应具有合理依据"},"a":"C","an":"证券投资顾问执业行为准则： （1）忠实客户利益。 （2）提供适当的投资建议服务。 （3）提供投资建议应具有合理依据。 （4）规范参与媒体证券节目。 （5）禁止行为。 C项是证券投资顾问不得从事的活动。","type":"single"},{"id":"cy_fin_1683","q":"合规负责人发现证券公司存在违法违规行为或合规风险隐患的，应当依照公司章程规定及时向（）、经营管理主要负责人报告，提出处理意见，并督促整改。","c":{"A":"股东(大)会","B":"董事会","C":"监事会","D":"执行董事"},"a":"B","an":"合规负责人发现证券公司存在违法违规行为或合规风险隐患的，应当按照如下办法处理：依照公司章程规定及时向董事会、经营管理主要负责人报告，提出处理意见，并督促整改；合规负责人应当同时督促公司及时向中国证监会相关派出机构报告；公司未及时报告的，应当直接向中国证监会相关派出机构报告；有关行为违反行业规范和自律规则的，还应当向有关自律组织报告。","type":"single"},{"id":"cy_fin_1685","q":"证券公司代销金融产品，应当采取适当方式，向客户披露（）金融产品合同当事人情况介绍、金融产品说明书等材料。","c":{"A":"中国证监会发布的","B":"证券公司根据委托人材料制作的","C":"证券公司独立收集分析的","D":"委托人提供的"},"a":"D","an":"证券公司应当采取适当方式，向客户披露委托人提供的金融产品合同当事人情况介绍、金融产品说明书等材料，全面、公正、准确地介绍金融产品有关信息，并披露其与金融合同当事人之间是否存在关联关系。","type":"single"},{"id":"cy_fin_1687","q":"下列关于证券经营机构执行投资者适当性管理过程中应遵循的基本原则，错误的是()。","c":{"A":"主观性原则","B":"投资者利益优先原则","C":"差异性原则","D":"勤勉尽责原则"},"a":"A","an":"经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循以下原则。 (一)投资者利益优先原则（B正确） (二)勤勉尽责原则（D正确） (三)客观性原则（A错误） (四)有效性原则 (五)差异性原则（C正确）","type":"single"},{"id":"cy_fin_1689","q":"证券投资咨询业务的基本形式包括（）。","c":{"A":"证券投资顾问业务","B":"财务顾问","C":"投资者教育","D":"发布证券研究报告"},"a":"A,D","an":"选项AD正确：证券投资顾问业务和发布证券研究报告是证券投资咨询业务的两种基本形式，也是证券经营机构服务客户的重要手段。 选项B错误：“财务顾问”属于企业并购重组。 选项C错误：“投资者教育”是公益性质活动","type":"multi"},{"id":"cy_fin_1691","q":"下列关于证券公司观察名单、限制名单管理的基本要求，说法正确的是（）。","c":{"A":"证券公司已经或可能掌握内幕信息的，应当将内幕信息所涉公司或证券列入观察名单","B":"观察名单属于高度保密的名单，仅限于履行相关管理和监控职责的工作人员知悉","C":"证券公司采取信息隔离和披露措施难以有效管理利益冲突的，不应将敏感信息所涉公司或证券列入限制名单","D":"观察名单并不影响证券公司正常开展业务，但证券公司应当对于列入观察名单的公司或证券有关的相关业务活动实施监控，发现异常情况，及时调查处理"},"a":"A,B,D","an":"选项C错误：证券公司采取信息隔离和披露措施难以有效管理利益冲突的，应当将敏感信息所涉公司或证券列入限制名单。 选项ABD说法正确。","type":"multi"},{"id":"cy_fin_1693","q":"证券公司应当妥善保存信息系统（）过程中产生的文档，并根据业务开展情况以及信息系统的重要程度建立与监测工作相适应的日志留痕机制，确保满足应急处置和审计需要。","c":{"A":"开发","B":"测试","C":"上线","D":"变更及运维"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当妥善保存信息系统开发、测试、上线、变更及运维过程中产生的文档，并根据业务开展情况以及信息系统的重要程度建立与监测工作相适应的日志留痕机制，确保满足应急处置和审计需要。","type":"multi"},{"id":"cy_fin_1695","q":"下列属于证券登记结算机构职能的有()。","c":{"A":"证券的存管和过户","B":"证券交易的清算和交收","C":"受发行人的委托派发证券权益","D":"证券账户、结算账户的设立"},"a":"A,B,C,D","an":"证券登记结算机构应履行下列职能： (1)证券账户、结算账户的设立；（D正确） (2)证券的存管和过户；（A正确） (3)证券持有人名册登记； (4)证券交易的清算和交收；（B正确） (5)受发行人的委托派发证券权益；（C正确） (6)办理与上述业务有关的查询、信息服务； (7)国务院证券监督管理机构批准的其他业务。","type":"multi"},{"id":"cy_fin_1697","q":"证券行业文化建设观念层，包括融合发展战略、强化文化认同、激发组织活力三个要素。（）","c":{"1":"对","0":"错"},"a":"0","an":"组织层，包括融合发展战略、强化文化认同、激发组织活力三个要素。 观念层，包括秉承守正创新、崇尚专业精神、坚持可持续发展三个要素。","type":"judge"},{"id":"cy_fin_1699","q":"发行人、证券登记结算机构、证券公司、证券服务机构未按照规定保存有关文件和资料的，责令改正，给予警告，并处以10万元以上100万元以下的罚款。（）","c":{"1":"对","0":"错"},"a":"1","an":"发行人、证券登记结算机构、证券公司、证券服务机构未按照规定保存有关文件和资料的，责令改正，给予警告，并处以10万元以上100万元以下的罚款。","type":"judge"},{"id":"cy_fin_1701","q":"证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起60个工作日作出批准或者不予批准的书面决定。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起30个工作日作出批准或者不予批准的书面决定。","type":"judge"},{"id":"cy_fin_1703","q":"证券的代销、包销期限最长不得超过60日。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券的代销、包销期限最长不得超过【90日】。","type":"judge"},{"id":"cy_fin_1705","q":"保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入5倍以上10倍以下的罚款。（）","c":{"1":"对","0":"错"},"a":"0","an":"保荐人出具有虚假记载、误导性陈述或者重大遗漏的保荐书，或者不履行其他法定职责的，责令改正，给予警告，没收业务收入，并处以业务收入1倍以上10倍以下的罚款。","type":"judge"},{"id":"cy_fin_1707","q":"合格境内投资者开展境外证券投资业务，无需向国家外汇管理局申请经营外汇业务资格。（）","c":{"1":"对","0":"错"},"a":"0","an":"合格境内投资者【应当】依照有关规定向国家外汇管理局【申请经营外汇业务资格】。","type":"judge"},{"id":"cy_fin_1709","q":"对于经评估不符合交易商条件的证券公司，设置三年过渡期，过渡期内不得新增业务规模。（）","c":{"1":"对","0":"错"},"a":"0","an":"对于经评估不符合交易商条件的证券公司，设置【一年】过渡期，过渡期内不得新增业务规模；过渡期结束，仍未符合一级或二级交易商条件的，调出相应级别交易商名单。","type":"judge"},{"id":"cy_fin_1711","q":"中国证监会、国务院其他主管部门等其他省部级以上单位作出的表彰、奖励应当记入中国证监会建立的全国统一的证券期货市场诚信档案数据库。（）","c":{"1":"对","0":"错"},"a":"1","an":"中国证监会、国务院其他主管部门等其他省部级及以上单位和证券期货交易场所、证券期货市场行业协会、证券登记结算机构等全国性证券期货市场行业组织作出的表彰、奖励、评比，以及信用评级机构、诚信评估机构作出的信用评级、诚信评估记入诚信档案。","type":"judge"},{"id":"cy_fin_1713","q":"张某系某上市公司董事长，指示公司有关人员伪造工程进度单、人工成本计算单、材料成本等相关资料，签订无真实交易背景的购销合同并伪造有关凭证，虚增营业收入2000万元，并将前述数据载入相关定期报告，张某因此被证监会采取5年证券市场禁入。存在以下哪些情形时，可以对张某从轻、减轻采取证券市场禁入措施？（）","c":{"A":"虚增业绩被揭露后该上市公司股价受其他利好因素影响仍然大涨，无投资者通过法律途径维权","B":"及时停止、纠正违规行为，主动减轻行为危害后果","C":"积极配合监管部门调查，并检举揭发其他上市公司员工的内幕交易行为","D":"确有证据证明张某系受公司大股东胁迫而实施相关行为"},"a":"B,C,D","an":"选项BCD正确：有下列情形之一的，应当对有关责任人员从轻、减轻采取证券市场禁入措施： （1）主动消除或者减轻违法行为危害后果的； （2）配合查处违法行为有立功表现的； （3）受他人胁迫或者诱骗实施违法行为的； （4）在执法单位依法作出行政处罚决定或者证券市场禁入决定前主动交代违法行为的； （5）其他依法应当从轻、减轻采取证券市场禁入措施的。 选项A错误：张某的行为已明确虚增收入并载入定期报告，构成违法，与有无投资者维权无关。","type":"multi"},{"id":"cy_fin_1715","q":"唐某为甲证券公司甲市营业部总经理，负责营业部全面工作。孙某为甲证券公司甲市营业部客户经理，负责开发及维护客户。2022年6月，孙某向客户沙某介绍甲市营业部有保本理财产品，并承诺保本保收益，沙某在甲市营业部开具证券账户，并向账户内转款人民币1568余万元。唐某、孙某向沙某索要了账户交易密码。随后，在未通知沙某也未取得其同意的情况下，唐某、孙某自行使用沙某账户交易密码进行交易。2022年7月至2022年8月，唐某、孙某擅自运用沙某证券账户进行交易、造成沙某证券账户亏损人民币1080万元，为甲证券公司赚取交易手续费121万元。甲证券公司在本案例当中，构成(  )。","c":{"A":"操纵证券、期货市场罪","B":"背信运用受托财产罪","C":"内幕交易、泄露内幕信息罪","D":"诱骗投资者买卖证券、期货合约罪"},"a":"B","an":"选项B正确：背信运用受托财产，是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。 选项A错误：本案无过操纵交易价格或交易量牟利行为。 选项C错误：本案不涉及内幕信息。 选项D错误：诱骗投资者买卖罪通常指故意提供虚假信息诱导交易，但本案核心是擅自运用客户资金。","type":"single"},{"id":"cy_fin_1717","q":"资产管理计划成立不足（）个月或者存续期间不足（）个月的，证券公司可以不编制资产管理计划当期的季度报告和年度报告。","c":{"A":"3；6","B":"3；3","C":"5；6","D":"5；3"},"a":"B","an":"资产管理计划成立不足3个月或者存续期间不足3个月的，证券公司可以不编制资产管理计划当期的季度报告和年度报告。","type":"single"},{"id":"cy_fin_1719","q":"下列有关证券交易所的规定中，正确的是()。","c":{"A":"证券交易所设总经理1人，由证券交易所的会员公开选举","B":"证券交易所章程的制定和修改，必须经过国务院证券监督管理机构批准","C":"证券交易所的财产积累归会员所有，在其存续期间，每一会计年度期末进行分配","D":"个人不得使用证券交易所或者近似的名称，但是单位可以"},"a":"B","an":"选项B正确：证券交易所章程的制定和修改，必须经过国务院证券监督管理机构批准。 选项A错误：证券交易所设总经理1人，由国务院证券监督管理机构任免。   选项C错误：证券交易所在其存续期间，不得将其财产积累分配给会员。  选项D错误：证券交易所必须在其名称中标明“证券交易所”字样，其他任何单位或者个人不得使用证券交易所或近似的名称。","type":"single"},{"id":"cy_fin_1721","q":"首次公开发行证券的发行人和主承销商应当在发行和承销过程中采用询价方式的，应当在网上申购前发布投资风险特别公告，详细说明定价合理性，提示投资者注意投资风险的情形不包括()。","c":{"A":"发行价格超过境外市场价格的","B":"发行人尚未盈利的","C":"发行价格对应市盈率超过同行业上市公司二级市场平均市盈率的","D":"发行价格超过剔除最高报价后网下投资者报价的中位数和加权平均数，以及剔除最高报价后公募基金、社保基金、养老金、年金基金、保险资金和合格境外投资者资金报价中位数和加权平均数的孰高值的"},"a":"D","an":"首次公开发行证券的发行人和主承销商应当在发行和承销过程中采用询价方式且存在以下情形之一的，应当在网上申购前发布投资风险特别公告，详细说明定价合理性，提示投资者注意投资风险：(1)发行价格对应市盈率超过同行业上市公司二级市场平均市盈率的（C包括）。(2)发行价格超过剔除最高报价后网下投资者报价的中位数和加权平均数，以及剔除最高报价后公募基金、社保基金、养老金、年金基金、保险资金和合格境外投资者资金报价中位数和加权平均数的孰低值的（并非孰高值，D不包括）。(3)发行价格超过境外市场价格的（A包括）。(4)发行人尚未盈利的。（B包括）","type":"single"},{"id":"cy_fin_1723","q":"国务院证券监督管理机构可以要求（），在指定的期限内提供与证券公司经营管理和财务状况有关的资料、信息。","c":{"A":"证券公司的董事、监事、工作人员","B":"证券公司的股东、实际控制人","C":"证券公司控股或者实际控制的企业","D":"证券公司的开户银行、指定商业银行、资产托管机构、证券交易所、证券登记结算机构"},"a":"A,B,C,D","an":"选项ABCD正确：国务院证券监督管理机构可以要求下列单位或者个人，在指定的期限内提供与证券公司经营管理和财务状况有关的资料、信息： （1）证券公司的董事、监事、工作人员；  （2）证券公司的股东、实际控制人；  （3）证券公司控股或者实际控制的企业；  （4）证券公司的开户银行、指定商业银行、资产托管机构、证券交易所、证券登记结算机构； （5）为证券公司提供服务的证券服务机构。","type":"multi"},{"id":"cy_fin_1725","q":"证券公司承销证券，不得（）。","c":{"A":"进行虚假的广告宣传或者其他宣传推介活动","B":"进行误导投资者的广告宣传或者其他宣传推介活动","C":"以不正当竞争手段招揽承销业务","D":"提示客户投资有风险"},"a":"A,B,C","an":"选项ABC正确：证券公司承销证券，不得有下列行为：①进行虚假的或者误导投资者的广告宣传或者其他宣传推介活动；②以不正当竞争手段招揽承销业务；③其他违反证券承销业务规定的行为。证券公司有前款所列行为，给其他证券承销机构或者投资者造成损失，应当依法承担赔偿责任。 选项D错误：提示风险是合规要求而非禁止事项。","type":"multi"},{"id":"cy_fin_1727","q":"证券研究报告主要包括(  )。","c":{"A":"价值分析报告","B":"财务分析报告","C":"行业研究报告","D":"投资策略报告"},"a":"A,C,D","an":"证券研究报告主要包括涉及证券及证券相关产品的价值分析报告（A）、行业研究报告（C）、投资策略报告（D）等。证券研究报告可以采用书面或者电子文件形式。 选项B为干扰项","type":"multi"},{"id":"cy_fin_1729","q":"证券公司首席信息官的任职条件包括(  )。","c":{"A":"从事信息技术相关工作10年以上","B":"在证券监管机构、证券基金业自律组织任职8年以上","C":"最近2年未被金融监管机构实施行政处罚或采取重大行政监管措施","D":"在证券监管机构、证券基金业自律组织任职10年以上"},"a":"A,B","an":"证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作，并具备下列任职条件： 1.从事信息技术相关工作10年以上，或者在证券监管机构、证券基金业自律组织任职8年以上；（AB正确，D错误） 2.最近3年未被金融监管机构实施行政处罚或采取重大行政监管措施；（C错误） 3.中国证监会规定的其他条件。","type":"multi"},{"id":"cy_fin_1731","q":"证券行业文化建设包括三个层次，下列属于观念层的有()。","c":{"A":"秉承守正创新","B":"崇尚专业精神","C":"强化文化认同","D":"坚持可持续发展"},"a":"A,B,D","an":"选项ABD正确：观念层包括秉承守正创新、崇尚专业精神、坚持可持续发展。 选项C错误：组织层，包括融合发展战略、强化文化认同、激发组织活力三要素。","type":"multi"},{"id":"cy_fin_1733","q":"按照《证券发行上市保荐业务管理办法》的规定，保荐代表人的执业行为总体规范有()。","c":{"A":"遵守法律、行政法规和中国证监会、证券交易所、中国证券业协会的相关规定","B":"恪守业务规则和行业规范，诚实守信，勤勉尽责，廉洁从业，尽职推荐发行人证券发行上市","C":"持续督导发行人履行规范运作、信守承诺、信息披露等义务","D":"保荐机构及其保荐代表人、其他从事保荐业务的人员不得通过从事保荐业务谋取任何不正当利益"},"a":"A,B,C,D","an":"选项ABCD正确：根据《保荐办法》《证券公司保荐业务规则》，保荐机构及其保荐代表人、其他从事保荐业务的人员应当遵守法律、行政法规和中国证监会、证券交易所、中国证券业协会的相关规定，恪守业务规则和行业规范，诚实守信，勤勉尽责，廉洁从业，严谨专业、严控风险、廉洁自律开展保荐业务，尽职推荐发行人证券发行上市，持续督导发行人履行规范运作、信守承诺、信息披露等义务，不得通过从事保荐业务谋取任何不正当利益。","type":"multi"},{"id":"cy_fin_1735","q":"证券公司向投资者收取证券交易佣金，不得有()行为。","c":{"A":"收取的佣金略高于证券经纪业务服务成本","B":"使用“零佣”进行宣传","C":"使用“免费”进行宣传","D":"反不正当竞争法和反垄断法规定的其他禁止行为"},"a":"B,C,D","an":"证券公司向投资者收取证券交易佣金，不得有下列行为：(1)收取的佣金明显低于证券经纪业务服务成本（A错误）。(2)使用“零佣”“免费”等用语进行宣传（BC正确）。(3)反不正当竞争法和反垄断法规定的其他禁止行为。（D正确）","type":"multi"},{"id":"cy_fin_1737","q":"证券金融公司开展转融通业务时，可以使用的资金和证券有()。","c":{"A":"自有资金和证券","B":"通过证券交易所的业务平台融入的资金和证券","C":"通过证券金融公司的业务平台融入的证券","D":"依法募集的其他资金和证券"},"a":"A,B,D","an":"证券金融公司开展转融通业务，可以使用下列资金和证券： 1.自有资金和证券；（A正确） 2.通过证券交易所的业务平台融入的资金和证券；（B正确） 3.通过证券金融公司的业务平台融入的资金；（注意无证券，C错误） 4.依法筹集的其他资金和证券。（D正确）","type":"multi"},{"id":"cy_fin_1739","q":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，应当在合同签订、产品销售、服务提供、客户回访、投诉处理等各个业务环节中，加强投资者教育和客户权益保护。(  )","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，应当在合同签订、产品销售、服务提供、客户回访、投诉处理等各个业务环节中，加强投资者教育和客户权益保护。","type":"judge"},{"id":"cy_fin_1741","q":"证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金，但无权对证券投资者保护基金的使用情况进行检查。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金。证券投资者保护基金管理机构【可以】对证券投资者保护基金的使用情况进行检查。","type":"judge"},{"id":"cy_fin_1743","q":"证券金融公司应当每年按照税后利润的10%提取风险准备金，中国证券业协会可以根据防范证券金融公司风险的需要，对提取比例进行调整。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券金融公司应当每年按照税后利润的10%提取风险准备金，【中国证监会】可以根据防范证券金融公司风险的需要，对提取比例进行调整。","type":"judge"},{"id":"cy_fin_1745","q":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行。","type":"judge"},{"id":"cy_fin_1747","q":"加强声誉约束是证券文化建设十大方面行为层关键要素之一。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券行业文化建设包括三大层次十大方面的关键要素： （1）行为层，包括平衡各方利益、建立长效激励、加强声誉约束、落实责任担当四个要素。 （2）组织层，包括融合发展战略、强化文化认同、激发组织活力三个要素。 （3）观念层，包括秉承守正创新、崇尚专业精神、坚持可持续发展三个要素。","type":"judge"},{"id":"cy_fin_1749","q":"司法机关依法对证券公司转融通担保证券明细账户记载的权益采取财产保全措施的，证券金融公司应当处分保证金，在实现因向证券公司转融通所生债权前，协助司法机关执行。()","c":{"1":"对","0":"错"},"a":"0","an":"本题考查协助司法强制执行。司法机关依法对证券公司转融通担保证券明细账户或者转融通担保资金明细账户记载的权益采取财产保全或者强制执行措施的，证券金融公司应当处分保证金，在实现因向证券公司转融通所生债权后，协助司法机关执行。","type":"judge"},{"id":"cy_fin_1751","q":"《证券法》1999年7月1日起正式实施，自实施以来，共经历了三次修正和两次修订，现行适用的《证券法》为根据2019年12月28日第十三届全国人民代表大会常务委员会第十五次会议修订后的《证券法》，于2020年3月1日起施行。《证券法》的立法宗旨在于：规范证券发行和交易行为，保护投资者的合法权益，维护社会经济秩序和社会公共利益，促进社会主义市场经济的发展。下列关于证券发行和交易活动遵循原则，说法正确的有（）。","c":{"A":"公平","B":"公开","C":"公正","D":"公允"},"a":"A,B,C","an":"选项ABC正确：证券的发行、交易活动，必须遵循“公开、公平、公正”三公原则。 选项D为干扰项","type":"multi"},{"id":"cy_fin_1753","q":"根据《证券发行上市保荐业务管理办法》，保荐机构及其保荐代表人履行保荐职责时拥有的权利不包括（）。","c":{"A":"要求发行人按照该办法规定和保荐协议约定的方式，及时通报信息","B":"对发行人的信息披露文件及向中国证监会、证券交易所提交的其他文件进行事前审阅","C":"列席发行人的股东会、董事会和监事会","D":"定期或者不定期对发行人进行回访，查阅除保荐工作需要以外的发行人材料"},"a":"D","an":"根据《证券发行上市保荐业务管理办法》，保荐机构及其保荐代表人履行保荐职责，可以对发行人行使下列权利： （1）要求发行人按照该办法规定和保荐协议约定的方式，及时通报信息；（A包括） （2）定期或者不定期对发行人进行回访，查阅保荐工作需要的发行人材料；（工作所需，而非需要以外的材料，D不包括） （3）列席发行人的股东会、董事会和监事会；（C包括） （4）对发行人的信息披露文件及向中国证监会、证券交易所提交的其他文件进行事前审阅；（B包括） （5）对有关部门关注的发行人相关事项进行核查，必要时可聘请相关证券服务机构配合； （6）按照中国证监会、证券交易所信息披露规定，对发行人违法违规的事项发表公开声明； （7）中国证监会、证券交易所规定或者保荐协议约定的其他权利。 故本题答案选D。","type":"single"},{"id":"cy_fin_1755","q":"根据《证券公司风险处置条例》，接管期限一般不超过（）个月，期满后确实需要继续接管的，国务院证券监管机构可以决定延期，延期最长不超过（）个月。","c":{"A":"6；6","B":"12；6","C":"12；12","D":"12；18"},"a":"C","an":"接管期限一般不超过12个月。满12个月，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过12个月。","type":"single"},{"id":"cy_fin_1757","q":"企业被托管组、接管组托管或接管的，企业信息披露义务由（）承担。企业进入破产程序的，企业信息披露义务由（）承担，企业自行管理财产或营业事务的除外。","c":{"A":"托管组、接管组；破产管理人","B":"托管组、接管组；破产人","C":"托管组；破产管理人","D":"接管组；破产人"},"a":"A","an":"企业被托管组、接管组托管或接管的，企业信息披露义务由托管组、接管组承担。企业进入破产程序的，企业信息披露义务由破产管理人承担，企业自行管理财产或营业事务的除外。 综上，该题选A，选项BCD为干扰项。","type":"single"},{"id":"cy_fin_1759","q":"关于证券交易所风险基金，下列说法中错误是（）。","c":{"A":"证券交易所应当从其收取的交易费用和会员费、席位费中提取一定比例的金额设立风险基金","B":"风险基金由证券交易所理事会管理","C":"风险基金提取的具体比例和使用办法，由国务院证券监督管理机构会同中国证券投资基金业协会规定","D":"证券交易所应当将收存的风险基金存入开户银行专门账户，不得擅自使用"},"a":"C","an":"C项错误，风险基金提取的具体比例和使用办法，由国务院证券监督管理机构会同国务院财政部门规定。 A项正确，证券交易所应当从其收取的交易费用和会员费、席位费中提取一定比例的金额设立风险基金。 B项正确，风险基金由证券交易所理事会管理。 D项正确，证券交易所应当将收存的风险基金存入开户银行专门账户，不得擅自使用。","type":"single"},{"id":"cy_fin_1761","q":"证券公司管理敏感信息的基本原则是(  )，这是信息隔离墙制度中敏感信息管理的核心原则。","c":{"A":"责任自负原则","B":"需知原则","C":"分散投资原则","D":"理智投资原则"},"a":"B","an":"证券公司应当按照需知原则管理敏感信息。需知原则是信息隔离墙制度中敏感信息管理的核心原则，有需要方享有知情权。敏感信息应仅限于“需要知悉”的人知悉，即仅限于存在合理业务需求或管理职责需要的工作人员才可获得相关敏感信息。 综上，该题选B，选项ACD为干扰项。","type":"single"},{"id":"cy_fin_1763","q":"证券公司应当根据应急预案定期组织关键岗位人员开展应急演练，演练频率不低于每年一次，并确保应急演练在（）年内覆盖全部重要信息系统。","c":{"A":"2","B":"1","C":"5","D":"3"},"a":"A","an":"证券公司应当根据系统变更、业务变化等情况，持续更新应急预案。证券公司应当根据应急预案定期组织关键岗位人员开展应急演练，演练频率不低于每年一次，并确保应急演练在2年内覆盖全部重要信息系统。","type":"single"},{"id":"cy_fin_1765","q":"证券研究报告应当由登记为证券分析师的专职质量审核人员进行质量审核；证券分析师数量少于（）人的可以由署名证券分析师之外的证券分析师进行质量审核。","c":{"A":"5","B":"10","C":"20","D":"3"},"a":"B","an":"证券研究报告应当由登记为证券分析师的专职质量审核人员进行质量审核；证券分析师数量少于10人的可以由署名证券分析师之外的证券分析师进行质量审核。","type":"single"},{"id":"cy_fin_1767","q":"通过证券交易所的证券交易，投资者持有一个上市公司已发行的有表决权股份达到()时，继续进行收购的，应当依法向该上市公司所有股东发出收购上市公司全部或者部分股份的要约。","c":{"A":"0.1","B":"0.2","C":"0.3","D":"0.5"},"a":"C","an":"本题考查收购要约。通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一个上市公司已发行的有表决权股份达到30%时，继续进行收购的，应当依法向该上市公司所有股东发出收购上市公司全部或者部分股份的要约。","type":"single"},{"id":"cy_fin_1769","q":"专项计划管理人应当将发生的可能对资产支持证券投资价值或价格产生实质影响的重大事件及时向投资者披露，并()。","c":{"A":"向中国基金业协会、证券交易场所报告，同时抄送对管理人有辖区监管权的中国证监会派出机构","B":"向中国基金业协会、证券交易场所报告","C":"向中国证券业协会报告","D":"向中国证券业协会报告，同时抄送对管理人有辖区监管权的中国证监会派出机构"},"a":"A","an":"发生可能对资产支持证券投资价值或价格有实质性影响的重大事件，管理人应当及时将有关该重大事件的情况向资产支持证券合格投资者披露，说明事件的起因、目前的状态和可能产生的法律后果，并向证券交易场所、中国基金业协会报告，同时抄送对管理人有辖区监管权的中国证监会派出机构。 综上，该题选A，选项BCD为干扰项。","type":"single"},{"id":"cy_fin_1771","q":"另类子公司应当在每月结束后()个工作日内按照证券业协会的要求报送另类投资业务月度报表。","c":{"A":"7","B":"5","C":"10","D":"15"},"a":"C","an":"另类子公司应当在每月结束后10个工作日内按照证券业协会的要求报送另类投资业务月度报表。另类子公司应当在每年结束之日起4个月内按照协会的要求报送另类投资业务年度报告。","type":"single"},{"id":"cy_fin_1773","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务时，应当告知客户的下列信息中，错误的是()。","c":{"A":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","B":"证券投资顾问的姓名及其登记编码","C":"证券投资顾问服务的内容和方式","D":"投资决策与客户共同作出"},"a":"D","an":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： (1)公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等；（A正确） (2)证券投资顾问的姓名及其登记编码；（B正确） (3)证券投资顾问服务的内容和方式；（C正确） (4)投资决策由客户作出，投资风险由客户承担；（D错误） (5)证券投资顾问不得代客户作出投资决策。 证券公司、证券投资咨询机构应当通过营业场所、中国证券业协会和公司网站，公示前段第(1)项、第(2)项信息，方便投资者查询、监督。","type":"single"},{"id":"cy_fin_1775","q":"目前的证券交易通道包括（）。","c":{"A":"银行营业网点柜台服务","B":"热键委托自助式交易通道服务","C":"网上交易通道","D":"电话委托自助式交易通道服务"},"a":"B,C,D","an":"选项BCD正确：投资者向证券公司下达委托指令的方式由双方约定，包括柜台委托、自助委托以及证券公司认可的其他合法委托方式，其中自助委托包括网上委托、电话委托、热键委托等。 选项A错误：柜台委托指的是证券公司营业网点柜台，银行柜台无法进行证券交易。","type":"multi"},{"id":"cy_fin_1777","q":"首次公开发行股票的发行人和主承销商在网上申购前，应当公开披露的信息有（）。","c":{"A":"有效报价和发行价格（或发行价格区间）的确定过程","B":"网下、网上的发行方式和发行数量","C":"发行价格（或发行价格区间）及对应的市盈率","D":"剔除最高报价部分后网下投资者报价的中位数和加权平均数"},"a":"A,B,C,D","an":"首次公开发行证券的发行人和主承销商应当在发行和承销过程中公开披露以下信息，并遵守证券交易所的相关规定： 网上申购前，应当披露每位网下投资者的详细报价情况，包括投资者名称、申购价格及对应的拟申购数量；剔除最高报价有关情况；剔除最高报价部分后网下投资者报价的中位数和加权平均数（D正确）以及公募基金、社保基金、养老金、年金基金、保险资金和合格境外投资者资金报价的中位数和加权平均数；有效报价和发行价格（或发行价格区间）的确定过程（A正确）；发行价格（或发行价格区间）及对应的市盈率（C正确）；按照发行价格计算的募集资金情况，所筹资金不能满足使用需求的，还应当披露相关投资风险；网下、网上的发行方式和发行数量（B正确）；回拨机制；中止发行安排；申购缴款要求等。已公告老股转让方案的，还应披露老股转让和新股发行的确定数量，老股转让股东名称及各自转让老股数量，并应提示投资者关注，发行人将不会获得老股转让部分所得资金。","type":"multi"},{"id":"cy_fin_1779","q":"证券交易所履行自律管理职能，应当遵守社会公共利益优先原则，维护市场的（）。","c":{"A":"公平","B":"有序","C":"透明","D":"隐蔽"},"a":"A,B,C","an":"证券交易所履行自律管理职能，应当遵守社会公共利益优先原则，维护市场的公平（A正确）、有序（B正确）、透明（C正确，D错误）。","type":"multi"},{"id":"cy_fin_1781","q":"证券公司从事私募资产管理业务，应当遵循的原则包括（）。","c":{"A":"自愿","B":"公开","C":"客户利益至上","D":"诚实信用"},"a":"A,C,D","an":"证券公司从事私募资产管理业务，应当遵循自愿（A正确）、公平（私募强调非公开，B错误）、诚实信用（D正确）和客户利益至上原则（C正确），恪尽职守，谨慎勤勉，维护投资者合法权益，服务实体经济，不得损害国家利益、社会共同利益和他人合法权益。","type":"multi"},{"id":"cy_fin_1783","q":"下列属于内幕交易、泄露内幕信息罪犯罪主体的有（）。","c":{"A":"发行人及其董事、监事、高级管理人员","B":"持有公司5%以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员","C":"发行人控股或者实际控制的公司及其董事、监事、高级管理人员","D":"由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员"},"a":"A,B,C,D","an":"内幕交易、泄露内幕信息罪的犯罪主体是特殊主体，主要包括两个方面。 （1）《证券法》中，证券、期货交易内幕信息的知情人员、单位包括：①发行人及其董事、监事、高级管理人员（A正确）；②持有公司5%以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员（B正确）；③发行人控股或者实际控制的公司及其董事、监事、高级管理人员（C正确）；④由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员（D正确）；⑤上市公司收购人或者重大资产交易方及其控股股东、实际控制人、董事、监事和高级管理人员；⑥因职务、工作可以获取内幕信息的证券交易场所、证券公司、证券登记结算机构、证券服务机构的有关人员；⑦因职责、工作可以获取内幕信息的证券监督管理机构工作人员；⑧因法定职责对证券的发行、交易或者对上市公司及其收购、重大资产交易进行管理可以获取内幕信息的有关主管部门、监管机构的工作人员；⑨国务院证券监督管理机构规定的可以获取内幕信息的其他人员。 （2）非法获取证券、期货交易内幕信息的人员、单位","type":"multi"},{"id":"cy_fin_1785","q":"下列属于证券投资顾问禁止行为的有(  )。","c":{"A":"以任何方式向客户承诺或者保证投资收益","B":"向客户提供适当的投资建议服务","C":"向他人泄露客户的投资决策计划信息","D":"以个人名义向客户收取证券投资顾问服务费用"},"a":"A,C,D","an":"选项ACD正确：证券投资顾问不得从事下列活动： (1)以任何方式向客户承诺或者保证投资收益； (2)对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； (3)向他人泄露客户的投资决策计划信息； (4)以个人名义向客户收取证券投资顾问服务费用； (5)通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。 选项B错误：证券投资顾问应当向客户提供适当的投资建议服务。","type":"multi"},{"id":"cy_fin_1787","q":"下列关于证券公司风险处置的监督协调工作，说法正确的有（）。","c":{"A":"证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金","B":"证券投资者保护基金管理机构可以对证券投资者保护基金的使用情况进行检查","C":"托管组、接管组、行政清理组以及被责令停业整顿、托管和行政重组的证券公司，应当按照规定向国务院证券监督管理机构报告工作情况","D":"被处置证券公司的股东以及债权人有证据证明托管组、接管组、行政清理组以及其工作人员未依法履行职责的，可以向证券业协会投诉"},"a":"A,B,C","an":"选项AB正确：证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金。证券投资者保护基金管理机构可以对证券投资者保护基金的使用情况进行检查。 选项C正确：托管组、接管组、行政清理组以及被责令停业整顿、托管和行政重组的证券公司，应当按照规定向国务院证券监督管理机构报告工作情况。 选项D错误：被处置证券公司的股东以及债权人有证据证明托管组、接管组、行政清理组以及其工作人员未依法履行职责的，可以向国务院证券监督管理机构投诉。","type":"multi"},{"id":"cy_fin_1789","q":"证券公司回访应当符合的要求有()。","c":{"A":"委托第三方专业机构实施回访，但法律责任仍由证券公司承担","B":"对新增交易权限的投资者，在开通相应交易权限后30个自然日内完成回访","C":"对账户使用、资金划转、证券交易等存在异常情形的投资者，在5个交易日内进行回访","D":"对其他投资者，每年回访比例不得低于上年末客户总数(不含休眠账户及中止交易账户客户)的5%"},"a":"A,B,D","an":"证券公司应当建立健全投资者回访制度，持续了解投资者状况，及时发现并纠正不规范行为。证券公司应当为回访提供充分的人力与物质保障，保证必要的回访比例。证券公司可以委托第三方专业机构实施回访，但法律责任仍由证券公司承担（A正确）。证券公司回访应当符合以下要求: 1.对新开户的投资者，在开通相应交易权限前完成回访，对新增相关交易权限的投资者，在开通相应交易权限后30日内完成回访;（B正确） 2.对账户使用、资金划转、证券交易等存在异常情形的投资者，在2个交易日内进行回访;（C错误） 3.对其他投资者，每年回访比例不得低于上年末客户总数（不含休眠账户及中止交易账户客户)的5%。（D正确）","type":"multi"},{"id":"cy_fin_1791","q":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行。","type":"judge"},{"id":"cy_fin_1793","q":"证券公司的独立董事，不得在本证券公司担任董事会外的职务，不得与本证券公司存在可能妨碍其作出独立、客观判断的关系。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司的独立董事，不得在本证券公司担任董事会外的职务，不得与本证券公司存在可能妨碍其作出独立、客观判断的关系。","type":"judge"},{"id":"cy_fin_1795","q":"经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受中国证监会及其派出机构和自律组织的检查。（）","c":{"1":"对","0":"错"},"a":"1","an":"经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受中国证监会及其派出机构和自律组织的检查。","type":"judge"},{"id":"cy_fin_1797","q":"证券公司应当突出主业，充分考虑自身发展需要、财务实力和管理能力，审慎设立另类子公司。另类子公司可视情况下设其他机构。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当突出主业，充分考虑自身发展需要、财务实力和管理能力，审慎设立另类子公司。另类子公司不得再下设任何机构。","type":"judge"},{"id":"cy_fin_1799","q":"证券评级机构的董事、监事和高级管理人员以及评级从业人员不得以任何方式在评级委托方、受评级机构或者受评级证券发行人兼职。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券评级机构的董事、监事和高级管理人员以及评级从业人员不得以任何方式在评级委托方、受评级机构或者受评级证券发行人兼职。","type":"judge"},{"id":"cy_fin_1801","q":"证券公司应当勤勉尽责，建立健全和执行客户身份识别制度（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当勤勉尽责，建立健全和执行客户身份识别制度。","type":"judge"},{"id":"cy_fin_1803","q":"根据《证券期货投资者适当性管理办法》，自律组织认定的高风险产品或者服务，经营机构应当审慎评估其风险等级。（）","c":{"1":"对","0":"错"},"a":"1","an":"产品或者服务存在下列因素的，应当审慎评估其风险等级：  （1）存在本金损失的可能性，因杠杆交易等因素容易导致本金大部分或者全部损失的产品或者服务； （2）产品或者服务的流动变现能力，因无公开交易市场、参与投资者少等因素导致难以在短期内以合理价格顺利变现的产品或者服务；  （3）产品或者服务的可理解性，因结构复杂、不易估值等因素导致普通人难以理解其条款和特征的产品或者服务；  （4）产品或者服务的募集方式，涉及面广、影响力大的公募产品或者相关服务；  （5）产品或者服务的跨境因素，存在市场差异、适用境外法律等情形的跨境发行或者交易的产品或者服务；  （6）自律组织认定的高风险产品或者服务。","type":"judge"},{"id":"cy_fin_1805","q":"证券公司应当依照有关行业标准，根据系统技术特点和承载业务类型，制订压力测试方案，设定测试场景，从系统性能、网络负载、灾备建设等方面设置测试指标，有序组织测试工作，测试完成后形成压力测试报告存档备查，并保存5年以上。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当依照有关行业标准，根据系统技术特点和承载业务类型，制订压力测试方案，设定测试场景，从系统性能、网络负载、灾备建设等方面设置测试指标，有序组织测试工作，测试完成后形成压力测试报告存档备查，并保存5年以上。","type":"judge"},{"id":"cy_fin_1807","q":"证券公司应当将敏感信息所涉公司或证券列入限制名单，限制名单属于高度保密名单。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司采取信息隔离和披露措施难以有效管理利益冲突的，应当将敏感信息所涉公司或证券列入限制名单（题干缺少前提条件）。","type":"judge"},{"id":"cy_fin_1809","q":"操纵证券市场行为给投资者造成损失的，行为人应当依法承担赔偿责任。（）","c":{"1":"对","0":"错"},"a":"1","an":"操纵证券市场行为给投资者造成损失的，行为人应当依法承担赔偿责任。","type":"judge"},{"id":"cy_fin_1811","q":"某为A证券公司营业部总经理，负责营业部全面工作。孙某为A证券公司营业部客户经理，负责开发及维护客户。202x年3月至202x年8月，唐某、孙某擅自运用客户沙某的证券账户进行交易，造成沙某证券账户亏损人民币1080万元，为A证券公司赚取交易手续费121万元。法院经审理认为，唐某、孙某未征得沙某同意，利用掌握的交易密码自行操作沙某证券账户，属于擅自运用客户资金的行为。唐某、孙某为A证券公司员工，其违法行为收取的手续费亦归A证券公司所有，A证券公司构成单位犯罪。A证券公司违背受托义务，擅自运用客户资金，情节特别严重，其行为侵犯了国家的金融管理秩序和客户的合法权益，构成（）。","c":{"A":"非法吸收公众存款罪","B":"集资诈骗罪","C":"背信运用受托财产罪","D":"利用未公开信息交易罪"},"a":"C","an":"选项C正确：背信运用受托财产，是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。 选项A错误：非法吸收公众存款罪主要针对非法吸收或变相吸收公众存款的行为 选项B错误：集资诈骗罪以非法占有为目的，使用诈骗方法非法集资 选项D错误：利用未公开信息交易罪指利用内幕信息以外的未公开信息交易","type":"single"},{"id":"cy_fin_1813","q":"下列选项中，（）不是保荐总结报告书的必备内容。","c":{"A":"发行人的基本情况","B":"保荐工作概述","C":"对发行人配合保荐工作情况的说明及评价","D":"履行保荐职责期间发生的所有事项及处理情况"},"a":"D","an":"保荐总结报告书应当包括下列内容： （1）发行人的基本情况；（A）  （2）保荐工作概述；（B） （3）履行保荐职责期间发生的重大事项及处理情况；（并非所有情况，D错误） （4）对发行人配合保荐工作情况的说明及评价； （5）对证券服务机构参与证券发行上市相关工作情况的说明及评价；（C） （6）中国证监会、证券交易所要求的其他事项。","type":"single"},{"id":"cy_fin_1815","q":"刊登证券发行募集文件前终止保荐协议的，保荐机构和发行人应当自终止之日起（）个工作日内分别向中国证监会报告，并说明原因。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"刊登证券发行募集文件前终止保荐协议的，保荐机构和发行人应当自终止之日起5个工作日内分别向中国证监会报告，并说明原因。","type":"single"},{"id":"cy_fin_1817","q":"证券公司应当跟踪审计发现问题的整改情况，妥善保存审计报告，保存期限不得少于（）年。","c":{"A":"20","B":"10","C":"5","D":"25"},"a":"A","an":"证券公司应当跟踪审计发现问题的整改情况，相关问题未能及时整改的，应当说明理由，并将审计报告提交信息技术治理委员会审议。证券公司应当妥善保存审计报告，保存期限不得少于20年。","type":"single"},{"id":"cy_fin_1819","q":"客户申请开立信用业务证券账户前，应当已经开设普通证券账户且从事证券交易的时间满（）以上。","c":{"A":"3个月","B":"半年","C":"1年","D":"2年"},"a":"B","an":"客户申请开立信用业务证券账户前，应当已经开设普通证券账户且从事证券交易的时间满半年以上。","type":"single"},{"id":"cy_fin_1821","q":"（）是证券期货经营机构服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的是“将适当的产品或服务销售提供给适当的投资者”。","c":{"A":"法人集中清算制度","B":"信息隔离墙制度","C":"利益冲突管理机制","D":"投资者适当性管理制度"},"a":"D","an":"选项D正确：投资者适当性制度是证券期货经营机构(以下简称“经营机构”)服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的在于“将适当的产品或服务销售或提供给适当的投资者”。 选项A错误：法人集中清算制度与结算交收相关 选项B错误：信息隔离墙制度旨在防范内幕交易和利益冲突 选项C错误：利益冲突管理机制关注的是机构内部利益冲突的防范","type":"single"},{"id":"cy_fin_1823","q":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备36个月以上保荐相关业务经历、最近（）个月内未受到证券交易所等自律组织的重大纪律处分或者中国证监会的重大监管措施，最近（）个月内未受到中国证监会的行政处罚","c":{"A":"24；12","B":"12；36","C":"24；24","D":"12；48"},"a":"B","an":"保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备36个月以上保荐相关业务经历、最近12个月内未受到证券交易所等自律组织的重大纪律处分或者中国证监会的重大监管措施，最近36个月内未受到中国证监会的行政处罚。","type":"single"},{"id":"cy_fin_1825","q":"发生下列（）情形的，应当在国务院证券监督管理机构指定的报刊上公告，并按照规定将经营证券业务许可证交国务院证券监督管理机构注销。","c":{"A":"证券公司停止全部证券业务","B":"证券公司解散","C":"证券公司破产","D":"证券公司合并"},"a":"A,B,C","an":"选项ABC正确：证券公司停止全部证券业务、解散、破产的，还应当在国务院证券监督管理机构指定的报刊上公告，并按照规定将经营证券业务许可证交国务院证券监督管理机构注销。 选项D错误：合并无需在指定报刊公告，因其属于经营主体变更而非终止。合并后的证券公司可以继续使用原有许可证或申请新的许可证。","type":"multi"},{"id":"cy_fin_1827","q":"根据《证券公司信息隔离墙制度指引》，证券公司开展保密侧业务，应当在与客户发生实质性接触后的适当时点，将相关项目所涉公司或证券列入观察名单。适当时点，以下列（）环节中的较早者为准。","c":{"A":"与客户签署保密协议","B":"对项目立项","C":"进场开展工作","D":"实际获知项目内幕信息"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司开展保密侧业务时，应当在与客户发生实质性接触后的适当时点，将相关项目所涉公司或证券列入观察名单。此处所指的适当时点，以与客户签署保密协议、对项目立项、进场开展工作和实际获知项目内幕信息中较早者为准。","type":"multi"},{"id":"cy_fin_1829","q":"证券公司违反《证券公司监督管理条例》规定，出现（）情形的，对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以下的罚款。","c":{"A":"未按照规定程序了解客户的身份、财产与收入状况、证券投资经验和风险偏好","B":"推荐的产品或者服务与所了解的客户情况不相适应","C":"未按照规定与客户签订业务合同，或者未在与客户签订的业务合同中载入规定的必备条款","D":"未按照规定存放、管理客户的交易结算资金"},"a":"A,B,C","an":"选项AB正确：根据《证券公司监督管理条例》第八十四条和《证券法》第一百九十八条的规定，证券公司未按照规定程序了解客户的身份、财产与收入状况、证券投资经验和风险偏好，或推荐的产品或者服务与所了解的客户情况不相适应，未履行或者未按照规定履行投资者适当性管理义务的，责令改正，给予警告，并处以10万元以上100万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以下的罚款。 选项C正确：根据《证券公司监督管理条例》第八十四条和《证券法》第一百九十八条的规定，证券公司未指定专人向客户讲解有关业务规则和合同内容，并以书面方式向其揭示投资风险或未按照规定与客户签订业务合同，或者未在与客户签订的业务合同中载入规定的必备条款的，责令改正，给予警告，并处以10万元以上100万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以下的罚款。 选项D错误：根据《证券公司监督管理条例》第八十四条的规定，证券公司未按照规定存放、管理客户的交易结算资金、委托资金和客户担保账户内的资金、证券的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以3万元以上30万元以下的罚款。对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上10万元以下的罚款。","type":"multi"},{"id":"cy_fin_1831","q":"保荐代表人出现（）等情形时，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施。","c":{"A":"尽职调查工作日志缺失或者遗漏、隐瞒重要问题","B":"未完成或者未参加辅导工作","C":"重大事项未报告、未披露","D":"因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到期货交易所、证券公司公开谴责"},"a":"A,B,C","an":"保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施： （1）尽职调查工作日志缺失或者遗漏、隐瞒重要问题；（A正确）  （2）未完成或者未参加辅导工作；（B正确）  （3）重大事项未报告、未披露；（C正确） （4）未参加持续督导工作，或者持续督导工作严重未勤勉尽责； （5）因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责；（D错误） （6）唆使、协助或者参与发行人干扰中国证监会、证券交易所及其上市委员会的审核工作； （7）伪造或者变造签字、盖章； （8）严重违反诚实守信、勤勉尽责、廉洁从业义务的其他情形。","type":"multi"},{"id":"cy_fin_1833","q":"根据《证券行业诚信准则》的规定，机构及其工作人员应当自觉遵守的合法合规要求包括()。","c":{"A":"自觉学习了解并遵守相关法律法规、监管规定、自律规则、业务规范和内部规章制度","B":"注重知识和信息更新，及时了解相关制度和政策变化，减少因知识或者信息更新不及时导致的风险","C":"牢固树立依法依规、诚实守信开展业务活动的理念，自觉抵制违法违规和失信行为，形成诚信展业意识与行为习惯","D":"对自己的专业能力有充分认识，不承诺力不能及或不能如期完成的业务，不推诿应承担的责任"},"a":"A,B,C","an":"选项ABC正确：机构及其工作人员应当自觉遵守以下合法合规要求 (1)牢固树立依法依规、诚实守信开展业务活动的理念，自觉抵制违法违规和失信行为，形成诚信展业意识与行为习惯； (2)自觉学习了解并遵守相关法律法规、监管规定、自律规则、业务规范和内部规章制度； (3)注重知识和信息更新，及时了解相关制度和政策变化，减少因知识或者信息更新不及时导致的风险。 选项D错误：机构及其工作人员应当自觉遵守以下勤勉尽责要求 (1)恪守职业操守，忠实勤勉，履行对投资者及其他利益相关方的责任和义务； (2)持续学习，不断提升专业能力，保证服务质量； (3)专业审慎，尽到合理专业的注意义务，履职尽责； (4)对自己的专业能力有充分认识，不承诺力不能及或不能如期完成的业务，不推诿应承担的责任； (5)实事求是，独立、审慎、客观、公正开展业务，不受其他单位和个人的非法干预和影响； (6)按规定做好相关工作底稿档案的记录、归集和保存管理。","type":"multi"},{"id":"cy_fin_1835","q":"关于保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的有()。","c":{"A":"中国证监会会视情节轻重，采取责令改正、监管谈话、出具警示函等监管措施","B":"中国证监会会视情节轻重，采取监管谈话或者市场禁入措施","C":"情节严重的，中国证监会可以在3个月到12个月内暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选","D":"情节严重的，中国证监会可以在6个月到24个月内暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选"},"a":"A,C","an":"保荐机构、保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取出具警示函、责令改正、监管谈话等监管措施（A正确，不包括禁入，B错误）；情节严重的，中国证监会可以采取暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选3个月到12个月的监管措施（C正确，D错误）： ①制作或者出具的文件不齐备或者不符合要求； ②擅自改动申请文件、信息披露资料或者其他已提交文件； ③申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异； ④文件披露的内容表述不清，逻辑混乱，严重影响投资者理解； ⑤未及时报告或者未及时披露重大事项； ⑥指定不符合《保荐办法》第四条规定要求的人员具体负责保荐工作； ⑦未通过内核程序，以公司名义对外提交或披露保荐业务项目文件； ⑧采取业务包干等承包方式或其他形式进行过度激励； ⑨以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。","type":"multi"},{"id":"cy_fin_1837","q":"证券公司应当自每一会计年度结束之日起3个月内，向国务院证券监督管理机构报送年度报告；自每月结束之日起7个工作日内，报送月度报告。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当自每一会计年度结束之日起4个月内，向国务院证券监督管理机构报送年度报告；自每月结束之日起7个工作日内，报送月度报告。","type":"judge"},{"id":"cy_fin_1839","q":"通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%时，应当在该事实发生之日起3日内，向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。（）","c":{"1":"对","0":"错"},"a":"1","an":"通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到5%时，应当在该事实发生之日起3日内，向国务院证券监督管理机构、证券交易所作出书面报告，通知该上市公司，并予公告。","type":"judge"},{"id":"cy_fin_1841","q":"中国证券业协会可以对证券公司柜台市场进行现场检查或者非现场检查；证券公司及其相关人员应当予以配合，并按照要求提供有关文件和资料、接受问询。（）","c":{"1":"对","0":"错"},"a":"1","an":"中国证券业协会可以对证券公司柜台市场进行现场检查或者非现场检查；证券公司及其相关人员应当予以配合，并按照要求提供有关文件和资料、接受问询。","type":"judge"},{"id":"cy_fin_1843","q":"持续督导工作开始前，保荐机构应明确参与持续督导工作的人员，相关人员应至少包括两名保荐代表人。（）","c":{"1":"对","0":"错"},"a":"1","an":"保荐机构及其保荐代表人应当按照法律法规、监管规定、自律规则等要求，针对发行人的具体情况，确定证券发行上市后持续督导的内容，制定持续督导工作计划和实施方案，就持续督导工作的主要内容、重点、实施方式、步骤作出完整、有效的安排。持续督导工作开始前，保荐机构应明确参与持续督导工作的人员，相关人员应至少包括两名保荐代表人。","type":"judge"},{"id":"cy_fin_1845","q":"证券行业文化建设包括三大层次十大方面的关键要素。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券行业文化建设包括三大层次十大方面的关键要素。","type":"judge"},{"id":"cy_fin_1847","q":"在服务流程上，证券投资顾问一般是证券研究报告服务的重要基础。（）","c":{"1":"对","0":"错"},"a":"0","an":"在服务流程上，【证券研究报告】一般是【证券投资顾问服务】的重要基础，证券投资顾问团队依据证券研究报告以及其他公开证券信息，整合形成有针对性的证券投资顾问建议，再按照协议约定向客户提供。","type":"judge"},{"id":"cy_fin_1849","q":"是否存在责任人员有专业背景，对于信息披露中与其专业背景有关违法事项应当发现而未予指出的情况，是影响信息披露违法责任人员责任大小的认定因素之一。（）","c":{"1":"对","0":"错"},"a":"1","an":"影响信息披露违法责任人员责任大小的因素包括是否存在责任人员有专业背景，对于信息披露中与其专业背景有关违法事项应当发现而未予指出的情况。","type":"judge"},{"id":"cy_fin_1851","q":"中国证监会依法制定行业网络和信息安全自律规则，对经营机构网络和信息安全实施自律管理。（）","c":{"1":"对","0":"错"},"a":"0","an":"中国证券业协会、中国期货业协会、中国证券投资基金业协会等行业协会依法制定行业网络和信息安全自律规则，对经营机构网络和信息安全实施自律管理。","type":"judge"},{"id":"cy_fin_1853","q":"2022年，甲证券公司与乙上市公司签署《独立财务顾问协议》，成为丙公司借壳乙公司的财务顾问。当年，丙公司完成借壳上市，重大资产重组完成后，甲证券公司在法律规定的期限内承担持续督导责任，先后出具了《2022年度持续督导意见》、《关于丙公司的专项核查意见》等。陈某与李某为项目主要负责人及签字主办人。该证券公司就该借壳上市独立财务顾问项目收取各项费用总计1000万元，以上业务过程中，甲证券公司未关注到丙公司购销业务异常增加，未发现丙公司存在虚构建材销售收入的情况，也未与会计师沟通核实公司的业务结构、盈利模式等情况，其出具的《2022年度持续督导意见》存在虚假记载。根据当事人违法行为的事实、性质、情节与社会危害程度，依据《证券法》的相关规定，中国证监会对甲证券公司和直接责任人予以处罚。针对甲证券公司和直接负责人的行为，中国证监会可以采取的处罚措施不包括（）。","c":{"A":"对甲证券公司采取责令改正","B":"没收甲公司业务收入1000万元，并处以3000万元的罚款","C":"对陈某和李某给予纪律处分","D":"对陈某和李某给予警告，并处以40万元罚款"},"a":"C","an":"证券服务机构违反《证券法》的规定，未勤勉尽责，所制作、出具的文件有虚假记载、误导性陈述或者重大遗漏的： 1．责令改正（A项包括）； 2．没收业务收入，并处以业务收入1倍以上 10倍以下的罚款（甲证券公司的业务收入为1000万，3000万的罚款为业务收入的3倍，B项包括）。 3．对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200 万元以下的罚款（D项包括）。 选项C「纪律处分「属于自律组织（如证券业协会）的职权范围。","type":"single"},{"id":"cy_fin_1855","q":"秦某在A证券有限公司营业部执业过程中存在以下问题：一是向某投资者提供证券投资建议时无合理依据，且未提示投资风险；二是收受某投资者提供的礼金，秦某因违规行为被采取行政监管措施。下列关于了解投资者信息的说法，错误的是（）。","c":{"A":"向投资者销售产品，应当了解投资者的诚信记录","B":"向投资者提供服务，应当了解投资者的近亲属信息","C":"向投资者提供服务，应当了解投资者的工作经历","D":"向投资者提供服务，应当了解投资者的风险偏好及可承受的损失"},"a":"B","an":"经营机构向投资者销售产品或者提供服务时，应当了解投资者的下列信息： 1．自然人的姓名、住址、职业、年龄、联系方式，法人或者其他组织的名称、注册地址、办公地址、性质、资质及经营范围等基本信息； 2．收入来源和数额、资产、债务等财务状况； 3．投资相关的学习、工作经历及投资经验（C项正确）； 4．投资期限、品种、期望收益等投资目标； 5．风险偏好及可承受的损失（D项正确）； 6．诚信记录（A项正确）； 7．实际控制投资者的自然人和交易的实际受益人； 8．法律法规、自律规则规定的投资者准入要求相关信息； 9．其他必要信息。 选项B为干扰项，适当性了解主要是投资者及实际控制人，而非近亲属信息。","type":"single"},{"id":"cy_fin_1857","q":"关于证券经纪业务的表述，下列说法错误的是（）。","c":{"A":"证券经纪业务是指证券公司开展证券交易营销，接受投资者委托开立账户、处理交易指令、办理清算交收等经营性活动","B":"证券公司从事证券经纪业务，应当诚实守信，切实维护投资者财产安全，保障投资者信息知情权、公平交易权等合法权益","C":"证券公司应当遵守股东利益优先和公平对待投资者的原则，防范公司与投资者之间、不同投资者之间的利益冲突","D":"除证券公司外，任何单位和个人不得从事证券经纪业务"},"a":"C","an":"C项说法错误，证券公司应当遵守投资者利益优先（而不是股东利益优先）和公平对待投资者的原则，防范公司与投资者之间、不同投资者之间的利益冲突。","type":"single"},{"id":"cy_fin_1859","q":"下列选项中，（）符合证券公司合规负责人和合规管理人的独立性原则。","c":{"A":"保障合规负责人的知情权","B":"保障合规负责人的权威性","C":"强化合规负责人对合规管理人员的考核权","D":"保障合规负责人考核和任免的独立性"},"a":"A,B,C,D","an":"证券公司合规负责人和合规管理人的独立性原则包括： （1）保障合规负责人考核和任免的独立性。 （2）保障合规负责人的知情权。 （3）保障合规负责人的权威性。 （4）强化合规负责人对合规管理人员的考核权。 （5）明确合规负责人考核公司有关主体的合规管理工作。 （6）保障合规负责人及其他合规管理人员的薪酬待遇。 （7）明确中国证监会和自律组织的外部支持。","type":"multi"},{"id":"cy_fin_1861","q":"根据《证券期货经营机构及其工作人员廉洁从业规定》，证券经营机构及其工作人员在开展证券相关业务活动中不得（）。","c":{"A":"廉洁从业","B":"向客户输送不正当利益","C":"谋取不正当利益","D":"干扰或者唆使、协助他人干扰证券监督管理"},"a":"B,C,D","an":"选项BCD正确：证券经营机构及其工作人员在开展证券相关业务活动中，应当严格遵守规定及其他相关规定，不得谋取不正当利益或者向公职人员、客户、正在洽谈的潜在客户及其他利益关系人输送不正当利益，不得干扰或者唆使、协助他人干扰证券监督管理或者自律管理工作。 选项A错误：“廉洁从业”是证券经营机构及其工作人员应遵循的基本要求，而不是禁止的行为。","type":"multi"},{"id":"cy_fin_1863","q":"证券行业文化建设包括三大层次，下列属于观念层的有(  )。","c":{"A":"秉承守正创新","B":"崇尚专业精神","C":"强化文化认同","D":"坚持可持续发展"},"a":"A,B,D","an":"选项ABD正确：观念层包括秉承守正创新、崇尚专业精神、坚持可持续发展。 选项C错误：组织层包括：融合发展战略、强化文化认同、激发组织活力。","type":"multi"},{"id":"cy_fin_1865","q":"关于证券公司代销金融产品的基本原则，下列说法正确的有（）。","c":{"A":"避免利益冲突","B":"分散管理","C":"集中统一管理","D":"利益最大化"},"a":"A,C","an":"证券公司代销金融产品的基本原则有避免利益冲突（A正确）、集中统一管理（C正确，B错误）。 D项为干扰项。","type":"multi"},{"id":"cy_fin_1867","q":"经营机构违反《证券期货投资者适当性管理办法》的要求，未按规定（），应当给予警告，并处以3万元以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处以3万元以下罚款。","c":{"A":"划分产品或者服务风险等级的","B":"录音录像或者采取配套留痕安排的","C":"制定或者落实适当性内部管理制度和相关制度机制的","D":"对专业投资者进行细化分类和管理的"},"a":"A,B,C","an":"经营机构有下列情形之一的，给予警告，并处以3万元以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处以3万元以下罚款： (1)违反《证券期货投资者适当性管理办法》第十条，未按规定对普通投资者进行细化分类和管理的；（并非“专业投资者”，D错误） (2)违反《证券期货投资者适当性管理办法》第十一条、第十二条，未按规定进行投资者类别转化的； (3)违反《证券期货投资者适当性管理办法》第十三条，未建立或者更新投资者评估数据库的； (4)违反《证券期货投资者适当性管理办法》第十五条，未按规定了解所销售产品或者所提供服务信息或者履行分级义务的； (5)违反《证券期货投资者适当性管理办法》第十六条、第十七条，未按规定划分产品或者服务风险等级的；（A正确） (6)违反《证券期货投资者适当性管理办法》第二十五条，未按规定录音录像或者采取配套留痕安排的；（B正确） (7)违反《证券期货投资者适当性管理办法》第二十九条，未按规定制定或者落实适当性内部管理制度和相关制度机制的；（C正确） (8)违反《证券期货投资者适当性管理办法》第三十条，未按规定开展适当性自查的； (9)违反《证券期货投资者适当性管理办法》第三十二条，未按规定妥善保存相关信息资料的； (10)违反《证券期货投资者适当性管理办法》第六条、第十八条至第二十四条、第二十六条、第二十七条、第三十三条规定，未构成《证券法》第一百九十八条，《证券投资基金法》第一百三十五条、第一百三十七条，《期货和衍生品法》第一百三十五条，《证券公司监督管理条例》第八十三条、第八十四条，《期货交易管理条例》第六十六条、第六十七条规定情形的。","type":"multi"},{"id":"cy_fin_1869","q":"证券公司应当于下列哪些行为发生之日起1个月内将相关情况报送至中国证券业协会？（）","c":{"A":"入股区域性股权市场运营机构","B":"取得区域性股权市场中介机构资格","C":"持股情况、中介机构资格发生变化","D":"证券公司从业人员的履职情况"},"a":"A,B,C","an":"选项ABC正确：证券公司应当于下列行为发生之日起1个月内将相关情况报送至中国证券业协会：  （1）入股区域性股权市场运营机构；   （2）取得区域性股权市场中介机构资格；   （3）持股情况、中介机构资格发生变化；  （4）中国证监会和中国证券业协会要求报送的其他信息。 选项D为干扰项。","type":"multi"},{"id":"cy_fin_1871","q":"关于证券公司设立的另类投资公司，以下说法正确的有（）。","c":{"A":"另类子公司下不得再下设任何机构","B":"证券公司应当将另类子公司的合规与风险管理纳入公司统一体系","C":"另类子公司可以从事投资以外的业务","D":"证券公司应当清晰划分证券公司与另类子公司的业务范围"},"a":"A,B,D","an":"C项，另类子公司不得从事投资以外的业务。 选项ABD说法正确。","type":"multi"},{"id":"cy_fin_1873","q":"关于证券发行与承销信息披露的有关规定，下列说法正确的有（）。","c":{"A":"发行人和主承销商在发行过程中，应当按照中国证监会规定的要求编制信息披露文件，履行信息披露义务","B":"首次公开发行股票招股意向书刊登后，发行人和主承销商不可以向网下投资者进行推介和询价","C":"发行人和承销商在发行过程中披露的信息，应当真实、准确、完整、及时，不得有虚假记载、误导性陈述或者重大遗漏","D":"发行人披露的招股意向书除不含发行价格、筹资金额以外，其内容与格式应当与招股说明书一致，并与招股说明书具有同等法律效力"},"a":"A,C,D","an":"A项，发行人和主承销商在发行过程中，应当按照中国证监会规定的要求编制信息披露文件，履行信息披露义务。 B项，首次公开发行股票招股意向书刊登后，发行人和主承销商可以向网下投资者进行推介和询价，并通过互联网等方式向公众投资者进行推介。 C项，发行人和承销商在发行过程中披露的信息，应当真实、准确、完整、及时，不得有虚假记载、误导性陈述或者重大遗漏。  D项，发行人披露的招股意向书除不含发行价格、筹资金额以外，其内容与格式应当与招股说明书一致，并与招股说明书具有同等法律效力。","type":"multi"},{"id":"cy_fin_1875","q":"证券公司应当与信息技术服务机构签订服务协议和保密协议，约定的事项包括(  )。","c":{"A":"质量考核标准","B":"持续监控机制","C":"服务变更或者终止的处置流程","D":"异常处理机制"},"a":"A,B,C,D","an":"证券公司应当与信息技术服务机构签订服务协议和保密协议，明确各方权利、义务和责任，约定质量考核标准、持续监控机制、异常处理机制、服务变更或者终止的处置流程以及现场服务人员保密要求等内容，并持续监督信息技术服务机构及相关人员落实服务协议和保密协议的情况。","type":"multi"},{"id":"cy_fin_1877","q":"关于证券公司首席信息官的描述，下列说法正确的有（）。","c":{"A":"该首席信息官是证券公司的高级管理人员","B":"该首席信息官最近3年未被金融监管机构实施行政处罚","C":"该首席信息官从事信息技术相关工作10年以上","D":"该首席信息官无需熟悉证券、基金业务"},"a":"A,B,C","an":"证券公司应当指定一名熟悉证券、基金业务（D错误），具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官（A正确），由其负责信息技术管理工作，并具备下列任职条件： （1）从事信息技术相关工作10年以上（C正确），或者在证券监管机构、证券基金业自律组织任职8年以上； （2）最近3年未被金融监管机构实施行政处罚或采取重大行政监管措施；（B正确） （3）中国证监会规定的其他条件。","type":"multi"},{"id":"cy_fin_1879","q":"行政重组期限一般不超过12个月。满12 个月，行政重组未完成的，国务院证券监督管理机构可以决定延长行政重组期限，但延长行政重组期限最长不得超过12个月。（）","c":{"1":"对","0":"错"},"a":"0","an":"行政重组期限一般不超过12个月。满12 个月，行政重组未完成的，国务院证券监督管理机构可以决定延长行政重组期限，但延长行政重组期限最长不得超过6个月。","type":"judge"},{"id":"cy_fin_1881","q":"证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的决定，依法对相关资产采取冻结措施，并不得擅自解除冻结措施。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当严格按照公安部发布的恐怖活动组织及恐怖活动人员名单、冻结资产的决定，依法对相关资产采取冻结措施，并不得擅自解除冻结措施。","type":"judge"},{"id":"cy_fin_1883","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据;投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。（）","c":{"1":"对","0":"错"},"a":"1","an":"《证券投资顾问业务暂行规定》第十六条规定，证券投资顾问向客户提供投资建议，应当具有合理的依据;投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。","type":"judge"},{"id":"cy_fin_1885","q":"证券公司应当具有完善的信息技术治理架构，健全网络和信息安全管理制度体系，建立内部决策、管理、执行和监督机制，确保网络和信息安全管理能力与业务活动规模、复杂程度相匹配。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当具有完善的信息技术治理架构，健全网络和信息安全管理制度体系，建立内部决策、管理、执行和监督机制，确保网络和信息安全管理能力与业务活动规模、复杂程度相匹配。","type":"judge"},{"id":"cy_fin_1887","q":"为加快形成符合证券基金行业发展需要的行业文化，结合行业发展现状、特点，中国证券业协会制定了《建设证券基金行业文化、防范道德风险工作纲要》。（）","c":{"1":"对","0":"错"},"a":"0","an":"为加快形成符合证券基金行业发展需要的行业文化，结合行业发展现状、特点，中国证监会制定了《建设证券基金行业文化、防范道德风险工作纲要》。","type":"judge"},{"id":"cy_fin_1889","q":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金。保证金除现金形式外还可以证券充抵。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金。保证金除现金形式外还可以证券充抵。","type":"judge"},{"id":"cy_fin_1891","q":"对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。（）","c":{"1":"对","0":"错"},"a":"1","an":"对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。","type":"judge"},{"id":"cy_fin_1893","q":"证券公司自营业务决策机构原则上应当按照董事会一投资决策机构一自营业务部门的三级体制设立。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司自营业务决策机构原则上应当按照董事会一投资决策机构一自营业务部门的三级体制设立。","type":"judge"},{"id":"cy_fin_1895","q":"公募产品面向合格投资者通过非公开方式发行。（）","c":{"1":"对","0":"错"},"a":"0","an":"公募产品面向不特定社会公众公开发行，公开发行的认定标准依照《证券法》执行。 私募产品面向合格投资者通过非公开方式发行。","type":"judge"},{"id":"cy_fin_1897","q":"为保护投资者权益，证券公司应在代销金融产品后进行必要的委托人资格审查和产品尽职调查。（）","c":{"1":"对","0":"错"},"a":"0","an":"为保护投资者权益，证券公司应在代销金融产品前进行必要的委托人资格审查和产品尽职调查。","type":"judge"},{"id":"cy_fin_1899","q":"客户购买金融产品的资金，只能通过证券公司向委托人支付。在通过证券公司支付时，证券公司不得使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金。（）","c":{"1":"对","0":"错"},"a":"0","an":"客户购买金融产品的资金，既可以由客户直接向委托人支付，也可通过证券公司支付。在通过证券公司支付时，证券公司不得使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金。","type":"judge"},{"id":"cy_fin_1901","q":"在证券公司持续从事证券业务10年以上，且不存在效力期限内违法失信信息或者其他负面执业声誉信息，无须证券公司验证其专业能力水平的，在培训周期内减少15学时培训。（）","c":{"1":"对","0":"错"},"a":"0","an":"在证券公司持续从事证券业务10年以上，且不存在效力期限内违法失信信息或者其他负面执业声誉信息，无须证券公司验证其专业能力水平的，在培训周期内减少5学时培训。","type":"judge"},{"id":"cy_fin_1903","q":"向客户提供证券投资顾问服务的人员，应当符合相关从业条件，并在中国证券业协会注册登记，但不得同时注册为（   ）。","c":{"A":"证券交易经理","B":"证券分析师","C":"风险管理顾问","D":"期货投资咨询师"},"a":"B","an":"选项B正确，向客户提供证券投资顾问服务的人员，应当符合相关从业条件，并在中国证券业协会注册登记为证券投资顾问，证券投资顾问不得同时注册为证券分析师。","type":"single"},{"id":"cy_fin_1905","q":"证券投资顾问向客户提供投资建议服务的内容包括投资的品种选择、投资组合以及投资理财规划建议等。在实际落实业务开展、提供服务时所应注意履行的主要具体职责包括（   ）。","c":{"A":"了解投资者","B":"了解产品","C":"提供投资建议服务","D":"保证投资者收益"},"a":"A,B,C","an":"证券投资顾问向客户提供投资建议服务的内容包括投资的品种选择、投资组合以及投资理财规划建议等。在实际落实业务开展、提供服务时所应注意履行的主要具体职责包括了解投资者（选项A）、了解产品（选项B）、提供投资建议服务（选项C）。 综上所诉，本题应选择ABC选项。","type":"multi"},{"id":"cy_fin_1907","q":"证券投资顾问应持续了解其所在机构提供的产品或服务的相关信息，并按照规定及时向投资者披露有关信息，适时依据了解的信息作出合理安排，维护投资者的合法权益。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问应持续了解其所在机构提供的产品或服务的相关信息，并按照规定及时向投资者披露有关信息，适时依据了解的信息作出合理安排，维护投资者的合法权益。因此本题说法正确。","type":"judge"},{"id":"cy_fin_1909","q":"证券投资咨询机构应当向投资者提供风险揭示书，充分揭示接受证券投资顾问服务中存在的风险。风险揭示书内容与格式要求由（   ）制定。","c":{"A":"中国证监会","B":"交易所","C":"本公司","D":"中国证券业协会"},"a":"D","an":"选项D正确：为了使投资者充分了解证券投资顾问业务的风险，证券投资咨询机构应向投资者提供《证券投资顾问业务风险揭示书》，充分揭示接受证券投资顾问服务中存在的风险。 风险揭示书内容与格式要求由中国证券业协会制定，应以书面或者电子文件形式，由投资者签收确认，并由证券投资咨询机构归入证券投资顾问业务档案保存。","type":"single"},{"id":"cy_fin_1911","q":"证券投资顾问服务协议应当约定，自签协议之日起（   ）个工作日内，投资者可以书面通知方式提出解除协议。","c":{"A":"2","B":"3","C":"5","D":"10"},"a":"C","an":"选项C正确：证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，投资者可以书面通知方式提出解除协议。证券投资咨询机构收到投资者解除协议书面通知时，证券投资顾问服务协议解除。","type":"single"},{"id":"cy_fin_1913","q":"证券投资顾问向投资者提供投资建议，应当具有合理的依据。投资建议的依据不包括（   ）","c":{"A":"新闻报道","B":"基于证券研究报告的投资分析意见","C":"基于理论模型以及分析方法形成的分析意见","D":"证券研究报告"},"a":"A","an":"证券投资顾问向投资者提供投资建议，应当具有合理的依据。投资建议的依据包括证券研究报告（选项D）或者基于证券研究报告（选项B）、理论模型以及分析方法形成的投资分析意见（选项C）等。  不包括新闻报道，综上所述，本题应选择A选项。","type":"single"},{"id":"cy_fin_1915","q":"根据《证券投资顾问业务暂行规定》，以下对证券投资咨询机构提供证券投资顾问服务时收费环节的说法不正确的是（   ）。","c":{"A":"证券投资顾问服务费用应当以公司账户收取","B":"可以按照服务期限，投资者资产规模收取投资服务费用","C":"不可以采用差别佣金方式收取证券投资顾问服务费用","D":"证券投资咨询机构应当按照公平、合理、自愿的原则与投资者协商并书面约定收取证券投资顾问服务费用的安排"},"a":"C","an":"证券投资咨询机构应当按照公平、合理、自愿的原则，与投资者协商并书面约定收取证券投资顾问服务费用的安排（选项D正确），可以按照服务期限、投资者资产规模收取服务费用（选项B正确），也可以采用差别佣金等其他方式收取服务费用（选项C错误）。证券投资顾问服务费用应当以公司账户收取（选项A正确）。 本题要求选择错误的选项，综上所述应选择选项C。","type":"single"},{"id":"cy_fin_1917","q":"证券投资咨询机构从事证券投资顾问业务，应当建立投资者回访机制，明确投资者回访的程序、内容和要求，并（   ）。","c":{"A":"成立专门的委员会","B":"指定专门人员独立实施","C":"指定多部门分别独立实施","D":"指定多部门共同实施"},"a":"B","an":"选项B正确：证券投资咨询机构从事证券投资顾问业务，应当建立投资者回访机制，明确投资者回访的程序、内容和要求，并指定专门人员独立实施。","type":"single"},{"id":"cy_fin_1919","q":"证券投资顾问向投资者提供投资建议，应当（   ），鼓励证券投资顾问向投资者说明与其投资建议不一致的观点，作为辅助投资者评估投资风险的参考。","c":{"A":"提供投资顾问的服务能力和过往业绩","B":"提示具体买卖时点","C":"不基于证券研究报告","D":"提示潜在的投资风险"},"a":"D","an":"选项D正确：证券投资顾问向投资者提供投资建议，应当提示潜在的投资风险，鼓励证券投资顾问向投资者说明与其投资建议不一致的观点，作为辅助投资者评估投资风险的参考。","type":"single"},{"id":"cy_fin_1921","q":"下列关于证券投资顾问的主要职责说法错误的是（   ）。","c":{"A":"证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议","B":"证券投资顾问不得以任何方式向投资者承诺或者保证投资收益","C":"证券投资顾问不得对服务能力和过往业绩进行虚假、不实、误导性的营销宣传","D":"证券投资顾问服务费用可以以公司账户收取，也可以以证券投资顾问人员个人名义收取"},"a":"D","an":"《证券投资顾问业务暂行规定》中的禁止性行为： （1）禁止以任何方式向投资者承诺或者保证投资收益（选项B说法正确）； （2）证券投资顾问向投资者提供投资建议，知悉投资者作出具体投资决策计划的，不得向他人泄露该投资者的投资决策计划信息； （3）禁止证券公司、证券投资咨询机构及其人员以个人名义向投资者收取证券投资顾问服务费用（选项D说法错误）； （4）禁止对服务能力和过往业绩进行虚假、不实 、误导性的营销宣传（选项C说法正确）； （5）广告宣传内容不得存在虚假、不实 、误导性信息以及其他违法违规情形； （6）不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议（选项A说法正确）； （7）其他相关禁止性规定。 综上所述，本题应选择D选项。","type":"single"},{"id":"cy_fin_1923","q":"证券投资咨询机构提供证券投资顾问服务，应当与投资者签订证券投资顾问服务协议，并对协议实行（   ）管理。","c":{"A":"编号","B":"统一","C":"严格","D":"宽松"},"a":"A","an":"该题考查证券投资顾问服务协议的管理。证券投资咨询机构提供证券投资顾问服务，应当与投资者签订证券投资顾问服务协议，并对协议实行编号管理，因此本题应选择选项A。","type":"single"},{"id":"cy_fin_1925","q":"证券经营机构受理的投诉，应当自收到投诉之日起（   ）内作出处理决定。","c":{"A":"5日","B":"7日","C":"10日","D":"20日"},"a":"D","an":"证券经营机构受理的投诉，应当自收到投诉之日起 20 日内作出处理决定。","type":"single"},{"id":"cy_fin_1927","q":"从业人员应表里如一、言而有信，珍视行业声誉与职业声誉，坚守契约精神，体现的是证券从业人员职业道德中的（   ）。","c":{"A":"敬畏法律，遵纪守规","B":"诚实守信，勤勉尽责","C":"守正笃实，严谨专业","D":"审慎稳健，严控风险"},"a":"B","an":"A错误：敬畏法律，遵纪守规：从业人员应遵从宪法，对证券行业相关法律法规、监管规定、自律规则以及道德准则心存敬畏，牢固树立依法合规 遵德展业理念，自觉接受监管和自律管理，抵制违反规则及道德准则的行为。 B正确：诚实守信，勤勉尽责：从业人员应表里如一、言而有信，珍视行业声誉与职业声誉，坚守契约精神，保护并合理运用受托资产，真实、准确、完整地披露相关信息，自觉抵制弄虚作假、误导欺骗等行为。 C错误： 守正笃实，严谨专业：从业人员应恪守职业操守，规矩做事 踏实做人 、不偏不倚，客观、审慎 、专业地为投资者及其他利益相关方提供服务，自觉抵制利用资源信息等不对称损害投资者及其他利益相关方合法权益的行为。 D错误：审慎稳健，严控风险：从业人员应牢固树立风险底线意识，提高风险识别 、应对和化解能力，审慎执业，主动履行报告义务，严防执业过程中因不当行为带来的各类业务风险，自觉抵制侥幸心理与短视行为。","type":"single"},{"id":"cy_fin_1929","q":"证券投资顾问业务档案的保存期限自协议终止之日起不得少于（   ）年。","c":{"A":"2","B":"3","C":"5","D":"10"},"a":"C","an":"证券投资咨询机构对证券投资顾问业务推广、协议签订、服务提供、投资者回访、投诉处理等环节实行留痕管理。向投资者提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年（选项C正确）。","type":"single"},{"id":"cy_fin_1931","q":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，投资者可以用（   ）方式提出解除协议。","c":{"A":"口头","B":"书面","C":"口头或书面","D":"口头和书面"},"a":"B","an":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，投资者可以书面通知方式（选项B正确）提出解除协议。证券投资咨询机构收到投资者解除协议书面通知时，证券投资顾问服务协议解除。","type":"single"},{"id":"cy_fin_1933","q":"证券投资咨询机构应当建立健全投资者回访制度，对购买产品或接受服务的投资者，每年抽取不低于上一年度末购买产品或接受服务的投资者总数（   ）的 （   ）进行回访。","c":{"A":"0.1","B":"0.05","C":"0.15","D":"0.2"},"a":"A","an":"证券投资咨询机构应当建立健全投资者回访制度，对购买产品或接受服务的投资者，每年抽取不低于上一年度末购买产品或接受服务的投资者总数(含购买或者接受产品或服务的风险等级高于其风险承受能力的投资者，不含休眠账户及中止交易账户投资者)的10%（选项A正确）进行回访。","type":"single"},{"id":"cy_fin_1935","q":"证券公司、证券投资咨询机构开展证券投资顾问业务，向客户提供投资建议的（   ）等信息，应当以书面或者电子文件形式予以记录留存。","c":{"A":"时间","B":"内容","C":"方式","D":"依据"},"a":"A,B,C,D","an":"证券投资咨询机构应当对证券投资顾问业务推广、协议签订、服务提供、投资者回访、投诉处理等环节实行留痕管理。向投资者提供投资建议的时间（选项A）、内容（选项B）、方式（选项C）和依据（选项D）等信息，应当以书面或者电子文件形式予以记录留存。  综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_fin_1937","q":"证券投资顾问的禁止性行为包括（   ）。","c":{"A":"证券投资顾问向投资者提供投资建议，知悉投资者作出具体投资决策计划的，不得向他人泄露该投资者的投资决策计划信息","B":"证券投资顾问服务费用应当以公司账户收取，禁止以证券投资顾问人员个人名义收取","C":"证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议","D":"证券投资顾问不得以任何方式向投资者承诺或者保证投资收益"},"a":"A,B,C,D","an":"《证券投资顾问业务暂行规定 》中的禁止性行为： （1）禁止以任何方式向投资者承诺或者保证投资收益（选项D正确）； （2）证券投资顾问向投资者提供投资建议，知悉投资者作出具体投资决策计划的，不得向他人泄露该投资者的投资决策计划信息（选项A正确）； （3）禁止证券公司、证券投资咨询机构及其人员以个人名义向投资者收取证券投资顾问服务费用（选项B正确）； （4）禁止对服务能力和过往业绩进行虚假、不实 、误导性的营销宣传； （5）广告宣传内容不得存在虚假、不实 、误导性信息以及其他违法违规情形； （6）不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议（选项C正确）； （7）其他相关禁止性规定。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_fin_1939","q":"证券公司及证券营业部应当建立客户投诉处理工作档案管理制度，保存时间不少于10年，投资者投诉处理工作应当坚持（   ）的原则。","c":{"A":"依法","B":"公平","C":"公正","D":"便民"},"a":"A,B,C,D","an":"投资者投诉处理工作应当坚持依法、公平、公正、便民的原则，切实维护投资者的合法权益。","type":"multi"},{"id":"cy_fin_1941","q":"根据《证券投资顾问业务暂行规定》，证券投资咨询机构的人员从事证券投资顾问业务时，应当（   ）。","c":{"A":"忠实投资者利益","B":"遵守法律、行政法规的规定","C":"遵循诚实信用原则，勤勉、审慎的为客户提供证券投资顾问服务","D":"优先维护公司利益，特殊情形下可以牺牲小投资者利益"},"a":"A,B,C","an":"选项D错误：证券投资咨询机构及其人员提供证券投资顾问服务，应当忠实客户利益，不得为公司及其关联方的利益损害投资者利益，不得为证券投资顾问人员及其利益相关者的利益损害投资者利益，不得为特定投资者利益损害其他投资者利益。","type":"multi"},{"id":"cy_fin_1943","q":"证券投资顾问依据本公司或者其他机构的证券研究报告作出投资建议的，应当向投资者说明证券研究报告的（   ）","c":{"A":"发布人","B":"发布目的","C":"发布日期","D":"发布内容"},"a":"A,C","an":"证券投资顾问依据本公司或者其他机构的证券研究报告作出投资建议的，应当向投资者说明证券研究报告的发布人（选项A）、发布日期（选项C）。综上所述，本题应选择AC选项。","type":"multi"},{"id":"cy_fin_1945","q":"证券投资咨询机构应当对证券投资顾问的业务推广、（   ）等环节实行留痕管理。","c":{"A":"投资者回访","B":"注册登记","C":"投诉处理","D":"协议签订"},"a":"A,C,D","an":"证券投资咨询机构对证券投资顾问业务推广、协议签订（选项D）、服务提供、投资者回访（选项A）、投诉处理（选项C）等环节实行留痕管理。向投资者提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。 综上所述，本题应选择ACD选项。","type":"multi"},{"id":"cy_fin_1947","q":"证券投资咨询机构及其人员应当遵循诚实信用原则，（   ）为投资者提供证券投资顾问服务。","c":{"A":"公平","B":"快速","C":"勤勉","D":"审慎"},"a":"C,D","an":"证券投资咨询机构及其人员应当遵循诚实信用原则，勤勉（选项C）、审慎（选项D）地为投资者提供证券投资顾问服务。 综上所述，本题应选择CD选项。","type":"multi"},{"id":"cy_fin_1949","q":"证券投资咨询机构向投资者提供证券投资顾问服务，应当告知投资者的基本信息有（   ）。","c":{"A":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","B":"证券投资顾问服务的内容和方式","C":"投资决策由投资者作出，投资风险由投资者承担","D":"证券投资顾问不得代投资者作出投资决策"},"a":"A,B,C,D","an":"证券投资咨询机构向投资者提供证券投资顾问服务，应当告知投资者下列基本信息： （1）公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等（选项A正确）； （2）证券投资顾问的姓名及其登记编码； （3）证券投资顾问服务的内容和方式（选项B正确）； （4）投资决策由投资者作出，投资风险由投资者承担（选项C正确）； （5）证券投资顾问不得代投资者作出投资决策（选项D正确）。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_fin_1951","q":"证券投资顾问业务的流程包括（   ）。","c":{"A":"宣传推广","B":"协议签署","C":"投资者回访","D":"投资者续费"},"a":"A,B,C","an":"证券投资顾问业务包括宣传推广（选项A）、协议签署（选项B）、服务提供、投资者回访（选项C）和投诉处理等业务环节。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_fin_1953","q":"证券投资咨询机构与投资者协商并书面约定收取证券投资顾问服务费用的安排，可以按照下列（   ）方式收取服务费用。","c":{"A":"服务期限","B":"投资者资产规模","C":"投资业绩","D":"差别佣金"},"a":"A,B,D","an":"证券投资咨询机构应当按照公平、合理、自愿的原则，与投资者协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限（选项A）、投资者资产规模（选项B）收取服务费用，也可以采用差别佣金（选项D)等其他方式收取服务费用。 综上所述，本题应选择ABD选项。","type":"multi"},{"id":"cy_fin_1955","q":"证券投资咨询机构提供证券投资顾问服务，应当与投资者签订证券投资顾问服务协议，协议内容应包括（   ）。","c":{"A":"当事人的权利义务","B":"收费标准和支付方式","C":"纠纷解决方式","D":"解除协议的方式"},"a":"A,B,C,D","an":"证券投资咨询机构提供证券投资顾问服务，应当与投资者签订证券投资顾问服务协议，并对协议实行编号管理。协议应当包括下列内容： ①当事人的权利义务（选项A正确）； ②证券投资顾问服务的内容和方式； ③证券投资顾问的职责和禁止行为； ④收费标准和支付方式（选项B正确）； ⑤争议或者纠纷解决方式（选项C正确）； ⑥终止或者解除协议的条件和方式（选项D正确）。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_fin_1957","q":"证券投资顾问应当根据了解的投资者情况，在评估投资者（   ）的基础上，向投资者提供适当的投资建议服务。","c":{"A":"投资偏好","B":"风险承受能力","C":"服务需求","D":"资产状况"},"a":"B,C","an":"证券投资顾问应当根据了解的投资者情况，在评估投资者风险承受能力（选项B）和服务需求（选项C）的基础上，向投资者提供适当的投资建议服务。 综上所述，本题应选择BC选项。","type":"multi"},{"id":"cy_fin_1959","q":"中国证监会颁布的《发布证券研究报告暂行规定》中对证券研究报告发布机构做出相关要求，下列说法正确的有（   ）。","c":{"A":"发布证券研究报告时，应当遵守法律、行政法规和本规定","B":"投资决策可以由证券投资顾问代投资者作出","C":"为了实现信息的保密性，不鼓励证券分析师通过公众媒体发表评论意见","D":"向投资者提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存"},"a":"A,D","an":"选项B错误：投资决策由投资者作出，投资风险由投资者承担。证券投资顾问不得代投资者作出投资决策。 选项C错误：证券投资咨询机构可组织安排证券投资顾问人员，按照证券信息传播的有关规定，通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎地对宏观经济、行业状况、证券市场变动情况发表评论意见，为公众投资者提供证券咨询服务，传播证券知识，揭示投资风险，引导理性投资。","type":"multi"},{"id":"cy_fin_1961","q":"证券投资咨询机构应当按照（   ）的原则，与投资者协商并书面约定收取证券投资顾问服务费用的安排。","c":{"A":"公平","B":"公正","C":"合理","D":"自愿"},"a":"A,C,D","an":"证券投资咨询机构应当按照公平（选项A）、合理（选项C）、自愿（选项D）的原则，与投资者协商并书面约定收取证券投资顾问服务费用的安排，可以按照服务期限、投资者资产规模收取服务费用，也可以采用差别佣金等其他方式收取服务费用。 综上所述，本题应选择ACD选项。","type":"multi"},{"id":"cy_fin_1963","q":"证券投资咨询机构应当为回访提供充分的人力与物质保障，保证必要的回访比例。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构应当持续了解投资者状况，及时发现并纠正不规范行为，应当为回访提供充分的人力与物质保障，保证必要的回访比例 。","type":"judge"},{"id":"cy_fin_1965","q":"证券投资咨询机构收到投资者解除协议书面或口头通知时，证券投资顾问服务协议解除。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，投资者可以书面通知方式提出解除协议。 证券投资咨询机构收到投资者解除协议书面通知时，证券投资顾问服务协议解除。不包括口头通知，因此本题说法错误。","type":"judge"},{"id":"cy_fin_1967","q":"证券投资顾问依据本公司或者其他机构的证券研究报告作出投资建议，应向投资者说明证券研究报告的发布人、发布地点。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问依据本公司或者其他机构的证券研究报告作出投资建议，应向投资者说明证券研究报告的发布人、发布日期。因此本题说法错误。","type":"judge"},{"id":"cy_fin_1969","q":"证券投资顾问服务费用可以以个人账户收取。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问服务费用应当以公司账户收取。","type":"judge"},{"id":"cy_fin_1971","q":"证券投资分析报告上可以有建议投资者在具体证券品种上进行具体价位买卖等方面的内容。","c":{"1":"对","0":"错"},"a":"0","an":"证券投资分析报告、投资分析文章等形式的咨询服务产品不得有建议投资者在具体证券品种上进行具体价位买卖等方面的内容。因此本题说法错误。","type":"judge"},{"id":"cy_fin_1973","q":"证券投资顾问可以代投资者作出投资决策。","c":{"1":"对","0":"错"},"a":"0","an":"投资决策由投资者作出，投资风险由投资者承担。证券投资顾问不得代投资者作出投资决策。因此本题说法错误。","type":"judge"},{"id":"cy_fin_1975","q":"中国证券业协会采取的自律措施，包括（   ）","c":{"A":"自律管理措施","B":"纪律处分","C":"监管措施","D":"行政处分"},"a":"A,B","an":"中国证券业协会采取的自律措施，包括自律管理措施（选项A）和纪律处分（选项B）。","type":"multi"},{"id":"cy_fin_1977","q":"普通投资者与证券公司发生纠纷的，证券公司应当证明其行为符合法律、行政法规以及国务院证券监督管理机构的规定，不存在误导、欺诈等情形。证券公司不能证明的，应当承担相应的赔偿责任。","c":{"1":"对","0":"错"},"a":"1","an":"普通投资者与证券公司发生纠纷的，证券公司应当证明其行为符合法律、行政法规以及国务院证券监督管理机构的规定，不存在误导、欺诈等情形。 证券公司不能证明的，应当承担相应的赔偿责任。","type":"judge"},{"id":"cy_fin_1979","q":"中国证券业协会将组织专家评审委员会，对相关机构的试点方案及准备情况进行审议、确定具备试点条件的机构。","c":{"1":"对","0":"错"},"a":"0","an":"中国证监会将组织专家评审委员会，对相关机构的试点方案及准备情况进行审议、确定具备试点条件的机构。","type":"judge"},{"id":"cy_fin_1981","q":"如果两种证券组合具有相同的收益率方差和不同的期望收益率，那么投资者选择期望收益率高的组合；如果两种证券组合具有相同的期望收益率和不同的收益率方差，那么投资者会选择方差较小的组合，这种选择原则叫做（   ）。","c":{"A":"有效组合规则","B":"共同偏好规则","C":"风险厌恶规则","D":"有效投资组合规则"},"a":"B","an":"选项B正确：按照投资者的共同偏好规则(总是选择方差较小、期望收益率较高的组合) ，排除投资组合中那些被所有投资者都认为差的组合，余下的这些组合称为有效证券组合。有效证券组合是有效边界上的点所对应的组合，其特征是在期望收益率水平相同的组合中，其方差是最小的；在方差水平相同的组合中，其期望收益率是最高的。","type":"single"},{"id":"cy_fin_1983","q":"证券组合可行域的有效边界是指（   ）。","c":{"A":"可行域的下边界","B":"可行域的上边界","C":"可行域的内部边界","D":"可行域的外部边界"},"a":"B","an":"证券组合可行域的有效边界是指可行域的上边界。","type":"single"},{"id":"cy_fin_1985","q":"假定不允许卖空，当两个证券完全正相关时，这两种证券在均值一标准差坐标系中的结合线为（   ）。","c":{"A":"双曲线","B":"椭圆","C":"直线","D":"波浪线"},"a":"C","an":"选项C正确：A与B完全正相关，即相关系数ρAB=1，此时A与B之间是线性关系，因此，由证券A与证券B构成的结合线是连接这两点的直线。","type":"single"},{"id":"cy_fin_1987","q":"已知在以均值为纵轴、以标准差为横轴的均值一标准差平面上由证券A和证券B构建的证券组合将位于连接A和B的直线或某一条弯曲的曲线上，并且（   ）。","c":{"A":"不同组合在连线上的位置与具体组合中投资于A和B的比例无关","B":"随着A与B的相关系数P值的增大，连线弯曲得越厉害","C":"A与B的组合形成的直线或曲线的形状由A与B的关系所决定","D":"A与B的组合形成的直线或曲线的形状与投资于A和B的比例有关"},"a":"C","an":"选项C正确：A与B的组合形成的直线或曲线的形状由A与B的关系所决定，即A与B的相关系数决定，与投资于A和B的比例无关；具体组合中投资于A和B的比例决定不同组合在连线上的位置。","type":"single"},{"id":"cy_fin_1989","q":"当证券A、B不完全正相关时，随着相关系数ρAB的增大，组合线的弯曲程度（   ）","c":{"A":"逐渐增大","B":"逐渐减小","C":"不变","D":"不确定"},"a":"B","an":"当证券A、B不完全正相关时，0<ρAB<1，组合线是一条双曲线。随着相关系数ρAB的增大，弯曲程度逐渐减小。","type":"single"},{"id":"cy_fin_1991","q":"证券组合的（   ）表示了所有可能投资的证券组合。","c":{"A":"集合","B":"组合","C":"可行域","D":"区间"},"a":"C","an":"选项C正确：证券组合的可行域表示所有可能投资的证券组合，投资者需要做的是在其中选择自己最满意的证券组合进行投资。","type":"single"},{"id":"cy_fin_1993","q":"以资本增值为目标，投资风险较大的证券组合是（   ）。","c":{"A":"收入型证券组合","B":"增长型证券组合","C":"收入和增长混合型证券组合","D":"避税型证券组合"},"a":"B","an":"选项A错误：收入型证券投资组合的主要目的是获得稳定的基本收入，并保持资产的相对安全。具有稳定收益和低风险的特点。 选项B正确：增长型证券投资组合以资本升值(即未来价格上升带来的价差收益)为目标，投资者往往愿意通过延迟获得基本收益来获得未来收益的增长，这类投资者很少会购分红较高的收入型证券，整体来说增长型证券投资组合的风险较高。 选项C错误：收入和增长混合型证券投资组合试图在基本收入与资本增值之间达到某种均衡，因此也称为「均衡组合「 。二者的均衡可以通过两种组合方式获得：一种是使组合中的收入型证券和增长型证券达到均衡；另一种是选择那些既能带来收益，又具有增长潜力的证券进行组合。 选项D错误：避税型证券投资组合以避税为首要目的，主要服务于处于高税率档次的富人，通常投资于免税债券。","type":"single"},{"id":"cy_fin_1995","q":"在组合投资理论中，有效证券组合是指（   ）。","c":{"A":"可行域内部任意可行组合","B":"可行域的左边界上的任意可行组合","C":"可行域右边界上的任意可行组合","D":"按照投资者的共同偏好规则，排除那些被所有投资者都认为差的组合后余下的这些组合"},"a":"D","an":"选项D正确：按照投资者的共同偏好规则，排除投资组合中那些被所有投资者都认为差的组合，余下的这些组合称为有效证券组合。","type":"single"},{"id":"cy_fin_1997","q":"关于证券组合中的概念，下列说法错误的是（   ）。","c":{"A":"证券组合的可行域表示所有可能投资的证券组合，投资者需要做的是在其中选择自己最满意的证券组合进行投资","B":"按照投资者的个人偏好规则，可以排除那些投资者个人认为差的组合，排除后余下的这些组合称为有效证券组合","C":"最优证券组合是投资者的无差异曲线与有效边界的切点","D":"偏好不同的投资者，他们的无差异曲线的形状也不同"},"a":"B","an":"选项B错误：按照投资者的共同偏好规则，排除投资组合中那些被所有投资者都认为差的组合，余下的这些组合称为有效证券组合。","type":"single"},{"id":"cy_fin_1999","q":"在资产组合理论中，最优证券组合为（   ）。","c":{"A":"有效边界上斜率最大点","B":"无差异曲线与有效边界的交叉点","C":"无差异曲线与有效边界的切点","D":"无差异曲线上斜率最大点"},"a":"C","an":"选项C正确：最优证券组合是投资者的无差异曲线与有效边界的切点。无差异曲线位置越靠上，投资者满意程度越高，因而投资者需要在有效边界上找到所在无差异曲线位置最高的证券组合，也即投资者的最优证券组合，其正是无差异曲线簇与有效边界的切点。","type":"single"},{"id":"cy_fin_2001","q":"两种证券组合的可行域呈现（   ）。","c":{"A":"完全正相关","B":"完全负相关","C":"不相关","D":"组合线的一般情形"},"a":"A,B,C,D","an":"两种证券组合的可行域： ①完全正相关下的组合线（选项A正确），如图2-3所示。  ②完全负相关下的组合线（选项B正确），如图2-4所示。  ③不相关情形下的组合线（选项C正确），如图2-5所示。  ④组合线的一般情形（选项D正确）。","type":"multi"},{"id":"cy_fin_2003","q":"关于最优证券组合，以下论述正确的有（   ）。","c":{"A":"对于只关心风险的投资者，最优证券组合是最小方差组合","B":"投资者的偏好通过其无差异曲线来反映，无差异曲线位置越靠下，其满意程度越高","C":"最优证券组合就是相对于其他有效组合，该组合所在的无差异曲线的位置最低","D":"最优证券组合恰恰是无差异曲线簇与有效边界的切点所表示的组合"},"a":"A,D","an":"选项B错误：无差异曲线位置越靠上，投资者的满意程度越高；无差异曲线位置越靠下，投资者的满意程度越低。 选项C错误：最优证券组合相对于其他有效组合，该组合所在的无差异曲线的位置最高。","type":"multi"},{"id":"cy_fin_2005","q":"在构建证券投资组合时，投资者需要注意（   ）。","c":{"A":"证券的价位","B":"个别证券的选择","C":"投资时机的选择","D":"证券的业绩"},"a":"B,C","an":"在构建证券投资组合时，投资者需要注意个别证券选择、投资时机选择和多元化三个问题。","type":"multi"},{"id":"cy_fin_2007","q":"关于最优证券组合，下列说法正确的是（   ）。","c":{"A":"最优证券组合是在投资者的无差异曲线与有效边界的切点","B":"投资者偏好通过无差异曲线来反映，其位置越靠下满意度越高","C":"对于只关心风险的投资者，最优证券组合是最小方差组合","D":"相对于其他有效组合，最优证券组合所在的无差异曲线位置最高"},"a":"A,C,D","an":"B项错误：无差异曲线位置越靠上，投资者满意程度越高，因而投资者需要在有效边界上找到所在无差异曲线位置最高的证券组合。","type":"multi"},{"id":"cy_fin_2009","q":"有效证券组合的特征包括（   ）。","c":{"A":"在方差（   ）水平相同的组合中，其风险收益率是最低的","B":"在方差（   ）水平相同的组合中，其期望收益率是最高的","C":"在期望收益率水平相同的组合中，其方差（   ）是最大的","D":"在期望收益率水平相同的组合中，其方差（   ）是最小的"},"a":"B,D","an":"该题考查有效证券组合的特征。其内容包括： (1)在期望收益率水平相同的组合中，其方差（从而标准差）是最小的（选项D正确）； (2)在方差（从而给定了标准差）水平相同的组合中，其期望收益率是最高的（选项B正确）。","type":"multi"},{"id":"cy_fin_2011","q":"下列关于最优证券组合的选择原理正确的是（   ）。","c":{"A":"在有效边界上找到的一个有效组合","B":"该组合所在的无差异曲线位置最高","C":"该组合投资者满意程度最高","D":"该组合的投资收益最高"},"a":"A,B,C","an":"最优证券组合是投资者的无差异曲线与有效边界的切点。无差异曲线位置越靠上，投资者满意程度越高，因而投资者需要在有效边界上找到一个有效组合（选项A正确），该组合所在的无差异曲线位置最高（选项B正确）即投资者满意程度最高（选项C正确）。也即投资者的最优证券组合，其正是无差异曲线簇（表示投资者的偏好）与有效边界的切点。 综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_fin_2013","q":"根据套利定价理论，任何一个由N种证券按比重W1，W2，…，WN构成的套利组合P都应当满足（   ）条件。","c":{"A":"构成组合的成员证券的投资比重之和等于1","B":"","C":"套利组合是风险最小、收益最高的组合","D":"套利组合的风险等于零，但收益率等于市场借贷利率"},"a":"B","an":"套利组合是指满足下述三个条件的证券组合：①该组合中各种证券的权数满足","type":"single"},{"id":"cy_fin_2015","q":"当（   ）时，投资者将选择高β值的证券组合。","c":{"A":"市场组合的实际预期收益率小于无风险利率","B":"市场组合的实际预期收益率等于无风险利率","C":"市场行情上升","D":"市场行情下跌"},"a":"C","an":"证券市场线表明，β系数反映了证券或组合的收益水平对市场平均收益水平变化的敏感性。当市场处于牛市或熊市时，投资者对证券的选择通常有不同的要求。一般而言，当市场处于牛市时（即市场行情上升），在估值优势相差不大的情况下，投资者会选择β系数较大的股票，以期获得较高的收益；反之，当市场处于熊市时，投资者会选择β系数较小的股票，以减少股票下跌的损失。 因此本题应选择C选项。","type":"single"},{"id":"cy_fin_2017","q":"投资者根据个人偏好选择的最优证券组合P恰好位于无风险证券F与切点证券组合T的组合线上。下列说法正确的是（   ）。","c":{"A":"如果P位于F与T之间，表明他卖空T","B":"如果P位于T的右侧，表明他卖空F","C":"投资者卖空F越多，P的位置越靠近T","D":"投资者卖空T越多，P的位置越靠近F"},"a":"B","an":"最优证券组合P恰好位于F与T的组合线上，可视为无风险证券F与切点证券组合T的再组合。如果所选择的最优组合位于F与T之间，表明他同时买入无风险证券F和切点证券组合T；如果所选择的最优组合位于T的右侧，表明他将卖空无风险证券F（选项B正确），并将获得的资金与原有资金一起全部投资于风险证券组合T上。投资者卖空F越多，P的位置越远离T。","type":"single"},{"id":"cy_fin_2019","q":"套利组合，是指满足（   ）三个条件的证券组合。","c":{"A":"该组合中各种证券的权数满足","B":"该组合因素灵敏度系数为零，且即 其中，bi表示证券i的因素灵敏度系数","C":"该组合具有正的期望收益率，即其中，Eri表示证券i的期望收益率","D":"该组合中各个证券的权数满足"},"a":"A,B,C","an":"套利组合，是指满足下述三个条件的证券组合： ①该组合中各种证券的权数满足（选项A正确）； ②该组合因素灵敏度系数为零，且即 其中，bi表示证券i的因素灵敏度系数（选项B正确）。 ③该组合具有正的期望收益率，即其中，Eri表示证券i的期望收益率（选项C正确）。   综上所述，本题应选择ABC选项。","type":"multi"},{"id":"cy_fin_2021","q":"下列关于有效边界与其切点证券组合T的描述，说法正确的是（   ）。","c":{"A":"切点证券组合T与投资者的偏好相关","B":"T是有效组合中唯一一个不含无风险证券而仅由风险证券构成的组合","C":"有效边界FT上的任意证券组合，均可视为无风险证券与证券组合T的再组合","D":"切点证券组合T完全由市场确定，与投资者的偏好无关"},"a":"B,C,D","an":"有效边界FT上的切点证券组合T具有三个重要的特征： ①T是有效组合上唯一一个不含无风险证券而仅由风险证券构成的组合（选项B正确）； ②有效边界FT上的任意证券组合，均可视为无风险证券与证券组合T的再组合（选项C正确）； ③切点证券组合T完全由市场确定，与投资者的偏好无关（选项A错误、选项D正确）。 综上所述，本题应选择BCD选项。","type":"multi"},{"id":"cy_fin_2023","q":"某投资者打算购买A、B、C三只股票，该投资者通过证券分析得出三只股票的以下分析数据：股票A的收益率期望值等于0.05，贝塔系数等于0.6；股票B的收益率期望值等于0.12，贝塔系数等于1.2；股票C的收益率期望值等于0.08，贝塔系数等于0.8。据此决定在股票A上的投资比例为0.2、在股票B上的投资比例为0.5，在股票C上的投资比例为0.3，那么（   ）。","c":{"A":"在期望收益率-β系数平面上，该投资者的组合优于股票C","B":"该投资者的组合β系数等于0.96","C":"该投资者的组合预期收益率大于股票C的预期收益率","D":"该投资者的组合预期收益小于股票C的预期收益率"},"a":"B,C","an":"该投资者的组合的预期收益率=0.05×0.2+0.12×0.5+0.08×0.3=0.094；该投资者的组合β系数=0.6×0.2+1.2×0.5+0.8×0.3=0.96。","type":"multi"},{"id":"cy_fin_2025","q":"机构投资者是我国证券市场最广泛的投资者。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"个人投资者是我国证券市场最广泛的投资者。","type":"judge"},{"id":"cy_fin_2027","q":"在证券投资顾问业务开展过程中，往往按照投资者的风险偏好类型和投资风格将客户分为分为五种类型，其中属于这五种类型的有（   ）。","c":{"A":"保守型","B":"风险淡漠型","C":"风险偏好型","D":"稳健型"},"a":"A,D","an":"在证券投资顾问业务开展过程中，往往按照投资者的风险偏好类型和投资风格将客户分为分为五种类型： ①进取型；②成长型；③平衡型；④稳健型；⑤保守型。 综上，AD正确。","type":"multi"},{"id":"cy_fin_2029","q":"个人投资者投资证券的主要目的有（   ）。","c":{"A":"谋求操纵证券市场","B":"追求盈利","C":"谋求资本保值","D":"谋求资本增值"},"a":"B,C,D","an":"个人投资者由于资金有限而高度分散，无法操纵证券市场，其入市只为了谋求资本保值、增值，追求盈利。","type":"multi"},{"id":"cy_fin_2031","q":"下列属于客户证券投资目标中的长期目标的是（   ）。","c":{"A":"养老金储备","B":"购买房产","C":"应急备用金","D":"启动个人生意"},"a":"A","an":"A正确：长期目标通常是指在未来5年以上的时间跨度内需要实现的目标。这些目标可能包括养老金储备、财富增长和资产传承等。 BCD错误：中期目标是指在未来三到五年内需要实现的目标。这些目标可能包括购买房产、子女的教育金、中期旅行计划、创业或扩大业务的启动资金等。","type":"single"},{"id":"cy_fin_2033","q":"子女的教育金属于客户证券投资目标中（   ）。","c":{"A":"长期目标","B":"临时目标","C":"短期目标","D":"中期目标"},"a":"D","an":"短期目标：紧急的资金需求、短期项目的资金支持、应急备用金、支付特定费用或旅行计划等。 中期目标：购买房产、子女的教育金、中期旅行计划、创业或扩大业务的启动资金等。 长期目标：养老金储备、财富增长和资产传承等。 综上，该题选D。","type":"single"},{"id":"cy_fin_2035","q":"按揭购房属于客户证券投资目标中的（   ）。","c":{"A":"中期目标","B":"临时目标","C":"长久目标","D":"短期目标"},"a":"A","an":"短期目标：紧急的资金需求、短期项目的资金支持、应急备用金、支付特定费用或旅行计划等。 中期目标：购买房产、子女的教育金、中期旅行计划、创业或扩大业务的启动资金等。 长期目标：养老金储备、财富增长和资产传承等。 综上，该题选A。","type":"single"},{"id":"cy_fin_2037","q":"旅行计划属于客户证券投资目标中的（   ）。","c":{"A":"长期目标","B":"短期目标","C":"中期目标","D":"中长期目标"},"a":"B","an":"短期目标包括紧急的资金需求、短期项目的资金支持、应急备用金、支付特定费用或旅行计划等。","type":"single"},{"id":"cy_fin_2039","q":"证券经营机构对匹配方告知警示资料、录音录像资料、自查报告等的保存期限不得少于（   ）年 。","c":{"A":"3","B":"5","C":"10","D":"20"},"a":"D","an":"证券经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受中国证监会及其派出机构和自律组织的检查。对匹配方告知警示资料、录音录像资料、自查报告等的保存期限不得少于20年。","type":"single"},{"id":"cy_fin_2041","q":"证券经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受（   ）及其派出机构和自律组织的检查。","c":{"A":"中国证券业协会","B":"中国证监会","C":"国家金融监督管理总局","D":"中国人民银行"},"a":"B","an":"证券经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受中国证监会及其派出机构和自律组织的检查。","type":"single"},{"id":"cy_fin_2043","q":"证券经营机构应当每（   ）开展一次适当性自查，形成自查报告。","c":{"A":"1个月","B":"3个月","C":"半年","D":"1年"},"a":"C","an":"证券经营机构应当每半年开展一次适当性自查，形成自查报告。","type":"single"},{"id":"cy_fin_2045","q":"根据《证券期货投资者适当性管理办法》，关于普通投资者享有的特别保护，主要体现在（   ）。","c":{"A":"本金保障","B":"风险警示","C":"适当性匹配","D":"信息告知"},"a":"B,C,D","an":"普通投资者享有的特别保护体现在信息告知、风险警示、适当性匹配。","type":"multi"},{"id":"cy_fin_2047","q":"证券经营机构向普通投资者销售高风险产品或者提供相关服务，应当履行特别的注意义务 ，包括（   ）","c":{"A":"制定专门的工作程序","B":"追加了解相关信息","C":"告知特别的风险点","D":"增加回访频次"},"a":"A,B,C,D","an":"证券经营机构向普通投资者销售高风险产品或者提供相关服务，应当履行特别的注意义务 ，包括制定专门的工作程序，追加了解相关信息，告知特别的风险点，给予普通投资者更多的考虑时间，或者增加回访频次等。","type":"multi"},{"id":"cy_fin_2049","q":"证券经营机构通过营业网点向普通投资者进行规定的告知 、警示 ，应当全过程录音或者录像。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构通过营业网点向普通投资者进行规定的告知 、警示 ，应当全过程录音或者录像；通过互联网等非现场方式进行的，证券经营机构应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。","type":"judge"},{"id":"cy_fin_2051","q":"投资者拒绝听取经营机构的适当性匹配意见导致其购买产品或者接受服务不恰当的，证券经营机构不可以免除相应责任 。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"投资者拒绝听取经营机构的适当性匹配意见导致其购买产品或者接受服务不恰当的，证券经营机构可以免除相应责任，因此本题说法错误。","type":"judge"},{"id":"cy_fin_2053","q":"证券公司认为客户购买金融产品不适当或者无法判断适当性的，不得向其推介；客户主动要求购买的，证券公司应当将判断结论口头告知客户，提示其审慎决策。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司认为客户购买金融产品不适当或者无法判断适当性的，不得向其推介；客户主动要求购买的，证券公司应当将判断结论书面告知客户，提示其审慎决策，并由客户签字确认。","type":"judge"},{"id":"cy_fin_2055","q":"证券经营机构应当与普通投资者确认其风险承受能力等级结果，并以书面方式记载留存。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构应当与普通投资者确认其风险承受能力等级结果，并以书面方式记载留存。","type":"judge"},{"id":"cy_fin_2057","q":"证券经营机构可以将普通投资者按其风险承受能力等级由低到高至少划分为三级。","c":{"1":"对","0":"错"},"a":"0","an":"证券经营机构可以将普通投资者按其风险承受能力等级由低到高至少划分为五级，分别为：C1、C2、C3、C4、C5。","type":"judge"},{"id":"cy_fin_2059","q":"普通投资者申请成为专业投资者应当以书面形式向证券经营机构提出申请并确认自主承担可能产生的风险和后果，提供相关证明材料。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"普通投资者申请成为专业投资者应当以书面形式向证券经营机构提出申请并确认自主承担可能产生的风险和后果，提供相关证明材料。","type":"judge"},{"id":"cy_fin_2061","q":"投资者不符合中国证监会、自律组织针对特定市场、产品、交易规定的投资者准入要求的，证券经营机构不得为其提供相关服务。","c":{"1":"对","0":"错"},"a":"1","an":"投资者不符合中国证监会、自律组织针对特定市场、产品、交易规定的投资者准入要求的，证券经营机构不得为其提供相关服务。","type":"judge"},{"id":"cy_fin_2063","q":"证券经营机构认为投资者参与相关交易不适当，或者无法判断是否适当的，应当拒绝提供相关服务。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构认为投资者参与相关交易不适当，或者无法判断是否适当的，应当拒绝提供相关服务。","type":"judge"},{"id":"cy_fin_2065","q":"证券公司应当向客户说明，因金融产品设计、运营和委托人提供的信息不真实、不准确、不完整而产生的责任由委托人承担，证券公司不承担任何担保责任。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当向客户说明，因金融产品设计、运营和委托人提供的信息不真实、不准确、不完整而产生的责任由委托人承担，证券公司不承担任何担保责任。","type":"judge"},{"id":"cy_fin_2067","q":"投资者风险承受能力等级与产品或服务风险等级相匹配的，证券经营机构应当与投资者签署确认确认风险警示。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"投资者风险承受能力等级与产品或服务风险等级相匹配的，证券经营机构应当与投资者签署确认适当性匹配结果；不匹配的，应当与投资者签署确认风险警示","type":"judge"},{"id":"cy_fin_2069","q":"假设某证券最近10周收盘价分别为22、21、22、24、26、27、25、24、26、25，那么本周的RSI（   ）等于（   ）。","c":{"A":"45","B":"50","C":"61.54","D":"56"},"a":"C","an":"每周的收盘价减去上一周的收盘价，可得到下面9个数字：-1、1、2、2、1、-2、-1、2、-1。最近10周收盘价格上涨总数=1+2+2+1+2=8；最近10周收盘价格下跌总数=（-1-2-1-1）×（-1）=5。因此RSI（9）=8/（8+5）×100≈61.54。","type":"single"},{"id":"cy_fin_2071","q":"反映证券价格变化趋势的直线称为（   ）。","c":{"A":"渐变线","B":"走势线","C":"趋势线","D":"变化线"},"a":"C","an":"反映证券价格变化趋势的直线称为趋势线。","type":"single"},{"id":"cy_fin_2073","q":"证券价格的运动方向由（   ）决定。","c":{"A":"市场价值","B":"供求关系","C":"预期收益","D":"证券价格"},"a":"B","an":"证券价格的运动方向由供求关系决定。  考点  技术分析的基本假设与相关图形","type":"single"},{"id":"cy_fin_2075","q":"目前我国沪深两地证券交易所以及北京证券交易所均采用集合竞价方式产生开盘价和收盘价，每个交易日的14:55~15:00为收盘集合竞价时间。","c":{"1":"对","0":"错"},"a":"0","an":"目前我国沪深两地证券交易所以及北京证券交易所均采用集合竞价方式产生开盘价和收盘价，每个交易日的9:15~9:25为开盘集合竞价时间，当天14:57~15:00为收盘集合竞价时间。","type":"judge"},{"id":"cy_fin_2077","q":"技术分析适用于预测未来一段较短时间的行情， 对证券价格行为模式的判断有很大随意性。","c":{"1":"对","0":"错"},"a":"1","an":"技术分析适用于预测未来一段较短时间的行情， 对证券价格行为模式的判断有很大随意性。","type":"judge"},{"id":"cy_fin_2079","q":"有效市场假说是（   ）证券投资策略的理论依据。","c":{"A":"交易型","B":"消极型","C":"积极型","D":"投资组合保险"},"a":"B","an":"消极型投资策略是指根据事先确定的投资组合构成及调整规则进行投资，而不会根据对市场环境的变化主动地实施调整。消极型投资策略的假设前提是投资者认为证券市场是有效的，证券价格充分反映可获得的信息，因此被动接受市场变化更有可能获取市场收益，而且能够避免过多的交易戚本和误判市场走势造成的损失。","type":"single"},{"id":"cy_fin_2081","q":"消极型投资策略的假设前提是投资者认为市场尚未达到完全有效水平，即市场存在套利机会，可以通过证券分析挖掘出价格被低估或高估的证券，从而获得超额收益。","c":{"1":"对","0":"错"},"a":"0","an":"积极型投资策略的假设前提是投资者认为市场尚未达到完全有效水平，即市场存在套利机会，可以通过证券分析挖掘出价格被低估或高估的证券，从而获得超额收益。 消极型投资策略的假设前提是投资者认为证券市场是有效的，证券价格充分反映可获得的信息，因此被动接受市场变化更有可能获取市场收益，而且能够避免过多的交易成本和误判市场走势造成的损失。","type":"judge"},{"id":"cy_fin_2083","q":"关于证券投资顾问与证券分析师的区别，以下说法正确的是()。","c":{"A":"证券投资顾问主要向特定客户提供个性化投资建议，而证券分析师主要向不特定的客户发布证券研究报告","B":"证券分析师负责销售证券产品","C":"证券投资顾问主要从事证券交易操作","D":"证券投资顾问与证券分析师均可直接管理客户资金"},"a":"A","an":"证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。","type":"single"},{"id":"cy_fin_2085","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括（）撰写的证券研究报告。  Ⅰ本公司证券分析师  Ⅱ其他公司证券分析师  Ⅲ投资顾问本人  Ⅳ投资顾问小组","c":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"A","an":"投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。  证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议。  综上，该题选A。","type":"single"},{"id":"cy_fin_2087","q":"下列对证券投资顾问人员注册登记管理，说法错误的是(  )","c":{"A":"向客户提供证券投资顾问服务的人员，应当具有证券投资咨询执业资格","B":"证券投资顾问可以同时注册为证券分析师，但应当分开管理，以防止可能的利益冲突","C":"向客户提供证券投资顾问服务的人员应在中国证券业协会注册登记为证券投资顾问","D":"证券投资顾问不得同时注册为证券分析师"},"a":"B","an":"AC项正确：向客户提供证券投资顾问服务的人员应当符合相关从业条件，并在中国证券业协会注册登记为证券投资顾问。 B项错误、D项正确：证券投资顾问不得同时注册为证券分析师。 综上，该题选B。","type":"single"},{"id":"cy_fin_2089","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括（）撰写的证券研究报告。","c":{"A":"本公司证券分析师","B":"其他公司证券分析师","C":"投资顾问本人","D":"投资顾问小组"},"a":"A,B","an":"证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议，投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。","type":"multi"},{"id":"cy_fin_2091","q":"下列对证券投资顾问人员注册登记管理的说法中，错误的是()","c":{"A":"证券投资顾问不得同时注册为证券分析师","B":"证券投资顾问可以同时注册为证券分析师，但应分开管理以防止可能的利益冲突","C":"向客户提供证券投资顾问服务的人员，应当符合相关从业条件","D":"向客户提供证券投资顾问服务的人员应在中国证券业协会注册登记为证券投资顾问"},"a":"B","an":"正确向客户提供证券投资顾问服务的人员，应当符合相关从业条件，并在中国证券业协会注册登记为证券投资顾问。证券投资顾问不得同时注册为证券分析师。","type":"single"},{"id":"cy_fin_2093","q":"证券公司员工小王，同时通过了证券投资顾问和分析师考试，则（）。","c":{"A":"注册投资顾问和投资分析师后，从事相关工作","B":"不能同时注册投资顾问和投资分析师","C":"注册投资顾问，可以发布证券研究报告","D":"注册投资分析师，可以替客户直接操作证券投资"},"a":"B","an":"证券分析师不得同时注册为证券投资顾问；证券投资顾问不得同时注册为证券分析师。","type":"single"},{"id":"cy_fin_2095","q":"《证券投资顾问业务风险揭示书》应以（  ）形式，由投资者签收确认，并由证券公司、证券投资咨询机构归入证券投资顾问业务档案保存。","c":{"A":"电子文件","B":"书面","C":"书面和电子文件","D":"书面或电子文件"},"a":"D","an":"《证券投资顾问业务风险揭示书》应以书面或者电子文件形式，由投资者签收确认，并由证券公司、证券投资咨询机构归入证券投资顾问业务档案保存","type":"single"},{"id":"cy_fin_2097","q":"证券投资顾问服务协议应当约定自签订协议之日起5个工作日内客户可以用()方式提出解除协议。","c":{"A":"口头","B":"口头或书面通知","C":"口头和书面通知","D":"书面通知"},"a":"D","an":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，投资者可以书面通知方式提出解除协议。证券投资咨询机构收到投资者解除协议书面通知时，证券投资顾问服务协议解除。","type":"single"},{"id":"cy_fin_2099","q":"向投资者提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。证券投资顾问业务档案的保存期限自协议终止之日起不得少于（）年。","c":{"A":"10","B":"5","C":"1","D":"3"},"a":"B","an":"向投资者提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_fin_2101","q":"根据《证券投资顾问业务暂行规定》，证券公司、证券投资咨询机构从事证券投资顾问业务，应当建立客户回访机制，明确客户回访的程序、内容和要求，并（）。","c":{"A":"成立专门的委员会","B":"指定专门人员独立实施","C":"指定多部门分别独立实施","D":"指定多部门共同实施"},"a":"B","an":"证券投资咨询机构从事证券投资顾问业务，应当建立投资者回访机制，明确投资者回访的程序、内容和要求，并指定专门人员独立实施。","type":"single"},{"id":"cy_fin_2103","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当将(  )告知客户 Ⅰ、公司名称、地址、联系方式、投诉电话、证券投资咨询资格业务等 Ⅱ、证券投资顾问的姓名及其证券投资咨询执业资格编码 Ⅲ、证券投资顾问服务的内容和方式 Ⅳ、投资决策由客户做出，由客户承担，证券投资顾问不得代客户作出投资决策","c":{"A":"Ⅱ、Ⅳ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅳ"},"a":"C","an":"证券投资咨询机构向投资者提供证券投资顾问服务，应当告知投资者下列基本信息： (1)公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等； (2)证券投资顾问的姓名及其登记编码； (3)证券投资顾问服务的内容和方式； (4)投资决策由投资者作出，投资风险由投资者承担; (5)证券投资顾问不得代投资者作出投资决策。 综上，该题选C。","type":"single"},{"id":"cy_fin_2105","q":"证券投资顾问禁止对服务能力和过往业绩进行（  ）营销宣传。 Ⅰ 虚假 Ⅱ 不实 Ⅲ误导性  Ⅳ审慎性","c":{"A":"Ⅰ Ⅱ","B":"Ⅰ Ⅱ Ⅲ","C":"Ⅰ Ⅲ","D":"Ⅱ Ⅲ Ⅳ"},"a":"B","an":"证券投资顾问禁止对服务能力和过往业绩进行虚假、不实、误导性营销宣传。","type":"single"},{"id":"cy_fin_2107","q":"根据《证券投资顾问业务暂行规定》，证券投资顾问向客户提供投资建议，应当具有合理的依据，这些依据包括（）  Ⅰ证券研究报告  Ⅱ证券投资顾问的服务能力和过往业绩  Ⅲ基于证券研究报告形成的投资分析意见  Ⅳ基于理论模型以及分析方法形成的投资分析意见","c":{"A":"Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"C","an":"证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。  综上，该题选C。","type":"single"},{"id":"cy_fin_2109","q":"证券投资顾问可以通过公众媒体，对（）  Ⅰ宏观经济发表评论意见  Ⅱ行业状况发表评论意见  Ⅲ证券市场变动情况发表评论意见  Ⅳ具体证券作出买入、卖出或者持有的意见","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ","D":"Ⅲ、Ⅳ"},"a":"A","an":"证券投资咨询机构可组织安排证券投资顾问人员，按照证券信息传播的有关规定通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎地对宏观经济、行业状况、证券市场变动情况发表评论意见，为公众投资者提供证券咨询服务，传播证券知识，揭示投资风险，引导理性投资。 证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议。  综上，该题选A。","type":"single"},{"id":"cy_fin_2111","q":"证券公司、证券投资咨询机构应当通过（）、中国证券业协会和公司网站公示投资顾问的相关信息查询、监督。","c":{"A":"证监会","B":"证券交易所","C":"营业场所","D":"公共场所"},"a":"C","an":"证券公司、证券投资咨询机构应当通过营业场所、中国证券业协会和公司网站公示投资顾问的相关信息，方便投资者查询、监督。","type":"single"},{"id":"cy_fin_2113","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据不包括（   ）","c":{"A":"证券研究报告","B":"基于证券研究报告的投资分析意见","C":"理论模型","D":"证券投资顾问的主观判断"},"a":"D","an":"证券投资顾问向客户提供的投资建议内容包括投资的品种选择、投资组合以及理财规划建议等，证券投资顾问向客户提供的投资建议应依据包括：证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。","type":"single"},{"id":"cy_fin_2115","q":"证券投资顾问业务档案的保存期限自协议终止之日起不少于 （）年。","c":{"A":"3","B":"5","C":"1","D":"10"},"a":"B","an":"证券投资顾问业务档案的保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_fin_2117","q":"证券投资顾问作出投资建议，可以使用（  ）作为依据。","c":{"A":"本公司的证券研究报告","B":"其他证券公司的证券研究报告","C":"其他证券投资咨询机构的证券研究报告","D":"基于证券研究报告、理论模型以及分析方法形成的投资分析意见"},"a":"A,B,C,D","an":"证券投资顾问向客户提供投资建议，应当具有合理的依据。 投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_2119","q":"证券公司、证券投资咨询机构应当向客户提供风险揭示书，并由客户签收确认。证券投资顾问业务风险揭示书至少应包括（  ）。","c":{"A":"提示投资者在接受证券投资顾问服务前，必须了解证券公司及其人员提供的证券投资顾问不能确保投资者获得盈利或本金不受损失","B":"提示投资者在接受证券投资顾问服务前，必须了解提供服务的证券公司、证券投资咨询机构是否具备证券投资咨询业务资格，证券公司、证券投资咨询机构提供服务的人员是否符合证券投资咨询相关从业条件并已经注册登记为证券投资顾问","C":"证券投资顾问服务收费应向公司账户支付，不得向证券投资顾问人员或其他个人账户支付","D":"提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问业务的含义，理解投资者接受证券投资顾问服务后需自主作出投资决策并独立承担投资风险"},"a":"A,B,C,D","an":"证券投资顾问业务风险揭示书至少应包含下列内容: (1)提示投资者在接受证券投资顾问服务前，必须了解提供服务的证券投资咨询机构是否具备证券投资咨询业务资格，证券投资咨询机构提供服务的人员是否符合证券投资咨询相关从业条件并已经登记为证券投资顾问。 (2)提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问业务的含义，理解投资者接受证券投资顾问服务后需自主作出投资决策并独立承担投资风险。 (3)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员提供的证券投资顾问服务不能确保投资者获得盈利或本金不受损失。 (4)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员提供的投资建议具有针对性和时效性，不能在任何市场环境下长期有效。 (5)提示投资者在接受证券投资顾问服务前，必须了解作为投资建议依据的证券研究报告和投资分析意见等，可能存在不准确、不全面或者被误读的风险，投资者可以向证券投资顾问了解证券研究报告的发布人和发布时间以及投资分析意见的来源以便在进行投资决策时作出理性判断。 (6)提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问服务的收费标准和方式，按照公平、合理、自愿的原则与证券投资咨询机构协商并书面约定收取证券投资顾问服务费用的安排。证券投资顾问服务收费应向公司账户支付，不得向证券投资顾问人员或其他个人账户支付。 (7)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员可能存在道德风险，如投资者发现投资顾问存在违法违规行为或利益冲突情形，如泄露客户投资决策计划、传播虚假信息、进行关联交易等，投资者可以向证券投资咨询机构投诉或向有关部门举报。 (8)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构存在因停业、解散、撤销、破产，或者被中国证监会撤销相关业务许可、责令停业整顿等原因导致不能履行职责的风险。 (9)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构的投资顾问人员存在因离职、离岗等原因导致更换投资顾问服务人员并影响服务连续性的风险。 (10)提示投资者在接受证券投资顾问服务前，应向证券投资咨询机构说明自身资产与收入状况、投资经验、投资需求和风险偏好等情况并接受评估，以便于证券投资咨询机构根据投资者的风险承受能力和服务需求，向投资者提供适当的证券投资顾问服务。 (11)提示投资者在接受证券投资顾问服务前，应向证券投资咨询机构提供有效的联系方式和服务获取方式，如有变动须及时向所在的证券投资咨询机构进行说明如因投资者自身原因或不可抗力因素导致投资者未能及时获取证券投资顾问服务，责任将由投资者自行承担。 (12)提示投资者在接受证券投资顾问服务时，应保管好自己的证券账户、资金账户和相应的密码，不要委托证券投资顾问人员管理自己的证券账户、资金账户，代理买卖证券，否则由此导致的风险将由投资者自行承担。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_2121","q":"证券公司探索形成的证券投资顾问业务流程主要有哪几个环节()。","c":{"A":"服务模式的选择和设计","B":"客户签约","C":"形成服务产品","D":"服务提供"},"a":"A,B,C,D","an":"证券公司探索形成的证券投资顾问业务流程主要有四个环节：(1)服务模式的选择和设计。(2)客户签约。(3)形成服务产品。(4)服务提供。","type":"multi"},{"id":"cy_fin_2123","q":"证券公司、证券投资咨询机构及其人员提供证券投资顾问服务时，应当遵循诚实信用原则，下列行为中违背上述原则的有()。","c":{"A":"在业务推广和客户招揽过程中，对服务能力和过往业绩进行夸大宣传","B":"在业务推广和客户招揽过程中，客观介绍服务能力和过往业绩","C":"提供虚假、不实、误导性的信息，诱导客户进行不必要的证券买卖","D":"基于合理依据向客户提供投资建议，并提示潜在的投资风险"},"a":"A,C","an":"证券投资咨询机构及其人员应当遵循诚实信用原则， 勤勉、审慎地为投资者提供证券投资顾问服务。","type":"multi"},{"id":"cy_fin_2125","q":"证券公司，证券资讯机构应对证券投资业务推广（ ) 等环节实行留痕管理","c":{"A":"服务提供","B":"客户回访和投诉","C":"协议签订","D":"向客户提供建议内容"},"a":"A,B,C,D","an":"证券投资咨询机构对证券投资顾问业务推广、协议签订、服务提供、投资者回访、投诉处理等环节实行留痕管理。向客户提供投资建议的时间、内容、方式和依据等信息，应当以书面或者电子文件形式予以记录留存。","type":"multi"},{"id":"cy_fin_2127","q":"证券公司、证券投资咨询机构可以组织证券投资顾问，通过广播电视、网络、报刊等公众媒体，客观、专业、审慎地（）。","c":{"A":"对宏观经济、行业状况发表评论意见","B":"对证券市场变动情况发表评论意见","C":"提供买入、卖出或持有具体证券的投资建议","D":"提供股票组合的买入卖出建议"},"a":"A,B","an":"鼓励证券公司、证券投资咨询机构组织安排证券投资顾问人员，按照证券信息传播的有关规定，通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎地对宏观经济、行业状况、证券市场变动情况发表评论意见（AB项），为公众投资者提供证券资讯服务，传播证券知识，揭示投资风险，引导理性投资。 CD项是不合规的行为。","type":"multi"},{"id":"cy_fin_2129","q":"证券投资顾问向客户提供投资建议，应当具有合理的依据，投资建议的依据包括（）。","c":{"A":"证券研究报告","B":"基于证券研究报告形成的投资分析意见","C":"基于理论模型形成的投资分析意见","D":"基于分析方法形成的投资分析意见"},"a":"A,B,C,D","an":"证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括证券研究报告（A项）或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见（BCD项）等。","type":"multi"},{"id":"cy_fin_2131","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列（）基本信息。","c":{"A":"证券投资顾问的姓名及其登记编码","B":"证券投资顾问服务客户的历史业绩","C":"投资决策由客户作出，投资风险由客户承担","D":"证券投资顾问服务的内容和方式"},"a":"A,C,D","an":"证券投资咨询机构向投资者提供证券投资顾问服务，应当告知投资者下列基本信息： （1）公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等； （2）证券投资顾问的姓名及其登记编码；A项 （3）证券投资顾问服务的内容和方式；D项 （4）投资决策由投资者作出，投资风险由投资者承担；C项 （5）证券投资顾问不得代投资者作出投资决策。","type":"multi"},{"id":"cy_fin_2133","q":"经纪业务客户桂某，到证券公司营业部提出证券投资顾问服务要求，该营业部相关人员按照公司制定的程序和要求，了解客户的身份、财产与收入状况、证券投资经验、投资需求与风险偏好，评估客户的风险承受能力，并以书面或者电子文件形式予以记载、保存。请根据上述背景信息回答以下问题。 证券公司、证券投资咨询机构应当向客户提供风险揭示书，并由客户签收确认。证券投资顾问业务风险揭示书至少应包括()。","c":{"A":"提示投资者在接受证券投资顾问服务前，必须了解证券公司及其人员提供的证券投资顾问不能确保投资者获得盈利或本金不受损失","B":"提示投资者在接受证券投资顾问服务前，必须了解提供服务的证券公司、证券投资咨询机构是否具备证券投资咨询业务资格，证券公司、证券投资咨询机构提供服务的人员是否符合证券投资咨询相关从业条件并已经注册登记为证券投资顾问","C":"证券投资顾问服务收费应向公司账户支付，不得向证券投资顾问人员或其他个人账户支付","D":"提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问业务的含义，理解投资者接受证券投资顾问服务后决策并独立承担投资风险"},"a":"A,B,C,D","an":"证券投资顾问业务风险揭示书至少应包含下列内容: (1)提示投资者在接受证券投资顾问服务前，必须了解提供服务的证券投资咨询机构是否具备证券投资咨询业务资格，证券投资咨询机构提供服务的人员是否符合证券投资咨询相关从业条件并已经登记为证券投资顾问。 (2)提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问业务的含义，理解投资者接受证券投资顾问服务后需自主作出投资决策并独立承担投资风险。 (3)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员提供的证券投资顾问服务不能确保投资者获得盈利或本金不受损失。 (4)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员提供的投资建议具有针对性和时效性，不能在任何市场环境下长期有效。 (5)提示投资者在接受证券投资顾问服务前，必须了解作为投资建议依据的证券研究报告和投资分析意见等，可能存在不准确、不全面或者被误读的风险，投资者可以向证券投资顾问了解证券研究报告的发布人和发布时间以及投资分析意见的来源以便在进行投资决策时作出理性判断。 (6)提示投资者在接受证券投资顾问服务前，必须了解证券投资顾问服务的收费标准和方式，按照公平、合理、自愿的原则与证券投资咨询机构协商并书面约定收取证券投资顾问服务费用的安排。证券投资顾问服务收费应向公司账户支付，不得向证券投资顾问人员或其他个人账户支付。 (7)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构及其人员可能存在道德风险，如投资者发现投资顾问存在违法违规行为或利益冲突情形，如泄露客户投资决策计划、传播虚假信息、进行关联交易等，投资者可以向证券投资咨询机构投诉或向有关部门举报。 (8)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构存在因停业、解散、撤销、破产，或者被中国证监会撤销相关业务许可、责令停业整顿等原因导致不能履行职责的风险。 (9)提示投资者在接受证券投资顾问服务前，必须了解证券投资咨询机构的投资顾问人员存在因离职、离岗等原因导致更换投资顾问服务人员并影响服务连续性的风险。 (10)提示投资者在接受证券投资顾问服务前，应向证券投资咨询机构说明自身资产与收入状况、投资经验、投资需求和风险偏好等情况并接受评估，以便于证券投资咨询机构根据投资者的风险承受能力和服务需求，向投资者提供适当的证券投资顾问服务。 (11)提示投资者在接受证券投资顾问服务前，应向证券投资咨询机构提供有效的联系方式和服务获取方式，如有变动须及时向所在的证券投资咨询机构进行说明如因投资者自身原因或不可抗力因素导致投资者未能及时获取证券投资顾问服务，责任将由投资者自行承担。 (12)提示投资者在接受证券投资顾问服务时，应保管好自己的证券账户、资金账户和相应的密码，不要委托证券投资顾问人员管理自己的证券账户、资金账户，代理买卖证券，否则由此导致的风险将由投资者自行承担。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_2135","q":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。()","c":{"1":"对","0":"错"},"a":"1","an":"证券投资顾问依据本公司或者其他机构的证券研究报告作出投资建议，应向投资者说明证券研究报告的发布人、发布日期。","type":"judge"},{"id":"cy_fin_2137","q":"证券投资顾问业务的基本原则包括依法合规、诚实信用、忠实投资者利益。","c":{"1":"对","0":"错"},"a":"1","an":"证券公司从事证券投资顾问业务，应当遵循的基本原则是守法合规、诚实信用、忠实客户利益。","type":"judge"},{"id":"cy_fin_2139","q":"认为证券市场是有效市场的机构投资者一般倾向于选择（  ）证券投资组合。","c":{"A":"增长型","B":"收入型","C":"指数型","D":"平衡型"},"a":"C","an":"信奉证券市场是有效市场的机构投资者倾向于选择指数型证券投资组合，以求获得市场平均的收益水平。","type":"single"},{"id":"cy_fin_2141","q":"关于证券市场的有效性，下列说法错误的有（  ） Ⅰ如果股价变动是可以预期的，那么市场是有效的 Ⅱ市场有效性来源于竞争 Ⅲ在有效市场中，指数化投资策略是不可取的 Ⅳ如果股市是有效，历史信息不能引起股价变动","c":{"A":"Ⅰ Ⅲ","B":"Ⅱ  Ⅳ","C":"Ⅲ Ⅳ","D":"Ⅰ Ⅱ  Ⅳ"},"a":"A","an":"积极投资者采用的技术分析法和基本分析法正是市场有效形成的原因。风险分散和市场有效假设理论导致了指数基金这种新颖投资工具的产生。 Ⅰ错误：市场有效理论认为股价的走势充分反映了一切信息，那么如果市场有效成立，则一切技术分析均不可能对股价进行分析预测。 有效市场假说是指证券在任一时点的价格都是对与证券相关的所有信息的即时、充分的反映。 Ⅲ错误：在有效市场中，指数化投资策略是可取的。","type":"single"},{"id":"cy_fin_2143","q":"下列关于最优证券组合的说法，正确的有（ ） Ⅰ、这一组合是能带来最高收益的组合 Ⅱ、这一组合肯定在有效边界上 Ⅲ、这一组合是无差异曲线簇与有效边界的切点 Ⅳ、这一组合是理性投资者的最佳选择","c":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"B","an":"Ⅱ、Ⅲ、Ⅳ正确：最优证券组合是投资者的无差异曲线与有效边界的切点。无差异曲线位置越靠上投资者满意程度越高，因而投资者需要在有效边界上找到所在无差异曲线位置最高的。 Ⅰ错误：最优证券组合是投资者最满意的投资组合，而不是最高收益的组合。因为每一个投资者的风险承受能力是不同的，他们所要求的收益也不相同。 综上，该题选B。","type":"single"},{"id":"cy_fin_2145","q":"投资者的无差异曲线簇与证券组合可行域有效边界的切点所表示的组合（   ）。 Ⅰ是该投资者的最优证券组合  Ⅱ是方差最小组合  Ⅲ投资者在所有有效组合中，该组合获得最大满意程度  Ⅳ投资者在所有有效组合中，该组合风险最小","c":{"A":"Ⅰ、Ⅲ","B":"Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ"},"a":"A","an":"Ⅰ、Ⅲ正确：最优证券组合：相对于其他有效组合，该组合所在的无差异曲线位置最高。这样的有效组合便是他最满意的有效组合，而它恰恰是无差异曲线簇与有效边界的切点所表示的组合。  Ⅱ、Ⅳ错误：最优证券组合不一定方差最小，风险最小。 综上，该题选A。","type":"single"},{"id":"cy_fin_2147","q":"投资者的无差异曲线与证券组合可行域有效边界的切点所表示的组合（）.","c":{"A":"是该投资者的最优证券组合","B":"是方差最小组合","C":"投资者在所有有效组合中，该组合获得最大满意程度","D":"投资者在所有有效组合中，该组合风险最小"},"a":"A,C","an":"最优证券组合是投资者的无差异曲线与有效边界的切点。","type":"multi"},{"id":"cy_fin_2149","q":"指数型证券投资组合可以模拟的指数有（）。","c":{"A":"市场指数","B":"某种专业化指数","C":"夏普指数","D":"詹森指数"},"a":"A,B","an":"指数型证券投资组合模拟某种市场指数。信奉有效市场理论的机构投资者通常会倾向于这种组合，以求获得市场平均的收益水平。 根据模拟指数的不同，指数化型证券组合可以分为两类：一类是模拟内涵广大的市场指数；另一类是模拟某种专业化的指数，如道·琼斯公用事业指数。","type":"multi"},{"id":"cy_fin_2151","q":"资本资产定价模型中的一个重要假设是投资者根据（  ）选择证券。","c":{"A":"是否配股","B":"证券的流通性","C":"证券的风险与收益","D":"是否分红派息"},"a":"C","an":"资本资产定价模型是建立在若干假设条件基础上的。这些假设条件可概括为如下3项： ①投资者都依据期望收益率评价证券组合的收益水平，依据方差（或标准差）评价证券组合的风险水平，选择最优证券组合； ②投资者对证券的收益、风险及证券间的关联性具有完全相同的预期； ③资本市场没有摩擦。 综上，该题选C。","type":"single"},{"id":"cy_fin_2153","q":"套利定价理论的假设条件包括（  ） Ⅰ投资者是追求收益的，同时也是厌恶风险的 Ⅱ所有证券的收益都受到一个共同因素的影响 Ⅲ投资者能够发现市场上是否存在套利机会，并利用该机会进行套利 Ⅳ投资者以收益率的均值和方差为基础选择投资组合","c":{"A":"Ⅰ Ⅱ Ⅲ","B":"Ⅰ Ⅱ Ⅲ Ⅳ","C":"Ⅱ Ⅲ Ⅳ","D":"Ⅰ Ⅳ"},"a":"A","an":"套利定价理论的假设条件有三个： 1）投资者是追求收益的，同时也是厌恶风险的。  2）所有证券的收益都受到一个共同因素F的影响，并且证券的收益率具有如下的构成形式： ri=Ai+BiF1+εi。 式中：ri—证券i的实际收益率； Bi—因素指标F1的系数，反映证券i的收益率r对因素指标F1—变动的敏感性，也称“灵敏度系数”； F1—影响证券的那个共同因素F的指标值； εi—证券i收益率r,的残差项。  3）投资者能够发现市场上是否存在套利机会，并利用该机会进行套利。 综上，该题选A。","type":"single"},{"id":"cy_fin_2155","q":"资本资产定价模型的假设条件包括（  ） Ⅰ投资者能够发现市场上的套利机会 Ⅱ证券的收益率具有单因素模型所描述的生成过程 Ⅲ投资者对证券的收益和风险及证券间的关联性具有完全一致的预期 Ⅳ投资者都依据期望收益率评价证券组合的收益水平，依据方差评价证券组合的风险水平","c":{"A":"Ⅱ Ⅲ Ⅳ","B":"Ⅲ Ⅳ","C":"Ⅰ Ⅱ","D":"Ⅰ Ⅱ Ⅲ"},"a":"B","an":"I、II错误：属于套利定价模型的假设条件。 资本资产定价模型假设条件： 假设1：投资者都依据期望收益率评价证券组合的收益水平，依据方差(或标准差)评价证券组合的风险水平，并按照投资者共同偏好规则选择最优证券组合。 假设2：投资者对证券的收益、风险及证券间的关联性具有完全相同的预期。 假设3：资本市场没有摩擦。 综上，该题选B。","type":"single"},{"id":"cy_fin_2157","q":"资本资产定价模型的假设条件包括(  )。  Ⅰ.任何证券的交易单位都是不可分的  Ⅱ.投资者对证券的收益和风险及证券间的关联性具有完全相同的预期  Ⅲ.投资者都依据组合的期望收益率和方差选择证券组合  Ⅳ.资本市场没有摩擦","c":{
