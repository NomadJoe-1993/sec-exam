，应当提前【5个工作日】告知全体投资者和托管人，并取得其同意。","type":"single"},{"id":"cy_fin_1271","q":"根据《证券公司基金管理公司子公司资产证券化业务管理规定》，管理人应当自专项计划成立日起5个工作日内将设立情况报（）备案，同时抄送对管理人有辖区监管权的中国证监会派出机构。","c":{"A":"中国证券投资基金业协会","B":"中国证券业协会","C":"中国证监会","D":"证券交易所"},"a":"A","an":"选项A正确：管理人应当自专项计划成立日起5个工作日内将设立情况报【中国证券投资基金业协会】备案，同时抄送对管理人有辖区监管权的中国证监会派出机构。（解释：基金业协会作为资产管理行业的自律组织，负责资产证券化业务的备案及自律管理。其职责包括制定备案规则、对备案材料进行齐备性复核，并与证券交易场所、证监会建立信息共享机制） 选项B错误：中国证券业协会的主要职能是对证券业务进行自律管理，例如制定场外证券业务规则。资产证券化业务属于私募资产管理范畴，其备案工作由基金业协会负责。 选项C错误：中国证监会作为行政监管机构，负责对资产证券化业务的合规性进行监督检查，但具体的备案流程由自律组织（基金业协会）执行。 选项D错误：证券交易所的主要职责是为资产支持证券提供挂牌转让服务，而非备案管理。","type":"single"},{"id":"cy_fin_1273","q":"发行期结束时，资产支持证券发行规模未达到计划说明书约定的最低发行规模，或者专项计划未满足计划说明书约定的其他设立条件，专项计划设立失败。管理人应当自发行期结束之日起（）个工作日内，向投资者退还认购资金，并加算银行同期活期存款利息。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"D","an":"选项D正确：发行期结束时，资产支持证券发行规模未达到计划说明书约定的最低发行规模，或者专项计划未满足计划说明书约定的其他设立条件，专项计划设立失败。管理人应当自发行期结束之日起10个工作日内，向投资者退还认购资金，并加算银行同期活期存款利息。","type":"single"},{"id":"cy_fin_1275","q":"证券公司从事私募资产管理业务，应当依法经（）批准。","c":{"A":"中国证券业协会","B":"中国证监会","C":"证券交易所","D":"中国人民银行"},"a":"B","an":"选项B正确：证券公司从事私募资产管理业务，应当依法【经中国证监会批准】。 选项A错误：中国证券业协会是自律性组织，主要履行行业自律管理职能，如制定行业规范、开展自律检查与纪律处分等，但无行政许可审批权。 选项C错误：证券交易所是为证券集中交易提供场所和设施，组织和监督证券交易，实行自律管理的法人。其职责聚焦于证券交易活动管理。 选项D错误：中国人民银行是中央银行，主要职责是制定和执行货币政策、维护金融稳定、管理人民币流通及外汇等宏观金融事务。","type":"single"},{"id":"cy_fin_1277","q":"某证券公司资管子公司发现其管理的“聚利3号”专项资管计划投资的私募债发生实质性违约，可能导致产品无法兑付。为维护声誉，资管子公司决定用其自有资金先行向投资者垫付本金和预期收益。该做法（   ）。","c":{"A":"是管理人勇于承担责任的表现","B":"违反了真实公允确定净值原则","C":"构成了对产品的保本保收益承诺","D":"属于金融机构自行筹集资金偿付，涉嫌刚性兑付"},"a":"D","an":"选项D正确：经金融管理部门认定，存在以下行为的视为刚性兑付： 1.金融机构为资产管理产品投资的非标准化债权类资产或者股权类资产提供任何直接或间接、显性或隐性的担保、回购等代为承担风险的承诺。 2.资产管理产品的发行人或者管理人违反真实公允确定净值原则，对产品进行保本保收益；采取滚动发行等方式，使得资产管理产品的本金、收益、风险在不同投资者之间发生转移，实现产品保本保收益；资产管理产品不能如期兑付或者兑付困难时，发行或者管理该产品的金融机构自行筹集资金偿付或者委托其他机构代为偿付；金融管理部门认定的其他情形。 选项A错误：管理人的责任是勤勉尽责地进行投资管理，而非承担投资损失。 选项B错误：此行为是兑付环节的问题，与估值环节的“真实公允确定净值原则”无直接关系。 选项C错误：违规性体现在“自行筹集资金偿付”上。","type":"single"},{"id":"cy_fin_1279","q":"某证券公司为推广其新设立的集合资产管理计划，拟采取的宣传方式中，符合监管规定的是（   ）。","c":{"A":"在公司官方网站的“热销产品”栏目发布该计划的详细要素和预期业绩比较基准","B":"邀请知名财经评论员，通过线上直播平台举办一场面向公众的该计划投资策略报告会","C":"通过公司内部客户管理系统，向风险测评结果为C4及以上等级的高净值客户推送计划简介及预约链接","D":"在本地都市报的财经版块刊登该计划的募集公告和产品亮点"},"a":"C","an":"选项C正确：资产管理计划应当以非公开方式向合格投资者募集。 选项ABD错误：证券公司、销售机构不得公开或变相公开募集资产管理计划，不得通过报刊、电台、电视、互联网等传播媒体或者讲座、报告会、传单、布告、自媒体等方式向不特定对象宣传具体资产管理计划。","type":"single"},{"id":"cy_fin_1281","q":"资产支持证券仅限于在合格投资者范围内转让。转让后，持有资产支持证券的合格投资者合计不得超过（）人。","c":{"A":"100","B":"200","C":"300","D":"400"},"a":"B","an":"选项B正确：资产支持证券仅限于在合格投资者范围内转让。转让后，持有资产支持证券的合格投资者合计【不得超过200人】。","type":"single"},{"id":"cy_fin_1283","q":"证券公司自有资金参与集合资产管理计划的持有期限不得少于（）个月。","c":{"A":"6","B":"5","C":"4","D":"3"},"a":"A","an":"选项A正确：证券公司自有资金参与集合资产管理计划的持有期限不得少于6个月。  【知识拓展】证券资产管理业务对于“证券公司自有资金参与”的一般规定 证券公司自有资金参与集合资产管理计划的持有期限不得少于6个月。参与、退出时，应当提前5个工作日告知全体投资者和托管人，并取得其同意。 证券公司及其子公司以自有资金参与其自身或其子公司管理的单个集合资产管理计划的份额合计不得超过该计划总份额的50%。中国证监会对证券公司自有资金投资比例另有规定的，从其规定。","type":"single"},{"id":"cy_fin_1285","q":"下列哪项不是资产证券化业务中原始权益人的职责？（）","c":{"A":"依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产","B":"配合并支持管理人、托管人履行职责","C":"配合并支持其他为资产证券化业务提供服务的机构履行职责","D":"办理资产支持证券发行事宜"},"a":"D","an":"题目问的是”哪项不是“。 选项D错误：“办理资产支持证券发行事宜”是资产证券化业务中【管理人】的职责，因此答案选择D。 选项ABC正确：原始权益人不得侵占、损害专项计划资产，并应当履行下列职责：依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产；配合并支持管理人、托管人以及其他为资产证券化业务提供服务的机构履行职责；专项计划法律文件约定的其他职责。  【知识拓展】原始权益人、管理人及托管人的职责 1.原始权益人 依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产；配合并支持管理人、托管人以及其他为资产证券化业务提供服务的机构履行职责；专项计划法律文件约定的其他职责。 2.管理人 对相关交易主体和基础资产进行全面的尽职调查，可聘请会计师事务所、资产评估机构等相关中介机构出具专业意见；在专项计划存续期间，督促原始权益人以及为专项计划提供服务的有关机构，履行法律规定及合同约定的义务；办理资产支持证券发行事宜；按照约定及时将募集资金支付给原始权益人；为资产支持证券投资者的利益管理专项计划资产；建立相对封闭、独立的基础资产现金流归集机制，切实防范专项计划资产与其他资产混同以及被侵占、挪用等风险；监督、检查特定原始权益人持续经营情况和基础资产现金流状况，出现重大异常情况的，管理人应当采取必要措施，维护专项计划资产安全；按照约定向资产支持证券投资者分配收益；履行信息披露义务；负责专项计划的终止清算；法律、行政法规和中国证监会规定以及计划说明书约定的其他职责。 3.托管人 安全保管专项计划相关资产；监督管理人专项计划的运作，发现管理人的管理指令违反计划说明书或者托管协议约定的，应当要求改正；未能改正的，应当拒绝执行并及时向中国基金业协会报告，同时抄送对管理人有辖区监管权的中国证监会派出机构；出具资产托管报告；计划说明书以及相关法律文件约定的其他事项。","type":"single"},{"id":"cy_fin_1287","q":"下列选项中，属于资产证券化业务中托管人职责的是（）。","c":{"A":"按照约定及时将募集资金支付给原始权益人","B":"依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产","C":"按照约定向资产支持证券投资者分配收益","D":"安全保管专项计划相关资产"},"a":"D","an":"选项D正确：托管人办理专项计划的托管业务，应当履行下列职责：安全保管专项计划相关资产；监督管理人专项计划的运作，发现管理人的管理指令违反计划说明书或者托管协议约定的，应当要求改正；未能改正的，应当拒绝执行并及时向中国基金业协会报告，同时抄送对管理人有辖区监管权的中国证监会派出机构；出具资产托管报告；计划说明书以及相关法律文件约定的其他事项。 选项AC错误：“按照约定及时将募集资金支付给原始权益人”和“按照约定向资产支持证券投资者分配收益”是管理人的职责。 选项B错误：“依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产”是原始权益人的职责。  【知识拓展】原始权益人、管理人及托管人的职责 1.原始权益人 依照法律、行政法规、公司章程和相关协议的规定或者约定移交基础资产；配合并支持管理人、托管人以及其他为资产证券化业务提供服务的机构履行职责；专项计划法律文件约定的其他职责。 2.管理人 对相关交易主体和基础资产进行全面的尽职调查，可聘请会计师事务所、资产评估机构等相关中介机构出具专业意见；在专项计划存续期间，督促原始权益人以及为专项计划提供服务的有关机构，履行法律规定及合同约定的义务；办理资产支持证券发行事宜；按照约定及时将募集资金支付给原始权益人；为资产支持证券投资者的利益管理专项计划资产；建立相对封闭、独立的基础资产现金流归集机制，切实防范专项计划资产与其他资产混同以及被侵占、挪用等风险；监督、检查特定原始权益人持续经营情况和基础资产现金流状况，出现重大异常情况的，管理人应当采取必要措施，维护专项计划资产安全；按照约定向资产支持证券投资者分配收益；履行信息披露义务；负责专项计划的终止清算；法律、行政法规和中国证监会规定以及计划说明书约定的其他职责。 3.托管人 安全保管专项计划相关资产；监督管理人专项计划的运作，发现管理人的管理指令违反计划说明书或者托管协议约定的，应当要求改正；未能改正的，应当拒绝执行并及时向中国基金业协会报告，同时抄送对管理人有辖区监管权的中国证监会派出机构；出具资产托管报告；计划说明书以及相关法律文件约定的其他事项。","type":"single"},{"id":"cy_fin_1289","q":"资产支持证券应当面向合格投资者发行，单笔认购不少于人民币（）万元发行面值或等值份额。","c":{"A":"100","B":"200","C":"300","D":"400"},"a":"A","an":"选项A正确：资产支持证券应当面向合格投资者发行，单笔认购【不少于人民币100万元】发行面值或等值份额。","type":"single"},{"id":"cy_fin_1291","q":"资产支持证券的管理人、托管人应当在每年（）之前向资产支持证券合格投资者披露上年度资产管理报告、年度托管报告。","c":{"A":"46023","B":"46112","C":"46142","D":"46143"},"a":"C","an":"选项C正确：资产支持证券的管理人、托管人应当在每年【4月30日】之前向资产支持证券合格投资者披露上年度资产管理报告、年度托管报告。","type":"single"},{"id":"cy_fin_1293","q":"合格境外投资者的境内证券投资，应当遵循持股比例限制：单个合格境外投资者或其他境外投资者持有单个上市公司或者挂牌公司的股份不得超过该公司股份总数的（）。","c":{"A":"0.05","B":"0.1","C":"0.2","D":"0.3"},"a":"B","an":"选项B正确：【单个】合格境外投资者或其他境外投资者持有单个上市公司或者挂牌公司的股份不得超过该公司股份总数的【10％】。  【知识拓展】合格境外投资者及其他境外投资者的境内证券投资，应当遵循下列持股比例限制： 1.单个合格境外投资者或其他境外投资者持有单个上市公司或者挂牌公司的股份不得超过该公司股份总数的10%； 2.全部合格境外投资者及其他境外投资者持有单个公司A股或者境内挂牌股份的总和，不得超过该公司股份总数的30%； 3.合格境外投资者及其他境外投资者依法对上市公司战略投资的，其战略投资的持股不受前款规定的比例限制。","type":"single"},{"id":"cy_fin_1295","q":"合格境外投资者的境内证券投资，应当遵循持股比例限制：全部合格境外投资者及其他境外投资者持有单个公司A股或者境内挂牌股份的总和，不得超过该公司股份总数的（）。","c":{"A":"0.05","B":"0.1","C":"0.2","D":"0.3"},"a":"D","an":"选项D正确：【全部】合格境外投资者及其他境外投资者持有单个公司A股或者境内挂牌股份的总和，不得超过该公司股份总数的【30%】。  【知识拓展】合格境外投资者及其他境外投资者的境内证券投资，应当遵循下列持股比例限制： 1.单个合格境外投资者或其他境外投资者持有单个上市公司或者挂牌公司的股份不得超过该公司股份总数的10%； 2.全部合格境外投资者及其他境外投资者持有单个公司A股或者境内挂牌股份的总和，不得超过该公司股份总数的30%； 3.合格境外投资者及其他境外投资者依法对上市公司战略投资的，其战略投资的持股不受前款规定的比例限制。","type":"single"},{"id":"cy_fin_1297","q":"关于合格境内机构投资者、投资顾问与境外证券服务机构之间的证券交易和研究服务安排，下列说法错误的是（）。","c":{"A":"合格境内机构投资者、投资顾问应当力求交易成本最小化","B":"合格境内机构投资者、投资顾问应寻求最佳交易执行","C":"交易佣金不是集合计划持有人的财产","D":"合格境内机构投资者、投资顾问应当使用持有人的交易佣金使持有人受益"},"a":"C","an":"题目问的是“说法错误的”。 选项C错误：交易佣金属于集合计划持有人的财产。因此答案选择C。 选项ABD正确：《合格境内机构投资者境外证券投资管理试行办法》规定，合格境内机构投资者、投资顾问与境外证券服务机构之间的证券交易和研究服务安排，应当按照以下原则进行： （1）交易佣金属于集合计划持有人的财产。 （2）合格境内机构投资者、投资顾问有责任代表持有人确保交易质量，包括但不限于：①寻求最佳交易执行。②力求交易成本最小化。③使用持有人的交易佣金使持有人受益。","type":"single"},{"id":"cy_fin_1299","q":"证券公司从事私募资产管理业务，应当遵循（）原则，恪尽职守，谨慎勤勉，维护投资者合法权益，服务实体经济，不得损害国家利益、社会共同利益和他人合法权益。","c":{"A":"自愿","B":"客户利益至上","C":"公平","D":"诚实信用"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司从事私募资产管理业务，应当遵循【自愿、公平、诚实信用和客户利益至上】原则，恪尽职守，谨慎勤勉，维护投资者合法权益，服务实体经济，不得损害国家利益、社会共同利益和他人合法权益。","type":"multi"},{"id":"cy_fin_1301","q":"下列选项中，（）是资产支持证券投资者享有的权利。","c":{"A":"分享专项计划收益","B":"按照认购协议及计划说明书的约定参与分配清算后的专项计划剩余资产","C":"要求专项计划回购资产支持证券","D":"依法以交易、转让或质押等方式处置资产支持证券"},"a":"A,B,D","an":"选项C错误：资产支持证券投资者不得主张分割专项计划资产，不得要求专项计划回购资产支持证券。 选项ABD正确：资产支持证券投资者享有下列权利： （1）分享专项计划收益； （2）按照认购协议及计划说明书的约定参与分配清算后的专项计划剩余资产； （3）按规定或约定的时间和方式获得资产管理报告等专项计划信息披露文件，查阅或者复制专项计划相关信息资料； （4）依法以交易、转让或质押等方式处置资产支持证券； （5）根据证券交易场所相关规则，通过回购进行融资； （6）认购协议或者计划说明书约定的其他权利。","type":"multi"},{"id":"cy_fin_1303","q":"在资产证券化业务中，管理人不得有的行为包括（）。","c":{"A":"募集资金不入账或者进行其他任何形式的账外经营","B":"超过计划说明书约定的规模募集资金","C":"侵占、挪用专项计划资产","D":"负责专项计划的终止清算"},"a":"A,B,C","an":"选项ABC正确：管理人不得有下列行为：募集资金不入账或者进行其他任何形式的账外经营；超过计划说明书约定的规模募集资金；侵占、挪用专项计划资产；以专项计划资产设定担保或者形成其他或有负债；违反计划说明书的约定管理、运用专项计划资产；法律、行政法规和中国证监会禁止的其他行为。 选项D错误：“负责专项计划的终止清算”属于管理人的职责之一，不属于禁止行为。  【知识拓展】管理人的职责 vs 禁止行为 1.管理人应当履行下列职责：对相关交易主体和基础资产进行全面的尽职调查，可聘请会计师事务所、资产评估机构等相关中介机构出具专业意见；在专项计划存续期间，督促原始权益人以及为专项计划提供服务的有关机构，履行法律规定及合同约定的义务；办理资产支持证券发行事宜；按照约定及时将募集资金支付给原始权益人；为资产支持证券投资者的利益管理专项计划资产；建立相对封闭、独立的基础资产现金流归集机制，切实防范专项计划资产与其他资产混同以及被侵占、挪用等风险；监督、检查特定原始权益人持续经营情况和基础资产现金流状况，出现重大异常情况的，管理人应当采取必要措施，维护专项计划资产安全；按照约定向资产支持证券投资者分配收益；履行信息披露义务；负责专项计划的终止清算；法律、行政法规和中国证监会规定以及计划说明书约定的其他职责。 2.管理人不得有下列行为：募集资金不入账或者进行其他任何形式的账外经营；超过计划说明书约定的规模募集资金；侵占、挪用专项计划资产；以专项计划资产设定担保或者形成其他或有负债；违反计划说明书的约定管理、运用专项计划资产；法律、行政法规和中国证监会禁止的其他行为。","type":"multi"},{"id":"cy_fin_1305","q":"资产支持证券是投资者享有专项计划权益的证明，可以依法（）。","c":{"A":"继承","B":"交易","C":"转让","D":"出租"},"a":"A,B,C","an":"选项D错误：应为“出质”而非出租。资产支持证券代表的是对专项计划的财产性权益（如收益分配权、清算后剩余资产索取权），而非可分离的使用权。不存在 “出租” 概念（出租针对的是物或使用权，而非抽象财产权）。 选项ABC正确：资产支持证券是投资者享有专项计划权益的证明，可以依法【继承、交易、转让或出质】。","type":"multi"},{"id":"cy_fin_1307","q":"（）依法可以要求合格境外投资者、托管人、证券公司等机构提供合格境外投资者的有关资料，并进行必要的询问、检查。","c":{"A":"中国证监会","B":"国家外汇管理局","C":"中国证券交易所","D":"中国证券业协会"},"a":"A,B","an":"选项AB正确：中国证监会、国家外汇管理局依法可以要求合格境外投资者、托管人、证券公司等机构提供合格境外投资者的有关资料，并进行必要的询问、检查。 选项C错误：证券交易所（如上交所、深交所）主要负责提供市场交易平台，组织交易活动。 选项D错误：证券业协会是行业自律组织，职责包括制定行业标准、调解纠纷等，但无行政执法权。","type":"multi"},{"id":"cy_fin_1309","q":"证券期货经营机构可以为单一投资者设立单一资产管理计划，也可以为多个投资者设立集合资产管理计划。集合资产管理计划的投资者人数不少于50人，不超过100人。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券期货经营机构可以为单一投资者设立单一资产管理计划，也可以为多个投资者设立集合资产管理计划。集合资产管理计划的投资者人数【不少于2人，不超过200人】。","type":"judge"},{"id":"cy_fin_1311","q":"资产管理计划成立不足3个月或者存续期间不足3个月的，证券公司可以不编制资产管理计划当期的季度报告和年度报告。（）","c":{"1":"对","0":"错"},"a":"1","an":"资产管理计划成立不足3个月或者存续期间不足3个月的，证券公司可以不编制资产管理计划当期的季度报告和年度报告。","type":"judge"},{"id":"cy_fin_1313","q":"证券公司应当向中国证券业协会报送柜台市场业务（）报告以及（）报告。","c":{"A":"季度；重大事项","B":"季度；年度","C":"年度；重大事项","D":"年度；其他"},"a":"C","an":"选项C正确：证券公司应当向【中国证券业协会】报送柜台市场业务年度报告以及重大事项报告。  【知识详解】定期报告及重大事项报告 (1)定期报告 证券公司应于每月结束后5个工作日内按要求向中国证券业协会报送柜台交易月度报表；每年结束后在规定时间报送柜台市场业务年度报告，内容包括但不限于：柜台市场业务总体情况、交易、登记结算、投资者适当性管理、风险及合规管理等。 (2)重大事项报告 柜台市场发生对业务开展、客户权益、证券公司风险等产生重大影响的事项，或者可能影响柜台交易顺利进行、投资者利益或可能诱发证券公司风险的重大事件时，证券公司应当在该事项发生后1个交易日内向中国证券业协会报告，并于3个交易日 内提交重大事项报告，内容包括：事项基本情况、产生原因、影响、应对措施等。","type":"single"},{"id":"cy_fin_1315","q":"开展柜台市场业务的证券公司可以为在其柜台市场发行、销售与转让的私募产品提供登记、托管与结算服务。下列有关说法中有误的是（）。","c":{"A":"投资者在柜台市场交易私募产品，证券公司应当为其开立产品账户","B":"证券公司应当在产品登记机构开立柜台市场自有产品账户，不需要其他自有产品账户相互隔离","C":"证券公司应当在商业银行开立柜台市场客户资金专用存款账户，用于存放柜台市场客户的非第三方存管资金、第三方存管客户与非第三方存管客户的待交收资金，并与其他账户相互隔离","D":"证券公司应当将在商业银行开立柜台市场客户资金专用存款账户，向中国证监会证券市场交易结算资金监控系统报备"},"a":"B","an":"题目问的是”说法有误的“。 选项B错误：证券公司应当在产品登记机构开立柜台市场自有产品专用账户，并与其他自有产品账户相互隔离（并非不需要隔离）。因此答案选择B。 选项A正确：投资者在柜台市场交易私募产品，证券公司应当为其开立产品账户。 选项CD正确：证券公司应当在商业银行开立柜台市场客户资金专用存款账户，用于存放柜台市场客户的非第三方存管资金、第三方存管客户与非第三方存管客户的待交收资金，并与其他账户相互隔离。证券公司应当将该账户向中国证监会证券市场交易结算资金监控系统报备。","type":"single"},{"id":"cy_fin_1317","q":"根据管理细则等规定，证券公司在全国股份转让系统开展相关业务前，应当向（）申请备案，成为主办券商。","c":{"A":"中国证监会","B":"中国证券业协会","C":"全国股份转让系统有限责任公司","D":"国务院"},"a":"C","an":"选项C正确：根据《管理细则》等规定，证券公司在全国股份转让系统开展相关业务前，应当向【全国股份转让系统公司】申请备案，成为主办券商。 选项A错误：中国证监会负责监管全国证券市场，对证券公司的业务资格（如证券承销、经纪、自营等）进行审批，但新三板主办券商的备案属于市场自律管理范畴，由全国股转公司负责。 选项B错误：中国证券业协会是行业自律组织，主要负责会员自律管理。 选项D错误：国务院是国家最高行政机关，不直接参与证券公司的具体业务备案工作。","type":"single"},{"id":"cy_fin_1319","q":"证券公司进行柜台交易，应当报（）备案，其柜台交易管理制度和实施方案应当通过（）组织的专业评价。","c":{"A":"中国证券业协会；中国证券业协会","B":"中国证监会；中国证监会","C":"全国股份转让系统；中国证券业协会","D":"中国证券登记结算有限责任公司；中国证监会"},"a":"A","an":"选项A正确：证券公司进行柜台交易，应当报中国证券业协会备案，其柜台交易管理制度和实施方案应当通过中国证券业协会组织的专业评价。 选项B错误：中国证监会是证券市场的行政监管机构，主要负责制定规则、行政许可和监督检查，而柜台交易业务属于证券公司自律管理范畴，备案和专业评价由协会具体实施。 选项C错误：全国股份转让系统是经国务院批准的全国性证券交易场所，主要服务于非上市公众公司股份转让。 选项D错误：中国结算主要负责证券登记、存管和结算服务。","type":"single"},{"id":"cy_fin_1321","q":"证券公司在全国股转系统开展相关业务前，应当向全国股转公司申请（），成为主办券商。","c":{"A":"批准","B":"核准","C":"备案","D":"复核"},"a":"C","an":"选项C正确：证券公司在全国股转系统开展相关业务前，应当向全国股转公司申请备案，成为主办券商。未经备案的证券公司不得在全国股转系统开展相关业务。 选项ABD为干扰项，主办券商的管理实行自律备案制，由全国股转公司负责具体备案工作，无需证监会行政 “核准” 或 “批准”。","type":"single"},{"id":"cy_fin_1323","q":"《证券投资基金法》规定，非公开募集基金应当向合格投资者募集，合格投资者累计不得超过（）人。","c":{"A":"50","B":"100","C":"150","D":"200"},"a":"D","an":"选项D正确：证券公司应当采取有效措施确保在柜台市场交易的私募产品持有人数量符合相关规定，并要求私募产品发行人承诺私募产品的持有人数量符合相关规定。《证券投资基金法》规定，非公开募集基金应当向合格投资者募集，合格投资者累计【不得超过200人】。","type":"single"},{"id":"cy_fin_1325","q":"证券公司进行柜台交易，应当与特定交易对手方或投资者签订柜台交易合同，约定双方的权利义务。其不能采用（）的方式签订交易合同。","c":{"A":"书面","B":"口头","C":"邮件","D":"电子"},"a":"B","an":"选项B正确：证券公司进行柜台交易，应当与特定交易对手方或投资者以【书面或电子方式】签订柜台交易合同，约定双方的权利义务。 （理解：这是为了确保法律上的合规性，选项B（口头）无法满足书面记录的要求，也无法保证合同的可追溯性和法律效力。）","type":"single"},{"id":"cy_fin_1327","q":"柜台市场发生对业务开展、客户权益、证券公司风险等产生重大影响的事项，或者可能影响柜台交易顺利进行、投资者利益或可能诱发证券公司风险的重大事件时，证券公司应当在该事项发生后（）个交易日内向中国证券业协会报告，并于（）个交易日内提交重大事项报告。","c":{"A":"1；3","B":"1；5","C":"3；5","D":"3；10"},"a":"A","an":"选项A正确：柜台市场发生对业务开展、客户权益、证券公司风险等产生重大影响的事项，或者可能影响柜台交易顺利进行、投资者利益或可能诱发证券公司风险的重大事件时，证券公司应当在该事项发生后1个交易日内向中国证券业协会报告，并于3个交易日内提交重大事项报告。","type":"single"},{"id":"cy_fin_1329","q":"证券公司应当制定明确的柜台市场信息披露规则，信息披露义务人应当对所披露信息的真实性、准确性、完整性负责。下列属于不得向公众披露的私募业务信息的有（）。","c":{"A":"涉及证券公司客户隐私的信息","B":"涉及第三方商业秘密的信息","C":"合同约定不得向公众公开的信息","D":"法律法规和自律规则禁止向公众公开的信息"},"a":"A,B,C,D","an":"选项ABCD正确：不得向公众披露的私募业务信息： （1）涉及证券公司客户隐私的信息； （2）涉及第三方商业秘密的信息； （3）合同约定不得向公众公开的信息； （4）法律法规和自律规则禁止向公众公开的信息。","type":"multi"},{"id":"cy_fin_1331","q":"关于证券公司柜台市场业务的投资者适当性管理，下列说法正确的有（）。","c":{"A":"证券公司按照法律、行政法规、中国证监会规定、行业自律规则等建立投资者适当性管理制度","B":"证券公司在进行柜台交易前，了解投资者的身份、财产与收入状况、信用状况、金融知识、投资经验、风险承受能力等情况","C":"证券公司采取措施确保在柜台市场交易的私募产品持有人数量符合相关规定，并要求私募产品发行人承诺私募产品的持有人数量符合相关规定","D":"证券公司进行金融衍生产品柜台交易，向非金融机构投资者客观、全面地介绍该项交易的性质、风险收益特征及相关基础金融资产的状况"},"a":"A,B,C,D","an":"选项A正确：证券公司在柜台市场开展业务，应当按照法律、行政法规、中国证监会规定、行业自律规则等建立投资者适当性管理制度，做好投资者准入、投资者教育等工作，不得诱导投资者参与与其风险承受能力不相适应的交易。 选项B正确：证券公司在进行柜台交易前，应当采取有效措施了解投资者的身份、财产与收入状况、信用状况、金融知识、投资经验、风险承受能力等情况。 选项C正确：证券公司应当采取有效措施确保在柜台市场交易的私募产品持有人数量符合相关规定，并要求私募产品发行人承诺私募产品的持有人数量符合相关规定。 选项D正确：证券公司进行金融衍生产品柜台交易，应当向非金融机构投资者客观、全面地介绍该项交易的性质、风险收益特征及相关基础金融资产的状况，充分披露其与基础金融资产发行人等相关当事人之间是否存在关联关系等可能影响投资者决策的信息。","type":"multi"},{"id":"cy_fin_1333","q":"关于证券公司柜台交易产品账户，下列说法正确的有（）。","c":{"A":"证券公司代理投资者在柜台市场交易由其他合法登记机构登记的私募产品时，可以采取名义持有模式，以证券公司名义在该产品登记机构开立产品账户，享有产品持有人权利","B":"证券公司应当为投资者开立柜台交易产品账户，分别记录投资者拥有的权益数据","C":"证券公司应当在商业银行开立柜台市场客户资金专用存款账户，并向中国证券业协会报备","D":"证券公司应当将柜台市场自有产品专用账户和参与柜台市场交易的自有资金专用存款账户向中国证监会证券市场交易结算资金监控系统报备"},"a":"A,B","an":"选项A正确：证券公司代理投资者在柜台市场交易由其他合法登记机构登记的私募产品时，可以采取名义持有模式，以证券公司名义在该产品登记机构开立产品账户，享有产品持有人权利。 选项B正确：证券公司应当为每个投资者开立产品账户，分别记录每个投资者拥有的权益数据，并向该产品登记机构报送投资者权益明细数据等资料。 选项C错误：证券公司应当在商业银行开立柜台市场客户资金专用存款账户，并向中国证监会证券市场交易结算资金监控系统（并非中国证券业协会）报备。 （理解：证券公司在商业银行开立的客户资金专用存款账户，属于客户交易结算资金账户，其监管主体是中国证监会的证券市场交易结算资金监控系统） 选项D错误：证券公司应当将柜台市场自有产品专用账户和参与柜台市场交易的自有资金专用存款账户向中国证券业协会（并非向中国证监会证券市场交易结算资金监控系统）报备。 （理解：中国证券业协会作为自律组织，负责对证券公司柜台市场自有业务账户进行备案管理。柜台市场中的自有产品专用账户和自有资金专用存款账户，属于证券公司自身业务账户，需向中国证券业协会报备）","type":"multi"},{"id":"cy_fin_1335","q":"下列关于证券公司在柜台市场开展业务的做法，符合投资者适当性管理相关规定的有（  ）。","c":{"A":"证券公司按照法律、行政法规、中国证监会规定、行业自律规则等建立投资者适当性管理制度","B":"证券公司在进行柜台交易前，应当采取有效措施了解投资者的身份、财产与收入状况、信用状况、金融知识、投资经验、风险承受能力情况","C":"证券公司采取措施确保在柜台市场交易的私募产品持有人数量符合相关规定，并要求私募产品发行人承诺私募产品的持有人数量符合相关规定","D":"证券公司应当充分披露其与基础金融资产发行人等相关当事人之间是否存在关联关系等可能影响投资者决策的信息"},"a":"A,B,C,D","an":"证券公司在柜台市场开展业务，应当按照法律、行政法规、中国证监会规定、行业自律规则等建立投资者适当性管理制度（A正确），做好投资者准入、投资者教育等工作，不得诱导投资者参与与其风险承受能力不相适应的交易。 1.了解客户 参与柜台交易的投资者应当是合格投资者。证券公司在进行柜台交易前，应当采取有效措施了解投资者的身份、财产与收入状况、信用状况、金融知识、投资经验、风险承受能力等情况。（B正确） 2.风险揭示 证券公司进行基础金融产品柜台交易，应当遵守销售、交易基础金融产品的有关规定。 证券公司进行金融衍生产品柜台交易，应当向非金融机构投资者客观、全面地介绍该项交易的性质、风险收益特征及相关基础金融资产的状况，充分披露其与基础金融资产发行人等相关当事人之间是否存在关联关系等可能影响投资者决策的信息。（D正确） 3.私募产品持有人数量管理 证券公司应当采取有效措施确保在柜台市场交易的私募产品持有人数量符合相关规定，并要求私募产品发行人承诺私募产品的持有人数量符合相关规定（C正确）。根据《证券投资基金法》规定，非公开募集基金应当向合格投资者募集，合格投资者累计不得超过200人。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_1337","q":"证券公司应于每月结束后10个工作日内按要求向中国证券业协会报送柜台交易月度报表；每年结束后规定时间报送柜台市场业务年度报告，内容包括但不限于：柜台市场业务总体情况、交易、登记结算、投资者适当性管理、风险及合规管理等。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应于每月结束后【5个工作日】内按要求向中国证券业协会报送柜台交易月度报表；每年结束后规定时间报送柜台市场业务年度报告，内容包括但不限于：柜台市场业务总体情况、交易、登记结算、投资者适当性管理、风险及合规管理等。","type":"judge"},{"id":"cy_fin_1339","q":"证券公司在柜台市场开展业务，应当遵守有关法律法规，遵循诚实信用、公平自愿的原则，不得欺诈、误导投资者，不得侵害投资者合法权益，不得挪用客户资产，不得利用非公开信息谋取不正当利益。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司在柜台市场开展业务，应当遵守有关法律法规，遵循诚实信用、公平自愿的原则，不得欺诈、误导投资者，不得侵害投资者合法权益，不得挪用客户资产，不得利用非公开信息谋取不正当利益。","type":"judge"},{"id":"cy_fin_1341","q":"根据《证券期货经营机构私募资产管理业务运作管理暂行规定》，私募类产品单一资产管理计划的投资者人数不能超过（）人。","c":{"A":"20","B":"50","C":"200","D":"500"},"a":"C","an":"选项C正确：根据《证券期货经营机构私募资产管理业务运作管理暂行规定》，证券经营机构在销售中不得存在如下行为： （1）资产管理合同及销售材料中存在包含保本保收益内涵的表述，如零风险、收益有保障、本金无忧等。 （2）资产管理计划名称中含有“保本”字样。 （3）与投资者私下签订回购协议或承诺函等文件，直接或间接承诺保本保收益。 （4）向投资者口头或者通过短信、微信等各种方式承诺保本保收益。 （5）向非合格投资者销售资产管理计划，明知投资者实质不符合合格投资者标准，仍予以销售确认，或者通过拆分转让资产管理计划份额或其收益权、为投资者直接或间接提供短期借贷等方式，变相突破合格投资者标准。 （6）单一资产管理计划的投资者人数超过【200人】，或者同一资产管理人为单一融资项目设立多个资产管理计划，变相突破投资者人数限制。 （7）通过报刊、电台、电视、互联网等公众传播媒体，讲座、报告会、分析会等方式，布告、传单、短信、微信、博客和电子邮件等载体，向不特定对象宣传具体产品，但证券期货经营机构和销售机构通过设置特定对象确定程序的官网、客户端等互联网媒介向已注册特定对象进行宣传推介的除外。 （8）向投资者宣传资产管理计划预期收益率。 （9）夸大或者片面宣传产品，夸大或者片面宣传资产管理计划管理人及其管理的产品、投资经理等的过往业绩，未充分揭示产品风险，投资者认购资产管理计划时未签订风险揭示书和资产管理合同。","type":"single"},{"id":"cy_fin_1343","q":"（）负责统一为证券公司、期货公司等股票期权经营机构分配、发放投资者衍生品合约账户号码。","c":{"A":"中国证券业协会","B":"中国证券投资基金业协会","C":"证券登记结算机构","D":"证券交易所"},"a":"C","an":"选项C正确：【证券登记结算机构】负责统一为证券公司、期货公司等股票期权经营机构分配、发放投资者衍生品合约账户号码。 选项A错误：中国证券业协会主要负责制定行业自律规则、开展行业诚信建设和合规评估，对会员单位的业务活动进行自律管理，与账户管理无关。 选项B错误：基金业协会是基金行业的自律组织，对私募基金和公募基金的登记备案、信息披露、从业人员管理等进行自律监管，不涉及衍生品账户管理。 选项D错误：证券交易所（如上海证券交易所、深圳证券交易所）是为证券集中交易提供场所和设施的法人，负责市场组织和交易运行。不直接管理账户（我国实行 “交易所与登记结算机构分离” 的模式）。","type":"single"},{"id":"cy_fin_1345","q":"关于证券公司开展股票期权业务，为降低投资者期权交易成本，沪深交易所目前提供（）种常用组合策略。","c":{"A":"3","B":"4","C":"5","D":"6"},"a":"D","an":"选项D正确：为降低投资者期权交易成本，沪深交易所目前提供6种常用组合策略：认购牛市价差策略、认沽牛市价差策略、认购熊市价差策略、认沽熊市价差策略、跨式空头与宽跨式空头策略。","type":"single"},{"id":"cy_fin_1347","q":"关于证券公司代销金融产品，下列做法正确的是（）。","c":{"A":"采取正常宣传方式引导客户购买金融产品","B":"采取抽奖、回扣、赠送实物等方式诱导客户购买金融产品","C":"与客户分享投资收益、分担投资损失","D":"使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金"},"a":"A","an":"选项A正确：采取正常宣传方式引导客户购买金融产品是正确的做法，并且应该全面、公正、准确地介绍金融产品的相关信息。 选项BCD错误：证券公司代销金融产品不得有下列行为： （1）采取夸大宣传、虚假宣传等方式误导客户购买金融产品。 （2）采取抽奖、回扣、赠送实物等方式诱导客户购买金融产品（选项B错误）。 （3）与客户分享投资收益、分担投资损失（选项C错误）。 （4）使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金（选项D错误）。 （5）证券公司从事代销金融产品活动的人员不得接受委托人给予的财务或其他利益。 （6）其他可能损害客户合法权益的行为。","type":"single"},{"id":"cy_fin_1349","q":"证券公司另类子公司应当于每月结束后（）个工作日内按照中国证券业协会的要求报送另类投资业务月度报表。","c":{"A":"5","B":"8","C":"10","D":"20"},"a":"C","an":"选项C正确：证券公司另类子公司应当于每月结束后【10个工作日】内按照中国证券业协会的要求报送另类投资业务月度报表；在每年结束之日起4个月内，按照中国证券业协会的要求报送另类投资业务年度报告。","type":"single"},{"id":"cy_fin_1351","q":"证券公司从事股票期权经纪业务试点，要求股票期权经纪业务制度健全，拟负责股票期权经纪业务的高级管理人员具备股票期权业务知识和相应的专业能力，配备（）名具备相应专业能力的业务人员。","c":{"A":"1","B":"2","C":"3","D":"4"},"a":"C","an":"选项C正确：证券公司从事股票期权经纪业务试点，应当符合下列基本条件： （1）具有证券经纪业务资格。 （2）股票期权经纪业务制度健全，拟负责股票期权经纪业务的高级管理人员具备股票期权业务知识和相应的专业能力，配备【3名】具备相应专业能力的业务人员。 （3）具有满足从事股票期权经纪业务相关要求的营业场所、经营设备、技术系统等软硬件设施；业务设施和技术系统符合相关技术规范且运行状况良好，股票期权经纪业务技术系统已通过相关证券交易所、中国证券登记结算有限责任公司组织的测试。 （4）公司及其董事、监事、高级管理人员最近1年内未因重大违法违规行为受到行政处罚或刑事处罚。","type":"single"},{"id":"cy_fin_1353","q":"下列不属于证券公司可以在区域性股权市场开展的业务是（）。","c":{"A":"与商业银行、小额贷款公司等开展业务合作，为企业提供融资服务","B":"开展区域性股权市场业务过程的内幕交易","C":"为合格投资者提供企业研究报告和尽职调查信息","D":"推荐企业展示"},"a":"B","an":"题目问的是“不属于”。 选项B错误：“开展区域性股权市场业务过程的内幕交易”是违法行为，不属于证券公司可以开展的业务范畴，因此正确答案是B。 选项ACD正确：证券公司可以在区域性股权市场开展以下业务： （1）推荐企业挂牌； （2）承销可转换为股票的公司债券，推荐本公司承销的可转换为股票的公司债券在区域性股权市场挂牌转让； （3）代理开立区域性股权市场证券账户； （4）为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务； （5）利用自有资金或依法管理的资产管理等产品投资区域性股权市场的证券； （6）为证券的非公开发行组织合格投资者进行路演推介或其他促成投融资需求对接的活动； （7）为合格投资者提供企业研究报告和尽职调查信息（B项）； （8）与商业银行、小额贷款公司等开展业务合作，为企业提供融资服务（A项）； （9）改制辅导、管理培训、管理咨询、财务顾问等相关服务； （10）推荐企业展示（C项）； （11）中国证监会或中国证券业协会规定的其他业务。","type":"single"},{"id":"cy_fin_1355","q":"证券公司代销金融产品，客户购买金融产品的资金（）。","c":{"A":"只能直接向委托人支付","B":"可以由证券公司利用特定账户代收","C":"可以由证券公司随意代收","D":"与委托人现场交易"},"a":"B","an":"选项B正确：通过证券公司支付时，证券公司不得使用除【证券公司客户交易结算资金专用存款账户】外的其他账户，代委托人接收客户购买金融产品的资金。 选项A错误，因为客户不仅可以直接向委托人支付，也可以通过证券公司支付。 选项C错误，证券公司不能随意使用任何账户来代收资金，只能使用特定的客户交易结算资金专用存款账户。 选项D错误，题目并未提到与委托人现场交易的方式，并且这种方式也不常见于描述的资金支付途径中。","type":"single"},{"id":"cy_fin_1357","q":"对于经过限期整改后，仍然不符合为期货公司提供中间介绍业务的证券公司，（）有资格撤销其资格。","c":{"A":"中国证监会","B":"中国证券业协会","C":"中央国债登记结算有限责任公司","D":"中国人民银行"},"a":"A","an":"选项A正确：中国证监会及其派出机构责令其限期整改；经限期整改仍不符合条件的，中国证监会依法撤销其介绍业务资格。 选项B错误：中国证券业协会主要负责行业自律管理，并不具有撤销业务资格的权力。 选项C错误：中央国债登记结算有限责任公司主要负责债券市场的登记、托管和结算工作，与撤销中间介绍业务资格无关。 选项D错误：中国人民银行主要负责货币政策和金融稳定。","type":"single"},{"id":"cy_fin_1359","q":"证券公司应当在营业场所妥善保存有关介绍业务的凭证、单据、账簿、报表、合同、数据信息等资料，证券公司保存上述文件资料的期限不得少于（）年。","c":{"A":"2","B":"3","C":"5","D":"8"},"a":"C","an":"选项C正确：证券公司应当在营业场所妥善保存有关介绍业务的凭证、单据、账簿、报表、合同、数据信息等资料。证券公司保存上述文件资料的期限不得少于【5年】。","type":"single"},{"id":"cy_fin_1361","q":"证券公司为从事另类投资业务设立的另类投资子公司，应当以（）出资设立。","c":{"A":"自有资金","B":"保证金","C":"佣金","D":"流动资金"},"a":"A","an":"选项A正确：证券公司应当以自有资金全资设立另类子公司。证券公司不得采用股份代持等其他方式变相与其他投资者共同出资设立另类子公司。 选项BCD为干扰项，属于强制性要求，另类投资子公司的出资来源应当是证券公司的自有资金，而不是保证金、佣金或流动资金等其他资金来源。","type":"single"},{"id":"cy_fin_1363","q":"关于证券公司开展股票期权业务的主要业务规则，下列说法错误的是（）。","c":{"A":"投资者应当在证券公司、期货公司营业场所现场办理股票期权交易开户手续，并书面签署风险揭示书","B":"不具备证券自营业务资格的证券公司，其自有资金不能参与股票期权交易","C":"证券期货经营机构从事股票期权相关业务的，应当建立健全并有效执行信息隔离制度","D":"保证金以现金、证券交易所及证券登记结算机构认可的证券方式交纳"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：不具备证券自营业务资格的证券公司，其自有资金只能以套期保值为目的，参与股票期权交易（并非完全不能参与）。因此答案选择B。 选项A正确：投资者应当在证券公司、期货公司营业场所现场办理股票期权交易开户手续，并书面签署风险揭示书。 选项C正确：证券期货经营机构从事股票期权相关业务的，应当建立健全并有效执行信息隔离制度，对经纪、自营、做市、资产管理等业务进行有效隔离，防止敏感信息的不当流动和使用，严格防范利益冲突。 选项D正确：保证金以现金、证券交易所及证券登记结算机构认可的证券方式交纳。","type":"single"},{"id":"cy_fin_1365","q":"股票期权卖方（）权利金，并应当根据证券交易所、证券登记结算机构的规定交纳保证金。","c":{"A":"收取","B":"支付","C":"保管","D":"使用"},"a":"A","an":"选项A正确：股票期权卖方【收取】权利金，并应当根据证券交易所、证券登记结算机构的规定交纳保证金。 选项B错误：支付权利金的是买方，而非卖方。 选项CD错误：保管/使用不符合卖方对权利金的行为描述。","type":"single"},{"id":"cy_fin_1367","q":"按照《证券公司代销金融产品管理规定》，证券公司及其从事金融产品代销业务的人员在销售金融产品过程中不得有（）。","c":{"A":"采取夸大宣传、虚假宣传等方式误导客户购买金融产品","B":"采取抽奖、回扣、赠送实物等方式诱导客户购买金融产品","C":"与客户分享投资收益、分担投资损失","D":"使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券公司代销金融产品管理规定》，证券公司及其从事金融产品代销业务的人员在代销金融产品过程中不得有下列行为: （1）采取夸大宣传、虚假宣传等方式误导客户购买金融产品。  （2）采取抽奖、回扣、赠送实物等方式诱导客户购买金融产品。  （3）与客户分享投资收益、分担投资损失。  （4）使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收客户购买金融产品的资金。 （5）证券公司从事代销金融产品活动的人员不得接受委托人给予的财务或其他利益。 （6）其他可能损害客户合法权益的行为。","type":"multi"},{"id":"cy_fin_1369","q":"证券公司应当于下列（）行为发生之日起1个月内将相关情况报送至中国证券业协会。","c":{"A":"入股区域性股权市场运营机构","B":"取得区域性股权市场中介机构资格","C":"持股情况、中介机构资格发生变化","D":"中国证监会和中国证券业协会要求报送的其他信息"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当于下列行为发生之日起1个月内将相关情况报送至中国证券业协会：    (1) 入股区域性股权市场运营机构；    (2) 取得区域性股权市场中介机构资格；    (3) 持股情况、中介机构资格发生变化；    (4) 中国证监会和中国证券业协会要求报送的其他信息。","type":"multi"},{"id":"cy_fin_1371","q":"按照《证券期货经营机构私募资产管理业务运作管理暂行规定》，证券经营机构在销售中不得存在的情况是（）。","c":{"A":"与投资者签订回购协议","B":"为投资者提供短期借贷","C":"在销售材料中表明零风险","D":"资产管理合同中声明“投资有风险，入市需谨慎”"},"a":"A,B,C","an":"选项D错误：在合同中声明“投资有风险，入市需谨慎”属于应做的投资风险提示，不属于禁止行为。 选项ABC正确：根据《证券期货经营机构私募资产管理业务运作管理暂行规定》，证券经营机构在销售中不得存在如下行为： （1）资产管理合同及销售材料中存在包含保本保收益内涵的表述，如零风险（C项）、收益有保障、本金无忧等。 （2）资产管理计划名称中含有“保本”字样。 （3）与投资者私下签订回购协议（A项），直接或间接承诺保本保收益； （4）向投资者口头或者通道短信、微信等各种方式承诺保本保收益。 （5）向非合格投资者销售资产管理计划，明知投资者实质不符合合格投资者标准，仍予以销售确认，或者通过拆分转让资产管理计划份额或其收益权、为投资者直接或间接提供短期借贷（B项）等方式，变相突破合格投资者标准。 （6）单一资产管理计划的投资者人数超过200人，或者同一资产管理人为单一融资项目设立多个资产管理计划，变相突破投资者人数限制。 （7）通过报刊、电台、电视、互联网等公众传播媒体，讲座、报告会、分析会等方式，布告、传单、短信、微信、博客和电子邮件等载体，向不特定对象宣传具体产品，但证券期货经营机构和销售机构通过设置特定对象确定程序的官网、客户端等互联网媒介向已注册特定对象进行宣传推介的除外。 （8）向投资者宣传资产管理计划预期收益率。 （9）夸大或者片面宣传产品，夸大或者片面宣传资产管理计划管理人及其管理的产品、投资经理等的过往业绩，未充分揭示产品风险，投资者认购资产管理计划时未签订风险揭示书和资产管理合同。","type":"multi"},{"id":"cy_fin_1373","q":"根据《区域性股权市场自律管理与服务规范(试行)》，下列关于证券公司参与区域性股权市场的业务范围，说法正确的有（）。","c":{"A":"参股区域性股权市场运营机构","B":"分支机构可以经证券公司批准并在授权范围内开展区域性股权市场相关业务","C":"为合格投资者提供企业研究报告和尽职调查信息","D":"在区域性股权市场提供私募债券融资服务"},"a":"A,B,C","an":"选项D错误：证券公司可以在区域性股权市场开展以下业务：为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务（并非私募债券融资服务）；为合格投资者提供企业研究报告和尽职调查信息。 （理解：“私募债券融资服务” 是指帮助企业发行债券来融资，证券公司如果直接提供私募债券融资服务，可能涉及承销、担保、信用评估等复杂环节，风险较高。监管规定让证券公司在区域性市场只做 “居间介绍”（居间介绍业务是证券公司作为中介，帮助投资者买卖证券，可以避免其过度参与融资风险——私募债券融资业务是证券公司直接参与企业的融资活动，风险高）） 选项ABC正确：证券公司区域性股权市场业务： （1）证券公司可以参股、控股区域性股权市场运营机构。证券公司分支机构可以经证券公司批准并在授权范围内开展区域性股权市场相关业务。 （2）证券公司可以在区域性股权市场开展以下业务：为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务；为合格投资者提供企业研究报告和尽职调查信息。","type":"multi"},{"id":"cy_fin_1375","q":"证券公司应当将另类子公司纳入统一管理。证券公司应当对自营、另类投资等自有资金投资的业务实施统一管理，管理的尺度和标准应当基本一致。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当将另类子公司纳入统一管理。证券公司应当对自营、另类投资等自有资金投资的业务实施统一管理，管理的尺度和标准应当基本一致。","type":"judge"},{"id":"cy_fin_1377","q":"信息披露义务人报送的报告或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"十万元以上一百万元以下","B":"五十万元以上五百万元以下","C":"一百万元以上一千万元以下","D":"二百万元以上二千万元以下"},"a":"C","an":"选项C正确：信息披露义务人报送的报告或者披露的信息有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以【一百万元以上一千万元以下】的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下的罚款。","type":"single"},{"id":"cy_fin_1379","q":"发行人擅自改变公开发行证券所募集资金的用途的，责令改正，对直接负责的主管人员和其他责任人员给予警告，并处以（）的罚款。","c":{"A":"3万元以上30万元以下","B":"5万元以上30万元以下","C":"10万元以上100万元以下","D":"30万元以上300万元以下"},"a":"C","an":"选项C正确：《证券法》第一百八十五条的规定，发行人违反本法第十四条、第十五条的规定擅自改变公开发行证券所募集资金的用途的，责令改正，处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以【十万元以上一百万元以下】的罚款。 发行人的控股股东、实际控制人从事或者组织、指使从事前款违法行为的，给予警告，并处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员，处以十万元以上一百万元以下的罚款。","type":"single"},{"id":"cy_fin_1381","q":"《信息披露违法行为行政责任认定规则》认定为不予行政处罚考虑的情形有（）。","c":{"A":"未直接参与信息披露违法行为","B":"在获悉公司信息披露违法后，向公司有关主管人员或者公司上级主管提出质疑并采取了适当措施","C":"配合证券监管机构调查且有立功表现","D":"当事人在信息披露违法事实所涉及期间，由于不可抗力、失去人身自由等无法正常履行职责的"},"a":"D","an":"注意：区分不予行政处罚和从轻/减轻处罚的情形。选项ABC为认定从轻或者减轻处罚考虑的情形，而不是不予行政处罚。 选项D正确：《信息披露违法行为行政责任认定规则》中，认定为【不予行政处罚】考虑的情形包括： ①当事人对认定的信息披露违法事项提出具体异议记载于董事会、监事会、公司办公会会议记录等，并在上述会议中投反对票的； ②当事人在信息披露违法事实所涉及期间，由于不可抗力、失去人身自由等无法正常履行职责的； ③对公司信息披露违法行为不负有主要责任的人员在公司信息披露违法行为发生后及时向公司和证券交易所、证券监管机构报告的； ④其他需要考虑的情形。 选项ABC错误：《信息披露违法行为行政责任认定规则》中，认定【从轻或者减轻处罚】考虑的情形如下： ①未直接参与信息披露违法行为（A项）； ②在信息披露违法行为被发现前，及时主动要求公司采取纠正措施或者向证券监管机构报告； ③在获悉公司信息披露违法后，向公司有关主管人员或者公司上级主管提出质疑并采取了适当措施（B项）； ④配合证券监管机构调查且有立功表现（C项）； ⑤受他人胁迫参与信息披露违法行为； ⑥其他需要考虑的情形。","type":"single"},{"id":"cy_fin_1383","q":"W证券公司明知M公司发行债券未获注册，仍为其承销，违法所得80万元。对此，证券监督管理机构依法可对W证券公司处以（  ）的罚款。","c":{"A":"50万元以下罚款","B":"没收违法所得，并处100万元以上1000万元以下罚款","C":"仅没收违法所得","D":"撤销其业务许可，无需罚款"},"a":"B","an":"根据《证券法》第一百八十三条规定，证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款（B正确）；情节严重的，并处暂停或者撤销相关业务许可。给投资者造成损失的，应当与发行人承担连带赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"single"},{"id":"cy_fin_1385","q":"在乙证券公司承销债券的过程中，其销售人员在宣传材料中虚构发行人的财务数据，以误导投资者。此行为被认定为违反证券承销业务规定，情节严重的。监管机构依法可以对乙公司采取的措施是（  ）","c":{"A":"对乙公司给予警告，并处30万元罚款","B":"没收违法所得，并处以40万元罚款","C":"暂停其相关业务许可","D":"对乙公司直接负责的销售总监处以10万元罚款"},"a":"C","an":"根据《证券法》第一百八十四条规定，证券公司承销证券违反《证券法》第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处50万元以上500万元以下的罚款（AB错误）；情节严重的，暂停或者撤销相关业务许可（C正确）。对直接负责的主管人员和其他直接责任人员给予警告，可以并处20万元以上200万元以下的罚款（D错误）；情节严重的，并处以50万元以上500万元以下的罚款。 综上，该题选C。","type":"single"},{"id":"cy_fin_1387","q":"对于信息披露义务人未按照《证券法》规定报送有关报告或者履行信息披露义务的法律责任，下列说法错误的是（）。","c":{"A":"对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款","B":"责令改正","C":"给予警告","D":"处以五十万元以上五百万元以下的罚款"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误：对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下（并非10-100万）的罚款。因此答案选择A。 选项BCD正确：《证券法》第一百九十七条的规定，信息披露义务人未按照本法规定报送有关报告或者履行信息披露义务的，责令改正，给予警告，并处以五十万元以上五百万元以下的罚款（BCD选项正确）；对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以上二百万元以下的罚款。发行人的控股股东、实际控制人组织、指使从事上述违法行为，或者隐瞒相关事项导致发生上述情形的，处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员，处以二十万元以上二百万元以下的罚款。","type":"single"},{"id":"cy_fin_1389","q":"S公司在其公告的股票发行文件中，虚增了最近三年的营业收入，但在提交注册申请后被监管机构发现，股票尚未发行。根据《证券法》，S公司可能面临的最高罚款金额是（  ）","c":{"A":"200万元","B":"500万元","C":"2000万元","D":"5000万元"},"a":"C","an":"根据《证券法》第一百八十一条规定，发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以200万元以上2000万元以下的罚款；已经发行证券的，处以非法所募资金金额10%以上1倍以下的罚款。对直接负责的主管人员和其他直接责任人员，处以100万元以上1 000万元以下的罚款。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_1391","q":"甲公司在2019年因信息披露违规被证监会行政处罚，2021年再次因未及时披露重大担保事项被证券交易所予以纪律处分，2023年甲公司又涉嫌在定期报告中虚假记载利润。根据相关规定，甲公司的行为构成（  ）","c":{"A":"过失违规，可从轻处理","B":"连续违规，应当从重处罚","C":"首次违法，不予处罚","D":"情节轻微，免予追究"},"a":"B","an":"中国证监会《信息披露违法行为行政责任认定规则》关于违规披露、不披露重要信息行政责任认定中，第二十三条规定，下列情形认定为应当从重处罚的情形：    ①不配合证券监管机构监管，或者拒绝、阻碍证券监管机构及其工作人员执法，    甚至以暴力、威胁及其他手段干扰执法；    ②在信息披露违法案件中变造、隐瞒、毁灭证据，或者提供伪证，妨碍调查；    ③两次以上违反信息披露规定并受到行政处罚或者证券交易所纪律处分；（符合题干情形，故B正确）    ④在信息披露上有不良诚信记录并记入证券期货诚信档案；    ⑤中国证监会认定的其他情形。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1393","q":"信息披露义务人未按照《证券法》规定报送有关报告或者履行信息披露义务的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"5万元以上50万元以下","B":"10万元以上30万元以下","C":"50万元以上500万元以下","D":"60万元以上600万元以下"},"a":"C","an":"选项C正确：根据《证券法》第一百九十七条规定，信息披露义务人未按照本法规定报送有关报告或者履行信息披露义务的，责令改正，给予警告，并处以50万元以上500万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。发行人的控股股东、实际控制人组织、指使从事上述违法行为，或者隐瞒相关事项导致发生上述情形的，处以50万元以上500万元以下的罚款；对直接负责的主管人员和其他直接责任人员，处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_fin_1395","q":"下列不符合欺诈发行证券罪处罚要求的是（）。","c":{"A":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以100万元的罚款","B":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，已经发行证券的，处以非法所募资金金额90％的罚款","C":"对直接负责的主管人员和其他直接责任人员，处以500万元的罚款","D":"对直接负责的主管人员和其他直接责任人员，处以200万元的罚款"},"a":"A","an":"根据《证券法》第一百八十一条的规定，发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以200万元以上2000万元以下的罚款；已经发行证券的，处以非法所募资金金额10％以上1倍以下的罚款。对直接负责的主管人员和其他直接责任人员，处以100万元以上1000万元以下的罚款。 题目问的是”不符合“。 选项A错误：尚未发行证券的，处以100万元的罚款，不符合“处以200万元以上2000万元以下的罚款”规定。因此答案选择A。 选项B正确：已经发行证券的，处以非法所募资金金额90％的罚款，符合“非法所募资金金额10％以上1倍以下的罚款”规定 选项CD正确：对直接负责的主管人员和其他直接责任人员，处以500/200万元的罚款，符合“对直接负责的主管人员和其他直接责任人员，处以100万元以上1000万元以下的罚款”规定。","type":"single"},{"id":"cy_fin_1397","q":"按照中国证监会《信息披露违法行为行政责任认定规则》的规定，下列符合从轻或者减轻处罚考虑的情形有（）。","c":{"A":"在获悉公司信息披露违法后，向公司有关主管人员或者公司上级主管提出质疑并采取了适当措施的","B":"在信息披露违法行为被发现后，及时主动要求公司采取纠正措施或者向证券监管机构报告的","C":"当事人在信息披露违法事实所涉及期间，由于不可抗力、失去人身自由等无法正常履行职责的","D":"在信息披露违法案件中变造、隐瞒、毁灭证据，或者提供伪证，妨碍调查的"},"a":"A","an":"选项A正确：在获悉公司信息披露违法后，向公司有关主管人员或者公司上级主管提出质疑并采取了适当措施的，认定从轻或者减轻处罚考虑。 选项B错误：《信息披露违法行为行政责任认定规则》第二十条规定，在信息披露违法行为被发现前（并非发现后），及时主动要求公司采取纠正措施或者向证券监管机构报告的。 选项C错误：《信息披露违法行为行政责任认定规则》第二十一条规定，当事人在信息披露违法事实所涉及期间，由于不可抗力、失去人身自由等无法正常履行职责的，不予行政处罚考虑（并非从轻或者减轻处罚）。 选项D错误：《信息披露违法行为行政责任认定规则》第二十三条规定，在信息披露违法案件中变造、隐瞒、毁灭证据，或者提供伪证，妨碍调查的，应当从重处罚（并非从轻处罚）。  【知识拓展】《信息披露违法行为行政责任认定规则》关于违规披露、不披露重要信息从轻或者减轻处罚情形 ①未直接参与信息披露违法行为； ②在信息披露违法行为被发现前，及时主动要求公司采取纠正措施或者向证券监管机构报告； ③在获悉公司信息披露违法后，向公司有关主管人员或者公司上级主管提出质疑并采取了适当措施； ④配合证券监管机构调查且有立功表现； ⑤受他人胁迫参与信息披露违法行为； ⑥其他需要考虑的情形。","type":"single"},{"id":"cy_fin_1399","q":"在（）中，隐瞒重要事实或者编造重大虚假内容发行股票或者企业债券，数额巨大、后果严重的，或者有其他严重情节的，构成欺诈发行证券罪。","c":{"A":"招股说明书","B":"财务会计报告","C":"发行保荐书","D":"企业债券募集办法"},"a":"A,D","an":"选项AD正确：欺诈发行证券罪的犯罪构成的客观要件之一是行为人必须实施在【招股说明书】、认股书、公司、【企业债券募集办法】等发行文件中隐瞒重要事实或者编造重大虚假内容的行为。 选项B错误：财务会计报告主要涉及的是信息披露问题，通常与违规披露、不披露重要信息罪相关，而不是直接构成欺诈发行证券罪。 选项C错误：发行保荐书是保荐机构为发行人出具的文件，主要目的是推荐发行人的证券发行。更多地是保荐机构对发行人进行的审核和推荐，而不是直接向投资者披露的信息（欺诈发行证券罪主要关注的是在直接面向投资者的发行文件中是否存在虚假陈述或隐瞒重要事实）。","type":"multi"},{"id":"cy_fin_1401","q":"根据《证券法》，证券公司承销擅自公开发行的证券，可能面临的行政处罚种类包括（  ）","c":{"A":"没收违法所得","B":"罚款","C":"警告","D":"暂停或者撤销相关业务许可"},"a":"A,B,D","an":"根据《证券法》第一百八十三条规定，证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得（A正确），并处以违法所得1倍以上10倍以下的罚款（B正确）；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销相关业务许可（D正确）。给投资者造成损失的，应当与发行人承担连带赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告（针对责任人员，而非公司本身，C错误），并处以50万元以上500万元以下的罚款。 综上，该题选ABD。","type":"multi"},{"id":"cy_fin_1403","q":"欺诈发行证券罪侵犯的客体是复杂客体，具体包括（  ）","c":{"A":"公司的商业秘密","B":"国家对证券市场的管理秩序","C":"投资者的合法权益","D":"证券公司的承销业务收入"},"a":"B,C","an":"选项BC正确：欺诈发行证券罪的客体是复杂客体，即国家对证券市场的管理秩序以及投资者(即股东、债权人和公众)的合法权益。 选项AD为干扰项","type":"multi"},{"id":"cy_fin_1405","q":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容的情况中，以下相关处罚正确的是（）。","c":{"A":"尚未发行证券的，处以二百万元以上二千万元以下的罚款","B":"已经发行证券的，处以非法所募资金金额百分之十以上一倍以下的罚款","C":"对直接负责的主管人员和其他直接责任人员，处以一百万元以上一千万元以下的罚款","D":"对直接负责的主管人员和其他直接责任人员，处以一百万元以上五百万元以下的罚款"},"a":"A,B,C","an":"选项ABC正确：《证券法》第一百八十一条的规定，发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以二百万元以上二千万元以下的罚款（A选项正确）；已经发行证券的，处以非法所募资金金额百分之十以上一倍以下的罚款（B选项正确）。对直接负责的主管人员和其他直接责任人员，处以一百万元以上一千万元以下的罚款（C选项正确）。 选项D错误：对直接负责的主管人员和其他直接责任人员，处以一百万元以上一千万元以下（并非100-500万）的罚款。","type":"multi"},{"id":"cy_fin_1407","q":"根据《中华人民共和国证券法》的规定，下列关于发行人擅自改变公开发行证券募集资金用途的后果，说法正确的有（）。","c":{"A":"责令改正","B":"处以十万元以上一百万元以下的罚款","C":"对直接负责的主管人员和其他直接责任人员给予警告，并处以五万元以上五十万元以下的罚款","D":"对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款"},"a":"A,D","an":"选项B错误：发行人擅自改变公开发行证券募集资金用途，处以五十万元以上五百万元以下的罚款（并非10-100万）。 选项C错误：对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下（并非5-50万）的罚款。 选项AD正确：《证券法》第一百八十五条的规定，发行人违反本法第十四条、第十五条的规定擅自改变公开发行证券所募集资金的用途的，责令改正（A选项正确），处以五十万元以上五百万元以下的罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处以【十万元以上一百万元以下】的罚款。","type":"multi"},{"id":"cy_fin_1409","q":"证券公司不得采用下列哪些手段招揽证券承销业务（  ）。","c":{"A":"向潜在客户提供未公开的发行人内幕信息","B":"承诺承销费率显著低于行业公允水平","C":"向发行人提供与承销服务无关的财务资助","D":"如实介绍公司承销团队的专业能力和成功案例"},"a":"A,B,C","an":"选项ABC正确：证券公司承销证券，不得有下列行为： (1)进行虚假的或者误导投资者的广告宣传或者其他宣传推介活动； (2)以不正当竞争手段招揽承销业务； (3)其他违反证券承销业务规定的行为。 选项D错误：如实介绍自身情况属于正当的业务推广，不被禁止。","type":"multi"},{"id":"cy_fin_1411","q":"如果发行人欺诈发行证券，但非法募集的资金金额极小，监管部门可以视情况免除对其的罚款处罚。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券法》第一百八十一条规定，发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以200万元以上2000万元以下的罚款；已经发行证券的，处以非法所募资金金额10%以上1倍以下的罚款（并非免除罚款）。对直接负责的主管人员和其他直接责任人员，处以100万元以上1 000万元以下的罚款。","type":"judge"},{"id":"cy_fin_1413","q":"在信息披露违法期间，当事人因突发疾病住院治疗，完全无法处理公司事务，可以成为认定不予行政处罚的考虑情形。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"中国证监会《信息披露违法行为行政责任认定规则》关于违规披露、不披露重要信息行政责任认定中，第二十一条规定，认定为不予行政处罚考虑的情形： ①当事人对认定的信息披露违法事项提出具体异议记载于董事会、监事会、公司办公会会议记录等，并在上述会议中投反对票的； ②当事人在信息披露违法事实所涉及期间，由于不可抗力、失去人身自由等无法正常履行职责的； ③对公司信息披露违法行为不负有主要责任的人员在公司信息披露违法行为发生后及时向公司和证券交易所、证券监管机构报告的； ④其他需要考虑的情形。","type":"judge"},{"id":"cy_fin_1415","q":"按照《刑法》第一百八十一条规定，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的，处（）年有期徒刑或者拘役，并处或者单处（）万元以上10万元以下罚金。","c":{"A":"3；1","B":"5；5","C":"5；1","D":"3：5"},"a":"C","an":"选项C正确：《刑法》第一百八十一条规定，故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的，处【5年】有期徒刑或者拘役，并处或者单处【1万元】以上10万元以下罚金。","type":"single"},{"id":"cy_fin_1417","q":"按照《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第三十三条的规定，诱骗投资者买卖证券、期货合约，可以给予立案追诉的情形不包括（）。","c":{"A":"获利或者避免损失数额累计在5万元以上的","B":"造成投资者直接经济损失数额在50万元以上的","C":"诱骗投资者买卖证券、期货合约数额在10万元以上的","D":"致使交易价格和交易量异常波动的"},"a":"C","an":"题目问的是“不包括”。 选项C错误：无交易金额相关立案追诉标准，主要强调损失金额，此处为迷惑选项设置，无实际意义。因此答案选择C。 选项ABD正确：根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定（二）》第三十三条的规定，诱骗投资者买卖证券、期货合约案，涉嫌下列情形之一的，应予立案追诉： （1）获利或者避免损失数额在5万元以上的（A选项符合）； （2）造成投资者直接经济损失数额在50万元以上的（B选项符合）； （3）虽未达到上述数额标准，但多次诱骗投资者买卖证券、期货合约的； （4）致使交易价格或者交易量异常波动的（D选项符合）； （5）造成其他严重后果的。","type":"single"},{"id":"cy_fin_1419","q":"下列不属于诱骗投资者买卖证券、期货合约罪的犯罪主体的是（  ）。","c":{"A":"证券交易所的从业人员甲","B":"期货经纪公司的从业人员乙","C":"期货业协会的工作人员丙","D":"商业银行的从业人员丁"},"a":"D","an":"诱骗投资者买卖证券、期货合约罪的犯罪主体是特殊主体，主要包括两个方面：  (1)证券交易所、期货交易所、证券公司、期货经纪公司的从业人员（AB属于）  (2)证券业协会、期货业协会或者证券期货监督管理部门的工作人员（C属于） 题目问的是“不属于”。综上，该题选D。","type":"single"},{"id":"cy_fin_1421","q":"某证券公司员工张某，利用职务之便，故意编造并传播公司即将与某大型科技企业合并的虚假信息，诱导多名客户大量买入该公司股票。事后经查，张某的行为直接导致一名投资者经济损失人民币55万元。对此，公安机关的立案追诉依据是（  ）","c":{"A":"获利或者避免损失数额在5万元以上","B":"造成投资者直接经济损失数额在50万元以上","C":"多次诱骗投资者买卖","D":"致使交易价格或者交易量异常波动"},"a":"B","an":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第三十三条规定，诱骗投资者买卖证券、期货合约案，涉嫌下列情形之一的，应予立案追诉： (1)获利或者避免损失数额在5万元以上的； (2)造成投资者直接经济损失数额在50万元以上的；（符合题目情形） (3)虽未达到上述数额标准，但多次诱骗投资者买卖证券、期货合约的； (4)致使交易价格或者交易量异常波动的； (5)造成其他严重后果的。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1423","q":"公司违反《中华人民共和国证券法》规定，应当承担民事赔偿责任和缴纳罚款、罚金的，其财产不足以支付时，先承担（）。","c":{"A":"公司可以自主选择","B":"民事赔偿责任","C":"缴纳罚款","D":"缴纳罚金"},"a":"B","an":"选项B正确：《证券法》第二百二十条的规定，违反本法规定，应当承担民事赔偿责任和缴纳罚款、罚金、违法所得，违法行为人的财产不足以支付的，优先用于承担民事赔偿责任。 选项ACD为干扰项，法律明确规定了清偿顺序，是为了优先保护投资者（民事主体）的合法权益，确保其因违法行为遭受的损失得到及时救济。","type":"single"},{"id":"cy_fin_1425","q":"甲证券公司资产管理部员工乙某利用其所掌握的资产管理产品持仓信息，多次先于或同时于资产管理产品建仓，并从中获利，乙某的行为属于（）。","c":{"A":"内幕交易行为","B":"操纵市场行为","C":"利用未公开信息交易行为","D":"欺诈客户行为"},"a":"C","an":"选项C正确：利用未公开信息交易罪是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息（乙某利用的是职务便利获取的资产管理产品持仓信息，符合未公开信息），违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。 选项A错误：内幕交易是指证券、期货交易内幕信息的知情人员或者非法获取内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易 ，或者泄露该信息，或者明示、暗示他人从事上述交易活动。本题中乙某利用的是资产管理产品持仓信息，并非对证券、期货交易价格有重大影响的内幕信息，所以不属于内幕交易行为。 选项B错误：操纵市场是指以获取不正当利益或者转嫁风险为目的，利用资金、信息等优势或者滥用职权，影响证券、期货交易价格或者交易量，制造证券、期货市场假象，诱导或者致使投资者在不了解事实真相的情况下作出证券、期货投资决定。 选项D错误：欺诈客户行为是指证券公司及其从业人员在证券交易及相关活动中，为了谋取不法利益，违背客户的真实意思进行代理的行为，以及诱导客户进行不必要的证券交易的行为。  【知识拓展】内幕信息 VS 未公开信息 1. 内幕信息：是对证券的发行，证券、期货交易价格有重大影响的信息，多与宏观经济政策、行业形势、上市公司经营决策等基本面情况相关 ，如公司并购重组、重大合同签订、业绩大幅变动等信息。（主体包括证券、期货交易内幕信息的知情人员（如上市公司董事、监事、高级管理人员，持有公司百分之五以上股份的股东等）以及非法获取内幕信息的人员）。 2. 未公开信息：是指除内幕信息之外的其他未公开信息，如资产管理产品持仓信息、投资决策、交易计划等金融机构的交易信息。（主体主要是证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员 ）。","type":"single"},{"id":"cy_fin_1427","q":"以下关于诱骗投资者买卖证券、期货合约罪的犯罪构成，说法错误的是（）。","c":{"A":"该罪的主体是特殊主体","B":"该罪主观方面可以是过失","C":"该罪侵犯的客体是证券、期货交易市场的正常管理秩序和证券、期货投资人的合法利益","D":"该罪的客观要件表现为行为人故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：诱骗投资者买卖证券、期货合约罪的主观方面【只能是故意，过失不构成本罪】，因此答案选择B。 选项A正确：诱骗投资者买卖证券、期货合约罪的主体是特殊主体，主要包括两个方面：（1）证券交易所、期货交易所、证券公司、期货经纪公司的从业人员；（2）证券业协会、期货业协会或者证券期货监督管理部门的工作人员。 选项C正确：诱骗投资者买卖证券、期货合约罪侵犯的客体是证券、期货交易市场的正常管理秩序和证券、期货投资人的合法利益。 选项D正确：诱骗投资者买卖证券、期货合约罪的客观要件表现为行为人故意提供虚假信息或者伪造、变造、销毁交易记录，诱骗投资者买卖证券、期货合约，造成严重后果的行为。","type":"single"},{"id":"cy_fin_1429","q":"下列哪些行为属于操纵证券市场？（）","c":{"A":"证券公司利用其资金、信息等优势，影响证券交易价格或交易量","B":"与他人串通，以约定的时间、价格和方式相互交易，影响证券交易价格或交易量","C":"在自己实际控制的账户间进行证券交易，影响证券交易价格或交易量","D":"利用非公开信息买卖证券"},"a":"A,B,C","an":"选项D错误：“利用非公开信息买卖证券”属于内幕交易/利用未公开信息交易，而不是操纵证券市场。 选项ABC正确：操纵证券、期货市场行为有： （1）单独或合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖；（A正确）  （2）与他人串通以事先约定的时间、价格和方式相互进行交易；（B正确）  （3）在自己实际控制的账户之间进行交易，或者以自己为交易对象，自买自卖等方式，操纵证券、期货市场（含交易价格、交易量等）的行为。（C正确） （4）不以成交为目的，频繁或者大量申报买入、卖出证券、期货合约并撤销申报； （5）利用虚假或者不确定的重大信息，诱导投资者进行证券、期货交易； （6）对证券、证券发行人、期货交易标的公开作出评价、预测或者投资建议，同时进行反向证券交易或者相关期货交易； （7）以其他方法操纵证券、期货市场的。","type":"multi"},{"id":"cy_fin_1431","q":"关于操纵证券期货市场的刑事责任，下列说法正确的有（）。","c":{"A":"本罪的主体是一般主体，单位也能成为犯罪的主体","B":"本罪的主观方面为故意，且以获取不正当利益或者转嫁风险为目的","C":"本罪侵害了国家证券、期货管理制度和投资者的合法权益","D":"本罪的主体为一般主体，单位不能成为本罪的犯罪主体"},"a":"A,B,C","an":"选项D错误：本罪主体为一般主体，凡达到刑事责任年龄并且具有刑事责任能力的自然人均可成为本罪主体；单位亦能成为本罪主体。 选项ABC正确：操纵证券市场罪的犯罪构成包括： （1）犯罪的主观方面。本罪主观方面由故意构成，且以获取不正当利益或者转嫁风险为目的。 （2）犯罪主体。本罪主体为一般主体，凡达到刑事责任年龄并且具有刑事责任能力的自然人均可成为本罪主体；单位亦能成为本罪主体（D错误）。 （3）犯罪的客体。本罪侵害了国家证券、期货管理制度和投资者的合法权益。","type":"multi"},{"id":"cy_fin_1433","q":"背信运用受托财产是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。（）","c":{"1":"对","0":"错"},"a":"1","an":"背信运用受托财产是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。","type":"judge"},{"id":"cy_fin_1435","q":"某证券公司于2023年度证券公司文化建设实践评估中获得了A类评级。该公司计划在其2024年第一季度的产品宣传材料中突出展示这一评估结果，以期吸引更多客户。该公司的这一计划（  ）","c":{"A":"是合法的，因为评估结果是其公司实力的体现","B":"是允许的，只要不进行虚假宣传即可","C":"是不符合规定的，因为评估结果不得用于商业目的","D":"是可行的，因为评估结果每年都会更新"},"a":"C","an":"证券公司不得将实践评估结果用于广告、宣传、营销等商业目的。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_1437","q":"中国证券业协会对证券公司2024年度的文化建设实践评估工作已完成。该评估结果预计将主要用于（  ）","c":{"A":"作为证券公司在下一年度广告投放的核心素材","B":"供中国证监会在对证券公司进行分类监管时参考","C":"由证券公司自行决定是否对外公布以吸引投资者","D":"作为证券公司当年度的主要商业宣传亮点"},"a":"B","an":"选项B正确：中国证券业协会按照要求将实践评估分类结果及加分建议报送中国证监会，供监管部门在证券公司分类监管工作中参考使用。 选项ACD错误：证券公司不得将实践评估结果用于广告、宣传、营销等商业目的。","type":"single"},{"id":"cy_fin_1439","q":"证券行业文化建设包括三大层次，不包括（）。","c":{"A":"行为层","B":"组织层","C":"观念层","D":"理想层"},"a":"D","an":"题目问的是“不包括”。 选项D错误：干扰项，因此答案选择D。 选项ABC正确：证券行业文化建设包括三大层次：一是行为层，二是组织层，三是观念层。  【知识拓展】 一是行为层，包括平衡各方利益、建立长效激励、加强声誉约束、落实责任担当四个要素。 二是组织层，包括融合发展战略、强化文化认同、激发组织活力三要素。 三是观念层，包括秉承守正创新、崇尚专业精神、坚持可持续发展三要素。","type":"single"},{"id":"cy_fin_1441","q":"证券行业文化建设包括三大层次十大方面的关键要素。其中的“三大层次”分别是宏观层、中观层和微观层。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券行业文化建设包括三大层次十大方面的关键要素。其中的“三大层次”分别是行为层、组织层和观念层（并非宏观、中观和微观层）。  【知识拓展】 一是行为层，包括平衡各方利益、建立长效激励、加强声誉约束、落实责任担当四个要素。 二是组织层，包括融合发展战略、强化文化认同、激发组织活力三个要素。 三是观念层，包括秉承守正创新、崇尚专业精神、坚持可持续发展三个要素。","type":"judge"},{"id":"cy_fin_1443","q":"某证券公司因其在文化建设实践评估中获得AA评级，遂在各大财经媒体发布新闻稿，宣称自己是“行业文化建设标杆企业”。这一行为是充分利用评估结果提升品牌价值的正当方式。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司不得将实践评估结果用于广告、宣传、营销等商业目的。","type":"judge"},{"id":"cy_fin_1445","q":"证券公司可以将公司文化建设实践评估结果用于广告、宣传、营销。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司不得（并非可以）将公司文化建设实践评估结果用于广告、宣传、营销等商业目的。","type":"judge"},{"id":"cy_fin_1447","q":"证券公司员工刘某的下列行为中，违反《廉洁规定》禁止性要求的有（  ）。","c":{"A":"利用职务便利安排其弟弟在合作机构优先获得业务机会","B":"将客户交易信息出售给第三方机构","C":"通过他人名义开设公司从事证券咨询业务","D":"根据公司授权调整客户交易佣金费率"},"a":"A,B,C","an":"根据《廉洁规定》,证券经营机构工作人员不得以下列方式谋取不正当利益： (1)直接或者间接以《廉洁规定》第九条规定的方式收受、索取他人的财物或者利益； (2)直接或者间接利用他人提供或主动获取的内幕信息、未公开信息、商业秘密和客户信息谋取利益；（B正确） (3)以诱导客户从事不必要交易、使用客户受托资产进行不必要交易等方式谋取利益； (4)违规从事营利性经营活动，违规兼任可能影响其独立性的职务或者从事与所在机构或者投资者合法利益相冲突的活动；（C正确） (5)违规利用职权为近亲属或者其他利益关系人从事营利性经营活动提供便利条件；（A正确） (6)其他谋取不正当利益的情形。 D项属于公司授权范围内的正常职务行为，不违反规定。","type":"multi"},{"id":"cy_fin_1449","q":"证券经营机构及其工作人员在开展自营业务、资产管理业务、另类投资业务或者提供有关服务的过程中，不得通过（）方式输送或者谋取不正当利益。","c":{"A":"侵占或者挪用受托资产","B":"不公平对待不同投资组合，同一受托产品的不同投资者，在不同账户间输送利益","C":"以明显偏离市场公允估值的价格进行交易","D":"将证券研究报告内容或者观点优先提供给公司相关销售服务人员、客户及其他无关人员"},"a":"A,B,C","an":"选项D错误：请注意选项D中的“将证券研究报告内容或者观点优先提供给公司相关销售服务人员、客户及其他无关人员”属于【证券投资咨询业务】中的禁止性行为，而不是自营业务、资产管理业务、另类投资业务中的禁止性行为。 选项ABC正确： 证券经营机构及其工作人员在开展自营业务、资产管理业务、另类投资业务或者提供有关服务的过程中，不得通过以下方式输送或者谋取不正当利益： 1.利用他人提供或者主动获取的内幕信息、未公开信息等从事或者明示、暗示他人从事相关交易活动； 2.侵占或者挪用受托资产（A项）；  3.不公平对待不同投资组合，同一受托产品的不同投资者，在不同账户之间输送利益（B项）；  4.以明显偏离市场公允估值的价格进行交易（C项）； 5.编造、传播虚假不实信息，或者利用信息优势、资金优势、持股持券优势，单独或者通过合谋，影响证券、期货及其他衍生品交易价格、交易量； 6.以获取佣金或者其他利益为目的，用客户资产进行不必要的证券交易； 7.让渡资产管理账户实际投资决策权限； 8.代表投资组合对外行使投票表决权的过程中，不按照客观独立的专业判断投票； 9.串通相关方进行明显偏离公允价值的估值核算； 10.其他输送或者谋取不正当利益的行为。","type":"multi"},{"id":"cy_fin_1451","q":"根据《廉洁规定》，证券经营机构工作人员不得以下列哪些方式谋取不正当利益（  ）。","c":{"A":"利用未公开信息指导亲属进行证券交易","B":"兼任与所在机构存在业务竞争的企业独立董事","C":"要求客户通过指定中介机构办理业务并收取返点","D":"向客户提供基于公开研究报告的投资建议"},"a":"A,B,C","an":"根据《廉洁规定》，证券经营机构工作人员不得以下列方式谋取不正当利益： (1)直接或者间接以《廉洁规定》第九条规定的方式收受、索取他人的财物或者利益；（C正确） (2)直接或者间接利用他人提供或主动获取的内幕信息、未公开信息、商业秘密和客户信息谋取利益；（A正确） (3)以诱导客户从事不必要交易、使用客户受托资产进行不必要交易等方式谋取利益； (4)违规从事营利性经营活动，违规兼任可能影响其独立性的职务或者从事与所在机构或者投资者合法利益相冲突的活动；（B正确） (5)违规利用职权为近亲属或者其他利益关系人从事营利性经营活动提供便利条件； (6)其他谋取不正当利益的情形。 D项基于公开信息提供建议属于正常执业行为，不违反规定。","type":"multi"},{"id":"cy_fin_1453","q":"证券经营机构及其工作人员在信息技术服务外包、物品和服务采购、项目招投标、人员招聘等业务相关活动中，应当建立严格的内部监督管理机制，不得违反公平公正原则，防范相关工作人员输送或者谋取不正当利益。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构及其工作人员在信息技术服务外包、物品和服务采购、项目招投标、人员招聘等业务相关活动中，应当建立严格的内部监督管理机制，不得违反公平公正原则，防范相关工作人员输送或者谋取不正当利益。","type":"judge"},{"id":"cy_fin_1455","q":"按照相关规定的诚信信息、其他执业声誉信息通过证券期货市场诚信档案数据库获取，或者由证券业协会作出或者认定，并自作出或者认定之日起（）个工作日内记入执业声誉信息库。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：按照相关规定的诚信信息、其他执业声誉信息通过证券期货市场诚信档案数据库获取，或者由证券业协会作出或者认定，并自作出或者认定之日起5个工作日内记入执业声誉信息库。","type":"single"},{"id":"cy_fin_1457","q":"《证券期货市场诚信监督管理办法》规定，期货交易所建立全国统一的证券期货市场诚信档案数据库，记录证券期货市场诚信信息。（）","c":{"1":"对","0":"错"},"a":"0","an":"《证券期货市场诚信监督管理办法》规定，【中国证监会】建立全国统一的证券期货市场诚信档案数据库，记录证券期货市场诚信信息。","type":"judge"},{"id":"cy_fin_1459","q":"（）依法对保荐机构及其保荐代表人、其他从事保荐业务的人员进行监督管理。","c":{"A":"中国证券业协会","B":"财政部","C":"中国证监会","D":"国务院"},"a":"C","an":"选项C正确：【中国证监会】依法对保荐机构及其保荐代表人、其他从事保荐业务的人员进行“监督管理”。 选项A错误：中国证券业协会对保荐机构及其保荐代表人、其他从事保荐业务的人员进行“自律管理”。 选项BD错误：财政部和国务院并不直接负责证券行业监管。","type":"single"},{"id":"cy_fin_1461","q":"持续督导工作结束后，保荐机构应当在发行人公告年度报告之日起的（）个工作日内向中国证监会、证券交易所报送保荐总结报告书。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"B","an":"选项B正确：持续督导工作结束后，保荐机构应当在发行人公告年度报告之日起的【10个工作日】内向中国证监会、证券交易所报送保荐总结报告书。保荐机构法定代表人和保荐代表人应当在保荐总结报告书上签字。保荐总结报告书应当包括下列内容： （1）发行人的基本情况； （2）保荐工作概述； （3）履行保荐职责期间发生的重大事项及处理情况； （4）对发行人配合保荐工作情况的说明及评价； （5）对证券服务机构参与证券发行上市相关工作情况的说明及评价； （6）中国证监会、证券交易所要求的其他事项。","type":"single"},{"id":"cy_fin_1463","q":"保荐代表人出现（）情形，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施。","c":{"A":"因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责","B":"因突发自然灾害未能及时参与辅导工作","C":"本人及其配偶持有发行人的股份","D":"制作或者出具的文件不齐备或者不符合要求"},"a":"A","an":"选项A正确：保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施： （1）尽职调查工作日志缺失或者遗漏、隐瞒重要问题； （2）未完成或者未参加辅导工作； （3）重大事项未报告、未披露； （4）未参加持续督导工作，或者持续督导工作未勤勉尽责； （5）因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责（A项）； （6）唆使、协助或者参与发行人干扰中国证监会、证券交易所及其上市委员会的审核工作； （7）伪造或者变造签字、盖章； （8）严重违反诚实守信、勤勉尽责义务的其他情形。 选项B错误：干扰项，教材未提及。这种情况通常被视为不可抗力，不会导致被认定不适当人员的监管措施。 选项C错误：本人及其配偶以任何名义或者方式持有发行人的股份，中国证监会可以依法采取认定为不适当人选的监管措施；情节严重的，对其采取证券市场禁入的措施。 选项D错误：制作或者出具的文件不齐备或者不符合要求，中国证监会可以采取暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选3个月到12个月的监管措施。  【知识拓展】(1)保荐机构、保荐代表人出现下列情形之一的，中国证监会可以视情节轻重，采取出具警示函、责令改正、监管谈话等监管措施；情节严重的，中国证监会可以采取暂停保荐机构的保荐业务、依法【认定保荐代表人为不适当人选3个月到12个月】的监管措施： ①制作或者出具的文件不齐备或者不符合要求； ②擅自改动申请文件、信息披露资料或者其他已提交文件； ③申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异； ④文件披露的内容表述不清，逻辑混乱，严重影响投资者理解； ⑤未及时报告或者未及时披露重大事项； ⑥指定不符合《保荐办法》第四条规定要求的人员具体负责保荐工作； ⑦未通过内核程序，以公司名义对外提交或披露保荐业务项目文件； ⑧采取业务包干等承包方式或其他形式进行过度激励； ⑨以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。 (2)保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，依法采取【认定为不适当人选3个月到36个月】的监管措施： ①尽职调查工作日志缺失或者遗漏、隐瞒重要问题； ②未完成或者未参加辅导工作； ③重大事项未报告、未披露； ④未参加持续督导工作，或者持续督导工作严重未勤勉尽责； ⑤因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责； ⑥唆使、协助或者参与发行人干扰中国证监会、证券交易所及其上市委员会的审核工作； ⑦伪造或者变造签字、盖章； ⑧严重违反诚实守信、勤勉尽责、廉洁从业义务的其他情形。 (3)保荐代表人出现下列情形之一的，中国证监会可以依法采取认定为不适当人选的监管措施；情节严重的，对其采取证券市场禁入的措施： ①在与保荐工作相关文件上签字推荐发行人证券发行上市，但未参加尽职调查工作，或者尽职调查工作不彻底、不充分，明显不符合业务规则和行业规范； ②通过从事保荐业务谋取不正当利益； ③本人及其配偶以任何名义或者方式持有发行人的股份； ④唆使、协助或者参与发行人及证券服务机构提供存在虚假记载、误导性陈述或者重大遗漏的文件； ⑤参与组织编制的与保荐工作相关文件存在虚假记载、误导性陈述或者重大遗漏。","type":"single"},{"id":"cy_fin_1465","q":"登记人员从事的业务类别发生变化的，证券公司应当自发生变化之日起（）个工作日内为其办理变更登记。","c":{"A":"5","B":"10","C":"7","D":"20"},"a":"A","an":"选项A正确：登记人员从事的业务类别发生变化的，证券公司应当自发生变化之日起【5个工作日】内为其办理变更登记。","type":"single"},{"id":"cy_fin_1467","q":"某保荐代表人参与发行人干扰中国证监会、证券交易所及其上市委员会的审核注册工作，中国证监会可以根据情节轻重，在 （  ）内认定为不适当人选。","c":{"A":"3个月至6个月","B":"3个月至12个月","C":"3个月至24个月","D":"3个月至36个月"},"a":"D","an":"保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施： ①尽职调查工作日志缺失或者遗漏、隐瞒重要问题； ②未完成或者未参加辅导工作； ③重大事项未报告、未披露； ④未参加持续督导工作，或者持续督导工作严重未勤勉尽责； ⑤因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责； ⑥唆使、协助或者参与发行人干扰中国证监会、证券交易所及其上市委员会的审核工作； ⑦伪造或者变造签字、盖章； ⑧严重违反诚实守信、勤勉尽责、廉洁从业义务的其他情形。 综上，该题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_1469","q":"孙某从B证券公司离职，劳动关系于2025年7月10日（周四）解除。B证券公司应当为孙某办理注销登记的截止日期是（  ）。","c":{"A":"45853","B":"45855","C":"45858","D":"45868"},"a":"B","an":"登记人员离职的，证券公司应当自劳动关系或者委托代理关系解除之日起5个工作日内为其办理注销登记。 7月10日为周四，5个工作日需要考虑去掉周末，因此5个工作日即10日+5日+周末2日=17日。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1471","q":"某证券投资顾问为了争取客户，故意夸大某只股票的投资价值，隐瞒已知的风险信息。该投资顾问的行为主要违背了职业道德中的（  ）原则。","c":{"A":"以义取利，珍惜声誉","B":"诚实守信，专业尽职","C":"稳健审慎，致力长远","D":"尊重包容，共同发展"},"a":"B","an":"选项B正确：诚实守信，专业尽职。从业人员应坚守契约精神，恪守信义义务，自觉保护投资者特别是中小投资者合法权益，充分履行尽职调查、适当性管理等职责，真实、准确、完整地披露相关信息，秉持工匠精神，发挥专业优势，服务实体经济发展，为客户提供优质服务，忠于所在机构，认真做好本职工作，自觉抵制弄虚作假、误导欺骗等行为，不玩忽职守，不逾越底线。 选项A错误：以义取利，珍惜声誉。从业人员应树立正确的义利观，坚持以人民为中心的价值取向，正确处理功能性和盈利性、整体利益和个体利益、客户利益和机构利益的关系，强化使命感、责任心，自觉维护国家利益和国家安全，遵守公序良俗，规范个人执业行为，珍视行业声誉与职业声誉，自觉践行社会责任，树立良好社会形象，不见利忘义，不唯利是图。 选项C错误：稳健审慎，致力长远。从业人员应树立正确的经营观、业绩观、风险观，把握好发展与安全、当前与长远的关系，稳中求进，审慎执业，积极学习借鉴有益经验，不断提高风险识别、应对和化解能力，主动履行风险报告义务，严防执业过程中因不当行为带来的各类业务风险，自觉抵制侥幸心理与短视行为，不盲目冒进，不急功近利。 选项D错误：尊重包容，共同发展。从业人员应恪守职业道德，规矩做事、踏实做人，尊重客户、合作伙伴、竞争对手及社会公众等利益相关方，不偏不倚，客观公正，尊重和包容不同的意见及文化、语言、专业等背景差异，共同营造没有歧视和偏见的行业发展环境，做有格局、有担当、令人尊重的从业人员。","type":"single"},{"id":"cy_fin_1473","q":"某证券公司员工小王希望注册成为保荐代表人。他拥有全面的证券专业知识，最近5年内有40个月从事财务管理工作的经历。根据规定，小王（  ）注册成为保荐代表人。","c":{"A":"可以，因为他的专业知识和业务经历都满足要求","B":"可以，因为他的业务经历时长超过了规定","C":"不可以，因为他的业务经历不属于保荐相关业务","D":"不可以，因为他没有持续12个月从事保荐相关业务"},"a":"C","an":"保荐代表人应熟练掌握证券业务专业知识，具备相应的专业能力。除了熟练掌握证券市场基本法律法规和金融市场基础知识外，保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备36个月以上保荐相关业务经历（财务经历不符合）、最近12个月持续从事保荐相关业务，最近12个月内未受到证券交易所等自律组织的重大纪律处分或者中国证监会的重大监管措施，最近36个月内未受到中国证监会的行政处罚。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_1475","q":"根据证券业从业人员执业行为准则，以下体现 “诚实守信、专业尽职” 要求的是（  ）。","c":{"A":"为冲业绩，向客户承诺保本保收益","B":"利用职务便利泄露客户隐私谋取私利","C":"严格履行尽职调查，如实披露产品风险","D":"因工作繁忙，简化客户风险测评流程"},"a":"C","an":"选项 A错误：承诺保本保收益属于 “弄虚作假、误导欺骗”，违反诚实守信原则。 选项 B错误：泄露客户隐私谋取私利，未 “保护投资者合法权益”，且违背职业道德，不符合诚实守信。 选项 C正确：“严格履行尽职调查，如实披露产品风险”，符合 “充分履行尽职调查、适当性管理等职责，真实、准确、完整地披露相关信息”，体现了专业尽职和诚实守信。 选项 D错误：简化风险测评流程属于 “玩忽职守”，未认真履行本职工作，违反专业尽职要求。  【知识详解】城实守信，专业尽职。从业人员应坚守契约精神，恪守信义义务，自觉保护投资者特别是中小投资者合法权益，充分履行尽职调查、适当性管理等职责，真实、准确、完整地披露相关信息，秉持工匠精神，发挥专业优势，服务实体经济发展，为客户提供优质服务，忠于所在机构，认真做好本职工作，自觉抵制弄虚作假、误导欺骗等行为，不玩忽职守，不逾越底线。","type":"single"},{"id":"cy_fin_1477","q":"证券评级机构可以向评级相关方提供以下哪项服务（  ）。","c":{"A":"信用评级服务","B":"咨询服务","C":"投资顾问服务","D":"财务顾问服务"},"a":"A","an":"选项A正确：证券评级机构只能提供信用评级服务。 选项BCD错误：证券评级机构及其评级从业人员不得有下列行为： （1）篡改评级相关资料或者歪曲评级结果； （2）以承诺分享投资收益或者分担投资损失、承诺或保证信用等级、低于合理成本价格竞争、诋毁同行等手段招揽业务； （3）以挂靠、外包等形式允许其他机构使用其名义开展证券评级业务； （4）与评级委托方、受评级机构、受评级证券发行人或者相关第三方存在不正当交易或者商业贿赂； （5）向评级委托方、受评级机构、受评级证券发行人或者相关第三方提供顾问或者咨询服务； （6）对评级委托方、受评级机构、受评级证券发行人或者相关第三方进行敲诈勒索； （7）违反证券评级业务规则，损害投资人、评级对象合法权益，损害资信评级业声誉的其他行为； （8）利用在开展证券评级业务时知悉的国家机密、商业秘密和个人隐私等非公开信息牟取利益或进行交易； （9）协会禁止的其他行为。","type":"single"},{"id":"cy_fin_1479","q":"保荐代表人甲出现下列（  ）情形，中国证监会可根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施。","c":{"A":"甲因保荐业务或者其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责","B":"甲因突发自然灾害未能及时参与辅导工作","C":"甲及其配偶持有发行人的股份","D":"甲受发行人与证券服务机构的误导，参与其提供存在虚假记载、误导性陈述或者重大遗漏的文件"},"a":"A","an":"选项A正确：保荐代表人出现下列情形之一的，中国证监会可以根据情节轻重，依法采取认定为不适当人选3个月到36个月的监管措施： ①尽职调查工作日志缺失或者遗漏、隐瞒重要问题； ②未完成或者未参加辅导工作； ③重大事项未报告、未披露； ④未参加持续督导工作，或者持续督导工作严重未勤勉尽责； ⑤因保荐业务或其具体负责保荐工作的发行人在保荐期间内受到证券交易所、中国证券业协会公开谴责； ⑥唆使、协助或者参与发行人干扰中国证监会、证券交易所及其上市委员会的审核工作； ⑦伪造或者变造签字、盖章； ⑧严重违反诚实守信、勤勉尽责、廉洁从业义务的其他情形。 选项B错误：突发自然灾害属于不可抗力因素，非主观过错，不构成监管处罚的情形。 选项C错误：保荐代表人及其配偶持有发行人股份的情形，情节严重时可能被认定为不适当人选或采取市场禁入措施 选项D错误：保荐代表人“唆使、协助或参与”发行人及证券服务机构提供虚假文件时才会被处罚。","type":"single"},{"id":"cy_fin_1481","q":"王某已通过国家统一法律职业资格考试，现拟从事证券业务，其关于参加一般业务水平评价测试的说法正确的是（  ）。","c":{"A":"必须参加全部科目的测试","B":"可以不参加证券市场基本法律法规测试","C":"可以不参加金融市场基础知识测试","D":"仍需参加全部测试，但可申请免培训"},"a":"B","an":"从业人员符合下列条件之一的，可以不参加一般业务水平评价测试的相应科目测试： ①通过国家法律职业资格考试的，可以不参加证券市场基本法律法规测试； ②通过中国证券投资基金业协会组织的证券投资基金基础知识考试、国家注册会计师资格考试、注册国际投资分析师(CIIA)资格考试、特许金融分析师(CFA)资格考试等考试之一，或者在国家有关部门、科研院所、高等教育机构等单位从事经济、金融研究或者管理相关工作8年以上的，可以不参加金融市场基础知识测试； ③中国证券业协会规定的其他条件。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1483","q":"证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间，本人、直系亲属持有评级委托方、受评级证券或者受评级机构发行的证券金额超过（）万元的，应当回避。","c":{"A":"20","B":"50","C":"100","D":"120"},"a":"B","an":"选项B正确：证券评级机构评级委员会委员及评级从业人员在开展证券评级业务期间，本人、直系亲属持有评级委托方、受评级证券或者受评级机构发行的证券金额超过【50万元】，或者与评级委托方、受评级机构、受评级证券发行人发生累计超过50万元的交易，应当回避。","type":"single"},{"id":"cy_fin_1485","q":"登记人员离职的，证券公司应当自劳动关系或者委托代理关系解除之日起（）个工作日内为其办理注销登记。","c":{"A":"5","B":"7","C":"10","D":"12"},"a":"A","an":"选项A正确：登记人员离职的，证券公司应当自劳动关系或者委托代理关系解除之日起【5个工作日】内为其办理注销登记。","type":"single"},{"id":"cy_fin_1487","q":"有关保荐代表人制作或者出具的文件不齐备或者不符合要求的，下列说法正确的是（）。","c":{"A":"中国证监会可以视情节轻重，采取出具警示函、责令改正、监管谈话等监管措施","B":"中国证监会可以视情节轻重，采取监管或者市场禁入措施","C":"情节严重的，中国证监会可以采取暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选3个月到12个月的监管措施","D":"情节严重的，中国证监会可以采取暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选6个月到24个月的监管措施"},"a":"A,C","an":"选项AC正确：出现下列情形之一的，中国证监会可以视情节轻重，对保荐机构、保荐代表人采取出具警示函、责令改正、监管谈话等监管措施（A正确）；情节严重的，中国证监会可以采取暂停保荐机构的保荐业务、依法认定保荐代表人为不适当人选3个月到12个月的监管措施（C正确）： （一）制作或者出具的文件不齐备或者不符合要求； （二）擅自改动申请文件、信息披露资料或者其他已提交文件； （三）申请文件或者信息披露资料存在相互矛盾或者同一事实表述不一致且有实质性差异； （四）文件披露的内容表述不清，逻辑混乱，严重影响投资者理解； （五）未及时报告或者未及时披露重大事项； （六）指定不符合《保荐办法》第四条规定要求的人员具体负责保荐工作； （七）未通过内核程序，以公司名义对外提交或披露保荐业务项目文件； （八）采取业务包干等承包方式或其他形式进行过度激励； （九）以显著低于行业定价水平等不正当竞争方式招揽业务，违反公平竞争、破坏市场秩序。 选项B错误：保荐代表人出现下列情形之一的，中国证监会可以依法采取认定为不适当人选的监管措施；情节严重的，对其采取证券市场禁入的措施： ①在与保荐工作相关文件上签字推荐发行人证券发行上市，但未参加尽职调查工作，或者尽职调查工作不彻底、不充分，明显不符合业务规则和行业规范； ②通过从事保荐业务谋取不正当利益； ③本人及其配偶以任何名义或者方式持有发行人的股份； ④唆使、协助或者参与发行人及证券服务机构提供存在虚假记载、误导性陈述或者重大遗漏的文件； ⑤参与组织编制的与保荐工作相关文件存在虚假记载、误导性陈述或者重大遗漏。 选项D错误：应为“认定保荐代表人为不适当人选3个月到12个月（并非6个月到24个月）的监管措施”","type":"multi"},{"id":"cy_fin_1489","q":"下列关于保荐代表人应具备的条件，说法正确的有（）。","c":{"A":"最近36个月内未受到中国证监会的行政处罚","B":"最近12个月内未受到证券交易所等自律组织的重大纪律处分或者中国证监会的重大监管措施","C":"最近5年内具备12个月以上保荐相关业务经历","D":"熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识"},"a":"A,B,D","an":"选项C错误：应为“最近5年内具备36个月以上（并非12个月）保荐相关业务经历”。 选项ABD正确：保荐代表人应当熟练掌握保荐业务相关的法律、会计、财务管理、税务、审计等专业知识，最近5年内具备36个月以上保荐相关业务经历、最近12个月持续从事保荐相关业务，最近12个月内未受到证券交易所等自律组织的重大纪律处分或者中国证监会的重大监管措施，最近36个月内未受到中国证监会的行政处罚。","type":"multi"},{"id":"cy_fin_1491","q":"甲为保荐代表人，其妻子为乙，下列说法错误的有 （  ）。","c":{"A":"甲必须为其具体负责的每一项目建立尽职调查工作日志","B":"乙可以间接持有发行人的股份","C":"如果甲因为未能勤勉尽责被更换的，保荐机构应在5个工作日内向证券业协会报告","D":"证券发行后，保荐机构在任何情况下不得更换甲"},"a":"B,C,D","an":"选项B说法错误：保荐机构及其关联方（包括保荐代表人的配偶）不得持有发行人股份。 选项CD说法错误：证券发行后，保荐机构不得更换保荐代表人，但因保荐代表人离职或者不符合保荐代表人要求的，应当更换保荐代表人。保荐机构更换保荐代表人的，应当通知发行人，并在5个工作日内向中国证监会、证券交易所报告，说明原因。原保荐代表人在具体负责保荐工作期间未勤勉尽责的，其责任不因保荐代表人的更换而免除或者终止。 选项A说法正确：保荐代表人必须为其具体负责的每一项目建立尽职调查工作日志，作为保荐工作底稿的一部分存档备查。","type":"multi"},{"id":"cy_fin_1493","q":"证券公司应当对金融产品营销人员进行必要的培训，保证其充分了解所负责推介金融产品的信息及与代销活动有关的公司内部管理规定和监管要求。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当对金融产品营销人员进行必要的培训，保证其充分了解所负责推介金融产品的信息及与代销活动有关的公司内部管理规定和监管要求。","type":"judge"},{"id":"cy_fin_1495","q":"证券评级机构可以轻微篡改评级资料以使结果更符合市场预期。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券评级机构及其评级从业人员不得有下列行为： （1）篡改评级相关资料或者歪曲评级结果； （2）以承诺分享投资收益或者分担投资损失、承诺或保证信用等级、低于合理成本价格竞争、诋毁同行等手段招揽业务； （3）以挂靠、外包等形式允许其他机构使用其名义开展证券评级业务； （4）与评级委托方、受评级机构、受评级证券发行人或者相关第三方存在不正当交易或者商业贿赂； （5）向评级委托方、受评级机构、受评级证券发行人或者相关第三方提供顾问或者咨询服务； （6）对评级委托方、受评级机构、受评级证券发行人或者相关第三方进行敲诈勒索； （7）违反证券评级业务规则，损害投资人、评级对象合法权益，损害资信评级业声誉的其他行为； （8）利用在开展证券评级业务时知悉的国家机密、商业秘密和个人隐私等非公开信息牟取利益或进行交易； （9）协会禁止的其他行为。","type":"judge"},{"id":"cy_fin_1497","q":"某证券公司为提升客户体验，设立了一项“资金归集”服务，将多个客户账户的闲置资金自动归集到一个总账户进行现金管理，该做法符合资金管理的原则。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当将投资者的证券和资金与自有财产分别管理，并采取措施保障投资者证券和资金的安全、完整。证券公司及其从业人员不得有下列行为： (1)将投资者的证券和资金归入自有财产、擅自划出投资者账户； (2)违规将投资者的证券和资金冻结、提供给他人使用或者为他人提供担保； (3)违规为投资者与投资者之间、投资者与他人之间的融资提供中介、担保或者其他便利和服务； (4)其他损害投资者证券和资金安全的行为。","type":"judge"},{"id":"cy_fin_1499","q":"我国证券市场法律法规体系的主要层级包括（  ）。","c":{"A":"法律、行政法规、部门规章三个层级","B":"法律、行政法规、部门规章、规范性文件、行业自律规则五个层级","C":"法律、行政法规、部门规章、规范性文件四个层级","D":"法律、行政法规、部门规章、规范性文件、行业自律规则、各组织机构规章制度六个层级"},"a":"B","an":"选项B正确：我国证券市场法律法规体系的主要层级包括五级：法律、行政法规、部门规章、规范性文件、行业自律规则。 选项ACD为干扰项","type":"single"},{"id":"cy_fin_1501","q":"下列各项中，属于证券市场行业自律规则的有（）。 I 中国银行业协会制定的自律规则 II 中国证券业协会制定的自律规则 III 证券交易所制定的自律规则 IV 中国证券登记结算有限责任公司制定的自律规则","c":{"A":"I、II、III、IV","B":"II、III、IV","C":"II、III","D":"I、IV"},"a":"B","an":"行业自律规则，是指由行业自律组织根据国家相关法律、行政法规、部门规章 、规范性文件及本组织的章程或相关文件制定的规则。 证券市场的行业自律规则等包括以下几类： 1.证券交易场所制定的自律规则。（III项正确） 2.中国证券业协会制定的自律规则。（II项正确） 3.中国证券登记结算有限责任公司制定的自律规则。（IV项正确） Ⅰ错误：中国银行业协会属于银行体系自律组织，不属于证券行业自律规则制定主体。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1503","q":"下列各项中，属于证券市场⾏业⾃律规则的有（  ）。","c":{"A":"中国银⾏业协会制定的⾃律规则","B":"中国证券业协会制定的⾃律规则","C":"证券交易所制定的⾃律规则","D":"中国证券登记结算有限责任公司制定的⾃律规则"},"a":"B,C,D","an":"选项BCD正确：证券市场的行业自律规则等包括以下几类： 1.证券交易场所制定的自律规则 2.中国证券业协会制定的自律规则 3.中国证券登记结算有限责任公司(以下简称“中国结算”)制定的自律规则 选项A错误：中国银行业协会属于银行业自律组织，其制定的规则不涉及证券市场自律管理范畴。","type":"multi"},{"id":"cy_fin_1505","q":"我国证券市场法律法规体系主要层级依次为“法律「、“行政法规「、“部门规章”、“规范性文件「、“行业自律规则“五级「。()","c":{"1":"对","0":"错"},"a":"1","an":"我国证券市场法律法规体系的主要层级包括五级。(一)法律；(二)行政法规；(三)部门规章；(四)规范性文件；(五)行业自律规则。","type":"judge"},{"id":"cy_fin_1507","q":"根据《证券法》，向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的（）组成。","c":{"A":"会计师事务所","B":"证券公司","C":"信用评级机构","D":"律师事务所"},"a":"B","an":"选项B正确：向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的【证券公司】组成。 选项ACD错误：中介机构仅提供辅助服务（如审计、评级等）","type":"single"},{"id":"cy_fin_1509","q":"证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式是（）。","c":{"A":"代销","B":"包销","C":"余额包销","D":"承销"},"a":"A","an":"选项A正确：证券代销是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式。 选项B错误：证券包销是指证券公司将发行人的证券按照协议全部购入，或者在承销期结束时将售后剩余证券全部自行购入的承销方式。 选项C错误：余额包销是证券包销的一种。 选项D错误：承销是证券发行人委托具有证券销售资格的金融机构，按照协议由金融机构向投资者募集资金并交付证券的行为。","type":"single"},{"id":"cy_fin_1511","q":"证券的包销、代销期限最长不超过（  ）。","c":{"A":"180日","B":"90日","C":"60日","D":"360日"},"a":"B","an":"选项B正确：证券的代销、包销期限最长不得超过90日。","type":"single"},{"id":"cy_fin_1513","q":"下列不属于操纵市场⾏为的是 （  ）。","c":{"A":"通过合谋或者集中资⾦操纵证券市场价格","B":"以自己的不同账户在相同的时间内进⾏价格和数量相近、方向相反的交易","C":"以散布谣⾔，传播虚假信息等⼿段影响证券发⾏、交易","D":"根据内幕消息买卖证券或者暗示他⼈买卖证券"},"a":"D","an":"选项D不属于：属于内幕交易行为。 选项ABC属于：禁止任何人以下列手段操纵证券市场，影响或者意图影响证券交易价格或者证券交易量： (1)单独或者通过合谋，集中资金优势、持股优势或者利用信息优势联合或者连续买卖； (2)与他人串通，以事先约定的时间、价格和方式相互进行证券交易； (3)在自己实际控制的账户之间进行证券交易； (4)不以成交为目的，频繁或者大量申报并撤销申报； (5)利用虚假或者不确定的重大信息，诱导投资者进行证券交易； (6)对证券、发行人公开作出评价、预测或者投资建议，并进行反向证券交易； (7)利用在其他相关市场的活动操纵证券市场； (8)操纵证券市场的其他手段。","type":"single"},{"id":"cy_fin_1515","q":"持有公司（  ）以上的股东为内幕信息知情人。","c":{"A":"0.01","B":"0.05","C":"0.1","D":"0.03"},"a":"B","an":"证券交易内幕信息的知情人包括: (1)发行人及其董事、监事、高级管理人员; (2)持有公司5%以上股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员; (3)发行人控股或者实际控制的公司及其董事、监事、高级管理人员; (4)由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员; (5上市公司收购人或者重大资产交易方及其控股股东、实际控制人、董事、监事和高级管理人员; (6)因职务、工作可以获取内幕信息的证券交易场所、证券公司、证券登记结算机构、证券服务机构的有关人员; (7)因职责、工作可以获取内幕信息的证券监督管理机构工作人员; (8)因法定职责对证券的发行、交易或者对上市公司及其收购、重大资产交易进行管理可以获取内幕信息的有关主管部门、监管机构的工作人员; (9)国务院证券监督管理机构规定的可以获取内幕信息的其他人员。","type":"single"},{"id":"cy_fin_1517","q":"我国《证券法》规定，持有公司（  ）以上股份的股东为知悉证券交易内幕信息的知情人员。","c":{"A":"0.1","B":"0.2","C":"0.03","D":"0.05"},"a":"D","an":"证券交易内幕信息的知情人包括： (1)发行人及其董事、监事、高级管理人员； (2)持有公司5%以上股份的股东（D）及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员； (3)发行人控股或者实际控制的公司及其董事、监事、高级管理人员； (4)由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员； (5)上市公司收购人或者重大资产交易方及其控股股东、实际控制人、董事、监事和高级管理人员； (6)因职务、工作可以获取内幕信息的证券交易场所、证券公司、证券登记结算机构、证券服务机构的有关人员； (7)因职责、工作可以获取内幕信息的证券监督管理机构工作人员； (8)因法定职责对证券的发行、交易或者对上市公司及其收购、重大资产交易进行管理可以获取内幕信息的有关主管部门、监管机构的工作人员； (9)国务院证券监督管理机构规定的可以获取内幕信息的其他人员。 综上，该题选D。","type":"single"},{"id":"cy_fin_1519","q":"根据《证券法》，下列关于投资者保护的说法错误的是（）。","c":{"A":"投资者与发行人、证券公司等发生纠纷的，双方可以向投资者保护机构申请调解","B":"普通投资者与证券公司发生证券业务纠纷，普通投资者提出调解请求的，证券公司可以拒绝","C":"普通投资者与证券公司发生纠纷的，证券公司应当证明其行为符合法律、行政法规以及国务院证券监督管理机构的现定,不存在误导、欺诈等情形","D":"根据财产状况、金融资产状况、投资知识和经验、专业能力等因素，投资者可以分为普通投资者和专业投资者"},"a":"B","an":"B项说法错误，普通投资者与证券公司发生证券业务纠纷，普通投资者提出调解请求的，证券公司【不得拒绝】。","type":"single"},{"id":"cy_fin_1521","q":"根据《证券法》，证券公司将发行人的证券按照协议全部购入的承销方式是（）。","c":{"A":"自行销售","B":"承销","C":"代销","D":"包销"},"a":"D","an":"A项，自行销售是指发行人自己直接将股票销售给认购者，而不是由证券经营机构承销。 B项，承销是证券发行人委托具有证券销售资格的金融机构，按照协议由金融机构向投资者募集资金并交付证券的行为。 C项，证券代销，是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式。 D项，证券【包销】，是指证券公司将发行人的证券按照协议全部购入，或者在承销期结束时将售后剩余证券全部自行购入的承销方式。","type":"single"},{"id":"cy_fin_1523","q":"根据《证券法》，下列关于证券公司承销证券的说法错误的是（）。","c":{"A":"证券公司承销证券，发现公开发行募集文件有虚假记载、误导性陈述或者重大遗漏的，不得进行销售活动","B":"证券公司承销证券，发现公开发行募集文件有虚假记载、误导性陈述或者重大遗漏，已经销售的，必须立即停止销售活动，并采取纠正措施","C":"证券公司承销证券违反该法规定的，责令改正，给予警告，没收违法所得，应当并处法定数额罚款","D":"证券公司承销证券，应当对公开发行募集文件的真实性、准确性、完整性进行核查"},"a":"C","an":"A项正确，发现有虚假记载、误导性陈述或者重大遗漏的，不得进行销售活动。 B项正确，已经销售的，必须立即停止销售活动，并采取纠正措施。  C项错误，证券公司承销证券违反该法规定的，责令改正，给予警告，没收违法所得，可以（并非应当）并处法定数额罚款。证券公司有上述所列行为，给其他证券承销机构或者投资者造成损失的，应当依法承担赔偿责任。 D项正确，证券公司承销证券，应当对公开发行募集文件的真实性、准确性、完整性进行核查。","type":"single"},{"id":"cy_fin_1525","q":"根据《证券法》，下列关于证券登记结算机构职能的说法，错误的是（）。","c":{"A":"证券交易的清算和交收","B":"证券账户、结算账户的设立","C":"受投资者的委托派发证券权益","D":"证券的存管和过户"},"a":"C","an":"证券登记结算机构应履行下列职能∶  1.证券账户、结算账户的设立;  2.证券的存管和过户;  3.证券持有人名册登记;  4.证券交易的清算和交收;  5.受【发行人】的委托派发证券权益; （C项错误） 6.办理与上述业务有关的查询、信息服务;  7.国务院证券监督管理机构批准的其他业务","type":"single"},{"id":"cy_fin_1527","q":"下列关于证券登记结算机构设立条件的说法，正确的有（）。 Ⅰ 自有资金不少于人民币2亿元 Ⅱ 具有证券登记和结算服务所必需的场所和设施 Ⅲ 具有证券交易服务所必需的场所和设施 Ⅳ 具有证券存管所必需的场所和设施","c":{"A":"Ⅰ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"B","an":"设立证券登记结算机构，应当具备下列条件： 1.自有资金不少于人民币2亿元；（Ⅰ项正确） 2.具有证券登记、存管和结算服务所必需的场所和设施；（Ⅱ、Ⅳ两项正确） 3.国务院证券监督管理机构规定的其他条件。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1529","q":"根据《证券法》，下列属于证券交易内幕信息的知情人的有（）。 I 发行人控股的公司及其董事、监事、高级管理人员 II 发行人的董事、监事、高级管理人员 III 因职责、工作可以获取内幕信息的证券监督管理机构工作人员 IV 持有公司百分之三股份的股东","c":{"A":"I、IV","B":"I、II、III、IV","C":"II、III、IV","D":"I、II、III"},"a":"D","an":"证券交易内幕信息的知情人包括： (1) 发行人及其董事、监 事 、高级管理人员 (2) 持有公司【5%以上】股份的股东及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事 、高级管理人员；（IV项错误） (3) 发行人控股或者实际控制的公司及其董事、监事、高级管理人员；（I、II两项正确） (4) 由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员； (5) 上市公司收购人或者重大资产交易方及其控股股东、实际控制人、董事、监事和高级管理人员； (6) 因职务、工作可以获取内幕信息的证券交易场所、证券公司、证券登记结算机构、证券服务机构的有关人员； (7) 因职责、工作可以获取内幕信息的证券监督管理机构工作人员；（III项正确） (8) 因法定职责对证券的发行、交易或者对上市公司及其收购、重大资产交易进行管理可以获取内幕信息的有关主管部门、监管机构的工作人员； (9) 国务院证券监督管理机构规定的可以获取内幕信息的其他人员。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_1531","q":"关于股份有限公司的股票交易，依据《证券法》，以下属于内幕信息知情人的有（  ）。","c":{"A":"赵某，股份有限公司的董事","B":"钱某，持有公司3%股份的股东","C":"孙某，证监会工作人员，对公司股票的发行、交易进行管理","D":"李某，股份有限公司会计，可获取少量内幕信息"},"a":"A,C,D","an":"证券交易内幕信息的知情人包括： 1、发行人及其董事（A正确）、监事、高级管理人员； 2、持有公司5%以上股份的股东（3%不满足标准，B错误）及其董事、监事、高级管理人员，公司的实际控制人及其董事、监事、高级管理人员； 3、发行人控股或者实际控制的公司及其董事、监事、高级管理人员； 4、由于所任公司职务或者因与公司业务往来可以获取公司有关内幕信息的人员； 5、上市公司收购人或者重大资产交易方及其控股股东、实际控制人、董事、监事和高级管理人员； 6、因职务、工作可以获取内幕信息的证券交易场所、证券公司、证券登记结算机构、证券服务机构的有关人员（D正确）； 7、因职责、工作可以获取内幕信息的证券监督管理机构工作人员； 8、因法定职责对证券的发行、交易或者对上市公司及其收购、重大资产交易进行管理可以获取内幕信息的有关主管部门、监管机构的工作人员（C正确）； 9、国务院证券监督管理机构规定的可以获取内幕信息的其他人员。 综上，该题选ACD。","type":"multi"},{"id":"cy_fin_1533","q":"证券公司承销证券，同发行人签订的证券代销协议必备的条款包括（  ）。","c":{"A":"代销证券的发行价格","B":"代销的期限及起止日期","C":"代销证券的种类、数量","D":"代销证券的金额"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司承销证券，应当同发行人签订代销或者包销协议，载明下列事项： （1）当事人的名称、住所及法定代表人姓名。 （2）代销、包销证券的种类、数量、金额及发行价格（ACD）。 （3）代销、包销的期限及起止日期（B）。 （4）代销、包销的付款方式及日期。 （5）代销、包销的费用和结算办法。 （6）违约责任。 （7）国务院证券监督管理机构规定的其他事项。","type":"multi"},{"id":"cy_fin_1535","q":"证券代销包括证券公司将发行人的证券按照协议全部购入的承销方式或者在承销期结束时将售后剩余证券全部自行购入的承销方式。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券代销，是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式。 证券包销，是指证券公司将发行人的证券按照协议全部购入，或者在承销期结束时将售后剩余证券全部自行购入的承销方式。","type":"judge"},{"id":"cy_fin_1537","q":"发行人向不特定对象发行证券的，应当聘请承销团承销，承销团成员由主承销商和参与承销的证券公司组成。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的证券公司组成。 但法律并未规定所有向不特定对象发行的证券都必须采用承销团方式，发行人也可以选择单一证券公司承销。","type":"judge"},{"id":"cy_fin_1539","q":"证券公司应当采取有效措施确保在柜台市场交易的私募产品持有人数量符合相关规定，其中，非公开募集基金的合格投资者累计不得超过（  ）人。","c":{"A":"150","B":"100","C":"300","D":"200"},"a":"D","an":"选项D正确：非公开募集基金应当向合格投资者募集，合格投资者累计不得超过200人，不得向合格投资者之外的单位和个人募集资金。","type":"single"},{"id":"cy_fin_1541","q":"根据《证券公司风险处置条例》，下列关于国务院证券监管管理机构在处置证券公司风险工作中应履行的职责，正确的是（）。","c":{"A":"及时向公安机构等通报涉嫌证券违规的情况，按照有关规则移送违规的案件","B":"派驻纪检工作组，对被处置证券公司，托管组，接管组，行政清理组，管理人以及参与风险处置的其他机构和人员进行监督和指导","C":"协调证券交易所，证券登记结算机构，证券投资者保护基金管理机构，保障被处置证券公司各项证券业务正常进行","D":"向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况"},"a":"D","an":"国务院证券监督管理机构在处置证券公司风险工作中，履行下列职责：  (1)制订证券公司风险处置方案并组织实施； (2)派驻风险处置现场工作组（B错误），对被处置证券公司、托管组、接管组、行政清理组、管理人以及参与风险处置的其他机构和人员进行监督和指导； (3)协调证券交易所、证券登记结算机构、证券投资者保护基金管理机构，保障被处置证券公司证券经纪业务正常进行；（而不是“各项业务”，C错误） (4)对证券公司的违法行为立案稽查并予以处罚； (5)及时向公安机关等通报涉嫌刑事犯罪的情况，按照有关规定移送涉嫌犯罪的案件；（A错误） (6)向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况；（D正确） (7)法律、行政法规要求履行的其他职责。","type":"single"},{"id":"cy_fin_1543","q":"根据《证券公司风险处置条例》，证券公司风险处置过程中有关监督协调工作的说法，正确的有（）。","c":{"A":"证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金","B":"被处置证券公司以及其分支机构所在地证监局，应当组织相关单位的人员成立个人债权甄别确认小组，按照国家规定对已登记的个人债权进行甄别确认","C":"采取风险处置措施期间，除为保护客户和债权人利益的情形外，不得对被处置证券公司债务进行个别清偿","D":"风险处置现场工作组、行政清理组和管理人需要从公安机关扣押资料中查询、复制与其工作有关资料的，公安机关应当支持和配合"},"a":"A,C,D","an":"选项A正确：证券投资者保护基金管理机构应当按照国家规定，收购债权、弥补客户的交易结算资金。 选项C正确：采取风险处置措施期间，除为保护客户和债权人利益的情形外，不得对被处置证券公司债务进行个别清偿。 选项D正确：风险处置现场工作组、行政清理组和管理人需要从公安机关扣押资料中查询、复制与其工作有关资料的，公安机关应当支持和配合。 选项B错误：被处置证券公司以及其分支机构所在地人民政府（并非证监局），组织相关单位的人员成立个人债权甄别确认小组，按照国家规定对已登记的个人债权进行甄别确认。 综上所述，本题选ACD。","type":"multi"},{"id":"cy_fin_1545","q":"证券公司分类监管评价设定正常经营的证券公司基准分为（）。","c":{"A":"120分","B":"100分","C":"90分","D":"60分"},"a":"B","an":"证券公司分类监管评价首先设定正常经营的证券公司基准分为【100分】。","type":"single"},{"id":"cy_fin_1547","q":"下列关于证券公司对敏感信息采取保密措施的说法，正确的有（）。 I 与证券公司工作人员签署保密文件，要求工作人员对工作中获取的敏感信息严格保密 II 加强对涉及敏感信息的信息系统、通讯及办公自动化等信息设施、设备的管理，保障敏感信息安全 III 对可能知悉敏感信息的工作人员使用公司的信息系统或配发的设备形成的电子邮件、即时通讯信息和其他通讯信息进行监测 IV 建立内幕信息知情人管理制度","c":{"A":"I、II、IV","B":"I、II、III、IV","C":"II、IV","D":"I、III、IV"},"a":"B","an":"证券公司应当采取保密措施，防止敏感信息的不当流动和使用，包括但不限于： (1)与公司工作人员签署保密文件，要求工作人员对工作中获取的敏感信息严格保密；（I项正确）  (2)加强对涉及敏感信息的信息系统、通讯及办公自动化等信息设施、设备的管理，保障敏感信息安全；（II项正确）  (3)对可能知悉敏感信息的工作人员使用公司的信息系统或配发的设备形成的电子邮件、即时通讯信息和其他通讯信息进行监测；（III项正确）  (4)建立内幕信息知情人管理制度。（IV项正确） 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1549","q":"在发生下列（）情形时，证券公司应当进行合规事项专项检查。","c":{"A":"公司发生违法违规行为的","B":"公司监事会认为必要的","C":"监管部门或自律组织要求的","D":"公司业务部门认为需要的"},"a":"A,B,C","an":"发生下列情形时，证券公司应当进行专项检查： 1.公司发生违法违规行为（A）或存在合规风险隐患的； 2.公司董事会、监事会（B）、高级管理人员、合规负责人或合规部门认为必要的（不包括业务部门，D错误）； 3.公司下属各单位及其工作人员配合监管和稽查办案不力的； 4.监管部门或自律组织要求的（C）； 5.其他有必要进行专项检查的情形。 综上所述，本题选ABC。","type":"multi"},{"id":"cy_fin_1551","q":"证券公司应当采取保密措施，防止敏感信息的不当流动和使用，相关措施包括（）。","c":{"A":"与公司工作人员签署保密文件，要求工作人员对工作中获取的敏感信息严格保密","B":"对可能知悉敏感信息的工作人员使用公司的信息系统或配发的设备形成的电子邮件、即时通信信息和其他通信信息进行监测","C":"加强对涉及敏感信息的信息系统、通讯及办公自动化等信息设施、设备的管理，保障敏感信息安全","D":"建立内幕信息知情人管理制度"},"a":"A,B,C,D","an":"证券公司应当采取保密措施，防止敏感信息的不当流动和使用，包括但不限于： （1）与公司工作人员签署保密文件，要求工作人员对工作中获取的敏感信息严格保密（A正确）；  （2）加强对涉及敏感信息的信息系统、通讯及办公自动化等信息设施、设备的管理，保障敏感信息安全（C正确）；  （3）对可能知悉敏感信息的工作人员使用公司的信息系统或配发的设备形成的电子邮件、即时通信信息和其他通信信息进行监测（B正确）；  （4）建立内幕信息知情人管理制度（D正确）。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_fin_1553","q":"证券公司防范敏感信息的不当流动和使用，可以在公开侧业务之间或保密侧业务之间采取的措施包括（  ）。","c":{"A":"信息隔离","B":"限制名单","C":"观察名单","D":"跨墙"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司可以根据公司实际需要，在公开侧业务之间或保密侧业务之间采取信息隔离、跨墙、观察名单、限制名单等措施，防范敏感信息的不当流动和使用。","type":"multi"},{"id":"cy_fin_1555","q":"证券公司应当实行双人负责制的岗位包括（  ）。","c":{"A":"与资金直接接触的岗位","B":"与业务合同直接接触","C":"与印章直接接触的岗位","D":"涉及信息系统安全的"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应建立清晰合理的组织结构，依据所处环境和自身经营特点设立严密有效的三道业务监控防线。其中，建立重要一线岗位双人、双职、双责为基础的第一道防线，并加强对单人单岗业务的监控。与资金、有价证券、重要空白凭证、业务合同、印章（ABC）等直接接触的岗位和涉及信息系统安全的岗位（D），应当实行双人负责制。","type":"multi"},{"id":"cy_fin_1557","q":"下列关于证券公司合规管理的说法，错误的有（  ）。","c":{"A":"证券公司首次开展行业已有可借鉴先例的业务，不需要进行新产品、新业务的评估与决策","B":"经过合规负责人审核的材料，其他相关高级管理人员不需再对其中的内容负责","C":"合规负责人发现公司存在合规风险隐患的，应依照公司章程及时向董事会、经营管理主要负责人报告，提出处理意见，并督促整改","D":"合规负责人直接向总经理办公会负责"},"a":"A,B,D","an":"题目问的是”说法错误的“。 选项A错误：证券公司应当建立新产品、新业务评估与决策机制，合规负责人和合规部门应当对新产品、新业务发表合规审查意见，证券公司在进行相关决策时，应当充分考虑和采纳合规审查意见（并非行业有先例，则可不进行评估与决策）。 选项B错误：中国证监会及其派出机构、自律组织要求对证券公司报送的申请材料或报告进行合规审查的，合规负责人应当审查，并在该申请材料或报告上签署合规审查意见。其他相关高级管理人员等应当对申请材料或报告中基本事实和业务数据的真实性、准确性及完整性负责。 选项D错误：合规负责人是高级管理人员，直接向董事会（并非总经理办公会）负责。 选项C正确：合规负责人发现证券公司存在违法违规行为或合规风险隐患的，应当依照公司章程规定及时向董事会、经营管理主要负责人报告，提出处理意见，并督促整改。 故本题选ABD项。","type":"multi"},{"id":"cy_fin_1559","q":"公开侧业务的工作人员被动接触到保密侧业务的内幕信息，无须履行跨墙审批程序。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司公开侧业务的工作人员需参与保密侧业务并接触内幕信息的，或公开侧业务的工作人员被动接触到保密侧业务的内幕信息的，应当履行跨墙审批程序。","type":"judge"},{"id":"cy_fin_1561","q":"证券公司分类监管评价设定正常经营的证券公司基准分为90分。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司分类评价首先设定正常经营的证券公司基准分为100分。","type":"judge"},{"id":"cy_fin_1563","q":"根据《证券期货投资者适当性管理办法》，下列不属于专业投资者的是（）。","c":{"A":"财务公司","B":"经行业协会备案的私募基金管理人","C":"证券公司的员工","D":"期货公司子公司"},"a":"C","an":"依据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。 第一类是专业机构投资者，即经有关金融监管部门批准设立的金融机构（ABD项属于）、金融机构发行的理财产品以及经监管部门批准设立的养老基金、社会公益基金、合格境外机构投资者（QFII）、人民币合格境外机构投资者（RQFII）等。 第二类是符合一定条件的专业投资者，即符合一定资产、财务规模并且具备一定投资知识和经验的投资者。此类投资者需提供相关证明材料，经经营机构核验属实的可以直接认定为专业投资者。 第三类属于普通投资者自愿申请转化的专业投资者，在其资产、财务规模以及投资知识和经验符合一定要求的前提下，经营机构有权自主决定是否同意其转化。  选项C不属于：员工身份本身不直接赋予专业投资者资格，除非其满足专业投资者的个人条件。","type":"single"},{"id":"cy_fin_1565","q":"根据《证券期货投资者适当性管理办法》，产品或服务存在下列（）因素的，经营机构应当审慎评估其风险等级。","c":{"A":"产品或者服务的可理解性，因结构单一、易估值等因素导致普通人简单化理解其条款和特征的产品或者服务","B":"存在收益损失的可能性，因杠杆交易等因素容易导致收益大部分或者全部损失的产品或者服务","C":"产品或者服务的募集方式，涉及面广、影响力大的公募产品或者相关服务","D":"自律组织认定的中风险产品或者服务"},"a":"C","an":"产品或者服务存在下列因素的，应当审慎评估其风险等级： (1)存在本金损失的可能性，因杠杆交易等因素容易导致本金大部分或者全部损失的产品或者服务；【B项错误】 (2)产品或者服务的流动变现能力，因无公开交易市场、参与投资者少等因素导致难以在短期内以合理价格顺利变现的产品或者服务； (3)产品或者服务的可理解性，因结构复杂、不易估值等因素导致普通人难以理解其条款和特征的产品或者服务；【A项错误】 (4)产品或者服务的募集方式，涉及面广、影响力大的公募产品或者相关服务；【C项正确】 (5)产品或者服务的跨境因素，存在市场差异、适用境外法律等情形的跨境发行或者交易的产品或者服务；  (6)自律组织认定的高风险产品或者服务；【D项错误】 (7)其他有可能构成投资风险的因素。","type":"single"},{"id":"cy_fin_1567","q":"证券经营机构应当按照有效维护投资者合法权益的要求，综合考虑收入来源、资产状况、（）等因素，确定普通投资者的风险承受能力，对其进行细化分类和管理。","c":{"A":"债务、投资知识和经验、风险偏好、诚信状况","B":"债务、投资知识和经验、社会资源、诚信状况","C":"投资知识和经验、风险偏好、兴趣爱好","D":"债务、投资知识和经验、社会资源"},"a":"A","an":"选项A正确：证券经营机构应当按照有效维护投资者合法权益的要求，综合考虑收入来源、资产状况、债务、投资知识和经验、风险偏好、诚信状况等因素，确定普通投资者的风险承受能力，对其进行细化分类和管理。 选项BCD错误：干扰项。“社会资源”（如人脉、关系网络）与投资者的风险承受能力无直接关联。风险评估聚焦于财务实力、投资能力等客观要素，而非个人社会关系。“兴趣爱好”（如旅游、艺术等）属于个人生活偏好，不影响财务状况或风险认知能力。","type":"single"},{"id":"cy_fin_1569","q":"证券公司向普通投资者销售产品前，应当告知的信息不包括（  ）。","c":{"A":"可能直接导致超过原始本金损失的事项","B":"就产品收益提供的确定性判断","C":"限制销售对象权利行使期限或者可解除合同期限等全部限制内容","D":"可能直接导致本金亏损的事项"},"a":"B","an":"题目问的是“不包括”。 选项B错误：经营机构不得向投资者就不确定事项提供确定性判断。 选项ACD正确：经营机构向普通投资者销售产品或者提供服务前，应当告知下列信息： 1、可能直接导致本金亏损的事项； 2、可能直接导致超过原始本金损失的事项； 3、因经营机构的业务或者财产状况变化，可能导致本金或者原始本金亏损的事项； 4、因经营机构的业务或者财产状况变化，影响客户判断的重要事由； 5、限制销售对象权利行使期限或者可解除合同期限等全部限制内容； 6、适当性匹配意见。 综上，该题选B。","type":"single"},{"id":"cy_fin_1571","q":"根据《证券期货投资者适当性管理办法》，下列关于经营机构从业人员违反适当性管理规定被证监会及其派出机构采取监管措施的说法，错误的是（）。","c":{"A":"未按规定进行投资 者类别转化的，对其他直接责任人给予警告，并处以3万元以下的罚款","B":"违反适当性规定的，可对经营机构直接负责的主管人员和其他直接责任人员采取责令改正等监管措施","C":"未按规定建立投资者评估数据库的，对直接负责的主管人员处以3万元以上的罚款","D":"情节严重的，可依法采取市场禁入的措施"},"a":"C","an":"C项说法错误，未建立或者更新投资者评估数据库的；对直接负责的主管人员和其他直接责任人员，给予警告，并处以【3万元以下】罚款。","type":"single"},{"id":"cy_fin_1573","q":"关于证券公司在销售产品或者提供服务过程中的责任，下列说法正确的有（）。","c":{"A":"将适当的产品或者服务销售或者提供给适合的投资者","B":"全面了解投资者情况，深入调查分析产品或者服务信息","C":"勤勉尽责，审慎履职","D":"对违法违规行为承担法律责任"},"a":"A,B,C,D","an":"《证券期货投资者适当性管理办法》要求经营机构在向投资者销售证券期货产品或者提供证券期货服务的过程中，应当遵守法律法规及其他有关规定，勤勉尽责，审慎履职（C正确），全面了解投资者情况，深入调查分析产品或者服务信息（B正确），科学有效评估，充分揭示风险，基于投资者的不同风险承受能力以及产品或者服务的不同风险等级等因素，提出明确的适当性匹配意见，将适当的产品或者服务销售或者提供给适合的投资者（A正确），并对违法违规行为承担法律责任（D正确）。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_fin_1575","q":"投资者适当性管理中，需要了解的客户信息范围均包括基本信息、财务状况、投资经验，也包括投资目标、投资知识。（）","c":{"1":"对","0":"错"},"a":"1","an":"需要了解的客户信息范围包括：基本信息、财务状况、投资目标、投资知识、投资经验。","type":"judge"},{"id":"cy_fin_1577","q":"证券经营机构向普通投资者销售高风险产品或提供相关服务，且在营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构向普通投资者销售高风险产品或提供相关服务，且在营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像。","type":"judge"},{"id":"cy_fin_1579","q":"下列关于境外有关部门以涉及恐怖活动为由要求证券公司提供协助时的做法，正确的有（）。","c":{"A":"证券公司可以自行决定是否提供协助","B":"证券公司可以直接提供客户身份信息及交易信息","C":"证券公司不得自行采取冻结措施","D":"证券公司应当告知对方通过外交途径或者司法协助途径提出请求"},"a":"C,D","an":"境外有关部门以涉及恐怖活动为由，要求证券公司冻结相关资产、提供客户身份信息及交易信息的，证券公司应当告知对方通过外交途径或者司法协助途径提出请求（D正确，并非自行决定，A错误）；不得擅自采取冻结措施（C正确），不得擅自提供客户身份信息及交易信息（B错误）。 综上所述，本题选CD。","type":"multi"},{"id":"cy_fin_1581","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为（）。","c":{"A":"不低于每半年一次","B":"不低于每五年一次","C":"不低于每三年一次","D":"不低于每一年一次"},"a":"C","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计、频率不低于【每3年一次】；未能有效实施信息技术管理被采取行政处罚措施、监管措施或者自律管理措施的，应当在3个月内完成对有关事项的专项审计。","type":"single"},{"id":"cy_fin_1583","q":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率为不低于每两年一次。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于3年（并非每两年）一次。","type":"judge"},{"id":"cy_fin_1585","q":"某个人投资者要参加上交所科创板股票交易，要求具备的条件不包括（）。","c":{"A":"申请权限开通前20个交易日证券账户的资产日均不低于人民币50万元","B":"申请权限开通前20个交易日资金账户的金额日均不低于人民币50万元","C":"参与证券交易24个月以上","D":"具有6个月以上的证券交易经验"},"a":"D","an":"上交所公布《上海证券交易所科创板股票交易特别规定》，明确投资者参与科创板股票交易的具体条件： 个人投资者申请权限开通前20个交易日证券账户及资金账户内的资产日均不低于人民币50万元（AB），并且参与证券交易24个月以上（C）；符合法律法规及上交所规定的机构投资者可直接申请开通科创板股票交易权限。 综上，该题选D。","type":"single"},{"id":"cy_fin_1587","q":"证券公司经纪业务涉及的主要部门规章及规范性文件包括（）。 I 《客户交易结算资金管理办法》 II 《证券登记结算管理办法》 III 《证券公司开立客户账户规范》 IV 《企业会计准则》","c":{"A":"II、III","B":"I、II、III","C":"I、II、III、IV","D":"I、III、IV"},"a":"B","an":"证券公司经纪业务涉及的主要部门规章及规范性文件包括：  《客户交易结算资金管理办法》（I项正确）  《证券登记结算管理办法》（II项正确） 《关于加强证券经纪业务管理的规定》 《证券经纪人管理暂行规定》 《中国证券业协会证券经纪人执业规范(试行)》 《证券公司开立客户账户规范》（III项正确） 《中国证券登记结算有限责任公司证券账户管理规则》 《中国证券登记结算有限责任公司证券账户非现场开户实施细则》 《内地与香港股票市场交易互联互通机制若干规定》 IV项错误：《企业会计准则》属于会计法律法规，故不符合题意。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1589","q":"证券公司应当建立健全投资者回访制度，为回访提供充分的人力与物质保障，不得委托第三方实施回访。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司可以（并非不得）委托第三方专业机构实施回访，但法律责任仍由证券公司承担。","type":"judge"},{"id":"cy_fin_1591","q":"证券公司可以委托第三方机构对客户进行回访，相关回访结果的真实性、准确性、完整性由证券公司与受托第三方机构共同承担责任。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司可以委托第三方专业机构实施回访，但法律责任仍由证券公司承担。","type":"judge"},{"id":"cy_fin_1593","q":"经营机构发布证券研究报告，应当遵循独立、客观、公平、审慎原则，关于独立性原则，以下说法错误的是（）。","c":{"A":"经营机构应当从组织设置，人员职责上，将证券研究报告制作发布业务与销售服务业务分开管理","B":"除相关销售服务人员外，其他人不得在证券研究报告发布前影响证券研究报告的发布时间","C":"制作发布证券研究报告的相关人员，应当独立于证券研究报告相关销售服务人员","D":"经营机构应当采取有效措施，保证制作发布证券研究报告不受上市公司、基金管理公司等利益相关者的干涉和影响"},"a":"B","an":"A项正确，经营机构应当维护证券研究报告制作发布的独立性，从组织设置、人员职责上，将证券研究报告制作发布业务与销售服务业务分开管理。 B项错误，证券研究报告相关销售服务人员不得在证券研究报告发布前干涉和影响证券研究报告的制作过程、研究观点和发布时间。 C项正确，制作发布证券研究报告的相关人员，应当独立于证券研究报告相关销售服务人员。 D项正确，经营机构应当采取有效措施，保证制作发布证券研究报告不受利益相关者的干涉和影响。","type":"single"},{"id":"cy_fin_1595","q":"证券投资顾问在为客户提供证券投资顾问服务过程中，应当符合的要求包括（  ）。","c":{"A":"规范参与媒体证券节目","B":"相比客户的利益要更加重视公司及关联方的利益","C":"提供适当的投资建议服务","D":"提供投资建议应具有合理依据"},"a":"A,C,D","an":"证券投资顾问执业行为准则： 1.忠实客户利益。证券投资顾问不得为公司及其关联方的利益损害客户利益（B错误）；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。 2.提供适当的投资建议服务（C正确） 3.提供投资建议应具有合理依据（D正确） 4.规范参与媒体证券节目（A正确） 5.禁止行为。证券投资顾问不得从事下列活动： (1)以任何方式向客户承诺或者保证投资收益； (2)对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； (3)向他人泄露客户的投资决策计划信息； (4)以个人名义向客户收取证券投资顾问服务费用； (5)通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。 该题选ACD。","type":"multi"},{"id":"cy_fin_1597","q":"证券投资顾问业务和发布证券研究报告的区别包括以下（  ）方面。","c":{"A":"立场不同","B":"服务对象有所不同","C":"市场影响有所不同","D":"服务方式和内容不同"},"a":"A,B,C,D","an":"选项ABCD正确：证券投资顾问业务和发布证券研究报告的区别： （1）立场不同。  （2）服务方式和内容不同。  （3）服务对象有所不同。  （4）市场影响有所不同。  【知识拓展】证券投资顾问业务和发布证券研究报告的区别 (1)立场不同 证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 (2)服务方式和内容不同 证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。证券研究报告向不特定的客户发布，提供证券估值等研究成果，关注证券定价，不关注买卖时机选择等具体的操作性投资建议。 (3)服务对象有所不同 证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务；证券研究报告一般服务于基金、QFII等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 (4)市场影响有所不同 证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响。","type":"multi"},{"id":"cy_fin_1599","q":"证券投资顾问应当遵循诚实信用原则、勤勉、审慎地为客户提供证券投资顾问服务。证券投资顾问不得从事的活动有（  ）。","c":{"A":"向客户收取证券投资顾问服务费用","B":"以任何方式向客户承诺或保证投资收益","C":"向他人泄露客户的投资决策计划信息","D":"通过网络等公众媒体作出买入具体证券的投资建议"},"a":"B,C,D","an":"证券投资顾问不得从事下列活动： (1)以任何方式向客户承诺或者保证投资收益（B）； (2)对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； (3)向他人泄露客户的投资决策计划信息（C）； (4)以个人名义向客户收取证券投资顾问服务费用（并非不能收取，禁止“个人名义”，A错误）； (5)通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议（D）。 综上，该题选BCD。","type":"multi"},{"id":"cy_fin_1601","q":"根据《上海证券交易所科创板股票发行与承销实施办法》，下列关于科创板股票发行与承销信息披露的说法，正确的有（）。 I 发行人的高级管理人员与核心员工可以设立专项资产管理计划参与本次发行战略配售 II 发行人的高级管理人员与核心员工按照规定参与战略配售的，应当经发行人股东会审议通过 III 发行人应当与战略投资者事先签署配售协议 IV 首次公开发行股票应当以询价方式确定股票发行价格","c":{"A":"III、IV","B":"I、II、III、IV","C":"I、II","D":"I、III、IV"},"a":"D","an":"I项正确，发行人的高级管理人员与核心员工可以设立专项资产管理计划参与本次发行战略配售。 II项错误，发行人的高级管理人员与核心员工按照前款规定参与战略配售的，应当经发行人【董事会】审议通过，并在招股说明书中披露参与的人员姓名、担任职务、参与比例等事宜。 III项正确，发行人应当与战略投资者事先签署配售协议。 IV项正确，首次公开发行股票应当以询价的方式确定股票发行价格。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_1603","q":"根据《证券公司融资融券业务管理办法》，投资者对证券发行人权利的有（）。 Ⅰ 请求召开证券持有人会议 Ⅱ 参加证券持有人会议 Ⅲ 配售股份的认购 Ⅳ 请求分配投资收益","c":{"A":"I、III","B":"I、II、III、IV","C":"I、IV","D":"II、III、IV"},"a":"B","an":"投资者对证券发行人的权利包括【请求召开证券持有人会议、参加证券持有人会议】、提案、表决、【配售股份的认购、请求分配投资收益】等因持有证券而产生的权利。","type":"single"},{"id":"cy_fin_1605","q":"证券公司可以与客户自行约定追加担保物后的维持担保比例要求，仅计算现金及信用证券账户内证券市值总和的维持担保比例超过（  ）时，客户可以提取保证金可用余额中的现金、充抵保证金的证券。","c":{"A":"3","B":"1","C":"5","D":"0.8"},"a":"A","an":"选项A正确：证券公司可以与客户自行约定追加担保物后的维持担保比例要求，仅计算现金及信用证券账户内证券市值总和的维持担保比例超过300%时，客户可以提取保证金可用余额中的现金、充抵保证金的证券，但提取后仅计算现金及信用证券账户内证券市值总和的维持担保比例不得低于300%。","type":"single"},{"id":"cy_fin_1607","q":"对转融通担保证券账户内记录的证券，由 （  ）以自己的名义，行使对证券发行人的权利。","c":{"A":"证券公司","B":"证券金融公司","C":"证券登记结算机构","D":"商业银行"},"a":"B","an":"对转融通担保证券账户内记录的证券，由证券金融公司以自己的名义，行使对证券发行人的权利。综上，该题选B，选项ACD为干扰项。","type":"single"},{"id":"cy_fin_1609","q":"根据《证券公司融资融券业务管理办法》，投资者对证券发行人的权利包括（  ）。","c":{"A":"请求分配投资收益","B":"请求召开证券持有人会议","C":"参加证券持有人会议","D":"配售股份的认购"},"a":"A,B,C,D","an":"选项ABCD正确：证券发行人的权利，是指请求召开证券持有人会议、参加证券持有人会议、提案、表决、配售股份的认购、请求分配投资收益等因持有证券而产生的权利。","type":"multi"},{"id":"cy_fin_1611","q":"证券金融公司应当每个交易日公布的转融通信息包括（  ）。","c":{"A":"转融资余额","B":"转融券余额","C":"转融通成交数据","D":"转融通费率"},"a":"A,B,C,D","an":"选项ABCD正确：证券金融公司应当每个交易日公布转融资余额、转融券余额、转融通成交数据及转融通费率。","type":"multi"},{"id":"cy_fin_1613","q":"下列关于资产支持专项计划管理人职责的说法，正确的有（）。 I 负责专项计划的终止清算 II 安全保管专项计划相关资产 III 办理资产支持证券发行事宜 IV 建立相对封闭、独立的基础资产现金流归集机制，切实防范专项计划资产与其他资产混同以及被侵占、挪用等风险","c":{"A":"I、II","B":"II、III、IV","C":"I、III、IV","D":"I、II、III、IV"},"a":"C","an":"管理人应当履行下列职责： 1.对相关交易主体和基础资产进行全面的尽职调查，可聘请会计师事务所、资产评估机构等相关中介机构出具专业意见； 2.在专项计划存续期间，督促原始权益人以及为专项计划提供服务的有关机构、履行法律规定及合同约定的义务； 3.【办理资产支持证券发行事宜】；III项正确 4.按照约定及时将募集资金支付给原始权益人； 5.为资产支持证券投资者的利益管理专项计划资产； 6.【建立相对封闭、独立的基础资产现金流归集机制，切实防范专项计划资产与其他资产混同以及被侵占、挪用等风险】；IV项正确 7.监督、检查特定原始权益人持续经营情况和基础资产现金流状况，出现重大异常情况的，管理人应当采取必要措施，维护专项计划资产安全； 8.按照约定向资产支持证券投资者分配收益；履行信息披露义务； 9.【负责专项计划的终止清算】；I项正确 10.法律、行政法规和中国证监会规定以及计划说明书约定的其他职责。 II项是基金托管人的职责。","type":"single"},{"id":"cy_fin_1615","q":"关于证券期货经营机构资产管理计划中投资者的权利义务，说法错误的是（）。","c":{"A":"投资者应当以真实身份和自有资金参与资产管理计划，并承诺委托资金的来源符合法律、行政法规的规定","B":"投资者参与资产管理计划应当根据自身能力审慎决策，独立承担投资风险","C":"投资者以其出资为限对资产管理计划财产的债务来承担责任，但资产管理合同按照《证券投资基金法》另有约定的，从其约定","D":"投资者参与分级资产管理计划的，管理人应当向投资者充分披露资产管理计划的分级设计、收益分配、风险控制等信息，保障投资者按合同的约定获得预期收益"},"a":"D","an":"D项说法错误，管理人不可以承诺保障收益。","type":"single"},{"id":"cy_fin_1617","q":"根据资产支持证券信息披露的规定，管理人、托管人应当在每年（  ）之前向资产支持证券合格投资者披露上年度资产管理报告、年度托管报告。","c":{"A":"46053","B":"46112","C":"46142","D":"46203"},"a":"C","an":"选项C正确：资产支持证券的管理人、托管人应当在每年4月30日之前向资产支持证券合格投资者披露上年度资产管理报告、年度托管报告。","type":"single"},{"id":"cy_fin_1619","q":"下列关于资产支持证券挂牌、转让的说法，错误的是（  ）。","c":{"A":"资产支持证券初始挂牌交易单位所对应的发行面值或等值份额应不小于人民币1000万元","B":"资产支持证券仅限于合格投资者范围内转让","C":"转让后，持有资产支持证券的合格投资者不得超过200人","D":"资产支持证券的登记结算业务应当由中国证券登记结算有限责任公司或中国证监会认可的其他机构办理"},"a":"A","an":"选项A错误：资产支持证券初始挂牌交易单位所对应的发行面值或等值份额应不少于人民币100万元（并非1000万）。 选项B正确：资产支持证券仅限于在合格投资者范围内转让。 选项C正确：转让后，持有资产支持证券的合格投资者合计不得超过200人。 选项D正确：资产支持证券的登记结算业务应当由中国证券登记结算有限责任公司或中国证监会认可的其他机构办理。 题目问的是”说法错误的“。故选A。","type":"single"},{"id":"cy_fin_1621","q":"根据《证券期货经营机构私募资产管理计划运作管理规定》有关规定，下列证券公司的做法，错误的有（  ）。","c":{"A":"甲证券公司通过其管理的分级资产管理计划资产为该分级资产管理计划劣后级投资者提供融资","B":"乙证券公司通过其管理的分级资产管理计划资产为该分级资产管理计划劣后级投资者的控股股东提供融资","C":"丁证券公司未事先取得投资者同意，将其管理的资产管理计划资产投资于本公司控股股东发行的证券","D":"丙证券公司未事先取得投资者同意，将其管理的资产管理计划资产投资于本公司发行的证券"},"a":"A,B,C,D","an":"证券公司将资产管理计划资产投资于本机构、托管人及其控股股东、实际控制人或者其他关联方发行的证券或者承销期内承销的证券，应当建立健全内部审批机制和评估机制，并应当遵循投资者利益优先原则，事先取得投资者的同意，事后告知投资者和托管人，并采取切实有效措施，防范利益冲突，保护投资者合法权益。除上述情形外，证券公司不得将其管理的资产管理计划资产，直接或者通过投资其他资产管理计划等间接形式，为本机构、托管人及前述机构的控股股东、实际控制人或者其他关联方提供或者变相提供融资（AB做法错误）。 证券公司以资产管理计划资产从事关联交易的，应当遵守法律、行政法规、中国证监会的规定和合同约定，事先取得投资者的同意，事后及时告知投资者和托管人，并向中国证监会相关派出机构报告（未取得同意即投资，CD做法错误）。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_1623","q":"为资产支持证券原始权益人的利益管理专项计划财产是管理人的主要职责之一。（）","c":{"1":"对","0":"错"},"a":"0","an":"为资产支持证券投资者的利益（并非原始权益人）管理专项计划资产是管理人的主要职责之一。","type":"judge"},{"id":"cy_fin_1625","q":"除公募资产管理产品外，投资者以合伙企业、契约等非法人形式直接或者间接投资于证券公司资产管理计划的，应向管理人充分披露实际投资者和最终资金来源。（）","c":{"1":"对","0":"错"},"a":"1","an":"除公募资产管理产品外，投资者以合伙企业、契约等非法人形式直接或者间接投资于证券公司资产管理计划的，应向管理人充分披露实际投资者和最终资金来源。","type":"judge"},{"id":"cy_fin_1627","q":"证券公司进行柜台交易，向投资者收取履约保证金的，应当在双方约定的金融机构开立（）存放，不得违约动用。","c":{"A":"存款账户","B":"专门账户","C":"产品账户","D":"信用账户"},"a":"B","an":"选项B正确：证券公司与投资者约定抵押、质押等财产担保的，应当依法办理担保设定手续；向投资者收取履约保证金的，应当在双方约定的金融机构开立专门账户存放，不得违约动用。 选项A错误：存款账户未体现“专户专用”的要求，可能导致资金混同。 选项C错误：产品账户适用于私募产品的交易登记，与履约保证金无关。 选项D错误：信用账户属于融资融券业务的担保账户。","type":"single"},{"id":"cy_fin_1629","q":"证券公司进行柜台交易，其（  ）应当通过中国证券业协会组织的专业评价。","c":{"A":"柜台交易管理制度和重大事项报告","B":"实施方案和重大事项报告","C":"柜台交易管理制度和实施方案","D":"实施方案和定期报告"},"a":"C","an":"证券公司进行柜台交易，应当报中国证券业协会备案，其柜台交易管理制度和实施方案（C）应当通过中国证券业协会组织的专业评价。 （注意：柜台交易的自律管理要求中，备案阶段的专业评价对象为制度性文件（管理制度和实施方案），而非日常报告或突发事项报告。） 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_1631","q":"证券公司开展柜台交易业务中，需要向投资者收取履约保证金的，保证金应存入在（）金融机构开立的专门账户。","c":{"A":"证券公司与投资者双方约定的","B":"中国投资者保护基金有限责任公司指定的","C":"投资者指定的","D":"证券公司指定的"},"a":"A","an":"证券公司与投资者约定抵押、质押等财产担保的，应当依法办理担保设定手续；向投资者收取履约保证金的，应当在【双方约定的金融机构开立专门账户存放】，不得违约动用。A项正确。","type":"single"},{"id":"cy_fin_1633","q":"下列关于证券公司柜台市场业务的定期及重大事项报告机制，说法错误的是（）。","c":{"A":"证券公司应当向中证机构间报价系统股份有限公司报送柜台市场业务年度报告","B":"证券公司柜台市场业务年度报告的内容包括柜台市场业务总体情况、交易、登记结算、风险及合规管理等","C":"因份额登记系统故障导致私募资产管理计划份额柜台转让无法进行的，证券公司应提交重大事项报告","D":"证券公司柜台市场业务重大事项报告内容包括事项基本情况、产生原因、影响、应对措施等"},"a":"A","an":"A项说法错误，证券公司应当向中国【证券业协会】报送柜台市场业务年度报告以及重大事项报告。","type":"single"},{"id":"cy_fin_1635","q":"证券公司进行柜台交易，应当与特定对手方或投资者签订柜台交易合同，合同的方式可以有（）。 I 书面 II 口头 III 电子 IV 电话","c":{"A":"I、II、III","B":"I、III","C":"II、IV","D":"I、III、IV"},"a":"B","an":"I、III正确：证券公司进行柜台交易，应当与特定交易对手方或投资者以书面或电子方式签订柜台交易合同，约定双方的权利义务。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1637","q":"下列产品中可以在证券公司柜台市场发行、销售与转让的有（）。","c":{"A":"金融衍生品","B":"代销银行的理财产品","C":"代销信托公司的信托计划","D":"证券公司发行的私募集合资产管理计划"},"a":"A,B,C,D","an":"在柜台市场发行、销售与转让的产品包括但不限于以下私募产品： （1）证券公司及其子公司以非公开募集方式设立或者承销的资产管理计划（D）、公司债务融资工具等产品； （2）银行、保险公司、信托公司等其他机构设立并通过证券公司发行、销售与转让的产品（BC）； （3）金融衍生品（A）及中国证监会、中国证券业协会认可的产品。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_fin_1639","q":"证券公司进行柜台交易，应当与特定对手方或投资者签订柜台交易合同，合同的方式可以有（  ）。","c":{"A":"电子","B":"书面","C":"口头","D":"电话"},"a":"A,B","an":"选项AB正确：证券公司进行柜台交易，应当与特定交易对手方或投资者以书面或电子方式签订柜台交易合同，约定双方的权利义务。 选项CD错误：干扰项，法规禁止使用口头和电话等缺乏可追溯的书面或电子记录的形式。","type":"multi"},{"id":"cy_fin_1641","q":"证券公司每年规定时间内应报送柜台市场业务年度报告，下列关于报告内容的说法，正确的有（  ）。","c":{"A":"⻛险及合规管理","B":"投资者适当性管理","C":"交易情况","D":"登记结算"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应于每月结束后5个工作日内按要求向中国证券业协会报送柜台交易月度报表；每年结束后规定时间报送柜台市场业务年度报告，内容包括但不限于：柜台市场业务总体情况、交易、登记结算、投资者适当性管理、风险及合规管理等。","type":"multi"},{"id":"cy_fin_1643","q":"根据《区域性股权市场自律管理与服务规范（试行）》，下列关于证券公司参与区域性股权交易市场的业务范围，说法错误的是（）。","c":{"A":"证券公司可以在区域性股权市场开展推荐企业挂牌业务","B":"为证券的公开发行向不特定对象进行路演推介或其他促成投融资需求对接的活动","C":"代理开立区域性股权市场证券账户","D":"可以为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务"},"a":"B","an":"证券公司可以在区域性股权市场开展以下业务：  （1）推荐企业挂牌；（A项正确） （2）承销可转换为股票的公司债券，推荐本公司承销的可转换为股票的公司债券在区域性股权市场挂牌转让； （3）代理开立区域性股权市场证券账户；（C项正确） （4）为在区域性股权市场开户的合格投资者买卖证券提供居间介绍服务；（D项正确） （5）利用自有资金或依法管理的资产管理等产品投资区域性股权市场的证券； （6）为证券的【非公开发行】组织合格投资者进行路演推介或其他促成投融资需求对接的活动；（B项错误） （7）为合格投资者提供企业研究报告和尽职调查信息； （8）与商业银行、小额贷款公司等开展业务合作，为企业提供融资服务； （9）改制辅导、管理培训、管理咨询、财务顾问等相关服务； （10）推荐企业展示； （11）中国证监会或中国证券业协会规定的其他业务。","type":"single"},{"id":"cy_fin_1645","q":"由于股票期权交易实行（  ）制度，证券登记结算机构应当在当日及时将结算结果通知结算参与人，结算参与人据此对投资者进行结算，并应当将结算结果按照与投资者约定的方式及时通知投资者。","c":{"A":"当日无负债结算","B":"保证金","C":"强制平仓","D":"套期保值"},"a":"A","an":"选项A正确：股票期权交易实行当日无负债结算制度。证券登记结算机构应当在当日及时将结算结果通知结算参与人，结算参与人据此对投资者进行结算，并应当将结算结果按照与投资者约定的方式及时通知投资者。投资者应当及时查询并妥善处理自己的交易持仓。 选项B错误：“保证金”是交易中的担保要求，非结算制度。 选项C错误：“强制平仓”是风险控制手段，用于投资者保证金不足时的处置手段。 选项D错误：“套期保值”是交易策略。","type":"single"},{"id":"cy_fin_1647","q":"下列关于另类投资业务的总体要求，说法正确的有（）。 Ⅰ 另类子公司可以下设实业投资子公司 Ⅱ 另类子公司开展业务应当坚持专业化投资原则 Ⅲ 证券公司应当对子公司统一实施管控 Ⅳ 证券公司应当加强对另类子公司的资本约束过期考点","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ"},"a":"B","an":"Ⅰ项说法错误，另类子公司【不得再下设任何机构】。","type":"single"},{"id":"cy_fin_1649","q":"根据《证券公司代销金融产品管理规定》，下列做法错误的有（  ）。","c":{"A":"甲证券公司营业部员工张某向投资者宣传某股票型基金稳赚不赔","B":"乙证券公司营业部员工王某与客户约定某基金亏损由王某承担","C":"丙证券公司营业部销售基金赠送大米","D":"丁证券公司营业部员工李某销售戊基金公司的基金后，收取戊基金公司奖励的购物卡"},"a":"A,B,C,D","an":"根据《证券公司代销金融产品管理规定》，证券公司及其从事金融产品代销业务的人员在代销金融产品过程中不得有下列行为： （1）采取夸大宣传、虚假宣传等方式误导客户购买金融产品（A做法错误）。 （2）采取抽奖、回扣、赠送实物等方式诱导客户购买金融产品（C做法错误）。 （3）与客户分享投资收益、分担投资损失（B做法错误）。 （4）使用除证券公司客户交易结算资金专用存款账户外的其他账户，代委托人接收
