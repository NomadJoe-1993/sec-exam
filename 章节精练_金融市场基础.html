息，而且反映了所有有关证券的能公开获得的信息。在这里，公开信息包括公司的财务报告、公司公告、有关公司红利政策的信息和经济形势等。","type":"multi"},{"id":"cy_fin_827","q":"当有很大把握预测牛市到来时，应选择高β系数的证券或组合，成倍放大市场收益率，带来较高的收益。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"当有很大把握预测牛市到来时，应选择高β系数的证券或组合，成倍放大市场收益率，带来较高的收益","type":"judge"},{"id":"cy_fin_829","q":"中央银行在公开市场上买卖有价证券，将直接影响（　　），从而影响货币供应量。","c":{"A":"商业银行法定准备金","B":"商业银行超额准备金","C":"中央银行再贴现","D":"中央银行再贷款"},"a":"B","an":"当中央银行从商业银行买进证券时，中央银行直接将证券价款转入商业银行在中央银行的准备金存款账户，直接增加商业银行超额准备金存款，提高商业银行信贷能力和货币供应能力。反之，如果商业银行从中央银行买进证券，则情况相反。","type":"single"},{"id":"cy_fin_831","q":"以下属于实施积极财政政策对证券市场的影响的是（）。","c":{"A":"扩大财政支出，加大财政赤字","B":"调节国民收入中消费与储蓄的比例","C":"通过控制货币供应总量保持社会总供给与总需求的平衡","D":"引导储蓄向投资的转化并实现资源的合理配置"},"a":"A","an":"其他都属于货币政策变动对实体经济的影响。","type":"single"},{"id":"cy_fin_833","q":"证券市场需求主要受到（    ）因素影响。","c":{"A":"宏观经济环境","B":"政策因素","C":"居民金融资产结构的调整","D":"资本市场的逐步对外开放"},"a":"A,B,C,D","an":"证券市场需求主要受到以下因素影响：    宏观经济环境 政策因素 居民金融资产结构的调整 资本市场的逐步对外开放","type":"multi"},{"id":"cy_fin_835","q":"外汇是货币行政当局（中央银行、货币管理机构、外汇平准基金及财政部）以银行存款、财政部库券、长短期政府证券等形式所保有的、在国际收支逆差时可以使用的债权。","c":{"1":"对","0":"错"},"a":"1","an":"国际货币基金组织（IMF）对一国“国际清偿力”项下的外汇，即外汇储备所下的定义是：外汇是货币行政当局（中央银行、货币管理机构、外汇平准基金及财政部）以银行存款、财政部库券、长短期政府证券等形式所保有的、在国际收支逆差时可以使用的债权。","type":"judge"},{"id":"cy_fin_837","q":"证券投资技术分析是建立在（）基础之上的。","c":{"A":"市场行为涵盖一切信息、价格沿趋势移动、历史会重演的假设","B":"经济学、财政金融学、财务管理学、投资学","C":"宏观经济分析、行业和区域分析、公司分析","D":"波浪理论"},"a":"A","an":"作为一种投资分析工具，技术分析是以一定的假设条件为前提的。这些假设是：市场行为涵盖一切信息，证券价格沿趋势移动，历史会重演。","type":"single"},{"id":"cy_fin_839","q":"指标类是根据价、量的历史资料，通过建立一个数学模型，给出数学上的计算公式，得到一个体现证券市场的某个方面内在实质的指标值。常见的指标有（   ）","c":{"A":"相对强弱指标","B":"随机指标","C":"趋向指标","D":"平滑异同移动平均线"},"a":"A,B,C,D","an":"指标类是根据价、量的历史资料，通过建立一个数学模型，给出数学上的计算公式，得到一个体现证券市场的某个方面内在实质的指标值。指标反映的内容大多是无法从行情报表中直接看到的，它可为我们的操作提供指导方向。常见的指标有相对强弱指标（RSI）、随机指标（KDJ）、趋向指标（DMI）、平滑异同移动平均线（MACD）、能量潮（OBV）、心理线（PSY）、乖离率（BIAS）等。","type":"multi"},{"id":"cy_fin_841","q":"技术分析是以证券市场现在和将来的市场行为为分析对象，应用数学和逻辑的方法，探索出一些典型变化规律并据此来预测证券市场未来变化趋势的技术方法。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"技术分析是以证券市场过去和现在的市场行为为分析对象，应用数学和逻辑的方法，探索出一些典型变化规律并据此来预测证券市场未来变化趋势的技术方法。","type":"judge"},{"id":"cy_fin_843","q":"证券或组合的收益与市场指数收益（）。","c":{"A":"不相关","B":"线性相关","C":"具有二次函数关系","D":"具有三次函数关系"},"a":"B","an":"从E(rp)=rF+βpE（rM）-rFβp，可以看出证券或组合的收益与市场指数收益呈线性相关，β系数为直线斜率，反映了证券或组合的收益水平对市场平均收益水平变化的敏感性。","type":"single"},{"id":"cy_fin_845","q":"有价证券的价格是以一定的市场利率和预期收益为基础计算得出的（　　）。","c":{"A":"期值","B":"现值","C":"有效利率","D":"复合利率"},"a":"B","an":"不同的信用工具，其价格确定方式各不相同。有价证券的价格实际上是以一定市场利率和预期收益为基础计算得出的现值。","type":"single"},{"id":"cy_fin_847","q":"“内在价值”即“由证券本身决定的价格”，其含义包括（  ）。","c":{"A":"内在价值是一种相对“客观”的价格","B":"内在价值由证券自身的内在属性或者基本面因素决定","C":"市场价格基本上是围绕着内在价值形成的","D":"内在价值不由证券自身的内在属性决定"},"a":"A,B,C","an":"投资学上的“内在价值”概念，大致有两层含义：①内在价值是一种相对“客观”的价格，由证券自身的内在属性或者基本面因素决定；②市场价格基本上是围绕着内在价值形成的。","type":"multi"},{"id":"cy_fin_849","q":"有价证券作为虚拟资本的载体，其价格运动形式具体表现为（  ）。","c":{"A":"市场价值由证券的预期收益和市场利率决定","B":"市场价值随职能资本价值的变动而变动","C":"市场价值与预期收益的多少成正比，与市场利率的高低成反比","D":"价格波动，既决定于有价证券的供求，也决定于货币的供求"},"a":"A,C,D","an":"作为虚拟资本载体的有价证券，其价格运动形式具体表现为：①其市场价值由证券的预期收益和市场利率决定，不随职能资本价值的变动而变动；②其市场价值与预期收益的多少成正比，与市场利率的高低成反比；③其价格波动，既决定于有价证券的供求，也决定于货币的供求。","type":"multi"},{"id":"cy_fin_851","q":"有价证券的交换价值或市场价格来源于其产生未来收益的能力，有价证券本身有价值。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"有价证券的交换价值或市场价格来源于其产生未来收益的能力，有价证券本身无价值。","type":"judge"},{"id":"cy_fin_853","q":"资本资产定价模型说明，风险溢价的大小取决于β值的大小。 β值越低，表明单个证券的风险越高，所得到的补偿也就越高。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"资本资产定价模型的说明：    （1）单个证券的期望收益率由两个部分组成，无风险利率以及对所承担风险的补偿风险溢价。    （2）风险溢价的大小取决于β值的大小。 β值越高，表明单个证券的风险越高，所得到的补偿也就越高。    （3）β度量的是单个证券的系统风险，非系统性风险没有风险补偿。","type":"judge"},{"id":"cy_fin_855","q":"某4年期债券，面值为1000元，息票利率为5%。现以950元的发行价向全社会公开发行，2年后债券发行人以1050元的价格赎回。若首次赎回日为付息日后的第一个交易日，则其赎回收益率为（）。","c":{"A":"0.0761","B":"0.0968","C":"0.1003","D":"0.1025"},"a":"D","an":"根据赎回收益率的计算公式：  用试错法求得：赎回收益率y=10.25%。","type":"single"},{"id":"cy_fin_857","q":"根据有关国际组织、机构的规定和要求，投资者适当性管理工作主要是以经营机构适当性义务为主线展开的，经营机构应当履行的适当性义务不包括(  )。","c":{"A":"以“将适当的产品销售给适当投资者”为目标的销售匹配义务","B":"以判断投资者风险承受能力为目标的投资者分类义务","C":"以实行充分风险揭示和警示为目标的投资者教育义务","D":"以判断产品风险等级为目标的产品分级义务"},"a":"C","an":"投资者适当性管理工作主要是以经营机构适当性义务为主线展开的，应当包括三类： 一是以判断投资者风险承受能力为目标的投资者分类义务；【选项B正确】 二是以判断产品风险等级为目标的产品分级义务；【选项D正确】 三是以“将适当的产品销售给适当的投资者”为目标的销售匹配义务。【选项A正确】","type":"single"},{"id":"cy_fin_859","q":"美国最早的证券交易所是(  )。","c":{"A":"费城证券交易所","B":"芝加哥证券交易所","C":"波士顿证券交易所","D":"纽约证券交易所"},"a":"A","an":"【1790年】成立了美国第一个证券交易所——【费城证券交易所】。","type":"single"},{"id":"cy_fin_861","q":"我国台湾证券交易所目前发布的股价指数中，最有代表性的是(  )。","c":{"A":"发行量加权股价指数","B":"金融股发行量加权股价指数","C":"电子股发行量加权股价指数","D":"产业分类股价指数"},"a":"A","an":"我国台湾证券交易所自行编制的【发行量加权股价指数】，是台湾地区最具有代表性的股价指数，被视为台湾地区经济走向的主要指标之一。","type":"single"},{"id":"cy_fin_863","q":"投资者适当性管理工作主要是以经营机构适当性义务为主线展开的，包括以下(  )。","c":{"A":"以判断投资者风险承受力为目标的投资者分类义务","B":"以判断产品风险等级为目标的产品分级义务","C":"以保护投资者利益为目标的投资者保护义务","D":"以“将适当的产品销售给适当的投资者”为目标的销售匹配义务"},"a":"A,B,D","an":"投资者适当性管理工作主要是以经营机构适性义务为主线展开的，应当包括三类： 一是以判断投资者风险承受能力为目标的投资者分类义务；A正确 二是以判断产品风险等级为目标的产品分级义务；B正确 三是以“将适当的产品销售给适当的投资者”为目标的销售匹配义务。D正确 C选项属于证券市场监管的原则。","type":"multi"},{"id":"cy_fin_865","q":"做市商交易制度的特点有(  )。","c":{"A":"投资者买卖证券都以做市商为交易对手方","B":"证券成交价格的形成由做市商决定","C":"与其他投资者可以直接成交","D":"做市商的收入来源是买卖证券的差价"},"a":"A,B,D","an":"选项A,B,D正确，做市商制度，是指在证券市场上，由具备一定实力和信誉的证券经营法人作为特许交易商，在其愿意的水平上不断向交易者报出某些特定证券的买入和卖出价，并在所报价位上接受机构投资者或其他交易商的买卖要求，保证及时成交的证券交易方式。 选项C错误，做市商制度下，其他投资者之间不直接成交。","type":"multi"},{"id":"cy_fin_867","q":"证券市场监督与自律相结合的原则指在加强政府、证券监管机构对证券市场监管的同时，也要加强从业者的(  )。","c":{"A":"自我监督","B":"自我约束","C":"自我教育","D":"自我管理"},"a":"B,C,D","an":"证券市场监督与自律相结合的原则是指在加强政府、证券监管机构对证券市场监管的同时，也要加强从业者的自我约束、自我教育和自我管理。","type":"multi"},{"id":"cy_fin_869","q":"非证券金融市场包括(  )。","c":{"A":"信托市场","B":"股权投资市场","C":"保险市场","D":"债券市场"},"a":"A,B,C","an":"非证券金融市场，是指以有价证券以外的金融资产为对象的发行和交易关系的总和，包括股权投资市场、信托市场、融资租赁市场、外汇市场、黄金市场、保险市场、银行理财产品市场、长期贷款市场等。债券属于证券市场的范畴。","type":"multi"},{"id":"cy_fin_871","q":"目前，沪、深证券交易所封闭式基金交易不收取印花税。","c":{"1":"对","0":"错"},"a":"1","an":"按照沪、深证券交易所公布的收费标准，我国基金交易佣金不得高于成交金额的0.5%（深圳证券交易所特别规定该佣金水平不得低于代收的证券交易监管费和证券交易经手费，上海证券交易所无此规定），起点5元，由证券公司向投资者收取。目前，封闭式基金交易不收取印花税。","type":"judge"},{"id":"cy_fin_873","q":"沪深300指数是沪、深证券交易所第一次联合发布的反映A股市场整体走势的指数。(  )","c":{"1":"对","0":"错"},"a":"1","an":"沪深300指数是沪、深证券交易所第一次联合发布的反映A股市场整体走势的指数。","type":"judge"},{"id":"cy_fin_875","q":"证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式，属于证券(  )。","c":{"A":"代销方式","B":"承销方式","C":"包销方式","D":"直销方式"},"a":"A","an":"证券承销业务可以采取代销或者包销方式。 代销是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式； 而包销是指证券公司将发行人的证券按照协议全部购入或者在承销期结束时将售后剩余证券全部自行购入的承销方式。","type":"single"},{"id":"cy_fin_877","q":"（）是指投资者将持有的证券委托给证券公司保管，并由后者代为处理有关证券权益事务的行为。","c":{"A":"证券托管","B":"证券存管","C":"证券交付","D":"证券交易"},"a":"A","an":"一般意义上，证券托管是指投资者将持有的证券委托给证券公司保管，并由后者代为处理有关证券权益事务的行为，A选项正确。 B选项，证券存管是指证券公司将投资者交给其保管的证券以及自身持有的证券统一交给证券登记结算机构保管，并由后者代为处理有关证券权益事务的行为。 C选项，证券交付通常指的是在证券交易过程中，卖方将证券交付给买方的过程。 D选项，证券交易是指在证券市场上买卖证券的行为。","type":"single"},{"id":"cy_fin_879","q":"证券登记结算公司的登记结算制度不包括(  )。","c":{"A":"证券实名制","B":"货银对付的交收制度","C":"净额结算制度","D":"统一结算制度"},"a":"D","an":"证券登记结算公司的登记结算制度包括：证券实名制、货银对付的交收制度、分级结算制度、结算参与人制度、净额结算制度、结算证券和资金的专用性制度。D属于干扰项。","type":"single"},{"id":"cy_fin_881","q":"根据《中华人民共和国证券法》，证券登记结算公司履行的主要职能包括(  )。","c":{"A":"证券账户、结算账户的设立","B":"证券的存管和过户","C":"证券交易的清算和交收","D":"受证券持有人委托派发证券权益"},"a":"A,B,C","an":"证券登记结算公司履行以下职能：(1)证券账户、结算账户的设立（A选项）。(2)证券的存管和过户（B选项）。(3)证券持有人名册登记。(4)证券交易的清算和交收（C选项）。(5)受发行人的委托派发证券权益。(6)办理与上述业务有关的查询、信息服务。(7)国务院证券监督管理机构批准的其他业务。D选项说法错误。","type":"multi"},{"id":"cy_fin_883","q":"竞价申报时涉及证券价格的有效申报范围，是为了 (  )，证券交易所可根据需要对每日股票价格的涨跌幅度予以适当的限制。","c":{"A":"保护投资者利益","B":"保证投资者收益","C":"防止股价暴涨暴跌","D":"防止投机盛行"},"a":"A,C,D","an":"竞价申报时还涉及证券价格的有效申报范围。为保护投资者利益，防止股价暴涨暴跌和投机盛行（ACD选项正确，B选项错误），证券交易所可根据需要对每日股票价格的涨跌幅度予以适当的限制。高于涨幅限制价格的委托和低于跌幅限制价格的委托无效。","type":"multi"},{"id":"cy_fin_885","q":"证券交易所的组织形式大致可以分为(  )。","c":{"A":"股份制","B":"公司制","C":"合伙制","D":"会员制"},"a":"B,D","an":"证券交易所的组织形式大致可以分为两类，即公司制和会员制（B、D选项正确）。前者的证券交易所是以股份有限公司形式组织并以营利为目的的法人团体；后者的证券交易所是一个由会员自愿组成的、不以营利为目的的社会法人团体。 AC属于干扰项。","type":"multi"},{"id":"cy_fin_887","q":"证券市场有效性的要求主要包括(  )。","c":{"A":"时间快速","B":"证券市场的高效率","C":"证券市场的信息效率","D":"证券市场的低成本"},"a":"B,C,D","an":"证券市场的有效性包含两方面的要求： 一是【证券市场的高效率】； 二是【证券市场的低成本】。 高效率包含两方面内容： 首先是【证券市场的信息效率】，即要求证券价格能准确、迅速、充分反映各种信息。根据证券价格对信息的反映程度，可以将证券市场分为强式有效市场、半强式有效市场和弱式有效市场。 其次是证券市场的运行效率，即证券交易系统硬件的工作能力，如交易系统的处理速度、容量等。低成本也包含两方面：一是直接成本；二是间接成本。前者如投资者参与交易而支付的佣金和缴纳的税收，后者如投资者搜集证券信息所发生的费用等。","type":"multi"},{"id":"cy_fin_889","q":"对证券公司信息报送与披露方面的监管要求包括(  )。","c":{"A":"信息公开披露制度","B":"信息报送制度","C":"董事会会议内容公开制度","D":"年报审计监管"},"a":"A,B,D","an":"对证券公司信息报送与披露方面的监管要求包括：(1)信息报送制度。(2)信息公开披露制度。(3)年报审计监管。ABD符合要求，选项C不属于证券公司信息报送与披露方面的监管要求。","type":"multi"},{"id":"cy_fin_891","q":"按照沪、深证券交易所公布的收费标准，我国基金交易佣金不得高于成交金额的0.5%，起点5元，由证券公司向投资者收取。(  )","c":{"1":"对","0":"错"},"a":"1","an":"按照沪、深证券交易所公布的收费标准，我国基金交易佣金不得高于成交金额的0.5% (深圳证券交易所特别规定该佣金水平不得低于代收的证券交易监管费和证券交易经手费，上海证券交易所无此规定) ，起点5元，由证券公司向投资者收取。","type":"judge"},{"id":"cy_fin_893","q":"证券公司接受证券买卖的委托，应当根据委托书载明的证券名称、买卖数量、出价方式、价格幅度等，按照交易规则代理买卖证券，如实进行交易记录。(  )","c":{"1":"对","0":"错"},"a":"1","an":"证券公司接受证券买卖的委托，应当根据委托书载明的证券名称、买卖数量、出价方式、价格幅度等，按照交易规则代理买卖证券，如实进行交易记录；买卖成交后，应当按照规定制作买卖成交报告单交付客户。","type":"judge"},{"id":"cy_fin_895","q":"根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化分为境内资产证券化和离岸资产证券化。(　　)","c":{"1":"对","0":"错"},"a":"1","an":"根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化分为境内资产证券化和离岸资产证券化。","type":"judge"},{"id":"cy_fin_897","q":"证券金融公司转融通的期限一般不超过(  )个月。","c":{"A":"9","B":"6","C":"12","D":"3"},"a":"B","an":"证券金融公司向证券公司转融通的期限一般不得超过6个月。 转融通的期限，自资金或者证券实际交付之日起算。","type":"single"},{"id":"cy_fin_899","q":"证券公司发行公司债券，发行人的董事、监事、高级管理人员及持股比例超过(　　)的股东，可以视同专业投资者参与发行人相关公司债券的认购、交易与转让。","c":{"A":"0.05","B":"0.1","C":"0.08","D":"0.06"},"a":"A","an":"《公司债券发行与交易管理办法》规定，证券公司发行公司债券，发行人的董事、监事、高级管理人员及持股比例超过5％的股东，可以视同专业投资者参与发行人相关公司债券的认购或交易、转让。","type":"single"},{"id":"cy_fin_901","q":"我国的证券登记结算制度不包括(  )。","c":{"A":"结算证券和资金的专用性制度","B":"分级结算制度和结算参与人制度","C":"无负债结算制度","D":"证券实名制"},"a":"C","an":"证券登记结算制度：证券实名制（D选项）、货银对付的交收制度、分级结算制度和结算参与人制度（B选项）、净额结算制度、结算证券和资金的专用性制度（A选项）。 C选项属于金融期货的主要交易制度。","type":"single"},{"id":"cy_fin_903","q":"中国证券业协会三大职能不包括(  )。","c":{"A":"高效","B":"自律","C":"服务","D":"传导"},"a":"A","an":"中国证券业协会着力加强行业自律、行业服务和行业基础建设，履行【“自律、服务、传导”】三大职能。 选项A不属于。","type":"single"},{"id":"cy_fin_905","q":"证券交易所的组织形式中，不以营利为目的的是(  )。","c":{"A":"公司制","B":"会员制","C":"审批制","D":"许可制"},"a":"B","an":"B选项正确，【会员制】证券交易所是一个由会员自愿组成的、【不以营利】为目的的社会法人团体。 A选项，公司制证券交易所是以股份有限公司形式组织并以营利为目的的法人团体，一般由金融机构及各类民营公司组建。CD属于干扰项。","type":"single"},{"id":"cy_fin_907","q":"证券交易所内的证券交易按（）竞价成交。","c":{"A":"价格优先原则","B":"时间优先原则","C":"按比例分配原则","D":"数量优先原则"},"a":"A,B","an":"证券交易所实行“公平、公开、公正”的原则，交易价格由交易双方公开竞价确定，实行“价格优先、时间优先”的竞价成交原则，AB符合要求。 选项C按比例分配原则和选项D数量优先原则并不是证券交易所内竞价成交的原则。","type":"multi"},{"id":"cy_fin_909","q":"为了保护投资者利益，大多数国家和地区的（）不同程度地对投资者适当性问题做出了硬性规定或者原则性指引。","c":{"A":"政府监管机构","B":"行业自律组织","C":"金融企业","D":"上市公司"},"a":"A,B,C","an":"出于保护投资者尤其是中小投资者的利益，大多数国家和地区的政府监管机构、行业自律组织以及金融企业不同程度地对投资者适当性问题做出了硬性规定或者原则性指引。","type":"multi"},{"id":"cy_fin_911","q":"证券存管是指证券公司将(  )统一交给证券登记结算机构保管，并由后者代为处理有关证券权益事务的行为。","c":{"A":"投资者交给其保管的证券","B":"自身持有的证券","C":"法人股股东持有的股权证明","D":"债权人持有的债权证明"},"a":"A,B","an":"证券存管是指证券公司将投资者交给其保管的证券以及自身持有的证券统一交给证券登记结算机构保管，并由后者代为处理有关证券权益事务的行为。","type":"multi"},{"id":"cy_fin_913","q":"下列关于证券市场融资基本形式的说法，正确的有(  )。","c":{"A":"资金赤字单位在市场上向资金盈余单位发售有价证券，募得资金","B":"资金盈余单位购入有价证券，获得有价证券所代表的财产所有权、收益权或债权","C":"证券持有者要收回投资，可以通过市场将证券转让给其他投资者","D":"证券可以不断地转让流通，使投资者的资金得以灵活周转"},"a":"A,B,C,D","an":"证券市场融资的基本形式是： 资金赤字单位在市场上向资金盈余单位发售有价证券，募得资金，资金盈余单位购入有价证券，获得有价证券所代表的财产所有权、收益权或债权。 证券持有者若要收回投资，可以通过市场将证券转让给其他投资者。 证券可以不断地转让流通，使投资者的资金得以灵活周转。","type":"multi"},{"id":"cy_fin_915","q":"证券登记结算公司依据《证券法》应当履行的职能有(  )。","c":{"A":"证券持有人名册登记","B":"受发行人委托派发证券权益","C":"证券的存管和过户","D":"证券账户的设立"},"a":"A,B,C,D","an":"根据《证券法》，证券登记结算公司应履行以下职能： (1)证券账户、结算账户的设立。【D正确】 (2)证券的存管和过户。【C正确】 (3)证券持有人名册登记。【A正确】 (4)证券交易的清算和交收。 (5)受发行人的委托派发证券权益。【B正确】 (6)办理与上述业务有关的查询、信息服务。 (7)国务院证券监督管理机构批准的其他业务。","type":"multi"},{"id":"cy_fin_917","q":"在证券市场监管中，证券管理机关将对证券的募集、发行、交易等行为以及证券投资中介机构的行为运用相应手段进行监督管理。(　　)","c":{"1":"对","0":"错"},"a":"1","an":"证券市场监管是指证券管理机关运用法律的、经济的以及必要的行政手段，对证券的募集、发行、交易等行为以及证券投资中介机构的行为进行监督与管理。","type":"judge"},{"id":"cy_fin_919","q":"上海证券交易所能将其托管制度概括为“自动托管、随处通买、哪买哪卖、转托不限”。(  )","c":{"1":"对","0":"错"},"a":"0","an":"深圳证券交易所交易证券的托管制度可概括为：自动托管，随处通买，哪买哪卖，转托不限。","type":"judge"},{"id":"cy_fin_921","q":"我国证券市场法律法规体系的主要层级包括（）级。","c":{"A":"3","B":"4","C":"5","D":"7"},"a":"C","an":"选项C正确：我国证券市场法律法规体系的主要层级包括五级。  （一）法律；（二）行政法规；（三）部门规章；（四）规范性文件；（五）行业自律规则。","type":"single"},{"id":"cy_fin_923","q":"我国证券市场法律法规体系的主要层级包括五级，分别是法律、行政法规、部门规章、规范性文件和行业自律规则。（）","c":{"1":"对","0":"错"},"a":"1","an":"我国证券市场法律法规体系的主要层级包括五级，分别是法律、行政法规、部门规章、规范性文件和行业自律规则。","type":"judge"},{"id":"cy_fin_925","q":"证券公司违反《证券法》第一百零七条第一款的规定，未对投资者开立账户提供的身份信息进行核对的，对直接负责的主管人员和其他直接责任人员给予警告，并处以（）万元以下的罚款。","c":{"A":"10","B":"5","C":"15","D":"20"},"a":"A","an":"选项A正确：根据《证券法》第二百零一条的规定，证券公司违反《证券法》第一百零七条第一款的规定，未对投资者开立账户提供的身份信息进行核对的，责令改正，给予警告，并处以5万元以上50万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以【10万元】以下的罚款。","type":"single"},{"id":"cy_fin_927","q":"擅自设立证券公司、非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，以下关于相关处罚的说法错误的是（）。","c":{"A":"责令改正，没收违法所得","B":"并处以违法所得1倍以上10倍以下的罚款","C":"没有违法所得或者违法所得不足100万元的，处以100万元以上500万元以下的罚款","D":"对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款"},"a":"C","an":"题目问的是“说法错误的”。选项C：没有违法所得或者违法所得不足100万元的，处以【100万元以上1000万元以下】（而不是100-500万）的罚款。因此答案选择C。 选项AB正确：擅自设立证券公司、非法经营证券业务或者未经批准以证券公司名义开展证券业务活动的，责令改正，没收违法所得，并处以违法所得1倍以上10倍以下的罚款； 选项D正确：对直接负责的主管人员和其他直接责任人员给予警告，并处以20万元以上200万元以下的罚款。","type":"single"},{"id":"cy_fin_929","q":"下列有关证券交易所的交易规则中，错误的是（）。","c":{"A":"进入实行会员制证券交易所参与集中交易的，必须是证券交易所的会员","B":"未经证券交易所许可，任何单位和个人不得发布证券交易即时行情","C":"证券交易所采取技术停牌或者决定临时停市，不必向国务院证券监督管理机构报告","D":"投资者可以以电话的方式委托证券公司代卖其产品"},"a":"C","an":"题目问的是”错误的“。选项C：根据《证券法》第一百一十一条：因不可抗力、意外事件、重大技术故障、重大人为差错等突发性事件而影响证券交易正常进行时，为维护证券交易正常秩序和市场公平，证券交易所可以按照业务规则采取技术性停牌、临时停市等处置措施，并应当及时（并非不必）向国务院证券监督管理机构报告。因此答案选择C。 选项A正确：根据《证券法》第一百零五条：进入实行会员制的证券交易所参与集中交易的，必须是证券交易所的会员。证券交易所不得允许非会员直接参与股票的集中交易。 选项B正确：根据《证券法》第一百零九条：证券交易所应当为组织公平的集中交易提供保障，实时公布证券交易即时行情，并按交易日制作证券市场行情表，予以公布。 证券交易即时行情的权益由证券交易所依法享有。未经证券交易所许可，任何单位和个人不得发布证券交易即时行情。 选项D正确：根据《证券法》第一百零六条：投资者应当与证券公司签订证券交易委托协议，并在证券公司实名开立账户，以书面、电话、自助终端、网络等方式，委托该证券公司代其买卖证券。","type":"single"},{"id":"cy_fin_931","q":"证券公司违反法律的规定，将投资者的账户提供给他人使用的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"三十万元以上三百万元以下","B":"十万元以上一百万元以下","C":"违法所得1倍以上5倍以下","D":"违法所得1倍以上10倍以下"},"a":"B","an":"选项B正确：证券公司违反本法第一百零七条第二款的规定，将投资者的账户提供给他人使用的，责令改正，给予警告，并处以【十万元以上一百万元以下】的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以下的罚款。","type":"single"},{"id":"cy_fin_933","q":"下列有关证券承销业务的事项中，错误的是（）。","c":{"A":"向不特定对象发行证券聘请承销团承销的，承销团应当由主承销和参与承销的证券公司组成","B":"证券的代销、包销期限最长不得超过90日","C":"证券承销业务采取代销或者包销方式","D":"公开发行股票、代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报证券业协会备案"},"a":"D","an":"选项D错误：公开发行股票，代销、包销期限届满，发行人应当在规定的期限内将股票发行情况报国务院证券监督管理机构（而不是证券业协会）备案。","type":"single"},{"id":"cy_fin_935","q":"下列有关证券登记结算机构的表述，说法错误的是（）。","c":{"A":"证券登记结算机构不得挪用客户的证券","B":"投资者委托证券公司进行证券交易，应当通过证券公司申请在证券登记结算机构开立证券账户","C":"证券持有人持有的证券，在上市交易时，应当全部存管在证券交易所","D":"证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料，其保存期限不得少于20年"},"a":"C","an":"选项A正确，选项C错误：在证券交易所或者国务院批准的其他全国性证券交易场所交易的证券，应当全部存管在证券登记结算机构（而非交易所），证券登记结算机构不得挪用客户的证券。 选项B正确：投资者委托证券公司进行证券交易，应当通过证券公司申请在证券登记结算机构开立证券账户。 选项D正确：证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料，其保存期限不得少于20年。","type":"single"},{"id":"cy_fin_937","q":"按照《证券法》的规定，证券账户的设立是（）的职能。","c":{"A":"国务院证券监督管理机构","B":"证券交易所","C":"国务院金融监督管理机构","D":"证券登记结算机构"},"a":"D","an":"选项A错误：国务院证券监督管理机构主要负责监管证券市场和相关机构，并不直接参与证券账户的设立。 选项B错误：证券交易所主要负责提供证券交易的场所和设施，以及制定相关的交易规则，不负责证券账户的设立。 选项C错误：国务院金融监督管理机构一般指金融监督管理总局、央行等机构，它们并不直接管理证券账户的设立。 选项D正确：证券登记结算机构应履行下列职能：  （一）证券账户、结算账户的设立；  （二）证券的存管和过户；  （三）证券持有人名册登记； （四）证券交易的清算和交收；  （五）受发行人的委托派发证券权益；  （六）办理与上述业务有关的查询、信息服务； （七）国务院证券监督管理机构批准的其他业务。","type":"single"},{"id":"cy_fin_939","q":"证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，给投资者造成损失的，应当与（）承担连带赔偿责任。","c":{"A":"发行人的实际控制人","B":"发行人的法定代表人","C":"发行人","D":"发行人的控股股东"},"a":"C","an":"选项C正确：《证券法》第一百八十三条规定，证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销相关业务许可。给投资者造成损失的，应当与发行人承担连带赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_941","q":"对证券交易所作出的不予上市交易、终止上市交易决定不服的，可以向（）设立的复核机构申请复核。","c":{"A":"证券交易所","B":"证监会","C":"证券业协会","D":"国务院"},"a":"A","an":"选项A正确：对证券交易所作出的不予上市交易、终止上市交易决定不服的，可以向证券交易所设立的复核机构申请复核。 （这道题考查的是对证券交易所监管机制的理解，特别是当发行人或相关利益方对证券交易所作出的某些决定有异议时，他们有权通过特定渠道进行申诉。此处强调了证券交易所内部设有相应的复核机制来处理这类争议） 选项B错误：证监会是国务院证券监督管理机构，负责监管证券市场，但不直接处理对证券交易所决定的复核申请。 选项C错误：证券业协会是证券行业的自律组织，不负责处理对证券交易所决定的复核申请。 选项D错误：国务院是国家的最高行政机关，不直接处理对证券交易所决定的复核申请。","type":"single"},{"id":"cy_fin_943","q":"下列有关证券登记结算机构的业务规则，说法正确的是（）。","c":{"A":"证券登记结算机构依法制定章程和业务规则，应当经证券交易所批准","B":"证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料，其保存期限不得少于10年","C":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户","D":"证券登记结算机构可以挪用客户的证券"},"a":"C","an":"选项C正确：证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行。 选项A错误：证券登记结算机构应当依法制定章程和业务规则，并经国务院证券监督管理机构（而非证券交易所）批准。 选项B错误：证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料，其保存期限不得少于20年（而非10年）。 选项D错误：证券登记结算机构不得挪用客户的证券。","type":"single"},{"id":"cy_fin_945","q":"证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以（）的罚款。","c":{"A":"一百万元以上一千万元以下","B":"二百万元以上二千万元以下","C":"三百万元以上三千万元以下","D":"五百万元以上五千万元以下"},"a":"A","an":"选项A正确：《证券法》第一百八十三条规定，证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得，并处以违法所得1倍以上10倍以下的罚款；没有违法所得或者违法所得不足100万元的，处以100万元以上1000万元以下的罚款；情节严重的，并处暂停或者撤销相关业务许可。给投资者造成损失的，应当与发行人承担连带赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告，并处以50万元以上500万元以下的罚款。","type":"single"},{"id":"cy_fin_947","q":"证券公司违反证券法第八十八条的规定未履行或者未按照规定履行投资者适当性管理义务的，以下相关监管措施错误的是（）。","c":{"A":"责令改正","B":"给予警告","C":"并处以五十万元以上五百万元以下的罚款","D":"对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以下的罚款"},"a":"C","an":"题目问的是”措施错误的“。选项C：《证券法》第一百九十八条规定，证券公司违反本法第八十八条的规定未履行或者未按照规定履行投资者适当性管理义务的，责令改正，给予警告，并处以十万元以上一百万元以下（而非50-500万，选项C错误）的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处以二十万元以下的罚款。因此答案选择C。","type":"single"},{"id":"cy_fin_949","q":"申请证券上市交易，应当向（）提出申请，由（）依法审核同意，并由双方签订上市协议。","c":{"A":"证券业协会；证券交易所","B":"证券交易所；证券交易所","C":"证券交易所；证监会","D":"证监会；证监会"},"a":"B","an":"选项B正确：申请证券上市交易，应当向证券交易所提出申请，由证券交易所依法审核同意，并由双方签订上市协议。 证券交易所根据国务院授权的部门的决定安排政府债券上市交易。 （关键：证券上市交易由证券交易所负责，可排除其他选项） 选项A错误：证券业协会是证券业的自律性组织，主要职责是行业自律、服务会员等。 选项CD错误：证监会是国务院直属正部级事业单位，负责证券市场的监督管理工作。","type":"single"},{"id":"cy_fin_951","q":"证券市场的三公原则是（）。","c":{"A":"公开、公平、公正","B":"公开、公信、公正","C":"公开、公平、公信","D":"公信、公平、公正"},"a":"A","an":"选项A正确：证券的发行、交易活动，必须遵循公开、公平、公正的原则。  【知识拓展】 公开：指证券市场的信息要充分披露，确保所有投资者都能获得相同的信息。 公平：指在证券发行和交易中，所有参与者都应当被平等对待，没有特权或歧视。 公正：指监管机构在执行监管职责时，应当公正无私，依法办事。","type":"single"},{"id":"cy_fin_953","q":"证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式，为（）方式。","c":{"A":"代销","B":"助销","C":"直销","D":"包销"},"a":"A","an":"选项A正确：证券代销是指证券公司代发行人发售证券，在承销期结束时，将未售出的证券全部退还给发行人的承销方式。 选项B错误：助销是指承销商按承销合同规定，在约定的承销期满后对剩余的证券出资买进，或者按剩余部分的数额向发行人贷款，以保证发行人的筹资、用资计划顺利实现。 选项C错误：直销一般是指发行人直接向投资者销售证券，而不通过证券公司等中介机构进行承销的方式。 选项D错误：包销又分为全额包销和余额包销。全额包销是指由承销商先全额购买发行人该次发行的证券，再向投资者发售，承销商承担全部风险；余额包销是指承销商在承销期结束时将售后剩余证券全部自行购入。","type":"single"},{"id":"cy_fin_955","q":"通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到（）时，继续进行收购的，应当依法向该上市公司所有股东发出收购上市公司全部或者部分股份的要约。","c":{"A":"0.15","B":"0.25","C":"0.3","D":"0.45"},"a":"C","an":"选项C正确：根据《证券法》第六十五条的规定，通过证券交易所的证券交易，投资者持有或者通过协议、其他安排与他人共同持有一家上市公司已发行的有表决权股份达到【百分之三十】时，继续进行收购的，应当依法向该上市公司所有股东发出收购上市公司全部或者部分股份的要约。","type":"single"},{"id":"cy_fin_957","q":"在上市公司收购行为完成后，收购人应当在（）日内将收购情况报告国务院证券监督管理机构和证券交易所，并予公告。","c":{"A":"3","B":"5","C":"15","D":"30"},"a":"C","an":"选项C正确：收购行为完成后，收购人应当在15日内将收购情况报告国务院证券监督管理机构和证券交易所，并予公告。","type":"single"},{"id":"cy_fin_959","q":"证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料。其保存期限不得少于（）。","c":{"A":"10年","B":"15年","C":"20年","D":"永久"},"a":"C","an":"选项C正确：证券登记结算机构应当妥善保存登记、存管和结算的原始凭证及有关文件和资料。其保存期限不得少于二十年。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_961","q":"下列选项中，不属于证券登记结算机构职能的是（）。","c":{"A":"证券的存管和过户","B":"公布证券交易即时行情","C":"证券持有人名册登记","D":"受发行人的委托派发证券权益"},"a":"B","an":"题目问的是“不属于”。选项B：“公布证券交易即时行情”是证券交易所的职能，因此答案选择B。 选项ACD：证券登记结算机构履行下列职能： （一）证券账户、结算账户的设立； （二）证券的存管和过户（选项A正确）；  （三）证券持有人名册登记（选项C正确）； （四）证券交易的清算和交收； （五）受发行人的委托派发证券权益（选项D正确）； （六）办理与上述业务有关的查询、信息服务； （七）国务院证券监督管理机构批准的其他业务。","type":"single"},{"id":"cy_fin_963","q":"证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，下列表述的相关处罚措施正确的有（）。","c":{"A":"责令停止承销或者销售，没收违法所得，并处以违法所得一倍以上十倍以下的罚款","B":"没有违法所得或者违法所得不足一百万元的，处以一百万元以上一千万元以下的罚款","C":"情节严重的，并处暂停或者撤销相关业务许可","D":"对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款"},"a":"A,B,C","an":"选项ABC正确，选项D错误：根据《证券法》第一百八十三条规定，证券公司承销或者销售擅自公开发行或者变相公开发行的证券的，责令停止承销或者销售，没收违法所得，并处以违法所得一倍以上十倍以下的罚款（A选项）；没有违法所得或者违法所得不足一百万元的，处以一百万元以上一千万元以下的罚款（B选项）；情节严重的，并处暂停或者撤销相关业务许可（C选项）。给投资者造成损失的，应当与发行人承担连带赔偿责任。对直接负责的主管人员和其他直接责任人员给予警告，并处以五十万元以上五百万元以下（非10-100万）的罚款（D选项错误）。","type":"multi"},{"id":"cy_fin_965","q":"发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，可能受到的处罚措施包括（）。","c":{"A":"尚未发行证券的，处以二百万元以上二千万元以下的罚款","B":"已经发行证券的，处以非法所募资金金额百分之十以上一倍以下的罚款","C":"对直接负责的主管人员和其他直接责任人员，处以一百万元以上一千万元以下的罚款","D":"尚未发行证券的，处以一百万元以上一千万元以下的罚款"},"a":"A,B,C","an":"选项ABC正确，选项D错误：根据《证券法》第一百八十一条的规定，发行人在其公告的证券发行文件中隐瞒重要事实或者编造重大虚假内容，尚未发行证券的，处以二百万元以上二千万元以下的罚款（A正确，D错误）；已经发行证券的，处以非法所募资金金额百分之十以上一倍以下的罚款（B选项）。对直接负责的主管人员和其他直接责任人员，处以一百万元以上一千万元以下的罚款（C选项）。","type":"multi"},{"id":"cy_fin_967","q":"下列关于证券结算风险基金，说法正确的是（）。","c":{"A":"证券登记结算机构以证券结算风险基金赔偿后，不再向有关责任人追偿","B":"证券结算风险基金从证券登记结算机构的业务收入和收益中提取","C":"证券结算风险基金应当存入指定银行的专门账户，实行专项管理","D":"证券结算风险基金，用于垫付或者弥补因违约交收、技术故障、操作失误、不可抗力造成的证券登记结算机构的损失"},"a":"B,C,D","an":"选项A错误：证券登记结算机构以证券结算风险基金赔偿后，应当（而非不再追偿）向有关责任人追偿。 选项B正确：证券结算风险基金从证券登记结算机构的业务收入和收益中提取，并可以由结算参与人按照证券交易业务量的一定比例缴纳。 选项C正确：证券结算风险基金应当存入指定银行的专门账户，实行专项管理。 选项D正确：证券结算风险基金，用于垫付或者弥补因违约交收、技术故障、操作失误、不可抗力造成的证券登记结算机构的损失。","type":"multi"},{"id":"cy_fin_969","q":"下列选项中，属于证券登记结算机构职能的有（）。","c":{"A":"证券账户、结算账户的设立","B":"证券的存管和过户","C":"证券持有人名册登记","D":"证券交易的清算和交收"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券法》的规定，证券登记结算机构应履行下列职能： （一）证券账户、结算账户的设立（A正确）；  （二）证券的存管和过户（B正确）；  （三）证券持有人名册登记（C正确）；  （四）证券交易的清算和交收（D正确）； （五）受发行人的委托派发证券权益； （六）办理与上述业务有关的查询、信息服务； （七）国务院证券监督管理机构批准的其他业务。","type":"multi"},{"id":"cy_fin_971","q":"证券的承销方式包括（）。","c":{"A":"统销","B":"包销","C":"代销","D":"直销"},"a":"B,C","an":"选项BC正确：证券承销业务采取【代销或者包销】方式。 选项AD错误：“统销”和“直销”并不是证券承销业务的法定分类","type":"multi"},{"id":"cy_fin_973","q":"下列有关证券登记结算机构的说法，错误的是（）。","c":{"A":"投资者委托证券公司进行证券交易，可以不开立证券账户","B":"在证券交易所或者国务院批准的其他全国性证券交易场所交易的证券，应当全部存管在证券公司","C":"证券登记结算机构以证券结算风险基金赔偿后，应当向有关责任人追偿","D":"证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行"},"a":"A,B","an":"题目问的是”错误的是“。 选项A错误：投资者委托证券公司进行证券交易，【应当申请开立】证券账户； 选项B错误：在证券交易所或者国务院批准的其他全国性证券交易场所交易的证券，应当全部存管在证券登记结算机构（而不是证券公司）； 因此答案选择AB。 选项C正确：证券登记结算机构以证券结算风险基金赔偿后，应当向有关责任人追偿； 选项D正确：证券登记结算机构按照业务规则收取的各类结算资金和证券，必须存放于专门的清算交收账户，只能按业务规则用于已成交的证券交易的清算交收，不得被强制执行。","type":"multi"},{"id":"cy_fin_975","q":"设立证券登记结算机构，需要具备的条件包括（）。","c":{"A":"自有资金不少于人民币2亿元","B":"具有证券登记服务所必需的场所和设施","C":"具有证券存管服务所必需的场所和设施","D":"国务院证券监督管理机构规定的其他条件"},"a":"A,B,C,D","an":"选项ABCD正确：设立证券登记结算机构，应当具备下列条件：  （一）自有资金不少于人民币2亿元（A正确）；  （二）具有证券登记、存管和结算服务所必需的场所和设施（BC正确）；  （三）国务院证券监督管理机构规定的其他条件（D正确）。  证券登记结算机构的名称中应当标明“证券登记结算”字样。","type":"multi"},{"id":"cy_fin_977","q":"证券登记结算机构应当设立证券结算风险基金，用于垫付或者弥补因（）造成的证券登记结算机构的损失。","c":{"A":"违约交收","B":"技术故障","C":"操作失误","D":"不可抗力"},"a":"A,B,C,D","an":"选项ABCD正确：证券登记结算机构应当设立证券结算风险基金，用于垫付或者弥补因【违约交收、技术故障、操作失误、不可抗力】造成的证券登记结算机构的损失。","type":"multi"},{"id":"cy_fin_979","q":"下列属于证券公司操纵市场行为的有()。","c":{"A":"通过合谋，利用其资金、信息等优势连续买卖，影响证券交易价格或交易量","B":"不以成交为目的，频繁或者大量申报并撤销申报，影响证券交易价格或交易量","C":"在自己实际控制的账户间进行证券交易，影响证券交易价格或交易量","D":"利用非公开信息买卖证券"},"a":"A,B,C","an":"选项ABC正确：禁止任何人以下列手段操纵证券市场，影响或者意图影响证券交易价格或者证券交易量： (1)单独或者通过合谋，集中资金优势、持股优势或者利用信息优势联合或者连续买卖； (2)与他人串通，以事先约定的时间、价格和方式相互进行证券交易； (3)在自己实际控制的账户之间进行证券交易； (4)不以成交为目的，频繁或者大量申报并撤销申报； (5)利用虚假或者不确定的重大信息，诱导投资者进行证券交易； (6)对证券、发行人公开作出评价、预测或者投资建议，并进行反向证券交易； (7)利用在其他相关市场的活动操纵证券市场； (8)操纵证券市场的其他手段。 选项D错误：利用非公开信息交易属于内幕交易或利用未公开信息交易。","type":"multi"},{"id":"cy_fin_981","q":"非公开募集基金应当向合格投资者募集，合格投资者累计不得超过（）人。","c":{"A":"50","B":"100","C":"150","D":"200"},"a":"D","an":"选项D正确：非公开募集基金应当向合格投资者募集，合格投资者累计不得超200人。","type":"single"},{"id":"cy_fin_983","q":"非公开募集基金合格投资者的单位和个人应满足的条件，下列不符合的是（）。","c":{"A":"具备相应风险识别能力和风险承担能力","B":"达到规定财产规模或者收入水平","C":"基金份额认购金额不低于规定限额","D":"最近一年末净资产不低于800万元的法人单位"},"a":"D","an":"题目问的是”不符合“。选项D：最近1年末净资产不低于1 000万元的法人单位（800万不符合要求，选项D错误），因此答案选择D。 选项ABC：合格投资者是指具备相应风险识别能力和风险承担能力，投资于单只资产管理产品不低于一定金额且符合下列条件的自然人和法人或者其他组织。 (1)具有2年以上投资经历，且满足以下条件之一：家庭金融净资产不低于300万元，家庭金融资产不低于 500万元，或者近3年本人年均收入不低于40万元； (2)最近1年末净资产不低于1 000万元的法人单位； (3)金融管理部门视为合格投资者的其他情形。","type":"single"},{"id":"cy_fin_985","q":"证券公司应当按照规定向国务院证券监督管理机构报送业务、财务等经营管理信息和资料，其报送的内容不包括（）。","c":{"A":"年度报告","B":"每日报告","C":"月度报告","D":"临时报告"},"a":"B","an":"题目问的是“不包括”。选项B：干扰项，无此概念。因此答案选择B。 选项ACD：证券公司应当按照规定向国务院证券监督管理机构报送业务、财务等经营管理信息和资料。报送的内容包括年度、月度报告以及临时报告。","type":"single"},{"id":"cy_fin_987","q":"证券公司应当自每一会计年度结束之日起（）个月内，向国务院证券监督管理机构报送年度报告。","c":{"A":"2","B":"3","C":"4","D":"5"},"a":"C","an":"选项C正确：证券公司应当自每一会计年度结束之日起4个月内，向国务院证券监督管理机构报送年度报告。","type":"single"},{"id":"cy_fin_989","q":"证券公司年度报告中包括财务会计报告、风险控制指标报告以及国务院证券监督管理机构规定的其他专项报告，应当经会计师事务所审计，并应当附有该会计师事务所出具的（）。","c":{"A":"内部控制评审报告","B":"投资者基本信息表","C":"投资者风险承受能力评估问卷","D":"分类监管的评价计分表"},"a":"A","an":"选项A正确：证券公司年度报告中包括财务会计报告、风险控制指标报告以及国务院证券监督管理机构规定的其他专项报告，应当经会计师事务所审计，并应当附有该会计师事务所出具的【内部控制评审报告】。 选项B错误：投资者基本信息表通常是在客户开户时收集的客户资料。 选项C错误：投资者风险承受能力评估问卷通常是证券公司在提供服务前对投资者进行的风险评估工具，属于客户服务环节的资料。 选项D错误：分类监管评价计分表是国务院证券监督管理机构（如中国证监会）根据证券公司的合规状况、风险控制等因素进行评分的内部文件，由监管机构制定，而非会计师事务所。","type":"single"},{"id":"cy_fin_991","q":"对证券公司报送的年度报告，国务院证券监督管理机构应当指定（）进行审核并制作审核报告。","c":{"A":"专人","B":"期货公司财务人员","C":"期货公司报告撰写人","D":"专业机构人员"},"a":"A","an":"选项A正确：对证券公司报送的年度报告、月度报告，国务院证券监督管理机构应当指定【专人】进行审核，并制作审核报告。 选项BC错误：这里指的是证券公司的年度报告，而不是期货公司，且应由监管机构指定的专人进行审核。 选项D错误：法规明确规定应由国务院证券监督管理机构指定的专人进行审核，而不是外部的专业机构人员。","type":"single"},{"id":"cy_fin_993","q":"对证券公司报送的年度报告、月度报告，国务院证券监督管理机构应当指定专人进行审核，并制作审核报告，()应当在审核报告上签字。","c":{"A":"董事长","B":"副总经理","C":"审核人员","D":"总经理"},"a":"C","an":"选项C正确：对证券公司报送的年度报告、月度报告，国务院证券监督管理机构应当指定专人进行审核，并制作审核报告。审核人员应当在审核报告上签字。 选项ABD错误：监管机构审核，应由监管机构的专人进行审核并签名，而非证券公司内部人员。","type":"single"},{"id":"cy_fin_995","q":"证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，并在自受理之日起（）个月内作出批准或者不予批准的书面决定。","c":{"A":"1","B":"2","C":"3","D":"4"},"a":"C","an":"选项C正确：证券公司合并、分立的，国务院证券监督管理机构应当对合并、分立的申请进行审查，并在自受理之日起3个月内作出批准或者不予批准的书面决定。","type":"single"},{"id":"cy_fin_997","q":"证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起（）个工作日作出批准或者不予批准的书面决定。","c":{"A":"10","B":"15","C":"20","D":"30"},"a":"D","an":"选项D正确：证券公司停业、解散或者破产的，国务院证券监督管理机构应当对停业、解散、破产的申请进行审查，并在自受理之日起30个工作日作出批准或者不予批准的书面决定。","type":"single"},{"id":"cy_fin_999","q":"证券公司合并、分立、停业、解散、破产，应当经（）批准。","c":{"A":"国务院证券监督管理机构","B":"证券交易所","C":"中国人民银行","D":"证券业协会"},"a":"A","an":"选项A正确：证券公司合并、分立、停业、解散、破产，应当经国务院证券监督管理机构批准。 选项B错误：证券交易所主要负责提供证券交易的场所和服务。 选项C错误：中国人民银行作为中央银行，其主要职责在于制定和执行货币政策。 选项D错误：证券业协会属于行业自律组织。","type":"single"},{"id":"cy_fin_1001","q":"按照《企业破产法》第一百三十四条的规定，证券公司不能清偿到期债务，并且资产不足以清偿全部债务或者明显缺乏清偿能力的，（）可以向人民法院提出对该证券公司进行重整或者破产清算的申请。","c":{"A":"持有证券公司5％以上股权的股东","B":"国务院金融监督管理机构","C":"中国证券业协会","D":"债权人"},"a":"B","an":"选项B正确：证券公司不能清偿到期债务，并且资产不足以清偿全部债务或者明显缺乏清偿能力的，【国务院金融监督管理机构】可以向人民法院提出对该证券公司进行重整或者破产清算的申请。 选项A错误：虽然持有一定比例股权的股东在某些情况下可以对公司的重大决策产生影响，但根据该条款，他们并不是直接向法院提出重整或破产清算申请的合法主体。 选项C错误：中国证券业协会作为行业自律组织，不具有向法院提出此类申请的权利。 选项D错误：同学集中在选错D选项：虽然债权人在一般企业破产中拥有申请权，但在证券公司破产的特定情况下，申请权归属于国务院金融监督管理机构。","type":"single"},{"id":"cy_fin_1003","q":"证券公司应当自每月结束之日起（）个工作日内，报送月度报告。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"C","an":"选项C正确：证券公司应当自每月结束之日起【7个工作日内】，报送月度报告。","type":"single"},{"id":"cy_fin_1005","q":"证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，对直接负责的主管人员和其他直接责任人员单处或者并处警告、3万元以上（）万元以下的罚款。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"B","an":"选项B正确：证券公司未按照规定对离任的法定代表人或者高级管理人员进行审计，并报送审计报告的，对直接负责的主管人员和其他直接责任人员单处或者并处警告、【3万元以上10万元以下】的罚款。","type":"single"},{"id":"cy_fin_1007","q":"证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，若没有违法所得或者违法所得不足3万元的，处以3万元以上（）万元以下的罚款。","c":{"A":"10","B":"20","C":"30","D":"50"},"a":"C","an":"选项C正确：证券公司违反规定，与他人合资、合作经营管理分支机构，或者将分支机构承包、租赁或者委托给他人经营管理的，责令改正，给予警告，没收违法所得，并处以违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足3万元的，处以【3万元以上30万元以下】的罚款。","type":"single"},{"id":"cy_fin_1009","q":"证券公司公开披露的信息中有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以（）万元以下的罚款。","c":{"A":"100","B":"200","C":"50","D":"60"},"a":"A","an":"选项A正确：证券公司未按照规定公开披露信息，或者公开披露的信息中有虚假记载、误导性陈述或者重大遗漏的，责令改正，给予警告，并处以100万元以下的罚款；情节严重的，并处撤销相关业务许可。对直接负责的主管人员和其他直接责任人员，给予警告，并处以50万元以下的罚款。","type":"single"},{"id":"cy_fin_1011","q":"证券公司董事会设薪酬与提名委员会、审计委员会的，委员会负责人应该由（）担任。","c":{"A":"董事长","B":"总经理","C":"独立董事","D":"选举产生"},"a":"C","an":"选项C正确：证券公司董事会设薪酬与提名委员会、审计委员会的，委员会负责人由【独立董事】担任。 选项ABD错误：这些委员会的负责人由独立董事担任旨在确保委员会在决策过程中保持独立性和客观性，避免利益冲突。其他选项的负责人不符合独立性要求。","type":"single"},{"id":"cy_fin_1013","q":"国务院证券监督管理机构可以要求（）等单位或者个人，在指定的期限内提供与证券公司经营管理和财务状况有关的资料、信息。","c":{"A":"证券公司的董事、监事、工作人员","B":"证券公司的股东、实际控制人","C":"证券公司控股或者实际控制的企业","D":"证券公司的开户银行、指定商业银行、资产托管机构、证券交易所、证券登记结算机构"},"a":"A,B,C,D","an":"选项ABCD正确：国务院证券监督管理机构可以要求下列单位或者个人，在指定的期限内提供与证券公司经营管理和财务状况有关的资料、信息: （1）证券公司的董事、监事、工作人员（A正确）；  （2）证券公司的股东、实际控制人（B正确）；  （3）证券公司控股或者实际控制的企业（C正确）；  （4）证券公司的开户银行、指定商业银行、资产托管机构、证券交易所、证券登记结算机构（D正确）； （5）为证券公司提供服务的证券服务机构。","type":"multi"},{"id":"cy_fin_1015","q":"对证券公司报送的（），国务院证券监督管理机构应当指定专人进行审核，并制作审核报告。","c":{"A":"年度报告","B":"月度报告","C":"季度报告","D":"半年度报告"},"a":"A,B","an":"选项AB正确：对证券公司报送的【年度报告、月度报告】，国务院证券监督管理机构应当指定专人进行审核，并制作审核报告。审核人员应当在审核报告上签字。审核中发现问题的，国务院证券监督管理机构应当及时采取相应措施。 选项CD错误：法律对证券公司的季报和半年报无强制要求。","type":"multi"},{"id":"cy_fin_1017","q":"下列选项中，属于《证券公司监督管理条例》立法宗旨的是（）。","c":{"A":"加强对证券公司的监督管理","B":"规范证券公司的行为","C":"防范证券公司的风险","D":"履行诚信义务"},"a":"A,B,C","an":"选项D错误：“履行诚信义务”是证券公司的重要职责之一，但不是立法宗旨。 选项ABC正确：《证券公司监督管理条例》立法宗旨有： （1）加强对证券公司的监督管理（A正确）； （2）规范证券公司的行为（B正确）； （3）防范证券公司的风险（C正确）； （4）保护投资者的合法权益和社会公共利益； （5）促进证券业健康发展。","type":"multi"},{"id":"cy_fin_1019","q":"被处置证券公司的董事、监事、高级管理人员等有关人员拒绝配合现场工作组、托管组、接管组、行政清理组依法履行职责，处以其年收入（）的罚款。","c":{"A":"1倍以上3倍以下","B":"1倍以上2倍以下","C":"2倍以上3倍以下","D":"2倍以上4倍以下"},"a":"B","an":"选项B正确：被处置证券公司的董事、监事、高级管理人员等有关人员拒绝配合现场工作组、托管组、接管组、行政清理组依法履行职责，处以其年收入【1倍以上2倍以下】的罚款。","type":"single"},{"id":"cy_fin_1021","q":"根据《证券公司风险处置条例》,国务院证券监督管理机构在处置证券公司风险工作中，履行的职责有()。","c":{"A":"制订证券公司风险处置方案并组织实施","B":"对证券公司的违法行为立案稽查并予以处罚","C":"及时向公安机关等通报涉嫌刑事犯罪的情况，按照有关规定移送涉嫌犯罪的案件","D":"向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况6.","E":"判断题","F":"证券公司在12个月内未完成行政重组的，国务院证券监督管理机构可以决定延长期限12个月。（）"},"a":"A,B,C,D","an":"国务院证券监督管理机构在处置证券公司风险工作中，履行下列职责： (1)制订证券公司风险处置方案并组织实施；（A正确） (2)派驻风险处置现场工作组，对被处置证券公司、托管组、接管组、行政清理组、管理人以及参与风险处置的其他机构和人员进行监督和指导； (3)协调证券交易所、证券登记结算机构、证券投资者保护基金管理机构，保障被处置证券公司证券经纪业务正常进行； (4)对证券公司的违法行为立案稽查并予以处罚；（B正确）  (5)及时向公安机关等通报涉嫌刑事犯罪的情况，按照有关规定移送涉嫌犯罪的案件；（C正确）  (6)向有关地方人民政府通报证券公司风险状况以及影响社会稳定的情况；（D正确） (7)法律、行政法规要求履行的其他职责。","type":"multi"},{"id":"cy_fin_1023","q":"证券公司任免董事、监事、高级管理人员，应当报（）备案。","c":{"A":"法院","B":"当地人民政府","C":"中国证券业协会","D":"国务院证券监督管理机构"},"a":"D","an":"选项D正确：证券公司任免董事、监事、高级管理人员，应当报【国务院证券监督管理机构】备案。 选项A错误：法院主要负责司法审判工作，并不涉及证券公司的日常管理和人员任免备案。 选项B错误：当地人民政府负责管理本行政区域内的经济、社会、文化等各项行政事务。 选项C错误：中国证券业协会发挥行业自律作用，并不负责证券公司高管的备案。","type":"single"},{"id":"cy_fin_1025","q":"证券公司工作人员对以任何方式知悉的敏感信息负有严格的保密义务，不得利用敏感信息为自己或他人谋取不当利益。证券公司采取的以下保密措施错误的是（）。","c":{"A":"建立内幕信息知情人管理制度","B":"与公司工作人员签署保密文件","C":"对可能知悉敏感信息的工作人员使用公司的信息系统或配发的设备形成的电子邮件、即时通信信息和其他通信信息进行监测","D":"证券公司聘用外部服务商的，无权要求其对在服务中获知的敏感信息进行保密"},"a":"D","an":"题目问的是”措施错误的“。 选项D错误：证券公司聘用外部服务商的，应当（并非无权）与服务商约定其对在服务中获知的敏感信息负有保密义务。因此答案选择D。 选项ABC正确。","type":"single"},{"id":"cy_fin_1027","q":"证券公司在开展业务创新时，在可行性研究的基础上，应当及时与（）沟通，履行创新业务的报备(报批)程序。","c":{"A":"中国证券业协会","B":"中国证监会","C":"中国证监会派出机构","D":"中国证券登记结算有限责任公司"},"a":"B","an":"选项B正确：证券公司在开展业务创新时，在可行性研究的基础上，应当及时与中国证监会沟通，履行创新业务的报备(报批)程序。 选项A错误：中国证券业协会主要负责行业自律管理，不是直接监管业务创新的机构。 选项C错误：在创新业务的初次沟通和报备报批上，通常是由中国证监会直接处理，而不是派出机构。 选项D错误：中国证券登记结算有限责任公司主要负责证券登记、托管和结算等业务，不涉及创新业务的审批流程。","type":"single"},{"id":"cy_fin_1029","q":"根据《证券公司分类监管规定》，证券公司分类评价（）进行一次。","c":{"A":"每年","B":"每季度","C":"每月","D":"每半年"},"a":"A","an":"选项A正确：证券公司分类评价首先设定正常经营的证券公司基准分为100分。分类评价每年进行一次，评价期为上一年度5月1日至本年度4月30日。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_1031","q":"某证券公司总经理张某利用职权，收受合作方提供的购物卡共计5万元。根据证券公司高级管理人员义务规定，该行为主要违反了（  ）。","c":{"A":"信息保密义务","B":"忠实义务","C":"公平交易义务","D":"合规管理义务"},"a":"B","an":"选项B正确：证券公司的高级管理人员对证券公司负有忠实义务和勤勉义务。高级管理人员不得利用职权收受贿赂或者其他非法收入，不得侵占公司的财产。 选项ACD为干扰项","type":"single"},{"id":"cy_fin_1033","q":"证券公司管理敏感信息的核心原则是（），是信息隔离墙制度中敏感信息管理的核心原则。","c":{"A":"责任自负原则","B":"需知原则","C":"分散投资原则","D":"理智投资原则"},"a":"B","an":"选项B正确：证券公司应当按照需知原则管理敏感信息。【需知原则】是信息隔离墙制度中敏感信息管理的核心原则，有需要方享有知情权。敏感信息应仅限于“需要知悉”的人知悉，即仅限于存在合理业务需求或管理职责需要的工作人员才可获得相关敏感信息。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_1035","q":"证券公司董事会每年至少召开（）次会议。","c":{"A":"1","B":"2","C":"3","D":"4"},"a":"B","an":"选项B正确：证券公司董事会每年至少召开2次会议。","type":"single"},{"id":"cy_fin_1037","q":"证券公司设董事会的，内部董事人数不得超过董事人数的（）。","c":{"A":"1／2","B":"1／3","C":"1／4","D":"1／5"},"a":"A","an":"选项A正确：证券公司设董事会的，内部董事人数不得超过董事人数的【1／2】。","type":"single"},{"id":"cy_fin_1039","q":"按照《证券公司合规管理实施指引》的要求，某证券公司设立合规负责人王某，王某发现该证券公司发生违法违规行为并且存在合规风险隐患，王某的下列做法错误的是（）。","c":{"A":"王某依照公司章程规定及时向董事会、经营管理主要负责人报告，提出处理意见，并督促整改","B":"对于违规行为，王某督促该证券公司及时向证监会相关派出机构报告","C":"对于该证券公司违反行业规范和自律规则的情况，王某只向证监会相关派出机构进行了报告","D":"王某督促该证券公司进行专项检查"},"a":"C","an":"题目问的是”做法错误的“。 选项B正确，选项C错误：合规负责人应当同时督促公司及时向中国证监会相关派出机构报告；公司未及时报告的，合规负责人应当直接向中国证监会相关派出机构报告；有关行为违反行业规范和自律规则的，还应当向有关自律组织报告。因此答案选择C。 选项A正确：根据《证券公司合规管理实施指引》的要求，合规负责人王某在发现公司存在违法违规行为或合规风险隐患时，应依照公司章程规定及时向董事会、经营管理主要负责人报告，并提出处理意见，督促整改。 选项D正确：合规负责人还可以督促公司进行专项检查以进一步查明情况并采取相应措施。","type":"single"},{"id":"cy_fin_1041","q":"证券公司持续合规状况主要根据（）等情况进行评价。","c":{"A":"司法机关采取的刑事处罚措施","B":"中国证监会及其派出机构采取的行政监管措施","C":"证券期货行业自律组织纪律处分","D":"公司所在地公司登记机关采取的行政处罚措施"},"a":"A,B,C","an":"选项ABC正确：证券公司持续合规状况主要根据司法机关采取的刑事处罚措施、中国证监会及其派出机构采取的行政处罚措施、监管措施及证券期货行业自律组织纪律处分、自律监管措施等情况进行评价。 选项D为干扰项。证券公司持续合规状况的评价重点围绕证券业务相关的监管措施，而非企业登记注册等一般性工商行政管理事项。","type":"multi"},{"id":"cy_fin_1043","q":"某证券公司2022年2月25日举行了本年第一次董事会会议，下列关于董事会会议的设置和议事规则正确的是（）。","c":{"A":"因为几位董事无法按时出席董事会现场，最终决定采用视频会议的方式举行董事会","B":"此次董事会会议因为无重大异议事项，没有制作会议记录","C":"此次董事会会议共有2／3的无关联关系的董事参加","D":"董事会表决有关关联交易的议案时，与交易对方有关联关系的董事不需回避"},"a":"A,C","an":"选项A正确：除由于紧急情况、不可抗力等特殊原因无法举行现场、视频或者电话会议外，董事会会议应当采取现场、视频或者电话会议方式。 选项C正确：董事会会议有过半数的无关联关系董事出席即可举行。2/3符合要求。 选项B错误：董事会会议应当制作会议记录，并可以录音。 选项D错误：董事会表决有关关联交易的议案时，与交易对方有关联关系的董事应当回避（非不需回避）。","type":"multi"},{"id":"cy_fin_1045","q":"证券公司经纪业务内部控制应重点防范挪用客户交易结算资金及其他客户资产、非法融入融出资金以及结算风险等。具体而言，经纪业务方面的主要制度包括（）。","c":{"A":"法人集中清算制度","B":"客户交易结算资金集中管理制度","C":"高级管理人员分工制度","D":"交易数据安全备份制度"},"a":"A,B,D","an":"选项C错误：高级管理人员分工制度属于投资银行类业务内部控制。 选项ABD正确：都属于经纪业务的主要制度。其他经纪业务制度可参考以下拓展。  【知识拓展】经纪业务内部控制 (1)加强经纪业务整体规划，加强营业网点布局、规模、选址以及软件、硬件技术标准(含升级)等的统一规划和集中管理。 (2)制定统一完善的经纪业务标准化服务规程、操作规范和相关管理制度。 (3)制定标准化的开户文本格式，制定统一的开户程序，要求所属证券营业部按照程序认真审核客户资料的真实性和完整性，关注客户资金来源的合法性。 (4)建立对录入证券交易系统的客户资料等内容的复核和保密机制；妥善保管客户开户、交易及其他资料，杜绝非法修改客户资料；完善客户查询、咨询和投诉处理等制度，确保客户能够及时获知其账户、资金、交易、清算等方面的完整信息。 (5)要求所属证券营业部与客户签订代理交易协议，协议中除载明双方权利义务和风险提示外，还应列示营业部可从事的合法业务范围及证券公司授权的业务内容，并向客户明示证券公司禁止营业部从事的业务内容。 (6)针对账户管理、资金存取及划转、委托与撤单、清算交割、指定交易及转托管、查询及咨询等业务环节存在的风险，制定操作程序和具体控制措施。 (7)对开户、资金存取及划转、接受委托、清算交割等重要岗位应适当分离，客户资金与自有资金严格分开运作、分开管理。 (8)在证券营业部采用统一的柜面交易系统，并加强对柜面交易系统的风险评估，严防通过修改柜面交易系统的功能及数据从事违法违规活动；证券公司应采取严密的系统安全措施、严格的授权进入及记录制度，并开启系统的审计留痕功能。 (9)实行法人集中清算制度及客户交易结算资金集中管理制度，保证客户交易结算资金的安全，防范结算风险。 (10)建立对托管证券等的登记程序与独立监控机制，严防发生挪用客户托管的证券等进行抵押、回购或卖空交易及其他损害客户利益的行为。 (11)通过身份认证、证件审核、密码管理、指令记录等措施，加强对交易清算系统的管理，确保交易清算系统的安全。 (12)建立健全经纪业务的实时监控系统。证券公司的监督检查部门或其他独立部门负责对证券营业部资金划转、证券转移、交易活动进行实时监控，并对异常资金流转、异常证券转移、异常交易及违规行为实时预警。 (13)定期、不定期地对证券营业部交易系统、财务系统和清算系统进行检查，加强交易信息与财务信息、清算信息的核对，确保相关信息与证券交易所、登记结算公司、商业银行等提供的信息相符。 (14)建立交易数据安全备份制度，对交易数据采取多介质备份与异地备份相结合的数据备份方式，确保交易数据的安全完整。 (15)网上交易系统应采取有效的身份认证及访问控制措施，应详细记录客户的网上交易和查询过程。加强交易方身份识别，并对访问权限进行控制，确保交易的安全、可靠。 (16)网上交易系统应采用防火墙、入侵检测等措施保障网络安全，采用高强加密等有效技术手段，防止客户数据被窃取、篡改。 (17)对网络中断、委托中断、客户数据丢失、银证转账故障、交易服务器故障以及出现供电中断、火灾、抢劫等紧急情况，应制定和定期修订灾难恢复和应急处理预案，建立应急演习机制，确保及时有效地处理各种故障和危机。 (18)建立投资者教育与信息沟通机制，向投资者充分揭示投资风险，加强与投资者信息沟通。 (19)建立交易清算差错的处理程序和审批制度，建立重大交易差错的报告制度，明确交易清算差错的纠纷处理，防止出现隐瞒不报、擅自处理差错等情况。差错处理应留审计痕迹。 (20)建立由相对独立人员对重点客户进行定期回访的制度。","type":"multi"},{"id":"cy_fin_1047","q":"跨墙人员在跨墙期间，出于撰写深度研究报告的需要，可以适当使用跨墙后知悉的、尚未公开的内幕信息。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"跨墙人员在跨墙期间不应泄露或不当使用跨墙后知悉的内幕信息，不应获取与跨墙业务无关的内幕信息。","type":"judge"},{"id":"cy_fin_1049","q":"证券公司并表管理的最终责任应当由（  ）承担。","c":{"A":"经理层","B":"监事会","C":"董事会","D":"各部门负责人"},"a":"C","an":"选项C正确：证券公司董事会应当承担并表管理的最终责任，有效介入并表管理全流程管控。 选项A错误：证券公司经理层负责组织实施并表管理。 选项B错误：证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)承担并表管理的监督责任。 选项D错误：属于执行层面。","type":"single"},{"id":"cy_fin_1051","q":"证券公司资本管理的目标包括（  ）。","c":{"A":"将资本水平维持在监管要求之上","B":"将资本水平维持在满足业务发展需求之上","C":"提升资本使用效率","D":"提升资本回报水平"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当坚持资本集约型、高质量稳健发展，聚焦主责主业，对各附属机构和各业务条线进行合理的资本布局和结构调整，将资本水平始终维持在监管要求及满足业务发展需求之上，提升资本使用效率和回报水平。","type":"multi"},{"id":"cy_fin_1053","q":"证券公司可以基于并表管理的合理需要，无条件地在并表管理体系范围内采集和运用任何数据。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司可基于并表管理的合理需要，依法依规在并表管理体系范围内采集和运用并表管理所需数据。","type":"judge"},{"id":"cy_fin_1055","q":"证券期货经营机构对普通投资者的风险承受能力进行评估，评估的主要因素一般不包括（）。","c":{"A":"债务状况","B":"宗教信仰","C":"投资知识和经验","D":"诚信状况"},"a":"B","an":"题目问的是“不包括”。 选项B错误：宗教信仰属于个人信仰或价值观范畴，与投资决策能力、财务状况、风险承受能力无直接关联。因此答案选择B。 选项ACD正确：证券期货经营机构应当按照有效维护投资者合法权益的要求，综合考虑收入来源、资产状况、债务、投资知识和经验、风险偏好、诚信状况等因素，确定普通投资者的风险承受能力，对其进行细化分类和管理。","type":"single"},{"id":"cy_fin_1057","q":"证券期货经营机构进行现场录音或者录像留痕之后，应当按照相关规定妥善保存其履行适当性义务的相关信息资料，对于匹配方案、告知警示资料、录音录像资料、自查报告等的保存期限不得少于（）年。","c":{"A":"5","B":"10","C":"15","D":"20"},"a":"D","an":"证券期货经营机构应当按照相关规定妥善保存其履行适当性义务的相关信息资料，防止泄露或者被不当利用，接受中国证监会及其派出机构和自律组织的检查，对于匹配方案、告知警示资料、录音录像资料、自查报告等的保存期限不得少于20年。","type":"single"},{"id":"cy_fin_1059","q":"王女士是一名普通投资者，她通过证券公司的手机APP在线申请变更为专业投资者。证券公司履行告知和确认程序时，最合规的做法是（  ）。","c":{"A":"由客户经理电话联系王女士说明风险并电话录音","B":"在APP中设置清晰的告知页面，并由王女士通过电子签名等方式进行确认","C":"要求王女士必须亲临营业部现场办理并签字","D":"无需特别确认，系统自动根据其资产情况升级"},"a":"B","an":"在普通投资者申请转为专业投资者，向普通投资者销售高风险产品或者提供相关服务，经营机构主动调整投资者分类、产品或者服务分级、适当性匹配意见及向普通投资者履行信息告知义务这四种情形下，经营机构应： 1.通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像； 2.通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1061","q":"刘先生是风险承受能力最低类别的投资者。某券商客户经理向其介绍一款低风险的国债产品被拒绝后，转而推荐一款风险等级为R3的混合型基金，并称“这个也很稳，很多人都买”。该客户经理（  ）。","c":{"A":"满足了客户的投资需求","B":"违反了规定，属于向风险承受能力最低类别投资者销售风险等级高于其承受能力的产品","C":"只要充分提示了风险，就可以销售","D":"是在为客户提供更多选择"},"a":"B","an":"经营机构在销售产品或者提供服务的过程中，应勤勉尽责，审慎履职，全面了解投资者情况，充分揭示风险，基于投资者的不同风险承受能力以及产品或者服务的不同风险等级等因素，提出明确的适当性匹配意见，将适当的产品或者服务提供给适合的投资者，并禁止进行下列活动： 1.向不符合准入要求的投资者销售产品或者提供服务； 2.向投资者就不确定事项提供确定性的判断，或者告知投资者有可能使其误认为具有确定性的意见； 3.向普通投资者主动推介风险等级高于其风险承受能力的产品或者服务； 4.向普通投资者主动推介不符合其投资目标的产品或者服务； 5.向风险承受能力最低类别的投资者销售或者提供风险等级高于其风险承受能力的产品或者服务； 6.其他违背适当性要求，损害投资者合法权益的行为。 综上，该题选B，选项ACD错误","type":"single"},{"id":"cy_fin_1063","q":"根据《证券期货投资者适当性管理办法》，除（）情形外，证券经营机构通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像；通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。","c":{"A":"普通投资者申请转为专业投资者","B":"向专业投资者销售高风险产品或服务","C":"经营机构主动调整投资者分类、产品或者服务分级、适当性匹配意见","D":"向普通投资者履行信息告知义务"},"a":"B","an":"选项B错误：向专业投资者销售高风险产品或服务并不需要全过程录音或者录像（原因：专业投资者具有较高的风险识别和承受能力，不需要像普通投资者那样受到特别保护）。因此答案选择B。 选项ACD正确：在普通投资者申请转为专业投资者，向普通投资者销售高风险产品或者提供相关服务，经营机构主动调整投资者分类、产品或者服务分级、适当性匹配意见以及向普通投资者履行信息告知义务这四种情形下，经营机构：（1）通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像；（2）通过互联网等非现场方式进行的，应当完善配套留痕安排，由普通投资者通过符合法律、行政法规要求的电子方式进行确认。","type":"single"},{"id":"cy_fin_1065","q":"经营机构从业人员违反相关法律法规和《证券期货投资者适当性管理办法》规定，情节严重的，中国证监会可以依法采取（）的措施。","c":{"A":"出具警示函","B":"责令改正","C":"市场禁入","D":"监管谈话"},"a":"C","an":"选项C正确：经营机构从业人员违反相关法律法规和《证券期货投资者适当性管理办法》规定，情节严重的，中国证监会可以依法采取【市场禁入】的措施。 选项A错误：出具警示函是一种较轻的监管措施，通常用于提醒和警告违规行为。 选项B错误：责令改正是要求违规机构或个人纠正其不当行为，也是一种较轻的监管措施。 选项D错误：监管谈话是一种较为温和的监管措施，通常用于了解情况、提出整改要求等。","type":"single"},{"id":"cy_fin_1067","q":"（）是证券期货经营机构服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的在于“将适当的产品或服务销售或提供给适当的投资者”。","c":{"A":"法人集中清算制度","B":"信息隔离墙制度","C":"利益冲突管理机制","D":"投资者适当性制度"},"a":"D","an":"选项D正确：投资者适当性制度是证券期货经营机构服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的在于“将适当的产品或服务销售或提供给适当的投资者”。 选项A错误：法人集中清算制度是指由特定的清算机构集中处理证券交易的清算和交收工作。主要目的是提高清算效率，降低清算风险 选项B错误：信息隔离墙制度是为了防止内幕信息泄露和不公平交易而建立的一种内部管理制度。主要目的是防范利益冲突，保护投资者利益。 选项C错误：利益冲突管理机制是为了管理和减少机构内部可能出现的利益冲突而建立的机制。主要目的是确保公平交易，保护投资者利益。","type":"single"},{"id":"cy_fin_1069","q":"证券经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循的基本原则不包括（）。","c":{"A":"投资者利益优先原则","B":"勤勉尽责原则","C":"客观性原则","D":"盈利最大化原则"},"a":"D","an":"题目问的是“不包括”。 选项D错误：适当性管理的核心是 “匹配客户风险承受能力”，而非追求机构自身盈利，因此答案选择D。 选项ABC正确：证券经营机构执行投资者适当性的基本原则： （1）投资者利益优先原则。  （2）勤勉尽责原则。  （3）客观性原则。 （4）有效性原则。 （5）差异性原则。","type":"single"},{"id":"cy_fin_1071","q":"“了解你的客户”是投资者适当性管理工作的核心内容之一。经营机构向投资者销售产品或者提供服务时，（）不是应当了解的投资者的必要信息。","c":{"A":"诚信记录","B":"投资目标","C":"风险偏好及可承受的损失","D":"自然人的家庭成员情况"},"a":"D","an":"题目问的是”不是“。 选项D错误：经营机构在进行投资者适当性管理时，主要关注的是投资者自身的财务状况、投资经验、风险承受能力等与投资直接相关的信息，家庭成员情况不是应当了解的投资者的必要信息，因此答案选择D。 选项ABC正确：根据《证券期货投资者适当性管理办法》 的要求，经营机构向投资者销售产品或者提供服务时，应当了解投资者的下列信息： （1）自然人的姓名、住址、职业、年龄、联系方式，法人或者其他组织的名称、注册地址、办公地址、性质、资质及经营范围等基本信息； （2）收入来源和数额、资产、债务等财务状况； （3）投资相关的学习、工作经历及投资经验； （4）投资期限、品种、期望收益等投资目标； （5）风险偏好及可承受的损失； （6）诚信记录； （7）实际控制投资者的自然人和交易的实际受益人； （8）法律法规、自律规则规定的投资者准入要求相关信息； （9）其他必要信息。","type":"single"},{"id":"cy_fin_1073","q":"同时符合下列条件的法人或者其他组织是第二类专业投资者：最近1年末净资产不低于（）万元；最近1年末金融资产不低于（）万元；具有2年以上证券、基金、期货、黄金、外汇等投资经历。","c":{"A":"1000；1000","B":"2000；1000","C":"2000；2000","D":"1000；2000"},"a":"B","an":"选项B正确：符合下列条件之一的是第二类专业投资者。 同时符合下列条件的法人或者其他组织: （1）最近1年末净资产不低于【2000万元】; （2）最近1年末金融资产不低于【1000万元】; （3）具有2年以上证券、基金、期货、黄金、外汇等投资经历。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_1075","q":"经营机构违反《证券期货投资者适当性管理办法》，未按规定对普通投资者进行细化分类和管理的，应当给予警告，并处（）万元以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处（）万元以下罚款。","c":{"A":"1；1","B":"2；2","C":"3；3","D":"3；1"},"a":"C","an":"选项C正确：违反《证券期货投资者适当性管理办法》第十条，未按规定对普通投资者进行细化分类和管理的，给予警告，并处以【3万元】以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处以【3万元】以下罚款。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_1077","q":"证券期货经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循的原则有（）。","c":{"A":"有效性原则","B":"勤勉尽责原则","C":"差异性原则","D":"全面性原则"},"a":"A,B,C","an":"选项D为干扰项。教材未提及。 选项ABC正确：证券期货经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循以下原则：  （一）投资者利益优先原则 （二）勤勉尽责原则 （三）客观性原则 （四）有效性原则  （五）差异性原则","type":"multi"},{"id":"cy_fin_1079","q":"证券公司通过营业网点向普通投资者进行告知、警示时，下列属于需全程录音或者录像留痕情形的有（）。","c":{"A":"普通投资者申请转为专业投资者","B":"向普通投资者销售风险等级为R1的产品(R5为最高风险等级)","C":"证券公司主动调整投资者分类、产品或者服务分级、适当性匹配意见","D":"向普通投资者履行信息告知义务"},"a":"A,C,D","an":"选项B错误：向普通投资者销售高风险产品或者提供相关服务（R1不符合高风险产品），经营机构通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像。 选项ACD正确：在普通投资者申请转为专业投资者，向普通投资者销售高风险产品或者提供相关服务，经营机构主动调整投资者分类、产品或者服务分级、适当性匹配意见以及向普通投资者履行信息告知义务这四种情形下，经营机构通过营业网点向普通投资者进行告知、警示的，应当全过程录音或者录像。","type":"multi"},{"id":"cy_fin_1081","q":"根据《证券期货投资者适当性管理办法》，普通投资者享有的特别保护体现在（）。","c":{"A":"信息告知","B":"本金保障","C":"风险警示","D":"适当性匹配"},"a":"A,C,D","an":"选项B错误：“本金保障”不属于保护范围。 选项ACD正确：普通投资者享有特别保护的规定根据《证券期货投资者适当性管理办法》的规定，投资者分为普通投资者与专业投资者。普通投资者在【信息告知、风险警示、适当性匹配】等方面享有特别保护。","type":"multi"},{"id":"cy_fin_1083","q":"根据《证券期货投资者适当性管理办法》 的要求，经营机构向投资者销售产品或者提供服务时，应当了解投资者的信息有（）。","c":{"A":"自然人的姓名、住址、职业、年龄、联系方式，法人或者其他组织的名称、注册地址、办公地址、性质、资质及经营范围等基本信息","B":"收入来源和数额、资产、债务等财务状况","C":"投资相关的学习、工作经历及投资经验","D":"实际控制投资者的自然人和交易的实际受益人"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券期货投资者适当性管理办法》 的要求，经营机构向投资者销售产品或者提供服务时，应当了解投资者的下列信息：  （1）自然人的姓名、住址、职业、年龄、联系方式，法人或者其他组织的名称、注册地址、办公地址、性质、资质及经营范围等基本信息；  （2）收入来源和数额、资产、债务等财务状况；  （3）投资相关的学习、工作经历及投资经验；  （4）投资期限、品种、期望收益等投资目标； （5）风险偏好及可承受的损失； （6）诚信记录；  （7）实际控制投资者的自然人和交易的实际受益人；  （8）法律法规、自律规则规定的投资者准入要求相关信息； （9）其他必要信息。","type":"multi"},{"id":"cy_fin_1085","q":"经营机构违反《证券期货投资者适当性管理办法》的（）情形，应当给予警告，并处3万元以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处3万元以下罚款。","c":{"A":"未按规定划分产品或者服务风险等级的","B":"未按规定录音录像或者采取配套留痕安排的","C":"未按规定制定或者落实适当性内部管理制度和相关制度机制的","D":"未按规定对专业投资者进行细化分类和管理的"},"a":"A,B,C","an":"选项D错误：应为未按规定对“普通投资者”（而非专业投资者）进行细化分类和管理的。 选项ABC正确：经营机构有下列情形之一的，给予警告，并处以3万元以下罚款；对直接负责的主管人员和其他直接责任人员，给予警告，并处以3万元以下罚款： (1)违反《证券期货投资者适当性管理办法》第十条，未按规定对普通投资者进行细化分类和管理的； (2)违反《证券期货投资者适当性管理办法》第十一条、第十二条，未按规定进行投资者类别转化的； (3)违反《证券期货投资者适当性管理办法》第十三条，未建立或者更新投资者评估数据库的； (4)违反《证券期货投资者适当性管理办法》第十五条，未按规定了解所销售产品或者所提供服务信息或者履行分级义务的； (5)违反《证券期货投资者适当性管理办法》第十六条、第十七条，未按规定划分产品或者服务风险等级的； (6)违反《证券期货投资者适当性管理办法》第二十五条，未按规定录音录像或者采取配套留痕安排的； (7)违反《证券期货投资者适当性管理办法》第二十九条，未按规定制定或者落实适当性内部管理制度和相关制度机制的； (8)违反《证券期货投资者适当性管理办法》第三十条，未按规定开展适当性自查的； (9)违反《证券期货投资者适当性管理办法》第三十二条，未按规定妥善保存相关信息资料的； (10)违反《证券期货投资者适当性管理办法》第六条、第十八条至第二十四条、第二十六条、第二十七条、第三十三条规定，未构成《证券法》第一百九十八条，《证券投资基金法》第一百三十五条、第一百三十七条，《期货和衍生品法》第一百三十五条，《证券公司监督管理条例》第八十三条、第八十四条，《期货交易管理条例》第六十六条、第六十七条规定情形的。","type":"multi"},{"id":"cy_fin_1087","q":"下列几家证券公司在销售产品过程中，存在投资者适当性禁止性行为的包括（  ）。","c":{"A":"甲公司向低风险承受能力普通投资者主动推介中等风险等级的资产管理产品","B":"为方便投资者，乙公司指导并代投资者填写了《投资者风险承受能力评估问卷》","C":"经过特别风险警示和投资者坚持，丙公司向中等风险承受能力的投资者销售中高风险私募产品","D":"经过特别风险警示和投资者坚持，丁公司向风险承受能力最低的销售者销售中风险理财产品"},"a":"A,B,D","an":"选项A正确：经营机构销售产品或提供服务的禁止性行为： 1.向不符合准入要求的投资者销售产品或者提供服务； 2.向投资者就不确定事项提供确定性的判断，或者告知投资者有可能使其误认为具有确定性的意见； 3.向普通投资者主动推介风险等级高于其风险承受能力的产品或者服务； 4.向普通投资者主动推介不符合其投资目标的产品或者服务； 5.向风险承受能力最低类别的投资者销售或者提供风险等级高于其风险承受能力的产品或者服务； 6.其他违背适当性要求，损害投资者合法权益的行为。 选项B正确：《投资者基本信息表》《投资者风险承受能力评估问卷》应当由投资者本人或合法授权人填写，经营机构业务人员不得以任何方式诱导、误导或欺骗投资者，从而影响填写结果。 选项D正确，选项C错误：经营机构告知投资者不适合购买相关产品或者接受相关服务后，投资者主动要求购买风险等级高于其风险承受能力的产品或者接受相关服务的，经营机构在确认其不属于风险承受能力最低类别的投资者后，应当就产品或者服务风险高于其承受能力进行特别的书面风险警示，投资者仍坚持购买的，可以向其销售相关产品或者提供相关服务。","type":"multi"},{"id":"cy_fin_1089","q":"投资者适当性制度是证券期货经营机构服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的在于“将适当的产品或服务销售或提供给适当的投资者”。（）","c":{"1":"对","0":"错"},"a":"1","an":"投资者适当性制度是证券期货经营机构服务投资者、控制经营风险和保护投资者合法权益的重要操作流程，其核心目的在于“将适当的产品或服务销售或提供给适当的投资者”。","type":"judge"},{"id":"cy_fin_1091","q":"根据《证券期货投资者适当性管理办法》的规定，投资者分为普通投资者与专业投资者，其中专业投资者在信息告知、风险警示、适当性匹配等方面享有特别保护。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券期货投资者适当性管理办法》的规定，投资者分为普通投资者与专业投资者。普通投资者（非专业投资者）在信息告知、风险警示、适当性匹配等方面享有特别保护。","type":"judge"},{"id":"cy_fin_1093","q":"所在机构利益优先原则是证券期货经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循的原则之一。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券期货经营机构及其工作人员在落实投资者适当性管理的过程中，应当遵循的原则有投资者利益优先（并非所在机构利益优先）原则、勤勉尽责原则、客观性原则、有效性原则和差异性原则。","type":"judge"},{"id":"cy_fin_1095","q":"证券公司与客户进行金融交易并通过银行账户划转款项的，由（）按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告。","c":{"A":"证券公司","B":"客户","C":"银行机构","D":"金融机构"},"a":"C","an":"选项C正确：证券公司与客户进行金融交易并通过银行账户划转款项的，由银行机构按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告。 选项A错误：证券公司不直接处理银行账户资金划转的大额交易监测与报告。 选项B错误：客户是交易主体，但提交大额交易报告并非客户的义务。 选项D错误：金融机构概念宽泛，题目明确是 “通过银行账户划转款项”。","type":"single"},{"id":"cy_fin_1097","q":"关于证券公司对客户尽职调查的基本要求，下列说法错误的是（）。","c":{"A":"证券公司不得为身份不明的客户提供服务或者与其进行交易","B":"证券公司不得为客户开立假名账户","C":"考虑客户的特殊需求，证券公司可以为客户开立匿名账户","D":"证券公司在开展客户尽职调查时，应登记客户身份基本信息，留存客户有效身份证件或者其他身份证明文件的复印件或者影印件"},"a":"C","an":"选项AB正确，选项C错误：证券公司不得为身份不明的客户提供服务或者与其进行交易，不得为客户开立匿名账户或者假名账户，不得为冒用他人身份的客户开立账户。 选项D正确：证券公司在开展客户尽职调查时，应登记客户身份基本信息，留存客户有效身份证件或者其他身份证明文件的复印件或者影印件。 题目问的是“说法错误的”。因此答案选择C。","type":"single"},{"id":"cy_fin_1099","q":"当证券公司对先前获得的客户身份资料的真实性产生疑问时，应当（  ）。","c":{"A":"忽略疑问继续服务","B":"暂停服务并开展客户尽职调查","C":"要求客户口头确认","D":"降低服务等级"},"a":"B","an":"有下列情形之一的，证券公司应当开展客户尽职调查： 1.与客户建立业务关系或者为客户提供规定金额以上的一次性金融服务； 2.有合理理由怀疑客户及其交易涉嫌洗钱活动； 3.对先前获得的客户身份资料的真实性、有效性、完整性存在疑问。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_1101","q":"对于既属于大额交易又属于可疑交易的交易，证券公司应当（）。","c":{"A":"提交大额交易报告","B":"提交可疑交易报告","C":"分别提交大额交易报告和可疑交易报告","D":"不予理睬"},"a":"C","an":"选项C正确：如果既属于大额交易又属于可疑交易的交易，证券公司应当分别提交大额交易报告和可疑交易报告。 选项AB错误：既属于大额交易又属于可疑交易的交易，仅仅提交大额交易报告或可疑交易报告其中一个是不够的。 选项D错误：不予理睬不符合监管规定。","type":"single"},{"id":"cy_fin_1103","q":"存在代理关系时，证券公司的义务包括（  ）。","c":{"A":"确认代理关系存在","B":"识别核实代理人身份","C":"登记代理人身份信息","D":"留存代理人身份证明文件"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当采取合理方式确认代理关系存在，对被代理人采取客户尽职调查措施时，应当识别并核实代理人身份，登记代理人的身份信息，并留存代理人有效身份证件或者其他身份证明文件的复印件或者影印件。","type":"multi"},{"id":"cy_fin_1105","q":"证券公司保存客户身份资料，自业务关系结束后或者一次性金融服务结束后至少保存5年。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当按照下列期限保存客户身份资料和交易记录： (1)客户身份资料，自业务关系结束后或者一次性金融服务结束后至少保存10年； (2)交易记录，自交易结束后至少保存10年。","type":"judge"},{"id":"cy_fin_1107","q":"证券公司与客户进行金融交易并通过银行账户划转款项的，由银行机构按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司与客户进行金融交易并通过银行账户划转款项的，由银行机构按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告。","type":"judge"},{"id":"cy_fin_1109","q":"证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作 ，其任职条件不包括（）。","c":{"A":"从事信息技术相关工作10年以上，或者在证券监管机构、证券基金业自律组织任职8年以上","B":"最近3年未被金融监管机构实施行政处罚","C":"中国证监会规定的其他条件","D":"最近1年未被金融监管机构采取重大行政监管措施"},"a":"D","an":"题目问的是“不包括”。 选项D错误：应该是最近3年（非1年）未被金融监管机构实施行政处罚或采取重大行政监管措施，因此答案选择D。 选项ABC正确：证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作，并具备下列任职条件： （1）从事信息技术相关工作10年以上，或者在证券监管机构、证券基金业自律组织任职8年以上； （2）最近3年未被金融监管机构实施行政处罚或采取重大行政监管措施； （3）中国证监会规定的其他条件。","type":"single"},{"id":"cy_fin_1111","q":"（）不属于证券公司首席信息官的任职条件。","c":{"A":"从事信息相关工作5年以上","B":"在证券基金业自律组织任职8年以上","C":"在证券监管机构任职8年以上","D":"最近3年未被金融监管机构实施行政处罚或采取重大行政监管措施"},"a":"A","an":"题目问的是“不属于”。 选项A错误：首席信息官任职要求从事信息技术相关工作10年（而非5年）以上，或者在证券监管机构、证券基金业自律组织任职8年以上。因此答案选择A。 选项BCD正确：证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作，并具备下列任职条件： （1）从事信息技术相关工作10年以上，或者在证券监管机构、证券基金业自律组织任职8年以上； （2）最近3年未被金融监管机构实施行政处罚或采取重大行政监管措施； （3）中国证监会规定的其他条件。","type":"single"},{"id":"cy_fin_1113","q":"证券公司的应急演练应当形成报告，保存期不得少于（）年。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：证券公司的应急演练应当形成报告，保存期不得少于【5年】。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_1115","q":"以下属于证券公司信息技术数据治理的有（）。","c":{"A":"数据安全保障措施","B":"数据分类分级","C":"信息系统权限管理","D":"经营数据和客户信息保护"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司信息技术数据治理包括以下几项： （1）数据分类分级； （2）数据安全保障措施； （3）信息系统权限管理； （4）经营数据和客户信息保护。","type":"multi"},{"id":"cy_fin_1117","q":"证券公司经营管理层负责落实信息技术管理目标，其履行的职责有（）。","c":{"A":"组织实施董事会相关决议","B":"建立责任明确、程序清晰的信息技术管理组织架构","C":"明确管理职责、工作程序和协调机制","D":"完善绩效考核和责任追究机制"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司经营管理层负责落实信息技术管理目标，对信息技术管理工作承担责任，履行下列职责： （1）组织实施董事会相关决议；  （2）建立责任明确、程序清晰的信息技术管理组织架构，明确管理职责、工作程序和协调机制；  （3）完善绩效考核和责任追究机制； （4）公司章程规定或董事会授权的其他信息技术管理职责。","type":"multi"},{"id":"cy_fin_1119","q":"证券公司信息技术管理中的应急预案包括（）。","c":{"A":"应急管理建设目标","B":"备份信息系统建设","C":"备份数据恢复机制","D":"应急联系方式"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当制订并持续完善应急预案，包括应急管理建设目标、备份信息系统建设和恢复机制、备份数据恢复机制、业务恢复或替代措施、应急联系方式、与客户沟通方式、向监管部门及有关单位的报告路径、应急预案披露与更新机制等内容。","type":"multi"},{"id":"cy_fin_1121","q":"证券公司应当跟踪审计发现问题的整改情况，相关问题未能及时整改的，应当说明理由，并将审计报告提交信息技术治理委员会审议。证券公司应当妥善保存审计报告，保存期限不得少于10年。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当跟踪审计发现问题的整改情况，相关问题未能及时整改的，应当说明理由，并将审计报告提交信息技术治理委员会审议。证券公司应当妥善保存审计报告，保存期限不得少于【20年】。","type":"judge"},{"id":"cy_fin_1123","q":"证券公司应当根据系统变更、业务变化等情况，持续更新应急预案。证券公司应当根据应急预案定期组织关键岗位人员开展应急演练，演练频率不低于每年一次，并确保应急演练在2年内覆盖全部重要信息系统。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当根据系统变更、业务变化等情况，持续更新应急预案。证券公司应当根据应急预案定期组织关键岗位人员开展应急演练，演练频率不低于每年一次，并确保应急演练在2年内覆盖全部重要信息系统。","type":"judge"},{"id":"cy_fin_1125","q":"证券公司因未能有效实施信息技术管理被采取行政处罚措施、监管措施或者自律管理措施的，应当在6个月内完成对有关事项的专项审计。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当委托外部专业机构开展信息技术管理工作的全面审计，频率不低于每3年一次；未能有效实施信息技术管理被采取行政处罚措施、监管措施或者自律管理措施的，应当在3个月（非6个月）内完成对有关事项的专项审计。","type":"judge"},{"id":"cy_fin_1127","q":"下列关于证券账户的信息变更和注销，说法错误的是（）。","c":{"A":"投资者变更投资者姓名或名称、有效身份证明文件类型及号码，应通过临柜、见证等方式办理","B":"投资者的非关键信息变更不能通过网络、电话等方式办理","C":"对于非现场开户的投资者，开户代理机构应当至少提供与开户方式一致的非现场销户服务","D":"证券公司在接到投资者销户申请后，应当在与该证券胀户相关的业务了结后2个交易日内办理完毕"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：其他非关键信息变更：开户代理机构可通过临柜、见证、网络、电话等方式（并非不能通过网络、电话）受理投资者申请，核实投资者身份后予以办理。因此答案选择B。 选项ACD说法正确。","type":"single"},{"id":"cy_fin_1129","q":"李明向其朋友介绍证券账户的开立过程，他的说法中不合规定的是（）。","c":{"A":"李明在网上开户时，通过开户代理机构提供的第三方网站办理","B":"李明分别通过现场开户和见证开户申请开立了2个A股账户","C":"办理见证开户时，证券公司委派了两名工作人员为其办理手续，其中一名为见证人员","D":"李明目前只申请开立了一个信用账户"},"a":"A","an":"题目问的是”不合规定的“。 选项A错误：网上开户的特殊要求：开户代理机构应通过其公司网站为投资者办理网上开户业务，不得利用第三方网站办理网上开户业务。因此答案选择A。 选项B正确：一个投资者在同一市场最多可以申请开立3个A股账户，且可以通过不同的方式（如现场开户、见证开户等）进行。 选项C正确：“办理见证开户时，证券公司委派了两名工作人员为其办理手续，其中一名为见证人员”，做法符合见证开户的流程要求。 选项D正确：每个投资者只能申请开立一个信用账户。","type":"single"},{"id":"cy_fin_1131","q":"下列关于证券经纪业务营销管理的说法中，错误的是()。","c":{"A":"证券公司选择新闻媒体、互联网信息平台等第三方载体投放广告的，应当与第三方载体签署协议","B":"证券公司应当按照科学合理的方法测算服务成本，测算方法应当经过合规部门和财务部门认可，一经确定不得随意变更","C":"证券公司从事证券经纪业务营销活动，可以向投资者提供市场资讯、投资者教育服务、收益率预测等服务","D":"证券公司应当切实提升服务质量，不得以任何形式实施垄断，不得有恶意低价揽客等不正当竞争行为"},"a":"C","an":"选项C错误：证券公司从事证券经纪业务营销活动，在符合相关法律法规规定的前提下，可以向投资者提供市场资讯、投资者教育服务等证券业务性质的服务，不得提供其他非证券业务性质的服务。（如收益率预测属于非证券业务性质的服务） 选项ABD说法正确。","type":"single"},{"id":"cy_fin_1133","q":"某客户通过某券商买入成交金额为1000元的A股股票，根据现行佣金标准，券商可以收取的佣金最多为（  ）。","c":{"A":"3元","B":"5元","C":"1元","D":"0.3元"},"a":"B","an":"我国现行的证券经纪业务佣金标准，A股、B股、证券投资基金的交易佣金实行最高上限向下浮动制度。证券经纪商向客户收取的佣金(包括代收的证券交易监管费和证券交易所手续费等)不得高于证券交易金额的0.3%，也不得低于代收的证券交易监管费和证券交易所手续费等。具体标准如下： 1.A股、证券投资基金每笔交易佣金不足5元的，按5元收取； 2.B股每笔交易佣金不足1美元或5港元的，按1美元或5港元收取； 本题中，成交金额1000元，按佣金率上限0.3%计算为3元，不足5元按照5元收取。","type":"single"},{"id":"cy_fin_1135","q":"下列关于证券公司的佣金管理，说法错误的是（）。","c":{"A":"佣金的收费标准因交易品种、交易场所的不同而有所差异","B":"证券经纪商向客户收取的佣金不得高于证券交易金额的5‰","C":"证券交易的收费必须合理，并公开收费项目、收费标准和管理办法","D":"证券公司应当将交易佣金与印花税等其他相关税费分开列示，并告知投资者"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券经纪商向客户收取的佣金不得高于证券交易金额的3‰（并非5‰）。因此答案选择B。 选项A正确：佣金的收费标准因交易品种、交易场所的不同而有所差异。 选项C正确：证券交易的收费必须合理，并公开收费项目、收费标准和管理办法。 选项D正确：证券公司应当将交易佣金与印花税等其他相关税费分开列示，并告知投资者。","type":"single"},{"id":"cy_fin_1137","q":"证券公司应当建立监测、核查机制，持续跟踪了解投资者适当性匹配情况，至少每（）进行一次投资者适当性是否匹配的后续评估。","c":{"A":"3个月","B":"6个月","C":"1年","D":"2年"},"a":"D","an":"选项D正确：证券公司应当建立监测、核查机制，持续跟踪了解投资者适当性匹配情况，至少每2年进行一次投资者适当性是否匹配的后续评估。","type":"single"},{"id":"cy_fin_1139","q":"证券公司应当要求投资者在身份证明文件过期（）个自然日内办理身份证明文件有效期变更手续。","c":{"A":"15","B":"30","C":"60","D":"90"},"a":"D","an":"选项D正确：证券公司应当要求投资者在6个月内办理基本信息变更手续；在身份证明文件过期90个自然日内办理身份证明文件有效期变更手续。","type":"single"},{"id":"cy_fin_1141","q":"证券公司对账户使用、资金划转、证券交易等存在异常情形的投资者，在（）个交易日内进行回访。","c":{"A":"2","B":"3","C":"5","D":"7"},"a":"A","an":"选项A正确：证券公司对账户使用、资金划转、证券交易等存在异常情形的投资者，在2个交易日内进行回访。  【知识拓展】证券公司回访应当符合以下要求： 1.对新开户的投资者，在开通相应交易权限前完成回访，对新增相关交易权限的投资者，在开通相应交易权限后30日内完成回访； 2.对账户使用、资金划转、证券交易等存在异常情形的投资者，在2个交易日内进行回访； 3.对其他投资者，每年回访比例不得低于上年末客户总数(不含休眠账户及中止交易账户客户)的5%。","type":"single"},{"id":"cy_fin_1143","q":"根据《证券交易委托代理协议必备条款》，（）是客户可以委托证券公司代理的事项。","c":{"A":"接受并执行客户依照《证券交易委托代理协议必备条款》约定的方式下发的合法有效的委托指令","B":"代理客户进行资金、证券的清算、交收","C":"代理保管客户买入或存入的有价证券","D":"接受客户对其委托、成交及账户内的资产及变化情况的查询，并应客户的要求提供相应的清单"},"a":"A,B,C,D","an":"选项ABCD正确：根据中国证券业协会《证券交易委托代理协议必备条款》的规定，客户可以委托证券公司代理的事项主要如下：   1．接受并执行客户依照《证券交易委托代理协议必备条款》约定的方式下发的合法有效的委托指令（A项）；     2．代理客户进行资金、证券的清算、交收（B项）；     3．代理保管客户买入或存入的有价证券（C项）；     4．代理客户领取红利股息及其他利益分配；    5．接受客户对其委托、成交及账户内的资产及变化情况的查询，并应客户的要求提供相应的清单（D项）；     6．双方依法约定的其他委托事项； 7．法律、法规、规章、自律规则规定的、证券公司可以代理客户进行的其他活动。","type":"multi"},{"id":"cy_fin_1145","q":"下列关于科创板的表述，说法正确的有（）。","c":{"A":"科创板主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业","B":"科创板的具体行业范围由上海证券交易所发布并适时更新","C":"已有证券账户的个人投资者须开立新的证券账户才能开通科创板","D":"投资者仅需向其委托的证券公司申请，在已有沪市A股证券账户上开通科创板股票交易权限即可，无须在中国结算开立新的证券账户"},"a":"A,B,D","an":"选项C错误，选项D正确：投资者仅需向其委托的证券公司申请，在已有沪市A股证券账户上开通科创板股票交易权限即可，无须在中国结算开立新的证券账户（无须开立新账户，C错误）。 选项A正确：在上海证券交易所新设科创板，坚持面向世界科技前沿、面向经济主战场、面向国家重大需求，主要服务于符合国家战略、突破关键核心技术、市场认可度高的科技创新企业。 选项B正确：具体行业范围由上海证券交易所发布并适时更新。","type":"multi"},{"id":"cy_fin_1147","q":"证券公司开展回访工作的，每年回访比例不得低于上年末客户总数的50%。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司开展回访工作的，每年回访比例不得低于上年末客户总数的10%（并非50%）。","type":"judge"},{"id":"cy_fin_1149","q":"证券公司应当加强证券经纪业务信息系统管理，保障投资者信息安全和交易连续性，避免对证券交易场所、中国结算等单位的相关信息系统造成不当影响。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当加强证券经纪业务信息系统管理，保障投资者信息安全和交易连续性，避免对证券交易场所、中国结算等单位的相关信息系统造成不当影响。","type":"judge"},{"id":"cy_fin_1151","q":"下列关于发布证券研究报告业务的有关规定，说法错误的是（）。","c":{"A":"证券期货经营机构应当建立合理的发布证券研究报告相关人员绩效考核和激励机制，以维护发布证券研究报告行为的独立性，其中外部评选结果可作为证券分析师薪酬激励的依据","B":"与发布证券研究报告业务存在利益冲突的部门或人员不得参与对发布证券研究报告相关人员的考核","C":"证券分析师跨越信息隔离墙参与公司承销保荐、财务顾问业务等项目的，其个人薪酬不得与相关项目的业务收入直接挂钩","D":"证券期货经营机构的研究部门或者研究子公司接受特定客户委托，按照协议约定就尚未覆盖的具体股票提供含有证券估值或投资评级的研究成果或者投资分析意见的，自提供之日起6个月内不得就该股票发布证券研究报告"},"a":"A","an":"选项A错误：外部评选结果仅作为对分析师个人【社会评价】的参考，不得作为证券分析师【薪酬激励】的依据。 选项BCD说法正确。 题目问的是“说法错误的”。综上，该题选A。","type":"single"},{"id":"cy_fin_1153","q":"下列关于证券投资顾问向客户提供服务的说法中，错误的是（  ）。","c":{"A":"客户购买应当提示潜在的投资风险，不得向客户保证投资收益","B":"应当向客户提供风险揭示书，并由客户签收确认，风险揭示书内容与格式要求由中国证监会制定","C":"在提供服务前，应先评估客户的风险承受能力和投资需求","D":"证券公司、证券投资咨询机构收到客户解除协议书面通知时，证券投资顾问服务协议解除"},"a":"B","an":"选项B错误：证券公司、证券投资咨询机构应当向客户提供风险揭示书，并由客户签收确认。风险揭示书内容与格式要求由中国证券业协会制定。 选项ACD说法正确。","type":"single"},{"id":"cy_fin_1155","q":"投资者小王收到一份由“XX证券”发布的证券研究报告，报告末尾仅注明发布日期和风险提示。该报告缺少的必备内容是（  ）。","c":{"A":"对上市公司未来市值的预测","B":"研究报告撰写助理的姓名","C":"相关股票的买入和卖出建议","D":"经营机构具备证券投资咨询业务资格的说明"},"a":"D","an":"选项D正确，选项B错误：经营机构发布的证券研究报告，应当载明下列事项： (1)“证券研究报告”字样； (2)经营机构名称； (3)具备证券投资咨询业务资格的说明； (4)证券分析师姓名及其登记编码； (5)发布证券研究报告的时间； (6)证券研究报告采用的信息和资料来源； (7)使用证券研究报告的风险提示。 选项AC为干扰项。","type":"single"},{"id":"cy_fin_1157","q":"下列不符合证券投资顾问执业行为准则的是（）。","c":{"A":"忠实客户利益","B":"提供适当的投资建议服务","C":"以个人名义向客户收取适当的证券投资顾问服务费用","D":"提供投资建议应具有合理依据"},"a":"C","an":"题目问的是”不符合“。 选项C错误：“以个人名义向客户收取适当的证券投资顾问服务费用”属于证券投资顾问的【禁止行为】。因此答案选择C。 选项ABD正确：证券投资顾问执业行为准则： （1）忠实客户利益。  （2）提供适当的投资建议服务。  （3）提供投资建议应具有合理依据。 （4）规范参与媒体证券节目。  【知识拓展】证券投资顾问不得从事下列活动： (1)以任何方式向客户承诺或者保证投资收益； (2)对服务能力和过往业绩进行虚假、不实、误导性的营销宣传； (3)向他人泄露客户的投资决策计划信息； (4)以个人名义向客户收取证券投资顾问服务费用； (5)通过广播、电视、网络、报刊等公众媒体作出买入、卖出或者持有具体证券的投资建议。","type":"single"},{"id":"cy_fin_1159","q":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以（）通知方式提出解除协议。","c":{"A":"邮件","B":"口头","C":"书面","D":"电话"},"a":"C","an":"选项C正确：证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以【书面】通知方式提出解除协议。","type":"single"},{"id":"cy_fin_1161","q":"根据《关于加强对利用“荐股软件”从事证券投资咨询业务监管的暂行规定》，向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事（），应当经中国证监会许可。","c":{"A":"权益投资业务","B":"股票投资业务","C":"证券投资咨询业务","D":"证券业务"},"a":"C","an":"选项C正确：向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事【证券投资咨询业务】，应当经中国证监会许可，符合证券投资咨询业务条件。 选项A错误：权益投资业务是指通过购买股票、债券等权益类资产进行投资的行为。 选项B错误：股票投资业务专注于股票市场的投资活动，如买卖股票、管理股票资产等。 选项D错误：证券业务泛指与证券相关的所有业务（如经纪、承销、投资咨询等）。","type":"single"},{"id":"cy_fin_1163","q":"证券研究报告可以使用的信息来源不包括（）。","c":{"A":"政府部门、行业协会、证券交易所等机构发布的政策、市场、行业以及企业相关信息","B":"上市公司相关内幕信息或者未公开重大信息","C":"上市公司按照法定信息披露义务通过指定媒体公开披露的信息","D":"证券公司、证券投资咨询机构从信息服务机构等第三方合法取得的市场、行业及企业的相关信息"},"a":"B","an":"题目问的是“不包括”。 选项B错误：按照规定，证券公司不得以任何形式使用或者泄露国家保密信息、上市公司内幕信息以及未公开的重大信息（因此不属于可以使用的信息，B错误）。因此答案选择B。 选项ACD正确：证券研究报告可使用的信息来源 ①政府部门、行业协会、证券交易所等机构发布的政策、市场、行业以及企业相关信息。 ②上市公司按照法定信息披露义务通过指定媒体公开披露的信息。 ③上市公司及其子公司通过公司网站、新闻媒体等公开渠道发布的信息，以及上市公司通过股东大会、新闻发布会、产品推介会等非正式公告方式发布的信息。 ④经营机构通过上市公司调研或者市场调查，从上市公司及其子公司、供应商、经销商等处获取的信息，但内幕信息和未公开重大信息除外。 ⑤经营机构从信息服务机构等第三方合法取得的市场、行业及企业相关信息。 ⑥经公众媒体报道的上市公司及其子公司的其他相关信息。","type":"single"},{"id":"cy_fin_1165","q":"下列关于证券投资顾问业务和发布证券研究报告的区别，说法正确的有（）。","c":{"A":"证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告","B":"证券投资顾问服务于不特定的客户；证券研究报告向特定用户发布，提供证券估值等研究成果","C":"证券投资顾问一般服务于普通投资者；证券研究报告一般服务于基金、QFII等专业投资者","D":"证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响"},"a":"A,C,D","an":"选项B错误：证券投资顾问在了解客户的基础上，依据合同约定，向“特定客户”（并非服务于不特定客户）提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。证券研究报告向“不特定的客户”（并非向特定客户）发布，提供证券估值等研究成果，关注证券定价，不关注买卖时机选择等具体的操作性投资建议。 选项A正确：证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告 选项C正确：证券投资顾问一般服务于普通投资者；证券研究报告一般服务于基金、QFII等专业投资者。 选项D正确：证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响。  【知识拓展】证券投资顾问业务和发布证券研究报告的区别 (1)立场不同 证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 (2)服务方式和内容不同 证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。证券研究报告向不特定的客户发布，提供证券估值等研究成果，关注证券定价，不关注买卖时机选择等具体的操作性投资建议。 (3)服务对象有所不同 证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务；证券研究报告一般服务于基金、QFII等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 (4)市场影响有所不同 证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响。","type":"multi"},{"id":"cy_fin_1167","q":"从事发布证券研究报告业务的机构发布证券研究报告，应当遵守法律、行政法规和其他有关规定，遵循（）。","c":{"A":"独立原则","B":"客观原则","C":"效率原则","D":"审慎原则"},"a":"A,B,D","an":"选项C错误：“效率原则” 未被纳入监管要求，证券研究的重点是质量而非速度，若强调效率可能导致研究仓促、分析不严谨，反而损害投资者利益。 选项ABD正确：从事发布证券研究报告业务的机构发布证券研究报告，应当遵守法律、行政法规和其他有关规定，遵循独立原则，客观原则、公平原则和审慎原则。","type":"multi"},{"id":"cy_fin_1169","q":"（）应当在证券公司、证券投资咨询机构营业场所、中国证券业协会和公司网站予以公示。","c":{"A":"公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等","B":"证券投资顾问的姓名及其登记编码","C":"证券投资顾问服务的内容和方式","D":"证券投资顾问代客户作出的投资决策"},"a":"A,B","an":"选项C错误：题目问的是应该公示的，包括第（1）、第（2）项信息，也就是选项A和B的信息，C选项信息属于【应该告知客户的信息】，但不强制要求公示。 选项D错误：证券投资顾问不得代（并非可以代替客户决策）客户作出的投资决策。且“证券投资顾问不得代客户作出投资决策”也属于应该告知客户的信息，但不强制要求公示。 选项AB正确：证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当告知客户下列基本信息： （1）公司名称、地址、联系方式、投诉电话、证券投资咨询业务资格等；  （2）证券投资顾问的姓名及其登记编码； （3）证券投资顾问服务的内容和方式； （4）投资决策由客户作出，投资风险由客户承担； （5）证券投资顾问不得代客户作出投资决策。 证券公司、证券投资咨询机构应当通过营业场所、中国证券业协会和公司网站，公示前段第（1）、第（2）项信息，方便投资者查询、监督。","type":"multi"},{"id":"cy_fin_1171","q":"根据《发布证券研究报告执业规范》的规定，署名的证券分析师应（）。","c":{"A":"对其署名的证券研究报告的内容负责","B":"对其署名的证券研究报告的观点负责","C":"建立清晰的质量审核清单和工作底稿","D":"建立健全证券研究报告发布前的质量控制机制"},"a":"A,B","an":"选项AB正确：证券分析师应当对其【署名的证券研究报告的内容和观点】负责。 选项CD错误：属于经营机构（而不是分析师）的职责。从事发布证券研究报告业务的机构应当建立健全证券研究报告发布前的质量控制机制，细化质量控制的目标、程序和岗位职责，建立清晰的质量审核清单和工作底稿，列明审核工作应当涵盖的内容。通过合理的流程安排避免审核工作流于形式，并确保审核意见得到回应和有效落实。","type":"multi"},{"id":"cy_fin_1173","q":"下列关于证券分析师执业行为准则的表述，说法正确的有（）。","c":{"A":"证券分析师参加媒体组织的研究评价活动，应当经所在公司同意，秉承公平竞争的原则，不得以不正当手段争取较高的研究评价结果","B":"证券分析师应当相互尊重，共同维护行业声誉，不得在公众场合及媒体上发表贬低、损害同行声誉的言论，不得以不正当手段与同行竞争","C":"证券分析师明知特定客户、公司内部其他部门的要求或拟委托的事项违反了法律、法规、中国证监会监管规定、行业自律规则以及公司管理制度的，应当予以拒绝，并及时向公司报告","D":"证券分析师应当珍惜职业称号和职业声誉，以真实姓名执业"},"a":"A,B,C,D","an":"选项ABCD说法都正确。 选项AB正确：是对证券分析师【防范不正当竞争】的要求。证券分析师参加媒体组织的研究评价活动，应当经所在公司同意，秉承公平竞争的原则，不得以不正当手段争取较高的研究评价结果。证券分析师应当相互尊重，共同维护行业声誉，不得在公众场合及媒体上发表贬低、损害同行声誉的言论，不得以不正当手段与同行竞争。 选项C正确：是对证券分析师【报告违法违规事项】的要求。证券分析师明知特定客户、公司内部其他部门的要求或拟委托的事项违反了法律、法规、中国证监会监管规定、行业自律规则以及公司管理制度的，应当予以拒绝，并及时向公司报告。 选项D正确：是对证券分析师【珍惜职业称号】和【职业声誉】的要求。证券分析师应当珍惜职业称号和职业声誉，以真实姓名执业。","type":"multi"},{"id":"cy_fin_1175","q":"中国证监会及其派出机构依据（）对证券公司、证券投资咨询机构发布证券研究报告行为以及从事证券投资顾问业务实行监督管理。","c":{"A":"《证券、期货投资咨询管理暂行办法》","B":"《证券分析师执业行为准则》","C":"《证券登记结算管理办法》","D":"《证券经纪人管理暂行规定》"},"a":"A,B","an":"选项AB正确：根据《证券、期货投资咨询管理暂行办法》《发布证券研究报告暂行规定》《证券投资顾问业务暂行规定》《发布证券研究报告执业规范》《证券分析师执业行为准则》《证券基金经营机构使用香港机构证券投资咨询服务暂行规定》等，中国证监会及其派出机构依法对证券公司、证券投资咨询机构发布证券研究报告行为以及从事证券投资顾问业务实行监督管理。 选项C错误：《证券登记结算管理办法》主要涉及证券登记和结算的相关事宜 选项D错误：《证券经纪人管理暂行规定》主要是关于证券经纪人的管理","type":"multi"},{"id":"cy_fin_1177","q":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，应当符合的监督要求有（）。","c":{"A":"在公司营业场所、公司网站、中国证券业协会网站公示信息","B":"在合同签订、产品销售、服务提供、客户回访、投诉处理等各个业务环节中，加强投资者教育和客户权益保护","C":"公平对待客户，不得通过诱导客户升级付费等方式，将相同产品以不同价格销售给不同客户","D":"遵循客户适当性原则，制定了解客户的制度和流程，对“荐股软件”产品进行分类分级，并向客户揭示产品的特点及风险，将合适的产品销售给适当的客户"},"a":"A,B,C,D","an":"选项ABCD正确：证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，必须遵守《证券法》《证券、期货投资咨询管理暂行办法》《证券投资顾问业务暂行规定》等法律法规和中国证监会的有关规定，并符合下列监管要求： 第一，在公司营业场所、公司网站、中国证券业协会网站公示信息。【A】  第二，遵循客户适当性原则，制定了解客户的制度和流程，对“荐股软件”产品进行分类分级，并向客户揭示产品的特点及风险，将合适的产品销售给适当的客户。【D】  第三，在合同签订、产品销售、服务提供、客户回访、投诉处理等各个业务环节中，加强投资者教育和客户权益保护。【B】  第四，公平对待客户，不得通过诱导客户升级付费等方式，将相同产品以不同价格销售给不同客户。【C】 第五，建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理；相关业务档案的保存期限自相关协议终止之日起不得少于5年。 第六，通过网络、电话、短信方式营销产品、提供服务的，应当明确告知客户公司的联系方式，并提醒客户发现营销或者服务人员通过其他方式联系时，可以向本公司反映、举报，也可以向中国证监会及其派出机构投诉、举报。 第七，不得对产品功能和服务业绩进行虚假、不实、夸大、误导性的营销宣传，不得以任何方式向客户承诺或者保证投资收益。 第八，产品销售、协议签订、服务提供、客户回访、投诉处理等业务环节均应当自行开展，不得委托未取得证券投资咨询业务资格的机构和个人代理。","type":"multi"},{"id":"cy_fin_1179","q":"证券投资顾问可通过广播、电视、网络、报刊等公众媒体对（）发表评论意见。","c":{"A":"宏观经济","B":"行业状况","C":"证券市场变动情况","D":"具体证券投资建议"},"a":"A,B,C","an":"选项ABC正确：证券投资顾问参与媒体证券节目的，应当按照证券信息传播的有关规定，通过广播、电视、网络、报刊等公众媒体，客观、专业、审慎地对【宏观经济、行业状况、证券市场变动情况】发表评论意见，为公众投资者提供证券资讯服务，传播证券知识，揭示投资风险，引导理性投资。 选项D错误：证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议。 （注意：证券投资顾问不得通过公众媒体作出买入、卖出或持有具体证券的投资建议——这是因为公众媒体传播广、快，会对市场交易量和价格产生重大影响。但可以通过专业的投资顾问服务，为投资者提供个性化的投资建议和服务）","type":"multi"},{"id":"cy_fin_1181","q":"下列关于证券投资顾问服务和发布证券研究报告的区别，说法正确的有（）。","c":{"A":"证券投资顾问强调针对客户类型提供适当的服务","B":"证券研究报告强调公平对待证券研究报告接收人","C":"证券投资顾问通常不会显著影响证券定价","D":"证券研究报告对证券价格可能产生较大影响"},"a":"A,B,C,D","an":"选项A正确：证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务； 选项B正确：证券研究报告一般服务于基金、QFII等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 选项C正确：证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价； 选项D正确：证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响。  【知识拓展】证券投资顾问业务和发布证券研究报告的区别 (1)立场不同 证券投资顾问基于特定客户的立场，遵循忠实客户利益原则，向客户提供适当的证券投资建议；证券分析师基于独立、客观的立场，对证券及证券相关产品的价值进行研究分析，撰写发布研究报告。 (2)服务方式和内容不同 证券投资顾问在了解客户的基础上，依据合同约定，向特定客户提供适当的、有针对性的操作性投资建议，关注品种选择、组合管理建议以及买卖时机等。证券研究报告向不特定的客户发布，提供证券估值等研究成果，关注证券定价，不关注买卖时机选择等具体的操作性投资建议。 (3)服务对象有所不同 证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务；证券研究报告一般服务于基金、QFII等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。 (4)市场影响有所不同 证券投资顾问服务与特定客户的证券投资及其利益密切相关，但通常不会显著影响证券定价；证券研究报告向多个机构客户同时发布，对证券价格可能产生较大影响。","type":"multi"},{"id":"cy_fin_1183","q":"证券研究报告可以由（）进行质量审核。","c":{"A":"署名证券分析师之外的证券分析师","B":"署名证券分析师","C":"登记为证券分析师的专职质量审核人员","D":"研究人员"},"a":"A,C","an":"选项AC正确：证券研究报告应当由登记为证券分析师的专职质量审核人员进行质量审核；证券分析师数量少于10人的可以由署名证券分析师之外的证券分析师进行质量审核。 选项B错误：署名证券分析师不能审核自己的证券研究报告，违反独立性原则。 选项D错误：研究人员未登记为证券分析师，不符合专职质量审核人员的资质要求。","type":"multi"},{"id":"cy_fin_1185","q":"下列属于证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，应当符合的监管要求有（  ）。","c":{"A":"在公司营业场所、公司网站、中国证券业协会网站公示信息","B":"建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理，相关业务档案的保存期限自相关协议终止之日起不得少于10年","C":"公平对待客户，不得通过诱导客户升级付费等方式，将相同产品以不同价格销售给不同客户","D":"遵循客户适当性原则，制定了解客户的制度和流程，对“荐股软件”产品进行分类分级，并向客户揭示产品的特点及风险，将合适的产品销售给适当的客户"},"a":"A,C,D","an":"证券投资咨询机构利用“荐股软件”从事证券投资咨询业务，必须遵守《证券法》《证券、期货投资咨询管理暂行办法》《证券投资顾问业务暂行规定》等法律法规和中国证监会的有关规定，并符合下列监管要求。 第一，在公司营业场所、公司网站、中国证券业协会网站公示信息（A正确），包括但不限于公司名称、住所、联系方式，投诉电话，证券投资咨询业务许可证号，证券投资咨询执业人员姓名及其登记编码；还应当通过公司网站公示产品分类、具体功能、产品价格、服务收费标准和收费方式等信息。 第二，遵循客户适当性原则，制定了解客户的制度和流程，对“荐股软件”产品进行分类分级，并向客户揭示产品的特点及风险，将合适的产品销售给适当的客户。（D正确） 第三，在合同签订、产品销售、服务提供、客户回访、投诉处理等各个业务环节中，加强投资者教育和客户权益保护。证券投资咨询机构应当主动告知客户公司及执业人员的证券投资咨询业务资格及其查询方式；客观、准确告知客户“荐股软件”的作用，全面揭示“荐股软件”存在的局限和纠纷解决方式；主动向客户提示非法证券投资咨询活动的风险和危害。 第四，公平对待客户，不得通过诱导客户升级付费等方式，将相同产品以不同价格销售给不同客户。（C正确） 第五，建立健全内部管理制度，实现对营销和服务过程的客观、完整、全面留痕，并将留痕记录归档管理；相关业务档案的保存期限自相关协议终止之日起不得少于5年。（B错误） 第六，通过网络、电话、短信方式营销产品、提供服务的，应当明确告知客户公司的联系方式，并提醒客户发现营销或者服务人员通过其他方式联系时，可以向本公司反映、举报，也可以向中国证监会及其派出机构投诉、举报。 第七，不得对产品功能和服务业绩进行虚假、不实、夸大、误导性的营销宣传，不得以任何方式向客户承诺或者保证投资收益。 第八，产品销售、协议签订、服务提供、客户回访、投诉处理等业务环节均应当自行开展，不得委托未取得证券投资咨询业务资格的机构和个人代理。","type":"multi"},{"id":"cy_fin_1187","q":"证券投资顾问业务和发布证券研究报告是证券投资咨询业务的两种基本形式，这两者的服务方式不同，但服务对象相同。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券投资顾问业务和发布证券研究报告的服务对象有所不同（并非相同）。证券投资顾问一般服务于普通投资者，强调针对客户类型、风险偏好等提供适当的服务；证券研究报告一般服务于基金、QFII等能够理解研究报告和有效处理有关信息的专业投资者，强调公平对待证券研究报告接收人。","type":"judge"},{"id":"cy_fin_1189","q":"证券投资咨询机构及其工作人员向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，不属于从事证券投资咨询业务，故无需经中国证监会许可。（）","c":{"1":"对","0":"错"},"a":"0","an":"向投资者销售或者提供“荐股软件”，并直接或者间接获取经济利益的，属于从事证券投资咨询业务，应当经中国证监会许可，符合证券投资咨询业务条件（并非无需许可）。","type":"judge"},{"id":"cy_fin_1191","q":"证券研究报告应当由登记为证券分析师的专职质量审核人员进行质量审核；证券分析师数量少于20人的可以由署名证券分析师之外的证券分析师进行质量审核。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券研究报告应当由登记为证券分析师的专职质量审核人员进行质量审核；证券分析师数量少于10人（并非20人）的可以由署名证券分析师之外的证券分析师进行质量审核。","type":"judge"},{"id":"cy_fin_1193","q":"上市公司就并购重组事项出具盈利预测报告的，在相关并购重组活动完成后，凡不属于上市公司管理层事前无法获知且事后无法控制的原因，上市公司的利润实现数未达到盈利预测（）的，中国证监会可以同时对财务顾问及其财务顾问主办人采取监管谈话、出具警示函、责令定期报告等监管措施。","c":{"A":"0.9","B":"0.8","C":"0.6","D":"0.5"},"a":"D","an":"注意审题，题目问的是“采取监管措施”，对应利润实现数未达到盈利预测50%，如果是“说明理由并道歉”，则是对应利润实现数未达到盈利预测80%，题目问的是前者。 选项D正确：上市公司就并购重组事项出具盈利预测报告的，在相关并购重组活动完成后，凡不属于上市公司管理层事前无法获知且事后无法控制的原因，上市公司或者购买资产实现的利润未达到盈利预测报告或者资产评估报告预测金额80％的，中国证监会责令财务顾问及其财务顾问主办人在股东大会及中国证监会指定报刊上公开说明未实现盈利预测的原因并向股东和社会公众投资者道歉。利润实现数未达到盈利预测【50％】的，中国证监会可以同时对财务顾问及其财务顾问主办人采取监管谈话、出具警示函、责令定期报告等监管措施。","type":"single"},{"id":"cy_fin_1195","q":"证券登记结算机构、证券服务机构，未按照有关规定保存有关文件和资料的，责令改正，给予警告，并处以（）的罚款。","c":{"A":"3万～30万元","B":"4万～40万元","C":"30万～60万元","D":"10万～100万元"},"a":"D","an":"选项D正确：《证券法》第二百一十四条，发行人、证券登记结算机构、证券公司、证券服务机构未按照规定保存有关文件和资料的，责令改正，给予警告，并处以【十万元以上一百万元以下】的罚款；泄露、隐匿、伪造、篡改或者毁损有关文件和资料的，给予警告，并处以二十万元以上二百万元以下的罚款；情节严重的，处以五十万元以上五百万元以下的罚款，并处暂停、撤销相关业务许可或者禁止从事相关业务。对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款。","type":"single"},{"id":"cy_fin_1197","q":"发行人、证券公司泄露、隐匿、伪造、篡改或者毁损有关文件和资料的，给予警告，并处以（）罚款。","c":{"A":"3万～30万元","B":"4万～40万元","C":"20万～200万元","D":"40万～60万元"},"a":"C","an":"选项C正确：《证券法》第二百一十四条，发行人、证券登记结算机构、证券公司、证券服务机构未按照规定保存有关文件和资料的，责令改正，给予警告，并处以十万元以上一百万元以下的罚款；泄露、隐匿、伪造、篡改或者毁损有关文件和资料的，给予警告，并处以【二十万元以上二百万元】以下的罚款；情节严重的，处以五十万元以上五百万元以下的罚款，并处暂停、撤销相关业务许可或者禁止从事相关业务。对直接负责的主管人员和其他直接责任人员给予警告，并处以十万元以上一百万元以下的罚款。","type":"single"},{"id":"cy_fin_1199","q":"下列关于证券发行与承销信息披露有关规定的说法中，错误的是（  ）。","c":{"A":"发行人和主承销商在发行过程中，应当按照中国证监会规定的要求编制信息披露文件，履行信息披露义务","B":"发行人和主承销商向公众投资者进行推介时，向公众投资者提供的发行人信息的内容及完整性应当与向网下投资者提供的信息保持一致","C":"发行人和主承销商在发行过程中披露的信息，应当真实、准确、完整、及时，不得有虚假记载、误导性陈述或者重大遗漏","D":"发行人和承销商在发行过程中公告的信息，应当在证券交易所网站和符合中国证监会规定条件的媒体发布，不用置备在证券交易所供社会公众查阅"},"a":"D","an":"选项D错误：发行人和主承销商在发行过程中公告的信息，应当在证券交易所网站和符合中国证监会规定条件的媒体发布，同时将其置备于公司住所、证券交易所，供社会公众查阅。 选项ABC说法正确。","type":"single"},{"id":"cy_fin_1201","q":"证券公司承销证券，以不正当竞争手段招揽承销业务的，应责令改正，给予警告，没收违法所得，可以并处（）的罚款。","c":{"A":"十万元以上一百万元以下","B":"五十万元以上五百万元以下","C":"三十万元以上三百万元以下","D":"二十万元以上二百万元以下"},"a":"B","an":"选项B正确：证券公司承销证券，以不正当竞争手段招揽承销业务属于《证券法》第二十九条规定的禁止行为，违反该条规定的处罚为：责令改正，给予警告，没收违法所得，可以并处50-500万元以下的罚款。  【知识详解】 《证券法》第一百八十四条规定，证券公司承销证券违反本法第二十九条规定的，责令改正，给予警告，没收违法所得，可以并处【五十万元以上五百万元以下】的罚款；情节严重的，暂停或者撤销相关业务许可。对直接负责的主管人员和其他直接责任人员给予警告，可以并处二十万元以上二百万元以下的罚款；情节严重的，并处以五十万元以上五百万元以下的罚款。 其中，《证券法》第二十九条规定：证券公司承销证券，应当对公开发行募集文件的真实性、准确性、完整性进行核查。发现有虚假记载、误导性陈述或者重大遗漏的，不得进行销售活动；已经销售的，必须立即停止销售活动，并采取纠正措施。证券公司承销证券，不得有下列行为： ①进行虚假的或者误导投资者的广告宣传或者其他宣传推介活动； ②以不正当竞争手段招揽承销业务； ③其他违反证券承销业务规定的行为。 证券公司有前款所列行为，给其他证券承销机构或者投资者造成损失的，应当依法承担赔偿责任。","type":"single"},{"id":"cy_fin_1203","q":"（）依法对公司债券发行及其交易或转让活动进行监督管理。","c":{"A":"中国证券业协会","B":"财政部","C":"中国证监会","D":"国务院"},"a":"C","an":"选项C正确：【中国证监会】依法对公司债券的发行及其交易或转让活动进行监督管理。 选项A错误：中国证券业协会是证券行业的自律性组织，属于社会团体法人，主要职责是协助监管机构（如中国证监会）开展行业自律管理、制定行业规范、提供会员服务等，并非法定的行政监督管理机构。 选项B错误：财政部的主要职责是制定财政政策、管理国家财政收支、发行政府债券（如国债）等。 选项D错误：国务院是最高国家行政机关，负责制定宏观政策和法规（如出台行政法规），但具体的市场监督管理职责由其下属的专门机构（如中国证监会）承担。","type":"single"},{"id":"cy_fin_1205","q":"保荐机构应当针对发行人的具体情况确定证券发行上市后持续督导的内容，在持续督导期内督导发行人履行有关上市公司规范运作、信守承诺和信息披露等义务，审阅信息披露文件及向中国证监会、证券交易所提交的其他文件，并承担的工作有（）。","c":{"A":"督导发行人有效执行并完善防止其董事、监事、高级管理人员利用职务之便损害发行人利益的内控制度","B":"督导发行人有效执行并完善保障关联交易公允性和合规性的制度，并对关联交易发表意见","C":"持续关注发行人募集资金的专户存储、投资项目的实施等承诺事项","D":"持续关注发行人为他人提供担保等事项，并发表意见"},"a":"A,B,C,D","an":"选项ABCD正确：保荐机构应当针对发行人的具体情况，确定证券发行上市后持续督导的内容，在持续督导期间内督导发行人履行有关上市公司规范运作、信守承诺和信息披露等义务，审阅信息披露文件及向中国证监会、证券交易所提交的其他文件，并承担下列工作： （1）督导发行人有效执行并完善防止控股股东、实际控制人、其他关联方违规占用发行人资源的制度； （2）督导发行人有效执行并完善防止其董事、监事、高级管理人员利用职务之便损害发行人利益的内控制度；【A】  （3）督导发行人有效执行并完善保障关联交易公允性和合规性的制度，并对关联交易发表意见；【B】  （4）持续关注发行人募集资金的专户存储、投资项目的实施等承诺事项；【C】  （5）持续关注发行人为他人提供担保等事项，并发表意见；【D】 （6）中国证监会、证券交易所规定及保荐协议约定的其他工作。","type":"multi"},{"id":"cy_fin_1207","q":"首次公开发行股票的发行人和主承销商应当在网上申购前披露每位网下投资者的详细报价情况，其中包括（）。","c":{"A":"投资者名称、申购价格及对应的拟申购数量","B":"有效报价和发行价格的确定过程","C":"发行价格对应的市盈率","D":"网下、网上的发行方式和发行数量"},"a":"A,B,C,D","an":"选项ABCD正确：首次公开发行股票的发行人和主承销商应当在网上申购前披露每位网下投资者的详细报价情况，包括： 投资者名称、申购价格及对应的拟申购数量（A项）；剔除最高报价有关情况；剔除最高报价部分后网下投资者报价的中位数和加权平均数以及公募基金、社保基金、养老金、年金基金、保险资金和合格境外投资者资金报价的中位数和加权平均数；有效报价和发行价格（或发行价格区间）的确定过程（B项）；发行价格（或发行价格区间）及对应的市盈率（C项）；按照发行价格计算的募集资金情况，所筹资金不能满足使用需求的，还应当披露相关投资风险；网下、网上的发行方式和发行数量（D项）；回拨机制；中止发行安排；申购缴款要求等。","type":"multi"},{"id":"cy_fin_1209","q":"首次公开发行股票的发行人和主承销商应当在发行和承销过程中公开披露的信息包括（）。","c":{"A":"网上申购前披露每位网下投资者的详细报价情况","B":"招股意向书刊登首日在发行公告中披露发行定价方式","C":"在发行结果公告中披露获配投资者名称","D":"招股意向书刊登首日在发行公告中披露发行定价程序"},"a":"A,B,C,D","an":"选项ABCD正确：证券发行与承销业务信息披露的有关规定： （1）招股意向书刊登首日，应当在发行公告中披露发行定价方式、定价程序（BD项正确）、与网下询价投资者条件、证券配售原则、配售方式、有效报价的确定方式、中止发行安排、发行时间安排和路演推介相关安排等信息； （2）网上申购前披露每位网下投资者的详细报价情况（A项正确）； （3）在发行结果公告中披露获配投资者名称（C项正确）以及每个获配投资者的报价、申购数量和获配数量等，并明确说明自主配售的结果是否符合事先公布的配售原则；对于提供有效报价但未参与申购，或实际申购数量明显少于报价时拟申购量的投资者应当列表公示并着重说明。","type":"multi"},{"id":"cy_fin_1211","q":"发行人因再次申请发行证券另行聘请保荐机构、保荐机构被中国证监会撤销保荐业务资格的，应当终止保荐协议。终止保荐协议的，保荐机构和发行人应当自终止之日起7个工作日内向中国证监会、证券交易所报告，说明原因。（）","c":{"1":"对","0":"错"},"a":"0","an":"发行人因再次申请发行证券另行聘请保荐机构、保荐机构被中国证监会撤销保荐业务资格的，应当终止保荐协议。终止保荐协议的，保荐机构和发行人应当自终止之日起5个工作日内（并非7个工作日）向中国证监会、证券交易所报告，说明原因。","type":"judge"},{"id":"cy_fin_1213","q":"持续督导期间，保荐机构被撤销保荐业务资格的，发行人应当在1个月内另行聘请保荐机构，未在规定期限内另行聘请的，中国证监会可以为其指定保荐机构。（）","c":{"1":"对","0":"错"},"a":"1","an":"持续督导期间，保荐机构被撤销保荐业务资格的，发行人应当在【1个月内】另行聘请保荐机构，未在规定期限内另行聘请的，中国证监会可以为其指定保荐机构。","type":"judge"},{"id":"cy_fin_1215","q":"（）是指在证券交易所或者国务院批准的其他证券交易场所进行的证券交易中，证券公司向客户出借资金供其买入证券或者出借证券供其卖出，并由客户交存相应担保物的经营活动。","c":{"A":"融资融券业务","B":"转融通业务","C":"股票质押式回购业务","D":"股票约定式回购业务"},"a":"A","an":"选项A正确：【融资融券业务】，是指在证券交易所或者国务院批准的其他证券交易场所进行的证券交易中，证券公司向客户【出借资金供其买入证券或者出借证券供其卖出】，并由客户交存相应担保物的经营活动。 选项B错误：证券金融公司将自有或者依法筹集的资金和证券出借给证券公司，以供其办理融资融券业务的经营活动。 选项C错误：股票质押式回购业务是指符合条件的资金融入方（融入方）以所持有的股票或其他证券质押，向符合条件的资金融出方（融出方）融入资金，并约定在未来返还资金、解除质押的交易。 选项D错误：教材未提及。是一种场外协议融资方式，具体指资金融入方与资金融出方根据约定的条件达成协议，在未来特定时间按事先约定的价格购回该笔股票。","type":"single"},{"id":"cy_fin_1217","q":"投资者刘某向M证券公司申请开立融资融券账户，但其证券账户最近一个月日均资产只有40万元。依据规定，M证券公司的正确做法是（  ）。","c":{"A":"鉴于刘某是公司的长期客户，可酌情为其办理开户","B":"因刘某资产规模接近标准，可先为其开立权限，要求其在10个工作日内补足资产","C":"刘某不符合准入条件，不得为其开立信用账户","D":"为刘某开立账户，但限制其初始融资额度不超过10万元"},"a":"C","an":"证券公司不得为客户开立信用业务账户的情形 (1)未按照要求提供有关情况； (2)从事证券交易时间不足半年；缺乏风险承担能力； (3)最近20个交易日日均证券类资产低于50万元或者有重大违约记录的客户； (4)本公司的股东(不包括仅持有上市证券公司5%以下流通股份的股东)、关联人。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_1219","q":"证券登记结算机构受证券发行人委托以（）形式分派投资收益的，应当记录在证券公司信用交易资金交收账户。","c":{"A":"证券","B":"现金","C":"红利","D":"股票"},"a":"B","an":"选项B正确：证券登记结算机构受证券发行人委托以【现金】形式分派投资收益的，应当将分派的资金划入【证券公司信用交易资金交收账户】。证券公司应当在资金到账后，通知商业银行对客户信用资金账户的明细数据进行变更。 选项AD错误：证券登记结算机构受证券发行人委托以证券形式分派投资收益的，应当将分派的证券记录在证券公司客户信用交易担保证券账户内，并相应变更客户信用证券账户的明细数据。 选项C错误：迷惑选项，无实际意义，法规明确区分证券和现金两种处理方式，红利是指上市公司在进行利润分配时，分配给股东的利润，可能是现金，也有可能是股份。","type":"single"},{"id":"cy_fin_1221","q":"A证券公司因业务需要，3月1日向证券金融公司申请转融通资金用于证券交易业务，双方于3月15日完成资金实际交付。按照规定，A证券公司此次转融通业务最晚应在（  ）归还资金。","c":{"A":"46174","B":"46188","C":"46266","D":"46280"},"a":"D","an":"证券金融公司向证券公司转融通的期限不得超过6个月。转融通的期限，自资金或者证券实际交付之日起算。 3月15日完成资金实际交付，最长6个月，意味着到最晚9月15日应归还资金。故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_1223","q":"（）是指证券公司将符合沪、深证券交易所《质押式报价回购交易及登记结算业务办法》规定的自有资产作为质押券，以质押券折算后的标准券总额为融资额度，向其指定交易客户以证券公司报价、客户接受报价的方式融入资金，在约定的购回日客户收回融出资金并获得相应收益的交易。","c":{"A":"融资融券业务","B":"约定回购式证券交易","C":"股票质押式回购","D":"质押式报价回购"},"a":"D","an":"解题技巧：题干特别强调了“符合沪、深证券交易所《质押式报价回购交易及登记结算业务办法》规定的自有资产作为质押券。 选项D正确：【质押式报价回购】是指证券公司将符合沪、深证券交易所《质押式报价回购交易及登记结算业务办法》规定的自有资产作为质押券，以质押券折算后的标准券总额为融资额度，向其指定交易客户以证券公司报价、客户接受报价的方式融入资金，在约定的购回日客户收回融出资金并获得相应收益的交易。 选项A错误：融资融券业务，是指在证券交易所或者国务院批准的其他证券交易场所进行的证券交易中，证券公司向客户出借资金供其买入证券或者出借证券供其卖出，并由客户交存相应担保物的经营活动。 选项B错误：教材未提及。通常指的是双方约定在未来某个时间点以约定价格回购证券。 选项C错误：股票质押式回购业务是符合条件的资金融入方以所持有的股票或其他证券质押，向符合条件的资金融出方融入资金，并约定在未来返还资金、解除质押的交易。","type":"single"},{"id":"cy_fin_1225","q":"投资者融资买入证券时，融资保证金比例不得低于（）。","c":{"A":"1.2","B":"1","C":"0.8","D":"0.5"},"a":"C","an":"选项C正确：投资者融资买入证券时，融资【保证金比例不得低于80%】。融资保证金比例是指投资者融资买入时交付的保证金与融资交易金额的比例。  【易混淆】融资融券保证金比例 1.投资者融资买入证券时，融资保证金比例不得低于80%。融资保证金比例是指投资者融资买入时交付的保证金与融资交易金额的比例。 2.投资者融券卖出时，融券保证金比例不得低于100%，其中私募证券投资基金的融券保证金比例不得低于120%。融券保证金比例是指投资者融券卖出时交付的保证金与融券交易金额的比例。","type":"single"},{"id":"cy_fin_1227","q":"证券金融公司的资金，除用于履行相关法规的规定职责和维持公司正常运转外，不能用于购买（）。","c":{"A":"国债","B":"证券投资基金","C":"银行存款","D":"投资性不动产"},"a":"D","an":"题目问的是”不能用于“。 选项D错误：证券金融公司只能购置自用不动产，而不是投资性不动产。因此答案选择D。 选项ABC正确：证券金融公司的资金，除用于履行相关法规的规定职责和维持公司正常运转外，只能用于购买银行存款；购买国债、证券投资基金份额等经中国证监会认可的高流动性金融产品；购置自用不动产及中国证监会认可的其他用途。","type":"single"},{"id":"cy_fin_1229","q":"证券金融公司应当妥善保存履行中国证监会有关规定职责所形成的各类文件、资料，保存期限不少于（）年。","c":{"A":"10","B":"15","C":"20","D":"25"},"a":"C","an":"选项C正确：证券金融公司应当妥善保存履行中国证监会有关规定职责所形成的各类文件、资料，保存期限不少于【20年】。","type":"single"},{"id":"cy_fin_1231","q":"（）是指证券金融公司将自有或者依法筹集的资金出借给证券公司，供其办理融资业务的经营活动。","c":{"A":"融资融券业务","B":"转融通业务","C":"股票质押式回购业务","D":"股票约定式回购业务"},"a":"B","an":"选项B正确：转融通业务是指证券金融公司将自有或者依法筹集的资金出借给证券公司，供其办理融资业务的经营活动。 选项A错误：融资融券业务是指证券公司（这里注意和转融通业务进行区分）向客户出借资金供其买入证券或出借证券供其卖出，并由客户交存相应担保物的活动。 选项C错误：股票质押式回购业务是符合条件的资金融入方以所持有的股票或其他证券质押，向符合条件的资金融出方融入资金，并约定在未来返还资金、解除质押的交易。 选项D错误：股票约定式回购业务：教材无，指的是投资者与券商之间达成的一种协议，投资者将股票卖给券商，同时约定在未来某个时间点以事先确定的价格从券商处购回该股票。","type":"single"},{"id":"cy_fin_1233","q":"经证券公司（）同意，证券金融公司可以（）使用证券公司交存的保证金。","c":{"A":"书面；无偿","B":"书面；有偿","C":"口头；无偿","D":"口头；有偿"},"a":"B","an":"选项B正确：经证券公司书面同意，证券金融公司可以有偿使用证券公司交存的保证金。 选项ACD为干扰项，书面同意强调的是“书面”形式，即必须有正式的书面文件来确认证券公司的同意。有偿使用：证券金融公司使用保证金是有代价的，不是无偿的，这通常涉及到费用或利息的支付。","type":"single"},{"id":"cy_fin_1235","q":"证券金融公司可以根据化解证券公司违约风险的需要，建立（）。","c":{"A":"转融通保证金","B":"证券公司担保账户","C":"专用资金账户","D":"转融通互保基金"},"a":"D","an":"选项D正确：证券金融公司可以根据化解证券公司违约风险的需要，建立转融通互保基金。转融通互保基金的管理办法，由证券金融公司制定，报中国证监会备案后实施。 （通俗解释：互保基金是证券金融公司为应对证券公司集体违约或系统性风险而设立的专项基金，通过证券公司缴纳的互保金及其他合法方式筹集，用于在极端情况下弥补损失、化解风险。互保基金是专门针对 “化解证券公司违约风险” 建立的制度安排） 选项A错误：转融通保证金是证券公司参与转融通业务时，向证券金融公司提交的担保物，用于保障其履约能力。 选项B错误：担保账户是证券金融公司用于记录证券公司提交的担保物的专用账户。 选项C错误：专用资金账户是证券金融公司为转融通业务设立的资金结算账户，用于资金的存放、划转和清算。","type":"single"},{"id":"cy_fin_1237","q":"某一证券投资者融资买入1000股股票，每股买价为20元，并以每股50元的价格卖出，交付的保证金为50000元，那么买入的融资保证金比例为（）。","c":{"A":"5","B":"2.5","C":"1","D":"0.5"},"a":"B","an":"选项B正确：买入证券的融资保证金比例=保证金／(融资买入证券数量×买入价格)×100％=50000/（1000×20）×100％=250％。","type":"single"},{"id":"cy_fin_1239","q":"按照规定，证券金融公司开展转融通业务，应当以自己的名义，在证券登记结算机构分别开立（）。","c":{"A":"转融通专用证券账户","B":"转融通担保证券账户","C":"转融通证券交收账户","D":"转融通专用资金账户"},"a":"A,B,C","an":"选项ABC正确：证券金融公司开展转融通业务，应当以自己的名义，在证券登记结算机构分别开立【转融通专用证券账户、转融通担保证券账户和转融通证券交收账户】。 选项D错误：证券金融公司开展转融通业务，应当以自己的名义，在商业银行开立转融通专用资金账户（D错误），在证券登记结算机构分别开立转融通担保资金账户和转融通资金交收账户。","type":"multi"},{"id":"cy_fin_1241","q":"证券金融公司或者证券公司违反《转融通业务监督管理试行办法》规定的，由中国证监会视具体情形，采取（）等监管措施。","c":{"A":"责令改正","B":"出具警示函","C":"责令公开说明","D":"责令定期报告"},"a":"A,B,C,D","an":"选项ABCD正确：证券金融公司或者证券公司违反《转融通业务监督管理试行办法》规定的，由中国证监会视具体情形，采取【责令改正、出具警示函、责令公开说明、责令定期报告】等监管措施；应当给予行政处罚的，由中国证监会对公司及其有关责任人员单处或者并处警告、罚款。","type":"multi"},{"id":"cy_fin_1243","q":"证券金融公司的资金，可以用于（）。","c":{"A":"购买银行存款","B":"购置自用不动产","C":"购买国债","D":"购买证券投资基金份额"},"a":"A,B,C,D","an":"选项ABCD正确：证券金融公司的资金，除用于履行相关法规的规定职责和维持公司正常运转外，只能用于： （1）购买银行存款（A项）； （2）购买国债（C项）、证券投资基金份额（D项）等经中国证监会认可的高流动性金融产品； （3）购置自用不动产（B项）； （4）中国证监会认可的其他用途。","type":"multi"},{"id":"cy_fin_1245","q":"证券金融公司应当依照《转融通业务监督管理试行办法》的规定制定转融通业务规则，明确（）。","c":{"A":"账户管理","B":"授信管理","C":"标的证券管理","D":"保证金管理"},"a":"A,B,C,D","an":"选项ABCD正确：证券金融公司应当依照《转融通业务监督管理试行办法》的规定制定转融通业务规则，明确【账户管理、授信管理、标的证券管理、保证金管理】、费率管理、信息披露等事项，报中国证监会备案后实施。","type":"multi"},{"id":"cy_fin_1247","q":"证券金融公司是中国证监会根据国务院的决定，批准设立专司转融通业务的股份有限公司，其履行的职责有（）。","c":{"A":"为证券公司融资融券业务提供资金的转融通服务","B":"为证券公司融资融券业务提供证券的转融通服务","C":"审核、选取并确定可充抵保证金证券的名单，并向市场公布","D":"运用行政手段干预证券市场交易价格"},"a":"A,B","an":"选项AB正确：证券金融公司是中国证监会根据国务院的决定，批准设立专司转融通业务的股份有限公司，证券金融公司不以营利为目的，履行下列职责： 第一，为证券公司融资融券业务提供资金和证券的转融通服务。 第二，中国证监会确定的其他职责。  选项C错误：“审核、选取并确定可充抵保证金证券的名单”是证券交易所的职责。  选项D错误：混淆 “市场中介” 与 “监管机构” 的角色，证券金融公司作为市场化主体，应通过调节转融通费率、保证金比例等市场化手段引导市场资金流动，防控风险，而非直接干预交易价格。","type":"multi"},{"id":"cy_fin_1249","q":"投资者对证券发行人的权利包括（）。","c":{"A":"请求召开证券持有人会议","B":"参加证券持有人会议","C":"提案、表决","D":"配售股份的认购"},"a":"A,B,C,D","an":"选项ABCD正确：投资者对证券发行人的权利，包括【请求召开证券持有人会议、参加证券持有人会议、提案、表决、配售股份的认购】、请求分配投资收益等因持有证券而产生的权利。","type":"multi"},{"id":"cy_fin_1251","q":"证券金融公司应当每个交易日公布（）。","c":{"A":"转融资余额","B":"转融券余额","C":"转融通成交数据","D":"转融通业务利润"},"a":"A,B,C","an":"选项ABC正确：证券金融公司应当每个交易日公布【转融资余额、转融券余额、转融通成交数据及转融通费率】。 选项D错误：干扰项，转融通业务利润属于证券金融公司的财务盈利情况，涉及公司内部经营信息，与市场实时监管和投资者决策无直接关联。法规要求公布的是转融通费率（即借贷资金 / 证券的利率或费用标准），利润属于定期财报披露内容，无需每个交易日公布。","type":"multi"},{"id":"cy_fin_1253","q":"证券金融公司开展转融通业务，可以使用的资金和证券有（）。","c":{"A":"自有资金和证券","B":"通过证券交易所的业务平台融入的资金和证券","C":"通过证券金融公司的业务平台融入的资金","D":"依法筹集的其他证券和资金"},"a":"A,B,C,D","an":"选项ABCD正确：证券金融公司开展转融通业务，可以使用下列资金和证券： （1）自有资金和证券。A项符合题意  （2）通过证券交易所的业务平台融入的资金和证券。B项符合题意  （3）通过证券金融公司的业务平台融入的资金。C项符合题意  （4）依法筹集的其他资金和证券。D项符合题意","type":"multi"},{"id":"cy_fin_1255","q":"除了法律及行政法规之外，证券公司信用业务涉及的主要部门规章、规范性文件、自律规则包括（）。","c":{"A":"《股票质押式回购交易及登记结算业务办法》","B":"《转融通业务监督管理试行办法》","C":"《证券公司融资融券业务内部控制指引》","D":"《合格境外机构投资者境内证券投资管理办法》"},"a":"A,B,C","an":"选项D错误：《合格境外机构投资者境内证券投资管理办法》主要涉及合格境外机构投资者（QFII）的投资管理，并不是针对信用业务。 选项ABC正确：证券公司信用业务涉及的主要部门规章、规范性文件、自律规则等包括《证券公司融资融券业务管理办法》《证券公司融资融券业务内部控制指引》《转融通业务监督管理试行办法》《上海证券交易所融资融券交易实施细则》《深圳证券交易所融资融券交易实施细则》《北京证券交易所融资融券交易细则》《北京证券交易所融资融券业务指南》《中国证券金融股份有限公司转融通业务规则(试行)》《关于发布修改后的〈融资融券合同必备条款〉和〈融资融券交易风险揭示书必备条款〉的通知》《股票质押式回购交易及登记结算业务办法》《质押式报价回购交易及登记结算业务办法》及《证券公司参与股票质押式回购交易风险管理指引》等。","type":"multi"},{"id":"cy_fin_1257","q":"证券金融公司向证券公司转融通的期限自资金或者证券实际交付之日起算，不得超过6个月。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券金融公司向证券公司【转融通的期限不得超过6个月】。转融通的期限，自资金或者证券实际交付之日起算。","type":"judge"},{"id":"cy_fin_1259","q":"客户信用证券账户内的证券转板时，证券公司必须按照证券面值计算其市值。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"《北京证券交易所融资融券交易细则》规定，客户信用证券账户内的证券，出现被调出可充抵保证金证券范围、停牌、被实行风险警示、转板等特殊情形或者因权益处理等产生尚未到账的在途证券，证券公司在计算客户维持担保比例时，可以根据与客户的约定按照公允价格或其他定价方式计算其市值。","type":"judge"},{"id":"cy_fin_1261","q":"下列影响证券、期货交易价格的行为中，不属于操纵证券、期货市场的是（）。","c":{"A":"在自己实际控制的账户之间进行证券交易","B":"与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易","C":"利用虚假或者不确定的重大信息，诱导投资者进行证券、期货交易","D":"根据内幕消息买卖证券或者暗示他人买卖证券"},"a":"D","an":"题目问的是“不属于”。 选项D错误：根据内幕消息买卖证券或者暗示他人买卖证券属于利用内幕信息（并非操纵市场）的行为。因此答案选择D。 选项ABC正确：操纵证券、期货市场，影响证券、期货交易价格或者证券、期货交易量的行为包括： ①单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖的； ②与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易的（B项）； ③在自己实际控制的账户之间进行证券交易（A项），或者以自己为交易对象，自买自卖期货合约的； ④不以成交为目的，频繁或者大量申报买入、卖出证券、期货合约并撤销申报的； ⑤利用虚假或者不确定的重大信息，诱导投资者进行证券、期货交易的（C项）； ⑥对证券、证券发行人、期货交易标的公开作出评价、预测或者投资建议，同时进行反向证券交易或者相关期货交易的； ⑦以其他方法操纵证券、期货市场的。","type":"single"},{"id":"cy_fin_1263","q":"关于证券公司自营业务的运作流程，下列说法错误的是（）。","c":{"A":"投资组合的制订和决策以及交易指令的执行应相互分离，并由不同人员负责","B":"交易指令需要强制留痕","C":"交易指令执行前应当经过审核","D":"禁止从自营账户中调入调出资金"},"a":"D","an":"题目问的是“说法错误的”。 选项D错误：自营业务资金的出入必须以公司名义进行（并不是禁止），禁止以个人名义从自营账户中调入调出资金。因此答案选择D。 选项A正确：证券公司需建立严密的自营业务操作流程，投资品种的研究、投资组合的制订和决策以及交易指令的执行应当相互分离并由不同人员负责。 选项BC正确：交易指令执行前应当经过审核，并强制留痕。","type":"single"},{"id":"cy_fin_1265","q":"证券公司汤某，与大学同学串通，以事先约定的时间、价格、方式进行证券交易，影响证券交易价格，他们的行为属于（）。","c":{"A":"传播虚假信息","B":"操纵证券市场","C":"内幕交易行为","D":"证券欺诈行为"},"a":"B","an":"选项B正确：题干中描述的行为符合操纵证券、期货市场表现中“与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易”。 选项A错误：“传播虚假信息”指的是故意散布不真实的信息来影响证券市场，题干中汤某等人是直接进行证券交易操作，并非传播虚假信息。 选项C错误：内幕交易的核心是利用 “涉及公司经营、财务或对证券价格有重大影响的尚未公开的内幕信息” 进行交易。题干未提及内幕信息。 选项D错误：证券欺诈通常指违背客户真实意愿、损害客户利益（如欺诈客户买卖证券）。题干中汤某等人的行为是通过串通交易影响价格，属于操纵市场。  【知识拓展】有下列情形之一，操纵证券、期货市场，影响证券、期货交易价格或者证券、期货交易量，情节严重的，处5年以下有期徒刑或者拘役，并处或者单处罚金; 情节特别严重的，处5年以上10年以下有期徒刑，并处罚金： （1）单独或者合谋，集中资金优势、持股或者持仓优势或者利用信息优势联合或者连续买卖的； （2）与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易的； （3）在自己实际控制的账户之间进行证券交易，或者以自己为交易对象，自买自卖期货合约的； （4）不以成交为目的，频繁或者大量申报买入、卖出证券、期货合约并撤销申报的； （5）利用虚假或者不确定的重大信息，诱导投资者进行证券、期货交易的； （6）对证券、证券发行人、期货交易标的公开作出评价、预测或者投资建议，同时进行反向证券交易或者相关期货交易的。","type":"single"},{"id":"cy_fin_1267","q":"证券公司应建立健全相对集中、权责统一的投资决策与授权机制。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应建立健全【相对集中、权责统一】的投资决策与授权机制。","type":"judge"},{"id":"cy_fin_1269","q":"证券公司自有资金参与、退出集合资产管理计划时，应当提前（）个工作日告知全体投资者和托管人，并取得其同意。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：证券公司自有资金参与、退出集合资产管理计划时
