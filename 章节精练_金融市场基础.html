并处或者单处罚金；情节特别严重的，处5年以上10年以下有期徒刑，并处罚金。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3011","q":"证券公司操作证券市场，情节特别严重的，其受到的处罚是（）。","c":{"A":"单处罚金","B":"处5年以下有期徒刑，并处罚金","C":"处5年以上10年以下有期徒刑，并处罚金","D":"处拘役，并处罚金"},"a":"C","an":"注意题目问的是“情节特别严重”。 选项C正确：根据《刑法》第一百八十二条的规定，有下列情形之一，操纵证券、期货市场，影响证券、期货交易价格或者证券、期货交易量，情节严重的，处5年以下有期徒刑或者拘役，并处或者单处罚金；情节特别严重的，处【5年以上10年以下】有期徒刑，并处罚金。 选项AB错误：对应情节严重的处罚，而不是情节特别严重。 选项D错误：干扰项，未提及“拘役”。","type":"single"},{"id":"cy_fin_3013","q":"按照《最高人民检察院公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第三十条的规定，内幕交易、泄露内幕信息案，当证券交易成交额在（）万元以上，应予立案追诉。","c":{"A":"100","B":"50","C":"200","D":"30"},"a":"C","an":"选项C正确：据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定（二)》第三十条的规定，内幕交易、泄露内幕信息行为，涉嫌下列情形之一的，应予立案追诉： （1）获利或者避免损失数额在50万元以上的； （2）证券交易成交额在【200万元】以上的； （3）期货交易占用保证金数额在100万元以上的； （4）2年内3次以上实施内幕交易、泄露内幕信息行为的。","type":"single"},{"id":"cy_fin_3015","q":"证券公司应建立健全廉洁从业内部控制制度，下列说法正确的是（）。","c":{"A":"证券公司董事会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任","B":"证券公司的事后追责机制重要性高于事前风险防范和事中管控","C":"每年7月30日前需要向中国证监会有关派出机构报送上年度廉洁从业管理情况报告","D":"如果证券公司及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的，应当于3个工作日内向中国证监会有关派出机构报告"},"a":"A","an":"选项A正确：证券公司董事会决定廉洁从业管理目标，对廉洁从业管理的有效性承担责任 选项B错误：证券经营机构应当在公司层面建立健全廉洁从业管理领导机制和基本制度安排，建立涵盖所有业务及各个环节的廉洁从业内部控制制度，将其纳入整个内部控制体系之中，制定具体、有效的事前风险防范体系、事中管控措施和事后追责机制（事前、事中、事后控制机制重要性无高低之分，三者都非常重要，缺一不可）。 选项C错误：证券期货经营机构应当于每年4月30日（并非7月30日）前，向中国证监会有关派出机构报送上年度廉洁从业管理情况报告。 选项D错误：证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的，证券期货经营机构应当在5个工作日内（并非3个工作日），向中国证监会有关派出机构报告。","type":"single"},{"id":"cy_fin_3017","q":"某证券公司在年度内部审计中，发现一名投资经理存在违规交易行为，此时公司应当（  ）。","c":{"A":"在10个工作日内向中国证监会派出机构报告","B":"在5个工作日内向中国证监会派出机构报告，并同时向主管纪检监察部门报告","C":"仅向内部合规部门报告，无需外部报告","D":"等待监管检查时再一并报告"},"a":"B","an":"有下列情形之一的，证券期货经营机构应当在5个工作日内，向中国证监会有关派出机构报告： (1)证券期货经营机构在内部检查中，发现存在违反规定行为的； (2)证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的； (3)证券期货经营机构及其工作人员发现其股东、客户等相关方以不正当手段干扰监管工作的； (4)证券期货经营机构或者其工作人员因违反廉洁从业规定被纪检监察部门、司法机关立案调查或者被采取纪律处分、行政处罚、刑事处罚等措施的。 出现上述第(1)项情形的，应当同时向主管纪检监察部门报告（符合题目情形，故选B，ACD错误），出现上述第(1)、第(2)、第(3)项情形且涉嫌犯罪的，相关部门应当将其依法移送监察、司法机关。","type":"single"},{"id":"cy_fin_3019","q":"证券期货经营机构在内部检查中，发现存在违反规定行为的，证券期货经营机构应当在（）个工作日内，向中国证监会有关派出机构报告。","c":{"A":"5","B":"7","C":"10","D":"12"},"a":"A","an":"选项A正确：有下列情形之一的，证券期货经营机构应当在【五个工作日】内，向中国证监会有关派出机构报告： 1.证券期货经营机构在内部检查中，发现存在违反规定行为的； 2.证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的； 3.证券期货经营机构及其工作人员发现其股东、客户等相关方以不正当手段干扰监管工作的； 4.证券期货经营机构或者其工作人员因违反廉洁从业规定被纪检监察部门、司法机关立案调查或者被采取纪律处分、行政处罚、刑事处罚等措施的。","type":"single"},{"id":"cy_fin_3021","q":"《证券期货经营机构及其工作人员廉洁从业规定》规定，证券期货经营机构应当在5个工作日内，向中国证监会有关派出机构报告的情形有（  ）。","c":{"A":"证券期货经营机构在内部检查中，发现存在违反规定行为的","B":"证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避","C":"证券期货经营机构及其工作人员发现其股东、客户等相关方以不正当手段干扰监管工作的","D":"证券期货经营机构或者其工作人员因违反廉洁从业规定被纪检监察部门、司法机关立案调查或者被采取纪律处分、行政处罚、刑事处罚等措施的"},"a":"A,B,C,D","an":"选项ABCD正确：有下列情形之一的，证券期货经营机构应当在5个工作日内，向中国证监会有关派出机构报告： (1)证券期货经营机构在内部检查中，发现存在违反规定行为的； (2)证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的； (3)证券期货经营机构及其工作人员发现其股东、客户等相关方以不正当手段干扰监管工作的； (4)证券期货经营机构或者其工作人员因违反廉洁从业规定被纪检监察部门、司法机关立案调查或者被采取纪律处分、行政处罚、刑事处罚等措施的。","type":"multi"},{"id":"cy_fin_3023","q":"证券期货经营机构主要负责人是落实廉洁从业管理职责的第一责任人，各级负责人应加强对所属部门、分支机构或子公司工作人员的廉洁从业管理，在职责范围内承担相应管理责任。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券期货经营机构主要负责人是落实廉洁从业管理职责的第一责任人，各级负责人应加强对所属部门、分支机构或子公司工作人员的廉洁从业管理，在职责范围内承担相应管理责任。","type":"judge"},{"id":"cy_fin_3025","q":"证券期货经营机构发现客户以不正当手段干扰监管工作，应在5个工作日内向证监会派出机构报告。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"有下列情形之一的，证券期货经营机构应当在5个工作日内，向中国证监会有关派出机构报告： (1)证券期货经营机构在内部检查中，发现存在违反规定行为的； (2)证券期货经营机构及其工作人员发现监管人员存在应当回避的情形而未进行回避、利用职务之便索取或者收受不正当利益等违反廉洁规定行为的； (3)证券期货经营机构及其工作人员发现其股东、客户等相关方以不正当手段干扰监管工作的； (4)证券期货经营机构或者其工作人员因违反廉洁从业规定被纪检监察部门、司法机关立案调查或者被采取纪律处分、行政处罚、刑事处罚等措施的。 出现上述第(1)项情形的，应当同时向主管纪检监察部门报告，出现上述第(1)、第(2)、第(3)项情形且涉嫌犯罪的，相关部门应当将其依法移送监察、司法机关。","type":"judge"},{"id":"cy_fin_3027","q":"《证券期货市场诚信监督管理办法》规定的违法失信信息，在诚信档案中的效力期限为3年，但因证券期货违法行为被行政处罚、市场禁入、刑事处罚和判决承担较大侵权、违约民事赔偿责任的信息，其效力期限为（）。","c":{"A":"5年","B":"8年","C":"10年","D":"15年"},"a":"A","an":"选项A正确：《证券期货市场诚信监督管理办法》规定的违法失信信息，在诚信档案中的效力期限为3年，但因证券期货违法行为被行政处罚、市场禁入、刑事处罚和判决承担较大侵权、违约民事赔偿责任的信息，其效力期限为【5年】。","type":"single"},{"id":"cy_fin_3029","q":"根据《证券期货市场诚信监督管理办法》的规定，因证券期货违法行为被行政处罚、市场禁入、刑事处罚和判决承担较大侵权、违约民事赔偿责任的信息，在诚信档案中的效力期限为10年。（）","c":{"1":"对","0":"错"},"a":"0","an":"《证券期货市场诚信监督管理办法》规定的违法失信信息，在诚信档案中的效力期限为3年，但因证券期货违法行为被行政处罚、市场禁入、刑事处罚和判决承担较大侵权、违约民事赔偿责任的信息，其效力期限为5年（并非10年）。","type":"judge"},{"id":"cy_fin_3031","q":"某证券期货经营机构在制定私募资产管理业务相关人员的收入递延支付制度时，下列安排符合监管规定的是（  ）。","c":{"A":"递延支付年限为2年，递延支付收入比例为35%","B":"递延支付年限为5年，递延支付收入比例为30%","C":"递延支付年限为4年，递延支付收入比例为50%","D":"递延支付年限为3年，递延支付收入比例为35%"},"a":"C","an":"根据《证券期货经营机构私募资产管理计划运作管理规定》，证券期货经营机构应当针对私募资产管理业务的主要业务人员和相关管理人员建立收入递延支付机制，合理确定收入递延支付标准、递延支付年限和比例。递延支付年限原则上不少于3年，递延支付的收入金额原则上不少于40%（只有C选项同时符合）。 综上，该题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_3033","q":"根据《证券期货经营机构私募资产管理业务管理办法》，证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和（）名以上投资经理。","c":{"A":"5","B":"2","C":"3","D":"10"},"a":"C","an":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和【3名以上】投资经理，应具有投资研究部门，且专职从事投资研究的人员不少于3人。","type":"single"},{"id":"cy_fin_3035","q":"下列关于证券资产管理业务信息披露的手法，错误的有（）。 I 投资标准化资产的资产管理计划至少每周披露一次净值 II 投资非标准化资产的资产管理计划至少每月披露一次净值 III 每季度结束之日起1个月内披露季度报告 IV 每年度结束之日起3个月内披露年度报告","c":{"A":"II、IV","B":"I、II、III","C":"I、II、III、IV","D":"I、III、IV"},"a":"A","an":"I项正确、II项错误，投资标准化资产的资产管理计划至少【每周】披露一次净值，投资非标准化资产的资产管理计划至少【每季度】披露一次净值。 III项正确、IV项错误，证券期货经营机构应当每季度结束之日起【1个月】内披露季度报告，每年度结束之日起【4个月】内披露年度报告。 故本题选A，选项BCD错误。","type":"single"},{"id":"cy_fin_3037","q":"下列属于资产证券化基础资产负面清单的有（）。 Ⅰ 不动产租金债权 Ⅱ 提单 Ⅲ 仓单 Ⅳ 产权证书","c":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"Ⅱ、Ⅲ、Ⅳ正确：资产证券化基础资产负面清单包括不能直接产生现金流、仅依托处置资产才能产生现金流的基础资产，如【提单、仓单、产权证书】等具有物权属性的权利凭证。 Ⅰ错误：若因空置、在建等原因不能产生稳定现金流的，才被列入负面清单 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3039","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，证券公司存在下列（）情形时，应按照《期货交易管理条例》给予责令改正、警告、没收违法所得等处罚。 I 在证监会审核介绍业务申请材料期间协助客户完成期货市场开户 II 向客户传递商品期货行情信息 III 紧急情况下代客户实施平仓操作 IV 向客户提供期货交易终端","c":{"A":"I、IV","B":"II、III","C":"I、III","D":"I、II、IV"},"a":"C","an":"证券公司有下列行为之一的，按照《期货交易管理条例》第七十条进行处罚： （1）未经许可擅自开展介绍业务； （2）对客户未充分揭示期货交易风险，进行虚假宣传，误导客户； （3）代理客户进行期货交易、结算或者交割；III项错误 （4）收付、存取或者划转期货保证金； （5）为客户从事期货交易提供融资或者担保； （6）未按规定审查客户的开户资料和身份真实性； （7）代客户下达交易指令； （8）利用客户的交易编码、资金账号或者期货结算账户进行期货交易； （9）未将介绍业务与其他经营业务分开或者有效隔离； （10）未将财务、人员、经营场所与期货公司分开隔离； （11）拒绝、阻碍中国证监会及其派出机构依法履行职责。 I项错误，要等证监会审核完介绍业务资格才可以协助客户开户。","type":"single"},{"id":"cy_fin_3041","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，下列关于证券公司受期货公司委托从事介绍业务的行为，正确的是（）。","c":{"A":"提供期货行情信息、交易设施","B":"代期货公司、客户收付期货保证金","C":"代理客户进行期货交易","D":"利用证券资金账户为客户存取、划转期货保证金"},"a":"A","an":"证券公司受期货公司委托从事介绍业务，应当提供下列服务： （1）协助办理开户手续；（A项正确） （2）提供期货行情信息、交易设施； （3）中国证监会规定的其他服务。 证券公司不得代理客户进行期货交易（C项错误）、结算或者交割，不得代期货公司、客户收付期货保证金（B项错误），不得利用证券资金账户为客户存取、划转期货保证金（D项错误）。","type":"single"},{"id":"cy_fin_3043","q":"具备证券自营业务资格的证券公司，其自有资金只能以套期保值为目的参与股票期权业务。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《关于证券公司自营投资范围及有关事项的规定》，具备证券自营业务资格的证券公司可以从事金融衍生产品交易。不具备证券自营业务资格的证券公司只能以对冲风险为目的，从事金融衍生产品交易。","type":"judge"},{"id":"cy_fin_3045","q":"证券公司从事中间介绍业务的工作人员不得进行期货交易。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司从事中间介绍业务的工作人员不得进行期货交易。","type":"judge"},{"id":"cy_fin_3047","q":"下列关于操纵证券期货市场罪的刑事责任的说法，正确的是（）。","c":{"A":"本罪的主观方面为过失","B":"本罪侵害了国家证券、期货管理制度和投资者的合法权益","C":"本罪不处罚单位，只处罚直接负责的主管人员和其他直接责任人员","D":"本罪的主体为一般主体，单位不能成为本罪的犯罪主体"},"a":"B","an":"A项，操纵证券期货市场罪的主观方面为故意。 C项，操纵证券期货市场罪既处罚单位，又处罚直接负责人。 D项，操纵证券期货市场罪的犯罪主体包括单位。","type":"single"},{"id":"cy_fin_3049","q":"王某在2020年3月因证券违法行为受到过行政处罚，2022年9月其参与内幕交易获利10万元，其行为应予立案追诉。（）","c":{"1":"对","0":"错"},"a":"0","an":"内幕交易、泄露内幕信息行为，涉嫌下列情形之一的，应予立案追诉: （1）获利或者避免损失数额在50万元以上的； （2）证券交易成交额在200万元以上的； （3）期货交易占用保证金数额在100万元以上的； （4）2年内3次以上实施内幕交易、泄露内幕信息行为的； （5）明示、暗示3人以上从事与内幕信息相关的证券、期货交易活动的； （6）具有其他严重情节的。 王某不符合任一条件，故本题说法错误。","type":"judge"},{"id":"cy_fin_3051","q":"根据《证券、期货投资咨询管理暂行办法》，下列关于证券投资咨询人员申请登记必须具备的条件，说法正确的有（）。","c":{"A":"具有高中以上学历","B":"具有良好的职业道德","C":"具有从事证券业务两年以上的经历","D":"未受过行政处罚"},"a":"B,C","an":"证券投资咨询人员必须具备下列条件： （1）具有中华人民共和国国籍； （2）具有完全民事行为能力； （3）品行良好、正直诚实，具有良好的职业道德（B正确）； （4）未受过刑事处罚或者与证券业务有关的严重行政处罚（并非所有行政处罚，D错误）； （5）具有大学本科以上学历（并非高中，A错误）； （6）具有从事证券业务两年以上的经历（C正确）； （7）具备从事业务所需的相应专业能力，符合相关从业条件； （8）中国证监会规定的其他条件。 综上所述，本题选BC。","type":"multi"},{"id":"cy_fin_3053","q":"证券期货经营机构从事私募资产管理业务，需具备符合条件的高级管理人员和()名以上投资经理。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"C","an":"证券公司开展私募资产管理业务，应具备符合条件的高级管理人员和3名以上投资经理，应具有投资研究部门且专职从事投资研究的人员不少于3人。","type":"single"},{"id":"cy_fin_3055","q":"证券经营机构及其工作人员在开展自营业务、资产管理业务、另类投资业务或者提供有关服务的过程中，不得编造、传播虚假不实信息，或者利用信息优势、资金优势、持股持券优势，单独或者通过合谋，影响证券、期货及其他衍生品交易价格、交易量。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券经营机构及其工作人员在开展自营业务、资产管理业务、另类投资业务或者提供有关服务的过程中，不得编造、传播虚假不实信息，或者利用信息优势、资金优势、持股持券优势，单独或者通过合谋，影响证券、期货及其他衍生品交易价格、交易量。","type":"judge"},{"id":"cy_fin_3057","q":"证券公司应当配备足够的符合期货从业人员条件的业务人员从事中间介绍业务。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当配备足够的符合期货从业人员条件的业务人员，不得任用不符合期货从业人员条件的业务人员从事介绍业务。","type":"judge"},{"id":"cy_fin_3059","q":"证券公司受期货公司委托从事中间介绍业务，应当提供的服务包括（）。","c":{"A":"代收期货保证金","B":"代理客户进行期货交易","C":"提供期货行情信息、交易设施","D":"使用证券资金账户为客户存取、划转期货保证金"},"a":"C","an":"选项C正确：根据《证券公司为期货公司提供中间介绍业务试行办法》第九条的规定，证券公司受期货公司委托从事介绍业务，应当提供下列服务： (1)协助办理开户手续； (2)提供期货行情信息、交易设施； (3)中国证监会规定的其他服务。 选项ABD错误：证券公司不得代理客户进行期货交易（B项错误）、结算或者交割，不得代期货公司、客户收付期货保证金（A项错误），不得利用证券资金账户为客户存取、划转期货保证金（D项错误）。","type":"single"},{"id":"cy_fin_3061","q":"根据《证券公司风险处置条例》，下列有关行政清理的说法错误的是（）。","c":{"A":"行政清理组不得对债务进行个别清偿，但为保护客户和债权人利益的情形除外","B":"行政清理组清理被撤销证券公司账户的结果，无需经具有证券、期货相关业务资格的会计师事务所审计，但需要报国务院证券监督管理机构认定","C":"行政清理组根据经国务院证券监督管理机构认定的账户清理结果，向证券投资者保护基金管理机构申请弥补客户的交易结算资金的资金","D":"行政清理是被处置证券公司破产清算的前置程序，通过行政清理核查清查公司资产、债权债务，处理公司未履行完毕合同，以保护客户和债权人的利益"},"a":"B","an":"选项B错误：行政清理组清理被撤销证券公司账户的结果，应当经具有证券、期货相关业务资格的会计师事务所审计，并报国务院证券监督管理机构认定。 选项ACD说法正确。","type":"single"},{"id":"cy_fin_3063","q":"根据《刑法》第一百八十一条的规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，处（）以下有期徒刑或者拘役，并处或者单处（）以上（）以下罚金。","c":{"A":"3年；1万元；10万元","B":"5年；1万元；10万元","C":"3年；3万元；10万元","D":"1年；1万元；10万元"},"a":"B","an":"根据《刑法》第一百八十一条的规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，处5年以下有期徒刑或者拘役，并处或者单处1万元以上10万元以下罚金。","type":"single"},{"id":"cy_fin_3065","q":"证券公司与期货公司签订、变更或者终止委托协议的，双方应当在5个工作日内报各自所在地的中国证监会派出机构备案。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司与期货公司签订、变更或者终止委托协议的，双方应当在5个工作日内报各自所在地的中国证监会派出机构备案。","type":"judge"},{"id":"cy_fin_3067","q":"王某在2021年3月因证券违法行为受到过行政处罚，2023年9月其参与内幕交易获利30万元，其行为应予立案追诉。（）","c":{"1":"对","0":"错"},"a":"0","an":"内幕交易获利或者避免损失数额在25万元以上，并且在2年内因证券、期货违法行为受过行政处罚的（2021年3月至2023年9月已经超出2年的限制），应予立案追诉。","type":"judge"},{"id":"cy_fin_3069","q":"甲证券公司为了扩大公司规模，提高自己在市场上的竞争力，经过董事会同意，拟向中国证监会申请为期货公司提供中间介绍业务的资格。如果甲证券公司的申请获得了中国证监会的批准，甲可以接受（）的委托从事中间介绍业务。","c":{"A":"与甲证券公司长期具有贸易往来的期货公司","B":"甲证券公司全资拥有的期货公司","C":"与甲证券公司属于同一机构控制的期货公司","D":"甲证券公司控股的期货公司"},"a":"B,C,D","an":"证券公司只能接受其全资拥有或者控股的，或者被同一机构控制的期货公司的委托从事介绍业务（BCD符合），不能接受其他期货公司的委托从事介绍业务。（A不符合）","type":"multi"},{"id":"cy_fin_3071","q":"证券公司受期货公司委托从事中间介绍业务时，不得提供的服务包括（）。","c":{"A":"协助办理开户手续","B":"提供期货行情信息交易设施","C":"代理客户进行期货结算","D":"代理客户进行期货交易"},"a":"C,D","an":"证券公司受期货公司委托从事中间介绍业务，应当提供下列服务： （1）协助办理开户手续；（A错误）  （2）提供期货行情信息、交易设施；（B错误） （3）中国证监会规定的其他服务。 证券公司不得代理客户进行期货交易、结算或者交割（CD正确），不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"multi"},{"id":"cy_fin_3073","q":"根据行业协会相关规则规定，被有权部门认定的失信被执行人、失信生产经营单位、其他失信单位作为重要现金流提供方的基础资产，属于资产证券化基础资产负面清单范畴。（）","c":{"1":"对","0":"错"},"a":"1","an":"资产证券化基础资产负面清单： 1.不符合地方政府性债务管理有关规定或者新增地方政府性债务的基础资产。 2.被有权部门认定的失信被执行人、失信生产经营单位、其他失信单位作为重要现金流提供方的基础资产。重要现金流提供方、重要子公司存在上述失信情形的，视同重要现金流提供方存在相关情形。 3.产生现金流的能力具有较大不确定性的资产，如矿产资源开采收益权、土地出让收益权、电影票款以及不具有垄断性和排他性的入园凭证等。 4.因空置、在建等原因不能产生稳定现金流的不动产、不动产租金债权或者相关收益权。 5.不能直接产生现金流、仅依托处置资产才能产生现金流的基础资产，如提单、仓单、产权证书等具有物权属性的权利凭证。 6.法律界定及业务形态属于不同类型且缺乏相关性的资产组合，如基础资产中包含企业应收账款、高速公路收费权等两种或者两种以上不同类型资产。 7.违反相关法律法规或者政策规定的资产。 8.以上述资产作为底层资产或者现金流来源的基础资产。底层资产，是指根据穿透原则在专项计划中作为专项计划现金流最终偿付来源的资产。","type":"judge"},{"id":"cy_fin_3075","q":"证券公司操纵证券市场，相关人员受到最严厉的处罚是（）。","c":{"A":"单处罚金","B":"处5年以下有期徒刑，并处罚金","C":"处5年以上10年以下有期徒刑，并处罚金","D":"处拘役，并处罚金"},"a":"C","an":"操纵证券、期货市场，影响证券、期货交易价格或者证券、期货交易量，情节严重的，处5年以下有期徒刑或者拘役，并处或者单处罚金；情节特别严重的，处5年以上10年以下有期徒刑，并处罚金（题目问的是最严厉的处罚，因此选C，ABD错误）。","type":"single"},{"id":"cy_fin_3077","q":"证券公司只能接受(  )期货公司的委托从事介绍业务。","c":{"A":"有重大影响的","B":"全资拥有的","C":"控股的","D":"被同一机构控制的"},"a":"B,C,D","an":"选项BCD正确，选项A错误：证券公司只能接受其全资拥有或者控股的，或者被同一机构控制的期货公司的委托从事介绍业务，不能接受其他期货公司的委托从事介绍业务。","type":"multi"},{"id":"cy_fin_3079","q":"股指期货交易，是指采用公开的集中交易方式或者中国证监会批准的其他方式进行的以股票期权合约为交易标的的交易活动。（）","c":{"1":"对","0":"错"},"a":"0","an":"股票期权交易，是指采用公开的集中交易方式或者中国证监会批准的其他方式进行的以股票期权合约为交易标的的交易活动。","type":"judge"},{"id":"cy_fin_3081","q":"（    ）依法对证券公司、证券投资咨询机构发布证券研究报告行为实行监督管理。","c":{"A":"中国证监会及其派出机构","B":"中国证券业协会","C":"证券交易所","D":"证券登记结算机构"},"a":"A","an":"中国证券监督管理委员会是国务院直属机构，依照法律、法规和国务院授权，统一监督管理全国证券期货市场，维护证券期货市场秩序，保障其合法运行。中国证监会及其派出机构依法对证券公司、证券投资咨询机构发布证券研究报告行为实行监督管理。","type":"single"},{"id":"cy_fin_3083","q":"证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，不得以下列（   ）方式向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益。","c":{"A":"安排显著偏离公允价格的结构化、高收益、保本理财产品等交易","B":"提供旅游、宴请、娱乐健身、工作安排等利益","C":"提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利","D":"直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动"},"a":"A,B,C,D","an":"证券期货经营机构及其工作人员在开展证券期货业务及相关活动中，不得以下列方式向公职人员、客户、正在洽谈的潜在客户或者其他利益关系人输送不正当利益： 1.提供礼金、礼品、房产、汽车、有价证券、股权、佣金返还等财物，或者为上述行为提供代持等便利； 2.提供旅游、宴请、娱乐健身、工作安排等利益； 3.安排显著偏离公允价格的结构化、高收益、保本理财产品等交易； 4.直接或者间接向他人提供内幕信息、未公开信息、商业秘密和客户信息，明示或者暗示他人从事相关交易活动； 5.其他输送不正当利益的情形。","type":"multi"},{"id":"cy_fin_3085","q":"根据我国证券公司监管实践，以(  )为基础计算的风险控制指标是监管部门限制证券公司过度承担风险、保证金融市场稳定运行的重要指标工具。","c":{"A":"实收资本","B":"经济资本","C":"账面资本","D":"净资本"},"a":"D","an":"根据我国证券公司监管实践，以净资本为基础计算的风险控制指标是监管部门限制证券公司过度承担风险、保证金融市场稳定运行的重要指标工具。","type":"single"},{"id":"cy_fin_3087","q":"我国证券公司监管制度包括以净资产和流动性为核心的风险监控和预警制度。（）","c":{"1":"对","0":"错"},"a":"0","an":"我国证券公司监管制度包括以净资本和流动性为核心的风险监控和预警制度","type":"judge"},{"id":"cy_fin_3089","q":"证券金融公司融出的每种证券余额不得超过该证券上市可流通市值的（ ）","c":{"A":"0.05","B":"0.1","C":"0.15","D":"0.2"},"a":"B","an":"证券金融公司应当遵守以下风险控制指标规定：净资本与各项风险资本准备之和的比例不得低于 100%；对单一证券公司转融通的余额，不得超过证券金融公司净资本的50%；融出的每种证券余额不得超过该证券上市可流通市值的10%；充抵保证金的每种证券余额不得超过该证券总市值的15%。证券金融公司应当每年按照税后利润的10%提取风险准备金。证监会可以根据防范证券金融公司风险的需要，对提取比例进行调整。","type":"single"},{"id":"cy_fin_3091","q":"证券公司核心净资本的计算公式为(  )。","c":{"A":"净资产+金融资产的风险调整-其他资产的风险调整-或有负债的风险调整-／+中国证监会认定或核准的其他调整项目","B":"净资产-金融资产的风险调整-其他资产的风险调整-／+或有负债的风险调整-中国证监会认定或核准的其他调整项目","C":"净资产-金融资产的风险调整-其他资产的风险调整-或有负债的风险调整-／+中国证监会认定或核准的其他调整项目","D":"净资产-金融资产的风险调整-其他资产的风险调整+或有负债的风险调整-／+中国证监会认定或核准的其他调整项目"},"a":"C","an":"证券公司净资本由核心净资本和附属净资本构成。其中：核心净资本=净资产-资产项目的风险调整-或有负债的风险调整-/+中国证监会认定或核准的其他调整项目；附属净资本=长期次级债x规定比例-/+中国证监会认定或核准的其他调整项目。","type":"single"},{"id":"cy_fin_3093","q":"在我国证券市场，客户交易结算资金采用（）模式。","c":{"A":"第三方存管","B":"证券公司存管","C":"中央集中存管","D":"中国结算公司存管"},"a":"A","an":"2002年 《客户交易结算资金管理办法》正式施行 ，明确了客户交易结算资金必须由【第三方存管】，为证券公司控制客户交易结算资金被挪用的风险提供了解决机制。信息技术系统自身软硬件的故障 、信息系统的权限管理不规范等信息技术的风险，则更多地靠信息技术部门自身的能力和意识来管控。A选项正确，BCD都不符合我国现行的客户交易结算资金管理模式。","type":"single"},{"id":"cy_fin_3095","q":"关于证券公司数据治理和数据管理，下列说法正确的有（ ）。","c":{"A":"数据治理是证券公司确保数据统一管理、高效运行的动态过程，需建立组织架构并制定相关制度、流程和方法","B":"数据管理是利用信息技术对数据进行收集、存储、处理和应用的过程，是数据治理的一部分","C":"良好的数据治理可以完全杜绝数据泄露、数据分析偏误等操作风险事件","D":"《证券公司操作风险管理制度》规定证券公司必须建立独立的操作风险管理信息系统"},"a":"A,B","an":"A 选项符合数据治理的定义描述，正确；B 选项对数据管理的定义及与数据治理的关系表述正确；C 选项，良好的数据治理只能防止而非完全杜绝相关操作风险事件，该选项错误；D 选项，《证券公司操作风险管理制度》要求证券公司应建立完善的操作风险管理信息系统或相关系统功能，并非必须建立独立的系统，该选项错误；","type":"multi"},{"id":"cy_fin_3097","q":"证券公司应建立声誉风险管理制度和机制，主动有效地识别、评估、控制、监测、应对和报告声誉风险。（）","c":{"1":"对","0":"错"},"a":"1","an":"本题考查声誉风险的识别。证券公司应建立声誉风险管理制度和机制，主动有效地识别、评估、控制、监测、应对和报告声誉风险，最大程度地防范和减少声誉事件对公司及利益相关方、行业造成的损失和负面影响。","type":"judge"},{"id":"cy_fin_3099","q":"下列关于证券公司次级债务的说法中，正确的有（）。","c":{"A":"它可分为长期次级债务和短期次级债务","B":"长期次级债务可以按一定比例计入净资本","C":"借入期限在3个月以上(含3个月)、2年以下(不含2年)的为短期次级债券","D":"短期次级债务可以计入净资本，并在开展特定业务时按规定扣除风险准备"},"a":"A,B","an":"证券公司次级债务分为长期次级债务和短期次级债务（A正确）。证券公司借入或发行期限在1年以上(不含1年)的次级债为长期次级债。证券公司为满足正常流动性资金需要，借入或发行期限在3个月以上(含3个月)、1年以下(含1年)的次级债为短期次级债（C项错误）。长期次级债可按一定比例计入净资本（B正确），到期期限在3年、2年、1年以上的，原则上分别按100%，70%，50%比例计入净资本。短期次级债不计入净资本（D项错误），仅可在公司开展有关特定业务时按规定和要求扣减风险资本准备。","type":"multi"},{"id":"cy_fin_3101","q":"证券公司监事会承担全面风险管理的最终责任。(  )","c":{"1":"对","0":"错"},"a":"0","an":"证券公司董事会承担全面风险管理的最终责任，证券公司监事会承担全面风险管理的监督责任，证券公司经理层对全面风险管理承担主要责任。","type":"judge"},{"id":"cy_fin_3103","q":"根据《证券投资基金法》，基金服务机构未建立应急等风险管理制度和灾难备份系统，或者泄露与基金份额持有人、基金投资运作相关的非公开信息的，处（）罚款。","c":{"A":"1万元以上30万元以下","B":"10万元以上30万元以下","C":"1万元以上50万元以下","D":"10万元以上50万元以下"},"a":"B","an":"选项B正确：《证券投资基金法》第一百零七条及第一百四十四条规定，基金服务机构未建立应急等风险管理制度和灾难备份系统，或者泄露与基金份额持有人、基金投资运作相关的非公开信息的，处10万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_3105","q":"下列哪项不是证券公司及其分支机构业务经营的外部约束？（）","c":{"A":"注册资本要求","B":"业务的审批","C":"禁止同业竞争","D":"防范和控制风险"},"a":"D","an":"选项D错误：“防范和控制风险”属于内部约束，不属于外部约束。 选项ABC正确：证券公司及其分支机构的业务经营： 1、外部约束包括：业务的审批、注册资本要求、禁止同业竞争。 2、内部约束包括：防范和控制风险、加强对分支机构的管理。","type":"single"},{"id":"cy_fin_3107","q":"发生影响或者可能影响证券公司经营管理、财务状况、风险控制指标或者客户资产安全的重大事件的，证券公司应当立即向国务院证券监督管理机构报送（），并在该报告中说明事件的起因、目前的状态、可能产生的后果和拟采取的相应措施。","c":{"A":"年度报告","B":"半年度报告","C":"月度报告","D":"临时报告"},"a":"D","an":"选项D正确：发生影响或者可能影响证券公司经营管理、财务状况、风险控制指标或者客户资产安全的重大事件的，证券公司应当立即向国务院证券监督管理机构报送临时报告。临时报告中，应当说明事件的起因、目前的状态、可能产生的后果和拟采取的相应措施。 选项ABC错误：属于定期报告，临时报告用于及时报告突发的重大事件。","type":"single"},{"id":"cy_fin_3109","q":"证券公司年度报告中的财务会计报告、风险控制指标报告以及国务院证券监督管理机构规定的其他专项报告应当附有（）出具的内部控制评审报告。","c":{"A":"律师事务所","B":"会计师事务所","C":"审计事务所","D":"资产评估事务所"},"a":"B","an":"选项B正确：证券公司年度报告中的财务会计报告、风险控制指标报告以及国务院证券监督管理机构规定的其他专项报告，应当经会计师事务所审计，并应当附有会计师事务所出具的内部控制评审报告。 选项A错误：律师事务所的核心业务是提供法律服务，如出具法律意见书、处理合同纠纷、提供法律咨询等，其职能集中于法律领域 选项C错误：“审计事务所” 这一称谓退出市场。 选项D错误：资产评估事务所专注于资产价值评估，如企业资产、不动产、无形资产等的价值评定，其业务范围不涉及内部控制评审","type":"single"},{"id":"cy_fin_3111","q":"按照《证券公司内部控制指引》第二条的规定，下列不属于证券公司内部控制内容的是（）。","c":{"A":"经纪业务","B":"业务创新","C":"自营业务","D":"操作风险"},"a":"D","an":"题目问的是“不属于”。 选项D：“操作风险”并不是一种具体的业务类型或活动，而是风险管理中的一种风险类别。操作风险指的是由于不完善或有问题的内部程序、人员及系统或外部事件所造成损失的风险。因此答案选择D。 选项ABC正确：证券公司内部控制的主要内容包括经纪业务内部控制、自营业务内部控制、投资银行业务内部控制、受托投资管理业务内部控制、研究咨询业务内部控制、业务创新的内部控制、分支机构内部控制、财务管理内部控制、会计系统内部控制、信息系统内部控制、人力资源管理内部控制等方面。","type":"single"},{"id":"cy_fin_3113","q":"审慎经营，是指证券公司应结合自身的（）以及专业人员数量等方面的实际情况，开展经营活动，确保各项经营活动可能给证券公司带来的风险处于可控范围内。","c":{"A":"财务状况","B":"内控水平","C":"合规程度","D":"高级管理人员素质"},"a":"A,B,C,D","an":"选项ABCD正确：审慎经营，是指证券公司应结合自身的【财务状况、内控水平、合规程度、高级管理人员素质、专业人员数量】等方面的实际情况，开展经营活动，确保各项经营活动可能给证券公司带来的风险处于可控范围内。","type":"multi"},{"id":"cy_fin_3115","q":"《证券公司监督管理条例》将防范证券公司在经营中遇到的（）作为立法宗旨之一。","c":{"A":"自然灾害风险","B":"信用风险","C":"市场风险","D":"流动性风险"},"a":"B,C,D","an":"选项A错误：自然灾害风险（如地震、洪水等）属于不可抗力，《证券公司监督管理条例》的立法宗旨是规范证券公司的经营活动，防范经营风险（如违规操作、资金挪用等），而非自然灾害这类外部不可控风险。 选项BCD正确：《证券公司监督管理条例》将防范证券公司在经营中遇到的【信用风险、市场风险、流动性风险、操作风险、技术风险、政策法规风险和道德风险】等作为立法宗旨之一。","type":"multi"},{"id":"cy_fin_3117","q":"发生影响或者可能影响证券公司（），证券公司应当立即向国务院证券监督管理机构报送临时报告，说明事件的起因、目前的状态、可能产生的后果和拟采取的相应措施。","c":{"A":"经营管理","B":"财务状况","C":"风险控制指标","D":"客户资产安全的重大事件"},"a":"A,B,C,D","an":"选项ABCD正确：发生影响或者可能影响证券公司经营管理、财务状况、风险控制指标或者客户资产安全的重大事件的，证券公司应当立即向国务院证券监督管理机构报送临时报告，说明事件的起因、目前的状态、可能产生的后果和拟采取的相应措施。","type":"multi"},{"id":"cy_fin_3119","q":"证券公司在经营过程中，经其申请，国务院证券监督管理机构可以根据其（），对其业务范围进行调整。","c":{"A":"内部控制水平","B":"合规程度","C":"对外投资情况","D":"专业人员数量"},"a":"A,B,D","an":"选项ABD正确：证券公司在经营过程中，经其申请，国务院证券监督管理机构可以根据其财务状况、内部控制水平、合规程度、高级管理人员业务管理能力、专业人员数量，对其业务范围进行调整。 选项C错误：对外投资情况更多地反映了证券公司的投资策略和资产配置情况，一般情况下，国务院证券监督管理机构在调整证券公司业务范围时，主要关注的是证券公司的内部控制、合规性、财务状况、专业人员数量等与其业务运营和风险管理能力直接相关的因素。对外投资情况并不直接决定证券公司的业务范围。","type":"multi"},{"id":"cy_fin_3121","q":"处置证券公司风险过程中，发现涉嫌犯罪的案件，属公安机关管辖的，应当由国务院（）统一组织依法查处。","c":{"A":"公安部门","B":"行政部门","C":"司法部门","D":"证券部门4.","E":"多选题","F":"证券公司风险处置措施包括（）。"},"a":"A","an":"选项A正确：处置证券公司风险过程中，发现涉嫌犯罪的案件，属公安机关管辖的，应当由国务院公安部门统一组织依法查处。 选项BCD错误：明确指明是公安管辖，则由公安部门来处理，司法部门通常指法院和检察院，证券部门主要负责证券市场的监管，都不具备侦查犯罪案件的职能。","type":"single"},{"id":"cy_fin_3123","q":"证券公司风险处置措施包括（）。","c":{"A":"停业整顿","B":"接管","C":"重整","D":"托管6.","E":"判断题","F":"证券公司在12个月内未完成行政重组的，国务院证券监督管理机构可以决定延长期限12个月。（）"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司风险处置措施包括：【停业整顿、托管、接管、行政重组、撤销、行政清理及破产清算和重整】。","type":"multi"},{"id":"cy_fin_3125","q":"关于证券公司合规负责人进行合规审查、合规检查的规定，下列说法正确的是（）。","c":{"A":"合规负责人对申请材料或报告中的基本事实和业务数据的真实性、准确性及完整性负责","B":"证券公司不采纳合规负责人的合规审查意见的，应当将有关事项提交股东(大)会决定","C":"合规负责人和合规部门应当对新产品、新业务发表合规审查意见","D":"合规负责人发现证券公司存在违法违规行为或合规风险隐患的，不能直接向中国证监会相关派出机构报告"},"a":"C","an":"选项C正确：合规负责人和合规部门应当对新产品、新业务发表合规审查意见。 选项A错误：其他相关高级管理人员（除合规负责人之外的其他高管，而非合规负责人）等应当对申请材料或报告中基本事实和业务数据的真实性、准确性及完整性负责。 选项B错误：证券公司不采纳合规负责人的合规审查意见的，应当将有关事项提交董事会（非股东会）决定。 选项D错误：合规负责人发现证券公司存在违法违规行为或合规风险隐患的，合规负责人应当督促公司及时向中国证监会相关派出机构报告，公司未及时报告的，应当（而不是不能）直接向中国证监会相关派出机构报告。","type":"single"},{"id":"cy_fin_3127","q":"证券公司分类监管制度是证券行业的一项基础性制度。下列关于证券公司分类评价的评价指标体系及评价方法，说法正确的是（）。","c":{"A":"证券公司分类评价设定正常经营的证券公司为120分","B":"分类评价每季度进行一次","C":"分类评价的评价期为上一年度4月30日到本年度5月1日","D":"证券公司在基准分的基础上，根据证券公司风险管理能力、持续合规、业务发展、功能发挥等方面情况，进行相应加分或扣分"},"a":"D","an":"选项D正确：证券公司在基准分的基础上，根据证券公司风险管理能力、持续合规、业务发展、功能发挥等方面情况，进行相应加分或扣分以确定证券公司的评价计分。 选项A错误：证券公司分类评价首先设定正常经营的证券公司基准分为100分（而不是120分）。 选项B错误：分类评价是每年（非每季度）进行一次。 选项C错误：评价期为上一年度5月1日至本年度4月30日。","type":"single"},{"id":"cy_fin_3129","q":"甲证券公司根据自身经营目标和运营状况，结合自身的环境条件，建立有效的内部控制制度、机制。关于证券公司内部控制应当遵循的原则，下列说法错误的是（）。","c":{"A":"该证券公司的内部控制覆盖了所有业务、部门和人员","B":"为了提高效率，该证券公司承担内部控制监督检查职能的部门同时辅助前台业务运作","C":"该证券公司以合理的成本实现内部控制目标","D":"前台业务运作与后台管理支持适当分离"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司内部控制应当贯彻执行独立原则，即承担内部控制监督检查职能的部门应当独立（而不是同时辅助）于证券公司其他部门。因此答案选择B。 选项A正确：符合内部控制应当“健全”原则，内部控制应覆盖证券公司的所有业务、部门和人员。 选项C正确：符合内部控制应当“合理”的原则，即内部控制应当与证券公司经营规模、业务范围、风险状况及所处环境相适应，并且以合理的成本实现内部控制目标。 选项D正确：符合内部控制应当“制衡”的原则，即通过权责分明、相互牵制的方式确保各部门之间形成有效的制约机制。","type":"single"},{"id":"cy_fin_3131","q":"关于证券公司基于分类监管要求划分的基本类别，下列说法错误的是（）。","c":{"A":"D级是正常经营状态的最低等级","B":"评价计分低于60分的证券公司，定为D类公司","C":"中国证监会根据证券公司评价计分的高低，可将证券公司分为5大类11个级别","D":"被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误：C级（非D级）是正常经营状态的最低等级。因此答案选择A。 选项B正确：评价计分低于60分的证券公司，定为D类公司。 选项C正确：中国证监会根据证券公司评价计分的高低，将证券公司分为 A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E 五大类11个级别。其中，C级是正常经营状态的最低等级。 选项D正确：被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司。","type":"single"},{"id":"cy_fin_3133","q":"下列关于E类证券公司的说法中，错误的是 （  ）。","c":{"A":"被依法采取指定其他机构托管的证券公司","B":"被依法采取行政重组的证券公司","C":"被依法采取责令停业整顿的证券公司","D":"评价计分低于60分但高于0分的证券公司"},"a":"D","an":"被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司（ABC正确），评价计分为0分，定为E类公司（D错误）。评价计分低于60分的证券公司，定为D类公司。 综上，该题选D。","type":"single"},{"id":"cy_fin_3135","q":"某证券公司在进行信息系统升级的内部控制评估时，不仅考虑了新系统是否符合最新的网络安全法规，还重点分析了其建设与运维成本是否与公司当前的业务规模和利润水平相匹配。这种评估思路主要体现了内部控制的（  ）原则。","c":{"A":"健全","B":"独立","C":"制衡","D":"合理"},"a":"D","an":"选项D正确：合理：内部控制应当符合国家有关法律法规和中国证监会的有关规定，与证券公司经营规模、业务范围、风险状况及证券公司所处的环境相适应，以合理的成本实现内部控制目标。 选项A错误：健全：内部控制应当做到事前、事中、事后控制相统一；覆盖证券公司的所有业务、部门和人员，渗透到决策、执行、监督、反馈等各个环节，确保不存在内部控制的空白或漏洞。 选项B错误：独立：承担内部控制监督检查职能的部门应当独立于证券公司其他部门。 选项C错误：制衡：证券公司部门和岗位的设置应当权责分明、相互牵制；前台业务运作与后台管理支持适当分离。","type":"single"},{"id":"cy_fin_3137","q":"某证券公司因其自营业务发生重大合规风险事件，造成严重后果。经查，此事与分管自营业务的张副总经理的决策有直接关系。根据规定，有权决定解聘张副总经理的机构是（  ）。","c":{"A":"公司合规负责人","B":"公司董事会","C":"公司监事会","D":"公司经理层"},"a":"B","an":"证券公司董事会决定本公司的合规管理目标，对合规管理的有效性承担责任，履行下列合规管理职责： (1)审议批准合规管理的基本制度； (2)审议批准年度合规报告； (3)决定解聘对发生重大合规风险负有主要责任或者领导责任的高级管理人员； (4)决定聘任、解聘、考核合规负责人，决定其薪酬待遇； (5)建立与合规负责人的直接沟通机制； (6)评估合规管理有效性，督促解决合规管理中存在的问题； (7)公司章程规定的其他合规管理职责。 综上，该题选B，选项ACD错误","type":"single"},{"id":"cy_fin_3139","q":"当证券公司工作人员在业务开展过程中，发现了可能存在的合规风险隐患，正确的做法是（  ）。","c":{"A":"为避免麻烦，自行处理并消除隐患","B":"只要不影响自己业绩，可暂时忽略","C":"立即向客户透露此风险以规避自身责任","D":"按照公司规定及时主动报告"},"a":"D","an":"选项D正确：证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行下列合规管理职责： (1)主动了解、掌握和遵守相关法律、法规和准则； (2)积极参加公司安排的合规培训和合规宣导活动； (3)根据公司要求，签署并信守相关合规承诺； (4)在执业过程中充分关注执业行为的合法合规性； (5)在业务开展过程中主动识别和防范业务合规风险； (6)发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告； (7)出现合规风险事项时，积极配合公司调查，并接受公司问责，落实整改要求。 选项ABC为干扰项","type":"single"},{"id":"cy_fin_3141","q":"某证券公司因存在重大风险隐患，评价计分为55分。根据分类监管规定，该公司应被划分为（  ）。","c":{"A":"C类","B":"D类","C":"E类","D":"B类"},"a":"B","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E五大类11个级别。其中，C级是正常经营状态的最低等级。 被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司。评价计分低于60分的证券公司，定为D类公司。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3143","q":"在证券公司分类中，潜在风险已经变为现实风险，并被监管机构依法采取了责令停业整顿、指定托管等风险处置措施的公司，属于（  ）。","c":{"A":"A类公司","B":"C类公司","C":"D类公司","D":"E类公司"},"a":"D","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E五大类11个级别。其中，C级是正常经营状态的最低等级。 被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司。评价计分低于60分的证券公司，定为D类公司。 中国证监会每年根据行业发展情况，结合以前年度分类评价结果，事先确定A、B、C三大类别公司的相对比例，并根据评价计分的分布情况，具体确定各类别、各级别公司的数量： 1.A类公司风险管理能力在行业内最高，能较好地控制新业务、新产品方面的风险； 2.B类公司风险管理能力在行业内较高，在市场变化中能较好地控制业务扩张的风险； 3.C类公司风险管理能力与其现有业务相匹配； 4.D类公司风险管理能力弱，潜在风险可能超过公司可承受范围； 5.E类公司潜在风险已经变为现实风险，已被采取风险处置措施。 综上，该题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_3145","q":"按照《证券公司治理准则》的要求，关于证券公司与股东之间关系的特别规定，以下选项错误的是（）。","c":{"A":"证券公司的控股股东、实际控制人不得利用其控制地位或滥用权利损害公司客户的合法权益","B":"证券公司的控股股东可以直接任免证券公司的董事、监事和高级管理人员","C":"证券公司的股东、实际控制人不得违反公司章程的规定干预证券公司的经营管理活动","D":"证券公司与其他关联方应当在业务等方面严格分开，各自独立经营、独立核算、独立承担责任和风险"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司的控股股东不得超越股东会、董事会任免证券公司的董事、监事和高级管理人员（而不是直接任免）。证券公司的股东、实际控制人不得违反法律、行政法规和公司章程的规定干预证券公司的经营管理活动。 因此答案选择B。 选项A正确：证券公司的控股股东、实际控制人不得利用其控制地位或者滥用权力损害证券公司、公司其他股东和公司客户的合法权益。 选项C正确：证券公司的股东、实际控制人不得违反公司章程的规定干预证券公司的经营管理活动。 选项D正确：证券公司与其股东、实际控制人或者其他关联方应当在业务、机构、资产、财务、办公场所等方面严格分开，各自独立经营、独立核算、独立承担责任和风险。证券公司股东的人员在证券公司兼职的，应当遵守法律、行政法规和中国证监会的规定。","type":"single"},{"id":"cy_fin_3147","q":"以下关于证券公司内部控制制度机制建设的基本要求，说法错误的是（）。","c":{"A":"证券公司业务授权应当采用书面形式","B":"应当提高工作效率，比如资金清算人员由技术部人员兼任，以及时解决资金收支时发生的技术难题","C":"应当建立完备的业务台账系统，并通过业务台账系统和会计核算系统交叉印证，防止出现账外经营、账目不清等问题","D":"重要合同和票据应有连号控制、作废控制等专门措施"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：资金清算人员不得由电脑部门人员和交易部门人员兼任，这是为了防止利益冲突和潜在的风险。此做法违反了内部控制中的岗位分离原则。因此答案选择B。 选项A正确：根据规定，证券公司的业务授权应当采取书面形式。 选项C正确：证券公司应建立完备的业务台账系统，并通过与会计核算系统的交叉印证来确保账目的准确性和完整性。 选项D正确：重要合同和票据需要有连号控制、作废控制等措施，以确保其安全和规范管理。","type":"single"},{"id":"cy_fin_3149","q":"根据《证券公司合规管理实施指引》，（）属于证券公司董事会的合规管理职责。","c":{"A":"组织制定公司规章制度，并监督其实施","B":"审议批准年度合规报告","C":"决定解聘对发生重大合规风险负有主要责任或者领导责任的高级管理人员","D":"决定聘任、解聘、考核合规负责人，决定其薪酬待遇"},"a":"B,C,D","an":"选项A错误：组织制定公司规章制度，并监督其实施是经营管理主要负责人（非董事会）的合规管理职责。 选项BCD正确：证券公司董事会决定本公司的合规管理目标，对合规管理的有效性承担责任，履行下列合规管理职责：  （1）审议批准合规管理的基本制度；  （2）审议批准年度合规报告； （3）决定解聘对发生重大合规风险负有主要责任或者领导责任的高级管理人员；   （4）决定聘任、解聘、考核合规负责人，决定其薪酬待遇；  （5）建立与合规负责人的直接沟通机制； （6）评估合规管理有效性，督促解决合规管理中存在的问题；  （7）公司章程规定的其他合规管理职责。","type":"multi"},{"id":"cy_fin_3151","q":"下列关于证券公司分类监管的表述，说法正确的有（）。","c":{"A":"分类监管制度是证券行业的一项基础性制度","B":"分类监管制度促进了证券公司加强合规管理","C":"分类监管制度促进了证券公司培育核心竞争力","D":"分类监管制度降低了证券公司对风险的控制能力"},"a":"A,B,C","an":"选项ABC正确，选项D错误：证券公司分类监管制度是证券行业的一项基础性制度，对促进证券公司加强合规管理、提升风险控制能力（D错误）、培育核心竞争力，发挥了正向激励作用。中国证监会根据证券公司分类结果对不同类别的证券公司实施差异化的监管政策。","type":"multi"},{"id":"cy_fin_3153","q":"以下叙述中，属于证券公司合规管理基本制度的有（）。","c":{"A":"明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容","B":"对董事、高级管理人员履行合规管理职责的情况进行监督","C":"结合公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理","D":"制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规"},"a":"A,C,D","an":"选项B错误：“对董事、高级管理人员履行合规管理职责的情况进行监督”是证券公司监事会或监事的合规管理职责，而不是基本制度。 选项A正确：合规管理的基本制度应当明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容。 选项C正确：证券公司应当结合本公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理。 选项D正确：证券公司应当制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规。","type":"multi"},{"id":"cy_fin_3155","q":"证券公司在对投资银行类业务进行内部控制时，应重点防范因管理不善、权责不明、未勤勉尽责等原因导致的（），杜绝虚假承销行为。","c":{"A":"汇率风险","B":"法律风险","C":"财务风险","D":"道德风险"},"a":"B,C,D","an":"选项A错误：“汇率风险”通常与外汇交易或跨境业务相关，与投资银行类业务的内部控制关系不大。 选项BCD正确：证券公司在对投资银行类业务进行内部控制时，应重点防范因管理不善、权责不明、未勤勉尽责等原因导致的法律风险、财务风险及道德风险，杜绝虚假承销行为。","type":"multi"},{"id":"cy_fin_3157","q":"证券公司在开展业务创新时，应当建立的机制包括（）。","c":{"A":"严格内部审批程序","B":"及时与中国证券业协会沟通，履行报备(报批)程序","C":"制定风险控制措施","D":"注重过程控制，及时纠正偏离目标"},"a":"A,C,D","an":"选项B错误：在可行性研究的基础上，及时与中国证监会（非证券业协会）沟通，履行创新业务的报备（报批）程序。 选项ACD正确：证券公司在开展业务创新时，应当建立相关机制，包括但不限于： （1）建立完整的业务创新工作程序，严格内部审批程序，对可行性研究、产品或业务设计、风险管理、运作与实施方案等作出明确要求，并经董事会批准。（A项正确） （2）在可行性研究的基础上，及时与中国证监会沟通，履行创新业务的报备（报批）程序。 （3）对创新业务设计科学合理的流程，制定风险控制措施及相应财务核算、资金管理办法。（C项正确） （4）注重业务创新的过程控制，及时纠正偏离目标行为。（D项正确）","type":"multi"},{"id":"cy_fin_3159","q":"根据《证券公司合规管理实施指引》，证券公司董事会、监事会、经营管理主要负责人、其他高级管理人员、下属各单位负责人及其他工作人员均有自己的合规管理职责。下列关于合规管理职责归属的表述，正确的是（）。","c":{"A":"董事会负责在日常经营中培育公司合规文化","B":"监事会对发生重大合规风险负有主要责任或领导责任的董事、高级管理人员提出罢免建议","C":"经营管理主要负责人在经营决策过程中，充分听取合规负责人及合规部门的合规意见","D":"董事会组织制定公司规章制度，并监督其实施"},"a":"B,C","an":"选项B正确：监事会（或行使监事会职权的监事或董事会设置的由董事组成的审计委员会）对发生重大合规风险负有主要责任或领导责任的董事、高级管理人员提出罢免建议。 选项C正确：经营管理主要负责人在经营决策过程中，充分听取合规负责人及合规部门的合规意见。 选项A错误：经营管理主要负责人、其他高级管理人员和下属各单位负责人都承担培育公司合规文化（非董事会）的职责。 选项D错误：经营管理主要负责人（非董事会）组织制定公司规章制度，并监督其实施。","type":"multi"},{"id":"cy_fin_3161","q":"某证券公司计划拓展跨境业务，在为此设计专项内部控制制度时，必须遵循“合理”原则。下列做法中，符合该原则要求的有（  ）。","c":{"A":"确保该制度与公司整体的业务范围和风险状况变化相适应","B":"安排前台交易团队同时负责部分后台清算的复核工作以提高效率","C":"在满足境外监管要求的前提下，评估并控制该制度的建设与运行成本","D":"为新业务设置权责清晰的岗位，并建立前、中、后台之间的防火墙"},"a":"A,C","an":"选项AC正确：合理：内部控制应当符合国家有关法律法规和中国证监会的有关规定，与证券公司经营规模、业务范围、风险状况及证券公司所处的环境相适应，以合理的成本实现内部控制目标。 选项B错误：违反了“制衡”原则，制衡原则体现为证券公司部门和岗位的设置应当权责分明、相互牵制；前台业务运作与后台管理支持适当分离。 选项D错误：体现了“制衡”原则。","type":"multi"},{"id":"cy_fin_3163","q":"在业务开展过程中，证券公司全体工作人员应履行的合规管理职责包括（  ）。","c":{"A":"主动识别和防范业务合规风险","B":"确保所负责的业务部门盈利指标达成","C":"出现合规风险事项时，积极配合公司调查","D":"出现合规问题时，接受问责并落实整改"},"a":"A,C,D","an":"选项ACD正确：证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行下列合规管理职责： (1)主动了解、掌握和遵守相关法律、法规和准则； (2)积极参加公司安排的合规培训和合规宣导活动； (3)根据公司要求，签署并信守相关合规承诺； (4)在执业过程中充分关注执业行为的合法合规性； (5)在业务开展过程中主动识别和防范业务合规风险； (6)发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告； (7)出现合规风险事项时，积极配合公司调查，并接受公司问责，落实整改要求。 选项B错误：“盈利指标达成”是业务目标，不属于合规职责。","type":"multi"},{"id":"cy_fin_3165","q":"根据分类监管规定，下列对不同类别证券公司风险管理能力的描述中，正确的有（  ）。","c":{"A":"A类公司风险管理能力在行业内最高","B":"B类公司能较好地控制业务扩张的风险","C":"C类公司风险管理能力与其现有业务基本匹配","D":"D类公司风险管理能力在行业内处于平均水平"},"a":"A,B,C","an":"中国证监会每年根据行业发展情况，结合以前年度分类评价结果，事先确定A、B、C三大类别公司的相对比例，并根据评价计分的分布情况，具体确定各类别、各级别公司的数量： 1.A类公司风险管理能力在行业内最高（A正确），能较好地控制新业务、新产品方面的风险； 2.B类公司风险管理能力在行业内较高，在市场变化中能较好地控制业务扩张的风险；（B正确） 3.C类公司风险管理能力与其现有业务相匹配；（C正确） 4.D类公司风险管理能力弱，潜在风险可能超过公司可承受范围；（D错误） 5.E类公司潜在风险已经变为现实风险，已被采取风险处置措施。","type":"multi"},{"id":"cy_fin_3167","q":"下列哪些情形会导致一家证券公司被直接定为E类公司？（  ）","c":{"A":"评价计分低于60分","B":"被中国证监会依法采取行政重组措施","C":"评价计分恰好为60分","D":"被中国证监会依法指定其他机构托管"},"a":"B,D","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E五大类11个级别。其中，C级是正常经营状态的最低等级。 被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司（BD属于）。评价计分低于60分的证券公司，定为D类公司（AC不属于）。 综上，该题选BD。","type":"multi"},{"id":"cy_fin_3169","q":"证券公司分类监管制度是证券行业的一项基础性制度，对促进证券公司加强合规管理、提升风险控制能力、培育核心竞争力，发挥了正向激励作用。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司分类监管制度是证券行业的一项基础性制度，对促进证券公司加强合规管理、提升风险控制能力、培育核心竞争力，发挥了正向激励作用。","type":"judge"},{"id":"cy_fin_3171","q":"中国证监会对证券公司进行分类时，A、B、C、D和E类公司的数量都会事先确定好固定比例。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"中国证监会每年根据行业发展情况，结合以前年度分类评价结果，事先确定A、B、C三大类别公司的相对比例，并根据评价计分的分布情况，具体确定各类别、各级别公司的数量。 被依法采取责令停业整顿、指定其他机构托管、接管、行政重组等风险处置措施的证券公司，评价计分为0分，定为E类公司。评价计分低于60分的证券公司，定为D类公司。","type":"judge"},{"id":"cy_fin_3173","q":"证券公司应当至少每半年经主要负责人、首席风险官签署确认后，向公司（）报告一次公司净资本等风险控制指标的具体情况和达标情况。","c":{"A":"全体股东","B":"全体董事","C":"全体监事","D":"高级管理人员"},"a":"B","an":"选项B正确：证券公司应当至少每半年经主要负责人、首席风险官签署确认后，向公司【全体董事】报告一次公司净资本等风险控制指标的具体情况和达标情况。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_3175","q":"证券公司流动性风险管理的目标是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以（）得到满足。","c":{"A":"固定成本","B":"合理成本","C":"变动成本","D":"重置成本"},"a":"B","an":"选项B正确：证券公司流动性风险管理的目标是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以【合理成本】得到满足。（合理成本是指在满足流动性需求时，能够以相对合理的价格获得资金，这是流动性风险管理的主要目标之一） 选项ACD为干扰项，在教材中未涉及。","type":"single"},{"id":"cy_fin_3177","q":"证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。证券公司应至少（）对流动性风险限额进行一次评估，必要时进行调整。","c":{"A":"每月","B":"每年","C":"每半年","D":"每季度"},"a":"B","an":"选项B正确：证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。证券公司应至少每年对流动性风险限额进行一次评估，必要时进行调整。","type":"single"},{"id":"cy_fin_3179","q":"证券公司的资本杠杆率不得低于（）。","c":{"A":"0.08","B":"0.1","C":"0.5","D":"0.06"},"a":"A","an":"选项A正确：证券公司必须持续符合的风险控制指标标准之一为资本杠杆率不得低于8%。  【知识详解】证券公司必须持续符合下列风险控制指标标准： （1）风险覆盖率不得低于100%； （2）资本杠杆率不得低于8%； （3）流动性覆盖率不得低于100%； （4）净稳定资金率不得低于100%。","type":"single"},{"id":"cy_fin_3181","q":"下列选项中，（）不是证券公司主要的风险控制指标。","c":{"A":"净资本","B":"净利率","C":"资本杠杆率","D":"风险覆盖率"},"a":"B","an":"选项B错误：净利率用于衡量公司的盈利能力。 选项ACD正确：证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等。","type":"single"},{"id":"cy_fin_3183","q":"证券公司应至少每（  ）开展一次流动性风险压力测试。","c":{"A":"月","B":"季度","C":"半年","D":"年"},"a":"C","an":"证券公司应至少每半年开展一次流动性风险压力测试，分析其承受短期和中长期压力情景的能力。在压力情景下，证券公司满足流动性需求并持续经营的最短期限不少于30天。","type":"single"},{"id":"cy_fin_3185","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正；证券公司整改后，经派出机构验收符合有关风险控制指标的，中国证监会及其派出机构应当自验收完毕之日起（）个工作日内解除对其采取的有关措施。","c":{"A":"1","B":"3","C":"5","D":"7"},"a":"B","an":"选项B正确：证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正，在5个工作日内制定并报送整改计划，整改期限最长不超过20个工作日；证券公司未按时报送整改计划的，派出机构应当立即限制其业务活动。 证券公司整改后，经派出机构验收符合有关风险控制指标的，中国证监会及其派出机构应当自验收完毕之日起【3个工作日】内解除对其采取的有关措施。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_3187","q":"关于证券公司必须持续符合的风险控制指标标准，下列说法错误的是（）。","c":{"A":"风险覆盖率不得低于100％","B":"资本杠杆率不得低于10％","C":"流动性覆盖率不得低于100％","D":"净稳定资金率不得低于100％"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司应持续符合的风险控制指标标准之一：资本杠杆率不得低于8％（非10%）。因此答案选择B。 选项ACD正确：证券公司必须持续符合下列风险控制指标标准： 1.风险覆盖率不得低于100%; 2.资本杠杆率不得低于8%; 3.流动性覆盖率不得低于100%; 4.净稳定资金率不得低于100%。","type":"single"},{"id":"cy_fin_3189","q":"证券公司应当至少每半年经（）签署确认后，向公司全体股东报告一次公司净资本等风险控制指标的具体情况和达标情况，并至少获得主要股东的签收确认证明文件。","c":{"A":"董事会","B":"监事会","C":"股东(大)会","D":"高级管理人员"},"a":"A","an":"选项A正确：证券公司应当至少每半年经【董事会】签署确认，向公司全体股东报告一次公司净资本等风险控制指标的具体情况和达标情况，并至少获得主要股东的签收确认证明文件。 选项B错误：监事会主要职责是监督董事会和经理层在风险管理方面的履职尽责情况，不直接负责签署确认风险控制指标报告。 选项C错误：股东大会是公司的最高权力机构，但不直接参与日常的风险管理报告流程。 选项D错误：高级管理人员（如经营管理的主要负责人、首席风险官、财务负责人）负责月度风险控制指标监管报表的签署确认，而不是半年度的股东报告。","type":"single"},{"id":"cy_fin_3191","q":"证券公司的净资本等风险控制指标达到预警标准或者不符合规定标准的，应当分别在该情形发生之日起（）个、（）个工作日内，向中国证监会及其派出机构报告，说明基本情况、问题成因以及解决问题的具体措施和期限。","c":{"A":"3；1","B":"5；1","C":"5：3","D":"7；5"},"a":"A","an":"选项A正确：证券公司的净资本等风险控制指标达到预警标准或者不符合规定标准的，应当分别在该情形发生之日起【3个、1个工作日内】向中国证监会及其派出机构报告，说明基本情况、问题成因以及解决问题的具体措施和期限。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_3193","q":"下列不属于证券公司全面风险管理体系的是（）。","c":{"A":"可操作的管理制度","B":"稳健的风险文化","C":"健全的组织架构","D":"有效的风险应对机制"},"a":"B","an":"题目问的是“不属于”。 选项B错误：“稳健的风险文化”属于全面风险管理的文化范畴，而不是全面风险管理体系的一部分。因此答案选择B。 选项ACD正确：全面风险管理体系应当包括可操作的管理制度、健全的组织架构、可靠的信息技术系统、量化的风险指标体系、专业的人才队伍、有效的风险应对机制。","type":"single"},{"id":"cy_fin_3195","q":"证券公司应至少（）对流动性风险限额进行一次评估，必要时进行调整。","c":{"A":"每年","B":"每半年","C":"每季度","D":"每月"},"a":"A","an":"选项A正确：证券公司应至少每年对流动性风险限额进行一次评估，必要时进行调整。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_3197","q":"证券公司全面风险管理的目标是（  ）。","c":{"A":"确保公司利润最大化","B":"确保承受的风险与总体发展战略目标相适应","C":"完全消除所有业务风险","D":"满足监管机构的所有要求"},"a":"B","an":"选项B正确：证券公司全面风险管理目标是建立健全全面风险管理体系，确保承受的风险与总体发展战略目标相适应。 选项ACD为干扰项","type":"single"},{"id":"cy_fin_3199","q":"证券公司全面风险管理应当坚持预防第一的风险管理理念，加强对风险的早识别、早预警、早暴露、早处置，这体现了（  ）原则。","c":{"A":"全覆盖原则","B":"前瞻性原则","C":"全局性原则","D":"匹配性原则"},"a":"B","an":"选项B正确：前瞻性原则。证券公司应当坚持预防第一的风险管理理念，加强对风险的早识别、早预警、早暴露、早处置，建立健全覆盖境内外、场内外、线上线下全部业务的全景式、穿透式的管理体系，及时识别并有效管控风险业务，提升风险管理的前瞻性。 选项A错误：“全覆盖原则”强调风险管理的覆盖范围（业务、机构、人员、风险类型、流程）。 选项C错误：“全局性原则”强调关注风险外溢及系统性风险。 选项D错误：“匹配性原则”强调风险管理体系与自身情况相适应。","type":"single"},{"id":"cy_fin_3201","q":"证券公司制定风险偏好的首要前提是（  ）。","c":{"A":"以净资本等各项风险控制指标持续合规稳健为前提","B":"以实现收益最大化为前提","C":"以满足股东回报要求为前提","D":"以扩大业务规模为前提"},"a":"A","an":"选项A正确：证券公司应当明确公司风险偏好，制定包括风险容忍度和风险限额等的风险指标体系，突出功能性要求和稳慎原则，以净资本等各项风险控制指标持续合规稳健为前提，并通过压力测试等方法计量风险、评估承受能力、指导资源配置。 选项BCD为干扰项","type":"single"},{"id":"cy_fin_3203","q":"证券公司应当依法依规通过公司治理程序将所有（  ）纳入全面风险管理体系。","c":{"A":"重要客户","B":"子公司（被证券公司控制）","C":"参股企业","D":"外包服务机构"},"a":"B","an":"证券公司应当依法依规通过公司治理程序将所有子公司（被证券公司控制）纳入全面风险管理体系，对其风险管理工作实行垂直管理并逐步加强一体化管控，从公司治理、风险偏好与风险指标管理、新业务管理、重大事项管理、风险报告、考核评价等方面强化对子公司的风险管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立健全自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的一致性和有效性。","type":"single"},{"id":"cy_fin_3205","q":"对于识别出的市场风险因素，证券公司应优先采取（  ）进行评估。","c":{"A":"定性方法","B":"定量方法","C":"专家判断法","D":"情景分析法"},"a":"B","an":"选项B正确：证券公司应对识别出的市场风险因素尽可能采取定量方法进行评估，对尚未采取定量方法的市场风险因素，应采取定性方法对其影响程度和发生的可能性进行评估。 选项ACD为干扰项","type":"single"},{"id":"cy_fin_3207","q":"证券公司应至少按（  ）对市场风险进行计量。","c":{"A":"日","B":"周","C":"月","D":"年"},"a":"A","an":"证券公司应至少按日对市场风险进行计量，并可根据业务特点及风险管理需要进一步提升风险计量频率。 综上，该题选A，选项BCD错误。","type":"single"},{"id":"cy_fin_3209","q":"当发生违约事项时，证券公司可以采取的处置方式不包括（  ）。","c":{"A":"担保品追加或变现","B":"提前了结合约","C":"诉讼追偿","D":"忽略风险，等待市场回暖"},"a":"D","an":"证券公司应根据违约事项的具体情况，通过担保品追加、担保品变现（A）、提前了结合约（B）、诉讼追偿（C）等多种方式，及时处置、处理和化解信用风险。 综上，该题选D。","type":"single"},{"id":"cy_fin_3211","q":"某证券公司当月净资本为80亿元，上月净资本为110亿元。公司风险管理部负责人应采取的最及时、合规的后续报告措施是（  ）。","c":{"A":"在5个工作日内向公司全体股东报告","B":"在3个工作日内向中国证监会及其派出机构报告","C":"在5个工作日内向公司全体董事报告","D":"在1个工作日内向中国证监会及其派出机构报告"},"a":"C","an":"(110-80)/110 ≈ 27.3% > 20%，属于20%以上不利变化。 净资本指标与上月相比发生20%以上不利变化或不符合规定标准时，证券公司应当在5个工作日内向公司全体董事报告（C正确），10个工作日内向公司全体股东报告（A错误）。 证券公司的净资本等风险控制指标达到预警标准或者不符合规定标准的（题目中无此情况，BD错误），应当分别在该情形发生之日起3个、1个工作日内，向中国证监会及其派出机构报告，说明基本情况、问题成因以及解决问题的具体措施和期限。 综上，该题选C。","type":"single"},{"id":"cy_fin_3213","q":"某证券公司营业部员工在销售产品时，为完成业绩向客户进行虚假承诺，最终导致客户重大损失和媒体负面报道，严重损害了公司品牌形象。这主要体现了证券公司面临的哪一类风险？（  ）","c":{"A":"市场风险","B":"操作风险","C":"声誉风险","D":"流动性风险"},"a":"C","an":"选项C正确：声誉风险是指由于证券经营机构行为或外部事件及其工作人员违反廉洁规定、职业道德、业务规范、行规行约等相关行为，导致投资者、发行人、监管机构、自律组织、社会公众、媒体等对证券公司形成负面评价，从而损害其品牌价值，不利其正常经营，甚至影响到市场稳定和社会稳定的风险。 选项A错误：市场风险指因市场价格（股价、利率等）不利变动导致损失的风险。 选项B错误：操作风险通常指由不完善或有问题的内部流程、人员、系统或外部事件造成损失的风险。 选项D错误：流动性风险指无法以合理成本及时获得充足资金以偿付到期债务或履行其他支付义务的风险。","type":"single"},{"id":"cy_fin_3215","q":"证券公司应当至少每半年经（）签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。","c":{"A":"主要负责人、首席风险官","B":"主要负责人、总经理","C":"主要负责人、合规负责人","D":"全体高级管理人员"},"a":"A","an":"选项A正确：证券公司应当至少每半年经【主要负责人、首席风险官】签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。 选项BCD为干扰项。不符合法定要求。","type":"single"},{"id":"cy_fin_3217","q":"按照《证券公司全面风险管理规范》的要求，（）承担全面风险管理的直接责任。","c":{"A":"监事会","B":"经理层","C":"董事会","D":"各业务部门、分支机构和子公司"},"a":"D","an":"选项D正确：证券公司各部门、分支机构及子公司的负责人承担本单位风险管理的直接责任。 选项A错误：证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)承担全面风险管理的监督责任。 选项B错误：经理层对全面风险管理承担主要责任。 选项C错误：董事会承担全面风险管理的最终责任。","type":"single"},{"id":"cy_fin_3219","q":"按照《证券公司全面风险管理规范》的要求，（）承担全面风险管理的监督责任。","c":{"A":"监事会","B":"经理层","C":"董事会","D":"各业务部门、分支机构和子公司"},"a":"A","an":"选项A正确：证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)承担全面风险管理的监督责任。 选项B错误：证券公司经理层对全面风险管理承担主要责任。 选项C错误：证券公司董事会承担全面风险管理的最终责任。 选项D错误：证券公司各部门、分支机构及子公司的负责人承担本单位风险管理的直接责任。","type":"single"},{"id":"cy_fin_3221","q":"证券公司全面风险管理要求对各类风险进行管理，其中，（）是指证券公司无法以合理成本及时获得充足资金，以期偿付到期债务，履行其他支付义务和满足正常业务开展的资金需求的风险。","c":{"A":"流动性风险","B":"信用风险","C":"操作风险","D":"声誉风险"},"a":"A","an":"选项A正确：【流动性风险】是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项B错误：信用风险指因借款人或交易对手未能履行约定契约中的义务而造成经济损失的风险。 选项C错误：操作风险是指由于不完善或有问题的内部程序、人员及系统或外部事件所造成损失的风险。 选项D错误：声誉风险是指由于证券经营机构行为或外部事件，导致投资者、发行人、监管机构等对证券公司形成负面评价，从而损害其品牌价值，不利其正常经营，甚至影响到市场稳定和社会稳定的风险。","type":"single"},{"id":"cy_fin_3223","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正；证券公司未按期完成整改、风险控制指标情况继续恶化，严重危及该证券公司的稳健运行的，中国证监会可以（）。","c":{"A":"督促其加快整改","B":"撤销其有关业务许可","C":"延长整改期限","D":"限制其业务活动"},"a":"B","an":"选项B正确：证券公司未按期完成整改、风险控制指标情况继续恶化，严重危及该证券公司的稳健运行的，中国证监会可以撤销其有关业务许可。 选项AC错误：教材未提及 选项D错误：“限制业务活动”属于证券公司未按期完成整改的，自整改期限到期的次日起，派出机构应当区别情形，对其采取的措施之一。  【知识拓展】 证券公司未按期完成整改的，自整改期限到期的次日起，派出机构应当区别情形，对其采取下列措施： (1)限制业务活动； (2)责令暂停部分业务； (3)限制向董事、监事、高级管理人员支付报酬、提供福利； (4)责令更换董事、监事、高级管理人员或者限制其权利； (5)责令控股股东转让股权或者限制有关股东行使股东权利； (6)认定董事、监事、高级管理人员为不适当人选； (7)中国证监会及其派出机构认为有必要采取的其他措施。 证券公司未按期完成整改、风险控制指标情况继续恶化，严重危及该证券公司的稳健运行的，中国证监会可以撤销其有关业务许可。 证券公司风险控制指标无法达标，严重危害证券市场秩序、损害投资者利益的，中国证监会可以区别情形，对其采取下列措施： (1)责令停业整顿； (2)指定其他机构托管、接管； (3)撤销经营证券业务许可； (4)撤销。","type":"single"},{"id":"cy_fin_3225","q":"证券公司风险控制指标体系的核心是（）。","c":{"A":"收益性和安全性","B":"净资本和收益性","C":"净资本和流动性","D":"安全性和流动性"},"a":"C","an":"选项C正确：证券公司风险控制指标体系的核心是【净资本和流动性】。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_3227","q":"证券公司应当根据自身资产负债状况和业务发展情况，建立（）的风险控制指标监控和资本补足机制，确保净资本等各项风险控制指标在（）都符合规定标准。","c":{"A":"静态；任一时点","B":"静态；某些时点","C":"动态；任一时点","D":"动态；某些时点"},"a":"C","an":"选项C正确：证券公司应当根据自身资产负债状况和业务发展情况，建立【动态】的风险控制指标监控和资本补足机制，确保净资本等各项风险控制指标在【任一时点】都符合规定标准。（为了确保净资本等各项风险控制指标始终符合规定标准） 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_3229","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正，在（）个工作日制定并报送整改计划，整改期限最长不超过（）个工作日。","c":{"A":"5；10","B":"7；10","C":"5；20","D":"7；20"},"a":"C","an":"选项C正确：证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正，在【5个工作日】内制定并报送整改计划，整改期限最长不超过【20个工作日】。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_3231","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正；证券公司未按时报送整改计划的，派出机构应当（）。","c":{"A":"督促其加快整改","B":"立即限制其业务活动","C":"延长整改期限","D":"不予理睬"},"a":"B","an":"选项B正确：证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正，在5个工作日内制定并报送整改计划，整改期限最长不超过20个工作日；证券公司未按时报送整改计划的，派出机构应当【立即限制其业务活动】。 选项A错误：督促其加快整改一般适用于证券公司已报送整改计划，但在整改过程中进度缓慢等情况。 选项C错误：延长整改期限前提通常是证券公司已在规定期限内积极报送整改计划，且确实因合理原因（如客观环境变化等）难以在原定期限内完成整改。 选项D错误：派出机构作为监管主体，有职责采取措施进行监管和纠正，不可能不予理睬。","type":"single"},{"id":"cy_fin_3233","q":"证券公司风险控制指标无法达标，严重危害证券市场秩序、损害投资者利益的，中国证监会可以区别情形，对其采取的措施有（）。","c":{"A":"责令停业整顿","B":"指定其他机构托管、接管","C":"撤销经营证券业务许可","D":"撤销"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司风险控制指标无法达标，严重危害证券市场秩序、损害投资者利益的，中国证监会可以区别情形，对其采取下列措施： （1）责令停业整顿； （2）指定其他机构托管、接管； （3）撤销经营证券业务许可； （4）撤销。","type":"multi"},{"id":"cy_fin_3235","q":"证券公司风险控制指标体系以净资本和流动性为核心，其主要的风险控制指标包括（）。","c":{"A":"流动性覆盖率","B":"净稳定资金率","C":"资本杠杆率","D":"销售利润率"},"a":"A,B,C","an":"选项D错误：“销售利润率”是企业财务分析中用于评价盈利能力的指标。 选项ABC正确：证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等。","type":"multi"},{"id":"cy_fin_3237","q":"证券公司风险控制指标体系以净资本和流动性为核心，主要的风险控制指标包括（）。","c":{"A":"净资本","B":"风险覆盖率","C":"资本杠杆率","D":"销售利润率"},"a":"A,B,C","an":"选项D错误：“销售利润率”反映公司盈利能力，而不是风险控制指标。 选项ABC正确：证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率。","type":"multi"},{"id":"cy_fin_3239","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，派出机构应当责令公司限期改正；整改期内，中国证监会及其派出机构应当区别情形，对证券公司采取的措施有（）。","c":{"A":"停止批准新业务","B":"停止批准增设、收购营业性分支机构","C":"限制分配红利","D":"限制转让财产或在财产上设定其他权利"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司净资本或者其他风险控制指标不符合规定标准的，整改期内，中国证监会及其派出机构应当区别情形，对证券公司采取下列措施： （1）停止批准新业务；  （2）停止批准增设、收购营业性分支机构；  （3）限制分配红利；  （4）限制转让财产或在财产上设定其他权利。","type":"multi"},{"id":"cy_fin_3241","q":"证券公司要求并确保子公司在整体风险偏好和风险管理制度框架下，建立健全自身的（  ）。","c":{"A":"风险管理组织架构","B":"制度流程","C":"信息技术系统","D":"风控指标体系"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当依法依规通过公司治理程序将所有子公司（被证券公司控制）纳入全面风险管理体系，对其风险管理工作实行垂直管理并逐步加强一体化管控，从公司治理、风险偏好与风险指标管理、新业务管理、重大事项管理、风险报告、考核评价等方面强化对子公司的风险管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立健全自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的一致性和有效性。","type":"multi"},{"id":"cy_fin_3243","q":"证券公司新业务新产品风险管理中，需要关注的风险因素包括（  ）。","c":{"A":"信息技术","B":"舆情负面评价","C":"ESG（环境、社会和治理）","D":"市场波动"},"a":"A,B,C","an":"选项ABC正确：证券公司应当坚守业务本源、稳慎开展业务创新，建立针对新业务、新产品的风险管理制度和流程，明确需满足的条件和公司内部审批路径，充分了解新业务、新产品模式，识别各类潜在风险，关注信息技术、舆情负面评价、ESG（环境、社会和治理）等风险因素，评估公司是否有相应的人员、系统及资本开展该项业务。 选项D为干扰项","type":"multi"},{"id":"cy_fin_3245","q":"证券公司针对表外业务、场外业务的风险管理机制主要包括（  ）。","c":{"A":"充分识别风险的复杂性、隐蔽性，严格落实客户准入及适当性管理","B":"规范产品设计、指标管控、监测预警、应急处置、信息披露与报送、估值管理","C":"加强对场外衍生品业务的穿透式风险管理，关注并防范业务风险外溢和风险传染","D":"建立与业务发展相配套的业务及风险管理信息系统和功能"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应构建和完善针对资产管理业务、场外衍生品业务等表外业务、场外业务的风险管理机制，主要包括： （1）充分识别表外业务、场外业务风险的复杂性、隐蔽性，严格落实客户准入及适当性管理要求； （2）规范产品设计、指标管控、监测预警、应急处置、信息披露与报送、估值管理等； （3）加强对场外衍生品业务底层资产、资金流向、杠杆水平的穿透式风险管理，关注并防范业务风险外溢和风险传染； （4）建立与业务发展相配套的业务及风险管理信息系统和功能。","type":"multi"},{"id":"cy_fin_3247","q":"证券公司可采取的风险应对措施包括（  ）。","c":{"A":"风险承受","B":"风险对冲","C":"降低仓位","D":"止损"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司在风险限额超限、市场发生显著波动等情形下，可根据实际市场环境、市场风险监测和评估结果，形成风险承受、风险对冲、降低仓位、止损等风险应对措施。","type":"multi"},{"id":"cy_fin_3249","q":"根据《证券公司流动性风险管理指引》，下列说法正确的是（）。","c":{"A":"流动性风险是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险","B":"证券公司流动性风险管理的目标是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足","C":"证券公司应对流动性风险实施限额管理，并对其执行情况进行监控","D":"证券公司应密切关注信用风险、市场风险、声誉风险和操作风险等对流动性风险的影响，防范其他风险向流动性风险的转化与传递"},"a":"A,B,C,D","an":"选项A正确：流动性风险是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项B正确：证券公司流动性风险管理的目标是，建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。 选项C正确：证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。 选项D正确：证券公司应密切关注信用风险、市场风险、声誉风险和操作风险等对流动性风险的影响，防范其他风险向流动性风险的转化与传递。","type":"multi"},{"id":"cy_fin_3251","q":"根据《证券公司风险控制指标管理办法》，证券公司未按期完成整改的，自整改期限到期的次日起，中国证监会派出机构应当区别情形，可对其采取的措施有（）。","c":{"A":"限制业务活动","B":"限制向董事、监事、高级管理人员支付报酬、提供福利","C":"责令更换董事、监事、高级管理人员或者限制其权利","D":"认定董事、监事、高级管理人员为不适当人选"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司未按期完成整改的，自整改期限到期的次日起，派出机构应当区别情形，对其采取下列措施： （1）限制业务活动；（A项符合） （2）责令暂停部分业务； （3）限制向董事、监事、高级管理人员支付报酬、提供福利；（B项符合）  （4）责令更换董事、监事、高级管理人员或者限制其权利；（C项符合） （5）责令控股股东转让股权或者限制有关股东行使股东权利； （6）认定董事、监事、高级管理人员为不适当人选；（D项符合） （7）中国证监会及其派出机构认为有必要采取的其他措施。","type":"multi"},{"id":"cy_fin_3253","q":"证券公司应对流动性风险实施限额管理，根据其（）等情况，设定流动性风险限额并对其执行情况进行监控。","c":{"A":"业务规模","B":"性质","C":"复杂程度","D":"流动性风险偏好"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。","type":"multi"},{"id":"cy_fin_3255","q":"以下哪些行为可能引发证券公司的声誉风险？（  ）","c":{"A":"客户投诉","B":"新闻媒体的不实报道或网络不实言论","C":"他人仿冒公司名称误导公众行为","D":"司法性事件及监管调查、处罚"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应确定可能影响公司声誉的风险来源，全面、系统、持续地收集和识别相关内外部信息，重点关注以下行为活动中可能引发声誉风险的驱动因素： 1.战略规划或调整、股权结构变动、内部组织机构调整或核心人员变动； 2.业务投资活动及产品、服务的设计、提供或推介； 3.内部控制设计、执行及系统控制的重大缺陷或重大经营损失事件； 4.司法性事件及监管调查、处罚； 5.新闻媒体的不实报道或网络不实言论； 6.股东、关联方或其他利益相关方发生声誉事件传导至证券公司； 7.客户投诉及其涉及证券公司的不当言论或行为； 8.工作人员出现不当言论或行为，违反廉洁规定、职业道德、业务规范、行规行约等相关行为； 9.他人仿冒公司名称、商标、网址等侵权或误导公众行为； 10.其他可能引发公司声誉风险的重要因素。","type":"multi"},{"id":"cy_fin_3257","q":"证券公司全面风险管理的基本原则包括（  ）","c":{"A":"全覆盖原则","B":"前瞻性原则","C":"全局性原则","D":"收益最大化原则"},"a":"A,B,C","an":"选项ABC正确：证券公司全面风险管理应当遵循以下基本原则： 1.全覆盖原则。 2.前瞻性原则。 3.全局性原则。 4.有效性原则。 5.匹配性原则。 选项D为干扰项。","type":"multi"},{"id":"cy_fin_3259","q":"根据《证券公司全面风险管理规范》,下列关于全面风险管理的说法中，错误的有 （  ）。","c":{"A":"全面风险管理包含“全员”的含义，要求证券公司董事会、经理层以及全体员工，从上到下，共同参与风险管理","B":"全面风险管理仅包含对流动性风险、信用风险和操作风险的单独管理","C":"全面风险管理仅要求对风险进行审慎评估和及时应对","D":"全面风险管理包含对风险进行“全程管理”的含义"},"a":"B,C","an":"全面风险管理，是指证券公司董事会、经理层以及全体员工共同参与（A正确），对公司经营中的流动性风险、市场风险、信用风险、操作风险、声誉风险等各类风险（B错误），进行准确识别、审慎评估、动态监控、及时报告、妥善应对及全程管理（C错误，D正确）。 题目问的是“说法错误的”。故本题选BC。","type":"multi"},{"id":"cy_fin_3261","q":"某证券公司本月净资本指标被证实已“不符合规定标准”。根据监管要求，该公司在向中国证监会及其派出机构提交的报告中，必须说明的内容包括（  ）。","c":{"A":"问题成因","B":"该年度已实现的利润总额","C":"解决问题的具体措施","D":"该问题所涉及业务部门的人员名单"},"a":"A,C","an":"选项AC正确：证券公司的净资本等风险控制指标达到预警标准或者不符合规定标准的，应当分别在该情形发生之日起3个、1个工作日内，向中国证监会及其派出机构报告，说明基本情况、问题成因以及解决问题的具体措施和期限。 选项BD为干扰项。","type":"multi"},{"id":"cy_fin_3263","q":"证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等。","type":"judge"},{"id":"cy_fin_3265","q":"证券公司应当至少每年经主要负责人、首席风险官签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当至少每半年（而不是每年）经主要负责人、首席风险官签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。","type":"judge"},{"id":"cy_fin_3267","q":"证券公司应建立健全声誉风险管理的工作考核及责任追究机制，声誉风险的处置情况应明确纳入工作人员的考核范围。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应建立健全声誉风险管理的工作考核及责任追究机制，声誉风险的处置情况应明确纳入工作人员的考核范围，对引发经营管理相关声誉事件的责任人和相关部门进行责任追究，对相关问题的改进情况进行跟踪评价。","type":"judge"},{"id":"cy_fin_3269","q":"证券公司开展业务创新时，应当坚守业务本源、稳慎开展。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当坚守业务本源、稳慎开展业务创新，建立针对新业务、新产品的风险管理制度和流程，明确需满足的条件和公司内部审批路径，充分了解新业务、新产品模式，识别各类潜在风险，关注信息技术、舆情负面评价、ESG(环境、社会和治理)等风险因素，评估公司是否有相应的人员、系统及资本开展该项业务。","type":"judge"},{"id":"cy_fin_3271","q":"对于风险变化时效性较高的业务，证券公司必须立即实现实时市场风险监测（  ）","c":{"1":"对","0":"错"},"a":"0","an":"市场风险监测的频率不低于每日，对于风险变化时效性较高的业务，在有条件的情况下可逐步实现更高频率的市场风险监测（并非立即实时）。","type":"judge"},{"id":"cy_fin_3273","q":"证券公司应建立统一的、适用于所有业务的风险资产违约处置流程。 （  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当根据各类业务特点（简单“统一的”一刀切），建立风险资产违约处置管理流程。","type":"judge"},{"id":"cy_fin_3275","q":"证券公司全面风险管理匹配性原则要求风险管理体系必须与同行业领先公司保持完全一致。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"匹配性原则。全面风险管理体系应当与发展战略、发展阶段、业务特点、风险状况、经营管理情况等相适应（并非与行业领先完全一致），并根据内外部环境变化适时优化调整。","type":"judge"},{"id":"cy_fin_3277","q":"证券公司风险偏好的确定需要突出功能性要求和稳慎原则。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当明确公司风险偏好，制定包括风险容忍度和风险限额等的风险指标体系，突出功能性要求和稳慎原则，以净资本等各项风险控制指标持续合规稳健为前提，并通过压力测试等方法计量风险、评估承受能力、指导资源配置。","type":"judge"},{"id":"cy_fin_3279","q":"证券公司应当统筹制定（  ），并建立覆盖各附属机构的风险管理制度及风险限额体系。","c":{"A":"业务提成方案","B":"风险偏好","C":"招聘计划","D":"广告投放策略"},"a":"B","an":"选项B正确：证券公司应当统筹制定风险偏好，建立覆盖各附属机构的风险管理制度及风险限额体系，在并表管理体系范围内推行基本一致的风险偏好和管理流程，并对风险限额实施逐级有效分解。 选项ACD为干扰项","type":"single"},{"id":"cy_fin_3281","q":"证券公司对某被投资机构不构成控制，但该机构因数据安全漏洞面临重大赔偿风险，该风险足以对证券公司并表管理体系造成重大影响，根据《证券公司并表管理指引(试行)》，该被投资机构（  ）","c":{"A":"无需纳入并表管理范围，因其不受证券公司控制","B":"应当纳入并表管理范围，因其产生的风险符合相关情形","C":"由证券公司自主决定是否纳入，无明确监管要求","D":"仅需在风险实际发生后纳入并表管理范围"},"a":"B","an":"根据《证券公司并表管理指引(试行)》，符合下列情形的被投资主体，应当纳入并表管理范围： 1.我国现行企业会计准则规定的会计并表范围的机构； 2.证券公司对被投资机构不构成控制，但被投资机构所产生的风险和潜在损失足以对证券公司并表管理体系造成重大影响的，包括但不限于本金风险、流动性风险、法律合规风险、数据安全风险、声誉风险等。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3283","q":"证券公司应当在并表管理体系内推行（  ）的风险文化。","c":{"A":"激进、灵活","B":"稳健、统一","C":"分散、多样","D":"保守、固定"},"a":"B","an":"证券公司应当在并表管理体系内推行稳健、统一的风险文化，形成与证券公司并表管理体系相适应的风险管理理念、价值准则、职业操守，建立与风险管理过程及效果挂钩的绩效考核制度及责任追究机制，并确保有效落实。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3285","q":"对于证券公司不构成控制但应纳入并表范围的被投资机构，其“重大影响”风险包括但不限于（  ）。","c":{"A":"本金风险","B":"流动性风险","C":"法律合规风险","D":"数据安全风险"},"a":"A,B,C,D","an":"选项ABCD正确：根据《证券公司并表管理指引(试行)》，符合下列情形的被投资主体，应当纳入并表管理范围： 1.我国现行企业会计准则规定的会计并表范围的机构； 2.证券公司对被投资机构不构成控制，但被投资机构所产生的风险和潜在损失足以对证券公司并表管理体系造成重大影响的，包括但不限于本金风险、流动性风险、法律合规风险、数据安全风险、声誉风险等。","type":"multi"},{"id":"cy_fin_3287","q":"下列属于证券公司并表管理要素的有（  ）","c":{"A":"并表管理范围","B":"公司治理","C":"业务协同与内部交易管理","D":"市场营销策略"},"a":"A,B,C","an":"选项ABC正确：证券公司并表管理要素包括并表管理范围、公司治理、业务协同与内部交易管理、风险管理、资本管理等。 选项D错误：干扰项，“市场营销策略”属于业务推广范畴。","type":"multi"},{"id":"cy_fin_3289","q":"证券公司在对内部交易进行并表管理时，需要充分关注的潜在负面影响包括（  ）。","c":{"A":"潜在利益输送","B":"虚增资本","C":"风险传染","D":"监管套利"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当对并表管理体系内部交易进行并表管理，充分关注潜在利益输送、虚增资本、转移收入、风险传染、监管套利和其他对证券公司并表管理体系稳健经营可能产生的负面影响。","type":"multi"},{"id":"cy_fin_3291","q":"并表管理是一种针对证券公司母公司自身的、独立的管控活动。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"并表管理，是指证券公司对证券公司并表管理体系的公司治理、资本和财务等进行全面持续的管控，有效识别、计量、监测、评估和控制并表管理体系的总体风险状况。 （并表管理是“对证券公司并表管理体系”的管控，其范围超越母公司自身，包含需并表的子公司等）","type":"judge"},{"id":"cy_fin_3293","q":"只有符合我国现行企业会计准则规定的会计并表范围的机构，才需要纳入证券公司的并表管理范围。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"根据《证券公司并表管理指引(试行)》，符合下列情形的被投资主体，应当纳入并表管理范围： 1.我国现行企业会计准则规定的会计并表范围的机构； 2.证券公司对被投资机构不构成控制，但被投资机构所产生的风险和潜在损失足以对证券公司并表管理体系造成重大影响的，包括但不限于本金风险、流动性风险、法律合规风险、数据安全风险、声誉风险等。","type":"judge"},{"id":"cy_fin_3295","q":"最近1年末净资产不低于1000万元，最近1年末金融资产不低于500万元，且具有（）年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织可以申请转化成为专业投资者。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"A","an":"选项A正确：符合下列条件之一的普通投资者可以申请转化成为专业投资者： （1）最近1年末净资产不低于1000万元，最近1年末金融资产不低于500万元，且具有【1年】以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； （2）金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_3297","q":"自然人赵某拥有金融资产400万元，最近3年年均收入为60万元，并有3年证券投资经验。他是否符合第二类专业投资者认定？（  ）","c":{"A":"符合，因为他的年均收入达标且投资经验足够","B":"不符合，因为他的金融资产未达标","C":"不符合，因为他的年均收入未达标","D":"不符合，因为他的投资经验不足"},"a":"A","an":"符合下列条件之一的是第二类专业投资者。 1.同时符合下列条件的法人或者其他组织： (1)最近1年末净资产不低于2000万元； (2)最近1年末金融资产不低于1000万元； (3)具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2.同时符合下列条件的自然人： (1)金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； (2)具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于第一类专业投资者中的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。 综上，该题选A，选项BCD错误。","type":"single"},{"id":"cy_fin_3299","q":"最近1年末净资产不低于（）万元，最近1年末金融资产不低于（）万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织的普通投资者可以申请转化成为专业投资者。","c":{"A":"500；500","B":"1000；500","C":"500；1000","D":"1000；1000"},"a":"B","an":"选项B正确：符合下列条件之一的普通投资者可以申请转化成为专业投资者： （1）最近1年末净资产不低于【1000万元】，最近1年末金融资产不低于【500万元】，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； （2）金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_3301","q":"金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有（）年以上证券、基金、期货、黄金、外汇等投资经历或者（）年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者可以申请转化成为专业投资者。","c":{"A":"1；1","B":"2；1","C":"1；2","D":"2；2"},"a":"A","an":"选项A正确：符合下列条件之一的普通投资者可以申请转化成为专业投资者： （1）最近1年末净资产不低于1000万元，最近1年末金融资产不低于500万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； （2）金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有【1年】以上证券、基金、期货、黄金、外汇等投资经历或者【1年】以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_3303","q":"同时符合下列条件的法人或者其他组织是第二类专业投资者：最近1年末净资产不低于2000万元；最近1年末金融资产不低于1000万元；具有（）年以上证券、基金、期货、黄金、外汇等投资经历。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"B","an":"选项B正确：同时符合下列条件的法人或者其他组织是第二类专业投资者： ①最近1年末净资产不低于2000万元； ②最近1年末金融资产不低于1000万元； ③具有2年以上证券、基金、期货、黄金、外汇等投资经历。  【知识拓展】 符合下列条件之一的是第二类专业投资者： 1．同时符合下列条件的法人或者其他组织： ①最近1年末净资产不低于2000万元； ②最近1年末金融资产不低于1000万元； ③具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2．同时符合下列条件的自然人： ①金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； ②具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。 以上所称金融资产，包括银行存款、股票、债券、基金份额、资产管理计划、银行理财产品、信托计划、保险产品、期货及其他衍生产品等。 第二类专业投资者可以书面告知经营机构选择成为普通投资者，经营机构应当对其履行相应的适当性义务。","type":"single"},{"id":"cy_fin_3305","q":"自然人赵某属于第二类专业投资者，则他一定具有（）年以上证券、基金、期货、黄金、外汇等投资经历，或者具有（）年以上金融产品设计、投资、风险管理及相关工作经历，或者属于第一类专业投资者中的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。","c":{"A":"1；1","B":"1；2","C":"2；1","D":"2；2"},"a":"D","an":"选项D正确：同时符合下列条件的自然人是第二类专业投资者。 （1）金融资产不低于500万元，或者最近3 年个人年均收入不低于 50 万元； （2）具有【2年】以上证券、基金、期货、黄金、外汇等投资经历，或者具有【2年】以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。  【知识拓展】 符合下列条件之一的是第二类专业投资者。 1.同时符合下列条件的法人或者其他组织： （1）最近1年末净资产不低于2000万元； （2）最近1年末金融资产不低于1000万元； （3）具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2.同时符合下列条件的自然人： （1）金融资产不低于500万元，或者最近3 年个人年均收入不低于 50 万元； （2）具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。","type":"single"},{"id":"cy_fin_3307","q":"金融资产不低于（）万元或者最近3年个人年均收入不低于（）万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者可以申请转化成为专业投资者。","c":{"A":"100；10","B":"200；20","C":"300；30","D":"500；50"},"a":"C","an":"选项C正确：符合下列条件的自然人投资者可以申请转化成为专业投资者：金融资产不低于【300万元】或者最近3年个人年均收入不低于【30万元】，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历。 选项ABD为干扰项。  【知识拓展】普通投资者申请转化成为专业投资者的条件： 1.最近1年末净资产不低于1000万元，最近1年末金融资产不低于500万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； 2.金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_3309","q":"对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的（）内至少应进行一次复核。","c":{"A":"1年","B":"2年","C":"3年","D":"4年"},"a":"C","an":"选项C正确：对于已确立过风险等级的客户，证券公司应根据其风险程度设置相应的重新审核期限，实现对风险的动态追踪。原则上，风险等级最高的客户的审核期限不得超过半年，低一等级客户的审核期限不得超出上一级客户审核期限时长的两倍。对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。","type":"single"},{"id":"cy_fin_3311","q":"对于已确立过风险等级的客户，证券公司应根据其风险程度设置相应的重新审核期限，实现对风险的动态追踪。原则上，风险等级最高的客户的审核期限不得超过（），低一等级客户的审核期限不得超出上一级客户审核期限时长的（）。","c":{"A":"半年；两倍","B":"半年；三倍","C":"一年；两倍","D":"一年；三倍"},"a":"A","an":"选项A正确：对于已确立过风险等级的客户，证券公司应根据其风险程度设置相应的重新审核期限，实现对风险的动态追踪。原则上，风险等级最高的客户的审核期限不得超过【半年】，低一等级客户的审核期限不得超出上一级客户审核期限时长的【两倍】。对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_3313","q":"证券公司需要对下列哪个名单所列对象开展实时监测并采取反洗钱特别预防措施（  ）。","c":{"A":"国际知名企业排行榜","B":"国家反恐怖主义工作领导机构认定并公告的恐怖活动组织和人员名单","C":"国内上市公司市值排名","D":"行业协会发布的优秀会员名单"},"a":"B","an":"证券公司应当按照国家有关机关要求对下列名单所列对象开展实时监测并采取反洗钱特别预防措施： 1.国家反恐怖主义工作领导机构认定并由其办事机构公告的恐怖活动组织和人员名单； 2.外交部发布的执行联合国安理会决议通知中涉及定向金融制裁的组织和人员名单； 3.国务院反洗钱行政主管部门认定或者会同国家有关机关认定的，具有重大洗钱风险、不采取措施可能造成严重后果的组织和人员名单。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3315","q":"以下关于证券公司大额交易和可疑交易报告制度，说法正确的是（）。","c":{"A":"证券公司与客户进行金融交易并通过银行账户划转款项的，由银行机构按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告","B":"证监会应当制定证券公司的交易监测标准，由证券公司对其有效性负责","C":"证券公司发现客户的交易与洗钱、恐怖融资等犯罪活动相关的，但资金金额或者资产价值较小，则无需向中国反洗钱监测分析中心提交可疑交易报告","D":"证券公司在报送可疑交易报告后，应当根据证监会的相关规定采取相应的后续风险控制措施"},"a":"A","an":"选项A正确：证券公司与客户进行金融交易并通过银行账户划转款项的，由银行机构按照《金融机构大额交易和可疑交易报告管理办法》规定提交大额交易报告。 选项B错误：证券公司（非证监会）应当制定证券公司的交易监测标准，并对其有效性负责。 选项C错误：证券公司发现或者有合理理由怀疑客户、客户的资金或者其他资产、客户的交易或者试图进行的交易与洗钱、恐怖融资等犯罪活动相关的，不论所涉资金金额或者资产价值大小，应当向中国反洗钱监测分析中心提交可疑交易报告。 选项D错误：证券公司在报送可疑交易报告后，应当根据中国人民银行（非证监会）的相关规定采取相应的后续风险控制措施。","type":"single"},{"id":"cy_fin_3317","q":"采取反洗钱特别预防措施是证券公司的法定义务。 （  ）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当按照国家有关机关要求对下列名单所列对象开展实时监测并采取反洗钱特别预防措施： 1.国家反恐怖主义工作领导机构认定并由其办事机构公告的恐怖活动组织和人员名单； 2.外交部发布的执行联合国安理会决议通知中涉及定向金融制裁的组织和人员名单； 3.国务院反洗钱行政主管部门认定或者会同国家有关机关认定的，具有重大洗钱风险、不采取措施可能造成严重后果的组织和人员名单。","type":"judge"},{"id":"cy_fin_3319","q":"下列哪项不是证券公司信息技术管理部门的职责？（）","c":{"A":"信息技术规划","B":"信息系统建设","C":"信息安全保障","D":"信息风险监控"},"a":"D","an":"题目问的是”不是“。 选项D错误：信息风险监控通常由风险管理部门负责，而不是信息技术管理部门。因此答案选择D。 选项ABC正确：证券公司信息技术管理部门的职责有信息技术规划、信息系统建设、信息技术质量控制、信息安全保障、运维管理等工作。","type":"single"},{"id":"cy_fin_3321","q":"证券公司验证其风险管理系统功能完备、权限清晰，能够与业务系统同步上线运行属于（）风险管理机制。","c":{"A":"事前审查","B":"事中风险监测","C":"事后评估审计","D":"事后排查"},"a":"A","an":"选项A正确：事前审查——证券公司借助信息技术手段从事证券基金业务活动前，应当开展内部审查，验证下列事项并建立存档记录： （1）业务系统的流程设计、功能设置、参数配置和技术实现应当遵循业务合规的原则，不得违反法律法规及中国证监会的规定； （2）风险管理系统功能完备、权限清晰，能够与业务系统同步上线运行； （3）具备完善的信息安全防护措施，能够保障经营数据和客户信息的安全、完整； （4）具备符合要求的信息系统备份及运维管理能力，能够保障相关系统安全、平稳运行。 选项B错误：事中风险监测：证券公司应当识别借助信息技术手段从事证券基金业务活动的各类风险，建立持续有效的风险监测机制。证券公司应当及时、稳妥处置发现的风险问题，并至少每年开展一次风险监测机制及执行情况的有效性评估。 选项C错误：事后评估审计：证券公司应当定期开展信息技术管理工作专项审计，频率不低于每年一次，确保3年内完成信息技术管理全部事项的审计工作，包括但不限于信息技术治理、信息技术合规与风险管理、信息技术安全管理、应急管理。 选项D错误：教材未提及，干扰项。","type":"single"},{"id":"cy_fin_3323","q":"证券公司应当落实的应急管理职责包括（）。","c":{"A":"信息技术管理部门为信息技术应急管理的牵头组织部门，组织开展信息技术应急预案的制订、演练、评估与改进工作，并负责信息系统的应急响应与恢复","B":"各业务部门负责评估本业务条线信息技术突发事件相关风险，开展业务影响分析，确定并实施重要业务恢复目标和恢复策略","C":"风险管理部门负责评估信息系统与相关业务恢复目标和恢复策略制订的合理性，确保与公司整体风险管理策略保持一致","D":"将经营及客户数据按照重要性和敏感性进行分类分级"},"a":"A,B,C","an":"选项ABC正确：证券公司应当落实下列应急管理职责： （1）信息技术管理部门为信息技术应急管理的牵头组织部门，组织开展信息技术应急预案的制订、演练、评估与改进工作，并负责信息系统的应急响应与恢复；  （2）各业务部门负责评估本业务条线信息技术突发事件相关风险，开展业务影响分析，确定并实施重要业务恢复目标和恢复策略；  （3）风险管理部门负责评估信息系统与相关业务恢复目标和恢复策略制订的合理性，确保与公司整体风险管理策略保持一致。 选项D错误：“将经营及客户数据按照重要性和敏感性进行分类分级”是证券公司信息技术数据治理的要求。","type":"multi"},{"id":"cy_fin_3325","q":"证券公司董事会负责审议本公司的信息技术管理目标，对信息技术管理的有效性承担责任，履行的职责包括（）。","c":{"A":"审议信息技术战略，确保与本公司的发展战略、风险管理策略、资本实力相一致","B":"公司章程规定的其他信息技术管理职责","C":"建立信息技术人力和资金保障方案","D":"评估年度信息技术管理工作的总体效果和效率"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司董事会负责审议本公司的信息技术管理目标，对信息技术管理的有效性承担责任，履行下列职责： （1）审议信息技术战略，确保与本公司的发展战略、风险管理策略、资本实力相一致； （2）建立信息技术人力和资金保障方案； （3）评估年度信息技术管理工作的总体效果和效率； （4）公司章程规定的其他信息技术管理职责。","type":"multi"},{"id":"cy_fin_3327","q":"中国证监会及其派出机构在对证券公司信息技术管理及服务活动的监管不能采取非现场检查的方式。（）","c":{"1":"对","0":"错"},"a":"0","an":"中国证监会及其派出机构在对证券公司信息技术管理及服务活动的监管过程中，可以采用渗透测试、漏洞扫描及信息技术风险评估等方式开展现场检查及非现场检查（并非不能非现场检查）。","type":"judge"},{"id":"cy_fin_3329","q":"证券公司、证券投资咨询机构以软件工具、终端设备等为载体提供建议的，下列说法不符合要求的是（）。","c":{"A":"客观说明软件工具、终端设备的功能，不得对其功能进行虚假、不实、误导性宣传","B":"揭示软件工具、终端设备的固有缺陷和使用风险，不得隐瞒或者有重大遗漏","C":"对软件工具、终端设备所使用的数据信息来源要保密","D":"表示软件工具、终端设备具有选择证券投资品种或者提示买卖时机功能的，应当说明其方法和局限"},"a":"C","an":"题目问的是”不符合要求“。 选项C错误：以软件工具、终端设备等为载体，向客户提供投资建议或者类似功能服务的，应当说明软件工具、终端设备所使用数据的信息来源（并非要保密）。因此答案选择C。 选项ABD正确：以软件工具、终端设备等为载体，向客户提供投资建议或者类似功能服务的，除遵守基本规定外，还应当符合下列要求： (1)客观说明软件工具、终端设备的功能，不得对其功能进行虚假、不实、误导性宣传（A项）； (2)揭示软件工具、终端设备的固有缺陷和使用风险，不得隐瞒或者有重大遗漏（B项）； (3)说明软件工具、终端设备所使用的数据信息来源； (4)表示软件工具、终端设备具有选择证券投资品种或者提示买卖时机功能的，应当说明其方法和局限性（D项）。","type":"single"},{"id":"cy_fin_3331","q":"下列关于证券投资顾问业务关键环节的规范要求，说法错误的是（  ）。","c":{"A":"证券公司、证券投资咨询机构向客户提供投资顾问服务，应当按照公司制定的程序和要求，了解客户的相关信息，获得的信息按照规定只能以书面文件形式予以记载、保存","B":"证券公司、证券投资咨询机构应当向客户提供风险揭示书，并由客户签收确认","C":"证券投资顾问服务协议应当约定，自签订协议之日起5个工作日内，客户可以书面通知方式提出解除协议","D":"证券投资顾问向客户提供投资建议，知悉客户作出具体投资决策计划的，不得向他人泄露该客户的投资决策计划信息"},"a":"A","an":"选项A错误：证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的身份、财产与收入状况、证券投资经验、投资需求与风险偏好，评估客户的风险承受能力，并以书面或者电子文件形式予以记载、保存。 选项BCD说法正确。","type":"single"},{"id":"cy_fin_3333","q":"证券投资顾问执业行为准则包括（）。","c":{"A":"证券投资顾问不得为公司及其关联方的利益损害客户利益","B":"证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务，并提示潜在的投资风险","C":"证券投资顾问提供投资建议应具有合理依据","D":"证券投资顾问不得参与媒体证券节目"},"a":"A,B,C","an":"选项D错误：证券投资顾问应规范参与（并非不得参与）媒体证券节目。 选项A正确：忠实客户利益：证券投资顾问不得为公司及其关联方的利益损害客户利益；不得为证券投资顾问人员及其利益相关者的利益损害客户利益；不得为特定客户利益损害其他客户利益。 选项B正确：提供适当的投资建议服务：证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务，并提示潜在的投资风险。 选项C正确：提供投资建议应具有合理依据：证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型，以及分析方法形成的投资分析意见等。","type":"multi"},{"id":"cy_fin_3335","q":"在证券公司融资融券业务中，客户维持担保比例不得低于最低维持担保比例，否则须追加担保物。该最低维持担保比例为（）。","c":{"A":"1","B":"1.1","C":"1.2","D":"证券公司与客户约定"},"a":"D","an":"选项D正确：证券公司应当根据市场情况、客户资信和公司风险管理能力等因素，审慎评估并与客户约定最低维持担保比例要求。  【易混淆】维持担保比例 vs 融资融券保证金比例 “维持担保比例”：是指客户担保物价值与其融资融券债务之间的比例。 “融资融券保证金比例”：是投资者交付的保证金与融资、融券交易金额的比例。投资者融资买入证券时，融资保证金比例不得低于80%。融券卖出时，融券保证金比例不得低于100%，其中私募证券投资基金的融券保证金比例不得低于120%。","type":"single"},{"id":"cy_fin_3337","q":"关于证券公司建立的融资融券业务决策与授权体系，下列说法错误的有（）。","c":{"A":"由部门负责人确定融资融券业务的总规模","B":"业务决策机构确定对具体客户的授信额度","C":"业务执行部门确定单一客户的授信额度","D":"分支机构可自行决定客户的开户、保证金收取"},"a":"A,B,C,D","an":"题目问的是“说法错误的”。 选项A错误：证券公司董事会（并非部门负责人）负责制定融资融券业务的基本管理制度，决定与融资融券业务有关的部门设置及各部门职责，确定融资融券业务的总规模。 选项B错误：业务执行部门（并非业务决策机构）负责融资融券业务的具体管理和运作，制定融资融券合同的标准文本，【确定对具体客户的授信额度】，对分支机构的业务操作进行审批、复核和监督。 选项C错误：业务决策机构（并非业务执行部门）由有关高级管理人员及部门负责人组成，负责制定融资融券业务操作流程，选择可从事融资融券业务的分支机构，【确定对单一客户和单一证券的授信额度】、融资融券的期限和利率（费率）、保证金比例和最低维持担保比例、可充抵保证金的证券种类及折算率、客户可融资买入和融券卖出的证券种类。 选项D错误：分支机构在公司总部的集中监控下，按照公司的统一规定和决定（并不是自行决定），具体负责客户征信、签约、开户、保证金收取和交易执行等业务操作。 因此答案选择ABCD。  【易混淆】确定对单一客户和单一证券的授信额度 vs 确定对具体客户的授信额度 一、确定对单一客户和单一证券的授信额度 属于公司风险控制的核心政策，在宏观政策层面制定全公司统一适用的风险控制 “天花板”（“一刀切” 规则）。 1.单一客户授信额度：设定全公司范围内对单个客户融资融券余额的最高上限； 2.单一证券授信额度：设定对单只证券融资买入或融券卖出规模的最高上限。 二、具体客户确定对具体客户的授信额度 属于微观操作层面针对个体客户的个性化额度核定（“一事一议”）。 指在公司既定的风险控制框架内，针对单个客户的具体资质（如征信情况、资产规模、交易经验等），确定其可实际使用的融资融券额度（如客户 A 可融资买入 100 万元、融券卖出 50 万元）。属于业务执行层面的操作。","type":"multi"},{"id":"cy_fin_3339","q":"下列关于证券金融公司的风险控制指标，说法正确的有（）。","c":{"A":"净资本与各项风险资本准备之和的比例不得低于100％","B":"对单一证券公司转融通的余额，不得超过证券金融公司净资本的50％","C":"融出的每种证券余额不得超过该证券上市可流通市值的15％","D":"充抵保证金的每种证券余额不得超过该证券总市值的15％"},"a":"A,B,D","an":"选项C错误：融出的每种证券余额不得超过该证券上市可流通市值的10%（并非15％）。 选项ABD正确：证券金融公司应当遵守以下风险控制指标规定： （1）净资本与各项风险资本准备之和的比例不得低于100%；  （2）对单一证券公司转融通的余额，不得超过证券金融公司净资本的50%；  （3）融出的每种证券余额不得超过该证券上市可流通市值的10%；  （4）充抵保证金的每种证券余额不得超过该证券总市值的15%。","type":"multi"},{"id":"cy_fin_3341","q":"客户信用证券账户内的证券，出现（）等特殊情形时，证券公司在计算客户维持保证金比例时，可以根据与客户的约定按照公允价格或其他定价方式计算其市值。","c":{"A":"被调出可充抵保证金证券范围","B":"被暂停交易","C":"被实施风险警示","D":"因权益处理等产生尚未到账的在途证券"},"a":"A,B,C,D","an":"选项ABCD正确：客户信用证券账户内的证券，出现被调出可充抵保证金证券范围、被暂停交易、被实施风险警示等特殊情形或者因权益处理等产生尚未到账的在途证券，证券公司在计算客户维持担保比例时，可以根据与客户的约定按照公允价格或其他定价方式计算其市值。","type":"multi"},{"id":"cy_fin_3343","q":"证券金融公司开展转融通业务，应当了解证券公司的（）等，并以书面和电子的方式予以记录和保存。","c":{"A":"基本情况","B":"业务范围","C":"财务状况","D":"违约记录"},"a":"A,B,C,D","an":"证券金融公司开展转融通业务，应当了解证券公司的【基本情况、业务范围、财务状况、违约记录】、风险控制能力等，并以书面和电子的方式予以记录和保存。","type":"multi"},{"id":"cy_fin_3345","q":"证券公司应当健全业务隔离制度，融资融券业务的前、中、后台应当相互分离、相互制约，各主要环节应当分别由不同的部门和岗位负责，负责风险监控和业务稽核的部门和岗位应当独立于其他部门和岗位，分管融资融券业务的高级管理人员不得兼管风险监控部门和业务稽核部门。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当健全业务隔离制度，融资融券业务的前、中、后台应当相互分离、相互制约，各主要环节应当分别由不同的部门和岗位负责，负责风险监控和业务稽核的部门和岗位应当独立于其他部门和岗位，分管融资融券业务的高级管理人员不得兼管风险监控部门和业务稽核部门。","type":"judge"},{"id":"cy_fin_3347","q":"证券公司分管融资融券业务的高级管理人员可以兼管风险监控部门。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当健全业务隔离制度，融资融券业务的前、中、后台应当相互分离、相互制约，各主要环节应当分别由不同的部门和岗位负责，负责风险监控和业务稽核的部门和岗位应当独立于其他部门和岗位，分管融资融券业务的高级管理人员不得兼管风险监控部门和业务稽核部门。","type":"judge"},{"id":"cy_fin_3349","q":"证券公司应建立健全相对集中、权责统一的投资决策与授权机制，以下（）是证券公司自营业务的最高决策机构。","c":{"A":"投资决策机构","B":"自营业务部门","C":"董事会","D":"分支机构"},"a":"C","an":"选项C正确：董事会是自营业务的最高决策机构，在严格遵守监管法规中关于自营业务规模等风险控制指标规定基础上，根据公司资产、负债、损益和资本充足等情况确定自营业务规模、可承受的风险限额等，并以董事会决议的形式进行落实，自营业务具体投资运作管理由董事会授权公司投资决策机构决定。 选项A错误：投资决策机构是自营业务投资运作的最高管理机构，负责确定具体的资产配置策略、投资事项和投资品种等。 选项B错误：自营业务部门为自营业务的执行机构，应在投资决策机构作出的决策范围内，根据授权负责具体投资项目的决策和执行工作。 选项D错误：分支机构通常不参与自营业务的决策过程。  【知识详解】证券自营业务的决策 自营业务决策机构原则上应当按照董事会一投资决策机构一自营业务部门的三级体制设立。 （1）董事会是自营业务的最高决策机构，在严格遵守监管法规中关于自营业务规模等风险控制指标规定基础上，根据公司资产、负债、损益和资本充足等情况确定自营业务规模、可承受的风险限额等，并以董事会决议的形式进行落实，自营业务具体投资运作管理由董事会授权公司投资决策机构决定。 （2）投资决策机构是自营业务投资运作的最高管理机构，负责确定具体的资产配置策略、投资事项和投资品种等。 （3）自营业务部门为自营业务的执行机构，应在投资决策机构作出的决策范围内，根据授权负责具体投资项目的决策和执行工作。 自营业务的管理和操作由证券公司自营业务部门专职负责，非自营业务部门和分支机构不得以任何形式开展自营业务。自营业务中涉及自营规模、风险限额、资产配置、业务授权等方面的重大决策应当经过集体决策并采取书面形式，由相关人员签字确认后存档。","type":"single"},{"id":"cy_fin_3351","q":"董事会作为证券公司自营业务的最高决策机构，应根据证券公司资产、负债、损益和资本是否充足等情况确定（）。","c":{"A":"投资品种","B":"自营业务规模","C":"投资时机","D":"资产配置"},"a":"B","an":"选项B正确：董事会是自营业务的最高决策机构，在严格遵守监管法规中关于自营业务规模等风险控制指标规定的基础上，根据公司资产、负债、损益和资本充足等情况【确定自营业务规模】、可承受的风险限额等，并以董事会决议的形式进行落实。 选项AD错误：投资品种和资产配置 通常由投资决策机构负责确定。 选项C错误：投资时机属于自营业务部门在执行层面的具体操作内容。","type":"single"},{"id":"cy_fin_3353","q":"债券有关业务应按照经纪、自营、承销、资管、投资顾问等类型分开办理，并在人员、账户、资金、信息等方面严格分离，防范利益冲突；债券交易的投资决策、交易执行、风险控制、清算交收等关键岗位应专人负责，禁止岗位兼任或者混合操作。（）","c":{"1":"对","0":"错"},"a":"1","an":"债券有关业务应按照经纪、自营、承销、资管、投资顾问等类型分开办理，并在人员、账户、资金、信息等方面严格分离，防范利益冲突；债券交易的投资决策、交易执行、风险控制、清算交收等关键岗位应专人负责，禁止岗位兼任或者混合操作。","type":"judge"},{"id":"cy_fin_3355","q":"根据《证券公司及基金管理公司子公司资产证券化业务管理规定》，以基础资产产生现金流循环购买新的同类基础资产方式组成专项计划资产的，专项计划的法律文件应当明确说明基础资产的（）。","c":{"A":"购买条件","B":"购买规模","C":"政策风险","D":"风险控制措施"},"a":"A,B,D","an":"选项C错误：干扰项，政策风险属于外部环境风险，通常由市场环境、政府政策等外部因素引起，而非专项计划内部运作的直接风险，因此不在专项计划法律文件必须明确说明的范围内。 选项ABD正确：根据《证券公司及基金管理公司子公司资产证券化业务管理规定》，以基础资产产生现金流循环购买新的同类基础资产方式组成专项计划资产的，专项计划的法律文件应当明确说明基础资产的【购买条件、购买规模、流动性风险以及风险控制措施】。","type":"multi"},{"id":"cy_fin_3357","q":"下列关于证券公司设立的另类投资公司，说法错误的是（）。","c":{"A":"证券公司另类子公司可以下设子公司","B":"证券公司应当将另类子公司的合规与风险管理纳入公司统一体系","C":"证券公司另类子公司可以从事投资以外的业务","D":"证券公司应当清晰划分证券公司与另类子公司的业务范围"},"a":"A,C","an":"题目问的是“说法错误的”。 选项A错误：证券公司应当突出主业，充分考虑自身发展需要、财务实力和管理能力，审慎设立另类子公司，另类子公司不得再下设任何机构。 选项C错误：证券公司另类子公司不得从事投资业务之外的业务。 选项B正确：证券公司应当将另类子公司的合规与风险管理纳入公司统一体系，加强对另类子公司的资本约束，实现对子公司合规与风险管理全覆盖，防范利益冲突和利益输送。 选项D正确：证券公司应当清晰划分证券公司与另类子公司及另类子公司与其他子公司之间的业务范围，统筹制定业务划分方案，采取切实措施，防范同业竞争、利益冲突及利益输送。 因此答案选择AC。","type":"multi"},{"id":"cy_fin_3359","q":"关于证券公司代销金融产品的基本原则，下列说法正确的是（）。","c":{"A":"避免利益冲突","B":"分散管理","C":"集中统一管理","D":"利益最大化"},"a":"A,C","an":"选项AC正确：证券公司代销金融产品的基本原则： ①避免利益冲突。证券公司代销金融产品应遵循平等、自愿、公平、诚实信用和适当性原则，避免利益冲突，不得损害客户合法权益。证券公司在代销金融产品中需审慎评估及防范利益冲突，既要避免证券公司与客户之间的利益冲突，也要避免代销活动中证券公司不同部门、不同业务、不同人员之间的利益冲突等。证券公司应当采取有效隔离措施，避免因其他业务风险影响代销业务稳健运行。 ②集中统一管理。证券公司应当对代销金融产品活动实行集中统一管理，明确内设部门和分支机构在代销金融产品活动中的职责，防止分支机构擅自代销金融产品。证券公司应当集中进行委托人资格审查、金融产品审慎调查、风险评估，统一与委托人签署合同，统一制作产品宣传推介材料。 选项B错误：应为“集中统一管理”，并非分散管理（分散管理容易导致各分支机构擅自代销金融产品，增加风险）。 选项D错误：证券公司的目标是为客户服务，确保客户的利益得到保护，而不是追求自身的利益最大化。","type":"multi"},{"id":"cy_fin_3361","q":"证券公司代销金融产品与委托人签署书面代销合同应约定的是（）。","c":{"A":"证券公司对金融产品承担担保责任","B":"因金融产品设计产生的责任由委托人承担","C":"因金融产品设计运营的责任由委托人承担","D":"双方在信息披露、风险揭示等方面的分工"},"a":"B,C,D","an":"选项A错误：证券公司对金融产品不承担任何担保责任。 选项BCD正确：证券公司应与委托人通过签署书面代销合同明确双方的权利义务以及在信息披露、风险揭示、咨询查询、投诉处理、违约方面应急预案和后续处理机制等方面的分工，因金融产品设计、运营和委托人提供的信息不真实、不准确、不完整而产生的责任由委托人承担，证券公司不承担任何担保责任。","type":"multi"},{"id":"cy_fin_3363","q":"证券经营机构应当制定具体、有效的事前风险防范体系、（）和事后追责机制，明确董事、监事、高级管理人员及各层级管理人员的廉洁文化建设和廉洁从业管理责任。","c":{"A":"事中内部控制体系","B":"事中管控措施","C":"事中监管执法","D":"事中风险评估"},"a":"B","an":"选项B正确：证券经营机构应当制定具体、有效的事前风险防范体系、【事中管控措施】和事后追责机制，明确董事、监事、高级管理人员及各层级管理人员的廉洁文化建设和廉洁从业管理责任。 选项ACD为干扰项，教材未提及。","type":"single"},{"id":"cy_fin_3365","q":"某证券公司董事会成员人数为13人，其中内部董事为4人，独立董事为4人，董事会下设薪酬与提名委员会、审计委员会和风险控制委员会，其中审计委员会成员5人，其中含独立董事2人，审计委员会的负责人由独立董事李某担任，其就职于会计师事务所并具有10年以上从业经验。 不考虑其他影响因素，请根据上述背景信息回答以下问题。在某次董事会上需要对某项议案进行审议，该议案涉及关联董事4人，所有董事均出席了该次会议，则该董事会会议所做决议至少须经无关联关系董事（  ）人同意方可通过。","c":{"A":"6","B":"7","C":"5","D":"9"},"a":"C","an":"上市公司董事与董事会会议决议事项所涉及的企业或者个人有关联关系的，该董事应当及时向董事会书面报告。有关联关系的董事不得对该项决议行使表决权，也不得代理其他董事行使表决权。该董事会会议由过半数的无关联关系董事出席即可举行，董事会会议所作决议须经无关联关系董事过半数通过（本题中关联董事 4 人，无关联关系董事为 13-4=9 人。9 人的过半数为 5 人）。出席董事会会议的无关联关系董事人数不足3人的，应将该事项提交上市公司股东会审议。","type":"single"},{"id":"cy_fin_3367","q":"根据《证券公司风险处置条例》，下列关于行政重组的说法，错误的是（）。","c":{"A":"证券公司进行行政重组，可以采取注资、股权重组、债务重组、资产重组合并或者其他方式","B":"证券公司经停业整顿在规定期限内仍达不到正常经营条件，但能够清偿到期债务的，可以向证监会申请行政重组","C":"行政重组期限一般不超过12个月。期满未完成的，可向国务院证券监督管理机构申请延长期限6个月","D":"在托管、接管过程中达到正常经营条件的，经证监会批准，可以恢复正常经营"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司经停业整顿、托管、接管或者行政重组在规定期限内仍达不到正常经营条件，但能够清偿到期债务的，国务院证券监督管理机构依法撤销其证券业务许可（并非申请重组）。因此答案选择B。 选项A正确：证券公司进行行政重组，可以采取注资、股权重组、债务重组、资产重组、合并或者其他方式。 选项C正确：行政重组期限一般不超过12个月。满12 个月，行政重组未完成的，国务院证券监督管理机构可以决定延长行政重组期限，但延长行政重组期限最长不得超过6个月。 选项D正确：证券公司经停业整顿、托管、接管或者行政重组在规定期限内达到正常经营条件的，经国务院证券监督管理机构批准，可以恢复正常经营。","type":"single"},{"id":"cy_fin_3369","q":"根据《证券公司风险处置条例》，下列关于证券公司被接管的说法错误的是（）。","c":{"A":"证券公司治理混乱、管理失控，情节严重的，国务院证券监督管理机构可以对该证券公司进行接管","B":"接管期限届满，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过6个月","C":"国务院证券监督管理机构决定对证券公司进行接管的，被接管证券公司股东会、董事会、监事会以及经理、副经理停止履行职责","D":"行政接管是监管部门对经营存在严重问题的证券公司介入，全面接收和管理其债权债务和业务经营，防止其经营风险进一步恶化的行政强制措施"},"a":"B","an":"B项错误，接管期限一般不超过12个月。满12个月，确实需要继续接管的，国务院证券监督管理机构可以决定延期，延期最长不超过【12个月】。","type":"single"},{"id":"cy_fin_3371","q":"证券公司风险管理部门人员工作称职的，其薪酬收入总额应当不低于公司总部业务及业务管理部门同职级人员的（  ）。","c":{"A":"一定比例","B":"最低水平","C":"中位数","D":"平均水平"},"a":"D","an":"选项D正确：风险管理部门人员工作称职的，其薪酬收入总额应当不低于公司总部业务及业务管理部门同职级人员的平均水平。 选项C错误：合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名应当不低于中位数。 选项AB为干扰项，教材未提及。","type":"single"},{"id":"cy_fin_3373","q":"中国证监会根据证券公司评价计分的高低，将证券公司分为五大类十一个级别，其中（  ）是正常经营状态的最低等级。","c":{"A":"D级","B":"B级","C":"E级","D":"C级"},"a":"D","an":"中国证监会根据证券公司评价计分的高低，将证券公司分为A(AAA、AA、A)、B(BBB、BB、B)、C(CCC、CC、C)、D、E五大类十一个级别。其中，C级是正常经营状态的最低等级。（D级属于非正常经营状态，E级属于已被风险处置的特殊状态） 综上，该题选D。  【知识拓展】 1. A类公司风险管理能力在行业内最高，能较好地控制新业务、新产品方面的风险； 2. B类公司风险管理能力在行业内较高，在市场变化中能较好地控制业务扩张的风险； 3. C类公司风险管理能力与其现有业务相匹配； 4. D类公司风险管理能力弱，潜在风险可能超过公司可承受范围； 5. E类公司潜在风险已经变为现实风险，已被采取风险处置措施。","type":"single"},{"id":"cy_fin_3375","q":"下列关于分类监管制度对证券公司正向激励作用的说法，错误的是（  ）。","c":{"A":"提升风险控制能力","B":"培育核心竞争力","C":"加强合规管理","D":"便于证券公司广告宣传"},"a":"D","an":"选项D错误：证券公司不得将分类评估结果用于广告、宣传、营销等商业目的。 选项ABC正确：证券公司分类监管制度是证券行业的一项基础性制度，对促进证券公司加强合规管理、提升风险控制能力、培育核心竞争力，发挥了正向激励作用。 综上，该题选D。","type":"single"},{"id":"cy_fin_3377","q":"证券公司应当制定合规管理的基本制度，经（  ）审议通过后实施。","c":{"A":"监事会","B":"经理人员","C":"董事会","D":"审计委员会"},"a":"C","an":"选项C正确：证券公司应当制定合规管理的基本制度，经董事会审议通过后实施。合规管理的基本制度应当明确合规管理的目标、基本原则、机构设置及其职责、履职保障、合规考核、违法违规行为及合规风险隐患的报告、处理和责任追究等内容。证券公司应当结合本公司经营实际情况，制定指导经营活动依法合规开展的具体管理制度或操作流程，切实加强对各项经营活动的合规管理。证券公司应当制定工作人员执业行为准则，引导工作人员树立良好的合规执业意识和道德行为规范，确保工作人员执业行为依法合规。 选项A错误：监事会主要负责监督职责。 选项B错误：经理人员属于执行层，不负责制度审议。 选项D错误：审计委员会是董事会下属的专门委员会，不是最终决策机构。","type":"single"},{"id":"cy_fin_3379","q":"下列属于证券公司全体工作人员应履行的合规管理职责的是（  ）。","c":{"A":"评估合规管理有效性","B":"组织制定公司规章制度，并监督其实施","C":"在业务开展过程中主动识别和防范业务合规风险","D":"建立与合规负责人的直接沟通机制"},"a":"C","an":"选项C正确：证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行下列合规管理职责： (1）主动了解、掌握和遵守相关法律、法规和准则； (2）积极参加公司安排的合规培训和合规宣导活动; (3）根据公司要求，签署并信守相关合规承诺; (4）在执业过程中充分关注执业行为的合法合规性; (5）在业务开展过程中主动识别和防范业务合规风险（C）； (6）发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告; (7）出现合规风险事项时，积极配合公司调查，并接受公司问责，落实整改要求。 选项AD错误：“评估合规管理有效性”、“建立与合规负责人的直接沟通机制”属于证券公司董事会的合规管理职责。 选项B错误：“组织制定公司规章制度，并监督其实施”属于经营管理主要负责人的合规管理职责。","type":"single"},{"id":"cy_fin_3381","q":"证券公司中，应对违反职责范围内的内部控制要求所导致的风险和损失承担首要责任的是（）。","c":{"A":"董事会","B":"直接从事业务经营活动的相关人员","C":"经理层","D":"合规部门"},"a":"B","an":"【直接从事业务经营活动的业务部门和分支机构的相关人员】有义务向证券公司报告内部控制的缺陷，并及时加以纠正。相关人员应对违反职责范围内的内部控制导致的风险和损失承担首要责任。","type":"single"},{"id":"cy_fin_3383","q":"下列关于证券公司工作人员合规管理职责的说法，错误的是（）。","c":{"A":"签署并信守相关合规承诺","B":"发现同事违法违规行为时不用向公司报告","C":"在业务开展过程中主动识别和防范业务合规风险","D":"积极参加公司安排的合规培训和合规宣导活动"},"a":"B","an":"B项说法错误，证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，发现违法违规行为或者合规风险隐患时，应当【主动按照公司规定及时报告】。","type":"single"},{"id":"cy_fin_3385","q":"对于《对于证券公司分类监管规定》，下列说法正确的有（）。 Ⅰ 证券公司分类监管制度是证券行业的一项基础性制度 Ⅱ 证券公司分类管理制度对促进证券公司加强合规管理、提升风险控制能力，培育核心竞争力，发挥了正向激励作用。 Ⅲ 中国证监会根据证券公司分类结果对不同类别的证券公司实施相同对待的监管政策 Ⅳ 证监会根据行业发展情况进一步优化分类评级指标体系，强化证券公司依法合规、稳健经营、提升全面风险管理能力和国内国际竞争力","c":{"A":"Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"D","an":"Ⅲ项错误，中国证监会根据证券公司分类结果对不同类别的证券公司实施【差异化】的监管政策。 Ⅰ、Ⅱ、Ⅳ说法正确。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_3387","q":"黄某在证券公司投资银行部工作，其应当履行的合规管理职责包括（  ）。","c":{"A":"主动了解、掌握和遵守相关法律、法规和准则","B":"评估合规管理有效性","C":"在业务开展过程中主动识别和防范业务合规风险","D":"根据公司要求，签署并信守相关合规承诺"},"a":"A,C,D","an":"选项ACD正确：证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行下列合规管理职责： （1）主动了解、掌握和遵守相关法律、法规和准则； （2）积极参加公司安排的合规培训和合规宣导活动； （3）根据公司要求，签署并信守相关合规承诺； （4）在执业过程中充分关注执业行为的合法合规性； （5）在业务开展过程中主动识别和防范业务合规风险； （6）发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告； （7）出现合规风险事项时，积极配合公司调查，并接受公司问责，落实整改要求。 选项B错误：“评估合规管理有效性”是证券公司董事会的合规管理职责。","type":"multi"},{"id":"cy_fin_3389","q":"某证券公司董事会成员人数为13人，其中内部董事为4人，独立董事为4人，董事会下设薪酬与提名委员会、审计委员会和风险控制委员会，其中审计委员会成员5人，其中含独立董事2人，审计委员会的负责人由独立董事李某担任，其就职于会计师事务所并具有10年以上从业经验。 不考虑其他影响因素，请根据上述背景信息回答以下问题。依据以上信息，以下说法错误的是（  ）。","c":{"A":"该审计委员会独立董事人数符合法律法规要求","B":"该董事会独立董事人数符合法律法规要求","C":"该董事会内部董事人数符合法律法规要求","D":"该董事会人数符合法律法规要求"},"a":"A","an":"选项A错误：审计委员会中独立董事的人数不得少于1/2，并且至少有1名独立董事从事会计工作5年以上。本题中，审计委员会的独立董事为2人，审计委员会成员为5人，未达到1/2的要求（至少需2.5人也就是3人）。 选项B正确：当内部董事人数占董事人数1/5以上时，独立董事人数不得少于董事人数的1/4。本题中，内部董事4人，占董事会13人的30.8%（＞1/5），独立董事4人，占董事会成员人数比例为4/13=30.8%，高于1/4的最低要求，故符合要求。 选项C正确：证券公司设董事会的，内部董事人数不得超过董事人数的1/2。内部董事4人＜董事会成员13人/2，故符合要求。 选项D正确：股份有限公司设董事会(规模较小或者股东人数较少的股份有限公司，可以不设董事会，设1名董事，行使《公司法》规定的董事会的职权)，其成员为3人以上，13人符合要求。 题目问的是“说法错误的”。综上，该题选A。","type":"single"},{"id":"cy_fin_3391","q":"根据《证券公司全面风险管理规范》，下列关于证券公司风险文化的说法，错误的有（）。 I 仅在总部推行稳健的风险文化 II 在分支机构推行保守的风险文化 III 形成与本公司相适应的风险管理理念 IV 形成与行业相适应的风险管理理念","c":{"A":"I、III","B":"II、III","C":"II、III、IV","D":"I、II、IV"},"a":"D","an":"证券公司应当在【全公司】推行稳健的风险文化（I、II项说法错误），形成与【本公司】相适应的风险管理理念（IV项说法错误）、价值准则、职业操守，建立培训、传达和监督机制。","type":"single"},{"id":"cy_fin_3393","q":"根据《证券公司风险控制指标管理办法》，下列关于证券公司必须持续符合风险控制指标标准的说法，正确的有（）。 I 风险覆盖率不得低于100% II 资本杠杆率不得低于100% III 流动性覆盖率不得低于100% IV 净稳定资金率不得低于100%","c":{"A":"I、II、III、IV","B":"I、 II、 IV","C":"I、III、 IV","D":"II、III"},"a":"C","an":"证券公司必须持续符合下列风险控制指标标准： (1) 风险覆盖率不得低于100% ； (2) 资本杠杆率不得低于【8% 】；（II项错误） (3) 流动性覆盖率不得低于100% ； (4) 净稳定资金率不得低于100% 。","type":"single"},{"id":"cy_fin_3395","q":"证券公司无法以合理成本及时获取充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金风险是指（）。","c":{"A":"操作风险","B":"流动性风险","C":"信用风险","D":"市场风险"},"a":"B","an":"选项B正确：流动性风险，是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项A错误：操作风险，是指由于不完善或有问题的内部程序、员工和信息科技系统,以及外部事件所造成损失的风险。   选项C错误：信用风险，是指因融资方、交易对手或发行人等违约导致损失的风险。  选项D错误：市场风险，是指由于基础资产市场价格的不利变动或者急剧波动而导致衍生工具价格或者价值变动的风险。","type":"single"},{"id":"cy_fin_3397","q":"根据《证券公司信用风险管理指引》，下列关于信用风险识别、评估和控制要求的说法，正确的是（）。","c":{"A":"根据市场变化、业务变化和风险水平情况，在压力测试中应考虑信用风险因素","B":"对于涉及信用风险的业务，证券公司不应根据业务特点设置合理的准入要求，而应设置统一性标准","C":"基于信用风险的外部性，常态化的压力测试机制不包括信用风险压力测试","D":"对于涉及信用风险的业务，应根据融资人、债务人的需要确定尽职调查覆盖的业务范围"},"a":"A","an":"A项正确，证券公司应当根据全面风险管理要求，建立常态化的信用风险压力测试机制，并根据市场变化、业务变化和风险水平情况，在压力测试中充分考虑信用风险因素。  B项错误，不是统一标准。对于涉及信用风险的业务，证券公司应根据业务特点设置合理的准入要求。 C项错误，常态化压力测试包括信用风险压力测试。证券公司应当根据全面风险管理要求，建立常态化的信用风险压力测试机制，并根据市场变化、业务变化和风险水平情况，在压力测试中充分考虑信用风险因素。 D项错误，不是根据融资人、债务人的需要确定业务范围。证券公司应根据监管要求、内部实际情况及管理需要确定尽职调查覆盖的业务范围。","type":"single"},{"id":"cy_fin_3399","q":"根据《证券公司全面风险管理规范》，证券公司（）对全面风险管理承担主要责任。","c":{"A":"首席风险官","B":"董事会","C":"经理层","D":"风险管理部门"},"a":"C","an":"选项C正确：经理层对全面风险管理承担主要责任。 选项A错误：首席风险官负责全面风险管理工作。 选项B错误：董事会承担全面风险管理的最终责任。 选项D错误：风险管理部门负责履行风险管理职责。","type":"single"},{"id":"cy_fin_3401","q":"证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求风险是指（）。","c":{"A":"操作风险","B":"流动性风险","C":"信用风险","D":"市场风险"},"a":"B","an":"选项B正确：流动性风险，是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项A错误：操作风险是指由不完善或有问题的内部程序、人员、信息技术系统，以及外部事件造成损失的风险。一般包括法律风险，但不包括战略风险和声誉风险。 选项C错误：信用风险指因融资方、交易对手或发行人等违约导致损失的风险。 选项D错误：市场风险是指由于基础资产市场价格的不利变动或者急剧波动而导致衍生工具价格或者价值变动的风险。","type":"single"},{"id":"cy_fin_3403","q":"证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险是（  ）。","c":{"A":"信用风险","B":"操作风险","C":"流动性风险","D":"声誉风险"},"a":"C","an":"选项C正确：流动性风险，是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项A错误：信用风险指因融资方、交易对手或发行人等违约导致损失的风险。 选项B错误：操作风险是指由不完善或有问题的内部程序、人员、信息技术系统，以及外部事件造成损失的风险。一般包括法律风险，但不包括战略风险和声誉风险。 选项D错误：声誉风险是指由于证券经营机构行为或外部事件，及其工作人员违反廉洁规定、职业道德、业务规范、行规行约等相关行为，导致投资者、发行人、监管机构、自律组织、社会公众、媒体等对证券公司形成负面评价，从而损害其品牌价值，不利其正常经营，甚至影响到市场稳定和社会稳定的风险。","type":"single"},{"id":"cy_fin_3405","q":"根据《证券公司风险控制指标管理办法》，证券公司应建立以 （  ）和流动性为核心的风险控制指标体系。","c":{"A":"净资本","B":"净利润","C":"净资产","D":"总负债"},"a":"A","an":"为了建立以净资本和流动性为核心的风险控制指标体系，加强证券公司风险监管，督促证券公司加强内部控制、提升风险管理水平、防范风险，证券公司应当按照中国证监会制定的《证券公司风险控制指标管理办法》,遵循审慎、实质重于形式的原则，计算净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等各项风险控制指标，编制风险控制指标监管报表。","type":"single"},{"id":"cy_fin_3407","q":"根据《证券公司全面风险管理规范》，证券公司 （  ）对公司全面风险管理承担主要责任。","c":{"A":"首席风险官","B":"董事会","C":"经理层","D":"风险管理部门"},"a":"C","an":"选项C正确，选项B错误：证券公司董事会承担全面风险管理的最终责任；证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)承担全面风险管理的监督责任；证券公司经理层对全面风险管理承担主要责任。 选项A错误：首席风险官负责全面风险管理的具体实施工作 选项D错误：风险管理部门是执行具体风险管理工作的部门","type":"single"},{"id":"cy_fin_3409","q":"下列不属于证券公司风险控制指标的是 （  ）。","c":{"A":"净资产","B":"风险覆盖率","C":"资本杠杆率","D":"净资本"},"a":"A","an":"为了建立以净资本和流动性为核心的风险控制指标体系，加强证券公司风险监管，督促证券公司加强内部控制、提升风险管理水平、防范风险，证券公司应当按照中国证监会制定的《证券公司风险控制指标管理办法》,遵循审慎、实质重于形式的原则，计算净资本（D属于）、风险覆盖率（B属于）、资本杠杆率（C属于）、流动性覆盖率、净稳定资金率等各项风险控制指标，编制风险控制指标监管报表。     A项，净资产是会计概念。","type":"single"},{"id":"cy_fin_3411","q":"根据《证券公司风险控制指标管理办法》规定，下列关于证券公司风险控制指标标准的说法，错误的是 （  ）。","c":{"A":"风险覆盖率不得低于 80%","B":"资本杠杆率不得低于 8%","C":"净稳定资金率不得低于 100%","D":"流动性覆盖率不得低于 100%"},"a":"A","an":"证券公司必须持续符合下列风险控制指标标准: 1.风险覆盖率不得低于100% ;（A错误） 2.资本杠杆率不得低于8%;（B正确） 3.流动性覆盖率不得低于100%;（D正确） 4.净稳定资金率不得低于100%。（C正确）","type":"single"},{"id":"cy_fin_3413","q":"根据《证券公司声誉风险管理指引》，下列不属于声誉风险管理应遵循的原则是（  ）。","c":{"A":"从高层做起原则","B":"预防第一原则","C":"审慎管理原则","D":"快速响应原则"},"a":"A","an":"声誉风险管理应遵循全程全员原则（并非高层做起，A错误）、预防第一原则（B）、审慎管理原则（C）、快速响应原则（D）。 综上，该题选A。","type":"single"},{"id":"cy_fin_3415","q":"证券公司应在（  ）的领导下推动全面风险管理工作。","c":{"A":"首席风险官","B":"合规总监","C":"首席信息官","D":"董事会秘书"},"a":"A","an":"选项A正确：证券公司应当指定或者设立专门部门履行风险管理职责，在首席风险官的领导下推动全面风险管理工作。 选项B错误：合规总监主要负责合规管理（确保公司遵守法律法规、监管要求），而非全面风险管理。 选项C错误：首席信息官负责信息技术治理与网络安全。 选项D错误：董事会秘书（董秘）负责公司股东会和董事会会议的筹备、文件保管以及公司股东资料的管理，办理信息披露事务等事宜，不参与风险管理的具体执行。","type":"single"},{"id":"cy_fin_3417","q":"下列不属于证券公司流动性风险管理目标的是（）。","c":{"A":"对流动性风险实施有效识别、计量","B":"对流动性风险实施有效监测和控制","C":"确保其流动性需求能够及时以最低成本得到满足","D":"建立健全流动性风险管理体系"},"a":"C","an":"证券公司流动性风险管理的目标，是建立健全流动性风险管理体系（D项正确），对流动性风险实施有效识别、计量、监测和控制（AB两项正确），确保其流动性需求能够及时以【合理成本】得到满足（C项错误）。","type":"single"},{"id":"cy_fin_3419","q":"根据《证券公司流动性风险管理指引》有关规定，下列关于证券公司流动性风险限额的说法，正确的有（）。 I 外部市场发展变化情况是证券公司设定流动性风险限额的重要依据 II 证券公司应当对流动性风险限额的执行情况进行监控 III 证券公司应至少每两年对流动性风险限额进行一次评估 IV 证券公司应当根据监管要求设定流动性风险限额","c":{"A":"I、II、IV","B":"I、III、IV","C":"II、III","D":"I、II、III、IV"},"a":"A","an":"III项错误，证券公司应至少【每年】对流动性风险限额进行一次评估，必要时进行调整。 Ⅰ、Ⅱ、Ⅳ说法正确。 故本题选A，选项BCD错误。","type":"single"},{"id":"cy_fin_3421","q":"证券公司应当在全公司推行稳健的风险文化，形成与本公司相适应的（）。 Ⅰ 风险管理理念 Ⅱ 价值准则 Ⅲ 职业技能 Ⅳ 监督机制","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅳ"},"a":"D","an":"证券公司应当在全公司推行稳健的风险文化，形成与本公司相适应的风险管理理念（Ⅰ正确）、价值准则（Ⅱ正确）、职业操守（不是职业技能，Ⅲ错误），建立培训、传达和监督机制（Ⅳ正确）。 故本题选D，选项ABC错误。","type":"single"},{"id":"cy_fin_3423","q":"流动性风险，是指证券公司无法以合理成本及时获得充足资金，以（）的资金需求的风险。","c":{"A":"进行套期保值","B":"履行其他支付义务","C":"满足正常业务开展","D":"偿付到期债务"},"a":"B,C,D","an":"选项BCD正确：流动性风险，是指证券公司无法以合理成本及时获得充足资金，以偿付到期债务、履行其他支付义务和满足正常业务开展的资金需求的风险。 选项A错误：套期保值属于风险管理手段，与流动性风险的定义无直接关联。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_fin_3425","q":"根据《证券公司流动性风险管理指引》，证券公司流动性风险管理是建立健全流动性风险管理体系，对流动性风险采取（）等措施，以有效管控流动性风险。","c":{"A":"识别、计量","B":"分析、调查","C":"报告、调整","D":"监测、控制"},"a":"A,D","an":"选项AD正确：证券公司流动性风险管理的目标，是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。 选项BC为干扰项，教材未提及。","type":"multi"},{"id":"cy_fin_3427","q":"根据《证券公司全面风险管理规范》，证券公司应要求并确保子公司在整体风险偏好和风险管理制度框架下，建立自身的（），保障全面风险管理的一致性和有效性。","c":{"A":"风险管理组织架构","B":"制度流程","C":"风控指标体系","D":"信息技术系统"},"a":"A,B,C,D","an":"证券公司应当将子公司的风险管理纳入统一体系，对其风险管理工作实行垂直管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的一致性和有效性。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_fin_3429","q":"下列属于证券公司风险控制指标的有（  ）。","c":{"A":"净资本","B":"净稳定资金率","C":"资本杠杆率","D":"流动性覆盖率"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司风险控制指标体系以净资本和流动性为核心，主要包括净资本、风险覆盖率、资本杠杆率、流动性覆盖率、净稳定资金率等各项风险控制指标。","type":"multi"},{"id":"cy_fin_3431","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，中国证监会派出机构应当责令公司限期改正。整改期内中国证监会及其派出机构应当区别情形，可以对证券公司采取的措施有（  ）。","c":{"A":"限制转让财产或在财产上设定其他权利","B":"限制薪酬发放","C":"限制分配红利","D":"停止批准新业务"},"a":"A,C,D","an":"选项ACD正确：整改期内，中国证监会及其派出机构应当区别情形，对证券公司采取下列措施： （1）停止批准新业务； （2）停止批准增设、收购营业性分支机构； （3）限制分配红利； （4）限制转让财产或在财产上设定其他权利。 选项B错误：证券公司未按期完成整改的，自整改期限到期的次日起，派出机构应当区别情形，对其采取下列措施： (1)限制业务活动； (2)责令暂停部分业务； (3)限制向董事、监事、高级管理人员支付报酬、提供福利； (4)责令更换董事、监事、高级管理人员或者限制其权利； (5)责令负有责任的股东转让股权，限制负有责任的股东行使股东权利； (6)认定负有责任的董事、监事、高级管理人员为不适当人选； (7)中国证监会及其派出机构认为有必要采取的其他措施。","type":"multi"},{"id":"cy_fin_3433","q":"根据《证券公司流动性风险管理指引》，下列关于证券公司流动性风险限额的说法，正确的有（）。","c":{"A":"证券公司流动性风险限额一经设定，不得调整","B":"证券公司应当对流动性风险限额的执行情况进行监控","C":"证券公司应至少每年对流动性风险限额进行一次评估","D":"证券公司应当根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况设定流动性风险限额"},"a":"B,C,D","an":"选项BD正确：证券公司应对流动性风险实施限额管理，根据其业务规模、性质、复杂程度、流动性风险偏好和外部市场发展变化、监管要求等情况，设定流动性风险限额并对其执行情况进行监控。 选项C正确，选项A错误：证券公司应至少每年对流动性风险限额进行一次评估，必要时进行调整（并非不得调整）。","type":"multi"},{"id":"cy_fin_3435","q":"根据《证券公司风险控制指标管理办法》，下列关于证券公司应持续符合的风险控制指标标准的说法，正确的有（  ）。","c":{"A":"流动性覆盖率不得低于100%","B":"净稳定资金率不得低于100%","C":"风险覆盖率不得低于80%","D":"资本杠杆率不得低于8%"},"a":"A,B,D","an":"证券公司必须持续符合下列风险控制指标标准： 1、风险覆盖率不得低于100%（C错误）；  2、资本杠杆率不得低于8%（D）；  3、流动性覆盖率不得低于100%（A）；  4、净稳定资金率不得低于100%（B）。 综上，该题选ABD。","type":"multi"},{"id":"cy_fin_3437","q":"根据《证券公司风险控制指标管理办法》，净资本指标不符合规定标准时，证券公司应当向（）报告。","c":{"A":"公司全体董事","B":"中国证券业协会","C":"中国证监会派出机构","D":"公司全体股东"},"a":"A,C,D","an":"选项ACD正确：净资本指标与上月相比发生20%以上不利变化或不符合规定标准时，证券公司应当在5个工作日内向公司全体董事报告（A），10个工作日内向公司全体股东报告（D）。 证券公司的净资本等风险控制指标达到预警标准或者不符合规定标准的，应当分别在该情形发生之日起3个、1个工作日内，向中国证监会及其派出机构报告（C），说明基本情况、问题成因以及解决问题的具体措施和期限。 选项B错误：中国证券业协会非行政监管主体，无权接收风险控制指标报告，其职能为行业自律管理（如组织培训、制定行业规范）。","type":"multi"},{"id":"cy_fin_3439","q":"证券公司应当在全公司推⾏稳健的⻛险⽂化，形成与本公司相适应的（  ）。","c":{"A":"⻛险管理理念","B":"价值准则","C":"监督机制","D":"职业操守"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司应当积极培育中国特色金融文化，践行合规、诚信、专业、稳健的证券行业核心价值观，在全公司推行稳健的风险文化，形成与本公司相适应的风险管理理念、价值准则、职业操守，建立培训、宣导和监督机制并纳入考核体系。","type":"multi"},{"id":"cy_fin_3441","q":"根据《证券公司信用风险管理指引》，证券公司应当建立健全内部评级管理制度，内部评级管理制度应当覆盖涉及信用风险的所有业务。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当建立健全内部评级管理制度，证券公司可根据内部实际情况及管理需要确定（并非强制覆盖所有业务）内部评级管理制度覆盖的业务范围。","type":"judge"},{"id":"cy_fin_3443","q":"证券公司董事会承担全面风险管理的最终责任。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司董事会承担全面风险管理的最终责任。","type":"judge"},{"id":"cy_fin_3445","q":"根据《证券公司风险处置条例》，证券公司风险控制指标不符合有关规定，在规定期限内未能完成整改的，中国证券业协会可以责令证券公司停止部分或者全部业务进行整顿。停业整顿的期限不超过3月。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司风险控制指标不符合有关规定，在规定期限内未能完成整改的，国务院证券监督管理机构（并非中国证券业协会）可以责令证券公司停止部分或者全
