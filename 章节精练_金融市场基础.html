部业务进行整顿。停业整顿的期限不超过3个月。","type":"judge"},{"id":"cy_fin_3447","q":"根据《证券公司风险控制指标管理办法》，证券公司应当建立动态的风险控制指标监控和资本补足机制，确保净资本等各项风险控制指标在每个季末都符合规定标准。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司建立动态的风险控制指标监控和资本补足机制，确保净资本等各项风险控制指标在任一时点（并非固定时点，如每个季末）都符合规定标准。","type":"judge"},{"id":"cy_fin_3449","q":"证券公司应至少每半年对流动性风险限额进行一次评估。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应至少每年（并非每半年）对流动性风险限额进行一次评估，必要时进行调整。","type":"judge"},{"id":"cy_fin_3451","q":"证券经营机构销售产品、提供服务，应当向投资者充分披露产品或服务信息，并向投资者充分展示（），并由投资者签署确认。 Ⅰ 产品或服务的信用风险 Ⅱ 产品或服务的市场风险 Ⅲ 产品或服务的流动性风险 Ⅳ 具体产品或服务的特别风险","c":{"A":"Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"C","an":"Ⅰ、Ⅱ、Ⅲ、Ⅳ正确：经营机构销售产品、提供服务，应当向投资者充分披露产品或服务信息以及有助于投资者作出投资分析判断的其他信息，并向投资者充分揭示【产品或服务的信用风险，市场风险、流动性风险等可能影响投资者权益的主要风险以及具体产品或服务的特别风险】，并由投资者签署确认。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_3453","q":"根据洗钱和恐怖融资客户风险等级划分的基本要求，对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"对于已确立过风险等级的客户，证券公司应根据其风险程度设置相应的重新审核期限，实现对风险的动态追踪。原则上，风险等级最高的客户的审核期限不得超过半年，低一等级客户的审核期限不得超出上一级客户审核期限时长的两倍。对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。","type":"judge"},{"id":"cy_fin_3455","q":"证券公司应对客户参与不同的业务进行不同的风险等级划分，同一客户在证券公司不应有唯一的风险等级。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"对于新建立业务关系的客户，证券公司应在建立业务关系后的10个工作日内，按照收集信息、筛选分析信息、初评和复评的流程，划分其风险等级，同一客户在证券公司应有（并非不应有）唯一的风险等级。","type":"judge"},{"id":"cy_fin_3457","q":"某证券公司拟更换其证券集中交易系统所在主机房、其信息报送的监管要求为（）。","c":{"A":"在开展本业务的五个工作日内向中国证券业协会报送有关资料","B":"在开展本业务的五个工作日内向中国证监会报送有关资料","C":"在开展本业务的十个工作日内向中国证监会报送有关资料","D":"在开展本业务的十个工作日内向中国证券业协会报送有关资料"},"a":"B","an":"证券公司新建或更换重要信息系统所在机房、证券基金交易相关信息系统，应当在开展相关业务活动的【五个工作日】内向【中国证监会】报送有关资料，包括内部审查意见、机房基本信息、技术架构设计、操作流程、信息安全管理资料、业务制度、合规管理及风险管理制度等。","type":"single"},{"id":"cy_fin_3459","q":"中国证监会及其派出机构在对证券公司信息技术管理及服务活动的监管过程中可以采用（  ）等方式开展现场检查及非现场检查。","c":{"A":"渗透测试","B":"漏洞扫描","C":"信息技术风险评估","D":"委托其他证券公司开展检查"},"a":"A,B,C","an":"选项ABC正确： 中国证监会及其派出机构在对证券公司信息技术管理及服务活动的监管过程中，可以采用渗透测试(A项)、漏洞扫描(B项)及信息技术风险评估(C项)等方式开展现场检查及非现场检查。证券公司应当予以配合，如实提供有关文件、资料，不得拒绝、阻碍或隐瞒。 选项D错误：行政检查权不得委托给营利性机构。证券公司属于被监管对象，委托其他证券公司检查构成利益冲突，可能导致券商之间互相包庇或恶意贬低，完全违背执法公正性。","type":"multi"},{"id":"cy_fin_3461","q":"证券公司应当于每年（  ）前，完成对上一年网络和信息安全工作的专项评估，编制网络和信息安全管理年报，报送中国证监会及其派出机构。","c":{"A":"2026年8月31日","B":"2026年12月31日","C":"2026年4月30日","D":"2026年6月30日"},"a":"C","an":"选项C正确：证券公司应当于每年4月30日前，完成对上一年网络和信息安全工作的专项评估，编制网络和信息安全管理年报，报送中国证监会及其派出机构，年报内容包括但不限于网络和信息安全治理情况、人员情况、投入情况、风险情况、处置情况和下一年度工作计划等。  选项ABD为干扰项。","type":"single"},{"id":"cy_fin_3463","q":"根据《融资融券交易风险揭示书必备条款》，融资融券交易不同于普通证券交易所特有的风险是 （  ）。","c":{"A":"市场风险","B":"系统风险","C":"投资风险放大风险","D":"政策风险"},"a":"C","an":"融资融券业务交易风险揭示书的基本内容应包含：提示客户注意融资融券交易具有普通证券交易所具有的政策风险、市场风险、违约风险、系统风险（属于共有风险，ABD错误）等各种风险，以及其特有的投资风险放大（C）等风险。 综上，该题选C。","type":"single"},{"id":"cy_fin_3465","q":"下列属于融资融券业务交易特有风险的有（）。 Ⅰ 市场风险 Ⅱ 投资风险放大 Ⅲ 强制平仓风险 Ⅳ 交易密码泄露风险","c":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅲ、Ⅳ"},"a":"B","an":"提示客户注意融资融券交易具有普通证券交易所具有的政策风险、市场风险、违约风险、系统风险等各种风险，以及其【特有的投资风险放大】等风险。 请注意本题问的是融资融券的“特有”风险，第Ⅰ项不属于特有，第Ⅳ项与题干无关，故不选这两项。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3467","q":"根据《关于进一步加强证券基金经营机构债券交易监管的通知》，债券有关业务应当按照经纪、（）等业务类型分开办理。","c":{"A":"投资顾问","B":"承销","C":"资管","D":"自营"},"a":"A,B,C,D","an":"债券有关业务应按照经纪、自营、承销、资管、投资顾问等类型分开办理，并在人员、账户、资金、信息等方面严格分离，防范利益冲突；债券交易的投资决策、交易执行、风险控制、清算交收等关键岗位应专人负责，禁止岗位兼任或者混合操作。 综上所述，本题选ABCD。","type":"multi"},{"id":"cy_fin_3469","q":"下列属于证券自营业务涉及的部门规章及规范性文件的有（）。","c":{"A":"《证券公司风险控制指标管理办法》","B":"《证券公司证券自营业务指引》","C":"《证券公司监督管理条例》","D":"《关于规范债券市场参与者债券交易业务的通知》"},"a":"A,B,D","an":"选项ABD正确：证券公司证券自营业务涉及的部门规章及规范性文件包括《证券公司风险控制指标管理办法》《证券公司风险控制指标计算标准规定》《证券公司内部控制指引》《证券公司证券自营业务指引》《关于证券公司证券自营业务投资范围及有关事项的规定》《关于规范债券市场参与者债券交易业务的通知》《关于进一步加强证券基金经营机构债券交易监管的通知》等。 选项C错误：《证券公司监督管理条例》属于行政法规，而非部门规章或规范性文件。 综上所述，本题选ABD。","type":"multi"},{"id":"cy_fin_3471","q":"下列关于证券资产管理业务基本要求的说法，错误的有（）。 I 证券公司从事私募资产管理业务，应当遵循自愿、公平、诚实信用、客户利益至上原则 II 证券公司从事私募资产管理业务，应当依法经中国基金业协会批准 III 中国证券业协会依据法律、行政法规等规定，对证券公司私募资产管理业务实施行政管理 IV 证券公司从事私募资产管理业务，应当确保业务开展与资本实力、管理能力和风险控制水平相适应","c":{"A":"I、II、III","B":"I、II、IV","C":"I、III、IV","D":"II、III"},"a":"D","an":"II项错误，证券公司从事私募资产管理业务，应当依法经【中国证监会】批准。 III项错误，【中国证监会及其派出机构】依据法律、行政法规等规定，对证券公司私募资产管理业务实施【监督管理】。","type":"single"},{"id":"cy_fin_3473","q":"根据《证券期货经营机构及其工作人员廉洁从业规定》，下列关于证券期货经营机构工作人员违反廉洁从业规定的说法，错误的是（  ）。","c":{"A":"曾任证券期货经营机构合规风控职务的人员违反廉洁从业规定的，应当从重处理","B":"直接、间接或者唆使、协助他人向监管人员输送利益的，应当从重处理","C":"违反廉洁从业规定，事后及时向中国证券业协会报告，或者积极配合调查的，依法免于追究责任或者从轻、减轻处理","D":"曾为公职人员特别是监管人员违反廉洁从业规定的，应当从重处理"},"a":"C","an":"证券期货经营机构及其工作人员违反《廉洁规定》，有下列情形之一的，中国证监会应当从重处理∶ （1）直接、间接或者唆使、协助他人向监管人员输送利益（B）； （2）连续或者多次违反本规定； （3）涉及金额较大或者涉及人员较多； （4）产生恶劣社会影响； （5）曾为公职人员特别是监管人员（D），以及曾任证券期货经营机构合规风控职务的人员违反本规定（A）； （6）中国证监会认定应当从重处理的其他情形。 证券期货经营机构通过有效的廉洁从业风险管理，主动发现违反《规定》 的行为，并积极有效整改，落实责任追究，完善内部控制制度和业务流程、及时向中国证监会报告的，依法免于追究责任或者从轻、减轻处理。证券期货经营机构工作人员违反《廉洁规定》，事后及时向中国证监会（并非证券业协会，C错误）报告，或者积极配合调查的、依法免于追究责任或者从轻、减轻处理。 综上，该题选C。","type":"single"},{"id":"cy_fin_3475","q":"证券公司在12个月内未完成行政重组的，国务院证券监督管理机构可以决定延长期限12个月。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司在12个月内未完成行政重组的，国务院证券监督管理机构可以决定延长期限【6个月】。  【知识拓展】证券公司风险处置措施时限 1.托管：托管期限一般不超过12个月。满12个月，确需继续托管的，国务院证券监督管理机构可以决定延长托管期限，但延长托管期限最长不得超过12个月。 2.接管：接管期限一般不超过12个月。满12个月，确需继续接管的，国务院证券监督管理机构可以决定延长接管期限，但延长接管期限最长不得超过12个月。 3.行政重组：行政重组期限一般不超过12个月。满12 个月，行政重组未完成的，国务院证券监督管理机构可以决定延长行政重组期限，但延长行政重组期限最长不得超过6个月。 4.行政清理：行政清理期限一般不超过12个月。满12个月，行政清理未完成的，国务院证券监督管理机构可以决定延长行政清理期限，但延长行政清理期限最长不得超过12个月。","type":"judge"},{"id":"cy_fin_3477","q":"证券公司风险管理部门具备3年以上的（  ）等有关领域工作经历的人员占公司总部员工比例应不低于2%。过期考点","c":{"A":"金融","B":"会计","C":"证券","D":"新闻"},"a":"A,B,C","an":"证券公司风险管理部门具备3年以上的证券、金融、会计、信息技术等有关领域工作经历的人员占公司总部员工比例应不低于2%。","type":"multi"},{"id":"cy_fin_3479","q":"根据《证券公司信用风险管理指引》，下列关于证券公司信用风险管理的说法，正确的有（）。过期考点","c":{"A":"证券公司相关业务部门是信用风险管理的一线主体","B":"证券公司董事会应承担信用风险管理的监督责任","C":"证券公司应建立有效的信用风险管理组织架构","D":"证券公司应建立健全有效的考核及问责机制"},"a":"A,C,D","an":"B项错误，证券公司监事会应承担信用风险管理的监督责任，负责监督检查董事会和经理层在信用风险管理方面的履职尽责情况并督促整改。","type":"multi"},{"id":"cy_fin_3481","q":"证券公司指标发生重大不利变化的应立即向证监会报告。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司的净资本等风险控制指标与上月相比发生不利变化超过20%（题干所述“重大不利变化”太宽泛）的，应当在该情形发生之日起3个工作日内（并非立即），向中国证监会及其派出机构报告，说明基本情况和变化原因。","type":"judge"},{"id":"cy_fin_3483","q":"某证券公司董事会成员人数为13人，其中内部董事为4人，独立董事为4人，董事会下设薪酬与提名委员会、审计委员会和风险控制委员会，其中审计委员会成员5人，其中含独立董事2人，审计委员会的负责人由独立董事李某担任，其就职于会计师事务所并具有10年以上从业经验。 不考虑其他影响因素，请根据上述背景信息回答以下问题。该证券公司董事会中，除需要满足作为董事的任职条件外，同时应当符合一般证券从业人员的任职条件的有（  ）。","c":{"A":"从事投行业务管理工作的内部董事赵某","B":"董事长王某","C":"来自股东公司的外部董事张某","D":"担任审计委员会负责人的独立董事李某"},"a":"A,B","an":"超纲 选项AB正确：拟任证券公司董事长、高级管理人员以及其他从事业务管理工作的人员，除需满足董事任职条件外，还应当符合证券从业人员条件。 选项CD错误：独立董事（如审计委员会负责人李某）和普通外部董事（如张某）只需满足董事任职条件，不要求必须符合证券从业人员条件。","type":"multi"},{"id":"cy_fin_3485","q":"对于融资类业务，证券公司应对跨部门或跨主体的同一业务制定相对一致的风险管理流程和标准，并遵循（）原则制定同一客户的认定标准，对同一客户的融资类业务进行汇总和监控。","c":{"A":"了解你的客户","B":"内部制衡性","C":"可靠性","D":"全流程风控"},"a":"A","an":"选项A正确：对于融资类业务，证券公司应对跨部门或跨主体的同一业务制定相对一致的风险管理流程和标准，并遵循“了解你的客户”原则制定同一客户的认定标准，对同一客户的融资类业务进行汇总和监控。 选项BCD为干扰项，教材无。","type":"single"},{"id":"cy_fin_3487","q":"关于证券公司合规负责人进行合规审查和合规检查的规定，下列说法错误的是（）。","c":{"A":"合规负责人应当对证券公司内部规章制度、重大决策、新产品和新业务方案等进行合规审查，并出具书面合规审查意见","B":"证券公司应当建立新产品、新业务评估与决策机制，合规负责人和合规部门应当对新产品、新业务发表合规审查意见","C":"合规负责人发现证券公司存在违法违规行为或合规风险隐患的，应当依照公司章程规定及时向监事会报告","D":"公司董事会、监事会、高级管理人员、合规负责人或合规部门认为必要的，证券公司应当进行专项检查"},"a":"C","an":"选项C错误：合规负责人发现证券公司存在违法违规行为或合规风险隐患的，应当依照公司章程规定及时向董事会、经营管理主要负责人报告。 选项ABD说法正确。","type":"single"},{"id":"cy_fin_3489","q":"关于证券投资顾问业务关键环节的要求，下列说法正确的是（）。","c":{"A":"必要时，证券投资顾问可以凭借自己的专业知识代客户作出投资决策","B":"证券投资顾问可以在自己业务能力范围内向客户承诺或者保证适当的投资收益","C":"证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，不需要向客户说明证券研究报告的发布人、发布日期","D":"证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议"},"a":"D","an":"选项D正确：证券投资顾问不得通过广播、电视、网络、报刊等公众媒体，作出买入、卖出或者持有具体证券的投资建议。 选项A错误：证券投资顾问不得代客户作出投资决策。 选项B错误：证券投资顾问向客户提供投资建议，应当提示潜在的投资风险，禁止以任何方式向客户承诺或者保证投资收益。 选项C错误：证券投资顾问依据本公司或者其他证券公司、证券投资咨询机构的证券研究报告作出投资建议的，应当向客户说明证券研究报告的发布人、发布日期。","type":"single"},{"id":"cy_fin_3491","q":"证券公司应当在每月结束之日起（）个工作日内，向中国证监会及其派出机构报送月度风险控制指标监管报表。","c":{"A":"5","B":"6","C":"4","D":"7"},"a":"D","an":"证券公司应当在每月结束之日起7个工作日内，向中国证监会及其派出机构报送月度风险控制指标监管报表。","type":"single"},{"id":"cy_fin_3493","q":"建立健全全面风险管理体系，是为了确保证券公司承受的风险与（  ）相适应。","c":{"A":"同行业风险水平","B":"股东短期回报要求","C":"总体发展战略目标","D":"市场波动周期"},"a":"C","an":"选项C正确：证券公司全面风险管理目标是建立健全全面风险管理体系，确保承受的风险与总体发展战略目标相适应。 选项ABD为干扰项","type":"single"},{"id":"cy_fin_3495","q":"下列选项中，属于证券公司风险处置措施的是（）。","c":{"A":"自保风险","B":"风险转移","C":"接管","D":"破产重组"},"a":"C","an":"选项C正确：证券公司风险处置措施包括停业整顿、托管、接管、行政重组、撤销、行政清理及破产清算和重整。 选项AB错误：教材无，「自保风险「和「风险转移「属于风险管理手段 选项D错误：「破产重组「是E类公司的司法程序","type":"single"},{"id":"cy_fin_3497","q":"关于证券公司流动性风险管理目标，下列描述最准确的是（）。","c":{"A":"确保公司可以应对紧急情况下的流动性需求","B":"制定有效的流动性风险应急计划","C":"确保具有充足的日间流动性头寸和相关融资安排，及时满足正常和压力情景下的日间支付需求","D":"建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足"},"a":"D","an":"选项D正确：证券公司流动性风险管理目标是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。 选项A错误：仅涉及应急场景 选项B错误：只强调应急计划 选项C错误：针对日间流动性管理，是操作层面的要求。","type":"single"},{"id":"cy_fin_3499","q":"下列属于证券公司全体工作人员应当履行的合规管理职责的是（）。","c":{"A":"主动了解、掌握和遵守相关法律、法规和准则","B":"积极参加公司安排的合规培训和合规宣导活动","C":"发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告","D":"积极配合合规负责人及合规部门的工作，认真听取并落实合规负责人及合规部门提出的合规管理意见"},"a":"A,B,C","an":"选项ABC正确：证券公司全体工作人员应当对自身经营活动范围内所有业务事项和执业行为的合规性负责，履行下列合规管理职责： (1)主动了解、掌握和遵守相关法律、法规和准则； (2)积极参加公司安排的合规培训和合规宣导活动； (3)根据公司要求，签署并信守相关合规承诺； (4)在执业过程中充分关注执业行为的合法合规性； (5)在业务开展过程中主动识别和防范业务合规风险； (6)发现违法违规行为或者合规风险隐患时，应当主动按照公司规定及时报告； (7)出现合规风险事项时，积极配合公司调查，并接受公司问责，落实整改要求。 D项（积极配合合规负责人及合规部门的工作，认真听取并落实合规负责人及合规部门提出的合规管理意见）是下属各单位负责人的合规管理职责。","type":"multi"},{"id":"cy_fin_3501","q":"证券公司在开展业务创新时，应当建立相关机制，包括但不限于（）。","c":{"A":"注重业务创新的过程控制，及时纠正偏离目标行为","B":"在可行性研究的基础上，及时与中国证监会沟通，履行创新业务的报备(报批)程序","C":"对创新业务设计科学合理的流程，制定风险控制措施及相应财务核算、资金管理办法","D":"建立完整的业务创新工作程序，严格内部审批程序，对可行性研究、产品或业务设计、风险管理、运作与实施方案等作出明确要求，并经董事会批准"},"a":"A,B,C,D","an":"证券公司在开展业务创新时，应当建立相关机制，包括但不限于： （1）建立完整的业务创新工作程序，严格内部审批程序，对可行性研究、产品或业务设计、风险管理、运作与实施方案等作出明确要求，并经董事会批准。（D正确） （2）在可行性研究的基础上，及时与中国证监会沟通，履行创新业务的报备(报批)程序。（B正确） （3）对创新业务设计科学合理的流程，制定风险控制措施及相应财务核算、资金管理办法。（C正确） （4）注重业务创新的过程控制，及时纠正偏离目标行为。（A正确）","type":"multi"},{"id":"cy_fin_3503","q":"全面风险管理是指证券公司董事会、经理层以及全体员工共同参与，对公司经营中的（）等各类风险，进行准确识别、审慎评估、动态监控、及时报告、妥善应对及全程管理。","c":{"A":"流动性风险","B":"市场风险","C":"信用风险","D":"声誉风险"},"a":"A,B,C,D","an":"选项ABCD正确：全面风险管理，是指证券公司董事会、经理层以及全体员工共同参与，对公司经营中的流动性风险、市场风险、信用风险、操作风险、声誉风险等各类风险，进行准确识别、审慎评估、动态监控、及时报告、妥善应对及全程管理。","type":"multi"},{"id":"cy_fin_3505","q":"下列关于证券公司设立的另类投资公司，说法错误的有（）。","c":{"A":"另类子公司下不得再下设任何机构","B":"证券公司不应当将另类子公司的合规与风险管理纳入公司统一体系","C":"另类子公司可以从事投资以外的业务","D":"证券公司应当清晰划分证券公司与另类子公司的业务范围"},"a":"B,C","an":"B项错误，证券公司应当将另类子公司的合规与风险管理纳入公司统一体系。 C项错误，另类子公司不得从事投资之外的业务。 选项AD说法正确。","type":"multi"},{"id":"cy_fin_3507","q":"证券公司各部门、各分支机构和各层级子公司负责人的合规管理职责包括（）。","c":{"A":"在本单位组织贯彻执行公司各项规章制度，组织起草、制定与本单位职责相关的规章制度，并监督其实施","B":"建立并完善本单位的合规管理制度与机制，将各项经营活动的合规性要求嵌入业务管理制度与操作流程中","C":"支持本单位合规管理人员的工作，为本单位合规管理人员提供履职保障","D":"发现与本单位业务相关的合规风险事项时，及时按公司制度规定进行报告，提出整改措施，并督促整改落实"},"a":"A,B,C,D","an":"证券公司各部门、各分支机构和各层级子公司负责人负责落实本单位的合规管理目标，对本单位合规运营承担责任： （1）在本单位组织贯彻执行公司各项规章制度，组织起草、制定与本单位职责相关的规章制度，并监督其实施；（A正确）  （2）建立并完善本单位的合规管理制度与机制，将各项经营活动的合规性要求嵌入业务管理制度与操作流程中；（B正确） （3）在本单位主动倡导合规经营理念，积极培育公司合规文化； （4）积极配合合规负责人及合规部门的工作，认真听取并落实合规负责人及合规部门提出的合规管理意见； （5）为本单位配备合格合规管理人员，避免分配与其履行合规职责相冲突的工作； （6）支持本单位合规管理人员的工作，为本单位合规管理人员提供履职保障（C正确），包括但不限于参与本单位重要会议、查阅本单位各类业务与管理文档、充分尊重其独立发表合规专业意见的权利等； （7）在业务开展前应当充分论证业务的合法合规性，充分听取本单位合规管理人员的合规审查意见，有效评估业务的合规风险，主动避免开展存在合规风险的业务； （8）发现与本单位业务相关的合规风险事项时，及时按公司制度规定进行报告，提出整改措施，并督促整改落实。（D正确）","type":"multi"},{"id":"cy_fin_3509","q":"证券公司的网络和信息安全管理年报内容包括（）。","c":{"A":"人员情况","B":"投入情况","C":"风险情况","D":"网络和信息安全治理情况"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司的网络和信息安全管理年报内容包括但不限于网络和信息安全治理情况、人员情况、投入情况、风险情况、处置情况和下一年度工作计划等。","type":"multi"},{"id":"cy_fin_3511","q":"证券公司新建或更换重要信息系统所在机房、证券基金交易相关信息系统，应当在开展相关业务活动的5个工作日内向中国证监会报送有关资料，包括（）等。","c":{"A":"内部审查意见","B":"机房基本信息","C":"技术架构设计","D":"业务制度"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司新建或更换重要信息系统所在机房、证券基金交易相关信息系统，应当在开展相关业务活动的5个工作日内向中国证监会报送有关资料，包括内部审查意见、机房基本信息、技术架构设计、操作流程、信息安全管理资料、业务制度、合规管理及风险管理制度等。","type":"multi"},{"id":"cy_fin_3513","q":"客户信用证券账户内的证券，出现以下()等情形时，证券公司在计算客户维持担保比例时，可以根据与客户的约定按照公允价格或其他定价方式计算其市值。","c":{"A":"被调出可充抵保证金证券范围","B":"被暂停交易","C":"被实施风险警示","D":"因权益处理等产生尚未到账的在途证券"},"a":"A,B,C,D","an":"选项ABCD正确：客户信用证券账户内的证券，出现被调出可充抵保证金证券范围、被暂停交易、被实施风险警示等特殊情形或者因权益处理等产生尚未到账的在途证券，证券公司在计算客户维持担保比例时，可以根据与客户的约定按照公允价格或其他定价方式计算其市值。","type":"multi"},{"id":"cy_fin_3515","q":"证券公司借助信息技术手段从事证券基金业务活动的，应当在业务系统上线之后，上线与业务活动复杂程度和风险状况相适应的风险管理系统或相关功能，对风险进行识别、监控、预警和干预。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司借助信息技术手段从事证券基金业务活动的，应当在业务系统上线时，同步上线（应同步上线，而不应有前后之分）与业务活动复杂程度和风险状况相适应的风险管理系统或相关功能，对风险进行识别、监控、预警和干预。","type":"judge"},{"id":"cy_fin_3517","q":"证券公司应将工作人员声誉情况纳入人事管理体系，在进行人员招聘和后续工作人员管理、考核、晋升等情形时，应对工作人员的历史声誉情况予以考察评估，并作为重要判断依据。()","c":{"1":"对","0":"错"},"a":"1","an":"本题考查声誉风险的约束、评价及问责机制。证券公司应将工作人员声誉情况纳入人事管理体系，在进行人员招聘和后续工作人员管理、考核、晋升等情形时，应对工作人员的历史声誉情况予以考察评估，并作为重要判断依据。","type":"judge"},{"id":"cy_fin_3519","q":"甲证券公司从风险管理水平与业务的匹配度，风险计量模型与监测分析的可靠性，风险限额和管控机制的执行力，风险预警、报告、反馈、应对、处置链条的完备性等方面审慎评估全面风险管理的有效性。评估后发现公司存在部分高风险业务、子公司的风险管控思路还停留在“定制度”的初级阶段；信用风险管控不足，与债券交易规模呈现出一定程度的不匹配，导致风险事件频发等问题。目前，甲证券公司的(  )对全面风险管理承担主要责任。","c":{"A":"董事会","B":"经理层","C":"风险管理部门","D":"监事会"},"a":"B","an":"证券公司董事会承担全面风险管理的最终责任；证券公司监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)承担全面风险管理的监督责任；证券公司经理层对全面风险管理承担主要责任。","type":"single"},{"id":"cy_fin_3521","q":"下列关于证券公司流动性风险管理目标，描述最准确的是（）。","c":{"A":"建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足","B":"确保具有充足的日间流动性头寸和相关融资安排，及时满足正常和压力情景下的日间支付需求","C":"确保公司可以应对紧急情况下的流动性需求","D":"制定有效的流动性风险应急计划"},"a":"A","an":"选项A正确：证券公司流动性风险管理的目标是建立健全流动性风险管理体系，对流动性风险实施有效识别、计量、监测和控制，确保其流动性需求能够及时以合理成本得到满足。 选项BCD为干扰项，描述片面。","type":"single"},{"id":"cy_fin_3523","q":"下列哪一项不属于证券公司流动性风险管理应遵循的原则（  ）。","c":{"A":"全面性","B":"收益性","C":"审慎性","D":"预见性"},"a":"B","an":"证券公司流动性风险管理应遵循全面性（A）、审慎性（C）和预见性原则（D）。 综上，该题选B。","type":"single"},{"id":"cy_fin_3525","q":"（）负责督促、检查和评价证券公司各项内部控制制度的建立与执行情况，对内部控制的有效性负最终责任。","c":{"A":"监事会","B":"经理人员","C":"董事会","D":"业务部门和分支机构的负责人负责"},"a":"C","an":"选项C正确：董事会对内部控制的有效性负最终责任。 选项A错误：监事会对督促检查不力等情况承担相应责任。 选项B错误：经理人员对内部控制不力及不及时纠正内部控制缺陷等承担相应责任。 选项D错误：直接从事业务经营活动的业务部门和分支机构的相关人员对违反职责范围内的内部控制导致的风险和损失承担首要责任。","type":"single"},{"id":"cy_fin_3527","q":"下列有关《证券公司风险处置条例》的总体原则，说法错误的是（）。","c":{"A":"《证券公司风险处置条例》的目的是控制和化解证券公司经营风险，保护投资者合法权益和社会公共利益，保障证券业健康发展","B":"《证券公司风险处置条例》是依法制定的行政法规","C":"在证券公司风险处置过程中，各级政府依法对处置证券公司风险工作进行组织、协调和监督","D":"处置证券公司风险过程中，应当保障证券经纪业务正常进行"},"a":"C","an":"选项C错误：在证券公司风险处置过程中，国务院证券监督管理机构依法对处置证券公司风险工作进行组织、协调和监督。 选项ABD说法正确。","type":"single"},{"id":"cy_fin_3529","q":"关于证券交易所的职能和义务，下列说法错误的是（）。","c":{"A":"证券交易所对证券交易实行实时监控，并按照国务院证券监督管理机构的要求，对异常的交易情况提出报告","B":"证券交易所根据需要，可以按照业务规则对出现重大异常交易情况的证券账户的投资者限制交易，并及时报告国务院证券监督管理机构","C":"证券交易所应当加强对证券交易的风险监测，出现重大异常波动的，证券交易所可以按照业务规则采取限制交易、强制停牌等处置措施，并向所属地政府报告","D":"在证券交易所从事证券交易，应当遵守证券交易所依法制定的业务规则"},"a":"C","an":"选项C错误：证券交易所应当加强对证券交易的风险监测，出现重大异常波动的，证券交易所可以按照业务规则采取限制交易、强制停牌等处置措施，并向国务院证券监督管理机构报告。 选项ABD说法正确。","type":"single"},{"id":"cy_fin_3531","q":"证券公司每一名员工对风险管理有效性承担勤勉尽责、审慎防范、及时报告的责任。下列不属于其责任的是()。","c":{"A":"谨慎处理工作中涉及的风险因素","B":"通过学习、经验积累提高风险意识","C":"发现问题时，及时与同事交流分享","D":"发现风险隐患时主动应对并及时履行报告义务"},"a":"C","an":"证券公司每一名员工对风险管理有效性承担勤勉尽责、审慎防范、及时报告的责任。 ABCD四个选项中，只有C项不符合规定，应及时报告，而非私下交流。","type":"single"},{"id":"cy_fin_3533","q":"证券公司风险控制指标无法达标，严重危害证券市场秩序、损害投资者利益的，中国证监会可以区别情形，对其采取下列(  )措施。","c":{"A":"责令停业整顿","B":"指定其他机构托管、接管","C":"撤销经营证券业务许可","D":"认定董事、监事、高级管理人员为不适当人选"},"a":"A,B,C","an":"选项ABC正确：证券公司风险控制指标无法达标，严重危害证券市场秩序、损害投资者利益的，中国证监会可以区别情形，对其采取下列措施： (1)责令停业整顿；  (2)指定其他机构托管、接管；  (3)撤销经营证券业务许可； (4)撤销。 选项D错误：属于证券公司未按期完成整改的，自整改期限到期的次日起，派出机构应当区别情形，对其采取的措施。","type":"multi"},{"id":"cy_fin_3535","q":"在对个人客户进行融资融券业务客户的征信调查时，有关个人客户证券投资经验及风险偏好的调查包括（）。","c":{"A":"投资期限","B":"投资规模","C":"投资风格","D":"风险偏好"},"a":"A,B,C,D","an":"选项ABCD正确：融资融券业务客户的征信调查：证券投资经验及风险偏好应包括但不限于客户的投资期限、投资规模、投资收益、投资风格及风险偏好等。","type":"multi"},{"id":"cy_fin_3537","q":"在证券公司风险处置中，被处置证券公司的（），应当配合证券公司风险处置工作。","c":{"A":"股东","B":"实际控制人","C":"债权人","D":"有关的机构和人员"},"a":"A,B,C,D","an":"选项ABCD正确：被处置证券公司的股东、实际控制人、债权人以及与被处置证券公司有关的机构和人员，应当配合证券公司风险处置工作。","type":"multi"},{"id":"cy_fin_3539","q":"根据《证券公司风险处置条例》的规定，被撤销证券公司停止履行职责的组织机构或高级管理人员包括（）。","c":{"A":"股东会","B":"董事会","C":"监事会","D":"副经理"},"a":"A,B,C,D","an":"选项ABCD正确：被撤销证券公司的股东会或者董事会、监事会以及经理、副经理停止履行职责，行政清理期间被撤销证券公司的股东不得自行组织清算，不得参与行政清理工作。","type":"multi"},{"id":"cy_fin_3541","q":"证券公司分类评价首先设定正常经营的证券公司基准分为10分。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司分类评价首先设定正常经营的证券公司基准分为100分。在基准分的基础上，根据证券公司风险管理能力、持续合规、业务发展、功能发挥等方面情况，进行相应加分或扣分以确定证券公司的评价计分。","type":"judge"},{"id":"cy_fin_3543","q":"根据《证券基金经营机构信息技术管理办法》，证券基金经营机构借助信息技术手段从事证券基金业务活动的，应当在业务系统上线时，同步上线与业务活动复杂程度和风险状况相适应的风险管理系统或相关功能。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司借助信息技术手段从事证券基金业务活动的，应当在业务系统上线时，同步上线与业务活动复杂程度和风险状况相适应的风险管理系统或相关功能，对风险进行识别、监控、预警和干预。","type":"judge"},{"id":"cy_fin_3545","q":"证券公司应当将子公司的风险管理纳入统一体系，对其风险管理工作实行垂直管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的（）和有效性。","c":{"A":"公平性","B":"公正性","C":"全面性","D":"一致性"},"a":"D","an":"证券公司应当依法依规通过公司治理程序将所有子公司(被证券公司控制)纳入全面风险管理体系，对其风险管理工作实行垂直管理并逐步加强一体化管控，从公司治理、风险偏好与风险指标管理、新业务管理、重大事项管理、风险报告、考核评价等方面强化对子公司的风险管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立健全自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的一致性和有效性。 综上，该题选D，选项ABC为干扰项。","type":"single"},{"id":"cy_fin_3547","q":"对于新建立业务关系的客户，证券公司应在建立业务关系后的10个工作日内，按照（）划分其风险等级，同一客户在证券公司应有唯一的风险等级。","c":{"A":"收集信息","B":"客户投资标的风险等级","C":"初评和复评的流程","D":"筛选分析信息"},"a":"A,C,D","an":"选项ACD正确：对于新建立业务关系的客户，证券公司应在建立业务关系后的10个工作日内，按照收集信息、筛选分析信息、初评和复评的流程，划分其风险等级，同一客户在证券公司应有唯一的风险等级。 选项B错误：干扰项设置，投资标的风险等级≠客户风险等级。","type":"multi"},{"id":"cy_fin_3549","q":"证券公司经营管理主要负责人应履行的合规管理职责包括（）。","c":{"A":"评估合规管理有效性","B":"主动在日常经营过程中倡导合规经营理念","C":"组织制定公司规章制度","D":"建立与合规负责人的直接沟通机制"},"a":"B,C","an":"选项BC正确：证券公司经营管理主要负责人对公司合规运营承担责任，履行下列合规管理职责： ①组织制定公司规章制度，并监督其实施； ②主动在日常经营过程中倡导合规经营理念，积极培育公司合规文化，认真履行合规管理职责，主动落实合规管理要求； ③充分重视公司合规管理的有效性，发现存在问题时要求下属各单位及其工作人员及时改进； ④督导、提醒公司其他高级管理人员在其分管领域中认真履行合规管理职责，落实合规管理要求； ⑤支持合规负责人及合规部门工作，督促下属各单位为合规管理人员履职提供有效保障； ⑥支持合规负责人及合规部门按照监管要求和公司制度规定，向董事会、监管部门报告合规风险事项； ⑦在公司经营决策过程中，充分听取合规负责人及合规部门的合规意见； ⑧督促公司下属各单位就合规风险事项开展自查或配合公司调查，严格按照公司规定进行合规问责，并落实整改措施。 选项AD错误：是证券公司董事会的合规管理职责。","type":"multi"},{"id":"cy_fin_3551","q":"证券公司借助信息技术手段从事证券基金业务活动前，应当开展内部审查，验证（）并建立存档记录。","c":{"A":"业务系统的流程设计、功能设置、参数配置和技术实现应当遵循业务合规的原则，不得违反法律法规及中国证监会的规定","B":"风险管理系统功能完备、权限清晰，能够在业务系统上线后运行","C":"具备符合要求的信息系统备份及运维管理能力，能够保障相关系统安全、平稳运行","D":"具备完善的信息安全防护措施，能够保障经营数据和客户信息的安全、完整"},"a":"A,C,D","an":"证券公司借助信息技术手段从事证券基金业务活动前，应当开展内部审查，验证下列事项并建立存档记录： （1）业务系统的流程设计、功能设置、参数配置和技术实现应当遵循业务合规的原则，不得违反法律法规及中国证监会的规定；（A正确） （2）风险管理系统功能完备、权限清晰，能够与业务系统同步上线运行；（并非“后”，B错误） （3）具备完善的信息安全防护措施，能够保障经营数据和客户信息的安全、完整；（D正确） （4）具备符合要求的信息系统备份及运维管理能力，能够保障相关系统安全、平稳运行。（C正确）","type":"multi"},{"id":"cy_fin_3553","q":"证券公司董事会对信息技术管理的有效性承担责任，应当履行的职责有（）。","c":{"A":"审议信息技术战略，确保与本公司的发展战略、风险管理策略、资本实力相一致","B":"建立信息技术人力和资金保障方案","C":"评估年度信息技术管理工作的总体效果和效率","D":"公司章程规定的其他信息技术管理职责"},"a":"A,B,C,D","an":"选项ABCD正确：证券公司董事会负责审议本公司的信息技术管理目标，对信息技术管理的有效性承担责任，履行下列职责： 1.审议信息技术战略，确保与本公司的发展战略、风险管理策略、资本实力相一致；  2.建立信息技术人力和资金保障方案；  3.评估年度信息技术管理工作的总体效果和效率；  4.公司章程规定的其他信息技术管理职责。","type":"multi"},{"id":"cy_fin_3555","q":"证券公司经营管理主要负责人对公司合规运营承担责任，履行下列合规管理职责（）。","c":{"A":"组织制定公司规章制度，并监督其实施","B":"督导、提醒公司其他高级管理人员在其分管领域中认真履行合规管理职责，落实合规管理要求","C":"支持合规负责人及合规部门按照监管要求和公司制度规定，向董事会、监管部门报告合规风险事项","D":"其分管领域组织贯彻执行公司各项规章制度，组织起草、制定其分管领域的规章制度，并监督其实施"},"a":"A,B,C","an":"选项ABC正确：证券公司经营管理主要负责人对公司合规运营承担责任，履行下列合规管理职责： （1）组织制定公司规章制度，并监督其实施； （2）主动在日常经营过程中倡导合规经营理念，积极培育公司合规文化，认真履行合规管理职责，主动落实合规管理要求； （3）充分重视公司合规管理的有效性，发现存在问题时要求下属各单位及其工作人员及时改进； （4）督导、提醒公司其他高级管理人员在其分管领域中认真履行合规管理职责，落实合规管理要求； （5）支持合规负责人及合规部门工作，督促下属各单位为合规管理人员履职提供有效保障； （6）支持合规负责人及合规部门按照监管要求和公司制度规定，向董事会、监管部门报告合规风险事项； （7）在公司经营决策过程中，充分听取合规负责人及合规部门的合规意见； （8）督促公司下属各单位就合规风险事项开展自查或配合公司调查，严格按照公司规定进行合规问责，并落实整改措施。 选项D错误：是其他高级管理人员的合规管理职责之一。","type":"multi"},{"id":"cy_fin_3557","q":"证券公司必须持续符合的风险控制指标标准之一：资本杠杆率不得低于5%。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司必须持续符合下列风险控制指标标准： （1）风险覆盖率不得低于100%； （2）资本杠杆率不得低于8%； （3）流动性覆盖率不得低于100%； （4）净稳定资金率不得低于100%。","type":"judge"},{"id":"cy_fin_3559","q":"证券公司应当至少每半年经主要负责人、首席风险官签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当至少每半年经主要负责人、首席风险官签署确认后，向公司全体董事报告一次公司净资本等风险控制指标的具体情况和达标情况。","type":"judge"},{"id":"cy_fin_3561","q":"证券公司应当建立健全柜台市场产品管理制度，对产品进行分散管理。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当建立健全柜台市场产品管理制度，对产品进行【集中管理】，并对产品合规性和风险等级进行内部审查。","type":"judge"},{"id":"cy_fin_3563","q":"为加强融资融券业务集中统一管理，证券公司分管融资融券业务的高级管理人员应该兼管风险监控部门。（）","c":{"1":"对","0":"错"},"a":"0","an":"负责风险监控和业务稽核的部门和岗位应当独立于其他部门和岗位，分管融资融券业务的高级管理人员【不得】兼管风险监控部门和业务稽核部门。","type":"judge"},{"id":"cy_fin_3565","q":"证券公司应当将子公司的风险管理纳入统一体系，对其风险管理工作实行垂直管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的公平性和公正性。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当将子公司的风险管理纳入统一体系，对其风险管理工作实行垂直管理，要求并确保子公司在整体风险偏好和风险管理制度框架下，建立自身的风险管理组织架构、制度流程、信息技术系统和风控指标体系，保障全面风险管理的一致性和有效性。","type":"judge"},{"id":"cy_fin_3567","q":"下列关于证券公司合规部门、合规管理人员的相关规定，说法错误的是（）。","c":{"A":"证券公司应当设立合规部门","B":"合规部门对合规负责人负责，按照公司规定和合规负责人的安排履行合规管理职责","C":"证券公司应当明确合规部门与法律部门、风险管理部门、内部审计部门等内部控制部门以及其他承担合规管理职责的前中后台部门的职责分工","D":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在10人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员"},"a":"D","an":"选项D错误：证券公司从事自营、投资银行、债券等合规风险管控难度较大的业务部门，工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。 选项ABC正确：证券公司应当设立合规部门。合规部门对合规负责人负责，按照公司规定和合规负责人的安排履行合规管理职责。证券公司应当明确合规部门与法律部门、风险管理部门、内部审计部门等内部控制部门以及其他承担合规管理职责的前台、中台、后台部门的职责分工。合规部门不得承担业务、财务、信息技术等与合规管理相冲突的职责。","type":"single"},{"id":"cy_fin_3569","q":"下列选项中，不属于证券公司风险处置措施的是（）。","c":{"A":"停业整顿","B":"托管","C":"接管","D":"破产重组"},"a":"D","an":"证券公司风险处置措施包括停业整顿（A）、托管（B）、接管（C）、行政重组、撤销、行政清理及破产清算和重整。 题目问的是“不属于”。综上，该题选D。【破产重组是企业破产法中的程序】","type":"single"},{"id":"cy_fin_3571","q":"根据《证券公司场外期权业务管理办法》,下列说法错误的是()。","c":{"A":"交易商发现异常交易的，应当及时向协会报告","B":"中国证监会、协会对交易商执业情况实施定期评估，并根据评估结果实行动态调整","C":"证券公司参与场外期权交易实施集中管理","D":"交易商发生不符合备案条件、合并、分立等情形时，应当自发生之日起5个交易日内向协会报告，接受持续管理"},"a":"C","an":"选项C错误：证券公司参与场外期权交易实施分层管理，根据公司资本实力、分类结果、全面风险管理水平、专业人员及技术系统情况，分为一级交易商和二级交易商。 选项ABD说法正确。","type":"single"},{"id":"cy_fin_3573","q":"现行《证券公司风险处置条例》的内容包括证券公司的（）。","c":{"A":"风险处置方式","B":"监督协调","C":"法律责任","D":"破产清算和重整"},"a":"A,B,C,D","an":"选项ABCD正确：现行《证券公司风险处置条例》全文共七章六十三条，涉及证券公司风险处置方式、破产清算和重整、监督协调、法律责任等内容。","type":"multi"},{"id":"cy_fin_3575","q":"根据《证券公司风险处置条例》的规定，国务院证券监督管理机构发现证券公司存在重大风险隐患，可以派出风险监控现场工作组对证券公司进行专项检查，其监控的内容包括（）。","c":{"A":"划拨资金","B":"处置资产","C":"调配人员","D":"使用印章"},"a":"A,B,C,D","an":"国务院证券监督管理机构发现证券公司存在重大风险隐患，可以派出风险监控现场工作组对证券公司进行专项检查，对证券公司划拨资金（A）、处置资产（B）、调配人员（C）、使用印章（D）、订立以及履行合同等经营、管理活动进行监控，并及时向有关地方人民政府通报情况。","type":"multi"},{"id":"cy_fin_3577","q":"证券公司应当根据自身经营目标和运营状况，结合自身的环境条件，建立有效的内部控制制度、机制。证券公司内部控制应当遵循的原则有（）。","c":{"A":"健全原则","B":"合理原则","C":"独立原则","D":"制衡原则"},"a":"A,B,C,D","an":"选项ABCD正确：内部控制应当贯彻的原则： (1)健全：内部控制应当做到事前、事中、事后控制相统一；覆盖证券公司的所有业务、部门和人员，渗透到决策、执行、监督、反馈等各个环节，确保不存在内部控制的空白或漏洞。 (2)合理：内部控制应当符合国家有关法律法规和中国证监会的有关规定，与证券公司经营规模、业务范围、风险状况及证券公司所处的环境相适应，以合理的成本实现内部控制目标。 (3)制衡：证券公司部门和岗位的设置应当权责分明、相互牵制；前台业务运作与后台管理支持适当分离。 (4)独立：承担内部控制监督检查职能的部门应当独立于证券公司其他部门。","type":"multi"},{"id":"cy_fin_3579","q":"全面风险管理，是指证券公司董事会、经理层以及全体员工共同参与，对公司经营中的流动性风险、市场风险、信用风险、操作风险、声誉风险等各类风险，进行准确识别、审慎评估、动态监控、及时报告、妥善应对及全程管理。（）","c":{"1":"对","0":"错"},"a":"1","an":"全面风险管理，是指证券公司董事会、经理层以及全体员工共同参与，对公司经营中的流动性风险、市场风险、信用风险、操作风险、声誉风险等各类风险，进行准确识别、审慎评估、动态监控、及时报告、妥善应对及全程管理。","type":"judge"},{"id":"cy_fin_3581","q":"对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。（）","c":{"1":"对","0":"错"},"a":"1","an":"对于首次建立业务关系的客户，无论其风险等级高低，证券公司在初次确定其风险等级后的三年内至少应进行一次复核。","type":"judge"},{"id":"cy_fin_3583","q":"证券公司应当根据具体子公司所属行业监管要求和行业（业务）特点，以（  ）相结合的方式推进落实子公司风险管理要求。","c":{"A":"全面管理与重点管理","B":"穿透管理与授权管理","C":"直接管理与间接管理","D":"事前管理与事后管理"},"a":"B","an":"证券公司应当根据具体子公司所属行业监管要求和行业(业务)特点，以穿透管理与授权管理相结合的方式，推进落实子公司风险管理要求。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_3585","q":"因证券公司或其工作人员的经营管理或执业行为违反法律法规和准则而使证券公司被依法追究法律责任、采取监管措施、给予纪律处分、出现财产损失或商业信誉损失的风险是（）。","c":{"A":"战略风险","B":"市场风险","C":"操作风险","D":"合规风险"},"a":"D","an":"选项D正确：证券公司的合规风险是指因证券公司或其工作人员的经营管理或执业行为违反法律法规和准则而使证券公司被依法追究法律责任、采取监管措施、给予纪律处分、出现财产损失或商业信誉损失的风险。 选项A错误：战略风险是指由于公司的长期发展方向、目标或策略与外部环境不匹配而引发的风险。 选项B错误：市场风险是指因市场价格（如利率、汇率、股票价格和商品价格）的不利变动而使公司面临损失的风险。 选项C错误：操作风险是由不完善或有问题的内部程序、人员、信息技术系统，以及外部事件造成损失的风险。","type":"single"},{"id":"cy_fin_3587","q":"证券公司净资本或者其他风险控制指标不符合规定标准的，证监会派出机构应当责令公司限期改正，若证券公司未按时报送整改计划的，证监会派出机构应当（）。","c":{"A":"督促其加快整改","B":"立即限制其业务活动","C":"延长整改期限","D":"不予理睬"},"a":"B","an":"证券公司净资本或者其他风险控制指标不符合规定标准的，证监会派出机构应当责令公司限期改正，在5个工作日内制定并报送整改计划，整改期限最长不超过20个工作日；证券公司未按时报送整改计划的，证监会派出机构应当立即限制其业务活动。","type":"single"},{"id":"cy_fin_3589","q":"发生影响或者可能影响证券公司经营管理、财务状况、风险控制指标或者客户资产安全的重大事件的，证券公司应当立即向国务院证券监督管理机构报送（），说明事件的起因、目前的状态、可能产生的后果和拟采取的相应措施。","c":{"A":"年度报告","B":"半年度报告","C":"月度报告","D":"临时报告"},"a":"D","an":"选项D正确：发生影响或者可能影响证券公司经营管理、财务状况、风险控制指标或者客户资产安全的重大事件的，证券公司应当立即向国务院证券监督管理机构报送临时报告。 选项AC错误：证券公司应当自每一会计年度结束之日起4个月内，向国务院证券监督管理机构报送年度报告；自每月结束之日起7个工作日内，报送月度报告。 选项B为干扰项","type":"single"},{"id":"cy_fin_3591","q":"根据《证券公司全面风险管理规范》，承担全面风险管理的监督责任，负责监督检查证券公司董事会和经理层在风险管理方面履职尽责情况并督促整改的是(  )。","c":{"A":"证券公司首席风险官","B":"证券公司监事会","C":"中国证监会派出机构","D":"中国证监会"},"a":"B","an":"选项B正确：证券公司监事会承担全面风险管理的监督责任，负责监督检查董事会和经理层在风险管理方面的履职尽责情况并督促整改。 选项A错误：首席风险官主要负责全面风险管理工作，推动全面风险管理的具体实施 选项CD错误：中国证监会及其派出机构属于外部监管机构","type":"single"},{"id":"cy_fin_3593","q":"证券公司应当按照法律、行政法规和中国证监会的规定建立完备的(  )。","c":{"A":"盈利评估体系","B":"风险管理体系","C":"合规管理体系","D":"内部控制体系"},"a":"B,C,D","an":"选项BCD正确：证券公司应当按照法律、行政法规和中国证监会的规定建立完备的合规管理、风险管理和内部控制体系。 选项A为干扰项，无此要求，“盈利评估体系”偏向于公司内部财务分析工具，并非法律强制要求设立。","type":"multi"},{"id":"cy_fin_3595","q":"下列关于证券公司董事、监事、高级管理人员的表述，说法正确的有（）。","c":{"A":"证券公司的董事、监事、高级管理人员应当正直诚实、品行良好，熟悉证券法律、行政法规","B":"证券公司的董事、监事、高级管理人员应当具有履行职责所需的经营管理能力","C":"证券公司任免董事、监事、高级管理人员，应当报国务院证券监督管理机构备案","D":"证券公司的董事、监事、高级管理人员未能勤勉尽责，致使证券公司存在重大违法违规行为或者重大风险的，国务院证券监督管理机构可以责令证券公司予以更换"},"a":"A,B,C,D","an":"《证券法》规定证券公司的董事、监事、高级管理人员，应当正直诚实、品行良好，熟悉证券法律、行政法规，具有履行职责所需的经营管理能力。证券公司任免董事、监事、高级管理人员，应当报国务院证券监督管理机构备案。证券公司的董事、监事、高级管理人员未能勤勉尽责，致使证券公司存在重大违法违规行为或者重大风险的，国务院证券监督管理机构可以责令证券公司予以更换。","type":"multi"},{"id":"cy_fin_3597","q":"证券金融公司应当遵守的风险控制指标规定包括（）。","c":{"A":"净资本与各项风险资本准备之和的比例不得低于100％","B":"对单一证券公司转融通的余额，不得超过证券金融公司净资本的50％","C":"融出的每种证券余额不得超过该证券上市可流通市值的15％","D":"充抵保证金的每种证券余额不得超过该证券总市值的15％"},"a":"A,B,D","an":"证券金融公司应当遵守以下风险控制指标规定： （1）净资本与各项风险资本准备之和的比例不得低于100%；（A正确） （2）对单一证券公司转融通的余额，不得超过证券金融公司净资本的50%；（B正确） （3）融出的每种证券余额不得超过该证券上市可流通市值的10%（C错误）； （4）充抵保证金的每种证券余额不得超过该证券总市值的15%。（D正确）","type":"multi"},{"id":"cy_fin_3599","q":"证券公司董事会、监事会或监事、高级管理人员、下属各单位负责人均有自己的合规管理职责。下列关于合规管理职责归属说法正确的有(  )。","c":{"A":"董事会负责在日常经营中培育公司合规文化","B":"监事会对发生重大合规风险负有主要责任或者领导责任的董事、高级管理人员提出罢免的建议","C":"高级管理人员在其分管领域组织贯彻执行公司各项规章制度","D":"下属各单位负责人积极参加公司安排的合规培训和合规宣导活动"},"a":"B,C","an":"选项B正确：证券公司的监事会(或行使监事会职权的监事或董事会设置的由董事组成的审计委员会)履行下列合规管理职责： (1)对董事、高级管理人员履行合规管理职责的情况进行监督； (2)对发生重大合规风险负有主要责任或者领导责任的董事、高级管理人员提出罢免的建议； (3)公司章程规定的其他合规管理职责。 选项C正确：证券公司其他高级管理人员对其分管领域的合规运营承担责任，履行下列合规管理职责： (1)在其分管领域组织贯彻执行公司各项规章制度，组织起草、制定其分管领域的规章制度，并监督其实施； (2)在其分管领域主动倡导合规经营理念，积极培育公司合规文化； (3)充分重视其分管领域合规管理的有效性，发现存在问题时要求分管领域下属各单位及其工作人员及时改进； (4)提醒、督导分管领域下属各单位负责人认真履行合规管理职责，落实合规管理要求； (5)支持分管领域下属各单位合规管理人员的工作，督促分管领域下属各单位为合规管理人员履职提供有效保障； (6)支持分管领域下属各单位及其合规管理人员按照公司制度规定，向公司及合规部门报告合规风险事项； (7)在其职责范围内的经营决策过程中，听取公司合规部门及分管领域下属各单位合规管理人员的合规意见，并给予充分关注； (8)督促分管领域下属各单位就合规风险事项开展自查或配合公司进行调查，严格按照公司规定进行合规问责，并落实整改措施。 A项属于下属各单位负责人的职责，D项属于全体工作人员的职责。","type":"multi"},{"id":"cy_fin_3601","q":"证券公司应当充分挖掘、梳理和分析数据内容，提高管理精细化程度，在业务经营、风险管理与内部控制中加强数据应用，实现同一客户、同类业务分别管理，充分发挥数据价值。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应当充分挖掘、梳理和分析数据内容，提高管理精细化程度，在业务经营、风险管理与内部控制中加强数据应用，实现同一客户、同类业务统一管理，充分发挥数据价值。","type":"judge"},{"id":"cy_fin_3603","q":"证券公司应具备专门风险控制系统对各类债券交易实施分散监控。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司应具备专门风险控制系统对各类债券交易实施集中监控。","type":"judge"},{"id":"cy_fin_3605","q":"证券投资咨询机构从事证券投资顾问业务应当回访，回访的相关资料保存不少于（   ）年。","c":{"A":"3","B":"5","C":"1","D":"2"},"a":"A","an":"证券投资咨询机构可以结合自身状况、业务风险情况等采取不同回访方式，回访方式包括但不限于电话或即时通讯回访、问卷回访、面见回访等。回访应当留痕，相关资料保存不少于3年。","type":"single"},{"id":"cy_fin_3607","q":"证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的（   ）。","c":{"A":"身份","B":"财产与收入状况","C":"投资需求","D":"风险偏好"},"a":"A,B,C,D","an":"证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的身份（选项A）、财产与收入状况（选项B）、证券投资经验、投资需求（选项C）与风险偏好（选项D），在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。 综上所述，本题应选择ABCD选项。","type":"multi"},{"id":"cy_fin_3609","q":"以下关于证券投资顾问业务客户回访机制的说法正确的是（   ）。","c":{"A":"证券投资机构对客户回访的相关资料应当保存不少5年","B":"证券投资咨询机构每年抽取不低于上一年度末购买产品或接受服务的投资者总数的10%进行回访","C":"回访方式包括但不限于电话或即时通讯回访、问卷回访、面见回访等","D":"对客户回访内容只包括客户身份核实，客户账户变动确认，是否向客户充分解读业务规则与揭示风险，分支机构证券从业人员和营销投资顾问人员是否存在违规推介、确保收益或本金不亏损承诺、夸大或不真实营销、违背客户意愿等情形，提醒客户注意身份证件和密码的保管等"},"a":"B,C","an":"选项A错误：客户回访应当留痕，相关资料应当保存不少于3年。  选项D错误：回访内容应当包括但不限于客户身份核实、客户账户变动确认、是否向客户充分解读业务规则与揭示风险，分支机构证券从业人员和营销投资顾问人员是否存在违规推介、确保收益或本金不亏损承诺、夸大或不真实营销、违背客户意愿等情形，提醒客户注意身份证件和密码的保管等","type":"multi"},{"id":"cy_fin_3611","q":"下列关于证券投资顾问业务的流程说法，正确的有（   ）。","c":{"A":"根据客户的需求和特征，选择和设计个性化或者标准化的顾问服务模式","B":"了解客户情况，评估客户的风险承受能力，为客户选择适当的投资顾问服务或产品，告知客户服务内容、方式、收费以及风险情况，由客户自主选择是否签约","C":"公司总部或者证券营业部的投资顾问团队根据证券研究报告以及其他公开证券信息，分析证券投资品种、理财产品的风险特征，形成具体的投资建议或者标准化顾问服务产品，提供给直接面对客户的投资顾问服务人员","D":"投资顾问服务人员通过面对面交流、电话、短信、电子邮件等方式向客户提供投资建议服务。证券公司通过适当的技术手段，记录、监督投资顾问服务人员与客户的沟通过程，实现过程留痕"},"a":"A,B,C,D","an":"证券投资顾问业务的流程包括：①服务模式的选择和设计，根据客户的需求和特征，选择和设计个性化或者标准化的顾问服务模式；②客户签约，了解客户情况，评估客户的风险承受能力，为客户选择适当的投资顾问服务或产品，告知客户服务内容、方式、收费以及风险情况，由客户自主选择是否签约；③形成服务产品，公司总部或者证券营业部的投资顾问团队根据证券研究报告以及其他公开证券信息，分析证券投资品种、理财产品的风险特征，形成具体的投资建议或者标准化顾问服务产品，提供给直接面对客户的投资顾问服务人员；④服务提供，投资顾问服务通过面对面交流、电话、短信、电子邮件等方式向客户提供投资建议服务，证券公司通过适当的技术手段，记录、监督投资顾问服务人员与客户的沟通过程，实现过程留痕。  考点： 证券投资顾问业务的流程","type":"multi"},{"id":"cy_fin_3613","q":"反映有效证券组合期望收益水平和总风险水平之间均衡关系的方程式是（   ）。","c":{"A":"证券市场线方程","B":"证券特征线方程","C":"资本市场线方程","D":"套利定价方程"},"a":"C","an":"A项是反映任意证券或组合的期望收益率和风险之间的关系； B项是证券实际收益率的方程； D项是反映证券组合期望收益水平和多个因素风险水平之间均衡关系的方程。","type":"single"},{"id":"cy_fin_3615","q":"根据资本资产定价模型，市场价格偏高的证券将会（   ）。","c":{"A":"位于证券市场线的上方","B":"位于证券市场线的下方","C":"位于证券市场线上","D":"位于资本市场线上"},"a":"B","an":"证券市场线表示最优资产组合的风险与收益的关系；市场价格偏高的证券的预期收益率偏低，所以位于证券市场线的下方。","type":"single"},{"id":"cy_fin_3617","q":"下列关于资本市场线和证券市场线的说法，错误的是（   ）。","c":{"A":"证券市场线描述的是无风险资产和任意风险资产形成的资产组合的风险与收益的关系","B":"资本市场线描述的是由无风险资产和有效市场组合形成的资产组合的风险与收益的关系","C":"证券市场线反映了均衡条件下，任意单一资产或者资产组合的预期收益与总风险之间的关系","D":"资本市场线反映了有效资产组合的预期收益与总风险的关系"},"a":"C","an":"证券市场线与资本市场线都是描述资产或资产组合的期望收益与风险状况间依赖关系的函数。资本市场线反映的是有效资产组合的期望收益与其全部风险间的依赖关系；证券市场线描述的是任意单一资产或者资产组合的预期收益与系统风险之间的关系，而非与总风险的关系，因此选项C说法错误。","type":"single"},{"id":"cy_fin_3619","q":"关于预期收益率、无风险利率、某证券的β值、市场风险溢价四者的关系，下列各项描述正确的是（   ）。","c":{"A":"预期收益率=无风险利率-某证券的β值×市场风险溢价","B":"无风险利率=预期收益率+某证券的β值×市场风险溢价","C":"市场风险溢价=无风险利率+某证券的β值×预期收益率","D":"预期收益率=无风险利率+某证券的β值×市场风险溢价"},"a":"D","an":"资本资产定价模型下，E（Ri）= Rf+βi×[E（Rm）-Rf]。 其中：E（Ri）= 资产i的期望收益率；Rf = 无风险收益率；E（Rm）= 市场组合的预期收益率； [E（Rm）-Rf]=市场组合的风险溢价。","type":"single"},{"id":"cy_fin_3621","q":"证券市场线表示市场均衡条件下单项资产或资产组合的风险与预期收益率的关系，市场价格（   ）的证券的预期收益率偏低，所以位于证券市场线的下方。","c":{"A":"偏高","B":"偏低","C":"固定不变","D":"最优"},"a":"A","an":"该题考查证券市场线的含义。市场价格偏高的证券的预期收益率偏低，所以位于证券市场线的下方。","type":"single"},{"id":"cy_fin_3623","q":"证券X期望收益率为0.11，贝塔值是1.5，无风险收益率为0.05，市场期望收益率为0.09。根据资本资产定价模型，这个证券（   ）。","c":{"A":"被低估","B":"被高估","C":"定价公平","D":"价格无法判断"},"a":"C","an":"根据CAPM模型，证券的理论期望收益率=0.05+1.5×(0.09-0.05)=0.11，其与证券的实际期望收益率相等，说明市场给其定价既没有高估也没有低估，而是比较合理的。","type":"single"},{"id":"cy_fin_3625","q":"证券市场线描述的是（   ）。","c":{"A":"期望收益与方差的直线关系","B":"期望收益与标准差的直线关系","C":"期望收益与相关系数的直线关系","D":"期望收益与贝塔系数的线性关系"},"a":"D","an":"无论单个证券还是证券组合，均可将其β系数作为风险的合理测定，其期望收益与由β系数测定的系统风险之间存在线性关系（选项D正确）。这个关系在以期望收益为纵坐标、贝塔系数为横坐标的坐标系中代表一条直线，这条直线被称为证券市场线。","type":"single"},{"id":"cy_fin_3627","q":"资本资产定价理论认为，当引入无风险证券后，有效边界为（   ）。","c":{"A":"证券市场线","B":"资本市场线","C":"特征线","D":"无差异曲线"},"a":"B","an":"在均值标准差平面上，所有有效组合刚好构成连接无风险资产F与市场组合M的射线FM，这条射线被称为资本市场线（选项B正确）。","type":"single"},{"id":"cy_fin_3629","q":"关于证券市场线和资本市场线，下列说法正确的有（   ）。","c":{"A":"两者都表示有效组合的收益与风险关系","B":"证券市场线适合于所有证券或组合的收益风险关系，资本市场线只适合于有效组合的收益风险关系","C":"证券市场线以β描绘风险，而资本市场线以σ描绘风险","D":"证券市场线是资本市场线的推广"},"a":"B,C,D","an":"选项A错误：资本市场线揭示了有效组合的收益和风险之间的均衡关系；证券市场线揭示了任意证券或组合的收益风险关系。","type":"multi"},{"id":"cy_fin_3631","q":"下列关于证券市场线的叙述正确的有（   ）。","c":{"A":"证券市场线是用标准差作为风险衡量指标","B":"如果某证券的价格被低估，则该证券会在证券市场线的上方","C":"如果某证券的价格被低估，则该证券会在证券市场线的下方","D":"证券市场线说明只有系统风险才是决定期望收益率的因素"},"a":"B,D","an":"选项A错误：证券市场线是用贝塔系数作为风险衡量指标，即只有系统风险才是决定期望收益率的因素； 选项C错误：如果某证券的价格被低估，意味着该证券的期望收益率高于理论水平，则该证券会在证券市场线的上方。","type":"multi"},{"id":"cy_fin_3633","q":"以下属于客户证券投资短期目标需考虑的因素有（   ）。","c":{"A":"保持资金的流动性","B":"保持资金安全性","C":"保持资本增值","D":"风险管理"},"a":"A,B","an":"AB正确：在短期目标中，保持资金的流动性和安全性往往是关键考虑因素。 C错误：在中期目标中，除了保持一定的流动性外，投资回报和资本增值也是重要的考虑因素。 D错误：在长期目标中，资本增值、复利效应和风险管理是重要的考虑因素。","type":"multi"},{"id":"cy_fin_3635","q":"证券经营机构的适当性匹配意见表明其对产品或者服务的风险和收益作出实质性判断或者保证。","c":{"1":"对","0":"错"},"a":"0","an":"证券经营机构的适当性匹配意见不表明其对产品或者服务的风险和收益作出实质性判断或者保证。","type":"judge"},{"id":"cy_fin_3637","q":"通过对证券基本财务要素的计算和处理得出该证券的绝对金额的估值方法是（   ）。","c":{"A":"绝对估值法","B":"相对估值法","C":"资产价值法","D":"风险中性定价法"},"a":"A","an":"A正确：绝对估值是指通过对证券基本财务要素的计算和处理得出该证券的绝对金额。 B错误：相对估值是指运用证券的市场价格与某个财务指标之间存在的比例关系对证券进行估值，包括常见的市盈率、市净率、市售率、市值回报增长比等。 C错误：资产价值是指根据企业资产负债表的编制原理，利用权益价值=资产价值-负债价值的关系，评估出三个因素中的两个，计算资产价值的方法。 D错误：其他估值方法中的无套利定价法和风险中性定价法。","type":"single"},{"id":"cy_fin_3639","q":"下列关于证券投资顾问业务风险管理流程的步骤正确是是（   ）。","c":{"A":"风险识别→风险计量→风险监测→风险报告","B":"风险识别→风险控制→风险计量→风险监测","C":"风险监测→风险识别→风险计量→风险控制","D":"风险监测→风险计量→风险识别→风险控制"},"a":"A","an":"风险管理流程主要包括：风险识别和分析→风险评估和计量→风险控制和缓释→风险监测和预警→风险报告和应对","type":"single"},{"id":"cy_fin_3641","q":"风险识别应尽可能多地识别证券投资业务所面临的风险类别，确保覆盖证券投资顾问业务面临的所有实质性风险，是前瞻性原则。","c":{"1":"对","0":"错"},"a":"0","an":"风险识别的原则：  1）全面性：风险识别应尽可能多地识别证券投资业务所面临的风险类别，确保覆盖证券投资顾问业务面临的所有实质性风险。 2）前瞻性：风险识别不仅是对已知风险的分析，更重要的是要前瞻性地考察风险的变化趋势以及可能出现的新的风险类别和性质。","type":"judge"},{"id":"cy_fin_3643","q":"VaR是指在市场正常波动下，某一金融资产或证券组合的最小可能损失。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"VaR一般被称为风险价值或在险价值，其含义是指在市场正常波动下，某一金融资产或证券组合的最大可能损失。","type":"judge"},{"id":"cy_fin_3645","q":"《证券公司风险控制指标管理办法》规定，证券公司流动性覆盖率不得低于100%，预警标准为120%。","c":{"1":"对","0":"错"},"a":"1","an":"以证券公司为例，《证券公司风险控制指标管理办法》规定，证券公司流动性覆盖率不得低于100%，预警标准为120%。","type":"judge"},{"id":"cy_fin_3647","q":"证券产品选择的基本原则不包括（   ）。","c":{"A":"风险收益匹配原则","B":"流动性匹配原则","C":"期限匹配原则","D":"风险最小原则"},"a":"D","an":"证券产品选择的基本原则：风险收益匹配原则、流动性匹配原则、期限匹配原则。","type":"single"},{"id":"cy_fin_3649","q":"资产配置指根据投资需求将投资资金在不同资产类别之间进行分配，通常是将资产在低风险、低收益证券与高风险、高收益证券之间进行分配。","c":{"1":"对","0":"错"},"a":"1","an":"资产配置是指根据投资需求将投资资金在不同资产类别之间进行分配，通常是将资产在低风险、低收益证券与高风险、高收益证券之间进行分配。","type":"judge"},{"id":"cy_fin_3651","q":"在投资组合管理中，基准是一系列证券或风险因子及相应的权重所共同构成的投资组合。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"在投资组合管理中，基准是一系列证券或风险因子及相应的权重所共同构成的投资组合。","type":"judge"},{"id":"cy_fin_3653","q":"2010年10月12日，为进一步规范投资咨询业务，中国证监会颁布了（  ） Ⅰ《发布证券研究报告暂行规定》 Ⅱ《证券投资顾问业务暂行规定》 Ⅲ《证券投资顾问业务风险揭示书必备条款》 Ⅳ《关于证券投资顾问和证券分析师注册登记有关事宜的通知》","c":{"A":"Ⅰ Ⅱ","B":"Ⅰ  Ⅲ Ⅳ","C":"Ⅱ Ⅲ Ⅳ","D":"Ⅰ Ⅱ Ⅲ Ⅳ"},"a":"A","an":"2010年10月12日，中国证监会颁布了《发布证券研究报告暂行规定》、《证券投资顾问业务暂行规定》，明确了证券投资顾问和发布证券研究报告业务是证券投资咨询业务的两类基本形式。","type":"single"},{"id":"cy_fin_3655","q":"证券投资顾问在客户进行投资品种选择时通常应从投资品的回报率，风险以及（  ）面来给出咨询建议。","c":{"A":"最低投资金额","B":"投资者对该投资品是否专业","C":"流动性","D":"阶段波动幅度"},"a":"C","an":"证券投资顾问在客户进行投资品种选择时，通常应从投资品的回报率、风险以及流动性方面来给出咨询建议。","type":"single"},{"id":"cy_fin_3657","q":"证券投资顾问在客户进行投资品种选择时通常应从投资品的回报率，风险以及（    ）方面来给出咨询建议。","c":{"A":"最低投资金额","B":"投资者对该投资品是否专业","C":"流动性","D":"阶段波动幅度"},"a":"C","an":"证券投资顾问在客户进行投资品种选择时，通常应从投资品的回报率、风险以及流动性方面来给出咨询建议。","type":"single"},{"id":"cy_fin_3659","q":"A公司2016年8月至11月雇佣王某、张某等5名证券投资咨询人员制作股评节目，并在四川卫视、广西卫视、山东卫视和辽宁卫视中播出。 证券投资顾问应当根据了解到的客户情况，在评估客户()和服务需求的基础上，向客户提供适当的投资建议服务。","c":{"A":"客户身份","B":"资产状况","C":"投资偏好","D":"风险承受能力"},"a":"D","an":"证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。","type":"single"},{"id":"cy_fin_3661","q":"证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上向客户提供（  ）。","c":{"A":"收益最高的投资组合服务","B":"适当的投资建议服务","C":"风险最小的投资品种服务","D":"有保底的投资组合服务"},"a":"B","an":"证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上向客户提供适当的投资建议服务。","type":"single"},{"id":"cy_fin_3663","q":"证券投资顾问应当根据了解到的客户情况、在评估客户（  ）和服务需求的基础上，向客户提供适当的投资建议服务。","c":{"A":"客户身份","B":"资产状况","C":"投资偏好","D":"风险承受能力"},"a":"D","an":"证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。","type":"single"},{"id":"cy_fin_3665","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务、应当按照公司制定的程序和要求，了解客户的财产和收入情况，（  ）属于需要了解的内容。 Ⅰ交通工具 Ⅱ负债金额 Ⅲ每月工资 Ⅳ年终奖","c":{"A":"Ⅰ Ⅱ Ⅲ Ⅳ","B":"Ⅱ Ⅲ Ⅳ","C":"Ⅰ Ⅲ Ⅳ","D":"Ⅰ Ⅱ"},"a":"B","an":"根据《证券投资顾问业务暂行规定》第十一条规定，证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的身份、财产与收入状况、证券投资经验、投资需求与风险偏好，评估客户的风险承受能力，并以书面或者电子文件形式予以记载、保存。 综上，该题选B。","type":"single"},{"id":"cy_fin_3667","q":"根据《证券投资顾问业务暂行规定》，证券公司，证券投资咨询机构向客户提供证券投资顾问业务，需充分了解客户的基本情况，包括(  )。  Ⅰ.客户的身份、财产和收入状况  Ⅱ.证券投资经验  Ⅲ.投资需求与风险偏好  Ⅳ.配偶工作单位","c":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"C","an":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的身份、财产与收入状况、证券投资经验、投资需求与风险偏好，评估客户的风险承受能力，并以书面或者电子文件形式予以记载、保存。 综上，该题选C。","type":"single"},{"id":"cy_fin_3669","q":"证券公司向客户销售的金融产品或提供的金融服务，应当符合的要求是(  )。  Ⅰ.投资期限和品种符合客户的投资目标  Ⅱ.风险等级符合客户的风险承受能力等级  Ⅲ.客户签署风险揭示书，确认已充分理解金融产品或金融服务的风险  Ⅳ.可以视情况省略风险揭示环节","c":{"A":"Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"C","an":"Ⅳ项错误，风险揭示环节不能省略。","type":"single"},{"id":"cy_fin_3671","q":"以软件工具、终端设备等为载体，向客户提供投资建议或者类似功能服务的，应当符合下列要求(  )。  Ⅰ.客观说明软件工具、终端设备的功能，不得对其功能进行虚假、不实、误导性宣传  Ⅱ.揭示软件工具、终端设备的固有缺陷和使用风险，不得隐瞒或者有重大遗漏  Ⅲ.说明软件工具、终端设备所使用的数据信息来源  Ⅳ.表示软件工具、终端设备具有选择证券投资品种或者提示买卖时机功能的，应当说明其方法和局限","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅲ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"根据《证券投资顾问业务暂行规定》第27条： 以软件工具、终端设备等为载体，向客户提供投资建议或者类似功能服务的，应当执行本规定，并符合下列要求： 1）客观说明软件工具、终端设备的功能，不得对其功能进行虚假、不实、误导性宣传；  2）揭示软件工具、终端设备的固有缺陷和使用风险，不得隐瞒或者有重大遗漏；  3）说明软件工具、终端设备所使用的数据信息来源；  4）表示软件工具、终端设备具有选择证券投资品种或者提示买卖时机功能的，应当说明其方法和局限。 综上，该题选D。","type":"single"},{"id":"cy_fin_3673","q":"证券投资顾问向客户提供的投资建议应该建立在（  ）基础上。","c":{"A":"评估客户风险承受能力","B":"公司业务管理和激励制度","C":"客户家庭成员","D":"客户情况和服务需求"},"a":"A,D","an":"根据《证券投资顾问业务暂行规定》的规定，证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。 证券投资顾问向客户提供投资建议，应当具有合理的依据。投资建议的依据包括证券研究报告或者基于证券研究报告、理论模型以及分析方法形成的投资分析意见等。 综上，该题选AD。","type":"multi"},{"id":"cy_fin_3675","q":"按照《证券投资顾问业务暂行规定》的要求，证券投资顾问应当根据了解的客户情况在评估客户（）的基础上，向客户提供适当的投资建议服务。","c":{"A":"服务需求","B":"健康状况","C":"风险承受能力","D":"投资经验"},"a":"A,C","an":"根据《证券投资顾问业务暂行规定》第十五条的规定，证券投资顾问应当根据了解的客户情况，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。","type":"multi"},{"id":"cy_fin_3677","q":"A公司2016年8月至11月雇佣王某、张某等5名证券投资咨询人员制作股评节目，并在四川卫视、广西卫视、山东卫视和辽宁卫视中播出。该五人在上述A公司的股评节目中发表了如「想涨就涨”“风险少赚钱快”“包揽市场所有涨停「、「随便买随便卖「等言论。（不定项）证券公司、证券投资咨询机构通过（  ）等公众媒体对证券投资顾问业务进行广告宣传，应当遵守《中华人民共和国广告法》和证券信息传播的有关规定。","c":{"A":"电视","B":"广播","C":"报刊","D":"网络"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构通过广播、电视、网络、报刊等公众媒体对证券投资顾问业务进行广告宣传，应当遵守中华人民共和国广告法和证券信息传播的有关规定，广告宣传内容不得存在虚假、不实、误导性信息以及其他违法违规情形。","type":"multi"},{"id":"cy_fin_3679","q":"证券公司、证券投资咨询机构向客户提供证券投资顾问服务，应当了解客户的身份、财产与收入状况、证券投资经验、投资需求和风险偏好。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券投资咨询机构向客户提供证券投资顾问服务，应当按照公司制定的程序和要求，了解客户的身份、财产与收入状况、证券投资经验、投资需求与风险偏好，在评估客户风险承受能力和服务需求的基础上，向客户提供适当的投资建议服务。","type":"judge"},{"id":"cy_fin_3681","q":"关于两种证券构成的组合，在不允许卖空的情况下，下列说法正确的有（  ） Ⅰ完全负相关下，可获得无风险组合 Ⅱ不相关情况下，可得到一个组合，其风险小于两个证券组合中任一证券的风险 Ⅲ当两种证券间的相关系数为０.５时，得不到一个组合使得组合风险小于单个证券的风险 Ⅳ组合的风险与两证券间的投资比例无关","c":{"A":"Ⅰ Ⅱ Ⅲ","B":"Ⅰ Ⅱ","C":"Ⅲ Ⅳ","D":"Ⅰ  Ⅲ Ⅳ"},"a":"A","an":"Ⅰ正确：从组合线的形状来看，相关系数越小，在不卖空的情况下，证券组合的风险越小，特别是负完全相关的情况下，可获得无风险组合。 Ⅱ正确：在不相关的情况下，虽然得不到一个无风险组合，但可得到一个组合，其风险小于两个证券(A和B)组合中任何一个单个证券的风险。 Ⅲ正确：当A与B的收益率不完全负相关时，组合线在A、B点之间比不相关时更弯曲，因而能找到一些组合(不卖空)使得风险小于A和B的风险，比如ρAB=-0.5的情形。但当ρAB=0.5时，得不到一个不卖空的组合使得其风险小于单个证券的风险。可见，在不卖空的情况下，组合降低风险的程度由证券间的关联程度决定。 Ⅳ错误：组合的风险与两证券间的投资比例有关。 综上，该题选A。","type":"single"},{"id":"cy_fin_3683","q":"已知证券A的投资收益率等于0．08和-0．02的可能性均为50%，证券B的投资收益率等于0．05和-0．01的可能性均为50%，那么()。  Ⅰ在均值-标准差平面上，证券A优于证券B  Ⅱ证券A的方差等于0．0025  Ⅲ证券B的标准差等于0．03  Ⅳ证券A的期望收益率等于0．03","c":{"A":"Ⅲ、Ⅳ","B":"Ⅱ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"Ⅳ正确：证券A的期望收益率=0.08×50%+（-0.02）×50%=0.03；  证券B的期望收益率=0.05×50%+（-0.01）×50%=0.02；  Ⅱ正确：证券A的方差=（0.08-0.03）^2×50%+（-0.02-0.03）^2×50%=0.0025，标准差=0.05；  Ⅲ正确：证券B的方差=（0.05-0.02）^2×50%+（-0.01-0.02）^2×50%=0.0009，标准差=0.03；  Ⅰ错误：在均值-标准差平面上，证券A的期望收益率大于证券B的期望收益率，同时证券A的标准差大于证券B的标准差，即风险大于B，两者无法比较，也就是不能说证券A优于证券B。  综上，Ⅱ、Ⅲ、Ⅳ正确，该题选B。","type":"single"},{"id":"cy_fin_3685","q":"A证券的预期报酬率为12％，标准差为15％；B证券的预期报酬率为18％，标准差为20％，投资于两种证券组合的可行集是一条曲线，有效边界与可行集重合，下列结论中正确的有（  ）。","c":{"A":"最小方差组合是全部投资于A证券","B":"最高预期报酬组合是全部投资于B证券","C":"两种证券报酬率的相关性较高，风险分散化效应较弱","D":"可以在有效集曲线上找到风险最小、期望报酬率最高的投资组合"},"a":"A,B,C","an":"A正确：根据有效边界与可行集重合可知，可行集曲线上不存在无效投资组合，而A的标准差低于B，所以最小方差组合是全部投资于A证券。 B正确：投资组合的报酬率是组合中各种资产报酬率的加权平均数，因为B的预期报酬率高于A，所以最高预期报酬率组合是全部投资于B证券。 C正确：由于可行集曲线上不存在无效投资组合，因此两种证券报酬率的相关性较高，风险分散化效应较弱。 D错误：因为风险最小的投资组合为全部投资于A证券，期望报酬率最高的投资组合为全部投资于B证券。 综上，该题选ABC。","type":"multi"},{"id":"cy_fin_3687","q":"两个风险证券的相关系数越小，它们构造组合形成的可行域弯曲度越小。(）","c":{"1":"对","0":"错"},"a":"0","an":"随着相关系数的增大，弯曲程度逐渐减小。","type":"judge"},{"id":"cy_fin_3689","q":"β系数是衡量证券所承担的( )的指标。","c":{"A":"系统风险","B":"非系统风险","C":"可分散风险","D":"不可分散风险"},"a":"A","an":"β系数是衡量证券承担系统风险水平的指数。","type":"single"},{"id":"cy_fin_3691","q":"β系数可以用来衡量证券()。","c":{"A":"预期收益率的大小","B":"贡献市场总风险的大小","C":"承担系统风险的大小","D":"承担非系统风险的大小"},"a":"C","an":"β系数是衡量证券承担系统风险水平的指数。","type":"single"},{"id":"cy_fin_3693","q":"证券A的贝塔系数是 1.2，证券 B 的贝塔系数是 0.8，下列正确的是()","c":{"A":"证券A的非系统风险最大","B":"证券B的非系统风险最大","C":"证券A的系统风险最大","D":"证券B的系统风险最大"},"a":"C","an":"β系数是衡量证券承担系统风险水平的指数 ，可以用来衡量承担系统风险的大小。","type":"single"},{"id":"cy_fin_3695","q":"证券投资顾问业务风险管理流程主要包括（）。","c":{"A":"风险识别","B":"风险计量","C":"风险监测","D":"风险控制"},"a":"A,B,C,D","an":"证券投资顾问业务风险管理流程主要包括风险识别、风险计量、风险监测和风险控制四个主要步骤。","type":"multi"},{"id":"cy_fin_3697","q":"证券产品选择的目标包括本金保障、资本增值、取得收益、降低风险。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券产品选择的目标包括：取得收益、降低风险、本金保障、资本增值。","type":"judge"},{"id":"cy_fin_3699","q":"（  ）以资本市场线为基础，其数值等于证券组合的风险溢价除以标准差。","c":{"A":"道琼斯指数","B":"詹森指数","C":"特雷诺指数","D":"夏普指数"},"a":"D","an":"夏普指数是1966年由夏普提出的，它以资本市场线为基准，指数值等于证券组合的风险溢价除以标准差。","type":"single"},{"id":"cy_fin_3701","q":"证券投资组合的业绩评价既要考虑组合收益的高低，也要考虑组合所承担风险的大小，下列不满足有效的业绩评价流程原则要求的是()。","c":{"A":"业绩评价应对投资组合的超额收益或风险有一个完整的解释","B":"业绩评价应反映投资决策过程","C":"业绩评价应能够对投资经理被动的投资决策进行量化","D":"业绩评价应考虑投资组合的全部的收益及风险敞口"},"a":"C","an":"有效的业绩评价流程需满足以下四个原则： ①业绩评价应考虑投资组合全部的收益及风险敞口； ②业绩评价应反映投资决策过程； ③业绩评价应能够对投资经理主动的投资决策进行量化； ④业绩评价应对投资组合的超额收益或风险有一个完整的解释。","type":"single"},{"id":"cy_fin_3703","q":"下列关于证券组合的业绩评估的说法，正确的有 ()。","c":{"A":"绩效评估可以考察组合承担单位风险所获得的收益水平高低","B":"绩效评估可以考察组合已实现的收益水平是否高于与其所承担的风险水平相匹配的收益水平","C":"业绩评估基本原则为仅考虑组合收益的高低","D":"业绩评估基本原则为仅考虑组合所承担风险的大小"},"a":"A,B","an":"AB正确：组合业绩评估者可以考察组合已实现的收益水平是否高于与其所承担的风险水平相匹配的收益水平和承受单位风险所获得的收益水平高低。 CD错误：证券组合业绩的基本原则是既要考虑组合收益的高低，也要考虑组合所承担风险的大小。","type":"multi"},{"id":"cy_fin_3705","q":"证券研究报告的发布流程包括（  ）环节。","c":{"A":"选题","B":"撰写","C":"质量控制","D":"合规审查"},"a":"A,B,C,D","an":"证券研究报告的发布流程通常包括五个主要环节： (1) 选题，即选择和覆盖研究对象。 (2) 撰写，包括数据资料收集、研究分析和报告写作。 (3) 质量控制。研究报告撰写完成后，研究部门的质量审核人员对分析前提、分析逻辑、使用工具和方法等进行审核，控制报告质量。 (4) 合规审查。由公司合规部门或者研究部门、研究子公司的专职人员负责，审查应当涵盖人员资质、信息来源、风险提示等内容，重点关注证券研究报告可能涉及的利益冲突事项。 (5) 发布。通过发布证券研究报告平台统一发送给公司约定的证券研究报告发布对象，系统自动留痕。实践中，有部分证券公司的研究部门指定岗位负责发送，也有公司的研究部门授权机构客户服务部门向机构客户发送。","type":"multi"},{"id":"cy_fin_3707","q":"证券组合管理特点主要体现在（    ）。","c":{"A":"投资的分散性","B":"投资的集中性","C":"风险与收益的匹配性","D":"风险与收益的可控性"},"a":"A,C","an":"证券组合管理特点主要体现在两方面： 第一，投资的分散性。 投资组合理论认为，投资组合的风险随其所包含证券数量的增加而降低。只要证券收益之间不是完全正相关，分散化就可以有效降低非系统风险，使证券组合的投资风险趋向于市场平均风险水平。因此，组合管理强调构成组合的证券应多元化。 第二，风险与收益的匹配性。 根据投资组合理论，投资收益是对承担风险的补偿， 承担的风险越大，收益越高。因此，组合管理强调投资的收益目标应与风险的承受能力相适应。","type":"multi"},{"id":"cy_fin_3709","q":"资本资产定价模型是在（）和资本市场理论的基本上形成发展起来的，主要研究证券市场中资产的预期收益率与风险资产之间的关系。","c":{"A":"投资组合理论","B":"套利组合理论","C":"汇率决定理论","D":"行为组合理论"},"a":"A","an":"资本资产定价模型就是在投资组合理论和资本市场理论基础上形成发展起来的，主要研究证券市场中资产的预期收益率与风险资产之间的关系以及均衡价格是如何形成的。","type":"single"},{"id":"cy_fin_3711","q":"反映证券组合期望收益水平的总风险水平之间均衡关系的方程式是（）。","c":{"A":"证券市场线方程","B":"证券特征线方程","C":"资本市场线方程","D":"套利定价方程"},"a":"C","an":"A项是反映任意证券或组合的期望收益率和风险之间的关系，B项是证券实际收益率的方程，D项是反映证券组合期望收益水平和多个因素风险水平之间均衡关系的方程。","type":"single"},{"id":"cy_fin_3713","q":"根据组合投资理论，在市场均衡状态下，单个证券或组合的收益E(r)和风险系数β之间呈线性关系，反映这种线性关系的在E(r)为纵坐标、β为横坐标的平面坐标系中的直线被称为（　　）。","c":{"A":"压力线","B":"证券市场线","C":"支持线","D":"资本市场线"},"a":"B","an":"无论单个证券还是证券组合，均可将其β系数作为风险的合理测定，其期望收益与由β系数测定的系统风险之间存在线性关系。这个关系在以E(r)为纵坐标、β为横坐标的坐标系中代表一条直线，这条直线被称为证券市场线。","type":"single"},{"id":"cy_fin_3715","q":"如果某证券的β值为1．5，若市场组合的风险收益为10%，则该证券的风险收益为（  ）。","c":{"A":"0.05","B":"0.15","C":"0.5","D":"0.85"},"a":"B","an":"证券市场线的表达式为：  E(ri)一rf= [E( rM)一rf]×β。其中，[E(ri)一rf]是证券的风险收益，[E(rM)一rf]是市场组合的风险收益。本题中，该证券的风险收益为E(ri)一rf=10%×1．5=15%。","type":"single"},{"id":"cy_fin_3717","q":"无风险收益率和市场期望收益率分别是0.06和0.12。根据CAPM模型，贝塔值为1.2的证券X的期望收益率为（  ）。","c":{"A":"0.06","B":"0.12","C":"0.132","D":"0.144"},"a":"C","an":"期望收益率=无风险收益率+β×(市场期望收益率一无风险收益率)=0.06+1．2×(0.12-0.06)=0.132。","type":"single"},{"id":"cy_fin_3719","q":"β系数是衡量证券承担非系统风险水平的指数。","c":{"1":"对","0":"错"},"a":"0","an":"β系数是衡量证券承担系统风险水平的指数","type":"judge"},{"id":"cy_fin_3721","q":"套利定价模型表明，市场均衡状态下，证券或组合的期望收益率完全由它所承担的因素风险所决定；承担相同因素风险的证券或组合都应具有相同期望收益率；期望收益率与因素风险的关系，可由期望收益率的因素敏感性的线性函数反映。","c":{"1":"对","0":"错"},"a":"1","an":"套利定价模型表明，市场均衡状态下，证券或组合的期望收益率完全由它所承担的因素风险所决定；承担相同因素风险的证券或组合都应具有相同期望收益率；期望收益率与因素风险的关系，可由期望收益率的因素敏感性的线性函数反映。","type":"judge"},{"id":"cy_fin_3723","q":"证券估值的方法主要有（  ）。","c":{"A":"相对估值","B":"无套利定价","C":"绝对估值","D":"资产价值"},"a":"A,B,C,D","an":"观察角度、估值技术甚至价值哲学的巨大差异，导致证券估值相关领域的理论和方法层出不穷。证券估值方法主要包括：①绝对估值；②相对估值；③资产价值；④其他估值方法，包括无套利定价和风险中性定价。","type":"multi"}];
var state = {};
var selected = {};
var currentCh = 0;

function init() {
  // 初始化state
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    state[i] = { done: false, correct: false, answers: [] };
  }
  // 恢复上次的章节
  var saved = localStorage.getItem('sec_ch_current_' + SUBJECT);
  if (saved !== null) currentCh = parseInt(saved, 10) || 0;
  render();
}

// ====== 升级：渲染章节卡片列表 ======
function renderChapterList() {
  var list = document.getElementById('chList');
  var html = '';
  for (var i = 0; i < CHAPTER_INFO.length; i++) {
    var ch = CHAPTER_INFO[i];
    var active = i === currentCh ? ' active' : '';
    var sections = SECTION_DATA[i] || [];
    var ch_color = ch.color;
    html += '<div class="ch-card' + active + '" id="chCard-' + i + '">';
    html += '<div class="ch-hd" onclick="toggleChapter(' + i + ')">';
    html += '<span class="ch-name">' + chapterName(i) + '</span>';
    html += '<span class="ch-star">' + ch.star_display + '</span>';
    html += '<span class="ch-count">' + ch.count + '题</span>';
    html += '<span class="ch-arrow' + (i === currentCh ? ' open' : '') + '">▼</span>';
    html += '</div>';
    // Weight bar
    var w = parseFloat(ch.weight) || 8;
    html += '<div class="ch-bar"><div class="ch-bar-fill" style="width:' + Math.min(w, 50) + '%;background:' + ch_color + '"></div></div>';
    html += '<div class="ch-desc">' + (ch.desc || '') + '</div>';
    // Sections
    html += '<div class="ch-body" id="chBody-' + i + '"' + (i === currentCh ? ' style="display:block"' : '') + '>';
    for (var j = 0; j < sections.length; j++) {
      var sec = sections[j];
      var selClass = (currentCh === i && currentSection === j) ? ' sel' : '';
      var hotClass = ch.star >= 4 ? ' hot' : '';
      html += '<div class="sec-item' + selClass + hotClass + '" onclick="filterToSection(' + i + ',' + j + ')">';
      html += '<span class="sec-name">第' + sectionOrdinal(j) + '节 ' + sec[0] + '</span>';
      html += '<span class="sec-count">~' + sec[1] + '题</span>';
      if (ch.star >= 4 && j < 2) html += '<span class="sec-badge">🔥</span>';
      html += '</div>';
    }
    html += '<div class="ch-all-link" onclick="filterToSection(' + i + ',-1)">📖 全部题目</div>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function chapterName(idx) {
  var ch = CHAPTER_INFO[idx];
  return '第' + (idx+1) + '章 ' + ch.name;
}

function sectionOrdinal(j) {
  var names = ['一','二','三','四','五','六','七','八','九','十'];
  return names[j] || (j+1);
}

function toggleChapter(idx) {
  var body = document.getElementById('chBody-' + idx);
  var arrow = document.querySelector('#chCard-' + idx + ' .ch-arrow');
  var isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

function filterToSection(chIdx, secIdx) {
  currentCh = chIdx;
  currentSection = secIdx;
  localStorage.setItem('sec_ch_current_' + SUBJECT, currentCh);
  
  // Update UI
  var cards = document.querySelectorAll('.ch-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('active', i === chIdx);
    var body = document.getElementById('chBody-' + i);
    if (body) body.style.display = (i === chIdx) ? 'block' : 'none';
    var arr = cards[i].querySelector('.ch-arrow');
    if (arr) arr.classList.toggle('open', i === chIdx);
  }
  
  // Update section selection
  var allSecs = document.querySelectorAll('.sec-item');
  for (var i = 0; i < allSecs.length; i++) allSecs[i].classList.remove('sel');
  if (secIdx >= 0) {
    var items = document.querySelectorAll('#chBody-' + chIdx + ' .sec-item');
    if (items[secIdx]) items[secIdx].classList.add('sel');
  }
  
  // Show/hide filter info
  var fi = document.getElementById('secFilterInfo');
  if (secIdx >= 0) {
    fi.style.display = 'flex';
    var secName = SECTION_DATA[chIdx] && SECTION_DATA[chIdx][secIdx] ? SECTION_DATA[chIdx][secIdx][0] : '';
    document.getElementById('secFilterText').textContent = '📌 当前筛选：' + CHAPTER_INFO[chIdx].name + ' → 第' + sectionOrdinal(secIdx) + '节 ' + secName;
  } else {
    fi.style.display = 'none';
  }
  
  selected = {};
  render();
}

function clearSectionFilter() {
  filterToSection(currentCh, -1);
}

// ====== 保留原渲染逻辑，加入节筛选 ======
function getChapterQuestions(chIdx) {
  var ch = CH_MAP[chIdx];
  var qs = [];
  for (var i = ch.start; i < ch.start + ch.count; i++) {
    if (currentSection >= 0 && Q_SECTION[i] !== currentSection) continue;
    qs.push({ idx: i, q: ALL_QUESTIONS[i] });
  }
  return qs;
}

function render() {
  renderChapterList();
  renderChInfo();
  renderQuestions();
  renderStats();
}

function renderChInfo() {
  var ch = CHAPTER_INFO[currentCh];
  if (!ch) return;
  // Update stats bar
  document.getElementById('totalQ').textContent = ch.count;
}

function renderStats() {
  var ch = CH_MAP[currentCh];
  if (!ch) return;
  // Count only filtered questions for stats
  var qs = getChapterQuestions(currentCh);
  var done = 0, correct = 0;
  for (var i = 0; i < qs.length; i++) {
    var st = state[qs[i].idx];
    if (st.done) { done++; if (st.correct) correct++; }
  }
  var pct = done > 0 ? Math.round(correct/done*100) : 0;
  var totalFiltered = qs.length;
  var allPct = totalFiltered > 0 ? Math.round(done/totalFiltered*100) : 0;
  
  document.getElementById('doneQ').textContent = done;
  document.getElementById('accQ').textContent = pct + '%';
}

function renderQuestions() {
  var container = document.getElementById('qContainer');
  var qs = getChapterQuestions(currentCh);
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty"><div style="font-size:3rem;margin-bottom:0.5rem">📝</div><div>暂无题目' + (currentSection >= 0 ? '（该节暂无题目）' : '') + '</div></div>';
    return;
  }
  
  var num = 0, prevMaterial = '';
  var html = '';
  
  for (var qi = 0; qi < qs.length; qi++) {
    var item = qs[qi], idx = item.idx, q = item.q, st = state[idx];
    if (q.type !== 'comprehensive' || q.material !== prevMaterial) num++;
    prevMaterial = q.material || '';
    
    var typeLabel = q.type === 'comprehensive' ? '综合' : (TYPE_LABEL[q.type] || q.type);
    var typeClass = q.type === 'comprehensive' ? 'type-c' : (TYPE_CLASS[q.type] || 'type-s');
    
    html += '<div class="qcard" id="qc-' + idx + '">';
    if (q.type === 'comprehensive' && q.material) {
      html += '<div class="material-box"><div class="mat-label">📋 材料分析</div>' + q.material + '</div>';
    }
    html += '<div class="q-header"><div class="q-num">第' + num + '题</div><span class="q-type ' + typeClass + '">' + typeLabel + '</span></div>';
    html += '<div class="q-text">' + q.q + '</div>';
    
    var optKeys = Object.keys(q.c);
    html += '<div class="options" id="opts-' + idx + '">';
    for (var oi = 0; oi < optKeys.length; oi++) {
      var k = optKeys[oi];
      var sel = selected[idx] && selected[idx].indexOf(k) >= 0 ? 'selected' : '';
      html += '<div class="opt ' + sel + '" data-q="' + idx + '" data-key="' + k + '" onclick="toggleOpt(' + idx + ',\'' + k + '\')">';
      html += '<span class="ol">' + k + '.</span><span>' + q.c[k] + '</span></div>';
    }
    html += '</div>';
    
    var doneStyle = st.done ? ' style="display:none"' : '';
    var showAn = !st.done ? ' style="display:none"' : '';
    html += '<div class="actions">';
    html += '<button class="btn btn-primary" onclick="checkAnswer(' + idx + ')"' + doneStyle + '>✅ 确认答案</button>';
    html += '<button class="btn btn-secondary" onclick="resetQuestion(' + idx + ')"' + showAn + '>🔄 重做</button>';
    html += '</div>';
    
    var anText = q.an || '暂无解析';
    html += '<div class="analysis" id="an-' + idx + '"' + showAn + '>';
    html += '<div class="a-label">📖 解析</div>';
    if (st.done) {
      var ansStr = Array.isArray(st.answers) ? st.answers.join(', ') : '';
      var isCorrect = st.correct;
      html += '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
           + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
           + ' · 正确答案：' + esc(q.a);
      if (!isCorrect && ansStr) html += ' · 你的答案：' + esc(ansStr);
      html += '</div>';
    }
    html += '<div class="a-text">' + anText + '</div></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

// ====== 保留原交互函数 ======
function toggleOpt(idx, key) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  if (!selected[idx]) selected[idx] = [];
  var arr = selected[idx];
  var pos = arr.indexOf(key);
  var isSingle = (q.type === 'comprehensive' && q.sub_type === 'single') || q.type === 'single' || q.type === 'judge';
  
  if (isSingle) {
    selected[idx] = [key];
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.remove('selected');
      if (opts[i].dataset.key === key) opts[i].classList.add('selected');
    }
  } else {
    if (pos >= 0) arr.splice(pos, 1); else arr.push(key);
    var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      var k = opts[i].dataset.key;
      opts[i].classList.toggle('selected', selected[idx].indexOf(k) >= 0);
    }
  }
}

function checkAnswer(idx) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx].done) return;
  var sel = selected[idx] || [];
  if (sel.length === 0) return;
  var correctAns = q.a;
  var userAns = sel.sort().join('');
  var isCorrect = userAns === correctAns;
  
  state[idx] = { done: true, correct: isCorrect, answers: sel.slice() };
  saveState();
  
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) {
    var k = opts[i].dataset.key;
    opts[i].classList.remove('selected');
    if (correctAns.indexOf(k) >= 0) opts[i].classList.add('correct');
    else if (sel.indexOf(k) >= 0) opts[i].classList.add('wrong');
  }
  
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = 'none';
  var an = document.getElementById('an-' + idx);
  var ansStr = sel.join(', ');
  an.style.display = 'block';
  an.innerHTML = '<div class="a-label">📖 解析</div>'
    + '<div class="' + (isCorrect ? 'a-answer' : 'a-wrong') + '">'
    + (isCorrect ? '✅ 回答正确' : '❌ 回答错误')
    + ' · 正确答案：' + esc(correctAns)
    + (!isCorrect ? ' · 你的答案：' + esc(ansStr) : '')
    + '</div><div class="a-text">' + (q.an || '暂无解析') + '</div>';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = '';
  renderStats();
  
  // ── 记录到学情看板 ──
  if (window.ExamRecorder) {
    var typeCn = q.type === 'multi' ? '多选' : (q.type === 'judge' ? '判断' : (q.type === 'comprehensive' ? '不定项' : '单选'));
    window.ExamRecorder.record({
      questionId: SUBJECT + '-' + idx,
      subject: SUBJECT === '金融市场基础知识' ? '金融市场基础知识' : '证券市场基本法律法规',
      chapter: '第' + (currentCh + 1) + '章',
      type: q.type === 'judge' ? 'j' : (q.type === 'multi' ? 'm' : (q.type === 'comprehensive' ? 'c' : 's')),
      typeCn: typeCn,
      question: q.q || '',
      userAnswer: userAns,
      correctAnswer: correctAns,
      isCorrect: isCorrect,
      choices: q.c || {},
      source: '章节精练'
    });
  }
}

function resetQuestion(idx) {
  state[idx] = { done: false, correct: false, answers: [] };
  selected[idx] = [];
  saveState();
  var opts = document.getElementById('opts-' + idx).querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('correct', 'wrong', 'selected');
  document.getElementById('an-' + idx).style.display = 'none';
  document.querySelector('#qc-' + idx + ' .btn-primary').style.display = '';
  document.querySelector('#qc-' + idx + ' .btn-secondary').style.display = 'none';
  renderStats();
}

function switchCh(idx) { currentCh = idx; currentSection = -1; selected = {}; render(); }

var TYPE_LABEL = { single:'单选', multi:'多选', judge:'判断', comprehensive:'综合' };
var TYPE_CLASS = { single:'type-s', multi:'type-m', judge:'type-j', comprehensive:'type-c' };
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ====== 持久化 ======
function saveState() {
  var obj = {};
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    if (state[i].done) obj[i] = state[i];
  }
  try { localStorage.setItem('sec_exam_ch_state_' + SUBJECT, JSON.stringify(obj)); } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem('sec_exam_ch_state_' + SUBJECT);
    if (raw) {
      var obj = JSON.parse(raw);
      for (var k in obj) {
        if (obj.hasOwnProperty(k) && state[k]) state[k] = obj[k];
      }
    }
  } catch(e) {}
}

loadState();
init();
</script>
<script src="recorder.js"></script>
</body>
