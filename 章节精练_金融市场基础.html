, "a": "A", "an": "一般来说，政府债券不履行债务的风险最低，D说法错误。", "type": "single"}, {"id": "cflue_paper_金融基础_4.json_15", "q": "以下（）不是我国企业债券的种类。", "c": {"A": "可续期企业债券", "B": "国际债券", "C": "普通企业债券", "D": "中小企业集合债券"}, "a": "B", "an": "国际债券是指一国借款人在国际证券市场上以外国货币为面值、向外国投资者发行的债券。它是一种跨国发行的债券，涉及两个或两个以上的国家。", "type": "single"}, {"id": "cflue_paper_金融基础_4.json_16", "q": "影响债券现金流的因素包括（）。", "c": {"A": "计付息间隔", "B": "债券的税收待遇", "C": "票面利率", "D": "债券的嵌入式期权条款"}, "a": "ABCD", "an": "债券发行条款规定了债券的现金流，具体包括：①债券的面值和票面利率；②计付息间隔；③债券的嵌入式期权条款；④债券的税收待遇；⑤其他因素。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_24", "q": "下列关于可续期企业债券的说法，有误的是（）。", "c": {"A": "具有期限超长、主动赎回、可充当资本金等诸多优势", "B": "发改委并未对该类债券制定专门的规定", "C": "计息周期一般在5到10年", "D": "理论上可不断续期永续存在"}, "a": "C", "an": "可续期企业债券，是指在约定的计息周期（一般3-5年）到期时，发行人可按约定的利率调整机制调整利率后，继续延长一个周期的企业债券，理论上可不断续期永续存在，具有期限超长、主动赎回、可充当资本金等诸多优势。", "type": "single"}, {"id": "cflue_paper_金融基础_4.json_25", "q": "下列关于财政部代理发行地方政府债可选择的托管单位的说法，正确的有（）。", "c": {"A": "在国家规定的证券登记结算机构办理登记托管", "B": "在中国证券登记结算有限责任公司深圳分公司托管", "C": "在中央国债登记结算有限责任公司托管", "D": "在中国证券登记结算有限责任公司上海分公司托管"}, "a": "ABCD", "an": "财政部代理发行的地方政府债券可选择的托管规定：在中央国债登记结算有限责任公司和中国证券登记结算有限责任公司上海分公司、深圳分公司选择托管。逾时未填制的，系统默认全部在中央国债登记结算有限责任公司托管。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_33", "q": "下列关于金融衍生工具发展现状，说法有误的是（）", "c": {"A": "按基础产品比较，利率衍生品无论在场内还是场外，均是名义金额最大的衍生品种类", "B": "近年来，由于场外利率类衍生品名义金额下降较多，场外衍生品整体呈下降趋势，而场内衍生品却大幅增长", "C": "金融衍生工具以场内交易为主", "D": "按产品形态比较，远期和互换这两类具有对称性收益的衍生产品的名义金额比收益不对称的期权类产品大得多"}, "a": "C", "an": "金融衍生工具以【场外交易】为主。", "type": "single"}, {"id": "cflue_paper_金融基础_4.json_37", "q": "在债券的以收益率为标的的美式招标发行方式中，各中标者（）。", "c": {"A": "认购成本不同", "B": "中标收益率相同", "C": "到期收益率不同", "D": "中标价格单一"}, "a": "AC", "an": "以收益率为标的的美式招标，是以募满发行额为止的中标者所投标的各个价位上的中标收益率作为中标者各自的最终中标收益率（中标收益率不同），各中标者的认购成本是不相同的。", "type": "multi"}, {"id": "cflue_paper_金融基础_4.json_58", "q": "资产证券化运作流程中，发起人的职责不包括（）。", "c": {"A": "根据证券化目标确定资产数，并将资产汇集形成资产池", "B": "判断组合的现金流水平，并决定借款人信用、抵押担保贷款的抵押价值", "C": "根据自身的资产证券化融资要求，确定资产证券化目标", "D": "与银行达成必要时提供流动性支持的周转协议，与券商达成承销协议"}, "a": "D", "an": "发起人（一般是发放贷款的金融机构，也被称为原始权益人）根据自身的资产证券化融资要求，确定资产证券化目标，对自己拥有的能够产生未来现金收入流的信贷资产进行清理、估算和考核，根据历史经验数据对整个组合的现金流的平均水平有一个基本判断，决定借款人信用、抵押担保贷款的抵押价值等；并将应收和可预见现金流资产进行组合，对现金流的重组可按贷款的期限结构、本金和利息的重新安排或风险的重新分配等进行，根据证券化目标确定资产数，最后将这些资产汇集形成一个资产池。C选项是特设信托机构的职责。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_4", "q": "下列关于金融债券的说法中，有误的是（）。", "c": {"A": "金融债券的资信通常高于其他非金融机构债券", "B": "金融债券能够较有效地解决银行等金融机构的资金来源不足和期限不匹配的矛盾", "C": "金融债券的利率通常高于一般的企业债券", "D": "金融债券违约风险相对较小，具有较高的安全性"}, "a": "C", "an": "金融债券的利率通常【低于】一般的企业债券，但高于风险更小的国债和银行储蓄存款利率。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_10", "q": "公司在发行不动产抵押公司债券时通常用做抵押的有（）。", "c": {"A": "土地", "B": "房屋", "C": "有价证券", "D": "艺术品"}, "a": "AB", "an": "不动产抵押公司债券是以公司的不动产（如房屋、土地等）作抵押而发行的债券，是抵押证券的一种。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_12", "q": "下列关于证券公司债券的说法，正确的有（）。", "c": {"A": "非公开发行的公司债券仅限于合格投资者范围内转让", "B": "非公开发行的证券公司债券，每次发行对象不得超过二百人", "C": "对证券公司债券发行有强制性担保要求", "D": "证券公司债券公开发行的利率由询价或公开招标等市场化方式确定"}, "a": "ABD", "an": "对证券公司债券发行没有强制性担保要求，D错误。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_14", "q": "交易所市场发行国债的分销时，下列说法正确的是（）。", "c": {"A": "证券交易所为同一期（次）国债向不同承销商提供同一承销代码", "B": "投资者通过交易所买入债券时，缴纳佣金", "C": "通过证券交易所交易后，国债不会自动过户到客户的账户内", "D": "在实际运作中，承销商可以选择场内挂牌分销或场外分销两种方式"}, "a": "D", "an": "证券交易所为每一承销商确定当期国债【各自的承销代码】，以便于场内挂牌。B错误。投资者在买入债券时，可免缴佣金，C错误。买卖成交后，客户认购的国债自动过户至客户的账户内，D错误。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_20", "q": "以下（）不是我国其他类型国债的种类。", "c": {"A": "保值债券", "B": "普通债券", "C": "财政债券", "D": "国家重点建设债券"}, "a": "B", "an": "我国其他类型国债的种类有：国家重点建设债券、国家建设债券、财政债券、特种债券、保值债券、基本建设债券、特别国债、长期建设国债。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_31", "q": "与现券交易相比，远期交易的特点主要表现在以下（）方面。", "c": {"A": "远期交易的买卖双方进行商品交收或交割的时间与达成交易的时间，通常有较长的时间间隔", "B": "远期交易存在价格风险，价格会随着时间的推移而变动", "C": "远期交易买卖双方必须签订远期合同", "D": "远期交易通过正式谈判，双方达成一致后签订合同才算成立"}, "a": "ACD", "an": "注意远期交易的货款早已谈妥，不会随时间的推移而改变，无价格风险。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_37", "q": "根据我国财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的，约定一定期限内主要以（）还本付息的政府债券。", "c": {"A": "中央政府收入", "B": "专项收入", "C": "金融机构收入", "D": "政府性基金"}, "a": "BD", "an": "根据财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的、约定一定期限内以公益性项目对应的【政府性基金或专项收入】还本付息的政府债券。", "type": "multi"}, {"id": "cflue_paper_金融基础_5.json_55", "q": "下列关于金融衍生工具发展现状，说法有误的是（）", "c": {"A": "按基础产品比较，利率衍生品无论在场内还是场外，均是名义金额最大的衍生品种类", "B": "近年来，由于场外利率类衍生品名义金额下降较多，场外衍生品整体呈下降趋势，而场内衍生品却大幅增长", "C": "金融衍生工具以场内交易为主", "D": "按产品形态比较，远期和互换这两类具有对称性收益的衍生产品的名义金额比收益不对称的期权类产品大得多"}, "a": "C", "an": "金融衍生工具以【场外交易】为主。", "type": "single"}, {"id": "cflue_paper_金融基础_5.json_58", "q": "银行业金融机构发行资本补充债券，应满足的条件不包括（）。", "c": {"A": "偿债能力良好，且成立满一年", "B": "具有完善的公司治理机制", "C": "经营稳健，资产结构符合行业特征", "D": "遵守国家产业政策和信贷政策"}, "a": "A", "an": "根据中国人民银行2018年第3号公告，银行业金融机构发行资本补充债券，应满足以下条件：具有完善的公司治理机制；偿债能力良好，且成立满【三年】；经营稳健，资产结构符合行业特征，以服务实体经济为导向，遵守国家产业政策和信贷政策；满足宏观审慎管理要求，且主要金融监管指标符合监管部门的有关规定。", "type": "single"}, {"id": "comp_85756", "q": "关于中国债券市场的说法，正确的有（）。", "c": {"A": "国债是以国家信用为担保发行的债券", "B": "地方政府债券由地方政府发行，以地方政府信用为担保", "C": "金融债券的发行主体是银行或非银行金融机构", "D": "可转换债券可以在特定条件下转换为发行公司的普通股"}, "a": "ABCD", "an": "四个选项均正确。此外，公司债券的发行主体是股份有限公司或有限责任公司，企业债券的发行主体通常为中央政府部门所属机构、国有独资企业或国有控股企业。", "type": "comprehensive", "material": "2024年，中国债券市场总规模位居全球第二。债券品种包括国债、地方政府债、金融债、企业债和公司债等。国债收益率曲线是金融市场的重要基准利率曲线，对债券定价和货币政策传导具有重要作用。", "sub_type": "multi"}, {"id": "comp_67475", "q": "关于债券收益率，下列说法错误的是（）。", "c": {"A": "名义收益率是票面利息与面值的比率", "B": "当期收益率是票面利息与当前市场价格的比率", "C": "到期收益率考虑了利息再投资因素", "D": "持有期收益率等同于到期收益率"}, "a": "D", "an": "选项D错误。持有期收益率是投资者持有债券期间的收益率，取决于卖出价格和持有期间的利息收入。到期收益率是从买入持有至到期的年平均收益率，两者计算前提不同。选项ABC均正确。", "type": "comprehensive", "material": "2024年，中国债券市场总规模位居全球第二。债券品种包括国债、地方政府债、金融债、企业债和公司债等。国债收益率曲线是金融市场的重要基准利率曲线，对债券定价和货币政策传导具有重要作用。", "sub_type": "single"}, {"id": "comp_87739", "q": "关于债券发行方式的说法，正确的是（）。", "c": {"A": "公开发行债券必须进行信用评级", "B": "定向发行的债券可以公开转让", "C": "国债的发行方式包括公开招标方式", "D": "公司债券公开发行实行注册制"}, "a": "ACD", "an": "选项B错误。定向发行的债券仅限于合格投资者范围内转让，不能公开转让。公开招标是国债发行的主要方式。公司债券公开发行实行注册制，由证券交易所负责审核，证监会履行注册程序。", "type": "comprehensive", "material": "债券的发行与交易有特定的规则。债券发行方式包括公开发行和定向发行。债券交易市场分为银行间债券市场和交易所债券市场，其中银行间债券市场是中国债券市场的主体。", "sub_type": "multi"}, {"id": "comp_41736", "q": "关于银行间债券市场，下列说法正确的是（）。", "c": {"A": "银行间债券市场是场外市场（OTC）", "B": "只有银行类金融机构可以参与银行间债券市场交易", "C": "银行间债券市场的交易方式以询价交易为主", "D": "中国人民银行对银行间债券市场进行监管"}, "a": "ACD", "an": "选项B错误。银行间债券市场的参与主体包括各类金融机构（商业银行、证券公司、保险公司、基金公司等）以及非法人产品（理财产品、资管计划等），并非仅限于银行类金融机构。", "type": "comprehensive", "material": "债券的发行与交易有特定的规则。债券发行方式包括公开发行和定向发行。债券交易市场分为银行间债券市场和交易所债券市场，其中银行间债券市场是中国债券市场的主体。", "sub_type": "multi"}, {"id": "cflue_zc_ch6.json_1", "q": "基金的交易实行集体交易管理制度，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "基金的交易实行【集中交易管理】制度，基金管理人设有中央交易室，以保证公正、公平为原则，实行统一交易、统一管理，确保各投资组合享有公平的交易执行机会。", "type": "judge"}, {"id": "cflue_zc_ch6.json_2", "q": "关于投资者申购、赎回一般开放式基金时的价格，下列说法正确的是（）。", "c": {"A": "债券基金的申赎遵循“已知价”原则进行申赎", "B": "有时能即时获知买卖的成交价格", "C": "只能以申、赎日交易时间结束后基金管理人公布的基金份额净值为基准进行计算", "D": "与封闭式基金一样，按“已知价”原则进行申赎"}, "a": "C", "an": "对一般开放式基金（股票基金、债券基金、混合基金等）而言，在申购、赎回时则遵循“未知价”交易原则，投资者在申购、赎回一般开放式基金份额时并不能即时获知买卖的成交价格。申购、赎回价格只能以申购、赎回日交易时间结束后基金管理人公布的基金份额净值为基准进行计算，这与股票、封闭式基金等金融产品按”已知价”原则进行买卖不同。", "type": "single"}, {"id": "cflue_zc_ch6.json_3", "q": "如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起（）内编制并披露临时报告书。", "c": {"A": "3日", "B": "5日", "C": "2日", "D": "1日"}, "a": "C", "an": "如果预期某种信息可能对基金份额持有人权益或者基金份额的价格产生重大影响，则该信息为重大信息，相关事件为重大事件，信息披露义务人应当在重大事件发生之日起2日内编制并披露临时报告书。", "type": "single"}, {"id": "cflue_zc_ch6.json_4", "q": "开放式基金的特点有（）。", "c": {"A": "没有发行规模限制", "B": "没有固定期限", "C": "全部资金可用于长期投资", "D": "基金份额资产净值每周公布一次"}, "a": "AB", "an": "开放式基金是指基金份额总额不固定，基金份额可以在合同约定的时间和场所内申请申购或者赎回的基金，基金份额资产净值每个交易日公布一次，募集资金需要保持一定的流动性，不能全部用来做长期投资。", "type": "multi"}, {"id": "cflue_zc_ch6.json_5", "q": "投资者适当性管理通常采用的方法有（）。", "c": {"A": "承诺收益", "B": "组合管理", "C": "产品风险评估", "D": "客户调查问卷"}, "a": "CD", "an": "投资者适当性管理通常采用【客户调查问卷、产品风险评估与充分披露】等方法，根据客户分级和资产分级匹配原则，避免误导投资者和错误销售。", "type": "multi"}, {"id": "cflue_zc_ch6.json_6", "q": "以下关于私募基金的说法正确的有（）。", "c": {"A": "私募基金只能采取非公开方式发行", "B": "私募基金向特定合格投资者发售", "C": "私募基金的投资范围广", "D": "私募基金的投资金额较小，风险较小"}, "a": "ABC", "an": "私募基金的投资金额高，风险较大。C错误。", "type": "multi"}, {"id": "cflue_zc_ch6.json_7", "q": "存续期募集信息披露主要指开放式基金在基金合同生效后每（）披露一次更新的招募说明书。", "c": {"A": "6个月", "B": "1年", "C": "3个月", "D": "9个月"}, "a": "A", "an": "存续期募集信息披露主要指开放式基金在基金合同生效后每【6个月】披露一次更新的招募说明书。", "type": "single"}, {"id": "cflue_zc_ch6.json_8", "q": "在我国，非公开募集证券投资基金合格投资者累计不得超过（）人。", "c": {"A": "250", "B": "200", "C": "150", "D": "100"}, "a": "B", "an": "在我国，非公开募集证券投资基金合格投资者累计不得超过200人。", "type": "single"}, {"id": "cflue_zc_ch6.json_9", "q": "为履行基金托管人的职责，托管银行在托管部门设立不同的处室来履行职责，这些处室一般不包括（）。", "c": {"A": "负责基金资产清算、核算的部门", "B": "负责市场开拓、研究、客户关系维护的市场部门", "C": "负责基金交易监管、内部风险控制的部门", "D": "负责基金销售的部门"}, "a": "D", "an": "托管银行在托管部设立的处室不包括基金销售部门。", "type": "single"}, {"id": "cflue_zc_ch6.json_10", "q": "我国基金监管法律法规体系的核心是（）。", "c": {"A": "《基金运作管理办法》", "B": "《证券法》", "C": "《证券投资基金法》", "D": "《基金管理公司管理办法》"}, "a": "C", "an": "我国基金监管法律法规体系的核心是《证券投资基金法》。", "type": "single"}, {"id": "cflue_zc_ch6.json_11", "q": "不参与基金会计核算的基金费用有（）。", "c": {"A": "申购费", "B": "管理费", "C": "认购费", "D": "托管费"}, "a": "AC", "an": "基金申购费和认购费，不参与基金的会计核算。", "type": "multi"}, {"id": "cflue_zc_ch6.json_12", "q": "基金合同是约定基金管理人、基金托管人和基金份额持有人权利义务关系的基本法律文件。基金合同的主要披露事项包括（）。", "c": {"A": "基金份额发售日期", "B": "募集基金的目的和名称", "C": "基金份额持有人", "D": "基金运作方式"}, "a": "ABCD", "an": "基金合同的主要披露事项包括募集基金的目的和基金名称，基金运作方式，基金份额发售日期、价格和费用原则，基金份额持有人、基金管理人和基金托管人的权利与义务，基金份额发售、交易、申购、赎回的程序、时间、地点、费用计算方式以及给付赎回款项的时间和方式，基金收益分配原则，费用提取及支付方式，投资方向和投资限制，净值的计算方式和公告方式等。故全选。", "type": "multi"}, {"id": "cflue_zc_ch6.json_13", "q": "基金运作可分为（）三大部分。", "c": {"A": "基金的信息披露", "B": "基金的投资管理", "C": "基金的后台管理", "D": "基金的市场营销"}, "a": "BCD", "an": "基金运作可分为基金的市场营销、投资管理与后台管理三大部分。信息披露包含在投资管理内容里。", "type": "multi"}, {"id": "cflue_zc_ch6.json_14", "q": "从事基金服务业务的机构，按照中国证监会的有关规定应进行注册或者备案，这些机构包括（）。", "c": {"A": "从事公募基金的信息技术系统服务的机构", "B": "从事公募基金的份额登记的机构", "C": "从事公募基金的投资顾问的机构", "D": "从事公募基金的销售机构"}, "a": "ABCD", "an": "从事基金服务业务的机构，应当按照国务院证券监督管理机构的规定进行注册或者备案，这些机构主要包括基金销售机构、基金销售支付机构、基金份额登记机构、基金估值核算机构、基金投资顾问机构、基金评价机构、律师事务所、会计师事务所、信息技术系统服务机构等。", "type": "multi"}, {"id": "cflue_zc_ch6.json_15", "q": "关于对公募基金募集的监管，下列说法中，正确的有（）。", "c": {"A": "公开募集基金，不需要经中国证监会注册", "B": "基金募集期满，不论是否达到设立标准，均需向中国证监会办理基金备案手续", "C": "公开募集基金应当经中国证监会注册", "D": "基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续"}, "a": "CD", "an": "公开募集基金应当经中国证监会注册，A正确，D错误；基金募集期满，达到设立标准的，应向中国证监会办理基金备案手续，B正确，C错误。", "type": "multi"}, {"id": "cflue_zc_ch6.json_16", "q": "下列属于基金收入来源的有（）。", "c": {"A": "证券买卖差价", "B": "存款利息", "C": "债券利息", "D": "管理费收入"}, "a": "ABC", "an": "基金收入主要包括利息收入、投资收益以及其他收入。管理费收入是从基金财产中计提，归属于基金管理人的收入。", "type": "multi"}, {"id": "cflue_zc_ch6.json_17", "q": "证券投资基金支付的费用主要包括（）。", "c": {"A": "基金销售服务费", "B": "基金交易费", "C": "基金托管费", "D": "基金管理费"}, "a": "ABCD", "an": "基金从设立到终止都要支付一定的费用。通常情况下，基金所支付的费用主要有以下几个方面：基金管理费、基金托管费、基金交易费、基金运作费、基金销售服务费。", "type": "multi"}, {"id": "cflue_zc_ch6.json_18", "q": "小张拟认购开放式基金，在开立基金账户和资金账户后于20×8年6月11日提交了认购申请表，那么，自（）日起小张可到办理认购的网点查询认购申请的受理情况。", "c": {"A": "20×8年6月16日", "B": "20×8年6月13日", "C": "20×8年6月14日", "D": "20×8年6月15日"}, "a": "B", "an": "投资者于T日提交认购申请后，可于T+2日起到办理认购的网点査询认购申请的受理情况。", "type": "single"}, {"id": "cflue_zc_ch6.json_19", "q": "基金管理人会针对不同的基金类型、不同的认购金额设置不同的认购费率。我国股票型基金的认购费率大多为1%—1.5%，货币市场基金一般不收取认购费，债券型基金的认购费率通常在（）以下。", "c": {"A": "1%", "B": "0.5%", "C": "2%", "D": "1.5%"}, "a": "A", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch6.json_20", "q": "基础设施公募REITs的申请文件包括（）。", "c": {"A": "招募说明书草案", "B": "基金托管协议草案", "C": "上市申请", "D": "基金托管人与主要参与机构签订的协议文件"}, "a": "ABC", "an": "申请文件应当包括以下内容：（1）上市申请；（2）基金合同草案；（3）基金托管协议草案；（4）招募说明书草案；（5）律师事务所对基金出具的法律意见书；（6）基金管理人及资产支持证券管理人相关说明材料，包括但不限于：投资管理、项目运营、风险控制制度和流程，部门设置与人员配备，同类产品与业务管理情况等；（7）拟投资基础设施资产支持证券认购协议；（8）【基金管理人】与主要参与机构签订的协议文件；（B错误）（9）要求的其他材料。", "type": "multi"}, {"id": "cflue_zc_ch6.json_21", "q": "基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后（）日内返还投资者已缴纳的款项，并加计银行同期存款利息。", "c": {"A": "50", "B": "15", "C": "30", "D": "25"}, "a": "C", "an": "基金募集失败，基金管理人应以固有财产承担因募集行为而产生的债务和费用，并在基金募集期限届满后30日内返还投资者已缴纳的款项，并加计银行同期存款利息。", "type": "single"}, {"id": "cflue_zc_ch6.json_22", "q": "基金管理费率通常与基金规模成（），与风险成（）。", "c": {"A": "反比；反比", "B": "正比；正比", "C": "反比；正比", "D": "正比；反比"}, "a": "C", "an": "基金规模越大，风险程度越低，基金管理费率越低。", "type": "single"}, {"id": "cflue_zc_ch6.json_23", "q": "私募基金信息披露义务人应当向投资者披露的信息包括（）。", "c": {"A": "基金份额总额", "B": "招募说明书", "C": "可能存在的利益冲突", "D": "基金的资产负债情况"}, "a": "BCD", "an": "私募基金信息披露义务人应当向投资者披露的信息包括基金合同；招募说明书等宣传推介文件；基金销售协议中的主要权利义务条款（如有）；基金的投资情况；基金的资产负债情况；基金的投资收益分配情况；基金承担的费用和业绩报酬安排；可能存在的利益冲突；涉及私募基金管理业务、基金财产、基金托管业务的重大诉讼、仲裁；中国证监会以及中国证券投资基金业协会规定的影响投资者合法权益的其他重大信息。", "type": "multi"}, {"id": "cflue_zc_ch6.json_24", "q": "基金管理人运用基金财产进行证券投资，不得有下列（）情形。", "c": {"A": "同一基金管理人管理的全部基金持有一家公司发行的证券，超过该证券的10%", "B": "基金总资产超过基金净资产的140%", "C": "一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%", "D": "违反基金合同关于投资范围、投资策略和投资比例等约定"}, "a": "ABCD", "an": "基金管理人运用基金财产进行证券投资，不得有下列情形：（1）一只基金持有一家公司发行的证券，其市值超过基金资产净值的10%；（2）同一基金管理人管理的全部基金持有一家公司发行的证券，其市值超过该证券的10%；（3）基金财产参与股票发行申购，单只基金所申报的金额超过该基金的总资产，单只基金所申报的股票数量超过拟发行股票公司本次发行股票的总量；（4）一只基金持有其他基金（不含货币市场基金），其市值超过基金资产净值的10%，但基金中基金除外；（5）基金中基金持有其他单只基金，其市值超过基金资产净值的20%,或者投资于其他基金中基金；（6）基金总资产超过基金净资产的140%；（7）违反基金合同关于投资范围、投资策略和投资比例等约定；（8）中国证监会规定禁止的其他情形。完全按照有关指数的构成比例进行证券投资的基金品种可以不受前款（1）项、（2）项规定的比例限制。", "type": "multi"}, {"id": "cflue_zc_ch6.json_25", "q": "在基金市场上存在着许多不同的参与主体，依据所承担的责任与作用的不同，可以将基金市场的参与主体分为（）。", "c": {"A": "其他机构", "B": "基金的监管机构和自律组织", "C": "基金当事人", "D": "基金市场服务机构"}, "a": "BCD", "an": "基金市场参与主体，分为三大类，即基金当事人、基金市场服务机构和基金的监管机构和自律组织。", "type": "multi"}, {"id": "cflue_zc_ch6.json_26", "q": "首次募集信息披露主要包括基金份额发售前至基金合同生效期间进行的信息披露。在基金份额发售前，基金管理人需要编制并披露（）。", "c": {"A": "基金份额发售公告", "B": "基金净值公告", "C": "基金招募说明书", "D": "基金合同"}, "a": "ACD", "an": "首次募集信息的披露包括的内容，除上述ABD选项外，还包括基金托管协议。", "type": "multi"}, {"id": "cflue_zc_ch6.json_27", "q": "以资本资产定价模型为基础的评价基金业绩的绝对指标是指（）。", "c": {"A": "标准普尔指数", "B": "詹森指数", "C": "夏普指数", "D": "特雷诺指数"}, "a": "B", "an": "1968年，迈克尔•詹森提出了一种以资本资 R需经美国证券交易委员会注册，有助于保障投资者权益", "D": "某些机构投资者受投资政策限制，不能投资非美国上市证券，ADR可以规避相关限制"}, "a": "ACD", "an": "上市公司发放股利时，ADR投资者能及时获得，而且是以【美元】支付。A错误，其余均正确。", "type": "multi"}, {"id": "cflue_zc_ch7.json_6", "q": "强制减仓制度是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。（）", "c": {"A": "错", "B": "对"}, "a": "B", "an": "【强制减仓制度】是指交易所将当日以涨跌停板价格申报的未成交平仓报单，以当日涨跌停板价格与该合约净持仓盈利客户按照持仓比例自动撮合成交。", "type": "judge"}, {"id": "cflue_zc_ch7.json_7", "q": "与金融现货交易相比，金融期货的特征具体表现在（）。", "c": {"A": "交易目的不同", "B": "交易价格的含义不同", "C": "交易方式不同", "D": "交易对象不同"}, "a": "ABCD", "an": "与金融现货交易相比，金融期货的特征具体表现在：交易对象不同、交易目的不同、交易价格的含义不同、交易方式不同、结算方式不同。", "type": "multi"}, {"id": "cflue_zc_ch7.json_8", "q": "按基础工具划分，金融期货的主要类型包括（）。", "c": {"A": "商品类期货", "B": "外汇期货", "C": "股权类期货", "D": "利率期货"}, "a": "BCD", "an": "按基础工具划分，金融期货类型包括：外汇期货、利率期货、股权类期货。", "type": "multi"}, {"id": "cflue_zc_ch7.json_9", "q": "某大型农场为了防止农用化肥尿素市场价格变动对企业经营带来的风险，于是与某大型尿素供应商签订了以固定价格购货的长期合同。但后来考虑到合同可能存在对手违约风险，于是将规避风险的方式改为在期货市场上利用尿素期货进行套期保值操作。以上描述中，企业的行为旨在规避的风险包括（）。", "c": {"A": "信用风险", "B": "操作风险", "C": "流动性风险", "D": "市场风险"}, "a": "AD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch7.json_10", "q": "关于信用违约互换（简称CDS），下列说法中，正确的有（）。", "c": {"A": "信用违约互换双方约定以某一信用工具做参考", "B": "若参考工具发生规模的信用违约事件，则信用违约出售方须向购买方支付赔偿", "C": "信用违约互换交易具有较高的杠杆性", "D": "最基本的信用违约互换涉及两个或者两个以上当事人"}, "a": "ABC", "an": "最基本的信用违约互换涉及两个当事人，双方约定以某一信用工具为参考，一方向另一方出售信用保护，若参考工具发生规定的信用违约事件，则信用保护出售方必须向购买方支付赔偿。信用违约具有较高的杠杆性。", "type": "multi"}, {"id": "cflue_zc_ch7.json_11", "q": "中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体有（）。", "c": {"A": "发行人", "B": "存托人", "C": "持有人", "D": "托管人"}, "a": "ABC", "an": "中国存托凭证是指由存托人签发、以境外证券为基础在中国境内发行、代表境外基础证券权益的证券。参与主体：发行人、持有人、存托人。", "type": "multi"}, {"id": "cflue_zc_ch7.json_12", "q": "金融衍生工具可以按照（）分为独立衍生工具和嵌入式衍生工具。", "c": {"A": "自身交易方式", "B": "交易场所", "C": "基础工具种类", "D": "产品形态"}, "a": "D", "an": "金融衍生工具根据【产品形态】可分为独立衍生工具和嵌入式衍生工具。&amp;lt;br&amp;gt;按照【自身交易的方法和特点】可以分为金融远期合约、金融期货、金融期权、金融互换和结构化金融衍生工具；&amp;lt;br&amp;gt;按照【基础工具种类】，可以分为股权类产品的衍生工具、货币衍生工具、利率衍生工具、信用衍生工具以及其他衍生工具；&amp;lt;br&amp;gt;按照【交易场所】可分为交易所交易的衍生工具和场外交易市场交易的衍生工具。", "type": "single"}, {"id": "cflue_zc_ch7.json_13", "q": "以政府债券、欧洲美元债券、大面额可转让存单为基础资产的期权属于（）。", "c": {"A": "股票期权", "B": "货币期权", "C": "利率期权", "D": "互换期权"}, "a": "C", "an": "利率期权合约通常以政府短期、中期、长期债券，欧洲美元债券，大面额可转让存单等利率工具为标的物。", "type": "single"}, {"id": "cflue_zc_ch7.json_14", "q": "下列关于沪深300股指期货交易涨跌幅限制的规定，正确的有（）。", "c": {"A": "股指期货合约最后交易日不设涨跌停板", "B": "股指期货合约的涨跌停板幅度为上一交易日结算价的±10%", "C": "季月合约上市首日涨跌停板幅度为挂盘基准价的±20%", "D": "股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±15%"}, "a": "BC", "an": "CD项，股指期货合约最后交易日涨跌停板幅度为上一交易日结算价的±20%。", "type": "multi"}, {"id": "cflue_zc_ch7.json_15", "q": "下列关于期货交易的说法，错误的有（）。", "c": {"A": "期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格不受最小价格变动单位限定和日交易振幅规定", "B": "期货合约在交易所内交易，具有公开性", "C": "期货合约是标准化合约", "D": "期货合约的结算通过专门的结算公司，投资者需要对对方负责，存在信用风险"}, "a": "AD", "an": "期货合约的结算通过专门的结算公司，这是独立于买卖双方的第三方，投资者无须对对方负责，不存在信用风险，而只有价格变动的风险。C错误；期货合约具备对冲机制，履约回旋余地较大，实物交割比例极低，交易价格受最小价格变动单位限定和日交易振幅限定。D错误。", "type": "multi"}, {"id": "cflue_zc_ch7.json_16", "q": "下列关于存托凭证（ADR）的说法，正确的有（）。", "c": {"A": "存托凭证能避开直接发行股票和债券的相关法律要求，上市手续简单，发行成本低", "B": "上市交易的ADR不须经过SE注册", "C": "由于市场容量大，在美国发行ADR的外国公司能在短期内筹集到大量的外汇资金", "D": "存托凭证由J.P摩根首创"}, "a": "ACD", "an": "上市交易的ADR须经美国证券交易委员会(SEC)注册，有助于保障投资者权益。D错误。", "type": "multi"}, {"id": "cflue_zc_ch7.json_17", "q": "关于期货交易，下列说法正确的是（）。", "c": {"A": "期货合约可以不进行实物交收", "B": "期货合约交易双方并不知道交易对手的情况", "C": "期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易", "D": "期货合约可以进行反向交易、平仓了结"}, "a": "ABCD", "an": "期货交易是在集中的交易所市场以公开竞价方式进行的标准化合约交易，具备对冲机制（可进行方向交易）、履约回旋余地较大实物交割比例极低，交易双方不知道互相情况。", "type": "multi"}, {"id": "cflue_zc_ch7.json_18", "q": "与金融衍生产品相对应的基础金融产品可以有（）。", "c": {"A": "银行定期存款单", "B": "商品期货", "C": "股票", "D": "债券"}, "a": "ABCD", "an": "金融衍生工具又被称为金融衍生产品，是与基础金融产品相对应的一个概念，指建立在基础产品或基础变量之上，其价格取决于基础金融产品价格（或数值）变动的派生金融产品。基础金融产品包括现货金融产品（如债券、股票、银行定期存款单等等），也包括金融衍生工具。作为金融衍生工具基础的变量种类繁多，主要是各类资产价格、价格指数、利率、汇率、费率、通货膨胀率以及信用等级等等；近些年来，某些自然现象（如气温、降雪量、霜冻、飓风）甚至人类行为（如选举、温室气体排放）也逐渐成为金融衍生工具的基础变量。商品期货也属于金融衍生工具的一种。", "type": "multi"}, {"id": "cflue_zc_ch 但需要扣除交易费用"}, "a": "A", "an": "股指期货采用保证金交易，具有杠杆效应。投资者买入期货合约（做多），指数上涨则盈利，且保证金制度会放大收益（同时也放大亏损）。选项B和C明显错误，D虽然交易费用确实存在，但核心特征是杠杆收益。", "type": "comprehensive", "material": "金融衍生工具是建立在基础金融工具或金融变量基础之上的金融合约。常见的衍生工具包括远期、期货、期权和互换。2024年，中国金融期货交易所上市了多个股指期货和国债期货品种。", "sub_type": "single"}, {"id": "comp_86154", "q": "某投资者买入一份股票看涨期权，期权费5元，行权价100元。到期日股票价格为120元，该投资者的每股收益为（）。", "c": {"A": "15元", "B": "20元", "C": "5元", "D": "25元"}, "a": "A", "an": "看涨期权收益 = 标的资产价格 - 行权价 - 期权费 = 120 - 100 - 5 = 15元。投资者以5元成本获得按100元买入股票的权利，在股价涨到120元时行权，净赚15元/股。", "type": "comprehensive", "material": "期权合约是赋予买方在约定日期或在此之前以约定价格买卖一定数量标的资产的权利的合约。期权分为看涨期权（Call）和看跌期权（Put），按行权时间分为欧式期权和美式期权。", "sub_type": "single"}, {"id": "cflue_zc_ch8.json_1", "q": "（）可以管理系统性风险和非系统性风险。", "c": {"A": "风险对冲", "B": "风险控制", "C": "风险分散", "D": "风险转业"}, "a": "A", "an": "与风险分散策略不同，风险对冲可以管理系统性风险和非系统性风险，还可以根据投资者的风险承受能力和偏好，通过对冲比率的调节，将风险降低到预期水平。", "type": "single"}, {"id": "cflue_zc_ch8.json_2", "q": "操作风险损失数据收集主要基于（）等几个方面。", "c": {"A": "外部损失数据", "B": "情景分析", "C": "业务环境和内部控制因素", "D": "内部损失数据"}, "a": "ABCD", "an": "操作风险损失数据收集主要基于：（1）内部损失数据；（2）外部损失数据；（3）情景分析；（4）业务环境和内部控制因素。", "type": "multi"}, {"id": "cflue_zc_ch8.json_3", "q": "（）通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。", "c": {"A": "操作风险", "B": "信用风险", "C": "违约风险", "D": "市场风险"}, "a": "B", "an": "【信用风险】通常被定义为公司融资类客户、交易对手或公司持有证券的发行人在无法履行合同义务的情况下，给公司造成损失的可能性，或者相关信用质量发生恶化情况下，给公司造成损失的可能性。", "type": "single"}, {"id": "cflue_zc_ch8.json_4", "q": "内部评级所反映的被评级对象的风险特征主要是（）。", "c": {"A": "交易工具的违约损失率", "B": "借款者的违约概率", "C": "预期损失和非预期损失", "D": "违约风险暴露"}, "a": "AB", "an": "内部评级所反映的被评级对象的风险特征主要是借款者的违约概率和交易工具的违约损失率。", "type": "multi"}, {"id": "cflue_zc_ch8.json_5", "q": "如果某金融机构风险管理部门计算得到其资产组合在持有期100天内，在99%的置信水平下的VaR值为1000万人民币，那么这意味着该金融机构的资产组合可以被预期（）。", "c": {"A": "在未来的100天中有1%的概率至多损失1000万人民币", "B": "在未来的100天中有99%的概率至少损失1000万人民币", "C": "在未来的100天中有1%的概率至少损失1000万人民币", "D": "在未来的100天中有99%的概率至多损失1000万人民币"}, "a": "D", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch8.json_6", "q": "风险识别是指（）的过程。", "c": {"A": "找出风险原因", "B": "鉴定风险性质", "C": "对影响各类目标实现的潜在事项或因素予以全面识别", "D": "依据风险定义进行系统分类"}, "a": "ABCD", "an": "风险识别是指对影响各类目标实现的潜在事项或因素予以全面识别、依据风险定义进行系统分类、鉴定风险性质并找出风险原因的过程。", "type": "multi"}, {"id": "cflue_zc_ch8.json_7", "q": "根据导致市场风险因素的不同，市场风险一般划分为（）。", "c": {"A": "外汇风险", "B": "股票价格风险", "C": "商品风险", "D": "利率风险"}, "a": "ABCD", "an": "根据导致市场风险他因素的不同，市场风险一般划分为利率风险、外汇风险、股票价格风险与商品风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_8", "q": "下面属于风险管理的方法是（）。", "c": {"A": "风险补偿", "B": "风险分散", "C": "风险预防", "D": "风险规避"}, "a": "ABCD", "an": "风险管理的主要方法包括：风险预防、风险规避、风险分散、风险对冲、风险转移和风险补偿。", "type": "multi"}, {"id": "cflue_zc_ch8.json_9", "q": "证券市场系统性风险可以来自于（）。", "c": {"A": "通货膨胀", "B": "新政策出台", "C": "证券价格日常波动", "D": "市场利率变动"}, "a": "ABD", "an": "系统性风险是指是指对整个股票市场或绝大多数股票普遍产生不利影响，由于公司外部、不为公司所预计和控制的因素造成的风险。B不属于系统性风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_10", "q": "属于非系统性风险的有（）。", "c": {"A": "市场加息引起股票指数下跌", "B": "公司财产因火灾受损", "C": "某公司产品研发导致股价下跌", "D": "因债务人违约导致公司股价波动"}, "a": "BCD", "an": "非系统风险，是指发生于个别公司的特有事件造成的风险，纯粹由于个股自身的因素引起的个股价格变化以及由于这种变化导致的个股收益率的不确定性。", "type": "multi"}, {"id": "cflue_zc_ch8.json_11", "q": "下列各项中，不属于风险管理中的风险转移策略的有（）。", "c": {"A": "风险补偿", "B": "风险规避", "C": "风险分散", "D": "信用担保"}, "a": "ABC", "an": "风险转移可分为保险转移和非保险转移。保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司。非保险转移通常采用【担保】和备用信用证等方式将风险转嫁给第三方。例如，当金融机构提供信用贷款时，通常需要借款人提供第三方担保，如不能到期偿还贷款，由担保方代为偿还。故只有C属于。答案选择ABD。", "type": "multi"}, {"id": "cflue_zc_ch8.json_12", "q": "在一般情况下，风险管理的流程主要包括（）。", "c": {"A": "风险的应对", "B": "风险的识别", "C": "风险的监测、预警与报告", "D": "风险的衡量"}, "a": "ABCD", "an": "在一般情况下，风险管理的流程主要包括：风险的识别，风险的衡量，风险的应对，风险的监测、预警与报告。", "type": "multi"}, {"id": "cflue_zc_ch8.json_13", "q": "流动性覆盖率的计算公式为（）。", "c": {"A": "优质流动性资产/未来30天现金净流出量×100%", "B": "优质流动性资产/未来90天现金净流出量×100%", "C": "贷款余额/存款余额×100%", "D": "流动性资产余额/流动性负债余额×100%"}, "a": "A", "an": "略。", "type": "single"}, {"id": "cflue_zc_ch8.json_14", "q": "从机构层面衡量流动性风险的资产负债结构指标不包括（）。", "c": {"A": "速动比率", "B": "净稳定资金率", "C": "现金流量比率", "D": "流动比率"}, "a": "C", "an": "从机构层面衡量流动性风险的资产负债结构指标包括流动比率、速动比率和净稳定资金率。", "type": "single"}, {"id": "cflue_zc_ch8.json_15", "q": "中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到（）情形时，应当开展专项或综合压力测试。", "c": {"A": "利润分配或其他资本性支出", "B": "重大固定资产投资", "C": "重大对外投资或收购", "D": "重大对外担保"}, "a": "ABCD", "an": "中国证券业协会2016年颁布的《证券公司压力测试指引》指出，证券公司在遇到以下情形之一时，应当开展专项或综合压力测试：重大对外投资或收购、重大对外担保、重大固定资产投资、利润分配或其他资本性支出、证券公司分类评价结果负向调整、负债集中到期或赎回等可能导致净资本和流动性等风险控制指标发生明显不利变化或接近预警线的情形；确定重大业务规模和开展重大创新业务；确定经营计划和业务规模、确定自营投资规模限额、开展重大创新业务、承担重大包销责任等；预期或已经出现重大内部风险状况；自营投资大幅亏损，政府部门行政处罚、诉讼、声誉受损等；预期或已经出现重大外部风险和政策变化事件；证券市场大幅波动，监管政策发生重大变化等；其他可能或已经出现的压力情景。", "type": "multi"}, {"id": "cflue_zc_ch8.json_16", "q": "下列属于传统信用风险评估方法的是（）。", "c": {"A": "5Cs", "B": "信用评级", "C": "专家系统", "D": "信用打分模型"}, "a": "ACD", "an": "传统信用风险评估方法包括：专家系统、5Cs和信用打分模型。", "type": "multi"}, {"id": "cflue_zc_ch8.json_17", "q": "（）作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。", "c": {"A": "波动性分析", "B": "置信水平", "C": "VaR模型", "D": "期望损失模型"}, "a": "D", "an": "期望损失模型作为一种金融风险度量工具，可以给风险管理者提供频率分布中最坏区域平均损失大小的准确信息。", "type": "single"}, {"id": "cflue_zc_ch8.json_18", "q": "现代信用风险转移方法不包括（）。", "c": {"A": "信用远期协议", "B": "TRP", "C": "辛迪加贷款", "D": "信用关联票据"}, "a": "C", "an": "【现代】信用风险转移方法包括TRP、信用关联票据和信用远期协议。&amp;lt;br&amp;gt;【传统】信用风险转移的方法主要有信用保险、【辛迪加贷款】、贷款出售、资产互换等形式。故B错误。", "type": "single"}, {"id": "cflue_zc_ch8.json_19", "q": "证券公司声誉风险管理应遵循以下（）原则。", "c": {"A": "快速响应原则", "B": "审慎管理原则", "C": "预防第一原则", "D": "全程全员原则"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch8.json_20", "q": "关于VaR，下列说法正确的有（）。", "c": {"A": "能够用于对整个行业的各种风险进行全面的量化", "B": "可以用于不同的金融产品", "C": "最初由摩根公司开发", "D": "可以定量地对市场总风险进行度量"}, "a": "BCD", "an": "D项，VaR方法衡量的主要是市场风险，如单纯依靠VaR方法，就会忽视其他种类的风险如信用风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_21", "q": "操作风险分为（）所引发的四类风险。", "c": {"A": "外部事件", "B": "人员", "C": "系统", "D": "流程"}, "a": "ABCD", "an": "操作风险的一种分类方法是根据定义将其划分为由人员、系统、流程和外部事件所引发的四类风险。", "type": "multi"}, {"id": "cflue_zc_ch8.json_22", "q": "市场的流动性是由（）维度因素决定的。", "c": {"A": "密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好", "B": "弹性，即基础价格在受到影响后重新恢复的速度", "C": "深度，即执行大规模交易而不对价格产生过度影响的能力", "D": "即时性，即交易执行的速度"}, "a": "ABCD", "an": "市场的流动性是由四个维度因素决定的：一是深度，即执行大规模交易而不对价格产生过度影响的能力；二是密度，即买卖价格的缺口，资产的买卖价差越小，流动性越好；三是即时性，即交易执行的速度；四是弹性，即基础价格在受到影响后重新恢复的速度。", "type": "multi"}, {"id": "cflue_zc_ch8.json_23", "q": "风险分散是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "【风险对冲】是指通过投资或购买与标的资产收益波动负相关的某种资产或衍生产品，来冲销标的资产潜在损失的一种策略性选择。", "type": "judge"}, {"id": "cflue_zc_ch8.json_24", "q": "风险控制是金融机构的核心竞争力。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "风险管理是金融机构的核心竞争力。", "type": "judge"}, {"id": "cflue_zc_ch8.json_25", "q": "风险管理的“三道防线”指的是在金融机构内部构造出三支对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。这三道防线是指（）。", "c": {"A": "风险管理部门和合规部门", "B": "外部审计", "C": "内部审计", "D": "业务条线部门"}, "a": "ACD", "an": "风险管理的“三道防线”指的是在金融机构内部构造出三个对风险管理承担不同职责的团队和管理部门，相互之间协调配合，分工协作，并通过独立、有效的监控，提高主体的风险管理有效性。【业务条线部门】是第一道风险防线，是风险的承担者，应负责持续识别、评估和报告风险敞口。【风险管理部门和合规部门】是第二道风险防线。风险管理部门负责监督和评估业务部门承担风险的业务活动；合规部门负责定期监控机构对于法律、公司治理规则、监管规定、行为规范和政策的执行情况。风险管理和合规部门均应独立于业务条线部门。【内部审计】是第三道风险防线。内部审计部门对机构风险治理框架的质量和有效性进行独立的审计。", "type": "multi"}, {"id": "cflue_zc_ch8.json_26", "q": "下列对于风险限额的相关概念，说法正确的是（）。", "c": {"A": "限额管理体现了现代风险管理是一种全面的风险管理", "B": "限额管理体现了任何金融产品是风险与收益的组合，投资是以风险换收益", "C": "限额管理是一种对风险的实时动态管理", "D": "限额管理体现了风险管理是一种积极的事前管理"}, "a": "ABCD", "an": "略。", "type": "multi"}, {"id": "cflue_zc_ch8.json_27", "q": "从市场层面衡量流动性风险的指标不包括（）。", "c": {"A": "流动性覆盖率", "B": "冲击成本", "C": "买卖价差法", "D": "换手率"}, "a": "A", "an": "从市场层面衡量流动性风险的指标包括买卖价差法、换手率、冲击成本。", "type": "single"}, {"id": "cflue_zc_ch8.json_28", "q": "（）是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。", "c": {"A": "有效价差", "B": "资料流动性风险", "C": "买卖价差法", "D": "冲击成本"}, "a": "D", "an": "冲击成本是机构大户面临的流动性成本的重要表现，是指在交易中需要迅速而且大规模地买进或者卖出证券，不能按照预定价位成交而多支付的成本。国际上通常用它来衡量股市、期市的流动性。", "type": "single"}, {"id": "cflue_zc_ch8.json_29", "q": "风险预警是风险偏好、风险限额以及日常风险管理得以有效实施的重要保障。（）", "c": {"A": "错", "B": "对"}, "a": "A", "an": "风险监测是风险管理的重要一环，是风险偏好、风险限额以及日常风险管理得以有效实施的重要保障。" var CH_MAP = [{"code": "第1章", "name": "金融市场体系", "start": 0, "count": 63}, {"code": "第2章", "name": "中国的金融体系与多层次资本市场", "start": 63, "count": 66}, {"code": "第3章", "name": "证券市场主体", "start": 129, "count": 61}, {"code": "第4章", "name": "股票", "start": 190, "count": 120}, {"code": "第5章", "name": "债券", "start": 310, "count": 115}, {"code": "第6章", "name": "证券投资基金", "start": 425, "count": 75}, {"code": "第7章", "name": "金融衍生工具", "start": 500, "count": 64}, {"code": "第8章", "name": "金融风险管理", "start": 564, "count": 51}];
var STORAGE_KEY = 'sec_exam_chapter_金融市场基础';
var state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
var currentCh = 0;
var currentSec = -1;
var selected = {};

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function renderSectionView() {
  var el = document.getElementById('sectionView');
  var html = '';
  SECTION_DATA.forEach(function(ch, ci) {
    var chInfo = CHAPTERS[ci] || {};
    var stars = '★'.repeat(chInfo.stars||0) + '☆'.repeat(5-(chInfo.stars||0));
    html += '<div class="ch-card"><div class="ch-head" onclick="toggleSections('+ci+')">'
         + '<div><div class="name">'+esc(ch.chapter)+'</div>'
         + '<div class="meta">'+stars+' · '+ch.ch_count+'题</div></div>'
         + '<span class="arrow">▼</span></div>'
         + '<div class="sec-list" id="secList-'+ci+'">';
    ch.sections.forEach(function(sec, si) {
      var pct = ch.ch_count > 0 ? Math.round(sec.q_count/ch.ch_count*100) : 0;
      html += '<div class="sec-item" onclick="startSection('+ci+','+si+')">'
           + '<span class="sname">'+esc(sec.name)+'</span>'
           + '<div class="sbar"><div class="sbar-fill" style="width:'+pct+'%"></div></div>'
           + '<span class="scount">'+sec.q_count+'题</span></div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function toggleSections(ci) {
  var head = document.querySelectorAll('.ch-head')[ci];
  var list = document.getElementById('secList-'+ci);
  if (!list) return;
  head.classList.toggle('exp');
  list.classList.toggle('show');
}

function startSection(ci, si) {
  currentCh = ci; currentSec = si;
  renderNav(); renderStats(); renderQuestions();
  document.getElementById('sectionView').classList.add('hidden');
  document.getElementById('questionView').classList.add('show');
}

function showSectionView() {
  document.getElementById('sectionView').classList.remove('hidden');
  document.getElementById('questionView').classList.remove('show');
}

function renderNav() {
  var nav = document.getElementById('chNav');
  var html = '';
  CHAPTERS.forEach(function(ch, i) {
    var a = i === currentCh ? 'on' : '';
    html += '<div class="ch-btn '+a+'" onclick="switchCh('+i+')">'
         + '<span class="ch-title">'+esc(ch.name)+'</span>'
         + '<span class="ch-meta">'+ch.count+'题</span></div>';
  });
  nav.innerHTML = html;
}

function renderStats() {
  var ch = CH_MAP[currentCh];
  if (!ch) return;
  var start, count;
  if (currentSec >= 0) {
    var sec = SECTION_DATA[currentCh].sections[currentSec];
    start = sec.q_start; count = sec.q_count;
  } else { start = ch.start; count = ch.count; }
  var done=0, correct=0;
  for (var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) {
    if (state[i] && state[i].done) { done++; if (state[i].correct) correct++; }
  }
  var pct = done>0 ? Math.round(correct/done*100) : 0;
  document.getElementById('stats').innerHTML = '<span>📝 '+done+'/'+count+' 已做</span><span class="pct">✅ '+pct+'%</span>';
  document.getElementById('progressFill').style.width = (count>0?Math.round(done/count*100):0)+'%';
}

function getQs() {
  var ch = CH_MAP[currentCh];
  if (!ch) return [];
  var start, count;
  if (currentSec >= 0) {
    var sec = SECTION_DATA[currentCh].sections[currentSec];
    start = sec.q_start; count = sec.q_count;
  } else { start = ch.start; count = ch.count; }
  var qs = [];
  for (var i=start; i<start+count && i<ALL_QUESTIONS.length; i++) qs.push({idx:i, q:ALL_QUESTIONS[i]});
  return qs;
}

function renderQuestions() {
  var c = document.getElementById('questionList');
  var qs = getQs();
  var html = '';
  qs.forEach(function(item) {
    var q = item.q, idx = item.idx, s = state[idx] || {};
    var keys = Object.keys(q.c);
    var isSingle = q.type==='single'||q.type==='judge';
    var tl = q.type==='judge'?'判断':(q.type==='multi'?'多选':'单选');
    html += '<div class="q-wrap" id="qw-'+idx+'">';
    html += '<div class="q-head"><span class="q-num">'+(qs.indexOf(item)+1)+'.</span><span class="q-tag">'+tl+'</span></div>';
    html += '<div class="q-text">'+esc(q.q)+'</div><div class="opts" id="opts-'+idx+'">';
    keys.forEach(function(key) {
      var val = q.c[key];
      if (val==null) return;
      var extra = '';
      if (s.done) {
        var isC = q.a.indexOf(key)>=0;
        var isSel = s.answers && s.answers.indexOf(key)>=0;
        extra = isSel&&isC ? ' correct disabled' : (isSel&&!isC ? ' wrong disabled' : (isC ? ' correct disabled' : ' disabled'));
      }
      html += '<div class="opt'+extra+'" onclick="toggleOpt('+idx+',\''+key+'\')"><span class="okey">'+key+'</span><span class="oval">'+esc(val)+'</span></div>';
    });
    html += '</div>';
    if (s.done) {
      html += '<div class="ans-box '+(s.correct?'correct':'wrong')+'">'+(s.correct?'✅ 回答正确':'❌ 回答错误')+' · 正确答案：'+esc(q.a)+(s.answers&&!s.correct?' · 你的答案：'+esc(s.answers.join('')):'')+'</div>';
      html += '<div class="ans-box" style="background:var(--card-alt);border-color:var(--border-light);color:var(--text);margin-top:0.3rem;"><div class="a-text">'+esc(q.an)+'</div></div>';
    }
    html += '</div>';
  });
  html += '<div class="action-row"><button class="btn-check" onclick="checkAll()">📝 批改本页</button><button class="btn-reset" onclick="resetAll()">🔄 重置本页</button></div>';
  c.innerHTML = html;
}

function switchCh(idx) { currentCh=idx; currentSec=-1; renderNav(); renderStats(); renderQuestions(); }

function toggleOpt(idx, key) {
  if (state[idx] && state[idx].done) return;
  if (!selected[idx]) selected[idx]=[];
  var arr = selected[idx], pos = arr.indexOf(key);
  var q = ALL_QUESTIONS[idx], isSingle = q.type==='single'||q.type==='judge';
  if (isSingle) { selected[idx]=[key]; } else { if(pos>=0) arr.splice(pos,1); else arr.push(key); }
  var opts = document.getElementById('opts-'+idx);
  if (opts) opts.querySelectorAll('.opt').forEach(function(o) {
    o.classList.toggle('selected', selected[idx].indexOf(o.dataset.key||'')>=0);
  });
}

function checkSingle(idx) {
  var q = ALL_QUESTIONS[idx];
  if (state[idx] && state[idx].done) return;
  var sel = selected[idx]||[]; if(sel.length===0) return;
  var isC = sel.sort().join('') === q.a;
  state[idx] = {done:true, correct:isC, answers:sel.slice()};
  saveState();
}

function checkAll() { getQs().forEach(function(item){ checkSingle(item.idx); }); renderStats(); renderQuestions(); }

function resetAll() {
  getQs().forEach(function(item){ delete state[item.idx]; delete selected[item.idx]; });
  saveState(); renderStats(); renderQuestions();
}

function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

renderSectionView();
</script>
