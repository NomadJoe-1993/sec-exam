"公司的投资价值并不因所处行业不同而有明显差异","D":"行业分析是连接宏观经济分析和上市公司分析的桥梁"},"a":"C","an":"A正确：行业经济是宏观经济的构成部分，宏观经济活动是行业经济活动的总和。 B正确：行业分析和公司分析是相辅相成的。 C错误：公司的投资价值会因所处行业不同而有明显差异，行业是决定公司投资价值的重要因素之一。 D正确：行业分析是对上市公司进行分析的前提，也是连接宏观经济分析和上市公司分析的桥梁，是基本分析的重要环节。","type":"single"},{"id":"cy_fin_2591","q":"关于外币汇率上升、本币贬值对证券市场的影响，下列说法正确的有 ()","c":{"A":"导致资本流出本国，证券市场需求减少，市场价格下跌","B":"本币表示的进口商品价格提高，带动国内物价水平上涨，引起通货膨胀","C":"出口型企业的股票价格上涨","D":"政府可能动用外汇储备，抛售外汇减少本币供应量，证券市场价格下跌"},"a":"A,B,C,D","an":"C正确：以外币为基准，汇率上升，本币贬值，本国产品竞争力强，出口型企业将增加收益，因而企业的股票和债券价格将上涨；相反，依赖于进口的企业成本增加，利润受损，股票和债券的价格将下跌。 A正确：同时，汇率上升，本币贬值，将导致资本流出本国，资本的流失将使得本国证券市场需求减少，从而市场价格下跌。 B正确：汇率上升时，本币表示的进口商品价格提高，进而带动国内物价水平上涨，引起通货膨胀。 D正确：为维持汇率稳定，政府可能动用外汇储备，抛售外汇，从而减少本币的供应量，使得证券市场价格下跌，直到汇率回落恢复均衡，反面效应可能使证券价格回升。 综上，该题选ABCD。","type":"multi"},{"id":"cy_fin_2593","q":"“飓风始于青萍之末”，可以类指（）证券分析法。","c":{"A":"自上而下","B":"自下而上","C":"宏观经济分析","D":"行业观察"},"a":"B","an":"自下而上法从个股研究出发，然后再形成对行业、市场的观点。 自上而下法从宏观分析的维度出发，先对宏观环境形成预期，再选取能够反映相应趋势的行业、个股。","type":"single"},{"id":"cy_fin_2595","q":"证券公司、证券投资咨询机构应当采取有效措施，保证制作发布证券研究报告不受（   ）等利益相关者的干涉和影响。","c":{"A":"基金管理公司","B":"资产管理公司","C":"证券发行人","D":"上市公司"},"a":"A,B,C,D","an":"证券公司、证券投资咨询机构应当采取有效措施，保证制作发布证券研究报告不受证券发行人、上市公司、基金管理公司、资产管理公司等利益相关者的干涉和影响。","type":"multi"},{"id":"cy_fin_2597","q":"发布对具体股票做出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份（  ）以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况。","c":{"A":"0.01","B":"0.05","C":"0.1","D":"0.03"},"a":"A","an":"根据《发布证券研究报告暂行规定》第十二条，发布对具体股票做出明确估值和投资评级的证券研究报告时，公司持有该股票达到相关上市公司已发行股份1%以上的，应当在证券研究报告中向客户披露本公司持有该股票的情况，并且在证券报告发布日及第二个交易日，不得进行与证券研究报告观点相反的交易。","type":"single"},{"id":"cy_fin_2599","q":"证券研究报告按研究内容分类，一般有（）。","c":{"A":"宏观研究","B":"行业研究","C":"策略研究","D":"公司研究"},"a":"A,B,C,D","an":"证券研究报告按研究内容分类，一般有宏观研究、行业研究、策略研究、公司研究、量化研究等， 按研究品种分类，主要有股票研究、基金研究、债券研究、衍生品研究等。","type":"multi"},{"id":"cy_fin_2601","q":"证券研究报告的基本要素包括（）。","c":{"A":"宏观经济、行业或上市公司的基本面分析","B":"上市公司盈利预测","C":"估值及投资评级","D":"法规解读"},"a":"A,B,C,D","an":"证券研究报告的基本要素包括：宏观经济、行业或上市公司的基本面分析；上市公司盈利预测、法规解读、估值及投资评级；相关信息披露和风险提示。  考点  证券研究报告的基本要素","type":"multi"},{"id":"cy_fin_2603","q":"证券分析师应当保待独立性，不因所在公司内部其他部门、证券发行人、上市公司、基金管理公司、资产管理公司等利益相关者的不当要求而放弃自己的独立立场。","c":{"1":"对","0":"错"},"a":"1","an":"证券分析师应当保待独立性，不因所在公司内部其他部门、证券发行人、上市公司、基金管理公司、资产管理公司等利益相关者的不当要求而放弃自己的独立立场。","type":"judge"},{"id":"cy_fin_2605","q":"甲公司有一笔闲置资金，拟投资于某证券组合，该组合由X、Y、Z三种股票构成，资金权重分别为40%，30%和30%，β系数分别为2.5，1.5和1。Y的预期收益率是10%,Z的预期收益率是8%,其中X股票投资收益率的概率分布如下：  计算X股票和该证券组合的预期收益率（   ）","c":{"A":"13%，10.6%","B":"10.6%，13%","C":"6.5%，13%","D":"13%，6.5%"},"a":"A","an":"1.×股票预期收益率＝30%×20%＋50%×12%＋20%×5%＝13%  2.证券组合预期收益率＝40%×13%＋30%×10%＋30%×8%＝10.6%","type":"single"},{"id":"cy_fin_2607","q":"弱式有效市场假说认为，市场价格已充分反映出所有过去历史的证券价格信息。下列说法中，属于弱式有效市场所反映出的信息是（  ）。","c":{"A":"成交量","B":"财务信息","C":"内幕信息","D":"公司管理状况"},"a":"A","an":"弱式有效市场假说认为在弱势有效的情况下，市场价格已充分反映出所有过去历史的证券价格信息，包括股票的成交价、成交量等。","type":"single"},{"id":"cy_fin_2609","q":"在弱式有效的情况下，市场价格已充分反映出所有过去历史的证券价格信息，包括股票的成交价、成交量等。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"在弱式有效的情况下，市场价格已充分反映出所有过去历史的证券价格信息，包括股票的成交价、成交量等。","type":"judge"},{"id":"cy_fin_2611","q":"一般而言，证券市场伴随（）呈现上升趋势。","c":{"A":"总体经济增长","B":"人们对经济形势的良好预期","C":"GDP的持续增长","D":"高通胀下的GDP增长"},"a":"A,B,C","an":"本题考查宏观经济变动与证券市场波动的关系。 当GDP持续、稳定、高速增长时，证券市场将基于以下原因呈现上升趋势：①伴随总体经济增长，上市公司利润持续上升，股息不断增长，产销两旺，促使价格上扬；②人们对经济形势形成了良好的预期，增加了对证券的需求，促使证券价格上涨；③随着GDP的持续增长，国民收入和个人收入都不断得到提高，导致股份上涨。 D选项错误，当发生高通胀下的GDP增长时，失衡的经济增长必将导致证券市场行情下跌。","type":"multi"},{"id":"cy_fin_2613","q":"证券市场的供给主体是公司(企业)、政府与政府机构以及金融机构。","c":{"1":"对","0":"错"},"a":"1","an":"证券市场的供给主体是公司(企业)、政府与政府机构以及金融机构。公司(企业)通过向市场发行股票、公司(企业)债和权证等产品进行融资。政府与政府机构包括中央政府、地方政府以及中央政府直属机构，其为债券产品的主要供给方。","type":"judge"},{"id":"cy_fin_2615","q":"在证券投资分析中，公司分析的对象主要是指上市公司，以及一些与上市公司存在关联关系或收购行为的非上市公司。（   ）","c":{"1":"对","0":"错"},"a":"1","an":"在证券投资分析中，公司分析的对象主要是指上市公司，以及一些与上市公司存 在关联关系或收购行为的非上市公司。","type":"judge"},{"id":"cy_fin_2617","q":"证券公司自营业务投资范围包括(  )。","c":{"A":"计划在全国中小企业股份转让系统挂牌转让的证券","B":"政府债券","C":"央行票据","D":"短期融资券"},"a":"B,C,D","an":"证券公司证券自营投资品种清单包括： (1)已经和依法可以在境内证券交易所上市交易和转让的证券。 (2)已经在全国中小企业股份转让系统挂牌转让的证券。 (3)已经和依法可以在符合规定的区域性股权交易市场挂牌转让的私募债券，已经在符合规定的区域性股权交易市场挂牌转让的股票。 (4)已经和依法可以在境内银行间市场交易的证券。这类证券主要是政府债券、国际开发机构人民币债券、央行票据、金融债券、短期融资券、公司债券、中期票据、企业债券。 (5)经国家金融监管部门或者其授权机构依法批准或备案发行并在境内金融机构柜台交易的证券。","type":"multi"},{"id":"cy_fin_2619","q":"外国债券的特点是债券发行者、债券发行地点和债券面值所使用货币可以分别属于不同国家。(  )","c":{"1":"对","0":"错"},"a":"0","an":"外国债券是指某一国家借款人在本国以外的某一国家发行以该国货币为面值的债券。 它的特点是：【债券发行人】属于一个国家，【债券的面值货币】和【发行市场】属于另一个国家。","type":"judge"},{"id":"cy_fin_2621","q":"根据《公司债券发行与交易管理办法》，以下哪项不是公开发行公司债券必须符合的条件(  )。","c":{"A":"公司的注册资本不低于人民币 5000 万元","B":"具备健全且运行良好的组织机构","C":"具有合理的资产负债结构和正常的现金流量","D":"最近三年平均可分配利润足以支付公司债券一年的利息"},"a":"A","an":"根据《公司债券发行与交易管理办法》，公开发行公司债券，应当符合下列条件： B 选项：具备健全且运行良好的组织机构，这是保障公司能合理决策、规范运营的基础，确保债券发行和后续偿债有稳定的组织架构支持。 C 选项：具有合理的资产负债结构和正常的现金流量，合理的资产负债结构反映公司财务风险可控，正常的现金流量能保证公司有足够资金支付债券利息和本金 。 D 选项：最近三年平均可分配利润足以支付公司债券一年的利息，这一条件确保公司有足够的盈利能力来承担债券的利息支付义务，保护债券投资者的利益。 而 A 选项中，公司的注册资本不低于人民币 5000 万元并非公开发行公司债券的必要条件。","type":"single"},{"id":"cy_fin_2623","q":"现券交易也可以被称为债券的（），是指证券买卖双方在成交后就办理交收手续，买入者付出资金并得到证券，卖出者交付证券并得到资金。","c":{"A":"回购交易","B":"远期交易","C":"即期交易","D":"市场交易"},"a":"C","an":"现券交易也称即期交易，是指债券买卖双方在成交后就办理交收手续，买入者付出资金并得到证券，卖出者交付证券并得到资金。","type":"single"},{"id":"cy_fin_2625","q":"资产证券化交易比较复杂，涉及的当事人较多。关于相关当事人在证券化过程中具有的重要作用，说法错误的是(  )。","c":{"A":"资产证券化的发起人是资产证券化的起点","B":"特殊目的机构是介于发起人和投资者之间的中介机构，是资产支持证券的真正发行人","C":"可以证券化的资产都属于优质资产，发行前不需要经过评级机构的信用评级","D":"受托人托管资产组合以及与之相关的一切权利，代表投资者行使职能"},"a":"C","an":"C选项错误，如果发行的证券化产品属于债券，发行前必须经过评级机构进行信用评级。ABD说法正确。","type":"single"},{"id":"cy_fin_2627","q":"金融债券发行人应在中国人民银行核准金融债券发行之日起(  )个工作日内开始发行金融债券，并在规定期限内完成发行。","c":{"A":"90","B":"30","C":"60","D":"45"},"a":"C","an":"发行人应在中国人民银行核准金融债券发行之日起60个工作日内开始发行金融债券，并在规定期限内完成发行。","type":"single"},{"id":"cy_fin_2629","q":"下列关于金融债券发行目的的说法中，错误的是（  ）。","c":{"A":"金融机构改变资产负债结构","B":"金融机构筹措资金","C":"增加核心资本","D":"筹资用于某种特殊用途"},"a":"C","an":"银行和非银行金融机构是社会信用的中介，它们的资金主要来源于吸收公众存款和金融业务收入。它们发行债券的目的主要有：（1）筹资用于某种特殊用途。（2）改变本身的资产负债结构。C选项属于干扰项，答案选C。","type":"single"},{"id":"cy_fin_2631","q":"证券公司自营业务范围包括(  )。","c":{"A":"股票","B":"债券","C":"证券投资基金","D":"符合规定的期货产品，少量购买以小幅盈利为目标"},"a":"A,B,C","an":"证券公司从事自营业务，其投资的范围包括股票、基金、认股权证、国债、公司或企业债券等上市证券以及证券监管机构认定的其他证券，ABC符合题意，D属于干扰项。","type":"multi"},{"id":"cy_fin_2633","q":"双方约定在未来某一时刻，按照现在确定的价格买卖标的证券的行为称为远期交易。( )","c":{"1":"对","0":"错"},"a":"1","an":"远期交易是双方约定在未来某一时刻(或时间段内)按照现在确定的价格买卖标的债券的行为。","type":"judge"},{"id":"cy_fin_2635","q":"发生可能对上市交易公司债券的交易价格产生较大影响的重大事件，投资者尚未得知时，公司应当立即将有关该重大事件的情况向国务院证券监督管理机构和证券交易场所报送临时报告，并予公告，说明事件的起因、目前的状态和可能产生的法律后果。上述所称重大事件包括： 公司新增借款或者对外提供担保超过上年末净资产的（）。","c":{"A":"0.1","B":"0.15","C":"0.2","D":"0.05"},"a":"C","an":"选项C正确：发生可能对上市交易公司债券的交易价格产生较大影响的重大事件，投资者尚未得知时，公司应当立即将有关该重大事件的情况向国务院证券监督管理机构和证券交易场所报送临时报告，并予公告，说明事件的起因、目前的状态和可能产生的法律后果。上述所称重大事件包括： 公司新增借款或者对外提供担保超过上年末净资产的百分之二十。","type":"single"},{"id":"cy_fin_2637","q":"自债权人会议各表决组通过重整计划草案之日起（）日内，证券公司或者管理人应当向人民法院提出批准重整计划的申请。","c":{"A":"20日","B":"30日","C":"15日","D":"10日"},"a":"D","an":"选项D正确：自债权人会议各表决组通过重整计划草案之日起【10日内】，证券公司或者管理人应当向人民法院提出批准重整计划的申请。","type":"single"},{"id":"cy_fin_2639","q":"下列关于证券公司合规部门、业务部门和分支机构的合规管理人员配备，说法错误的是（）。","c":{"A":"证券公司业务部门、分支机构应当配备具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历的合规管理人员","B":"证券公司合规管理人员不得兼任其他任何职务","C":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员","D":"证券公司应当为合规部门配备足够的、具备与履行合规管理职责相适应的专业知识和技能的合规管理人员"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司合规管理人员可以兼任与合规管理职责不相冲突的职务（而非完全禁止兼任）。因此答案选择B。 选项AD正确：证券公司业务部门、分支机构应当配备具备3年以上证券、金融、法律、会计、信息技术等有关领域工作经历，具备与履行合规管理职责相适应的专业知识和技能的合规管理人员。 选项C正确：证券公司从事自营、投资银行、债券等合规风险管控难度较大的业务部门、工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。","type":"single"},{"id":"cy_fin_2641","q":"根据《关于调整证券交易佣金收取标准的通知》，下列说法正确的有（） 。","c":{"A":"证券经纪商向客户收取的佣金不得高于证券交易金额的5‰，也不得低于代收的证券交易监管费和证券交易所手续费等","B":"A股，证券投资基金每笔交易佣金不足5元的，按5元收取","C":"B股，每笔交易佣金不足1美元或5港元的，按1美元或5港元收取","D":"国债现券、企业债(含可转债)、国债回购以及以后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会和原国家计委备案，备案15天内无异议后实施"},"a":"B,C,D","an":"选项A错误：证券经纪商向客户收取的佣金不得高于证券交易金额的3‰（并非5‰），也不得低于代收的证券交易监管费和证券交易所手续费等。 选项B正确：A股，证券投资基金每笔交易佣金不足5元的，按5元收取。 选项C正确：B股，每笔交易佣金不足1美元或5港元的，按1美元或5港元收取。 选项D正确：国债现券、企业债(含可转债)、国债回购以及以后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会和原国家计委备案，备案15天内无异议后实施。","type":"multi"},{"id":"cy_fin_2643","q":"金融债券发行人将相关债券信息披露文件送中央结算公司的，通过（）披露。","c":{"A":"全国银行间同业拆借中心","B":"中央国债登记结算有限责任公司","C":"中国货币网","D":"中国债券信息网"},"a":"D","an":"这里要注意“分别”的含义，发行人将相关信息披露文件报送至全国银行间同业拆借中心，则通过中国货币网披露；如果发行人将相关信息披露文件报送至中央结算公司，则通过中国债券信息网披露。 选项D正确：发行人将相关信息披露文件分别送全国银行间同业拆借中心和中央结算公司，由同业拆借中心和中央结算公司分别通过中国货币网和【中国债券信息网】披露。 选项A错误：全国银行间同业拆借中心是文件报送的对象，但不是信息披露平台 选项B错误：中央国债登记结算有限责任公司（简称 “中债登”）是银行间市场的债券登记托管结算机构，主要负责债券的登记、托管和结算，而非信息披露。 选项C错误：发行人将相关信息披露文件报送至全国银行间同业拆借中心，则通过中国货币网披露。","type":"single"},{"id":"cy_fin_2645","q":"经中国人民银行核准发行的金融债券的，发行人应于每期金融债券发行前（）个工作日披露募集说明书和发行公告。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"A","an":"选项A正确：经中国人民银行核准发行的金融债券的，发行人应于每期金融债券发行前3个工作日披露募集说明书和发行公告。","type":"single"},{"id":"cy_fin_2647","q":"金融债券发行人最后一次付息暨兑付日前（）个工作日公布兑付公告。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：金融债券发行人最后一次付息暨兑付日前【5个工作日】公布兑付公告。","type":"single"},{"id":"cy_fin_2649","q":"金融债券发行人将相关债券信息披露文件送全国银行间同业拆借中心的，通过（）披露。","c":{"A":"全国银行间同业拆借中心","B":"中央国债登记结算有限责任公司","C":"中国货币网","D":"中国债券信息网"},"a":"C","an":"注意审题，发行人将相关信息披露文件报送至全国银行间同业拆借中心，则通过中国货币网披露；如果发行人将相关信息披露文件报送至中央结算公司，则通过中国债券信息网披露。 选项C正确：发行人将相关信息披露文件分别送全国银行间同业拆借中心和中央结算公司，由同业拆借中心和中央结算公司分别通过【中国货币网】和中国债券信息网披露。 选项A错误：全国银行间同业拆借中心是文件报送的对象，但不是信息披露平台 选项B错误：中央国债登记结算有限责任公司（简称 “中债登”）是银行间市场的债券登记托管结算机构，主要负责债券的登记、托管和结算，而非信息披露。 选项D错误：发行人将相关信息披露文件报送至中央结算公司，则通过中国债券信息网披露。","type":"single"},{"id":"cy_fin_2651","q":"金融债券发行与承销信息披露的有关规定。对影响发行人履行债务的重大事件，发行人应在第一时间向（）报告。","c":{"A":"中国证监会","B":"国务院","C":"中国人民银行","D":"财政部"},"a":"C","an":"选项C正确：对影响发行人履行债务的重大事件，发行人应在第一时间向【中国人民银行】报告。（注意金融债券是由央行来监督管理，所以重大事件向央行报告） 选项A错误：中国证监会（CSRC）主要负责监管 公司债券（如上市公司发行的债券）、股票市场及证券经营机构。 选项B错误：国务院是最高行政机关，负责宏观政策制定，不直接处理具体金融市场主体的日常监管事务。 选项D错误：财政部主要负责 政府债券（如国债、地方政府债）的发行与管理，以及国家财政政策制定，与金融债券（金融机构发行的债券）的监管无直接关联。","type":"single"},{"id":"cy_fin_2653","q":"证券公司应当（）计算客户交存的担保物价值与其所欠债务的比例。","c":{"A":"逐日","B":"每周","C":"逐月","D":"每季度"},"a":"A","an":"选项A正确：证券公司应当【逐日】计算客户交存的担保物价值与其所欠债务的比例。","type":"single"},{"id":"cy_fin_2655","q":"融资融券的标的证券为债券的，应当符合的条件包括（）。","c":{"A":"债券托管面值在1亿元以上","B":"债券信用评级在AA级(含)以上","C":"债券剩余期限在半年以上","D":"交易所规定的其他情形"},"a":"A,B,D","an":"选项C错误：应为“债券剩余期限在1年（并非半年）以上”。 选项ABD正确：标的证券为债券的，应当符合下列条件： ①债券托管面值在1亿元以上；  ②债券剩余期限在1年以上；  ③债券信用评级达到AA级(含)以上；  ④交易所规定的其他条件。","type":"multi"},{"id":"cy_fin_2657","q":"央行票据属于《证券公司证券自营投资品种清单》中的（）。","c":{"A":"已经在全国中小企业股份转让系统挂牌转让的证券","B":"已经和依法可以在境内银行间市场交易的证券","C":"经国家金融监督管理部门或者其授权机构依法批准或备案发行并在境内金融机构柜台交易的证券","D":"已经和依法可以在境内证券交易所上市交易和转让的证券"},"a":"B","an":"选项B正确：证券公司证券自营投资品种清单包括： （1）已经和依法可以在境内证券交易所上市交易和转让的证券。这类证券主要是股票、债券、权证和证券投资基金等，这是证券公司自营买卖的主要对象。 （2）已经在全国中小企业股份转让系统挂牌转让的证券。 （3）已经和依法可以在符合规定的区域性股权交易市场挂牌转让的私募债券，已经在符合规定的区域性股权交易市场挂牌转让的股票。 （4）已经和依法可以在境内银行间市场交易的证券。这类证券主要是政府债券、国际开发机构人民币债券、【央行票据】（B正确）、金融债券、短期融资券、公司债券、中期票据、企业债券。 （5）经国家金融监管部门或者其授权机构依法批准或备案发行并在境内金融机构柜台交易的证券。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2659","q":"根据中国证监会关于《证券公司证券自营投资品种清单》的规定，证券公司从事证券自营业务，可以买卖（）。","c":{"A":"境内上市交易的股票","B":"境内银行间市场交易的企业债券","C":"商业银行理财产品收益权","D":"国际开发机构人民币债券"},"a":"A,B,D","an":"选项C错误：商业银行理财产品收益权属于非标准化资产（非标资产），证券公司证券自营业务原则上不得投资非标准化资产。 选项ABD正确：证券公司证券自营投资品种清单包括： （1）已经和依法可以在境内证券交易所上市交易和转让的证券。这类证券主要是【股票】、债券、权证、证券投资基金等，这是证券公司自营买卖的主要对象。 （2）已经在全国中小企业股份转让系统挂牌转让的证券。 （3）已经和依法可以在符合规定的区域性股权交易市场挂牌转让的私募债券，已经在符合规定的区域性股权交易市场挂牌转让的股票。 （4）已经和依法可以在境内银行间市场交易的证券。这类证券主要是政府债券、【国际开发机构人民币债券】、央行票据、金融债券、短期融资券、公司债券、中期票据、【企业债券】。 （5）经国家金融监管部门或者其授权机构依法批准或备案发行并在境内金融机构柜台交易的证券。","type":"multi"},{"id":"cy_fin_2661","q":"证券公司债券交易的中后台部门应集中统一管理，债券交易相关部门下设二级部门的，应授权明确，纳入部门统一管理，不得以“团队制”替代部门管理。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司债券交易的中后台部门应集中统一管理，债券交易相关部门下设二级部门的，应授权明确，纳入部门统一管理，【不得以“团队制”替代部门管理】。","type":"judge"},{"id":"cy_fin_2663","q":"下列关于证券公司另类子公司的说法错误的是（）。","c":{"A":"另类子公司可以融资","B":"另类子公司不得对外提供担保","C":"另类子公司不得成为对所投资企业的债务承担连带责任的出资人","D":"另类子公司不得从事投资以外的业务"},"a":"A","an":"题目问的是“说法错误的”。 选项A错误，选项BCD正确：另类子公司【不得融资】，不得对外提供担保和贷款，不得成为对所投资企业的债务承担连带责任的出资人。 因此答案选择A。","type":"single"},{"id":"cy_fin_2665","q":"向客户推介的金融产品（）的，证券公司应当以简明、易懂的文字，向客户作出有针对性的书面说明，同时详细披露判断该金融产品适合该客户购买的依据，并要求客户签字确认。","c":{"A":"流动性较低","B":"损失可能超过购买支出","C":"透明度较低","D":"期限较长"},"a":"A,B,C","an":"选项ABC正确：向客户推介的金融产品流动性较低、透明度较低、损失可能超过购买支出或者不易理解的，证券公司应当以简明、易懂的文字，向客户作出有针对性的书面说明，同时详细披露判断该金融产品适合该客户购买的依据，并要求客户签字确认。 选项D错误：干扰项，法规列举的是直接影响客户风险判断和理解难度的 “实质性风险特征”（相当于说如果销售的商品有哪些潜在的风险，规定要向客户特意说清楚），但是期限长≠高风险或难理解，比如一个 10 年期的国债（流动性高、透明度高、本金安全），虽然期限长，但风险低、结构简单，无需额外书面说明。反之，若长期产品同时具备流动性低（如封闭期 10 年的基金），则会被 “流动性较低” 条款覆盖，无需单独强调 “期限长”。","type":"multi"},{"id":"cy_fin_2667","q":"证券公司在对丙公司公开发行公司债券的申请进行核查时，应重点关注募集资金用途。以下资金用途中不符合要求的是（  ）。","c":{"A":"投资于新一代信息技术研发项目","B":"用于升级厂区技术设备","C":"用于下属子公司因环保违规被处的行政罚款","D":"用于升级和扩建现有的核心产品生产基地"},"a":"C","an":"公开发行公司债券筹集的资金，必须按照公司债券募集办法所列资金用途使用；改变资金用途，必须经债券持有人会议作出决议。公开发行公司债券筹集的资金，不得用于弥补亏损和非生产性支出。 选项C用于缴罚款，属于“非生产性支出”，不符合规定。选项ABD均为公司生产经营活动。","type":"single"},{"id":"cy_fin_2669","q":"己证券公司为获得某企业债券的承销权，向该企业的主要负责人赠送了价值不菲的礼品。该行为属于行业常见的客户维护手段，不违反承销业务规定。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司承销证券，不得有下列行为： (1)进行虚假的或者误导投资者的广告宣传或者其他宣传推介活动； (2)以不正当竞争手段招揽承销业务； (3)其他违反证券承销业务规定的行为。","type":"judge"},{"id":"cy_fin_2671","q":"王某是某证券公司投资经理，利用职务便利获取其所在自营部门即将大量卖出某债券的未公开信息，于2023年1月指示其妻子提前卖出持有的该债券，避免损失60万元。经查，王某曾于2021年因内幕交易行为被证监会予以行政处罚。对于王某的行为（  ）。","c":{"A":"不应立案，因避免损失数额未达100万元","B":"应予立案，因避免损失数额在50万元以上，且其2年内因证券违法行为受过行政处罚","C":"不应立案，因未达到“明示、暗示3人以上”的标准","D":"应予立案，因避免损失数额已超过50万元即可单独构成立案"},"a":"B","an":"根据《最高人民检察院、公安部关于公安机关管辖的刑事案件立案追诉标准的规定(二)》第三十一条规定，利用未公开信息交易行为，涉嫌下列情形之一的，应予立案追诉：    (1)获利或者避免损失数额在100万元以上的；    (2)2年内3次以上利用未公开信息交易的；    (3)明示、暗示3人以上从事相关交易活动的；    (4)具有其他严重情节的。    利用未公开信息交易，获利或者避免损失数额在50万元以上，或者证券交易成交额在500万元以上，或者期货交易占用保证金数额在100万元以上，同时涉嫌下列情形之一的，应予立案追诉：    (1)以出售或者变相出售未公开信息等方式，明示、暗示他人从事相关交易活动的；    (2)因证券、期货犯罪行为受过刑事追究的；    (3)2年内因证券、期货违法行为受过行政处罚的；（符合题干情形，故应予立案追诉）    (4)造成其他严重后果的。 综上，该题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2673","q":"根据《证券基金经营机构债券投资交易业务内控指引》，参与债券投资交易的人员薪酬与激励合计超过人民币100万元的，超过部分应当按照等分原则递延发放，递延周期不少于2年。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券基金经营机构债券投资交易业务内控指引》，参与债券投资交易的人员薪酬与激励合计超过人民币100万元的，超过部分应当按照等分原则递延发放，递延周期不少于2年。","type":"judge"},{"id":"cy_fin_2675","q":"下列关于证券公司融资管理应符合的要求的说法，错误的有（）。 I 分析正常和压力情景下未来不同时间段的融资需求和来源 II 加强负债品种、期限、交易对手、融资抵(质)押品等的分散度管理，适当设置分散度限额 III 积极维护与所有融资交易对手的关系，保持在市场上的适当稳定程度，不定期评估市场融资和资产变现能力 IV 监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响过期考点","c":{"A":"I、 IV","B":"II、III、IV","C":"I、II、III、IV","D":"II、III"},"a":"D","an":"证券公司的融资管理应符合以下要求∶ （1）分析正常和压力情景下未来不同时间段的融资需求和来源。 （2）加强负债品种、期限、交易对手、融资抵（质）押品和融资市场等的集中度管理，适当设置【集中度】限额。（II项错误） （3）加强融资渠道管理，积极维护与主要融资交易对手的关系，保持在市场上的适当【活跃】程度，并【定期】评估市场融资和资产变现能力。（III项错误） （4）密切监测主要金融市场的交易量和价格等变动情况，评估市场流动性对公司融资能力的影响。","type":"single"},{"id":"cy_fin_2677","q":"证券公司销售产品涉及投资组合，应该按照产品投资组合中最高风险的债券进行评估。（）","c":{"1":"对","0":"错"},"a":"0","an":"涉及投资组合的产品或者服务，应当按照产品或者服务整体风险等级（并非最高风险）进行评估。","type":"judge"},{"id":"cy_fin_2679","q":"下列关于证券公司债券交易关键环节管控的说法，错误的是（）。","c":{"A":"债券投资交易人员开展债券交易询价使用的工作邮件、通话记录、即时通信信息等应监测留痕，并接受合规部门监督检查","B":"证券公司应当审慎设置规模、杠杆、集中度及价格偏离度等指标，实现阈值控制和全程留痕，并向中后台部门开放管理和监测权限","C":"签订债券交易协议应当使用部门印章，并以书面形式集中存档","D":"证券公司应建立多指标、差异化的债券交易价格和利率比较基准体系，避免过度依赖单一比较基准"},"a":"C","an":"C项错误，签订债券交易协议应当使用【公司公章】或者经公司书面明确授权的【业务专用章】，并以【书面或电子形式】集中存档。","type":"single"},{"id":"cy_fin_2681","q":"根据《证券期货经营机构私募资产管理业务管理办法》，资产管理计划完成备案前不得开展投资活动，可以现金管理为目的，投资于（）。 Ⅰ 银行活期存款 Ⅱ 地方政府债券 Ⅲ 股票 Ⅳ 公开发行的公司债券","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"资产管理计划完成备案前不得开展投资活动，以现金管理为目的，投资于银行活期存款（Ⅰ正确）、国债、中央银行票据、政策性金融债、地方政府债券（Ⅱ正确）（不包括公司债券和股票，Ⅲ、Ⅳ错误）、货币市场基金等中国证监会认可的投资品种的除外。 故本题选B，选项ACD错误。","type":"single"},{"id":"cy_fin_2683","q":"下列关于违反债券发行与承销有关规定的法律责任，说法错误的是（）。","c":{"A":"中国证监会可以对相关机构和人员采取责令改正、监管谈话、出具警示函、责令公开说明、责令定期报告等相关监管措施","B":"非公开发行公司债券，发行人及其他信息披露义务人披露的信息存在虚假记载、误导性陈述或者重大遗漏的，不论情节严重与否，都应移送司法机关","C":"承销或自行销售非公开发行公司债券未按规定进行报备的，中国证监会可以对承销机构及其直接负责的主管人员和其他直接责任人员采取责令改正、监管谈话、出具警示函、责令公开说明、责令定期报告等相关监管措施","D":"注册会计师、律师、信用评级机构等相关机构和人员所出具的文件含有虚假记载、误导性陈述或重大遗漏的，由中国人民银行按照《中国人民银行法》的规定予以处罚"},"a":"B","an":"B项错误，非公开发行公司债券，发行人及其他信息披露义务人披露的信息存在虚假记载、误导性陈述或者重大遗漏的，中国证监会可以对发行人、其他信息披露义务人及其直接负责的主管人员和其他直接责任人员采取相关监管措施；情节严重的，依照《证券法》第一百九十七条予以处罚（并非所有情况都需移送司法机关）。 A项正确，中国证监会可以对相关机构和人员采取责令改正、监管谈话、出具警示函、责令公开说明、责令定期报告等相关监管措施。   C项正确，承销或自行销售非公开发行公司债券未按规定进行报备的，中国证监会可以对承销机构及其直接负责的主管人员和其他直接责任人员采取责令改正、监管谈话、出具警示函、责令公开说明、责令定期报告等相关监管措施；情节严重的，处以警告、罚款。  D项正确，注册会计师、律师、信用评级机构等相关机构和人员所出具的文件含有虚假记载、误导性陈述或重大遗漏的，由中国人民银行按照《中国人民银行法》的规定予以处罚。","type":"single"},{"id":"cy_fin_2685","q":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在（）人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。","c":{"A":"10","B":"15","C":"5","D":"3"},"a":"B","an":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。","type":"single"},{"id":"cy_fin_2687","q":"当融资融券业务标的证券为债券时，以下债券不可作为融资买入或融券卖出证券的情形有（）。","c":{"A":"债券托管面值5000万元","B":"债券剩余期限2年","C":"债券投资者不少于2000人","D":"债券信用评级为AA级"},"a":"A,C","an":"标的证券为债券的，应当符合下列条件： （1）债券托管面值在1亿元以上；（5000万不符合要求，A不可以） （2）债券剩余期限在1年以上；（2年＞1年，B可以） （3）债券信用评级达到AA级（含）以上；（D可以） （4）交易所规定的其他条件。 C项“基金持有户数不少于2000户”是标的证券为交易型开放式指数基金的条件。","type":"multi"},{"id":"cy_fin_2689","q":"国债现券、企业债(含可转换债券)、国债回购以及以后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会和原国家计委备案，备案15天内无异议后实施。（）","c":{"1":"对","0":"错"},"a":"1","an":"国债现券、企业债(含可转换债券)、国债回购以及以后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会和原国家计委备案，备案15天内无异议后实施。","type":"judge"},{"id":"cy_fin_2691","q":"以下属于证券公司投资银行类业务的是（）。","c":{"A":"承销与保荐","B":"公司债券受托管理","C":"上市公司并购重组财务顾问","D":"受托投资管理"},"a":"A,B,C","an":"选项ABC正确：证券公司投资银行类业务包括：承销与保荐、上市公司并购重组财务顾问、公司债券受托管理、非上市公众公司推荐、资产证券化等其他具有投资银行特性的业务。 D项与投资银行类业务是并列关系，同为证券公司的不同业务类型。","type":"multi"},{"id":"cy_fin_2693","q":"融资融券的标的证券为债券的，应当符合的条件有()。","c":{"A":"债券托管面值在1亿元以上","B":"债券信用评级在AA级(含)以上","C":"债券剩余期限在半年以上","D":"交易所规定的其他条件"},"a":"A,B,D","an":"的证券为债券的，应当符合下列条件： ①债券托管面值在1亿元以上；（A正确） ②债券剩余期限在1年以上；（C错误） ③债券信用评级达到AA级(含)以上；（B正确） ④交易所规定的其他条件。（D正确）","type":"multi"},{"id":"cy_fin_2695","q":"根据金融债券发行与承销信息披露的有关规定，对影响发行人履行债务的重大事件，发行人应在第一时间向中国证监会报告。（）","c":{"1":"对","0":"错"},"a":"0","an":"对影响发行人履行债务的重大事件，发行人应在第一时间向【中国人民银行】报告，并按照中国人民银行指定的方式披露。","type":"judge"},{"id":"cy_fin_2697","q":"承销机构在承销公司债券过程中，有下列行为（）的，中国证监会可以依照《证券法》第一百八十四条予以处罚。","c":{"A":"以不正当竞争手段招揽承销业务","B":"未勤勉尽责，违反《公司债券发行与交易管理办法》第四十一条规定的行为","C":"未按照事先披露的原则和方式配售公司债券，或其他未依照披露文件实施的行为","D":"未按照《公司债券发行与交易管理办法》及相关规定要求保留推介、定价、配售等承销过程中相关资料"},"a":"A,B,C,D","an":"承销机构在承销公司债券过程中，有下列行为之一的，中国证监会可以依照《证券法》第一百八十四条予以处罚。 （1）未勤勉尽责，违反《公司债券发行与交易管理办法》第四十一条规定的行为；（B正确）  （2）以不正当竞争手段招揽承销业务；（A正确） （3）从事《公司债券发行与交易管理办法》第四十五条规定禁止的行为； （4）从事《公司债券发行与交易管理办法》第四十七条规定禁止的行为； （5）未按《公司债券发行与交易管理办法》及相关规定要求披露有关文件； （6）未按照事先披露的原则和方式配售公司债券，或其他未依照披露文件实施的行为；（C正确）  （7）未按照《公司债券发行与交易管理办法》及相关规定要求保留推介、定价、配售等承销过程中相关资料；（D正确） （8）其他违反承销业务规定的行为。","type":"multi"},{"id":"cy_fin_2699","q":"国债现券、企业债(含可转换债券)、国债回购以及今后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会、国家发展和改革委员会备案，备案30天内无异议后实施。()","c":{"1":"对","0":"错"},"a":"0","an":"本题考查证券经纪业务佣金管理要求。国债现券、企业债(含可转换债券)、国债回购以及今后出现的新的交易品种，其交易佣金标准由证券交易所制定并报中国证监会、国家发展和改革委员会备案，备案15天内无异议后实施。","type":"judge"},{"id":"cy_fin_2701","q":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司从事自营、投资银行、债券等合规风险管控难度较大的部门、工作人员人数在15人以上的分支机构以及证券公司异地总部等，应当配备专职合规管理人员。","type":"judge"},{"id":"cy_fin_2703","q":"按照投资理念可将证券投资基金划分为(  )。","c":{"A":"封闭式基金和开放式基金","B":"公募基金和私募基金","C":"主动型基金和被动型基金","D":"债券基金和股票基金"},"a":"C","an":"按照基金的投资理念划分，可将证券投资基金划分为主动型基金和被动型基金。C选项正确 A是按基金运作方式划分的、B是按募集方式划分的、D是按投资标的划分的。","type":"single"},{"id":"cy_fin_2705","q":"中国证监会可以通过检查、调查取证、限制交易、行政处罚等措施对基金市场加强监管。(  )","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券投资基金法》的规定，中国证监会可以通过检查、调查取证、限制交易、行政处罚等多种措施对基金市场加强监管。","type":"judge"},{"id":"cy_fin_2707","q":"除基金合同另有约定外，私募基金应当由基金托管人托管。基金合同约定私募基金不进行托管的，应当在基金合同中明确保障私募基金财产安全的制度措施和纠纷解决机制。(  )","c":{"1":"对","0":"错"},"a":"1","an":"除基金合同另有约定外，私募基金应当由基金托管人托管。基金合同约定私募基金不进行托管的，应当在基金合同中明确保障私募基金财产安全的制度措施和纠纷解决机制。","type":"judge"},{"id":"cy_fin_2709","q":"下列对证券投资基金认识正确的有(  )。","c":{"A":"公募基金通过公开发售基金份额募集资金","B":"由基金托管人托管，由基金管理人管理和运用资金","C":"基金与股票和债券一样，属于直接投资工具，筹集的资金主要投向实业","D":"通过汇集众多投资者的资金，进行共同投资，表现出一种集合理财的特点"},"a":"A,B,D","an":"选项A说法正确，公募基金通过公开发售基金份额募集资金。  选项B说法正确，证券投资基金是由基金托管人托管，由基金管理人管理和运用资金。 选项C说法错误，股票和债券是直接投资工具，筹集的资金主要投向实业，而基金是【间接投资】工具，筹集的资金主要投向有价证券等金融工具。 选项D说法正确，证券投资基金通过汇集众多投资者的资金，进行共同投资，表现出一种集合理财的特点。","type":"multi"},{"id":"cy_fin_2711","q":"证券公司、基金管理公司子公司通过设立特殊目的载体开展资产证券化业务。(  )","c":{"1":"对","0":"错"},"a":"1","an":"证券公司、基金管理公司子公司通过【设立特殊目的载体】开展资产证券化业务。","type":"judge"},{"id":"cy_fin_2713","q":"下列选项中，基金托管人依法应当履行的职责不包括（）。","c":{"A":"按照规定开设基金财产的资金账户和证券账户","B":"按照规定召集基金份额持有人大会","C":"对基金财务会计报告、中期和年度基金报告出具意见","D":"办理与基金财产管理业务活动有关的信息披露事项"},"a":"D","an":"题目问的是“不包括”。选项D：“办理与基金财产管理业务活动有关的信息披露事项”是基金管理人的职责。因此答案选择D。 选项ABC正确：根据《证券投资基金法》第三十六条的规定，基金托管人依法应当履行下列职责： （1）安全保管基金财产； （2）按照规定开设基金财产的资金账户和证券账户； （3）对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立； （4）保存基金托管业务活动的记录、账册、报表和其他相关资料； （5）按照基金合同的约定，根据基金管理人的投资指令，及时办理清算、交割事宜； （6）办理与基金托管业务活动有关的信息披露事项； （7）对基金财务会计报告、中期和年度基金报告出具意见； （8）复核、审查基金管理人计算的基金资产净值和基金份额申购、赎回价格； （9）按照规定召集基金份额持有人大会； （10）按照规定监督基金管理人的投资运作； （11）国务院证券监督管理机构规定的其他职责。","type":"single"},{"id":"cy_fin_2715","q":"私募基金管理人提供的登记申请材料完备的，中国基金业协会应当自收齐登记材料之日起（）个工作日内，以通过网站公告私募基金管理人名单及其基本情况的方式，为私募基金管理人办结登记手续。","c":{"A":"10","B":"15","C":"20","D":"30"},"a":"C","an":"选项C正确：私募基金管理人提供的登记申请材料完备的，中国基金业协会应当自收齐登记材料之日起20个工作日内，以通过网站公告私募基金管理人名单及其基本情况的方式，为私募基金管理人办结登记手续。","type":"single"},{"id":"cy_fin_2717","q":"《证券投资基金法》规定，未经批准擅自设立基金管理公司或者未经核准从事公开募集基金管理业务的，由证券监督管理机构予以取缔或者责令改正，没收违法所得，并处罚款。如果没有违法所得或者违法所得不足100万元的，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"10万元以上100万元以下","C":"违法所得1倍以上5倍以下","D":"违法所得1倍以上10倍以下"},"a":"B","an":"选项B正确：根据《证券投资基金法》第一百一十九条的规定，未经批准擅自设立基金管理公司或者未经核准从事公开募集基金管理业务的，由证券监督管理机构予以取缔或者责令改正，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2719","q":"根据《证券投资基金法》，非公开募集基金募集完毕，基金管理人未向中国基金业协会备案的，处（）罚款。","c":{"A":"1万元以上30万元以下","B":"10万元以上30万元以下","C":"1万元以上50万元以下","D":"10万元以上50万元以下"},"a":"B","an":"选项B正确：非公开募集基金募集完毕，基金管理人应当向中国基金业协会备案，基金管理人未备案的，处10万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2721","q":"基金托管人根据（）的指令办理资金划拨。","c":{"A":"基金投资人","B":"基金管理人","C":"基金销售机构","D":"基金注册登记机构"},"a":"B","an":"选项B正确：基金托管人应按照基金合同的约定，根据【基金管理人】的投资指令，及时办理清算、交割事宜。因此基金托管人根据基金管理人的指令办理资金划拨。 选项A错误：基金投资人是基金份额的持有者，通过申购、赎回等行为参与基金投资，但不直接下达资金划拨指令。 选项C错误：基金销售机构（如银行、证券公司、第三方销售平台）的职责是销售基金产品、提供销售服务，与资金划拨指令的下达无直接关联。 选项D错误：基金注册登记机构主要负责基金份额的登记、确认、托管以及红利发放等，专注于份额管理，而非资金划拨指令的下达。","type":"single"},{"id":"cy_fin_2723","q":"基金财产的债权与债务与基金管理人的固有财产严格区分，体现的是基金财产的（）。","c":{"A":"独立性","B":"流动性","C":"收益性","D":"合理性"},"a":"A","an":"选项B错误：流动性指资产能够以合理价格迅速变现的能力，题干讨论的是财产法律属性的区分，而非资产变现能力。 选项C错误：收益性指基金财产通过投资获取收益的特性，题目强调的是财产边界的分离，而非收益能力。 选项D错误：干扰项，基金法中无此概念。 选项A正确：以下体现了基金财产债权债务的独立性： （1）【基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵销】；不同基金财产的债权债务，不得相互抵销。 （2）基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限对基金财产的债务承担责任。但基金合同依照《证券投资基金法》另有约定的，从其约定。非因基金财产本身承担的债务，不得对基金财产强制执行。非因投资人本身的债务或者法律规定的其他情形，不得查封、冻结、扣划或者强制执行基金销售结算资金、基金份额。","type":"single"},{"id":"cy_fin_2725","q":"根据《证券投资基金法》，会计师事务所、律师事务所未勤勉尽责，所出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，暂停或者撤销相关业务许可，并处业务收入（）罚款。","c":{"A":"1倍以上10倍以下","B":"5倍以上10倍以下","C":"1倍以上5倍以下","D":"5倍以上20倍以下"},"a":"C","an":"选项C正确：会计师事务所、律师事务所未勤勉尽责，所出具的文件有虚假记载、误导性陈述或者重大遗漏的，责令改正，没收业务收入，暂停或者撤销相关业务许可，并处业务收入1倍以上5倍以下罚款。","type":"single"},{"id":"cy_fin_2727","q":"下列关于基金财产的表述，说法错误的是（）。","c":{"A":"基金财产的债务由基金财产本身承担","B":"基金份额持有人对基金财产的债务承担无限责任","C":"基金管理人、基金托管人不得将基金财产归入其固有财产","D":"基金管理人被依法撤销进行清算的，基金财产不属于其清算财产"},"a":"B","an":"选项A正确，选项B错误：基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限（非无限责任）对基金财产的债务承担责任。 选项C正确：基金财产独立于基金管理人、基金托管人的固有财产。 选项D正确：基金管理人、基金托管人因依法解散、被依法撤销或者被依法宣告破产等原因进行清算的，基金财产不属于其清算财产。  【知识拓展】基金财产的独立性 基金财产的独立性包括基金财产本身的独立性以及基金财产债权债务的独立性，对证券投资基金活动的要求体现在下列方面： （1）基金财产独立于基金管理人、基金托管人的固有财产。 （2）基金管理人、基金托管人因基金财产的管理、运用或者其他情形而取得的财产和收益，归入基金财产。 （3）基金管理人、基金托管人因依法解散、被依法撤销或者被依法宣告破产等原因进行清算的，基金财产不属于其清算财产。 （4）基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵销；不同基金财产的债权债务，不得相互抵销。 （5）基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限对基金财产的债务承担责任。 （6）基金管理人、基金托管人、基金服务机构依照法律规定，应当承担的民事赔偿责任和缴纳的罚款、罚金，由基金管理人、基金托管人、基金服务机构以其固有财产承担。","type":"single"},{"id":"cy_fin_2729","q":"根据《证券投资基金法》，信息技术系统服务机构未按照规定向国务院证券监督管理机构提供相关信息技术系统资料，或者提供的信息技术系统资料虚假、有重大遗漏的，责令改正，处（）。","c":{"A":"1万元以上10万元以下罚款","B":"1万元以上30万元以下罚款","C":"3万元以上10万元以下罚款","D":"3万元以上30万元以下罚款"},"a":"C","an":"选项C正确：信息技术系统服务机构未按照规定向国务院证券监督管理机构提供相关信息技术系统资料，或者提供的信息技术系统资料虚假、有重大遗漏的，责令改正，处【3万元以上10万元以下】罚款。","type":"single"},{"id":"cy_fin_2731","q":"下列选项中，不属于基金管理人职责的是（）。","c":{"A":"按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益","B":"保存基金财产管理业务活动的记录、账册、报表和其他相关资料","C":"进行基金会计核算并编制基金财务会计报告","D":"对基金份额持有人大会审议事项行使表决权"},"a":"D","an":"题目问的是“不属于”。选项D：“对基金份额持有人大会审议事项行使表决权”是基金份额持有人的权利，不属于基金管理人职责，因此答案选择D。 选项ABC：公开募集基金的基金管理人应当履行下列职责： 1.依法募集资金，办理基金份额的发售和登记事宜； 2.办理基金备案手续； 3.对所管理的不同基金财产分别管理、分别记账，进行证券投资； 4.按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益； 5.进行基金会计核算并编制基金财务会计报告； 6.编制中期和年度基金报告； 7.计算并公告基金资产净值，确定基金份额申购、赎回价格； 8.办理与基金财产管理业务活动有关的信息披露事项； 9.按照规定召集基金份额持有人大会； 10.保存基金财产管理业务活动的记录、账册、报表和其他相关资料； 11.以基金管理人名义，代表基金份额持有人利益行使诉讼权利或者实施其他法律行为。","type":"single"},{"id":"cy_fin_2733","q":"根据《中华人民共和国证券投资基金法》的规定，有召集基金份额持有人大会职责的机构是()。","c":{"A":"国务院证券监督管理机构","B":"基金服务机构","C":"基金管理人","D":"基金业协会"},"a":"C","an":"选项C正确：基金份额持有人大会由基金管理人召集。基金份额持有人大会设立日常机构的，由该日常机构召集；该日常机构未召集的，由基金管理人召集。基金管理人未按规定召集或者不能召集的，由基金托管人召集。 选项A错误：国务院证券监督管理机构是监管机构，不直接参与基金运作。 选项B错误：基金服务机构仅提供辅助服务。 选项D错误：基金业协会是自律组织，无直接召集权。","type":"single"},{"id":"cy_fin_2735","q":"违反《证券投资基金法》规定，未经登记，使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动的，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上30万元以下","C":"3万元以上10万元以下","D":"10万元以上100万元以下"},"a":"D","an":"选项D正确：《证券投资基金法》第一百三十三条规定，未经登记，使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动的，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2737","q":"非公开募集基金财产的投资，包括买卖股票、股权、债券、期货、期权、（）及投资合同约定的其他投资标的。","c":{"A":"基金份额","B":"房地产","C":"贷款","D":"艺术品"},"a":"A","an":"选项A正确：非公开募集基金财产的投资，包括买卖股票、股权、债券、期货、期权、【基金份额】及投资合同约定的其他投资标的。 选项B错误：私募基金可通过股权投资（如收购房地产企业股权）、资产证券化（如 REITs）等方式间接投资房地产，但不得直接买卖房地产。 选项C错误：私募基金禁止从事 “发放贷款”“变相融资” 等借贷活动。 选项D错误：艺术品属于非标准化、非金融类资产。","type":"single"},{"id":"cy_fin_2739","q":"公开募集基金的基金管理人员不得从事的活动不包括（）。","c":{"A":"向基金份额持有人违规承诺收益","B":"编制基金财务报告","C":"不公平地对待其管理的不同基金财产","D":"将其固有财产或者他人财产混同于基金财产从事证券投资"},"a":"B","an":"题目问的是”不得从事的活动不包括“。选项B：“编制基金财务报告”描述的是基金管理人的职责，不属于不得从事的活动。因此答案选择B。 选项ACD：公开募集基金的基金管理人及其董事、监事、高级管理人员和其他从业人员不得有下列行为： (1)将其固有财产或者他人财产混同于基金财产从事证券投资； (2)不公平地对待其管理的不同基金财产； (3)利用基金财产或者职务之便为基金份额持有人以外的人牟取利益； (4)向基金份额持有人违规承诺收益或者承担损失； (5)侵占、挪用基金财产； (6)泄露因职务便利获取的未公开信息、利用该信息从事或者明示、暗示他人从事相关的交易活动； (7)玩忽职守，不按照规定履行职责。","type":"single"},{"id":"cy_fin_2741","q":"基金管理人由于被依法宣告破产进行清算的，基金管理人的债权人（）。","c":{"A":"不得对基金财产主张权利","B":"可以直接获取基金财产份额","C":"可以要求对基金财产进行变卖","D":"可以要求无偿受让基金财产"},"a":"A","an":"选项A正确：基金管理人、基金托管人因依法解散、被依法撤销或者被依法宣告破产等原因进行清算的，基金财产不属于其清算财产。因此基金管理人的债权人不得对基金财产主张权利。 选项BCD错误：因为基金财产不属于基金管理人的清算财产。基金管理人的债权人不能直接获取基金财产份额，也不能要求对基金财产进行变卖，更不能要求无偿受让基金财产。","type":"single"},{"id":"cy_fin_2743","q":"根据《证券投资基金法》，未经核准，擅自从事基金托管业务的，责令停止，没收违法所得，并处罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上30万元以下","C":"3万元以上10万元以下","D":"10万元以上100万元以下"},"a":"B","an":"选项B正确：《证券投资基金法》第一百二十五条规定，未经核准，擅自从事基金托管业务的，责令停止，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下罚款；对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2745","q":"单位未经登记，使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动的，对直接负责的主管人员和其他直接责任人员给予警告，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上30万元以下","C":"3万元以上10万元以下","D":"10万元以上100万元以下"},"a":"B","an":"选项B正确：《证券投资基金法》第一百三十三条规定，未经登记，使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动的，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2747","q":"根据《证券投资基金法》，擅自从事公开募集基金的基金服务业务的，责令改正，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足30万元的，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上30万元以下","C":"3万元以上10万元以下","D":"10万元以上30万元以下"},"a":"D","an":"选项D正确：《证券投资基金法》第一百三十六条规定，擅自从事公开募集基金的基金服务业务的，责令改正，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足30万元的，并处10万元以上30万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上10万元以下罚款。","type":"single"},{"id":"cy_fin_2749","q":"公开募集基金的基金管理人不得向基金份额持有人（）。","c":{"A":"承诺最低收益","B":"保证按照诚实信用原则管理基金财产","C":"保证为其最大利益管理基金财产","D":"保证公平对待所管理的不同基金财产"},"a":"A","an":"题目问的是禁止行为，选项A：公开募集基金的基金管理人及其董事、监事、高级管理人员和其他从业人员【不得有】下列行为： 1.将其固有财产或者他人财产混同于基金财产从事证券投资。 2.不公平地对待其管理的不同基金财产。 3.利用基金财产或者职务之便为基金份额持有人以外的人牟取利益。 4.向基金份额持有人违规承诺收益（选项A）或者承担损失。 5.侵占、挪用基金财产。 6.泄露因职务便利获取的未公开信息、利用该信息从事或者明示、暗示他人从事相关的交易活动。 7.玩忽职守，不按照规定履行职责。 8.法律、行政法规和国务院证券监督管理机构规定禁止的其他行为。 因此答案选择A。 选项BCD：是基金管理人在管理基金财产时应当遵守的原则或职责。","type":"single"},{"id":"cy_fin_2751","q":"基金财产的债务，由（）。","c":{"A":"基金财产和基金管理人固有资产共同承担","B":"基金管理人固有资产承担","C":"基金财产本身承担","D":"基金托管人固有资产承担"},"a":"C","an":"选项C正确：基金财产的债务由【基金财产本身】承担，基金份额持有人以其出资为限对基金财产的债务承担责任。但基金合同依照《中华人民共和国证券投资基金法》另有约定的，从其约定。 选项ABD错误：基金财产的债务不应由基金管理人或基金托管人的固有资产承担。","type":"single"},{"id":"cy_fin_2753","q":"基金财产的债务由基金财产本身承担，基金份额持有人以（）为限对基金财产的债务承担责任。但基金合同依照《证券投资基金法》另有约定的，从其约定。","c":{"A":"银行储蓄存款和持有的证券资产","B":"持有的证券资产","C":"出资","D":"银行储蓄存款"},"a":"C","an":"选项C正确：《证券投资基金法》规定，基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限对基金财产的债务承担责任。但基金合同依照本法另有约定的，从其约定。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_2755","q":"根据《证券投资基金法》，未经注册，擅自公开或者变相公开募集基金的，责令停止，返还所募资金和加计的银行同期存款利息，没收违法所得，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"10万元以上100万元以下","C":"所募资金1％以上5％以下","D":"所募资金1％以上10％以下"},"a":"C","an":"选项C正确：公开募集基金应当经国务院证券监督管理机构注册。未经注册，擅自公开或者变相公开募集基金的，责令停止，返还所募资金和加计的银行同期存款利息，没收违法所得，并处所募资金金额1％以上5％以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处5万元以上50万元以下罚款。 选项ABD为干扰项。","type":"single"},{"id":"cy_fin_2757","q":"根据《证券投资基金法》，擅自从事公开募集基金的基金服务业务的，责令改正，没收违法所得，并处罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处（）罚款。","c":{"A":"30万元以上60万元以下","B":"3万元以上10万元以下","C":"3万元以上30万元以下","D":"10万元以上100万元以下"},"a":"B","an":"选项B正确：擅自从事公开募集基金的基金服务业务的，责令改正，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足30万元的，并处10万元以上30万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处【3万元以上10万元以下】罚款。 选项ACD为干扰项。","type":"single"},{"id":"cy_fin_2759","q":"基金财产债权债务独立性的意义，主要体现在（）。","c":{"A":"有利于保障基金财产的安全","B":"有利于保护基金份额持有人的合法权益","C":"有利于基金财产的稳定运作，提高基金的运作效率","D":"有利于维护基金财产的独立性"},"a":"A,B,C,D","an":"选项ABCD正确：基金财产债权债务独立性的意义，主要体现在以下几方面： 1、有利于维护基金财产的独立性（D正确）。  2、有利于保障基金财产的安全（A正确）。  3、有利于保护基金份额持有人的合法权益（B正确）。  4、有利于基金财产的稳定运作，提高基金的运作效率（C正确）。","type":"multi"},{"id":"cy_fin_2761","q":"下列选项中，属于《证券投资基金法》的立法宗旨的是（）。","c":{"A":"促进证券投资基金和资本市场的健康发展","B":"规范证券投资基金活动","C":"保护投资人及相关当事人的合法权益","D":"提高基金的投资效率"},"a":"A,B,C","an":"选项D错误： “提高基金的投资效率” 属于市场主体（如基金管理人）的经营目标，而非立法宗旨。立法更关注公平、合规和风险防范。 选项ABC正确：《证券投资基金法》的立法宗旨，体现在： 1.规范证券投资基金活动（B正确）。  2.保护投资人及相关当事人的合法权益（C正确）。  3.促进证券投资基金和资本市场的健康发展（A正确）。","type":"multi"},{"id":"cy_fin_2763","q":"根据《证券投资基金法》，公募基金管理人应当履行的职责不包括（）。","c":{"A":"办理基金份额的发售和登记事宜","B":"对基金财务会计报告、中期和年度基金报告出具意见","C":"计算并公告基金资产净值","D":"及时办理资金清算、交割事宜"},"a":"B,D","an":"题目问的是“不包括”。选项BD：“对基金财务会计报告、中期和年度基金报告出具意见”及“及时办理资金清算、交割事宜”是基金托管人的职责。因此答案选择BD。 选项AC正确：根据《证券投资基金法》第十九条的规定，公开募集基金的【基金管理人】应当履行下列职责: （1）依法募集资金，办理基金份额的发售和登记事宜； （2）办理基金备案手续； （3）对所管理的不同基金财产分别管理、分别记账，进行证券投资； （4）按照基金合同的约定确定基金收益分配方案，及时向基金份额持有人分配收益； （5）进行基金会计核算并编制基金财务会计报告； （6）编制中期和年度基金报告； （7）计算并公告基金资产净值，确定基金份额申购、赎回价格； （8）办理与基金财产管理业务活动有关的信息披露事项； （9）按照规定召集基金份额持有人大会； （10）保存基金财产管理业务活动的记录、账册、报表和其他相关资料； （11）以基金管理人名义，代表基金份额持有人利益行使诉讼权利或者实施其他法律行为。","type":"multi"},{"id":"cy_fin_2765","q":"私募基金管理人及其从业人员从事私募基金业务的禁止行为有（）。","c":{"A":"将其固有财产或者他人财产混同于基金财产从事投资活动","B":"利用基金财产或者职务之便，为本人或者投资者以外的人牟取利益，进行利益输送","C":"玩忽职守，不按照规定履行职责","D":"泄露因职务便利获取的未公开信息，利用该信息从事或者明示、暗示他人从事相关的交易活动"},"a":"A,B,C,D","an":"选项ABCD正确：私募基金管理人及其从业人员从事私募基金业务，不得有以下行为： （1）将其固有财产或者他人财产混同于基金财产从事投资活动（选项A正确）； （2）不公平地对待其管理的不同基金财产； （3）利用基金财产或者职务之便，为本人或者投资者以外的人牟取利益，进行利益输送（选项B正确）； （4）侵占、挪用基金财产； （5）泄露因职务便利获取的未公开信息，利用该信息从事或者明示、暗示他人从事相关的交易活动（选项D正确）； （6）从事损害基金财产和投资者利益的投资活动； （7）玩忽职守，不按照规定履行职责（选项C正确）； （8）从事内幕交易、操纵交易价格及其他不正当交易活动。","type":"multi"},{"id":"cy_fin_2767","q":"《证券投资基金法》是规范证券投资基金活动、维护证券投资基金及资本市场正常秩序的基本法律，在证券投资基金领域具有重要的基础性地位，相当于证券投资基金领域的“小宪法”。（）","c":{"1":"对","0":"错"},"a":"1","an":"《证券投资基金法》是规范证券投资基金活动、维护证券投资基金及资本市场正常秩序的基本法律，在证券投资基金领域具有重要的基础性地位，相当于证券投资基金领域的“小宪法”。","type":"judge"},{"id":"cy_fin_2769","q":"基金合同当事人包括基金份额持有人、基金管理人和基金托管人。（）","c":{"1":"对","0":"错"},"a":"1","an":"基金合同当事人包括基金份额持有人、基金管理人和基金托管人。","type":"judge"},{"id":"cy_fin_2771","q":"下列关于私募基金管理人、私募基金托管人及其从业人员的行为，做法正确的是（）。","c":{"A":"对投资业绩进行预测","B":"提供、报送真实、准确、完整的信息","C":"向投资者承诺投资本金不受损失","D":"向投资者承诺最低收益"},"a":"B","an":"选项B正确，选项ACD错误：私募基金管理人、私募基金托管人及其从业人员提供、报送的信息应当真实、准确、完整，不得有下列行为： 1.虚假记截、误导性陈述或者重大遗漏； 2.对投资业绩进行预测； 3.向投资者承诺投资本金不受损失或者承诺最低收益； 4.法律、行政法规和国务院证券监督管理机构规定禁止的其他行为。","type":"single"},{"id":"cy_fin_2773","q":"登记备案机构不属于需要注销私募基金管理人的情形是（）。","c":{"A":"登记之日起6个月内未备案首只私募基金","B":"依法解散、被依法撤销或者被依法宣告破产","C":"因非法集资、非法经营等重大违法行为被追究法律责任","D":"所管理的私募基金全部清算后，自清算完毕之日起12个月内未备案新的私募基金"},"a":"A","an":"题目问的是“不属于”。选项A：应该是登记之日起12个月（并非6个月）内未备案首只私募基金，因此答案选择A。 选项BCD：私募基金管理人有下列情形之一的，登记备案机构应当及时注销私募基金管理人登记并予以公示： 1.自行申请注销登记； 2.依法解散、被依法撤销或者被依法宣告破产； 3.因非法集资、非法经营等重大违法行为被追究法律责任； 4.登记之日起12个月内未备案首只私募基金； 5.所管理的私募基金全部清算后，自清算完毕之日起12个月内未备案新的私募基金； 6.国务院证券监督管理机构规定的其他情形。","type":"single"},{"id":"cy_fin_2775","q":"私募基金管理人未完成备案就进行投资活动，国务院证券监督管理机构应责令改正，没收违法所得，并处违法所得1倍以上（）倍以下的罚款。","c":{"A":"2","B":"3","C":"5","D":"10"},"a":"C","an":"选项C正确：根据《私募投资基金监督管理条例》第四十四条的规定，未依照本条例第十条规定履行登记手续，使用“基金”或者“基金管理”字样或者近似名称进行投资活动的，责令改正，没收违法所得，并处违法所得1倍以上5倍以下的罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下的罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下的罚款。","type":"single"},{"id":"cy_fin_2777","q":"私募基金管理人的股东、实际控制人、合伙人的禁止行为包括（）。","c":{"A":"虚假出资","B":"接受他人委托出资","C":"擅自干预私募基金管理人的业务活动","D":"要求私募基金管理人利用私募基金财产为自己牟取利益"},"a":"A,B,C,D","an":"选项ABCD正确：私募基金管理人的股东、实际控制人、合伙人不得有下列行为： （1）虚假出资、抽逃出资、委托他人或者接受他人委托出资； （2）未经股东会或者董事会决议等法定程序擅自干预私募基金管理人的业务活动； （3）要求私募基金管理人利用私募基金财产为自己或者他人牟取利益，损害投资者利益； （4）法律、行政法规和国务院证券监督管理机构规定禁止的其他行为。","type":"multi"},{"id":"cy_fin_2779","q":"国务院证券监督管理机构发现私募基金管理人违法违规，应当责令限期改正；逾期未改正的，可以对其采取的措施有（）。","c":{"A":"责令暂停部分或者全部业务","B":"责令负有责任的股东转让股权、负有责任的合伙人转让财产份额","C":"责令更换董事、监事、高级管理人员、执行事务合伙人或者委派代表","D":"责令私募基金管理人聘请或者指定第三方机构对私募基金财产进行审计8.","E":"判断题","F":"《基金法》对私募股权投资基金进行了规范要求。（）"},"a":"A,B,C,D","an":"选项ABCD正确：国务院证券监督管理机构发现私募基金管理人违法违规，或者其内部治理结构和风险控制管理不符合规定的，应当责令限期改正；逾期未改正，或者行为严重危及该私募基金管理人的稳健运行、损害投资者合法权益的，国务院证券监督管理机构可以区别情形，对其采取下列措施： 1.责令暂停部分或者全部业务；（A选项）  2.责令更换董事、监事、高级管理人员、执行事务合伙人或者委派代表，或者限制其权利；（C选项）  3.责令负有责任的股东转让股权、负有责任的合伙人转让财产份额，限制负有责任的股东或者合伙人行使权利；（B选项）  4.责令私募基金管理人聘请或者指定第三方机构对私募基金财产进行审计，相关费用由私募基金管理人承担。（D选项）","type":"multi"},{"id":"cy_fin_2781","q":"根据《证券公司和证券投资基金管理公司合规管理办法》及配套自律规则，（）不能提升合规负责人及其他合规管理人员的独立性和履职保障。","c":{"A":"合规负责人直接向董事会负责，由董事会考核","B":"证券公司在召开董事会、经营决策等重要会议以及合规负责人要求参加或者列席的会议前通知合规负责人","C":"证券公司不采纳合规负责人合规审查意见的，应当将有关事项提交董事会审议决定","D":"证券公司在对合规部门及其合规管理人员进行考核时，应采取其他部门评价、以业务部门的经营业务为依据等方式进行"},"a":"D","an":"题目问的是”不能提升“。 选项D错误：提升合规负责人及其他合规管理人员的独立性和履职保障的举措为要求合规部门及其合规管理人员由合规负责人考核，证券公司对合规部门及其合规管理人员进行考核时，不得采取（非应采取）其他部门评价、以业务部门的经营业务为依据等方式，影响合规部门及其合规管理人员的独立性。因此答案选择D。 选项ABC正确：提升合规负责人及其他合规管理人员的独立性和履职保障的举措有： （1）明确合规负责人直接向董事会负责，由董事会考核。  （2）公司在召开董事会、经营决策会等重要会议以及合规负责人要求参加或者列席的会议前通知合规负责人。  （3）公司不采纳合规负责人的合规审查意见的，应当将有关事项提交董事会审议决定。 （4）要求合规部门及其合规管理人员由合规负责人考核，证券公司对合规部门及其合规管理人员进行考核时，不得采取其他部门评价、以业务部门的经营业务为依据等方式，影响合规部门及其合规管理人员的独立性。 （5）明确合规负责人考核公司有关主体的合规管理工作。 （6）保障合规负责人及其他合规管理人员的薪酬待遇。 （7）明确中国证监会和自律组织的外部支持。","type":"single"},{"id":"cy_fin_2783","q":"证券公司违反《证券公司和证券投资基金管理公司合规管理办法》规定的，对直接负责的董事、监事、高级管理人员和其他责任人员，可以采取（）等行政监管措施。","c":{"A":"出具警示函","B":"责令参加培训","C":"责令定期报告","D":"监管谈话"},"a":"A,B,D","an":"选项C错误：“责令定期报告”是针对证券公司的措施，而不是直接针对个人的措施。 选项ABD正确：证券公司违反《证券公司和证券投资基金管理公司合规管理办法》规定的，对直接负责的董事、监事、高级管理人员和其他责任人员，可以采取出具警示函、责令参加培训、责令改正、监管谈话、认定为不适当人选等行政监管措施。","type":"multi"},{"id":"cy_fin_2785","q":"以下内容，属于证券公司分类评价的评价指标体系及评价方法中加分项的是（  ）。","c":{"A":"证券公司上一年度财务顾问业务收入位于行业前20名","B":"证券公司上一年度承销与保荐业务收入位于行业前5名","C":"证券公司上一年度代理销售权益类基金保有规模增量位于行业前30名","D":"证券公司上一年度代理买卖证券业务收入位于行业前5名"},"a":"A,B,D","an":"选项C错误：证券公司上一年度代理销售权益类基金保有规模增量位于行业前10名、前20名的（不包括前30名），或者基金投资顾问服务资产规模位于行业前10%、20%的，分别加1分、0.5分，该两项按孰高分值加分。 选项ABD正确：证券公司上一年度财务顾问业务收入位于行业前10名、前20名的；证券公司上一年度代理买卖证券业务收入位于行业前5名、前10名、前20名、前30名，或证券公司上一年度营业部平均代理买卖证券业务收入位于行业前5名、前10名、前20名、前30名的；证券公司上一年度承销与保荐业务收入位于行业前5名、前10名、前20名、前30名的，均可进行加分。","type":"multi"},{"id":"cy_fin_2787","q":"关于对证券公司高级管理人员的要求，下列行为中违反相关规定的有（  ）。","c":{"A":"财务总监收取业务合作方回扣","B":"总经理在证券公司参股的公司兼任董事","C":"副总经理将公司笔记本电脑私用半年","D":"合规总监按公司制度审批日常运营费用"},"a":"A,C","an":"选项AC正确：证券公司的高级管理人员对证券公司负有忠实义务和勤勉义务。高级管理人员不得利用职权收受贿赂或者其他非法收入，不得侵占公司的财产（AC违反，D按制度程序不违反）。证券公司高级管理人员不得在证券基金经营机构参股或者控股的公司以外的营利性机构兼职（B不违反），但法律、行政法规或者中国证监会另有规定的除外。 综上，该题选AC。","type":"multi"},{"id":"cy_fin_2789","q":"按照《证券期货投资者适当性管理办法》的要求，（）专业投资者指的是符合一定条件的专业投资者，即符合一定资产、财务规模并且具备一定投资知识和经验的投资者，此类投资者需提供相关证明材料，经经营机构核验属实的可以直接认定为专业投资者。","c":{"A":"第一类","B":"第二类","C":"第三类","D":"第四类"},"a":"B","an":"选项B正确：依据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。第一类是专业机构投资者，即经有关金融监管部门批准设立的金融机构、金融机构发行的理财产品以及经监管部门批准设立的养老基金、社会公益基金、合格境外机构投资者(QFII)、人民币合格境外机构投资者(RQFII)等。第二类是符合一定条件的专业投资者，即符合一定资产、财务规模并且具备一定投资知识和经验的投资者。此类投资者需提供相关证明材料，经经营机构核验属实的可以直接认定为专业投资者。第三类属于普通投资者自愿申请转化的专业投资者，在其资产、财务规模以及投资知识和经验符合一定要求的前提下，经营机构有权自主决定是否同意其转化。  【知识拓展】专业投资者的范围 (一)第一类专业投资者 第一类专业投资者具体包括以下三大类。 1.经有关金融监管部门批准设立的金融机构，包括证券公司、期货公司、基金管理公司及其子公司、商业银行、保险公司、信托公司、财务公司等；经行业协会备案或者登记的证券公司子公司、期货公司子公司、私募基金管理人。 2.上述机构面向投资者发行的理财产品，包括但不限于证券公司资产管理产品、基金管理公司及其子公司产品、期货公司资产管理产品、银行理财产品、保险产品、信托产品、经行业协会备案的私募基金。 3.社会保障基金、企业年金等养老基金，慈善基金等社会公益基金，合格境外机构投资者，人民币合格境外机构投资者。 (二)第二类专业投资者 符合下列条件之一的是第二类专业投资者。 1.同时符合下列条件的法人或者其他组织： (1)最近1年末净资产不低于2 000万元； (2)最近1年末金融资产不低于1 000万元； (3)具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2.同时符合下列条件的自然人： (1)金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； (2)具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1 部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。 (三)由普通投资者转化的专业投资者 符合下列条件之一的普通投资者可以申请转化成为专业投资者： 1.最近 1年末净资产不低于1 000万元，最近 1年末金融资产不低于500万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； 2.金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_2791","q":"按照《证券期货投资者适当性管理办法》的要求，（）专业投资者指的是经有关金融监管部门批准设立的金融机构、金融机构发行的理财产品以及经监管部门批准设立的养老基金、社会公益基金、QFII、RQFII等。","c":{"A":"第一类","B":"第二类","C":"第三类","D":"第四类"},"a":"A","an":"选项A正确：依据《证券期货投资者适当性管理办法》，专业投资者可以划分为三类。【第一类】是专业机构投资者，即经有关金融监管部门批准设立的金融机构、金融机构发行的理财产品以及经监管部门批准设立的养老基金、社会公益基金、合格境外机构投资者(QFII) 、人民币合格境外机构投资者 (RQFII) 等。 选项BC错误：第二类和第三类投资者具体条件可参考以下【知识拓展】 选项D错误：干扰项，无第四类。  【知识拓展】 一、第一类专业投资者 1.经有关金融监管部门批准设立的金融机构，包括证券公司、期货公司、基金管理公司及其子公司、商业银行、保险公司、信托公司、财务公司等；经行业协会备案或者登记的证券公司子公司、期货公司子公司、私募基金管理人。 2.上述机构面向投资者发行的理财产品，包括但不限于证券公司资产管理产品、基金管理公司及其子公司产品、期货公司资产管理产品、银行理财产品、保险产品、信托产品、经行业协会备案的私募基金。 3.社会保障基金、企业年金等养老基金，慈善基金等社会公益基金，合格境外机构投资者，人民币合格境外机构投资者。 二、第二类专业投资者 符合下列条件之一的是第二类专业投资者。 1.同时符合下列条件的法人或者其他组织： (1)最近1年末净资产不低于2 000万元； (2)最近1年末金融资产不低于1 000万元； (3)具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2.同时符合下列条件的自然人： (1)金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； (2)具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1 部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。 三、由普通投资者转化的专业投资者 符合下列条件之一的普通投资者可以申请转化成为专业投资者： 1.最近 1年末净资产不低于1 000万元，最近 1年末金融资产不低于500万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； 2.金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"single"},{"id":"cy_fin_2793","q":"下列哪些是《证券期货投资者适当性管理办法》规定的第一类专业投资者？（）","c":{"A":"私募基金管理人","B":"期货公司子公司","C":"金融机构高级管理人员","D":"获得职业资格认证的从事金融相关业务的注册会计师和律师"},"a":"A,B","an":"选项AB正确：依据《证券期货投资者适当性管理办法》，第一类专业投资者具体包括以下三大类。 （1）经有关金融监管部门批准设立的金融机构，包括证券公司、期货公司、基金管理公司及其子公司、商业银行、保险公司、信托公司、财务公司等；经行业协会备案或者登记的证券公司子公司、期货公司子公司、私募基金管理人。 （2）上述机构面向投资者发行的理财产品，包括但不限于证券公司资产管理产品、基金管理公司及其子公司产品、期货公司资产管理产品、银行理财产品、保险产品、信托产品、经行业协会备案的私募基金。 （3）社会保障基金、企业年金等养老基金，慈善基金等社会公益基金，合格境外机构投资者(QFII) ，人民币合格境外机构投资者(RQFII) 。 选项CD错误：属于第二类专业投资者。  【知识拓展】专业投资者的范围 (一)第一类专业投资者 第一类专业投资者具体包括以下三大类。 1.经有关金融监管部门批准设立的金融机构，包括证券公司、期货公司、基金管理公司及其子公司、商业银行、保险公司、信托公司、财务公司等；经行业协会备案或者登记的证券公司子公司、期货公司子公司、私募基金管理人。 2.上述机构面向投资者发行的理财产品，包括但不限于证券公司资产管理产品、基金管理公司及其子公司产品、期货公司资产管理产品、银行理财产品、保险产品、信托产品、经行业协会备案的私募基金。 3.社会保障基金、企业年金等养老基金，慈善基金等社会公益基金，合格境外机构投资者，人民币合格境外机构投资者。 (二)第二类专业投资者 符合下列条件之一的是第二类专业投资者。 1.同时符合下列条件的法人或者其他组织： (1)最近1年末净资产不低于2 000万元； (2)最近1年末金融资产不低于1 000万元； (3)具有2年以上证券、基金、期货、黄金、外汇等投资经历。 2.同时符合下列条件的自然人： (1)金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； (2)具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1 部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。 (三)由普通投资者转化的专业投资者 符合下列条件之一的普通投资者可以申请转化成为专业投资者： 1.最近 1年末净资产不低于1 000万元，最近 1年末金融资产不低于500万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历的除专业投资者外的法人或其他组织； 2.金融资产不低于300万元或者最近3年个人年均收入不低于30万元，且具有1年以上证券、基金、期货、黄金、外汇等投资经历或者1年以上金融产品设计、投资、风险管理及相关工作经历的自然人投资者。","type":"multi"},{"id":"cy_fin_2795","q":"信息技术服务机构是为证券基金业务活动提供信息技术服务的机构，下列说法错误的是（）。","c":{"A":"信息技术服务机构的信息技术服务范围包括重要信息系统的开发、测试、集成及测评","B":"证券公司借助信息技术手段从事证券基金业务活动的，可以委托信息技术服务机构提供产品或服务，证券公司依法承担的相关责任可以适当减轻","C":"证券公司应当清晰、准确、完整地掌握重要信息系统的技术架构、业务逻辑和操作流程等内容，确保重要信息系统运行始终处于自身控制范围","D":"除法律法规及中国证监会另有规定外，证券公司不得将重要信息系统的运维、日常安全管理交由信息技术服务机构独立实施"},"a":"B","an":"题目问的是“说法错误的”。 选项B错误：证券公司借助信息技术手段从事证券基金业务活动的，可以委托信息技术服务机构提供产品或服务，但证券公司依法应当承担的责任不因委托而免除或减轻（并非可以减轻）。因此答案选择B。","type":"single"},{"id":"cy_fin_2797","q":"证券账户是记录证券及证券衍生品种持有及其变动情况的载体，下列关于证券账户的说法正确的是（）。","c":{"A":"中国结算公司对证券账户实施统一管理","B":"证券账户的开立方式包括现场方式和非现场方式","C":"1个投资者最多可以申请开立2个A股账户","D":"1个投资者只能申请开立一个信用账户"},"a":"A,B,D","an":"选项C错误，选项D正确：1个投资者最多可以申请开立3个A股账户（并非2个，C错误）、3个封闭式基金账户，只能申请开立1个信用账户、1个B股账户。 选项A正确：中国结算公司对证券账户实施统一管理。 选项B正确：证券账户开立方式包括现场方式和非现场方式。其中，非现场方式包括见证开户、网上开户，以及中国结算认可的其他非现场开户方式。","type":"multi"},{"id":"cy_fin_2799","q":"甲证券公司是内地证券基金经营机构，在使用港股投资顾问服务的过程中，不符合业务规范的是（）。","c":{"A":"甲证券公司委托提供港股投资顾问服务的香港机构直接执行投资指令","B":"甲证券公司与提供港股投资顾问服务的香港机构签订协议","C":"甲证券公司在招募说明书中如实披露使用港股投资顾问服务的情况","D":"甲证券公司对使用港股通投资顾问服务的情况实行留痕管理"},"a":"A","an":"题目问的是”不符合规范的“。 选项A错误：证券基金经营机构应当履行主动管理职责，自主作出投资决策，【不得委托】提供港股投资顾问服务的香港机构直接执行投资指令。因此答案选择A。 选项BCD正确：分别提到了签订协议、信息披露以及留痕管理，这些都是合规的做法，符合业务规范。","type":"single"},{"id":"cy_fin_2801","q":"融资融券标的证券为上市开放式基金(LOF)的，应当符合的条件有（）。","c":{"A":"上市交易超过5个交易日","B":"最近5个交易日内的日平均资产规模不低于5亿元","C":"基金持有户数不少于1000户","D":"基金份额不存在分拆、合并等分级转换情形"},"a":"A,B,D","an":"选项C错误：应为“基金持有户数不少于2000户（并非1000户）”。 选项ABD正确：标的证券为上市开放式基金(LOF)的，应当符合下列条件： ①上市交易超过5个交易日（A项）；  ②最近5个交易日内的日平均资产规模不低于5亿元（B项）；  ③基金持有户数不少于2000户；  ④基金份额不存在分拆、合并等分级转换情形（D项）； ⑤交易所规定的其他条件。","type":"multi"},{"id":"cy_fin_2803","q":"融资融券的标的证券为交易型开放式指数基金(ETF)的，应当符合的条件有（）。","c":{"A":"上市交易超过5个交易日","B":"最近5个交易日内的日平均资产规模不低于3亿元","C":"基金持有户数不少于2000户","D":"交易所规定的其他条件"},"a":"A,C,D","an":"选项B错误：应为最近5个交易日内的日平均资产规模不低于5亿元（并非3亿元）。 选项ACD正确：融资融券的标的证券为交易型开放式指数基金(ETF)的，应当符合下列条件： ①上市交易超过5个交易日；  ②最近5个交易日内的日平均资产规模不低于5亿元；  ③基金持有户数不少于2000户；  ④交易所规定的其他条件。","type":"multi"},{"id":"cy_fin_2805","q":"根据《证券公司风险控制指标计算标准规定》，一般来说，证券公司自营业务持有一种权益类证券的市值与其总市值的比例不得超过（）。","c":{"A":"0.02","B":"0.03","C":"0.05","D":"0.1"},"a":"C","an":"选项C正确：根据《证券公司风险控制指标计算标准规定》，持有一种权益类证券的市值与其总市值的比例【不得超过5％】。因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。  【知识拓展】证券自营业务的风险控制指标 1.自营权益类证券及其衍生品的合计额不得超过净资本的100%。 2.自营非权益类证券及其衍生品的合计额不得超过净资本的500%。 3.持有一种权益类证券的成本不得超过净资本的30%。 4.持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 5.持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。","type":"single"},{"id":"cy_fin_2807","q":"根据《证券公司风险控制指标计算标准规定》，自营非权益类证券及其衍生品的合计额不得超过净资本的（）。","c":{"A":"0.5","B":"1","C":"2","D":"5"},"a":"D","an":"选项D正确：根据《证券公司风险控制指标计算标准规定》，自营非权益类证券及其衍生品的合计额不得超过净资本的500%。  【知识拓展】证券自营业务的风险控制指标 1.自营权益类证券及其衍生品的合计额不得超过净资本的100%。 2.自营非权益类证券及其衍生品的合计额不得超过净资本的500%。 3.持有一种权益类证券的成本不得超过净资本的30%。 4.持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 5.持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。","type":"single"},{"id":"cy_fin_2809","q":"根据《证券公司风险控制指标计算标准规定》，一般来说，证券公司自营业务持有一种非权益类证券的规模不得超过其总规模的（）。","c":{"A":"0.1","B":"0.2","C":"0.3","D":"0.5"},"a":"B","an":"选项B正确：根据《证券公司风险控制指标计算标准规定》，持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。因包销、成立发起式基金、为公募REITS提供流动性支持服务、中国证监会认可的做市业务、买入信用衍生品(合约名义本金未超过持有标的债券规模)或卖出信用衍生品履行保护义务等导致的情形及中国证监会另有认定的除外。  【知识拓展】证券自营业务的风险控制指标 1.自营权益类证券及其衍生品的合计额不得超过净资本的100%。 2.自营非权益类证券及其衍生品的合计额不得超过净资本的500%。 3.持有一种权益类证券的成本不得超过净资本的30%。 4.持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 5.持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。","type":"single"},{"id":"cy_fin_2811","q":"按照《证券公司风险控制指标计算标准规定》，下列不符合证券公司自营业务的指标要求的是（）。","c":{"A":"自营权益类证券及其衍生品的合计额不得超过净资本的100％","B":"自营非权益类证券及其衍生品的合计额不得超过净资本的500％","C":"持有一种权益类证券的成本不得超过净资本的50％","D":"持有一种非权益类证券的规模不得超过其总规模的20％"},"a":"C","an":"题目问的是”不符合“。 选项C错误：证券公司持有一种权益类证券的成本不得超过净资本的30％（并非50％）。因此答案选择C。 选项ABD正确：根据《证券公司风险控制指标计算标准规定》，证券公司经营自营业务，其持仓规模必须符合下列规定： 1.自营权益类证券及其衍生品的合计额不得超过净资本的100%（A项）。 2.自营非权益类证券及其衍生品的合计额不得超过净资本的500%（B项）。 3.持有一种权益类证券的成本不得超过净资本的30%。 4.持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 5.持有一种非权益类证券的规模不得超过其总规模的20%（D项），不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。","type":"single"},{"id":"cy_fin_2813","q":"根据《证券公司风险控制指标计算标准规定》，证券公司经营自营业务，其持仓规模必须符合自营非权益类证券及其衍生品的合计额不得超过净资本的（）。","c":{"A":"6","B":"10","C":"8","D":"5"},"a":"D","an":"选项D正确：根据《证券公司风险控制指标计算标准规定》，证券公司经营自营业务，其持仓规模必须符合下列规定： 第一，自营权益类证券及其衍生品的合计额不得超过净资本的100%。 第二，自营【非权益类】证券及其衍生品的合计额不得超过净资本的500%（D正确）。 第三，持有一种权益类证券的成本不得超过净资本的30%。 第四，持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 第五，持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含ETF)。因包销、成立发起式基金、为公募REITS提供流动性支持服务、中国证监会认可的做市业务、买入信用衍生品(合约名义本金未超过持有标的债券规模)或卖出信用衍生品履行保护义务等导致的情形及中国证监会另有认定的除外。","type":"single"},{"id":"cy_fin_2815","q":"合格境内投资者开展境外证券投资业务时，应当由具有证券投资基金托管资格的银行负责资产托管业务。托管人应当符合最近一个会计年度实收资本不少于（）亿美元或等值货币或托管资产规模不少于（）亿美元或等值货币。","c":{"A":"10：500","B":"10；1000","C":"20：500","D":"20；1000"},"a":"B","an":"选项B正确：合格境内投资者开展境外证券投资业务时，应当由具有证券投资基金托管资格的银行负责资产托管业务。托管人应当符合最近一个会计年度实收资本【不少于10亿美元】或等值货币或托管资产规模【不少于1000亿美元】或等值货币。","type":"single"},{"id":"cy_fin_2817","q":"证券公司资产管理业务涉及的主要部门规章及规范性文件不包括（）。","c":{"A":"《证券期货经营机构私募资产管理业务管理办法》","B":"《证券公司监督管理条例》","C":"《证券期货经营机构私募资产管理计划运作管理规定》","D":"《证券公司及基金管理公司子公司资产证券化业务管理规定》"},"a":"B","an":"题目问的是“不包括”。 选项B错误：《证券公司监督管理条例》属于行政法规。因此答案选择B。 选项ACD正确：证券公司资产管理业务涉及的主要部门规章及规范性文件包括《关于规范金融机构资产管理业务的指导意见》【《证券期货经营机构私募资产管理业务管理办法》《证券期货经营机构私募资产管理计划运作管理规定》《证券公司及基金管理公司子公司资产证券化业务管理规定》】等。","type":"single"},{"id":"cy_fin_2819","q":"管理人应当自专项计划成立日（）个工作日内将设立情况报中国证券投资基金业协会备案。","c":{"A":"3","B":"5","C":"7","D":"10"},"a":"B","an":"选项B正确：管理人应当自专项计划成立日5个工作日内将设立情况报中国证券投资基金业协会备案。","type":"single"},{"id":"cy_fin_2821","q":"下列关于资产证券化业务的描述，说法正确的有（）。","c":{"A":"资产证券化业务是指以基础资产所产生的现金流为偿付支持，通过结构化等方式进行信用增级，在此基础上发行资产支持证券的业务活动","B":"托管人是指为资产支持证券持有人之利益，按照规定或约定对专项计划相关资产进行保管，并监督专项计划运作的商业银行或其他机构","C":"管理人是指按照业务管理规定及约定向专项计划转移其合法拥有的基础资产以获得资金的主体","D":"原始权益人是指为资产支持证券持有人之利益，对专项计划进行管理及履行其他法定及约定职责的证券公司、基金管理公司子公司"},"a":"A,B","an":"选项A正确：资产证券化业务，是指以基础资产所产生的现金流为偿付支持，通过结构化等方式进行信用增级，在此基础上发行资产支持证券的业务活动。 选项B正确：托管人是指为资产支持证券持有人之利益，按照规定或约定对专项计划相关资产进行保管，并监督专项计划运作的商业银行或其他机构。 选项C错误：原始权益人（并非管理人）是指按照业务管理规定及约定向专项计划转移其合法拥有的基础资产以获得资金的主体。 选项D错误：管理人（并非原始权益人）是指为资产支持证券持有人之利益，对专项计划进行管理及履行其他法定及约定职责的证券公司、基金管理公司子公司。","type":"multi"},{"id":"cy_fin_2823","q":"证券公司作为募集机构在开展私募基金募集业务过程中违反规定的，中国证券投资基金业协会可以视情节轻重对募集机构采取的措施不包括（）。","c":{"A":"限期改正","B":"行业内谴责","C":"暂停受理相关业务","D":"取消其基金销售资格"},"a":"D","an":"题目问的是“不包括”。 选项D错误：协会只能对相关人员采取“暂停基金从业资格、取消基金从业资格等纪律处分”，而非取消机构的销售资格。“取消其基金销售资格”是中国证监会的职权范围。因此答案选择D。 选项ABC正确：证券公司作为募集机构在开展私募基金募集业务过程中违反规定的，中国证券投资基金业协会可以视情节轻重对募集机构采取要求【限期改正、行业内谴责、加入黑名单、公开谴责、暂停受理或办理相关业务、撤销管理人登记】等纪律处分；对相关工作人员采取要求参加强制培训、行业内谴责、加入黑名单、公开谴责、认定为不适当人选、暂停基金从业资格、取消基金从业资格等纪律处分。","type":"single"},{"id":"cy_fin_2825","q":"在投资下列产品前，投资者应当以书面形式承诺其符合合格投资者标准的是（）。","c":{"A":"私募基金","B":"公募基金","C":"债券","D":"证券交易所上市交易的证券"},"a":"A","an":"选项A正确：在向投资者推介【私募基金】之前，募集机构应当采取问卷调查等方式履行特定对象确定程序，对投资者风险识别能力和风险承担能力进行评估，投资者应当以书面形式承诺其符合合格投资者标准。 选项BCD错误：面向公众发行，无需投资者特别承诺其为合格投资者。","type":"single"},{"id":"cy_fin_2827","q":"证券公司中间介绍业务是指（）。","c":{"A":"证券公司为期货公司介绍客户参与期货交易的业务","B":"证券公司为证券发行人介绍客户购买证券的业务","C":"证券公司为证券投资咨询机构介绍客户购买投资顾问服务的业务","D":"证券公司为基金介绍客户购买基金份额的业务"},"a":"A","an":"选项A正确：证券公司中间介绍业务是指【证券公司】接受期货公司的委托，为【期货公司】介绍客户参与期货交易并提供其他相关服务的业务活动。 选项B错误：涉及证券承销业务。 选项C错误：涉及证券投资咨询业务。 选项D错误：涉及基金销售业务。","type":"single"},{"id":"cy_fin_2829","q":"按照《公开募集证券投资基金销售机构监督管理办法》，基金销售机构违反相关规定的，中国证监会及其派出机构可以对该基金销售机构采取的方式包括（）。","c":{"A":"监管谈话","B":"出具警示函","C":"责令处分相关人员","D":"公开谴责"},"a":"A,B,C","an":"选项D错误：公开谴责针对相关主管人员、直接责任人员，而不是题目问的到“销售机构”本身。 选项ABC正确：基金销售相关机构违反法律、行政法规、本办法及中国证监会其他规定，法律法规有规定的，依照其规定处理；法律法规没有规定的，中国证监会及其派出机构可以采取【监管谈话、出具警示函、责令改正、责令处分有关人员、责令暂停办理相关业务】等行政监管措施，对【相关主管人员、直接责任人员】，可以采取监管谈话、出具警示函、公开谴责（并非针对销售机构，D错误）、认定为不适当人选等行政监管措施，发现违法行为涉嫌犯罪的，移送司法机关处理。","type":"multi"},{"id":"cy_fin_2831","q":"证券公司作为代销机构销售私募类金融产品时，可以在面向社会公众的宣传单上进行宣传。（）","c":{"1":"对","0":"错"},"a":"0","an":"募集机构及其从业人员推介私募基金时，禁止有以下行为公开推介或者变相公开推介：公开出版资料；【面向社会公众的宣传单、布告、手册、信函、传真】；海报、户外广告；电视、电影、电台及其他音像等公共传播媒体；公共、门户网站链接广告、博客等；未设置特定对象确定程序的募集机构官方网站、微信朋友圈等互联网媒介；未设置特定对象确定程序的讲座、报告会、分析会；未设置特定对象确定程序的电话、短信和电子邮件等通信媒介。","type":"judge"},{"id":"cy_fin_2833","q":"证券基金经营机构的高级管理人员、部门负责人和分支机构负责人在证券基金经营机构参股的公司仅可兼任董事、监事，且数量不得超过（）家。","c":{"A":"2","B":"3","C":"4","D":"5"},"a":"A","an":"选项A正确：证券基金经营机构的高级管理人员、部门负责人和分支机构负责人，不得在证券基金经机构参股或者控股的公司以外的营利性机构兼职；在证券基金经营机构参股的公司仅可兼任董事、监事，且数量不得超过2家，在证券基金经营机构控股子公司兼职的不受前述限制。","type":"single"},{"id":"cy_fin_2835","q":"自证券基金经营机构作出聘任决定之日起20个工作日内，高级管理人员和分支机构负责人无正当理由未实际到任履行相应职责的，证券基金经营机构应当撤销对受聘人的聘任决定，并自作出撤销聘任决定之日起5个工作日内向中国证监会相关派出机构报告。（）","c":{"1":"对","0":"错"},"a":"1","an":"自证券基金经营机构作出聘任决定之日起20个工作日内，高级管理人员和分支机构负责人无正当理由未实际到任履行相应职责的，证券基金经营机构应当撤销对受聘人的聘任决定，并自作出撤销聘任决定之日起5个工作日内向中国证监会相关派出机构报告。","type":"judge"},{"id":"cy_fin_2837","q":"从一家证券公司离任超过3个月的投资经理，才可以被另一家基金公司聘用从事投资交易业务。（  ）","c":{"1":"对","0":"错"},"a":"0","an":"证券基金经营机构不得聘用从其他证券基金经营机构离任未满6个月的投资经理，从事投资、研究、交易等相关业务。","type":"judge"},{"id":"cy_fin_2839","q":"拟任证券经营机构分支机构负责人的人员，需具备1年以上与其拟任职务相关的证券、基金、金融、法律、会计、信息技术等工作经历。（）","c":{"1":"对","0":"错"},"a":"0","an":"拟任证券经营机构分支机构负责人的人员，除应持续符合证券从业人员应符合的从业条件外，还应当同时符合下列任职条件： （1）正直诚实，品行良好； （2）熟悉证券基金法律法规和中国证监会的规定； （3）具备3年以上（并非1年以上）与其拟任职务相关的证券、基金、金融、法律、会计、信息技术等工作经历； （4）具有与拟任职务相适应的管理经历和经营管理能力。","type":"judge"},{"id":"cy_fin_2841","q":"根据《证券投资基金法》，下列关于基金财产的说法，正确的有（）。 I 基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限对基金财产的债务承担责任 II 因基金管理人承担的债务，可以对基金财产强制执行 III 基金托管人依照法律规定，应当承担的民事赔偿责任，可以由基金财产承担 Ⅳ 基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵销","c":{"A":"Ⅰ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"C","an":"Ⅰ项说法正确，基金财产的债务由基金财产本身承担，基金份额持有人以其出资为限对基金财产的债务承担责任。但基金合同依照《证券投资基金法》另有约定的，从其约定。 Ⅱ、Ⅲ项说法错误，【非因基金财产本身承担的债务，不得对基金财产强制执行】。 Ⅳ项说法正确，基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵销。","type":"single"},{"id":"cy_fin_2843","q":"下列关于基金财产债权债务独立性的意义的说法，错误的是（）。","c":{"A":"有利于保护基金管理人的合法权益","B":"有利于保护基金财产的安全","C":"有利于保护基金财产的独立性","D":"有利于基金财产的稳定运作，提高基金的运作效率"},"a":"A","an":"A项说法错误，应为有利于保护【基金份额持有人】的合法权益。","type":"single"},{"id":"cy_fin_2845","q":"根据《证券投资基金法》，下列关于基金财产独立性的说法，正确的是（  ）。","c":{"A":"不同基金财产的债权债务不得相互抵扣，公募基金除外","B":"基金管理人因基金财产的管理、运用或者其他情形而取得的财产和收益，归入基金管理人","C":"基金管理人、基金托管人因依法解散、被依法撤销或者被依法宣告破产等原因进行清算的基金财产不属于其清算财产","D":"基金财产的债务由基金管理人本身承担，基金管理公司股东以其出资为限对基金财产的债务承担责任"},"a":"C","an":"基金财产的独立性包括基金财产本身的独立性以及基金财产债权债务的独立性，对证券投资基金活动的要求体现在以下几个方面： (1)基金财产独立于基金管理人、基金托管人的固有财产。基金管理人、基金托管人不得将基金财产归入其固有财产。基金销售结算资金、基金份额独立于基金销售机构、基金销售支付机构或者基金份额登记机构的自有财产。 (2)基金管理人、基金托管人因基金财产的管理、运用或者其他情形而取得的财产和收益，归入基金财产（并非基金管理人，B错误）。 (3)基金管理人、基金托管人因依法解散、被依法撤销或者被依法宣告破产等原因进行清算的，基金财产不属于其清算财产（C）。基金销售机构、基金销售支付机构或者基金份额登记机构破产或者清算时，基金销售结算资金、基金份额不属于其破产财产或者清算财产。 (4)基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵销；不同基金财产的债权债务，不得相互抵销（公募基金无例外，A错误）。 (5)基金财产的债务由基金财产（并非基金管理人）本身承担，基金份额持有人（并非基金管理公司股东，D错误）以其出资为限对基金财产的债务承担责任。但基金合同依照《证券投资基金法》另有约定的，从其约定。 (6)基金管理人、基金托管人、基金服务机构依照法律规定，应当承担的民事赔偿责任和缴纳的罚款、罚金，由基金管理人、基金托管人、基金服务机构以其固有财产承担。 综上，该题选C。","type":"single"},{"id":"cy_fin_2847","q":"根据《证券投资基金法》，开放式基金的基金份额在基金存续期间，基金份额持有人（  ）。","c":{"A":"可以在基金合同约定的时间和场所申请赎回","B":"可以在任何场所申请赎回","C":"可在任何时间申请赎回","D":"不得申请赎回"},"a":"A","an":"选项A正确：开放式基金的基金份额持有人，在基金合同期限内可以依照基金合同约定的时间和场所申购或者赎回基金份额。 选项BCD为干扰项","type":"single"},{"id":"cy_fin_2849","q":"根据《证券投资基金法》，下列关于非公开募集基金管理人登记的说法，正确的是（）。","c":{"A":"未经登记，任何单位或者个人不得使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动","B":"未经登记，任何个人不得使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动，单位使用的除外","C":"未经登记，任何单位或者个人不得使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动，法律、行政法规另有规定的除外","D":"任何单位或者个人不得使用 “基金”或者“基金管理”字样或者近似名称进行证券投资活动，法律、行政法规另有规定的除外"},"a":"C","an":"根据《证券投资基金法》第九十条的规定，未经登记，任何单位或者个人不得使用“基金”或者“基金管理”字样或者近似名称进行证券投资活动；【但是，法律、行政法规另有规定的除外】。","type":"single"},{"id":"cy_fin_2851","q":"下列关于基金财产债权债务独立性的说法，正确的有（  ）。","c":{"A":"非因基金财产本身承担的债务，不得对基金财产强制执行","B":"基金财产的债权与基金管理人的固有财产严格区分","C":"基金财产的债权不得与基金管理人固有财产的债务相抵","D":"不同基金财产的债权债务，可以相互抵消"},"a":"A,B,C","an":"选项A正确：非因基金财产本身承担的债务，不得对基金财产强制执行。 选项B正确：在基金财产独立的前提下，基金财产的债权或债务与基金管理人、基金托管人的固有财产须严格区分。 选项C正确：基金财产的债权，不得与基金管理人、基金托管人固有财产的债务相抵消。 选项D错误：不同基金财产的债权债务，不得（并非可以）相互抵消。","type":"multi"},{"id":"cy_fin_2853","q":"根据《证券投资基金法》，采用封闭式运作方式的基金，是指基金份额总额在基金合同期限内固定不变，基金份额持有人不得申请赎回的基金。（）","c":{"1":"对","0":"错"},"a":"1","an":"采用封闭式运作方式的基金，简称“封闭式基金”，是指基金份额总额在基金合同期限内固定不变，基金份额持有人不得申请赎回的基金。","type":"judge"},{"id":"cy_fin_2855","q":"基金管理人、基金托管人因基金财产的管理、运用或者其他情形而取得的财产和收益，归入基金财产。（）","c":{"1":"对","0":"错"},"a":"1","an":"基金管理人、基金托管人因基金财产的管理、运用或者其他情形而取得的财产和收益，归入基金财产。","type":"judge"},{"id":"cy_fin_2857","q":"根据《私募投资基金监督管理条例》，私募基金管理人不得采取的行为有（  ）。","c":{"A":"通过电话向不特定对象宣传推介","B":"通过即时通讯工具向不特定对象宣传推介","C":"通过设有密码认证限制的销售平台向特定对象宣传推介","D":"通过分析会向不特定对象分析推介"},"a":"A,B,D","an":"选项ABD正确：私募基金应非公开募集，不得通过报刊、电台、电视台、互联网等大众传播媒介，电话（A）、短信、即时通讯工具（B）、电子邮件、传单，或者讲座、报告会、分析会（D）等方式向不特定对象宣传推介；不得以虚假、片面、夸大等方式宣传推介；不得以私募基金托管人名义宣传推介；不得向投资者承诺投资本金不受损失或者承诺最低收益。私募基金管理人应当自行募集资金，不得委托他人募集资金，但国务院证券监督管理机构另有规定的除外。 选项C错误：私募基金可通过设置特定对象确定程序（如密码认证）的平台向已注册的特定对象宣传，属于合法方式。","type":"multi"},{"id":"cy_fin_2859","q":"根据《证券公司和证券投资基金管理公司合规管理办法》下列关于证券公司合规管理要求的说法，错误的是（）。","c":{"A":"贯穿决策、执行、监督、反馈等各个环节","B":"覆盖所有业务","C":"覆盖各部门，各分支机构、各关联公司","D":"覆盖全体工作人员"},"a":"C","an":"C项错误，没有“各关联公司”。证券公司的合规应当覆盖所有业务，各部门、各分支机构、各层级子公司和全体工作人员，贯穿决策、执行、监督、反馈等各个环节。","type":"single"},{"id":"cy_fin_2861","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，下列关于证券公司合规负责人和合规管理人员的独立性原则，说法错误的是（）。","c":{"A":"合规负责人有权要求列席董事会","B":"合规负责人工作称职的，其年度薪酬收入总额在公司高级管理人员年度薪酬收入总额中的排名不应当低于中位数","C":"证券公司对合规部门考核时，不得将考核结果与业务部门的经营业务直接挂钩","D":"合规负责人直接向经理层负责，由经理层考核"},"a":"D","an":"D项说法错误，明确合规负责人直接向【董事会】负责，由【董事会】考核。","type":"single"},{"id":"cy_fin_2863","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司合规管理的基本制度应当经（  ）审议通过后实施。","c":{"A":"股东会或股东大会","B":"董事会","C":"风险控制委员会","D":"经营管理层"},"a":"B","an":"选项B正确：证券公司应当制定合规管理的基本制度，经董事会审议通过后实施。 选项A错误：股东会职权限于重大结构决策（修改章程、增资减资等），不涉及具体管理制度审批。 选项C错误：风险控制委员会是董事会下属专门委员会，无独立决策权。 选项D错误：管理层负责执行合规制度，若同时审批制度将导致自我监督失效。","type":"single"},{"id":"cy_fin_2865","q":"根据《证券公司和证券投资基金管理公司合规管理办法》，证券公司的合规是指证券公司及其工作人员的经营管理和执业行为符合法律、法规、规章及规范性文件、行业规范和自律规则、公司内部规章制度，以及行业普遍遵守的职业道德和行为准则。（）","c":{"1":"对","0":"错"},"a":"1","an":"根据《证券公司和证券投资基金管理公司合规管理办法》第二条的规定，证券公司的合规，是指证券公司及其工作人员的经营管理和执业行为符合法律、法规、规章及规范性文件、行业规范和自律规则、公司内部规章制度，以及行业普遍遵守的职业道德和行为准则。","type":"judge"},{"id":"cy_fin_2867","q":"根据《证券基金经营机构信息技术管理办法》，以下关于证券公司提供信息技术服务符合规定的有（）。 Ⅰ 证券公司可以在安全、合规的前提下为子公司提供机房、通信网络及其他信息技术设施 Ⅱ 证券公司可以协助子公司开展相关运维工作 Ⅲ 证券公司可以设立信息技术专业子公司，为母公司提供信息技术服务 Ⅳ 证券公司设立的信息技术专业子公司不得为其他金融机构提供信息技术服务","c":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅲ、Ⅳ"},"a":"C","an":"Ⅳ项错误，信息技术专业子公司经中国证监会备案后【可为其他金融机构提供信息技术服务】。 Ⅰ、Ⅱ、Ⅲ做法正确。 故本题选C，选项ABD错误。","type":"single"},{"id":"cy_fin_2869","q":"根据《证券基金经营机构信息技术管理办法》，下列关于证券公司信息系统运行各环节安全管理的说法，正确的有（）。","c":{"A":"证券公司重要信息系统计划停止使用的，可不用开展技术和业务影响评估","B":"证券公司应当建立健全信息系统安全监测机制，设定监测指标并持续监测重要信息系统的运行状况","C":"证券公司应当结合公司发展战略、市场交易规模等因素定期对重要信息系统开展压力测试和评估分析，确保其容量满足业务开展需要","D":"证券公司应当确保重要信息系统具备可审计功能，并可以根据监管部门的要求转换、提供数据"},"a":"B,C,D","an":"选项B正确：证券公司应当建立健全信息系统安全监测机制，设定监测指标并持续监测重要信息系统的运行状况。 选项C正确：证券公司应当结合公司发展战略、市场交易规模等因素定期对重要信息系统开展压力测试和评估分析，确保其容量满足业务开展需要。 选项D正确：证券公司应当确保重要信息系统具备可审计功能，并可以根据监管部门的要求转换、提供数据。 选项A错误：证券公司重要信息系统计划停止使用的，应当开展技术和业务影响评估，制订完整的系统停用和数据迁移保管方案，并组织必要的评审及停用后的安全检查。 综上所述，本题选BCD。","type":"multi"},{"id":"cy_fin_2871","q":"证券公司建立信息技术应急管理机制，应当包括以下（  ）内容。","c":{"A":"建立信息技术应急管理的组织架构","B":"确定全部业务恢复目标","C":"制订应急预案，稳妥处置信息技术突发事件","D":"积极开展应急演练和信息技术应急管理的评估与改进"},"a":"A,C,D","an":"证券公司借助信息技术手段从事证券基金业务活动的，应当建立信息技术应急管理的组织架构（A），确定重要业务（并非全部业务，B错误）及其恢复目标，制订应急预案，配置充足资源，稳妥处置信息技术突发事件（C），并积极开展应急演练和信息技术应急管理的评估与改进（D）。 综上，该题选ACD。","type":"multi"},{"id":"cy_fin_2873","q":"证券基金经营机构使用港股投资顾问服务，以下不符合业务规范的是（）。","c":{"A":"证券基金经营机构应当自主作出投资决策","B":"证券基金经营机构应当委托港股投资顾问直接执行投资指令","C":"证券基金经营机构应当与港股投资顾问签订协议，约定双方的相关事项","D":"证券基金经营机构应当在基金合同或者招募说明书中如实披露使用港股投资顾问服务的情况"},"a":"B","an":"内地证券基金经营机构使用港股投资顾问服务的业务规范 1.履行主动管理职责：证券基金经营机构应当履行主动管理职责，自主作出投资决策，【不得委托提供港股投资顾问服务的香港机构直接执行投资指令】（B项错误）。证券基金经营机构作为基金管理人依法应当承担的责任不因委托而免除。 2.签订协议 ：证券基金经营机构应当与提供港股投资顾问服务的香港机构签订协议，约定双方的权利、义务和责任，服务的内容、方式和禁止行为等事项。  3.信息披露 ：证券基金经营机构应当在基金合同或者招募说明书中如实披露使用港股投资顾问服务的情况，包括提供港股投资顾问服务的香港机构的名称、注册地址、办公地址、成立时间、最近一个会计年度管理的证券资产规模、主要负责人及联系方式等信息，并充分说明和揭示委托香港机构提供港股投资顾问服务可能产生的风险。  4.留痕管理 ：证券基金经营机构应当对使用港股通投资顾同服务的情况实行留痕管理，以书面或者电子文件形式记录香港机构提供港股投资顾问服务的时间、方式、内容和依据等信息。相关业务档案的保存期限自协议终止之日起不得少于5年。","type":"single"},{"id":"cy_fin_2875","q":"按照《证券公司风险控制指标计算标准规定》，证券公司自营权益类证券及其衍生品的合计额不得超过净资本的（  ）。","c":{"A":"1","B":"5","C":"0.5","D":"0.8"},"a":"A","an":"选项A正确：自营权益类证券及其衍生品的合计额不得超过净资本的100%。  【知识拓展】证券自营业务的风险控制指标 证券公司经营自营业务，其持仓规模必须符合下列规定： 1.自营权益类证券及其衍生品的合计额不得超过净资本的100% 2.自营非权益类证券及其衍生品的合计额不得超过净资本的500% 3.持有一种权益类证券的成本不得超过净资本的30% 4.持有一种权益类证券的市值与其总市值的比例不得超过5%，因包销、作为公募基金管理人跟投本公司管理的权益类公募基金、中国证监会认可的做市业务以及股票质押违约处理等导致的情形及中国证监会另有认定的除外。 5.持有一种非权益类证券的规模不得超过其总规模的20%，不含同业存单、银行承兑汇票、国债、中央银行票据、国开债及基金名称显示投资方向为此类债券的指数基金(含 ETF)。因包销、成立发起式基金、为公募REITS提供流动性支持服务、中国证监会认可的做市业务、买入信用衍生品(合约名义本金未超过持有标的债券规模)或卖出信用衍生品履行保护义务等导致的情形及中国证监会另有认定的除外。","type":"single"},{"id":"cy_fin_2877","q":"下列关于资产管理计划应当终止的情形，正确的有（）。 I 发生资产管理合同约定的应当终止的情形 II 集合资产管理计划存续期间，持续3个工作日投资者少于2人 III 证券公司被依法撤销资产管理业务资格且在6个月内没有新的管理人承接 IV 资产管理计划存续期届满且不展期","c":{"A":"I、II、III、IV","B":"II、III","C":"I、II、IV","D":"I、III、IV"},"a":"D","an":"有下列情形之一的，资产管理计划应当终止： 1．资产管理计划存续期届满且不展期。IV项正确 2．证券公司被依法撤销资产管理业务资格或者依法解散、被撤销、被宣告破产，且在6个月内没有新的管理人承接。III项正确 3．托管人被依法撤销基金托管资格或者依法解散、被撤销、 被宣告破产，且在6个月内没有新的托管人承接。 4．经全体投资者，证券公司和托管人协商一致决定终止的。 5．发生资产管理合同约定的应当终止的情形。I项正确 6．集合资产管理计划存续期间，【持续5个工作日投资者少于2人】。II项错误 7．法律、行政法规及中国证监会规定的其他情形。 证券公司应当自资产管理计划终止之日起5个工作日内报中国证券投资基金业协会备案，并抄报中国证监会相关派出机构。","type":"single"},{"id":"cy_fin_2879","q":"甲证券公司代销乙基金公司的一款混合型证券投资基金。王某是甲证券公司经纪业务事业部负责代销金融产品上架工作的主管。根据《证券公司代销金融产品管理规定》，王某可以接受乙公司提供的（）。","c":{"A":"乙公司机构客户基金优惠申购费率","B":"制定基金宣传推介资料","C":"宴请及观光游览服务","D":"高档礼品"},"a":"B","an":"A项，存在区别对待客户的可能，【不符合公平交易】的原则。 CD两项，证券公司从事代销金融产品活动的人员【不得接受委托人给予的财物或其他利益】。","type":"single"},{"id":"cy_fin_2881","q":"甲与乙串通，以事先约定的时间、价格和方式相互进行证券交易，影响证券交易价格，获得巨大非法收益，则甲与乙的行为构成（  ）。","c":{"A":"内幕交易罪","B":"利用未公开信息交易罪","C":"操纵证券市场罪","D":"背信运用受托财产罪"},"a":"C","an":"选项C正确：操纵证券、期货市场罪，是指与他人串通，以事先约定的时间、价格和方式相互进行证券交易，操纵证券市场，影响证券交易价格或者证券交易量的行为。 选项A错误：内幕交易、泄露内幕信息，是指证券、期货交易内幕信息的知情人员或者非法获取证券、期货交易内幕信息的人员，在涉及证券的发行，证券、期货交易或者其他对证券、期货交易价格有重大影响的信息尚未公开前，买入或者卖出该证券，或者从事与该内幕信息有关的期货交易，或者泄露该信息，或者明示、暗示他人从事上述交易活动，情节严重的行为。 选项B错误：利用未公开信息交易，是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券、期货交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。 选项D错误：背信运用受托财产，是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。","type":"single"},{"id":"cy_fin_2883","q":"投资者证券账户由一码通账户和子账户组成。（  ）","c":{"1":"对","0":"错"},"a":"1","an":"【超纲题】我国投资者证券账户实行一码通账户体系，由两部分组成： 一码通账户（总账户）：用于归集、关联投资者名下所有证券子账户； 子账户：包括 A 股账户、B 股账户、封闭式基金账户、信用证券账户等具体交易用途的账户。","type":"judge"},{"id":"cy_fin_2885","q":"依据《证券期货投资者适当性管理办法》，下列属于专业投资者的是（）。","c":{"A":"商业银行","B":"信托公司","C":"社会保障基金","D":"金融资产低于300万元或者最近3年个人年均收入不低于30万元的个人"},"a":"A,B,C","an":"选项ABC正确：第一类专业投资者具体包括以下三大类。 1.经有关金融监管部门批准设立的金融机构，包括证券公司、期货公司、基金管理公司及其子公司、商业银行、保险公司、信托公司、财务公司等；经行业协会备案或者登记的证券公司子公司、期货公司子公司、私募基金管理人。 2.上述机构面向投资者发行的理财产品，包括但不限于证券公司资产管理产品、基金管理公司及其子公司产品、期货公司资产管理产品、银行理财产品、保险产品、信托产品、经行业协会备案的私募基金。 3.社会保障基金、企业年金等养老基金，慈善基金等社会公益基金，合格境外机构投资者，人民币合格境外机构投资者。 选项D错误：同时符合下列条件的自然人为第二类专业投资者： (1)金融资产不低于500万元，或者最近3年个人年均收入不低于50万元； (2)具有2年以上证券、基金、期货、黄金、外汇等投资经历，或者具有2年以上金融产品设计、投资、风险管理及相关工作经历，或者属于前述第一类专业投资者中的第1部分的金融机构的高级管理人员、获得职业资格认证的从事金融相关业务的注册会计师和律师。","type":"multi"},{"id":"cy_fin_2887","q":"下列关于证券公司信息技术管理一般规定的说法正确的是（）。","c":{"A":"中国证券业协会及中国证券投资基金业协会依照《证券基金经营机构信息技术管理办法》制定和完善相关自律规则，对证券基金经营机构借助信息技术手段从事证券基金业务活动或提供相关服务实施自律管理","B":"中国证监会及其派出机构依法对证券经营与服务机构借助信息技术手段从事证券基金业务活动或提供相关服务实施监督管理","C":"证券公司借助信息技术手段从事证券基金业务活动，应遵循《证券基金经营机构信息技术管理办法》等相关规定","D":"中国证券业协会是从事证券基金业务活动的责任主体"},"a":"A,B,C","an":"选项D错误：证券公司是从事证券基金业务活动的责任主体。 选项ABC说法正确。","type":"multi"},{"id":"cy_fin_2889","q":"证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券公司应当指定一名熟悉证券、基金业务，具有信息技术相关专业背景、任职经历、履职能力的高级管理人员为首席信息官，由其负责信息技术管理工作。","type":"judge"},{"id":"cy_fin_2891","q":"拟任证券基金经营机构高级管理人员的，曾担任证券基金经营机构部门负责人以上职务不少于1年。（）","c":{"1":"对","0":"错"},"a":"0","an":"拟任证券基金经营机构高级管理人员的，曾担任证券基金经营机构部门负责人以上职务不少于【2年】，或者曾担任金融机构部门负责人以上职务不少于4年，或者具有相当职位管理经历。","type":"judge"},{"id":"cy_fin_2893","q":"甲公募基金为混合型证券投资基金，采用契约型开放式的运作方式，该基金的最低募集份额总额为2亿份，最低募集金额总额为人民币2亿元，基金募集期为10天，发售对象为符合法律法规规定的可投资于证券投资基金的个人投资者、机构投资者、合格境外机构投资者和人民币合格境外机构投资者以及法律法规或中国证监会允许购买证券投资基金的其他投资人。下列关于甲公募基金运作方式的说法，正确的有（）。","c":{"A":"甲公募基金没有固定的存续期限","B":"甲公募基金的基金份额总额不固定","C":"甲公募基金的基金份额持有人在基金合同期限内不得申请赎回","D":"甲公募基金的基金份额可以在基金合同约定的时间和场所申购或者赎回"},"a":"A,B,D","an":"A项正确，开放式基金的基金合同期限一般不是固定的。 B、D项正确，开放式基金，是指基金份额总额不固定，基金份额可以在基金合同约定的时间和场所申购或者赎回的基金。 C项错误，封闭式基金，是指基金份额总额在基金合同期限内固定不变，基金份额持有人不得申请赎回的基金。","type":"multi"},{"id":"cy_fin_2895","q":"下列关于公募基金的基金管理人禁止行为，说法错误的是（）。","c":{"A":"不得挪用基金财产","B":"不得向基金份额持有人承诺收益","C":"不得将其固有财产或者他人财产混同于基金财产从事证券投资","D":"不得公平地对待其管理的不同基金财产"},"a":"D","an":"公开募集基金的基金管理人及其董事、监事、高级管理人员和其他从业人员不得有下列行为： (1)将其固有财产或者他人财产混同于基金财产从事证券投资；（C正确） (2)不公平地对待其管理的不同基金财产；（D错误） (3)利用基金财产或者职务之便为基金份额持有人以外的人牟取利益； (4)向基金份额持有人违规承诺收益或者承担损失；（B正确） (5)侵占、挪用基金财产；（A正确） (6)泄露因职务便利获取的未公开信息、利用该信息从事或者明示、暗示他人从事相关的交易活动； (7)玩忽职守，不按照规定履行职责。","type":"single"},{"id":"cy_fin_2897","q":"私募基金管理人应当自私募基金募集完毕之日起（）个工作日内，向登记备案机构报送材料，办理备案。","c":{"A":"5","B":"10","C":"20","D":"30"},"a":"C","an":"私募基金管理人应当自私募基金募集完毕之日起20个工作日内，向登记备案机构报送材料，办理备案。","type":"single"},{"id":"cy_fin_2899","q":"证券公司合规负责人违反《证券公司和证券投资基金管理公司合规管理办法》规定的，中国证监会可以采取()等行政监管措施。","c":{"A":"责令改正","B":"监管谈话","C":"责令参加培训","D":"认定为不适当人选"},"a":"A,B,C,D","an":"选项ABCD正确：合规负责人违反《证券公司和证券投资基金管理公司合规管理办法》规定的，中国证监会可以采取出具警示函、责令参加培训、责令改正、监管谈话、认定为不适当人选等行政监管措施。","type":"multi"},{"id":"cy_fin_2901","q":"如果一只基金是公募的证券投资基金，那么该基金()。","c":{"A":"由专业的机构管理","B":"通过募集方式设立","C":"投资于固定的证券","D":"发行的对象不特定或超过200名特定对象"},"a":"A,B,D","an":"选项ABD正确：《中华人民共和国证券投资基金法》规定，公开募集基金，应当经国务院证券监督管理机构注册。未经注册，不得公开或者变相公开募集基金。前述所称公开募集基金，包括向不特定对象募集资金、向特定对象募集资金累计超过200人，以及法律、行政法规规定的其他情形。公开募集基金应当由基金管理人管理，基金托管人托管。 选项C错误：公募基金的投资范围不固定，可根据基金合同约定灵活配置（如股票、债券等）。","type":"multi"},{"id":"cy_fin_2903","q":"任何人员只能在一家证券公司担任独立董事。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据相关规则，任何人员最多可以在【2家】证券基金经营机构担任独立董事，独立董事不得在拟任职的证券基金经营机构担任董事会外的职务。","type":"judge"},{"id":"cy_fin_2905","q":"投资经理离任的，证券基金经营机构应当对其进行离任审查，并自离任之日起3个月内形成离任审查报告，以存档备查。（）","c":{"1":"对","0":"错"},"a":"0","an":"投资经理离任的，证券基金经营机构应当对其进行离任审查，并自离任之日起【2个月】内形成离任审查报告，以存档备查。证券基金经营机构不得聘用从其他证券基金经营机构离任未满6个月的投资经理，从事投资、研究、交易等相关业务。","type":"judge"},{"id":"cy_fin_2907","q":"证券公司同一高级管理人员可以同时分管投资银行业务和私募股权投资基金业务。（）","c":{"1":"对","0":"错"},"a":"0","an":"证券公司同一高级管理人员【不得同时分管】投资银行业务和另类投资业务（私募股权投资基金属于另类投资业务）。","type":"judge"},{"id":"cy_fin_2909","q":"证券公司应当自资产管理计划终止之日起（）个工作日内报中国证券投资基金业协会备案，并抄报中国证监会相关派出机构。","c":{"A":"1","B":"3","C":"4","D":"5"},"a":"D","an":"证券公司应当自资产管理计划终止之日起5个工作日内报中国证券投资基金业协会备案，并抄报中国证监会相关派出机构。","type":"single"},{"id":"cy_fin_2911","q":"关于基金托管人的职责，下列说法错误的是（）。","c":{"A":"安全保管基金财产","B":"按照基金合同的约定，根据基金管理人的投资指令，及时办理清算、交割事宜","C":"进行基金会计核算并编制基金财务会计报告","D":"按照规定召集基金份额持有人大会"},"a":"C","an":"选项C错误：进行基金会计核算并编制基金财务会计报告是基金管理人的职责。 选项ABD正确：根据《证券投资基金法》第三十六条的规定，基金托管人依法应当履行下列职责： (1)安全保管基金财产； (2)按照规定开设基金财产的资金账户和证券账户； (3)对所托管的不同基金财产分别设置账户，确保基金财产的完整与独立； (4)保存基金托管业务活动的记录、账册、报表和其他相关资料； (5)按照基金合同的约定，根据基金管理人的投资指令，及时办理清算、交割事宜； (6)办理与基金托管业务活动有关的信息披露事项； (7)对基金财务会计报告、中期和年度基金报告出具意见； (8)复核、审查基金管理人计算的基金资产净值和基金份额申购、赎回价格； (9)按照规定召集基金份额持有人大会； (10)按照规定监督基金管理人的投资运作。","type":"single"},{"id":"cy_fin_2913","q":"证券基金经营机构基金经理、投资经理离任的，证券基金经营机构应当对其进行离任审查，并自离任之日起()内形成离任审查报告，以存档备查。","c":{"A":"2个月","B":"1个月","C":"3个月","D":"半个月"},"a":"A","an":"本题考查证券基金经营机构基金经理、投资经理离任的审计要求。证券基金经营机构基金经理、投资经理离任的，证券基金经营机构应当对其进行离任审查，并自离任之日起2个月内形成离任审查报告，以存档备查。","type":"single"},{"id":"cy_fin_2915","q":"决定聘任、解聘、考核合规负责人，决定其薪酬待遇是()履行的合规管理职责。","c":{"A":"董事会","B":"经营管理主要负责人","C":"股东会","D":"分支机构负责人"},"a":"A","an":"选项A正确：证券基金经营机构董事会决定本公司的合规管理目标，对合规管理的有效性承担责任，履行下列合规管理职责：(1)审议批准合规管理的基本制度。(2)审议批准年度合规报告。(3)决定解聘对发生重大合规风险负有主要责任或者领导责任的高级管理人员。(4)决定聘任、解聘、考核合规负责人，决定其薪酬待遇。(5)建立与合规负责人的直接沟通机制。(6)评估合规管理有效性，督促解决合规管理中存在的问题。(7)公司章程规定的其他合规管理职责。 选项B错误：「经营管理主要负责人「的职责主要是组织制定规章制度和监督实施 选项C错误：「股东会「不直接参与合规事务。 选项D错误：「分支机构负责人「在其分管领域负责合规管理。","type":"single"},{"id":"cy_fin_2917","q":"托管机构挪用基金销售结算资金，取得违法所得105万元，则证券监督管理机构应对其采取的措施是()。","c":{"A":"仅没收违法所得","B":"没收违法所得，并处违法所得1倍以上3倍以下罚款","C":"没收违法所得，并处违法所得1倍以上5倍以下罚款","D":"处50万元以上200万元以下罚款"},"a":"C","an":"选项C正确：挪用基金销售结算资金或者基金份额的，责令改正，没收违法所得，并处违法所得1倍以上5倍以下罚款；没有违法所得或者违法所得不足100万元的，并处10万元以上100万元以下罚款。对直接负责的主管人员和其他直接责任人员给予警告，并处3万元以上30万元以下罚款。","type":"single"},{"id":"cy_fin_2919","q":"下列属于证券基金经营机构保护经营数据措施的有(  )。","c":{"A":"网络隔离","B":"访问控制","C":"数据加密","D":"数据销毁"},"a":"A,B,C,D","an":"证券基金经营机构应当完善网络隔离（A）、用户认证、访问控制（B）、数据加密（C）、数据备份、数据销毁（D）、日志记录、病毒防范和非法入侵检测等安全保障措施，保护经营数据和客户信息安全，防范信息泄露与损毁。","type":"multi"},{"id":"cy_fin_2921","q":"根据《证券公司及基金管理公司子公司资产证券化业务管理规定》，资产证券化业务的基础资产应当权属明确，是可以产生独立、可预测的现金流的特定财产，财产权利不得作为基础资产。（）","c":{"1":"对","0":"错"},"a":"0","an":"基础资产，是指符合法律法规规定，权属明确，可以产生独立、可预测的现金流且可特定化的【财产权利】或者财产。","type":"judge"},{"id":"cy_fin_2923","q":"合格境内机构投资者开展境外证券投资业务时，应当由具有证券投资基金托管资格的银行负责资产托管业务。托管人可以委托符合条件的境外资产托管人负责境外资产托管业务。其中一个条件是：最近一个会计年度实收资本不少于（）亿美元或等值货币或托管资产规模不少于（）亿美元或等值货币。","c":{"A":"10；500","B":"10；1000","C":"20；500","D":"20；1000"},"a":"B","an":"合格境内机构投资者开展境外证券投资业务时，应当由具有证券投资基金托管资格的银行负责资产托管业务。托管人可以委托符合条件的境外资产托管人负责境外资产托管业务。其中一个条件是：最近一个会计年度实收资本不少于10亿美元或等值货币或托管资产规模不少于1000亿美元或等值货币。","type":"single"},{"id":"cy_fin_2925","q":"证券基金经营机构董事长、高级管理人员、分支机构负责人离任的，证券基金经营机构应当对其进行审计，并自其离任之日起2个月内将离任审计报告向中国证监会相关派出机构报告。（）","c":{"1":"对","0":"错"},"a":"1","an":"证券基金经营机构董事长、高级管理人员、分支机构负责人离任的，证券基金经营机构应当对其进行审计，并自其离任之日起2个月内将离任审计报告向中国证监会相关派出机构报告。其中，法定代表人、经营管理的主要负责人离任的，证券基金经营机构应当聘请符合《证券法》规定的会计师事务所对其进行离任审计。","type":"judge"},{"id":"cy_fin_2927","q":"某投资公司拟募集一只私募基金。根据《证券投资基金法》，下列哪一行为符合非公开募集基金的规定？（  ）","c":{"A":"通过微信公众号向全体粉丝推送产品宣传资料","B":"向 150 名合格投资者和 50 名普通投资者募集资金","C":"仅向符合条件的机构投资者和高净值个人募集，累计 180 人","D":"在某财经论坛举办线下产品说明会吸引潜在投资者"},"a":"C","an":"选项C正确：非公开募集基金应当向合格投资者募集，合格投资者累计不得超过200人，不得向合格投资者之外的单位和个人募集资金；并且不得通过报刊、电台、电视台、互联网等公众传播媒体或者讲座、报告会、分析会等方式向不特定对象宣传推介。 选项A错误：微信公众号面向全体粉丝属于公开宣传。 选项B错误： 50 名普通投资者，违反合格投资者要求。 选项D错误：线下产品说明会属于公开宣传。","type":"single"},{"id":"cy_fin_2929","q":"私募基金财产独立于私募基金管理人、私募基金托管人的固有财产，投资者按照（）约定分配收益和承担风险。","c":{"A":"行业标准","B":"基金合同","C":"公司章程","D":"合伙协议"},"a":"B,C,D","an":"选项BCD正确：私募基金投资者按照基金合同、公司章程、合伙协议约定分配收益和承担风险。 选项A为干扰项，无此依据。","type":"multi"},{"id":"cy_fin_2931","q":"根据《私募投资基金监督管理条例》，私募基金管理人应当履行的职责有（）。","c":{"A":"按照基金合同约定管理私募基金并进行投资，建立有效的风险控制制度","B":"保存私募基金财产管理业务活动的记录、账册、报表和其他有关资料","C":"按照基金合同约定确定私募基金收益分配方案，向投资者分配收益","D":"对所管理的不同私募基金财产分别管理、分别记账，进行投资"},"a":"A,B,C,D","an":"私募基金管理人应当履行下列职责： （1）依法募集资金，办理私募基金备案； （2）对所管理的不同私募基金财产分别管理、分别记账，进行投资； （3）按照基金合同约定管理私募基金并进行投资，建立有效的风险控制制度； （4）按照基金合同约定确定私募基金收益分配方案，向投资者分配收益； （5）按照基金合同约定向投资者提供与私募基金管理业务活动相关的信息； （6）保存私募基金财产管理业务活动的记录、账册、报表和其他有关资料； （7）国务院证券监督管理机构规定和基金合同约定的其他职责。","type":"multi"},{"id":"cy_fin_2933","q":"作为从事证券投资基金活动的基础和前提，基金财产为方便管理可与基金管理人、基金托管人的固有财产合并运作。（）","c":{"1":"对","0":"错"},"a":"0","an":"作为从事证券投资基金活动的基础和前提，基金财产独立于基金管理人、基金托管人的固有财产，在法律上具有独立性。","type":"judge"},{"id":"cy_fin_2935","q":"资产证券化业务中，托管人是指按照业务管理规定及约定向专项计划转移其合法拥有的基础资产以获得资金的主体。（）","c":{"1":"对","0":"错"},"a":"0","an":"原始权益人是指按照业务管理规定及约定向专项计划转移其合法拥有的基础资产以获得资金的主体。 管理人是指为资产支持证券持有人之利益，对专项计划进行管理及履行其他法定及约定职责的证券公司、基金管理公司子公司。  托管人是指为资产支持证券持有人之利益，按照规定或约定对专项计划相关资产进行保管，并监督专项计划运作的商业银行或其他机构。","type":"judge"},{"id":"cy_fin_2937","q":"甲证券公司前任董事长离职后职位一直悬空，经过筛选和考评，拟聘用李某为新任董事长，并报国务院证券监督管理机构备案。李某在职期间，将董事会、监事会等进行了整改。任职证券公司董事长，应符合的基本条件有（）。","c":{"A":"具备3年以上与其拟任职务相关的证券、基金、金融、法律、会计、信息技术等工作经历","B":"熟悉证券基金法律法规和中国证监会的规定","C":"具有与拟任职务相适应的管理经历和经营管理能力","D":"曾担任金融机构部门负责人以上职务不少于8年"},"a":"A,B,C","an":"选项ABC正确：《管理办法》进一步规定了证券公司董事、监事、高级管理人员任职的基本条件：  （1）应当熟悉证券基金法律法规和中国证监会的规定；   （2）具备3年以上与其拟任职务相关的证券、基金、金融、法律、会计、信息技术等工作经历；   （3）具有与拟任职务相适应的管理经历和经营管理能力。 选项D错误：拟任证券基金经营机构高级管理人员的，曾担任证券基金经营机构部门负责人以上职务不少于2年，或者曾担任金融机构部门负责人以上职务不少于4年，或者具有相当职位管理经历。拟任证券公司董事长、高级管理人员以及其他从事业务管理工作的人员，还应当符合证券从业人员条件。","type":"multi"},{"id":"cy_fin_2939","q":"唐某为A证券公司营业部总经理，负责营业部全面工作。孙某为A证券公司营业部客户经理，负责开发及维护客户。202x年3月至202x年8月，唐某、孙某擅自运用客户沙某的证券账户进行交易，造成沙某证券账户亏损人民币1080万元，为A证券公司赚取交易手续费121万元。法院经审理认为，唐某、孙某未征得沙某同意，利用掌握的交易密码自行操作沙某证券账户，属于擅自运用客户资金的行为。唐某、孙某为A证券公司员工，其违法行为收取的手续费亦归A证券公司所有，A证券公司构成单位犯罪。A证券公司违背受托义务，擅自运用客户资金，情节特别严重，其行为侵犯了国家的金融管理秩序和客户的合法权益，构成（）。","c":{"A":"非法吸收公众存款罪","B":"集资诈骗罪","C":"背信运用受托财产罪","D":"利用未公开信息交易罪"},"a":"C","an":"选项C正确：背信运用受托财产，是指商业银行、证券交易所、期货交易所、证券公司、期货经纪公司、保险公司或者其他金融机构，违背受托义务，擅自运用客户资金或者其他委托、信托的财产，情节严重的行为。 选项A错误：非法吸收公众存款罪：主要指未经批准向社会不特定对象吸收资金或者以其他方式变相吸收公众存款的行为。 选项B错误：集资诈骗罪：是指以非法占有为目的，使用诈骗方法非法集资，数额较大的行为。 选项D错误：利用未公开信息交易罪：是指证券交易所、期货交易所、证券公司、期货经纪公司、基金管理公司、商业银行、保险公司等金融机构的从业人员以及有关监管部门或者行业协会的工作人员，利用因职务便利获取的内幕信息以外的其他未公开的信息，违反规定，从事与该信息相关的证券交易活动，或者明示、暗示他人从事相关交易活动，情节严重的行为。","type":"single"},{"id":"cy_fin_2941","q":"基金定投是每隔一段固定时间，对一只证券投资基金或基金组合投入固定金额，但要考虑市场行情或基金净值的波动。（   ）","c":{"1":"对","0":"错"},"a":"0","an":"基金定投的全称是基金定期定额投资，较简单的操作方式是每隔一段固定时间，对一只证券投资基金或基金组合投入固定金额，而不考虑市场行情或基金净值的波动。","type":"judge"},{"id":"cy_fin_2943","q":"基金管理人、基金销售机构可以引用不具备中国证券投资基金业协会会员资格的机构提供的基金评价结果。","c":{"1":"对","0":"错"},"a":"0","an":"基金管理人、基金销售机构及符合中国证监会规定条件的媒体不得引用不具备中同证券投资基金业协会会员资格的机构提供的基金评价结果。","type":"judge"},{"id":"cy_fin_2945","q":"证券投资咨询业务的基本形式包括(  )。 Ⅰ.证券投资顾问 Ⅱ.委托理财 Ⅲ.发布证券研究报告 Ⅳ.销售基金","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅱ、Ⅳ"},"a":"B","an":"证券投资咨询业务的基本形式包括两种：证券投资顾问业务；发布证券研究报告业务。 综上，该题选B。","type":"single"},{"id":"cy_fin_2947","q":"基金投资顾问业务，全称是“公开募集证券投资基金投资顾问”，指试点机构可以接受客户委托，按照协议约定向客户提供基金投资组合策略建议。根据与客户协议约定的投资组合策略，试点机构可以在客户授权的范围内，代客户作出具体基金投资品种、数量和买卖时机的决策，并代客户执行基金产品申购、赎回、转换等交易申请，开展管理型基金投资顾问服务。 过期考点争议题基金销售机构申请试点机构提供基金投顾服务，非货币基金保有量不低于（）亿元。","c":{"A":"10","B":"50","C":"100","D":"200"},"a":"C","an":"具备下列条件的机构，经中国证监会备案，可以从事基金投资顾问业务： （1）具有资产管理、基金销售等业务资格； （2）有一定的市场竞争力和客户基础。证券公司、基金管理公司或其销售子公司申请的，应具有较强的合规风控及投资者服务能力；基金销售机构申请的，非货币基金保有量不低于100亿元； （3）合规记录良好； （4）具有高质量的基金产品研究团队，与业务开展相匹配的投资顾问人员，以及与其拟从事业务相适应的信息技术能力； （5）业务方案完备，业务制度健全，能够确保客户利益优先原则，有效防范利益冲突和防控各类风险； （6）支持业务开展的其他必要条件。","type":"single"},{"id":"cy_fin_2949","q":"根据《公开募集证券投资基金运作指引第1号--商品期货交易型开放式基金指引》，商品期货ETF，除中国证监会另有规定或准予注册的特殊基金品种外，要求持有所有商品期货合约的价值合计(买入、卖出轧差计算)满足（）。","c":{"A":"不低于基金资产净值的80%;不高于基金资产净值的100%","B":"不低于基金资产净值的80%;不高于基金资产净值的120%","C":"不低于基金资产净值的90%;不高于基金资产净值的110%","D":"不低于基金资产净值的90%;不高于基金资产净值的100%"},"a":"C","an":"商品期货ETF，除中国证监会另有规定或准予注册的特殊基金品种外，应当符合下列规定： （一）持有所有商品期货合约的价值合计（买入、卖出轧差计算）不低于基金资产净值的90%、不高于基金资产净值的110%。 （二）持有卖出商品期货合约应当用于风险管理或提高资产配置效率。 （三）除支付商品期货合约保证金以外的基金财产，应当投资于货币市场工具以及中国证监会允许基金投资的其他金融工具，其中投资于货币市场工具应当不少于80%。 （四）不得办理实物商品的出入库业务。","type":"single"},{"id":"cy_fin_2951","q":"根据《证券投资基金评价业务管理暂行办法》，下列关于证券投资基金评价结果的发布使用要求，说法错误的是（）。","c":{"A":"基金评价机构应当将其向基金投资人或者社会公众提供的基金评价数据和资料，自提供之日起保存15年","B":"基金评价机构仅通过非公开形式发布基金评价结果的，适用《证券投资基金评价业务管理暂行办法》","C":"基金评价报告等文件应当声明评价结果并不是对未来表现的预测，也不应视作投资基金的建议","D":"基金评价结果应当以基金评价机构的名义而并非基金评价人员的个人名义发布"},"a":"B","an":"B项错误，基金评价机构仅通过非公开形式发布基金评价结果的，不适用《证券投资基金评价业务管理暂行办法》。","type":"single"},{"id":"cy_fin_2953","q":"下列关于证券投资基金评价业务的说法中，错误的是（）。","c":{"A":"基金评价机构应当加入中国证券投资基金业协会","B":"基金评价结果应当以基金评价机构的名义发布","C":"基金评价人员应当具备基金从业资格","D":"基金评价报告等文件的评价结果可视作证券投资基金的建议"},"a":"D","an":"D项错误，基金评价报告等文件应当声明评价结果并不是对未来表现的预测，也不应视作投资基金的建议。","type":"single"},{"id":"cy_fin_2955","q":"下列有关证券公司发布研究报告业务的业务模式的说法错误的是（     ）。","c":{"A":"证券研究报告由专门研究部门制作","B":"研究部门向机构客户提供证券研究报告的报酬，包含在证券公司提供交易席位产生的佣金收入中","C":"研究部门不可以向机构客户直接销售证券研究报告获取销售收入","D":"证券研究报告制作完成后，通过证券公司的证券研究报告发送系统或者电子邮件等方式，同时发送给基金、资产管理机构等机构客户和公司的投资顾问团队以及公司内部部门"},"a":"C","an":"证券公司发布研究报告是其从事证券投资咨询业务的一种基本形式。证券研究报告由专门研究部门制作。研究部门的研究人员负责撰写、制作证券研究报告。证券研究报告制作完成后，通过证券公司的证券研究报告发送系统或者电子邮件等方式，同时发送给基金、资产管理机构等机构客户和公司的投资顾问团队以及公司内部部门。研究部门向机构客户提供证券研究报告的报酬，包含在证券公司提供交易席位产生的佣金收入中； 研究部门也会向机构客户直接销售证券研究报告，获取销售收入。","type":"single"},{"id":"cy_fin_2957","q":"下列关于证券公司提供IB业务的业务规则的说法中，错误的是(  )。","c":{"A":"证券公司应当按照合规、审慎经营的原则，制定并有效执行IB业务规则、内部控制、合规检查等制度","B":"证券公司可以同时接受多个期货公司的委托从事IB业务","C":"期货公司与证券公司应当建立IB业务的对接规则","D":"证券公司与期货公司应当独立经营，保持财务、人员、经营场所等分开隔离"},"a":"B","an":"B选项说法错误，证券公司只能接受其全资拥有或者控股的，或者被同一机构控制的期货公司的委托从事IB业务，不能接受其他期货公司的委托从事IB业务。ACD说法都正确。","type":"single"},{"id":"cy_fin_2959","q":"中国证监会是国务院直属机构，是全国(  )的主管部门。","c":{"A":"外汇市场","B":"货币市场","C":"证券市场","D":"期货市场"},"a":"C,D","an":"中国证券监督管理委员会是国务院直属事业单位，是全国证券、期货市场的主管部门，依照法律、法规和国务院授权，统一监督管理全国证券期货市场，维护证券期货市场秩序，保障其合法运行。CD符合题意，AB属于干扰项。","type":"multi"},{"id":"cy_fin_2961","q":"下列关于证券公司申请IB业务资格应当符合的条件的说法中，不正确的是(  )。","c":{"A":"具有满足业务需要的技术系统","B":"申请日前6个月各项风险控制指标符合规定标准","C":"已按规定建立客户交易结算资金第三方存管制度","D":"配备必要的业务人员，公司总部至少有3名具有期货从业资格的业务人员"},"a":"D","an":"证券公司申请介绍业务资格，应配备必要的业务人员，公司总部至少有5名、拟开展IB业务的营业部至少有2名具有期货从业资格的业务人员。D选项错误，ABC都符合证券公司申请IB业务资格应当满足的条件。","type":"single"},{"id":"cy_fin_2963","q":"证券公司从事中间介绍业务，所提供的服务不包括(  )。","c":{"A":"代期货公司收付期货保证金","B":"提供期货行情信息","C":"协助办理开户手续","D":"提供期货交易设施"},"a":"A","an":"证券公司受期货公司委托从事中间介绍业务，应当提供下列服务：(1)协助办理开户手续。(2)提供期货行情信息、交易设施。(3)中国证监会规定的其他服务。证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"single"},{"id":"cy_fin_2965","q":"证券公司为期货公司提供中间介绍业务(IB业务)时，可以提供（）服务。","c":{"A":"办理期货保证金业务","B":"期货交易的结算和风险控制","C":"期货交易的代理","D":"协助办理开户手续"},"a":"D","an":"证券公司受期货公司委托从事IB业务，应当提供下列服务： (1)协助办理开户手续。D选项正确 (2)提供期货行情信息、交易设施。 (3)中国证监会规定的其他服务。 ABC都是不能做的事，证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"single"},{"id":"cy_fin_2967","q":"下列关于非公开基金财产证券投资的说法中，错误的是（）。","c":{"A":"不得买卖基金份额","B":"可以买卖期货","C":"可以买卖股票","D":"可以买卖债券"},"a":"A","an":"题目问的是”错误的“。选项A：依据《中华人民共和国证券投资基金法》的规定，非公开募集基金财产的证券投资，包括股票、股权、债券、期货、期权、基金份额（并非不得买卖，A错误）及投资合同约定的其他投资标的。因此答案选择A。","type":"single"},{"id":"cy_fin_2969","q":"证券投资咨询人员执业行为的总体要求不包括（）。","c":{"A":"完整、客观、准确地运用有关信息、资料","B":"规范在传播媒体上发表投资咨询文章、报告、意见","C":"引用有关信息、资料时严格保密，不得注明出处和著作权人","D":"态度谨慎、诚实、勤勉尽责"},"a":"C","an":"题目问的是“不包括”。 选项C错误：证券投资咨询人员在引用有关信息、资料时应当注明出处和著作权人（而不是保密且不注明）。因此答案选择C。 选项ABD正确：证券投资咨询人员执业行为的总体要求： （1）谨慎、诚实、勤勉尽责。【D】  （2）完整、客观、准确。【A】  （3）规范在传播媒体上发表投资咨询文章、报告、意见。【B】 （4）禁止行为。证券投资咨询人员不得从事《证券、期货投资咨询管理暂行办法》中规定的禁止性行为。","type":"single"},{"id":"cy_fin_2971","q":"证券投资咨询人员应当规范执业行为，遵守执业行为的准则，其中包括（）。","c":{"A":"证券投资咨询人员应当以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务","B":"证券投资咨询人员应当完整、客观、准确地运用有关信息、资料向投资人或者客户提供投资分析、预测和建议，不得断章取义地引用或者篡改有关信息、资料","C":"证券投资顾问人员不得以虚假信息、市场传言或者内幕信息为依据向投资人或者客户提供投资分析、预测或建议","D":"证券投资顾问人员制作发布证券研究报告、提供相关服务，应当向客户进行必要的风险提示"},"a":"A,B,C","an":"选项D错误：属于证券分析师的执业行为准则，证券分析师（并非证券投资顾问人员）制作发布证券研究报告、提供相关服务，应当向客户进行必要的风险提示。 选项A正确：证券投资咨询人员应当以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务。 选项B正确：证券投资咨询人员应当完整、客观、准确地运用有关信息、资料向投资人或者客户提供投资分析、预测和建议，不得断章取义地引用或者篡改有关信息、资料。 选项C正确：证券投资顾问人员不得以虚假信息、市场传言或者内幕信息为依据向投资人或者客户提供投资分析、预测或建议。  【知识详解】证券投资咨询人员执业行为的总体要求 1.谨慎、诚实、勤勉尽责 证券投资咨询人员应当以行业公认的谨慎、诚实和勤勉尽责的态度，为投资人或者客户提供证券投资咨询服务。 2.完整、客观、准确 证券投资咨询人员应当完整、客观、准确地运用有关信息、资料向投资人或者客户提供投资分析、预测和建议，不得断章取义地引用或者篡改有关信息、资料；不得以虚假信息、市场传言或者内幕信息为依据向投资人或者客户提供投资分析、预测或建议；引用有关信息、资料时，应当注明出处和著作权人。 3.规范在传播媒体上发表投资咨询文章、报告、意见 证券投资咨询人员在报刊、电台、电视台或者其他传播媒体上发表投资咨询文章、报告或者意见时，必须注明所在证券、期货投资咨询机构的名称和个人真实姓名，并对投资风险作充分说明。证券、期货投资咨询机构向投资人或者客户提供的证券、期货投资咨询传真件必须注明机构名称、地址、联系电话和联系人姓名。 4.禁止行为 证券投资咨询人员不得从事《证券、期货投资咨询管理暂行办法》中规定的禁止性行为。","type":"multi"},{"id":"cy_fin_2973","q":"根据《证券、期货投资咨询管理暂行办法》，证券投资咨询人员在报刊、电台、电视台或者其他传播媒体上发表投资咨询文章、报告或者意见时，必须（）。","c":{"A":"注明所在证券、期货投资咨询机构的名称","B":"注明个人真实姓名","C":"注明联系电话","D":"对投资风险作充分说明"},"a":"A,B,D","an":"选项ABD正确：证券投资咨询人员在报刊、电台、电视台或者其他传播媒体上发表投资咨询文章、报告或者意见时，必须注明【所在证券、期货投资咨询机构的名称】和【个人真实姓名】，并对【投资风险作充分说明】。 选项C错误：“注明联系电话”并不是强制性要求。  【易混淆】证券、期货投资咨询机构向投资人或者客户提供的证券、期货投资咨询传真件必须注明机构名称、地址、联系电话和联系人姓名。","type":"multi"},{"id":"cy_fin_2975","q":"《刑法》规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，（）。","c":{"A":"处5年以下有期徒刑或者拘役，并处或者单处1万元以上10万元以下罚金","B":"处5年上10年以下有期徒刑，并处违法所得1倍以上5倍以下罚金","C":"处5年上10年以下有期徒刑，并处违法所得1倍以上10倍以下罚金","D":"没收违法所得，并处以违法所得1倍以上10倍以下的罚款"},"a":"A","an":"选项A正确：《刑法》规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，【处5年以下有期徒刑或者拘役，并处或者单处1万元以上10万元以下罚金】。 选项BCD为干扰项。","type":"single"},{"id":"cy_fin_2977","q":"我国《刑法》规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，处10年以下有期徒刑或者拘役，并处或者单处10万元以上100万元以下罚金。（）","c":{"1":"对","0":"错"},"a":"0","an":"根据《刑法》第一百八十一条的规定，编造并且传播影响证券、期货交易的虚假信息，扰乱证券、期货交易市场，造成严重后果的，处【5年】以下有期徒刑或者拘役，并处或者单处【1万元以上10万元以下】罚金。","type":"judge"},{"id":"cy_fin_2979","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，证券公司从事期货中间业务的，应当每（）向中国证监会派出机构报送合规检查报告。","c":{"A":"月","B":"季度","C":"半年","D":"年"},"a":"C","an":"选项C正确：证券公司应当定期对介绍业务规则、内部控制、风险隔离等制度的执行情况和营业部介绍业务的开展情况进行检查，【每半年】向中国证监会派出机构报送合规检查报告。","type":"single"},{"id":"cy_fin_2981","q":"按照《证券公司为期货公司提供中间介绍业务试行办法》，证券公司从事期货中间介绍业务的，应当在其经营场所显著位置或者其网站公开的信息不包括（）。","c":{"A":"受托从事的介绍业务范围","B":"从事介绍业务的管理人员和业务人员的名单和照片","C":"投资产品预期收益率","D":"客户开户和交易流程"},"a":"C","an":"证券公司应当在其经营场所显著位置或者其网站，公开下列信息： （1）受托从事的介绍业务范围；（A） （2）从事介绍业务的管理人员和业务人员的名单和照片；（B） （3）期货公司期货保证金账户信息、期货保证金安全存管方式； （4）客户开户和交易流程、出入金流程；（D） （5）交易结算结果查询方式； （6）中国证监会规定的其他信息。 综上，该题选C。","type":"single"},{"id":"cy_fin_2983","q":"《证券公司金融衍生品柜台交易业务规范》中所称的金融衍生品不包括（）。","c":{"A":"远期","B":"债券","C":"互换","D":"非标准化期权"},"a":"B","an":"题目问的是“不包括”。 选项B错误：债券不属于金融衍生品，它是一种直接融资工具，是发行者为筹集资金而向投资者出具的、承诺按一定利率支付利息并到期偿还本金的债权债务凭证。因此答案选择B。 选项ACD正确：根据《期货和衍生品法》，衍生品交易，是指期货交易以外的，以互换合约、远期合约和非标准化期权合约及其组合为交易标的的交易活动。","type":"single"},{"id":"cy_fin_2985","q":"证券公司受期货公司委托从事介绍业务，应当提供的服务不包括（）。","c":{"A":"协助办理开户手续","B":"提供期货行情信息","C":"提供期货交易设施","D":"代期货公司收取期货保证金"},"a":"D","an":"题目问的是“不包括”。 选项D错误：证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。因此答案选择D。 选项ABC正确：根据《证券公司为期货公司提供中间介绍业务试行办法》第九条的规定，证券公司受期货公司委托从事介绍业务，应当提供下列服务： （1）协助办理开户手续。 （2）提供期货行情信息、交易设施。 （3）中国证监会规定的其他服务。","type":"single"},{"id":"cy_fin_2987","q":"《上海证券交易所股票期权试点交易规则》属于股票期权业务主要涉及的（）。","c":{"A":"法律","B":"行政法规","C":"部门规章","D":"规范性文件"},"a":"D","an":"选项D正确：股票期权业务主要涉及的部门规章有《股票期权交易试点管理办法》《证券期货经营机构参与股票期权交易试点指引》，涉及的规范性文件有《上海证券交易所股票期权试点交易规则》《深圳证券交易所股票期权试点交易规则》等。","type":"single"},{"id":"cy_fin_2989","q":"证券公司和委托其进行中间介绍业务的期货公司需要彼此独立经营，（）除外。","c":{"A":"财务","B":"经营场所","C":"期货行情信息","D":"人员"},"a":"C","an":"选项C正确：期货行情信息是证券公司为客户提供服务的一部分，不需要隔离。 选项ABD错误：证券公司与期货公司应当独立经营，保持【财务、人员、经营场所】等分开隔离。不属于除外情形。","type":"single"},{"id":"cy_fin_2991","q":"关于证券公司向期货公司提供中间介绍服务，下列说法正确的是（）。","c":{"A":"证券公司的中间介绍服务给投资人提供了一站式全面的期货投资服务","B":"证券公司的中间介绍服务是证券公司自身代理期货买卖服务的补充，用于服务特殊需求的客户","C":"证券公司的中间介绍服务只限于介绍客户到期货公司进行交易，不得提供任何服务","D":"证券公司的中间介绍服务除了介绍客户到期货公司进行交易，还包括提供其他相关服务"},"a":"D","an":"选项D正确：证券公司受期货公司委托从事介绍业务，应当提供下列服务：（1）协助办理开户手续。（2）提供期货行情信息、交易设施。（3）中国证监会规定的其他服务。 选项A错误：证券公司不能提供一站式的全面期货投资服务。如：证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。 选项B错误：证券公司的中间介绍业务并不是其自身代理期货买卖服务的补充，而是独立的一种业务活动。它主要是通过与期货公司合作，为客户提供期货市场的介绍和辅助服务。 选项C错误：证券公司的中间介绍服务不仅限于介绍客户到期货公司进行交易，还可以提供协助办理开户手续、提供期货行情信息、交易设施等其他相关服务。","type":"single"},{"id":"cy_fin_2993","q":"证券公司与期货公司签订、变更或者终止委托协议的，双方应当在（）个工作日内报各自所在地的中国证监会派出机构备案。","c":{"A":"2","B":"3","C":"5","D":"10"},"a":"C","an":"选项C正确：证券公司与期货公司签订、变更或者终止委托协议的，双方应当在【5个工作日】内报各自所在地的中国证监会派出机构备案。","type":"single"},{"id":"cy_fin_2995","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，证券公司从事期货中间介绍业务的，发生重大事项时，应当在（）个工作日内向所在地中国证监会派出机构报告。","c":{"A":"1","B":"2","C":"3","D":"5"},"a":"B","an":"选项B正确：证券公司从事期货中间介绍业务的，发生重大事项时，应当在【2个工作日】内向所在地中国证监会派出机构报告。","type":"single"},{"id":"cy_fin_2997","q":"在证券公司的中间介绍业务中，签订期货经纪合同的双方主体分别是（）。","c":{"A":"期货公司和证券公司","B":"期货公司和客户","C":"证券公司和客户","D":"期货公司和证监会派出机构"},"a":"B","an":"选项B正确：证券公司应当及时将客户开户资料提交期货公司，期货公司应当复核后与客户签订期货经纪合同，办理开户手续。 （理解：证券公司与期货公司之间签订的是书面委托协议，证券公司通过介绍的方式将客户引导至期货公司。最终期货公司和客户签订期货经纪合同） 选项ACD为干扰项","type":"single"},{"id":"cy_fin_2999","q":"证券公司场外衍生品业务涉及的主要法律法规、规范性文件及相关自律规则不包括（）。","c":{"A":"《证券公司柜台交易业务规范》","B":"《证券公司金融衍生品柜台交易风险管理指引》","C":"《中国证券期货市场衍生品交易主协议》","D":"《证券投资基金法》"},"a":"D","an":"题目问的是“不包括”。 选项D不包括：《证券投资基金法》》是规范证券投资基金活动、维护证券投资基金及资本市场正常秩序的基本【法律】。 选项ABC包括：证券公司场外衍生品业务涉及的主要法律法规、规范性文件及相关自律规则包括：《期货和衍生品法》《关于证券公司证券自营业务投资范围及有关事项的规定》《证券公司收益互换业务管理办法》《证券公司场外期权业务管理办法》《证券公司柜台交易业务规范》《证券公司金融衍生品柜台交易风险管理指引》《证券公司柜台市场管理办法(试行)》《场外证券业务备案管理办法》以及中国证券业协会、中国期货业协会、中国证券投资基金业协会颁布的《中国证券期货市场衍生品交易主协议》及补充协议、中国银行间市场交易商协会《中国银行间市场金融衍生产品交易主协议(2009年版)》(简称《NAFMII主协议》)。 因此答案选择D。","type":"single"},{"id":"cy_fin_3001","q":"根据《证券公司为期货公司提供中间介绍业务试行办法》，证券公司受期货公司委托从事介绍业务，应当提供的服务有（）。","c":{"A":"协助客户办理开户手续","B":"代理客户进行期货交易","C":"提供期货行情信息、交易设施","D":"利用证券资金账户为客户存取、划转期货保证金"},"a":"A,C","an":"选项AC正确：根据《证券公司为期货公司提供中间介绍业务试行办法》，证券公司受期货公司委托从事介绍业务，应当提供下列服务： （1）协助办理开户手续。 （2）提供期货行情信息、交易设施。 （3）中国证监会规定的其他服务。 选项BD错误：证券公司不得代理客户进行期货交易、结算或者交割，不得代期货公司、客户收付期货保证金，不得利用证券资金账户为客户存取、划转期货保证金。","type":"multi"},{"id":"cy_fin_3003","q":"证券公司从事介绍业务时，与期货公司签订的书面委托协议应当载明的事项包括（）。","c":{"A":"介绍业务的范围","B":"介绍业务对接规则","C":"介绍业务人员的薪酬体系","D":"客户投诉的接待处理方式"},"a":"A,B,D","an":"选项C错误：人员薪酬属于证券公司内部机制，与期货公司无直接关联，委托协议的核心是 “业务合作规则”，而非 “内部员工薪酬”。 选项ABD正确：证券公司从事介绍业务，应当与期货公司签订书面委托协议。委托协议应当载明下列事项： （1）介绍业务的范围。 （2）执行期货保证金安全存管制度的措施。 （3）介绍业务对接规则。 （4）客户投诉的接待处理方式。 （5）报酬支付及相关费用的分担方式。 （6）违约责任。 （7）中国证监会规定的其他事项。","type":"multi"},{"id":"cy_fin_3005","q":"证券公司为期货公司介绍客户时，应当向客户说明的事项有（）。","c":{"A":"明示其与期货公司的介绍业务委托关系","B":"解释期货交易的方式、流程及风险","C":"做获利保证、共担风险等承诺","D":"做虚假宣传"},"a":"A,B","an":"选项AB正确，选项CD错误：证券公司为期货公司介绍客户时，应当向客户明示其与期货公司的介绍业务委托关系，解释期货交易的方式、流程及风险，不得作获利保证、共担风险等承诺，不得虚假宣传，误导客户（CD选项错误）。","type":"multi"},{"id":"cy_fin_3007","q":"证券公司在中间介绍业务中，不得为从事期货交易的客户提供的服务包括（）。","c":{"A":"间接为期货交易提供担保","B":"代客户保管交易密码","C":"为期货交易提供融资","D":"提供期货行情信息"},"a":"A,B,C","an":"选项D错误：提供期货行情信息是证券公司可以为客户提供的服务之一，并不属于禁止行为。 选项ABC正确：证券公司不得代客户下达交易指令，不得利用客户的交易编码、资金账号或者期货结算账户进行期货交易，不得代客户接收、保管或者修改交易密码。证券公司不得直接或者间接为客户从事期货交易提供融资或者担保。","type":"multi"},{"id":"cy_fin_3009","q":"甲与他人串通，以事先约定的时间、价格和方式相互进行证券交易，影响证券价格或者证券交易量的，情节特别严重的，对甲可采取的刑事处罚措施是 （  ）。","c":{"A":"处以6个月的拘役","B":"处以6年的有期徒刑","C":"处以12年的有期徒刑","D":"处无期徒刑"},"a":"B","an":"根据《中华人民共和国刑法》第一百八十二条，与他人串通，以事先约定的时间、价格和方式相互进行证券、期货交易，影响证券、期货交易价格或者证券、期货交易量的，情节严重的，处5年以下有期徒刑或者拘役，
