调金融政策与相关财政政策、产业政策等；4、分析研判国际国内金融形势，做好国际金融风险应对，研究系统性金融风险防范处置和维护金融稳定重大政策；5、指导地方金融改革发展与监管，对金融管理部门和地方政府进行业务监督和履职问责等。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_52","q":"区域性市场投资者可以是（）。","c":{"A":"金融资产低于50万元人民币的个人投资者","B":"合伙企业","C":"具备一定条件的法人","D":"私募股权投资基金"},"a":"BCD","an":"《关于规范发展区域性股权市场的通知》规定，区域性股权市场实行合格投资者制度。合格投资者应是依法设立且具备一定条件的法人机构、合伙企业，金融机构依法管理的投资性计划，以及具备较强风险承受能力且金融资产【不低于】五十万元人民币的自然人。不得通过拆分、代持等方式变相突破合格投资者标准或单只私募证券持有人数量上限。鼓励支持区域性股权市场采取措施，吸引所在省级行政区域内的合格投资者参与。私募股权投资基金属于金融机构依法管理的投资性计划，可以作为合格投资者，D正确。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_22","q":"在我国金融中介体系中，信托机构属于（）。","c":{"A":"房地产中介体系","B":"保险中介体系","C":"投资中介体系","D":"银行机构体系"},"a":"C","an":"目前，我国已经形成了多层次的金融中介机构体系，拥有以中央银行为主导、国有商业银行为主体，包括股份制商业银行、城市商业银行、农村商业银行、跨国银行、农村信用社在内的多层次银行机构体系；拥有以证券公司、期货公司和证券投资基金为主，以各类投资咨询中介、信托机构为辅的多元化【投资中介体系】；拥有人寿保险公司、财产保险公司、再保险公司以及提供多种多样保险服务的保险中介体系。","type":"single"},{"id":"cflue_paper_金融基础_5.json_24","q":"《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为（）个月，中国证监会注册期限为（）个工作日。同时，针对（）融资设置简易程序。","c":{"A":"2；15；小额快速","B":"2；10；小额便捷","C":"3；15；小额便捷","D":"2；15；小额便捷"},"a":"A","an":"《创业板上市公司证券发行注册管理办法（试行）》明确发行上市审核和注册程序，深交所审核期限为2个月，中国证监会注册期限为15个工作日。同时，针对“小额快速”融资设置简易程序","type":"single"},{"id":"cflue_paper_金融基础_5.json_36","q":"2018年7月，小王手头有一笔闲钱，正考虑将这笔钱投资于金融市场，在其进行基本面分析时，应考虑主要宏观经济变量包括（）。","c":{"A":"经济周期","B":"国内生产总值","C":"国际资本流动","D":"财政政策"},"a":"ABC","an":"影响我国金融市场运行的主要因素包括：经济因素。经济因素包括宏观经济环境、宏观经济政策和国际经济因素。宏观经济变量包括国内生产总值、经济周期、通货膨胀与利率、汇率和国际资本流动。财政政策属于宏观经济政策，选择不包括C的选项。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_39","q":"目前，投资者在我国证券市场上进行证券交易时采用（）。","c":{"A":"代号制","B":"代码制","C":"实名制","D":"匿名制"},"a":"C","an":"目前，投资者在我国证券市场上进行证券交易时采用【实名制】。","type":"single"},{"id":"cflue_paper_金融基础_5.json_43","q":"20世纪80年代以来中央银行职能的变化突出表现在（）。","c":{"A":"金融政策的制定","B":"强调金融稳定职能，维护金融体系安全","C":"货币职能与金融监管日益紧密，相辅相成","D":"货币职能与金融监管相分离，突出货币政策调控职能"},"a":"BD","an":"20世纪80年代以来中央银行职能的变化突出表现在包括：货币职能与金融监管相分离，突出货币政策调控职能；强调金融稳定职能，维护金融体系安全。","type":"multi"},{"id":"xs_4780974","q":"2017年以来我国资本市场对外开放新实践的主要政策措施包括（）。Ⅰ.资本市场互联互通机制逐步建立健全Ⅱ.境外机构投资者持续增加对中国资本市场的配置Ⅲ.以人民币计价的资产越来越多地被纳入国际指数Ⅳ.不断放开征信、评级、支付等资本市场基础设施领域的准入限制","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4780975","q":"下列关于利率传导机制说法正确的是（）。Ⅰ.利率为核心变量Ⅱ.基础货币和货币乘数决定了对货币供应量的影响Ⅲ.利率对收入的影响是直接的Ⅳ.基本思路的头和尾分别为货币供应量和总产出，呈同方向变动","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"B","an":"","type":"single"},{"id":"xs_4780976","q":"下列各项中，（）属于中央银行直接信用控制的具体手段。Ⅰ.直接干预及开办特种存款Ⅱ.窗口指导Ⅲ.规定金融机构流动性比率Ⅳ.规定利率限额与信用配额","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"B","an":"","type":"single"},{"id":"xs_4780977","q":"货币政策目标一般包括（）。Ⅰ.国际收支平衡Ⅱ.充分就业Ⅲ.稳定物价Ⅳ.经济增长","c":{"A":"Ⅰ、Ⅱ、Ⅳ","B":"Ⅰ、Ⅲ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4780978","q":"中国人民银行专门行使国家中央银行职能，包括（）。Ⅰ.金融风险防范与化解Ⅱ.制定金融规章Ⅲ.制定和执行货币政策Ⅳ.代理国库","c":{"A":"Ⅱ、Ⅲ、Ⅳ","B":"Ⅰ、Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅳ"},"a":"C","an":"","type":"single"},{"id":"xs_4780979","q":"下列关于中国证券监督管理委员会的职责，说法正确的是（）。Ⅰ.研究和拟定证券期货市场的方针政策、发展规划Ⅱ.监管证券投资活动Ⅲ.监管上市国债和企业间债券的交易活动Ⅳ.监管境外企业直接或间接到境内发行股票、上市","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"A","an":"","type":"single"},{"id":"xs_4780980","q":"国务院金融稳定发展委员会的职责有（）。Ⅰ.落实党中央、国务院关于金融工作的决策部署Ⅱ.审议金融业改革发展重大规划Ⅲ.统筹金融改革和发展Ⅳ.指导中央金融改革发展与监管","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅲ、Ⅳ"},"a":"A","an":"","type":"single"},{"id":"xs_4780981","q":"根据2019年2月2日中央机构编制委员会办公室发布的《中国人民银行职能配置、内设机构和人员编制规定》，中国人民银行的职能，与过去相比转变主要包括（）。Ⅰ.完善宏观调控体系，创新调控方式Ⅱ.增强货币政策、宏观审慎政策、金融监管政策的协调性Ⅲ.深化行政审批制度改革和金融市场改革Ⅳ.继续完善金融法律制度体系","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4780982","q":"证券公司主要业务包括（）。Ⅰ.担保业务Ⅱ.证券承销与保荐业务Ⅲ.证券资产管理业务Ⅳ.证券投资咨询业务","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"comp_59538","q":"根据材料，下列关于中国多层次资本市场的说法，错误的是（）。","c":{"A":"科创板主要服务于符合国家战略、突破关键核心技术的科创企业","B":"创业板对拟上市企业的行业包容性比科创板更窄","C":"北交所服务于创新型中小企业","D":"主板主要服务成熟期的大型企业"},"a":"B","an":"选项B错误。相比之下，创业板对行业的包容性更宽，不仅限于「硬科技「，还包括「三创四新「（创新、创造、创意；新技术、新产业、新业态、新模式）。科创板定位更聚焦于「硬科技「企业。","type":"comprehensive","material":"2023年中央金融工作会议提出要加快建设金融强国，做好科技金融、绿色金融、普惠金融、养老金融、数字金融五篇大文章。同时，中国多层次资本市场体系不断完善，包括主板、科创板、创业板、北交所和新三板等板块。","sub_type":"single"},{"id":"comp_62240","q":"下列属于直接融资方式的有（）。","c":{"A":"企业发行股票融资","B":"企业向银行贷款","C":"企业发行债券融资","D":"企业通过融资租赁获得设备"},"a":"AC","an":"直接融资是指资金需求者与供给者直接形成债权债务关系的融资方式，包括股票融资和债券融资。银行贷款和融资租赁均属于间接融资，资金供需双方不直接形成债权债务关系。","type":"comprehensive","material":"2023年中央金融工作会议提出要加快建设金融强国，做好科技金融、绿色金融、普惠金融、养老金融、数字金融五篇大文章。同时，中国多层次资本市场体系不断完善，包括主板、科创板、创业板、北交所和新三板等板块。","sub_type":"multi"},{"id":"comp_15736","q":"关于中国人民银行货币政策工具，下列说法正确的有（）。","c":{"A":"公开市场操作是中央银行吞吐基础货币的主要工具之一","B":"中期借贷便利（MLF）的期限通常为6个月","C":"存款准备金率调整属于一般性货币政策工具","D":"再贴现政策是中央银行对商业银行持有的未到期票据进行再贴现"},"a":"ACD","an":"选项B错误。MLF的期限通常为3个月至1年，以1年期为主。公开市场操作、存款准备金率、再贴现均属于一般性货币政策工具。MLF是央行提供中期基础货币的货币政策工具。","type":"comprehensive","material":"中国人民银行为维护银行体系流动性合理充裕，可以通过多种货币政策工具进行调控。2024年，中国人民银行多次通过公开市场操作、中期借贷便利（MLF）等工具向市场投放流动性，同时调整了贷款市场报价利率（LPR）报价机制。","sub_type":"multi"},{"id":"cflue_zc_ch3.json_1","q":"合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过基金形式募集一定额度的人民币资金。（）","c":{"A":"错","B":"对"},"a":"B","an":"合格境内机构投资者，是指经一国金融管理当局审批通过、获准直接投资境外股票或者债券市场的国内机构投资者，在一定规定下通过【基金】形式募集一定额度的人民币资金。","type":"judge"},{"id":"cflue_zc_ch3.json_2","q":"国务院证券监督管理机构依法履行职责，有权对（）进行现场检查。","c":{"A":"证券交易所","B":"上市公司","C":"证券发行人","D":"证券登记结算机构"},"a":"ABCD","an":"中国证监会有权对证券发行人、上市公司、证券公司、证券投资基金管理公司、证券服务机构（资产评估机构和资信评级机构属于证券服务机构。）、证券交易所、证券登记结算机构进行现场检查。","type":"multi"},{"id":"cflue_zc_ch3.json_3","q":"证券公司为期货公司介绍客户时，应当（）。","c":{"A":"向客户作获利保证、共担风险等承诺","B":"不得向客户虚假宣传、误导客户","C":"向客户解释期货交易的方式、流程及风险","D":"向客户明示其与期货公司的介绍业务委托关系"},"a":"BCD","an":"证券公司为期货公司介绍客户时，应当向客户明示其与期货公司的介绍业务委托关系，解释期货交易的方式、流程及风险，不得作获利保证、共担风险等承诺，不得向客户虚假宣传、误导客户。","type":"multi"},{"id":"cflue_zc_ch3.json_4","q":"我国对合格境外投资者机构汇出汇入资金的规定有（）。","c":{"A":"合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出口头解释","B":"已批准额度和实际汇入金额的差额，在未经国家外汇局批准之前不得汇入","C":"合格境外投资者应当在国家外汇管理局规定的时间内汇入本金","D":"汇入的本金应当是国家外汇局批准的可兑换货币"},"a":"BCD","an":"合格境外投资者未在规定时间内汇满本金的，应当向中国证监会和国家外汇管理局做出【书面】解释。","type":"multi"},{"id":"cflue_zc_ch3.json_5","q":"负责证券投资者保护基金筹集、管理和使用的是（）。","c":{"A":"社保基金理事会","B":"中国证券投资者保护基金有限责任公司","C":"证券投资基金","D":"中国证券登记结算机构"},"a":"B","an":"证券投资者保护基金公司负责保护基金筹集、管理和使用。","type":"single"},{"id":"cflue_zc_ch3.json_6","q":"政府机构类投资者参与证券投资的主要目的有（）。","c":{"A":"提高资金收益率","B":"调剂资金余缺","C":"实行特定产业政策","D":"实施宏观调控"},"a":"BCD","an":"政府机构类投资者，是指进行证券投资的政府机构。政府机构类投资者的特点是，通常很少考虑盈利，参与证券投资的目的主要是为了调剂资金余缺、实施宏观调控、实行特定产业政策等要求。","type":"multi"},{"id":"cflue_zc_ch3.json_7","q":"理事会是证券交易所的决策机构，其行使的职权包括（）。","c":{"A":"选举和罢免会员理事","B":"审定总经理提出的工作计划","C":"审定证券交易所业务规则","D":"召集会员大会，并向会员大会报告工作"},"a":"BCD","an":"理事会是证券交易所的决策机构，行使下列职权：1、召集会员大会，并向会员大会报告工作；2、执行会员大会的决议；3、审定总经理提出的工作计划；4、审定总经理提出的年度财务预算、决算方案；5、审定对会员的接纳和退出；6、审定取消会员资格的纪律处分；7、审定证券交易所业务规则；8、审定证券交易所上市新的证券交易品种或者对现有上市证券交易品种作出较大调整；9、审定证券交易所收费项目、收费标准及收费调整程序；10、审定证券交易所重大财务管理事项；11、审定证券交易所重大风险管理和处置事项，管理证券交易所风险基金；12、审定重大投资者教育和保护工作事项；13、决定高级管理人员的聘任、解聘及薪酬事项，但中国证监会任免的除外；14、会员大会授予和证券交易所章程规定的其他职权。","type":"multi"},{"id":"cflue_zc_ch3.json_8","q":"私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的20%。（）","c":{"A":"错","B":"对"},"a":"B","an":"私募基金子公司及其下设基金管理机构将自有资金投资于本机构设立的私募基金的，对单只基金的投资金额不得超过该只基金总额的【20%】。","type":"judge"},{"id":"cflue_zc_ch3.json_9","q":"根据《证券交易所管理办法》，下列关于证券交易所职能的说法，正确的有（）。","c":{"A":"审核、安排证券上市交易","B":"对首次公开发行股票网下投资者进行注册和自律管理","C":"依法审核公开发行证券申请","D":"决定证券终止和重新上市"},"a":"ACD","an":"D属于根据《注册制下首次公开发行股票网下投资者管理规则》，担任科创板、创业板首发股票主承销商的证券公司的职责。故选ABC。","type":"multi"},{"id":"cflue_zc_ch3.json_10","q":"全国社会保障基金理事会投资运行全国社会保障基金，应当坚待的原则包括（）。","c":{"A":"长期性","B":"收益性","C":"安全性","D":"谨慎性"},"a":"ABC","an":"按照《全国社会保障基金条例》规定，全国社会保障基金理事会投资运行全国社会保障基金，应当坚待【安全性、收益性和长期性】原则。","type":"multi"},{"id":"cflue_zc_ch3.json_11","q":"根据《证券法》，下列关于证券服务机构法律责任和市场准入的说法，正确的有（）。","c":{"A":"证券服务机构从事证券投资咨询服务业务，应当经国务院证券监督管理机构核准","B":"证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当承担独立赔偿责任","C":"会计师事务所等证券服务机构从事证券服务业务，应当报国务院证券监督管理机构和国务院有关主管部门备案","D":"证券服务机构工作底稿的保存期限不得少于10年，自工作底稿形成之日起算"},"a":"AC","an":"证券服务机构制作、出具的文件有虚假记载、误导性陈述或者重大遗漏，给他人造成损失的，应当与委托人承担连带赔偿责任，但是能够证明自己没有过错的除外。A错误；信息和资料的保存期限不得少于10年，自业务委托结束之日起算，B错误；故答案选CD。","type":"multi"},{"id":"cflue_zc_ch3.json_12","q":"按照《证券公司私募投资基金子公司管理规范》，下列说法错误的是（）。","c":{"A":"私募基金子公司管理的闲置资金只能投资于依法公开发行的国债、央行票据等风险较低的证券","B":"私募基金子公司管理闲置资金应当坚持有效控制风险、保证流动性的原则","C":"私募基金子公司不得从事与私募基金无关的业务","D":"私募基金子公司及其下设特殊目的机构可以以盈利为目的管理闲置资金"},"a":"D","an":"按照《证券公司私募投资基金子公司管理规范》，私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。","type":"single"},{"id":"cflue_zc_ch3.json_13","q":"政府作为债券发行的重要主体之一，所筹集的资金可以用来（）。","c":{"A":"兴建大型基础设施项目","B":"弥补战争费用","C":"协调财政资金短期周转，弥补财政赤字","D":"实施某项特殊政策"},"a":"ABCD","an":"政府发行债券所筹集的资金既可以用于协调财政资金短期周转、弥补财政赤字、兴建政府投资的大型基础性的建设项目，也可以用于实施某种特殊的政策，可以用于弥补战争费用的开支。","type":"multi"},{"id":"cflue_zc_ch3.json_14","q":"会员大会可以行使的职能不包括（）。","c":{"A":"管理人员的聘任、解聘及薪酬事项","B":"审议和通过理事会、监事会和总经理的工作报告","C":"选举和罢免会员理事、会员监事","D":"制定和修改证券交易所章程"},"a":"A","an":"会员大会可以行使的职能有制定和修改证券交易所章程；选举和罢免会员理事、会员监事；审议和通过理事会、监事会和总经理的工作报告；审议和通过证券交易所的财务预算、决算报告；法律、行政法规、部门规章和证券交易所章程规定的其他重大事项。","type":"single"},{"id":"cflue_zc_ch3.json_15","q":"证券金融公司应当按照国家宏观政策，根据市场状况和风险控制需要，确定和调整（）。","c":{"A":"保证金比例","B":"担保金比例","C":"转融通资金率","D":"转融通费率"},"a":"AD","an":"证券金融公司可根据市场状况和风险控制需要，确定和调整【转融通费率和保证金的比例】。","type":"multi"},{"id":"cflue_zc_ch3.json_16","q":"根据《中华人民共和国保险法》，保险公司资金运用范围包括（）。","c":{"A":"债券","B":"不动产","C":"股票","D":"基金"},"a":"ABCD","an":"保险资金运用限于下列形式：1.银行存款；2.买卖债券、股票、证券投资基金份额等有价证券；3.资金不动产；4.国务院规定的其他资金运用形式。","type":"multi"},{"id":"cflue_zc_ch3.json_17","q":"2019年9月10日，国家外汇管理局决定取消合格境外投资者和人民币合格境外投资者投资额度限制，包括（）。","c":{"A":"RQFII试点国家和地区限制也一并取消","B":"取消QFII投资额度限制","C":"明确不再对单家合格境外投资者的投资额度进行备案和审批","D":"投资范围由交易所市场金融工具扩展到银行间债券市场"},"a":"ABC","an":"国家外汇管理局决定取消合格境外机构投资者和人民币合格境外机构投资者投资额度限制。包括：一是取消QFII和RQFII投资额度限制；二是明确不再对单家合格境外投资者的投资额度进行备案和审批；三是此次取消合格境外投资者投资额度限制时，RQFII试点国家和地区限制也一并取消。","type":"multi"},{"id":"cflue_zc_ch3.json_18","q":"《证券期货投资者适当性管理办法》的实施对我国金融市场具有很重要的意义，从根本上体现了经营机构和投资者利益的辩证统一，下列说法正确的有（）。","c":{"A":"对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证","B":"该管理办法要求对投资者进行分类评估和分类管理，为经营机构提供标准化服务奠定了基础","C":"该管理办法同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制","D":"该管理办法要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配"},"a":"ACD","an":"《证券期货投资者适当性管理办法》从根本上体现经营机构和投资者利益的辩证统一。从投资者角度来看，该管理办法将投资者分为专业投资者和普通投资者，要求经营机构必须对普通投资者进行分类管理，并按照普通投资者的分类与产品、服务的风险等级进行匹配，同时在销售和服务过程中，对普通投资者实行有别于专业投资者的告知和风险警示义务。对于普通投资者与经营机构发生纠纷时，在举证责任的划分上，也实行了举证责任倒置，对于是否落实投资者适当性工作，由经营机构进行举证。从经营机构角度来看，该管理办法要求经营机构对投资进行分类评估和分类管理，为经营机构提供【差异化】服务奠定了基础，同时确立了监管底线要求、自律组织规定产品名录指引、经营机构制定具体分级标准的层层把关、严控风险的产品分级机制。","type":"multi"},{"id":"cflue_zc_ch3.json_19","q":"下面对于证券市场融资活动特征的描述正确的有（）。","c":{"A":"是一种间接融资活动","B":"是在由各种证券中介机构组成的证券中介服务体系的支持下完成的","C":"促成证券发行买卖的中介机构自身可以充当权利义务主体","D":"是一种强市场性的融资活动"},"a":"BD","an":"资金赤字单位和盈余单位直接接触，形成直接的权利和义务关系，而没有另外的权利义务主体介入其中。促成证券发行买卖的中介机构，如证券公司等自身不充当权利义务主体，是连接赤字单位和盈余单位的服务性媒介，证券市场融资是一种直接融资。","type":"multi"},{"id":"cflue_zc_ch3.json_20","q":"不具备证券自营业务资格的证券公司，其自有资金只能以（）为目的，参与国债期货交易。","c":{"A":"利益输送","B":"增加流动性","C":"套期保值","D":"活跃证券市场"},"a":"C","an":"2013年8月，中国证监会制定并发布《证券公司参与股指期货、国债期货交易指引》，规定证券公司以自有资金或受托管理资金参与股指期货、国债期货交易；不具备证券自营业务资格的证券公司，其自有资金只能以【套期保值】为目的，参与国债期货交易。","type":"single"},{"id":"cflue_zc_ch3.json_21","q":"我国基金类投资者包括（）。","c":{"A":"产业基金","B":"社保基金","C":"社会公益基金","D":"企业年金"},"a":"BCD","an":"基金类投资者包括证券投资基金、社保基金、企业年金和社会公益基金。","type":"multi"},{"id":"cflue_zc_ch3.json_22","q":"根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。下列说法错误的是（）。","c":{"A":"证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等","B":"拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续","C":"在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，仍可继续投资股指期货、国债期货","D":"在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项"},"a":"C","an":"根据《证券公司参与股指期货、国债期货交易指引》规定，证券公司以受托管理资金参与股指期货、国债期货交易的，应当选择适当的客户开展参与股指期货、国债期货交易的资产管理业务，审慎进行股指期货、国债期货投资。（1）在资产管理合同中明确约定参与股指期货、国债期货交易的目的、比例限制、估值方法、信息披露、风险控制、责任承担等事项。证券公司应当在资产管理合同中明确约定股指期货、国债期货保证金的流动性应急处理机制，包括应急触发条件、保证金补充机制、损失责任承担等。（2）在《证券公司参与股指期货、国债期货交易指引》实施前，证券公司已签署的资产管理合同未约定可参与股指期货、国债期货交易的，原则上不得投资股指期货、国债期货。拟变更合同投资股指期货、国债期货的，应当按照资产管理合同约定的方式及有关规定取得客户、资产托管机构同意并履行有关报批或报备手续。","type":"single"},{"id":"cflue_zc_ch3.json_23","q":"（）一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性事件时使用。","c":{"A":"市场手段","B":"法律手段","C":"经济手段","D":"行政手段"},"a":"D","an":"【行政手段】是通过制订计划、政策等对证券市场进行行政性的干预。这种手段比较直接，但运用不当可能违背市场规律，无法发挥作用甚至遭到惩罚。一般多在证券市场发展初期，法制尚不健全、市场机制尚未理顺或遇突发性时间时使用。","type":"single"},{"id":"cflue_zc_ch3.json_24","q":"关于证券经纪业务的表述正确的是（）。","c":{"A":"经纪关系的建立形成实质上的委托关系","B":"我国证券公司从事的证券经纪业务以证券公司的柜台代理买卖证券业务为主","C":"经纪委托关系的建立表现为开户和委托两个环节","D":"不可以通过证券交易所代理买卖证券业务"},"a":"C","an":"证券经纪业务分为柜台代理买卖证券业务和通过证券交易所代理买卖证券业务。我国证券公司从事的证券经纪业务以通过证券交易所代理买卖证券业务为主。在证券经纪业务中，经纪委托关系的建立表现为开户和委托两个环节。经纪关系的建立只是确立了投资者和证券公司直接的代理关系，还没有形成实质上的委托关系。","type":"single"},{"id":"cflue_zc_ch3.json_25","q":"按照《证券公司私募投资基金子公司管理规范》，下列说法正确的是（）。","c":{"A":"私募基金子公司管理的闲置资金只能投资于风险较低的证券","B":"私募基金子公司管理的闲置资金只能投资于流动性较弱的证券","C":"私募基金子公司及其下设特殊目的机构可以以任何合法目的管理闲置资金","D":"私募基金子公司从事P2P平台网贷的业务"},"a":"A","an":"按照《证券公司私募投资基金子公司管理规范》，私募基金子公司不得从事与私募基金无关的业务。私募基金子公司及其下设特殊目的机构可以以现金管理为目的管理闲置资金，但应当坚持有效控制风险、保证流动性的原则，且只能投资于依法公开发行的国债、央行票据、短期融资券、投资级公司债、货币市场基金及保本型银行理财产品等风险较低、流动性较强的证券。","type":"single"},{"id":"cflue_zc_ch3.json_26","q":"合格投资者应在每个会计年度结束后3个月内，向国家外汇管理局报送上一年度境外投资情况报告（包括投资额度使用情况、投资收益情况等）。（）","c":{"A":"错","B":"对"},"a":"A","an":"在QDII制度中，合格投资者应在每个会计年度结束后【4个月内】，向国家外汇管理局报送上一年度境外投资情况报告（包括投资额度使用情况、投资收益情况等）。","type":"judge"},{"id":"cflue_zc_ch3.json_27","q":"下列关于证券公司开展融资融券业务的说法错误的是（）。","c":{"A":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金不可以证券充抵","B":"证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例","C":"证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面方式予以记载、保存","D":"证券公司开展融资融券业务，必须中国证监会批准"},"a":"AC","an":"证券公司开展融资融券业务。证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面和电子方式予以记载、保存，故B错误。证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金可以证券充抵，故C错误。","type":"multi"},{"id":"cflue_zc_ch3.json_28","q":"企业年金基金按照规定不得直接投资于（）。","c":{"A":"权证","B":"国债","C":"股票基金","D":"金融债"},"a":"A","an":"企业年金基金按照规定不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。","type":"single"},{"id":"cflue_zc_ch3.json_29","q":"根据我国有关法规的规定，证券服务机构的设立需要按照工商管理法规的要求办理注册，从事证券服务业务必须得到中国证监会和有关主管部门的批准。（）","c":{"A":"错","B":"对"},"a":"B","an":"根据我国有关法规的规定，证券服务机构的设立需要按照工商管理法规的要求办理注册，从事证券服务业务必须得到【中国证监会】和有关主管部门的批准。","type":"judge"},{"id":"cflue_zc_ch3.json_30","q":"证券公司为多个客户办理集合资产管理业务，不应当（）。","c":{"A":"与客户签订集合资产管理合同","B":"通过证券公司自营账户为客户提供资产管理服务","C":"设立集合资产管理计划并担任集合资产管理计划管理人","D":"将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管"},"a":"B","an":"证券公司为多个客户办理集合资产管理业务，应当设立集合资产管理计划并担任集合资产管理计划管理人，与客户签订集合资产管理合同，将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管，通过专门账户为客户提供资产管理服务。","type":"single"},{"id":"cflue_zc_ch3.json_31","q":"证券金融公司开展转融通业务，须以自己的名义开立相关资金账户，其中有（）。","c":{"A":"在证券登记结算机构开立的转融通担保资金账户","B":"在证券登记结算机构开立的转融通信用账户","C":"在证券登记结算机构开立的转融通资金交收账户","D":"在商业银行开立的转融通专用资金账户"},"a":"ACD","an":"证券金融公司开展转融通业务，应当以自己的名义，在证券登记结算机构分别开立转融通专用证券账户、转融通担保证券账户和转融通证券交收账户。证券金融公司开展转融通业务，应当以自己的名义，在商业银行开立转融通专用资金账户，在证券登记结算机构分别开立转融通担保资金账户和转融通资金交收账户。","type":"multi"},{"id":"cflue_zc_ch3.json_32","q":"按照目前的投资者构成，境内上市外资股的投资者包括（）。","c":{"A":"我国香港、澳门、台湾地区的自然人、法人和其他组织","B":"定居在国外的中国公民","C":"我国的境内居民","D":"外国的自然人、法人和其他组织"},"a":"ABCD","an":"境内上市外资股原来是指股份有限公司向境外投资者募集并在我国境内上市的股份，投资者限于：外国的自然人、法人和其他组织；我国香港、澳门、台湾地区的自然人、法人和其他组织；定居在国外的中国公民等。这类股票被称为B股。故ABC正确。从2001年2月对境内居民个人开放B股市场后，境内投资者逐渐成为B股市场的重要投资主体，B股的外资股性质发生了变化。【境内居民个人】可以用现汇存款和外币现钞存款以及从境外汇入的外汇资金从事B股交易。故D正确。因此全选。","type":"multi"},{"id":"cflue_zc_ch3.json_33","q":"下列关于证券公司的说法，正确的有（）。","c":{"A":"证券公司可以通过资产管理方式，为投资者提供证券及其他金融产品的投资管理服务","B":"证券公司是证券市场的主要中介机构","C":"在我国，证券公司是指依照《公司法》和（证券法》设立的经营证券业务的有限责任公司或股份有限公司","D":"在我国，设立证券公司必须经国务院审查批准"},"a":"ABC","an":"在我国，设立证券公司必须经国务院证券监督管理机构审査批准。B错误。","type":"multi"},{"id":"cflue_zc_ch3.json_34","q":"人民币合格境外机构投资者（RQFII）和QFII的主要区别不包括（）。","c":{"A":"尽可能地简化和便利对RQFII的投资额度及跨境资金收支管理","B":"投资范围由交易所市场的人民币金融拓展到银行间债券市场","C":"RQFII机构限定为境内基金管理公司","D":"募集的投资资金是人民币而不是外汇"},"a":"C","an":"RQFII机构限定为境内基金管理公司和证券公司的香港子公司。","type":"single"},{"id":"cflue_zc_ch3.json_35","q":"证券市场监管的经济手段，是指通过（）等经济手段，对证券市场进行干预。","c":{"A":"罚款","B":"利率政策","C":"公开市场业务","D":"信贷政策"},"a":"BCD","an":"经济手段是通过运用利率政策、公开市场业务、信贷政策、税收政策等经济手段，对证券市场进行干预。这种手段相对比较灵活，但调节过程可能较慢，存在时滞。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_12","q":"按照《证券公司私募投资基金子公司管理规范》的规定，证券公司设立私募基金子公司，公司章程有关对外投资条款中明确规定公司可以设立私募基金子公司，并经（）审批。","c":{"A":"中国证监会","B":"注册地中国证监会派出机构","C":"证券交易所","D":"国务院证券监督管理委员会"},"a":"B","an":"按照《证券公司私募投资基金子公司管理规范》的规定，证券公司设立私募基金子公司，公司章程有关对外投资条款中明确规定公司可以设立私募基金子公司，并经【注册地中国证监会派出机构】审批。","type":"single"},{"id":"cflue_paper_金融基础_1.json_21","q":"根据《中华人民共和国保险法》，保险公司资金运用范围包括（）。","c":{"A":"债券","B":"不动产","C":"股票","D":"基金"},"a":"ABCD","an":"保险资金运用限于下列形式：1.银行存款；2.买卖债券、股票、证券投资基金份额等有价证券；3.资金不动产；4.国务院规定的其他资金运用形式。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_32","q":"按照目前的投资者构成，境内上市外资股的投资者包括（）。","c":{"A":"我国香港、澳门、台湾地区的自然人、法人和其他组织","B":"定居在国外的中国公民","C":"我国的境内居民","D":"外国的自然人、法人和其他组织"},"a":"ABCD","an":"境内上市外资股原来是指股份有限公司向境外投资者募集并在我国境内上市的股份，投资者限于：外国的自然人、法人和其他组织；我国香港、澳门、台湾地区的自然人、法人和其他组织；定居在国外的中国公民等。这类股票被称为B股。故ABC正确。从2001年2月对境内居民个人开放B股市场后，境内投资者逐渐成为B股市场的重要投资主体，B股的外资股性质发生了变化。【境内居民个人】可以用现汇存款和外币现钞存款以及从境外汇入的外汇资金从事B股交易。故D正确。因此全选。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_43","q":"根据《证券交易所管理办法》，下列关于证券交易所职能的说法，正确的有（）。","c":{"A":"审核、安排证券上市交易","B":"对首次公开发行股票网下投资者进行注册和自律管理","C":"依法审核公开发行证券申请","D":"决定证券终止和重新上市"},"a":"ACD","an":"D属于根据《注册制下首次公开发行股票网下投资者管理规则》，担任科创板、创业板首发股票主承销商的证券公司的职责。故选ABC。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_3","q":"关于证券经纪业务的表述正确的是（）。","c":{"A":"经纪关系的建立形成实质上的委托关系","B":"我国证券公司从事的证券经纪业务以证券公司的柜台代理买卖证券业务为主","C":"经纪委托关系的建立表现为开户和委托两个环节","D":"不可以通过证券交易所代理买卖证券业务"},"a":"C","an":"证券经纪业务分为柜台代理买卖证券业务和通过证券交易所代理买卖证券业务。我国证券公司从事的证券经纪业务以通过证券交易所代理买卖证券业务为主。在证券经纪业务中，经纪委托关系的建立表现为开户和委托两个环节。经纪关系的建立只是确立了投资者和证券公司直接的代理关系，还没有形成实质上的委托关系。","type":"single"},{"id":"cflue_paper_金融基础_2.json_21","q":"按照《证券公司私募投资基金子公司管理规范》的规定，证券公司设立私募基金子公司，公司章程有关对外投资条款中明确规定公司可以设立私募基金子公司，并经（）审批。","c":{"A":"中国证监会","B":"注册地中国证监会派出机构","C":"证券交易所","D":"国务院证券监督管理委员会"},"a":"B","an":"按照《证券公司私募投资基金子公司管理规范》的规定，证券公司设立私募基金子公司，公司章程有关对外投资条款中明确规定公司可以设立私募基金子公司，并经【注册地中国证监会派出机构】审批。","type":"single"},{"id":"cflue_paper_金融基础_2.json_34","q":"根据《会员持续开展创业板市场投资者适当性管理业务指引》，证券公司应当根据客户（）等情况，对客户进行分类管理。","c":{"A":"异常交易行为发生频率","B":"收到深圳证券交易所警示次数","C":"交易活跃程度","D":"资金规模"},"a":"ABCD","an":"《会员持续开展创业板市场投资者适当性管理业务指引》第二十一条会员应当根据客户的资金规模、交易活跃程度、异常交易行为发生频率、收到本所警示次数以及是否为本所重点监控账户等情况，对客户进行分类管理。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_45","q":"关于股票，下列说法正确的有（）。","c":{"A":"股票是证权证券","B":"股票属于债权证券","C":"股票属于物权证券","D":"股票是一种有价证券"},"a":"AD","an":"股票具有的性质：1、是有价证券；2、是要式凭证；3、是证权凭证；4、是资本证券；5、是综合权利证券。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_60","q":"负责证券投资者保护基金筹集、管理和使用的是（）。","c":{"A":"社保基金理事会","B":"中国证券投资者保护基金有限责任公司","C":"证券投资基金","D":"中国证券登记结算机构"},"a":"B","an":"证券投资者保护基金公司负责保护基金筹集、管理和使用。","type":"single"},{"id":"cflue_paper_金融基础_3.json_10","q":"企业年金基金按照规定不得直接投资于（）。","c":{"A":"权证","B":"国债","C":"股票基金","D":"金融债"},"a":"A","an":"企业年金基金按照规定不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。","type":"single"},{"id":"cflue_paper_金融基础_3.json_50","q":"国务院证券监督管理机构依法履行职责，有权对（）进行现场检查。","c":{"A":"证券交易所","B":"上市公司","C":"证券发行人","D":"证券登记结算机构"},"a":"ABCD","an":"中国证监会有权对证券发行人、上市公司、证券公司、证券投资基金管理公司、证券服务机构（资产评估机构和资信评级机构属于证券服务机构。）、证券交易所、证券登记结算机构进行现场检查。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_52","q":"根据《证券公司压力测试指引》，证券公司开展压力测试主要包括以下（）步骤。","c":{"A":"实施压力测试，分析报告测试结果并且制定和执行应对措施","B":"选择测试对象，制订测试方案","C":"确定压力测试方法，并设置测试情景","D":"确定风险因子，收集测试数据"},"a":"ABCD","an":"根据《证券公司压力测试指引》，证券公司开展压力测试主要包括以下步骤：1、选择测试对象，制订测试方案；2、确定压力测试方法，并设置测试情景；3、确定风险因子，收集测试数据；4、实施压力测试，分析报告测试结果；5、制定和执行应对措施。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_55","q":"下列关于证券公司的说法，正确的有（）。","c":{"A":"证券公司可以通过资产管理方式，为投资者提供证券及其他金融产品的投资管理服务","B":"证券公司是证券市场的主要中介机构","C":"在我国，证券公司是指依照《公司法》和（证券法》设立的经营证券业务的有限责任公司或股份有限公司","D":"在我国，设立证券公司必须经国务院审查批准"},"a":"ABC","an":"在我国，设立证券公司必须经国务院证券监督管理机构审査批准。B错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_13","q":"按照《律师事务所从事证券法律业务管理办法》规定，律师事务所及其指派的律师从事证券法律业务，应当遵守法律、行政法规及其相关规定，遵循诚实、守信、独立、勤勉、尽责的原则，恪守律师职业道德和执业纪律，严格履行法定职责，保证其所出具文件的（）。","c":{"A":"准确性","B":"完整性","C":"及时性","D":"真实性"},"a":"ABD","an":"按照《律师事务所从事证券法律业务管理办法》规定，律师事务所及其指派的律师从事证券法律业务，应当遵守法律、行政法规及其相关规定，遵循诚实、守信、独立、勤勉、尽责的原则，恪守律师职业道德和执业纪律，严格履行法定职责，保证其所出具文件的【真实性、准确性、完整性】。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_23","q":"下列关于证券公司开展融资融券业务的说法错误的是（）。","c":{"A":"证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金不可以证券充抵","B":"证券公司应当逐日计算客户交存的担保物价值与其所欠债务的比例","C":"证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面方式予以记载、保存","D":"证券公司开展融资融券业务，必须中国证监会批准"},"a":"AC","an":"证券公司开展融资融券业务。证券公司在向客户融资、融券前，应办理客户征信，了解客户身份、财产与收入状况、证券投资经验和风险偏好，并以书面和电子方式予以记载、保存，故B错误。证券公司向客户融资、融券，应当向客户收取一定比例的保证金，保证金可以证券充抵，故C错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_46","q":"证券金融公司应当按照国家宏观政策，根据市场状况和风险控制需要，确定和调整（）。","c":{"A":"保证金比例","B":"担保金比例","C":"转融通资金率","D":"转融通费率"},"a":"AD","an":"证券金融公司可根据市场状况和风险控制需要，确定和调整【转融通费率和保证金的比例】。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_55","q":"国务院证券监督管理机构依法履行职责，有权对（）进行现场检查。","c":{"A":"证券交易所","B":"上市公司","C":"证券发行人","D":"证券登记结算机构"},"a":"ABCD","an":"中国证监会有权对证券发行人、上市公司、证券公司、证券投资基金管理公司、证券服务机构（资产评估机构和资信评级机构属于证券服务机构。）、证券交易所、证券登记结算机构进行现场检查。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_3","q":"证券公司为多个客户办理集合资产管理业务，不应当（）。","c":{"A":"与客户签订集合资产管理合同","B":"通过证券公司自营账户为客户提供资产管理服务","C":"设立集合资产管理计划并担任集合资产管理计划管理人","D":"将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管"},"a":"B","an":"证券公司为多个客户办理集合资产管理业务，应当设立集合资产管理计划并担任集合资产管理计划管理人，与客户签订集合资产管理合同，将客户资产交由具有客户交易结算资金法人存管业务资格的商业银行或者中国证监会认可的其他机构进行托管，通过专门账户为客户提供资产管理服务。","type":"single"},{"id":"cflue_paper_金融基础_5.json_32","q":"会员大会可以行使的职能不包括（）。","c":{"A":"管理人员的聘任、解聘及薪酬事项","B":"审议和通过理事会、监事会和总经理的工作报告","C":"选举和罢免会员理事、会员监事","D":"制定和修改证券交易所章程"},"a":"A","an":"会员大会可以行使的职能有制定和修改证券交易所章程；选举和罢免会员理事、会员监事；审议和通过理事会、监事会和总经理的工作报告；审议和通过证券交易所的财务预算、决算报告；法律、行政法规、部门规章和证券交易所章程规定的其他重大事项。","type":"single"},{"id":"cflue_paper_金融基础_5.json_46","q":"证券公司为期货公司介绍客户时，应当（）。","c":{"A":"向客户作获利保证、共担风险等承诺","B":"不得向客户虚假宣传、误导客户","C":"向客户解释期货交易的方式、流程及风险","D":"向客户明示其与期货公司的介绍业务委托关系"},"a":"BCD","an":"证券公司为期货公司介绍客户时，应当向客户明示其与期货公司的介绍业务委托关系，解释期货交易的方式、流程及风险，不得作获利保证、共担风险等承诺，不得向客户虚假宣传、误导客户。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_48","q":"企业年金基金按照规定不得直接投资于（）。","c":{"A":"权证","B":"国债","C":"股票基金","D":"金融债"},"a":"A","an":"企业年金基金按照规定不得直接投资于权证，但因投资股票、分离交易可转换债等投资品种而衍生获得的权证，应当在权证上市交易之日起10个交易日内卖出。","type":"single"},{"id":"cflue_paper_金融基础_5.json_49","q":"关于机构投资者买卖基金产生的税收，下列说法正确的有（）。","c":{"A":"机构投资者从基金分配中获得的收入，暂不征收所得税","B":"机构投资者在境内买卖基金份额获得差价收入，应并入企业的应纳税所得额，征收企业所得税","C":"机构投资者买卖基金份额暂免征收印花税","D":"机构投资者购入基金、信托、理财产品等各类资产管理产品持有至到期，属于金融商品转让，计征增值税"},"a":"ABC","an":"机构投资者投资基金的税收：&amp;lt;br&amp;gt;（1）机构投资者买卖基金份额属于金融商品转让，应按照卖出价扣除买入价后的余额为销售额计征增值税。但机构投资者购入基金、信托、理财产品等各类资产管理产品持有至到期，【不属于】金融商品转让。A错误。&amp;lt;br&amp;gt;（2）机构投资者买卖基金份额暂免征收印花税。&amp;lt;br&amp;gt;（3）机构投资者在境内买卖基金份额获得的差价收入，应并入企业的应纳税所得额，征收企业所得税。机构投资者从基金分配中获得的收入，暂不征收所得税。","type":"multi"},{"id":"xs_4781042","q":"金融债券作为一种特殊类型的债券，它具有以下（）特点。Ⅰ.金融债券表示的是银行等金融机构与金融债券持有者之间的债权债务关系Ⅱ.金融债券一般不记名、不挂失，不可以抵押和转让Ⅲ.我国金融债券的发行对象主要是个人Ⅳ.金融债券的利息不记复利，不能提前支取，延期兑付亦不计逾期利息","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"C","an":"","type":"single"},{"id":"xs_4781043","q":"下列不属于我国《公司法》规定的公司类型的有（）。Ⅰ.无限责任公司Ⅱ.两合公司Ⅲ.合伙制企业Ⅳ.股份有限公司","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅱ","C":"Ⅰ、Ⅲ、Ⅳ","D":"Ⅱ、Ⅲ"},"a":"A","an":"","type":"single"},{"id":"comp_11992","q":"关于证券公司的业务，下列说法正确的是（）。","c":{"A":"证券经纪业务中证券公司是交易的对手方","B":"证券自营业务是证券公司以自有资金买卖证券","C":"资产管理业务中证券公司承担投资风险","D":"证券承销业务只包括包销方式"},"a":"B","an":"选项A错误：证券经纪业务中，证券公司作为代理人不作为交易对手。选项C错误：资产管理业务中，风险由委托人（投资者）承担。选项D错误：证券承销包括包销和代销两种方式。选项B正确。","type":"comprehensive","material":"证券公司是重要的证券中介机构，其业务范围包括证券经纪、证券投资咨询、财务顾问、证券承销与保荐、证券自营、证券资产管理等。根据《证券法》，证券公司的设立需经中国证监会批准。","sub_type":"single"},{"id":"comp_70271","q":"下列属于证券投资者保护基金制度内容的有（）。","c":{"A":"保护基金的资金来源于证券公司缴纳的资金","B":"保护基金对每个投资者的保护限额为50万元","C":"保护基金公司负责基金的筹集、管理和使用","D":"保护基金主要用于处置证券公司风险时补偿投资者"},"a":"ACD","an":"选项B错误。保护基金对每个投资者的保护限额为500万元（注意区分存款保险的50万元）。保护基金公司负责基金的筹集、管理和使用，在证券公司被撤销、关闭和破产或被证监会实施行政接管、托管经营等强制性监管措施时，按照国家有关政策对债权人予以偿付。","type":"comprehensive","material":"证券公司是重要的证券中介机构，其业务范围包括证券经纪、证券投资咨询、财务顾问、证券承销与保荐、证券自营、证券资产管理等。根据《证券法》，证券公司的设立需经中国证监会批准。","sub_type":"multi"},{"id":"cflue_zc_ch4a.json_1","q":"甲公司公开发行股票5亿股，有效报价投资者的数量最少为10家。（）","c":{"A":"错","B":"对"},"a":"A","an":"公开发行股票数量在4亿股（含）以下的，有效报价投资者的数量不少于10家；公开发行股票数量在【4亿股以上】的，有效报价投资者的数量不少于20家。","type":"judge"},{"id":"cflue_zc_ch4a.json_2","q":"境内上市外资股又被称为B股。（）","c":{"A":"错","B":"对"},"a":"B","an":"境内上市外资股，是指在中国境内注册的股份有限公司向境内外投资者发行并在中国境内证券交易所上市，以人民币标明其面值，以外币认购、交易和结算的股份。境内上市外资股又被称为“B股”。","type":"judge"},{"id":"cflue_zc_ch4a.json_3","q":"与股份公司股利政策密切相关的日期有（）。","c":{"A":"股权登记日","B":"公司半年报公布日","C":"除权除息日","D":"派息日"},"a":"ACD","an":"与股份公司股利政策密切相关的日期有：1、除权除息日；2、派息日；3、股利宣布日；4、股权登记日。","type":"multi"},{"id":"cflue_zc_ch4a.json_4","q":"普通股的红利是不固定的，它取决于股份公司的（）。","c":{"A":"股票市值","B":"盈利水平","C":"经营状况","D":"股票面值"},"a":"BC","an":"认购股票后，公司派发的股息、红利数量取决于股份公司的【经营状况】和【盈利水平】。","type":"multi"},{"id":"cflue_zc_ch4a.json_5","q":"股票的特征包括（）。","c":{"A":"收益性","B":"参与性","C":"流动性","D":"永久性"},"a":"ABCD","an":"股票的特征：收益性、风险性、流动性、永久性、参与性。","type":"multi"},{"id":"cflue_zc_ch4a.json_6","q":"深圳证券交易所规定，首个交易日无价格涨跌幅限制的情形有（）。","c":{"A":"配股上市的股票","B":"增发上市的股票","C":"暂停上市后恢复上市的股票","D":"首次公开发行上市的股票"},"a":"CD","an":"深圳证券交易所规定，属于下列情形之一的，股票上市首日不实行价格涨跌幅限制：（1）首次公开发行股票上市的（对应D选项）；（2）暂停上市后恢复上市的（对应C选项）；（3）中国证监会或深圳证券交易所认定的其他情形。故C、D正确。","type":"multi"},{"id":"cflue_zc_ch4a.json_7","q":"首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%。（）","c":{"A":"错","B":"对"},"a":"B","an":"首次公开发行股票采用询价方式的，网下投资者报价后，发行人和主承销商应当剔除拟申购总量中报价最高的部分，剔除部分不得低于所有网下投资者拟申购总量的10%，然后根据剩余报价及拟申购数量协商确定发行价格。剔除部分不得参与网下申购。","type":"judge"},{"id":"cflue_zc_ch4a.json_8","q":"北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。","c":{"A":"最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告","B":"最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）","C":"具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形","D":"最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"},"a":"BCD","an":"根据《北京证券交易所上市公司证券发行注册管理办法》第九条，C（具备健全且运行良好的组织机构；具有独立、稳定经营能力）是向特定对象发行的法定条件之一，BCD均正确。A错误，向特定对象发行仅要求最近1年财务会计报告无虚假记载，而非3年。","type":"multi"},{"id":"cflue_zc_ch4a.json_9","q":"丙公司是一家大型国有石油公司，2018年3月，该公司投资1亿元入股甲公司，甲公司为国家扶持的专项高科技公司，成长迅速，则该丙公司的股份为（）。","c":{"A":"国家股","B":"政策股","C":"内资股","D":"法人股"},"a":"D","an":"国家股定义：有权代表国家投资的部门或机构以国有资产向公司投资形成的股份，与国有法人股投资主体不同，具有法人资格的国有企业使用法人资产向独立于自己的股份公司出资属于“国有法人股”，是“法人股”的一种。","type":"single"},{"id":"cflue_zc_ch4a.json_10","q":"股票实质上代表了股东对股份公司净资产的所有权，股东凭借股票可以获得公司的（）。","c":{"A":"等额资金","B":"红利","C":"股息","D":"等额资本"},"a":"BC","an":"股票实质上代表了股东对股份公司净资产的所有权，这种所有权是一种综合权利，股东凭借股票可以获得公司的【股息和红利】，参加股东大会并行使自己投票表决、参与公司重大决策等权利，同时也承担相应的责任与风险。故BC正确。","type":"multi"},{"id":"cflue_zc_ch4a.json_11","q":"关于普通股股东义务，下列说法正确的有（）。","c":{"A":"如违反相关规定，给公司造成损失的，应当承担赔偿责任","B":"公司的控股股东、实际控制人不得利用其关联关系损害公司利益","C":"公司股东滥用法人独立地位和股东有限责任逃避责任，严重损害公司债权人利益的，应当对公司债务承担连带责任","D":"公司股东滥用股东权利给公司或者其他股东造成损失的，可以申请豁免承担赔偿责任"},"a":"ABC","an":"股东应当遵守法律、行政法规和公司章程，依法行使股东权利，不得滥用股东权利损害公司或者其他股东的利益；不得滥用公司法人独立地位和股东有限责任损害公司债权人的利益。公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司股东滥用公司法人独立地位和股东有限责任，逃避债务，严重损害公司债权人利益的，应当对公司债务承担连带责任。公司的控股股东、实际控制人不得利用其关联关系损害公司利益，由此给公司造成损失的，应当承担赔偿责任。","type":"multi"},{"id":"cflue_zc_ch4a.json_12","q":"上市公司出现下列描述的情形中，属于可以向证券交易所申请主动退市的有（）。","c":{"A":"上市公司被法院宣告破产","B":"上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销","C":"上市公司股东大会决议主动撤回其股票在证券交易所的交易，并决定不在该交易所交易","D":"上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件"},"a":"BCD","an":"关于主动申请退市的法定情形：1、上市公司股东大会决议主动撤回其股票在本所的交易，并决定不再在交易所交易；2、上市公司股东大会决议主动撤回其股票在本所的交易，并转而申请在其他交易场所交易或转让；3、上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；4、上市公司股东向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；5、除上市公司股东外的其他人向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；6、上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销；7、上市公司股东大会决议公司解散。","type":"multi"},{"id":"cflue_zc_ch4a.json_13","q":"无限售条件股份是指流通转让不受限制的股份，具体包括（）。","c":{"A":"境外上市外资股","B":"境内上市外资股","C":"人民币普通股","D":"国有法人股"},"a":"ABC","an":"无限售条件股份是指流通转让不受限制的股份。具体包括：1、人民币普通股，即A股，含向社会公开发行股票时向公司职工配售的公司职工股。2、境内上市外资股，即B股。3、境外上市外资股，即在境外证券市场上市的普通股，如H股。4、其他。","type":"multi"},{"id":"cflue_zc_ch4a.json_14","q":"我国境外上市外资股主要由（）等构成。","c":{"A":"N股","B":"B股","C":"S股","D":"H股"},"a":"ACD","an":"境外上市外资股主要由H股（香港）、N股（纽约）、S股（新加坡）、L股（伦敦）等构成。B股属于境内上市外资股。","type":"multi"},{"id":"cflue_zc_ch4a.json_15","q":"关于优先股，下列说法正确的是（）。","c":{"A":"优先股股息可税前扣除，减轻企业税负","B":"优先股股东享有与普通股股东相同的决策权力","C":"优先股股息收益并不总是高于普通股","D":"优先股二级市场价格波动大，适合投机交易"},"a":"C","an":"优先股收入较稳定适合中长线投资；优先股股息不可税前扣除；优先股股东的经营决策受限；当公司盈利丰厚的情况下，优先股的股息可能会大大低于普通股。","type":"single"},{"id":"cflue_zc_ch4a.json_16","q":"公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购新股的方式，按老股一般配售若干新股，以保护原股东的权益及其对公司控制权的是定向增发。（）","c":{"A":"错","B":"对"},"a":"A","an":"【配股】是公司按股东的持股比例向原股东分配公司的新股认购权，准其优先认购股份的方式。即按老股一股配售若干新股，以保护原股东的权益及其对公司的控制权。","type":"judge"},{"id":"cflue_zc_ch4a.json_17","q":"公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）","c":{"A":"错","B":"对"},"a":"A","an":"公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。","type":"judge"},{"id":"cflue_zc_ch4a.json_18","q":"下列有关优先股票的说法，正确的有（）。","c":{"A":"相对于普通股的权利，优先股股东的权利都是优先的","B":"优先股和普通股一样，拥有对公司的所有权","C":"优先股的股息率一般在发行时事先固定","D":"优先股兼有债券的特点"},"a":"BCD","an":"相对于普通股的权利，优先股股东在股息的分配和剩余财产的索取上，是优先的，但优先股股东对公司日常经营管理的一般事项没有表决权，而普通股股东是有表决权的。","type":"multi"},{"id":"cflue_zc_ch4a.json_19","q":"根据《公司法》，公司不得收购本公司股份，但是有下列情形之一的除外（）。","c":{"A":"与持有本公司股份的其他公司合并","B":"将股份奖励给本公司职工","C":"股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份","D":"减少公司注册资本"},"a":"ABCD","an":"公司不得收购本公司股份。但是，有下列情形之一的除外：&amp;lt;br&amp;gt;1、减少公司注册资本；&amp;lt;br&amp;gt;2、与持有本公司股份的其他公司合并；&amp;lt;br&amp;gt;3、将股份用于员工持股计划或者股权激励；&amp;lt;br&amp;gt;4、股东因对股东大会作出的公司合并、分立决议持异议，要求公司收购其股份；&amp;lt;br&amp;gt;5、将股份用于转换上市公司发行的可转换为股票的公司债券；&amp;lt;br&amp;gt;6、上市公司为维护公司价值及股东权益所必需。","type":"multi"},{"id":"cflue_zc_ch4a.json_20","q":"首次公开发行股票采用询价方式定价的说法中，错误的是（）。","c":{"A":"网下投资者不得协商报价","B":"网下机构和个人投资者可以自主决定是否报价","C":"网下投资者的报价应当包含每股价格和该价格对应的拟申购股数","D":"网下投资者应当给出三个不同报价供主承销商参考"},"a":"D","an":"B选项说法错误，网下投资者只能有一个报价。","type":"single"},{"id":"cflue_zc_ch4a.json_21","q":"下列（）股份变动不会影响每位股东所持股东权益占公司全部股东权益的比重。","c":{"A":"增发股票","B":"股份分割与合并","C":"股份回购","D":"资本公积转增股本"},"a":"BCD","an":"股份回购是公司利用自有资金购买，不影响公司内部股东份额占比；增发股票在通常情况下，由于可能有除原股东之外的其他人购入股票，或原股东并不按原持有份额比例购入相应比例的股票，极可能导致该比重的变化；资本公积、股票的分割与合并不影响每位股东占公司股份比例。","type":"multi"},{"id":"cflue_zc_ch4a.json_22","q":"在上市公司增资发行方式中，公司发行可转换债券的主要动因是保护原股东的权益及其对公司的控制权。（）","c":{"A":"错","B":"对"},"a":"A","an":"可转换公司债券是指其持有者可以在一定时期内按一定比例或价格将之转换成一定数量的另一种证券的证券，通常转化为普通股票，公司发行可转换债券的主要动因是为了【增强证券对投资者的吸引力，能以较低的成本筹集到所需要的资金】。","type":"judge"},{"id":"cflue_zc_ch4a.json_23","q":"甲公司由于经营不善，连年亏损，已连续3年年未能按约分配股息，则持有优先股的股东当年所持每一股优先股的表决权相当于（）股的普通股的表决权。","c":{"A":"1","B":"二分之一","C":"0","D":"三分之二"},"a":"A","an":"公司长期未按约定分配股息，优先股股东恢复到与普通股股东相同的表决权。","type":"single"},{"id":"cflue_zc_ch4a.json_24","q":"根据我国《上市公司证券发行管理办法》规定，不属于上市公司再融资方式的是（）。","c":{"A":"非公开发行股票","B":"向原股东配售股份","C":"发行可转换公司债券","D":"发行可交换公司债券"},"a":"D","an":"我国上市公司再融资的方式主要包括配股、公开增发、非公开发行、可转换公司债券、优先股、公司债券、企业资产证券化等。","type":"single"},{"id":"cflue_zc_ch4a.json_25","q":"上市公司强制退市的原因包括（）。","c":{"A":"股权分布不合理","B":"交投不活跃","C":"存在严重违法违规行为","D":"市值过低而不再适合公开交易"},"a":"ABCD","an":"依照规则要求交投不活跃、股权分布不合理、市值过低而不再适合公开交易的股票应终止交易，特别是对于存在严重违法违规行为的公司，证券交易所可以依法强制其股票退出市场交易。故答案选ABCD。","type":"multi"},{"id":"cflue_zc_ch4a.json_26","q":"下列不属于境外上市外资股的特点的是（）。","c":{"A":"公司支付股利时以外币计价","B":"人民币标明股票面值","C":"记名股票","D":"外币认购买卖"},"a":"A","an":"境外上市外资股，公司向境外上市外资股股东支付股利及其他款项，以【人民币】计价和宣布，以外币支付。","type":"single"},{"id":"cflue_zc_ch4a.json_27","q":"上市公司发生下列（）情形，应当被强制退市。","c":{"A":"法定期限届满后，上市公司在证券交易所规定的期限内未能披露半年度报告","B":"上市公司在证券交易所规定期限内，未改正财务会计报告中的重大错报","C":"上市公司社会公众持股比例不足25%，或者公司股本总额超过人民币4亿元，社会公众持股比例不足公司股份总数的10%","D":"上市公司连续10个交易日（不含停牌交易日）每日股票收盘价均低于股票面值"},"a":"ABC","an":"上市公司发生被强制退市的情形。上市公司连续【20个交易日】（不含停牌交易日）每日股票收盘价均低于股票面值，会被强制退市。","type":"multi"},{"id":"cflue_zc_ch4a.json_28","q":"关于国家股，下列说法错误的是（）。","c":{"A":"国有股股利收入纳入国有资产经营预算","B":"国家股不能转让","C":"国有资产折价入股需按规定进行评估确认","D":"是国有股权的组成部分"},"a":"B","an":"国家股可以转让，但是需要按照国家的有关规定。","type":"single"},{"id":"cflue_zc_ch4a.json_29","q":"下列选项中，应当由保荐机构推荐的有（）。","c":{"A":"申请上市后公开发行新股","B":"申请可转换公司债券上市","C":"公司股票被暂停上市后申请恢复上市","D":"申请首次公开发行的股票"},"a":"ABD","an":"发行人应当就下列事项聘请具有保荐机构资格的证券公司履行保荐职责：（1）首次公开发行股票并上市；（2）上市公司发行新股、可转换公司债券；（3）中国证监会认定的其他情形。","type":"multi"},{"id":"cflue_zc_ch4a.json_30","q":"下列（）股票发行制度直接影响有关参与各方的利益分配。","c":{"A":"发行方式","B":"发行定价","C":"发行监管制度","D":"发行主体"},"a":"A","an":"股票的发行方式直接影响参与各方的利益分配。","type":"single"},{"id":"cflue_zc_ch4a.json_31","q":"代销期满，原股东认购股票的数量未达到拟配售数量的比例为65%时，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。（）","c":{"A":"错","B":"对"},"a":"A","an":"代销期满，原股东认购股票的数量未达到拟配售数量的比例【70%】的，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。","type":"judge"},{"id":"cflue_zc_ch4a.json_32","q":"首次公开发行股票采用直接定价方式的（）。","c":{"A":"按发行人和主承销商确定的比例向网上或网下投资者发行","B":"需进行网下询价","C":"全部向网下投资者发行","D":"全部向网上投资者发行"},"a":"D","an":"首次公开发行股票采用直接定价方式的，全部向网上投资者发行。","type":"single"},{"id":"cflue_zc_ch4a.json_33","q":"首次公开发行股票，网上投资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的20%。（）","c":{"A":"错","B":"对"},"a":"A","an":"网上资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的10%。","type":"judge"},{"id":"cflue_zc_ch4a.json_34","q":"下列关于优先股与普通股、债券的区别的说法，错误的是（）。","c":{"A":"优先股没有到期的概念，发行人没有偿还本金的压力；而除了永续债券这种特殊的混合证券外，绝大多数债券需要到期还本付息","B":"普通股股东可全面参与公司的经营管理，享有资产收益、参与重大决策和选择管理者等权利，而优先股股东一般不参与公司的日常经营","C":"普通股股东除了获取股息收益外，收益来源二级市场价格上涨也是重要的；而优先股的二级市场股价波动相对较小，依靠买卖价差获利的空间也较小","D":"优先股的股息一般来自税前利润，而债券的利息来自可分配税后利润"},"a":"D","an":"优先股的股息一般来自【可分配税后】利润，而债券的利息来自【税前】利润。","type":"single"},{"id":"cflue_zc_ch4a.json_35","q":"核准制是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定的股票发行监管制度。（）","c":{"A":"错","B":"对"},"a":"A","an":"【注册制】的特点是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定。","type":"judge"},{"id":"cflue_zc_ch4b.json_1","q":"引起股票价格变动的直接原因是（）。","c":{"A":"公司经营状况的变化","B":"买卖双方力量强弱的转换","C":"流动性挤压","D":"政治因素"},"a":"B","an":"引起股票价格变动的直接原因是供求关系的变化或者买卖双方力量强弱的转换。","type":"single"},{"id":"cflue_zc_ch4b.json_2","q":"证券账户信息中的关键信息包括（）。","c":{"A":"投资者有效身份证明文件及号码","B":"投资者电话","C":"投资者地址","D":"投资者姓名或名称"},"a":"AD","an":"证券账户信息中的关键信息包括投资者姓名或名称和投资者有效身份证明文件及号码，其他信息为非关键信息。","type":"multi"},{"id":"cflue_zc_ch4b.json_3","q":"股票理论价值的相关因素包括（）。","c":{"A":"未来资本利得收入","B":"必要收益率","C":"上一期股息收入","D":"未来股息收入"},"a":"ABD","an":"股票及其他有价证券的理论价格就是以一定的【必要收益率】计算出来的未来收入的现值。其中未来收入包括【未来股息收入、资本利得收入】。","type":"multi"},{"id":"cflue_zc_ch4b.json_4","q":"A公司今年的净利润为500万元，折旧（摊销）共计20万元，本期营运资金增加50万元，长期经营性资产增加15万元，偿还债务80万元。因此当年的股权自由现金流为（）万元。","c":{"A":"365","B":"405","C":"335","D":"375"},"a":"D","an":"FCFE=净利润＋折旧＋摊销－营运资金的增加＋长期经营性负债的增加－长期经营性资产的增加－资本性支出＋新增付息债务－债务本金的偿还=500+20-50-15-80=375万元。","type":"single"},{"id":"cflue_zc_ch4b.json_5","q":"做市商制度的特点有（）。","c":{"A":"证券交易价格由买方和卖方的力量直接决定","B":"校正买卖指令不均衡现象","C":"提高流动性，增强市场吸引力","D":"有效稳定市场，促进市场平衡运行"},"a":"BCD","an":"在做市商制度下，证券市场的交易价格是由做市商进行双向报价而产生，不是由卖方和买方的力量直接决定，C错误。","type":"multi"},{"id":"cflue_zc_ch4b.json_6","q":"刘某是S公司的股东，所持有的股票的账面价值为200万元，2018年12月31日，S公司以每10股送2股的形式发放股票股利，送股后，刘某所持股票的账面价值为（）。","c":{"A":"200万元","B":"180万元","C":"240万元","D":"220万元"},"a":"A","an":"发放股票股利不影响股东在公司中占有的权益比例和股票的账面价值，故刘某的账面价值还是200万不变。","type":"single"},{"id":"cflue_zc_ch4b.json_7","q":"某公司拟上市发行股票，已知股票每股面额为1元，按照我国《公司法》要求，该公司的股票发行价格可以是（）。","c":{"A":"1元","B":"5.4元","C":"20元","D":"0.5元"},"a":"ABC","an":"我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。","type":"multi"},{"id":"cflue_zc_ch4b.json_8","q":"下列股票能被选入沪深300指数的有（）。","c":{"A":"丁股票为主板上市股票，由于连年亏损被认定为ST股票，但从近期季度财务报告来看，本年有望扭亏为盈。","B":"丙股票为主板上市的蓝筹股，但是由于政策影响，近期涨势低迷","C":"甲股票是创业板股票，虽总市值不高，但是涨势良好","D":"乙股票为主板上市股票，由于年度报告未及时披露等问题，被暂停上市"},"a":"B","an":"沪深300指数是由沪深A股中规模大、流动性好、最具代表性的300只股票组成，不能是创业板股票，除非该股票上市以来日均A股总市值在全部沪深A股（非创业板股票）中排在前30位；也不能是ST、*ST股票和暂停上市股票。","type":"single"},{"id":"cflue_zc_ch4b.json_9","q":"沪伦通中的（）是指符合条件的伦交所上市公司在上交所主板上市中国存托凭证。","c":{"A":"西向业务","B":"东向业务","C":"南向业务","D":"北向业务"},"a":"B","an":"沪伦通中的【东向业务】是指符合条件的伦交所上市公司在上交所主板上市中国存托凭证","type":"single"},{"id":"cflue_zc_ch4b.json_10","q":"自然人客户申请开通创业板市场交易，营业部应根据客户是否具有（）以上股票交易经验，分别按不同方式进行管理。","c":{"A":"一年（含）","B":"两年（含）","C":"半年（含）","D":"三年（含）"},"a":"B","an":"自然人客户申请开通创业板市场交易，营业部应根据客户是否具有两年（含）以上股票交易经验，分别按不同方式进行管理。","type":"single"},{"id":"cflue_zc_ch4b.json_11","q":"下列关于证券委托的说法，正确的有（）。","c":{"A":"柜台委托需由本人填写委托单并签章","B":"柜台委托必须由委托人亲自到证券营业部交易柜台办理","C":"证券委托可以分为柜台委托和非柜台委托两大类","D":"客户在办理委托买卖证券时，需要向证券经纪商下达委托指令"},"a":"ACD","an":"柜台委托是指委托人亲自或由其【代理人】到证券营业部交易柜台，根据委托程序和必需的证件采用书面方式表达委托意向，由本人填写委托单并签章的形式，C错误，故选ABD。","type":"multi"},{"id":"cflue_zc_ch4b.json_12","q":"参与上海证券交易所证券买卖的投资者必须事先指定一家会员作为其买卖证券的受托人，通过该会员参与本所市场证券的买卖，这种制度被称为托管制。（）","c":{"A":"错","B":"对"},"a":"A","an":"【全面指定交易】是指参与上海证券交易所证券买卖的投资者必须实现指定一家会员作为其买卖证券的受托人，通过该会员参与本所市场证券的买卖。","type":"judge"},{"id":"cflue_zc_ch4b.json_13","q":"由于影响股票价格的因素复杂多变，股票的市场价格呈现出（）的特征。","c":{"A":"复杂性","B":"稳定性","C":"波动性","D":"灵活性"},"a":"C","an":"由于影响股票价格的因素复杂多变，股票的市场价格呈现出高低起伏的【波动性】特征。","type":"single"},{"id":"cflue_zc_ch4b.json_14","q":"沪深300指数是中国证券市场中历史最悠久、数据最完整的成分股指数。（）","c":{"A":"错","B":"对"},"a":"A","an":"【深证成分指数】是中国证券市场中历史最悠久、数据最完整的成分股指数。","type":"judge"},{"id":"cflue_zc_ch4b.json_15","q":"下列行为中，违反了证券交易必须遵守的公正原则的有（）。","c":{"A":"上市公司的董事长发生变动未向社会披露","B":"有关部门未严格按要求审批某证券经营机构的设立申请","C":"内幕交易","D":"有关部门未严格按要求核准股票的发行和上市申请"},"a":"BD","an":"公正原则要求证券监管机构在公开、公平原则的基础上，对一切被监管对象给予公正待遇。根据公正原则，证券立法机构应当制定体现公平精神的法律、法规和政策；证券监管机构应当根据法律授予的权限履行监管职责，以法律为依据，对一切证券市场参与者给予公正的待遇；对证券违法行为的处罚及对证券纠纷事件和争议的处理，都应当公平进行。","type":"multi"},{"id":"cflue_zc_ch4b.json_16","q":"中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。（）","c":{"A":"错","B":"对"},"a":"B","an":"中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。","type":"judge"},{"id":"cflue_zc_ch4b.json_17","q":"根据我国现行的证券交易原则，属于连续竞价时成交价格的确定原则是（）。","c":{"A":"最高买入申报与最低卖出申报价位相同，不成交","B":"卖出申报价格低于即时揭示的最高买入申报价格时，以中间价成交","C":"最高买入申报与最低卖出申报价位相同，以该价格为成交价","D":"买入申报价格高于即时揭示的最低卖出申报价格时，以中间价成交"},"a":"C","an":"连续竞价时，成交价格的确定原则为：1、最高买入申报与最低卖出申报价位相同，以该价格为成交价。2、买入申报价格高于即时揭示的最低卖出申报价格时，以即时揭示的最低卖出申报价格为成交价。3、卖出申报价格低于即时揭示的最高买入申报价格时，以即时揭示的最高买入申报价格为成交价。","type":"single"},{"id":"cflue_zc_ch4b.json_18","q":"关于股票的清算价值，下列说法正确的是（）。","c":{"A":"公司清算时每一股份所代表的实际价值","B":"公司破产清算时，其发行的股票的交易价值","C":"股票清仓时，股票所能获得的出售价值","D":"股票的清算价值应与账面价值相等"},"a":"A","an":"股票的清算价值是公司清算时每一股份所代表的实际价值。从理论上说，股票的清算价值应与账面价值一致，实际上并非如此。只有当清算时公司资产实际出售价款与财务报表上的账面价值一致时，每一股份的清算价值才与账面价值一致。但在公司清算时，其资产往往只能压低价格出售，再加上必要的清算费用，所以大多数公司的实际清算价值低于其账面价值。","type":"single"},{"id":"cflue_zc_ch4b.json_19","q":"下列关于股票投资分析方法的说法中，正确的有（）。","c":{"A":"量化分析因为符合金融科技潮流，其方法越来越领先于基本面分析和技术分析","B":"量化分析使用大量数据，利用统计、数值模拟和其他定量模型进行股票价格分析","C":"技术分析的核心是从股票的市场行为分析股票价格未来变化趋势","D":"基本面分析的核心是计算股票的内在价值，根据实际价格与理论价值的背离得出买卖判断"},"a":"BCD","an":"事实上，并不存在完美的股票分析方法，任何投资分析理论或分析方法都有其适用的前提和假设。投资分析是一种兼有科学性和艺术性的专业活动，对分析人员的知识、技能和经验都提出了很高的要求。D说法正确。A说法错误，不存在绝对领先的分析方法。","type":"multi"},{"id":"cflue_zc_ch4b.json_20","q":"（）指数广泛分布于节能环保、新一代信息技术、生物、高端装备、新能源、新材料、TMT等新兴产业和消费领域。","c":{"A":"上证50指数","B":"上证100指数","C":"上证150指数","D":"上证380指数"},"a":"BCD","an":"上证380指数、上证100指数、上证150指数广泛分布于节能环保、新一代信息技术、生物、高端装备、新能源、新材料、TMT等新兴产业和消费领域。","type":"multi"},{"id":"cflue_zc_ch4b.json_21","q":"下列说法中，正确的是（）。","c":{"A":"国家法定节假日证券交易所无须休市","B":"上海证券交易所规定交易日为每周一至周五","C":"证券交易所在任何情况下都不能调整交易时间","D":"交易时间内因故停市，交易时间需要顺延"},"a":"B","an":"经中国证监会批准，证券交易所可以调整交易时间；交易时间内因故停市，交易时间不作顺延；国家法定节假日和证券交易所公告的休市日，证券交易所市场休市。","type":"single"},{"id":"cflue_zc_ch4b.json_22","q":"关于清算与交收的联系，下列说法中正确的有（）。","c":{"A":"清算包括资金清算与证券清算，交收实现证券由卖方向买方的转移和对应的资金由买方向卖方转移","B":"清算结果正确才能保障交收的顺利进行","C":"清算与交收密不可分，清算与交收同步进行","D":"清算在前，交收在后"},"a":"ABD","an":"先清算，后交收。B错误。","type":"multi"},{"id":"cflue_zc_ch4b.json_23","q":"关于股票的内在价值，下列说法正确的有（）。","c":{"A":"由于未来市场及市场利率的不确定性，各种价值模型计算出来的“内在价值”只是股票真实的内在价值的估算值","B":"经济形势的变化、宏观经济政策的调整、供求关系的变化等都会影响股票未来的收益，但内在价值不会变","C":"股票的市场价格总是围绕其内在价值波动","D":"股票的内在价值即理论价值，也即股票未来收益的现值"},"a":"ACD","an":"经济形势的变化、宏观经济政策的调整、供求关系的变化等都会影响上市公司未来的收益，引起内在价值的变化。A错误。","type":"multi"},{"id":"cflue_zc_ch4b.json_24","q":"目前我国证券交易所采用的竞价方式是（）。","c":{"A":"分散竞价和连续竞价","B":"集合竞价和连续竞价","C":"定时竞价和连续竞价","D":"定时竞价和集合竞价"},"a":"B","an":"目前我国证券交易所采用的竞价方式是集合竞价和连续竞价。","type":"single"},{"id":"cflue_zc_ch4b.json_25","q":"下列事项中，可用于分析公司经营状况好坏的因素有（）。","c":{"A":"公司并购重组","B":"公司财务状况","C":"公司治理水平与管理层质量","D":"公司竞争力"},"a":"ABCD","an":"分析公司经营状况的因素包括：1、公司治理水平与管理层质量；2、公司竞争力；3、财务状况；4、公司并购重组。","type":"multi"},{"id":"cflue_zc_ch4b.json_26","q":"关于股票价格指数编制说法正确的是（）。","c":{"A":"股票价格指数的基期就是计算平均股价的当日","B":"选择样本股时，只能选择具有代表性的这部分股票","C":"指数化时应当将基期平均股价或市值定为100%","D":"计算计算期平均股价或市值应当作出必要的修正"},"a":"D","an":"样本股可以是全部上市股票，也可以是其中有代表性的一部分；股票价格指数的基期是所选取的某一有代表性或者股价相对稳定的日期；计算计算期平均股价或市值应当作出必要的修正；指数化时，基期平均股价或市值定为某一常数（通常为100、1000或者10）。","type":"single"},{"id":"cflue_zc_ch4b.json_27","q":"如果有两个以上申报价格符合集合竞价确定成交价的原则，上海交易所规定的成交价格为（）。","c":{"A":"行情显示的前收盘价格","B":"各个价格的平均价格","C":"使未成交量最小的申报价格","D":"可实现成交价格的最低价格"},"a":"C","an":"集合竞价时，如果有两个以上申报价格符合集合竞价确定成交价的原则，上海证券交易所规定的成交价格为【使未成交量最小的申报价格】。","type":"single"},{"id":"cflue_zc_ch4b.json_28","q":"沪伦通存托凭证业务包括（）两个业务方向。","c":{"A":"南北","B":"上下","C":"左右","D":"东西"},"a":"D","an":"沪伦通，是指上交所与伦交所的互联互通机制。初期从存托凭证起步。沪伦通存托凭证业务包括东西两个业务方向。","type":"single"},{"id":"cflue_zc_ch4b.json_29","q":"竞价的结果不包括（）。","c":{"A":"不成交","B":"部分成交","C":"继续成交","D":"全部成交"},"a":"C","an":"竞价结果有三种可能：全部成交、部分成交、不成交。","type":"single"},{"id":"cflue_zc_ch4b.json_30","q":"在对影响股价变动的行业因素进行分析时发现，手机的普遍采用终结了早期作为移动通信主要方式的传呼机，这对应行业因素中的（）。","c":{"A":"抗外部冲击的能力","B":"行业估值水平","C":"行业竞争结构","D":"行业可持续性"},"a":"D","an":"技术及其他因素的变化有可能终结某些行业的发展，故选B，手机的普遍使用影响到了传呼机的可持续性。","type":"single"},{"id":"cflue_zc_ch4b.json_31","q":"深圳证券交易所在确定深证成份指数的深证成份股指数选取样本成分数时一般考虑的因素包括（）。","c":{"A":"交易活跃程度","B":"是否是行业龙头公司","C":"平均可流动股市值","D":"平均总市值"},"a":"ABCD","an":"选取样本时考虑的因素有：&amp;lt;br&amp;gt;1、上市交易日期的长短；&amp;lt;br&amp;gt;2、上市规模，按每家公司一段时期内的平均总市值和平均可流通股市值计；&amp;lt;br&amp;gt;3、交易活跃程度，按每家公司一段时期总成交金额计。样本调整原则：为保证指数的代表性，必须视上市公司的变动更换成份股；&amp;lt;br&amp;gt;4、行业代表性及其成长性；&amp;lt;br&amp;gt;5、公司的财务状况和经营业绩；&amp;lt;br&amp;gt;6、公司近两年的规范运作情况等。","type":"multi"},{"id":"cflue_zc_ch4b.json_32","q":"关于沪深300指数，以下说法错误的是（）。","c":{"A":"其成分股原则上每三个月调整一次","B":"指数计算采用派许加权法","C":"基点为1000点","D":"自由流通量是计算沪深300指数时使用的一个重要指标"},"a":"A","an":"沪深300指数，是由沪深证券交易所于2005年4月8日联合发布的反映沪深300指数编制目标和运行状况的金融指标，并能够作为投资业绩的评价标准，为指数化投资和指数衍生产品创新提供基础条件。沪深300指数每年调整2次样本股（成分股），C错误。","type":"single"},{"id":"cflue_zc_ch4b.json_33","q":"证券经纪商在收到客户委托后，应当对下列（）内容进行审查。","c":{"A":"委托卖出的实际证券数量","B":"委托人身份","C":"委托买入的实际证券数量","D":"委托内容"},"a":"ABD","an":"证券经纪商在收到客户委托后，应当对委托人身份、委托内容、委托卖出的实际证券数量和委托买入的实际资金余额进行审查。","type":"multi"},{"id":"cflue_zc_ch4b.json_34","q":"A公司今年的息税前利润为500万元，调整的所得税为90万元，折旧（摊销）共计20万元，本期营运资金增加50万元，长期经营性负债增加15万元，资本性支出为55万元。因此当年的企业自由现金流为（）万元。","c":{"A":"400","B":"440","C":"310","D":"340"},"a":"D","an":"FCFF=息税前利润－调整的所得税＋折旧＋摊销－营运资金的增加＋长期经营性负债的增加－长期经营性资产的增加－资本性支出=500-90+20-50+15-55=340万元。","type":"single"},{"id":"cflue_zc_ch4b.json_35","q":"下面说法正确的是（）。","c":{"A":"证券公司与其客户之间的资金清算交收可以由证券公司自行负责完成","B":"证券公司与客户之间的证券清算交收，应当由证券公司全权办理","C":"证券公司在证券登记结算机构只需开立证券交收账户","D":"目前我国证券市场采用的结算模式是机构结算模式"},"a":"A","an":"目前我国证券市场采用的结算模式是法人结算模式；证券公司在证券登记结算机构开立证券交收账户和资金交收账户；证券公司与其客户之间的资金清算交收由证券公司自行负责完成；证券公司与客户之间的证券清算交收，是委托中国结算公司根据成交记录按照业务规则代为办理。","type":"single"},{"id":"cflue_paper_金融基础_1.json_7","q":"北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。","c":{"A":"最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告","B":"最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）","C":"具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形","D":"最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"},"a":"BCD","an":"根据《北京证券交易所上市公司证券发行注册管理办法》第九条，C（具备健全且运行良好的组织机构；具有独立、稳定经营能力）是向特定对象发行的法定条件之一，BCD均正确。A错误，向特定对象发行仅要求最近1年财务会计报告无虚假记载，而非3年。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_9","q":"A公司当年的公司净利润为6000万元，发行在外的总股数为3000万股，净资产为8000万元，则A公司的每股收益为（）元，股本收益率为（）。","c":{"A":"0.75；75%","B":"0.5；75%","C":"2；75%","D":"0.75；200%"},"a":"C","an":"每股收益等于公司净利润除以发行在外的总股数，股本收益率等于公司净利润除以净资产。","type":"single"},{"id":"cflue_paper_金融基础_1.json_11","q":"下列对于风险转移的说法中，正确的是（）。","c":{"A":"金融机构会借助衍生产品（如期权合约等）作为特殊保单转移利率、汇率、股票和商品价格风险","B":"风险转移可分为保险转移和非保险转移","C":"保险转移是通过向保险公司支付保费的方式，将风险转移给保险公司","D":"非保险转移通常采用担保和备用信用证等方式将风险转移给第三方"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_29","q":"关于优先股，下列说法正确的是（）。","c":{"A":"优先股股息可税前扣除，减轻企业税负","B":"优先股股东享有与普通股股东相同的决策权力","C":"优先股股息收益并不总是高于普通股","D":"优先股二级市场价格波动大，适合投机交易"},"a":"C","an":"优先股收入较稳定适合中长线投资；优先股股息不可税前扣除；优先股股东的经营决策受限；当公司盈利丰厚的情况下，优先股的股息可能会大大低于普通股。","type":"single"},{"id":"cflue_paper_金融基础_1.json_36","q":"证券经纪商在收到客户委托后，应当对下列（）内容进行审查。","c":{"A":"委托卖出的实际证券数量","B":"委托人身份","C":"委托买入的实际证券数量","D":"委托内容"},"a":"ABD","an":"证券经纪商在收到客户委托后，应当对委托人身份、委托内容、委托卖出的实际证券数量和委托买入的实际资金余额进行审查。","type":"multi"},{"id":"cflue_paper_金融基础_1.json_37","q":"公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）","c":{"A":"错","B":"对"},"a":"A","an":"公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。","type":"judge"},{"id":"cflue_paper_金融基础_1.json_39","q":"如果有两个以上申报价格符合集合竞价确定成交价的原则，上海交易所规定的成交价格为（）。","c":{"A":"行情显示的前收盘价格","B":"各个价格的平均价格","C":"使未成交量最小的申报价格","D":"可实现成交价格的最低价格"},"a":"C","an":"集合竞价时，如果有两个以上申报价格符合集合竞价确定成交价的原则，上海证券交易所规定的成交价格为【使未成交量最小的申报价格】。","type":"single"},{"id":"cflue_paper_金融基础_1.json_60","q":"股票的特征包括（）。","c":{"A":"收益性","B":"参与性","C":"流动性","D":"永久性"},"a":"ABCD","an":"股票的特征：收益性、风险性、流动性、永久性、参与性。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_2","q":"沪深300指数是中国证券市场中历史最悠久、数据最完整的成分股指数。（）","c":{"A":"错","B":"对"},"a":"A","an":"【深证成分指数】是中国证券市场中历史最悠久、数据最完整的成分股指数。","type":"judge"},{"id":"cflue_paper_金融基础_2.json_14","q":"首次公开发行股票，网上投资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的20%。（）","c":{"A":"错","B":"对"},"a":"A","an":"网上资者有效申购倍数超过150倍的，回拨后网下发行比例不超过本次公开发行股票数量的10%。","type":"judge"},{"id":"cflue_paper_金融基础_2.json_33","q":"上市公司出现下列描述的情形中，属于可以向证券交易所申请主动退市的有（）。","c":{"A":"上市公司被法院宣告破产","B":"上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销","C":"上市公司股东大会决议主动撤回其股票在证券交易所的交易，并决定不在该交易所交易","D":"上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件"},"a":"BCD","an":"关于主动申请退市的法定情形：1、上市公司股东大会决议主动撤回其股票在本所的交易，并决定不再在交易所交易；2、上市公司股东大会决议主动撤回其股票在本所的交易，并转而申请在其他交易场所交易或转让；3、上市公司向所有股东发出回购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；4、上市公司股东向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；5、除上市公司股东外的其他人向所有股东发出收购全部股份或部分股份的要约，导致公司股本总额、股权分布等发生变化不再具备上市条件；6、上市公司因新设合并或者吸收合并，不再具有独立主体资格并被注销；7、上市公司股东大会决议公司解散。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_37","q":"中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。（）","c":{"A":"错","B":"对"},"a":"B","an":"中证指数有限公司是由上海证券交易所和深圳证券交易所共同出资成立。","type":"judge"},{"id":"cflue_paper_金融基础_2.json_41","q":"无限售条件股份是指流通转让不受限制的股份，具体包括（）。","c":{"A":"境外上市外资股","B":"境内上市外资股","C":"人民币普通股","D":"国有法人股"},"a":"ABC","an":"无限售条件股份是指流通转让不受限制的股份。具体包括：1、人民币普通股，即A股，含向社会公开发行股票时向公司职工配售的公司职工股。2、境内上市外资股，即B股。3、境外上市外资股，即在境外证券市场上市的普通股，如H股。4、其他。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_55","q":"北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。","c":{"A":"最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告","B":"最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）","C":"具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形","D":"最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"},"a":"BCD","an":"根据《北京证券交易所上市公司证券发行注册管理办法》第九条，C（具备健全且运行良好的组织机构；具有独立、稳定经营能力）是向特定对象发行的法定条件之一，BCD均正确。A错误，向特定对象发行仅要求最近1年财务会计报告无虚假记载，而非3年。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_57","q":"深圳证券交易所在确定深证成份指数的深证成份股指数选取样本成分数时一般考虑的因素包括（）。","c":{"A":"交易活跃程度","B":"是否是行业龙头公司","C":"平均可流动股市值","D":"平均总市值"},"a":"ABCD","an":"选取样本时考虑的因素有：&amp;lt;br&amp;gt;1、上市交易日期的长短；&amp;lt;br&amp;gt;2、上市规模，按每家公司一段时期内的平均总市值和平均可流通股市值计；&amp;lt;br&amp;gt;3、交易活跃程度，按每家公司一段时期总成交金额计。样本调整原则：为保证指数的代表性，必须视上市公司的变动更换成份股；&amp;lt;br&amp;gt;4、行业代表性及其成长性；&amp;lt;br&amp;gt;5、公司的财务状况和经营业绩；&amp;lt;br&amp;gt;6、公司近两年的规范运作情况等。","type":"multi"},{"id":"cflue_paper_金融基础_2.json_59","q":"在上市公司增资发行方式中，公司发行可转换债券的主要动因是保护原股东的权益及其对公司的控制权。（）","c":{"A":"错","B":"对"},"a":"A","an":"可转换公司债券是指其持有者可以在一定时期内按一定比例或价格将之转换成一定数量的另一种证券的证券，通常转化为普通股票，公司发行可转换债券的主要动因是为了【增强证券对投资者的吸引力，能以较低的成本筹集到所需要的资金】。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_6","q":"下列关于买卖价差法的说法中，正确的是（）。","c":{"A":"买卖价差是指做市商愿意买入和卖出一项金融工具的价格之差","B":"证券买卖价差是投资收益的重要组成部分，主要包括股票买卖价差和债券买卖价差","C":"买卖价差越大，代表该资产流动性越好，所面临的流动性风险越小","D":"常用的价差指标包括买卖价差、有效价差与实现的价差等"},"a":"ABD","an":"买卖价差【越小】，代表该资产流动性越好，所面临的流动性风险越小，D错误。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_7","q":"A公司目前的资产总额是8000万元，负债总额为3000万元，发行在外的普通股股数是1000万股，无优先股，因此A公司的股票账面价值为（）元。","c":{"A":"11","B":"8","C":"3","D":"5"},"a":"D","an":"每股账面价值等于公司净资产除以发行在外的普通股票的股数。净资产等于公司资产总额减去负债总额后的净值。故，每股账面价值=（8000-3000）/1000=5。","type":"single"},{"id":"cflue_paper_金融基础_3.json_13","q":"核准制是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定的股票发行监管制度。（）","c":{"A":"错","B":"对"},"a":"A","an":"【注册制】的特点是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_21","q":"在上市公司增资发行方式中，公司发行可转换债券的主要动因是保护原股东的权益及其对公司的控制权。（）","c":{"A":"错","B":"对"},"a":"A","an":"可转换公司债券是指其持有者可以在一定时期内按一定比例或价格将之转换成一定数量的另一种证券的证券，通常转化为普通股票，公司发行可转换债券的主要动因是为了【增强证券对投资者的吸引力，能以较低的成本筹集到所需要的资金】。","type":"judge"},{"id":"cflue_paper_金融基础_3.json_39","q":"深圳证券交易所在确定深证成份指数的深证成份股指数选取样本成分数时一般考虑的因素包括（）。","c":{"A":"交易活跃程度","B":"是否是行业龙头公司","C":"平均可流动股市值","D":"平均总市值"},"a":"ABCD","an":"选取样本时考虑的因素有：&amp;lt;br&amp;gt;1、上市交易日期的长短；&amp;lt;br&amp;gt;2、上市规模，按每家公司一段时期内的平均总市值和平均可流通股市值计；&amp;lt;br&amp;gt;3、交易活跃程度，按每家公司一段时期总成交金额计。样本调整原则：为保证指数的代表性，必须视上市公司的变动更换成份股；&amp;lt;br&amp;gt;4、行业代表性及其成长性；&amp;lt;br&amp;gt;5、公司的财务状况和经营业绩；&amp;lt;br&amp;gt;6、公司近两年的规范运作情况等。","type":"multi"},{"id":"cflue_paper_金融基础_3.json_49","q":"由于影响股票价格的因素复杂多变，股票的市场价格呈现出（）的特征。","c":{"A":"复杂性","B":"稳定性","C":"波动性","D":"灵活性"},"a":"C","an":"由于影响股票价格的因素复杂多变，股票的市场价格呈现出高低起伏的【波动性】特征。","type":"single"},{"id":"cflue_paper_金融基础_3.json_58","q":"下列（）股票发行制度直接影响有关参与各方的利益分配。","c":{"A":"发行方式","B":"发行定价","C":"发行监管制度","D":"发行主体"},"a":"A","an":"股票的发行方式直接影响参与各方的利益分配。","type":"single"},{"id":"cflue_paper_金融基础_3.json_59","q":"关于股票的清算价值，下列说法正确的是（）。","c":{"A":"公司清算时每一股份所代表的实际价值","B":"公司破产清算时，其发行的股票的交易价值","C":"股票清仓时，股票所能获得的出售价值","D":"股票的清算价值应与账面价值相等"},"a":"A","an":"股票的清算价值是公司清算时每一股份所代表的实际价值。从理论上说，股票的清算价值应与账面价值一致，实际上并非如此。只有当清算时公司资产实际出售价款与财务报表上的账面价值一致时，每一股份的清算价值才与账面价值一致。但在公司清算时，其资产往往只能压低价格出售，再加上必要的清算费用，所以大多数公司的实际清算价值低于其账面价值。","type":"single"},{"id":"cflue_paper_金融基础_4.json_5","q":"首次公开发行股票采用询价方式定价的说法中，错误的是（）。","c":{"A":"网下投资者不得协商报价","B":"网下机构和个人投资者可以自主决定是否报价","C":"网下投资者的报价应当包含每股价格和该价格对应的拟申购股数","D":"网下投资者应当给出三个不同报价供主承销商参考"},"a":"D","an":"B选项说法错误，网下投资者只能有一个报价。","type":"single"},{"id":"cflue_paper_金融基础_4.json_6","q":"某公司拟上市发行股票，已知股票每股面额为1元，按照我国《公司法》要求，该公司的股票发行价格可以是（）。","c":{"A":"1元","B":"5.4元","C":"20元","D":"0.5元"},"a":"ABC","an":"我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_17","q":"一般而言，下列选项中，信用风险最高的是（）。","c":{"A":"公司债券","B":"地方政府债券","C":"金融债券","D":"国债"},"a":"A","an":"一般来说，公司债券的信用风险大于金融债券的风险，金融债券的信用风险大于政府债券。","type":"single"},{"id":"cflue_paper_金融基础_4.json_22","q":"核准制是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定的股票发行监管制度。（）","c":{"A":"错","B":"对"},"a":"A","an":"【注册制】的特点是证券监管机构对申报文件的真实性、准确性、完整性和及时性做合规性的形式审查，而将发行人的质量留给证券中介机构来判断和决定。","type":"judge"},{"id":"cflue_paper_金融基础_4.json_29","q":"证券服务机构为证券的发行、上市、交易等证券业务活动提供相关服务时，应当勤勉尽职，对所依据的文件资料内容的真实性、准确性、完整性进行核查和验证。证券服务机构提供的相关服务主要有制作、出具（）。","c":{"A":"资产评估报告","B":"财务顾问报告","C":"法律意见书","D":"审计报告"},"a":"ABCD","an":"证券服务机构为证券的发行、上市、交易等证券业务活动制作、出具【审计报告、资产评估报告、财务顾问报告、资信评级报告或者法律意见书】等文件，应当勤勉尽责，对所依据的文件资料内容的真实性、准确性、完整性进行核査和验证。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_42","q":"做市商制度的特点有（）。","c":{"A":"证券交易价格由买方和卖方的力量直接决定","B":"校正买卖指令不均衡现象","C":"提高流动性，增强市场吸引力","D":"有效稳定市场，促进市场平衡运行"},"a":"BCD","an":"在做市商制度下，证券市场的交易价格是由做市商进行双向报价而产生，不是由卖方和买方的力量直接决定，C错误。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_47","q":"股票实质上代表了股东对股份公司净资产的所有权，股东凭借股票可以获得公司的（）。","c":{"A":"等额资金","B":"红利","C":"股息","D":"等额资本"},"a":"BC","an":"股票实质上代表了股东对股份公司净资产的所有权，这种所有权是一种综合权利，股东凭借股票可以获得公司的【股息和红利】，参加股东大会并行使自己投票表决、参与公司重大决策等权利，同时也承担相应的责任与风险。故BC正确。","type":"multi"},{"id":"cflue_paper_金融基础_4.json_60","q":"下列选项中，应当由保荐机构推荐的有（）。","c":{"A":"申请上市后公开发行新股","B":"申请可转换公司债券上市","C":"公司股票被暂停上市后申请恢复上市","D":"申请首次公开发行的股票"},"a":"ABD","an":"发行人应当就下列事项聘请具有保荐机构资格的证券公司履行保荐职责：（1）首次公开发行股票并上市；（2）上市公司发行新股、可转换公司债券；（3）中国证监会认定的其他情形。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_2","q":"代销期满，原股东认购股票的数量未达到拟配售数量的比例为65%时，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。（）","c":{"A":"错","B":"对"},"a":"A","an":"代销期满，原股东认购股票的数量未达到拟配售数量的比例【70%】的，发行人应当按照发行价加算银行同期利息返还给已经认购的股东。","type":"judge"},{"id":"cflue_paper_金融基础_5.json_7","q":"北京证券交易所上市公司向特定对象发行股票，应当符合的规定有（）。","c":{"A":"最近3年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告","B":"最近1年财务会计报告被出具保留意见的审计报告，保留意见所涉及事项对上市公司的重大不利影响已经消除（本次发行涉及重大资产重组的除外）","C":"具备健全且运行良好的组织机构；具有独立、稳定经营能力，不存在对持续经营有重大不利影响的情形","D":"最近1年财务会计报告无虚假记载，未被出具否定意见或无法表示意见的审计报告"},"a":"BCD","an":"根据《北京证券交易所上市公司证券发行注册管理办法》第九条，C（具备健全且运行良好的组织机构；具有独立、稳定经营能力）是向特定对象发行的法定条件之一，BCD均正确。A错误，向特定对象发行仅要求最近1年财务会计报告无虚假记载，而非3年。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_18","q":"关于普通股股东义务，下列说法正确的有（）。","c":{"A":"如违反相关规定，给公司造成损失的，应当承担赔偿责任","B":"公司的控股股东、实际控制人不得利用其关联关系损害公司利益","C":"公司股东滥用法人独立地位和股东有限责任逃避责任，严重损害公司债权人利益的，应当对公司债务承担连带责任","D":"公司股东滥用股东权利给公司或者其他股东造成损失的，可以申请豁免承担赔偿责任"},"a":"ABC","an":"股东应当遵守法律、行政法规和公司章程，依法行使股东权利，不得滥用股东权利损害公司或者其他股东的利益；不得滥用公司法人独立地位和股东有限责任损害公司债权人的利益。公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。公司股东滥用公司法人独立地位和股东有限责任，逃避债务，严重损害公司债权人利益的，应当对公司债务承担连带责任。公司的控股股东、实际控制人不得利用其关联关系损害公司利益，由此给公司造成损失的，应当承担赔偿责任。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_19","q":"下列关于证券委托的说法，正确的有（）。","c":{"A":"柜台委托需由本人填写委托单并签章","B":"柜台委托必须由委托人亲自到证券营业部交易柜台办理","C":"证券委托可以分为柜台委托和非柜台委托两大类","D":"客户在办理委托买卖证券时，需要向证券经纪商下达委托指令"},"a":"ACD","an":"柜台委托是指委托人亲自或由其【代理人】到证券营业部交易柜台，根据委托程序和必需的证件采用书面方式表达委托意向，由本人填写委托单并签章的形式，C错误，故选ABD。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_47","q":"下列事项中，可用于分析公司经营状况好坏的因素有（）。","c":{"A":"公司并购重组","B":"公司财务状况","C":"公司治理水平与管理层质量","D":"公司竞争力"},"a":"ABCD","an":"分析公司经营状况的因素包括：1、公司治理水平与管理层质量；2、公司竞争力；3、财务状况；4、公司并购重组。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_52","q":"某公司拟上市发行股票，已知股票每股面额为1元，按照我国《公司法》要求，该公司的股票发行价格可以是（）。","c":{"A":"1元","B":"5.4元","C":"20元","D":"0.5元"},"a":"ABC","an":"我国《公司法》规定，股票发行价格可以按票面金额，也可以超过票面金额，但不得低于票面金额。","type":"multi"},{"id":"cflue_paper_金融基础_5.json_56","q":"下列股票能被选入沪深300指数的有（）。","c":{"A":"丁股票为主板上市股票，由于连年亏损被认定为ST股票，但从近期季度财务报告来看，本年有望扭亏为盈。","B":"丙股票为主板上市的蓝筹股，但是由于政策影响，近期涨势低迷","C":"甲股票是创业板股票，虽总市值不高，但是涨势良好","D":"乙股票为主板上市股票，由于年度报告未及时披露等问题，被暂停上市"},"a":"B","an":"沪深300指数是由沪深A股中规模大、流动性好、最具代表性的300只股票组成，不能是创业板股票，除非该股票上市以来日均A股总市值在全部沪深A股（非创业板股票）中排在前30位；也不能是ST、*ST股票和暂停上市股票。","type":"single"},{"id":"cflue_paper_金融基础_5.json_57","q":"公司因业务发展需要增加资本额而发行新股，会使公司的股票价格下跌。（）","c":{"A":"错","B":"对"},"a":"A","an":"公司因业务发展斋要增加资本额而发行新股，对不同公司的影响不尽相同。在没有产生相应效益前，增资可能使每股净资产下降，进而可能促使股价下跌。但对那些业绩优良、财务结构健全、具有发展潜力的公司而言，增资会增加公司经营实力，给股东带来更多回报，使得股价上涨。","type":"judge"},{"id":"cflue_paper_金融基础_5.json_60","q":"上市公司发生下列（）情形，应当被强制退市。","c":{"A":"法定期限届满后，上市公司在证券交易所规定的期限内未能披露半年度报告","B":"上市公司在证券交易所规定期限内，未改正财务会计报告中的重大错报","C":"上市公司社会公众持股比例不足25%，或者公司股本总额超过人民币4亿元，社会公众持股比例不足公司股份总数的10%","D":"上市公司连续10个交易日（不含停牌交易日）每日股票收盘价均低于股票面值"},"a":"ABC","an":"上市公司发生被强制退市的情形。上市公司连续【20个交易日】（不含停牌交易日）每日股票收盘价均低于股票面值，会被强制退市。","type":"multi"},{"id":"xs_4781230","q":"有限售条件股份包括（）。Ⅰ.其他内资持股Ⅱ.国有法人持股Ⅲ.外资持股Ⅳ.国家持股","c":{"A":"Ⅰ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781231","q":"我国境内居民个人可以用（）从事B股交易。Ⅰ.外币现钞Ⅱ.外币现钞存款Ⅲ.从境外汇入的外汇资金Ⅳ.外汇现汇存款","c":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅲ、Ⅳ","C":"Ⅰ、Ⅱ、Ⅳ","D":"Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781232","q":"我国《证券法》规定，股份有限公司申请股票上市的条件包括（）。Ⅰ.向社会公开发行的股份达到公司股份总数的25%以上Ⅱ.向社会公开发行的股份达到公司股份总额的15%以上Ⅲ.公司股本总额超过人民币4亿元的，向社会公开发行股份比例为10%以上Ⅳ.公司股本总额超过人民币4亿元的，向社会公开发行股份比例为15%以上","c":{"A":"Ⅰ、Ⅳ","B":"Ⅱ、Ⅲ","C":"Ⅱ、Ⅳ","D":"Ⅰ、Ⅲ"},"a":"D","an":"","type":"single"},{"id":"xs_4781233","q":"下列有关国有股权界定的表述，正确的有（）。Ⅰ.国家授权投资的机构或部门直接向新设成立的股份公司投资形成的股份界定为国家股Ⅱ.有权代表国家投资的机构或部门直接设立的国有企业以其部分资产（连同部分负债）改建为股份公司的界定为国家股Ⅲ.国有企业（行业性总公司和具有政府行政管理职的公司除外）或国有企业（集团公司）的全资子企业（子公司）和控股子企业（控股子公司），以其依法占用的法人资产直接向新设立的股份公司投资入股形成的股份，界定为国有法人股Ⅳ.有权代表国家投资的机构或部门直接设立的国有企业以其全部资产改建为股份有限公司的，原企业应予撤销，原企业的国家净资产折成的股份界定为国家股","c":{"A":"Ⅰ、Ⅲ","B":"Ⅰ、Ⅱ、Ⅳ","C":"Ⅱ、Ⅲ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅳ"},"a":"D","an":"","type":"single"},{"id":"xs_4781234","q":"按照股息在当年未能足额分派时，能否在以后年度补发为依据，优先股可分为（）。Ⅰ.不可赎回优先股Ⅱ.非累积优先股Ⅲ.累积优先股Ⅳ.可赎回优先股","c":{"A":"Ⅰ、Ⅳ","B":"Ⅱ、Ⅲ","C":"Ⅰ、Ⅱ","D":"Ⅱ、Ⅳ"},"a":"B","an":"","type":"single"},{"id":"comp_44201","q":"根据《证券法》，该公司公开发行新股需要满足的条件包括（）。","c":{"A":"具备健全且运行良好的组织机构","B":"最近3年财务会计报告被出具无保留意见审计报告","C":"最近3年累计向原股东配股数量不超过股本总额的30%","D":"具有持续经营能力"},"a":"ABD","an":"根据《证券法》规定，公开发行新股的条件包括：（1）具备健全且运行良好的组织机构；（2）具有持续经营能力；（3）最近3年财务会计报告被出具无保留意见审计报告；（4）发行人及其控股股东、实际控制人最近3年不存在贪污、贿赂等刑事犯罪。选项C是关于配股的限制，不是公开发行新股的法定条件。","type":"comprehensive","material":"某上市公司拟公开发行新股募集资金。公司当前总股本10亿股，拟公开发行3亿股。该公司最近3年连续盈利，财务状况良好，符合公开发行条件。发行价格由主承销商通过询价方式确定。","sub_type":"multi"},{"id":"comp_04331","q":"关于股票发行的询价制度，下列说法正确的有（）。","c":{"A":"首次公开发行股票应当通过向特定机构投资者询价的方式确定发行价格","B":"主承销商可以向其管理的资产管理产品配售股票","C":"发行人和主承销商应当事先确定发行方案","D":"所有投资者都可以参与询价"},"a":"AC","an":"选项B错误：主承销商不得向其管理的资产管理产品配售股票，防止利益输送。选项D错误：只有符合条件的专业机构投资者可以参与询价，不是所有投资者。","type":"comprehensive","material":"某上市公司拟公开发行新股募集资金。公司当前总股本10亿股，拟公开发行3亿股。该公司最近3年连续盈利，财务状况良好，符合公开发行条件。发行价格由主承销商通过询价方式确定。","sub_type":"multi"},{"id":"comp_96530","q":"该投资者的持有期收益率约为（）。","c":{"A":"20%","B":"23%","C":"3%","D":"15%"},"a":"B","an":"持有期收益率 = [（卖出价 - 买入价）+ 持有期现金股利] / 买入价 × 100% = [（12-10）+ 0.3] / 10 × 100% = 2.3/10 × 100% = 23%。注意这里计算的是绝对收益率，未年化。","type":"comprehensive","material":"某投资者以每股10元的价格买入某股票1000股，半年后以每股12元的价格全部卖出。持有期间该股票每股分红0.3元。同期上证指数上涨5%。","sub_type":"single"},{"id":"comp_36944","q":"某公司当前股价20元，每股收益1元，每股净资产10元，该公司的市盈率是（）。","c":{"A":"20倍","B":"10倍","C":"2倍","D":"30倍"},"a":"A","an":"市盈率（P/E）= 股价 / 每股收益 = 20 / 1 = 20倍。市净率（P/B）= 股价 / 每股净资产 = 20 / 10 = 2倍。两者都是常用的相对估值指标，但含义不同。","type":"comprehensive","material":"股票估值是投资者判断股票价值的重要方法。常见的估值方法包括市盈率（P/E）法、市净率（P/B）法、股利贴现模型（DDM）和自由现金流贴现模型（DCF）等。","sub_type":"single"},{"id":"cflue_zc_ch5a.json_1","q":"下列关于流通国债的特征，说法错误的是（）。","c":{"A":"转让价格取决于对该国债的供给与需求","B":"通常记名","C":"投资者可以自由认购","D":"投资者可以自由转让"},"a":"B","an":"流通国债的特征有：投资者可以自由认购、自由转让、通常不记名、转让价格取决于对该国债的供给与需求。","type":"single"},{"id":"cflue_zc_ch5a.json_2","q":"下列关于外国债券的说法，正确的是（）。","c":{"A":"它的特点是债券发行人和面值货币属于同一个国家","B":"在英国发行以英镑计价的外国债券被称为“扬基债券”","C":"在中国发行的以人民币计价的外国债券被称为“熊猫债券”","D":"是借款人在本国以外的某一国家发行以本国货币为面值的债券"},"a":"C","an":"外国债券是指某一国家借款人在本国以外的某一国家发行以该国货币为面值的债券。它的特点是债券发行人属于一个国家，债券的面值货币和发行市场属于另一个国家。如在英国发行以英镑计价的外国债券被称为“猛犬债券”。","type":"single"},{"id":"cflue_zc_ch5a.json_3","q":"下列关于债券的说法，错误的是（）。","c":{"A":"实物债券是一种具有标准格式实物券面的债券","B":"凭证式债券是由债券发行人制定的标准格式的债券","C":"我国的凭证式国债券面上不印刷票面金额","D":"发行人可以利用证券交易所的交易系统发行记账式债券"},"a":"B","an":"凭证式债券的形式是债权人认购债券的一种收款凭证，而不是债券发行人制定的标准格式的债券。故A说法错误。","type":"single"},{"id":"cflue_zc_ch5a.json_4","q":"（）是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。","c":{"A":"商业银行金融债券","B":"商业银行一般债券","C":"商业银行次级债券","D":"商业银行资本补充债券"},"a":"D","an":"【商业银行资本补充债券】是指银行业金融机构为满足资本监管要求而发行的、对特定触发事件下债券偿付事宜作出约定的金融债券，包括但不限于无固定期限资本债券和二级资本债券。","type":"single"},{"id":"cflue_zc_ch5a.json_5","q":"关于储蓄国债（电子式）的说法中，错误的是（）","c":{"A":"收益安全稳定，由财政部负责还本付息，免缴利息税","B":"付息方式较为多样","C":"采用实名制，不可流通转让","D":"针对个人投资者，同时也向机构投资者发行"},"a":"D","an":"储蓄国债（电子式）是2006年推出的国债新品种，其特点：针对个人投资者，不向机构投资者发行；采用实名制，不可流通转让；收益安全稳定，由财政部负责还本付息，免缴利息税；鼓励持有到期，手续简化；付息方式较为多样","type":"single"},{"id":"cflue_zc_ch5a.json_6","q":"下列属于金融债券品种的有（）。","c":{"A":"证券公司债券","B":"政策性金融债券","C":"保险公司次级债","D":"商业银行债券"},"a":"ABCD","an":"我国金融债券品种包括：政策性金融债券、商业银行债券、证券公司债券、保险公司次级债务、财务公司债券、金融租赁公司和汽车金融公司的金融债券。","type":"multi"},{"id":"cflue_zc_ch5a.json_7","q":"债券与股票的不同之处包括（）。","c":{"A":"期限不同","B":"收益不同","C":"目的不同","D":"权利不同"},"a":"ABCD","an":"债券与股票的区别：权利不同；目的不同；主体不同；期限不同；收益不同；风险不同。","type":"multi"},{"id":"cflue_zc_ch5a.json_8","q":"资产证券化运作流程中，发起人的职责不包括（）。","c":{"A":"根据证券化目标确定资产数，并将资产汇集形成资产池","B":"判断组合的现金流水平，并决定借款人信用、抵押担保贷款的抵押价值","C":"根据自身的资产证券化融资要求，确定资产证券化目标","D":"与银行达成必要时提供流动性支持的周转协议，与券商达成承销协议"},"a":"D","an":"发起人（一般是发放贷款的金融机构，也被称为原始权益人）根据自身的资产证券化融资要求，确定资产证券化目标，对自己拥有的能够产生未来现金收入流的信贷资产进行清理、估算和考核，根据历史经验数据对整个组合的现金流的平均水平有一个基本判断，决定借款人信用、抵押担保贷款的抵押价值等；并将应收和可预见现金流资产进行组合，对现金流的重组可按贷款的期限结构、本金和利息的重新安排或风险的重新分配等进行，根据证券化目标确定资产数，最后将这些资产汇集形成一个资产池。C选项是特设信托机构的职责。","type":"single"},{"id":"cflue_zc_ch5a.json_9","q":"下列关于欧洲债券的说法中有误的是（）。","c":{"A":"大多数欧洲债券是以美元为面值发行的","B":"欧洲债券不可以在欧洲以外的国家发行","C":"由于这种发行方式最早出现在欧洲，故被称为欧洲债券","D":"指在本国境外市场发行的、不以发行市场所在国货币为面值的国际债券"},"a":"B","an":"欧洲债券可以在欧洲以外的国家发行，同时其发行面值也可以以欧元之外的其他货币来表示。","type":"single"},{"id":"cflue_zc_ch5a.json_10","q":"根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为（）。","c":{"A":"离岸资产证券化","B":"在岸资产证券化","C":"境内资产证券化","D":"境外资产证券化"},"a":"AC","an":"根据资产证券化发起人、发行人和投资者所属地域不同，可将资产证券化划分为境内资产证券化和离岸资产证券化。","type":"multi"},{"id":"cflue_zc_ch5a.json_11","q":"下列关于证券公司债券的说法，正确的有（）。","c":{"A":"非公开发行的公司债券仅限于合格投资者范围内转让","B":"非公开发行的证券公司债券，每次发行对象不得超过二百人","C":"对证券公司债券发行有强制性担保要求","D":"证券公司债券公开发行的利率由询价或公开招标等市场化方式确定"},"a":"ABD","an":"对证券公司债券发行没有强制性担保要求，D错误。","type":"multi"},{"id":"cflue_zc_ch5a.json_12","q":"下列关于国债按资金用途分类，说法正确的有（）。","c":{"A":"特种国债是指政府为了实施某种特殊政策而发行的国债","B":"战争国债专指用于弥补战争费用的国债","C":"建设国债是指发债筹措的资金用于建设项目的国债","D":"赤字国债是指用于弥补政府预算赤字的国债"},"a":"ABCD","an":"略。","type":"multi"},{"id":"cflue_zc_ch5a.json_13","q":"小王报名参加了今年的证券从业资格考试，在复习《金融市场基础知识》的时候，对政府债券的有关知识出现了疑惑。请帮他选出下列有关政府债券的说法中，不正确的说法是（）。","c":{"A":"国债的利息收入可免纳个人所得税","B":"在各类债券中，政府债券的信用等级并非最高","C":"购买政府债券，是一种较安全的投资选择","D":"发达的二级市场为政府债券的转让提供了方便，使其流通性大大增强"},"a":"B","an":"在各类债券中，政府债券的信用等级是最高的。","type":"single"},{"id":"cflue_zc_ch5a.json_14","q":"根据付息方式不同，国债可分为（）。","c":{"A":"特种国债","B":"长期国债","C":"附息国债","D":"贴现国债"},"a":"CD","an":"按付息方式分类，国债分为贴现国债和附息国债。","type":"multi"},{"id":"cflue_zc_ch5a.json_15","q":"根据我国财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的，约定一定期限内主要以（）还本付息的政府债券。","c":{"A":"中央政府收入","B":"专项收入","C":"金融机构收入","D":"政府性基金"},"a":"BD","an":"根据财政部《地方政府专项债券发行管理暂行办法》，地方政府专项债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为有一定收益的公益性项目发行的、约定一定期限内以公益性项目对应的【政府性基金或专项收入】还本付息的政府债券。","type":"multi"},{"id":"cflue_zc_ch5a.json_16","q":"地方政府债券按资金用途和偿还资金来源不同可以分为普通债券、特种债券。（）","c":{"A":"错","B":"对"},"a":"A","an":"地方政府债券按资金用途和偿还资金来源不同，通常可以分为一般债券（普通债券）和专项债券（收入债券）。","type":"judge"},{"id":"cflue_zc_ch5a.json_17","q":"按信用状况，债券可以分为（）和（）。","c":{"A":"企业债；政府债","B":"普通公司债；可转换公司债","C":"国债；地方政府债","D":"利率债；信用债"},"a":"D","an":"按信用状况，债券可以分为利率债和信用债，在我国，狭义的利率债包括国债和地方政府债券。","type":"single"},{"id":"cflue_zc_ch5a.json_18","q":"规定了票面利率、在到期时一次性获得本息、存续期间没有利息支付的债券，称之为附息债券。（）","c":{"A":"错","B":"对"},"a":"A","an":"根据债券发行条款中是否规定在约定期限向债券持有人支付利息，债券可分为贴现债券、附息债券、息票累积债券三类。其中，息票累积债券规定了票面利率，但是，债券持有人必须在债券到期时一次性获得本息，存续期间没有利息支付。","type":"judge"},{"id":"cflue_zc_ch5a.json_19","q":"可交换债券与可转换公司债券的相同之处有（）。","c":{"A":"投资价值与上市公司价值无关","B":"发行要素相似","C":"都包括票面利率、期限、转股价格和转股比率、转股期限等","D":"在约定期限内都可以以约定的价格交换为标的股票"},"a":"BCD","an":"对投资者来说，可交换债券与持有标的上市公司的可转换公司债券相同，投资价值与上市公司价值相关，在约定期限内可以以约定的价格交换为标的的股票。","type":"multi"},{"id":"cflue_zc_ch5a.json_20","q":"与国内债券相比，国际债券具有（）等特点。","c":{"A":"发行规模大","B":"存在汇率风险","C":"存在信用风险","D":"资金来源广"},"a":"ABD","an":"与国内债券相比，国际债券具有：&amp;lt;br&amp;gt;1、资金来源广、发行规模大；&amp;lt;br&amp;gt;2、存在汇率风险；&amp;lt;br&amp;gt;3、有国家主权保障；&amp;lt;br&amp;gt;4、以自由兑换货币作为计量货币。","type":"multi"},{"id":"cflue_zc_ch5a.json_21","q":"以下（）不是我国其他类型国债的种类。","c":{"A":"保值债券","B":"普通债券","C":"财政债券","D":"国家重点建设债券"},"a":"B","an":"我国其他类型国债的种类有：国家重点建设债券、国家建设债券、财政债券、特种债券、保值债券、基本建设债券、特别国债、长期建设国债。","type":"single"},{"id":"cflue_zc_ch5a.json_22","q":"传统的证券发行是以企业为基础，而资产证券化是以特定的资产池为基础发行证券。（）","c":{"A":"错","B":"对"},"a":"B","an":"资产证券化是以【特定资产组合或特定现金流】为支持，发行可交易证券的一种融资形式。传统的证券发行是以【企业】为基础，而资产证券化是以【特定的资产池】为基础发行证券。","type":"judge"},{"id":"cflue_zc_ch5a.json_23","q":"有关私募债券的发行对象，说法有误的是（）。","c":{"A":"私募债券募集对象为有限数量的专业投资机构","B":"私募公司债的发行对象为合格投资者","C":"私募债券可以采取公开制度向合格投资者发行债券","D":"私募公司债每次发行对象不得超过200人"},"a":"C","an":"私募债券采取【非公开制度】向合格投资者发行债券。","type":"single"},{"id":"cflue_zc_ch5a.json_24","q":"通常，零息债券以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。（）","c":{"A":"错","B":"对"},"a":"B","an":"根据债券发行条款中是否规定在约定期限向债券持有入支付利息，债券可分为零息债券、附息债券和息票累积债券。其中，【零息债券】以低于面值的价格发行和交易，债券持有人实际上是以买卖（到期赎回）价差的方式取得债券利息。","type":"judge"},{"id":"cflue_zc_ch5a.json_25","q":"下列关于债券的说法，正确的有（）。","c":{"A":"零息债券发行价高于票面面值","B":"债券估值的基本原理就是现金流贴现","C":"附息债券可以视为一组零息债券的组合","D":"累息债券可以视为面值等于到期还本付息额的零息债券"},"a":"BCD","an":"零息债券发行价【低于】票面面值，B错误。","type":"multi"},{"id":"cflue_zc_ch5a.json_26","q":"地方政府债券是地方政府根据本地区（）状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。","c":{"A":"财政预算","B":"经济发展","C":"社会保障","D":"资金需求"},"a":"BD","an":"地方政府根据本地区【经济发展和资金需求】状况，以承担还本付息责任为前提，向社会筹集资金的债务凭证。","type":"multi"},{"id":"cflue_zc_ch5a.json_27","q":"关于利率债和信用债，下列说法有误的是（）。","c":{"A":"信用债券与政府债券相比最显著的差异是发行期限不同","B":"信用债比国债有着更高的收益","C":"正常情况下，利率债的信用风险较大","D":"利率债可能出现本息兑付延期乃至实质性违约的情况"},"a":"AC","an":"由于有政府信用背书，正常情况下利率债的信用风险很小，但不一定对于信用违约绝对“免疫”，也可能出现本息兑付延期乃至实质性违约的情况。信用债券与政府债券相比最显著的差异就是存在信用风险。","type":"multi"},{"id":"cflue_zc_ch5a.json_28","q":"按发行主体分类，债券可以分为（）。","c":{"A":"零息债券、附息债券和息票累积债券","B":"实物债券、凭证式债券和记账式债券","C":"短期债券、中期债券和长期债券","D":"政府债券、金融债券和公司债券"},"a":"D","an":"债券种类很多，依据不同的标准有不同分类。按发行主体，债券可以分为政府债券、金融债券和公司债券；按付息方式，债券可以分为零息债券、附息债券和息票累积债券；按债券形态，债券可以分为实物债券、凭证式债券和记账式债券；按期限长短，债券可以分为短期债券、中期债券和长期债券。","type":"single"},{"id":"cflue_zc_ch5a.json_29","q":"地方政府一般债券的发行主体可以有（）。","c":{"A":"自治区政府","B":"直辖市政府","C":"省政府","D":"县级政府"},"a":"ABC","an":"地方政府一般债券是指省、自治区、直辖市政府（含经省级政府批准自办债券发行的计划单列市政府）为没有收益的公益性项目发行的、约定一定期限内主要以一般公共预算收入还本付息的政府债券。","type":"multi"},{"id":"cflue_zc_ch5a.json_30","q":"关于可交换公司债券与可转换公司债券的不同之处包括（）。","c":{"A":"参与主体不同","B":"交割方式不同","C":"适用的法规不同","D":"条款设置不同"},"a":"ABCD","an":"可交换公司债券与可转换公司债券的不同之处有：发债主体和偿债主体不同、适用的法规不同、发行目的不同、所换股份的来源不同、股权稀释效应不同、交割方式不同、条款设置不同。","type":"multi"},{"id":"cflue_zc_ch5a.json_31","q":"从基本性质上理解，债券属于（）。","c":{"A":"商品证券","B":"虚拟资本","C":"证权证券","D":"有价证券"},"a":"BCD","an":"债券有以下基本性质：①债券属于有价证券；②债券是一种虚拟资本；③债券是债权（证权）的表现。债券代表债券投资者的权利，这种权利不是直接支配财产权，也不以资产所有权表现，而是一种债权。","type":"multi"},{"id":"cflue_zc_ch5a.json_32","q":"企业资产证券化的基础资产可以有（）。","c":{"A":"棚户区改造","B":"租赁资产","C":"基础设施收费权","D":"小额贷款"},"a":"ABCD","an":"企业资产证券化的基础资产可以有BT/BOT债权、基础设施收费权、棚户区改造、入园凭证收费、小额贷款、租赁资产等。","type":"multi"},{"id":"cflue_zc_ch5a.json_33","q":"关于公司债券的分类，下列说法正确的有（）。","c":{"A":"按是否记名分为记名公司债券和不记名公司债券","B":"按内含选择权的不同分为可转换公司债券、附认股权证的公司债券、可交换公司债券","C":"按担保抵押情况分为信用债券、不动产抵押公司债券","D":"按付息方式不同分为普通公司债券和收益公司债券"},"a":"ABD","an":"按不同的标准，公司债券可以划分为很多种类。按担保抵押情况分为信用债券、不动产抵押公司债券、保证公司债券。A错误。","type":"multi"},{"id":"cflue_zc_ch5a.json_34","q":"记账式国债交易手续繁琐。（）","c":{"A":"错","B":"对"},"a":"A","an":"记账式国债可以记名、挂失，安全性较高，同时由于记账式债券的发行和交易均无纸化，所以发行时间短，发行效率高，【交易手续简便】，成本低，交易安全。","type":"judge"},{"id":"cflue_zc_ch5a.json_35","q":"下列关于中央银行票据的说法，有误的是（）。","c":{"A":"中央银行票据实质是中央银行债券","B":"期限通常在6个月到3年","C":"发行它的目的主要是进行对冲操作，回收外汇占款所投放的基础货币","D":"具有短期性的特点"},"a":"B","an":"中央银行票据的期限通常在3个月到3年。","type":"single"},{"id":"cflue_zc_ch5b.json_1","q":"下列关于债券价值的说法，错误的是（）。","c":{"A":"付息间隔越短的债券，风险相对越小","B":"债券条款中包含发行人提前赎回权不会影响债券价值","C":"短期债券一般到期一次性还本，因此要折价交易","D":"免税债券与可比的纳税债券相比价值更大"},"a":"B","an":"凡是有利于发行人的条款都会相应降低债券价值；反之，有利于持有人的条款则会提高债券价值。","type":"single"},{"id":"cflue_zc_ch5b.json_2","q":"银行业金融机构发行资本补充债券，应满足的条件不包括（）。","c":{"A":"偿债能力良好，且成立满一年","B":"具有完善的公司治理机制","C":"经营稳健，资产结构符合行业特征","D":"遵守国家产业政策和信贷政策"},"a":"A","an":"根据中国人民银行2018年第3号公告，银行业金融机构发行资本补充债券，应满足以下条件：具有完善的公司治理机制；偿债能力良好，且成立满【三年】；经营稳健，资产结构符合行业特征，以服务实体经济为导向，遵守国家产业政策和信贷政策；满足宏观审慎管理要求，且主要金融监管指标符合监管部门的有关规定。","type":"single"},{"id":"cflue_zc_ch5b.json_3","q":"一般来说，具有高度流动性的债券同时也是较安全的，因为它不仅可以迅速地转换为货币，还可以按一个较稳定的价格转换。关于债券不能收回投资的风险的说法有误的是（）。","c":{"A":"政府债券不履行债务的风险较高","B":"不同的债务人不履行债务的风险程度是不一样的","C":"债务人不履行债务导致债券不能收回投资","D":"市场利率水平影响债券的转让价格"},"a":"A","an":"一般来说，政府债券不履行债务的风险最低，D说法错误。","type":"single"},{"id":"cflue_zc_ch5b.json_4","q":"下列关于债券贴现率的说法，正确的有（）。","c":{"A":"信用债的风险溢价一般比浮动利率债的风险溢价低","B":"债券贴现率是投资者对债券要求的最低回报率","C":"一般用相同期限零息国债的到期收益率来近似表示名义无风险收益率","D":"债券必要回报率=真实无风险收益率+预期通货膨胀率+风险溢价"},"a":"BCD","an":"信用债的风险溢价一般比浮动利率债的风险溢价高，D错误。","type":"multi"},{"id":"cflue_zc_ch5b.json_5","q":"证券公司发行短期融资券实行余额管理，待偿还短期融资券余额不超过净资本的（），在此范围内，证券公司自主确定每期短期融资券的发行规模。","c":{"A":"50%","B":"70%","C":"40%","D":"60%"},"a":"D","an":"证券公司发行短期融资券实行余额管理，待偿还短期融资券余额不超过净资本的60%，在此范围内，证券公司自主确定每期短期融资券的发行规模。","type":"single"},{"id":"cflue_zc_ch5b.json_6","q":"2018年3月6日，某年息5%、面值100元、每半年付息1次的1年期债券，上次付息为2017年12月31日。如市场净价报价为97元，按30/180计算，实际支付价格为（）元。","c":{"A":"97.9","B":"98.05","C":"97.88","D":"97.51"},"a":"A","an":"30/180即每半年付息1次，按每月30天计算。累计天数（算头不算尾）=30天（1月）+30天（2月）+5天（3月）=65天。累计利息=100×5%÷2×65/180≈0.9。实际支付价格=97+0.9=97.90（元）。","type":"single"},{"id":"cflue_zc_ch5b.json_7","q":"影响债券现金流的因素包括（）。","c":{"A":"计付息间隔","B":"债券的税收待遇","C":"票面利率","D":"债券的嵌入式期权条款"},"a":"ABCD","an":"债券发行条款规定了债券的现金流，具体包括：①债券的面值和票面利率；②计付息间隔；③债券的嵌入式期权条款；④债券的税收待遇；⑤其他因素。","type":"multi"},{"id":"cflue_zc_ch5b.json_8","q":"在面向机构投资者非公开发行项目收益债券时，需要满足的要求有（）。","c":{"A":"单笔认购不少于500万元人民币","B":"所募集的资金可以用来置换项目资本金或偿还与项目有关的其他债务","C":"债项评级达AAA级以上","D":"每次发行时认购的机构投资者不超过200人"},"a":"AD","an":"非公开发行的项目收益债券的债项评级达【AA级】以上。所募集的资金【不可以】用来置换项目资本金或偿还与项目有关的其他债务。","type":"multi"},{"id":"cflue_zc_ch5b.json_9","q":"2011年1月1日，中国人民银行发行1年期零息债券，每张面值为100元人民币。年贴现率为4%，则在2011年6月30日，其理论价格为（）元。","c":{"A":"95.13","B":"94.89","C":"98.04","D":"96.15"},"a":"C","an":"理论价格=100/（1+4%）^0.5=98.04（元）。","type":"single"},{"id":"cflue_zc_ch5b.json_10","q":"公司债券的发行申报在中国证监会收到申请文件后，（）个工作日内决定是否受理。","c":{"A":"10","B":"7","C":"5","D":"3"},"a":"C","an":"我国公司债券和企业债券在发行申报程序方面的不同之处。公司债券的发行申报在中国证监会收到申请文件后，5个工作日内决定是否受理。","type":"single"},{"id":"cflue_zc_ch5b.json_11","q":"在债券的以收益率为标的的美式招标发行方式中，各中标者（）。","c":{"A":"认购成本不同","B":"中标收益率相同","C":"到期收益率不同","D":"中标价格单一"},"a":"AC","an":"以收益率为标的的美式招标，是以募满发行额为止的中标者所投标的各个价位上的中标收益率作为中标者各自的最终中标收益率（中标收益率不同），各中标者的认购成本是不相同的。","type":"multi"},{"id":"cflue_zc_ch5b.json_12","q":"发行人不得认购或变相认购自己发行的金融债券。发行人应在中国人民银行核准金融债券发行之日起（）内开始发行金融债券，并在规定期限内完成发行。","c":{"A":"30个工作日","B":"60个工作日","C":"10个工作日","D":"15个工作日"},"a":"B","an":"发行人不得认购或变相认购自己发行的金融债券。发行人应在中国人民银行核准金融债券发行之日起【60个工作日】内开始发行金融债券，并在规定期限内完成发行。","type":"single"},{"id":"cflue_zc_ch5b.json_13","q":"根据《全国银行间债券市场金融债券发行管理办法》，商业银行发行金融债券应具备的条件有（）。","c":{"A":"最近三年没有重大违法、违规行为","B":"最近三年连续盈利","C":"核心资本充足率不低于3%","D":"实行贷款五级分类，贷款五级分类偏差小"},"a":"AB","an":"根据《全国银行间债券市场金融债券发行管理办法》，商业银行发行金融债券应具备的条件有：具有良好的公司治理机制；核心资本充足率不低于4%；最近三年连续盈利；贷款损失准备计提充足；风险监管指标符合监管机构的有关规定；最近三年没有重大违法、违规行为；中国人民银行要求的其他条件。","type":"multi"},{"id":"cflue_zc_ch5b.json_14","q":"交易所市场发行国债的分销时，下列说法正确的是（）。","c":{"A":"证券交易所为同一期（次）国债向不同承销商提供同一承销代码","B":"投资者通过交易所买入债券时，缴纳佣金","C":"通过证券交易所交易后，国债不会自动过户到客户的账户内","D":"在实际运作中，承销商可以选择场内挂牌分销或场外分销两种方式"},"a":"D","an":"证券交易所为每一承销商确定当期国债【各自的承销代码】，以便于场内挂牌。B错误。投资者在买入债券时，可免缴佣金，C错误。买卖成交后，客户认购的国债自动过户至客户的账户内，D错误。","type":"single"},{"id":"cflue_zc_ch5b.json_15","q":"债券成交的竞价方式包括（）。","c":{"A":"计算机终端申报","B":"电话申报","C":"板牌竞价","D":"口头报唱"},"a":"ACD","an":"债券在交易所的竞价方式包括口头报唱、板牌竞价以及计算机终端申报竞价。","type":"multi"},{"id":"cflue_zc_ch5b.json_16","q":"与现券交易相比，远期交易的特点主要表现在以下（）方面。","c":{"A":"远期交易的买卖双方进行商品交收或交割的时间与达成交易的时间，通常有较长的时间间隔","B":"远期交易存在价格风险，价格会随着时间的推移而变动","C":"远期交易买卖双方必须签订远期合同","D":"远期交易通过正式谈判，双方达成一致后签订合同才算成立"},"a":"ACD","an":"注意远期交易的货款早已谈妥，不会随时间的推移而改变，无价格风险。","type":"multi"},{"id":"cflue_zc_ch5b.json_17","q":"商业银行公开发行次级债券应具备的条件不包括下列（）。","c":{"A":"核心资本充足率不低于4%","B":"贷款损失准备计提充足","C":"实行贷款五级分类","D":"最近三年没有重大违法、违规行为"},"a":"A","an":"公开发行次级债券核心资本充足率不低于5%，私募方式发行次级债券核心资本充足率不低于4%。","type":"single"},{"id":"cflue_zc_ch5b.json_18","q":"下列有关信用增级机构的说法，正确的有（）。","c":{"A":"信用增级可以通过内部增级和外部增级","B":"第三方信用增级机构包括政府机构、保险公司等","C":"信用增级机构向投资者收取租赁费用","D":"信用增级机构在证券违约时不承担赔偿责任"},"a":"AB","an":"信用增级机构是指资产证券化交易各方之外的外部第三方信用提供者。一般是在内部信用增级无法达到所需的发行评级时才需要外部信用增级机构提供信用支持。信用增级分为内部增级和外部增级。信用增级机构负责提升证券化产品的信用等级，因此要向【特定目的机构收取】相应费用，并在证券违约时【承担】赔偿责任。第三方信用增级机构包括：政府机构、保险公司、金融担保公司、银行、大型企业的财务公司等。举例：咪鸭教育向银行贷款，企业信用不够，可找担保公司担保，支付担保费。当咪鸭教育不能按期偿付银行贷款时，银行可要求担保公司代为偿付；常见的如：责任保险、企业担保、信用证等。","type":"multi"},{"id":"cflue_zc_ch5b.json_19","q":"关于债券的到期期限，下列说法错误的是（）。","c":{"A":"各种债券的偿还期限都是相同的","B":"习惯上有短期债券、中期债券和长期债券之分","C":"债券到期期限是债券发行人承诺履行合同义务的全部时间","D":"债券到期期限是指债券从发行之日起至清偿本息之日止的时间"},"a":"A","an":"各种债券有不同的偿还期限，短则几个月，长则几十年，并非偿还期限都是相同的。","type":"single"},{"id":"cflue_zc_ch5b.json_20","q":"全国银行间市场买断式回购的（）由交易双方确定。","c":{"A":"回购债券数量","B":"债券面值","C":"到期交易净价","D":"首期交易净价"},"a":"ACD","an":"全国银行间市场买断式回购以净价交易，全价结算。买断式回购的首期交易净价、到期交易净价和回购债券数量由交易双方确定，但到期交易净价加债券在回购期间的新增应计利息应大于首期交易净价。","type":"multi"},{"id":"cflue_zc_ch5b.json_21","q":"下列关于债券信用等级含义的说法中，错误的是（）。","c":{"A":"银行间债券市场长期债券信用等级AA级表示：偿还债务的能力很强，受不利经济环境的影响不大，违约风险很低","B":"银行间债券市场短期债券信用等级A-2级表示：还本付息能力较强，安全性较高","C":"银行间债券市场短期债券信用等级C级表示：还本付息能力很低，违约风险较高","D":"银行间债券市场长期债券信用等级BBB级表示：偿还债务能力一般，受不利经济环境影响较大，违约风险较高"},"a":"D","an":"银行间债券市场长期债券信用等级BBB级表示：偿还债务能力一般，受不利经济环境影响较大，违约风险【一般】。","type":"single"},{"id":"cflue_zc_ch5b.json_22","q":"公开发行的证券公司债券，可以在（）上市交易或转让。","c":{"A":"证券交易所","B":"银行间债券市场","C":"中证机构间报价系统","D":"全国中小企业股份转让系统"},"a":"AD","an":"公开发行公司债券并在证券交易所、全国中小企业股份转让系统交易或转让，非公开发行公司债券并按照规定承销或自行销售、或在证券交易所、全国中小企业股份转让系统、机构间私募产品报价与服务系统、证券公司柜台转让的。","type":"multi"},{"id":"cflue_zc_ch5b.json_23","q":"公司在发行不动产抵押公司债券时通常用做抵押的有（）。","c":{"A":"土地","B":"房屋","C":"有价证券","D":"艺术品"},"a":"AB","an":"不动产抵押公司债券是以公司的不动产（如房屋、土地等）作抵押而发行的债券，是抵押证券的一种。","type":"multi"},{"id":"cflue_zc_ch5b.json_24","q":"目前我国企业债券发行实行（），公司债券公开发行执行中国证监会（）。","c":{"A":"注册制，审批制","B":"核准制，注册制","C":"审批制，核准制","D":"注册制，注册制"},"a":"D","an":"目前企业债券的发行和公司债券公开发行都是注册制。","type":"single"},{"id":"cflue_zc_ch5b.json_25","q":"公司债券公开发行采用分期发行的，发行人应在每期发行完成后（）个工作日内报中国证监会备案。","c":{"A":"5","B":"6","C":"7","D":"3"},"a":"A","an":"采用分期发行的，发行人应在后续发行中及时披露更新后的债券募集说明书，并在每期发行完成后5个工作日内报中国证监会备案。","type":"single"},{"id":"cflue_zc_ch5b.json_26","q":"发行金融债券，对于商业银行设立的金融租赁公司，资质良好但成立不满（）的，应由具有担保能力的担保人提供担保。","c":{"A":"5年","B":"3年","C":"1年","D":"2年"},"a":"
