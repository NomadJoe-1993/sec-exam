<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#f5efe6">
<title>证券从业 · 高频考点速记</title>
<style>
:root {
  --bg: #f5efe6;
  --card: #faf6f0;
  --blue: #1e5b8a;
  --blue-light: #4a8bc2;
  --blue-bg: rgba(30,91,138,0.06);
  --red: #c23b22;
  --red-bg: rgba(194,59,34,0.06);
  --green: #3d7246;
  --green-bg: rgba(61,114,70,0.08);
  --gold: #c9a96e;
  --gold-light: #f5edd6;
  --border: #d4c9b8;
  --border-light: #e8dfd0;
  --text: #3d3229;
  --dim: #8b7e6e;
  --shadow: rgba(62, 50, 41, 0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}
.container { max-width: 520px; margin: 0 auto; padding: 0 0.6rem 1rem; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 85%, transparent 100%);
  padding: 0.5rem 0 0.3rem;
}
.header h1 {
  font-size: 1.05rem; font-weight: 700; color: var(--blue);
  text-align: center; letter-spacing: 0.02em;
}

/* Subject Tabs */
.subj-tabs { display: flex; gap: 4px; margin-bottom: 0.5rem; }
.subj-tab {
  flex: 1; padding: 0.35rem 0.3rem; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--card); color: var(--dim);
  text-align: center; transition: all 0.2s;
}
.subj-tab.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Progress */
.progress-area { margin-bottom: 0.5rem; }
.progress-text {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--dim); margin-bottom: 3px;
}
.progress-bar { height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--blue), var(--blue-light));
  transition: width 0.4s;
}

/* Chapter Selector */
.ch-selector {
  display: flex; gap: 4px; overflow-x: auto;
  padding-bottom: 0.4rem; margin-bottom: 0.5rem;
  -webkit-overflow-scrolling: touch;
}
.ch-selector::-webkit-scrollbar { display: none; }
.ch-pill {
  flex-shrink: 0; padding: 0.25rem 0.55rem;
  border-radius: 12px; font-size: 0.7rem; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--card); color: var(--dim);
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.ch-pill.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1rem 0.8rem;
  box-shadow: 0 2px 8px var(--shadow);
}

/* Heat bar */
.card-heat { height: 3px; border-radius: 3px; margin-bottom: 0.6rem; }
.card-heat.r3 { background: var(--red); }
.card-heat.r2 { background: var(--blue); }
.card-heat.r1 { background: var(--gold); }

/* Card header */
.card-hd {
  display: flex; align-items: center; gap: 0.3rem;
  margin-bottom: 0.4rem; flex-wrap: wrap;
}
.card-rank { font-size: 0.68rem; color: var(--dim); font-weight: 600; }
.rank-badge {
  display: inline-block; font-size: 0.55rem; padding: 0.05rem 0.35rem;
  border-radius: 3px; font-weight: 600;
}
.rank-badge.r3 { background: var(--red-bg); color: var(--red); }
.rank-badge.r2 { background: var(--blue-bg); color: var(--blue); }
.rank-badge.r1 { background: #f5edd6; color: var(--gold); }
.chapter-tag {
  font-size: 0.6rem; color: var(--dim);
  background: var(--border-light); padding: 0.05rem 0.35rem;
  border-radius: 3px; margin-left: auto;
}
.count-badge {
  font-size: 0.6rem; color: var(--dim);
}
.count-badge b { color: var(--blue); font-weight: 700; }

/* Card title */
.card-title {
  font-size: 0.9rem; font-weight: 700; line-height: 1.5;
  margin-bottom: 0.6rem; color: var(--text);
}

/* Structured content */
.card-body { font-size: 0.78rem; line-height: 1.7; }

.card-sec {
  margin-bottom: 0.5rem; padding: 0.4rem 0.5rem;
  border-radius: 6px;
}
.card-sec.concepts { background: var(--blue-bg); border-left: 3px solid var(--blue); }
.card-sec.rules { background: #f8f4ec; border-left: 3px solid var(--gold); }
.card-sec.exceptions { background: var(--red-bg); border-left: 3px solid var(--red); }

.card-sec-title {
  font-size: 0.68rem; font-weight: 700; margin-bottom: 0.2rem;
}
.card-sec.concepts .card-sec-title { color: var(--blue); }
.card-sec.rules .card-sec-title { color: var(--dim); }
.card-sec.exceptions .card-sec-title { color: var(--red); }

.card-sec-body { font-size: 0.75rem; color: var(--text); }
.card-sec-body ul { margin: 0; padding-left: 14px; list-style-type: disc; }
.card-sec-body li { margin-bottom: 2px; line-height: 1.6; }

/* Practice question in card */
.practice-box {
  margin-top: 0.6rem; padding: 0.5rem;
  background: #faf6ee; border: 1px solid var(--border-light);
  border-radius: 6px;
}
.practice-q {
  font-size: 0.75rem; font-weight: 600; margin-bottom: 0.3rem;
  color: var(--text);
}
.practice-choices { font-size: 0.73rem; margin-bottom: 0.3rem; }
.practice-choices .pc { padding: 0.15rem 0; color: var(--dim); }
.practice-answer {
  font-size: 0.7rem; color: var(--green); font-weight: 600;
}
.practice-answer .label { color: var(--dim); font-weight: 400; }

/* Card actions */
.card-actions {
  display: flex; gap: 6px; margin-top: 0.8rem;
  padding-top: 0.6rem; border-top: 1px solid var(--border-light);
}
.card-btn {
  flex: 1; padding: 0.4rem 0.5rem; border-radius: 8px;
  font-size: 0.75rem; font-weight: 600; border: none;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.card-btn:active { transform: scale(0.96); }
.card-btn.primary { background: var(--blue); color: #fff; }
.card-btn.primary:active { background: var(--blue-light); }
.card-btn.secondary { background: var(--border-light); color: var(--dim); }
.card-btn.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.card-btn.dim { background: var(--card); color: var(--dim); border: 1px solid var(--border); }

/* Navigation */
.card-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 0.6rem; gap: 6px;
}
.nav-btn {
  padding: 0.4rem 0.8rem; border-radius: 8px;
  font-size: 0.75rem; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--card); color: var(--text);
  transition: all 0.2s; min-width: 70px; text-align: center;
}
.nav-btn:active { background: var(--border-light); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-pos { font-size: 0.7rem; color: var(--dim); }

/* Mastery dots */
.mastery-bar {
  display: flex; gap: 3px; margin-bottom: 0.5rem; flex-wrap: wrap;
}
.mastery-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border-light); transition: background 0.3s;
  cursor: pointer; flex-shrink: 0;
}
.mastery-dot.mastered { background: var(--blue); }
.mastery-dot.current { background: var(--green); transform: scale(1.4); }

/* Empty state */
.card-empty {
  text-align: center; padding: 3rem 1rem;
  color: var(--dim); font-size: 0.85rem;
}
.card-empty .icon { font-size: 3rem; margin-bottom: 0.5rem; }

/* Loading */
.loading {
  text-align: center; padding: 3rem 1rem; color: var(--dim);
}
.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 3px solid var(--border-light); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 0.4rem 1rem;
  border-radius: 20px; font-size: 0.75rem;
  opacity: 0; transition: opacity 0.3s; z-index: 100;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Footer */
.footer {
  text-align: center; padding: 1rem; color: var(--dim);
  font-size: 0.65rem; border-top: 1px solid var(--border-light);
  margin-top: 1rem;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 高频考点速记</h1>
  </div>

  <div class="subj-tabs" id="subjTabs">
    <div class="subj-tab on" onclick="switchSubject('fin')">📈 金融基础</div>
    <div class="subj-tab" onclick="switchSubject('law')">⚖️ 法律法规</div>
  </div>

  <div class="progress-area">
    <div class="progress-text">
      <span id="progressLabel">加载中...</span>
      <span id="masteryCount">已掌握 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="ch-selector" id="chSelector"></div>

  <div id="cardArea">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>加载考点数据...</div>
    </div>
  </div>

  <div class="mastery-bar" id="masteryBar"></div>

  <div class="footer"><p>⚡ 每天过一遍，考试不慌张</p></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ====== Data ======
let dataFin = null, dataLaw = null;
let currentSubject = 'fin';
let currentChapter = 0;
let currentPoint = 0;
let mastered = {};

// ====== Init ======
async function init() {
  try {
    const [fr, lr] = await Promise.all([
      fetch('gw_fin.json'),
      fetch('gw_law.json')
    ]);
    dataFin = await fr.json();
    dataLaw = await lr.json();
    try {
      const s = localStorage.getItem('study_cards_mastered');
      if (s) mastered = JSON.parse(s);
    } catch(e) {}
    doRender();
  } catch(e) {
    document.getElementById('cardArea').innerHTML =
      '<div class="card-empty"><div class="icon">❌</div><div>加载失败: ' + e.message + '</div></div>';
  }
}

function getData() { return currentSubject === 'fin' ? dataFin : dataLaw; }

function getChapters() {
  const d = getData();
  if (!d) return [];
  return d.map((ch, i) => ({
    idx: i,
    name: (ch.chapter || '第'+(i+1)+'章').replace(/^\s+/, '').replace(/\s+$/, ''),
    points: ch.points || []
  }));
}

function getCurrentChapter() {
  const chs = getChapters();
  return chs[currentChapter] || chs[0] || null;
}

function getChapterPoints() {
  const ch = getCurrentChapter();
  return ch ? ch.points : [];
}

// ====== Render ======
function doRender() {
  renderSelector();
  renderCard();
  renderDots();
}

function renderSelector() {
  const chs = getChapters();
  const el = document.getElementById('chSelector');
  if (chs.length === 0) { el.innerHTML = ''; return; }
  
  // Ensure currentChapter is valid
  if (currentChapter >= chs.length) currentChapter = 0;

  el.innerHTML = chs.map((ch, i) =>
    '<div class="ch-pill' + (i === currentChapter ? ' on' : '') + '" onclick="switchCh(' + i + ')">'
    + ch.name + ' <span style="font-weight:400;opacity:0.7">' + ch.points.length + '</span></div>'
  ).join('');
}

function switchCh(idx) {
  currentChapter = idx;
  currentPoint = 0;
  doRender();
}

function switchSubject(subj) {
  currentSubject = subj;
  currentChapter = 0;
  currentPoint = 0;
  document.querySelectorAll('.subj-tab').forEach(t => t.classList.toggle('on', t.textContent.includes(subj === 'fin' ? '金融' : '法律')));
  doRender();
}

function renderCard() {
  const pts = getChapterPoints();
  const total = pts.length;
  const area = document.getElementById('cardArea');
  
  // Update progress
  const mc = countMastered();
  document.getElementById('progressLabel').textContent = total > 0
    ? '第 ' + (currentPoint + 1) + '/' + total + ' 个考点'
    : '暂无考点';
  document.getElementById('masteryCount').textContent = '已掌握 ' + mc;
  document.getElementById('progressFill').style.width = total > 0
    ? ((currentPoint + 1) / total * 100) + '%' : '0%';

  if (total === 0) {
    area.innerHTML = '<div class="card-empty"><div class="icon">📭</div><div>该章暂无考点</div></div>';
    return;
  }

  if (currentPoint >= total) currentPoint = total - 1;
  const pt = pts[currentPoint];
  if (!pt) { currentPoint = 0; renderCard(); return; }

  const rank = pt.rank || 1;
  const rankLabel = rank >= 3 ? '高频' : (rank >= 2 ? '中频' : '低频');
  const concepts = Array.isArray(pt.concepts) ? pt.concepts : [];
  const rules = Array.isArray(pt.rules) ? pt.rules : [];
  const exceptions = Array.isArray(pt.exceptions) ? pt.exceptions : [];
  const key = getPointKey(pt);

  let html = '<div class="card">';
  
  // Heat bar
  html += '<div class="card-heat r' + rank + '" style="width:' + Math.min(rank * 30, 90) + '%"></div>';
  
  // Header
  html += '<div class="card-hd">';
  html += '<span class="card-rank">#' + currentPoint + '</span>';
  html += '<span class="rank-badge r' + rank + '">' + (rank >= 3 ? '🔥' : '') + rankLabel + '</span>';
  html += '<span class="count-badge">考过 <b>' + (pt.count || 0) + '</b> 次</span>';
  html += '</div>';
  
  // Title
  html += '<div class="card-title">' + esc(pt.name || '') + '</div>';

  // Structured content
  if (concepts.length > 0 || rules.length > 0 || exceptions.length > 0) {
    html += '<div class="card-body">';
    
    if (concepts.length > 0) {
      html += '<div class="card-sec concepts"><div class="card-sec-title">📌 核心概念</div><div class="card-sec-body">';
      html += formatList(concepts);
      html += '</div></div>';
    }
    
    if (rules.length > 0) {
      html += '<div class="card-sec rules"><div class="card-sec-title">📋 规则要点</div><div class="card-sec-body">';
      html += formatList(rules);
      html += '</div></div>';
    }
    
    if (exceptions.length > 0) {
      html += '<div class="card-sec exceptions"><div class="card-sec-title">⚠️ 例外情况</div><div class="card-sec-body">';
      html += formatList(exceptions);
      html += '</div></div>';
    }
    
    html += '</div>';
  }

  // Practice question (if available)
  if (pt.question) {
    html += '<div class="practice-box">';
    html += '<div class="practice-q">📝 ' + esc(pt.question) + '</div>';
    if (pt.choices) {
      html += '<div class="practice-choices">';
      for (var k in pt.choices) {
        html += '<div class="pc"><b>' + k + '.</b> ' + esc(pt.choices[k]) + '</div>';
      }
      html += '</div>';
    }
    if (pt.answer) {
      html += '<div class="practice-answer"><span class="label">正确答案：</span>' + esc(pt.answer) + '</div>';
    }
    if (pt.analysis) {
      html += '<div style="font-size:0.7rem;color:var(--dim);margin-top:0.3rem;padding-top:0.3rem;border-top:1px dashed var(--border-light)">💡 ' + esc(pt.analysis) + '</div>';
    }
    html += '</div>';
  }
  
  // Actions
  const isMastered = !!mastered[key];
  html += '<div class="card-actions">';
  html += '<button class="card-btn ' + (isMastered ? 'success' : 'secondary') + '" onclick="toggleMastered()">'
       + (isMastered ? '✅ 已掌握' : '○ 标记已掌握') + '</button>';
  html += '</div>';
  html += '</div>';

  // Navigation
  html += '<div class="card-nav">';
  html += '<button class="nav-btn" onclick="navPt(-1)"' + (currentPoint <= 0 ? ' disabled' : '') + '>← 上一个</button>';
  html += '<span class="nav-pos">' + (currentPoint + 1) + '/' + total + '</span>';
  html += '<button class="nav-btn" onclick="navPt(1)"' + (currentPoint >= total - 1 ? ' disabled' : '') + '>下一个 →</button>';
  html += '</div>';

  area.innerHTML = html;
}

function formatList(arr) {
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return esc(arr[0]);
  return '<ul>' + arr.map(s => '<li>' + esc(s) + '</li>').join('') + '</ul>';
}

function renderDots() {
  const pts = getChapterPoints();
  const bar = document.getElementById('masteryBar');
  if (pts.length === 0) { bar.innerHTML = ''; return; }
  
  bar.innerHTML = pts.map((p, i) => {
    const cls = [];
    if (getPointKey(p) && mastered[getPointKey(p)]) cls.push('mastered');
    if (i === currentPoint) cls.push('current');
    return '<div class="mastery-dot' + (cls.length ? ' ' + cls.join(' ') : '') + '" onclick="jumpPt(' + i + ')"></div>';
  }).join('');
}

function getPointKey(pt) {
  return currentSubject + '-' + currentChapter + '-' + (pt.rank || 0) + '-' + (pt.name || '').substring(0, 10);
}

function countMastered() {
  const pts = getChapterPoints();
  let c = 0;
  for (var i = 0; i < pts.length; i++) {
    if (mastered[getPointKey(pts[i])]) c++;
  }
  return c;
}

function navPt(dir) {
  const pts = getChapterPoints();
  const n = currentPoint + dir;
  if (n < 0 || n >= pts.length) return;
  currentPoint = n;
  doRender();
}

function jumpPt(idx) {
  currentPoint = idx;
  doRender();
}

function toggleMastered() {
  const pts = getChapterPoints();
  const pt = pts[currentPoint];
  if (!pt) return;
  const key = getPointKey(pt);
  
  if (mastered[key]) {
    delete mastered[key];
    showToast('已取消掌握');
  } else {
    mastered[key] = true;
    showToast('✅ 标记为已掌握！');
    if (currentPoint < pts.length - 1) {
      setTimeout(() => navPt(1), 400);
    }
  }
  try { localStorage.setItem('study_cards_mastered', JSON.stringify(mastered)); } catch(e) {}
  doRender();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) {
  if (!s && s !== 0) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
