<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#f5efe6">
<title>证券从业 · 高频考点速记</title>
<style>
:root {
  --bg: #f5efe6;
  --card: #faf6f0;
  --blue: #1e5b8a;
  --red: #c23b22;
  --green: #3d7246;
  --gold: #c9a96e;
  --border: #d4c9b8;
  --text: #3d3229;
  --dim: #8b7e6e;
  --tag-bg: #efe9df;
  --shadow: rgba(62, 50, 41, 0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 0;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}
.container { max-width: 820px; margin: 0 auto; padding: 0 0.75rem 1rem; }

/* ====== Header ====== */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 85%, transparent 100%);
  padding: 0.6rem 0 0.3rem;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.header-top {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}
.back-btn {
  width: 2.2rem;
  height: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--blue);
  background: var(--card);
  border: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  text-decoration: none;
  transition: background 0.2s;
}
.back-btn:active { background: var(--tag-bg); }
.header h1 {
  flex: 1;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.02em;
}

/* ====== Subject Tabs ====== */
.sw { display: flex; gap: 6px; }
.swb {
  flex: 1;
  padding: 0.45rem 0.3rem;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--card);
  color: var(--dim);
  text-align: center;
  transition: all 0.2s;
  user-select: none;
}
.swb:active { transform: scale(0.97); }
.swb.on {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
  box-shadow: 0 2px 8px rgba(30,91,138,0.25);
}

/* ====== Subject Sections ====== */
.sec { display: none; }
.sec.on { display: block; }

/* ====== Chapter Title ====== */
.ch-title {
  font-size: 0.92rem;
  font-weight: 700;
  padding: 0.5rem 0 0.3rem;
  margin: 0.6rem 0 0.3rem;
  border-bottom: 2px solid var(--border);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.4rem;
}
.ch-w {
  font-size: 0.68rem;
  color: var(--dim);
  font-weight: 400;
  white-space: nowrap;
}

/* ====== Knowledge Point List ====== */
.kp-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 0.6rem; }
.kp-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.kp-item:active { box-shadow: 0 1px 4px var(--shadow); }

/* Left border indicator: heat level */
.kp-item.h3 { border-left: 4px solid var(--red); }
.kp-item.h2 { border-left: 4px solid var(--blue); }
.kp-item.h1 { border-left: 4px solid var(--gold); }

/* Head row */
.kp-head {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 8px;
  align-items: center;
  padding: 7px 10px;
  cursor: pointer;
  user-select: none;
}
.kp-rank {
  font-size: 0.68rem;
  color: var(--dim);
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
  flex-shrink: 0;
}
.kp-body {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.kp-name {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.kp-count {
  font-size: 0.7rem;
  color: var(--dim);
  white-space: nowrap;
  flex-shrink: 0;
}
.kp-count b { font-size: 0.95rem; color: var(--blue); }

/* Bar row */
.kp-bar-wrap {
  grid-column: 1 / -1;
  padding: 0 10px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.kp-bar {
  flex: 1;
  height: 6px;
  background: var(--tag-bg);
  border-radius: 3px;
  overflow: hidden;
}
.kp-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.kp-fill.high { background: linear-gradient(90deg, var(--red), #d45a4a); }
.kp-fill.mid { background: linear-gradient(90deg, var(--blue), #3a7ab5); }
.kp-fill.low { background: linear-gradient(90deg, var(--gold), #daac6e); }

/* Collapse indicator */
.kp-arrow {
  font-size: 0.6rem;
  color: var(--dim);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}
.kp-item.exp .kp-arrow { transform: rotate(180deg); }

/* ====== Detail Section ====== */
.kp-detail {
  display: none;
  padding: 0 10px 10px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
  padding-top: 8px;
}
.kp-item.exp .kp-detail { display: block; }

/* ── 考点精讲 ── */
.kp-explain {
  font-size: 0.78rem;
  color: var(--text);
  padding: 8px 10px;
  background: var(--tag-bg);
  border-radius: 8px;
  margin-bottom: 10px;
  line-height: 1.7;
  border-left: 3px solid var(--gold);
}
.kp-explain-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px dashed var(--border);
}
/* 结构化考点精讲 */
.kp-section {
  margin-bottom: 6px;
}
.kp-section.kwarn {
  background: rgba(194,59,34,0.05);
  border-left: 2.5px solid var(--red);
  padding: 4px 8px;
  border-radius: 4px;
}
.kp-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 2px;
}
.kp-section.kwarn .kp-section-title {
  color: var(--red);
}
.kp-line {
  font-size: 0.76rem;
  color: var(--text);
  margin-bottom: 2px;
}
.kwarn-line {
  color: #b85a4a !important;
}
.kp-ul {
  margin: 0;
  padding-left: 14px;
  list-style-type: disc;
}
.kp-ul li {
  font-size: 0.76rem;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.6;
}
.kp-ul li b.kw {
  color: var(--red);
  font-weight: 700;
}

/* Practice section / 真题演练 */
.kp-practice {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.practice-head {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.ch-tag {
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
  line-height: 1.4;
}
.ch-tag.s { background: #e3f0fa; color: var(--blue); }
.ch-tag.m { background: #fde8e6; color: var(--red); }
.ch-tag.j { background: #f5efe0; color: var(--gold); }
.practice-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--dim);
}
.pq {
  font-size: 0.82rem;
  line-height: 1.6;
  margin-bottom: 8px;
  color: var(--text);
}

/* ====== Options ====== */
.opts { display: flex; flex-direction: column; gap: 5px; }
.co {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 8px;
  font-size: 0.8rem;
  border: 1.5px solid transparent;
  background: var(--tag-bg);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.co:active { transform: scale(0.98); }
.co .ck {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  font-size: 0.68rem;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--card);
  color: var(--dim);
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.co.selected {
  border-color: var(--blue);
  background: #e8f0f8;
}
.co.selected .ck {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.co.correct {
  border-color: var(--green) !important;
  background: #eaf5ec !important;
}
.co.correct .ck {
  background: var(--green) !important;
  color: #fff !important;
  border-color: var(--green) !important;
}
.co.wrong {
  border-color: var(--red) !important;
  background: #fde8e6 !important;
}
.co.wrong .ck {
  background: var(--red) !important;
  color: #fff !important;
  border-color: var(--red) !important;
}
.co.disabled { pointer-events: none; opacity: 0.85; }

/* ====== Result Area ====== */
.result-area {
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 0.78rem;
  line-height: 1.6;
  display: none;
}
.result-area.show { display: block; }
.result-area.correct {
  background: #eaf5ec;
  border: 1px solid var(--green);
  color: #2a5a35;
}
.result-area.wrong {
  background: #fde8e6;
  border: 1px solid var(--red);
  color: #8a2a1e;
}
.result-area .ra-answer { font-weight: 700; margin-bottom: 2px; }
.result-area .ra-explain { color: var(--text); margin-top: 4px; }

/* ====== Action Buttons ====== */
.practice-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.practice-btn {
  padding: 0.45rem 0.8rem;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 600;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  background: var(--card);
  color: var(--text);
  text-align: center;
  flex: 1;
}
.practice-btn:active { transform: scale(0.97); }
.practice-btn.primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.practice-btn.primary:active { opacity: 0.85; }
.practice-btn.reset { color: var(--dim); }
.practice-btn.reset:active { background: var(--tag-bg); }

/* ====== Footer ====== */
.footer {
  text-align: center;
  padding: 1rem 0.5rem;
  color: var(--dim);
  font-size: 0.7rem;
  margin-top: 0.8rem;
  position: relative;
}
.footer::before {
  content: '';
  display: block;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue), var(--gold), var(--blue), transparent);
  margin-bottom: 0.6rem;
  border-radius: 1px;
}

/* ====== Loading & Empty States ====== */
.loading-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--dim);
  font-size: 0.9rem;
}
.loading-state .spinner {
  display: inline-block;
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--dim);
  font-size: 0.85rem;
}

/* ====== Responsive ====== */
@media (max-width: 480px) {
  .container { padding: 0 0.5rem 1rem; }
  .header h1 { font-size: 1rem; }
  .swb { font-size: 0.75rem; padding: 0.4rem 0.2rem; }
  .kp-name { font-size: 0.78rem; }
  .kp-head { padding: 6px 8px; grid-template-columns: 24px 1fr; }
  .co { font-size: 0.76rem; padding: 6px; }
  .kp-explain { font-size: 0.75rem; padding: 6px 8px; }
  .pq { font-size: 0.78rem; }
  .practice-btn { font-size: 0.74rem; padding: 0.4rem 0.6rem; }
}
@media (min-width: 640px) {
  .kp-head { padding: 9px 12px; }
  .kp-name { font-size: 0.88rem; }
  .co { padding: 8px 10px; }
  .ch-title { font-size: 0.98rem; }
}
</style>
<script src="recorder.js"></script>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <a class="back-btn" href="index.html" onclick="if(window.parent&&window.parent.goHome){window.parent.goHome();return false}">‹</a>
      <h1>📊 高频考点速记</h1>
    </div>
    <div class="sw" id="subject-tabs">
      <span class="swb on" data-subject="fin" onclick="switchSubject('fin')">📈 金融基础</span>
      <span class="swb" data-subject="law" onclick="switchSubject('law')">⚖️ 法律法规</span>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div>加载考点数据中…</div>
    <div style="display:flex;gap:4px;justify-content:center;margin-top:6px;flex-wrap:wrap;">
      <button onclick="window.ExamRecorder && downloadRecords()" style="padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--blue);font-size:10px;cursor:pointer;">💾 导出记录</button>
      <button onclick="document.getElementById('importTopBtn').click()" style="padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--blue);font-size:10px;cursor:pointer;">📥 导入记录</button>
      <span style="font-size:9px;color:var(--dim);line-height:24px;">数据在手机本地，记得备份</span>
    </div>
    <input type="file" id="importTopBtn" accept=".json" style="display:none" onchange="
      var f=this.files[0];if(!f)return;
      var r=new FileReader();r.onload=function(e){
        if(window.ExamRecorder){
          var res=window.ExamRecorder.importFromJSON(e.target.result);
          alert(res.success?'✅ 导入'+res.count+'条记录':'❌ 失败：'+res.error);
          location.reload();
        }
      };r.readAsText(f);this.value='';
    ">

  <!-- Content -->
  <div id="sec-fin" class="sec" style="display:none"></div>
  <div id="sec-law" class="sec" style="display:none"></div>

  <!-- Footer -->
  <div class="footer">
  <div style="margin-bottom:6px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">
    <button onclick="window.ExamRecorder && downloadRecords()" style="padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:11px;cursor:pointer;">💾 导出答题记录</button>
    <button onclick="document.getElementById('importH5Input').click()" style="padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:11px;cursor:pointer;">📥 导入记录</button>
    <button onclick="window.ExamRecorder && window.ExamRecorder.clear()" style="padding:3px 10px;border-radius:6px;border:1px solid var(--red);background:var(--red-bg);color:var(--red);font-size:11px;cursor:pointer;">🗑️ 清空</button>
  </div>
  高频考点速记 · 数据基于V4考频聚类
</div>
<input type="file" id="importH5Input" accept=".json" style="display:none" onchange="
  var f=this.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){
    if(window.ExamRecorder){
      var res=window.ExamRecorder.importFromJSON(e.target.result);
      alert(res.success?'✅ 导入'+res.count+'条记录':'❌ 失败：'+res.error);
    }
  };r.readAsText(f);this.value='';
">
</div>

<script>
window.onerror = function(msg, url, line) {
  document.getElementById("container") && (document.getElementById("container").innerHTML =
    '<div style="text-align:center;padding:2rem;color:var(--red)"><div style="font-size:2rem">❌</div><div style="margin-top:0.5rem">页面加载异常</div><div style="font-size:0.75rem;color:var(--dim);margin-top:0.3rem">' + msg + '</div><button onclick="location.reload()" style="margin-top:0.8rem;padding:6px 20px;border-radius:8px;border:1px solid var(--blue);background:var(--blue);color:#fff;font-size:0.85rem;cursor:pointer">重新加载</button></div>');
  return true;
};
// ====== State ======
let dataFin = null;
let dataLaw = null;
let currentSubject = 'fin';

// ====== Load Data ======
async function loadData() {
  try {
    const [finResp, lawResp] = await Promise.all([
      fetch('gw_fin.json'),
      fetch('gw_law.json')
    ]);
    if (!finResp.ok) throw new Error('gw_fin.json 加载失败: ' + finResp.status);
    if (!lawResp.ok) throw new Error('gw_law.json 加载失败: ' + lawResp.status);
    dataFin = await finResp.json();
    dataLaw = await lawResp.json();
    document.getElementById('loading').style.display = 'none';
    renderSubject('fin');
    renderSubject('law');
    document.getElementById('sec-fin').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--red);font-size:1rem">❌ ' + e.message + '</div>' +
      '<div style="font-size:0.8rem;margin-top:0.5rem;color:var(--dim)">请确认 gw_fin.json 和 gw_law.json 文件存在</div>';
  }
}

// ====== Subject Switch ======
function switchSubject(subject) {
  currentSubject = subject;
  document.querySelectorAll('.swb').forEach(el => el.classList.toggle('on', el.dataset.subject === subject));
  document.querySelectorAll('.sec').forEach(el => el.style.display = 'none');
  const sec = document.getElementById('sec-' + subject);
  if (sec) sec.style.display = 'block';
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ====== Render ======
function renderSubject(subject) {
  const data = subject === 'fin' ? dataFin : dataLaw;
  const container = document.getElementById('sec-' + subject);
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无考点数据</div>';
    return;
  }

  let html = '';
  let pointTotal = 0;
  data.forEach(ch => { pointTotal += ch.points.length; });

  data.forEach((ch, ci) => {
    const chLabel = ch.chapter.replace(/^\s+/, '').replace(/\s+$/, '');
    const pTotal = ch.total || ch.points.length;
    html += '<div class="ch-title">' + chLabel +
      ' <span class="ch-w">' + pTotal + '题 · ' + ch.points.length + '个考点</span></div>';
    html += '<div class="kp-list">';

    ch.points.forEach((pt, pi) => {
      const heatClass = pt.count >= 4 ? 'h3' : (pt.count >= 2 ? 'h2' : 'h1');
      const barClass = pt.count >= 4 ? 'high' : (pt.count >= 2 ? 'mid' : 'low');
      const barPct = Math.min(Math.max(pt.bar_pct || 0, 10), 100);
      const uniqueId = subject + '-' + ci + '-' + pi;

      html += '<div class="kp-item ' + heatClass + '" id="kp-' + uniqueId + '">';
      html += '<div class="kp-head" onclick="toggleExpand(\'' + uniqueId + '\')">';
      html += '  <div class="kp-rank">#' + pt.rank + '</div>';
      html += '  <div class="kp-body">';
      html += '    <span class="kp-name">' + escapeHtml(pt.name) + '</span>';
      html += '    <span class="kp-count"><b>' + pt.count + '</b>次</span>';
      html += '    <span class="kp-arrow">▼</span>';
      html += '  </div>';
      html += '</div>';
      html += '<div class="kp-bar-wrap">';
      html += '  <div class="kp-bar"><div class="kp-fill ' + barClass + '" style="width:' + barPct + '%"></div></div>';
      html += '</div>';

      // Detail
      html += '<div class="kp-detail">';
      // V5 结构化考点精讲
      html += renderStructuredExplain(pt);
      // Practice question
      if (pt.question && pt.choices) {
        html += renderPractice(pt, uniqueId);
      }
      html += '</div></div>';
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

function renderStructuredExplain(pt) {
  // 检查是否有结构化数据
  const hasConcepts = pt.concepts && pt.concepts.length > 0;
  const hasRules = pt.rules && pt.rules.length > 0;
  const hasExceptions = pt.exceptions && pt.exceptions.length > 0;

  // 如果完全没有结构化数据，fallback到原始analysis
  if (!hasConcepts && !hasRules && !hasExceptions) {
    if (pt.analysis && pt.analysis !== '略。' && pt.analysis !== '略' && pt.analysis.trim() !== '') {
      return '<div class="kp-explain"><div class="kp-explain-title">📝 考点精讲</div>' + escapeHtml(pt.analysis) + '</div>';
    }
    return '';
  }

  let html = '<div class="kp-explain">';
  html += '<div class="kp-explain-title">📚 考点精讲</div>';

  // 核心概念
  if (hasConcepts) {
    html += '<div class="kp-section">';
    html += '  <div class="kp-section-title">📖 核心概念</div>';
    pt.concepts.forEach(c => {
      html += '  <div class="kp-line">' + escapeHtml(c) + '</div>';
    });
    html += '</div>';
  }

  // 要点提炼（含数字考点）
  let allRules = [];
  if (hasRules) allRules = pt.rules;
  if (allRules.length > 0) {
    html += '<div class="kp-section">';
    html += '  <div class="kp-section-title">📌 要点提炼</div>';
    html += '  <ul class="kp-ul">';
    allRules.slice(0, 6).forEach(r => {
      // 关键词加粗（同桌面版逻辑）
      var bolded = escapeHtml(r);
      var kw = ['不得','应当','必须','可以','禁止','严禁','不超过','不少于','以上','以下','由','负责','依法','按照','根据','实行','只能'];
      kw.forEach(function(w) {
        var re = new RegExp(escapeRegex(w), 'g');
        bolded = bolded.replace(re, '<b class="kw">' + w + '</b>');
      });
      html += '    <li>' + bolded + '</li>';
    });
    html += '  </ul>';
    html += '</div>';
  }

  // 注意事项/例外
  if (hasExceptions) {
    html += '<div class="kp-section kwarn">';
    html += '  <div class="kp-section-title">⚠️ 注意事项</div>';
    pt.exceptions.forEach(e => {
      html += '  <div class="kp-line kwarn-line">' + escapeHtml(e) + '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderPractice(pt, uniqueId) {
  const choiceKeys = Object.keys(pt.choices);
  const isMulti = pt.type === 'm';
  const label = isMulti ? '多选' : (pt.type === 'j' ? '判断' : '单选');

  let html = '<div class="kp-practice">';
  html += '<div class="practice-head">';
  html += '  <span class="ch-tag ' + pt.type + '">' + label + '</span>';
  html += '  <span class="practice-label">真题演练</span>';
  html += '</div>';
  html += '<div class="pq">' + escapeHtml(pt.question) + '</div>';
  html += '<div class="opts" id="opts-' + uniqueId + '" data-type="' + pt.type + '" data-answer="' + escapeHtml(pt.answer) + '">';

  choiceKeys.forEach(key => {
    const val = pt.choices[key];
    if (val === undefined || val === null) return;
    html += '<div class="co" data-key="' + key + '" onclick="selectOption(this,\'' + uniqueId + '\')">';
    html += '  <span class="ck">' + key + '</span>';
    html += '  <span class="cv">' + escapeHtml(String(val)) + '</span>';
    html += '</div>';
  });

  html += '</div>';

  // Action buttons + result area
  html += '<div class="practice-actions">';
  html += '  <button class="practice-btn primary" onclick="checkAnswer(\'' + uniqueId + '\')">🔍 核对答案</button>';
  html += '  <button class="practice-btn reset" onclick="resetPractice(\'' + uniqueId + '\')">🔄 重选</button>';
  html += '</div>';
  html += '<div class="result-area" id="result-' + uniqueId + '"></div>';
  html += '</div>';

  return html;
  } catch(e) { console.error('renderStructuredExplain error:', e); return ''; }
}

// ====== Interactive Functions ======
function toggleExpand(uniqueId) {
  const item = document.getElementById('kp-' + uniqueId);
  if (item) item.classList.toggle('exp');
}

function selectOption(el, uniqueId) {
  const optsContainer = document.getElementById('opts-' + uniqueId);
  if (!optsContainer) return;
  const type = optsContainer.dataset.type;

  // Don't allow interaction if already checked
  if (optsContainer.classList.contains('checked')) return;

  if (type === 'm') {
    // Multi-select: toggle
    el.classList.toggle('selected');
  } else {
    // Single select / judgment: mutually exclusive
    optsContainer.querySelectorAll('.co').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }
}

function checkAnswer(uniqueId) {
  const optsContainer = document.getElementById('opts-' + uniqueId);
  if (!optsContainer) return;
  const correctAnswer = optsContainer.dataset.answer;
  const type = optsContainer.dataset.type;
  const resultDiv = document.getElementById('result-' + uniqueId);
  if (!resultDiv) return;

  // Disable further interaction
  optsContainer.classList.add('checked');
  const options = optsContainer.querySelectorAll('.co');

  // Map correct answers
  const correctKeys = correctAnswer.split('').map(k => k.trim()).filter(k => k.length === 1);

  // Mark each option
  let allCorrect = true;
  let anySelected = false;

  // First pass: mark selections
  options.forEach(opt => {
    const key = opt.dataset.key;
    const isSelected = opt.classList.contains('selected');
    const isCorrect = correctKeys.includes(key);

    if (isSelected) anySelected = true;

    if (isSelected && isCorrect) {
      opt.classList.add('correct');
    } else if (isSelected && !isCorrect) {
      opt.classList.add('wrong');
      allCorrect = false;
    }
  });

  // Highlight correct answers that weren't selected (for learning)
  options.forEach(opt => {
    const key = opt.dataset.key;
    const isSelected = opt.classList.contains('selected');
    const isCorrect = correctKeys.includes(key);

    if (isCorrect && !isSelected) {
      opt.classList.add('correct');
    }
    opt.classList.add('disabled');
  });

  // Check if all correct options are selected and no wrong options selected
  let fullyCorrect = allCorrect;
  if (type === 'm') {
    const selectedKeys = [];
    options.forEach(opt => {
      if (opt.classList.contains('selected')) selectedKeys.push(opt.dataset.key);
    });
    selectedKeys.sort();
    const sortedCorrect = [...correctKeys].sort();
    if (selectedKeys.length !== sortedCorrect.length ||
        selectedKeys.some((k, i) => k !== sortedCorrect[i])) {
      fullyCorrect = false;
    }
  }

  // Show result
  if (!anySelected) {
    resultDiv.className = 'result-area show wrong';
    resultDiv.innerHTML = '<div class="ra-answer">⚠️ 请先选择答案</div>';
    // Re-enable
    optsContainer.classList.remove('checked');
    options.forEach(opt => opt.classList.remove('disabled'));
    return;
  }

  const isCorrect = fullyCorrect;
  resultDiv.className = 'result-area show ' + (isCorrect ? 'correct' : 'wrong');
  resultDiv.innerHTML = '<div class="ra-answer">' + (isCorrect ? '✅ 回答正确！' : '❌ 回答错误') + '</div>' +
    '<div>正确答案：<b>' + correctAnswer + '</b></div>' +
    '<div class="ra-explain"><i>' + (type === 'm' ? '多选题需全部选对才计为正确' : '') + '</i></div>';

  // ── ──
  if (window.ExamRecorder) {
    const qCard = document.getElementById('kp-' + uniqueId);
    const chGroup = qCard ? qCard.closest('.ch-group') : null;
    const chapterEl = chGroup ? chGroup.querySelector('.ch-title') : null;
    const chapter = chapterEl ? chapterEl.textContent.replace(/\(.*?\)/g,'').trim() : '';
    const qText = qCard ? (qCard.querySelector('.pq') ? qCard.querySelector('.pq').textContent : '') : '';
    const selectedKeys = [];
    options.forEach(function(o) { if (o.classList.contains('selected')) selectedKeys.push(o.dataset.key); });
    window.ExamRecorder.record({
      questionId: 'h5-' + uniqueId,
      subject: (document.querySelector('.swb.on') ? (document.querySelector('.swb.on').textContent.indexOf('金融') >= 0 ? '金融市场基础知识' : '证券市场基本法律法规') : ''),
      chapter: chapter,
      type: type,
      typeCn: type === 'm' ? '多选' : (type === 'j' ? '判断' : '单选'),
      question: qText,
      userAnswer: selectedKeys.sort().join(''),
      correctAnswer: correctAnswer,
      isCorrect: isCorrect,
      source: 'H5速记'
    });
  }
}

function resetPractice(uniqueId) {
  const optsContainer = document.getElementById('opts-' + uniqueId);
  const resultDiv = document.getElementById('result-' + uniqueId);
  if (!optsContainer) return;

  optsContainer.classList.remove('checked');
  optsContainer.querySelectorAll('.co').forEach(opt => {
    opt.classList.remove('selected', 'correct', 'wrong', 'disabled');
  });
  if (resultDiv) {
    resultDiv.className = 'result-area';
    resultDiv.innerHTML = '';
  }
}

// ====== Helper ======
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ====== Init ======
document.addEventListener('DOMContentLoaded', loadData);
