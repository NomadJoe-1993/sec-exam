<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#f5efe6">
<title>证券从业 · 高频考点速记</title>
<style>
:root {
  --bg: #f5efe6;
  --card: #faf6f0;
  --blue: #1e5b8a;
  --blue-light: #4a8bc2;
  --blue-bg: rgba(30,91,138,0.06);
  --red: #c23b22;
  --red-bg: rgba(194,59,34,0.06);
  --green: #3d7246;
  --green-bg: rgba(61,114,70,0.08);
  --gold: #c9a96e;
  --gold-light: #f5edd6;
  --border: #d4c9b8;
  --border-light: #e8dfd0;
  --text: #3d3229;
  --dim: #8b7e6e;
  --shadow: rgba(62, 50, 41, 0.08);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}
.container { max-width: 520px; margin: 0 auto; padding: 0 0.6rem 1rem; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 85%, transparent 100%);
  padding: 0.5rem 0 0.3rem;
}
.header h1 {
  font-size: 1.05rem; font-weight: 700; color: var(--blue);
  text-align: center; letter-spacing: 0.02em;
}

/* Subject Tabs */
.subj-tabs { display: flex; gap: 4px; margin-bottom: 0.5rem; }
.subj-tab {
  flex: 1; padding: 0.35rem 0.3rem; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--card); color: var(--dim);
  text-align: center; transition: all 0.2s;
}
.subj-tab.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Progress Bar & Stats */
.progress-area { margin-bottom: 0.5rem; }
.progress-text {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--dim); margin-bottom: 3px;
}
.progress-bar {
  height: 4px; background: var(--border-light);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--blue), var(--blue-light));
  transition: width 0.4s;
}

/* Chapter Selector */
.ch-selector {
  display: flex; gap: 4px; overflow-x: auto;
  padding-bottom: 0.4rem; margin-bottom: 0.5rem;
  -webkit-overflow-scrolling: touch;
}
.ch-selector::-webkit-scrollbar { display: none; }
.ch-pill {
  flex-shrink: 0; padding: 0.25rem 0.55rem;
  border-radius: 12px; font-size: 0.7rem; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--card); color: var(--dim);
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.ch-pill.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Main Card */
.card-area { position: relative; min-height: 300px; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1rem 0.8rem;
  box-shadow: 0 2px 8px var(--shadow);
  transition: opacity 0.25s;
}

/* Heat indicator bar at top */
.card-heat {
  height: 3px; border-radius: 3px; margin-bottom: 0.6rem;
}
.card-heat.h3 { background: var(--red); }
.card-heat.h2 { background: var(--blue); }
.card-heat.h1 { background: var(--gold); }

/* Card header: rank + heat badge */
.card-hd {
  display: flex; align-items: center; gap: 0.3rem;
  margin-bottom: 0.4rem; flex-wrap: wrap;
}
.card-rank { font-size: 0.68rem; color: var(--dim); font-weight: 600; }
.heat-badge {
  display: inline-block; font-size: 0.55rem; padding: 0.05rem 0.35rem;
  border-radius: 3px; font-weight: 600;
}
.heat-badge.h3 { background: var(--red-bg); color: var(--red); }
.heat-badge.h2 { background: var(--blue-bg); color: var(--blue); }
.heat-badge.h1 { background: #f5edd6; color: var(--gold); }
.chapter-tag {
  font-size: 0.6rem; color: var(--dim);
  background: var(--border-light); padding: 0.05rem 0.35rem;
  border-radius: 3px; margin-left: auto;
}

/* Card title */
.card-title {
  font-size: 0.9rem; font-weight: 700; line-height: 1.5;
  margin-bottom: 0.6rem; color: var(--text);
}

/* Card body - structured content */
.card-body { font-size: 0.78rem; line-height: 1.7; }

.card-sec {
  margin-bottom: 0.5rem; padding: 0.4rem 0.5rem;
  border-radius: 6px;
}
.card-sec.core { background: var(--blue-bg); border-left: 3px solid var(--blue); }
.card-sec.rule { background: #f8f4ec; border-left: 3px solid var(--gold); }
.card-sec.except { background: var(--red-bg); border-left: 3px solid var(--red); }
.card-sec.keypoint { background: var(--green-bg); border-left: 3px solid var(--green); }

.card-sec-title {
  font-size: 0.68rem; font-weight: 700;
  margin-bottom: 0.2rem;
}
.card-sec.core .card-sec-title { color: var(--blue); }
.card-sec.rule .card-sec-title { color: var(--dim); }
.card-sec.except .card-sec-title { color: var(--red); }
.card-sec.keypoint .card-sec-title { color: var(--green); }

.card-sec-body { font-size: 0.75rem; color: var(--text); }
.card-sec-body ul { margin: 0; padding-left: 14px; list-style-type: disc; }
.card-sec-body li { margin-bottom: 2px; line-height: 1.6; }

/* Empty card state */
.card-empty {
  text-align: center; padding: 3rem 1rem;
  color: var(--dim); font-size: 0.85rem;
}
.card-empty .icon { font-size: 3rem; margin-bottom: 0.5rem; }

/* Card actions */
.card-actions {
  display: flex; gap: 6px; margin-top: 0.8rem;
  padding-top: 0.6rem; border-top: 1px solid var(--border-light);
}
.card-btn {
  flex: 1; padding: 0.4rem 0.5rem; border-radius: 8px;
  font-size: 0.75rem; font-weight: 600; border: none;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.card-btn:active { transform: scale(0.96); }
.card-btn.primary { background: var(--blue); color: #fff; }
.card-btn.primary:active { background: var(--blue-light); }
.card-btn.secondary { background: var(--border-light); color: var(--dim); }
.card-btn.secondary:active { background: var(--border); }
.card-btn.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.card-btn.success:active { background: var(--green); color: #fff; }
.card-btn.dim { background: var(--card); color: var(--dim); border: 1px solid var(--border); }

/* Navigation */
.card-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 0.6rem; gap: 6px;
}
.nav-btn {
  padding: 0.4rem 0.8rem; border-radius: 8px;
  font-size: 0.75rem; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer;
  background: var(--card); color: var(--text);
  transition: all 0.2s; min-width: 70px;
  text-align: center;
}
.nav-btn:active { background: var(--border-light); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-pos { font-size: 0.7rem; color: var(--dim); }

/* Mastery indicator */
.mastery-bar {
  display: flex; gap: 3px; margin-bottom: 0.5rem;
}
.mastery-dot {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--border-light); transition: background 0.3s;
}
.mastery-dot.done { background: var(--green); }
.mastery-dot.mastered { background: var(--blue); }

/* Footer */
.footer {
  text-align: center; padding: 1rem; color: var(--dim);
  font-size: 0.65rem; border-top: 1px solid var(--border-light);
  margin-top: 1rem;
}

/* Loading */
.loading {
  text-align: center; padding: 3rem 1rem; color: var(--dim);
}
.spinner { display: inline-block; width: 24px; height: 24px;
  border: 3px solid var(--border-light); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 0.4rem 1rem;
  border-radius: 20px; font-size: 0.75rem;
  opacity: 0; transition: opacity 0.3s; z-index: 100;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 高频考点速记</h1>
  </div>

  <div class="subj-tabs" id="subjTabs">
    <div class="subj-tab on" onclick="switchSubject('fin')">📈 金融基础</div>
    <div class="subj-tab" onclick="switchSubject('law')">⚖️ 法律法规</div>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-text">
      <span id="progressLabel">第 0/0 个考点</span>
      <span id="masteryCount">已掌握 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- Chapter selector -->
  <div class="ch-selector" id="chSelector"></div>

  <!-- Card -->
  <div class="card-area" id="cardArea">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>加载考点数据...</div>
    </div>
  </div>

  <!-- Mastery dots -->
  <div class="mastery-bar" id="masteryBar"></div>

  <!-- Footer -->
  <div class="footer">
    <p>⚡ 每天过一遍，考试不慌张</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== State ======
let dataFin = null, dataLaw = null;
let currentSubject = 'fin';
let currentChapter = 0;       // index into knowledgePoints
let currentPoint = 0;         // index into current chapter's points
let mastered = {};            // "subject-chIdx-pIdx" -> true
let knowledgePoints = [];     // flat array of {chName, chIdx, pIdx, point, heat}

// ====== Load Data ======
async function init() {
  try {
    const [finResp, lawResp] = await Promise.all([
      fetch('gw_fin.json'),
      fetch('gw_law.json')
    ]);
    if (!finResp.ok) throw new Error('gw_fin.json 加载失败');
    if (!lawResp.ok) throw new Error('gw_law.json 加载失败');
    dataFin = await finResp.json();
    dataLaw = await lawResp.json();

    // Load mastered state
    try {
      const saved = localStorage.getItem('study_cards_mastered');
      if (saved) mastered = JSON.parse(saved);
    } catch(e) {}

    buildKnowledgePoints();
    renderAll();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div class="card-empty"><div class="icon">❌</div><div>加载失败: ' + e.message + '</div></div>';
  }
}

function buildKnowledgePoints() {
  const data = currentSubject === 'fin' ? dataFin : dataLaw;
  if (!data) return;
  knowledgePoints = [];
  data.forEach((ch, ci) => {
    const chLabel = ch.chapter ? ch.chapter.replace(/^\s+/, '').replace(/\s+$/, '') : ('第' + (ci+1) + '章');
    (ch.points || []).forEach((pt, pi) => {
      knowledgePoints.push({
        chName: chLabel,
        chIdx: ci,
        pIdx: pi,
        point: pt,
        heat: pt.heat || 1,
        totalPoints: (ch.points || []).length
      });
    });
  });
  // Filter to current chapter
  updateFilteredPoints();
}

function updateFilteredPoints() {
  // Filter: only points where chIdx === currentChapter
  // Actually we show ALL chapters with chapter filtering
}

// Get points for current chapter
function getChapterPoints() {
  return knowledgePoints.filter(p => p.chIdx === currentChapter);
}

function getChapters() {
  const data = currentSubject === 'fin' ? dataFin : dataLaw;
  if (!data) return [];
  return data.map((ch, i) => ({
    index: i,
    name: ch.chapter ? ch.chapter.replace(/^\s+/, '').replace(/\s+$/, '') : ('第' + (i+1) + '章'),
    count: (ch.points || []).length
  }));
}

// ====== Render ======
function renderAll() {
  renderChapterSelector();
  renderCard();
  renderMasteryDots();
}

function renderChapterSelector() {
  const chapters = getChapters();
  const sel = document.getElementById('chSelector');
  sel.innerHTML = chapters.map((ch, i) =>
    '<div class="ch-pill' + (i === currentChapter ? ' on' : '') + '" onclick="switchChapter(' + i + ')">'
    + ch.name + ' <span style="font-weight:400;opacity:0.7">' + ch.count + '</span></div>'
  ).join('');
}

function switchChapter(idx) {
  currentChapter = idx;
  currentPoint = 0;
  renderAll();
}

function switchSubject(subj) {
  currentSubject = subj;
  currentChapter = 0;
  currentPoint = 0;

  document.querySelectorAll('.subj-tab').forEach(t => t.classList.remove('on'));
  document.querySelector('.subj-tab[onclick*="' + subj + '"]').classList.add('on');

  // Rebuild points from new data
  buildKnowledgePoints();
  renderAll();
}

function renderCard() {
  const pts = getChapterPoints();
  const area = document.getElementById('cardArea');
  const total = pts.length;
  const pos = currentPoint;

  // Update progress
  const chPts = getChapterPoints();
  const masteredCount = chPts.filter(p => isMastered(p)).length;
  document.getElementById('progressLabel').textContent = total > 0
    ? '第 ' + (pos + 1) + '/' + total + ' 个考点'
    : '暂无考点';
  document.getElementById('masteryCount').textContent = '已掌握 ' + masteredCount;
  document.getElementById('progressFill').style.width = total > 0 ? ((pos + 1) / total * 100) + '%' : '0%';

  if (total === 0) {
    area.innerHTML = '<div class="card-empty"><div class="icon">📭</div><div>该章暂无考点</div></div>';
    return;
  }

  const p = pts[pos];
  if (!p) { currentPoint = 0; renderCard(); return; }

  const pt = p.point;
  const heat = p.heat || 1;
  const heatLabel = heat >= 3 ? '高频' : (heat >= 2 ? '中频' : '低频');
  const heatClass = 'h' + heat;
  const masteredClass = isMastered(p) ? 'success' : 'secondary';
  const masteredText = isMastered(p) ? '✅ 已掌握' : '○ 标记已掌握';

  // Parse point content
  const explain = pt.explain || pt.name || '';
  const sections = parseExplain(explain);
  const relation = pt.relation || [];
  const keywords = pt.keywords || [];

  const heatColor = heat >= 3 ? '#c23b22' : (heat >= 2 ? '#1e5b8a' : '#c9a96e');

  area.innerHTML =
    '<div class="card">' +
    '<div class="card-heat ' + heatClass + '" style="width:' + (heat * 33) + '%"></div>' +

    '<div class="card-hd">' +
    '<span class="card-rank">#' + (pos + 1) + '</span>' +
    '<span class="heat-badge ' + heatClass + '">🔥 ' + heatLabel + '</span>' +
    (keywords.length > 0 ? '<span class="chapter-tag">' + keywords.slice(0, 3).join(' · ') + '</span>' : '') +
    '</div>' +

    '<div class="card-title">' + esc(pt.name || '') + '</div>' +

    '<div class="card-body">' +
      sections.map(s =>
        '<div class="card-sec ' + s.type + '">' +
        (s.title ? '<div class="card-sec-title">' + s.title + '</div>' : '') +
        '<div class="card-sec-body">' + s.content + '</div>' +
        '</div>'
      ).join('') +
    '</div>' +

    '<div class="card-actions">' +
    '<button class="card-btn ' + masteredClass + '" onclick="toggleMastered()" id="masteryBtn">' + masteredText + '</button>' +
    (relation.length > 0 ? '<button class="card-btn dim" onclick="showRelated()">🔗 关联题</button>' : '') +
    '</div>' +
    '</div>' +

    '<div class="card-nav">' +
    '<button class="nav-btn" onclick="navPoint(-1)" id="prevBtn"' + (pos <= 0 ? ' disabled' : '') + '>← 上一个</button>' +
    '<span class="nav-pos">' + (pos + 1) + '/' + total + '</span>' +
    '<button class="nav-btn" onclick="navPoint(1)" id="nextBtn"' + (pos >= total - 1 ? ' disabled' : '') + '>下一个 →</button>' +
    '</div>';
}

function parseExplain(text) {
  // Try to split structured content
  const sections = [];

  // Core concept
  const coreMatch = text.match(/核心[概观]念[：:]\s*([^。]*。?)/);
  if (coreMatch) {
    sections.push({ type: 'core', title: '📌 核心概念', content: coreMatch[1] });
  }

  // Rules
  const ruleMatch = text.match(/规则要[点点][：:]\s*([^。]*。?)/);
  if (ruleMatch) {
    sections.push({ type: 'rule', title: '📋 规则要点', content: ruleMatch[1] });
  }

  // Exceptions
  const excMatch = text.match(/例外[情况情].*?[：:]\s*([^。]*。?)/);
  if (excMatch) {
    sections.push({ type: 'except', title: '⚠️ 例外情况', content: excMatch[1] });
  }

  // Key points (bullet points in content)
  const bulletPoints = text.match(/[•·\-]\s*[^。\n]+[；;。]?/g);
  if (bulletPoints && !coreMatch && !ruleMatch) {
    const ul = '<ul>' + bulletPoints.map(b => '<li>' + b.replace(/^[•·\-]\s*/, '') + '</li>').join('') + '</ul>';
    sections.push({ type: 'keypoint', title: '📝 考点要点', content: ul });
  }

  // If no structure found, show raw text
  if (sections.length === 0 && text.trim()) {
    sections.push({ type: 'keypoint', title: '📝 考点精要', content: esc(text) });
  }

  // If completely empty
  if (sections.length === 0) {
    sections.push({ type: 'keypoint', content: '暂无详细内容' });
  }

  return sections;
}

function renderMasteryDots() {
  const pts = getChapterPoints();
  const bar = document.getElementById('masteryBar');
  if (pts.length === 0) { bar.innerHTML = ''; return; }

  bar.innerHTML = pts.map((p, i) => {
    const cls = isMastered(p) ? ' mastered' : '';
    return '<div class="mastery-dot' + cls + '" style="cursor:pointer" onclick="jumpToPoint(' + i + ')" title="' + (i+1) + '"></div>';
  }).join('');
}

function jumpToPoint(idx) {
  currentPoint = idx;
  renderAll();
}

function navPoint(dir) {
  const pts = getChapterPoints();
  const next = currentPoint + dir;
  if (next < 0 || next >= pts.length) return;
  currentPoint = next;
  renderAll();
}

function isMastered(p) {
  if (!p) return false;
  return !!mastered[currentSubject + '-' + p.chIdx + '-' + p.pIdx];
}

function toggleMastered() {
  const pts = getChapterPoints();
  const p = pts[currentPoint];
  if (!p) return;

  const key = currentSubject + '-' + p.chIdx + '-' + p.pIdx;
  if (mastered[key]) {
    delete mastered[key];
    showToast('已取消掌握');
  } else {
    mastered[key] = true;
    showToast('✅ 标记为已掌握！');
    // Auto-advance to next
    setTimeout(() => {
      if (currentPoint < pts.length - 1) {
        navPoint(1);
      }
    }, 400);
  }
  localStorage.setItem('study_cards_mastered', JSON.stringify(mastered));
  renderAll();
}

function showRelated() {
  showToast('🔗 关联题目功能开发中...');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Start
init();
</script>
</body>
</html>
